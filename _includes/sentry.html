{% if site.sentry_dsn and site.sentry_dsn != "" %}
<!-- Sentry SDK: Error Tracking + Tracing + Replay (Free tier 최대 활용) -->
<!-- Defer loading to reduce FID (First Input Delay) -->
<script
  src="https://browser.sentry-cdn.com/9.5.0/bundle.tracing.replay.min.js"
  integrity="sha384-o/GEuWSkrvEGEtjN67ud+ssWsPJyX6RPCWqDvd8EE0N5nm6Id38XSS62lM4ETM0O"
  crossorigin="anonymous"
  defer
></script>
<script src="{{ '/assets/js/sentry-init.js' | relative_url }}" data-sentry-dsn="{{ site.sentry_dsn }}" data-production-host="tech.2twodragon.com" defer></script>
{% else %}
<!-- Sentry disabled: sentry_dsn not configured in _config.yml -->
{% endif %}
