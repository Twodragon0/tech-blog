<!-- Mermaid diagram styles - static SVG images + legacy JS rendering -->
<style>
/* Static SVG mermaid images */
img[src*="/mermaid/"] {
  display: block;
  margin: 1.5rem auto;
  width: 100%;
  height: auto;
  min-height: 120px;
  padding: 1.5rem;
  border-radius: 12px;
  background: transparent;
  border: 1px solid #e2e8f0;
  object-fit: contain;
}

[data-theme="dark"] img[src*="/mermaid/"] {
  background: transparent;
  border-color: rgba(255, 255, 255, 0.15);
  filter: invert(1) hue-rotate(180deg);
}

/* Dark mode for diagram SVGs (light background, non-mermaid) */
[data-theme="dark"] .post-content img[src*="/diagrams/"] {
  filter: invert(1) hue-rotate(180deg);
}

/* prefers-color-scheme fallback for Safari/system dark mode */
@media (prefers-color-scheme: dark) {
  html:not([data-theme="light"]) img[src*="/mermaid/"] {
    background: transparent;
    border-color: rgba(255, 255, 255, 0.15);
    filter: invert(1) hue-rotate(180deg);
  }
  html:not([data-theme="light"]) .post-content img[src*="/diagrams/"] {
    filter: invert(1) hue-rotate(180deg);
  }
}

@media (max-width: 768px) {
  img[src*="/mermaid/"] {
    padding: 0.75rem;
  }
}

/* Legacy mermaid JS container (fallback) */
.mermaid-container {
  position: relative;
  width: 100%;
  margin: 1.5rem 0;
  border-radius: 12px;
  overflow: hidden;
  background: var(--mermaid-bg, #f8f9fa);
  border: 1px solid var(--mermaid-border, #e2e8f0);
  transition: background 0.3s ease, border-color 0.3s ease;
}

[data-theme="dark"] .mermaid-container {
  --mermaid-bg: #1e2030;
  --mermaid-border: #363a4f;
}

.mermaid-container .mermaid {
  display: flex;
  justify-content: center;
  padding: 1.5rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.mermaid-container .mermaid svg {
  max-width: 100%;
  height: auto;
}
</style>

<script src="{{ '/assets/js/mermaid-init.js' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M' }}" defer></script>
