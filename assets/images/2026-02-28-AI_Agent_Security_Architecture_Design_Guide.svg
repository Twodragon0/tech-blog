  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(255,60,60,0.15)" stroke="rgba(255,80,80,0.3)" stroke-width="1"/>
  <text x="190" y="81" font-family="'SF Mono','Fira Code',monospace" font-size="12" fill="rgba(255,160,140,0.9)" text-anchor="middle" letter-spacing="1">FEBRUARY 28, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="700" fill="white">AI Agent</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="700" fill="white">Security Architecture Design</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" fill="rgba(255,200,180,0.75)">Zero-Trust Agent Isolation · Threat Modeling · Access Control</text>

