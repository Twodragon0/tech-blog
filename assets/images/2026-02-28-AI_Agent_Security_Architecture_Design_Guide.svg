  <line x1="1060" y1="200" x2="1024" y2="235" stroke="rgba(255,120,60,0.2)" stroke-width="1"/>
  <line x1="940" y1="240" x2="996" y2="235" stroke="rgba(255,100,40,0.18)" stroke-width="1"/>
  <line x1="1080" y1="240" x2="1024" y2="235" stroke="rgba(255,100,40,0.18)" stroke-width="1"/>
  <line x1="960" y1="270" x2="996" y2="235" stroke="rgba(255,120,60,0.2)" stroke-width="1"/>
  <line x1="1060" y1="270" x2="1024" y2="235" stroke="rgba(255,120,60,0.2)" stroke-width="1"/>
  <line x1="1010" y1="185" x2="1010" y2="221" stroke="rgba(255,100,40,0.18)" stroke-width="1"/>
  <line x1="1010" y1="285" x2="1010" y2="249" stroke="rgba(255,100,40,0.18)" stroke-width="1"/>
