  <line x1="1075" y1="172" x2="1055" y2="185" stroke="rgba(80,160,255,0.2)" stroke-width="0.8" stroke-dasharray="2 3"/>
  <line x1="928" y1="250" x2="946" y2="245" stroke="rgba(80,220,140,0.2)" stroke-width="0.8" stroke-dasharray="2 3"/>
  <line x1="1092" y1="250" x2="1074" y2="245" stroke="rgba(80,220,140,0.2)" stroke-width="0.8" stroke-dasharray="2 3"/>
  <line x1="945" y1="305" x2="963" y2="290" stroke="rgba(220,100,255,0.2)" stroke-width="0.8" stroke-dasharray="2 3"/>
  <line x1="1075" y1="305" x2="1057" y2="290" stroke="rgba(220,100,255,0.2)" stroke-width="0.8" stroke-dasharray="2 3"/>

