  <path d="M1010,135 L1130,160 L1130,250 Q1130,310 1010,330 Q890,310 890,250 L890,160 Z" fill="url(#shieldGrad)" stroke="rgba(255,80,80,0.25)" stroke-width="1.5"/>
  <!-- Shield inner layer -->
  <path d="M1010,155 L1110,175 L1110,248 Q1110,298 1010,315 Q910,298 910,248 L910,175 Z" fill="none" stroke="rgba(255,120,60,0.2)" stroke-width="1"/>

