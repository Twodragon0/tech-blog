<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>AI Agent Security Architecture Design Guide</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE: Title and info -->
  <!-- Date badge -->
  <rect x="50" y="50" width="160" height="36" rx="18" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.5"/>
  <text x="130" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">FEBRUARY 28, 2026</text>

  <!-- Main title -->
  <text x="50" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="white">Agent Security</text>
  <text x="50" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="white">Architecture Design</text>

  <!-- Tag pills at y=430 -->
  <g>
    <!-- Tag 1: AI Security -->
    <rect x="50" y="410" width="110" height="32" rx="16" fill="#3b82f6" opacity="0.09" stroke="#3b82f6" stroke-width="0.35"/>
    <text x="105" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#3b82f6" text-anchor="middle">AI Security</text>

    <!-- Tag 2: LLM -->
    <rect x="175" y="410" width="80" height="32" rx="16" fill="#f59e0b" opacity="0.09" stroke="#f59e0b" stroke-width="0.35"/>
    <text x="215" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#f59e0b" text-anchor="middle">LLM</text>

    <!-- Tag 3: Architecture -->
    <rect x="270" y="410" width="140" height="32" rx="16" fill="#ef4444" opacity="0.09" stroke="#ef4444" stroke-width="0.35"/>
    <text x="340" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#ef4444" text-anchor="middle">Architecture</text>
  </g>

  <!-- Footer -->
  <text x="50" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#6b7280">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: Visual scene -->
  <!-- Brain silhouette with neural lines -->
  <g transform="translate(750, 180)">
    <!-- Brain outline -->
    <ellipse cx="0" cy="0" rx="65" ry="75" fill="#3b82f6" opacity="0.07" stroke="#3b82f6" stroke-width="0.3"/>

    <!-- Brain contour details -->
    <path d="M -40 -30 Q -50 -20 -45 0 Q -50 20 -40 30" fill="none" stroke="#3b82f6" stroke-width="0.25" opacity="0.15"/>
    <path d="M 40 -30 Q 50 -20 45 0 Q 50 20 40 30" fill="none" stroke="#3b82f6" stroke-width="0.25" opacity="0.15"/>

    <!-- Neural network lines -->
    <line x1="-30" y1="-50" x2="20" y2="-20" stroke="#3b82f6" stroke-width="0.3" opacity="0.12"/>
    <line x1="-20" y1="-60" x2="35" y2="10" stroke="#3b82f6" stroke-width="0.3" opacity="0.12"/>
    <line x1="0" y1="-70" x2="15" y2="40" stroke="#3b82f6" stroke-width="0.3" opacity="0.12"/>
    <line x1="30" y1="-55" x2="-25" y2="15" stroke="#3b82f6" stroke-width="0.3" opacity="0.12"/>
    <line x1="40" y1="-30" x2="-40" y2="35" stroke="#3b82f6" stroke-width="0.25" opacity="0.10"/>

    <!-- Connection nodes -->
    <circle cx="-30" cy="-50" r="2.5" fill="#3b82f6" opacity="0.20"/>
    <circle cx="20" cy="-20" r="2.5" fill="#3b82f6" opacity="0.20"/>
    <circle cx="35" cy="10" r="2" fill="#3b82f6" opacity="0.18"/>
    <circle cx="15" cy="40" r="2" fill="#3b82f6" opacity="0.18"/>
    <circle cx="-25" cy="15" r="2.5" fill="#3b82f6" opacity="0.20"/>
  </g>

  <!-- Shield with checkmark -->
  <g transform="translate(950, 280)">
    <!-- Shield outline -->
    <path d="M 0 -60 L -45 -30 L -45 30 Q 0 70 45 30 L 45 -30 Z" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="0.35"/>

    <!-- Shield border accent -->
    <path d="M 0 -60 L -45 -30 L -45 30 Q 0 70 45 30 L 45 -30 Z" fill="none" stroke="#ef4444" stroke-width="0.25" opacity="0.15"/>

    <!-- Checkmark inside shield -->
    <g transform="translate(0, 5)">
      <path d="M -15 5 L -5 15 L 20 -10" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
    </g>
  </g>

  <!-- Data flow arrows connecting elements -->
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.25"/>
    </marker>
  </defs>

  <!-- Arrow 1: Brain to Shield (curved) -->
  <path d="M 815 180 Q 880 200 905 240" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.18" marker-end="url(#arrowhead)"/>

  <!-- Arrow 2: Shield back to Brain (lower curve) -->
  <path d="M 905 320 Q 880 340 815 320" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.18" marker-end="url(#arrowhead)"/>

  <!-- Data flow accent lines -->
  <line x1="820" y1="200" x2="880" y2="220" stroke="#f59e0b" stroke-width="0.5" opacity="0.10"/>
  <line x1="825" y1="310" x2="885" y2="330" stroke="#3b82f6" stroke-width="0.5" opacity="0.10"/>

  <!-- Warning triangles / Alert indicators -->
  <!-- Warning 1: Top right -->
  <g transform="translate(1080, 120)">
    <polygon points="0,-18 16,12 -16,12" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.35"/>
    <text x="0" y="4" font-size="16" font-weight="700" fill="#f59e0b" opacity="0.25" text-anchor="middle">!</text>
  </g>

  <!-- Warning 2: Bottom right -->
  <g transform="translate(1100, 480)">
    <polygon points="0,-15 14,10 -14,10" fill="#ef4444" opacity="0.07" stroke="#ef4444" stroke-width="0.35"/>
    <text x="0" y="2" font-size="14" font-weight="700" fill="#ef4444" opacity="0.22" text-anchor="middle">!</text>
  </g>

  <!-- Security boundary line (subtle) -->
  <circle cx="900" cy="280" r="120" fill="none" stroke="#3b82f6" stroke-width="0.35" opacity="0.08" stroke-dasharray="4,4"/>

  <!-- Accent decorative elements -->
  <!-- Small pulse circles -->
  <circle cx="820" cy="160" r="3" fill="#3b82f6" opacity="0.06"/>
  <circle cx="1050" cy="340" r="2.5" fill="#ef4444" opacity="0.05"/>
  <circle cx="700" cy="400" r="2" fill="#f59e0b" opacity="0.06"/>
</svg>