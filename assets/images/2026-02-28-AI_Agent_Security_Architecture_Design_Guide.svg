  <circle cx="1092" cy="250" r="8" fill="rgba(80,200,120,0.1)" stroke="rgba(80,220,140,0.28)" stroke-width="1"/>
  <circle cx="945" cy="305" r="9" fill="rgba(200,80,255,0.1)" stroke="rgba(220,100,255,0.28)" stroke-width="1"/>
  <circle cx="1075" cy="305" r="9" fill="rgba(200,80,255,0.1)" stroke="rgba(220,100,255,0.28)" stroke-width="1"/>

