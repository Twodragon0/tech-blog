  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="rgba(255,120,80,0.8)" letter-spacing="2.5">SECURITY · AGENTIC AI · ARCHITECTURE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(255,60,60,0.18)" stroke="rgba(255,80,80,0.35)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="rgba(255,160,140,0.95)" text-anchor="middle">Zero Trust</text>

  <rect x="224" y="402" width="148" height="36" rx="18" fill="rgba(255,140,20,0.18)" stroke="rgba(255,160,40,0.35)" stroke-width="1"/>
  <text x="298" y="425" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="rgba(255,200,120,0.95)" text-anchor="middle">Agent Isolation</text>

  <rect x="386" y="402" width="148" height="36" rx="18" fill="rgba(60,100,255,0.18)" stroke="rgba(80,140,255,0.35)" stroke-width="1"/>
  <text x="460" y="425" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="rgba(140,180,255,0.95)" text-anchor="middle">Threat Modeling</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="rgba(255,100,80,0.5)" text-anchor="end" letter-spacing="1.5">SECURITY</text>
