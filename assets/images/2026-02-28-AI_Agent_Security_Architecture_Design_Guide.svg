<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#4488ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Grid vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Security Architecture Icon -->
  <!-- Outer shield ring -->
  <circle cx="1010" cy="225" r="105" fill="none" stroke="rgba(255,68,68,0.25)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="88" fill="rgba(255,68,68,0.06)" stroke="rgba(255,100,100,0.2)" stroke-width="1"/>

  <!-- Shield body -->
  <path d="M1010,148 L1070,170 L1070,218 C1070,252 1044,278 1010,288 C976,278 950,252 950,218 L950,170 Z" fill="rgba(255,68,68,0.08)" stroke="rgba(255,80,80,0.35)" stroke-width="1.5"/>
  <!-- Shield inner highlight -->
  <path d="M1010,160 L1058,178 L1058,216 C1058,244 1036,266 1010,274 C984,266 962,244 962,216 L962,178 Z" fill="rgba(255,68,68,0.05)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>

  <!-- Central AI brain node -->
  <circle cx="1010" cy="222" r="22" fill="rgba(255,136,0,0.1)" stroke="rgba(255,136,0,0.4)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="1010" cy="222" r="14" fill="rgba(255,136,0,0.15)" stroke="rgba(255,180,0,0.35)" stroke-width="1"/>
  <!-- Brain pulse rings -->
  <circle cx="1010" cy="222" r="30" fill="none" stroke="rgba(255,136,0,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="1010" cy="222" r="42" fill="none" stroke="rgba(255,136,0,0.08)" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Agent nodes orbiting the brain -->
  <!-- Node 1 - top -->
  <circle cx="1010" cy="175" r="9" fill="rgba(68,136,255,0.12)" stroke="rgba(68,136,255,0.4)" stroke-width="1.2"/>
  <line x1="1010" y1="184" x2="1010" y2="208" stroke="rgba(68,136,255,0.3)" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Node 2 - right -->
  <circle cx="1057" cy="222" r="9" fill="rgba(68,136,255,0.12)" stroke="rgba(68,136,255,0.4)" stroke-width="1.2"/>
  <line x1="1048" y1="222" x2="1032" y2="222" stroke="rgba(68,136,255,0.3)" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Node 3 - bottom-left -->
  <circle cx="978" cy="255" r="9" fill="rgba(68,255,136,0.1)" stroke="rgba(68,255,136,0.35)" stroke-width="1.2"/>
  <line x1="985" y1="248" x2="1000" y2="233" stroke="rgba(68,255,136,0.25)" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Node 4 - bottom-right -->
  <circle cx="1042" cy="255" r="9" fill="rgba(68,255,136,0.1)" stroke="rgba(68,255,136,0.35)" stroke-width="1.2"/>
  <line x1="1035" y1="248" x2="1020" y2="233" stroke="rgba(68,255,136,0.25)" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- External threat indicators - small diamonds -->
  <polygon points="1010,135 1016,141 1010,147 1004,141" fill="rgba(255,68,68,0.2)" stroke="rgba(255,68,68,0.5)" stroke-width="1"/>
  <polygon points="1070,160 1076,166 1070,172 1064,166" fill="rgba(255,68,68,0.15)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <polygon points="1073,222 1079,228 1073,234 1067,228" fill="rgba(255,136,0,0.15)" stroke="rgba(255,136,0,0.4)" stroke-width="1"/>

  <!-- Circuit lines extending from shield -->
  <path d="M1070,190 L1095,190 L1095,160 L1115,160" fill="none" stroke="rgba(255,68,68,0.2)" stroke-width="1"/>
  <circle cx="1115" cy="160" r="3" fill="rgba(255,68,68,0.3)" stroke="rgba(255,68,68,0.5)" stroke-width="1"/>
  <path d="M1073,228 L1100,228 L1100,248 L1120,248" fill="none" stroke="rgba(68,136,255,0.2)" stroke-width="1"/>
  <circle cx="1120" cy="248" r="3" fill="rgba(68,136,255,0.3)" stroke="rgba(68,136,255,0.5)" stroke-width="1"/>
  <path d="M950,200 L925,200 L925,170 L905,170" fill="none" stroke="rgba(255,136,0,0.18)" stroke-width="1"/>
  <circle cx="905" cy="170" r="3" fill="rgba(255,136,0,0.3)" stroke="rgba(255,136,0,0.5)" stroke-width="1"/>

  <!-- Lock symbol in center of brain node -->
  <rect x="1005" y="218" width="10" height="8" rx="1" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>
  <path d="M1007,218 C1007,214 1013,214 1013,218" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>

  <!-- Outer decoration arcs -->
  <path d="M905,225 A105,105 0 0,1 955,135" fill="none" stroke="rgba(255,68,68,0.12)" stroke-width="1" stroke-dasharray="5,4"/>
  <path d="M1115,225 A105,105 0 0,0 1065,135" fill="none" stroke="rgba(68,136,255,0.12)" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,68,68,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(255,136,0,0.6)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(255,68,68,0.5)" filter="url(#glow)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,68,68,0.025)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,68,68,0.03)" stroke="none"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badge)" stroke="rgba(255,68,68,0.25)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New',monospace" font-size="11" fill="rgba(255,160,160,0.9)" text-anchor="middle" letter-spacing="1">FEBRUARY 28, 2026</text>

  <!-- Title -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">AI Agent</text>
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-0.5">Security Architecture</text>
  <text x="80" y="298" font-family="'Arial',sans-serif" font-size="38" font-weight="700" fill="rgba(255,200,200,0.95)" letter-spacing="-0.5">Design</text>

  <!-- Subtitle -->
  <text x="80" y="338" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" letter-spacing="0.2">Zero-Trust Multi-Agent Security Design Patterns</text>

  <!-- Accent line -->
  <rect x="80" y="358" width="420" height="3" fill="url(#line)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="393" font-family="'Courier New',monospace" font-size="14" fill="rgba(255,100,100,0.8)" letter-spacing="3">SECURITY / AI ARCHITECTURE</text>

  <!-- Tag pills -->
  <rect x="80" y="420" width="120" height="36" rx="18" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.35)" stroke-width="1"/>
  <text x="140" y="443" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,130,130,0.95)" text-anchor="middle" font-weight="600">Zero Trust</text>

  <rect x="216" y="420" width="118" height="36" rx="18" fill="rgba(255,136,0,0.15)" stroke="rgba(255,136,0,0.35)" stroke-width="1"/>
  <text x="275" y="443" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,190,100,0.95)" text-anchor="middle" font-weight="600">AI Security</text>

  <rect x="350" y="420" width="110" height="36" rx="18" fill="rgba(68,136,255,0.15)" stroke="rgba(68,136,255,0.35)" stroke-width="1"/>
  <text x="405" y="443" font-family="'Arial',sans-serif" font-size="13" fill="rgba(130,180,255,0.95)" text-anchor="middle" font-weight="600">DevSecOps</text>

  <!-- Footer -->
  <text x="80" y="575" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="575" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,100,100,0.4)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>