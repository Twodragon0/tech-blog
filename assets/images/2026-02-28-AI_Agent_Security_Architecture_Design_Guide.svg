  <path d="M1004,224 L1004,218 Q1004,212 1010,212 Q1016,212 1016,218 L1016,224" fill="none" stroke="rgba(255,200,60,0.35)" stroke-width="1.2"/>
  <circle cx="1010" cy="234" r="2.5" fill="rgba(255,200,60,0.5)"/>

