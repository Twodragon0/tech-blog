  <line x1="1060" y1="200" x2="1010" y2="185" stroke="rgba(255,80,60,0.12)" stroke-width="0.8"/>
  <line x1="960" y1="270" x2="1010" y2="285" stroke="rgba(255,80,60,0.12)" stroke-width="0.8"/>
