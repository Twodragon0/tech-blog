  <circle cx="960" cy="200" r="7" fill="rgba(255,80,80,0.12)" stroke="rgba(255,120,80,0.35)" stroke-width="1"/>
  <circle cx="1060" cy="200" r="7" fill="rgba(255,80,80,0.12)" stroke="rgba(255,120,80,0.35)" stroke-width="1"/>
  <circle cx="940" cy="240" r="6" fill="rgba(255,100,40,0.1)" stroke="rgba(255,140,60,0.3)" stroke-width="1"/>
  <circle cx="1080" cy="240" r="6" fill="rgba(255,100,40,0.1)" stroke="rgba(255,140,60,0.3)" stroke-width="1"/>
  <circle cx="960" cy="270" r="7" fill="rgba(255,80,80,0.12)" stroke="rgba(255,120,80,0.35)" stroke-width="1"/>
  <circle cx="1060" cy="270" r="7" fill="rgba(255,80,80,0.12)" stroke="rgba(255,120,80,0.35)" stroke-width="1"/>
  <circle cx="1010" cy="185" r="6" fill="rgba(255,100,40,0.1)" stroke="rgba(255,140,60,0.3)" stroke-width="1"/>
  <circle cx="1010" cy="285" r="6" fill="rgba(255,100,40,0.1)" stroke="rgba(255,140,60,0.3)" stroke-width="1"/>

