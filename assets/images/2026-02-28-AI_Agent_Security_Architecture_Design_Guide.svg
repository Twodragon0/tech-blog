<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>AI Agent Security Architecture - Stateful Runtime Guide</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#15153a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#00cec9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Architecture diagram boxes: Agent -> Runtime -> Eval -->
  <!-- Agent box -->
  <rect x="820" y="130" width="150" height="70" rx="8" fill="rgba(108,92,231,0.3)" stroke="rgba(108,92,231,0.7)" stroke-width="2.5"/>
  <rect x="840" y="152" width="50" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="840" y="166" width="80" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="840" y="180" width="60" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <!-- Arrow Agent to Runtime -->
  <line x1="970" y1="165" x2="1000" y2="165" stroke="rgba(0,206,201,0.6)" stroke-width="2.5"/>
  <polygon points="996,160 1008,165 996,170" fill="rgba(0,206,201,0.6)"/>
  <!-- Runtime box -->
  <rect x="1005" y="130" width="150" height="70" rx="8" fill="rgba(0,206,201,0.22)" stroke="rgba(0,206,201,0.6)" stroke-width="2.5"/>
  <rect x="1025" y="152" width="50" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="1025" y="166" width="80" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="1025" y="180" width="55" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <!-- Arrow Runtime down to Eval -->
  <line x1="1080" y1="200" x2="1080" y2="240" stroke="rgba(0,206,201,0.6)" stroke-width="2.5"/>
  <polygon points="1075,236 1080,248 1085,236" fill="rgba(0,206,201,0.6)"/>
  <!-- Eval box -->
  <rect x="1005" y="248" width="150" height="70" rx="8" fill="rgba(39,174,96,0.22)" stroke="rgba(39,174,96,0.55)" stroke-width="2.5"/>
  <rect x="1025" y="268" width="50" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="1025" y="282" width="80" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="1025" y="296" width="60" height="8" rx="4" fill="rgba(255,255,255,0.25)"/>
  <!-- Feedback arrow Eval back to Agent -->
  <path d="M1005,285 Q960,330 895,310 Q850,295 895,225 Q910,205 820,195" fill="none" stroke="rgba(108,92,231,0.4)" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="820,190 812,198 824,202" fill="rgba(108,92,231,0.4)"/>
  <!-- Security shield overlay -->
  <path d="M900,360 L900,320 L940,308 L980,320 L980,360 Q980,385 940,400 Q900,385 900,360 Z" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.5)" stroke-width="2"/>
  <line x1="926" y1="355" x2="936" y2="365" stroke="rgba(231,76,60,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="936" y1="365" x2="954" y2="347" stroke="rgba(231,76,60,0.7)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(108,92,231,0.25)"/>
  <text x="180" y="81" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">FEBRUARY 28, 2026</text>
  <text x="80" y="185" font-family="Arial" font-size="44" font-weight="700" fill="#ffffff">AI Agent Security Architecture</text>
  <text x="80" y="245" font-family="Arial" font-size="44" font-weight="700" fill="#ffffff">Stateful Runtime Guide</text>
  <text x="80" y="300" font-family="Arial" font-size="19" fill="rgba(185,180,230,0.85)">Secure design patterns for stateful AI agent runtime environments</text>
  <rect x="80" y="325" width="420" height="3" fill="url(#accent)"/>
  <text x="80" y="370" font-family="Arial" font-size="14" fill="rgba(108,92,231,0.9)" letter-spacing="2">AI SECURITY ARCHITECTURE</text>
  <rect x="80" y="400" width="100" height="36" rx="18" fill="rgba(108,92,231,0.3)" stroke="rgba(108,92,231,0.5)" stroke-width="1"/>
  <text x="130" y="423" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle">AI Agent</text>
  <rect x="194" y="400" width="100" height="36" rx="18" fill="rgba(0,206,201,0.25)" stroke="rgba(0,206,201,0.5)" stroke-width="1"/>
  <text x="244" y="423" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle">Runtime</text>
  <rect x="308" y="400" width="120" height="36" rx="18" fill="rgba(52,73,94,0.5)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="368" y="423" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle">Evaluation</text>
  <rect x="0" y="520" width="1200" height="110" fill="rgba(0,0,0,0.35)"/>
  <text x="80" y="545" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.55)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="end">DevSecOps</text>
</svg>
