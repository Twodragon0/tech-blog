  <circle cx="1010" cy="235" r="38" fill="rgba(255,60,60,0.1)" stroke="rgba(255,80,80,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="235" r="26" fill="rgba(255,100,40,0.08)" stroke="rgba(255,140,60,0.3)" stroke-width="1"/>
  <circle cx="1010" cy="235" r="14" fill="rgba(255,60,60,0.12)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>

