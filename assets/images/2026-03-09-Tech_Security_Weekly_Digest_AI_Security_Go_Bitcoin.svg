<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="50%" style="stop-color:#f6ad55"/>
      <stop offset="100%" style="stop-color:#3182ce"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:rgba(229,62,62,0)"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6ad55;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#e53e3e;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI + Security Shield + Bitcoin + Go gopher -->

  <!-- Outer hex shield glow -->
  <polygon points="1010,135 1095,180 1095,270 1010,315 925,270 925,180"
    fill="url(#shieldGrad)" stroke="rgba(229,62,62,0.25)" stroke-width="1.5"/>

  <!-- Inner shield body -->
  <polygon points="1010,150 1080,190 1080,260 1010,300 940,260 940,190"
    fill="rgba(229,62,62,0.07)" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>

  <!-- Shield core -->
  <polygon points="1010,168 1063,198 1063,252 1010,282 957,252 957,198"
    fill="rgba(229,62,62,0.1)" stroke="rgba(255,100,100,0.35)" stroke-width="1.5"/>

  <!-- Bitcoin symbol inside shield -->
  <circle cx="1010" cy="225" r="28" fill="rgba(246,173,85,0.1)" stroke="rgba(246,173,85,0.4)" stroke-width="1.5"/>
  <text x="1010" y="233" text-anchor="middle" font-size="28" font-weight="700"
    fill="rgba(246,173,85,0.75)" font-family="Arial, sans-serif">₿</text>

  <!-- AI neural dots around shield -->
  <circle cx="1010" cy="132" r="5" fill="rgba(49,130,206,0.5)" stroke="rgba(49,130,206,0.7)" stroke-width="1"/>
  <circle cx="1097" cy="176" r="4" fill="rgba(49,130,206,0.4)" stroke="rgba(49,130,206,0.6)" stroke-width="1"/>
  <circle cx="1097" cy="274" r="4" fill="rgba(229,62,62,0.4)" stroke="rgba(229,62,62,0.6)" stroke-width="1"/>
  <circle cx="1010" cy="318" r="5" fill="rgba(229,62,62,0.5)" stroke="rgba(229,62,62,0.7)" stroke-width="1"/>
  <circle cx="923" cy="274" r="4" fill="rgba(246,173,85,0.4)" stroke="rgba(246,173,85,0.6)" stroke-width="1"/>
  <circle cx="923" cy="176" r="4" fill="rgba(246,173,85,0.4)" stroke="rgba(246,173,85,0.6)" stroke-width="1"/>

  <!-- Neural connection lines -->
  <line x1="1010" y1="132" x2="1097" y2="176" stroke="rgba(49,130,206,0.2)" stroke-width="1"/>
  <line x1="1097" y1="176" x2="1097" y2="274" stroke="rgba(49,130,206,0.15)" stroke-width="1"/>
  <line x1="1097" y1="274" x2="1010" y2="318" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>
  <line x1="1010" y1="318" x2="923" y2="274" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>
  <line x1="923" y1="274" x2="923" y2="176" stroke="rgba(246,173,85,0.15)" stroke-width="1"/>
  <line x1="923" y1="176" x2="1010" y2="132" stroke="rgba(246,173,85,0.2)" stroke-width="1"/>

  <!-- Go lang gopher eye indicators top right -->
  <circle cx="1140" cy="148" r="16" fill="rgba(0,173,216,0.08)" stroke="rgba(0,173,216,0.3)" stroke-width="1.5"/>
  <circle cx="1140" cy="148" r="8" fill="rgba(0,173,216,0.12)" stroke="rgba(0,173,216,0.4)" stroke-width="1"/>
  <circle cx="1140" cy="148" r="3" fill="rgba(0,173,216,0.6)"/>

  <circle cx="1110" cy="160" r="11" fill="rgba(0,173,216,0.06)" stroke="rgba(0,173,216,0.25)" stroke-width="1"/>
  <circle cx="1110" cy="160" r="5" fill="rgba(0,173,216,0.1)" stroke="rgba(0,173,216,0.35)" stroke-width="1"/>
  <circle cx="1110" cy="160" r="2" fill="rgba(0,173,216,0.55)"/>

  <!-- Go text label -->
  <rect x="1118" y="175" width="38" height="18" rx="3"
    fill="rgba(0,173,216,0.12)" stroke="rgba(0,173,216,0.3)" stroke-width="1"/>
  <text x="1137" y="188" text-anchor="middle" font-size="11" font-weight="700"
    fill="rgba(0,173,216,0.8)" font-family="Arial, sans-serif">Go</text>

  <!-- AI scan lines across shield -->
  <line x1="945" y1="205" x2="1075" y2="205" stroke="rgba(49,130,206,0.2)" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="945" y1="245" x2="1075" y2="245" stroke="rgba(49,130,206,0.15)" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Corner security brackets -->
  <path d="M890,130 L890,115 L905,115" fill="none" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>
  <path d="M1150,130 L1150,115 L1135,115" fill="none" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>
  <path d="M890,320 L890,335 L905,335" fill="none" stroke="rgba(229,62,62,0.3)" stroke-width="1.5"/>
  <path d="M1150,320 L1150,335 L1135,335" fill="none" stroke="rgba(229,62,62,0.3)" stroke-width="1.5"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(246,173,85,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(49,130,206,0.7)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4"
    fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="180" y="81" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="1.5"
    fill="rgba(229,62,62,0.9)" font-family="Arial, sans-serif">MARCH 9, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white"
    font-family="Arial, sans-serif" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700"
    fill="rgba(246,173,85,0.95)" font-family="Arial, sans-serif" letter-spacing="-0.5">AI Security Go Bitcoin</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)"
    font-family="Arial, sans-serif">Curated threat intelligence &amp; developer security updates</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" letter-spacing="3" font-weight="600"
    fill="rgba(229,62,62,0.7)" font-family="Arial, sans-serif">SECURITY / WEEKLY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18"
    fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="140" y="425" text-anchor="middle" font-size="13" font-weight="600"
    fill="rgba(229,62,62,0.9)" font-family="Arial, sans-serif">AI Security</text>

  <rect x="214" y="402" width="110" height="36" rx="18"
    fill="rgba(246,173,85,0.15)" stroke="rgba(246,173,85,0.4)" stroke-width="1"/>
  <text x="269" y="425" text-anchor="middle" font-size="13" font-weight="600"
    fill="rgba(246,173,85,0.9)" font-family="Arial, sans-serif">Bitcoin</text>

  <rect x="338" y="402" width="90" height="36" rx="18"
    fill="rgba(0,173,216,0.15)" stroke="rgba(0,173,216,0.4)" stroke-width="1"/>
  <text x="383" y="425" text-anchor="middle" font-size="13" font-weight="600"
    fill="rgba(0,173,216,0.9)" font-family="Arial, sans-serif">Go Lang</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.35)"
    font-family="Arial, sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" text-anchor="end" font-size="13" fill="rgba(255,255,255,0.3)"
    font-family="Arial, sans-serif">security</text>
</svg>