<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>AI Agent Security, Bitcoin Saylor, Agent Safehouse - Security Weekly 2026-03-09</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="280" fill="#f59e0b" opacity="0.04" filter="url(#sg)"/>
  <circle cx="1050" cy="450" r="220" fill="#6366f1" opacity="0.07" filter="url(#sg)"/>
  <!-- Agent Safehouse / sandbox icon -->
  <g transform="translate(960,290)" filter="url(#glow)" opacity="0.6">
    <!-- House/vault shape -->
    <polygon points="0,-70 65,0 65,60 -65,60 -65,0" fill="none" stroke="#6366f1" stroke-width="2.5"/>
    <polygon points="0,-70 65,0 65,60 -65,60 -65,0" fill="#6366f1" opacity="0.07"/>
    <!-- Door -->
    <rect x="-18" y="10" width="36" height="50" rx="4" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.7"/>
    <!-- Lock on door -->
    <circle cx="0" cy="35" r="6" fill="#f59e0b" opacity="0.9"/>
    <!-- Satellite dish (monitoring) -->
    <circle cx="40" cy="-20" r="15" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <line x1="40" y1="-20" x2="40" y2="-5" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
    <!-- Injection warning -->
    <text x="-40" y="-25" font-family="Arial,sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" opacity="0.9">INJECT?</text>
    <line x1="-60" y1="-18" x2="-28" y2="-18" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
  </g>
  <!-- Date + category -->
  <rect x="70" y="44" width="158" height="34" rx="17" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="149" y="66" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fcd34d" text-anchor="middle">March 9, 2026</text>
  <rect x="248" y="44" width="148" height="34" rx="17" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="322" y="66" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#a5b4fc" text-anchor="middle">AI AGENT</text>
  <!-- Title -->
  <text x="70" y="195" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="white" filter="url(#glow)">AI Agent</text>
  <text x="70" y="252" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="white" filter="url(#glow)">Security Threats</text>
  <text x="70" y="308" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">Weekly Security Digest</text>
  <!-- Keywords -->
  <rect x="70" y="368" width="168" height="36" rx="18" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="154" y="391" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fcd34d" text-anchor="middle">Prompt Inject</text>
  <rect x="258" y="368" width="138" height="36" rx="18" fill="rgba(99,102,241,0.14)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="327" y="391" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a5b4fc" text-anchor="middle">Safehouse</text>
  <rect x="416" y="368" width="118" height="36" rx="18" fill="rgba(245,166,35,0.13)" stroke="#f5a623" stroke-width="1.5"/>
  <text x="475" y="391" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle">Bitcoin</text>
  <!-- Accent bar -->
  <rect x="70" y="434" width="420" height="4" rx="2" fill="url(#acc)"/>
  <!-- Footer -->
  <line x1="50" y1="592" x2="1150" y2="592" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
  <text x="1150" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="end">tech.2twodragon.com</text>
  <text x="70" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b">DevSecOps Weekly Intel</text>
</svg>
