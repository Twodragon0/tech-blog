<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Divider line -->
  <line x1="650" y1="0" x2="650" y2="630" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  
  <!-- LEFT SIDE -->
  
  <!-- Date Badge -->
  <g>
    <rect x="50" y="40" width="180" height="50" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
    <text x="140" y="72" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">MARCH 9, 2026</text>
  </g>
  
  <!-- Main Title -->
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="-1">Tech Security</text>
  <text x="80" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="-1">Weekly Digest</text>
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#f59e0b" letter-spacing="-1">Security Bitcoin</text>
  
  <!-- Tag Pills -->
  <g>
    <rect x="80" y="410" width="110" height="38" rx="19" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="135" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Blockchain</text>
    
    <rect x="210" y="410" width="100" height="38" rx="19" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.2"/>
    <text x="260" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Security</text>
    
    <rect x="330" y="410" width="90" height="38" rx="19" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="375" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Bitcoin</text>
  </g>
  
  <!-- Footer -->
  <text x="80" y="570" font-family="Arial, sans-serif" font-size="14" fill="#666" font-weight="500">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE -->
  
  <!-- Background accent circles -->
  <circle cx="780" cy="200" r="140" fill="#3b82f6" opacity="0.04"/>
  <circle cx="1050" cy="380" r="120" fill="#ef4444" opacity="0.04"/>
  
  <!-- Chain Links (Blockchain) -->
  <g stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.25">
    <circle cx="710" cy="150" r="18"/>
    <circle cx="710" cy="220" r="18"/>
    <circle cx="710" cy="290" r="18"/>
    <line x1="710" y1="168" x2="710" y2="202"/>
    <line x1="710" y1="238" x2="710" y2="272"/>
  </g>
  
  <!-- Bitcoin/Coin Symbols -->
  <g>
    <!-- Large coin (center-right) -->
    <circle cx="900" cy="200" r="35" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="2.2"/>
    <circle cx="900" cy="200" r="28" fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0.15"/>
    <text x="900" y="210" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#f59e0b" opacity="0.25" text-anchor="middle">฿</text>
    
    <!-- Small coin (top-right) -->
    <circle cx="1000" cy="130" r="20" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="1000" y="137" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" opacity="0.2" text-anchor="middle">฿</text>
  </g>
  
  <!-- Shield with Checkmark (Security/Compliance) -->
  <g>
    <!-- Shield background -->
    <path d="M 820 280 L 820 340 Q 820 400 880 420 Q 940 400 940 340 L 940 280 Z" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2.5"/>
    
    <!-- Checkmark inside shield -->
    <g stroke="#3b82f6" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.28">
      <polyline points="840,340 865,365 915,310"/>
    </g>
  </g>
  
  <!-- Data Flow Arrows -->
  <defs>
    <marker id="arrowhead1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" opacity="0.2"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444" opacity="0.2"/>
    </marker>
  </defs>
  
  <!-- Data flow arrow 1 (blue) -->
  <path d="M 750 180 Q 820 160 880 190" fill="none" stroke="#3b82f6" stroke-width="2.2" opacity="0.18" marker-end="url(#arrowhead1)"/>
  
  <!-- Data flow arrow 2 (red) -->
  <path d="M 920 240 Q 960 280 1000 320" fill="none" stroke="#ef4444" stroke-width="2.2" opacity="0.18" marker-end="url(#arrowhead2)"/>
  
  <!-- Data flow arrow 3 (orange) -->
  <path d="M 780 320 Q 850 340 920 360" fill="none" stroke="#f59e0b" stroke-width="2.2" opacity="0.16" marker-end="url(#arrowhead1)"/>
  
  <!-- Warning Triangles (Alert Indicators) -->
  <g>
    <!-- Top-right warning triangle -->
    <path d="M 1070 120 L 1100 170 L 1040 170 Z" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.8"/>
    <text x="1070" y="158" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ef4444" opacity="0.22" text-anchor="middle">!</text>
    
    <!-- Bottom-left warning triangle -->
    <path d="M 760 420 L 790 470 L 730 470 Z" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.8"/>
    <text x="760" y="458" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#f59e0b" opacity="0.22" text-anchor="middle">!</text>
  </g>
  
  <!-- Network nodes and connections -->
  <g>
    <!-- Left node -->
    <circle cx="730" cy="350" r="14" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Center node -->
    <circle cx="880" cy="380" r="16" fill="#ef4444" opacity="0.11" stroke="#ef4444" stroke-width="2"/>
    
    <!-- Right node -->
    <circle cx="1010" cy="400" r="14" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
    
    <!-- Connection lines -->
    <line x1="744" y1="355" x2="864" y2="375" stroke="#3b82f6" stroke-width="1.5" opacity="0.12"/>
    <line x1="896" y1="385" x2="996" y2="400" stroke="#ef4444" stroke-width="1.5" opacity="0.12"/>
  </g>
  
  <!-- Top accent line -->
  <line x1="680" y1="85" x2="1120" y2="85" stroke="#3b82f6" stroke-width="1" opacity="0.15"/>
  
  <!-- Bottom accent line -->
  <line x1="700" y1="540" x2="1100" y2="540" stroke="#f59e0b" stroke-width="1" opacity="0.12"/>
</svg>