<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0.08" />
    </linearGradient>
    <linearGradient id="btcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:0.06" />
    </linearGradient>
    <linearGradient id="goGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00acd7;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#007d9c;stop-opacity:0.07" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION -->
  <!-- Outer shield shape -->
  <path d="M1010,135 L1130,160 L1130,255 Q1130,315 1010,340 Q890,315 890,255 L890,160 Z"
        fill="url(#shieldGrad)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,158 L1110,178 L1110,255 Q1110,300 1010,318 Q910,300 910,255 L910,178 Z"
        fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>

  <!-- Lock body inside shield -->
  <rect x="985" y="218" width="50" height="38" rx="5"
        fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <!-- Lock shackle -->
  <path d="M995,218 Q995,196 1010,196 Q1025,196 1025,218"
        fill="none" stroke="rgba(59,130,246,0.4)" stroke-width="1.8"/>
  <!-- Lock keyhole -->
  <circle cx="1010" cy="231" r="5" fill="rgba(59,130,246,0.5)"/>
  <rect x="1007" y="231" width="6" height="10" rx="2" fill="rgba(59,130,246,0.5)"/>

  <!-- AI neural nodes (left cluster) -->
  <circle cx="900" cy="165" r="10" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.35)" stroke-width="1.2"/>
  <circle cx="930" cy="148" r="7" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <circle cx="920" cy="182" r="6" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <line x1="900" y1="165" x2="930" y2="148" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <line x1="900" y1="165" x2="920" y2="182" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <line x1="930" y1="148" x2="920" y2="182" stroke="rgba(99,102,241,0.18)" stroke-width="1"/>

  <!-- Bitcoin symbol (top right) -->
  <circle cx="1110" cy="155" r="26" fill="url(#btcGrad)" stroke="rgba(245,158,11,0.35)" stroke-width="1.5"/>
  <text x="1110" y="163" font-size="24" font-weight="700" fill="rgba(245,158,11,0.65)"
        text-anchor="middle" font-family="Arial, sans-serif">₿</text>

  <!-- Go language gopher-inspired circles -->
  <circle cx="888" cy="295" r="22" fill="url(#goGrad)" stroke="rgba(0,172,215,0.3)" stroke-width="1.2"/>
  <circle cx="882" cy="290" r="6" fill="rgba(0,172,215,0.2)" stroke="rgba(0,172,215,0.4)" stroke-width="1"/>
  <circle cx="896" cy="290" r="6" fill="rgba(0,172,215,0.2)" stroke="rgba(0,172,215,0.4)" stroke-width="1"/>
  <circle cx="882" cy="289" r="2.5" fill="rgba(0,172,215,0.6)"/>
  <circle cx="896" cy="289" r="2.5" fill="rgba(0,172,215,0.6)"/>
  <path d="M884,298 Q889,303 894,298" fill="none" stroke="rgba(0,172,215,0.5)" stroke-width="1.2"/>
  <text x="888" y="322" font-size="9" fill="rgba(0,172,215,0.5)" text-anchor="middle"
        font-family="monospace" font-weight="700">GO</text>

  <!-- Scan lines effect on shield -->
  <line x1="890" y1="200" x2="1130" y2="200" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
  <line x1="890" y1="220" x2="1130" y2="220" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>
  <line x1="890" y1="240" x2="1130" y2="240" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
  <line x1="890" y1="260" x2="1130" y2="260" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>

  <!-- Corner bracket decorations -->
  <path d="M875,125 L875,140 L892,140" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <path d="M1145,125 L1145,140 L1128,140" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <path d="M875,335 L875,320 L892,320" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <path d="M1145,335 L1145,320 L1128,320" fill="none" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>

  <!-- AI circuit lines -->
  <path d="M945,155 L960,155 L960,170 L975,170" fill="none" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <path d="M945,175 L952,175 L952,185 L965,185" fill="none" stroke="rgba(99,102,241,0.18)" stroke-width="1"/>
  <circle cx="945" cy="155" r="2.5" fill="rgba(99,102,241,0.4)"/>
  <circle cx="975" cy="170" r="2.5" fill="rgba(99,102,241,0.4)"/>
  <circle cx="945" cy="175" r="2.5" fill="rgba(99,102,241,0.35)"/>
  <circle cx="965" cy="185" r="2.5" fill="rgba(99,102,241,0.35)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="900" cy="420" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="860" cy="440" r="3.5" fill="#3b82f6" opacity="0.6"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4"
        fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="180" y="81" font-size="12" font-weight="600" fill="rgba(239,68,68,0.9)"
        text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="1.5">MARCH 9, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white"
        font-family="Arial, sans-serif">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white"
        font-family="Arial, sans-serif">AI Security Go Bitcoin</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)"
        font-family="Arial, sans-serif">Weekly threat intelligence &amp; security research roundup</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" font-weight="600" fill="rgba(255,255,255,0.4)"
        font-family="Arial, sans-serif" letter-spacing="2">SECURITY / AI / BLOCKCHAIN</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18"
        fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.45)" stroke-width="1"/>
  <text x="140" y="425" font-size="13" font-weight="600" fill="rgba(239,68,68,0.9)"
        text-anchor="middle" font-family="Arial, sans-serif">AI Security</text>

  <rect x="214" y="402" width="110" height="36" rx="18"
        fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.45)" stroke-width="1"/>
  <text x="269" y="425" font-size="13" font-weight="600" fill="rgba(245,158,11,0.9)"
        text-anchor="middle" font-family="Arial, sans-serif">Bitcoin</text>

  <rect x="338" y="402" width="90" height="36" rx="18"
        fill="rgba(0,172,215,0.15)" stroke="rgba(0,172,215,0.45)" stroke-width="1"/>
  <text x="383" y="425" font-size="13" font-weight="600" fill="rgba(0,172,215,0.9)"
        text-anchor="middle" font-family="Arial, sans-serif">Golang</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.3)"
        font-family="Arial, sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,255,255,0.3)"
        text-anchor="end" font-family="Arial, sans-serif">security</text>
</svg>