<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="catGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient circles -->
  <circle cx="100" cy="100" r="200" fill="#a78bfa" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#8b5cf6" fill-opacity="0.05"/>
  <circle cx="600" cy="315" r="300" fill="#8b5cf6" fill-opacity="0.03"/>
  <!-- Top badges -->
  <rect x="40" y="30" width="180" height="36" rx="18" fill="url(#catGradient)" filter="url(#shadow)"/>
  <text x="130" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">DEVSECOPS</text>

  <rect x="980" y="30" width="180" height="36" rx="18" fill="url(#accentGradient)" filter="url(#shadow)"/>
  <text x="1070" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">November 21, 2025</text>
  <!-- Title -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">DEVSECOPS: OT DevSecOps FinOps</text>
  <text x="600" y="145" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">AWS | Cloudflare | DevSecOps | FinOps | ISMS</text>
  <rect x="350" y="160" width="500" height="3" fill="url(#accentGradient)" rx="1.5"/>

  <!-- Section grid -->
  <rect x="90" y="185" width="320" height="100" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <rect x="90" y="185" width="320" height="4" rx="2" fill="#a78bfa"/>
  <circle cx="120" cy="235" r="16" fill="#a78bfa" fill-opacity="0.2"/>
  <text x="120" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa" text-anchor="middle">1</text>
  <text x="148" y="240" font-family="Arial, sans-serif" font-size="15" fill="white">Executive Summary</text>
  <rect x="440" y="185" width="320" height="100" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <rect x="440" y="185" width="320" height="4" rx="2" fill="#a78bfa"/>
  <circle cx="470" cy="235" r="16" fill="#a78bfa" fill-opacity="0.2"/>
  <text x="470" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa" text-anchor="middle">2</text>
  <text x="498" y="240" font-family="Arial, sans-serif" font-size="15" fill="white">Introduction</text>
  <rect x="790" y="185" width="320" height="100" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <rect x="790" y="185" width="320" height="4" rx="2" fill="#a78bfa"/>
  <circle cx="820" cy="235" r="16" fill="#a78bfa" fill-opacity="0.2"/>
  <text x="820" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa" text-anchor="middle">3</text>
  <text x="848" y="240" font-family="Arial, sans-serif" font-size="15" fill="white">Overview</text>
  <rect x="90" y="305" width="320" height="100" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <rect x="90" y="305" width="320" height="4" rx="2" fill="#a78bfa"/>
  <circle cx="120" cy="355" r="16" fill="#a78bfa" fill-opacity="0.2"/>
  <text x="120" y="360" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa" text-anchor="middle">4</text>
  <text x="148" y="360" font-family="Arial, sans-serif" font-size="15" fill="white">Security</text>
  <rect x="440" y="305" width="320" height="100" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <rect x="440" y="305" width="320" height="4" rx="2" fill="#a78bfa"/>
  <circle cx="470" cy="355" r="16" fill="#a78bfa" fill-opacity="0.2"/>
  <text x="470" y="360" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa" text-anchor="middle">5</text>
  <text x="498" y="360" font-family="Arial, sans-serif" font-size="15" fill="white">Korean Impact Analysis</text>
  <rect x="790" y="305" width="320" height="100" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <rect x="790" y="305" width="320" height="4" rx="2" fill="#a78bfa"/>
  <circle cx="820" cy="355" r="16" fill="#a78bfa" fill-opacity="0.2"/>
  <text x="820" y="360" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#a78bfa" text-anchor="middle">6</text>
  <text x="848" y="360" font-family="Arial, sans-serif" font-size="15" fill="white">Practical Implementation</text>

  <!-- Tags -->
  <rect x="90" y="445" width="125" height="26" rx="13" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="152" y="462" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">#Cloud-Security</text>
  <rect x="225" y="445" width="90" height="26" rx="13" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="270" y="462" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">#DevSecOps</text>
  <rect x="325" y="445" width="69" height="26" rx="13" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="359" y="462" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">#FinOps</text>
  <rect x="404" y="445" width="69" height="26" rx="13" fill="#a78bfa" fill-opacity="0.15"/>
  <text x="438" y="462" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">#Course</text>

  <!-- Footer -->
  <line x1="50" y1="565" x2="1150" y2="565" stroke="#334155" stroke-width="1"/>
  <text x="60" y="593" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Twodragon Tech Blog</text>
  <text x="60" y="615" font-family="Arial, sans-serif" font-size="13" fill="#64748b">tech.2twodragon.com</text>
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">DevSecOps | Cloud | Security</text>
</svg>