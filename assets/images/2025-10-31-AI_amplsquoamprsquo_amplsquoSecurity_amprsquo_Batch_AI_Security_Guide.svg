<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#cc0033"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3333" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#cc0033" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="glowRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2222" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 1. Dark gradient background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- 2. Grid lines -->
  <!-- Horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- 3. RIGHT SIDE ILLUSTRATION: AI Secretary with Security Breach visualization -->
  <!-- Outer broken shield (security breach concept) -->
  <path d="M1010,130 L1060,150 L1060,205 Q1060,255 1010,275 Q960,255 960,205 L960,150 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,80,80,0.3)" stroke-width="1.5"/>
  <!-- Shield crack lines -->
  <path d="M1010,145 L1005,185 L1018,200 L1002,270"
        stroke="rgba(255,60,60,0.4)" stroke-width="2" fill="none"/>
  <path d="M1005,185 L990,200"
        stroke="rgba(255,60,60,0.25)" stroke-width="1.5" fill="none"/>
  <!-- Inner shield segment left (intact) -->
  <path d="M970,158 L1002,172 L1002,210 Q1002,238 978,250 Q970,245 964,235 L964,210 Z"
        fill="rgba(255,40,40,0.08)" stroke="rgba(255,100,100,0.2)" stroke-width="1"/>
  <!-- Inner shield segment right (broken) -->
  <path d="M1018,172 L1048,158 L1048,225 Q1048,248 1030,258 L1018,230 Z"
        fill="rgba(255,40,40,0.06)" stroke="rgba(255,80,80,0.15)" stroke-width="1"/>

  <!-- AI Brain/Circuit overlay on top of shield -->
  <!-- Circuit board pattern inside shield -->
  <circle cx="1010" cy="200" r="22" fill="rgba(255,120,0,0.07)" stroke="rgba(255,140,0,0.25)" stroke-width="1.2"/>
  <circle cx="1010" cy="200" r="13" fill="rgba(255,80,0,0.1)" stroke="rgba(255,100,0,0.3)" stroke-width="1"/>
  <line x1="1010" y1="178" x2="1010" y2="165" stroke="rgba(255,120,0,0.3)" stroke-width="1"/>
  <line x1="1032" y1="200" x2="1045" y2="200" stroke="rgba(255,120,0,0.3)" stroke-width="1"/>
  <line x1="1010" y1="222" x2="1010" y2="235" stroke="rgba(255,120,0,0.25)" stroke-width="1"/>
  <line x1="988" y1="200" x2="975" y2="200" stroke="rgba(255,120,0,0.25)" stroke-width="1"/>
  <circle cx="1010" cy="165" r="3" fill="rgba(255,160,0,0.5)"/>
  <circle cx="1045" cy="200" r="3" fill="rgba(255,160,0,0.4)"/>

  <!-- Secretary/AI persona: stylized humanoid bust -->
  <!-- Head -->
  <circle cx="1010" cy="310" r="22" fill="rgba(100,120,255,0.08)" stroke="rgba(120,140,255,0.25)" stroke-width="1.2"/>
  <!-- Neck -->
  <rect x="1005" y="330" width="10" height="12" rx="2"
        fill="rgba(100,120,255,0.07)" stroke="rgba(120,140,255,0.2)" stroke-width="1"/>
  <!-- Shoulders/body -->
  <path d="M975,342 Q985,338 1010,340 Q1035,338 1045,342 L1050,380 L970,380 Z"
        fill="rgba(80,100,220,0.08)" stroke="rgba(100,120,240,0.2)" stroke-width="1"/>
  <!-- Tie/formal wear detail -->
  <path d="M1007,340 L1005,360 L1010,368 L1015,360 L1013,340"
        fill="rgba(255,60,60,0.12)" stroke="rgba(255,80,80,0.3)" stroke-width="0.8"/>
  <!-- Shoulder epaulets (AI/tech stripes) -->
  <rect x="972" y="348" width="18" height="3" rx="1.5" fill="rgba(120,140,255,0.2)"/>
  <rect x="1030" y="348" width="18" height="3" rx="1.5" fill="rgba(120,140,255,0.2)"/>

  <!-- Data leak / breach effect: scattered dots from shield crack -->
  <circle cx="1020" cy="280" r="2.5" fill="rgba(255,80,80,0.5)"/>
  <circle cx="1035" cy="288" r="1.8" fill="rgba(255,100,60,0.4)"/>
  <circle cx="1000" cy="285" r="2" fill="rgba(255,60,80,0.35)"/>
  <circle cx="1025" cy="295" r="1.5" fill="rgba(255,80,80,0.3)"/>
  <circle cx="1045" cy="292" r="2" fill="rgba(255,120,0,0.3)"/>
  <circle cx="992" cy="293" r="1.5" fill="rgba(255,80,80,0.25)"/>

  <!-- Lock icon (broken) -->
  <rect x="1080" y="230" width="36" height="30" rx="4"
        fill="rgba(255,40,40,0.07)" stroke="rgba(255,80,80,0.25)" stroke-width="1.2"/>
  <path d="M1090,230 L1090,220 Q1090,208 1098,208 Q1106,208 1106,220 L1106,230"
        fill="none" stroke="rgba(255,80,80,0.3)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="1098" cy="246" r="5" fill="rgba(255,80,80,0.12)" stroke="rgba(255,100,100,0.3)" stroke-width="1"/>
  <!-- Keyhole crack -->
  <line x1="1098" y1="249" x2="1098" y2="256" stroke="rgba(255,80,80,0.35)" stroke-width="1.5"/>

  <!-- Eye/surveillance icon top right -->
  <ellipse cx="1095" cy="160" rx="24" ry="13"
           fill="rgba(200,40,40,0.07)" stroke="rgba(220,60,60,0.2)" stroke-width="1"/>
  <circle cx="1095" cy="160" r="7" fill="rgba(180,30,30,0.1)" stroke="rgba(220,60,60,0.25)" stroke-width="1"/>
  <circle cx="1095" cy="160" r="3.5" fill="rgba(255,60,60,0.2)"/>
  <!-- Slash through eye -->
  <line x1="1075" y1="148" x2="1115" y2="172" stroke="rgba(255,80,80,0.35)" stroke-width="1.5"/>

  <!-- 4. Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,140,0,0.7)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,60,60,0.7)" filter="url(#glow)"/>

  <!-- 5. Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- 6. Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- 7. Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4"
        fill="rgba(255,40,40,0.12)" stroke="rgba(255,80,80,0.3)" stroke-width="1"/>
  <text x="92" y="81" font-family="'Courier New', monospace" font-size="12"
        fill="rgba(255,140,140,0.9)" letter-spacing="1.5">OCTOBER 31, 2025</text>

  <!-- 8. Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif"
        font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">AI &apos;Secretary&apos; &apos;Security Hole&apos;</text>

  <!-- 9. Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif"
        font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Enterprise AI Service Security</text>

  <!-- 10. Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif"
        font-size="19" fill="rgba(200,200,220,0.75)">Exposed attack surfaces in AI assistant integrations</text>

  <!-- 11. Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- 12. Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace"
        font-size="14" fill="rgba(255,100,100,0.85)" letter-spacing="3"
        text-transform="uppercase">ENTERPRISE SECURITY / AI RISK</text>

  <!-- 13. Three tag pills -->
  <!-- Tag 1: red -->
  <rect x="80" y="402" width="140" height="36" rx="18"
        fill="rgba(200,30,30,0.18)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <text x="150" y="425" font-family="'Arial', sans-serif" font-size="13"
        fill="rgba(255,140,140,0.95)" text-anchor="middle" font-weight="600">AI Security</text>

  <!-- Tag 2: amber -->
  <rect x="236" y="402" width="150" height="36" rx="18"
        fill="rgba(180,100,0,0.18)" stroke="rgba(255,160,0,0.4)" stroke-width="1"/>
  <text x="311" y="425" font-family="'Arial', sans-serif" font-size="13"
        fill="rgba(255,200,80,0.95)" text-anchor="middle" font-weight="600">Data Leakage</text>

  <!-- Tag 3: blue -->
  <rect x="402" y="402" width="166" height="36" rx="18"
        fill="rgba(30,60,180,0.18)" stroke="rgba(80,120,255,0.4)" stroke-width="1"/>
  <text x="485" y="425" font-family="'Arial', sans-serif" font-size="13"
        fill="rgba(120,160,255,0.95)" text-anchor="middle" font-weight="600">Enterprise Risk</text>

  <!-- 14. Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace"
        font-size="13" fill="rgba(180,180,200,0.5)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace"
        font-size="13" fill="rgba(255,100,100,0.45)" text-anchor="end" letter-spacing="1">security</text>
</svg>