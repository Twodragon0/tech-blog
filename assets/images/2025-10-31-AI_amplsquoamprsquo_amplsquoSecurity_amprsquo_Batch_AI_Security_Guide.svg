  <!-- Corner decoration dots -->
  <circle cx="1170" cy="30" r="4" fill="#06b6d4" opacity="0.4"/>
  <circle cx="1185" cy="30" r="2.5" fill="#06b6d4" opacity="0.25"/>
  <circle cx="1155" cy="30" r="2.5" fill="#06b6d4" opacity="0.25"/>
