<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>AI Content Creator Workflow 2026 Blog to Animation</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f0a"/>
      <stop offset="100%" stop-color="#2d1a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e17055"/>
      <stop offset="100%" stop-color="#fd79a8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(225,112,85,0.04)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(253,121,168,0.04)"/>
  <!-- Media icons flow: blog -> video -> music -> animation -->
  <!-- Blog icon -->
  <rect x="840" y="220" width="54" height="66" rx="5" fill="rgba(225,112,85,0.2)" stroke="#e17055" stroke-width="1.5"/>
  <rect x="848" y="232" width="38" height="5" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="848" y="242" width="30" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="848" y="251" width="34" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  <rect x="848" y="260" width="26" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="848" y="269" width="32" height="4" rx="2" fill="rgba(225,112,85,0.5)"/>
  <!-- Arrow 1 -->
  <line x1="898" y1="253" x2="925" y2="253" stroke="rgba(253,121,168,0.6)" stroke-width="2"/>
  <polygon points="925,253 917,248 917,258" fill="rgba(253,121,168,0.6)"/>
  <!-- Video icon -->
  <rect x="930" y="224" width="54" height="58" rx="5" fill="rgba(253,121,168,0.2)" stroke="#fd79a8" stroke-width="1.5"/>
  <!-- Play button -->
  <polygon points="951,244 951,270 975,257" fill="rgba(253,121,168,0.5)" stroke="#fd79a8" stroke-width="1"/>
  <!-- Arrow 2 -->
  <line x1="988" y1="253" x2="1015" y2="253" stroke="rgba(225,112,85,0.6)" stroke-width="2"/>
  <polygon points="1015,253 1007,248 1007,258" fill="rgba(225,112,85,0.6)"/>
  <!-- Music icon -->
  <rect x="1020" y="224" width="54" height="58" rx="5" fill="rgba(225,112,85,0.2)" stroke="#e17055" stroke-width="1.5"/>
  <!-- Music note -->
  <path d="M1040 265 L1040 244 L1060 240 L1060 261" fill="none" stroke="rgba(225,112,85,0.7)" stroke-width="2"/>
  <circle cx="1038" cy="267" r="5" fill="rgba(225,112,85,0.6)"/>
  <circle cx="1058" cy="263" r="5" fill="rgba(225,112,85,0.6)"/>
  <!-- Arrow 3 -->
  <line x1="1078" y1="253" x2="1105" y2="253" stroke="rgba(253,121,168,0.6)" stroke-width="2"/>
  <polygon points="1105,253 1097,248 1097,258" fill="rgba(253,121,168,0.6)"/>
  <!-- Animation icon -->
  <rect x="1110" y="218" width="60" height="70" rx="5" fill="rgba(253,121,168,0.2)" stroke="#fd79a8" stroke-width="1.5"/>
  <!-- Animation frames (layered rectangles) -->
  <rect x="1118" y="226" width="44" height="30" rx="3" fill="rgba(253,121,168,0.15)" stroke="rgba(253,121,168,0.4)" stroke-width="1"/>
  <rect x="1122" y="230" width="36" height="22" rx="2" fill="rgba(253,121,168,0.2)"/>
  <circle cx="1140" cy="241" r="6" fill="rgba(253,121,168,0.6)"/>
  <!-- Film strip lines -->
  <rect x="1118" y="262" width="44" height="18" rx="2" fill="rgba(253,121,168,0.1)" stroke="rgba(253,121,168,0.3)" stroke-width="1"/>
  <line x1="1128" y1="262" x2="1128" y2="280" stroke="rgba(253,121,168,0.3)" stroke-width="1"/>
  <line x1="1138" y1="262" x2="1138" y2="280" stroke="rgba(253,121,168,0.3)" stroke-width="1"/>
  <line x1="1148" y1="262" x2="1148" y2="280" stroke="rgba(253,121,168,0.3)" stroke-width="1"/>
  <!-- Workflow labels -->
  <text x="867" y="302" font-family="system-ui,sans-serif" font-size="12" fill="rgba(225,112,85,0.8)" text-anchor="middle">Blog</text>
  <text x="957" y="302" font-family="system-ui,sans-serif" font-size="12" fill="rgba(253,121,168,0.8)" text-anchor="middle">Video</text>
  <text x="1047" y="302" font-family="system-ui,sans-serif" font-size="12" fill="rgba(225,112,85,0.8)" text-anchor="middle">Music</text>
  <text x="1140" y="302" font-family="system-ui,sans-serif" font-size="12" fill="rgba(253,121,168,0.8)" text-anchor="middle">Anim</text>
  <!-- AI brain icon above flow -->
  <circle cx="1000" cy="175" r="30" fill="rgba(225,112,85,0.15)" stroke="#e17055" stroke-width="1.5"/>
  <path d="M986 175 Q986 165 995 162 Q1005 160 1010 168 Q1015 160 1022 163 Q1028 167 1025 175 Q1028 182 1022 185 Q1015 188 1010 182 Q1005 188 995 186 Q986 183 986 175 Z" fill="rgba(225,112,85,0.4)" stroke="#e17055" stroke-width="1"/>
  <!-- Arrow from brain to flow -->
  <line x1="1000" y1="205" x2="1000" y2="222" stroke="rgba(253,121,168,0.5)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="1000,222 994,213 1006,213" fill="rgba(253,121,168,0.5)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(225,112,85,0.2)" stroke="rgba(225,112,85,0.4)" stroke-width="1"/>
  <text x="190" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">FEBRUARY 5, 2026</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">AI Creator Workflow</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Blog to Animation</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">2026 AI Content Pipeline: Blog, Video, Music, Animation</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category label -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">AI WORKFLOW GUIDE</text>
  <!-- Keyword tags -->
  <rect x="80" y="420" width="120" height="36" rx="18" fill="rgba(225,112,85,0.18)" stroke="rgba(225,112,85,0.4)" stroke-width="1"/>
  <text x="140" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#e17055" text-anchor="middle" font-weight="600">AI Content</text>
  <rect x="218" y="420" width="110" height="36" rx="18" fill="rgba(253,121,168,0.18)" stroke="rgba(253,121,168,0.4)" stroke-width="1"/>
  <text x="273" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#fd79a8" text-anchor="middle" font-weight="600">Workflow</text>
  <rect x="346" y="420" width="100" height="36" rx="18" fill="rgba(225,112,85,0.18)" stroke="rgba(225,112,85,0.4)" stroke-width="1"/>
  <text x="396" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#e17055" text-anchor="middle" font-weight="600">Creator</text>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
