<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="50%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e53e3e;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Content Creator Workflow -->
  <!-- Central AI Brain node -->
  <circle cx="1010" cy="225" r="55" fill="url(#nodeGrad)" stroke="rgba(147,51,234,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="42" fill="rgba(147,51,234,0.08)" stroke="rgba(147,51,234,0.2)" stroke-width="1"/>
  <!-- Brain circuit lines -->
  <path d="M985 210 Q995 205 1010 208 Q1025 205 1035 210" fill="none" stroke="rgba(147,51,234,0.4)" stroke-width="1.5"/>
  <path d="M982 225 Q990 220 1010 222 Q1030 220 1038 225" fill="none" stroke="rgba(147,51,234,0.4)" stroke-width="1.5"/>
  <path d="M985 240 Q995 245 1010 242 Q1025 245 1035 240" fill="none" stroke="rgba(147,51,234,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="8" fill="rgba(147,51,234,0.5)" stroke="rgba(147,51,234,0.8)" stroke-width="1" filter="url(#glow)"/>

  <!-- Blog node (top-left satellite) -->
  <circle cx="910" cy="155" r="32" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <rect x="896" y="144" width="28" height="22" rx="3" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <line x1="900" y1="150" x2="920" y2="150" stroke="rgba(59,130,246,0.5)" stroke-width="1.2"/>
  <line x1="900" y1="155" x2="916" y2="155" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <line x1="900" y1="160" x2="918" y2="160" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <!-- Connector blog to brain -->
  <line x1="938" y1="168" x2="978" y2="205" stroke="rgba(147,51,234,0.25)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Video node (top-right satellite) -->
  <circle cx="1110" cy="155" r="32" fill="rgba(229,62,62,0.1)" stroke="rgba(229,62,62,0.3)" stroke-width="1.5"/>
  <rect x="1094" y="143" width="26" height="20" rx="3" fill="rgba(229,62,62,0.12)" stroke="rgba(229,62,62,0.35)" stroke-width="1"/>
  <polygon points="1123,153 1130,157 1123,161" fill="rgba(229,62,62,0.5)" stroke="rgba(229,62,62,0.7)" stroke-width="0.8"/>
  <!-- Connector video to brain -->
  <line x1="1083" y1="168" x2="1043" y2="205" stroke="rgba(147,51,234,0.25)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Music node (bottom satellite) -->
  <circle cx="1010" cy="308" r="32" fill="rgba(234,179,8,0.08)" stroke="rgba(234,179,8,0.3)" stroke-width="1.5"/>
  <!-- Music wave icon -->
  <path d="M992 308 Q996 300 1000 308 Q1004 316 1008 308 Q1012 300 1016 308 Q1020 316 1024 308 Q1028 300 1032 308" fill="none" stroke="rgba(234,179,8,0.5)" stroke-width="1.5"/>
  <!-- Connector music to brain -->
  <line x1="1010" y1="278" x2="1010" y2="270" stroke="rgba(147,51,234,0.25)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Workflow node (left satellite) -->
  <circle cx="920" cy="225" r="28" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.28)" stroke-width="1.5"/>
  <rect x="909" y="215" width="22" height="20" rx="2" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.35)" stroke-width="1"/>
  <line x1="912" y1="221" x2="928" y2="221" stroke="rgba(16,185,129,0.5)" stroke-width="1"/>
  <line x1="912" y1="226" x2="928" y2="226" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
  <line x1="912" y1="231" x2="924" y2="231" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
  <!-- Connector workflow to brain -->
  <line x1="948" y1="225" x2="963" y2="225" stroke="rgba(147,51,234,0.25)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 2026 floating label -->
  <rect x="1083" y="218" width="68" height="22" rx="4" fill="rgba(147,51,234,0.12)" stroke="rgba(147,51,234,0.3)" stroke-width="1"/>
  <text x="1117" y="233" font-family="monospace" font-size="11" fill="rgba(147,51,234,0.8)" text-anchor="middle">2026</text>

  <!-- Data flow particles -->
  <circle cx="960" cy="195" r="2.5" fill="rgba(147,51,234,0.6)"/>
  <circle cx="970" cy="188" r="2" fill="rgba(59,130,246,0.5)"/>
  <circle cx="1055" cy="195" r="2.5" fill="rgba(229,62,62,0.6)"/>
  <circle cx="1045" cy="188" r="2" fill="rgba(229,62,62,0.4)"/>
  <circle cx="1010" cy="263" r="2.5" fill="rgba(234,179,8,0.6)"/>
  <circle cx="945" cy="248" r="2" fill="rgba(16,185,129,0.5)"/>

  <!-- Outer ring decoration -->
  <circle cx="1010" cy="225" r="88" fill="none" stroke="rgba(147,51,234,0.07)" stroke-width="1" stroke-dasharray="6,6"/>
  <circle cx="1010" cy="225" r="110" fill="none" stroke="rgba(147,51,234,0.05)" stroke-width="1" stroke-dasharray="3,9"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(234,179,8,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(59,130,246,0.7)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(147,51,234,0.03)" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.3)" stroke-width="1"/>
  <text x="190" y="81" font-family="'Courier New', monospace" font-size="12" fill="rgba(229,62,62,0.9)" text-anchor="middle" letter-spacing="1">FEBRUARY 5, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">AI Content Creator Workflow</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">2026 Blog Video Music</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">AI-Powered Multi-Format Content Creation Automation</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" fill="rgba(147,51,234,0.8)" letter-spacing="3">CATEGORY: AI / AUTOMATION</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="140" y="425" font-family="'Arial', sans-serif" font-size="13" fill="rgba(229,62,62,0.9)" text-anchor="middle" font-weight="600">AI Workflow</text>

  <rect x="214" y="402" width="110" height="36" rx="18" fill="rgba(234,179,8,0.12)" stroke="rgba(234,179,8,0.35)" stroke-width="1"/>
  <text x="269" y="425" font-family="'Arial', sans-serif" font-size="13" fill="rgba(234,179,8,0.9)" text-anchor="middle" font-weight="600">Content</text>

  <rect x="338" y="402" width="110" height="36" rx="18" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.35)" stroke-width="1"/>
  <text x="393" y="425" font-family="'Arial', sans-serif" font-size="13" fill="rgba(59,130,246,0.9)" text-anchor="middle" font-weight="600">2026</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.3)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(147,51,234,0.5)" text-anchor="end">AI</text>
</svg>