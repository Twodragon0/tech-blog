<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4466;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#aa22ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2244ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4466;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#aa22ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="dateBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4466;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#aa22ff;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4466;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#aa22ff;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid: horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid: vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Content Creator Workflow -->
  <!-- Central brain/AI node -->
  <circle cx="1010" cy="225" r="62" fill="rgba(170,34,255,0.08)" stroke="rgba(170,34,255,0.30)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="44" fill="rgba(170,34,255,0.10)" stroke="rgba(170,34,255,0.25)" stroke-width="1"/>
  <circle cx="1010" cy="225" r="26" fill="rgba(170,34,255,0.13)" stroke="rgba(255,68,102,0.35)" stroke-width="1.5"/>

  <!-- AI label inside brain -->
  <text x="1010" y="231" font-family="monospace" font-size="14" font-weight="700" fill="rgba(255,255,255,0.45)" text-anchor="middle">AI</text>

  <!-- Blog node (top-left of illustration) -->
  <rect x="888" y="145" width="62" height="46" rx="6" fill="rgba(255,68,102,0.08)" stroke="rgba(255,68,102,0.30)" stroke-width="1.2"/>
  <line x1="898" y1="158" x2="940" y2="158" stroke="rgba(255,68,102,0.35)" stroke-width="1.5"/>
  <line x1="898" y1="167" x2="930" y2="167" stroke="rgba(255,68,102,0.25)" stroke-width="1"/>
  <line x1="898" y1="176" x2="935" y2="176" stroke="rgba(255,68,102,0.20)" stroke-width="1"/>
  <text x="919" y="195" font-family="monospace" font-size="9" fill="rgba(255,68,102,0.55)" text-anchor="middle">BLOG</text>

  <!-- Video node (top-right) -->
  <rect x="1058" y="145" width="64" height="46" rx="6" fill="rgba(34,170,255,0.08)" stroke="rgba(34,170,255,0.30)" stroke-width="1.2"/>
  <polygon points="1075,155 1075,183 1108,169" fill="rgba(34,170,255,0.25)" stroke="rgba(34,170,255,0.40)" stroke-width="1"/>
  <text x="1090" y="200" font-family="monospace" font-size="9" fill="rgba(34,170,255,0.55)" text-anchor="middle">VIDEO</text>

  <!-- Music node (bottom) -->
  <rect x="973" y="295" width="74" height="46" rx="6" fill="rgba(255,200,34,0.07)" stroke="rgba(255,200,34,0.28)" stroke-width="1.2"/>
  <!-- Music note shape -->
  <line x1="995" y1="308" x2="995" y2="328" stroke="rgba(255,200,34,0.50)" stroke-width="2"/>
  <line x1="1008" y1="305" x2="1008" y2="325" stroke="rgba(255,200,34,0.50)" stroke-width="2"/>
  <line x1="995" y1="308" x2="1008" y2="305" stroke="rgba(255,200,34,0.50)" stroke-width="1.5"/>
  <ellipse cx="993" cy="329" rx="5" ry="3.5" fill="rgba(255,200,34,0.40)"/>
  <ellipse cx="1006" cy="326" rx="5" ry="3.5" fill="rgba(255,200,34,0.40)"/>
  <text x="1010" y="353" font-family="monospace" font-size="9" fill="rgba(255,200,34,0.55)" text-anchor="middle">MUSIC</text>

  <!-- Workflow arrows / connectors -->
  <!-- Brain to Blog -->
  <line x1="966" y1="200" x2="950" y2="180" stroke="rgba(255,68,102,0.22)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <!-- Brain to Video -->
  <line x1="1054" y1="200" x2="1074" y2="178" stroke="rgba(34,170,255,0.22)" stroke-width="1.2" stroke-dasharray="4,3"/>
  <!-- Brain to Music -->
  <line x1="1010" y1="287" x2="1010" y2="295" stroke="rgba(255,200,34,0.22)" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Workflow ring (orbit) -->
  <circle cx="1010" cy="225" r="90" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="6,8"/>

  <!-- Sparkle dots (workflow nodes on orbit) -->
  <circle cx="1010" cy="135" r="4" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.30)" stroke-width="1"/>
  <circle cx="1100" cy="225" r="4" fill="rgba(34,170,255,0.35)" stroke="rgba(34,170,255,0.50)" stroke-width="1"/>
  <circle cx="920" cy="225" r="4" fill="rgba(255,68,102,0.35)" stroke="rgba(255,68,102,0.50)" stroke-width="1"/>
  <circle cx="1010" cy="315" r="4" fill="rgba(255,200,34,0.35)" stroke="rgba(255,200,34,0.50)" stroke-width="1"/>

  <!-- Small connecting data particles -->
  <circle cx="945" cy="158" r="2.5" fill="rgba(255,68,102,0.40)"/>
  <circle cx="975" cy="143" r="2" fill="rgba(170,34,255,0.35)"/>
  <circle cx="1055" cy="155" r="2.5" fill="rgba(34,170,255,0.40)"/>
  <circle cx="1038" cy="142" r="2" fill="rgba(170,34,255,0.35)"/>

  <!-- 2026 text watermark in illustration area -->
  <text x="1010" y="265" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.12)" text-anchor="middle" font-weight="700">2026</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,68,102,0.70)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(170,34,255,0.65)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(255,200,34,0.60)"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(170,34,255,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,68,102,0.05)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4" fill="url(#dateBadge)" stroke="rgba(255,68,102,0.25)" stroke-width="1"/>
  <text x="93" y="81" font-family="'Courier New',monospace" font-size="12" font-weight="600" fill="rgba(255,180,190,0.85)" letter-spacing="1">FEBRUARY 5, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white">AI Content Creator Workflow</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white">2026 Blog Video Music</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(200,180,220,0.80)">Automated pipelines for modern digital content production</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New',monospace" font-size="14" fill="rgba(170,34,255,0.80)" letter-spacing="3" font-weight="600">ARTIFICIAL INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(255,68,102,0.18)" stroke="rgba(255,68,102,0.40)" stroke-width="1"/>
  <text x="135" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,140,160,0.95)" text-anchor="middle">AI Workflow</text>

  <rect x="204" y="402" width="108" height="36" rx="18" fill="rgba(255,180,30,0.15)" stroke="rgba(255,180,30,0.38)" stroke-width="1"/>
  <text x="258" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,210,100,0.95)" text-anchor="middle">Content Gen</text>

  <rect x="326" y="402" width="98" height="36" rx="18" fill="rgba(34,130,255,0.15)" stroke="rgba(34,130,255,0.38)" stroke-width="1"/>
  <text x="375" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(120,190,255,0.95)" text-anchor="middle">Automation</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(170,34,255,0.50)" text-anchor="end" letter-spacing="1">AI</text>
</svg>