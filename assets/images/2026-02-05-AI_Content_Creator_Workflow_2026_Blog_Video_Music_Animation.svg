<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>AI Content Creator Workflow 2026 Blog Video Music Animation</title>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Gradient defs for illustration -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <!-- ILLUSTRATION SECTION (Right side, x=700-1150) -->
  <!-- Layer 1: Video Camera Base -->
  <g id="camera">
    <rect x="750" y="320" width="140" height="100" rx="8" fill="url(#grad1)" opacity="0.9"/>
    <circle cx="820" cy="370" r="35" fill="#1e40af" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="820" cy="370" r="28" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Layer 2: Screen/Monitor elements floating -->
  <g id="screens">
    <!-- Screen 1 -->
    <rect x="920" y="280" width="90" height="60" rx="4" fill="url(#grad2)" opacity="0.85" transform="rotate(-15 965 310)"/>
    <line x1="930" y1="295" x2="955" y2="295" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    <line x1="930" y1="305" x2="955" y2="305" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Screen 2 -->
    <rect x="920" y="370" width="90" height="60" rx="4" fill="url(#grad3)" opacity="0.85" transform="rotate(12 965 400)"/>
    <circle cx="945" cy="390" r="8" fill="#ffffff" opacity="0.6"/>
    <circle cx="955" cy="398" r="6" fill="#ffffff" opacity="0.5"/>
  </g>
  
  <!-- Layer 3: Workflow arrows/paths -->
  <g id="workflow" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.7">
    <!-- Arrow path 1: Camera to Screen 1 -->
    <path d="M 890 360 Q 910 320 920 290" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Arrow path 2: Screen 1 to Screen 2 -->
    <path d="M 950 340 Q 980 360 950 370" stroke="#10b981" stroke-width="2"/>
    <!-- Dotted line: workflow indicator -->
    <path d="M 880 400 Q 920 420 960 410" stroke="#3b82f6" stroke-dasharray="4,4" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ec4899"/>
    </marker>
  </defs>
  
  <!-- Layer 4: Circular process indicators -->
  <g id="indicators">
    <!-- Circle 1: Record -->
    <circle cx="760" cy="280" r="18" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8"/>
    <circle cx="760" cy="280" r="8" fill="#3b82f6" opacity="0.7"/>
    <text x="760" y="284" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.6">REC</text>
    
    <!-- Circle 2: Edit -->
    <circle cx="1020" cy="340" r="18" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.8"/>
    <path d="M 1015 335 L 1025 345" stroke="#ec4899" stroke-width="2" opacity="0.7"/>
    
    <!-- Circle 3: Publish -->
    <circle cx="1010" cy="460" r="18" fill="none" stroke="#10b981" stroke-width="2" opacity="0.8"/>
    <path d="M 1003 460 L 1010 467 L 1017 453" stroke="#10b981" stroke-width="2" fill="none" opacity="0.7"/>
  </g>
  
  <!-- Layer 5: Floating elements (editing tools) -->
  <g id="tools" opacity="0.6">
    <!-- Play button icon -->
    <polygon points="800,500 815,510 800,520" fill="#3b82f6" opacity="0.7"/>
    <!-- Volume bars -->
    <rect x="830" y="505" width="3" height="8" fill="#ec4899"/>
    <rect x="837" y="500" width="3" height="13" fill="#ec4899"/>
    <rect x="844" y="508" width="3" height="5" fill="#ec4899"/>
  </g>
  
  <!-- LEFT SIDE: Text Content -->
  <!-- Title -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff">Content Creator</text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff">Workflow 2026</text>
  
  <!-- Date badge -->
  <g id="date-badge">
    <rect x="60" y="290" width="280" height="38" rx="6" fill="#1e40af" opacity="0.6" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="70" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6">FEBRUARY 5, 2026</text>
  </g>
  
  <!-- Tag pills -->
  <g id="tags">
    <!-- Tag 1 -->
    <rect x="60" y="410" width="95" height="32" rx="16" fill="#3b82f6" opacity="0.5" stroke="#3b82f6" stroke-width="1"/>
    <text x="107" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">Content</text>
    
    <!-- Tag 2 -->
    <rect x="175" y="410" width="75" height="32" rx="16" fill="#ec4899" opacity="0.5" stroke="#ec4899" stroke-width="1"/>
    <text x="212" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">Video</text>
    
    <!-- Tag 3 -->
    <rect x="270" y="410" width="70" height="32" rx="16" fill="#10b981" opacity="0.5" stroke="#10b981" stroke-width="1"/>
    <text x="305" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">2026</text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="600" font-family="Arial, sans-serif" font-size="13" fill="#64748b">tech.2twodragon.com</text>
  
  <!-- Decorative line separator -->
  <line x1="60" y1="270" x2="340" y2="270" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
</svg>