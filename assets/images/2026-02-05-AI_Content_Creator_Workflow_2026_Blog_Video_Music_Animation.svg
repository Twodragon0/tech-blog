<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="40%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="33%" style="stop-color:#8b5cf6"/>
      <stop offset="66%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a5b4fc"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid Pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Background Decorative Circles -->
  <circle cx="1100" cy="80" r="200" fill="#6366f1" opacity="0.03"/>
  <circle cx="80" cy="550" r="150" fill="#6366f1" opacity="0.02"/>

  <!-- Category Badge (top-left) -->
  <rect x="40" y="30" width="140" height="36" rx="18" fill="url(#catGrad)" opacity="0.9"/>
  <text x="110" y="54" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">TECH BLOG</text>

  <!-- Date Badge (top-right) -->
  <rect x="1010" y="30" width="150" height="36" rx="18" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="1085" y="54" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#64748b" text-anchor="middle">February 5, 2026</text>

  <!-- Main Title -->
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0f172a" text-anchor="middle">AI Content Creator Workflow 2026 Blog Video</text>

  <!-- Accent Gradient Bar -->
  <rect x="400" y="158" width="400" height="4" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="600" y="190" font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">DevSecOps Weekly Intelligence Report</text>

  <!-- Left Side: Icon Column -->
  <g filter="url(#iconShadow)">
    <g opacity="0.9">
    <g transform="translate(120,280)"><circle cx="0" cy="0" r="12" fill="none" stroke="#6366f1" stroke-width="2"/><circle cx="0" cy="0" r="4" fill="#6366f1"/><line x1="-18" y1="-10" x2="-12" y2="-6" stroke="#6366f1" stroke-width="1.5"/><line x1="18" y1="-10" x2="12" y2="-6" stroke="#6366f1" stroke-width="1.5"/><line x1="0" y1="12" x2="0" y2="22" stroke="#6366f1" stroke-width="1.5"/></g>
    <g transform="translate(120,360)"><rect x="-14" y="-10" width="28" height="20" rx="4" fill="none" stroke="#6366f1" stroke-width="2"/><line x1="-8" y1="-3" x2="8" y2="-3" stroke="#6366f1" stroke-width="1.5"/><line x1="-8" y1="3" x2="4" y2="3" stroke="#6366f1" stroke-width="1.5"/></g>
    <g transform="translate(120,440)"><path d="M-10,-16 C-10,-16 0,-8 0,0 C0,8 -10,16 -10,16" fill="none" stroke="#6366f1" stroke-width="2"/><path d="M10,-16 C10,-16 0,-8 0,0 C0,8 10,16 10,16" fill="none" stroke="#6366f1" stroke-width="2"/><circle cx="0" cy="0" r="3" fill="#6366f1"/></g>
    </g>
  </g>

  <!-- Icon labels -->
  <text x="120" y="315" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">DETECT</text>
  <text x="120" y="395" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">PROTECT</text>
  <text x="120" y="475" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">RESPOND</text>

  <!-- Hero Card -->
  <rect x="200" y="230" width="800" height="230" rx="16" fill="url(#cardBg)" filter="url(#shadow)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Card Top Border (category color) -->
  <rect x="200" y="230" width="800" height="6" rx="3" fill="#6366f1" opacity="0.8"/>
  <rect x="200" y="233" width="800" height="3" fill="url(#cardBg)"/>

  <!-- Card Content -->
  <text x="240" y="275" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Architecture Snapshot</text>
  <line x1="240" y1="290" x2="960" y2="290" stroke="#e2e8f0" stroke-width="1"/>

  <text x="260" y="320" font-family="Arial, sans-serif" font-size="14" fill="#475569">Threat Analysis</text>
  <rect x="240" y="305" width="4" height="18" rx="2" fill="#6366f1"/>

  <text x="260" y="355" font-family="Arial, sans-serif" font-size="14" fill="#475569">Risk Assessment and Mitigation Strategy</text>
  <rect x="240" y="340" width="4" height="18" rx="2" fill="#6366f1" opacity="0.6"/>

  <text x="260" y="390" font-family="Arial, sans-serif" font-size="14" fill="#475569">Operational Security Recommendations</text>
  <rect x="240" y="375" width="4" height="18" rx="2" fill="#6366f1" opacity="0.4"/>

  <!-- Card CTA -->
  <rect x="830" y="405" width="140" height="36" rx="18" fill="#6366f1" opacity="0.1"/>
  <text x="900" y="428" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#6366f1" text-anchor="middle">View Post</text>

  <!-- Topic Tags -->
    <rect x="320" y="480" width="40" height="28" rx="14" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="340" y="499" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">AI</text>

  <!-- Footer -->
  <line x1="40" y1="585" x2="1160" y2="585" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1160" y="610" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="end">tech.2twodragon.com</text>
  <text x="40" y="610" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Twodragon DevSecOps Blog</text>
</svg>