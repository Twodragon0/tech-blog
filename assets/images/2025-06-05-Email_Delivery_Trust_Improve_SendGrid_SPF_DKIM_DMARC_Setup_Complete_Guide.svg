<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Email Trust Setup - SendGrid SPF DKIM DMARC Guide</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#151a30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- Email envelope -->
  <rect x="860" y="195" width="180" height="130" rx="8" fill="none" stroke="rgba(52,152,219,0.65)" stroke-width="3"/>
  <!-- Envelope flap V -->
  <path d="M860 195 L950 260 L1040 195" fill="none" stroke="rgba(52,152,219,0.65)" stroke-width="3"/>
  <!-- Bottom corners -->
  <line x1="860" y1="325" x2="910" y2="278" stroke="rgba(52,152,219,0.4)" stroke-width="2"/>
  <line x1="1040" y1="325" x2="990" y2="278" stroke="rgba(52,152,219,0.4)" stroke-width="2"/>
  <!-- Shield on envelope -->
  <path d="M920 225 L950 233 L950 258 Q950 275 920 285 Q890 275 890 258 L890 233 Z" fill="none" stroke="rgba(39,174,96,0.75)" stroke-width="2.5"/>
  <path d="M906 252 L918 264 L946 238" fill="none" stroke="rgba(39,174,96,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- DNS record badges -->
  <rect x="1055" y="195" width="80" height="28" rx="14" fill="rgba(52,152,219,0.2)" stroke="rgba(52,152,219,0.5)" stroke-width="1.5"/>
  <text x="1095" y="213" font-family="monospace" font-size="12" font-weight="700" fill="rgba(52,152,219,0.9)" text-anchor="middle">SPF</text>
  <rect x="1055" y="235" width="80" height="28" rx="14" fill="rgba(39,174,96,0.2)" stroke="rgba(39,174,96,0.5)" stroke-width="1.5"/>
  <text x="1095" y="253" font-family="monospace" font-size="12" font-weight="700" fill="rgba(39,174,96,0.9)" text-anchor="middle">DKIM</text>
  <rect x="1055" y="275" width="80" height="28" rx="14" fill="rgba(155,89,182,0.2)" stroke="rgba(155,89,182,0.5)" stroke-width="1.5"/>
  <text x="1095" y="293" font-family="monospace" font-size="12" font-weight="700" fill="rgba(155,89,182,0.9)" text-anchor="middle">DMARC</text>
  <!-- Connection line from envelope to DNS -->
  <line x1="1040" y1="260" x2="1055" y2="260" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- SendGrid logo placeholder -->
  <rect x="870" y="365" width="160" height="38" rx="6" fill="rgba(52,152,219,0.1)" stroke="rgba(52,152,219,0.3)" stroke-width="1"/>
  <text x="950" y="389" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="rgba(52,152,219,0.75)" text-anchor="middle">SendGrid</text>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="190" height="32" rx="4" fill="rgba(52,152,219,0.2)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <text x="175" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">JUNE 5, 2025</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Email Trust Setup</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="-1">SPF, DKIM and DMARC</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">SendGrid Complete Email Authentication Guide</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">EMAIL SECURITY GUIDE</text>
  <!-- Tags -->
  <rect x="80" y="420" width="110" height="36" rx="18" fill="rgba(52,152,219,0.18)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <text x="135" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#3498db" text-anchor="middle" font-weight="600">SendGrid</text>
  <rect x="206" y="420" width="115" height="36" rx="18" fill="rgba(39,174,96,0.18)" stroke="rgba(39,174,96,0.4)" stroke-width="1"/>
  <text x="263" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#27ae60" text-anchor="middle" font-weight="600">SPF/DKIM</text>
  <rect x="337" y="420" width="100" height="36" rx="18" fill="rgba(155,89,182,0.15)" stroke="rgba(155,89,182,0.35)" stroke-width="1"/>
  <text x="387" y="443" font-family="system-ui,sans-serif" font-size="14" fill="rgba(155,89,182,0.9)" text-anchor="middle" font-weight="600">DMARC</text>
  <!-- Bottom -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
