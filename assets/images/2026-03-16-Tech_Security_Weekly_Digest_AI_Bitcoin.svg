<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ef4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="dateBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(239,68,68,0.05)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI + Bitcoin + Shield hybrid icon -->
  <!-- Outer hexagon shield (security) -->
  <polygon points="1010,138 1070,162 1090,220 1060,278 1000,298 940,274 920,216 950,158" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.3)" stroke-width="1.5"/>
  <!-- Inner hexagon -->
  <polygon points="1010,158 1056,176 1072,220 1048,264 1002,278 956,260 940,216 964,172" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>

  <!-- Bitcoin symbol inside shield -->
  <circle cx="1005" cy="220" r="38" fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.35)" stroke-width="1.5"/>
  <!-- Bitcoin B shape (paths) -->
  <path d="M993,202 L993,238 M993,202 L1007,202 Q1016,202 1016,210 Q1016,218 1007,218 L993,218 M993,218 L1010,218 Q1020,218 1020,227 Q1020,238 1010,238 L993,238" fill="none" stroke="rgba(245,158,11,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="988" y1="198" x2="988" y2="242" stroke="rgba(245,158,11,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="1000" y1="196" x2="1000" y2="200" stroke="rgba(245,158,11,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="1000" y1="240" x2="1000" y2="244" stroke="rgba(245,158,11,0.5)" stroke-width="2" stroke-linecap="round"/>

  <!-- AI neural network nodes around the shield -->
  <circle cx="880" cy="165" r="10" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.4)" stroke-width="1.5"/>
  <circle cx="920" cy="130" r="7" fill="rgba(139,92,246,0.10)" stroke="rgba(139,92,246,0.35)" stroke-width="1"/>
  <circle cx="1090" cy="155" r="9" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <circle cx="1130" cy="190" r="6" fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <circle cx="895" cy="290" r="8" fill="rgba(16,185,129,0.10)" stroke="rgba(16,185,129,0.35)" stroke-width="1.5"/>
  <circle cx="860" cy="255" r="5" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <circle cx="1115" cy="280" r="9" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.35)" stroke-width="1.5"/>
  <circle cx="1140" cy="240" r="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>

  <!-- Neural network edges -->
  <line x1="880" y1="165" x2="920" y2="158" stroke="rgba(139,92,246,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="920" y1="130" x2="950" y2="158" stroke="rgba(139,92,246,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="880" y1="165" x2="920" y2="216" stroke="rgba(139,92,246,0.15)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="1090" y1="155" x2="1070" y2="162" stroke="rgba(59,130,246,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1130" y1="190" x2="1090" y2="216" stroke="rgba(59,130,246,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="895" y1="290" x2="920" y2="274" stroke="rgba(16,185,129,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="860" y1="255" x2="895" y2="290" stroke="rgba(16,185,129,0.15)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="1115" y1="280" x2="1060" y2="278" stroke="rgba(239,68,68,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1140" y1="240" x2="1090" y2="216" stroke="rgba(239,68,68,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Small circuit traces -->
  <rect x="870" y="310" width="40" height="2" rx="1" fill="rgba(245,158,11,0.15)"/>
  <rect x="910" y="306" width="2" height="10" rx="1" fill="rgba(245,158,11,0.15)"/>
  <rect x="1095" y="310" width="40" height="2" rx="1" fill="rgba(59,130,246,0.15)"/>
  <rect x="1095" y="302" width="2" height="12" rx="1" fill="rgba(59,130,246,0.15)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(239,68,68,0.6)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(245,158,11,0.6)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(139,92,246,0.6)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4" fill="url(#dateBadge)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="96" y="81" font-family="'Courier New', monospace" font-size="13" font-weight="600" fill="rgba(245,158,11,0.9)" letter-spacing="1.5">MARCH 16, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="rgba(245,158,11,0.95)" letter-spacing="-0.5">Digest AI Bitcoin</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">Security · Artificial Intelligence · Cryptocurrency</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(245,158,11,0.7)" letter-spacing="3">SECURITY / AI / BLOCKCHAIN</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(239,68,68,0.18)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(239,68,68,0.9)" text-anchor="middle" letter-spacing="0.5">THREAT INTEL</text>

  <rect x="224" y="402" width="120" height="36" rx="18" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="284" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(245,158,11,0.9)" text-anchor="middle" letter-spacing="0.5">BITCOIN</text>

  <rect x="358" y="402" width="100" height="36" rx="18" fill="rgba(59,130,246,0.18)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="408" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(59,130,246,0.9)" text-anchor="middle" letter-spacing="0.5">AI SEC</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>