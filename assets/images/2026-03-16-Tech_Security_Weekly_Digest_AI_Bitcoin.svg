<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg1g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E2038"/>
      <stop offset="100%" stop-color="#12283F"/>
    </linearGradient>
    <linearGradient id="bg2g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#12283F"/>
      <stop offset="100%" stop-color="#0E2038"/>
    </linearGradient>
    <linearGradient id="bg3g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E2038"/>
      <stop offset="100%" stop-color="#12283F"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0E2038" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="ledgerGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#4ADE80" stroke-width="0.3" stroke-opacity="0.12"/>
    </pattern>
    <pattern id="circuitDot" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.2" fill="#4ADE80" fill-opacity="0.15"/>
    </pattern>
    <clipPath id="band1clip"><rect x="0" y="0" width="1200" height="210"/></clipPath>
    <clipPath id="band2clip"><rect x="0" y="210" width="1200" height="210"/></clipPath>
    <clipPath id="band3clip"><rect x="0" y="420" width="1200" height="210"/></clipPath>
  </defs>

  <!-- Band 1 -->
  <rect x="0" y="0" width="1200" height="210" fill="url(#bg1g)"/>
  <rect x="0" y="0" width="1200" height="210" fill="url(#ledgerGrid)"/>
  <rect x="0" y="0" width="1200" height="210" fill="url(#glowCenter)" opacity="0.6"/>
