<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="btcGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(239,68,68,0.05)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Bitcoin + AI + Security Shield -->
  <!-- Outer hexagonal shield -->
  <polygon points="1010,135 1090,178 1090,264 1010,307 930,264 930,178" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.3)" stroke-width="1.5"/>
  <!-- Inner hexagonal shield -->
  <polygon points="1010,155 1075,191 1075,261 1010,297 945,261 945,191" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>

  <!-- Bitcoin symbol in center -->
  <!-- B letter paths for Bitcoin -->
  <circle cx="1010" cy="224" r="42" fill="url(#btcGlow)" stroke="rgba(245,158,11,0.35)" stroke-width="2"/>
  <circle cx="1010" cy="224" r="32" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <!-- Bitcoin B -->
  <text x="998" y="236" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="rgba(245,158,11,0.7)" filter="url(#glow)">B</text>
  <!-- Bitcoin tick marks -->
  <line x1="1005" y1="202" x2="1005" y2="196" stroke="rgba(245,158,11,0.6)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1015" y1="202" x2="1015" y2="196" stroke="rgba(245,158,11,0.6)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1005" y1="252" x2="1005" y2="246" stroke="rgba(245,158,11,0.6)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1015" y1="252" x2="1015" y2="246" stroke="rgba(245,158,11,0.6)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- AI neural nodes around the shield -->
  <circle cx="880" cy="155" r="12" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
  <circle cx="1140" cy="155" r="12" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
  <circle cx="880" cy="295" r="12" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
  <circle cx="1140" cy="295" r="12" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
  <circle cx="885" cy="225" r="8" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <circle cx="1135" cy="225" r="8" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <circle cx="1010" cy="130" r="8" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <circle cx="1010" cy="320" r="8" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>

  <!-- Neural connection lines -->
  <line x1="880" y1="155" x2="930" y2="178" stroke="rgba(99,102,241,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1140" y1="155" x2="1090" y2="178" stroke="rgba(99,102,241,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="880" y1="295" x2="930" y2="264" stroke="rgba(99,102,241,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1140" y1="295" x2="1090" y2="264" stroke="rgba(99,102,241,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="885" y1="225" x2="930" y2="221" stroke="rgba(99,102,241,0.15)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="1135" y1="225" x2="1090" y2="221" stroke="rgba(99,102,241,0.15)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="1010" y1="130" x2="1010" y2="155" stroke="rgba(99,102,241,0.15)" stroke-width="1" stroke-dasharray="2,4"/>
  <line x1="1010" y1="320" x2="1010" y2="297" stroke="rgba(99,102,241,0.15)" stroke-width="1" stroke-dasharray="2,4"/>

  <!-- Orbit rings for Bitcoin -->
  <ellipse cx="1010" cy="224" rx="65" ry="20" fill="none" stroke="rgba(245,158,11,0.12)" stroke-width="1" transform="rotate(-30,1010,224)"/>
  <ellipse cx="1010" cy="224" rx="65" ry="20" fill="none" stroke="rgba(99,102,241,0.1)" stroke-width="1" transform="rotate(30,1010,224)"/>

  <!-- Decorative data blocks -->
  <rect x="890" y="340" width="60" height="8" rx="2" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <rect x="960" y="340" width="40" height="8" rx="2" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <rect x="1010" y="340" width="50" height="8" rx="2" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <rect x="1070" y="340" width="35" height="8" rx="2" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>
  <rect x="1115" y="340" width="45" height="8" rx="2" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(239,68,68,0.5)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(245,158,11,0.5)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3" fill="rgba(99,102,241,0.5)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="94" y="81" font-family="'Courier New', monospace" font-size="13" font-weight="600" fill="rgba(245,158,11,0.9)" letter-spacing="1">MARCH 16, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="white">Digest AI Bitcoin</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Threat Intelligence · AI Security · Blockchain Risks</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="rgba(245,158,11,0.75)" letter-spacing="2">SECURITY · WEEKLY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="135" y="425" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="rgba(239,68,68,0.9)" text-anchor="middle">AI Threats</text>

  <rect x="204" y="402" width="120" height="36" rx="18" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="264" y="425" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="rgba(245,158,11,0.9)" text-anchor="middle">Bitcoin Risk</text>

  <rect x="338" y="402" width="128" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="402" y="425" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="rgba(99,102,241,0.9)" text-anchor="middle">Crypto Security</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="rgba(245,158,11,0.4)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>