<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Argentina Libra Token Forensics and Stablecoin Regulation</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1e2d3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(243,156,18,0.3)"/>
      <stop offset="100%" stop-color="rgba(243,156,18,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Bitcoin coin icon -->
  <circle cx="1000" cy="280" r="140" fill="url(#coinGrad)" stroke="rgba(243,156,18,0.25)" stroke-width="2"/>
  <circle cx="1000" cy="280" r="110" fill="none" stroke="rgba(243,156,18,0.15)" stroke-width="1"/>
  <circle cx="1000" cy="280" r="80" fill="none" stroke="rgba(243,156,18,0.1)" stroke-width="1"/>
  <!-- BTC symbol paths (simplified) -->
  <text x="1000" y="305" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="rgba(243,156,18,0.35)" text-anchor="middle">B</text>
  <!-- Candlestick chart decorations -->
  <rect x="780" y="440" width="8" height="60" rx="2" fill="rgba(231,76,60,0.5)"/>
  <rect x="780" y="410" width="8" height="15" rx="1" fill="rgba(231,76,60,0.3)"/>
  <rect x="800" y="430" width="8" height="80" rx="2" fill="rgba(39,174,96,0.5)"/>
  <rect x="800" y="400" width="8" height="18" rx="1" fill="rgba(39,174,96,0.3)"/>
  <rect x="820" y="445" width="8" height="55" rx="2" fill="rgba(231,76,60,0.5)"/>
  <rect x="840" y="435" width="8" height="70" rx="2" fill="rgba(39,174,96,0.4)"/>
  <rect x="860" y="448" width="8" height="50" rx="2" fill="rgba(231,76,60,0.45)"/>
  <!-- Hexagon pattern -->
  <polygon points="1100,100 1130,117 1130,151 1100,168 1070,151 1070,117" fill="none" stroke="rgba(243,156,18,0.15)" stroke-width="1.5"/>
  <polygon points="1100,130 1118,140 1118,161 1100,171 1082,161 1082,140" fill="none" stroke="rgba(243,156,18,0.1)" stroke-width="1"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(243,156,18,0.2)" stroke="rgba(243,156,18,0.45)" stroke-width="1"/>
  <text x="180" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">MARCH 16, 2026</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Libra Token Forensics</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">&amp; Stablecoin Regulation</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">Argentina Libra Scandal | Crypto Market Trends | Policy Update</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category label -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">SECURITY WEEKLY DIGEST</text>
  <!-- Keyword tags -->
  <rect x="80" y="420" width="100" height="36" rx="18" fill="rgba(243,156,18,0.18)" stroke="rgba(243,156,18,0.4)" stroke-width="1"/>
  <text x="130" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#f5b041" text-anchor="middle" font-weight="600">Bitcoin</text>
  <rect x="196" y="420" width="120" height="36" rx="18" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.35)" stroke-width="1"/>
  <text x="256" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#ec7063" text-anchor="middle" font-weight="600">Stablecoin</text>
  <rect x="332" y="420" width="100" height="36" rx="18" fill="rgba(41,128,185,0.15)" stroke="rgba(41,128,185,0.35)" stroke-width="1"/>
  <text x="382" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#5dade2" text-anchor="middle" font-weight="600">Forensics</text>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
