  <g id="pods">
    
    <rect x="1010" y="340" width="25" height="25" rx="4" fill="#00ff88" opacity="0.7" />
    <circle cx="1022" cy="352" r="3" fill="#001a33" />

    
    <rect x="1045" y="340" width="25" height="25" rx="4" fill="#00ff88" opacity="0.7" />
