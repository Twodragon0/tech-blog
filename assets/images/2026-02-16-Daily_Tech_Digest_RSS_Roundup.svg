<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side: Content -->
  <!-- Title line 1 -->
  <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5px">Daily Tech Digest</text>
  
  <!-- Title line 2 -->
  <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5px">RSS Roundup</text>
  
  <!-- Date badge -->
  <rect x="60" y="275" width="280" height="40" rx="8" fill="#1a1f3a" stroke="#4a5f9f" stroke-width="1.5"/>
  <text x="75" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#8ba3d4">FEBRUARY 16, 2026</text>
  
  <!-- Tags -->
  <g id="tags">
    <!-- Tag 1: RSS -->
    <rect x="60" y="420" width="100" height="32" rx="16" fill="#ff6b35" opacity="0.15" stroke="#ff6b35" stroke-width="1"/>
    <text x="110" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ff9966" text-anchor="middle">RSS Feed</text>
    
    <!-- Tag 2: Digest -->
    <rect x="175" y="420" width="110" height="32" rx="16" fill="#4ecdc4" opacity="0.15" stroke="#4ecdc4" stroke-width="1"/>
    <text x="230" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#7ee5de" text-anchor="middle">Aggregation</text>
    
    <!-- Tag 3: Daily -->
    <rect x="300" y="420" width="90" height="32" rx="16" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1"/>
    <text x="345" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d4c5f9" text-anchor="middle">Daily</text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="605" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">tech.2twodragon.com</text>
  
  <!-- Right side: Illustration (Daily Tech Digest RSS Roundup) -->
  <g id="illustration">
    <!-- Background accent circle (subtle) -->
    <circle cx="950" cy="315" r="220" fill="#1a2540" opacity="0.4"/>
    
    <!-- Central RSS/Feed Hub (stylized) -->
    <circle cx="920" cy="300" r="85" fill="none" stroke="#ff6b35" stroke-width="2.5" opacity="0.8"/>
    <circle cx="920" cy="300" r="72" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"/>
    <circle cx="920" cy="300" r="20" fill="#ff6b35" opacity="0.9"/>
    
    <!-- Radiating feed lines (from center) -->
    <line x1="920" y1="280" x2="920" y2="220" stroke="#ff6b35" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>
    <line x1="940" y1="295" x2="995" y2="270" stroke="#ff6b35" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>
    <line x1="945" y1="320" x2="1010" y2="360" stroke="#ff6b35" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>
    <line x1="920" y1="340" x2="920" y2="410" stroke="#ff6b35" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>
    <line x1="895" y1="320" x2="830" y2="360" stroke="#ff6b35" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>
    <line x1="890" y1="295" x2="825" y2="270" stroke="#ff6b35" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>
    
    <!-- Incoming news card 1 (top-left) -->
    <g id="card1">
      <rect x="720" y="150" width="130" height="100" rx="6" fill="#1f2a47" stroke="#4ecdc4" stroke-width="1.5" opacity="0.85"/>
      <line x1="730" y1="175" x2="840" y2="175" stroke="#4ecdc4" stroke-width="1.5" opacity="0.6"/>
      <line x1="730" y1="190" x2="810" y2="190" stroke="#6b8fb8" stroke-width="1" opacity="0.4"/>
      <line x1="730" y1="205" x2="840" y2="205" stroke="#6b8fb8" stroke-width="0.8" opacity="0.3"/>
      <line x1="730" y1="220" x2="825" y2="220" stroke="#6b8fb8" stroke-width="0.8" opacity="0.3"/>
      <circle cx="745" cy="165" r="3" fill="#4ecdc4" opacity="0.7"/>
    </g>
    
    <!-- Incoming news card 2 (right) -->
    <g id="card2">
      <rect x="1025" y="235" width="130" height="100" rx="6" fill="#1f2a47" stroke="#a78bfa" stroke-width="1.5" opacity="0.85"/>
      <line x1="1035" y1="260" x2="1145" y2="260" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
      <line x1="1035" y1="275" x2="1115" y2="275" stroke="#c4b5fd" stroke-width="1" opacity="0.4"/>
      <line x1="1035" y1="290" x2="1145" y2="290" stroke="#c4b5fd" stroke-width="0.8" opacity="0.3"/>
      <line x1="1035" y1="305" x2="1130" y2="305" stroke="#c4b5fd" stroke-width="0.8" opacity="0.3"/>
      <circle cx="1050" cy="250" r="3" fill="#a78bfa" opacity="0.7"/>
    </g>
    
    <!-- Incoming news card 3 (bottom-right) -->
    <g id="card3">
      <rect x="960" y="385" width="130" height="100" rx="6" fill="#1f2a47" stroke="#34d399" stroke-width="1.5" opacity="0.85"/>
      <line x1="970" y1="410" x2="1080" y2="410" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
      <line x1="970" y1="425" x2="1050" y2="425" stroke="#6ee7b7" stroke-width="1" opacity="0.4"/>
      <line x1="970" y1="440" x2="1080" y2="440" stroke="#6ee7b7" stroke-width="0.8" opacity="0.3"/>
      <line x1="970" y1="455" x2="1065" y2="455" stroke="#6ee7b7" stroke-width="0.8" opacity="0.3"/>
      <circle cx="985" cy="400" r="3" fill="#34d399" opacity="0.7"/>
    </g>
    
    <!-- Incoming news card 4 (bottom-left) -->
    <g id="card4">
      <rect x="750" y="400" width="130" height="100" rx="6" fill="#1f2a47" stroke="#fbbf24" stroke-width="1.5" opacity="0.85"/>
      <line x1="760" y1="425" x2="870" y2="425" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
      <line x1="760" y1="440" x2="840" y2="440" stroke="#fcd34d" stroke-width="1" opacity="0.4"/>
      <line x1="760" y1="455" x2="870" y2="455" stroke="#fcd34d" stroke-width="0.8" opacity="0.3"/>
      <line x1="760" y1="470" x2="855" y2="470" stroke="#fcd34d" stroke-width="0.8" opacity="0.3"/>
      <circle cx="775" cy="415" r="3" fill="#fbbf24" opacity="0.7"/>
    </g>
    
    <!-- Center text: "DAILY" -->
    <text x="920" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#ff6b35" text-anchor="middle" opacity="0.9">DAILY</text>
    
    <!-- Flowing arrows (data flow concept) -->
    <path d="M 850 280 Q 885 290 915 295" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,2"/>
    <polygon points="915,295 918,305 912,300" fill="#4ecdc4" opacity="0.5"/>
    
    <path d="M 1000 265 Q 960 285 930 305" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,2"/>
    <polygon points="930,305 925,300 928,310" fill="#a78bfa" opacity="0.5"/>
    
    <path d="M 960 390 Q 945 345 925 310" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,2"/>
    <polygon points="925,310 930,315 920,312" fill="#34d399" opacity="0.5"/>
  </g>
</svg>