<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="rssFeed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9500;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,107,53,0.04)" stroke="rgba(255,107,53,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,107,53,0.05)" stroke="rgba(255,107,53,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: RSS Feed Icon + Digest visualization -->
  <!-- Main RSS signal base circle -->
  <circle cx="1010" cy="260" r="95" fill="rgba(255,149,0,0.07)" stroke="rgba(255,149,0,0.25)" stroke-width="1.5"/>

  <!-- RSS arc layers -->
  <path d="M940,320 Q940,255 1005,255" fill="none" stroke="rgba(255,149,0,0.35)" stroke-width="3" stroke-linecap="round"/>
  <path d="M940,320 Q940,230 1030,230 Q1080,230 1080,280" fill="none" stroke="rgba(255,107,53,0.28)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M940,320 Q940,205 1055,205 Q1115,205 1115,265 Q1115,310 1085,330" fill="none" stroke="rgba(255,80,53,0.2)" stroke-width="2" stroke-linecap="round"/>
  <!-- RSS dot -->
  <circle cx="943" cy="322" r="8" fill="rgba(255,149,0,0.55)" stroke="rgba(255,200,100,0.4)" stroke-width="1"/>

  <!-- Document/feed card shapes -->
  <rect x="875" y="140" width="72" height="90" rx="6" fill="rgba(255,149,0,0.08)" stroke="rgba(255,149,0,0.3)" stroke-width="1.2"/>
  <line x1="885" y1="162" x2="935" y2="162" stroke="rgba(255,200,150,0.35)" stroke-width="2"/>
  <line x1="885" y1="175" x2="935" y2="175" stroke="rgba(255,200,150,0.25)" stroke-width="1.5"/>
  <line x1="885" y1="187" x2="920" y2="187" stroke="rgba(255,200,150,0.2)" stroke-width="1.5"/>
  <line x1="885" y1="198" x2="928" y2="198" stroke="rgba(255,200,150,0.18)" stroke-width="1.5"/>
  <line x1="885" y1="209" x2="910" y2="209" stroke="rgba(255,200,150,0.15)" stroke-width="1.5"/>

  <rect x="1060" y="145" width="65" height="82" rx="6" fill="rgba(100,149,255,0.08)" stroke="rgba(100,149,255,0.28)" stroke-width="1.2"/>
  <line x1="1070" y1="165" x2="1115" y2="165" stroke="rgba(150,200,255,0.35)" stroke-width="2"/>
  <line x1="1070" y1="178" x2="1115" y2="178" stroke="rgba(150,200,255,0.25)" stroke-width="1.5"/>
  <line x1="1070" y1="190" x2="1100" y2="190" stroke="rgba(150,200,255,0.2)" stroke-width="1.5"/>
  <line x1="1070" y1="201" x2="1108" y2="201" stroke="rgba(150,200,255,0.15)" stroke-width="1.5"/>

  <!-- Connecting lines between cards -->
  <line x1="947" y1="185" x2="1010" y2="230" stroke="rgba(255,149,0,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1060" y1="185" x2="1010" y2="230" stroke="rgba(100,149,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Digest summary bar shapes -->
  <rect x="882" y="355" width="240" height="12" rx="3" fill="rgba(255,149,0,0.1)" stroke="rgba(255,149,0,0.25)" stroke-width="1"/>
  <rect x="882" y="355" width="160" height="12" rx="3" fill="rgba(255,149,0,0.18)"/>
  <rect x="882" y="374" width="200" height="10" rx="3" fill="rgba(100,180,255,0.12)" stroke="rgba(100,180,255,0.22)" stroke-width="1"/>
  <rect x="882" y="374" width="120" height="10" rx="3" fill="rgba(100,180,255,0.2)"/>
  <rect x="882" y="391" width="220" height="10" rx="3" fill="rgba(180,100,255,0.1)" stroke="rgba(180,100,255,0.22)" stroke-width="1"/>
  <rect x="882" y="391" width="90" height="10" rx="3" fill="rgba(180,100,255,0.18)"/>

  <!-- Small signal dots floating -->
  <circle cx="970" cy="170" r="3" fill="rgba(255,149,0,0.45)"/>
  <circle cx="1050" cy="155" r="2.5" fill="rgba(100,200,255,0.4)"/>
  <circle cx="1090" cy="280" r="3" fill="rgba(255,107,53,0.4)"/>
  <circle cx="900" cy="300" r="2" fill="rgba(255,200,100,0.35)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,107,53,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,149,0,0.6)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(230,57,70,0.65)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(255,107,53,0.15)" stroke="rgba(255,107,53,0.35)" stroke-width="1"/>
  <text x="190" y="81" font-family="'Courier New', monospace" font-size="13" font-weight="600" fill="rgba(255,149,0,0.9)" text-anchor="middle" letter-spacing="1">FEBRUARY 16, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white">Daily Tech</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white">Digest RSS Roundup</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', sans-serif" font-size="19" fill="rgba(255,200,180,0.75)">Curated security &amp; tech news from RSS feeds</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(255,107,53,0.85)" letter-spacing="2">SECURITY / DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(230,57,70,0.18)" stroke="rgba(230,57,70,0.45)" stroke-width="1"/>
  <text x="135" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,130,0.95)" text-anchor="middle">Security</text>

  <rect x="205" y="402" width="110" height="36" rx="18" fill="rgba(255,149,0,0.15)" stroke="rgba(255,149,0,0.4)" stroke-width="1"/>
  <text x="260" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,180,80,0.95)" text-anchor="middle">RSS Feed</text>

  <rect x="330" y="402" width="120" height="36" rx="18" fill="rgba(60,130,255,0.15)" stroke="rgba(60,130,255,0.4)" stroke-width="1"/>
  <text x="390" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(120,180,255,0.95)" text-anchor="middle">Tech Digest</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="14" fill="rgba(255,255,255,0.4)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,107,53,0.5)" text-anchor="end">SECURITY</text>
</svg>