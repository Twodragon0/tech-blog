<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0700"/>
      <stop offset="50%" style="stop-color:#1a0e00"/>
      <stop offset="100%" style="stop-color:#0d0a1a"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1000"/>
      <stop offset="100%" style="stop-color:#251800"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0e1a"/>
      <stop offset="100%" style="stop-color:#1a1525"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a05"/>
      <stop offset="100%" style="stop-color:#250f08"/>
    </linearGradient>
    <linearGradient id="rssOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orangeGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="amb1"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="amb2"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="rssGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <circle cx="600" cy="240" r="270" fill="#f97316" opacity="0.05" filter="url(#amb1)"/>
  <circle cx="180" cy="180" r="160" fill="#f97316" opacity="0.04" filter="url(#amb2)"/>
  <circle cx="1020" cy="380" r="180" fill="#f97316" opacity="0.03" filter="url(#amb1)"/>
  <circle cx="900" cy="100" r="120" fill="#ea580c" opacity="0.03" filter="url(#amb2)"/>
  <circle cx="200" cy="450" r="100" fill="#f97316" opacity="0.03" filter="url(#amb2)"/>

  <!-- Floating code fragments -->
  <text x="55" y="115" font-family="monospace" font-size="13" fill="#f97316" opacity="0.13">rss.parse(feed_url)</text>
  <text x="910" y="88" font-family="monospace" font-size="12" fill="#f97316" opacity="0.11">news.aggregate()</text>
  <text x="60" y="295" font-family="monospace" font-size="11" fill="#f97316" opacity="0.12">trend.analyze()</text>
  <text x="945" y="200" font-family="monospace" font-size="12" fill="#f97316" opacity="0.10">digest.publish()</text>
  <text x="55" y="405" font-family="monospace" font-size="11" fill="#ea580c" opacity="0.10">feed.items.filter()</text>
  <text x="960" y="315" font-family="monospace" font-size="11" fill="#f97316" opacity="0.09">topic.score: 0.87</text>
  <text x="100" y="190" font-family="monospace" font-size="10" fill="#f97316" opacity="0.08">sources: [hn, arxiv]</text>
  <text x="870" y="440" font-family="monospace" font-size="10" fill="#ea580c" opacity="0.08">nlp.summarize(art)</text>

  <!-- Central illustration: Fan of browser/feed cards + RSS icon + connection lines -->
  <g transform="translate(600,235)">

    <!-- Connection lines from center to cards (drawn behind cards) -->
    <!-- To back-left card -->
    <line x1="-8" y1="0" x2="-185" y2="-25" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
    <!-- To back-right card -->
    <line x1="8" y1="0" x2="185" y2="-20" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3" opacity="0.25"/>
    <!-- To mid-left card -->
    <line x1="-6" y1="0" x2="-135" y2="30" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
    <!-- To mid-right card -->
    <line x1="6" y1="0" x2="135" y2="35" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3" opacity="0.28"/>
    <!-- To top card -->
    <line x1="0" y1="-8" x2="0" y2="-130" stroke="#f97316" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>

    <!-- Node dots at card endpoints -->
    <circle cx="-185" cy="-25" r="4" fill="#f97316" opacity="0.5"/>
    <circle cx="185" cy="-20" r="4" fill="#f97316" opacity="0.45"/>
    <circle cx="-135" cy="30" r="4" fill="#f97316" opacity="0.5"/>
    <circle cx="135" cy="35" r="4" fill="#f97316" opacity="0.45"/>
    <circle cx="0" cy="-130" r="4" fill="#f97316" opacity="0.55"/>

    <!-- Far-back left card (smallest, most tilted) -->
    <g transform="rotate(-28) translate(-210,-55)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="130" height="82" rx="6" fill="url(#card2)" stroke="#f97316" stroke-width="0.8" opacity="0.55"/>
      <rect x="0" y="0" width="130" height="16" rx="6" fill="#f97316" opacity="0.15"/>
      <rect x="8" y="22" width="80" height="5" rx="2" fill="#64748b" opacity="0.5"/>
      <rect x="8" y="32" width="110" height="4" rx="2" fill="#475569" opacity="0.4"/>
      <rect x="8" y="40" width="95" height="4" rx="2" fill="#475569" opacity="0.35"/>
      <rect x="8" y="52" width="50" height="12" rx="3" fill="#f97316" opacity="0.25"/>
      <text x="33" y="62" font-family="Arial,sans-serif" font-size="7" fill="#f97316" opacity="0.7">Hacker News</text>
    </g>

    <!-- Far-back right card (smallest, tilted other way) -->
    <g transform="rotate(25) translate(148,-48)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="130" height="82" rx="6" fill="url(#card3)" stroke="#ea580c" stroke-width="0.8" opacity="0.5"/>
      <rect x="0" y="0" width="130" height="16" rx="6" fill="#ea580c" opacity="0.12"/>
      <rect x="8" y="22" width="75" height="5" rx="2" fill="#64748b" opacity="0.45"/>
      <rect x="8" y="32" width="105" height="4" rx="2" fill="#475569" opacity="0.35"/>
      <rect x="8" y="40" width="90" height="4" rx="2" fill="#475569" opacity="0.3"/>
      <rect x="8" y="52" width="50" height="12" rx="3" fill="#ea580c" opacity="0.2"/>
      <text x="33" y="62" font-family="Arial,sans-serif" font-size="7" fill="#ea580c" opacity="0.65">ArXiv Feed</text>
    </g>

    <!-- Mid-left card -->
    <g transform="rotate(-14) translate(-165,5)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="148" height="92" rx="7" fill="url(#card1)" stroke="#f97316" stroke-width="1" opacity="0.7"/>
      <rect x="0" y="0" width="148" height="20" rx="7" fill="#f97316" opacity="0.2"/>
      <text x="74" y="14" font-family="Arial,sans-serif" font-size="8" fill="#f97316" text-anchor="middle" opacity="0.8">The Register</text>
      <rect x="10" y="28" width="90" height="6" rx="2" fill="#64748b" opacity="0.55"/>
      <rect x="10" y="39" width="125" height="4" rx="2" fill="#475569" opacity="0.45"/>
      <rect x="10" y="47" width="110" height="4" rx="2" fill="#475569" opacity="0.4"/>
      <rect x="10" y="55" width="120" height="4" rx="2" fill="#475569" opacity="0.35"/>
      <rect x="10" y="68" width="55" height="14" rx="4" fill="#f97316" opacity="0.3"/>
      <text x="37" y="79" font-family="Arial,sans-serif" font-size="8" fill="#f97316" opacity="0.8">Read more</text>
    </g>

    <!-- Mid-right card -->
    <g transform="rotate(12) translate(22,10)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="148" height="92" rx="7" fill="url(#card2)" stroke="#f97316" stroke-width="1" opacity="0.65"/>
      <rect x="0" y="0" width="148" height="20" rx="7" fill="#f97316" opacity="0.18"/>
      <text x="74" y="14" font-family="Arial,sans-serif" font-size="8" fill="#f97316" text-anchor="middle" opacity="0.75">TechCrunch</text>
      <rect x="10" y="28" width="85" height="6" rx="2" fill="#64748b" opacity="0.5"/>
      <rect x="10" y="39" width="120" height="4" rx="2" fill="#475569" opacity="0.4"/>
      <rect x="10" y="47" width="105" height="4" rx="2" fill="#475569" opacity="0.35"/>
      <rect x="10" y="55" width="115" height="4" rx="2" fill="#475569" opacity="0.3"/>
      <rect x="10" y="68" width="55" height="14" rx="4" fill="#f97316" opacity="0.28"/>
      <text x="37" y="79" font-family="Arial,sans-serif" font-size="8" fill="#f97316" opacity="0.75">Read more</text>
    </g>

    <!-- Top card (vertical, centered) -->
    <g transform="translate(-74,-168)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="148" height="78" rx="7" fill="url(#card1)" stroke="#f97316" stroke-width="1" opacity="0.6"/>
      <rect x="0" y="0" width="148" height="18" rx="7" fill="#f97316" opacity="0.18"/>
      <text x="74" y="13" font-family="Arial,sans-serif" font-size="8" fill="#f97316" text-anchor="middle" opacity="0.75">Krebs on Security</text>
      <rect x="10" y="26" width="88" height="5" rx="2" fill="#64748b" opacity="0.45"/>
      <rect x="10" y="36" width="125" height="4" rx="2" fill="#475569" opacity="0.35"/>
      <rect x="10" y="44" width="110" height="4" rx="2" fill="#475569" opacity="0.3"/>
      <rect x="10" y="56" width="50" height="13" rx="4" fill="#f97316" opacity="0.25"/>
      <text x="35" y="66" font-family="Arial,sans-serif" font-size="8" fill="#f97316" opacity="0.7">Read more</text>
    </g>

    <!-- Front center card (largest, straight-on) -->
    <g transform="translate(-88,-55)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="176" height="110" rx="8" fill="#0f1620" stroke="#f97316" stroke-width="1.5" opacity="0.95"/>
      <rect x="0" y="0" width="176" height="24" rx="8" fill="#f97316" opacity="0.25"/>
      <!-- RSS icon in header -->
      <circle cx="15" cy="12" r="5" fill="#f97316" opacity="0.0"/>
      <text x="88" y="17" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#f97316" text-anchor="middle" opacity="0.9">Daily Digest</text>
      <!-- Content lines -->
      <rect x="12" y="32" width="100" height="7" rx="2" fill="#f97316" opacity="0.35"/>
      <rect x="12" y="44" width="150" height="4" rx="2" fill="#475569" opacity="0.55"/>
      <rect x="12" y="52" width="138" height="4" rx="2" fill="#475569" opacity="0.5"/>
      <rect x="12" y="60" width="145" height="4" rx="2" fill="#475569" opacity="0.45"/>
      <rect x="12" y="68" width="130" height="4" rx="2" fill="#475569" opacity="0.4"/>
      <!-- Tags -->
      <rect x="12" y="80" width="44" height="14" rx="4" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="0.8"/>
      <text x="34" y="91" font-family="Arial,sans-serif" font-size="8" fill="#f97316" text-anchor="middle" opacity="0.85">AI/ML</text>
      <rect x="62" y="80" width="52" height="14" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.8"/>
      <text x="88" y="91" font-family="Arial,sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle" opacity="0.8">Security</text>
      <rect x="120" y="80" width="44" height="14" rx="4" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="0.8"/>
      <text x="142" y="91" font-family="Arial,sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle" opacity="0.8">Cloud</text>
    </g>

    <!-- RSS icon (center hub) -->
    <g transform="translate(-12,-12)" filter="url(#rssGlow)">
      <rect x="-20" y="-20" width="40" height="40" rx="8" fill="url(#rssOrange)" opacity="0.9"/>
      <!-- RSS signal arcs -->
      <circle cx="-8" cy="8" r="3" fill="white" opacity="0.95"/>
      <path d="M-8,-2 Q6,-2 6,12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
      <path d="M-8,-10 Q14,-10 14,12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
    </g>
  </g>

  <!-- Top badges -->
  <rect x="40" y="24" width="165" height="34" rx="17" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1"/>
  <text x="122" y="46" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#f97316" text-anchor="middle" letter-spacing="1">DAILY DIGEST</text>

  <rect x="988" y="24" width="172" height="34" rx="17" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1"/>
  <text x="1074" y="46" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">February 16, 2026</text>

  <!-- Title block -->
  <text x="600" y="490" font-family="Arial,sans-serif" font-size="38" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">Daily Tech Digest</text>
  <text x="600" y="523" font-family="Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">RSS Intelligence  |  Multi-Source Aggregation  |  Tech Trends</text>

  <!-- Footer -->
  <line x1="40" y1="548" x2="1160" y2="548" stroke="#1e293b" stroke-width="1"/>
  <text x="600" y="570" font-family="monospace" font-size="12" fill="#64748b" text-anchor="middle">24 News  |  4 Security  |  6 AI/ML  |  3 Cloud  |  4 DevOps</text>
  <text x="40" y="610" font-family="Arial,sans-serif" font-size="12" fill="#334155">RSS Tech Roundup</text>
  <text x="1160" y="610" font-family="Arial,sans-serif" font-size="12" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>
