<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="None" height="None">
  <title>Tech Security Weekly Digest Ransomware Bitcoin</title>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient defs for visual depth -->
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bitcoinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4760a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6666;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff3333;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Right side illustration area (x=700-1150) -->

  <!-- Background glow effect -->
  <circle cx="900" cy="280" r="180" fill="url(#glowRed)" opacity="0.4"/>

  <!-- Chain links - ransomware symbol -->
  <g transform="translate(800, 200)">
    <!-- Left chain link -->
    <rect x="-60" y="-15" width="50" height="30" rx="15" fill="none" stroke="#ff3333" stroke-width="4"/>
    <!-- Center chain link -->
    <rect x="-10" y="-20" width="50" height="35" rx="15" fill="none" stroke="#ff3333" stroke-width="4"/>
    <!-- Right chain link -->
    <rect x="40" y="-15" width="50" height="30" rx="15" fill="none" stroke="#ff3333" stroke-width="4"/>
  </g>

  <!-- Padlock body -->
  <g transform="translate(850, 250)">
    <!-- Lock shackle (top rounded part) -->
    <path d="M -20 0 Q -20 -40 0 -45 Q 20 -40 20 0" fill="none" stroke="#ff3333" stroke-width="5" stroke-linecap="round"/>
    <!-- Lock body -->
    <rect x="-35" y="0" width="70" height="60" rx="8" fill="none" stroke="#ff3333" stroke-width="5"/>
    <!-- Lock keyhole -->
    <circle cx="0" cy="25" r="6" fill="#ff3333"/>
  </g>

  <!-- Bitcoin symbol - large -->
  <g transform="translate(950, 320)">
    <!-- Bitcoin circle background -->
    <circle cx="0" cy="0" r="45" fill="url(#bitcoinGrad)"/>
    <!-- Bitcoin B symbol -->
    <text x="0" y="18" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial, sans-serif">₿</text>
  </g>

  <!-- Digital security lines -->
  <g stroke="#ff3333" stroke-width="2" opacity="0.6">
    <line x1="750" y1="150" x2="920" y2="120"/>
    <line x1="760" y1="400" x2="920" y2="420"/>
    <line x1="1000" y1="150" x2="1100" y2="180"/>
    <line x1="1020" y1="420" x2="1050" y2="500"/>
  </g>

  <!-- Binary digits floating -->
  <text x="750" y="180" font-size="14" fill="#ff3333" opacity="0.5" font-family="monospace">01 10 11</text>
  <text x="1050" y="380" font-size="14" fill="#f7931a" opacity="0.5" font-family="monospace">0x1a2b3c</text>

  <!-- Threat indicator - radiating lines -->
  <g stroke="#ff3333" stroke-width="1.5" opacity="0.4">
    <line x1="900" y1="200" x2="900" y2="150"/>
    <line x1="950" y1="250" x2="1010" y2="220"/>
    <line x1="920" y1="350" x2="950" y2="400"/>
    <line x1="800" y1="320" x2="750" y2="340"/>
  </g>

  <!-- Left side content -->

  <!-- Title line 1 -->
  <text x="60" y="185" font-size="46" font-weight="bold" fill="white" font-family="Arial, sans-serif">Tech Security Weekly</text>

  <!-- Title line 2 -->
  <text x="60" y="245" font-size="46" font-weight="bold" fill="white" font-family="Arial, sans-serif">Ransomware Bitcoin</text>

  <!-- Date badge -->
  <g>
    <rect x="60" y="310" width="320" height="50" rx="8" fill="#ff3333" opacity="0.15" stroke="#ff3333" stroke-width="2"/>
    <text x="220" y="342" font-size="20" font-weight="bold" fill="#ff3333" text-anchor="middle" font-family="Arial, sans-serif">MARCH 4, 2026</text>
  </g>

  <!-- Tag pills at y=420 -->
  <g>
    <!-- Tag 1: Ransomware -->
    <rect x="60" y="405" width="140" height="35" rx="18" fill="#ff3333" opacity="0.2" stroke="#ff3333" stroke-width="2"/>
    <text x="130" y="428" font-size="14" font-weight="bold" fill="#ff3333" text-anchor="middle" font-family="Arial, sans-serif">Ransomware</text>

    <!-- Tag 2: Bitcoin -->
    <rect x="220" y="405" width="120" height="35" rx="18" fill="#f7931a" opacity="0.2" stroke="#f7931a" stroke-width="2"/>
    <text x="280" y="428" font-size="14" font-weight="bold" fill="#f7931a" text-anchor="middle" font-family="Arial, sans-serif">Bitcoin</text>

    <!-- Tag 3: Threat -->
    <rect x="360" y="405" width="110" height="35" rx="18" fill="#ff6666" opacity="0.2" stroke="#ff6666" stroke-width="2"/>
    <text x="415" y="428" font-size="14" font-weight="bold" fill="#ff6666" text-anchor="middle" font-family="Arial, sans-serif">Threat</text>
  </g>

  <!-- Footer -->
  <text x="1100" y="610" font-size="13" fill="#666666" text-anchor="end" font-family="Arial, sans-serif">tech.2twodragon.com</text>
</svg>