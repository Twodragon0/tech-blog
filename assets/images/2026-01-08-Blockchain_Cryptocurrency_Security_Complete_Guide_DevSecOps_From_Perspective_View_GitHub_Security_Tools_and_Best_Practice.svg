<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side content -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">Blockchain</text>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">Cryptocurrency Security</text>
  
  <!-- Date badge -->
  <rect x="50" y="275" width="280" height="40" rx="20" fill="#1a2d4d" stroke="#4a9eff" stroke-width="1"/>
  <text x="170" y="298" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4a9eff" text-anchor="middle">JANUARY 8, 2026</text>
  
  <!-- Tags -->
  <rect x="50" y="420" width="90" height="28" rx="14" fill="#1d3a52" stroke="#00d4ff" stroke-width="1"/>
  <text x="95" y="439" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff" text-anchor="middle">Security</text>
  
  <rect x="155" y="420" width="90" height="28" rx="14" fill="#1d3a52" stroke="#00d4ff" stroke-width="1"/>
  <text x="200" y="439" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff" text-anchor="middle">DevSecOps</text>
  
  <rect x="260" y="420" width="90" height="28" rx="14" fill="#1d3a52" stroke="#00d4ff" stroke-width="1"/>
  <text x="305" y="439" font-family="Arial, sans-serif" font-size="12" fill="#00d4ff" text-anchor="middle">Blockchain</text>
  
  <!-- Footer -->
  <text x="50" y="595" font-family="Arial, sans-serif" font-size="12" fill="#666666">tech.2twodragon.com</text>
  
  <!-- Right side illustration: Blockchain Security Architecture -->
  
  <!-- Background gradient effect circles -->
  <circle cx="950" cy="200" r="120" fill="#1a3d5c" opacity="0.3"/>
  <circle cx="1050" cy="350" r="100" fill="#2d5a8c" opacity="0.3"/>
  
  <!-- Blockchain chain - top -->
  <rect x="750" y="100" width="60" height="60" rx="8" fill="#4a9eff" stroke="#00d4ff" stroke-width="2"/>
  <text x="780" y="135" font-family="monospace" font-size="24" fill="#0a0c1a" text-anchor="middle" font-weight="bold">⛓</text>
  
  <line x1="810" y1="130" x2="860" y2="130" stroke="#4a9eff" stroke-width="3" stroke-dasharray="5,5"/>
  
  <rect x="860" y="100" width="60" height="60" rx="8" fill="#00d4ff" stroke="#4a9eff" stroke-width="2"/>
  <text x="890" y="135" font-family="monospace" font-size="24" fill="#0a0c1a" text-anchor="middle" font-weight="bold">⛓</text>
  
  <line x1="920" y1="130" x2="970" y2="130" stroke="#4a9eff" stroke-width="3" stroke-dasharray="5,5"/>
  
  <rect x="970" y="100" width="60" height="60" rx="8" fill="#4a9eff" stroke="#00d4ff" stroke-width="2"/>
  <text x="1000" y="135" font-family="monospace" font-size="24" fill="#0a0c1a" text-anchor="middle" font-weight="bold">⛓</text>
  
  <!-- Security layer - middle left -->
  <rect x="730" y="220" width="75" height="75" rx="10" fill="#2d5a8c" stroke="#ff6b6b" stroke-width="2"/>
  <text x="767.5" y="272" font-family="monospace" font-size="40" fill="#ff6b6b" text-anchor="middle" font-weight="bold">🔐</text>
  
  <!-- Smart Contract audit layer -->
  <rect x="850" y="220" width="75" height="75" rx="10" fill="#2d5a8c" stroke="#ffd93d" stroke-width="2"/>
  <text x="887.5" y="268" font-family="monospace" font-size="32" fill="#ffd93d" text-anchor="middle" font-weight="bold">✓</text>
  <text x="887.5" y="283" font-family="Arial" font-size="10" fill="#ffd93d" text-anchor="middle" font-weight="bold">AUDIT</text>
  
  <!-- Network/Consensus layer -->
  <rect x="970" y="220" width="75" height="75" rx="10" fill="#2d5a8c" stroke="#6bcf7f" stroke-width="2"/>
  <text x="1007.5" y="270" font-family="monospace" font-size="36" fill="#6bcf7f" text-anchor="middle" font-weight="bold">◉</text>
  
  <!-- Wallet/Key management - bottom left -->
  <circle cx="767" cy="380" r="48" fill="#1d3a52" stroke="#9d84ff" stroke-width="2"/>
  <text x="767" y="390" font-family="monospace" font-size="40" fill="#9d84ff" text-anchor="middle" font-weight="bold">🔑</text>
  
  <!-- Threat detection/Monitoring -->
  <circle cx="900" cy="380" r="48" fill="#1d3a52" stroke="#ff8c9e" stroke-width="2"/>
  <text x="900" y="393" font-family="monospace" font-size="36" fill="#ff8c9e" text-anchor="middle" font-weight="bold">⚠</text>
  
  <!-- Infrastructure/DevOps -->
  <circle cx="1033" cy="380" r="48" fill="#1d3a52" stroke="#4a9eff" stroke-width="2"/>
  <text x="1033" y="392" font-family="monospace" font-size="36" fill="#4a9eff" text-anchor="middle" font-weight="bold">⚙</text>
  
  <!-- Connection lines between layers -->
  <line x1="767" y1="160" x2="767" y2="220" stroke="#4a9eff" stroke-width="2" opacity="0.6"/>
  <line x1="887" y1="160" x2="887" y2="220" stroke="#4a9eff" stroke-width="2" opacity="0.6"/>
  <line x1="1007" y1="160" x2="1007" y2="220" stroke="#4a9eff" stroke-width="2" opacity="0.6"/>
  
  <!-- Connections to bottom layer -->
  <line x1="767" y1="295" x2="767" y2="332" stroke="#9d84ff" stroke-width="1.5" opacity="0.5"/>
  <line x1="887" y1="295" x2="900" y2="332" stroke="#ff8c9e" stroke-width="1.5" opacity="0.5"/>
  <line x1="1007" y1="295" x2="1033" y2="332" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Data flow indicators -->
  <path d="M 820 350 Q 860 340 900 355" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  <path d="M 950 360 Q 990 350 1033 332" fill="none" stroke="#6bcf7f" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  
  <!-- Title for illustration section (subtle) -->
  <text x="950" y="520" font-family="Arial, sans-serif" font-size="11" fill="#4a7a9e" text-anchor="middle" opacity="0.7">Layered Security Architecture</text>
</svg>