<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="lineAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="tagRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="tagAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="tagBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Blockchain + Security + GitHub Lock -->
  <!-- Blockchain chain links hexagonal structure -->
  <!-- Central blockchain node -->
  <polygon points="1010,180 1040,163 1070,180 1070,214 1040,231 1010,214" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.35)" stroke-width="1.5"/>
  <!-- Inner hex -->
  <polygon points="1010,180 1040,163 1070,180 1070,214 1040,231 1010,214" fill="none" stroke="rgba(245,158,11,0.15)" stroke-width="3" stroke-dasharray="4,3"/>

  <!-- Chain node top-left -->
  <polygon points="940,140 965,126 990,140 990,168 965,182 940,168" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)" stroke-width="1.5"/>
  <text x="965" y="159" font-size="10" fill="rgba(239,68,68,0.6)" text-anchor="middle" font-family="monospace">0x4a</text>

  <!-- Chain node top-right -->
  <polygon points="1085,140 1110,126 1135,140 1135,168 1110,182 1085,168" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.3)" stroke-width="1.5"/>
  <text x="1110" y="159" font-size="10" fill="rgba(124,58,237,0.6)" text-anchor="middle" font-family="monospace">0x9f</text>

  <!-- Chain node bottom-left -->
  <polygon points="940,228 965,214 990,228 990,256 965,270 940,256" fill="rgba(16,185,129,0.07)" stroke="rgba(16,185,129,0.28)" stroke-width="1.5"/>
  <text x="965" y="247" font-size="10" fill="rgba(16,185,129,0.55)" text-anchor="middle" font-family="monospace">0x7c</text>

  <!-- Chain node bottom-right -->
  <polygon points="1085,228 1110,214 1135,228 1135,256 1110,270 1085,256" fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.28)" stroke-width="1.5"/>
  <text x="1110" y="247" font-size="10" fill="rgba(59,130,246,0.55)" text-anchor="middle" font-family="monospace">0x2b</text>

  <!-- Chain links connecting nodes -->
  <line x1="990" y1="154" x2="1010" y2="187" stroke="rgba(245,158,11,0.2)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="1070" y1="187" x2="1085" y2="154" stroke="rgba(245,158,11,0.2)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="990" y1="242" x2="1010" y2="207" stroke="rgba(245,158,11,0.2)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="1070" y1="207" x2="1085" y2="242" stroke="rgba(245,158,11,0.2)" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Central node label (chain hash) -->
  <text x="1040" y="194" font-size="9" fill="rgba(245,158,11,0.7)" text-anchor="middle" font-family="monospace">BLOCK</text>
  <text x="1040" y="207" font-size="8" fill="rgba(245,158,11,0.5)" text-anchor="middle" font-family="monospace">#8421</text>

  <!-- GitHub Octocat-inspired lock/shield below chain -->
  <!-- Shield base -->
  <path d="M1010,275 L1070,275 L1070,310 Q1040,330 1010,310 Z" fill="rgba(239,68,68,0.07)" stroke="rgba(239,68,68,0.28)" stroke-width="1.5"/>
  <!-- Lock body on shield -->
  <rect x="1027" y="285" width="26" height="20" rx="3" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <!-- Lock shackle -->
  <path d="M1031,285 Q1031,276 1040,276 Q1049,276 1049,285" fill="none" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
  <!-- Lock keyhole -->
  <circle cx="1040" cy="293" r="3" fill="rgba(239,68,68,0.5)"/>
  <rect x="1039" y="294" width="2" height="5" fill="rgba(239,68,68,0.5)"/>

  <!-- Floating hash values (security context) -->
  <text x="895" y="155" font-size="9" fill="rgba(245,158,11,0.3)" font-family="monospace">sha256:</text>
  <text x="895" y="167" font-size="8" fill="rgba(245,158,11,0.22)" font-family="monospace">a4f2e1b9c3...</text>
  <text x="895" y="195" font-size="9" fill="rgba(124,58,237,0.3)" font-family="monospace">merkle:</text>
  <text x="895" y="207" font-size="8" fill="rgba(124,58,237,0.22)" font-family="monospace">7d8c2a5f1e...</text>
  <text x="895" y="235" font-size="9" fill="rgba(59,130,246,0.3)" font-family="monospace">sign:</text>
  <text x="895" y="247" font-size="8" fill="rgba(59,130,246,0.22)" font-family="monospace">ed25519...</text>

  <!-- Outer ring around illustration -->
  <circle cx="1040" cy="215" r="105" fill="none" stroke="rgba(245,158,11,0.06)" stroke-width="1" stroke-dasharray="5,4"/>
  <circle cx="1040" cy="215" r="85" fill="none" stroke="rgba(239,68,68,0.05)" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(239,68,68,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(245,158,11,0.6)"/>
  <circle cx="860" cy="440" r="3" fill="rgba(239,68,68,0.5)"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(245,158,11,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(239,68,68,0.05)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentGrad)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-size="12" fill="rgba(245,158,11,0.9)" text-anchor="middle" font-family="'Courier New', monospace" font-weight="600" letter-spacing="1">JANUARY 8, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="'Arial', sans-serif" letter-spacing="-0.5">Blockchain Cryptocurrency Security DevSecOps</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="'Arial', sans-serif" letter-spacing="-0.5">Perspective View GitHub Security</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)" font-family="'Arial', sans-serif">Blockchain security analysis from a DevSecOps lens — GitHub advisory, crypto audit &amp; threat modeling</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#lineAccent)" rx="1"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(245,158,11,0.8)" font-family="'Arial', sans-serif" font-weight="600" letter-spacing="2" text-transform="uppercase">SECURITY / BLOCKCHAIN / DEVSECOPS</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="url(#tagRed)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-family="'Arial', sans-serif" font-weight="500">Blockchain</text>

  <rect x="222" y="402" width="130" height="36" rx="18" fill="url(#tagAmber)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="287" y="425" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-family="'Arial', sans-serif" font-weight="500">GitHub CVE</text>

  <rect x="364" y="402" width="130" height="36" rx="18" fill="url(#tagBlue)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="429" y="425" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-family="'Arial', sans-serif" font-weight="500">Crypto Audit</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="14" fill="rgba(255,255,255,0.35)" font-family="'Arial', sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(245,158,11,0.45)" text-anchor="end" font-family="'Arial', sans-serif" font-weight="600" letter-spacing="1">SECURITY</text>
</svg>