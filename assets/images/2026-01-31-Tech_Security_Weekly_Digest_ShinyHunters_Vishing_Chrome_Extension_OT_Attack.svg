<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3c3c;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3c3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3c3c;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="glowRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3c3c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: ShinyHunters + Vishing + Chrome Extension themed icon -->
  <!-- Background glow for illustration area -->
  <ellipse cx="1010" cy="225" rx="160" ry="130" fill="rgba(255,60,60,0.04)"/>

  <!-- Outer shield outline - ShinyHunters themed -->
  <path d="M1010,135 L1090,165 L1090,235 Q1090,295 1010,325 Q930,295 930,235 L930,165 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,60,60,0.35)" stroke-width="1.5"/>

  <!-- Inner shield -->
  <path d="M1010,152 L1075,177 L1075,237 Q1075,287 1010,308 Q945,287 945,237 L945,177 Z"
        fill="rgba(255,60,60,0.07)" stroke="rgba(255,100,60,0.25)" stroke-width="1"/>

  <!-- Shield core glow -->
  <path d="M1010,168 L1060,188 L1060,238 Q1060,278 1010,294 Q960,278 960,238 L960,188 Z"
        fill="rgba(255,60,60,0.09)" stroke="rgba(255,60,60,0.2)" stroke-width="0.8"/>

  <!-- Skull/hacker icon inside shield - ShinyHunters motif -->
  <!-- Skull head circle -->
  <circle cx="1010" cy="218" r="28" fill="rgba(255,80,40,0.12)" stroke="rgba(255,60,60,0.4)" stroke-width="1.5"/>
  <!-- Skull eye sockets -->
  <circle cx="1000" cy="215" r="7" fill="rgba(255,60,60,0.25)" stroke="rgba(255,60,60,0.5)" stroke-width="1"/>
  <circle cx="1020" cy="215" r="7" fill="rgba(255,60,60,0.25)" stroke="rgba(255,60,60,0.5)" stroke-width="1"/>
  <!-- Skull nose -->
  <path d="M1007,224 L1010,228 L1013,224" fill="rgba(255,80,40,0.3)" stroke="rgba(255,60,60,0.4)" stroke-width="0.8"/>
  <!-- Skull jaw -->
  <rect x="997" y="230" width="26" height="9" rx="2" fill="rgba(255,60,60,0.15)" stroke="rgba(255,60,60,0.35)" stroke-width="1"/>
  <!-- Jaw teeth -->
  <line x1="1004" y1="230" x2="1004" y2="239" stroke="rgba(255,60,60,0.4)" stroke-width="1"/>
  <line x1="1010" y1="230" x2="1010" y2="239" stroke="rgba(255,60,60,0.4)" stroke-width="1"/>
  <line x1="1016" y1="230" x2="1016" y2="239" stroke="rgba(255,60,60,0.4)" stroke-width="1"/>

  <!-- Vishing phone waves emanating from shield - left side -->
  <path d="M922,210 Q908,225 922,240" fill="none" stroke="rgba(255,140,60,0.3)" stroke-width="1.5"/>
  <path d="M912,200 Q890,225 912,250" fill="none" stroke="rgba(255,140,60,0.2)" stroke-width="1.2"/>
  <path d="M902,190 Q872,225 902,260" fill="none" stroke="rgba(255,140,60,0.12)" stroke-width="1"/>

  <!-- Chrome extension icon - right side of shield (puzzle piece style) -->
  <rect x="1098" y="188" width="40" height="40" rx="6" fill="rgba(100,180,255,0.1)" stroke="rgba(100,180,255,0.3)" stroke-width="1.5"/>
  <!-- Puzzle notch top -->
  <path d="M1110,188 L1110,180 Q1118,175 1126,180 L1126,188" fill="rgba(100,180,255,0.15)" stroke="rgba(100,180,255,0.3)" stroke-width="1"/>
  <!-- Puzzle notch right -->
  <path d="M1138,200 L1146,200 Q1151,208 1146,216 L1138,216" fill="rgba(100,180,255,0.15)" stroke="rgba(100,180,255,0.3)" stroke-width="1"/>
  <!-- Chrome circle inside puzzle -->
  <circle cx="1118" cy="208" r="10" fill="none" stroke="rgba(100,180,255,0.4)" stroke-width="1.5"/>
  <circle cx="1118" cy="208" r="4" fill="rgba(100,180,255,0.2)" stroke="rgba(100,180,255,0.5)" stroke-width="1"/>
  <!-- Chrome extension dividers -->
  <line x1="1118" y1="198" x2="1118" y2="208" stroke="rgba(100,180,255,0.35)" stroke-width="1"/>
  <line x1="1109" y1="213" x2="1118" y2="208" stroke="rgba(100,180,255,0.35)" stroke-width="1"/>
  <line x1="1127" y1="213" x2="1118" y2="208" stroke="rgba(100,180,255,0.35)" stroke-width="1"/>

  <!-- Data breach lines - circuit pattern below shield -->
  <line x1="970" y1="330" x2="970" y2="350" stroke="rgba(255,60,60,0.2)" stroke-width="1"/>
  <line x1="970" y1="350" x2="1050" y2="350" stroke="rgba(255,60,60,0.2)" stroke-width="1"/>
  <line x1="1050" y1="350" x2="1050" y2="330" stroke="rgba(255,60,60,0.2)" stroke-width="1"/>
  <circle cx="970" cy="330" r="3" fill="rgba(255,60,60,0.4)"/>
  <circle cx="1050" cy="330" r="3" fill="rgba(255,60,60,0.4)"/>
  <circle cx="1010" cy="350" r="2.5" fill="rgba(255,100,60,0.5)"/>

  <!-- Orbiting dots around shield -->
  <circle cx="1085" cy="155" r="3" fill="rgba(255,80,40,0.5)" stroke="rgba(255,60,60,0.6)" stroke-width="0.5"/>
  <circle cx="935" cy="175" r="2.5" fill="rgba(255,140,60,0.4)" stroke="rgba(255,140,60,0.5)" stroke-width="0.5"/>
  <circle cx="940" cy="300" r="2" fill="rgba(255,60,60,0.35)"/>
  <circle cx="1080" cy="310" r="2.5" fill="rgba(100,180,255,0.4)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,60,60,0.6)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,140,60,0.5)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,60,60,0.4)"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,60,60,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,60,60,0.06)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(255,60,60,0.15)" stroke="rgba(255,60,60,0.4)" stroke-width="1"/>
  <text x="190" y="81" font-family="'Courier New',monospace" font-size="12" font-weight="600" fill="rgba(255,120,100,0.95)" text-anchor="middle" letter-spacing="1.5">JANUARY 31, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.95">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="36" font-weight="700" fill="rgba(255,120,100,0.95)">ShinyHunters Vishing Chrome Ext</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" font-weight="400">Threat intelligence, voice phishing campaigns, and browser-based attack vectors</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial',sans-serif" font-size="14" fill="rgba(255,100,80,0.75)" font-weight="600" letter-spacing="2.5">SECURITY / THREAT INTELLIGENCE / WEEKLY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(220,38,38,0.2)" stroke="rgba(220,38,38,0.5)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,120,100,0.95)" font-weight="600" text-anchor="middle">ShinyHunters</text>

  <rect x="225" y="402" width="100" height="36" rx="18" fill="rgba(217,119,6,0.2)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
  <text x="275" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,200,100,0.95)" font-weight="600" text-anchor="middle">Vishing</text>

  <rect x="340" y="402" width="155" height="36" rx="18" fill="rgba(37,99,235,0.2)" stroke="rgba(96,165,250,0.5)" stroke-width="1"/>
  <text x="418" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(147,197,253,0.95)" font-weight="600" text-anchor="middle">Chrome Extension</text>

  <!-- Footer -->
  <line x1="0" y1="510" x2="1200" y2="510" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.3)" font-weight="400">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,80,60,0.4)" font-weight="600" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>