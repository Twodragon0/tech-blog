    <circle cx="60" cy="100" r="20" fill="none" stroke="#10b981" stroke-width="3"/>
    <line x1="50" y1="40" x2="70" y2="40" stroke="#94a3b8" stroke-width="2"/>
    <line x1="45" y1="65" x2="50" y2="85" stroke="#10b981" stroke-width="2"/>
