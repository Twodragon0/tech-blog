<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a"/>
      <stop offset="50%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7931a"/>
      <stop offset="100%" style="stop-color:rgba(247,147,26,0)"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="btcGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 1. Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- 2. Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- 3. RIGHT SIDE ILLUSTRATION: Blockchain + Bitcoin Symbol -->
  <!-- Outer orbit ring -->
  <circle cx="1010" cy="225" r="115" fill="none" stroke="rgba(247,147,26,0.22)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <circle cx="1010" cy="225" r="88" fill="none" stroke="rgba(255,107,53,0.18)" stroke-width="1" stroke-dasharray="3 6"/>

  <!-- Main hexagonal blockchain node background -->
  <polygon points="1010,130 1085,173 1085,260 1010,303 935,260 935,173" fill="url(#btcGlow)" stroke="rgba(247,147,26,0.35)" stroke-width="1.5"/>
  <polygon points="1010,145 1072,180 1072,252 1010,287 948,252 948,180" fill="rgba(247,147,26,0.06)" stroke="rgba(247,147,26,0.2)" stroke-width="1"/>

  <!-- Bitcoin B symbol inside hexagon -->
  <rect x="990" y="182" width="40" height="86" rx="6" fill="rgba(247,147,26,0.08)" stroke="rgba(247,147,26,0.3)" stroke-width="1.5"/>
  <!-- B letter paths -->
  <path d="M998 192 L998 258 M998 192 L1015 192 Q1028 192 1028 204 Q1028 216 1015 216 L998 216 M998 216 L1017 216 Q1032 216 1032 230 Q1032 244 1017 244 L998 244" fill="none" stroke="rgba(247,147,26,0.7)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Blockchain chain links connecting to satellite nodes -->
  <!-- Node 1: top-right -->
  <circle cx="1095" cy="160" r="18" fill="rgba(247,147,26,0.08)" stroke="rgba(247,147,26,0.3)" stroke-width="1.5"/>
  <circle cx="1095" cy="160" r="10" fill="rgba(247,147,26,0.12)" stroke="rgba(247,147,26,0.4)" stroke-width="1"/>
  <line x1="1085" y1="173" x2="1095" y2="160" stroke="rgba(247,147,26,0.25)" stroke-width="1.5"/>

  <!-- Node 2: bottom-right -->
  <circle cx="1100" cy="295" r="20" fill="rgba(255,107,53,0.08)" stroke="rgba(255,107,53,0.3)" stroke-width="1.5"/>
  <circle cx="1100" cy="295" r="11" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.35)" stroke-width="1"/>
  <line x1="1085" y1="260" x2="1100" y2="295" stroke="rgba(255,107,53,0.22)" stroke-width="1.5"/>

  <!-- Node 3: bottom-left -->
  <circle cx="920" cy="295" r="16" fill="rgba(247,147,26,0.07)" stroke="rgba(247,147,26,0.28)" stroke-width="1.5"/>
  <circle cx="920" cy="295" r="8" fill="rgba(247,147,26,0.1)" stroke="rgba(247,147,26,0.3)" stroke-width="1"/>
  <line x1="935" y1="260" x2="920" y2="295" stroke="rgba(247,147,26,0.2)" stroke-width="1.5"/>

  <!-- Node 4: top-left -->
  <circle cx="918" cy="155" r="16" fill="rgba(192,57,43,0.08)" stroke="rgba(192,57,43,0.3)" stroke-width="1.5"/>
  <circle cx="918" cy="155" r="8" fill="rgba(192,57,43,0.1)" stroke="rgba(192,57,43,0.3)" stroke-width="1"/>
  <line x1="935" y1="173" x2="918" y2="155" stroke="rgba(192,57,43,0.2)" stroke-width="1.5"/>

  <!-- Node 5: top -->
  <circle cx="1010" cy="112" r="14" fill="rgba(255,215,0,0.07)" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <circle cx="1010" cy="112" r="7" fill="rgba(255,215,0,0.12)" stroke="rgba(255,215,0,0.35)" stroke-width="1"/>
  <line x1="1010" y1="130" x2="1010" y2="126" stroke="rgba(255,215,0,0.25)" stroke-width="1.5"/>

  <!-- Cross-chain connection lines -->
  <line x1="1095" y1="160" x2="1100" y2="295" stroke="rgba(247,147,26,0.1)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="918" y1="155" x2="920" y2="295" stroke="rgba(247,147,26,0.1)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="1095" y1="160" x2="918" y2="155" stroke="rgba(247,147,26,0.08)" stroke-width="1" stroke-dasharray="3 6"/>

  <!-- Small hash blocks floating -->
  <rect x="870" y="135" width="28" height="20" rx="3" fill="rgba(247,147,26,0.06)" stroke="rgba(247,147,26,0.2)" stroke-width="1"/>
  <rect x="1120" y="200" width="24" height="18" rx="3" fill="rgba(255,107,53,0.06)" stroke="rgba(255,107,53,0.2)" stroke-width="1"/>
  <rect x="1115" y="148" width="20" height="16" rx="2" fill="rgba(192,57,43,0.07)" stroke="rgba(192,57,43,0.18)" stroke-width="1"/>

  <!-- Price chart micro-icon -->
  <polyline points="875,310 886,302 897,306 910,295 921,298 932,285" fill="none" stroke="rgba(247,147,26,0.35)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="875" y1="315" x2="932" y2="315" stroke="rgba(247,147,26,0.15)" stroke-width="1"/>

  <!-- 4. Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(247,147,26,0.7)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(255,107,53,0.6)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(192,57,43,0.65)"/>

  <!-- 5. Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(247,147,26,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(247,147,26,0.025)" stroke="rgba(247,147,26,0.06)" stroke-width="1"/>

  <!-- 6. Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- 7. Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4" fill="rgba(247,147,26,0.15)" stroke="rgba(247,147,26,0.35)" stroke-width="1"/>
  <text x="95" y="81" font-family="'Courier New', monospace" font-size="13" font-weight="600" fill="rgba(247,147,26,0.9)" letter-spacing="1">FEBRUARY 9, 2026</text>

  <!-- 8. Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Blockchain Tech</text>

  <!-- 9. Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Digest Bithumb Bitcoin</text>

  <!-- 10. Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">Crypto Security &amp; DevSecOps Insights</text>

  <!-- 11. Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- 12. Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(247,147,26,0.75)" letter-spacing="3">DEVSECOPS / BLOCKCHAIN</text>

  <!-- 13. Three tag pills -->
  <rect x="80" y="402" width="112" height="36" rx="18" fill="rgba(192,57,43,0.25)" stroke="rgba(192,57,43,0.5)" stroke-width="1.2"/>
  <text x="136" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,100,0.95)" text-anchor="middle" letter-spacing="0.5">Bitcoin</text>

  <rect x="206" y="402" width="116" height="36" rx="18" fill="rgba(180,120,0,0.22)" stroke="rgba(247,147,26,0.45)" stroke-width="1.2"/>
  <text x="264" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(247,200,80,0.95)" text-anchor="middle" letter-spacing="0.5">Bithumb</text>

  <rect x="336" y="402" width="126" height="36" rx="18" fill="rgba(30,80,180,0.22)" stroke="rgba(80,140,255,0.4)" stroke-width="1.2"/>
  <text x="399" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(120,180,255,0.95)" text-anchor="middle" letter-spacing="0.5">Blockchain</text>

  <!-- 14. Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(247,147,26,0.4)" text-anchor="end" letter-spacing="1">DEVSECOPS</text>
</svg>