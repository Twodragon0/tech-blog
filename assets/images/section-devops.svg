<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="140">
      <stop offset="0%" stop-color="#0a1e14"/>
      <stop offset="100%" stop-color="#1e293b"/>
