  </defs>
  <rect width="800" height="140" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>
  <!-- Gear/infinity icon -->
  <g transform="translate(40, 25)">
