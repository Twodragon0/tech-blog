    <circle cx="45" cy="45" r="22" fill="none" stroke="#10b981" stroke-width="2.5"/>
    <circle cx="45" cy="45" r="8" fill="none" stroke="#10b981" stroke-width="2"/>
    <line x1="45" y1="18" x2="45" y2="10" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="45" y1="72" x2="45" y2="80" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="45" x2="10" y2="45" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="72" y1="45" x2="80" y2="45" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="26" y1="26" x2="20" y2="20" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="64" x2="70" y2="70" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
