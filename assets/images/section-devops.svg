  <text x="140" y="85" fill="#f8fafc" font-family="Arial, sans-serif" font-size="26" font-weight="bold">DevOps, CI/CD &amp; Platform Engineering</text>
  <text x="140" y="115" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">Automation | Monitoring | Container | IaC</text>
