<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>2026 03 29 Tech Security Weekly Digest Ransomware LLM</title>
  <defs>
    <style>
      .title-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; fill: white; letter-spacing: -0.5px; }
      .date-badge { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 600; font-size: 11px; fill: #f59e0b; text-transform: uppercase; }
      .tag-pill { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 500; font-size: 12px; fill: white; }
      .footer-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 500; font-size: 13px; fill: #9ca3af; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="rgba(245, 158, 11, 0.4)"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(59, 130, 246, 0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE: Text Content -->
  <text x="80" y="60" class="date-badge">MARCH 29, 2026</text>

  <!-- Main title -->
  <text x="60" y="220" class="title-text" font-size="44">Tech Security</text>
  <text x="60" y="280" class="title-text" font-size="44">Weekly Digest</text>
  <text x="60" y="340" class="title-text" font-size="38" fill="#ef4444">Ransomware &amp; LLM</text>

  <!-- Tag pills -->
  <g id="tag1">
    <rect x="60" y="410" width="140" height="36" rx="18" fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" stroke-width="1"/>
    <text x="130" y="433" class="tag-pill" text-anchor="middle">Ransomware</text>
  </g>

  <g id="tag2">
    <rect x="210" y="410" width="120" height="36" rx="18" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1"/>
    <text x="270" y="433" class="tag-pill" text-anchor="middle">AI/LLM</text>
  </g>

  <g id="tag3">
    <rect x="340" y="410" width="140" height="36" rx="18" fill="rgba(245, 158, 11, 0.15)" stroke="#f59e0b" stroke-width="1"/>
    <text x="410" y="433" class="tag-pill" text-anchor="middle">Security</text>
  </g>

  <!-- Footer -->
  <text x="60" y="575" class="footer-text">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: Visual Scene -->

  <!-- Background accent circle for visual balance -->
  <circle cx="900" cy="300" r="180" fill="rgba(59, 130, 246, 0.05)" stroke="rgba(59, 130, 246, 0.1)" stroke-width="1"/>

  <!-- PADLOCK with chains (left element, ransomware symbol) -->
  <g id="padlock">
    <!-- Chains above lock -->
    <g stroke="rgba(239, 68, 68, 0.35)" stroke-width="2.5" fill="none">
      <!-- Left chain -->
      <circle cx="720" cy="150" r="12" opacity="0.8"/>
      <circle cx="720" cy="130" r="12" opacity="0.8"/>
      <line x1="720" y1="162" x2="720" y2="220"/>
      <!-- Right chain -->
      <circle cx="790" cy="150" r="12" opacity="0.8"/>
      <circle cx="790" cy="130" r="12" opacity="0.8"/>
      <line x1="790" y1="162" x2="790" y2="220"/>
    </g>

    <!-- Padlock body -->
    <g fill="rgba(239, 68, 68, 0.1)" stroke="#ef4444" stroke-width="2.5">
      <!-- Shackle (curved top) -->
      <path d="M 720 220 Q 720 170 755 170 Q 790 170 790 220" fill="none"/>
      <!-- Lock body -->
      <rect x="710" y="220" width="80" height="70" rx="5"/>
    </g>

    <!-- Keyhole detail -->
    <circle cx="750" cy="260" r="6" fill="rgba(239, 68, 68, 0.2)" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="750" cy="270" r="4" fill="rgba(239, 68, 68, 0.2)" stroke="#ef4444" stroke-width="1"/>
  </g>

  <!-- BRAIN with neural lines (center element, AI/LLM symbol) -->
  <g id="brain">
    <!-- Brain silhouette -->
    <g fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="2.5">
      <ellipse cx="900" cy="280" rx="45" ry="55"/>
      <!-- Brain ridges (bumps) -->
      <path d="M 870 250 Q 860 240 870 230" fill="none"/>
      <path d="M 900 220 Q 910 210 920 220" fill="none"/>
      <path d="M 930 245 Q 945 235 950 250" fill="none"/>
      <path d="M 920 310 Q 935 320 930 335" fill="none"/>
      <path d="M 870 320 Q 860 330 870 340" fill="none"/>
    </g>

    <!-- Neural connections inside -->
    <g stroke="rgba(59, 130, 246, 0.25)" stroke-width="1.5" fill="none">
      <circle cx="880" cy="270" r="8" opacity="0.6"/>
      <circle cx="910" cy="265" r="6" opacity="0.6"/>
      <circle cx="920" cy="295" r="7" opacity="0.6"/>
      <circle cx="885" cy="305" r="6" opacity="0.6"/>
      <line x1="880" y1="270" x2="910" y2="265"/>
      <line x1="910" y1="265" x2="920" y2="295"/>
      <line x1="920" y1="295" x2="885" y2="305"/>
      <line x1="885" y1="305" x2="880" y2="270"/>
      <line x1="910" y1="265" x2="885" y2="305"/>
    </g>
  </g>

  <!-- SHIELD with checkmark (right element, security/compliance symbol) -->
  <g id="shield">
    <!-- Shield outline -->
    <g fill="rgba(34, 197, 94, 0.08)" stroke="#3b82f6" stroke-width="2.5">
      <path d="M 1060 140 L 1060 240 Q 1060 290 1095 330 Q 1130 290 1130 240 L 1130 140 Z"/>
    </g>

    <!-- Checkmark inside shield -->
    <g stroke="rgba(34, 197, 94, 0.5)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1080,250 1095,270 1115,220"/>
    </g>

    <!-- Shield accent glow -->
    <path d="M 1060 140 L 1060 240 Q 1060 290 1095 330 Q 1130 290 1130 240 L 1130 140 Z" fill="none" stroke="rgba(59, 130, 246, 0.15)" stroke-width="1"/>
  </g>

  <!-- DATA FLOW ARROWS -->
  <g stroke="rgba(245, 158, 11, 0.3)" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <!-- Padlock → Brain -->
    <path d="M 800 260 Q 840 250 860 270"/>
    <!-- Brain → Shield -->
    <path d="M 945 290 Q 990 300 1040 290"/>
    <!-- Shield → Padlock (feedback loop) -->
    <path d="M 1070 190 Q 900 150 800 200"/>
  </g>

  <!-- WARNING TRIANGLES / ALERT INDICATORS -->
  <g id="warning-signs">
    <!-- Top-left warning -->
    <g opacity="0.7">
      <polygon points="680,110 700,80 720,110" fill="none" stroke="rgba(239, 68, 68, 0.4)" stroke-width="1.5"/>
      <line x1="700" y1="90" x2="700" y2="100" stroke="rgba(239, 68, 68, 0.5)" stroke-width="1"/>
      <circle cx="700" cy="107" r="1.5" fill="rgba(239, 68, 68, 0.5)"/>
    </g>

    <!-- Top-right warning -->
    <g opacity="0.7">
      <polygon points="1020,120 1040,90 1060,120" fill="none" stroke="rgba(239, 68, 68, 0.4)" stroke-width="1.5"/>
      <line x1="1040" y1="100" x2="1040" y2="110" stroke="rgba(239, 68, 68, 0.5)" stroke-width="1"/>
      <circle cx="1040" cy="117" r="1.5" fill="rgba(239, 68, 68, 0.5)"/>
    </g>

    <!-- Bottom warning -->
    <g opacity="0.7">
      <polygon points="850,480 870,450 890,480" fill="none" stroke="rgba(245, 158, 11, 0.4)" stroke-width="1.5"/>
      <line x1="870" y1="460" x2="870" y2="470" stroke="rgba(245, 158, 11, 0.5)" stroke-width="1"/>
      <circle cx="870" cy="477" r="1.5" fill="rgba(245, 158, 11, 0.5)"/>
    </g>
  </g>

  <!-- Decorative data particles -->
  <g fill="rgba(59, 130, 246, 0.15)" opacity="0.6">
    <circle cx="720" cy="360" r="3"/>
    <circle cx="800" cy="400" r="2.5"/>
    <circle cx="920" cy="350" r="2.5"/>
    <circle cx="1050" cy="380" r="3"/>
    <circle cx="880" cy="420" r="2"/>
  </g>

  <!-- Subtle grid pattern in background right -->
  <rect x="650" y="80" width="500" height="470" fill="url(#grid)" opacity="0.5"/>
</svg>