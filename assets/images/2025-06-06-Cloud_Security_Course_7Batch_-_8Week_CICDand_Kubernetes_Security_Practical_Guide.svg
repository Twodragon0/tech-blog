<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="tagRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="tagAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="tagBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Kubernetes + CI/CD + Cloud Security -->
  <!-- Outer ring - cluster boundary -->
  <circle cx="1010" cy="225" r="115" fill="none" stroke="rgba(59,130,246,0.25)" stroke-width="1.5" stroke-dasharray="8 4"/>
  <circle cx="1010" cy="225" r="95" fill="rgba(59,130,246,0.04)" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>

  <!-- Kubernetes hexagon (center) -->
  <polygon points="1010,160 1058,187 1058,243 1010,270 962,243 962,187" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
  <!-- K8s spokes -->
  <line x1="1010" y1="160" x2="1010" y2="140" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <line x1="1058" y1="187" x2="1075" y2="177" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <line x1="1058" y1="243" x2="1075" y2="253" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <line x1="1010" y1="270" x2="1010" y2="290" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <line x1="962" y1="243" x2="945" y2="253" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <line x1="962" y1="187" x2="945" y2="177" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <!-- K8s center dot -->
  <circle cx="1010" cy="215" r="22" fill="rgba(59,130,246,0.12)" stroke="rgba(99,179,237,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="215" r="10" fill="rgba(59,130,246,0.2)" stroke="rgba(147,210,255,0.5)" stroke-width="1"/>

  <!-- Pod nodes around the hexagon -->
  <circle cx="1010" cy="135" r="9" fill="rgba(99,179,237,0.15)" stroke="rgba(99,179,237,0.45)" stroke-width="1.2"/>
  <circle cx="1080" cy="172" r="9" fill="rgba(99,179,237,0.15)" stroke="rgba(99,179,237,0.45)" stroke-width="1.2"/>
  <circle cx="1080" cy="258" r="9" fill="rgba(139,92,246,0.15)" stroke="rgba(167,139,250,0.45)" stroke-width="1.2"/>
  <circle cx="1010" cy="295" r="9" fill="rgba(139,92,246,0.15)" stroke="rgba(167,139,250,0.45)" stroke-width="1.2"/>
  <circle cx="940" cy="258" r="9" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.45)" stroke-width="1.2"/>
  <circle cx="940" cy="172" r="9" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.45)" stroke-width="1.2"/>

  <!-- CI/CD pipeline arrow flow (top-right area) -->
  <rect x="880" y="130" width="42" height="24" rx="4" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="901" y="146" font-size="8" fill="rgba(52,211,153,0.7)" text-anchor="middle" font-family="monospace">CI</text>
  <line x1="922" y1="142" x2="938" y2="142" stroke="rgba(52,211,153,0.35)" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
  <rect x="939" y="130" width="42" height="24" rx="4" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
  <text x="960" y="146" font-size="8" fill="rgba(167,139,250,0.7)" text-anchor="middle" font-family="monospace">CD</text>

  <!-- Shield icon for security (lower right) -->
  <path d="M1080,310 L1100,318 L1100,338 Q1100,350 1080,358 Q1060,350 1060,338 L1060,318 Z" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)" stroke-width="1.2"/>
  <path d="M1073,335 L1078,340 L1088,328" fill="none" stroke="rgba(239,68,68,0.45)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cloud shape (background) -->
  <circle cx="888" cy="305" r="20" fill="rgba(99,179,237,0.06)" stroke="rgba(99,179,237,0.2)" stroke-width="1"/>
  <circle cx="905" cy="298" r="25" fill="rgba(99,179,237,0.06)" stroke="rgba(99,179,237,0.2)" stroke-width="1"/>
  <circle cx="925" cy="305" r="20" fill="rgba(99,179,237,0.06)" stroke="rgba(99,179,237,0.2)" stroke-width="1"/>
  <rect x="880" y="305" width="60" height="20" rx="0" fill="rgba(99,179,237,0.06)"/>
  <!-- Lock on cloud -->
  <rect x="904" y="306" width="10" height="8" rx="1" fill="none" stroke="rgba(99,179,237,0.4)" stroke-width="1"/>
  <path d="M906,306 Q906,302 909,302 Q912,302 912,306" fill="none" stroke="rgba(99,179,237,0.4)" stroke-width="1"/>
  <circle cx="909" cy="310" r="1.5" fill="rgba(99,179,237,0.5)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(239,68,68,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(251,191,36,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(52,211,153,0.7)"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-size="13" fill="rgba(147,210,255,0.9)" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="1">JUNE 6, 2025</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="-0.5">Cloud Security Course 7Batch</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="-0.5">8Week CI/CD And Kubernetes</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(148,163,184,0.85)" font-family="'Segoe UI', Arial, sans-serif">Kubernetes Cluster Deployment · CI/CD Pipeline · Cloud Security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(99,179,237,0.7)" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="2" font-weight="600">KUBERNETES · DEVSECOPS · CI/CD</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="url(#tagRed)" stroke="rgba(239,68,68,0.35)" stroke-width="1"/>
  <text x="145" y="425" font-size="13" fill="rgba(252,165,165,0.95)" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">Kubernetes</text>

  <rect x="224" y="402" width="110" height="36" rx="18" fill="url(#tagAmber)" stroke="rgba(251,191,36,0.35)" stroke-width="1"/>
  <text x="279" y="425" font-size="13" fill="rgba(253,230,138,0.95)" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">CI / CD</text>

  <rect x="348" y="402" width="130" height="36" rx="18" fill="url(#tagBlue)" stroke="rgba(59,130,246,0.35)" stroke-width="1"/>
  <text x="413" y="425" font-size="13" fill="rgba(147,210,255,0.95)" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">Cloud Security</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="14" fill="rgba(148,163,184,0.5)" font-family="'Segoe UI', Arial, sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="14" fill="rgba(148,163,184,0.5)" font-family="'Segoe UI', Arial, sans-serif" text-anchor="end">kubernetes</text>
</svg>