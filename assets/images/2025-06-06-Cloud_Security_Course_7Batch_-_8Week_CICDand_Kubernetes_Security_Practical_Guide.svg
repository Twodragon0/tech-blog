<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security 7th Week 8 CICD and K8s Security</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1a0a"/>
      <stop offset="100%" stop-color="#1a3015"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- CI/CD pipeline stages -->
  <!-- Stage 1: Code -->
  <rect x="845" y="210" width="65" height="45" rx="6" fill="rgba(39,174,96,0.2)" stroke="rgba(39,174,96,0.6)" stroke-width="2"/>
  <!-- Arrow -->
  <line x1="910" y1="232" x2="928" y2="232" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M924 227 L934 232 L924 237" fill="rgba(255,255,255,0.3)"/>
  <!-- Stage 2: Build -->
  <rect x="930" y="210" width="65" height="45" rx="6" fill="rgba(41,128,185,0.2)" stroke="rgba(41,128,185,0.6)" stroke-width="2"/>
  <!-- Arrow -->
  <line x1="995" y1="232" x2="1013" y2="232" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M1009 227 L1019 232 L1009 237" fill="rgba(255,255,255,0.3)"/>
  <!-- Stage 3: Security Gate (highlighted) -->
  <rect x="1015" y="205" width="75" height="55" rx="6" fill="rgba(231,76,60,0.2)" stroke="rgba(231,76,60,0.65)" stroke-width="2.5"/>
  <!-- Arrow -->
  <line x1="1090" y1="232" x2="1108" y2="232" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M1104 227 L1114 232 L1104 237" fill="rgba(255,255,255,0.3)"/>
  <!-- Stage 4: Deploy -->
  <rect x="1110" y="210" width="65" height="45" rx="6" fill="rgba(39,174,96,0.2)" stroke="rgba(39,174,96,0.55)" stroke-width="2"/>
  <!-- K8s pod below pipeline -->
  <!-- Kubernetes wheel small -->
  <circle cx="990" cy="360" r="48" fill="none" stroke="rgba(50,108,229,0.55)" stroke-width="2.5"/>
  <circle cx="990" cy="360" r="20" fill="none" stroke="rgba(50,108,229,0.6)" stroke-width="2.5"/>
  <line x1="990" y1="312" x2="990" y2="340" stroke="rgba(50,108,229,0.55)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="990" y1="380" x2="990" y2="408" stroke="rgba(50,108,229,0.55)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="948" y1="336" x2="972" y2="350" stroke="rgba(50,108,229,0.55)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="1008" y1="370" x2="1032" y2="384" stroke="rgba(50,108,229,0.55)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="948" y1="384" x2="972" y2="370" stroke="rgba(50,108,229,0.55)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="1008" y1="350" x2="1032" y2="336" stroke="rgba(50,108,229,0.55)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Policy shield overlay -->
  <path d="M1090 335 L1130 347 L1130 378 Q1130 400 1090 412 Q1050 400 1050 378 L1050 347 Z" fill="none" stroke="rgba(39,174,96,0.65)" stroke-width="2.5"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="190" height="32" rx="4" fill="rgba(39,174,96,0.2)" stroke="rgba(39,174,96,0.4)" stroke-width="1"/>
  <text x="175" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">JUNE 6, 2025</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Cloud Security 7th</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="-1">Week 8: CI/CD &amp; K8s</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">Pipeline Security Gates and Kubernetes Hardening</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">CLOUD SECURITY COURSE</text>
  <!-- Tags -->
  <rect x="80" y="420" width="90" height="36" rx="18" fill="rgba(39,174,96,0.18)" stroke="rgba(39,174,96,0.4)" stroke-width="1"/>
  <text x="125" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#27ae60" text-anchor="middle" font-weight="600">CI/CD</text>
  <rect x="186" y="420" width="120" height="36" rx="18" fill="rgba(41,128,185,0.18)" stroke="rgba(41,128,185,0.4)" stroke-width="1"/>
  <text x="246" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#2980b9" text-anchor="middle" font-weight="600">K8s Security</text>
  <rect x="322" y="420" width="90" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="367" y="443" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">Week 8</text>
  <!-- Bottom -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
