<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Dec Conference Review - AWSKRUG, OWASP, Datadog</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1020"/>
      <stop offset="100%" stop-color="#1a1a40"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="450" r="200" fill="#4285f4" opacity="0.05" filter="url(#sg)"/>
  <circle cx="1050" cy="450" r="140" fill="#f39c12" opacity="0.05" filter="url(#sg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Topic illustrations: Conference podium with multiple brand logos outlined -->
  <g transform="translate(940,290)" opacity="0.38">
    <!-- Conference stage/podium -->
    <rect x="-160" y="60" width="320" height="50" rx="5" fill="#4285f4" opacity="0.15" stroke="#4285f4" stroke-width="1.5"/>
    <!-- Podium stand -->
    <polygon points="-15,60 15,60 10,110 -10,110" fill="#4285f4" opacity="0.2"/>
    <!-- Podium face -->
    <rect x="-20" y="20" width="40" height="40" rx="4" fill="#4285f4" opacity="0.2" stroke="#4285f4" stroke-width="1.5"/>
    <!-- Microphone on podium -->
    <rect x="-3" y="10" width="6" height="14" rx="3" fill="none" stroke="#7eb8f5" stroke-width="1.5"/>
    <path d="M-8,18 Q-8,26 0,26 Q8,26 8,18" fill="none" stroke="#7eb8f5" stroke-width="1.5"/>
    <line x1="0" y1="26" x2="0" y2="36" stroke="#7eb8f5" stroke-width="1.5"/>
    <!-- Presentation screen/banner -->
    <rect x="-155" y="-110" width="310" height="160" rx="8" fill="none" stroke="#4285f4" stroke-width="2"/>
    <!-- AWS KRUG logo area -->
    <rect x="-145" y="-100" width="90" height="45" rx="5" fill="#ff9900" opacity="0.1" stroke="#ff9900" stroke-width="1.5"/>
    <!-- OWASP logo area -->
    <rect x="-45" y="-100" width="90" height="45" rx="5" fill="#4285f4" opacity="0.1" stroke="#4285f4" stroke-width="1.5"/>
    <!-- Datadog logo area -->
    <rect x="55" y="-100" width="90" height="45" rx="5" fill="#632ca6" opacity="0.1" stroke="#632ca6" stroke-width="1.5"/>
    <!-- AI Security label below logos -->
    <rect x="-145" y="-45" width="290" height="30" rx="5" fill="#f39c12" opacity="0.1" stroke="#f39c12" stroke-width="1"/>
    <!-- Speaker silhouette -->
    <circle cx="0" cy="-5" r="12" fill="#4285f4" opacity="0.3"/>
    <path d="M-15,15 L0,7 L15,15 L15,55 L-15,55 Z" fill="#4285f4" opacity="0.2"/>
  </g>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="40" y="38" width="260" height="34" rx="17" fill="#4285f4" opacity="0.15" stroke="#4285f4" stroke-width="1"/>
  <text x="80" y="60" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#4285f4">DECEMBER 17, 2025</text>
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#ffffff" filter="url(#glow)">Dec Conference Review -</text>
  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#f39c12" filter="url(#glow)">AWSKRUG, OWASP, Datadog</text>
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="#94a3b8">2025 year-end conference highlights: AI &amp; Security coexistence insights</text>
  <line x1="80" y1="325" x2="560" y2="325" stroke="#4285f4" stroke-width="2" opacity="0.6"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#f39c12" letter-spacing="3">CONFERENCE REVIEW</text>
  <rect x="80" y="398" width="100" height="32" rx="16" fill="#ff9900" opacity="0.15" stroke="#ff9900" stroke-width="1"/>
  <text x="130" y="419" font-family="Arial,sans-serif" font-size="13" fill="#ffbf60" text-anchor="middle">AWSKRUG</text>
  <rect x="194" y="398" width="80" height="32" rx="16" fill="#4285f4" opacity="0.15" stroke="#4285f4" stroke-width="1"/>
  <text x="234" y="419" font-family="Arial,sans-serif" font-size="13" fill="#90b8f8" text-anchor="middle">OWASP</text>
  <rect x="288" y="398" width="90" height="32" rx="16" fill="#632ca6" opacity="0.15" stroke="#632ca6" stroke-width="1"/>
  <text x="333" y="419" font-family="Arial,sans-serif" font-size="13" fill="#c090e8" text-anchor="middle">Datadog</text>
  <rect x="0" y="520" width="1200" height="110" fill="#000000" opacity="0.25"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#4285f4" stroke-width="1" opacity="0.3"/>
  <text x="80" y="566" font-family="Arial,sans-serif" font-size="14" fill="#64748b">tech.2twodragon.com</text>
  <text x="80" y="592" font-family="Arial,sans-serif" font-size="13" fill="#475569">DevSecOps</text>
</svg>
