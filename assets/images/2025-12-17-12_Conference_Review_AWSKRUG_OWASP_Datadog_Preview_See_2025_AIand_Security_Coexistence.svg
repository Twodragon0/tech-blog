  <rect x="800" y="210" width="340" height="270" rx="16" fill="url(#card3Grad)" stroke="#200a3a" stroke-width="1.5" filter="url(#shadowCard)" />
  <rect x="800" y="210" width="340" height="4" rx="2" fill="url(#iconGrad3)" />

