<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Kubernetes Security, Supply Chain and AI Agent Threats</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e1a"/>
      <stop offset="50%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="200" cy="300" r="250" fill="#3b82f6" opacity="0.04" filter="url(#sg)"/>
  <circle cx="600" cy="250" r="200" fill="#06b6d4" opacity="0.04" filter="url(#sg)"/>
  <circle cx="1000" cy="300" r="250" fill="#8b5cf6" opacity="0.04" filter="url(#sg)"/>

  <!-- Kubernetes wheel icon -->
  <g transform="translate(200,280)">
    <circle r="60" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
    <circle r="15" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.6"/>
    <line x1="0" y1="-18" x2="0" y2="-55" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="15.6" y1="9" x2="47.6" y2="27.5" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="-15.6" y1="9" x2="-47.6" y2="27.5" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="15.6" y1="-9" x2="47.6" y2="-27.5" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="-15.6" y1="-9" x2="-47.6" y2="-27.5" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <line x1="0" y1="18" x2="0" y2="55" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="-55" r="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="47.6" cy="27.5" r="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="-47.6" cy="27.5" r="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="47.6" cy="-27.5" r="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="-47.6" cy="-27.5" r="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="0" cy="55" r="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text y="4" font-family="monospace" font-size="10" fill="#3b82f6" text-anchor="middle" font-weight="bold">K8s</text>
  </g>

  <!-- Supply chain links -->
  <g transform="translate(600,280)">
    <rect x="-70" y="-30" width="140" height="60" rx="12" fill="#0f172a" stroke="#06b6d4" stroke-width="2.5"/>
    <text font-family="monospace" font-size="12" fill="#06b6d4" text-anchor="middle">
      <tspan x="0" y="-5" font-weight="bold">SLSA + SBOM</tspan>
      <tspan x="0" y="15" font-size="10" opacity="0.7">Supply Chain</tspan>
    </text>
    <rect x="-120" y="-55" width="50" height="30" rx="6" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <text x="-95" y="-35" font-family="monospace" font-size="9" fill="#06b6d4" text-anchor="middle" opacity="0.7">Build</text>
    <rect x="70" y="-55" width="50" height="30" rx="6" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <text x="95" y="-35" font-family="monospace" font-size="9" fill="#06b6d4" text-anchor="middle" opacity="0.7">Verify</text>
    <line x1="-70" y1="-40" x2="-55" y2="-30" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <line x1="70" y1="-40" x2="55" y2="-30" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- AI Agent shield -->
  <g transform="translate(1000,280)">
    <path d="M0,-60 L50,-35 L50,15 L0,50 L-50,15 L-50,-35 Z" fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.5"/>
    <path d="M0,-40 L35,-22 L35,10 L0,35 L-35,10 L-35,-22 Z" fill="#8b5cf6" opacity="0.08"/>
    <text font-family="monospace" font-size="11" fill="#8b5cf6" text-anchor="middle">
      <tspan x="0" y="-5" font-weight="bold">AI Agent</tspan>
      <tspan x="0" y="12" font-size="10" opacity="0.7">Defense</tspan>
    </text>
  </g>

  <!-- Connecting lines -->
  <line x1="280" y1="280" x2="510" y2="280" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.3"/>
  <line x1="690" y1="280" x2="930" y2="280" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="85" font-family="Arial,sans-serif" font-size="32" fill="#e2e8f0" text-anchor="middle" font-weight="bold" filter="url(#glow)">Tech Security Weekly Digest</text>
  <text x="600" y="125" font-family="Arial,sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Kubernetes | Supply Chain | AI Agent Security</text>

  <!-- Date badge -->
  <rect x="490" y="140" width="220" height="30" rx="15" fill="#1e293b" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <text x="600" y="161" font-family="monospace" font-size="14" fill="#60a5fa" text-anchor="middle">2026-03-26</text>

  <!-- Bottom tags -->
  <g transform="translate(600,560)">
    <rect x="-280" y="-15" width="80" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
    <text x="-240" y="4" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">RBAC</text>
    <rect x="-170" y="-15" width="80" height="28" rx="14" fill="#134e4a" opacity="0.6"/>
    <text x="-130" y="4" font-family="monospace" font-size="11" fill="#5eead4" text-anchor="middle">Cilium</text>
    <rect x="-60" y="-15" width="80" height="28" rx="14" fill="#312e81" opacity="0.6"/>
    <text x="-20" y="4" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">eBPF</text>
    <rect x="50" y="-15" width="100" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
    <text x="100" y="4" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">Dependabot</text>
    <rect x="180" y="-15" width="100" height="28" rx="14" fill="#134e4a" opacity="0.6"/>
    <text x="230" y="4" font-family="monospace" font-size="11" fill="#5eead4" text-anchor="middle">Prompt Sec</text>
  </g>
</svg>