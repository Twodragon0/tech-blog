<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(99,102,241,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(168,85,247,0.07)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Kubernetes + Supply Chain + AI -->
  <!-- Kubernetes hexagon cluster -->
  <g transform="translate(1010, 225)">
    <!-- Central Kubernetes wheel -->
    <circle cx="0" cy="0" r="72" fill="rgba(99,102,241,0.07)" stroke="rgba(99,102,241,0.30)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="48" fill="rgba(99,102,241,0.09)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
    <circle cx="0" cy="0" r="22" fill="rgba(168,85,247,0.13)" stroke="rgba(168,85,247,0.35)" stroke-width="1.5"/>
    <!-- Kubernetes spokes (7 spokes) -->
    <line x1="0" y1="-48" x2="0" y2="-22" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <line x1="45.8" y1="-14.8" x2="20.9" y2="-6.8" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <line x1="28.3" y1="38.8" x2="12.9" y2="17.7" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <line x1="-28.3" y1="38.8" x2="-12.9" y2="17.7" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <line x1="-45.8" y1="-14.8" x2="-20.9" y2="-6.8" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <line x1="0" y1="48" x2="0" y2="22" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <line x1="45.8" y1="14.8" x2="20.9" y2="6.8" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <!-- Pod circles on outer ring -->
    <circle cx="0" cy="-72" r="9" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <circle cx="62.3" cy="-36" r="9" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <circle cx="62.3" cy="36" r="9" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.35)" stroke-width="1.5"/>
    <circle cx="0" cy="72" r="9" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <circle cx="-62.3" cy="36" r="9" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.35)" stroke-width="1.5"/>
    <circle cx="-62.3" cy="-36" r="9" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.40)" stroke-width="1.5"/>
    <!-- Supply chain nodes -->
    <circle cx="115" cy="-55" r="14" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.30)" stroke-width="1"/>
    <line x1="72" y1="-36" x2="102" y2="-50" stroke="rgba(239,68,68,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="120" cy="60" r="14" fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.30)" stroke-width="1"/>
    <line x1="72" y1="36" x2="107" y2="54" stroke="rgba(245,158,11,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="-115" cy="-55" r="14" fill="rgba(16,185,129,0.10)" stroke="rgba(16,185,129,0.28)" stroke-width="1"/>
    <line x1="-72" y1="-36" x2="-102" y2="-50" stroke="rgba(16,185,129,0.22)" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- AI neural net overlay (top right) -->
    <circle cx="95" cy="-110" r="7" fill="rgba(168,85,247,0.12)" stroke="rgba(168,85,247,0.35)" stroke-width="1"/>
    <circle cx="118" cy="-90" r="7" fill="rgba(168,85,247,0.12)" stroke="rgba(168,85,247,0.35)" stroke-width="1"/>
    <circle cx="106" cy="-70" r="7" fill="rgba(168,85,247,0.12)" stroke="rgba(168,85,247,0.35)" stroke-width="1"/>
    <line x1="95" y1="-110" x2="118" y2="-90" stroke="rgba(168,85,247,0.22)" stroke-width="1"/>
    <line x1="118" y1="-90" x2="106" y2="-70" stroke="rgba(168,85,247,0.22)" stroke-width="1"/>
    <line x1="95" y1="-110" x2="106" y2="-70" stroke="rgba(168,85,247,0.18)" stroke-width="1"/>
    <!-- Shield overlay (supply chain security) -->
    <path d="M -10 -12 L 0 -16 L 10 -12 L 10 -3 Q 10 4 0 8 Q -10 4 -10 -3 Z" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="rgba(168,85,247,0.55)" filter="url(#glow)"/>
  </g>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(239,68,68,0.75)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(245,158,11,0.75)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(99,102,241,0.75)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(99,102,241,0.35)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(168,85,247,0.90)" text-anchor="middle" letter-spacing="1.5">MARCH 26, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Kubernetes Supply Chain AI</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(196,181,253,0.80)">Cluster security, dependency risks &amp; AI-driven threats</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(99,102,241,0.90)" letter-spacing="2">SECURITY · DEVOPS · AI</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.40)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(252,165,165,0.95)" text-anchor="middle">Kubernetes</text>

  <rect x="225" y="402" width="140" height="36" rx="18" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.40)" stroke-width="1"/>
  <text x="295" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(253,230,138,0.95)" text-anchor="middle">Supply Chain</text>

  <rect x="380" y="402" width="110" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.40)" stroke-width="1"/>
  <text x="435" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(196,181,253,0.95)" text-anchor="middle">AI Threat</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="end" letter-spacing="0.5">SECURITY</text>
</svg>