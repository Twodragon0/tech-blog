    <rect x="40" y="192" width="175" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3: Kubernetes RBAC -->
  <g transform="translate(660, 340)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(110, 12)">
      <!-- K8s wheel -->
      <circle cx="50" cy="50" r="35" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.7" />
      <circle cx="50" cy="50" r="12" fill="#3b82f6" opacity="0.2" />
      <circle cx="50" cy="50" r="5" fill="#3b82f6" opacity="0.5" />
      <line x1="50" y1="15" x2="50" y2="30" stroke="#3b82f6" stroke-width="2.5" opacity="0.6" stroke-linecap="round" />
      <line x1="50" y1="70" x2="50" y2="85" stroke="#3b82f6" stroke-width="2.5" opacity="0.6" stroke-linecap="round" />
      <line x1="15" y1="50" x2="30" y2="50" stroke="#3b82f6" stroke-width="2.5" opacity="0.6" stroke-linecap="round" />
      <line x1="70" y1="50" x2="85" y2="50" stroke="#3b82f6" stroke-width="2.5" opacity="0.6" stroke-linecap="round" />
      <line x1="25" y1="25" x2="36" y2="36" stroke="#3b82f6" stroke-width="2" opacity="0.5" stroke-linecap="round" />
      <line x1="64" y1="64" x2="75" y2="75" stroke="#3b82f6" stroke-width="2" opacity="0.5" stroke-linecap="round" />
      <line x1="75" y1="25" x2="64" y2="36" stroke="#3b82f6" stroke-width="2" opacity="0.5" stroke-linecap="round" />
      <line x1="36" y1="64" x2="25" y2="75" stroke="#3b82f6" stroke-width="2" opacity="0.5" stroke-linecap="round" />
      <!-- RBAC warning -->
      <circle cx="78" cy="22" r="10" fill="#ef4444" opacity="0.2" />
      <text x="78" y="26" text-anchor="middle" fill="#ef4444" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="900">!</text>
      <rect x="12" y="96" width="76" height="16" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4" />
      <text x="50" y="108" text-anchor="middle" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">K8S RBAC</text>
    </g>
    <g transform="translate(40, 195)">
      <rect width="240" height="28" rx="6" fill="#1e293b" opacity="0.8" />
      <circle cx="18" cy="14" r="5" fill="#ef4444" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="720" cy="280" r="2" fill="#3b82f6" opacity="0.5">
    <animate attributeName="cy" values="280;270;280" dur="3s" repeatCount="indefinite" />
