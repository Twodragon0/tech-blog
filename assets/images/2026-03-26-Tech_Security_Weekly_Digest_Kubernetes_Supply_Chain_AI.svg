<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Define markers for arrows -->
  <defs>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.15"/>
    </marker>
  </defs>
  
  <!-- LEFT SIDE: Text Content -->
  <!-- Date Badge -->
  <rect x="50" y="45" width="200" height="38" rx="5" fill="#1f2937" stroke="#3b82f6" stroke-width="1.2" opacity="0.9"/>
  <text x="150" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">MARCH 26, 2026</text>
  
  <!-- Main Titles -->
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Tech Security Weekly</text>
  <text x="80" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Digest Kubernetes Supply</text>
  
  <!-- Tag Pills at y=430 -->
  <g>
    <!-- Tag 1: Security -->
    <rect x="80" y="415" width="100" height="32" rx="16" fill="#1f2937" stroke="#ef4444" stroke-width="1.2" opacity="0.85"/>
    <text x="130" y="437" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Security</text>
    
    <!-- Tag 2: Kubernetes -->
    <rect x="195" y="415" width="110" height="32" rx="16" fill="#1f2937" stroke="#f59e0b" stroke-width="1.2" opacity="0.85"/>
    <text x="250" y="437" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Kubernetes</text>
    
    <!-- Tag 3: Supply Chain -->
    <rect x="320" y="415" width="120" height="32" rx="16" fill="#1f2937" stroke="#3b82f6" stroke-width="1.2" opacity="0.85"/>
    <text x="380" y="437" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Supply Chain</text>
  </g>
  
  <!-- Footer URL -->
  <text x="80" y="578" font-family="Arial, sans-serif" font-size="13" fill="#6b7280" font-weight="500">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE: Visual Scene (x=650-1150, y=80-550) -->
  
  <!-- Hexagonal Kubernetes Pods -->
  <!-- Helper function for hexagon: center at (cx, cy), size s -->
  
  <!-- Pod 1: Top Left -->
  <polygon points="760,140 790,125 820,140 820,170 790,185 760,170" 
           fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.3"/>
  
  <!-- Pod 2: Top Right -->
  <polygon points="950,130 980,115 1010,130 1010,160 980,175 950,160" 
           fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.3"/>
  
  <!-- Pod 3: Center (larger) -->
  <polygon points="850,280 890,260 930,280 930,320 890,340 850,320" 
           fill="#3b82f6" opacity="0.10" stroke="#3b82f6" stroke-width="0.35"/>
  
  <!-- Pod 4: Bottom Left -->
  <polygon points="730,410 760,395 790,410 790,440 760,455 730,440" 
           fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.3"/>
  
  <!-- Pod 5: Bottom Right -->
  <polygon points="980,400 1010,385 1040,400 1040,430 1010,445 980,430" 
           fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.3"/>
  
  <!-- Connection Lines Between Pods -->
  <line x1="820" y1="155" x2="890" y2="260" stroke="#3b82f6" stroke-width="0.25" opacity="0.12"/>
  <line x1="950" y1="160" x2="890" y2="260" stroke="#3b82f6" stroke-width="0.25" opacity="0.12"/>
  <line x1="850" y1="320" x2="760" y2="395" stroke="#3b82f6" stroke-width="0.25" opacity="0.12"/>
  <line x1="930" y1="320" x2="1010" y2="385" stroke="#3b82f6" stroke-width="0.25" opacity="0.12"/>
  
  <!-- Data Flow Arrows -->
  <path d="M 820 155 L 890 240" stroke="#f59e0b" stroke-width="0.8" fill="none" opacity="0.11" marker-end="url(#arrow-orange)"/>
  <path d="M 1010 160 L 900 270" stroke="#f59e0b" stroke-width="0.8" fill="none" opacity="0.11" marker-end="url(#arrow-orange)"/>
  <path d="M 880 330 L 770 390" stroke="#f59e0b" stroke-width="0.8" fill="none" opacity="0.11" marker-end="url(#arrow-orange)"/>
  <path d="M 900 330 L 1000 380" stroke="#f59e0b" stroke-width="0.8" fill="none" opacity="0.11" marker-end="url(#arrow-orange)"/>
  
  <!-- Broken Chain Link (Supply Chain Attack Indicator) -->
  <!-- Chain link 1 -->
  <circle cx="1090" cy="200" r="11" fill="none" stroke="#ef4444" stroke-width="0.9" opacity="0.12"/>
  <!-- Chain link 2 (broken) -->
  <circle cx="1110" cy="200" r="11" fill="none" stroke="#ef4444" stroke-width="0.9" opacity="0.12"/>
  <!-- Break indicator - gap and break marks -->
  <line x1="1102" y1="200" x2="1097" y2="200" stroke="#ef4444" stroke-width="1.2" opacity="0.13"/>
  <line x1="1115" y1="190" x2="1125" y2="210" stroke="#ef4444" stroke-width="1.4" opacity="0.14"/>
  
  <!-- Large Security Shield with Checkmark -->
  <!-- Shield outline -->
  <path d="M 750 300 L 750 340 Q 750 380 785 410 Q 820 380 820 340 L 820 300 Z" 
        fill="none" stroke="#10b981" stroke-width="1.1" opacity="0.12"/>
  <!-- Shield fill (very light) -->
  <path d="M 752 302 L 752 340 Q 752 378 785 407 Q 818 378 818 340 L 818 302 Z" 
        fill="#10b981" opacity="0.06"/>
  <!-- Checkmark -->
  <path d="M 768 350 L 782 365 L 808 330" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.13" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Warning Triangles (Alert Indicators) -->
  <!-- Warning 1: Top area -->
  <polygon points="700,110 715,85 730,110 722,130" 
           fill="#ef4444" opacity="0.09" stroke="#ef4444" stroke-width="0.4"/>
  <circle cx="715" cy="110" r="1.2" fill="#ef4444" opacity="0.15"/>
  
  <!-- Warning 2: Right side -->
  <polygon points="1100,320 1118,295 1135,320 1125,345" 
           fill="#ef4444" opacity="0.09" stroke="#ef4444" stroke-width="0.4"/>
  
  <!-- Warning 3: Bottom -->
  <polygon points="750,490 765,465 780,490 772,510" 
           fill="#f59e0b" opacity="0.09" stroke="#f59e0b" stroke-width="0.4"/>
  
  <!-- Alert Indicator Circles -->
  <circle cx="680" cy="180" r="4.5" fill="none" stroke="#ef4444" stroke-width="0.7" opacity="0.10"/>
  <circle cx="1080" cy="260" r="4" fill="none" stroke="#f59e0b" stroke-width="0.7" opacity="0.10"/>
  <circle cx="950" cy="490" r="4" fill="none" stroke="#3b82f6" stroke-width="0.7" opacity="0.10"/>
  
  <!-- Subtle Grid Background (very faint) -->
  <g opacity="0.015" stroke="#3b82f6">
    <line x1="650" y1="100" x2="1150" y2="100" stroke-width="0.08"/>
    <line x1="650" y1="150" x2="1150" y2="150" stroke-width="0.08"/>
    <line x1="650" y1="200" x2="1150" y2="200" stroke-width="0.08"/>
    <line x1="650" y1="250" x2="1150" y2="250" stroke-width="0.08"/>
    <line x1="650" y1="300" x2="1150" y2="300" stroke-width="0.08"/>
    <line x1="650" y1="350" x2="1150" y2="350" stroke-width="0.08"/>
    <line x1="650" y1="400" x2="1150" y2="400" stroke-width="0.08"/>
    <line x1="650" y1="450" x2="1150" y2="450" stroke-width="0.08"/>
    <line x1="650" y1="500" x2="1150" y2="500" stroke-width="0.08"/>
    <line x1="650" y1="550" x2="1150" y2="550" stroke-width="0.08"/>
  </g>
  
  <!-- Accent line separator -->
  <line x1="630" y1="100" x2="630" y2="550" stroke="#3b82f6" stroke-width="0.8" opacity="0.08"/>
</svg>