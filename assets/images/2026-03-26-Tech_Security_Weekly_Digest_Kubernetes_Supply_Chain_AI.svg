<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e53e3e"/>
      <stop offset="50%" stop-color="#dd6b20"/>
      <stop offset="100%" stop-color="#3182ce"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53e3e"/>
      <stop offset="50%" stop-color="#dd6b20"/>
      <stop offset="100%" stop-color="#3182ce" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pillRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c53030"/>
      <stop offset="100%" stop-color="#e53e3e"/>
    </linearGradient>
    <linearGradient id="pillAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b7791f"/>
      <stop offset="100%" stop-color="#d69e2e"/>
    </linearGradient>
    <linearGradient id="pillBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2b6cb0"/>
      <stop offset="100%" stop-color="#3182ce"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- ===== RIGHT SIDE ILLUSTRATION: Kubernetes Supply Chain AI ===== -->

  <!-- Outer shield shape (Security) -->
  <path d="M1010,135 L1070,160 L1070,230 Q1070,280 1010,310 Q950,280 950,230 L950,160 Z"
        fill="rgba(229,62,62,0.07)" stroke="rgba(229,62,62,0.3)" stroke-width="1.5"/>
  <path d="M1010,150 L1058,171 L1058,228 Q1058,270 1010,296 Q962,270 962,228 L962,171 Z"
        fill="rgba(229,62,62,0.05)" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>

  <!-- Kubernetes hex cluster (center of shield) -->
  <!-- Central hex -->
  <polygon points="1010,195 1026,205 1026,225 1010,235 994,225 994,205"
           fill="rgba(49,130,206,0.12)" stroke="rgba(49,130,206,0.4)" stroke-width="1.5"/>
  <text x="1010" y="218" font-family="monospace" font-size="11" fill="rgba(49,130,206,0.8)" text-anchor="middle" font-weight="bold">K8s</text>

  <!-- Orbital hexes around center -->
  <polygon points="1010,155 1018,160 1018,170 1010,175 1002,170 1002,160"
           fill="rgba(214,158,46,0.10)" stroke="rgba(214,158,46,0.35)" stroke-width="1"/>
  <polygon points="1045,175 1053,180 1053,190 1045,195 1037,190 1037,180"
           fill="rgba(214,158,46,0.10)" stroke="rgba(214,158,46,0.35)" stroke-width="1"/>
  <polygon points="1045,215 1053,220 1053,230 1045,235 1037,230 1037,220"
           fill="rgba(214,158,46,0.10)" stroke="rgba(214,158,46,0.35)" stroke-width="1"/>
  <polygon points="975,175 983,180 983,190 975,195 967,190 967,180"
           fill="rgba(214,158,46,0.10)" stroke="rgba(214,158,46,0.35)" stroke-width="1"/>
  <polygon points="975,215 983,220 983,230 975,235 967,230 967,220"
           fill="rgba(214,158,46,0.10)" stroke="rgba(214,158,46,0.35)" stroke-width="1"/>

  <!-- Connection lines from center hex to orbitals -->
  <line x1="1010" y1="195" x2="1010" y2="175" stroke="rgba(49,130,206,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="1026" y1="205" x2="1037" y2="195" stroke="rgba(49,130,206,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="1026" y1="225" x2="1037" y2="225" stroke="rgba(49,130,206,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="994" y1="205" x2="983" y2="195" stroke="rgba(49,130,206,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="994" y1="225" x2="983" y2="225" stroke="rgba(49,130,206,0.25)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Supply Chain: chain link nodes (below shield) -->
  <g transform="translate(880,300)">
    <!-- Chain nodes -->
    <circle cx="0" cy="30" r="10" fill="rgba(229,62,62,0.10)" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>
    <circle cx="40" cy="30" r="10" fill="rgba(214,158,46,0.10)" stroke="rgba(214,158,46,0.35)" stroke-width="1.5"/>
    <circle cx="80" cy="30" r="10" fill="rgba(49,130,206,0.10)" stroke="rgba(49,130,206,0.35)" stroke-width="1.5"/>
    <circle cx="120" cy="30" r="10" fill="rgba(229,62,62,0.10)" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>
    <circle cx="160" cy="30" r="10" fill="rgba(214,158,46,0.10)" stroke="rgba(214,158,46,0.35)" stroke-width="1.5"/>
    <circle cx="200" cy="30" r="10" fill="rgba(49,130,206,0.10)" stroke="rgba(49,130,206,0.35)" stroke-width="1.5"/>
    <!-- Chain links between nodes -->
    <line x1="10" y1="30" x2="30" y2="30" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <line x1="50" y1="30" x2="70" y2="30" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <line x1="90" y1="30" x2="110" y2="30" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <line x1="130" y1="30" x2="150" y2="30" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <line x1="170" y1="30" x2="190" y2="30" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <!-- Small chain link rectangles -->
    <rect x="13" y="26" width="14" height="8" rx="3" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="53" y="26" width="14" height="8" rx="3" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="93" y="26" width="14" height="8" rx="3" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="133" y="26" width="14" height="8" rx="3" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="173" y="26" width="14" height="8" rx="3" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  </g>

  <!-- AI Neural net nodes (right of shield) -->
  <g transform="translate(1085,145)">
    <!-- Layer 1 -->
    <circle cx="0" cy="20" r="7" fill="rgba(49,130,206,0.12)" stroke="rgba(49,130,206,0.35)" stroke-width="1.2"/>
    <circle cx="0" cy="55" r="7" fill="rgba(49,130,206,0.12)" stroke="rgba(49,130,206,0.35)" stroke-width="1.2"/>
    <circle cx="0" cy="90" r="7" fill="rgba(49,130,206,0.12)" stroke="rgba(49,130,206,0.35)" stroke-width="1.2"/>
    <!-- Layer 2 -->
    <circle cx="38" cy="37" r="7" fill="rgba(214,158,46,0.12)" stroke="rgba(214,158,46,0.35)" stroke-width="1.2"/>
    <circle cx="38" cy="72" r="7" fill="rgba(214,158,46,0.12)" stroke="rgba(214,158,46,0.35)" stroke-width="1.2"/>
    <!-- Connections -->
    <line x1="7" y1="20" x2="31" y2="37" stroke="rgba(49,130,206,0.18)" stroke-width="0.8"/>
    <line x1="7" y1="55" x2="31" y2="37" stroke="rgba(49,130,206,0.18)" stroke-width="0.8"/>
    <line x1="7" y1="55" x2="31" y2="72" stroke="rgba(49,130,206,0.18)" stroke-width="0.8"/>
    <line x1="7" y1="90" x2="31" y2="72" stroke="rgba(49,130,206,0.18)" stroke-width="0.8"/>
    <line x1="7" y1="20" x2="31" y2="72" stroke="rgba(49,130,206,0.10)" stroke-width="0.6"/>
    <line x1="7" y1="90" x2="31" y2="37" stroke="rgba(49,130,206,0.10)" stroke-width="0.6"/>
  </g>

  <!-- Decorative scan lines across illustration area -->
  <line x1="880" y1="130" x2="1140" y2="130" stroke="rgba(229,62,62,0.12)" stroke-width="0.5" stroke-dasharray="4,8"/>
  <line x1="880" y1="320" x2="1140" y2="320" stroke="rgba(49,130,206,0.12)" stroke-width="0.5" stroke-dasharray="4,8"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.7)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(214,158,46,0.6)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(49,130,206,0.6)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(229,62,62,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(49,130,206,0.04)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentGrad)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(229,62,62,0.95)" text-anchor="middle" letter-spacing="1.5">MARCH 26, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.95">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.95">Kubernetes Supply Chain AI</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" font-weight="400">Security Intelligence · Vulnerability Analysis · Threat Monitoring</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#lineGrad)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial', sans-serif" font-size="14" font-weight="600" fill="rgba(229,62,62,0.8)" letter-spacing="3" text-anchor="start">SECURITY INTELLIGENCE REPORT</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="140" height="36" rx="18" fill="url(#pillRed)" opacity="0.85"/>
  <text x="150" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Kubernetes</text>

  <rect x="236" y="402" width="148" height="36" rx="18" fill="url(#pillAmber)" opacity="0.85"/>
  <text x="310" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Supply Chain</text>

  <rect x="400" y="402" width="100" height="36" rx="18" fill="url(#pillBlue)" opacity="0.85"/>
  <text x="450" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">AI Threat</text>

  <!-- Footer -->
  <line x1="0" y1="520" x2="1200" y2="520" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(229,62,62,0.5)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>