  <circle cx="840" cy="330" r="1.5" fill="#8b5cf6" opacity="0.4">
    <animate attributeName="cy" values="330;320;330" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1060" cy="300" r="2" fill="#6366f1" opacity="0.5">
    <animate attributeName="cy" values="300;290;300" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="690" cy="205" r="1.5" fill="#3b82f6" opacity="0.3">
    <animate attributeName="cy" values="205;197;205" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1110" cy="175" r="1" fill="#8b5cf6" opacity="0.4">
    <animate attributeName="cy" values="175;167;175" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- WEEKLY DIGEST badge -->
  <g transform="translate(60, 80)">
    <rect width="160" height="32" rx="16" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4" />
    <text x="80" y="21" text-anchor="middle" fill="#60a5fa" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">WEEKLY DIGEST</text>
  </g>

  <text x="60" y="170" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Tech Security</text>
  <text x="60" y="225" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Weekly</text>
  <text x="60" y="290" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">K8s RBAC Bypass</text>
  <text x="60" y="335" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">SLSA Supply Chain</text>

  <rect x="60" y="360" width="200" height="3" rx="1.5" fill="url(#accentLine)" />

  <g transform="translate(60, 385)">
    <rect width="52" height="30" rx="15" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.35" />
    <text x="26" y="20" text-anchor="middle" fill="#60a5fa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">K8s</text>
    <g transform="translate(62, 0)">
      <rect width="60" height="30" rx="15" fill="#6366f1" opacity="0.12" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="30" y="20" text-anchor="middle" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">SLSA</text>
    </g>
    <g transform="translate(132, 0)">
      <rect width="86" height="30" rx="15" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="43" y="20" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AI Agent</text>
    </g>
    <g transform="translate(228, 0)">
      <rect width="58" height="30" rx="15" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="29" y="20" text-anchor="middle" fill="#f87171" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">CVE</text>
    </g>
  </g>

  <text x="60" y="460" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">MARCH 26, 2026</text>

  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8" />
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
</svg>