<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest - Kubernetes RBAC, SLSA Supply Chain, AI Prompt Injection</title>
  <defs>
    <filter id="orbGlow"><feGaussianBlur stdDeviation="40" /></filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0f172a" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <circle cx="770" cy="145" r="185" fill="#3b82f6" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1040" cy="440" r="150" fill="#8b5cf6" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="190" cy="500" r="120" fill="#6366f1" opacity="0.05" filter="url(#orbGlow)" />

  <!-- Card 1: AI Prompt Injection -->
  <g transform="translate(830, 60)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(100, 18)">
      <circle cx="55" cy="45" r="28" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8" />
      <circle cx="55" cy="45" r="15" fill="#f59e0b" opacity="0.15" />
      <text x="55" y="50" text-anchor="middle" fill="#f59e0b" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">AI</text>
      <path d="M30 75 L55 85 L80 75" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 3" opacity="0.7" />
      <text x="55" y="98" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="8" opacity="0.7">INJECT</text>
      <rect x="22" y="105" width="66" height="16" rx="4" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4" />
      <text x="55" y="117" text-anchor="middle" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">PROMPT DEF</text>
    </g>
    <circle cx="130" cy="200" r="3" fill="#f59e0b" opacity="0.8" />
    <circle cx="145" cy="200" r="3" fill="#ef4444" opacity="0.6" />
    <circle cx="160" cy="200" r="3" fill="#f59e0b" opacity="0.4" />
  </g>

  <!-- Card 2: SLSA Supply Chain -->
  <g transform="translate(720, 190)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(95, 15)">
      <path d="M55 10 L100 30 L100 75 L55 95 L10 75 L10 30 Z" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.85" />
      <line x1="55" y1="10" x2="55" y2="52" stroke="#6366f1" stroke-width="1.5" opacity="0.5" />
      <line x1="10" y1="30" x2="55" y2="52" stroke="#6366f1" stroke-width="1.5" opacity="0.5" />
      <line x1="100" y1="30" x2="55" y2="52" stroke="#6366f1" stroke-width="1.5" opacity="0.5" />
      <path d="M40 48 L50 58 L70 38" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.8" />
      <rect x="18" y="102" width="72" height="16" rx="4" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4" />
      <text x="54" y="114" text-anchor="middle" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">SLSA + SBOM</text>
