<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest MS Office Kimi Kimwolf AWS</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff6b00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff3b3b;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff3b3b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="crackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5500;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,50,50,0.04)" stroke="rgba(255,80,80,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,50,50,0.05)" stroke="rgba(255,80,80,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: MS Office Zero Day - Broken Shield with Office Doc -->

  <!-- Outer shield frame -->
  <path d="M1010,140 L1100,165 L1100,255 Q1100,305 1010,330 Q920,305 920,255 L920,165 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,80,80,0.25)" stroke-width="1.5"/>

  <!-- Shield inner layer -->
  <path d="M1010,158 L1088,179 L1088,255 Q1088,298 1010,318 Q932,298 932,255 L932,179 Z"
        fill="rgba(180,30,30,0.07)" stroke="rgba(255,100,80,0.18)" stroke-width="1"/>

  <!-- Office document icon inside shield -->
  <rect x="978" y="190" width="64" height="82" rx="4"
        fill="rgba(30,60,120,0.10)" stroke="rgba(100,140,255,0.30)" stroke-width="1.2"/>
  <rect x="978" y="190" width="64" height="22" rx="4"
        fill="rgba(50,80,200,0.12)" stroke="rgba(100,140,255,0.22)" stroke-width="0"/>
  <!-- Doc fold corner -->
  <polygon points="1028,190 1042,190 1042,204" fill="rgba(100,140,255,0.20)" stroke="rgba(150,180,255,0.30)" stroke-width="0.8"/>
  <!-- Doc text lines -->
  <rect x="986" y="226" width="48" height="3" rx="1" fill="rgba(180,200,255,0.18)"/>
  <rect x="986" y="234" width="36" height="3" rx="1" fill="rgba(180,200,255,0.14)"/>
  <rect x="986" y="242" width="44" height="3" rx="1" fill="rgba(180,200,255,0.12)"/>
  <rect x="986" y="250" width="30" height="3" rx="1" fill="rgba(180,200,255,0.10)"/>

  <!-- W letter (Word icon style) -->
  <text x="988" y="215" font-family="Arial, sans-serif" font-weight="900" font-size="15"
        fill="rgba(100,150,255,0.55)">W</text>

  <!-- CRACK / ZERO DAY exploit lines through shield -->
  <path d="M1010,148 L998,195 L1018,205 L1000,260"
        fill="none" stroke="url(#crackGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M1010,148 L1022,190 L1006,200 L1022,252"
        fill="none" stroke="rgba(255,100,0,0.28)" stroke-width="1.5"/>

  <!-- Crack glow effect -->
  <path d="M1010,148 L998,195 L1018,205 L1000,260"
        fill="none" stroke="rgba(255,60,0,0.12)" stroke-width="8" filter="url(#softGlow)"/>

  <!-- Exploit burst - small radiating lines from crack origin -->
  <line x1="1010" y1="200" x2="988" y2="182" stroke="rgba(255,80,0,0.22)" stroke-width="1"/>
  <line x1="1010" y1="200" x2="985" y2="205" stroke="rgba(255,80,0,0.18)" stroke-width="1"/>
  <line x1="1010" y1="200" x2="1032" y2="180" stroke="rgba(255,80,0,0.20)" stroke-width="1"/>
  <line x1="1010" y1="200" x2="1038" y2="208" stroke="rgba(255,80,0,0.16)" stroke-width="1"/>

  <!-- Binary / hex code fragments around illustration -->
  <text x="890" y="155" font-family="monospace" font-size="9" fill="rgba(255,80,80,0.20)">0x41414141</text>
  <text x="1060" y="340" font-family="monospace" font-size="9" fill="rgba(255,80,80,0.18)">CVE-2026</text>
  <text x="888" y="300" font-family="monospace" font-size="8" fill="rgba(180,100,100,0.15)">RCE EXPLOIT</text>
  <text x="1065" y="155" font-family="monospace" font-size="8" fill="rgba(180,100,100,0.15)">0x00</text>

  <!-- Warning triangle overlay at top of shield -->
  <polygon points="1010,148 998,170 1022,170"
           fill="rgba(255,60,0,0.10)" stroke="rgba(255,100,0,0.35)" stroke-width="1.2" filter="url(#glow)"/>
  <text x="1006" y="167" font-family="Arial" font-weight="900" font-size="10"
        fill="rgba(255,120,0,0.55)">!</text>

  <!-- Decorative outer ring segments -->
  <circle cx="1010" cy="235" r="112" fill="none" stroke="rgba(255,50,50,0.08)" stroke-width="1"
          stroke-dasharray="6,8"/>
  <circle cx="1010" cy="235" r="128" fill="none" stroke="rgba(255,50,50,0.05)" stroke-width="1"
          stroke-dasharray="3,12"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="#ff3b3b" opacity="0.75" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="3" fill="#ff6b00" opacity="0.60" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3.5" fill="#ff3b3b" opacity="0.50" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4"
        fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.30)" stroke-width="1"/>
  <text x="96" y="81" font-family="Arial, sans-serif" font-size="12" font-weight="600"
        fill="rgba(255,120,100,0.90)" letter-spacing="1.5">JANUARY 27, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="700"
        fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="700"
        fill="#ff5a5a">MS Office Zero Day</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="19"
        fill="rgba(255,200,190,0.70)">Critical vulnerability analysis · Threat intelligence · Patch guidance</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="600"
        fill="rgba(255,120,100,0.80)" letter-spacing="2.5">SECURITY ADVISORY · MICROSOFT · ZERO DAY</text>

  <!-- Tag pills -->
  <!-- Red pill: Critical -->
  <rect x="80" y="402" width="110" height="36" rx="18"
        fill="rgba(220,30,30,0.20)" stroke="rgba(255,60,60,0.40)" stroke-width="1"/>
  <text x="135" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,120,110,0.95)" text-anchor="middle">CRITICAL</text>

  <!-- Amber pill: CVE -->
  <rect x="205" y="402" width="110" height="36" rx="18"
        fill="rgba(200,100,0,0.18)" stroke="rgba(255,160,0,0.38)" stroke-width="1"/>
  <text x="260" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,190,80,0.95)" text-anchor="middle">CVE-2026</text>

  <!-- Blue pill: RCE -->
  <rect x="330" y="402" width="110" height="36" rx="18"
        fill="rgba(20,60,180,0.18)" stroke="rgba(80,140,255,0.35)" stroke-width="1"/>
  <text x="385" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600"
        fill="rgba(120,180,255,0.95)" text-anchor="middle">RCE</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="13"
        fill="rgba(255,255,255,0.30)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,90,90,0.45)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>