<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Security Cloud Digest AI VirusTotal AWS Agentic</title>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left Side Content -->
  <!-- Title -->
  <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Security Cloud Digest</text>
  <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">VirusTotal AWS Agentic</text>
  
  <!-- Date Badge -->
  <rect x="60" y="280" width="280" height="40" rx="20" fill="#1a1f3a" stroke="#4a5f8f" stroke-width="1"/>
  <text x="70" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#8ba3c7">FEBRUARY 9, 2026</text>
  
  <!-- Tag Pills -->
  <rect x="60" y="420" width="90" height="32" rx="16" fill="#2d1f4a" stroke="#7d4fa3" stroke-width="1"/>
  <text x="75" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d4a5ff" text-anchor="middle">security</text>
  
  <rect x="170" y="420" width="85" height="32" rx="16" fill="#1f3a2d" stroke="#4fa380" stroke-width="1"/>
  <text x="212" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#a5ffd4" text-anchor="middle">threat</text>
  
  <rect x="275" y="420" width="95" height="32" rx="16" fill="#2d3a1f" stroke="#7fa34f" stroke-width="1"/>
  <text x="322" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d4ffa5" text-anchor="middle">ai agents</text>
  
  <!-- Footer -->
  <text x="60" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#6b7a98">tech.2twodragon.com</text>
  
  <!-- Right Side Illustration (x=700-1150, y=30-600) -->
  <!-- Outer Security Ring (VirusTotal) -->
  <circle cx="925" cy="280" r="180" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.3"/>
  <circle cx="925" cy="280" r="175" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.5" stroke-dasharray="5,5"/>
  
  <!-- Central Shield with Threat Analysis -->
  <g transform="translate(925, 280)">
    <!-- Shield shape -->
    <path d="M -50 -60 L 50 -60 L 50 20 Q 0 70 -50 20 Z" fill="#1a3a5f" stroke="#4a7fff" stroke-width="2"/>
    
    <!-- Threat indicators inside shield -->
    <circle cx="-15" cy="-20" r="8" fill="#ff6b6b"/>
    <circle cx="15" cy="-20" r="8" fill="#ff6b6b"/>
    <circle cx="0" cy="10" r="8" fill="#ffa94d"/>
    
    <!-- Scan lines over shield -->
    <line x1="-40" y1="-40" x2="40" y2="-40" stroke="#4a7fff" stroke-width="1" opacity="0.4"/>
    <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#4a7fff" stroke-width="1" opacity="0.4"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#4a7fff" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- AWS Cloud Architecture (left-top area) -->
  <g transform="translate(750, 100)">
    <!-- Cloud base -->
    <path d="M 20 30 Q 10 20 0 20 Q -10 20 -15 30 Q -30 30 -40 40 Q -40 50 -30 50 L 40 50 Q 50 50 50 40 Q 50 30 40 25 Q 30 15 20 20 Q 15 10 0 10 Q -15 10 -25 25" 
          fill="#2a3f5f" stroke="#4a8fff" stroke-width="1.5"/>
    <!-- EC2 instance inside -->
    <rect x="-20" y="32" width="15" height="12" fill="#4a8fff" stroke="#7fb3ff" stroke-width="1" rx="2"/>
    <rect x="5" y="32" width="15" height="12" fill="#4a8fff" stroke="#7fb3ff" stroke-width="1" rx="2"/>
  </g>
  
  <!-- AI Agent Network (right-bottom area) -->
  <g transform="translate(1000, 380)">
    <!-- Central agent node -->
    <circle cx="0" cy="0" r="15" fill="#7d4fa3" stroke="#d4a5ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#d4a5ff" stroke-width="1" opacity="0.5"/>
    
    <!-- Surrounding agent nodes -->
    <circle cx="-40" cy="-30" r="10" fill="#4fa380" stroke="#a5ffd4" stroke-width="1.5"/>
    <circle cx="40" cy="-30" r="10" fill="#4fa380" stroke="#a5ffd4" stroke-width="1.5"/>
    <circle cx="-45" cy="25" r="10" fill="#4fa380" stroke="#a5ffd4" stroke-width="1.5"/>
    <circle cx="45" cy="25" r="10" fill="#4fa380" stroke="#a5ffd4" stroke-width="1.5"/>
    
    <!-- Connection lines (neural paths) -->
    <line x1="0" y1="0" x2="-40" y2="-30" stroke="#7d4fa3" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="40" y2="-30" stroke="#7d4fa3" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-45" y2="25" stroke="#7d4fa3" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="45" y2="25" stroke="#7d4fa3" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Data Flow Lines -->
  <path d="M 700 200 Q 800 250 900 280" stroke="#4a7fff" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="3,3"/>
  <path d="M 700 350 Q 800 320 900 300" stroke="#d4a5ff" stroke-width="1.5" fill="none" opacity="0.5" stroke-dasharray="3,3"/>
  
  <!-- Alert pulse indicators -->
  <circle cx="850" cy="150" r="4" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="850" cy="150" r="8" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
  
  <circle cx="1050" cy="450" r="4" fill="#ffa94d" opacity="0.7"/>
  <circle cx="1050" cy="450" r="8" fill="none" stroke="#ffa94d" stroke-width="1" opacity="0.4"/>
</svg>