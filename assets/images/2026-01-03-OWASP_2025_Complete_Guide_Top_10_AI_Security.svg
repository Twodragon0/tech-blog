<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3b3b"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff3b3b"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3b3b"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dateBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3b3b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Agentic AI Shield with Neural Network -->
  <!-- Outer shield shape -->
  <path d="M1010,135 L1130,165 L1130,255 Q1130,315 1010,345 Q890,315 890,255 L890,165 Z"
        fill="rgba(255,59,59,0.07)" stroke="rgba(255,59,59,0.3)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,155 L1110,178 L1110,255 Q1110,302 1010,322 Q910,302 910,255 L910,178 Z"
        fill="rgba(255,107,53,0.06)" stroke="rgba(255,107,53,0.2)" stroke-width="1"/>

  <!-- Central AI brain core circle -->
  <circle cx="1010" cy="240" r="52" fill="rgba(255,59,59,0.08)" stroke="rgba(255,59,59,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="240" r="36" fill="rgba(255,107,53,0.1)" stroke="rgba(255,107,53,0.25)" stroke-width="1"/>
  <circle cx="1010" cy="240" r="20" fill="rgba(255,59,59,0.15)" stroke="rgba(255,59,59,0.4)" stroke-width="1.5"/>

  <!-- Neural network nodes around the core -->
  <!-- Top -->
  <circle cx="1010" cy="175" r="8" fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.4)" stroke-width="1.2"/>
  <!-- Top-right -->
  <circle cx="1065" cy="195" r="7" fill="rgba(255,107,53,0.12)" stroke="rgba(255,107,53,0.35)" stroke-width="1.2"/>
  <!-- Right -->
  <circle cx="1085" cy="240" r="8" fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.4)" stroke-width="1.2"/>
  <!-- Bottom-right -->
  <circle cx="1065" cy="285" r="7" fill="rgba(255,107,53,0.12)" stroke="rgba(255,107,53,0.35)" stroke-width="1.2"/>
  <!-- Bottom -->
  <circle cx="1010" cy="305" r="8" fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.4)" stroke-width="1.2"/>
  <!-- Bottom-left -->
  <circle cx="955" cy="285" r="7" fill="rgba(255,107,53,0.12)" stroke="rgba(255,107,53,0.35)" stroke-width="1.2"/>
  <!-- Left -->
  <circle cx="935" cy="240" r="8" fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.4)" stroke-width="1.2"/>
  <!-- Top-left -->
  <circle cx="955" cy="195" r="7" fill="rgba(255,107,53,0.12)" stroke="rgba(255,107,53,0.35)" stroke-width="1.2"/>

  <!-- Neural connections from core to nodes -->
  <line x1="1010" y1="220" x2="1010" y2="183" stroke="rgba(255,59,59,0.25)" stroke-width="1"/>
  <line x1="1026" y1="226" x2="1059" y2="201" stroke="rgba(255,107,53,0.22)" stroke-width="1"/>
  <line x1="1030" y1="240" x2="1077" y2="240" stroke="rgba(255,59,59,0.25)" stroke-width="1"/>
  <line x1="1026" y1="254" x2="1059" y2="279" stroke="rgba(255,107,53,0.22)" stroke-width="1"/>
  <line x1="1010" y1="260" x2="1010" y2="297" stroke="rgba(255,59,59,0.25)" stroke-width="1"/>
  <line x1="994" y1="254" x2="961" y2="279" stroke="rgba(255,107,53,0.22)" stroke-width="1"/>
  <line x1="990" y1="240" x2="943" y2="240" stroke="rgba(255,59,59,0.25)" stroke-width="1"/>
  <line x1="994" y1="226" x2="961" y2="201" stroke="rgba(255,107,53,0.22)" stroke-width="1"/>

  <!-- Outer node connections (web) -->
  <line x1="1010" y1="175" x2="1065" y2="195" stroke="rgba(255,59,59,0.15)" stroke-width="0.8"/>
  <line x1="1065" y1="195" x2="1085" y2="240" stroke="rgba(255,59,59,0.15)" stroke-width="0.8"/>
  <line x1="1085" y1="240" x2="1065" y2="285" stroke="rgba(255,59,59,0.15)" stroke-width="0.8"/>
  <line x1="1065" y1="285" x2="1010" y2="305" stroke="rgba(255,59,59,0.15)" stroke-width="0.8"/>
  <line x1="1010" y1="305" x2="955" y2="285" stroke="rgba(255,59,59,0.15)" stroke-width="0.8"/>
  <line x1="955" y1="285" x2="935" y2="240" stroke="rgba(255,59,59,0.15)" stroke-width="0.8"/>
  <line x1="935" y1="240" x2="955" y2="195" stroke="rgba(255,59,59,0.15)" stroke-width="0.8"/>
  <line x1="955" y1="195" x2="1010" y2="175" stroke="rgba(255,59,59,0.15)" stroke-width="0.8"/>

  <!-- Top 10 rank indicators as small segments around shield -->
  <path d="M1010,132 A110,110 0 0,1 1085,158" fill="none" stroke="rgba(255,59,59,0.35)" stroke-width="2.5" stroke-dasharray="6,4"/>
  <path d="M1085,158 A110,110 0 0,1 1133,238" fill="none" stroke="rgba(255,107,53,0.3)" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Lock icon at center top of shield -->
  <rect x="1002" y="226" width="16" height="13" rx="2" fill="rgba(255,59,59,0.2)" stroke="rgba(255,59,59,0.5)" stroke-width="1.2"/>
  <path d="M1006,226 Q1006,219 1010,219 Q1014,219 1014,226" fill="none" stroke="rgba(255,59,59,0.5)" stroke-width="1.2"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,59,59,0.6)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,107,53,0.5)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,59,59,0.4)"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,59,59,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,107,53,0.05)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#dateBg)" stroke="rgba(255,59,59,0.2)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(255,150,150,0.9)" text-anchor="middle" letter-spacing="1.5">JANUARY 3, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="46" font-weight="700" fill="white">OWASP 2025 Latest Update</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="46" font-weight="700" fill="rgba(255,200,200,0.95)">Top 10 Agentic AI</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Critical Security Risks for AI Agent Systems &amp; LLM Applications</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="14" font-weight="600" fill="rgba(255,120,120,0.85)" letter-spacing="2.5">SECURITY / OWASP / AI SAFETY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="140" height="36" rx="18" fill="rgba(255,59,59,0.15)" stroke="rgba(255,59,59,0.35)" stroke-width="1"/>
  <text x="150" y="425" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="13" font-weight="600" fill="rgba(255,150,150,0.9)" text-anchor="middle"># Agentic AI</text>

  <rect x="234" y="402" width="130" height="36" rx="18" fill="rgba(255,140,0,0.12)" stroke="rgba(255,140,0,0.3)" stroke-width="1"/>
  <text x="299" y="425" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="13" font-weight="600" fill="rgba(255,180,100,0.9)" text-anchor="middle"># OWASP Top10</text>

  <rect x="378" y="402" width="120" height="36" rx="18" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="438" y="425" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="13" font-weight="600" fill="rgba(147,197,253,0.9)" text-anchor="middle"># LLM Security</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,120,120,0.4)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>