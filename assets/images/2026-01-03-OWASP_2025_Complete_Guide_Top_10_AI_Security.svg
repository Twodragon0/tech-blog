<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>2026 01 03 OWASP 2025 Complete Guide Top 10 AI Security</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- LEFT SIDE: Title and Info -->
  
  <!-- Date Badge -->
  <rect x="50" y="40" width="200" height="44" rx="8" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.8"/>
  <text x="150" y="68" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#ef4444">JANUARY 3, 2026</text>
  
  <!-- Main Title -->
  <text x="80" y="185" font-family="'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff">OWASP 2025</text>
  <text x="80" y="235" font-family="'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff">Latest Update</text>
  <text x="80" y="285" font-family="'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#ffffff">Top Agentic</text>
  
  <!-- Tag Pills -->
  <rect x="80" y="420" width="140" height="32" rx="16" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="150" y="442" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#3b82f6">AI Security</text>
  
  <rect x="240" y="420" width="140" height="32" rx="16" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="310" y="442" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#f59e0b">Agent Safety</text>
  
  <rect x="400" y="420" width="140" height="32" rx="16" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.8"/>
  <text x="470" y="442" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ef4444">LLM Risks</text>
  
  <!-- Footer -->
  <text x="80" y="570" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#6b7280">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE: Visual Scene (x=650-1150, y=80-550) -->
  
  <!-- Brain Silhouette with Neural Lines -->
  <ellipse cx="900" cy="200" rx="65" ry="75" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.8"/>
  
  <!-- Neural circuit lines -->
  <path d="M 850 180 Q 870 150 900 155 Q 930 160 950 185" fill="none" stroke="#3b82f6" stroke-width="0.35" opacity="0.5"/>
  <path d="M 860 200 Q 890 200 930 200" fill="none" stroke="#3b82f6" stroke-width="0.35" opacity="0.5"/>
  <path d="M 850 220 Q 880 240 920 235" fill="none" stroke="#3b82f6" stroke-width="0.35" opacity="0.5"/>
  <path d="M 870 160 L 870 240" fill="none" stroke="#3b82f6" stroke-width="0.25" opacity="0.4"/>
  <path d="M 930 160 L 930 240" fill="none" stroke="#3b82f6" stroke-width="0.25" opacity="0.4"/>
  
  <!-- Circuit nodes -->
  <circle cx="870" cy="160" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="900" cy="155" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="930" cy="160" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="860" cy="200" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="940" cy="200" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="880" cy="240" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="920" cy="235" r="3" fill="#3b82f6" opacity="0.6"/>
  
  <!-- Data Flow Arrows -->
  <!-- Left arrow to brain -->
  <path d="M 750 200 Q 800 200 850 200" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
  <polygon points="850,200 843,197 845,203" fill="#f59e0b" opacity="0.7"/>
  
  <!-- Right arrow from brain -->
  <path d="M 950 200 Q 1000 200 1050 200" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.7"/>
  <polygon points="1050,200 1043,197 1045,203" fill="#ef4444" opacity="0.7"/>
  
  <!-- Down arrow from brain -->
  <path d="M 900 280 Q 900 320 900 360" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.7"/>
  <polygon points="900,360 897,353 903,353" fill="#ef4444" opacity="0.7"/>
  
  <!-- Up data nodes -->
  <circle cx="750" cy="200" r="5" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.5"/>
  <circle cx="1050" cy="200" r="5" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.5"/>
  <circle cx="900" cy="360" r="5" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.5"/>
  
  <!-- Warning triangles -->
  <!-- Triangle 1 (left-bottom) -->
  <polygon points="750,340 765,380 735,380" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.6"/>
  <text x="750" y="365" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ef4444" opacity="0.8">!</text>
  
  <!-- Triangle 2 (right-bottom) -->
  <polygon points="1050,340 1065,380 1035,380" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.6"/>
  <text x="1050" y="365" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ef4444" opacity="0.8">!</text>
  
  <!-- Alert indicator at top -->
  <polygon points="900,100 915,130 885,130" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.6"/>
  
  <!-- Additional security-focused elements -->
  <!-- Shield shape near brain -->
  <path d="M 880 140 L 920 140 L 920 180 Q 900 200 880 180 Z" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.5"/>
  
  <!-- Connection lines between warning indicators -->
  <line x1="750" y1="340" x2="900" y2="280" stroke="#ef4444" stroke-width="0.25" opacity="0.3"/>
  <line x1="1050" y1="340" x2="900" y2="280" stroke="#ef4444" stroke-width="0.25" opacity="0.3"/>
  
  <!-- Data flow circles -->
  <circle cx="820" cy="190" r="4" fill="#f59e0b" opacity="0.3"/>
  <circle cx="980" cy="190" r="4" fill="#ef4444" opacity="0.3"/>
  <circle cx="900" cy="320" r="4" fill="#ef4444" opacity="0.3"/>
</svg>