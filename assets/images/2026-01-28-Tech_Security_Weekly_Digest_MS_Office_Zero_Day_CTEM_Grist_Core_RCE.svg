<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3b3b;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3b3b;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.06" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,59,59,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,59,59,0.06)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: MS Office Zero-Day / Security theme -->
  <!-- Outer shield shape -->
  <path d="M1010,140 L1100,140 L1120,155 L1120,230 C1120,270 1010,295 1010,295 C1010,295 900,270 900,230 L900,155 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,59,59,0.3)" stroke-width="1.5"/>

  <!-- Inner shield -->
  <path d="M1010,160 L1085,160 L1100,172 L1100,228 C1100,258 1010,278 1010,278 C1010,278 920,258 920,228 L920,172 Z"
        fill="rgba(255,59,59,0.06)" stroke="rgba(255,107,53,0.25)" stroke-width="1"/>

  <!-- Shield center cross/warning icon -->
  <rect x="1000" y="185" width="20" height="60" rx="3" fill="rgba(255,59,59,0.25)" stroke="rgba(255,59,59,0.5)" stroke-width="1"/>
  <rect x="985" y="200" width="50" height="20" rx="3" fill="rgba(255,59,59,0.25)" stroke="rgba(255,59,59,0.5)" stroke-width="1"/>

  <!-- Orbiting rings -->
  <ellipse cx="1010" cy="220" rx="90" ry="30" fill="none" stroke="rgba(255,107,53,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
  <ellipse cx="1010" cy="220" rx="115" ry="45" fill="none" stroke="rgba(255,59,59,0.12)" stroke-width="1" stroke-dasharray="6,6"/>

  <!-- Document/Office icon fragments (representing MS Office) -->
  <rect x="880" y="135" width="40" height="52" rx="3" fill="rgba(255,165,0,0.08)" stroke="rgba(255,165,0,0.25)" stroke-width="1"/>
  <line x1="887" y1="152" x2="913" y2="152" stroke="rgba(255,165,0,0.3)" stroke-width="1.5"/>
  <line x1="887" y1="162" x2="913" y2="162" stroke="rgba(255,165,0,0.25)" stroke-width="1"/>
  <line x1="887" y1="172" x2="905" y2="172" stroke="rgba(255,165,0,0.2)" stroke-width="1"/>

  <rect x="1100" y="135" width="36" height="48" rx="3" fill="rgba(74,144,226,0.08)" stroke="rgba(74,144,226,0.25)" stroke-width="1"/>
  <line x1="1107" y1="150" x2="1129" y2="150" stroke="rgba(74,144,226,0.3)" stroke-width="1.5"/>
  <line x1="1107" y1="160" x2="1129" y2="160" stroke="rgba(74,144,226,0.25)" stroke-width="1"/>
  <line x1="1107" y1="170" x2="1120" y2="170" stroke="rgba(74,144,226,0.2)" stroke-width="1"/>

  <!-- Exploit/crack lines radiating from shield -->
  <line x1="1010" y1="140" x2="980" y2="115" stroke="rgba(255,59,59,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1010" y1="140" x2="1040" y2="115" stroke="rgba(255,59,59,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1120" y1="200" x2="1145" y2="185" stroke="rgba(255,59,59,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="900" y1="200" x2="875" y2="185" stroke="rgba(255,59,59,0.15)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Small warning triangles -->
  <polygon points="960,310 975,285 990,310" fill="rgba(255,200,0,0.12)" stroke="rgba(255,200,0,0.35)" stroke-width="1"/>
  <line x1="975" y1="292" x2="975" y2="302" stroke="rgba(255,200,0,0.5)" stroke-width="1.5"/>
  <circle cx="975" cy="306" r="1.5" fill="rgba(255,200,0,0.6)"/>

  <polygon points="1030,315 1045,290 1060,315" fill="rgba(255,59,59,0.1)" stroke="rgba(255,59,59,0.3)" stroke-width="1"/>
  <line x1="1045" y1="297" x2="1045" y2="307" stroke="rgba(255,59,59,0.5)" stroke-width="1.5"/>
  <circle cx="1045" cy="311" r="1.5" fill="rgba(255,59,59,0.6)"/>

  <!-- Binary/hex data pattern (zero-day exploit code) -->
  <text x="885" y="338" font-family="monospace" font-size="9" fill="rgba(255,59,59,0.2)">0xCVE-2026</text>
  <text x="885" y="350" font-family="monospace" font-size="9" fill="rgba(255,107,53,0.15)">EXPLOIT.EXE</text>
  <text x="885" y="362" font-family="monospace" font-size="9" fill="rgba(255,59,59,0.12)">0xFF 0x00 0x41</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,59,59,0.6)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,107,53,0.5)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,200,0,0.55)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)" />

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,59,59,0.15)" stroke="rgba(255,59,59,0.35)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(255,180,180,0.9)" text-anchor="middle" letter-spacing="1">JANUARY 28, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="rgba(255,100,100,1)">MS Office Zero Day</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(200,200,220,0.75)">CVE Analysis · Threat Intelligence · Patch Guidance</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="1"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" font-weight="600" fill="rgba(255,59,59,0.85)" letter-spacing="2">SECURITY · ZERO-DAY · PATCH TUESDAY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(255,59,59,0.18)" stroke="rgba(255,59,59,0.45)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(255,140,140,0.95)" text-anchor="middle">Zero-Day CVE</text>

  <rect x="224" y="402" width="130" height="36" rx="18" fill="rgba(255,160,0,0.15)" stroke="rgba(255,160,0,0.4)" stroke-width="1"/>
  <text x="289" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(255,200,100,0.95)" text-anchor="middle">MS Office Vuln</text>

  <rect x="368" y="402" width="120" height="36" rx="18" fill="rgba(74,144,226,0.15)" stroke="rgba(74,144,226,0.4)" stroke-width="1"/>
  <text x="428" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(140,190,255,0.95)" text-anchor="middle">Weekly Digest</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" fill="rgba(180,180,200,0.5)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" fill="rgba(255,59,59,0.5)" text-anchor="end">SECURITY</text>
</svg>