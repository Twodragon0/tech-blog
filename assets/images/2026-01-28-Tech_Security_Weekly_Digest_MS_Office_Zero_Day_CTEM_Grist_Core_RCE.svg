<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- LEFT SIDE: Text Content -->
  <!-- Date Badge -->
  <rect x="70" y="50" width="200" height="35" rx="6" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="170" y="72" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">JANUARY 28, 2026</text>

  <!-- Main Title -->
  <text x="80" y="210" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="#ffffff" letter-spacing="-1">Tech Security Weekly</text>

  <!-- Subtitle -->
  <text x="80" y="280" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="#f59e0b">Digest Office Zero</text>

  <!-- Tag Pills -->
  <g id="tags">
    <!-- Tag 1: Security -->
    <rect x="80" y="430" width="120" height="32" rx="16" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="140" y="452" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">Security</text>

    <!-- Tag 2: Compliance -->
    <rect x="220" y="430" width="130" height="32" rx="16" fill="#10b981" opacity="0.06" stroke="#10b981" stroke-width="1.2"/>
    <text x="285" y="452" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#10b981" text-anchor="middle">Compliance</text>

    <!-- Tag 3: Threats -->
    <rect x="370" y="430" width="110" height="32" rx="16" fill="#f59e0b" opacity="0.06" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="425" y="452" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Threats</text>
  </g>

  <!-- Footer -->
  <text x="80" y="575" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#64748b">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: Visual Elements (x=650-1150, y=80-550) -->
  <g id="security-scene">
    <!-- Background circle for visual grouping -->
    <circle cx="920" cy="280" r="210" fill="#3b82f6" opacity="0.03" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>

    <!-- Large Shield with Checkmark -->
    <g transform="translate(850, 220)">
      <!-- Shield outline -->
      <path d="M 0 -50 L 45 -30 L 45 20 Q 0 60 -45 20 L -45 -30 Z"
            fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.4"/>
      <!-- Shield fill -->
      <path d="M 0 -50 L 45 -30 L 45 20 Q 0 60 -45 20 L -45 -30 Z"
            fill="#3b82f6" opacity="0.06"/>
      <!-- Checkmark -->
      <path d="M -15 5 L -5 15 L 20 -8"
            stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>

    <!-- Data Flow Arrows -->
    <defs>
      <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.4"/>
      </marker>
      <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.4"/>
      </marker>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.4"/>
      </marker>
    </defs>

    <!-- Curved arrow from top left -->
    <path d="M 700 120 Q 760 150 810 180"
          stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.35" marker-end="url(#arrowBlue)" stroke-dasharray="4,3"/>

    <!-- Curved arrow from bottom left -->
    <path d="M 710 460 Q 760 400 810 340"
          stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.35" marker-end="url(#arrowOrange)" stroke-dasharray="4,3"/>

    <!-- Arrow from right back to center -->
    <path d="M 1020 280 Q 950 300 890 260"
          stroke="#ef4444" stroke-width="2" fill="none" opacity="0.35" marker-end="url(#arrowRed)" stroke-dasharray="4,3"/>

    <!-- Warning Triangle Top Right -->
    <g transform="translate(1050, 140)">
      <!-- Triangle outline -->
      <path d="M 0 -35 L 35 30 L -35 30 Z"
            fill="none" stroke="#ef4444" stroke-width="2.2" opacity="0.4"/>
      <!-- Triangle fill -->
      <path d="M 0 -35 L 35 30 L -35 30 Z"
            fill="#ef4444" opacity="0.05"/>
      <!-- Exclamation mark -->
      <circle cx="0" cy="5" r="3" fill="#ef4444" opacity="0.5"/>
      <rect x="-1.5" y="-15" width="3" height="15" fill="#ef4444" opacity="0.5"/>
    </g>

    <!-- Alert Indicator Circle Bottom Right -->
    <g transform="translate(1080, 420)">
      <!-- Outer ring -->
      <circle cx="0" cy="0" r="28" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3" stroke-dasharray="8,4"/>
      <!-- Inner circle -->
      <circle cx="0" cy="0" r="18" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.5"/>
      <!-- Center dot -->
      <circle cx="0" cy="0" r="6" fill="#f59e0b" opacity="0.4"/>
    </g>

    <!-- Lock Icon Left Center -->
    <g transform="translate(700, 300)">
      <!-- Lock body -->
      <rect x="-8" y="8" width="16" height="20" rx="2"
            fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.35"/>
      <!-- Lock shackle -->
      <path d="M -8 8 Q -12 0 0 -8 Q 12 0 8 8"
            fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
      <!-- Lock hole -->
      <circle cx="0" cy="15" r="2.5" fill="#3b82f6" opacity="0.35"/>
    </g>

    <!-- Data Connection Lines (flowing) -->
    <!-- Horizontal flow line -->
    <line x1="720" y1="280" x2="810" y2="280"
          stroke="#3b82f6" stroke-width="1.5" opacity="0.25" stroke-dasharray="3,3"/>

    <!-- Vertical accent line -->
    <line x1="850" y1="120" x2="850" y2="180"
          stroke="#f59e0b" stroke-width="1.2" opacity="0.2" stroke-dasharray="2,2"/>

    <!-- Pulse circles around shield -->
    <circle cx="850" cy="220" r="70" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.12" stroke-dasharray="8,4"/>
    <circle cx="850" cy="220" r="100" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.06" stroke-dasharray="10,5"/>
  </g>

  <!-- Decorative accent line bottom -->
  <line x1="0" y1="610" x2="1200" y2="610" stroke="#3b82f6" stroke-width="1" opacity="0.1"/>
</svg>