<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#cc0044"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#cc0044;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff0066;stop-opacity:0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AitM Phishing / Adversary-in-the-Middle concept -->
  <!-- Outer ring - network boundary -->
  <circle cx="1010" cy="225" r="120" fill="none" stroke="rgba(255,68,68,0.25)" stroke-width="1.5" stroke-dasharray="8,4"/>
  <circle cx="1010" cy="225" r="90" fill="none" stroke="rgba(255,136,0,0.20)" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Central attacker node (adversary-in-middle) -->
  <polygon points="1010,155 1042,205 1010,195 978,205" fill="url(#shieldGrad)" stroke="rgba(255,68,68,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="30" fill="rgba(200,0,40,0.12)" stroke="rgba(255,68,68,0.4)" stroke-width="1.5"/>
  <!-- Skull/threat icon inside center circle -->
  <circle cx="1010" cy="219" r="10" fill="rgba(255,80,80,0.18)" stroke="rgba(255,100,100,0.5)" stroke-width="1"/>
  <line x1="1003" y1="228" x2="1017" y2="228" stroke="rgba(255,80,80,0.6)" stroke-width="1.5"/>
  <line x1="1006" y1="232" x2="1014" y2="232" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>

  <!-- Victim node (left of center) -->
  <rect x="898" y="195" width="36" height="28" rx="4" fill="rgba(60,120,255,0.10)" stroke="rgba(80,140,255,0.35)" stroke-width="1.5"/>
  <rect x="903" y="201" width="26" height="16" rx="2" fill="rgba(80,160,255,0.12)" stroke="rgba(100,180,255,0.25)" stroke-width="1"/>
  <!-- Screen lines -->
  <line x1="906" y1="205" x2="926" y2="205" stroke="rgba(120,200,255,0.4)" stroke-width="1"/>
  <line x1="906" y1="209" x2="922" y2="209" stroke="rgba(120,200,255,0.25)" stroke-width="1"/>

  <!-- Server/cloud node (right of center) -->
  <rect x="1068" y="192" width="44" height="34" rx="6" fill="rgba(0,200,120,0.08)" stroke="rgba(0,220,140,0.30)" stroke-width="1.5"/>
  <line x1="1074" y1="202" x2="1106" y2="202" stroke="rgba(0,240,160,0.3)" stroke-width="1"/>
  <line x1="1074" y1="208" x2="1100" y2="208" stroke="rgba(0,240,160,0.2)" stroke-width="1"/>
  <circle cx="1077" cy="217" r="3" fill="rgba(0,255,150,0.3)" stroke="rgba(0,255,150,0.5)" stroke-width="0.8"/>
  <circle cx="1085" cy="217" r="3" fill="rgba(255,180,0,0.3)" stroke="rgba(255,200,0,0.5)" stroke-width="0.8"/>

  <!-- Connection lines: victim -> attacker (intercepted) -->
  <line x1="934" y1="209" x2="978" y2="222" stroke="rgba(255,68,68,0.5)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Arrow on line -->
  <polygon points="978,222 966,216 970,226" fill="rgba(255,68,68,0.6)"/>

  <!-- Connection lines: attacker -> server -->
  <line x1="1042" y1="222" x2="1068" y2="211" stroke="rgba(255,68,68,0.5)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="1068,211 1056,208 1058,218" fill="rgba(255,68,68,0.6)"/>

  <!-- Phishing hook symbol below victim -->
  <path d="M916 240 Q916 262 930 265 Q944 268 944 255 Q944 248 938 248" fill="none" stroke="rgba(255,160,0,0.45)" stroke-width="2"/>
  <circle cx="938" cy="248" r="3" fill="none" stroke="rgba(255,180,0,0.5)" stroke-width="1.5"/>
  <!-- Hook point -->
  <line x1="944" y1="255" x2="946" y2="262" stroke="rgba(255,160,0,0.4)" stroke-width="1.5"/>

  <!-- Agent/bot symbol - hexagonal agentic node -->
  <polygon points="1010,270 1030,281 1030,303 1010,314 990,303 990,281" fill="rgba(150,50,255,0.10)" stroke="rgba(180,80,255,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="292" r="10" fill="rgba(160,60,255,0.12)" stroke="rgba(190,90,255,0.3)" stroke-width="1"/>
  <!-- AI circuit lines inside hex -->
  <line x1="1003" y1="288" x2="1017" y2="288" stroke="rgba(190,100,255,0.4)" stroke-width="0.8"/>
  <line x1="1003" y1="292" x2="1017" y2="292" stroke="rgba(190,100,255,0.4)" stroke-width="0.8"/>
  <line x1="1003" y1="296" x2="1013" y2="296" stroke="rgba(190,100,255,0.3)" stroke-width="0.8"/>

  <!-- Connection from center attacker to agentic node -->
  <line x1="1010" y1="255" x2="1010" y2="270" stroke="rgba(255,68,68,0.3)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Microsoft logo-inspired squares (fragmented) -->
  <rect x="960" y="148" width="14" height="14" rx="1" fill="rgba(242,80,34,0.15)" stroke="rgba(242,80,34,0.3)" stroke-width="1"/>
  <rect x="976" y="148" width="14" height="14" rx="1" fill="rgba(127,186,0,0.12)" stroke="rgba(127,186,0,0.25)" stroke-width="1"/>
  <rect x="960" y="164" width="14" height="14" rx="1" fill="rgba(0,164,239,0.12)" stroke="rgba(0,164,239,0.25)" stroke-width="1"/>
  <rect x="976" y="164" width="14" height="14" rx="1" fill="rgba(255,185,0,0.12)" stroke="rgba(255,185,0,0.25)" stroke-width="1"/>

  <!-- Token/session theft indicators -->
  <rect x="1040" y="155" width="28" height="14" rx="3" fill="rgba(255,200,0,0.08)" stroke="rgba(255,220,0,0.3)" stroke-width="1"/>
  <line x1="1043" y1="160" x2="1065" y2="160" stroke="rgba(255,220,0,0.4)" stroke-width="1"/>
  <line x1="1043" y1="164" x2="1060" y2="164" stroke="rgba(255,220,0,0.25)" stroke-width="1"/>
  <!-- Red X over token -->
  <line x1="1064" y1="153" x2="1070" y2="159" stroke="rgba(255,60,60,0.6)" stroke-width="1.5"/>
  <line x1="1070" y1="153" x2="1064" y2="159" stroke="rgba(255,60,60,0.6)" stroke-width="1.5"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,68,68,0.8)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,136,0,0.8)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,68,68,0.6)"/>

  <!-- Background decorative circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.35)" stroke-width="1"/>
  <text x="95" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(255,140,140,0.9)" letter-spacing="1">JANUARY 23, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="42" font-weight="700" fill="rgba(255,200,200,0.95)">Microsoft AitM Phishing Agentic</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="19" fill="rgba(200,180,180,0.75)">Adversary-in-the-Middle attacks targeting Microsoft 365 &amp; Agentic AI threats</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(255,100,100,0.8)" letter-spacing="3">SECURITY / THREAT INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(200,30,30,0.20)" stroke="rgba(255,68,68,0.45)" stroke-width="1.5"/>
  <text x="135" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,140,140,0.95)" text-anchor="middle">AitM Attack</text>

  <rect x="204" y="402" width="110" height="36" rx="18" fill="rgba(180,100,0,0.20)" stroke="rgba(255,160,0,0.45)" stroke-width="1.5"/>
  <text x="259" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,200,100,0.95)" text-anchor="middle">Phishing Kit</text>

  <rect x="328" y="402" width="130" height="36" rx="18" fill="rgba(30,60,200,0.20)" stroke="rgba(80,140,255,0.45)" stroke-width="1.5"/>
  <text x="393" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(140,180,255,0.95)" text-anchor="middle">Agentic AI Risk</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,100,100,0.35)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>