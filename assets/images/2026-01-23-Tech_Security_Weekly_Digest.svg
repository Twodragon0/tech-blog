<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest - Microsoft AitM Phishing, Agentic AI Zero Trust</title>
  <defs>
    <filter id="orbGlow"><feGaussianBlur stdDeviation="40" /></filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5" />
    </pattern>
  </defs>

  <!-- Base + dot pattern -->
  <rect width="1200" height="630" fill="#0f172a" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Orb glows -->
  <circle cx="760" cy="140" r="185" fill="#dc2626" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1050" cy="430" r="150" fill="#8b5cf6" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="200" cy="490" r="120" fill="#ec4899" opacity="0.05" filter="url(#orbGlow)" />

  <!-- Card 1 (top-right): Zero Trust concentric rings -->
  <g transform="translate(832, 58)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(95, 20)">
      <!-- Concentric trust rings -->
      <circle cx="60" cy="42" r="36" fill="none" stroke="#ec4899" stroke-width="1.4" opacity="0.35" stroke-dasharray="5 3" />
      <circle cx="60" cy="42" r="24" fill="none" stroke="#ec4899" stroke-width="1.6" opacity="0.55" stroke-dasharray="5 3" />
      <circle cx="60" cy="42" r="12" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.75" />
      <circle cx="60" cy="42" r="4" fill="#ec4899" opacity="0.6" />
      <!-- Verify tick marks at ring intersections -->
      <path d="M44 26 L50 32" stroke="#8b5cf6" stroke-width="1.8" stroke-linecap="round" opacity="0.6" />
      <path d="M76 26 L70 32" stroke="#8b5cf6" stroke-width="1.8" stroke-linecap="round" opacity="0.6" />
      <path d="M44 58 L50 52" stroke="#8b5cf6" stroke-width="1.8" stroke-linecap="round" opacity="0.6" />
      <path d="M76 58 L70 52" stroke="#8b5cf6" stroke-width="1.8" stroke-linecap="round" opacity="0.6" />
      <!-- Label -->
      <rect x="12" y="62" width="96" height="14" rx="3" fill="#ec4899" opacity="0.18" stroke="#ec4899" stroke-width="0.8" stroke-opacity="0.4" />
      <text x="60" y="73" text-anchor="middle" fill="#f9a8d4" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">ZERO TRUST</text>
    </g>
    <circle cx="130" cy="200" r="3" fill="#ec4899" opacity="0.8" />
    <circle cx="145" cy="200" r="3" fill="#8b5cf6" opacity="0.6" />
    <circle cx="160" cy="200" r="3" fill="#ec4899" opacity="0.4" />
  </g>

  <!-- Card 2 (middle): Agentic AI brain + shield -->
  <g transform="translate(720, 193)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(95, 18)">
      <!-- Brain silhouette (simplified) -->
      <ellipse cx="50" cy="28" rx="28" ry="22" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.7" />
      <path d="M36 20 Q32 28 36 36" fill="none" stroke="#8b5cf6" stroke-width="1.4" opacity="0.5" />
      <path d="M64 20 Q68 28 64 36" fill="none" stroke="#8b5cf6" stroke-width="1.4" opacity="0.5" />
      <!-- Neural nodes -->
      <circle cx="40" cy="24" r="2.5" fill="#8b5cf6" opacity="0.7" />
      <circle cx="60" cy="24" r="2.5" fill="#8b5cf6" opacity="0.7" />
      <circle cx="50" cy="36" r="2.5" fill="#8b5cf6" opacity="0.7" />
      <line x1="40" y1="24" x2="60" y2="24" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5" />
      <line x1="40" y1="24" x2="50" y2="36" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5" />
      <line x1="60" y1="24" x2="50" y2="36" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5" />
      <!-- Shield below brain -->
      <path d="M34 52 L50 46 L66 52 L66 72 C66 82 58 88 50 92 C42 88 34 82 34 72 Z" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1.8" stroke-opacity="0.7" />
      <polyline points="42 70 48 76 58 62" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
      <!-- Label -->
      <rect x="12" y="70" width="96" height="14" rx="3" fill="#8b5cf6" opacity="0.18" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.4" />
      <text x="60" y="81" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">AI ZERO TRUST</text>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b" />
    <rect x="40" y="192" width="162" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3 (front/lower): AitM phishing email+hook -->
  <g transform="translate(660, 342)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(108, 14)">
      <!-- Email envelope -->
      <rect x="10" y="8" width="80" height="58" rx="5" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.7" />
      <!-- Envelope flap (open) -->
      <polyline points="10,8 50,42 90,8" fill="none" stroke="#dc2626" stroke-width="1.8" opacity="0.6" stroke-linejoin="round" />
      <!-- Fishhook coming out of envelope -->
      <path d="M50 42 L50 72 Q50 82 60 82 Q70 82 70 72 L70 66" fill="none" stroke="#dc2626" stroke-width="2.5" opacity="0.8" stroke-linecap="round" />
      <!-- Hook barb -->
      <path d="M64 66 L70 60 L76 66" fill="none" stroke="#dc2626" stroke-width="2.2" opacity="0.7" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Label -->
      <rect x="12" y="90" width="76" height="14" rx="3" fill="#dc2626" opacity="0.18" stroke="#dc2626" stroke-width="0.8" stroke-opacity="0.4" />
      <text x="50" y="101" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">AitM PHISHING</text>
    </g>
    <g transform="translate(40, 198)">
      <rect width="240" height="26" rx="6" fill="#1e293b" opacity="0.8" />
      <circle cx="18" cy="13" r="5" fill="#dc2626" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="725" cy="280" r="2" fill="#dc2626" opacity="0.5">
    <animate attributeName="cy" values="280;270;280" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="840" cy="330" r="1.5" fill="#8b5cf6" opacity="0.4">
    <animate attributeName="cy" values="330;320;330" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1060" cy="300" r="2" fill="#ec4899" opacity="0.5">
    <animate attributeName="cy" values="300;290;300" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="690" cy="205" r="1.5" fill="#dc2626" opacity="0.3">
    <animate attributeName="cy" values="205;197;205" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1112" cy="175" r="1" fill="#8b5cf6" opacity="0.4">
    <animate attributeName="cy" values="175;167;175" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- WEEKLY DIGEST badge -->
  <g transform="translate(60, 80)">
    <rect width="160" height="32" rx="16" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1" stroke-opacity="0.4" />
    <text x="80" y="21" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">WEEKLY DIGEST</text>
  </g>

  <!-- Left text block -->
  <text x="60" y="170" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Tech Security</text>
  <text x="60" y="224" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Weekly</text>
  <text x="60" y="282" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700" letter-spacing="-0.3">AitM Phishing</text>
  <text x="60" y="328" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700" letter-spacing="-0.3">AI Zero Trust</text>

  <!-- Accent divider -->
  <rect x="60" y="352" width="200" height="3" rx="1.5" fill="url(#accentLine)" />

  <!-- Tag pills -->
  <g transform="translate(60, 372)">
    <rect width="80" height="30" rx="15" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="0.8" stroke-opacity="0.35" />
    <text x="40" y="20" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Microsoft</text>
    <g transform="translate(90, 0)">
      <rect width="52" height="30" rx="15" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="26" y="20" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AitM</text>
    </g>
    <g transform="translate(152, 0)">
      <rect width="88" height="30" rx="15" fill="#ec4899" opacity="0.12" stroke="#ec4899" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="44" y="20" text-anchor="middle" fill="#f9a8d4" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Zero Trust</text>
    </g>
    <g transform="translate(250, 0)">
      <rect width="64" height="30" rx="15" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="32" y="20" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">OpenAI</text>
    </g>
  </g>

  <text x="60" y="450" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">JANUARY 23, 2026</text>

  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8" />
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
</svg>
