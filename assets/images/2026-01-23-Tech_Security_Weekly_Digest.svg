<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>Tech Security Weekly Digest</title>
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 44px; font-weight: bold; fill: white; }
      .date-badge { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 600; fill: #3b82f6; }
      .tag-pill { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; fill: white; }
      .footer { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; fill: #9ca3af; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- LEFT SIDE CONTENT -->
  
  <!-- Date Badge -->
  <rect x="60" y="45" width="160" height="32" rx="6" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="65" text-anchor="middle" class="date-badge">JANUARY 23, 2026</text>
  
  <!-- Title -->
  <text x="80" y="210" class="title">Tech Security</text>
  <text x="80" y="270" class="title">Digest</text>
  <text x="80" y="330" class="title" font-size="36">Microsoft AitM</text>
  
  <!-- Tag Pills -->
  <g>
    <!-- Tag 1: Security -->
    <rect x="80" y="415" width="95" height="32" rx="16" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
    <text x="127.5" y="437" text-anchor="middle" class="tag-pill">Security</text>
    
    <!-- Tag 2: AI/LLM -->
    <rect x="190" y="415" width="85" height="32" rx="16" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="232.5" y="437" text-anchor="middle" class="tag-pill">AI/LLM</text>
    
    <!-- Tag 3: Threat -->
    <rect x="290" y="415" width="85" height="32" rx="16" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="332.5" y="437" text-anchor="middle" class="tag-pill">Threat</text>
  </g>
  
  <!-- Footer -->
  <text x="80" y="575" class="footer">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE VISUAL SCENE -->
  
  <!-- Background gradient area for right side -->
  <rect x="650" y="80" width="500" height="470" rx="8" fill="#1a1d2e" opacity="0.4"/>
  
  <!-- Brain Silhouette with Neural Lines -->
  <g opacity="0.10">
    <!-- Brain outline -->
    <ellipse cx="750" cy="200" rx="55" ry="65" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <path d="M 720 180 Q 715 200 720 220" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.8"/>
    <path d="M 780 180 Q 785 200 780 220" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.8"/>
    
    <!-- Neural connections -->
    <circle cx="730" cy="190" r="2" fill="#3b82f6"/>
    <circle cx="770" cy="190" r="2" fill="#3b82f6"/>
    <circle cx="750" cy="220" r="2" fill="#3b82f6"/>
    
    <line x1="730" y1="190" x2="770" y2="190" stroke="#3b82f6" stroke-width="0.8"/>
    <line x1="730" y1="190" x2="750" y2="220" stroke="#3b82f6" stroke-width="0.8"/>
    <line x1="770" y1="190" x2="750" y2="220" stroke="#3b82f6" stroke-width="0.8"/>
  </g>
  
  <!-- Shield with Checkmark -->
  <g opacity="0.11">
    <path d="M 920 150 L 950 160 L 950 220 Q 950 260 920 280 Q 890 260 890 220 L 890 160 Z" fill="#ef4444" stroke="#ef4444" stroke-width="2"/>
    <!-- Checkmark -->
    <polyline points="910,245 920,255 935,235" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Data Flow Arrows -->
  <defs>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" opacity="0.15"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.15"/>
    </marker>
  </defs>
  
  <!-- Arrow from brain to shield -->
  <path d="M 810 200 L 880 200" stroke="#3b82f6" stroke-width="2" opacity="0.10" fill="none" marker-end="url(#arrowhead-blue)"/>
  
  <!-- Arrow from shield downward -->
  <path d="M 920 280 L 920 330" stroke="#f59e0b" stroke-width="2" opacity="0.10" fill="none" marker-end="url(#arrowhead-orange)"/>
  
  <!-- Circular data flow -->
  <path d="M 850 300 Q 900 280 950 300 Q 920 340 850 350 Q 880 320 850 300" stroke="#3b82f6" stroke-width="1.5" opacity="0.08" fill="none" stroke-dasharray="3,3"/>
  
  <!-- Warning Triangles -->
  <g opacity="0.10">
    <!-- Top warning triangle -->
    <polygon points="1000,120 1020,160 980,160" fill="none" stroke="#ef4444" stroke-width="1.8"/>
    <text x="1000" y="150" text-anchor="middle" font-size="20" fill="#ef4444" font-weight="bold">!</text>
    
    <!-- Bottom warning triangle -->
    <polygon points="850,450 870,490 830,490" fill="none" stroke="#f59e0b" stroke-width="1.8"/>
    <text x="850" y="480" text-anchor="middle" font-size="18" fill="#f59e0b" font-weight="bold">!</text>
  </g>
  
  <!-- Alert Indicators (pulsing circles) -->
  <g opacity="0.09">
    <circle cx="920" cy="380" r="8" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="920" cy="380" r="12" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
    
    <circle cx="800" cy="320" r="6" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
    <circle cx="800" cy="320" r="10" fill="none" stroke="#3b82f6" stroke-width="0.7" opacity="0.5"/>
  </g>
  
  <!-- Circuit lines connecting elements -->
  <g opacity="0.08">
    <path d="M 750 270 L 800 300 L 850 280" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 920 200 L 980 250 L 920 300" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="800" cy="300" r="3" fill="#3b82f6" opacity="0.8"/>
    <circle cx="980" cy="250" r="3" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Decorative accent line -->
  <line x1="650" y1="80" x2="650" y2="550" stroke="#3b82f6" stroke-width="1" opacity="0.05"/>
</svg>