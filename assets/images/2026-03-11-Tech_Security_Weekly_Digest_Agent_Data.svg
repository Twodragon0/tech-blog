<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest Agent Data</title>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1425;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Left side: Content area (0-650) -->
  <rect x="0" y="0" width="650" height="630" fill="#0a0c1a" opacity="0.4"/>

  <!-- Title -->
  <text x="50" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    Tech Security
  </text>
  <text x="50" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="-0.5">
    Weekly Digest
  </text>

  <!-- Date Badge -->
  <rect x="50" y="280" width="280" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="65" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#10b981">
    MARCH 11, 2026
  </text>

  <!-- Tag Pills -->
  <g>
    <!-- Tag 1: Security -->
    <rect x="50" y="420" width="110" height="36" rx="18" fill="#1e40af" opacity="0.7"/>
    <text x="105" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#60a5fa" text-anchor="middle">
      Security
    </text>

    <!-- Tag 2: AI Agent -->
    <rect x="180" y="420" width="110" height="36" rx="18" fill="#7c2d12" opacity="0.7"/>
    <text x="235" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fb923c" text-anchor="middle">
      AI Agent
    </text>

    <!-- Tag 3: Digest -->
    <rect x="310" y="420" width="100" height="36" rx="18" fill="#065f46" opacity="0.7"/>
    <text x="360" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">
      Digest
    </text>
  </g>

  <!-- Footer -->
  <text x="50" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#64748b">
    tech.2twodragon.com
  </text>

  <!-- Right side: Illustration (700-1150) -->
  <!-- Data flow circles - background -->
  <circle cx="850" cy="150" r="80" fill="url(#accentGrad2)" opacity="0.15"/>
  <circle cx="950" cy="200" r="60" fill="url(#accentGrad1)" opacity="0.15"/>
  <circle cx="920" cy="480" r="75" fill="url(#accentGrad2)" opacity="0.15"/>

  <!-- Central Shield (Weekly Digest Container) -->
  <g filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M 900 220 L 920 240 L 920 380 Q 900 420 900 420 Q 880 420 880 380 L 880 240 Z" fill="none" stroke="url(#accentGrad1)" stroke-width="2" opacity="0.8"/>

    <!-- Shield fill with gradient -->
    <path d="M 900 220 L 920 240 L 920 380 Q 900 420 900 420 Q 880 420 880 380 L 880 240 Z" fill="url(#accentGrad1)" opacity="0.2"/>
  </g>

  <!-- Weekly calendar indicator -->
  <g>
    <rect x="825" y="320" width="150" height="120" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" opacity="0.8"/>

    <!-- Calendar grid lines -->
    <line x1="825" y1="350" x2="975" y2="350" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <line x1="825" y1="380" x2="975" y2="380" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>

    <!-- Calendar text -->
    <text x="900" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">
      WEEKLY
    </text>

    <!-- Days dots -->
    <circle cx="840" cy="365" r="3" fill="#10b981"/>
    <circle cx="860" cy="365" r="3" fill="#10b981"/>
    <circle cx="880" cy="365" r="3" fill="#10b981"/>
    <circle cx="900" cy="365" r="3" fill="#10b981" opacity="0.5"/>
    <circle cx="920" cy="365" r="3" fill="#10b981" opacity="0.3"/>

    <!-- Summary indicator -->
    <text x="900" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#cbd5e1" text-anchor="middle">
      7 day summary
    </text>
  </g>

  <!-- Data flow lines (agent collecting data) -->
  <g stroke="#10b981" stroke-width="2" fill="none" opacity="0.6">
    <!-- Inbound data streams -->
    <path d="M 750 200 Q 800 250 850 280" stroke-dasharray="5,5" opacity="0.5"/>
    <path d="M 760 350 Q 800 350 850 350"/>
    <path d="M 755 480 Q 805 420 860 380" stroke-dasharray="5,5" opacity="0.5"/>
  </g>

  <!-- Agent/AI Robot element (top right) -->
  <g filter="url(#glow)">
    <!-- Head -->
    <circle cx="1050" cy="180" r="25" fill="url(#accentGrad2)" opacity="0.8"/>

    <!-- Eyes -->
    <circle cx="1040" cy="175" r="4" fill="#ffffff"/>
    <circle cx="1060" cy="175" r="4" fill="#ffffff"/>

    <!-- Body -->
    <rect x="1025" y="210" width="50" height="50" rx="4" fill="url(#accentGrad1)" opacity="0.7"/>

    <!-- Data ports -->
    <circle cx="1015" cy="225" r="4" fill="#3b82f6"/>
    <circle cx="1085" cy="225" r="4" fill="#3b82f6"/>
    <circle cx="1015" cy="245" r="4" fill="#3b82f6"/>
    <circle cx="1085" cy="245" r="4" fill="#3b82f6"/>

    <!-- Connection lines to center -->
    <line x1="1025" y1="230" x2="950" y2="300" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
    <line x1="1025" y1="250" x2="950" y2="350" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Data points floating (representing aggregated data) -->
  <g fill="#10b981" opacity="0.7">
    <circle cx="920" cy="290" r="3"/>
    <circle cx="885" cy="310" r="2.5"/>
    <circle cx="945" cy="320" r="2"/>
    <circle cx="910" cy="340" r="2.5"/>
    <circle cx="875" cy="360" r="2"/>
    <circle cx="930" cy="370" r="3"/>
  </g>

  <!-- Lock icon (security emphasis) -->
  <g opacity="0.6" fill="none" stroke="#10b981" stroke-width="1.5">
    <!-- Lock body -->
    <rect x="745" y="510" width="35" height="32" rx="3"/>
    <!-- Lock shackle -->
    <path d="M 752 510 Q 752 490 765 490 Q 778 490 778 510"/>
    <!-- Lock keyhole -->
    <circle cx="765" cy="521" r="2.5" fill="#10b981"/>
  </g>

  <!-- Accent line separator -->
  <line x1="700" y1="0" x2="700" y2="630" stroke="#10b981" stroke-width="1" opacity="0.3"/>
</svg>