<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Date badge -->
  <rect x="45" y="50" width="130" height="32" rx="4" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.8"/>
  <text x="110" y="70" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">MARCH 22, 2026</text>

  <!-- Left side titles -->
  <text x="55" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Tech Security</text>
  <text x="55" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Weekly Digest</text>
  <text x="55" y="330" font-family="Arial, sans-serif" font-size="44" font-weight="600" fill="#f59e0b" opacity="0.9">CVE Patch</text>

  <!-- Tag pills -->
  <g id="tag1">
    <rect x="55" y="415" width="85" height="28" rx="14" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.8"/>
    <text x="97.5" y="433" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Vulnerability</text>
  </g>

  <g id="tag2">
    <rect x="155" y="415" width="75" height="28" rx="14" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="192.5" y="433" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">Security</text>
  </g>

  <g id="tag3">
    <rect x="245" y="415" width="70" height="28" rx="14" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="280" y="433" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Patch</text>
  </g>

  <!-- Footer -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#ffffff" opacity="0.6" text-anchor="middle">tech.2twodragon.com</text>

  <!-- Right side visual scene -->
  <!-- Vulnerable shield (left, with crack) -->
  <g id="vulnerable-shield">
    <!-- Shield outline -->
    <path d="M 720 140 L 760 160 L 760 270 Q 760 320 720 340 Q 680 320 680 270 L 680 160 Z"
          fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="0.8"/>

    <!-- Crack effect -->
    <path d="M 720 180 L 725 210 M 720 180 L 715 210 M 720 210 L 722 250"
          stroke="#ef4444" stroke-width="0.6" fill="none" opacity="0.4"/>

    <!-- Warning symbol inside -->
    <text x="720" y="260" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#ef4444" text-anchor="middle" opacity="0.5">!</text>
  </g>

  <!-- Secure shield (right, with checkmark) -->
  <g id="secure-shield">
    <!-- Large shield outline -->
    <path d="M 920 120 L 980 150 L 980 290 Q 980 360 920 385 Q 860 360 860 290 L 860 150 Z"
          fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.2"/>

    <!-- Checkmark -->
    <path d="M 900 300 L 910 315 L 945 270"
          stroke="#3b82f6" stroke-width="1.8" fill="none" opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Data flow arrows -->
  <!-- Arrow 1: Top arrow going right -->
  <defs>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444" opacity="0.4"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" opacity="0.4"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.4"/>
    </marker>
  </defs>

  <!-- Curved arrow from vulnerable to secure -->
  <path d="M 770 240 Q 840 180 860 230"
        stroke="#3b82f6" stroke-width="0.8" fill="none" opacity="0.3" marker-end="url(#arrowhead-blue)"/>

  <!-- Central warning triangle -->
  <g id="warning-triangle">
    <polygon points="840,380 860,420 820,420"
             fill="#f59e0b" opacity="0.07" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="840" y="410" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle" opacity="0.4">⚠</text>
  </g>

  <!-- Alert circles -->
  <circle cx="750" cy="380" r="12" fill="none" stroke="#ef4444" stroke-width="0.6" opacity="0.25"/>
  <circle cx="750" cy="380" r="18" fill="none" stroke="#ef4444" stroke-width="0.4" opacity="0.15"/>

  <circle cx="920" cy="420" r="12" fill="none" stroke="#3b82f6" stroke-width="0.6" opacity="0.25"/>
  <circle cx="920" cy="420" r="18" fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.15"/>

  <!-- Network nodes -->
  <g id="network-nodes">
    <!-- Top left node -->
    <circle cx="700" cy="200" r="4" fill="#ef4444" opacity="0.15"/>
    <circle cx="700" cy="200" r="6" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.2"/>

    <!-- Top right node -->
    <circle cx="950" cy="180" r="4" fill="#3b82f6" opacity="0.15"/>
    <circle cx="950" cy="180" r="6" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>

    <!-- Bottom center node -->
    <circle cx="840" cy="480" r="4" fill="#f59e0b" opacity="0.15"/>
    <circle cx="840" cy="480" r="6" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Connection lines -->
  <line x1="700" y1="200" x2="840" y2="310" stroke="#ef4444" stroke-width="0.5" opacity="0.15"/>
  <line x1="950" y1="180" x2="840" y2="310" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
  <line x1="840" y1="310" x2="840" y2="480" stroke="#f59e0b" stroke-width="0.5" opacity="0.15"/>

  <!-- Additional security indicators -->
  <g id="security-bars">
    <!-- Bar 1 (partial) -->
    <rect x="1020" y="200" width="3" height="50" fill="#ef4444" opacity="0.15"/>
    <rect x="1020" y="200" width="3" height="25" fill="#ef4444" opacity="0.25"/>

    <!-- Bar 2 (fuller) -->
    <rect x="1030" y="200" width="3" height="50" fill="#3b82f6" opacity="0.15"/>
    <rect x="1030" y="200" width="3" height="40" fill="#3b82f6" opacity="0.25"/>

    <!-- Bar 3 (full) -->
    <rect x="1040" y="200" width="3" height="50" fill="#f59e0b" opacity="0.15"/>
    <rect x="1040" y="200" width="3" height="48" fill="#f59e0b" opacity="0.25"/>
  </g>

  <!-- Scan lines effect -->
  <line x1="680" y1="150" x2="1050" y2="150" stroke="#3b82f6" stroke-width="0.3" opacity="0.05"/>
  <line x1="675" y1="200" x2="1055" y2="200" stroke="#3b82f6" stroke-width="0.3" opacity="0.05"/>
  <line x1="670" y1="250" x2="1060" y2="250" stroke="#3b82f6" stroke-width="0.3" opacity="0.05"/>
  <line x1="675" y1="300" x2="1055" y2="300" stroke="#3b82f6" stroke-width="0.3" opacity="0.05"/>
  <line x1="680" y1="350" x2="1050" y2="350" stroke="#ef4444" stroke-width="0.3" opacity="0.05"/>
  <line x1="685" y1="400" x2="1045" y2="400" stroke="#f59e0b" stroke-width="0.3" opacity="0.05"/>
</svg>