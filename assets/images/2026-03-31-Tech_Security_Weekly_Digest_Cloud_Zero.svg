<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <title>Tech Security Weekly Digest Cloud Zero</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4757;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Left side: Title and metadata -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">Tech Security</text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">Weekly Digest</text>

  <!-- Date badge -->
  <rect x="60" y="270" width="280" height="40" rx="6" fill="#1a1f3a" stroke="#00d4ff" stroke-width="2"/>
  <text x="75" y="296" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#00d4ff">MARCH 28, 2026</text>

  <!-- Tag pills -->
  <g id="tags">
    <!-- Tag 1: Cloud -->
    <rect x="60" y="420" width="85" height="28" rx="14" fill="#1a3a4a" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="75" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#00d4ff">CLOUD</text>

    <!-- Tag 2: Zero Trust -->
    <rect x="160" y="420" width="120" height="28" rx="14" fill="#3a1a3a" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="175" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ff6b6b">ZERO TRUST</text>

    <!-- Tag 3: Security -->
    <rect x="295" y="420" width="110" height="28" rx="14" fill="#1a3a1a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="310" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#4ade80">SECURITY</text>
  </g>

  <!-- Footer -->
  <text x="60" y="595" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#666">tech.2twodragon.com</text>

  <!-- Right side: Cloud Zero illustration -->
  <!-- Background glow -->
  <circle cx="925" cy="315" r="180" fill="url(#radialGradient)"/>

  <!-- Outer security ring -->
  <circle cx="925" cy="315" r="175" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <circle cx="925" cy="315" r="160" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>

  <!-- Middle security ring -->
  <circle cx="925" cy="315" r="130" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
  <circle cx="925" cy="315" r="115" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>

  <!-- Cloud shapes - outer layer -->
  <!-- Cloud 1 (top-left) -->
  <ellipse cx="800" cy="200" rx="35" ry="28" fill="url(#cloudGrad)" opacity="0.8"/>
  <ellipse cx="820" cy="190" rx="28" ry="32" fill="url(#cloudGrad)" opacity="0.8"/>
  <ellipse cx="780" cy="210" rx="32" ry="25" fill="url(#cloudGrad)" opacity="0.8"/>

  <!-- Cloud 2 (top-right) -->
  <ellipse cx="1050" cy="180" rx="32" ry="26" fill="url(#cloudGrad)" opacity="0.75"/>
  <ellipse cx="1070" cy="195" rx="35" ry="30" fill="url(#cloudGrad)" opacity="0.75"/>
  <ellipse cx="1025" cy="205" rx="30" ry="24" fill="url(#cloudGrad)" opacity="0.75"/>

  <!-- Cloud 3 (bottom) -->
  <ellipse cx="910" cy="450" rx="38" ry="28" fill="url(#cloudGrad)" opacity="0.7"/>
  <ellipse cx="940" cy="460" rx="32" ry="30" fill="url(#cloudGrad)" opacity="0.7"/>
  <ellipse cx="875" cy="465" rx="35" ry="26" fill="url(#cloudGrad)" opacity="0.7"/>

  <!-- Identity/Access nodes on outer ring -->
  <!-- Node 1 (right) -->
  <circle cx="1100" cy="315" r="12" fill="#4ade80" opacity="0.9"/>
  <circle cx="1100" cy="315" r="8" fill="#4ade80" opacity="0.5"/>
  <line x1="1095" y1="315" x2="1085" y2="315" stroke="#4ade80" stroke-width="2" opacity="0.6"/>

  <!-- Node 2 (top) -->
  <circle cx="925" cy="145" r="12" fill="#4ade80" opacity="0.9"/>
  <circle cx="925" cy="145" r="8" fill="#4ade80" opacity="0.5"/>
  <line x1="925" y1="140" x2="925" y2="130" stroke="#4ade80" stroke-width="2" opacity="0.6"/>

  <!-- Node 3 (left) -->
  <circle cx="750" cy="315" r="12" fill="#4ade80" opacity="0.85"/>
  <circle cx="750" cy="315" r="8" fill="#4ade80" opacity="0.5"/>
  <line x1="755" y1="315" x2="765" y2="315" stroke="#4ade80" stroke-width="2" opacity="0.6"/>

  <!-- Central verification/policy hub -->
  <!-- Lock icon (zero trust center) -->
  <g transform="translate(925, 315)">
    <!-- Lock body -->
    <rect x="-18" y="-8" width="36" height="32" rx="4" fill="none" stroke="url(#lockGrad)" stroke-width="2.5"/>
    <!-- Lock shackle -->
    <path d="M -12 -8 Q -12 -20 0 -20 Q 12 -20 12 -8" fill="none" stroke="url(#lockGrad)" stroke-width="2.5"/>
    <!-- Lock dot -->
    <circle cx="0" cy="8" r="3" fill="url(#lockGrad)"/>
  </g>

  <!-- Verification checkmarks around center -->
  <!-- Check 1 (top-right of lock) -->
  <g transform="translate(945, 295)">
    <path d="M 0 0 L 4 4 L 10 -4" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Check 2 (bottom-right of lock) -->
  <g transform="translate(950, 330)">
    <path d="M 0 0 L 4 4 L 10 -4" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Check 3 (left of lock) -->
  <g transform="translate(895, 320)">
    <path d="M 0 0 L 4 4 L 10 -4" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Connection lines to outer nodes -->
  <line x1="905" y1="310" x2="760" y2="315" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="930" y1="295" x2="925" y2="160" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  <line x1="945" y1="310" x2="1090" y2="315" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>

  <!-- Zero Trust label -->
  <text x="925" y="385" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#00d4ff" text-anchor="middle" opacity="0.9">ZERO TRUST</text>
  <text x="925" y="405" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#888" text-anchor="middle" opacity="0.7">Cloud Zero</text>
</svg>