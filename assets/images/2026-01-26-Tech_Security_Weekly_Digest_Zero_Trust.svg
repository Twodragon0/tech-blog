<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1220;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- LEFT SIDE -->
  <text x="80" y="60" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ef4444" letter-spacing="2">
    JANUARY 26, 2026
  </text>

  <line x1="80" y1="75" x2="280" y2="75" stroke="#ef4444" stroke-width="2" opacity="0.5"/>

  <text x="80" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white" letter-spacing="-1">
    Tech Security
  </text>

  <text x="80" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white" letter-spacing="-1">
    Weekly Digest
  </text>

  <text x="80" y="310" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#ef4444" letter-spacing="-2">
    Zero Trust
  </text>

  <!-- Tags -->
  <g id="tag1">
    <rect x="80" y="430" width="110" height="32" rx="16" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.3"/>
    <text x="135" y="450" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="600">Security</text>
  </g>

  <g id="tag2">
    <rect x="210" y="430" width="110" height="32" rx="16" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.3"/>
    <text x="265" y="450" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="600">Compliance</text>
  </g>

  <g id="tag3">
    <rect x="340" y="430" width="110" height="32" rx="16" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.3"/>
    <text x="395" y="450" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="600">Threats</text>
  </g>

  <!-- Footer -->
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.6" letter-spacing="0.5">
    tech.2twodragon.com
  </text>

  <!-- RIGHT SIDE - ZERO TRUST VISUAL SCENE -->
  <!-- Dashed trust boundaries (circles) -->
  <circle cx="750" cy="200" r="80" fill="none" stroke="#3b82f6" stroke-width="0.3" stroke-dasharray="3,2" opacity="0.1"/>
  <circle cx="950" cy="280" r="75" fill="none" stroke="#ef4444" stroke-width="0.3" stroke-dasharray="3,2" opacity="0.1"/>
  <circle cx="850" cy="420" r="90" fill="none" stroke="#f59e0b" stroke-width="0.3" stroke-dasharray="3,2" opacity="0.1"/>

  <!-- Network nodes -->
  <g id="node1" filter="url(#glow)">
    <circle cx="750" cy="200" r="18" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="750" cy="200" r="12" fill="none" stroke="#3b82f6" stroke-width="0.2" opacity="0.3"/>
  </g>

  <g id="node2" filter="url(#glow)">
    <circle cx="950" cy="280" r="18" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.25"/>
    <circle cx="950" cy="280" r="12" fill="none" stroke="#ef4444" stroke-width="0.2" opacity="0.3"/>
  </g>

  <g id="node3" filter="url(#glow)">
    <circle cx="850" cy="420" r="18" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.25"/>
    <circle cx="850" cy="420" r="12" fill="none" stroke="#f59e0b" stroke-width="0.2" opacity="0.3"/>
  </g>

  <g id="node4" filter="url(#glow)">
    <circle cx="1050" cy="380" r="16" fill="#3b82f6" opacity="0.11" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="1050" cy="380" r="10" fill="none" stroke="#3b82f6" stroke-width="0.2" opacity="0.3"/>
  </g>

  <!-- Data flow arrows -->
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.3"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.3"/>
    </marker>
  </defs>

  <path d="M 780 220 Q 850 250 930 270" stroke="#3b82f6" stroke-width="0.25" fill="none" marker-end="url(#arrowblue)" opacity="0.4"/>
  <path d="M 940 300 Q 900 360 870 400" stroke="#ef4444" stroke-width="0.25" fill="none" marker-end="url(#arrowred)" opacity="0.4"/>
  <path d="M 870 440 Q 950 410 1030 390" stroke="#3b82f6" stroke-width="0.25" fill="none" marker-end="url(#arrowblue)" opacity="0.4"/>

  <!-- Large central shield with checkmark -->
  <g id="shield" filter="url(#glow)">
    <!-- Shield shape -->
    <path d="M 900 150 L 950 180 L 950 320 Q 900 360 900 360 Q 850 320 850 320 L 850 180 Z"
          fill="#3b82f6" opacity="0.09" stroke="#3b82f6" stroke-width="0.35"/>

    <!-- Checkmark inside shield -->
    <path d="M 880 290 L 895 305 L 920 280"
          fill="none" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  </g>

  <!-- Warning triangles -->
  <g id="warning1">
    <path d="M 1100 120 L 1120 160 L 1080 160 Z"
          fill="#f59e0b" opacity="0.06" stroke="#f59e0b" stroke-width="0.25"/>
    <text x="1100" y="155" font-family="Arial" font-size="16" fill="#f59e0b" text-anchor="middle" opacity="0.25" font-weight="bold">!</text>
  </g>

  <g id="warning2">
    <path d="M 680 480 L 700 520 L 660 520 Z"
          fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="0.25"/>
    <text x="680" y="515" font-family="Arial" font-size="14" fill="#ef4444" text-anchor="middle" opacity="0.25" font-weight="bold">!</text>
  </g>

  <!-- Verification indicators (small checkmarks) -->
  <g id="verify1">
    <circle cx="1000" cy="130" r="12" fill="none" stroke="#3b82f6" stroke-width="0.2" opacity="0.2"/>
    <path d="M 995 130 L 1000 135 L 1008 125"
          fill="none" stroke="#3b82f6" stroke-width="0.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
  </g>

  <g id="verify2">
    <circle cx="750" cy="480" r="12" fill="none" stroke="#3b82f6" stroke-width="0.2" opacity="0.2"/>
    <path d="M 745 480 L 750 485 L 758 475"
          fill="none" stroke="#3b82f6" stroke-width="0.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
  </g>

  <!-- Decorative security elements -->
  <rect x="700" y="350" width="30" height="30" rx="2" fill="#ef4444" opacity="0.04" stroke="#ef4444" stroke-width="0.2"/>
  <rect x="1070" y="460" width="25" height="25" rx="2" fill="#f59e0b" opacity="0.04" stroke="#f59e0b" stroke-width="0.2"/>

  <!-- Connection lines (trust chains) -->
  <line x1="850" y1="200" x2="950" y2="280" stroke="#3b82f6" stroke-width="0.15" opacity="0.15"/>
  <line x1="950" y1="300" x2="850" y2="400" stroke="#f59e0b" stroke-width="0.15" opacity="0.15"/>
  <line x1="870" y1="435" x2="1030" y2="390" stroke="#3b82f6" stroke-width="0.15" opacity="0.15"/>
</svg>