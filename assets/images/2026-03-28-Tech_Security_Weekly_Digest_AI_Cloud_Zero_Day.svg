  <!-- Outer shield ring -->
  <circle cx="1010" cy="225" r="110" fill="rgba(68,136,255,0.06)" stroke="rgba(68,136,255,0.25)" stroke-width="1.5"/>
  <!-- Inner shield ring -->
  <circle cx="1010" cy="225" r="82" fill="rgba(255,68,68,0.07)" stroke="rgba(255,68,68,0.2)" stroke-width="1"/>

  <!-- Cloud shape (AI Cloud) -->
  <path d="M960,215 Q955,195 970,190 Q975,175 992,178 Q998,165 1015,168 Q1030,162 1038,175 Q1055,172 1058,188 Q1070,192 1065,208 Q1068,220 1055,222 Q970,222 960,215 Z"
        fill="rgba(68,136,255,0.12)" stroke="rgba(68,136,255,0.35)" stroke-width="1.5"/>

  <!-- Zero-Day burst lines -->
  <line x1="1010" y1="140" x2="1010" y2="152" stroke="rgba(255,136,0,0.3)" stroke-width="2"/>
  <line x1="1010" y1="298" x2="1010" y2="310" stroke="rgba(255,136,0,0.3)" stroke-width="2"/>
  <line x1="900" y1="225" x2="912" y2="225" stroke="rgba(255,136,0,0.3)" stroke-width="2"/>
  <line x1="1108" y1="225" x2="1120" y2="225" stroke="rgba(255,136,0,0.3)" stroke-width="2"/>
  <line x1="922" y1="157" x2="930" y2="165" stroke="rgba(255,68,68,0.25)" stroke-width="1.5"/>
  <line x1="1090" y1="285" x2="1098" y2="293" stroke="rgba(255,68,68,0.25)" stroke-width="1.5"/>
  <line x1="1090" y1="157" x2="1098" y2="165" stroke="rgba(255,68,68,0.25)" stroke-width="1.5"/>
  <line x1="922" y1="285" x2="930" y2="293" stroke="rgba(255,68,68,0.25)" stroke-width="1.5"/>

  <!-- Shield body -->
  <path d="M1010,250 L985,262 L985,282 Q985,308 1010,318 Q1035,308 1035,282 L1035,262 Z"
        fill="rgba(255,68,68,0.1)" stroke="rgba(255,68,68,0.35)" stroke-width="1.5"/>

  <!-- Checkmark / lock in shield -->
  <path d="M1000,283 L1007,291 L1022,272" fill="none" stroke="rgba(255,200,100,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI circuit nodes -->
  <circle cx="968" cy="255" r="5" fill="rgba(68,136,255,0.15)" stroke="rgba(68,136,255,0.4)" stroke-width="1.5"/>
  <circle cx="1052" cy="255" r="5" fill="rgba(68,136,255,0.15)" stroke="rgba(68,136,255,0.4)" stroke-width="1.5"/>
  <circle cx="968" cy="255" r="2" fill="rgba(68,136,255,0.6)"/>
  <circle cx="1052" cy="255" r="2" fill="rgba(68,136,255,0.6)"/>
  <line x1="968" y1="255" x2="985" y2="265" stroke="rgba(68,136,255,0.2)" stroke-width="1"/>
  <line x1="1052" y1="255" x2="1035" y2="265" stroke="rgba(68,136,255,0.2)" stroke-width="1"/>

  <!-- Orbit ring around illustration -->
  <ellipse cx="1010" cy="225" rx="118" ry="40" fill="none" stroke="rgba(255,136,0,0.08)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Decorative corner hexagon fragments -->
  <polygon points="880,145 895,135 910,145 910,165 895,175 880,165" fill="rgba(68,136,255,0.06)" stroke="rgba(68,136,255,0.2)" stroke-width="1"/>
  <polygon points="1110,290 1125,280 1140,290 1140,310 1125,320 1110,310" fill="rgba(255,68,68,0.06)" stroke="rgba(255,68,68,0.2)" stroke-width="1"/>

  <!-- Small data point dots around illustration -->
  <circle cx="890" cy="190" r="2.5" fill="rgba(68,136,255,0.4)"/>
  <circle cx="1130" cy="170" r="2" fill="rgba(255,136,0,0.5)"/>
  <circle cx="1125" cy="245" r="2.5" fill="rgba(255,68,68,0.4)"/>
  <circle cx="895" cy="270" r="2" fill="rgba(68,255,136,0.4)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,68,68,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,136,0,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(68,136,255,0.7)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(255,100,100,0.9)" text-anchor="middle" letter-spacing="1">MARCH 28, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="rgba(255,120,80,0.95)" letter-spacing="-0.5">AI Cloud Zero Day</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(180,190,220,0.75)">Threat Intelligence · Cloud Security · AI Risk Roundup</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(255,68,68,0.8)" letter-spacing="3">SECURITY / WEEKLY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.4)" stroke-width="1"/>
  <text x="140" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(255,120,120,0.9)" text-anchor="middle" letter-spacing="0.5">ZERO-DAY</text>

  <rect x="216" y="402" width="110" height="36" rx="18" fill="rgba(255,136,0,0.15)" stroke="rgba(255,136,0,0.4)" stroke-width="1"/>
  <text x="271" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(255,180,80,0.9)" text-anchor="middle" letter-spacing="0.5">AI CLOUD</text>

  <rect x="342" y="402" width="118" height="36" rx="18" fill="rgba(68,136,255,0.15)" stroke="rgba(68,136,255,0.4)" stroke-width="1"/>
  <text x="401" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(100,170,255,0.9)" text-anchor="middle" letter-spacing="0.5">DEVSECOPS</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="end" letter-spacing="0.5">SECURITY</text>
</svg>