<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- LEFT SIDE CONTENT -->
  
  <!-- Date badge -->
  <rect x="50" y="40" width="180" height="40" rx="6" fill="#ef4444" opacity="0.08"/>
  <rect x="50" y="40" width="180" height="40" rx="6" fill="none" stroke="#ef4444" stroke-width="0.2"/>
  <text x="140" y="63" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">MARCH 28, 2026</text>
  
  <!-- Main title -->
  <text x="60" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Tech Security</text>
  <text x="60" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Digest Cloud Zero</text>
  
  <!-- Tag pills -->
  <g id="tags">
    <!-- Tag 1: Cloud -->
    <rect x="60" y="420" width="100" height="32" rx="16" fill="#3b82f6" opacity="0.1"/>
    <rect x="60" y="420" width="100" height="32" rx="16" fill="none" stroke="#3b82f6" stroke-width="0.25"/>
    <text x="110" y="441" font-family="Arial, sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle">Cloud</text>
    
    <!-- Tag 2: Security -->
    <rect x="180" y="420" width="110" height="32" rx="16" fill="#ef4444" opacity="0.1"/>
    <rect x="180" y="420" width="110" height="32" rx="16" fill="none" stroke="#ef4444" stroke-width="0.25"/>
    <text x="235" y="441" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle">Security</text>
    
    <!-- Tag 3: Weekly -->
    <rect x="310" y="420" width="100" height="32" rx="16" fill="#f59e0b" opacity="0.1"/>
    <rect x="310" y="420" width="100" height="32" rx="16" fill="none" stroke="#f59e0b" stroke-width="0.25"/>
    <text x="360" y="441" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle">Weekly</text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="575" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.6">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE VISUAL SCENE -->
  
  <!-- Background accent circles -->
  <circle cx="900" cy="150" r="120" fill="#3b82f6" opacity="0.04"/>
  <circle cx="1050" cy="400" r="100" fill="#ef4444" opacity="0.04"/>
  
  <!-- Cloud infrastructure icon -->
  <g id="cloud-icon" opacity="0.12">
    <path d="M 750 180 Q 730 160 710 160 Q 700 140 680 140 Q 660 140 650 160 Q 630 160 620 180 L 900 180 Q 920 160 940 160 Q 960 160 970 180 Z" fill="#3b82f6" stroke="#3b82f6" stroke-width="0.3"/>
  </g>
  
  <!-- Simplified cloud shape -->
  <ellipse cx="800" cy="200" rx="100" ry="60" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
  <ellipse cx="750" cy="210" rx="50" ry="40" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
  <ellipse cx="850" cy="210" rx="60" ry="45" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
  
  <!-- Shield icon -->
  <g id="shield">
    <path d="M 950 250 L 950 320 Q 950 380 1000 420 Q 1050 380 1050 320 L 1050 250 Z" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.3"/>
    <!-- Checkmark inside shield -->
    <path d="M 975 340 L 995 360 L 1025 320" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Data flow arrows from cloud -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.5"/>
    </marker>
  </defs>
  
  <path d="M 880 240 Q 920 270 960 280" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.4" marker-end="url(#arrowhead)"/>
  <path d="M 870 260 Q 910 300 940 330" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.4" marker-end="url(#arrowhead)"/>
  
  <!-- Data flow circles (network nodes) -->
  <circle cx="820" cy="320" r="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.25"/>
  <circle cx="1000" cy="280" r="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="0.25"/>
  <circle cx="900" cy="380" r="7" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.25"/>
  
  <!-- Warning triangles (alert indicators) -->
  <g id="alert1">
    <polygon points="700,480 710,450 720,480" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.25"/>
    <text x="735" y="473" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" opacity="0.7">Alert</text>
  </g>
  
  <g id="alert2">
    <polygon points="1080,320 1090,290 1100,320" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.25"/>
    <text x="1110" y="313" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" opacity="0.7">Monitor</text>
  </g>
  
  <!-- Horizontal divider line -->
  <line x1="630" y1="80" x2="630" y2="550" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  
  <!-- Data packets (small rectangles along arrows) -->
  <rect x="890" y="255" width="6" height="6" fill="#3b82f6" opacity="0.15"/>
  <rect x="920" y="285" width="6" height="6" fill="#f59e0b" opacity="0.15"/>
  <rect x="950" y="310" width="6" height="6" fill="#ef4444" opacity="0.15"/>
  
  <!-- Additional connecting lines -->
  <path d="M 820 280 L 900 300" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.25" stroke-dasharray="2,2"/>
  <path d="M 900 300 L 950 330" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.25" stroke-dasharray="2,2"/>
</svg>