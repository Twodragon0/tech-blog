  <ellipse cx="1010" cy="210" rx="80" ry="48" fill="url(#cloudGrad)" stroke="rgba(68,200,255,0.30)" stroke-width="1.5"/>
  <ellipse cx="960" cy="228" rx="48" ry="34" fill="url(#cloudGrad)" stroke="rgba(68,200,255,0.25)" stroke-width="1.2"/>
  <ellipse cx="1060" cy="225" rx="44" ry="30" fill="url(#cloudGrad)" stroke="rgba(68,200,255,0.25)" stroke-width="1.2"/>
  <rect x="930" y="228" width="156" height="30" rx="4" fill="url(#cloudGrad)" stroke="none"/>

