  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(255,100,100,0.70)" letter-spacing="2.5">SECURITY / WEEKLY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(255,50,50,0.18)" stroke="rgba(255,80,80,0.40)" stroke-width="1"/>
  <text x="135" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(255,120,120,0.90)" text-anchor="middle">Zero-Day</text>

  <rect x="205" y="402" width="100" height="36" rx="18" fill="rgba(255,136,0,0.18)" stroke="rgba(255,160,0,0.40)" stroke-width="1"/>
  <text x="255" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(255,180,80,0.90)" text-anchor="middle">AI Threat</text>

  <rect x="320" y="402" width="110" height="36" rx="18" fill="rgba(68,136,255,0.18)" stroke="rgba(100,160,255,0.40)" stroke-width="1"/>
  <text x="375" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(120,180,255,0.90)" text-anchor="middle">Cloud Risk</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(180,160,160,0.50)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(180,160,160,0.50)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>