  <circle cx="1050" cy="450" r="200" fill="rgba(255,68,68,0.03)" stroke="rgba(255,68,68,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(68,136,255,0.03)" stroke="rgba(68,136,255,0.07)" stroke-width="1"/>

