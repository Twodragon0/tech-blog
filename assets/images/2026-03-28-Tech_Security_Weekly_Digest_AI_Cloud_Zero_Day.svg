  <circle cx="1140" cy="260" r="8" fill="rgba(68,136,255,0.10)" stroke="rgba(68,136,255,0.35)" stroke-width="1.2"/>
  <circle cx="940" cy="145" r="6" fill="rgba(0,200,255,0.10)" stroke="rgba(0,200,255,0.30)" stroke-width="1"/>
  <circle cx="1070" cy="148" r="6" fill="rgba(0,200,255,0.10)" stroke="rgba(0,200,255,0.30)" stroke-width="1"/>
  <circle cx="920" cy="300" r="6" fill="rgba(0,200,255,0.09)" stroke="rgba(0,200,255,0.28)" stroke-width="1"/>
  <circle cx="1100" cy="295" r="6" fill="rgba(0,200,255,0.09)" stroke="rgba(0,200,255,0.28)" stroke-width="1"/>

