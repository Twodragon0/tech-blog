  <line x1="1070" y1="148" x2="1130" y2="160" stroke="rgba(68,136,255,0.20)" stroke-width="1"/>
  <line x1="1060" y1="195" x2="1070" y2="148" stroke="rgba(68,136,255,0.16)" stroke-width="1"/>
  <line x1="880" y1="270" x2="920" y2="300" stroke="rgba(68,136,255,0.18)" stroke-width="1"/>
