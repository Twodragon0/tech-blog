<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>AI Agent Security and Cloud Zero-Day Threats</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#130820"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Cloud shape with zero-day lightning -->
  <ellipse cx="980" cy="200" rx="120" ry="55" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.2)" stroke-width="1.5"/>
  <ellipse cx="940" cy="220" rx="80" ry="40" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
  <ellipse cx="1020" cy="225" rx="70" ry="35" fill="rgba(6,182,212,0.06)" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>
  <!-- Zero-day lightning bolt -->
  <polygon points="975,155 995,195 980,195 1000,240 970,200 985,200 965,155" fill="rgba(239,68,68,0.5)" stroke="rgba(239,68,68,0.7)" stroke-width="1.5"/>
  <!-- AI agent nodes -->
  <circle cx="870" cy="340" r="20" fill="none" stroke="rgba(139,92,246,0.5)" stroke-width="2"/>
  <circle cx="940" cy="380" r="16" fill="none" stroke="rgba(139,92,246,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="340" r="18" fill="none" stroke="rgba(139,92,246,0.45)" stroke-width="1.5"/>
  <circle cx="940" cy="310" r="14" fill="none" stroke="rgba(139,92,246,0.35)" stroke-width="1"/>
  <!-- Agent connections -->
  <line x1="870" y1="340" x2="940" y2="380" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <line x1="940" y1="380" x2="1010" y2="340" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <line x1="1010" y1="340" x2="940" y2="310" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <line x1="940" y1="310" x2="870" y2="340" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
  <!-- Container supply chain boxes -->
  <rect x="850" y="430" width="55" height="30" rx="4" fill="none" stroke="rgba(245,158,11,0.4)" stroke-width="1.5"/>
  <rect x="920" y="430" width="55" height="30" rx="4" fill="none" stroke="rgba(245,158,11,0.35)" stroke-width="1.5"/>
  <rect x="990" y="430" width="55" height="30" rx="4" fill="none" stroke="rgba(239,68,68,0.4)" stroke-width="2"/>
  <line x1="905" y1="445" x2="920" y2="445" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <line x1="975" y1="445" x2="990" y2="445" stroke="rgba(239,68,68,0.3)" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <text x="180" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">MARCH 28, 2026</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">AI Agent Security</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">&amp; Cloud Zero-Day</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">Container Supply Chain | ECS Escape | LLM Agent Defense</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category label -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">SECURITY WEEKLY DIGEST</text>
  <!-- Keyword tags -->
  <rect x="80" y="420" width="100" height="36" rx="18" fill="rgba(139,92,246,0.18)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
  <text x="130" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle" font-weight="600">AI Agent</text>
  <rect x="196" y="420" width="110" height="36" rx="18" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.35)" stroke-width="1"/>
  <text x="251" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#67e8f9" text-anchor="middle" font-weight="600">Cloud 0Day</text>
  <rect x="322" y="420" width="130" height="36" rx="18" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="387" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="600">Supply Chain</text>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
