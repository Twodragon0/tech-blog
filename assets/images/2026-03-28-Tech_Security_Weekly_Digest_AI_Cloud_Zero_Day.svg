  <line x1="1005" y1="342" x2="1005" y2="350" stroke="rgba(255,50,50,0.30)" stroke-width="2"/>
  <line x1="973" y1="310" x2="965" y2="310" stroke="rgba(255,50,50,0.30)" stroke-width="2"/>
  <line x1="1037" y1="310" x2="1045" y2="310" stroke="rgba(255,50,50,0.30)" stroke-width="2"/>
  <line x1="982" y1="287" x2="976" y2="281" stroke="rgba(255,50,50,0.22)" stroke-width="1.5"/>
  <line x1="1028" y1="287" x2="1034" y2="281" stroke="rgba(255,50,50,0.22)" stroke-width="1.5"/>
  <line x1="982" y1="333" x2="976" y2="339" stroke="rgba(255,50,50,0.22)" stroke-width="1.5"/>
  <line x1="1028" y1="333" x2="1034" y2="339" stroke="rgba(255,50,50,0.22)" stroke-width="1.5"/>

