  <circle cx="1010" cy="225" r="110" fill="none" stroke="rgba(68,136,255,0.06)" stroke-width="1" stroke-dasharray="6,8"/>
  <circle cx="1010" cy="225" r="145" fill="none" stroke="rgba(255,68,68,0.05)" stroke-width="1" stroke-dasharray="4,10"/>

