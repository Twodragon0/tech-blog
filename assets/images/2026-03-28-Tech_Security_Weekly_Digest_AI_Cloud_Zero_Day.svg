<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="100%" stop-color="#6633ff"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="100%" stop-color="#6633ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6633ff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,50,100,0.04)" stroke="rgba(255,50,100,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(100,50,255,0.05)" stroke="rgba(100,50,255,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Cloud + Security Shield + Zero Day threat -->
  <!-- Cloud base shape -->
  <ellipse cx="1010" cy="260" rx="90" ry="50" fill="rgba(100,150,255,0.07)" stroke="rgba(100,150,255,0.25)" stroke-width="1.5"/>
  <ellipse cx="970" cy="245" rx="55" ry="40" fill="rgba(100,150,255,0.08)" stroke="rgba(100,150,255,0.22)" stroke-width="1.5"/>
  <ellipse cx="1050" cy="240" rx="50" ry="38" fill="rgba(100,150,255,0.08)" stroke="rgba(100,150,255,0.22)" stroke-width="1.5"/>
  <ellipse cx="1010" cy="240" rx="70" ry="45" fill="rgba(80,120,255,0.06)" stroke="rgba(80,120,255,0.20)" stroke-width="1"/>

  <!-- Shield overlay on cloud -->
  <polygon points="1010,155 1060,175 1060,220 1010,245 960,220 960,175" fill="rgba(255,50,80,0.09)" stroke="rgba(255,50,80,0.35)" stroke-width="2"/>
  <polygon points="1010,168 1050,184 1050,218 1010,238 970,218 970,184" fill="rgba(255,50,80,0.06)" stroke="rgba(255,50,80,0.20)" stroke-width="1"/>
  <!-- Shield checkmark / cross -->
  <line x1="993" y1="200" x2="1007" y2="215" stroke="rgba(255,80,100,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1007" y1="215" x2="1028" y2="188" stroke="rgba(255,80,100,0.5)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- AI neural nodes -->
  <circle cx="880" cy="165" r="10" fill="rgba(180,100,255,0.10)" stroke="rgba(180,100,255,0.35)" stroke-width="1.5"/>
  <circle cx="920" cy="145" r="7" fill="rgba(180,100,255,0.10)" stroke="rgba(180,100,255,0.30)" stroke-width="1.5"/>
  <circle cx="950" cy="170" r="9" fill="rgba(180,100,255,0.10)" stroke="rgba(180,100,255,0.30)" stroke-width="1.5"/>
  <circle cx="1070" cy="155" r="10" fill="rgba(180,100,255,0.10)" stroke="rgba(180,100,255,0.30)" stroke-width="1.5"/>
  <circle cx="1110" cy="170" r="8" fill="rgba(180,100,255,0.10)" stroke="rgba(180,100,255,0.28)" stroke-width="1.5"/>
  <circle cx="1090" cy="140" r="6" fill="rgba(180,100,255,0.08)" stroke="rgba(180,100,255,0.25)" stroke-width="1.5"/>

  <!-- Neural connections -->
  <line x1="880" y1="165" x2="920" y2="145" stroke="rgba(180,100,255,0.22)" stroke-width="1"/>
  <line x1="920" y1="145" x2="950" y2="170" stroke="rgba(180,100,255,0.22)" stroke-width="1"/>
  <line x1="880" y1="165" x2="950" y2="170" stroke="rgba(180,100,255,0.15)" stroke-width="1"/>
  <line x1="1070" y1="155" x2="1110" y2="170" stroke="rgba(180,100,255,0.22)" stroke-width="1"/>
  <line x1="1110" y1="170" x2="1090" y2="140" stroke="rgba(180,100,255,0.22)" stroke-width="1"/>
  <line x1="1070" y1="155" x2="1090" y2="140" stroke="rgba(180,100,255,0.18)" stroke-width="1"/>
  <line x1="950" y1="170" x2="1010" y2="155" stroke="rgba(180,100,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1010" y1="155" x2="1070" y2="155" stroke="rgba(180,100,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Zero-day burst / warning symbol -->
  <circle cx="1105" cy="290" r="28" fill="rgba(255,180,0,0.08)" stroke="rgba(255,180,0,0.30)" stroke-width="1.5"/>
  <circle cx="1105" cy="290" r="20" fill="rgba(255,180,0,0.06)" stroke="rgba(255,180,0,0.22)" stroke-width="1"/>
  <!-- Warning exclamation -->
  <rect x="1103" y="278" width="4" height="12" rx="2" fill="rgba(255,200,50,0.55)"/>
  <circle cx="1105" cy="297" r="2.5" fill="rgba(255,200,50,0.55)"/>

  <!-- Radiating threat lines -->
  <line x1="1105" y1="256" x2="1105" y2="248" stroke="rgba(255,180,0,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1127" y1="268" x2="1133" y2="262" stroke="rgba(255,180,0,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1133" y1="290" x2="1141" y2="290" stroke="rgba(255,180,0,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1127" y1="312" x2="1133" y2="318" stroke="rgba(255,180,0,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1083" y1="268" x2="1077" y2="262" stroke="rgba(255,180,0,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1077" y1="290" x2="1069" y2="290" stroke="rgba(255,180,0,0.25)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Data flow lines (security scan effect) -->
  <line x1="880" y1="295" x2="960" y2="295" stroke="rgba(50,200,150,0.15)" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="880" y1="308" x2="940" y2="308" stroke="rgba(50,200,150,0.10)" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="880" y1="321" x2="950" y2="321" stroke="rgba(50,200,150,0.12)" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Lock icon at bottom of illustration -->
  <rect x="995" y="280" width="30" height="24" rx="4" fill="rgba(80,200,180,0.08)" stroke="rgba(80,200,180,0.28)" stroke-width="1.5"/>
  <path d="M1001 280 Q1001 268 1010 268 Q1019 268 1019 280" fill="none" stroke="rgba(80,200,180,0.28)" stroke-width="1.5"/>
  <circle cx="1010" cy="292" r="4" fill="rgba(80,200,180,0.30)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,80,80,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="5" fill="rgba(255,180,0,0.7)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="5" fill="rgba(80,200,255,0.7)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badge)" stroke="rgba(255,50,100,0.25)" stroke-width="1"/>
  <text x="96" y="81" font-family="'Courier New', monospace" font-size="13" font-weight="600" fill="rgba(255,150,170,0.95)" letter-spacing="1.5">MARCH 28, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#ff6688">AI</tspan>
    <tspan fill="white"> Cloud </tspan>
    <tspan fill="#ffaa44">Zero Day</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(200,210,255,0.70)" letter-spacing="0.3">Weekly intelligence briefing — Security threats, AI risks &amp; cloud vulnerabilities</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" font-weight="600" fill="rgba(180,150,255,0.80)" letter-spacing="3" text-transform="uppercase">SECURITY · THREAT INTELLIGENCE · ZERO-DAY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(255,50,80,0.18)" stroke="rgba(255,50,80,0.40)" stroke-width="1"/>
  <text x="135" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,140,0.95)" text-anchor="middle" letter-spacing="0.5">ZERO-DAY</text>

  <rect x="204" y="402" width="96" height="36" rx="18" fill="rgba(255,160,0,0.18)" stroke="rgba(255,160,0,0.40)" stroke-width="1"/>
  <text x="252" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(255,200,80,0.95)" text-anchor="middle" letter-spacing="0.5">AI RISK</text>

  <rect x="312" y="402" width="116" height="36" rx="18" fill="rgba(50,130,255,0.18)" stroke="rgba(50,130,255,0.40)" stroke-width="1"/>
  <text x="370" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(100,180,255,0.95)" text-anchor="middle" letter-spacing="0.5">CLOUD SEC</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="14" fill="rgba(150,160,200,0.60)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(150,120,180,0.60)" text-anchor="end" letter-spacing="2">SECURITY</text>
</svg>