  <path d="M1005 185 L1025 192 L1025 215 Q1015 225 1005 228 Q995 225 985 215 L985 192 Z" fill="url(#shieldGrad)" stroke="rgba(255,136,0,0.35)" stroke-width="1.5"/>
  <path d="M1005 195 L1018 200 L1018 216 Q1011 222 1005 224 Q999 222 992 216 L992 200 Z" fill="rgba(255,136,0,0.08)" stroke="rgba(255,200,0,0.30)" stroke-width="1"/>

