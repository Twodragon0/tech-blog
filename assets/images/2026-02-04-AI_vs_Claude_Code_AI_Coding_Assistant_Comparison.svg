  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">AI vs Claude Code</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Deep Comparison</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">AI Coding Assistant Benchmark and Feature Analysis</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category label -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">AI TOOLS COMPARISON</text>
  <!-- Keyword tags -->
  <rect x="80" y="420" width="130" height="36" rx="18" fill="rgba(162,155,254,0.18)" stroke="rgba(162,155,254,0.4)" stroke-width="1"/>
  <text x="145" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" font-weight="600">Claude Code</text>
  <rect x="228" y="420" width="120" height="36" rx="18" fill="rgba(0,206,201,0.18)" stroke="rgba(0,206,201,0.4)" stroke-width="1"/>
  <text x="288" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#00cec9" text-anchor="middle" font-weight="600">AI Coding</text>
  <rect x="366" y="420" width="120" height="36" rx="18" fill="rgba(162,155,254,0.18)" stroke="rgba(162,155,254,0.4)" stroke-width="1"/>
  <text x="426" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" font-weight="600">Comparison</text>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
