<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side: Text content -->
  <!-- Title line 1 -->
  <text x="50" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">
    Claude Code
  </text>
  <!-- Title line 2 -->
  <text x="50" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">
    Coding Assistant
  </text>
  <!-- Subtitle -->
  <text x="50" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">
    Comparison
  </text>
  
  <!-- Date badge -->
  <rect x="50" y="310" width="280" height="36" rx="18" fill="#1e2139" stroke="#4a5568" stroke-width="1"/>
  <text x="140" y="333" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#a0aec0" text-anchor="middle">
    FEBRUARY 4, 2026
  </text>
  
  <!-- Tag pills -->
  <!-- Tag 1: Multi-Agent -->
  <rect x="50" y="420" width="130" height="32" rx="16" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
  <text x="115" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#cbd5e0" text-anchor="middle">
    Multi-Agent
  </text>
  
  <!-- Tag 2: Orchestration -->
  <rect x="195" y="420" width="140" height="32" rx="16" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
  <text x="265" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#cbd5e0" text-anchor="middle">
    Orchestration
  </text>
  
  <!-- Tag 3: Security -->
  <rect x="350" y="420" width="90" height="32" rx="16" fill="#dc2626" stroke="#991b1b" stroke-width="1" opacity="0.8"/>
  <text x="395" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">
    Security
  </text>
  
  <!-- Footer -->
  <text x="50" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#718096">
    tech.2twodragon.com
  </text>
  
  <!-- Right side: Illustration (x=700-1150, y=50-610) -->
  <!-- Central hub circle (Claude Code) -->
  <circle cx="925" cy="250" r="45" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="925" cy="250" r="40" fill="#1e40af" opacity="0.8" stroke="#60a5fa" stroke-width="2"/>
  <text x="925" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">
    Claude
  </text>
  
  <!-- Agent nodes surrounding (Executor, Explorer, Architect, Reviewer, Writer, Debugger) -->
  <!-- Top-left: Explorer -->
  <circle cx="780" cy="140" r="28" fill="#10b981" opacity="0.8" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="780" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">
    Explore
  </text>
  <!-- Connection line -->
  <line x1="800" y1="165" x2="910" y2="220" stroke="#60a5fa" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,2"/>
  
  <!-- Top-right: Architect -->
  <circle cx="1070" cy="140" r="28" fill="#8b5cf6" opacity="0.8" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="1070" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">
    Architect
  </text>
  <!-- Connection line -->
  <line x1="1050" y1="165" x2="940" y2="220" stroke="#60a5fa" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,2"/>
  
  <!-- Left: Executor -->
  <circle cx="710" cy="250" r="28" fill="#f59e0b" opacity="0.8" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="710" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">
    Executor
  </text>
  <!-- Connection line -->
  <line x1="738" y1="250" x2="885" y2="250" stroke="#60a5fa" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,2"/>
  
  <!-- Right: Reviewer -->
  <circle cx="1140" cy="250" r="28" fill="#ef4444" opacity="0.8" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="1140" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">
    Reviewer
  </text>
  <!-- Connection line -->
  <line x1="1112" y1="250" x2="965" y2="250" stroke="#60a5fa" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,2"/>
  
  <!-- Bottom-left: Debugger -->
  <circle cx="780" cy="360" r="28" fill="#06b6d4" opacity="0.8" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="780" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">
    Debugger
  </text>
  <!-- Connection line -->
  <line x1="800" y1="335" x2="910" y2="280" stroke="#60a5fa" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,2"/>
  
  <!-- Bottom-right: Writer -->
  <circle cx="1070" cy="360" r="28" fill="#ec4899" opacity="0.8" stroke="#f472b6" stroke-width="1.5"/>
  <text x="1070" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">
    Writer
  </text>
  <!-- Connection line -->
  <line x1="1050" y1="335" x2="940" y2="280" stroke="#60a5fa" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,2"/>
  
  <!-- Parallel execution indicator (lightning bolts around center) -->
  <!-- Top lightning -->
  <path d="M 925 190 L 930 210 L 920 215 L 935 240" stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Bottom lightning -->
  <path d="M 925 310 L 930 290 L 920 285 L 935 260" stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.5"/>
  
  <!-- Comparison scale at bottom -->
  <text x="925" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#a0aec0" text-anchor="middle">
    Parallel Execution
  </text>
  
  <!-- Comparison bar: Feature spectrum -->
  <rect x="750" y="540" width="350" height="8" rx="4" fill="#1f2937"/>
  <!-- Claude Code fill -->
  <rect x="750" y="540" width="280" height="8" rx="4" fill="#3b82f6" opacity="0.9"/>
  
  <!-- Legend -->
  <circle cx="760" cy="570" r="3" fill="#3b82f6" opacity="0.9"/>
  <text x="770" y="574" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#cbd5e0">
    Claude Code Features
  </text>
  
  <!-- Decorative corner elements -->
  <g opacity="0.1">
    <rect x="710" y="80" width="300" height="300" rx="8" fill="none" stroke="#60a5fa" stroke-width="1"/>
  </g>
</svg>