<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>AI vs Claude Code - Coding Assistant Comparison for Security and DevSecOps</title>
  <defs>
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5" />
    </pattern>
    <linearGradient id="vsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Orb glows -->
  <circle cx="780" cy="145" r="190" fill="#3b82f6" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1060" cy="450" r="155" fill="#8b5cf6" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="185" cy="490" r="120" fill="#6366f1" opacity="0.05" filter="url(#orbGlow)" />
  <circle cx="620" cy="310" r="100" fill="#8b5cf6" opacity="0.04" filter="url(#orbGlow)" />

  <!-- Card 1 (top-right): VS Comparison blocks -->
  <g transform="translate(830, 60)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(85, 20)">
      <!-- Left block (AI) -->
      <rect x="5" y="8" width="52" height="72" rx="8" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8" />
      <rect x="5" y="8" width="52" height="18" rx="8" fill="#3b82f6" opacity="0.18" />
      <text x="31" y="23" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="10" font-weight="700">AI</text>
      <line x1="14" y1="38" x2="48" y2="38" stroke="#3b82f6" stroke-width="1.5" opacity="0.4" />
      <line x1="14" y1="48" x2="48" y2="48" stroke="#3b82f6" stroke-width="1.5" opacity="0.3" />
      <line x1="14" y1="58" x2="38" y2="58" stroke="#3b82f6" stroke-width="1.5" opacity="0.2" />
      <line x1="14" y1="68" x2="44" y2="68" stroke="#3b82f6" stroke-width="1.5" opacity="0.15" />
      <!-- VS badge center -->
      <circle cx="72" cy="44" r="15" fill="url(#vsGrad)" opacity="0.9" />
      <text x="72" y="49" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="800">VS</text>
      <!-- Right block (Claude) -->
      <rect x="88" y="8" width="52" height="72" rx="8" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.8" />
      <rect x="88" y="8" width="52" height="18" rx="8" fill="#8b5cf6" opacity="0.18" />
      <text x="114" y="23" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="8" font-weight="700">Claude</text>
      <line x1="97" y1="38" x2="131" y2="38" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4" />
      <line x1="97" y1="48" x2="131" y2="48" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3" />
      <line x1="97" y1="58" x2="121" y2="58" stroke="#8b5cf6" stroke-width="1.5" opacity="0.2" />
      <line x1="97" y1="68" x2="127" y2="68" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15" />
      <!-- Label -->
      <rect x="22" y="94" width="96" height="18" rx="4" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4" />
      <text x="70" y="107" text-anchor="middle" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">COMPARISON</text>
    </g>
    <circle cx="130" cy="200" r="3" fill="#3b82f6" opacity="0.8" />
    <circle cx="145" cy="200" r="3" fill="#8b5cf6" opacity="0.6" />
    <circle cx="160" cy="200" r="3" fill="#6366f1" opacity="0.4" />
  </g>

  <!-- Card 2 (middle): Robot / AI brain -->
  <g transform="translate(720, 190)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(95, 18)">
      <!-- Robot head outline -->
      <rect x="18" y="8" width="72" height="58" rx="10" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.85" />
      <rect x="18" y="8" width="72" height="17" rx="10" fill="#8b5cf6" opacity="0.15" />
      <!-- Antenna -->
      <line x1="54" y1="8" x2="54" y2="0" stroke="#8b5cf6" stroke-width="2" opacity="0.7" />
      <circle cx="54" cy="0" r="3.5" fill="#8b5cf6" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.8s" repeatCount="indefinite" />
      </circle>
      <!-- Eyes -->
      <rect x="28" y="30" width="14" height="10" rx="3" fill="#3b82f6" opacity="0.45" />
      <rect x="66" y="30" width="14" height="10" rx="3" fill="#3b82f6" opacity="0.45" />
      <circle cx="35" cy="35" r="4" fill="#93c5fd" opacity="0.85" />
      <circle cx="73" cy="35" r="4" fill="#93c5fd" opacity="0.85" />
      <circle cx="35" cy="35" r="1.5" fill="white" opacity="0.7" />
      <circle cx="73" cy="35" r="1.5" fill="white" opacity="0.7" />
      <!-- Mouth grid -->
      <rect x="28" y="48" width="52" height="12" rx="3" fill="#8b5cf6" opacity="0.12" />
      <line x1="36" y1="48" x2="36" y2="60" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
      <line x1="44" y1="48" x2="44" y2="60" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
      <line x1="52" y1="48" x2="52" y2="60" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
      <line x1="60" y1="48" x2="60" y2="60" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
      <line x1="68" y1="48" x2="68" y2="60" stroke="#8b5cf6" stroke-width="1" opacity="0.35" />
      <!-- Label -->
      <rect x="12" y="76" width="84" height="18" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4" />
      <text x="54" y="89" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">AI ASSISTANT</text>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b" />
    <rect x="40" y="192" width="178" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3 (bottom): Trophy / ranking -->
  <g transform="translate(660, 340)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(110, 15)">
      <!-- Trophy cup body -->
      <path d="M28 15 Q18 32 22 52 L78 52 Q82 32 72 15 Z" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.75" />
      <path d="M28 15 Q18 32 22 52 L78 52 Q82 32 72 15 Z" fill="#f59e0b" opacity="0.07" />
      <!-- Handles -->
      <path d="M28 22 Q13 30 16 44 Q20 50 28 48" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5" />
      <path d="M72 22 Q87 30 84 44 Q80 50 72 48" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5" />
      <!-- Stem and base -->
      <rect x="44" y="52" width="12" height="12" rx="1" fill="#f59e0b" opacity="0.5" />
      <rect x="30" y="63" width="40" height="7" rx="3" fill="#f59e0b" opacity="0.65" />
      <!-- #1 inside cup -->
      <text x="50" y="40" text-anchor="middle" fill="#fbbf24" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="900" opacity="0.85">1</text>
      <!-- Stars above -->
      <circle cx="22" cy="8" r="3" fill="#fbbf24" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.2s" repeatCount="indefinite" />
      </circle>
      <circle cx="50" cy="4" r="4" fill="#fbbf24" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.25;0.7" dur="1.9s" repeatCount="indefinite" />
      </circle>
      <circle cx="78" cy="8" r="3" fill="#fbbf24" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite" />
      </circle>
      <!-- Score bar -->
      <rect x="0" y="90" width="100" height="6" rx="3" fill="#1e293b" />
      <rect x="0" y="90" width="88" height="6" rx="3" fill="#f59e0b" opacity="0.6" />
      <!-- Label -->
      <rect x="12" y="102" width="76" height="18" rx="4" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.35" />
      <text x="50" y="115" text-anchor="middle" fill="#fde68a" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">BEST PICK</text>
    </g>
    <g transform="translate(40, 195)">
      <rect width="240" height="28" rx="6" fill="#1e293b" opacity="0.8" />
      <circle cx="18" cy="14" r="5" fill="#3b82f6" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="720" cy="275" r="2" fill="#8b5cf6" opacity="0.5">
    <animate attributeName="cy" values="275;265;275" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="840" cy="325" r="1.5" fill="#3b82f6" opacity="0.4">
    <animate attributeName="cy" values="325;315;325" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1060" cy="295" r="2" fill="#6366f1" opacity="0.5">
    <animate attributeName="cy" values="295;285;295" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="195" r="1.5" fill="#8b5cf6" opacity="0.3">
    <animate attributeName="cy" values="195;187;195" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1110" cy="175" r="1" fill="#6366f1" opacity="0.4">
    <animate attributeName="cy" values="175;167;175" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="955" cy="125" r="1.5" fill="#3b82f6" opacity="0.35">
    <animate attributeName="cx" values="955;963;955" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Left panel badge -->
  <g transform="translate(60, 80)">
    <rect width="166" height="32" rx="16" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4" />
    <text x="83" y="21" text-anchor="middle" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">AI CODE BATTLE</text>
  </g>

  <!-- Main title -->
  <text x="60" y="172" fill="white" font-family="Inter,system-ui,sans-serif" font-size="46" font-weight="800" letter-spacing="-0.5">AI vs Claude</text>
  <text x="60" y="228" fill="white" font-family="Inter,system-ui,sans-serif" font-size="46" font-weight="800" letter-spacing="-0.5">Code</text>
  <text x="60" y="286" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="37" font-weight="700" letter-spacing="-0.3">Security</text>
  <text x="60" y="332" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="37" font-weight="700" letter-spacing="-0.3">Comparison</text>

  <!-- Accent line -->
  <rect x="60" y="356" width="200" height="3" rx="1.5" fill="url(#accentLine)" />

  <!-- Tag pills -->
  <g transform="translate(60, 380)">
    <rect width="44" height="30" rx="15" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.35" />
    <text x="22" y="20" text-anchor="middle" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AI</text>
    <g transform="translate(54, 0)">
      <rect width="72" height="30" rx="15" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="36" y="20" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Claude</text>
    </g>
    <g transform="translate(136, 0)">
      <rect width="90" height="30" rx="15" fill="#6366f1" opacity="0.12" stroke="#6366f1" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="45" y="20" text-anchor="middle" fill="#a5b4fc" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">DevSecOps</text>
    </g>
    <g transform="translate(236, 0)">
      <rect width="64" height="30" rx="15" fill="#0891b2" opacity="0.12" stroke="#0891b2" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="32" y="20" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">FinOps</text>
    </g>
  </g>

  <!-- Date -->
  <text x="60" y="460" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">FEBRUARY 04, 2026</text>

  <!-- Footer URL -->
  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8" />
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
</svg>
