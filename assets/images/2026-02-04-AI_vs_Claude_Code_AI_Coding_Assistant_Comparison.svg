  <rect x="1013" y="244" width="90" height="6" rx="2" fill="rgba(162,155,254,0.5)"/>
  <rect x="1013" y="256" width="120" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="1021" y="268" width="100" height="6" rx="2" fill="rgba(0,206,201,0.4)"/>
  <rect x="1021" y="280" width="80" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="1013" y="292" width="110" height="6" rx="2" fill="rgba(162,155,254,0.35)"/>
  <rect x="1013" y="304" width="95" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="1021" y="316" width="105" height="6" rx="2" fill="rgba(0,206,201,0.3)"/>
  <rect x="1021" y="328" width="70" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="1013" y="340" width="115" height="6" rx="2" fill="rgba(162,155,254,0.4)"/>
  <rect x="1013" y="352" width="85" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- VS divider / Labels removed (decorative) -->
  <!-- Score bars under editors -->
  <rect x="848" y="415" width="120" height="10" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="848" y="415" width="82" height="10" rx="4" fill="rgba(0,206,201,0.6)"/>
  <rect x="1013" y="415" width="120" height="10" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="1013" y="415" width="108" height="10" rx="4" fill="rgba(162,155,254,0.6)"/>
  <!-- Left accent bar -->
