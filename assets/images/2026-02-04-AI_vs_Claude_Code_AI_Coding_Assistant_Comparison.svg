  <rect x="840" y="210" width="145" height="190" rx="6" fill="rgba(0,206,201,0.1)" stroke="#00cec9" stroke-width="1.5"/>
  <rect x="840" y="210" width="145" height="22" rx="6" fill="rgba(0,206,201,0.2)"/>
  <circle cx="854" cy="221" r="4" fill="rgba(231,76,60,0.6)"/>
  <circle cx="866" cy="221" r="4" fill="rgba(241,196,15,0.6)"/>
  <circle cx="878" cy="221" r="4" fill="rgba(46,204,113,0.6)"/>
  <!-- Code lines left editor -->
  <rect x="848" y="244" width="80" height="6" rx="2" fill="rgba(0,206,201,0.5)"/>
  <rect x="848" y="256" width="110" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="856" y="268" width="90" height="6" rx="2" fill="rgba(162,155,254,0.4)"/>
  <rect x="856" y="280" width="70" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="848" y="292" width="100" height="6" rx="2" fill="rgba(0,206,201,0.35)"/>
  <rect x="848" y="304" width="85" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="856" y="316" width="95" height="6" rx="2" fill="rgba(162,155,254,0.3)"/>
  <rect x="856" y="328" width="60" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="848" y="340" width="105" height="6" rx="2" fill="rgba(0,206,201,0.4)"/>
  <rect x="848" y="352" width="75" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
