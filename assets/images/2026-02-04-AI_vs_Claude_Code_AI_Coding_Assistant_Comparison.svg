  <rect x="1005" y="210" width="145" height="22" rx="6" fill="rgba(162,155,254,0.2)"/>
  <circle cx="1019" cy="221" r="4" fill="rgba(231,76,60,0.6)"/>
  <circle cx="1031" cy="221" r="4" fill="rgba(241,196,15,0.6)"/>
  <circle cx="1043" cy="221" r="4" fill="rgba(46,204,113,0.6)"/>
