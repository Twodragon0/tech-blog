<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e84393"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e84393"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="dateBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2035"/>
      <stop offset="100%" stop-color="#2a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Cloud + Prometheus + AI Neural Network -->
  <!-- Cloud shape (AWS/Google Cloud) -->
  <ellipse cx="1010" cy="210" rx="95" ry="55" fill="rgba(14,165,233,0.08)" stroke="rgba(14,165,233,0.3)" stroke-width="1.5"/>
  <ellipse cx="960" cy="230" rx="60" ry="38" fill="rgba(14,165,233,0.07)" stroke="rgba(14,165,233,0.25)" stroke-width="1"/>
  <ellipse cx="1065" cy="232" rx="55" ry="35" fill="rgba(14,165,233,0.07)" stroke="rgba(14,165,233,0.25)" stroke-width="1"/>
  <rect x="930" y="225" width="170" height="42" rx="8" fill="rgba(14,165,233,0.06)" stroke="none"/>

  <!-- Prometheus fire icon (triangular) -->
  <path d="M1000 155 L985 195 L1015 195 Z" fill="rgba(232,67,147,0.1)" stroke="rgba(232,67,147,0.35)" stroke-width="1.5"/>
  <path d="M1000 162 L990 188 L1010 188 Z" fill="rgba(232,67,147,0.12)" stroke="rgba(232,67,147,0.2)" stroke-width="1"/>
  <!-- Prometheus circle -->
  <circle cx="1000" cy="175" r="22" fill="none" stroke="rgba(232,67,147,0.3)" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- OTLP data pipeline arrows -->
  <line x1="890" y1="270" x2="1120" y2="270" stroke="rgba(124,58,237,0.25)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <polygon points="1118,265 1128,270 1118,275" fill="rgba(124,58,237,0.4)"/>
  <line x1="890" y1="285" x2="1120" y2="285" stroke="rgba(124,58,237,0.15)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Meta AI neural network nodes -->
  <circle cx="900" cy="160" r="12" fill="rgba(232,67,147,0.08)" stroke="rgba(232,67,147,0.3)" stroke-width="1.5"/>
  <circle cx="940" cy="148" r="9" fill="rgba(232,67,147,0.07)" stroke="rgba(232,67,147,0.25)" stroke-width="1"/>
  <circle cx="880" cy="190" r="10" fill="rgba(14,165,233,0.08)" stroke="rgba(14,165,233,0.3)" stroke-width="1.5"/>
  <circle cx="1060" cy="155" r="12" fill="rgba(14,165,233,0.08)" stroke="rgba(14,165,233,0.3)" stroke-width="1.5"/>
  <circle cx="1095" cy="165" r="9" fill="rgba(14,165,233,0.07)" stroke="rgba(14,165,233,0.25)" stroke-width="1"/>
  <circle cx="1110" cy="190" r="10" fill="rgba(232,67,147,0.07)" stroke="rgba(232,67,147,0.25)" stroke-width="1.5"/>

  <!-- Neural connections -->
  <line x1="900" y1="160" x2="940" y2="148" stroke="rgba(232,67,147,0.2)" stroke-width="1"/>
  <line x1="900" y1="160" x2="880" y2="190" stroke="rgba(14,165,233,0.2)" stroke-width="1"/>
  <line x1="1060" y1="155" x2="1095" y2="165" stroke="rgba(14,165,233,0.2)" stroke-width="1"/>
  <line x1="1095" y1="165" x2="1110" y2="190" stroke="rgba(232,67,147,0.2)" stroke-width="1"/>
  <line x1="940" y1="148" x2="1000" y2="155" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>
  <line x1="1000" y1="155" x2="1060" y2="155" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>

  <!-- Google multicolor dots (Google branding) -->
  <circle cx="1055" cy="300" r="7" fill="rgba(66,133,244,0.25)" stroke="rgba(66,133,244,0.5)" stroke-width="1.5"/>
  <circle cx="1075" cy="300" r="7" fill="rgba(234,67,53,0.25)" stroke="rgba(234,67,53,0.5)" stroke-width="1.5"/>
  <circle cx="1065" cy="317" r="7" fill="rgba(52,168,83,0.25)" stroke="rgba(52,168,83,0.5)" stroke-width="1.5"/>
  <circle cx="1045" cy="317" r="7" fill="rgba(251,188,4,0.25)" stroke="rgba(251,188,4,0.5)" stroke-width="1.5"/>

  <!-- AWS hexagon icon -->
  <polygon points="920,300 940,290 960,300 960,320 940,330 920,320" fill="rgba(255,153,0,0.08)" stroke="rgba(255,153,0,0.35)" stroke-width="1.5"/>
  <text x="940" y="314" font-size="9" fill="rgba(255,153,0,0.7)" text-anchor="middle" font-family="monospace">AWS</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(232,67,147,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(251,188,4,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(14,165,233,0.7)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#dateBadge)" stroke="rgba(232,67,147,0.2)" stroke-width="1"/>
  <text x="92" y="81" font-size="12" fill="rgba(232,67,147,0.9)" font-family="'Courier New', monospace" font-weight="600" letter-spacing="1">FEBRUARY 10, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="'Arial', sans-serif" letter-spacing="-0.5">AI Cloud Digest Meta</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="'Arial', sans-serif" letter-spacing="-0.5">Prometheus Google OTLP AWS</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(200,210,255,0.75)" font-family="'Arial', sans-serif">Observability, AI Infrastructure &amp; Cloud Security Digest</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(232,67,147,0.8)" font-family="'Courier New', monospace" letter-spacing="3" text-transform="uppercase">DEVSECOPS / CLOUD OBSERVABILITY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(232,67,147,0.15)" stroke="rgba(232,67,147,0.4)" stroke-width="1"/>
  <text x="140" y="425" font-size="13" fill="rgba(232,67,147,1)" font-family="'Arial', sans-serif" text-anchor="middle" font-weight="600">Prometheus</text>

  <rect x="215" y="402" width="120" height="36" rx="18" fill="rgba(251,188,4,0.12)" stroke="rgba(251,188,4,0.4)" stroke-width="1"/>
  <text x="275" y="425" font-size="13" fill="rgba(251,188,4,1)" font-family="'Arial', sans-serif" text-anchor="middle" font-weight="600">OTLP / OTEL</text>

  <rect x="350" y="402" width="100" height="36" rx="18" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.4)" stroke-width="1"/>
  <text x="400" y="425" font-size="13" fill="rgba(14,165,233,1)" font-family="'Arial', sans-serif" text-anchor="middle" font-weight="600">AWS / GCP</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="14" fill="rgba(255,255,255,0.35)" font-family="'Courier New', monospace">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="14" fill="rgba(255,255,255,0.35)" font-family="'Courier New', monospace" text-anchor="end">devsecops</text>
</svg>