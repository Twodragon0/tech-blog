<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff6f00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="tagRedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b71c1c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e53935;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tagAmberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tagBlueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Observability / Cloud AI ecosystem -->
  <!-- Central cloud/AI orb -->
  <circle cx="1010" cy="225" r="90" fill="rgba(21,101,192,0.07)" stroke="rgba(21,101,192,0.25)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="65" fill="rgba(229,57,53,0.06)" stroke="rgba(229,57,53,0.2)" stroke-width="1"/>
  <circle cx="1010" cy="225" r="40" fill="rgba(255,143,0,0.08)" stroke="rgba(255,143,0,0.3)" stroke-width="1.5"/>
  <!-- AI brain-like inner shape -->
  <path d="M1010,200 Q1025,192 1030,205 Q1040,200 1040,215 Q1048,218 1045,228 Q1048,238 1038,242 Q1035,255 1022,252 Q1015,260 1005,252 Q992,258 990,245 Q978,242 980,230 Q975,220 983,213 Q982,200 993,197 Q998,188 1010,200Z" fill="rgba(100,181,246,0.12)" stroke="rgba(100,181,246,0.35)" stroke-width="1.2"/>
  <!-- Neural nodes inside -->
  <circle cx="1010" cy="218" r="5" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <circle cx="1000" cy="232" r="3.5" fill="rgba(100,181,246,0.5)" stroke="rgba(100,181,246,0.8)" stroke-width="1"/>
  <circle cx="1020" cy="234" r="3.5" fill="rgba(229,57,53,0.5)" stroke="rgba(229,57,53,0.8)" stroke-width="1"/>
  <circle cx="1008" cy="244" r="3" fill="rgba(255,143,0,0.5)" stroke="rgba(255,143,0,0.8)" stroke-width="1"/>
  <!-- Neural connections -->
  <line x1="1010" y1="218" x2="1000" y2="232" stroke="rgba(100,181,246,0.4)" stroke-width="1"/>
  <line x1="1010" y1="218" x2="1020" y2="234" stroke="rgba(229,57,53,0.4)" stroke-width="1"/>
  <line x1="1000" y1="232" x2="1008" y2="244" stroke="rgba(255,143,0,0.35)" stroke-width="1"/>
  <line x1="1020" y1="234" x2="1008" y2="244" stroke="rgba(100,181,246,0.3)" stroke-width="1"/>

  <!-- Prometheus flame icon (top-right of orb) -->
  <path d="M1068,152 Q1062,142 1068,132 Q1058,140 1055,150 Q1050,143 1053,134 Q1044,145 1046,158 Q1040,153 1042,145 Q1035,156 1038,168 Q1035,175 1042,180 Q1060,192 1072,178 Q1080,168 1075,158 Q1070,162 1068,152Z" fill="rgba(229,57,53,0.13)" stroke="rgba(229,57,53,0.35)" stroke-width="1.2"/>
  <path d="M1062,158 Q1058,152 1062,146 Q1056,152 1055,160 Q1052,155 1054,148 Q1048,157 1050,166 Q1047,172 1052,176 Q1062,183 1068,173 Q1073,165 1068,158 Q1065,163 1062,158Z" fill="rgba(255,143,0,0.15)" stroke="rgba(255,143,0,0.4)" stroke-width="1"/>

  <!-- OTLP pipeline arrows -->
  <path d="M945,210 L965,210" stroke="rgba(100,181,246,0.4)" stroke-width="2" marker-end="none"/>
  <polygon points="968,207 975,210 968,213" fill="rgba(100,181,246,0.5)"/>
  <path d="M945,225 L965,225" stroke="rgba(100,181,246,0.3)" stroke-width="1.5"/>
  <polygon points="968,222 975,225 968,228" fill="rgba(100,181,246,0.4)"/>
  <rect x="910" y="196" width="38" height="44" rx="5" fill="rgba(21,101,192,0.08)" stroke="rgba(21,101,192,0.3)" stroke-width="1"/>
  <text x="929" y="222" font-family="monospace" font-size="8" fill="rgba(100,181,246,0.7)" text-anchor="middle">OTLP</text>

  <!-- AWS cloud shape -->
  <path d="M890,290 Q883,284 885,276 Q888,268 896,268 Q899,260 908,260 Q917,260 920,268 Q928,268 930,276 Q932,284 926,290Z" fill="rgba(255,153,0,0.1)" stroke="rgba(255,153,0,0.35)" stroke-width="1.2"/>
  <rect x="893" y="285" width="34" height="16" rx="2" fill="rgba(255,153,0,0.08)" stroke="rgba(255,153,0,0.25)" stroke-width="1"/>

  <!-- Google G shape -->
  <path d="M1085,158 A28,28 0 1,1 1085,214" fill="none" stroke="rgba(66,133,244,0.25)" stroke-width="2"/>
  <path d="M1085,186 L1110,186" stroke="rgba(66,133,244,0.3)" stroke-width="2"/>
  <circle cx="1085" cy="186" r="18" fill="rgba(66,133,244,0.07)" stroke="rgba(66,133,244,0.2)" stroke-width="1"/>
  <text x="1085" y="191" font-family="Arial" font-size="14" font-weight="bold" fill="rgba(66,133,244,0.6)" text-anchor="middle">G</text>

  <!-- Meta infinity-like shape -->
  <path d="M895,148 Q905,135 918,148 Q930,162 940,148 Q952,135 960,148 Q952,162 940,162 Q928,162 918,162 Q908,162 895,148Z" fill="rgba(0,136,255,0.08)" stroke="rgba(0,136,255,0.3)" stroke-width="1.5"/>

  <!-- Orbiting rings around central orb -->
  <ellipse cx="1010" cy="225" rx="112" ry="32" fill="none" stroke="rgba(100,181,246,0.1)" stroke-width="1" transform="rotate(-30,1010,225)"/>
  <ellipse cx="1010" cy="225" rx="112" ry="32" fill="none" stroke="rgba(229,57,53,0.08)" stroke-width="1" transform="rotate(30,1010,225)"/>

  <!-- Decorative small data points -->
  <circle cx="920" cy="175" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1090" cy="270" r="3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="1095" cy="175" r="2.5" fill="rgba(100,181,246,0.3)"/>
  <circle cx="885" cy="240" r="2.5" fill="rgba(229,57,53,0.3)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,57,53,0.7)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(255,143,0,0.6)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(21,101,192,0.6)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(229,57,53,0.15)" stroke="rgba(229,57,53,0.4)" stroke-width="1"/>
  <text x="190" y="81" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(229,57,53,0.9)" text-anchor="middle" letter-spacing="1">FEBRUARY 10, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white">AI Cloud Digest Meta</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.92)">Prometheus Google OTLP AWS</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Observability, AI Digest &amp; Cloud Security — DevSecOps</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(229,57,53,0.8)" letter-spacing="2">DEVSECOPS / CLOUD / OBSERVABILITY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="url(#tagRedGrad)" opacity="0.88"/>
  <text x="145" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Prometheus</text>

  <rect x="224" y="402" width="130" height="36" rx="18" fill="url(#tagAmberGrad)" opacity="0.88"/>
  <text x="289" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">OTLP / AWS</text>

  <rect x="368" y="402" width="130" height="36" rx="18" fill="url(#tagBlueGrad)" opacity="0.88"/>
  <text x="433" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">AI Digest</text>

  <!-- Footer -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, sans-serif" font-size="14" fill="rgba(229,57,53,0.5)" text-anchor="end">DEVSECOPS</text>
</svg>