<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>2026 03 31 Tech Security Weekly Digest Zero Trust</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient defs -->
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Left side: Title and metadata -->
  <!-- Title background accent -->
  <rect x="20" y="160" width="650" height="140" fill="rgba(0, 212, 255, 0.05)" rx="8"/>

  <!-- Main title -->
  <text x="40" y="200" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff" letter-spacing="-0.5">Tech Security Weekly</text>
  <text x="40" y="260" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#00d4ff">Digest Zero Trust</text>

  <!-- Date badge -->
  <g>
    <rect x="40" y="310" width="280" height="50" fill="rgba(0, 212, 255, 0.1)" stroke="#00d4ff" stroke-width="1.5" rx="6"/>
    <text x="60" y="342" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#00d4ff">MARCH 27, 2026</text>
  </g>

  <!-- Tag pills -->
  <g>
    <!-- Tag 1: Zero Trust -->
    <rect x="40" y="420" width="140" height="36" fill="rgba(0, 212, 255, 0.15)" stroke="#00d4ff" stroke-width="1" rx="18"/>
    <text x="60" y="443" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#00d4ff">Zero Trust</text>

    <!-- Tag 2: Identity -->
    <rect x="200" y="420" width="130" height="36" fill="rgba(255, 107, 53, 0.15)" stroke="#ff6b35" stroke-width="1" rx="18"/>
    <text x="220" y="443" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ff6b35">Identity</text>

    <!-- Tag 3: Verification -->
    <rect x="350" y="420" width="150" height="36" fill="rgba(100, 200, 255, 0.15)" stroke="#64c8ff" stroke-width="1" rx="18"/>
    <text x="368" y="443" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#64c8ff">Verification</text>
  </g>

  <!-- Footer -->
  <text x="40" y="600" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#666666">tech.2twodragon.com</text>

  <!-- Right side: Zero Trust illustration -->
  <!-- Central verification circle (heart of Zero Trust) -->
  <circle cx="900" cy="315" r="85" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
  <circle cx="900" cy="315" r="70" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,5"/>

  <!-- Center core (verification/authentication) -->
  <circle cx="900" cy="315" r="45" fill="rgba(0, 212, 255, 0.1)" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="900" cy="315" r="35" fill="rgba(0, 212, 255, 0.05)"/>

  <!-- Center lock icon -->
  <g transform="translate(900, 315)">
    <rect x="-12" y="-8" width="24" height="18" fill="none" stroke="#00d4ff" stroke-width="2" rx="2"/>
    <path d="M -8 -8 Q -8 -18 0 -18 Q 8 -18 8 -8" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="0" cy="4" r="2" fill="#00d4ff"/>
  </g>

  <!-- Verification nodes around center (identity, device, access, behavior) -->
  <!-- Top node: Identity Verification -->
  <g transform="translate(900, 180)">
    <circle r="25" fill="rgba(0, 212, 255, 0.08)" stroke="#00d4ff" stroke-width="1.5"/>
    <path d="M -6 -8 Q -6 -12 0 -12 Q 6 -12 6 -8 M -8 -6 L 8 -6 M -8 -6 Q -8 0 0 2 Q 8 0 8 -6" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="0" y="42" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#00d4ff" text-anchor="middle">Identity</text>
  </g>

  <!-- Right node: Device Verification -->
  <g transform="translate(1040, 270)">
    <circle r="25" fill="rgba(255, 107, 53, 0.08)" stroke="#ff6b35" stroke-width="1.5"/>
    <rect x="-8" y="-8" width="16" height="14" fill="none" stroke="#ff6b35" stroke-width="1.5" rx="1"/>
    <circle cx="-4" cy="-3" r="1" fill="#ff6b35"/>
    <circle cx="4" cy="-3" r="1" fill="#ff6b35"/>
    <line x1="-6" y1="2" x2="6" y2="2" stroke="#ff6b35" stroke-width="1"/>
    <text x="0" y="42" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ff6b35" text-anchor="middle">Device</text>
  </g>

  <!-- Bottom node: Access Control -->
  <g transform="translate(900, 450)">
    <circle r="25" fill="rgba(100, 200, 255, 0.08)" stroke="#64c8ff" stroke-width="1.5"/>
    <path d="M -4 -8 L 4 -8 L 8 -2 L 8 6 L -8 6 L -8 -2 Z M -4 -8 L -4 0 M 4 -8 L 4 0" fill="none" stroke="#64c8ff" stroke-width="1.5"/>
    <text x="0" y="42" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#64c8ff" text-anchor="middle">Access</text>
  </g>

  <!-- Left node: Behavior Monitoring -->
  <g transform="translate(760, 270)">
    <circle r="25" fill="rgba(255, 165, 0, 0.08)" stroke="#ffa500" stroke-width="1.5"/>
    <path d="M -6 -6 L 0 0 L 6 -6 M 0 0 L 0 8 M -4 4 L 0 8 L 4 4" fill="none" stroke="#ffa500" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="0" y="42" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ffa500" text-anchor="middle">Behavior</text>
  </g>

  <!-- Connection lines from center to nodes -->
  <line x1="900" y1="250" x2="900" y2="205" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="970" y1="290" x2="1015" y2="295" stroke="url(#orangeGrad)" stroke-width="1.5" opacity="0.6"/>
  <line x1="900" y1="380" x2="900" y2="425" stroke="#64c8ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="830" y1="300" x2="785" y2="285" stroke="#ffa500" stroke-width="1.5" opacity="0.6"/>

  <!-- Outer security perimeter (represents zero trust boundary) -->
  <circle cx="900" cy="315" r="150" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.3" stroke-dasharray="8,6"/>

  <!-- Threat/data flow indicators -->
  <g opacity="0.5">
    <!-- Incoming threat indicator -->
    <path d="M 680 200 Q 750 220 820 280" fill="none" stroke="#ff4500" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="680" cy="200" r="3" fill="#ff4500"/>

    <!-- Another flow -->
    <path d="M 700 450 Q 780 400 850 360" fill="none" stroke="#ff4500" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="700" cy="450" r="3" fill="#ff4500"/>
  </g>

  <!-- Glow effect around center -->
  <circle cx="900" cy="315" r="100" fill="url(#glowGrad)"/>

  <!-- "Trust Nothing" accent text on right -->
  <text x="900" y="540" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#ff6b35" text-anchor="middle" letter-spacing="2">VERIFY ALL</text>
</svg>