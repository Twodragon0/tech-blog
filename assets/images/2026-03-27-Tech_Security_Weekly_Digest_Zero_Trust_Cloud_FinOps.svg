<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1123;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Left Section - Text Content -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Tech Security Weekly
  </text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Digest: Zero Trust
  </text>

  <!-- Date Badge -->
  <rect x="60" y="275" width="280" height="40" rx="20" fill="#1a2340" stroke="#00d4ff" stroke-width="2"/>
  <text x="170" y="302" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00d4ff" text-anchor="middle">
    MARCH 27, 2026
  </text>

  <!-- Tag Pills -->
  <rect x="60" y="420" width="90" height="32" rx="16" fill="#1a3a3a" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="105" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#00d4ff" text-anchor="middle">
    Security
  </text>

  <rect x="165" y="420" width="90" height="32" rx="16" fill="#3a1a2a" stroke="#ff6b9d" stroke-width="1.5"/>
  <text x="210" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff6b9d" text-anchor="middle">
    Zero Trust
  </text>

  <rect x="270" y="420" width="70" height="32" rx="16" fill="#2a2a1a" stroke="#ffa500" stroke-width="1.5"/>
  <text x="305" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffa500" text-anchor="middle">
    Policy
  </text>

  <!-- Footer -->
  <text x="60" y="600" font-family="Arial, sans-serif" font-size="12" fill="#666">
    tech.2twodragon.com
  </text>

  <!-- Right Section - Zero Trust Illustration -->
  <!-- Central Identity Node -->
  <circle cx="925" cy="315" r="45" fill="none" stroke="#00d4ff" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="925" cy="315" r="35" fill="#001a33" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="925" y="325" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00d4ff" text-anchor="middle">
    ID
  </text>

  <!-- Verification Rings (Concentric) -->
  <circle cx="925" cy="315" r="70" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4" stroke-dasharray="5,5"/>
  <circle cx="925" cy="315" r="95" fill="none" stroke="#ff6b9d" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>

  <!-- Top Device/User -->
  <rect x="895" y="110" width="60" height="70" rx="8" fill="#1a2a3a" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="925" cy="135" r="12" fill="#00d4ff"/>
  <line x1="915" y1="160" x2="935" y2="160" stroke="#00d4ff" stroke-width="2"/>
  <line x1="915" y1="170" x2="935" y2="170" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Connection from User to ID (Verified) -->
  <line x1="925" y1="180" x2="925" y2="270" stroke="#00d4ff" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="925" cy="210" r="8" fill="#00d4ff"/>

  <!-- Left Resource -->
  <rect x="765" y="280" width="65" height="70" rx="8" fill="#1a3a1a" stroke="#00ff88" stroke-width="2"/>
  <circle cx="797.5" cy="310" r="10" fill="#00ff88"/>
  <path d="M 797.5 330 L 802 340 L 793 340 Z" fill="#00ff88"/>

  <!-- Connection Left (Verified) -->
  <line x1="830" y1="315" x2="880" y2="315" stroke="#00ff88" stroke-width="2.5"/>
  <circle cx="855" cy="315" r="6" fill="#00ff88"/>

  <!-- Right Service -->
  <rect x="1020" y="280" width="65" height="70" rx="8" fill="#3a1a1a" stroke="#ff6b9d" stroke-width="2"/>
  <rect x="1033" y="303" width="38" height="24" fill="#ff6b9d"/>
  <circle cx="1052" cy="315" r="4" fill="#1a1a1a"/>

  <!-- Connection Right (Verified) -->
  <line x1="970" y1="315" x2="1020" y2="315" stroke="#ff6b9d" stroke-width="2.5"/>
  <circle cx="995" cy="315" r="6" fill="#ff6b9d"/>

  <!-- Bottom Network/Policy -->
  <g>
    <rect x="885" y="450" width="80" height="55" rx="6" fill="#2a1a3a" stroke="#9d4edd" stroke-width="2"/>
    <circle cx="910" cy="465" r="6" fill="#9d4edd"/>
    <circle cx="935" cy="475" r="6" fill="#9d4edd"/>
    <circle cx="955" cy="460" r="5" fill="#9d4edd"/>
    <path d="M 910 471 L 935 481" stroke="#9d4edd" stroke-width="1" opacity="0.6"/>
    <path d="M 935 481 L 955 466" stroke="#9d4edd" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Connection Down (Policy Enforcement) -->
  <line x1="925" y1="360" x2="925" y2="450" stroke="#9d4edd" stroke-width="2" stroke-dasharray="4,4"/>
  <circle cx="925" cy="400" r="5" fill="#9d4edd"/>

  <!-- Shield Icons (Trust Verification Points) -->
  <!-- Top Right Shield -->
  <path d="M 1000 180 L 1020 200 L 1020 240 Q 1010 250 1000 245 Q 990 250 980 240 L 980 200 Z" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <text x="1000" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00d4ff" text-anchor="middle" opacity="0.8">✓</text>

  <!-- Bottom Left Shield -->
  <path d="M 800 420 L 815 440 L 815 475 Q 807.5 485 800 480 Q 792.5 485 785 475 L 785 440 Z" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
  <text x="800" y="460" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00ff88" text-anchor="middle" opacity="0.8">✓</text>

  <!-- Bottom Right Shield -->
  <path d="M 1050 420 L 1065 440 L 1065 475 Q 1057.5 485 1050 480 Q 1042.5 485 1035 475 L 1035 440 Z" fill="none" stroke="#ff6b9d" stroke-width="1.5" opacity="0.7"/>
  <text x="1050" y="460" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff6b9d" text-anchor="middle" opacity="0.8">✓</text>

  <!-- Lock Icon (Security) -->
  <g opacity="0.8">
    <rect x="1090" y="220" width="28" height="30" rx="3" fill="none" stroke="#ffa500" stroke-width="1.5"/>
    <path d="M 1096 220 L 1096 210 Q 1096 200 1104 200 Q 1112 200 1112 210 L 1112 220" fill="none" stroke="#ffa500" stroke-width="1.5"/>
    <circle cx="1104" cy="235" r="2" fill="#ffa500"/>
  </g>
</svg>