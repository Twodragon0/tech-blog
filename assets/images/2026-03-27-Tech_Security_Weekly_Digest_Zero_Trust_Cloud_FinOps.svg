<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="50%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Zero Trust + Cloud + FinOps Icon -->
  <!-- Outer shield body -->
  <path d="M1010,140 L1110,170 L1110,260 Q1110,320 1010,340 Q910,320 910,260 L910,170 Z"
        fill="url(#shieldGrad)" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,165 L1090,188 L1090,258 Q1090,305 1010,320 Q930,305 930,258 L930,188 Z"
        fill="none" stroke="rgba(155,89,182,0.25)" stroke-width="1"/>

  <!-- Lock body inside shield -->
  <rect x="985" y="230" width="50" height="40" rx="5"
        fill="rgba(229,62,62,0.10)" stroke="rgba(229,62,62,0.30)" stroke-width="1.2"/>
  <path d="M993,230 L993,218 Q993,200 1010,200 Q1027,200 1027,218 L1027,230"
        fill="none" stroke="rgba(229,62,62,0.40)" stroke-width="1.5"/>
  <circle cx="1010" cy="248" r="6" fill="rgba(229,62,62,0.25)" stroke="rgba(229,62,62,0.50)" stroke-width="1"/>
  <rect x="1007" y="250" width="6" height="10" rx="2" fill="rgba(229,62,62,0.20)"/>

  <!-- Cloud shape (upper right of shield area) -->
  <path d="M1085,155 Q1095,140 1110,148 Q1125,140 1130,155 Q1145,155 1145,170 Q1145,183 1130,183 L1085,183 Q1070,183 1070,170 Q1070,155 1085,155 Z"
        fill="url(#cloudGrad)" stroke="rgba(52,152,219,0.30)" stroke-width="1"/>
  <!-- Cloud signal arcs -->
  <path d="M1108,190 Q1115,198 1108,206" fill="none" stroke="rgba(52,152,219,0.35)" stroke-width="1.2"/>
  <path d="M1103,193 Q1113,203 1103,213" fill="none" stroke="rgba(52,152,219,0.25)" stroke-width="1"/>

  <!-- FinOps coin / dollar ring -->
  <circle cx="930" cy="165" r="28"
          fill="rgba(241,196,15,0.07)" stroke="rgba(241,196,15,0.28)" stroke-width="1.2"/>
  <circle cx="930" cy="165" r="18"
          fill="rgba(241,196,15,0.05)" stroke="rgba(241,196,15,0.18)" stroke-width="1"/>
  <text x="930" y="170" text-anchor="middle" font-size="16" font-weight="700"
        fill="rgba(241,196,15,0.55)" font-family="monospace">$</text>

  <!-- Zero Trust network nodes -->
  <circle cx="960" cy="310" r="8" fill="rgba(46,204,113,0.10)" stroke="rgba(46,204,113,0.35)" stroke-width="1"/>
  <circle cx="990" cy="325" r="5" fill="rgba(46,204,113,0.08)" stroke="rgba(46,204,113,0.25)" stroke-width="1"/>
  <circle cx="1050" cy="315" r="8" fill="rgba(46,204,113,0.10)" stroke="rgba(46,204,113,0.35)" stroke-width="1"/>
  <circle cx="1080" cy="300" r="5" fill="rgba(46,204,113,0.08)" stroke="rgba(46,204,113,0.25)" stroke-width="1"/>
  <line x1="968" y1="310" x2="985" y2="322" stroke="rgba(46,204,113,0.20)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="995" y1="323" x2="1042" y2="316" stroke="rgba(46,204,113,0.20)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="1058" y1="313" x2="1075" y2="302" stroke="rgba(46,204,113,0.20)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Decorative hex outline top-right -->
  <polygon points="1140,130 1160,142 1160,166 1140,178 1120,166 1120,142"
           fill="rgba(155,89,182,0.06)" stroke="rgba(155,89,182,0.22)" stroke-width="1"/>
  <polygon points="1140,140 1153,148 1153,164 1140,172 1127,164 1127,148"
           fill="none" stroke="rgba(155,89,182,0.12)" stroke-width="1"/>

  <!-- Scan lines decorative -->
  <line x1="895" y1="355" x2="1145" y2="355" stroke="rgba(229,62,62,0.08)" stroke-width="1"/>
  <line x1="895" y1="360" x2="1145" y2="360" stroke="rgba(229,62,62,0.05)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.70)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(241,196,15,0.70)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(52,152,219,0.70)"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4"
        fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.30)" stroke-width="1"/>
  <text x="180" y="81" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="1.5"
        fill="rgba(229,62,62,0.90)" font-family="'Courier New',monospace">MARCH 27, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white"
        font-family="'Arial',sans-serif" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700"
        font-family="'Arial',sans-serif" letter-spacing="-0.5">
    <tspan fill="#e53e3e">Zero Trust</tspan>
    <tspan fill="white"> Cloud FinOps</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)"
        font-family="'Arial',sans-serif">
    Cloud Security · Zero Trust Architecture · FinOps Optimization
  </text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" font-weight="600" letter-spacing="2.5"
        fill="rgba(255,255,255,0.35)" font-family="'Arial',sans-serif">SECURITY · DEVSECOPS · CLOUD</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18"
        fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.40)" stroke-width="1"/>
  <text x="145" y="425" text-anchor="middle" font-size="13" font-weight="600"
        fill="rgba(229,62,62,0.95)" font-family="'Arial',sans-serif">Zero Trust</text>

  <rect x="224" y="402" width="130" height="36" rx="18"
        fill="rgba(241,196,15,0.15)" stroke="rgba(241,196,15,0.38)" stroke-width="1"/>
  <text x="289" y="425" text-anchor="middle" font-size="13" font-weight="600"
        fill="rgba(241,196,15,0.95)" font-family="'Arial',sans-serif">FinOps</text>

  <rect x="368" y="402" width="130" height="36" rx="18"
        fill="rgba(52,152,219,0.15)" stroke="rgba(52,152,219,0.38)" stroke-width="1"/>
  <text x="433" y="425" text-anchor="middle" font-size="13" font-weight="600"
        fill="rgba(52,152,219,0.95)" font-family="'Arial',sans-serif">Cloud Sec</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.30)"
        font-family="'Courier New',monospace">tech.2twodragon.com</text>
  <text x="1120" y="545" text-anchor="end" font-size="13" fill="rgba(229,62,62,0.45)"
        font-family="'Arial',sans-serif" letter-spacing="1">SECURITY</text>
</svg>