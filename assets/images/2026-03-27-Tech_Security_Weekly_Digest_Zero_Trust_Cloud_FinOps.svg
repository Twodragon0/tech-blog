<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e84c4c"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e84c4c"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e84c4c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e84c4c" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="pill3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Zero Trust Shield + Cloud + FinOps -->
  <!-- Outer hexagon representing zero trust perimeter -->
  <polygon points="1010,140 1090,183 1090,268 1010,312 930,268 930,183" fill="rgba(232,76,76,0.06)" stroke="rgba(232,76,76,0.25)" stroke-width="1.5"/>
  <!-- Inner hexagon -->
  <polygon points="1010,165 1070,198 1070,265 1010,298 950,265 950,198" fill="rgba(168,85,247,0.07)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
  <!-- Core shield shape -->
  <path d="M1010,185 L1048,203 L1048,245 Q1048,268 1010,280 Q972,268 972,245 L972,203 Z" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <!-- Shield inner checkmark / lock -->
  <rect x="997" y="230" width="26" height="22" rx="3" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <path d="M1004,222 Q1004,215 1010,215 Q1016,215 1016,222 L1016,230 L1004,230 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <circle cx="1010" cy="240" r="3" fill="rgba(255,255,255,0.5)"/>
  <!-- Cloud shape top right -->
  <ellipse cx="1095" cy="160" rx="32" ry="20" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.22)" stroke-width="1"/>
  <ellipse cx="1072" cy="168" rx="22" ry="16" fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>
  <ellipse cx="1112" cy="168" rx="18" ry="13" fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>
  <rect x="1058" y="168" width="62" height="14" rx="2" fill="rgba(59,130,246,0.06)" stroke="none"/>
  <!-- FinOps coin symbol bottom -->
  <circle cx="940" cy="300" r="24" fill="rgba(245,158,11,0.07)" stroke="rgba(245,158,11,0.28)" stroke-width="1.5"/>
  <circle cx="940" cy="300" r="16" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="940" y="305" font-size="14" font-weight="700" fill="rgba(245,158,11,0.55)" text-anchor="middle" font-family="monospace">$</text>
  <!-- Connecting lines between elements -->
  <line x1="1010" y1="185" x2="1072" y2="168" stroke="rgba(168,85,247,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="972" y1="245" x2="940" y2="300" stroke="rgba(245,158,11,0.12)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1048" y1="245" x2="1095" y2="185" stroke="rgba(59,130,246,0.12)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Orbit dots -->
  <circle cx="930" cy="155" r="3" fill="rgba(232,76,76,0.4)"/>
  <circle cx="1085" cy="290" r="3" fill="rgba(168,85,247,0.4)"/>
  <circle cx="960" cy="140" r="2" fill="rgba(59,130,246,0.35)"/>
  <circle cx="1100" cy="250" r="2" fill="rgba(245,158,11,0.35)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(232,76,76,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(245,158,11,0.6)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(59,130,246,0.65)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4" fill="rgba(232,76,76,0.12)" stroke="rgba(232,76,76,0.3)" stroke-width="1"/>
  <text x="185" y="81" font-size="12" font-weight="600" fill="rgba(232,76,76,0.9)" text-anchor="middle" font-family="'Courier New', monospace" letter-spacing="1.5">MARCH 27, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="'Arial', sans-serif" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="rgba(255,255,255,0.92)" font-family="'Arial', sans-serif" letter-spacing="-0.5">Zero Trust Cloud FinOps</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.5)" font-family="'Arial', sans-serif">Weekly roundup of Zero Trust, Cloud Security, and FinOps insights</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(255,255,255,0.35)" font-family="'Courier New', monospace" letter-spacing="2.5">CATEGORY: SECURITY / DEVSECOPS / CLOUD</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="url(#pill1)" stroke="rgba(232,76,76,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-size="13" font-weight="600" fill="rgba(232,76,76,0.9)" text-anchor="middle" font-family="'Arial', sans-serif">Zero Trust</text>

  <rect x="224" y="402" width="130" height="36" rx="18" fill="url(#pill2)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="289" y="425" font-size="13" font-weight="600" fill="rgba(245,158,11,0.9)" text-anchor="middle" font-family="'Arial', sans-serif">FinOps</text>

  <rect x="368" y="402" width="130" height="36" rx="18" fill="url(#pill3)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="433" y="425" font-size="13" font-weight="600" fill="rgba(59,130,246,0.9)" text-anchor="middle" font-family="'Arial', sans-serif">Cloud Sec</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.25)" font-family="'Courier New', monospace" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,255,255,0.25)" font-family="'Courier New', monospace" text-anchor="end" letter-spacing="0.5">security</text>
</svg>