<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1129;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- LEFT SIDE CONTENT -->

  <!-- Date Badge -->
  <rect x="50" y="45" width="180" height="40" rx="20" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="140" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">MARCH 27, 2026</text>

  <!-- Main Title -->
  <text x="60" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Tech Security</text>
  <text x="60" y="275" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Digest Zero Trust</text>

  <!-- Tag Pills -->
  <rect x="60" y="415" width="85" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="102" y="436" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">Security</text>

  <rect x="155" y="415" width="85" height="32" rx="16" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="197" y="436" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Network</text>

  <rect x="250" y="415" width="95" height="32" rx="16" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="297" y="436" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Zero Trust</text>

  <!-- Footer -->
  <text x="60" y="575" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: DETAILED VISUAL SCENE -->

  <!-- Dashed Trust Boundary Circles -->
  <circle cx="850" cy="200" r="120" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4" opacity="0.25"/>
  <circle cx="950" cy="350" r="100" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4" opacity="0.25"/>
  <circle cx="750" cy="380" r="90" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4" opacity="0.25"/>

  <!-- Network Nodes with Icons -->
  <circle cx="800" cy="150" r="20" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="800" cy="150" r="12" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <path d="M 800 140 L 805 155 L 795 155 Z" fill="#3b82f6" opacity="0.6"/>

  <circle cx="1050" cy="160" r="20" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="1050" cy="160" r="12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <path d="M 1050 150 L 1055 165 L 1045 165 Z" fill="#f59e0b" opacity="0.6"/>

  <circle cx="920" cy="280" r="20" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="920" cy="280" r="12" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <path d="M 920 270 L 925 285 L 915 285 Z" fill="#3b82f6" opacity="0.6"/>

  <circle cx="720" cy="420" r="20" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="720" cy="420" r="12" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
  <path d="M 720 410 L 725 425 L 715 425 Z" fill="#ef4444" opacity="0.6"/>

  <circle cx="1000" cy="430" r="20" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="1000" cy="430" r="12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  <path d="M 1000 420 L 1005 435 L 995 435 Z" fill="#f59e0b" opacity="0.6"/>

  <!-- Data Flow Arrows -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.5"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.5"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.5"/>
    </marker>
  </defs>

  <path d="M 820 170 Q 870 220 900 260" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.35" marker-end="url(#arrowBlue)"/>
  <path d="M 1030 180 Q 980 230 940 270" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.35" marker-end="url(#arrowOrange)"/>
  <path d="M 900 300 Q 830 350 750 400" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.35" marker-end="url(#arrowRed)"/>
  <path d="M 935 300 Q 965 360 990 410" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.35" marker-end="url(#arrowBlue)"/>

  <!-- Large Shield with Checkmark -->
  <g filter="url(#glow)">
    <path d="M 1080 120 L 1120 120 L 1120 240 Q 1120 280 1100 300 Q 1080 280 1080 240 Z" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <path d="M 1090 220 L 1098 230 L 1112 205" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Warning Triangles -->
  <g filter="url(#glow)">
    <path d="M 900 100 L 920 140 L 880 140 Z" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="900" y="132" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0.7">!</text>
  </g>

  <g filter="url(#glow)">
    <path d="M 1040 490 L 1060 530 L 1020 530 Z" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1040" y="522" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle" opacity="0.7">!</text>
  </g>

  <!-- Verification Checkpoints -->
  <circle cx="740" cy="300" r="8" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="850" cy="500" r="8" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1"/>

  <!-- Subtle Grid Pattern -->
  <g opacity="0.05" stroke="#3b82f6" stroke-width="0.5">
    <line x1="650" y1="80" x2="650" y2="550"/>
    <line x1="750" y1="80" x2="750" y2="550"/>
    <line x1="850" y1="80" x2="850" y2="550"/>
    <line x1="950" y1="80" x2="950" y2="550"/>
    <line x1="1050" y1="80" x2="1050" y2="550"/>
    <line x1="1150" y1="80" x2="1150" y2="550"/>
  </g>
</svg>