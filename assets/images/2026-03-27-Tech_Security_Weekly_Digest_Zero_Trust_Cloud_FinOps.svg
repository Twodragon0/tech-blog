<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest - AWS IAM Zero Trust, GCP Workload Identity, FinOps</title>
  <defs>
    <filter id="orbGlow"><feGaussianBlur stdDeviation="40" /></filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="50%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#eab308" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0f172a" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <circle cx="760" cy="140" r="185" fill="#f97316" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1050" cy="430" r="150" fill="#22c55e" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="200" cy="490" r="120" fill="#eab308" opacity="0.05" filter="url(#orbGlow)" />

  <!-- Card 1: FinOps Cost -->
  <g transform="translate(830, 60)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(100, 18)">
      <!-- Dollar/chart icon -->
      <rect x="15" y="30" width="80" height="60" rx="6" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.7" />
      <polyline points="25,75 40,55 55,65 70,40 85,50" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
      <circle cx="55" cy="20" r="12" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" />
      <text x="55" y="25" text-anchor="middle" fill="#22c55e" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700">$</text>
      <rect x="22" y="98" width="66" height="16" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4" />
      <text x="55" y="110" text-anchor="middle" fill="#4ade80" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">FINOPS</text>
    </g>
    <circle cx="130" cy="200" r="3" fill="#22c55e" opacity="0.8" />
    <circle cx="145" cy="200" r="3" fill="#eab308" opacity="0.6" />
    <circle cx="160" cy="200" r="3" fill="#22c55e" opacity="0.4" />
  </g>

  <!-- Card 2: GCP Workload Identity -->
  <g transform="translate(720, 190)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(95, 15)">
      <!-- Cloud with key -->
      <path d="M30 55 C12 55 2 46 2 35 C2 24 9 17 20 15 C23 5 35 -2 48 -2 C62 -2 72 7 76 17 C85 19 92 27 92 37 C92 48 83 55 70 55 Z" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.8" />
      <!-- Key icon -->
      <circle cx="48" cy="30" r="10" fill="none" stroke="#eab308" stroke-width="2" opacity="0.8" />
      <line x1="58" y1="30" x2="78" y2="30" stroke="#eab308" stroke-width="2" opacity="0.7" />
      <line x1="72" y1="30" x2="72" y2="38" stroke="#eab308" stroke-width="2" opacity="0.7" />
      <line x1="78" y1="30" x2="78" y2="38" stroke="#eab308" stroke-width="2" opacity="0.7" />
      <!-- No-key badge -->
      <line x1="38" y1="20" x2="58" y2="40" stroke="#ef4444" stroke-width="2" opacity="0.5" />
      <rect x="14" y="68" width="82" height="16" rx="4" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4" />
      <text x="55" y="80" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">GCP KEYLESS</text>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b" />
    <rect x="40" y="192" width="160" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3: AWS Zero Trust -->
  <g transform="translate(660, 340)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(110, 12)">
      <!-- Shield with zero trust circles -->
      <path d="M50 5 L88 22 L88 52 C88 78 70 92 50 102 C30 92 12 78 12 52 L12 22 Z" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="2" stroke-opacity="0.8" />
      <!-- Concentric trust rings -->
      <circle cx="50" cy="50" r="30" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.4" stroke-dasharray="4 3" />
      <circle cx="50" cy="50" r="18" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.6" stroke-dasharray="4 3" />
      <circle cx="50" cy="50" r="6" fill="#f97316" opacity="0.5" />
      <!-- Verify arrows -->
      <path d="M35 30 L42 37" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.7" />
      <path d="M65 30 L58 37" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.7" />
      <path d="M35 70 L42 63" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.7" />
      <path d="M65 70 L58 63" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.7" />
      <rect x="12" y="96" width="76" height="16" rx="4" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1" stroke-opacity="0.4" />
      <text x="50" y="108" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">ZERO TRUST</text>
    </g>
    <g transform="translate(40, 195)">
      <rect width="240" height="28" rx="6" fill="#1e293b" opacity="0.8" />
      <circle cx="18" cy="14" r="5" fill="#f97316" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="725" cy="280" r="2" fill="#f97316" opacity="0.5">
    <animate attributeName="cy" values="280;270;280" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="840" cy="330" r="1.5" fill="#22c55e" opacity="0.4">
    <animate attributeName="cy" values="330;320;330" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1060" cy="300" r="2" fill="#eab308" opacity="0.5">
    <animate attributeName="cy" values="300;290;300" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="690" cy="205" r="1.5" fill="#f97316" opacity="0.3">
    <animate attributeName="cy" values="205;197;205" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1110" cy="175" r="1" fill="#22c55e" opacity="0.4">
    <animate attributeName="cy" values="175;167;175" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- WEEKLY DIGEST badge -->
  <g transform="translate(60, 80)">
    <rect width="160" height="32" rx="16" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1" stroke-opacity="0.4" />
    <text x="80" y="21" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">WEEKLY DIGEST</text>
  </g>

  <text x="60" y="170" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Tech Security</text>
  <text x="60" y="225" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Weekly</text>
  <text x="60" y="290" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">AWS Zero Trust</text>
  <text x="60" y="335" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">GCP + FinOps</text>

  <rect x="60" y="360" width="200" height="3" rx="1.5" fill="url(#accentLine)" />

  <g transform="translate(60, 385)">
    <rect width="54" height="30" rx="15" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.35" />
    <text x="27" y="20" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AWS</text>
    <g transform="translate(64, 0)">
      <rect width="54" height="30" rx="15" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="27" y="20" text-anchor="middle" fill="#22d3ee" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">GCP</text>
    </g>
    <g transform="translate(128, 0)">
      <rect width="88" height="30" rx="15" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="44" y="20" text-anchor="middle" fill="#fde68a" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Zero Trust</text>
    </g>
    <g transform="translate(226, 0)">
      <rect width="68" height="30" rx="15" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="34" y="20" text-anchor="middle" fill="#4ade80" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">FinOps</text>
    </g>
  </g>

  <text x="60" y="460" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">MARCH 27, 2026</text>

  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8" />
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
</svg>