<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left Side: Text Content -->

  <!-- Date Badge -->
  <rect x="50" y="40" width="180" height="40" rx="20" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="140" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle">MARCH 27, 2026</text>

  <!-- Main Title -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Tech Security</text>
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Digest Zero Trust</text>

  <!-- Tag Pills -->
  <rect x="80" y="410" width="110" height="36" rx="18" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="135" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3b82f6" text-anchor="middle">Zero Trust</text>

  <rect x="210" y="410" width="110" height="36" rx="18" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="265" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f59e0b" text-anchor="middle">Security</text>

  <rect x="340" y="410" width="90" height="36" rx="18" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="385" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">Threats</text>

  <!-- Footer -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#6b7280">tech.2twodragon.com</text>

  <!-- Right Side: Visual Scene (x=650-1150, y=80-550) -->

  <!-- Background subtle grid for context -->
  <g opacity="0.08" stroke="#3b82f6" stroke-width="0.5">
    <line x1="650" y1="150" x2="1150" y2="150" stroke-dasharray="5,5"/>
    <line x1="650" y1="220" x2="1150" y2="220" stroke-dasharray="5,5"/>
    <line x1="650" y1="290" x2="1150" y2="290" stroke-dasharray="5,5"/>
    <line x1="650" y1="360" x2="1150" y2="360" stroke-dasharray="5,5"/>
    <line x1="650" y1="430" x2="1150" y2="430" stroke-dasharray="5,5"/>
  </g>

  <!-- Network Nodes with Trust Boundaries -->
  <!-- Top Left Node -->
  <circle cx="750" cy="150" r="40" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="750" cy="150" r="25" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="750" cy="150" r="12" fill="#3b82f6" opacity="0.4"/>
  <text x="750" y="156" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Auth</text>

  <!-- Top Right Node -->
  <circle cx="1050" cy="150" r="40" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="1050" cy="150" r="25" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="1050" cy="150" r="12" fill="#f59e0b" opacity="0.4"/>
  <text x="1050" y="156" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">API</text>

  <!-- Center Shield with Checkmark -->
  <g>
    <!-- Shield shape -->
    <path d="M 900 180 L 900 270 Q 900 320 900 340 Q 900 360 880 370 Q 860 380 850 375 Q 840 370 820 360 Q 800 350 800 340 Q 800 320 800 270 L 800 180 Z"
          fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="2.5"/>

    <!-- Checkmark inside shield -->
    <path d="M 825 310 L 835 325 L 875 290" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Bottom Left Node -->
  <circle cx="750" cy="450" r="40" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="750" cy="450" r="25" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="750" cy="450" r="12" fill="#ef4444" opacity="0.4"/>
  <text x="750" y="456" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Data</text>

  <!-- Bottom Right Node -->
  <circle cx="1050" cy="450" r="40" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="1050" cy="450" r="25" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="1050" cy="450" r="12" fill="#3b82f6" opacity="0.4"/>
  <text x="1050" y="456" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">Verify</text>

  <!-- Data Flow Arrows -->
  <!-- Top Left to Center Shield -->
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.6"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.6"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Arrow from Top Left to Shield -->
  <path d="M 780 165 Q 815 170 825 185" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2" opacity="0.5" marker-end="url(#arrowblue)"/>

  <!-- Arrow from Top Right to Shield -->
  <path d="M 1020 165 Q 925 170 875 185" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2" opacity="0.5" marker-end="url(#arroworange)"/>

  <!-- Arrow from Shield to Bottom Left -->
  <path d="M 825 360 Q 800 400 775 435" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2" opacity="0.5" marker-end="url(#arrowblue)"/>

  <!-- Arrow from Shield to Bottom Right -->
  <path d="M 875 360 Q 950 400 1020 435" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" opacity="0.5" marker-end="url(#arrowred)"/>

  <!-- Warning Triangles / Alert Indicators -->
  <!-- Top Alert -->
  <path d="M 950 100 L 970 140 L 930 140 Z" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="950" y="130" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">!</text>

  <!-- Side Alert -->
  <path d="M 1100 250 L 1120 290 L 1080 290 Z" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1100" y="280" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b" text-anchor="middle">!</text>

  <!-- Bottom Alert -->
  <path d="M 680 500 L 700 540 L 660 540 Z" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="680" y="530" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle">!</text>

  <!-- Compliance/Lock Icon elements -->
  <g opacity="0.3">
    <!-- Lock symbol at center top -->
    <circle cx="900" cy="80" r="15" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="893" y="85" width="14" height="12" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="900" cy="91" r="2" fill="#3b82f6"/>
  </g>
</svg>