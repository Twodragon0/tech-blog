    <ellipse cx="570" cy="380" rx="80" ry="110"/>
    <ellipse cx="220" cy="210" rx="130" ry="85"/>
    <ellipse cx="270" cy="420" rx="70" ry="100"/>
    <ellipse cx="880" cy="220" rx="160" ry="90"/>
    <ellipse cx="960" cy="430" rx="75" ry="50"/>
  </g>

  <!-- RADAR PINGS: ATTACK ORIGINS -->
  <g transform="translate(310, 245)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#ef4444" stroke-width="1.2" opacity="0.22"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.38"/>
    <circle cx="0" cy="0" r="20" fill="url(#redPing)" opacity="0.6"/>
    <circle cx="0" cy="0" r="6" fill="#ef4444" opacity="0.95"/>
    <circle cx="0" cy="0" r="3" fill="#fca5a5"/>
    <text x="12" y="-10" font-family="Courier New, monospace" font-size="10" fill="#ef4444" opacity="0.9" font-weight="bold">IRAN</text>
  </g>
  <g transform="translate(195, 175)">
