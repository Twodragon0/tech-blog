    <circle cx="0" cy="0" r="52" fill="#0f172a" stroke="#3b82f6" stroke-width="2" opacity="0.62"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#bfdbfe" opacity="0.88" font-weight="900" letter-spacing="1">TAKEDOWN</text>
