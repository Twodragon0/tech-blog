  <g transform="translate(600, 315)">
    <polygon points="0,-90 18,-35 70,-55 45,-8 90,0 45,8 70,55 18,35 0,90 -18,35 -70,55 -45,8 -90,0 -45,-8 -70,-55 -18,-35"
