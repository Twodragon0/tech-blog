    <ellipse cx="548" cy="304" rx="14" ry="8" transform="rotate(-20,548,304)"/>
    <ellipse cx="566" cy="310" rx="14" ry="8" transform="rotate(15,566,310)"/>
    <ellipse cx="584" cy="306" rx="14" ry="8" transform="rotate(-25,584,306)"/>
