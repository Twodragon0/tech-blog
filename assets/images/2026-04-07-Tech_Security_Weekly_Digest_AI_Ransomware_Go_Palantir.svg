    <text x="10" y="-8" font-family="Courier New, monospace" font-size="10" fill="#ef4444" opacity="0.9" font-weight="bold">DPRK</text>
  </g>

  <!-- ATTACK LINES -->
  <path d="M310,245 Q500,200 860,290" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="6,5" opacity="0.32"/>
  <polygon points="856,282 866,292 850,296" fill="#ef4444" opacity="0.45"/>
  <path d="M195,175 Q460,140 870,220" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="5,6" opacity="0.28"/>
  <polygon points="866,214 876,222 860,226" fill="#dc2626" opacity="0.4"/>

  <!-- TARGET PINGS -->
  <g transform="translate(870, 290)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#60a5fa" stroke-width="1.2" opacity="0.28"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.42"/>
    <circle cx="0" cy="0" r="16" fill="url(#bluePing)" opacity="0.55"/>
