<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>2026 03 08 Tech Security Weekly Digest AI Security</title>
  <defs>
    <!-- Glass blur filter -->
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for orbs -->
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <!-- Gradient accents -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <!-- Card border gradients -->
    <linearGradient id="cardBorder1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="cardBorder2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <!-- Dot pattern -->
    <pattern id="dotGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#ffffff" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Ambient glow orbs -->
  <circle cx="200" cy="500" r="180" fill="#3b82f6" opacity="0.07" filter="url(#orbGlow)"/>
  <circle cx="900" cy="120" r="200" fill="#f43f5e" opacity="0.06" filter="url(#orbGlow)"/>
  <circle cx="700" cy="550" r="140" fill="#8b5cf6" opacity="0.05" filter="url(#orbGlow)"/>
  <circle cx="1100" cy="400" r="160" fill="#3b82f6" opacity="0.04" filter="url(#orbGlow)"/>

  <!-- ===== LEFT SIDE ===== -->

  <!-- Category pill -->
  <rect x="70" y="80" width="160" height="34" rx="17" fill="url(#accentGrad)" opacity="0.9"/>
  <text x="150" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">SECURITY</text>

  <!-- Title -->
  <text x="70" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Tech Security</text>
  <text x="70" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#e2e8f0" letter-spacing="-0.3">Weekly Digest</text>
  <text x="70" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="600" fill="#94a3b8">Security</text>

  <!-- Gradient accent line -->
  <rect x="70" y="300" width="200" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Tag chips -->
  <rect x="70" y="330" width="110" height="30" rx="15" fill="#1e293b" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="125" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">Compliance</text>

  <rect x="192" y="330" width="120" height="30" rx="15" fill="#1e293b" stroke="#f43f5e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="252" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fb7185" text-anchor="middle">Zero Trust</text>

  <rect x="324" y="330" width="130" height="30" rx="15" fill="#1e293b" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="1"/>
  <text x="389" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">Threat Intel</text>

  <!-- Date -->
  <text x="70" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#64748b" letter-spacing="2">MARCH 8, 2026</text>

  <!-- Footer -->
  <text x="70" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#475569" letter-spacing="0.5">tech.2twodragon.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accentLine)" opacity="0.6"/>

  <!-- ===== RIGHT SIDE: Frosted Glass Cards ===== -->

  <!-- Card 3 (back, bottom-right) -->
  <g filter="url(#cardShadow)">
    <rect x="740" y="280" width="340" height="260" rx="16" fill="#1e293b" fill-opacity="0.35"/>
    <rect x="740" y="280" width="340" height="260" rx="16" fill="none" stroke="url(#cardBorder3)" stroke-width="1.5"/>
    <!-- Binary/code lines decoration -->
    <text x="770" y="320" font-family="monospace" font-size="11" fill="#3b82f6" opacity="0.3">01001 SECURE 11010</text>
    <text x="770" y="340" font-family="monospace" font-size="11" fill="#8b5cf6" opacity="0.25">10110 VERIFY 01101</text>
    <text x="770" y="360" font-family="monospace" font-size="11" fill="#3b82f6" opacity="0.2">11001 PROTECT 10010</text>
    <rect x="770" y="380" width="120" height="6" rx="3" fill="#3b82f6" opacity="0.15"/>
    <rect x="770" y="396" width="80" height="6" rx="3" fill="#8b5cf6" opacity="0.12"/>
    <rect x="770" y="412" width="160" height="6" rx="3" fill="#3b82f6" opacity="0.1"/>
    <!-- Lock icon -->
    <rect x="980" y="460" width="36" height="28" rx="4" fill="none" stroke="#64748b" stroke-width="2" opacity="0.4"/>
    <path d="M990 460 v-10 a8 8 0 0 1 16 0 v10" fill="none" stroke="#64748b" stroke-width="2" opacity="0.4"/>
    <circle cx="998" cy="474" r="3" fill="#64748b" opacity="0.4"/>
  </g>

  <!-- Card 2 (middle, overlapping) -->
  <g filter="url(#cardShadow)">
    <rect x="680" y="180" width="340" height="260" rx="16" fill="#1e293b" fill-opacity="0.45"/>
    <rect x="680" y="180" width="340" height="260" rx="16" fill="none" stroke="url(#cardBorder2)" stroke-width="1.5"/>
    <!-- Metrics -->
    <text x="720" y="240" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">THREAT LEVEL</text>
    <rect x="720" y="255" width="260" height="8" rx="4" fill="#1e293b"/>
    <rect x="720" y="255" width="78" height="8" rx="4" fill="url(#accentGrad)" opacity="0.7"/>
    <text x="720" y="290" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">COMPLIANCE</text>
    <rect x="720" y="305" width="260" height="8" rx="4" fill="#1e293b"/>
    <rect x="720" y="305" width="220" height="8" rx="4" fill="#22c55e" opacity="0.5"/>
    <!-- Network nodes -->
    <circle cx="720" cy="360" r="4" fill="#f43f5e" opacity="0.4"/>
    <circle cx="780" cy="380" r="3" fill="#f43f5e" opacity="0.3"/>
    <circle cx="750" cy="340" r="3.5" fill="#fb7185" opacity="0.35"/>
    <line x1="720" y1="360" x2="780" y2="380" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
    <line x1="720" y1="360" x2="750" y2="340" stroke="#f43f5e" stroke-width="1" opacity="0.2"/>
    <line x1="750" y1="340" x2="780" y2="380" stroke="#f43f5e" stroke-width="1" opacity="0.15"/>
    <!-- Status badge -->
    <rect x="880" y="390" width="100" height="28" rx="14" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="900" cy="404" r="4" fill="#22c55e" opacity="0.8"/>
    <text x="940" y="409" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4ade80" text-anchor="middle">SECURED</text>
  </g>

  <!-- Card 1 (front, main card with shield) -->
  <g filter="url(#cardShadow)">
    <rect x="620" y="80" width="360" height="280" rx="16" fill="#1e293b" fill-opacity="0.55"/>
    <rect x="620" y="80" width="360" height="280" rx="16" fill="none" stroke="url(#cardBorder1)" stroke-width="1.5"/>

    <!-- Large Shield with Checkmark -->
    <g transform="translate(735, 130)">
      <!-- Shield body -->
      <path d="M65 0 L130 25 L130 80 C130 130 97 160 65 175 C33 160 0 130 0 80 L0 25 Z"
            fill="url(#shieldGrad)" opacity="0.2" filter="url(#glow)"/>
      <path d="M65 0 L130 25 L130 80 C130 130 97 160 65 175 C33 160 0 130 0 80 L0 25 Z"
            fill="none" stroke="url(#shieldGrad)" stroke-width="2.5" opacity="0.8"/>
      <!-- Inner shield -->
      <path d="M65 15 L118 36 L118 78 C118 120 90 146 65 158 C40 146 12 120 12 78 L12 36 Z"
            fill="url(#shieldGrad)" opacity="0.08"/>
      <!-- Checkmark -->
      <path d="M40 90 L58 108 L95 62" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    </g>

    <!-- Card label -->
    <text x="800" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="1.5">VERIFIED SECURE</text>
  </g>

  <!-- Floating particles between cards -->
  <circle cx="660" cy="250" r="2" fill="#3b82f6" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="730" cy="380" r="1.5" fill="#f43f5e" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="200" r="2.5" fill="#8b5cf6" opacity="0.45">
    <animate attributeName="opacity" values="0.25;0.65;0.25" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="690" cy="150" r="1.8" fill="#3b82f6" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="350" r="2" fill="#f43f5e" opacity="0.3">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="450" r="1.5" fill="#22c55e" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.55;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="520" r="2" fill="#8b5cf6" opacity="0.3">
    <animate attributeName="opacity" values="0.15;0.45;0.15" dur="4.2s" repeatCount="indefinite"/>
  </circle>
</svg>