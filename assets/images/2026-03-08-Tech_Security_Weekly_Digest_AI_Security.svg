<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>OpenAI Codex Security Scan, Firefox 148 Vulns - Security Weekly 2026-03-08</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="50%" stop-color="#0d1b35"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="180" cy="200" r="280" fill="#38bdf8" opacity="0.04" filter="url(#sg)"/>
  <circle cx="1050" cy="450" r="220" fill="#0284c7" opacity="0.06" filter="url(#sg)"/>
  <!-- Code scan visualization -->
  <g transform="translate(930,290)" filter="url(#glow)" opacity="0.55">
    <!-- Code block -->
    <rect x="-75" y="-80" width="150" height="140" rx="8" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <rect x="-75" y="-80" width="150" height="140" rx="8" fill="#38bdf8" opacity="0.05"/>
    <!-- Code lines -->
    <line x1="-55" y1="-55" x2="40" y2="-55" stroke="#93c5fd" stroke-width="1.5" opacity="0.6"/>
    <line x1="-55" y1="-35" x2="55" y2="-35" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <line x1="-55" y1="-15" x2="20" y2="-15" stroke="#93c5fd" stroke-width="1.5" opacity="0.6"/>
    <line x1="-55" y1="5" x2="48" y2="5" stroke="#93c5fd" stroke-width="1.5" opacity="0.4"/>
    <line x1="-55" y1="25" x2="35" y2="25" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <!-- Scan line -->
    <line x1="-75" y1="0" x2="75" y2="0" stroke="#38bdf8" stroke-width="2.5" opacity="0.8"/>
    <rect x="-75" y="-80" width="150" height="80" rx="8" fill="#38bdf8" opacity="0.04"/>
    <!-- Warning badge -->
    <circle cx="55" cy="-65" r="18" fill="#ef4444" opacity="0.85"/>
    <text x="55" y="-58" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">14</text>
    <!-- Magnifying glass -->
    <circle cx="0" cy="85" r="25" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.7"/>
    <line x1="18" y1="103" x2="32" y2="117" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Date + category -->
  <rect x="70" y="44" width="158" height="34" rx="17" fill="#38bdf8" opacity="0.13" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="149" y="66" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#7dd3fc" text-anchor="middle">March 8, 2026</text>
  <rect x="248" y="44" width="128" height="34" rx="17" fill="rgba(56,189,248,0.12)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="312" y="66" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#7dd3fc" text-anchor="middle">AI SAST</text>
  <!-- Title -->
  <text x="70" y="195" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="white" filter="url(#glow)">OpenAI Codex</text>
  <text x="70" y="252" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="white" filter="url(#glow)">Security Scan</text>
  <text x="70" y="308" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">Weekly Security Digest</text>
  <!-- Keywords -->
  <rect x="70" y="368" width="148" height="36" rx="18" fill="rgba(56,189,248,0.12)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="144" y="391" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#7dd3fc" text-anchor="middle">AI SAST</text>
  <rect x="238" y="368" width="168" height="36" rx="18" fill="rgba(239,68,68,0.14)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="322" y="391" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fca5a5" text-anchor="middle">Firefox 148 14H</text>
  <rect x="426" y="368" width="98" height="36" rx="18" fill="rgba(245,158,11,0.14)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="475" y="391" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle">USDC</text>
  <!-- Accent bar -->
  <rect x="70" y="434" width="400" height="4" rx="2" fill="url(#acc)"/>
  <!-- Footer -->
  <line x1="50" y1="592" x2="1150" y2="592" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
  <text x="1150" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="end">tech.2twodragon.com</text>
  <text x="70" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b">DevSecOps Weekly Intel</text>
</svg>
