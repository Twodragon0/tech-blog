    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3366" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#cc2255" stop-opacity="0.06"/>
