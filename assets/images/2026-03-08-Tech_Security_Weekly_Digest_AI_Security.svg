<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE: Text Content -->

  <!-- Date Badge -->
  <rect x="50" y="40" width="240" height="50" rx="25" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="170" y="72" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">MARCH 8, 2026</text>

  <!-- Main Title: "Tech Security" -->
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">Tech Security</text>

  <!-- Subtitle: "Weekly Digest Security" -->
  <text x="60" y="270" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">Weekly Digest</text>
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">Security</text>

  <!-- Tag Pills -->
  <g>
    <!-- Tag 1: DevSecOps -->
    <rect x="60" y="410" width="120" height="40" rx="20" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="120" y="436" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">DevSecOps</text>

    <!-- Tag 2: Security -->
    <rect x="200" y="410" width="100" height="40" rx="20" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
    <text x="250" y="436" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Security</text>

    <!-- Tag 3: Cloud -->
    <rect x="320" y="410" width="90" height="40" rx="20" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="365" y="436" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Cloud</text>
  </g>

  <!-- Footer -->
  <text x="60" y="580" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.6">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: Visual Scene (x=650-1150, y=80-550) -->

  <!-- Shield with Checkmark (Center element) -->
  <g>
    <!-- Shield outline -->
    <path d="M 900 120 L 850 150 L 850 280 C 850 360 900 420 900 420 C 900 420 950 360 950 280 L 950 150 Z"
          fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2"/>

    <!-- Checkmark inside shield -->
    <path d="M 880 300 L 895 320 L 920 280"
          fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Data Flow Arrows (Left side of shield) -->
  <g opacity="0.6">
    <!-- Arrow 1: Blue -->
    <line x1="700" y1="200" x2="820" y2="220" stroke="#3b82f6" stroke-width="2.5" opacity="0.7"/>
    <polygon points="820,220 815,215 818,225" fill="#3b82f6" opacity="0.7"/>

    <!-- Arrow 2: Orange -->
    <line x1="710" y1="280" x2="830" y2="280" stroke="#f59e0b" stroke-width="2.5" opacity="0.7"/>
    <polygon points="830,280 825,275 825,285" fill="#f59e0b" opacity="0.7"/>

    <!-- Arrow 3: Red -->
    <line x1="700" y1="360" x2="820" y2="340" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
    <polygon points="820,340 815,345 818,335" fill="#ef4444" opacity="0.7"/>
  </g>

  <!-- Warning Triangles (Right side) -->
  <g opacity="0.7">
    <!-- Triangle 1: Top right -->
    <polygon points="1000,140 1020,180 980,180" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1000" y="170" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ef4444" opacity="0.8" text-anchor="middle">!</text>

    <!-- Triangle 2: Bottom right -->
    <polygon points="1080,380 1100,420 1060,420" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="1080" y="410" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f59e0b" opacity="0.8" text-anchor="middle">!</text>
  </g>

  <!-- Network/Connection Nodes -->
  <g opacity="0.5">
    <!-- Node 1: Top left -->
    <circle cx="720" cy="150" r="12" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>

    <!-- Node 2: Left center -->
    <circle cx="710" cy="280" r="12" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>

    <!-- Node 3: Bottom left -->
    <circle cx="720" cy="400" r="12" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>

    <!-- Node 4: Right side -->
    <circle cx="1000" cy="300" r="12" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  </g>

  <!-- Data Lock Icon (Bottom right) -->
  <g opacity="0.6">
    <!-- Lock body -->
    <rect x="1000" y="460" width="50" height="40" rx="5" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="2"/>

    <!-- Lock shackle -->
    <path d="M 1015 460 Q 1015 440 1035 440 Q 1055 440 1055 460"
          fill="none" stroke="#ef4444" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- Decorative Grid Lines -->
  <g opacity="0.03">
    <line x1="650" y1="80" x2="650" y2="550" stroke="#3b82f6" stroke-width="1"/>
    <line x1="800" y1="80" x2="800" y2="550" stroke="#3b82f6" stroke-width="1"/>
    <line x1="950" y1="80" x2="950" y2="550" stroke="#3b82f6" stroke-width="1"/>
    <line x1="1100" y1="80" x2="1100" y2="550" stroke="#3b82f6" stroke-width="1"/>
  </g>
</svg>