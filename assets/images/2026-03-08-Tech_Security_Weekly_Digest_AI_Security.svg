    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="50%" stop-color="#cc2255"/>
      <stop offset="100%" stop-color="#660022"/>
