<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Date badge -->
  <rect x="60" y="45" width="200" height="45" rx="22" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <text x="160" y="73" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle" opacity="0.8">MARCH 8, 2026</text>
  
  <!-- LEFT SIDE: Text -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="white">Tech Security</text>
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Weekly Digest</text>
  <text x="80" y="295" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Security</text>
  
  <!-- RIGHT SIDE: Detailed visual scene -->
  <!-- Large shield with checkmark -->
  <g opacity="0.10">
    <path d="M 850 120 L 920 160 L 920 300 Q 920 370 850 420 Q 780 370 780 300 L 780 160 Z" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <polyline points="810 280 835 315 890 245" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.12"/>
  </g>
  
  <!-- Data flow arrows -->
  <g stroke="#f59e0b" stroke-width="1.8" opacity="0.12" fill="none" stroke-linecap="round">
    <line x1="700" y1="180" x2="770" y2="180"/>
    <polygon points="770 180 755 175 760 180 755 185" fill="#f59e0b"/>
    
    <line x1="700" y1="270" x2="780" y2="280"/>
    <polygon points="780 280 765 275 770 280 765 285" fill="#f59e0b"/>
    
    <line x1="700" y1="360" x2="770" y2="360"/>
    <polygon points="770 360 755 355 760 360 755 365" fill="#f59e0b"/>
    
    <line x1="920" y1="240" x2="1000" y2="200"/>
    <polygon points="1000 200 985 210 992 195 1005 205" fill="#f59e0b"/>
    
    <line x1="920" y1="320" x2="1000" y2="380"/>
    <polygon points="1000 380 985 370 992 385 1005 375" fill="#f59e0b"/>
  </g>
  
  <!-- Warning triangles / Alert indicators -->
  <g opacity="0.10">
    <!-- Alert 1: top-right -->
    <polygon points="990 130 1020 190 960 190" fill="none" stroke="#ef4444" stroke-width="2.2"/>
    <circle cx="990" cy="150" r="2.5" fill="#ef4444"/>
    
    <!-- Alert 2: middle-right -->
    <polygon points="1050 270 1080 330 1020 330" fill="none" stroke="#ef4444" stroke-width="2.2"/>
    <circle cx="1050" cy="290" r="2.5" fill="#ef4444"/>
    
    <!-- Alert 3: bottom-right -->
    <polygon points="1000 420 1030 480 970 480" fill="none" stroke="#ef4444" stroke-width="2.2"/>
    <circle cx="1000" cy="440" r="2.5" fill="#ef4444"/>
  </g>
  
  <!-- Network nodes and connections -->
  <g opacity="0.08" fill="none" stroke="#3b82f6" stroke-width="1.5">
    <circle cx="720" cy="180" r="14"/>
    <circle cx="720" cy="270" r="14"/>
    <circle cx="720" cy="360" r="14"/>
    
    <line x1="734" y1="180" x2="780" y2="180"/>
    <line x1="734" y1="270" x2="780" y2="280"/>
    <line x1="734" y1="360" x2="780" y2="360"/>
  </g>
  
  <!-- Decorative grid pattern (subtle) -->
  <g stroke="#3b82f6" stroke-width="0.3" opacity="0.04">
    <line x1="650" y1="80" x2="650" y2="550"/>
    <line x1="700" y1="80" x2="700" y2="550"/>
    <line x1="750" y1="80" x2="750" y2="550"/>
    <line x1="950" y1="80" x2="950" y2="550"/>
    <line x1="1000" y1="80" x2="1000" y2="550"/>
    <line x1="1050" y1="80" x2="1050" y2="550"/>
  </g>
  
  <!-- Tag pills -->
  <g font-family="Arial, sans-serif" font-size="13" font-weight="600">
    <rect x="70" y="420" width="110" height="35" rx="17" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <text x="125" y="442" fill="#3b82f6" text-anchor="middle" opacity="0.7">Security</text>
    
    <rect x="195" y="420" width="110" height="35" rx="17" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <text x="250" y="442" fill="#ef4444" text-anchor="middle" opacity="0.7">Threats</text>
    
    <rect x="320" y="420" width="110" height="35" rx="17" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <text x="375" y="442" fill="#f59e0b" text-anchor="middle" opacity="0.7">Updates</text>
  </g>
  
  <!-- Footer -->
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="13" fill="#666" opacity="0.6">tech.2twodragon.com</text>
</svg>