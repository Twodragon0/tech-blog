<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020f1a"/>
      <stop offset="50%" style="stop-color:#041e2e"/>
      <stop offset="100%" style="stop-color:#071520"/>
    </linearGradient>

    <!-- Card Gradient -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2333"/>
      <stop offset="100%" style="stop-color:#071828"/>
    </linearGradient>

    <!-- Teal Gradient (primary accent) -->
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>

    <!-- Dark Teal Gradient (for badges) -->
    <linearGradient id="darkTealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#155e75"/>
    </linearGradient>

    <!-- Security Gradient (cyan-teal) -->
    <linearGradient id="secGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>

    <!-- Blockchain Gradient (amber) -->
    <linearGradient id="blockchainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>

    <!-- Timeline Gradient -->
    <linearGradient id="timelineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#06b6d4;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#0891b2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Teal Glow -->
    <filter id="tealGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Card Shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#06b6d4" flood-opacity="0.1"/>
    </filter>

    <!-- Grid Pattern (single definition) -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#06b6d4" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative ambient circles -->
  <circle cx="150" cy="120" r="220" fill="#06b6d4" fill-opacity="0.04"/>
  <circle cx="1050" cy="500" r="280" fill="#0891b2" fill-opacity="0.04"/>
  <circle cx="600" cy="315" r="350" fill="#0e7490" fill-opacity="0.025"/>

  <!-- Subtle teal accent line at top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#tealGradient)"/>

  <!-- ===================== HEADER ===================== -->

  <!-- WEEKLY DIGEST badge (teal) -->
  <rect x="40" y="28" width="200" height="36" rx="18" fill="url(#tealGradient)" filter="url(#shadow)"/>
  <text x="140" y="52" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">WEEKLY DIGEST</text>

  <!-- Date badge (dark teal) -->
  <rect x="960" y="28" width="200" height="36" rx="18" fill="url(#darkTealGradient)" filter="url(#shadow)"/>
  <text x="1060" y="52" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#67e8f9" text-anchor="middle">March 08, 2026</text>

  <!-- Main Title -->
  <text x="600" y="105" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle" filter="url(#tealGlow)">Tech &amp; Security Weekly Digest</text>
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="18" fill="#67e8f9" text-anchor="middle">AI | Security</text>

  <!-- Thin divider below header -->
  <line x1="200" y1="160" x2="1000" y2="160" stroke="#06b6d4" stroke-opacity="0.25" stroke-width="1"/>

  <!-- ===================== HORIZONTAL TIMELINE BAR ===================== -->

  <!-- Timeline track -->
  <rect x="80" y="298" width="1040" height="4" rx="2" fill="url(#timelineGradient)" opacity="0.7"/>

  <!-- Timeline node 1: Security -->
  <circle cx="220" cy="300" r="10" fill="#06b6d4" filter="url(#tealGlow)"/>
  <circle cx="220" cy="300" r="5" fill="white"/>

  <!-- Timeline node 2: Security -->
  <circle cx="500" cy="300" r="10" fill="#06b6d4" filter="url(#tealGlow)"/>
  <circle cx="500" cy="300" r="5" fill="white"/>

  <!-- Timeline node 3: Blockchain highlight -->
  <circle cx="780" cy="300" r="10" fill="#f59e0b" filter="url(#shadow)"/>
  <circle cx="780" cy="300" r="5" fill="white"/>

  <!-- Timeline node 4 -->
  <circle cx="980" cy="300" r="8" fill="#0891b2" opacity="0.7"/>
  <circle cx="980" cy="300" r="4" fill="white"/>

  <!-- Timeline year markers -->
  <text x="220" y="326" font-family="Arial, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle" opacity="0.8">AI Security</text>
  <text x="500" y="326" font-family="Arial, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle" opacity="0.8">Firefox Vulns</text>
  <text x="780" y="326" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" opacity="0.8">Blockchain</text>
  <text x="980" y="326" font-family="Arial, sans-serif" font-size="10" fill="#67e8f9" text-anchor="middle" opacity="0.8">Markets</text>

  <!-- ===================== TOP: TWO MAIN SECURITY CARDS ===================== -->

  <!-- Security Card 1: OpenAI Codex -->
  <g transform="translate(50, 175)">
    <rect width="530" height="110" rx="14" fill="url(#cardGradient)" filter="url(#cardShadow)"/>
    <!-- Teal left accent bar -->
    <rect x="0" y="0" width="5" height="110" rx="2.5" fill="url(#secGradient)"/>
    <!-- Top accent line -->
    <rect x="5" y="0" width="525" height="3" rx="1.5" fill="url(#secGradient)" opacity="0.5"/>

    <!-- Category badge -->
    <rect x="20" y="14" width="84" height="20" rx="10" fill="#0e7490" fill-opacity="0.5"/>
    <text x="62" y="28" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#22d3ee" text-anchor="middle">SECURITY</text>

    <!-- Shield icon area -->
    <circle cx="490" cy="35" r="18" fill="#06b6d4" fill-opacity="0.12"/>
    <text x="490" y="41" font-family="Arial, sans-serif" font-size="16" fill="#06b6d4" text-anchor="middle">&#x25A0;</text>

    <text x="20" y="55" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">OpenAI Codex Security Scanned 1.2M Repos</text>
    <text x="20" y="76" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">OpenAI began rolling out Codex Security, an AI-powered tool</text>
    <text x="20" y="93" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">scanning over 1.2 million repositories for vulnerabilities.</text>

    <!-- Source tag -->
    <rect x="20" y="86" width="0" height="0" rx="0" fill="none"/>
    <text x="460" y="102" font-family="Arial, sans-serif" font-size="10" fill="#06b6d4" text-anchor="end" opacity="0.8">The Hacker News</text>
  </g>

  <!-- Security Card 2: Anthropic Firefox -->
  <g transform="translate(620, 175)">
    <rect width="530" height="110" rx="14" fill="url(#cardGradient)" filter="url(#cardShadow)"/>
    <!-- Teal left accent bar -->
    <rect x="0" y="0" width="5" height="110" rx="2.5" fill="url(#secGradient)"/>
    <!-- Top accent line -->
    <rect x="5" y="0" width="525" height="3" rx="1.5" fill="url(#secGradient)" opacity="0.5"/>

    <!-- Category badge -->
    <rect x="20" y="14" width="84" height="20" rx="10" fill="#0e7490" fill-opacity="0.5"/>
    <text x="62" y="28" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#22d3ee" text-anchor="middle">SECURITY</text>

    <!-- Scan icon area -->
    <circle cx="490" cy="35" r="18" fill="#06b6d4" fill-opacity="0.12"/>
    <text x="490" y="41" font-family="Arial, sans-serif" font-size="16" fill="#06b6d4" text-anchor="middle">&#x25CF;</text>

    <text x="20" y="55" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Anthropic Finds 22 Firefox Vulnerabilities</text>
    <text x="20" y="76" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Anthropic discovered 22 new security vulnerabilities in Firefox</text>
    <text x="20" y="93" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">using AI-assisted code analysis and automated scanning.</text>

    <!-- Source tag -->
    <text x="460" y="102" font-family="Arial, sans-serif" font-size="10" fill="#06b6d4" text-anchor="end" opacity="0.8">The Hacker News</text>
  </g>

  <!-- ===================== BOTTOM: BLOCKCHAIN ROW (5 cards) ===================== -->

  <!-- Blockchain label above row -->
  <rect x="50" y="342" width="120" height="20" rx="10" fill="#92400e" fill-opacity="0.4"/>
  <text x="110" y="356" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fbbf24" text-anchor="middle">BLOCKCHAIN</text>

  <!-- Blockchain Card 1: Kalshi sued -->
  <g transform="translate(50, 368)">
    <rect width="210" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="210" height="4" rx="2" fill="url(#blockchainGradient)"/>
    <rect x="0" y="0" width="4" height="130" rx="2" fill="url(#blockchainGradient)" opacity="0.6"/>

    <text x="115" y="24" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f59e0b" text-anchor="middle">BLOCKCHAIN</text>

    <text x="14" y="46" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Kalshi Sued Over</text>
    <text x="14" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Death Markets</text>
    <text x="14" y="83" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Prediction market</text>
    <text x="14" y="98" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">faces legal action</text>
    <text x="14" y="113" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">over death carveout.</text>

    <text x="196" y="126" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="end" opacity="0.7">Cointelegraph</text>
  </g>

  <!-- Blockchain Card 2: Kalshi $20B -->
  <g transform="translate(278, 368)">
    <rect width="210" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="210" height="4" rx="2" fill="url(#blockchainGradient)"/>
    <rect x="0" y="0" width="4" height="130" rx="2" fill="url(#blockchainGradient)" opacity="0.6"/>

    <text x="115" y="24" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f59e0b" text-anchor="middle">BLOCKCHAIN</text>

    <text x="14" y="46" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Kalshi, Polymarket</text>
    <text x="14" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Eye $20B Valuation</text>
    <text x="14" y="83" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">New regulation push</text>
    <text x="14" y="98" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">for prediction markets</text>
    <text x="14" y="113" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">amid rapid growth.</text>

    <text x="196" y="126" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="end" opacity="0.7">Cointelegraph</text>
  </g>

  <!-- Blockchain Card 3: USDC beats Tether -->
  <g transform="translate(506, 368)">
    <rect width="210" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="210" height="4" rx="2" fill="url(#blockchainGradient)"/>
    <rect x="0" y="0" width="4" height="130" rx="2" fill="url(#blockchainGradient)" opacity="0.6"/>

    <text x="115" y="24" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f59e0b" text-anchor="middle">BLOCKCHAIN</text>

    <text x="14" y="46" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">USDC Beats Tether</text>
    <text x="14" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">in Stablecoin Volume</text>
    <text x="14" y="83" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Monthly transaction</text>
    <text x="14" y="98" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">volume hit record</text>
    <text x="14" y="113" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">$1.8T in February.</text>

    <text x="196" y="126" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="end" opacity="0.7">Cointelegraph</text>
  </g>

  <!-- Blockchain Card 4: Grok roasts -->
  <g transform="translate(734, 368)">
    <rect width="210" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="210" height="4" rx="2" fill="url(#blockchainGradient)"/>
    <rect x="0" y="0" width="4" height="130" rx="2" fill="url(#blockchainGradient)" opacity="0.6"/>

    <text x="115" y="24" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f59e0b" text-anchor="middle">BLOCKCHAIN</text>

    <text x="14" y="46" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Grok Delivers</text>
    <text x="14" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Viral Vulgar Roasts</text>
    <text x="14" y="83" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">xAI Grok drew massive</text>
    <text x="14" y="98" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">attention on X with</text>
    <text x="14" y="113" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">profanity-filled roasts.</text>

    <text x="196" y="126" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="end" opacity="0.7">Cointelegraph</text>
  </g>

  <!-- Blockchain Card 5: (extra slot, e.g. "5 Blockchain Total") -->
  <g transform="translate(962, 368)">
    <rect width="188" height="130" rx="12" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="188" height="4" rx="2" fill="url(#blockchainGradient)"/>
    <rect x="0" y="0" width="4" height="130" rx="2" fill="url(#blockchainGradient)" opacity="0.6"/>

    <text x="98" y="24" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#f59e0b" text-anchor="middle">BLOCKCHAIN</text>

    <!-- Summary stat card -->
    <text x="94" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0.9">5</text>
    <text x="94" y="80" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Stories This Week</text>
    <text x="94" y="100" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">DeFi, Markets</text>
    <text x="94" y="115" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Regulation</text>
  </g>

  <!-- ===================== FOOTER ===================== -->
  <line x1="50" y1="516" x2="1150" y2="516" stroke="#06b6d4" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Stats row -->
  <text x="50" y="536" font-family="Arial, sans-serif" font-size="12" fill="#475569">12 News Collected</text>

  <!-- Divider dots -->
  <circle cx="195" cy="531" r="2" fill="#06b6d4" opacity="0.4"/>
  <text x="210" y="536" font-family="Arial, sans-serif" font-size="12" fill="#06b6d4">2 Security</text>

  <circle cx="315" cy="531" r="2" fill="#f59e0b" opacity="0.4"/>
  <text x="330" y="536" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b">5 Blockchain</text>

  <circle cx="455" cy="531" r="2" fill="#475569" opacity="0.4"/>
  <text x="470" y="536" font-family="Arial, sans-serif" font-size="12" fill="#475569">0 Cloud</text>

  <circle cx="550" cy="531" r="2" fill="#475569" opacity="0.4"/>
  <text x="565" y="536" font-family="Arial, sans-serif" font-size="12" fill="#475569">0 AI/ML</text>

  <!-- Blog URL -->
  <text x="1150" y="536" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#67e8f9" text-anchor="end" opacity="0.8">tech.2twodragon.com</text>

  <!-- Bottom teal accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#tealGradient)" opacity="0.5"/>
</svg>
