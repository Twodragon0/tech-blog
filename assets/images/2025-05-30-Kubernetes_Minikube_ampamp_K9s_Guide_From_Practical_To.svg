<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Kubernetes Minikube and K9s Practical Guide</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#152535"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#326ce5"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- K8s pod hexagons cluster (Minikube) -->
  <!-- Central pod -->
  <polygon points="960,220 990,204 1020,220 1020,252 990,268 960,252" fill="none" stroke="rgba(50,108,229,0.7)" stroke-width="3"/>
  <!-- Surrounding pods -->
  <polygon points="900,220 930,204 960,220 960,252 930,268 900,252" fill="none" stroke="rgba(50,108,229,0.45)" stroke-width="2"/>
  <polygon points="1020,220 1050,204 1080,220 1080,252 1050,268 1020,252" fill="none" stroke="rgba(50,108,229,0.45)" stroke-width="2"/>
  <polygon points="930,268 960,252 990,268 990,300 960,316 930,300" fill="none" stroke="rgba(50,108,229,0.35)" stroke-width="2"/>
  <polygon points="990,268 1020,252 1050,268 1050,300 1020,316 990,300" fill="none" stroke="rgba(50,108,229,0.35)" stroke-width="2"/>
  <!-- K9s terminal window -->
  <rect x="870" y="345" width="290" height="90" rx="6" fill="rgba(0,0,0,0.4)" stroke="rgba(0,184,148,0.5)" stroke-width="2"/>
  <!-- Terminal title bar -->
  <rect x="870" y="345" width="290" height="22" rx="6" fill="rgba(0,184,148,0.15)"/>
  <circle cx="887" cy="356" r="5" fill="rgba(231,76,60,0.6)"/>
  <circle cx="903" cy="356" r="5" fill="rgba(243,156,18,0.6)"/>
  <circle cx="919" cy="356" r="5" fill="rgba(39,174,96,0.6)"/>
  <text x="1010" y="359" font-family="monospace" font-size="11" fill="rgba(0,184,148,0.7)" text-anchor="middle">K9s</text>
  <!-- Terminal content -->
  <text x="885" y="384" font-family="monospace" font-size="12" fill="rgba(0,184,148,0.8)">Pods: 3/3 Running</text>
  <text x="885" y="402" font-family="monospace" font-size="12" fill="rgba(255,255,255,0.4)">Namespace: default</text>
  <text x="885" y="420" font-family="monospace" font-size="12" fill="rgba(0,184,148,0.5)">CPU: 45% MEM: 62%</text>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="190" height="32" rx="4" fill="rgba(50,108,229,0.2)" stroke="rgba(50,108,229,0.4)" stroke-width="1"/>
  <text x="175" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">MAY 30, 2025</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Kubernetes Minikube</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">and K9s Guide</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">Practical Cluster Management from Setup to Production</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">KUBERNETES GUIDE</text>
  <!-- Tags -->
  <rect x="80" y="420" width="105" height="36" rx="18" fill="rgba(50,108,229,0.18)" stroke="rgba(50,108,229,0.4)" stroke-width="1"/>
  <text x="132" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#326ce5" text-anchor="middle" font-weight="600">Minikube</text>
  <rect x="201" y="420" width="75" height="36" rx="18" fill="rgba(0,184,148,0.18)" stroke="rgba(0,184,148,0.4)" stroke-width="1"/>
  <text x="238" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#00b894" text-anchor="middle" font-weight="600">K9s</text>
  <rect x="292" y="420" width="120" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="352" y="443" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">Kubernetes</text>
  <!-- Bottom -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
