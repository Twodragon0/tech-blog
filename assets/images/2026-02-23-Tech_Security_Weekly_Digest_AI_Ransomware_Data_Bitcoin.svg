  <circle cx="890" cy="190" r="8" fill="rgba(80,160,255,0.10)" stroke="rgba(80,160,255,0.38)" stroke-width="1.2"/>
  <circle cx="1130" cy="185" r="8" fill="rgba(80,160,255,0.10)" stroke="rgba(80,160,255,0.38)" stroke-width="1.2"/>
  <circle cx="875" cy="280" r="6" fill="rgba(80,200,255,0.09)" stroke="rgba(80,200,255,0.30)" stroke-width="1"/>
  <circle cx="1145" cy="270" r="6" fill="rgba(80,200,255,0.09)" stroke="rgba(80,200,255,0.30)" stroke-width="1"/>
  <circle cx="940" cy="155" r="5" fill="rgba(120,180,255,0.09)" stroke="rgba(120,180,255,0.28)" stroke-width="1"/>
  <circle cx="1080" cy="150" r="5" fill="rgba(120,180,255,0.09)" stroke="rgba(120,180,255,0.28)" stroke-width="1"/>

