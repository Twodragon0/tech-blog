  <!-- 11. Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- 12. Category label -->
  <text x="80" y="370" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600"
        fill="rgba(255,120,120,0.80)" letter-spacing="2.5">SECURITY / DEVSECOPS / BLOCKCHAIN</text>

  <!-- 13. Tag pills -->
  <!-- Ransomware pill -->
  <rect x="80" y="402" width="148" height="36" rx="18" fill="url(#pill1Grad)" opacity="0.88"/>
  <text x="154" y="425" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600"
        fill="white" text-anchor="middle" letter-spacing="0.8">RANSOMWARE</text>

  <!-- Bitcoin pill -->
  <rect x="242" y="402" width="120" height="36" rx="18" fill="url(#pill2Grad)" opacity="0.88"/>
  <text x="302" y="425" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600"
        fill="white" text-anchor="middle" letter-spacing="0.8">BITCOIN</text>

  <!-- AI Security pill -->
  <rect x="376" y="402" width="130" height="36" rx="18" fill="url(#pill3Grad)" opacity="0.88"/>
  <text x="441" y="425" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600"
        fill="white" text-anchor="middle" letter-spacing="0.8">AI SECURITY</text>

  <!-- 14. Footer -->
  <text x="80" y="545" font-family="'Segoe UI',Arial,sans-serif" font-size="14"
        fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600"
        fill="rgba(255,120,120,0.45)" text-anchor="end" letter-spacing="1.5">SECURITY</text>
</svg>