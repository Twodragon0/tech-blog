  <line x1="890" y1="190" x2="910" y2="200" stroke="rgba(80,160,255,0.20)" stroke-width="1"/>
  <line x1="1130" y1="185" x2="1110" y2="200" stroke="rgba(80,160,255,0.20)" stroke-width="1"/>
  <line x1="875" y1="280" x2="910" y2="265" stroke="rgba(80,200,255,0.16)" stroke-width="1"/>
  <line x1="1145" y1="270" x2="1110" y2="262" stroke="rgba(80,200,255,0.16)" stroke-width="1"/>
  <line x1="940" y1="155" x2="960" y2="170" stroke="rgba(120,180,255,0.15)" stroke-width="1"/>
