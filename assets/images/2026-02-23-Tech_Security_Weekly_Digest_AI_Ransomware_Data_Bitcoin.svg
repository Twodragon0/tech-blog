  <!-- Bitcoin symbol inside shield -->
  <circle cx="1010" cy="238" r="38" fill="rgba(255,153,0,0.08)" stroke="rgba(255,153,0,0.35)" stroke-width="1.5"/>
  <!-- B letter strokes -->
  <path d="M998,218 L998,258 M998,218 L1012,218 Q1022,218 1022,228 Q1022,238 1012,238 L998,238 M998,238 L1014,238 Q1026,238 1026,248 Q1026,258 1014,258 L998,258"
        fill="none" stroke="rgba(255,180,0,0.55)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="1004" y1="213" x2="1004" y2="220" stroke="rgba(255,180,0,0.45)" stroke-width="2"/>
  <line x1="1012" y1="213" x2="1012" y2="220" stroke="rgba(255,180,0,0.45)" stroke-width="2"/>
  <line x1="1004" y1="258" x2="1004" y2="265" stroke="rgba(255,180,0,0.45)" stroke-width="2"/>
  <line x1="1012" y1="258" x2="1012" y2="265" stroke="rgba(255,180,0,0.45)" stroke-width="2"/>

