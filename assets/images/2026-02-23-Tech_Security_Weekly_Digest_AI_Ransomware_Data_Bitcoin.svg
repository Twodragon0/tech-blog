<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>2026 02 23 Tech Security Weekly Digest AI Ransomware Data Bitcoin</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side content -->
  <!-- Title -->
  <text x="60" y="185" font-size="46" font-weight="bold" fill="white" font-family="system-ui, -apple-system, sans-serif">Tech Security Weekly Digest</text>
  <text x="60" y="245" font-size="46" font-weight="bold" fill="white" font-family="system-ui, -apple-system, sans-serif">Ransomware Data</text>
  
  <!-- Date badge -->
  <rect x="60" y="280" width="280" height="50" rx="25" fill="#2d2e4a" stroke="#6b5fff" stroke-width="2"/>
  <text x="175" y="311" font-size="18" font-weight="600" fill="#b8b9ff" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">FEBRUARY 23, 2026</text>
  
  <!-- Tag pills -->
  <g id="tags">
    <!-- Tag 1: ransomware -->
    <rect x="60" y="410" width="140" height="40" rx="20" fill="#ff3d4d" opacity="0.2" stroke="#ff3d4d" stroke-width="1.5"/>
    <text x="130" y="435" font-size="14" font-weight="600" fill="#ff6b7a" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">ransomware</text>
    
    <!-- Tag 2: data breach -->
    <rect x="210" y="410" width="140" height="40" rx="20" fill="#ff8c42" opacity="0.2" stroke="#ff8c42" stroke-width="1.5"/>
    <text x="280" y="435" font-size="14" font-weight="600" fill="#ffb380" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">data breach</text>
    
    <!-- Tag 3: encryption -->
    <rect x="360" y="410" width="140" height="40" rx="20" fill="#6b5fff" opacity="0.2" stroke="#6b5fff" stroke-width="1.5"/>
    <text x="430" y="435" font-size="14" font-weight="600" fill="#9d9dff" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">encryption</text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="590" font-size="14" fill="#666b7f" font-family="system-ui, -apple-system, sans-serif">tech.2twodragon.com</text>
  
  <!-- Right side: Illustration for Ransomware &amp; Data -->
  <g id="illustration">
    <!-- Background gradient overlay for illustration area -->
    <defs>
      <linearGradient id="illGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#1a1d3a;stop-opacity:0.4"/>
        <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0"/>
      </linearGradient>
      <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
        <stop offset="0%" style="stop-color:#ff6b7a;stop-opacity:0.3"/>
        <stop offset="100%" style="stop-color:#ff3d4d;stop-opacity:0"/>
      </radialGradient>
    </defs>
    
    <!-- Central locked folder with chains -->
    <g id="locked-folder">
      <!-- Glow effect -->
      <circle cx="925" cy="280" r="120" fill="url(#glowRed)"/>
      
      <!-- Folder shadow/3D effect -->
      <path d="M 850 240 L 900 200 L 1000 200 L 1000 360 L 850 360 Z" fill="#1a1d3a" opacity="0.5"/>
      
      <!-- Main folder -->
      <g>
        <!-- Folder body -->
        <rect x="840" y="230" width="170" height="140" rx="8" fill="#2d2e4a" stroke="#ff6b7a" stroke-width="3"/>
        
        <!-- Folder tab -->
        <rect x="840" y="210" width="60" height="25" rx="4" fill="#2d2e4a" stroke="#ff6b7a" stroke-width="2"/>
        
        <!-- Center lock symbol -->
        <circle cx="925" cy="295" r="35" fill="#ff3d4d"/>
        <rect x="905" y="265" width="40" height="35" rx="6" fill="#ff3d4d"/>
        <circle cx="925" cy="285" r="8" fill="#0a0c1a"/>
        <path d="M 920 285 L 920 295 L 930 295 L 930 285" fill="none" stroke="#0a0c1a" stroke-width="2"/>
      </g>
      
      <!-- Data flow streams (red/orange lines escaping) -->
      <g id="data-streams" opacity="0.8">
        <!-- Stream 1: upward left -->
        <path d="M 880 230 Q 860 180 850 120" fill="none" stroke="#ff6b7a" stroke-width="2.5" stroke-dasharray="5,5">
          <animate attributeName="stroke-dashoffset" from="0" to="10" dur="2s" repeatCount="indefinite"/>
        </path>
        <circle cx="850" cy="120" r="3" fill="#ff8c42"/>
        
        <!-- Stream 2: upward center -->
        <path d="M 925 230 Q 930 170 925 100" fill="none" stroke="#ff8c42" stroke-width="2.5" stroke-dasharray="5,5">
          <animate attributeName="stroke-dashoffset" from="0" to="10" dur="2s" repeatCount="indefinite"/>
        </path>
        <circle cx="925" cy="100" r="3" fill="#ffa500"/>
        
        <!-- Stream 3: upward right -->
        <path d="M 970 230 Q 990 175 1005 115" fill="none" stroke="#ff3d4d" stroke-width="2.5" stroke-dasharray="5,5">
          <animate attributeName="stroke-dashoffset" from="0" to="10" dur="2s" repeatCount="indefinite"/>
        </path>
        <circle cx="1005" cy="115" r="3" fill="#ff6b7a"/>
        
        <!-- Stream 4: downward left -->
        <path d="M 880 370 Q 850 420 830 480" fill="none" stroke="#ff8c42" stroke-width="2.5" stroke-dasharray="5,5">
          <animate attributeName="stroke-dashoffset" from="0" to="10" dur="2s" repeatCount="indefinite"/>
        </path>
        
        <!-- Stream 5: downward right -->
        <path d="M 970 370 Q 1010 425 1040 490" fill="none" stroke="#ff3d4d" stroke-width="2.5" stroke-dasharray="5,5">
          <animate attributeName="stroke-dashoffset" from="0" to="10" dur="2s" repeatCount="indefinite"/>
        </path>
      </g>
    </g>
    
    <!-- Encryption/code symbols around -->
    <g id="encryption-symbols" opacity="0.6">
      <!-- Binary code blocks -->
      <g id="code-block-1">
        <rect x="750" y="200" width="60" height="60" rx="4" fill="#6b5fff" opacity="0.15" stroke="#6b5fff" stroke-width="1.5"/>
        <text x="780" y="225" font-size="12" font-family="monospace" fill="#9d9dff" text-anchor="middle">01</text>
        <text x="780" y="245" font-size="12" font-family="monospace" fill="#9d9dff" text-anchor="middle">10</text>
      </g>
      
      <g id="code-block-2">
        <rect x="1080" y="320" width="60" height="60" rx="4" fill="#6b5fff" opacity="0.15" stroke="#6b5fff" stroke-width="1.5"/>
        <text x="1110" y="345" font-size="12" font-family="monospace" fill="#9d9dff" text-anchor="middle">FF</text>
        <text x="1110" y="365" font-size="12" font-family="monospace" fill="#9d9dff" text-anchor="middle">AA</text>
      </g>
    </g>
    
    <!-- Warning symbols -->
    <g id="warning-icons">
      <!-- Warning triangle 1 -->
      <g id="warning-1">
        <polygon points="745,450 765,400 785,450" fill="none" stroke="#ff8c42" stroke-width="2"/>
        <line x1="755" y1="415" x2="755" y2="435" stroke="#ff8c42" stroke-width="2"/>
        <circle cx="755" cy="445" r="2" fill="#ff8c42"/>
      </g>
      
      <!-- Warning triangle 2 -->
      <g id="warning-2">
        <polygon points="1080,500 1100,450 1120,500" fill="none" stroke="#ff3d4d" stroke-width="2"/>
        <line x1="1100" y1="465" x2="1100" y2="485" stroke="#ff3d4d" stroke-width="2"/>
        <circle cx="1100" cy="495" r="2" fill="#ff3d4d"/>
      </g>
    </g>
    
    <!-- Network vulnerability nodes -->
    <g id="network-nodes" opacity="0.7">
      <!-- Node 1 -->
      <circle cx="800" cy="350" r="8" fill="#ff6b7a"/>
      <circle cx="800" cy="350" r="4" fill="#ff3d4d"/>
      
      <!-- Node 2 -->
      <circle cx="1050" cy="280" r="8" fill="#ff8c42"/>
      <circle cx="1050" cy="280" r="4" fill="#ff6b7a"/>
      
      <!-- Connecting compromised lines -->
      <path d="M 800 350 Q 880 310 1050 280" fill="none" stroke="#ff6b7a" stroke-width="2" opacity="0.5"/>
    </g>
  </g>
</svg>