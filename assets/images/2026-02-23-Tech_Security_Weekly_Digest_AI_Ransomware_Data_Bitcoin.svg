  <path d="M1003,155 Q1003,147 1010,147 Q1017,147 1017,155" fill="none" stroke="rgba(255,80,80,0.40)" stroke-width="1.5"/>
  <circle cx="1010" cy="165" r="3" fill="rgba(255,100,100,0.50)"/>

  <!-- Data breach lines -->
  <line x1="940" y1="305" x2="1010" y2="330" stroke="rgba(255,60,60,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1080" y1="305" x2="1010" y2="330" stroke="rgba(255,60,60,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="940" cy="305" r="4" fill="rgba(255,80,80,0.12)" stroke="rgba(255,80,80,0.32)" stroke-width="1"/>
  <circle cx="1080" cy="305" r="4" fill="rgba(255,80,80,0.12)" stroke="rgba(255,80,80,0.32)" stroke-width="1"/>
  <circle cx="1010" cy="330" r="5" fill="rgba(255,100,100,0.15)" stroke="rgba(255,100,100,0.38)" stroke-width="1"/>

  <!-- 4. Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,80,80,0.70)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,160,0,0.65)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(255,60,60,0.55)"/>

