<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#f6ad55;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4299e1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4299e1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="bitcoinGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6ad55;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e53e3e;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Bitcoin + Shield + AI/Ransomware composite icon -->
  <!-- Outer shield frame -->
  <path d="M1010,130 L1110,158 L1110,240 Q1110,305 1010,330 Q910,305 910,240 L910,158 Z"
        fill="rgba(229,62,62,0.07)" stroke="rgba(229,62,62,0.28)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,148 L1094,170 L1094,242 Q1094,297 1010,318 Q926,297 926,242 L926,170 Z"
        fill="rgba(229,62,62,0.04)" stroke="rgba(229,62,62,0.18)" stroke-width="1"/>

  <!-- Bitcoin symbol inside shield -->
  <circle cx="1010" cy="238" r="38" fill="rgba(246,173,85,0.1)" stroke="rgba(246,173,85,0.35)" stroke-width="1.5"/>
  <!-- Bitcoin B shape -->
  <text x="998" y="252" font-family="Georgia, serif" font-size="42" font-weight="900"
        fill="rgba(246,173,85,0.65)" filter="url(#glow)">₿</text>

  <!-- AI neural nodes around shield -->
  <circle cx="880" cy="155" r="6" fill="rgba(66,153,225,0.12)" stroke="rgba(66,153,225,0.35)" stroke-width="1"/>
  <circle cx="850" cy="200" r="4" fill="rgba(66,153,225,0.10)" stroke="rgba(66,153,225,0.30)" stroke-width="1"/>
  <circle cx="860" cy="265" r="5" fill="rgba(66,153,225,0.12)" stroke="rgba(66,153,225,0.30)" stroke-width="1"/>
  <circle cx="1140" cy="160" r="5" fill="rgba(66,153,225,0.10)" stroke="rgba(66,153,225,0.30)" stroke-width="1"/>
  <circle cx="1155" cy="215" r="7" fill="rgba(66,153,225,0.12)" stroke="rgba(66,153,225,0.35)" stroke-width="1"/>
  <circle cx="1140" cy="275" r="4" fill="rgba(66,153,225,0.10)" stroke="rgba(66,153,225,0.28)" stroke-width="1"/>

  <!-- Neural connection lines -->
  <line x1="880" y1="155" x2="910" y2="170" stroke="rgba(66,153,225,0.20)" stroke-width="1"/>
  <line x1="850" y1="200" x2="910" y2="210" stroke="rgba(66,153,225,0.18)" stroke-width="1"/>
  <line x1="860" y1="265" x2="910" y2="255" stroke="rgba(66,153,225,0.18)" stroke-width="1"/>
  <line x1="1140" y1="160" x2="1110" y2="172" stroke="rgba(66,153,225,0.20)" stroke-width="1"/>
  <line x1="1155" y1="215" x2="1110" y2="218" stroke="rgba(66,153,225,0.18)" stroke-width="1"/>
  <line x1="1140" y1="275" x2="1110" y2="258" stroke="rgba(66,153,225,0.18)" stroke-width="1"/>

  <!-- Ransomware lock icon below shield -->
  <rect x="988" y="338" width="44" height="34" rx="5"
        fill="rgba(229,62,62,0.10)" stroke="rgba(229,62,62,0.32)" stroke-width="1.5"/>
  <path d="M998,338 Q998,320 1010,320 Q1022,320 1022,338"
        fill="none" stroke="rgba(229,62,62,0.32)" stroke-width="1.5"/>
  <circle cx="1010" cy="356" r="4" fill="rgba(229,62,62,0.50)"/>

  <!-- Data stream lines (representing data breach) -->
  <line x1="885" y1="340" x2="985" y2="340" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,6"/>
  <line x1="885" y1="352" x2="985" y2="352" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="3,8"/>
  <line x1="885" y1="364" x2="985" y2="364" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Orbiting data particles around Bitcoin circle -->
  <circle cx="1010" cy="200" r="3" fill="rgba(246,173,85,0.40)" stroke="none"/>
  <circle cx="1048" cy="215" r="2.5" fill="rgba(246,173,85,0.35)" stroke="none"/>
  <circle cx="1052" cy="258" r="3" fill="rgba(246,173,85,0.35)" stroke="none"/>
  <circle cx="968" cy="214" r="2.5" fill="rgba(246,173,85,0.35)" stroke="none"/>
  <circle cx="967" cy="257" r="3" fill="rgba(246,173,85,0.38)" stroke="none"/>

  <!-- Weekly digest calendar icon (top-right corner hint) -->
  <rect x="1075" y="130" width="50" height="46" rx="4"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <rect x="1075" y="130" width="50" height="14" rx="4"
        fill="rgba(229,62,62,0.20)" stroke="none"/>
  <line x1="1092" y1="156" x2="1092" y2="170" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="1100" y1="156" x2="1100" y2="170" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="1108" y1="156" x2="1108" y2="170" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="1086" y1="163" x2="1114" y2="163" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.70)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(246,173,85,0.70)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(66,153,225,0.70)"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="230" height="32" rx="4" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.40)" stroke-width="1"/>
  <text x="96" y="81" font-family="'Courier New', monospace" font-size="13" font-weight="600"
        fill="rgba(229,62,62,0.90)" letter-spacing="1">FEBRUARY 23, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700"
        fill="white" opacity="0.97">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700"
        fill="white" opacity="0.97">AI Ransomware Data Bitcoin</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19"
        fill="rgba(255,255,255,0.55)">Weekly roundup of threats, vulnerabilities &amp; crypto security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" font-weight="600"
        fill="rgba(255,255,255,0.38)" letter-spacing="3">SECURITY / THREAT INTELLIGENCE / CRYPTOCURRENCY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.40)" stroke-width="1"/>
  <text x="135" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600"
        fill="rgba(229,62,62,0.90)" text-anchor="middle">Ransomware</text>

  <rect x="204" y="402" width="96" height="36" rx="18" fill="rgba(246,173,85,0.16)" stroke="rgba(246,173,85,0.38)" stroke-width="1"/>
  <text x="252" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600"
        fill="rgba(246,173,85,0.90)" text-anchor="middle">Bitcoin</text>

  <rect x="314" y="402" width="78" height="36" rx="18" fill="rgba(66,153,225,0.16)" stroke="rgba(66,153,225,0.38)" stroke-width="1"/>
  <text x="353" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600"
        fill="rgba(66,153,225,0.90)" text-anchor="middle">AI</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="14"
        fill="rgba(255,255,255,0.30)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600"
        fill="rgba(229,62,62,0.45)" text-anchor="end" letter-spacing="2">SECURITY</text>
</svg>