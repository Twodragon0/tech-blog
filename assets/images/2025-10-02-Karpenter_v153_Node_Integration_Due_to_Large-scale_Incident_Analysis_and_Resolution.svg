<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- LEFT SIDE -->
  <!-- Date Badge -->
  <rect x="55" y="45" width="170" height="35" rx="4" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <text x="140" y="67" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle" opacity="0.8">OCTOBER 2, 2025</text>
  
  <!-- Main Title -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Karpenter v153 Node</text>
  
  <!-- Subtitle -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Integration Due Large</text>
  
  <!-- Tag Pills -->
  <g id="tags">
    <!-- Tag 1 -->
    <rect x="80" y="425" width="90" height="28" rx="14" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1"/>
    <text x="125" y="444" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">Kubernetes</text>
    
    <!-- Tag 2 -->
    <rect x="185" y="425" width="75" height="28" rx="14" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1"/>
    <text x="222.5" y="444" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">DevOps</text>
    
    <!-- Tag 3 -->
    <rect x="275" y="425" width="85" height="28" rx="14" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1"/>
    <text x="317.5" y="444" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">Scaling</text>
  </g>
  
  <!-- Footer -->
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="13" fill="white" opacity="0.6">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE - Detailed Visual Scene -->
  <!-- Shield with Lock -->
  <g id="shield-lock" transform="translate(800, 200)">
    <!-- Shield background -->
    <path d="M 0 -60 L -50 -30 L -50 40 Q 0 80 50 40 L 50 -30 Z" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="2"/>
    
    <!-- Lock icon inside shield -->
    <rect x="-20" y="-10" width="40" height="35" rx="3" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
    <path d="M -15 -10 Q -15 -25 0 -25 Q 15 -25 15 -10" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="12" r="3" fill="#ef4444" opacity="0.7"/>
  </g>
  
  <!-- Circuit Patterns -->
  <g id="circuits" opacity="0.5">
    <!-- Horizontal circuit line 1 -->
    <line x1="700" y1="120" x2="950" y2="120" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="700" cy="120" r="4" fill="#3b82f6" opacity="0.6"/>
    <circle cx="825" cy="120" r="3" fill="#3b82f6" opacity="0.4"/>
    <circle cx="950" cy="120" r="4" fill="#3b82f6" opacity="0.6"/>
    
    <!-- Vertical circuit line -->
    <line x1="825" y1="120" x2="825" y2="280" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="825" cy="200" r="3" fill="#3b82f6" opacity="0.4"/>
    
    <!-- Horizontal circuit line 2 -->
    <line x1="700" y1="280" x2="950" y2="280" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="700" cy="280" r="4" fill="#3b82f6" opacity="0.6"/>
    <circle cx="950" cy="280" r="4" fill="#3b82f6" opacity="0.6"/>
  </g>
  
  <!-- Data Flow Arrows -->
  <defs>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.6"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444" opacity="0.6"/>
    </marker>
  </defs>
  
  <!-- Arrow 1: flowing right -->
  <line x1="680" y1="150" x2="1050" y2="150" stroke="#f59e0b" stroke-width="2" opacity="0.5" marker-end="url(#arrowhead-orange)"/>
  
  <!-- Arrow 2: flowing down-right -->
  <path d="M 900 280 Q 950 320 1020 380" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.5" marker-end="url(#arrowhead-red)"/>
  
  <!-- Arrow 3: flowing left -->
  <line x1="1050" y1="420" x2="680" y2="420" stroke="#3b82f6" stroke-width="2" opacity="0.5" marker-end="url(#arrowhead-orange)" marker-start="url(#arrowhead-red)"/>
  
  <!-- Warning Triangles / Alert Indicators -->
  <g id="warnings">
    <!-- Warning 1 - Top right -->
    <polygon points="1080,100 1100,140 1060,140" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
    <text x="1080" y="128" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle" opacity="0.7">!</text>
    
    <!-- Warning 2 - Middle right -->
    <polygon points="1100,250 1120,290 1080,290" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="1100" y="278" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0.7">!</text>
    
    <!-- Warning 3 - Bottom -->
    <polygon points="750,480 770,520 730,520" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="750" y="508" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle" opacity="0.7">⚠</text>
  </g>
  
  <!-- Node/Server Icon -->
  <g id="nodes" opacity="0.6">
    <!-- Node 1 -->
    <rect x="950" y="480" width="35" height="35" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="959" cy="490" r="2" fill="#3b82f6"/>
    <circle cx="975" cy="490" r="2" fill="#3b82f6"/>
    <circle cx="959" cy="505" r="2" fill="#3b82f6"/>
    <circle cx="975" cy="505" r="2" fill="#3b82f6"/>
    
    <!-- Node 2 -->
    <rect x="700" y="480" width="35" height="35" rx="2" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="709" cy="490" r="2" fill="#ef4444"/>
    <circle cx="725" cy="490" r="2" fill="#ef4444"/>
    <circle cx="709" cy="505" r="2" fill="#ef4444"/>
    <circle cx="725" cy="505" r="2" fill="#ef4444"/>
  </g>
  
  <!-- Accent Lines -->
  <line x1="650" y1="0" x2="650" y2="630" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
</svg>