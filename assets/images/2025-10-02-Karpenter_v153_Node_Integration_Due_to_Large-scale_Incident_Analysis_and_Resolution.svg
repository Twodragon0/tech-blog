<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Karpenter v1.5.3 Node Incident Analysis</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#152535"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#326ce5"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="450" r="200" fill="#326ce5" opacity="0.05" filter="url(#sg)"/>
  <circle cx="1050" cy="450" r="140" fill="#e74c3c" opacity="0.05" filter="url(#sg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Topic illustrations: K8s node hexagons with warning and recovery arrow -->
  <g transform="translate(930,290)" opacity="0.38">
    <!-- Warning K8s node (left) -->
    <polygon points="0,-65 56,-32 56,32 0,65 -56,32 -56,-32" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#e74c3c" text-anchor="middle" font-weight="bold">NODE</text>
    <text x="0" y="15" font-family="monospace" font-size="9" fill="#e74c3c" text-anchor="middle">v1.5.3</text>
    <!-- Warning triangle above -->
    <polygon points="0,-100 20,-72 -20,-72" fill="#e74c3c" opacity="0.75"/>
    <text x="0" y="-80" font-family="Arial,sans-serif" font-size="16" fill="#152535" text-anchor="middle" font-weight="bold">!</text>
    <!-- Recovery arrow -->
    <path d="M65,0 Q105,-25 145,0" fill="none" stroke="#326ce5" stroke-width="3.5"/>
    <polygon points="143,-7 156,0 143,7" fill="#326ce5"/>
    <!-- Healed K8s node (right) -->
    <polygon points="210,-60 262,-30 262,30 210,60 158,30 158,-30" fill="none" stroke="#326ce5" stroke-width="2.5"/>
    <text x="210" y="0" font-family="monospace" font-size="11" fill="#326ce5" text-anchor="middle" font-weight="bold">NODE</text>
    <text x="210" y="15" font-family="monospace" font-size="9" fill="#326ce5" text-anchor="middle">healed</text>
    <!-- Check mark circle -->
    <circle cx="210" cy="-80" r="16" fill="#326ce5" opacity="0.45"/>
    <path d="M202,-81 L207,-74 L220,-88" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- K8s helm wheel icon below -->
    <circle cx="105" cy="105" r="22" fill="none" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
    <circle cx="105" cy="105" r="7" fill="none" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
    <line x1="105" y1="83" x2="105" y2="98" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
    <line x1="105" y1="112" x2="105" y2="127" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
    <line x1="83" y1="105" x2="98" y2="105" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
    <line x1="112" y1="105" x2="127" y2="105" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
    <line x1="89" y1="89" x2="100" y2="99" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
    <line x1="110" y1="111" x2="121" y2="121" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
    <line x1="121" y1="89" x2="110" y2="99" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
    <line x1="100" y1="111" x2="89" y2="121" stroke="#326ce5" stroke-width="2" opacity="0.55"/>
  </g>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="40" y="38" width="240" height="34" rx="17" fill="#326ce5" opacity="0.15" stroke="#326ce5" stroke-width="1"/>
  <text x="80" y="60" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#326ce5">OCTOBER 2, 2025</text>
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#ffffff" filter="url(#glow)">Karpenter v1.5.3</text>
  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#e74c3c" filter="url(#glow)">Node Incident Analysis</text>
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="#94a3b8">Large-scale K8s node integration failure root cause &amp; resolution</text>
  <line x1="80" y1="325" x2="540" y2="325" stroke="#326ce5" stroke-width="2" opacity="0.6"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#e74c3c" letter-spacing="3">INCIDENT ANALYSIS</text>
  <rect x="80" y="398" width="110" height="32" rx="16" fill="#326ce5" opacity="0.15" stroke="#326ce5" stroke-width="1"/>
  <text x="135" y="419" font-family="Arial,sans-serif" font-size="13" fill="#7eb0f5" text-anchor="middle">Karpenter</text>
  <rect x="204" y="398" width="140" height="32" rx="16" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1"/>
  <text x="274" y="419" font-family="Arial,sans-serif" font-size="13" fill="#f08080" text-anchor="middle">Node Incident</text>
  <rect x="358" y="398" width="60" height="32" rx="16" fill="#326ce5" opacity="0.1" stroke="#326ce5" stroke-width="1"/>
  <text x="388" y="419" font-family="Arial,sans-serif" font-size="13" fill="#7eb0f5" text-anchor="middle">K8s</text>
  <rect x="0" y="520" width="1200" height="110" fill="#000000" opacity="0.25"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#326ce5" stroke-width="1" opacity="0.3"/>
  <text x="80" y="566" font-family="Arial,sans-serif" font-size="14" fill="#64748b">tech.2twodragon.com</text>
  <text x="80" y="592" font-family="Arial,sans-serif" font-size="13" fill="#475569">DevSecOps</text>
</svg>
