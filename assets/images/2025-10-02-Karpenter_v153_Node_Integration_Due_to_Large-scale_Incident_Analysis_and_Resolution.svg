<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="60%" stop-color="#0f1628"/>
      <stop offset="100%" stop-color="#141b2d"/>
    </linearGradient>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
  </g>
  <circle cx="600" cy="320" r="260" fill="#f59e0b" opacity="0.05" filter="url(#glow)"/>

  <!-- Shared header frame -->
  <rect x="0" y="0" width="1200" height="80" fill="url(#hg)" opacity="0.9"/>
  <rect x="0" y="78" width="1200" height="2" fill="#334155" opacity="0.8"/>
  <g transform="translate(48,40)">
    <path d="M0,-22 L18,-12 L18,3 C18,13 10,20 0,24 C-10,20 -18,13 -18,3 L-18,-12 Z" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.5"/>
    <path d="M-7,1 L-2,6 L8,-5" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <text x="80" y="42" font-family="Arial,sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">Postmortem</text>
  <text x="80" y="62" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">Timeline &amp; impact review</text>
  <rect x="990" y="18" width="178" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1079" y="48" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="middle">October 02, 2025</text>

  <!-- Hero strip -->
  <rect x="32" y="110" width="1136" height="60" rx="10" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="600" y="148" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#f59e0b" text-anchor="middle">K8S</text>

  <!-- ECG pulse wave -->
  <path d="M60 240 L200 240 L220 200 L240 280 L260 240 L480 240 L500 210 L520 260 L540 240 L760 240 L780 200 L800 290 L820 240 L1040 240 L1060 230 L1080 250 L1140 240"
        fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.85"/>
  <line x1="32" y1="240" x2="1168" y2="240" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.25"/>

  <!-- Timeline spine -->
  <line x1="80" y1="400" x2="1120" y2="400" stroke="#334155" stroke-width="3"/>

  <!-- Phase 1: DETECT -->
  <circle cx="140" cy="400" r="20" fill="#0a0e1a" stroke="#ef4444" stroke-width="3"/>
  <text x="140" y="404" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">01</text>
  <text x="140" y="366" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">DETECT</text>
  <text x="140" y="448" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Alert</text>
  <!-- Phase 2: CONTAIN -->
  <circle cx="460" cy="400" r="20" fill="#0a0e1a" stroke="#f59e0b" stroke-width="3"/>
  <text x="460" y="404" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">02</text>
  <text x="460" y="366" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">CONTAIN</text>
  <text x="460" y="448" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Isolate</text>
  <!-- Phase 3: ERADICATE -->
  <circle cx="780" cy="400" r="20" fill="#0a0e1a" stroke="#3b82f6" stroke-width="3"/>
  <text x="780" y="404" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#3b82f6" text-anchor="middle">03</text>
  <text x="780" y="366" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">ERADICATE</text>
  <text x="780" y="448" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Remove</text>
  <!-- Phase 4: RECOVER -->
  <circle cx="1080" cy="400" r="20" fill="#0a0e1a" stroke="#22c55e" stroke-width="3"/>
  <text x="1080" y="404" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#22c55e" text-anchor="middle">04</text>
  <text x="1080" y="366" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">RECOVER</text>
  <text x="1080" y="448" font-family="Arial,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Restore</text>
  <!-- Resolved stamp -->
  <g transform="translate(1050 120) rotate(-8)">
    <rect x="-60" y="-20" width="120" height="40" rx="4" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.55"/>
    <text x="0" y="6" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle" opacity="0.7" letter-spacing="3">RESOLVED</text>
  </g>

  <!-- Shared footer frame -->
  <rect x="0" y="540" width="1200" height="90" fill="#080c18" opacity="0.95"/>
  <rect x="0" y="540" width="1200" height="2" fill="#1e293b"/>
  <circle cx="32" cy="580" r="4" fill="#f59e0b" opacity="0.6"/>
  <text x="46" y="585" font-family="Arial,sans-serif" font-size="12" fill="#475569">Postmortem | October 02, 2025</text>
  <text x="1168" y="585" font-family="Arial,sans-serif" font-size="12" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>