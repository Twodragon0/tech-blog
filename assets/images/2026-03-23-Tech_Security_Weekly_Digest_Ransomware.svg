<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3333;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#aa0000;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#cc2200;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Ransomware Lock + Chains -->
  <!-- Outer warning ring -->
  <circle cx="1010" cy="225" r="115" fill="url(#lockGrad)" stroke="rgba(255,60,60,0.25)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="90" fill="none" stroke="rgba(255,80,30,0.2)" stroke-width="1" stroke-dasharray="8,4"/>
  <circle cx="1010" cy="225" r="68" fill="url(#shieldGrad)" stroke="rgba(255,100,50,0.3)" stroke-width="1.5"/>

  <!-- Lock body (padlock shape) -->
  <rect x="975" y="220" width="70" height="55" rx="6" fill="rgba(200,30,30,0.12)" stroke="rgba(255,80,80,0.35)" stroke-width="2"/>
  <!-- Lock shackle (arch) -->
  <path d="M988,220 L988,198 Q988,178 1010,178 Q1032,178 1032,198 L1032,220" fill="none" stroke="rgba(255,100,80,0.4)" stroke-width="3" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="1010" cy="242" r="8" fill="rgba(255,60,60,0.18)" stroke="rgba(255,100,80,0.5)" stroke-width="1.5"/>
  <rect x="1006" y="248" width="8" height="14" rx="3" fill="rgba(255,60,60,0.15)" stroke="rgba(255,100,80,0.4)" stroke-width="1.5"/>

  <!-- Chain links radiating outward -->
  <!-- Chain top-left -->
  <ellipse cx="955" cy="168" rx="12" ry="7" fill="none" stroke="rgba(255,120,50,0.3)" stroke-width="2" transform="rotate(-40,955,168)"/>
  <ellipse cx="935" cy="150" rx="12" ry="7" fill="none" stroke="rgba(255,120,50,0.25)" stroke-width="2" transform="rotate(-40,935,150)"/>
  <ellipse cx="915" cy="132" rx="12" ry="7" fill="none" stroke="rgba(255,120,50,0.18)" stroke-width="2" transform="rotate(-40,915,132)"/>

  <!-- Chain top-right -->
  <ellipse cx="1068" cy="168" rx="12" ry="7" fill="none" stroke="rgba(255,80,80,0.3)" stroke-width="2" transform="rotate(40,1068,168)"/>
  <ellipse cx="1090" cy="148" rx="12" ry="7" fill="none" stroke="rgba(255,80,80,0.25)" stroke-width="2" transform="rotate(40,1090,148)"/>
  <ellipse cx="1112" cy="130" rx="12" ry="7" fill="none" stroke="rgba(255,80,80,0.18)" stroke-width="2" transform="rotate(40,1112,130)"/>

  <!-- Chain bottom-left -->
  <ellipse cx="955" cy="285" rx="12" ry="7" fill="none" stroke="rgba(255,60,120,0.28)" stroke-width="2" transform="rotate(40,955,285)"/>
  <ellipse cx="935" cy="305" rx="12" ry="7" fill="none" stroke="rgba(255,60,120,0.2)" stroke-width="2" transform="rotate(40,935,305)"/>

  <!-- Chain bottom-right -->
  <ellipse cx="1068" cy="285" rx="12" ry="7" fill="none" stroke="rgba(200,50,80,0.28)" stroke-width="2" transform="rotate(-40,1068,285)"/>
  <ellipse cx="1090" cy="305" rx="12" ry="7" fill="none" stroke="rgba(200,50,80,0.2)" stroke-width="2" transform="rotate(-40,1090,305)"/>

  <!-- Ransom $ symbol overlay -->
  <text x="1010" y="210" font-size="28" font-weight="700" fill="rgba(255,80,80,0.22)" text-anchor="middle" font-family="monospace">$</text>

  <!-- Binary stream decorations -->
  <text x="880" y="155" font-size="9" fill="rgba(255,80,80,0.18)" font-family="monospace">10110100</text>
  <text x="1070" y="310" font-size="9" fill="rgba(255,100,60,0.15)" font-family="monospace">01101011</text>
  <text x="885" y="310" font-size="9" fill="rgba(255,80,80,0.12)" font-family="monospace">11001001</text>
  <text x="1065" y="155" font-size="9" fill="rgba(255,100,60,0.15)" font-family="monospace">00110111</text>

  <!-- Threat vectors small triangles -->
  <polygon points="925,185 935,165 945,185" fill="rgba(255,60,60,0.1)" stroke="rgba(255,80,80,0.25)" stroke-width="1"/>
  <polygon points="1075,185 1085,165 1095,185" fill="rgba(255,80,40,0.1)" stroke="rgba(255,100,50,0.25)" stroke-width="1"/>
  <polygon points="925,255 935,275 945,255" fill="rgba(255,60,60,0.08)" stroke="rgba(255,80,80,0.2)" stroke-width="1"/>
  <polygon points="1075,255 1085,275 1095,255" fill="rgba(255,80,40,0.08)" stroke="rgba(255,100,50,0.2)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,60,60,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,120,30,0.7)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,60,60,0.5)"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,40,40,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,60,60,0.05)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,60,60,0.15)" stroke="rgba(255,80,80,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-size="12" font-weight="600" fill="rgba(255,150,150,0.9)" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" letter-spacing="1">MARCH 23, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="'Segoe UI',Arial,sans-serif">Tech Security</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="'Segoe UI',Arial,sans-serif">Weekly Digest</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,150,120,0.85)" font-family="'Segoe UI',Arial,sans-serif">Ransomware Threats &amp; Incident Analysis — Security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(255,120,100,0.75)" font-family="'Segoe UI',Arial,sans-serif" letter-spacing="2" font-weight="600">RANSOMWARE · THREAT INTELLIGENCE · INCIDENT RESPONSE</text>

  <!-- Tag pills -->
  <rect x="80" y="400" width="130" height="36" rx="18" fill="rgba(200,30,30,0.25)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <text x="145" y="423" font-size="13" font-weight="600" fill="rgba(255,140,140,0.95)" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif">Ransomware</text>

  <rect x="224" y="400" width="120" height="36" rx="18" fill="rgba(200,100,0,0.25)" stroke="rgba(255,160,50,0.4)" stroke-width="1"/>
  <text x="284" y="423" font-size="13" font-weight="600" fill="rgba(255,190,100,0.95)" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif">Encryption</text>

  <rect x="358" y="400" width="110" height="36" rx="18" fill="rgba(30,60,180,0.25)" stroke="rgba(80,130,255,0.4)" stroke-width="1"/>
  <text x="413" y="423" font-size="13" font-weight="600" fill="rgba(140,180,255,0.95)" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif">Recovery</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.35)" font-family="'Segoe UI',Arial,sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,120,100,0.4)" text-anchor="end" font-family="'Segoe UI',Arial,sans-serif" letter-spacing="1">SECURITY</text>
</svg>