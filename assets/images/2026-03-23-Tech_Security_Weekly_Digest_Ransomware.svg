<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Gentlemen Ransomware and Zero Trust Strategy</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1a0510"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="250" cy="300" r="250" fill="#dc2626" opacity="0.06" filter="url(#sg)"/>
  <circle cx="950" cy="250" r="200" fill="#f59e0b" opacity="0.04" filter="url(#sg)"/>

  <!-- Ransomware Lock Visual -->
  <g transform="translate(600,230)">
    <!-- Large padlock body -->
    <rect x="-80" y="0" width="160" height="120" rx="16" fill="#0f172a" stroke="#dc2626" stroke-width="3" filter="url(#shadow)"/>
    <!-- Lock shackle -->
    <path d="M-45,0 L-45,-50 Q-45,-90 0,-90 Q45,-90 45,-50 L45,0" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="50" r="18" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="-5" y="55" width="10" height="25" rx="3" fill="#f59e0b" opacity="0.6"/>

    <!-- Encrypted file icons scattered -->
    <g transform="translate(-220,-30)" opacity="0.7">
      <rect width="50" height="60" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
      <path d="M10,0 L10,15 L50,15" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <rect x="8" y="25" width="34" height="4" rx="2" fill="#ef4444" opacity="0.4"/>
      <rect x="8" y="34" width="24" height="4" rx="2" fill="#ef4444" opacity="0.3"/>
      <rect x="8" y="43" width="30" height="4" rx="2" fill="#ef4444" opacity="0.2"/>
      <text x="25" y="56" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">.enc</text>
    </g>
    <g transform="translate(175,-50)" opacity="0.6">
      <rect width="50" height="60" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
      <path d="M10,0 L10,15 L50,15" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <rect x="8" y="25" width="34" height="4" rx="2" fill="#ef4444" opacity="0.4"/>
      <rect x="8" y="34" width="24" height="4" rx="2" fill="#ef4444" opacity="0.3"/>
      <text x="25" y="56" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">.locked</text>
    </g>
    <g transform="translate(200,50)" opacity="0.4">
      <rect width="45" height="55" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
      <rect x="8" y="15" width="30" height="4" rx="2" fill="#ef4444" opacity="0.4"/>
      <rect x="8" y="24" width="20" height="4" rx="2" fill="#ef4444" opacity="0.3"/>
      <text x="22" y="48" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">.pay</text>
    </g>
    <g transform="translate(-240,60)" opacity="0.5">
      <rect width="45" height="55" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
      <rect x="8" y="15" width="30" height="4" rx="2" fill="#ef4444" opacity="0.4"/>
      <rect x="8" y="24" width="20" height="4" rx="2" fill="#ef4444" opacity="0.3"/>
      <text x="22" y="48" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">.crypt</text>
    </g>

    <!-- Bitcoin ransom -->
    <g transform="translate(-150,80)" opacity="0.6">
      <circle r="14" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="0" y="5" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">B</text>
    </g>
  </g>

  <text x="600" y="478" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">Ransomware Surge + Zero Trust</text>
  <text x="600" y="515" font-family="Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">Security-Weekly | Ransomware | Zero-Trust | EQST</text>
  <rect x="40" y="22" width="140" height="32" rx="16" fill="#dc2626" opacity="0.25" stroke="#dc2626" stroke-width="1"/>
  <text x="110" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#f87171" text-anchor="middle">RANSOMWARE</text>
  <rect x="1020" y="22" width="140" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="1090" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">March 23, 2026</text>
  <line x1="50" y1="588" x2="1150" y2="588" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <text x="1150" y="612" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="end">tech.2twodragon.com</text>
</svg>