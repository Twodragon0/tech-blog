<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Decorative grid background -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.2"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- LEFT SIDE: TEXT CONTENT (x=0-600) -->

  <!-- Date Badge -->
  <g>
    <rect x="50" y="50" width="220" height="45" rx="22.5" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
    <text x="160" y="78" font-family="'Courier New', monospace" font-size="15" font-weight="bold" text-anchor="middle" fill="#ef4444">MARCH 23, 2026</text>
  </g>

  <!-- Main Title: Tech Security -->
  <text x="80" y="215" font-family="'Arial Black', sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="-1">Tech Security</text>

  <!-- Subtitle: Weekly Digest Ransomware -->
  <text x="80" y="285" font-family="'Arial Black', sans-serif" font-size="48" font-weight="900" fill="white" letter-spacing="-1">Weekly Digest</text>
  <text x="80" y="350" font-family="'Arial Black', sans-serif" font-size="48" font-weight="900" fill="#ef4444" letter-spacing="-1">Ransomware</text>

  <!-- Tag Pills at y=430 -->
  <g>
    <!-- Security Tag -->
    <rect x="50" y="415" width="130" height="40" rx="20" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <text x="115" y="443" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#3b82f6">Security</text>

    <!-- Malware Tag -->
    <rect x="200" y="415" width="130" height="40" rx="20" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <text x="265" y="443" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#f59e0b">Malware</text>

    <!-- Defense Tag -->
    <rect x="350" y="415" width="130" height="40" rx="20" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
    <text x="415" y="443" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#ef4444">Defense</text>
  </g>

  <!-- Footer Domain -->
  <text x="80" y="580" font-family="'Courier New', monospace" font-size="13" fill="white" opacity="0.5" font-weight="500">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: DETAILED VISUAL SCENE (x=650-1150, y=80-550) -->

  <!-- Background atmospheric circles -->
  <circle cx="900" cy="315" r="240" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.08"/>
  <circle cx="900" cy="315" r="190" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.06"/>
  <circle cx="900" cy="315" r="140" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.05"/>

  <!-- Data Flow Central Hub -->
  <circle cx="900" cy="315" r="35" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.15"/>
  <circle cx="900" cy="315" r="25" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.12"/>
  <circle cx="900" cy="315" r="12" fill="#0a0c1a" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>

  <!-- PADLOCK WITH CHAINS (Left - Threat) -->
  <g opacity="1">
    <!-- Padlock body/shackle (upper arc) -->
    <path d="M 730 200 Q 760 160 790 200" fill="none" stroke="#ef4444" stroke-width="3.5" opacity="0.18" stroke-linecap="round"/>

    <!-- Padlock body (rectangular lock) -->
    <rect x="725" y="210" width="70" height="95" rx="6" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.16"/>
    <rect x="728" y="213" width="64" height="89" rx="5" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.08"/>

    <!-- Keyhole -->
    <circle cx="760" cy="250" r="7" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.15"/>
    <rect x="755" y="260" width="10" height="15" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.12"/>

    <!-- Left Chain -->
    <path d="M 725 225 Q 690 225 670 250 Q 655 275 665 305"
          fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.14" stroke-linecap="round"/>
    <!-- Chain link pattern -->
    <circle cx="700" cy="225" r="5" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.12"/>
    <circle cx="675" cy="250" r="5" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.12"/>
    <circle cx="665" cy="285" r="5" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.12"/>

    <!-- Right Chain -->
    <path d="M 795 225 Q 830 225 850 250 Q 865 275 855 305"
          fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.14" stroke-linecap="round"/>
    <!-- Chain link pattern -->
    <circle cx="820" cy="225" r="5" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.12"/>
    <circle cx="845" cy="250" r="5" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.12"/>
    <circle cx="855" cy="285" r="5" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.12"/>

    <!-- Threat indicator glow -->
    <circle cx="760" cy="260" r="50" fill="#ef4444" opacity="0.02"/>
  </g>

  <!-- SHIELD WITH CHECKMARK (Right - Defense) -->
  <g opacity="1">
    <!-- Shield outline -->
    <path d="M 1050 170 L 1110 210 L 1110 330 Q 1080 385 1050 410 Q 1020 385 990 330 L 990 210 Z"
          fill="none" stroke="#3b82f6" stroke-width="3.5" opacity="0.18" stroke-linejoin="round"/>
    <path d="M 1050 170 L 1110 210 L 1110 330 Q 1080 385 1050 410 Q 1020 385 990 330 L 990 210 Z"
          fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.08"/>

    <!-- Shield interior crosshatch (security pattern) -->
    <path d="M 1000 240 L 1100 320" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.06"/>
    <path d="M 1100 240 L 1000 320" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.06"/>

    <!-- Large Checkmark inside shield -->
    <path d="M 1015 310 L 1045 340 L 1085 280"
          fill="none" stroke="#3b82f6" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
    <path d="M 1015 310 L 1045 340 L 1085 280"
          fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.08"/>

    <!-- Shield glow -->
    <circle cx="1050" cy="290" r="70" fill="#3b82f6" opacity="0.03"/>
  </g>

  <!-- DATA FLOW ARROWS (connecting threat to defense) -->
  <g opacity="1">
    <!-- Primary attack flow (threat → hub) -->
    <path d="M 800 260 Q 840 290 860 310"
          fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.14" marker-end="url(#arrowhead)" stroke-linecap="round"/>

    <!-- Defense response (hub → shield) -->
    <path d="M 940 310 Q 980 310 1000 315"
          fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.14" marker-end="url(#arrowhead)" stroke-linecap="round"/>

    <!-- Counter-attack (shield → threat) -->
    <path d="M 1000 350 Q 920 360 820 340"
          fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.12" stroke-linecap="round" stroke-dasharray="5,3"/>
  </g>

  <!-- WARNING TRIANGLES (Alert indicators) -->
  <g opacity="1">
    <!-- Top-left warning -->
    <polygon points="700,120 720,160 680,160" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.14"/>
    <text x="700" y="145" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#f59e0b" opacity="0.12" font-weight="bold">!</text>

    <!-- Top-right warning -->
    <polygon points="1100,140 1120,180 1080,180" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.14"/>
    <text x="1100" y="165" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#ef4444" opacity="0.12" font-weight="bold">⚠</text>

    <!-- Bottom warning -->
    <circle cx="750" cy="420" r="22" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.12"/>
    <text x="750" y="428" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#f59e0b" opacity="0.12" font-weight="bold">!</text>
  </g>

  <!-- NETWORK/DATA NODES (Additional visual detail) -->
  <g opacity="1">
    <!-- Node cluster 1 (left side data) -->
    <circle cx="680" cy="280" r="3.5" fill="#ef4444" opacity="0.12"/>
    <circle cx="695" cy="295" r="3" fill="#ef4444" opacity="0.10"/>
    <circle cx="685" cy="310" r="3.5" fill="#f59e0b" opacity="0.10"/>

    <!-- Connecting lines between nodes -->
    <path d="M 680 280 L 695 295 L 685 310" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.08"/>

    <!-- Node cluster 2 (right side data) -->
    <circle cx="1080" cy="280" r="3.5" fill="#3b82f6" opacity="0.12"/>
    <circle cx="1095" cy="295" r="3" fill="#3b82f6" opacity="0.10"/>
    <circle cx="1085" cy="310" r="3.5" fill="#3b82f6" opacity="0.10"/>

    <!-- Connecting lines -->
    <path d="M 1080 280 L 1095 295 L 1085 310" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.08"/>
  </g>

  <!-- DATA STREAMS (flowing patterns) -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.08" stroke-linecap="round">
    <path d="M 750 380 Q 820 360 880 365"/>
    <path d="M 755 395 Q 825 375 885 380"/>
  </g>

  <g stroke="#f59e0b" stroke-width="1" opacity="0.07" stroke-linecap="round">
    <path d="M 920 380 Q 980 370 1050 360"/>
    <path d="M 920 395 Q 985 385 1055 375"/>
  </g>

  <!-- Encryption/security pattern (visual texture) -->
  <g fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.05">
    <rect x="670" y="200" width="160" height="160" rx="8"/>
    <path d="M 680 230 L 820 230 M 680 260 L 820 260 M 680 290 L 820 290 M 680 320 L 820 320 M 680 350 L 820 350"/>
  </g>

  <!-- Defense pattern (right side) -->
  <g fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.05">
    <rect x="980" y="200" width="160" height="160" rx="8"/>
    <circle cx="1010" cy="250" r="8"/>
    <circle cx="1040" cy="270" r="8"/>
    <circle cx="1070" cy="290" r="8"/>
    <circle cx="1100" cy="310" r="8"/>
  </g>
</svg>