<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE: Text and badges -->

  <!-- Date badge at (80, 60) -->
  <rect x="65" y="45" width="170" height="32" rx="16" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.2"/>
  <text x="150" y="67" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444" text-anchor="middle">MARCH 23, 2026</text>

  <!-- Main title: "Tech Security" at y=185 -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white" letter-spacing="-1">Tech Security</text>

  <!-- Subtitle: "Weekly Digest Ransomware" at y=245 -->
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white" letter-spacing="-1">Weekly Digest</text>
  <text x="60" y="295" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#ef4444" letter-spacing="-1">Ransomware</text>

  <!-- Tag pills at y=430 -->
  <g id="tags">
    <!-- Tag 1: Security -->
    <rect x="60" y="415" width="95" height="26" rx="13" fill="#3b82f6" opacity="0.09" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="107" y="434" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#3b82f6" text-anchor="middle">Security</text>

    <!-- Tag 2: Ransomware -->
    <rect x="175" y="415" width="110" height="26" rx="13" fill="#f59e0b" opacity="0.09" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="230" y="434" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#f59e0b" text-anchor="middle">Ransomware</text>

    <!-- Tag 3: Threats -->
    <rect x="305" y="415" width="85" height="26" rx="13" fill="#ef4444" opacity="0.09" stroke="#ef4444" stroke-width="0.8"/>
    <text x="347" y="434" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#ef4444" text-anchor="middle">Threats</text>
  </g>

  <!-- Footer: tech.2twodragon.com at y=555 -->
  <text x="60" y="555" font-family="Arial, sans-serif" font-size="12" fill="#6b7280" font-weight="500">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: Visual scene (x=650-1150, y=80-550) -->

  <!-- Padlock with chains (ransomware indicator) -->
  <!-- Padlock body -->
  <rect x="710" y="220" width="70" height="80" rx="6" fill="#ef4444" opacity="0.10" stroke="#ef4444" stroke-width="1.8"/>
  <!-- Padlock shackle (arc) -->
  <path d="M 728 220 Q 728 170 745 160 Q 762 160 790 160 Q 818 160 835 170 Q 852 180 852 220"
        fill="none" stroke="#ef4444" stroke-width="1.8" opacity="0.35"/>
  <!-- Padlock keyhole -->
  <circle cx="745" cy="255" r="5" fill="#ef4444" opacity="0.12"/>

  <!-- Chain links around padlock -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.20" fill="none" stroke-linecap="round">
    <path d="M 680 240 Q 660 240 650 260"/>
    <path d="M 880 240 Q 900 240 910 260"/>
    <path d="M 680 290 Q 660 290 650 310"/>
    <path d="M 880 290 Q 900 290 910 310"/>
  </g>

  <!-- Shield with checkmark (security/compliance) -->
  <!-- Shield shape -->
  <path d="M 980 140 L 1030 120 L 1080 140 L 1080 210 Q 1030 255 980 275 Q 930 255 930 210 Z"
        fill="#3b82f6" opacity="0.10" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>
  <!-- Checkmark inside shield -->
  <path d="M 955 220 L 985 245 L 1035 190"
        fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.32"/>

  <!-- Warning triangles (alert indicators) -->
  <!-- Triangle 1 (top right) -->
  <polygon points="1080,110 1110,165 1050,165" fill="#f59e0b" opacity="0.09" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="1080" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f59e0b" opacity="0.35" text-anchor="middle">!</text>

  <!-- Triangle 2 (bottom left) -->
  <polygon points="720,400 750,455 690,455" fill="#f59e0b" opacity="0.09" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="720" y="440" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f59e0b" opacity="0.35" text-anchor="middle">!</text>

  <!-- Data flow arrows connecting elements -->
  <!-- Arrow 1: From padlock to shield (left to right) -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.20"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.20"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.20"/>
    </marker>
  </defs>

  <path d="M 800 260 Q 880 240 930 210"
        fill="none" stroke="#3b82f6" stroke-width="1.8" opacity="0.18" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>

  <!-- Arrow 2: From shield back to padlock (right to left) -->
  <path d="M 930 260 Q 880 290 800 310"
        fill="none" stroke="#ef4444" stroke-width="1.8" opacity="0.18" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>

  <!-- Arrow 3: Downward from center -->
  <path d="M 900 330 L 900 380"
        fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0.18" stroke-dasharray="6,4" marker-end="url(#arrowOrange)"/>

  <!-- Connection nodes/dots -->
  <circle cx="800" cy="260" r="4" fill="#3b82f6" opacity="0.15"/>
  <circle cx="950" cy="230" r="4" fill="#3b82f6" opacity="0.15"/>
  <circle cx="900" cy="330" r="4" fill="#f59e0b" opacity="0.15"/>

  <!-- Alert/threat indicator waves (ripple effect) -->
  <g opacity="0.08" stroke="#ef4444" stroke-width="0.9" fill="none">
    <circle cx="680" cy="330" r="18"/>
    <circle cx="680" cy="330" r="28"/>
    <circle cx="680" cy="330" r="38"/>
  </g>

  <!-- Encrypted/secured indicator box -->
  <rect x="1040" y="360" width="70" height="38" rx="4" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.15"/>
  <text x="1075" y="385" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3b82f6" opacity="0.25" text-anchor="middle">SECURE</text>

  <!-- Data packet indicators (small circles flowing) -->
  <g fill="#3b82f6" opacity="0.10">
    <circle cx="770" cy="280" r="3.5"/>
    <circle cx="840" cy="255" r="3"/>
    <circle cx="910" cy="280" r="3.5"/>
  </g>

  <!-- Threat indicator bars -->
  <g fill="#ef4444" opacity="0.08">
    <rect x="700" y="500" width="5" height="15"/>
    <rect x="715" y="495" width="5" height="20"/>
    <rect x="730" y="490" width="5" height="25"/>
  </g>
</svg>