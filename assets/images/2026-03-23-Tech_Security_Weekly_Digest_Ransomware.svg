<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2244"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#cc0033"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2244"/>
      <stop offset="100%" style="stop-color:#ff660000"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2244;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#330011;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Ransomware / Lock + Shield + Skull icon -->
  <!-- Outer shield shape -->
  <path d="M1010,135 L1100,160 L1100,245 Q1100,310 1010,335 Q920,310 920,245 L920,160 Z"
        fill="rgba(200,20,40,0.07)" stroke="rgba(255,60,80,0.25)" stroke-width="1.5"/>

  <!-- Inner shield -->
  <path d="M1010,158 L1082,178 L1082,247 Q1082,298 1010,315 Q938,298 938,247 L938,178 Z"
        fill="rgba(180,10,30,0.06)" stroke="rgba(255,80,100,0.18)" stroke-width="1"/>

  <!-- Lock body -->
  <rect x="985" y="230" width="50" height="42" rx="5"
        fill="rgba(255,40,60,0.12)" stroke="rgba(255,80,100,0.35)" stroke-width="1.5"/>

  <!-- Lock shackle -->
  <path d="M994,230 L994,215 Q994,200 1010,200 Q1026,200 1026,215 L1026,230"
        fill="none" stroke="rgba(255,80,100,0.35)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Keyhole circle -->
  <circle cx="1010" cy="247" r="7"
          fill="rgba(255,40,60,0.25)" stroke="rgba(255,100,120,0.5)" stroke-width="1"/>
  <!-- Keyhole shaft -->
  <rect x="1007" y="252" width="6" height="9" rx="2"
        fill="rgba(255,40,60,0.25)" stroke="rgba(255,100,120,0.4)" stroke-width="0.8"/>

  <!-- Decorative binary streams around shield -->
  <text x="870" y="155" font-family="monospace" font-size="9" fill="rgba(255,60,80,0.18)">10110101</text>
  <text x="870" y="167" font-family="monospace" font-size="9" fill="rgba(255,60,80,0.12)">01001011</text>
  <text x="870" y="179" font-family="monospace" font-size="9" fill="rgba(255,60,80,0.15)">11010010</text>
  <text x="1108" y="175" font-family="monospace" font-size="9" fill="rgba(255,60,80,0.18)">01101001</text>
  <text x="1108" y="187" font-family="monospace" font-size="9" fill="rgba(255,60,80,0.12)">10010110</text>
  <text x="1108" y="199" font-family="monospace" font-size="9" fill="rgba(255,60,80,0.15)">01110100</text>

  <!-- Warning triangle above shield -->
  <polygon points="1010,108 1035,150 985,150"
           fill="rgba(255,140,0,0.08)" stroke="rgba(255,160,0,0.28)" stroke-width="1.5"/>
  <text x="1006" y="144" font-family="sans-serif" font-size="16" fill="rgba(255,160,0,0.45)" font-weight="bold">!</text>

  <!-- Radiating threat arcs -->
  <circle cx="1010" cy="235" r="72" fill="none" stroke="rgba(255,40,60,0.07)" stroke-width="1" stroke-dasharray="4 6"/>
  <circle cx="1010" cy="235" r="90" fill="none" stroke="rgba(255,40,60,0.05)" stroke-width="1" stroke-dasharray="3 8"/>
  <circle cx="1010" cy="235" r="108" fill="none" stroke="rgba(255,80,0,0.04)" stroke-width="1" stroke-dasharray="2 10"/>

  <!-- Crossed circuit lines -->
  <line x1="890" y1="235" x2="938" y2="235" stroke="rgba(255,60,80,0.15)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1082" y1="235" x2="1130" y2="235" stroke="rgba(255,60,80,0.15)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Small hex nodes -->
  <polygon points="895,220 905,214 915,220 915,232 905,238 895,232" fill="rgba(255,40,60,0.08)" stroke="rgba(255,60,80,0.22)" stroke-width="1"/>
  <polygon points="1105,220 1115,214 1125,220 1125,232 1115,238 1105,232" fill="rgba(255,40,60,0.08)" stroke="rgba(255,60,80,0.22)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,40,60,0.55)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,120,0,0.55)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,40,60,0.4)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(180,10,30,0.03)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(200,20,40,0.04)" stroke="none"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(255,40,60,0.3)" stroke-width="1"/>
  <text x="92" y="81" font-family="'Courier New',monospace" font-size="12" font-weight="600" fill="rgba(255,120,120,0.9)" letter-spacing="1">MARCH 23, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white">Tech Security</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="rgba(255,200,200,0.95)">Weekly Digest Ransomware</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Security Intelligence — Threats, Incidents &amp; Defenses</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial',sans-serif" font-size="14" fill="rgba(255,80,100,0.8)" letter-spacing="3" font-weight="600">SECURITY / WEEKLY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(200,20,40,0.2)" stroke="rgba(255,60,80,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,120,130,0.9)" text-anchor="middle" font-weight="600">Ransomware</text>

  <rect x="224" y="402" width="120" height="36" rx="18" fill="rgba(200,100,0,0.2)" stroke="rgba(255,160,0,0.4)" stroke-width="1"/>
  <text x="284" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,190,80,0.9)" text-anchor="middle" font-weight="600">Threat Intel</text>

  <rect x="358" y="402" width="110" height="36" rx="18" fill="rgba(20,60,200,0.2)" stroke="rgba(80,120,255,0.4)" stroke-width="1"/>
  <text x="413" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(120,170,255,0.9)" text-anchor="middle" font-weight="600">Zero Trust</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,80,100,0.35)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>