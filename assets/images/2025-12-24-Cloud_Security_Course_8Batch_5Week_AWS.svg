<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left Section: Title and Metadata -->
  <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#ffffff">Cloud Security</text>
  <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#ffffff">Course 8Batch 5Week AWS</text>

  <!-- Date Badge -->
  <rect x="60" y="280" width="280" height="40" rx="6" fill="#1a1f3a" stroke="#ff9900" stroke-width="1.5"/>
  <text x="150" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#ff9900">DECEMBER 24, 2025</text>

  <!-- Tag Pills -->
  <g id="tags">
    <!-- Tag 1: AWS -->
    <rect x="60" y="420" width="90" height="32" rx="16" fill="#2d3748" stroke="#ff9900" stroke-width="1"/>
    <text x="105" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ff9900" text-anchor="middle">AWS</text>

    <!-- Tag 2: Security -->
    <rect x="165" y="420" width="110" height="32" rx="16" fill="#2d3748" stroke="#ff9900" stroke-width="1"/>
    <text x="220" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ff9900" text-anchor="middle">Security</text>

    <!-- Tag 3: Cloud -->
    <rect x="290" y="420" width="95" height="32" rx="16" fill="#2d3748" stroke="#ff9900" stroke-width="1"/>
    <text x="337" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ff9900" text-anchor="middle">Cloud</text>
  </g>

  <!-- Footer -->
  <text x="60" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#666c7a">tech.2twodragon.com</text>

  <!-- Right Section: AWS Cloud Security Illustration -->
  <!-- Background gradient effect with rectangles -->
  <rect x="700" y="80" width="450" height="470" rx="12" fill="#0f1419" stroke="#1a2332" stroke-width="2"/>

  <!-- AWS Shield Symbol (top center-right) -->
  <g id="aws-shield">
    <path d="M 925 130 L 905 150 L 905 200 Q 905 235 925 255 Q 945 235 945 200 L 945 150 Z" fill="none" stroke="#ff9900" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Shield inner details -->
    <circle cx="925" cy="180" r="8" fill="none" stroke="#ff9900" stroke-width="1.5"/>
    <line x1="925" y1="175" x2="925" y2="185" stroke="#ff9900" stroke-width="1.5"/>
  </g>

  <!-- Cloud layers (center-right) -->
  <g id="cloud-security">
    <!-- Top cloud -->
    <ellipse cx="850" cy="280" rx="55" ry="35" fill="none" stroke="#4db8ff" stroke-width="2"/>
    <!-- Middle cloud -->
    <ellipse cx="920" cy="320" rx="65" ry="40" fill="none" stroke="#00bfff" stroke-width="2"/>
    <!-- Bottom cloud -->
    <ellipse cx="880" cy="370" rx="60" ry="38" fill="none" stroke="#1e90ff" stroke-width="2"/>

    <!-- Lock icon in cloud -->
    <rect x="870" y="310" width="20" height="24" rx="2" fill="none" stroke="#ff9900" stroke-width="1.5"/>
    <path d="M 875 310 Q 875 304 880 304 Q 885 304 885 310" fill="none" stroke="#ff9900" stroke-width="1.5"/>
    <circle cx="880" cy="320" r="1.5" fill="#ff9900"/>
  </g>

  <!-- Network/Connection nodes (bottom right section) -->
  <g id="network-nodes">
    <!-- Central node -->
    <circle cx="1000" cy="450" r="12" fill="#ff9900"/>

    <!-- Connected nodes -->
    <circle cx="950" cy="410" r="8" fill="#4db8ff"/>
    <circle cx="1050" cy="410" r="8" fill="#4db8ff"/>
    <circle cx="920" cy="480" r="8" fill="#4db8ff"/>
    <circle cx="1080" cy="480" r="8" fill="#4db8ff"/>

    <!-- Connection lines -->
    <line x1="1000" y1="450" x2="950" y2="410" stroke="#4db8ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="1000" y1="450" x2="1050" y2="410" stroke="#4db8ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="1000" y1="450" x2="920" y2="480" stroke="#4db8ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="1000" y1="450" x2="1080" y2="480" stroke="#4db8ff" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- IAM/Access Control representation -->
  <g id="iam-keys">
    <!-- Key icon 1 -->
    <circle cx="760" cy="450" r="6" fill="none" stroke="#ff9900" stroke-width="1.5"/>
    <line x1="766" y1="450" x2="778" y2="450" stroke="#ff9900" stroke-width="1.5"/>
    <rect x="778" y="446" width="8" height="8" fill="none" stroke="#ff9900" stroke-width="1"/>

    <!-- Key icon 2 -->
    <circle cx="780" cy="520" r="6" fill="none" stroke="#1e90ff" stroke-width="1.5"/>
    <line x1="786" y1="520" x2="798" y2="520" stroke="#1e90ff" stroke-width="1.5"/>
    <rect x="798" y="516" width="8" height="8" fill="none" stroke="#1e90ff" stroke-width="1"/>
  </g>

  <!-- AWS service icons representation (simplified) -->
  <g id="aws-services">
    <!-- EC2 representation -->
    <rect x="1070" y="350" width="35" height="35" rx="3" fill="none" stroke="#ff9900" stroke-width="1.5"/>
    <text x="1087" y="370" font-family="monospace" font-size="10" font-weight="700" fill="#ff9900" text-anchor="middle">EC2</text>

    <!-- RDS representation -->
    <circle cx="1110" cy="385" r="12" fill="none" stroke="#4db8ff" stroke-width="1.5"/>
    <line x1="1110" y1="375" x2="1110" y2="395" stroke="#4db8ff" stroke-width="1"/>
    <line x1="1100" y1="385" x2="1120" y2="385" stroke="#4db8ff" stroke-width="1"/>
  </g>

  <!-- Accent elements -->
  <circle cx="750" cy="150" r="3" fill="#ff9900" opacity="0.6"/>
  <circle cx="1120" cy="200" r="2" fill="#4db8ff" opacity="0.6"/>
  <circle cx="820" cy="540" r="2.5" fill="#00bfff" opacity="0.5"/>

  <!-- Gradient line accent (security boundary) -->
  <line x1="700" y1="250" x2="1150" y2="250" stroke="url(#gradientAccent)" stroke-width="1" opacity="0.3"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradientAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff9900;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:0"/>
    </linearGradient>
  </defs>
</svg>