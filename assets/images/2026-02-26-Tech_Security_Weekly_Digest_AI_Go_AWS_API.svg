<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side text content -->
  <!-- Title line 1 -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff">Tech Security Weekly</text>
  <!-- Title line 2 -->
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff">Digest AWS API</text>
  
  <!-- Date badge -->
  <rect x="60" y="270" width="280" height="40" rx="20" fill="#ff9900" opacity="0.2" stroke="#ff9900" stroke-width="2"/>
  <text x="80" y="294" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff9900">FEBRUARY 26, 2026</text>
  
  <!-- Tag pills at y=420 -->
  <g>
    <!-- Tag 1: AWS -->
    <rect x="60" y="420" width="100" height="32" rx="16" fill="#232f3e" stroke="#ff9900" stroke-width="1.5"/>
    <text x="110" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff9900" text-anchor="middle">AWS</text>
    
    <!-- Tag 2: API Security -->
    <rect x="175" y="420" width="140" height="32" rx="16" fill="#232f3e" stroke="#ff9900" stroke-width="1.5"/>
    <text x="245" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff9900" text-anchor="middle">API Security</text>
    
    <!-- Tag 3: Authentication -->
    <rect x="330" y="420" width="140" height="32" rx="16" fill="#232f3e" stroke="#ff9900" stroke-width="1.5"/>
    <text x="400" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff9900" text-anchor="middle">Authentication</text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="595" font-family="Arial, sans-serif" font-size="12" fill="#666666">tech.2twodragon.com</text>
  
  <!-- Right side illustration: AWS API Security -->
  <!-- Background accent circle -->
  <circle cx="900" cy="315" r="200" fill="#ff9900" opacity="0.08"/>
  
  <!-- Central API Gateway symbol (padlock with API concept) -->
  <g>
    <!-- Main shield/padlock body -->
    <path d="M 875 200 L 875 240 Q 875 270 900 280 Q 925 270 925 240 L 925 200 Z" fill="none" stroke="#ff9900" stroke-width="2.5"/>
    <!-- Lock shackle -->
    <path d="M 885 200 Q 885 170 900 170 Q 915 170 915 200" fill="none" stroke="#ff9900" stroke-width="2.5"/>
    <!-- Keyhole -->
    <circle cx="900" cy="250" r="4" fill="#ff9900"/>
  </g>
  
  <!-- API Key layers (left side of illustration) -->
  <g>
    <!-- Key card 1 -->
    <rect x="750" y="250" width="80" height="50" rx="4" fill="#1a472a" stroke="#00d084" stroke-width="2"/>
    <text x="790" y="270" font-family="monospace" font-size="10" fill="#00d084" text-anchor="middle" font-weight="bold">API-KEY</text>
    <line x1="760" y1="280" x2="820" y2="280" stroke="#00d084" stroke-width="1" opacity="0.5"/>
    
    <!-- Key card 2 -->
    <rect x="750" y="310" width="80" height="50" rx="4" fill="#1a472a" stroke="#00d084" stroke-width="2" opacity="0.7" transform="translate(8, 0)"/>
    <text x="798" y="330" font-family="monospace" font-size="10" fill="#00d084" text-anchor="middle" font-weight="bold">SECRET</text>
    <line x1="768" y1="340" x2="828" y2="340" stroke="#00d084" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- IAM credential flow (right side of illustration) -->
  <g>
    <!-- Credential request arrow -->
    <path d="M 930 240 L 970 240" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowred)"/>
    
    <!-- Auth server/endpoint -->
    <rect x="975" y="220" width="70" height="40" rx="4" fill="#2d1b1b" stroke="#ff6b6b" stroke-width="2"/>
    <text x="1010" y="243" font-family="Arial, sans-serif" font-size="11" fill="#ff6b6b" text-anchor="middle" font-weight="bold">IAM</text>
  </g>
  
  <!-- Request signing flow (bottom section) -->
  <g>
    <!-- Signature lock icons -->
    <circle cx="820" cy="380" r="8" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <path d="M 820 376 L 820 380 L 823 380" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
    
    <circle cx="900" cy="380" r="8" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <path d="M 900 376 L 900 380 L 903 380" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
    
    <circle cx="980" cy="380" r="8" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <path d="M 980 376 L 980 380 L 983 380" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
    
    <!-- Connection lines -->
    <line x1="828" y1="380" x2="892" y2="380" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
    <line x1="908" y1="380" x2="972" y2="380" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Labels -->
    <text x="820" y="402" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Sign</text>
    <text x="900" y="402" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Verify</text>
    <text x="980" y="402" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Execute</text>
  </g>
  
  <!-- Encrypted data/response flow (top right) -->
  <g>
    <!-- Encryption indicator -->
    <path d="M 950 140 L 960 130 L 970 140 L 960 150 Z" fill="#60a5fa" opacity="0.8"/>
    <path d="M 970 140 L 980 130 L 990 140 L 980 150 Z" fill="#60a5fa" opacity="0.6"/>
    <path d="M 990 140 L 1000 130 L 1010 140 L 1000 150 Z" fill="#60a5fa" opacity="0.4"/>
    
    <!-- Encrypted label -->
    <text x="960" y="165" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa" text-anchor="middle" font-weight="bold">ENCRYPTED</text>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff6b6b"/>
    </marker>
  </defs>
</svg>