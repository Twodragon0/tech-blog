<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Defs for arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" opacity="0.35"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.35"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444" opacity="0.35"/>
    </marker>
  </defs>
  
  <!-- LEFT SIDE TEXT -->
  <!-- Date badge -->
  <rect x="50" y="50" width="210" height="36" rx="5" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.8"/>
  <text x="155" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="1" fill="#ef4444">FEBRUARY 26, 2026</text>
  
  <!-- Main title -->
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="white" line-height="1.1">Tech Security Weekly</text>
  
  <!-- Subtitle -->
  <text x="80" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="white">Digest AWS API</text>
  
  <!-- Tag pills -->
  <rect x="80" y="420" width="85" height="32" rx="16" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="122" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#3b82f6">Security</text>
  
  <rect x="185" y="420" width="85" height="32" rx="16" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="227" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#f59e0b">Cloud</text>
  
  <rect x="290" y="420" width="85" height="32" rx="16" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.8"/>
  <text x="332" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#ef4444">API</text>
  
  <!-- Footer -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE VISUAL SCENE (x=650-1150, y=80-550) -->
  
  <!-- Cloud infrastructure shape with gradient overlay -->
  <g opacity="0.85">
    <path d="M 850 140 Q 820 125 790 135 Q 770 115 750 130 Q 730 125 720 145 Q 700 140 700 165 Q 700 195 730 210 L 870 210 Q 900 200 900 165 Q 900 140 880 135 Q 860 120 850 140" 
          fill="#3b82f6" opacity="0.09" stroke="#3b82f6" stroke-width="0.3"/>
  </g>
  
  <!-- Data packets flowing down from cloud -->
  <circle cx="775" cy="240" r="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.2"/>
  <circle cx="810" cy="260" r="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.2"/>
  
  <!-- Vertical flow arrows -->
  <line x1="775" y1="210" x2="775" y2="290" stroke="#3b82f6" stroke-width="0.35" opacity="0.22" marker-end="url(#arrowBlue)"/>
  
  <!-- Security shield -->
  <g>
    <path d="M 775 290 L 750 310 L 750 355 Q 750 385 775 405 Q 800 385 800 355 L 800 310 Z" 
          fill="#ef4444" opacity="0.11" stroke="#ef4444" stroke-width="0.3"/>
    <!-- Checkmark inside shield -->
    <path d="M 763 355 L 772 365 L 785 345" 
          fill="none" stroke="#ef4444" stroke-width="0.6" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Alert/Warning indicators -->
  <g>
    <!-- Warning triangle 1 (top right) -->
    <polygon points="1050,130 1075,190 1025,190" 
             fill="#f59e0b" opacity="0.11" stroke="#f59e0b" stroke-width="0.28"/>
    <text x="1050" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#f59e0b" opacity="0.35">!</text>
    
    <!-- Warning triangle 2 (middle right) -->
    <polygon points="1000,250 1025,310 975,310" 
             fill="#ef4444" opacity="0.11" stroke="#ef4444" stroke-width="0.28"/>
    <text x="1000" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ef4444" opacity="0.35">!</text>
  </g>
  
  <!-- Data flow arrows connecting elements -->
  <!-- Arrow to warning 1 -->
  <line x1="880" y1="170" x2="1000" y2="160" stroke="#f59e0b" stroke-width="0.32" opacity="0.20" marker-end="url(#arrowOrange)"/>
  
  <!-- Arrow to warning 2 -->
  <line x1="800" y1="310" x2="930" y2="290" stroke="#ef4444" stroke-width="0.32" opacity="0.20" marker-end="url(#arrowRed)"/>
  
  <!-- Central processing node -->
  <circle cx="920" cy="340" r="35" fill="#3b82f6" opacity="0.07" stroke="#3b82f6" stroke-width="0.28"/>
  <circle cx="920" cy="340" r="22" fill="none" stroke="#3b82f6" opacity="0.14" stroke-width="0.25" stroke-dasharray="2,2"/>
  
  <!-- Data packets flowing right -->
  <rect x="850" y="325" width="12" height="12" rx="1.5" fill="#3b82f6" opacity="0.16" stroke="#3b82f6" stroke-width="0.2"/>
  <rect x="920" y="310" width="10" height="10" rx="1.2" fill="#f59e0b" opacity="0.14" stroke="#f59e0b" stroke-width="0.2"/>
  <rect x="960" y="355" width="10" height="10" rx="1.2" fill="#ef4444" opacity="0.14" stroke="#ef4444" stroke-width="0.2"/>
  
  <!-- Connecting flow lines -->
  <line x1="800" y1="340" x2="885" y2="340" stroke="#3b82f6" stroke-width="0.3" opacity="0.16"/>
  <line x1="955" y1="330" x2="1000" y2="280" stroke="#f59e0b" stroke-width="0.3" opacity="0.16"/>
  <line x1="955" y1="350" x2="980" y2="310" stroke="#ef4444" stroke-width="0.3" opacity="0.16"/>
  
  <!-- Additional security indicators -->
  <g opacity="0.8">
    <circle cx="700" cy="480" r="25" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="0.25"/>
    <path d="M 690 480 L 700 490 L 715 475" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.25" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <g opacity="0.8">
    <circle cx="1100" cy="450" r="25" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="0.25"/>
    <text x="1100" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ef4444" opacity="0.25">!</text>
  </g>
</svg>