<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#00aaff"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3333;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI + Go + AWS + Security shield concept -->
  <!-- Outer shield shape -->
  <path d="M1010,140 L1100,165 L1100,230 Q1100,295 1010,320 Q920,295 920,230 L920,165 Z"
        fill="rgba(255,68,68,0.07)" stroke="rgba(255,68,68,0.25)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,158 L1085,178 L1085,232 Q1085,286 1010,306 Q935,286 935,232 L935,178 Z"
        fill="rgba(255,100,50,0.06)" stroke="rgba(255,120,60,0.2)" stroke-width="1"/>

  <!-- Go Gopher-inspired circular element -->
  <circle cx="1010" cy="228" r="42" fill="rgba(0,172,193,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <circle cx="1010" cy="228" r="28" fill="rgba(0,172,193,0.06)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <!-- Go "G" letter hint - two arcs -->
  <path d="M1025,218 A20,20 0 1 0 1025,238 L1015,238 L1015,228" fill="none" stroke="rgba(0,212,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- AWS cloud shape -->
  <path d="M950,155 Q958,142 970,145 Q974,136 985,137 Q998,134 1002,145 Q1015,143 1018,152 Q1022,160 1014,165 L952,165 Q944,163 950,155 Z"
        fill="rgba(255,153,0,0.09)" stroke="rgba(255,180,0,0.28)" stroke-width="1.2"/>
  <path d="M1000,145 L994,168 M994,168 L988,155 M988,155 L982,168 M982,168 L976,145"
        stroke="rgba(255,153,0,0.35)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- AI neural network nodes -->
  <circle cx="1060" cy="155" r="7" fill="rgba(180,100,255,0.1)" stroke="rgba(180,100,255,0.35)" stroke-width="1.2"/>
  <circle cx="1085" cy="175" r="5" fill="rgba(180,100,255,0.08)" stroke="rgba(180,100,255,0.3)" stroke-width="1"/>
  <circle cx="1075" cy="200" r="6" fill="rgba(180,100,255,0.1)" stroke="rgba(180,100,255,0.3)" stroke-width="1"/>
  <circle cx="1090" cy="220" r="4" fill="rgba(180,100,255,0.08)" stroke="rgba(180,100,255,0.25)" stroke-width="1"/>
  <line x1="1060" y1="155" x2="1085" y2="175" stroke="rgba(180,100,255,0.2)" stroke-width="1"/>
  <line x1="1085" y1="175" x2="1075" y2="200" stroke="rgba(180,100,255,0.2)" stroke-width="1"/>
  <line x1="1075" y1="200" x2="1090" y2="220" stroke="rgba(180,100,255,0.18)" stroke-width="1"/>
  <line x1="1060" y1="155" x2="1075" y2="200" stroke="rgba(180,100,255,0.15)" stroke-width="0.8"/>

  <!-- API endpoint symbol: brackets + slash -->
  <text x="952" y="310" font-size="22" font-weight="700" fill="rgba(80,200,120,0.45)" font-family="monospace">&lt;/API&gt;</text>

  <!-- Circuit trace lines -->
  <polyline points="920,195 910,195 910,250 920,250" fill="none" stroke="rgba(255,68,68,0.15)" stroke-width="1"/>
  <circle cx="910" cy="222" r="3" fill="none" stroke="rgba(255,68,68,0.25)" stroke-width="1"/>
  <polyline points="1100,195 1112,195 1112,250 1100,250" fill="none" stroke="rgba(0,170,255,0.15)" stroke-width="1"/>
  <circle cx="1112" cy="222" r="3" fill="none" stroke="rgba(0,170,255,0.25)" stroke-width="1"/>

  <!-- Lock icon on shield center top -->
  <rect x="1001" y="204" width="18" height="14" rx="2" fill="rgba(255,220,80,0.12)" stroke="rgba(255,220,80,0.35)" stroke-width="1.2"/>
  <path d="M1005,204 Q1005,197 1010,197 Q1015,197 1015,204" fill="none" stroke="rgba(255,220,80,0.35)" stroke-width="1.2"/>
  <circle cx="1010" cy="212" r="2.5" fill="rgba(255,220,80,0.45)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,60,60,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,140,0,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(80,160,255,0.7)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(255,80,80,0.25)" stroke-width="1"/>
  <text x="95" y="81" font-size="12" font-weight="600" fill="rgba(255,150,100,0.9)" font-family="Arial,sans-serif" letter-spacing="1.5">FEBRUARY 26, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="Arial,sans-serif">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="rgba(255,200,100,0.95)" font-family="Arial,sans-serif">AI Go AWS API</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(200,200,220,0.7)" font-family="Arial,sans-serif">Weekly security roundup: AI threats, Go ecosystem, AWS vulnerabilities</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(255,100,100,0.75)" font-family="Arial,sans-serif" letter-spacing="2.5" font-weight="600">SECURITY / DEVSECOPS / CLOUD</text>

  <!-- Tag pills -->
  <rect x="80" y="400" width="110" height="36" rx="18" fill="rgba(220,50,50,0.18)" stroke="rgba(220,80,80,0.4)" stroke-width="1"/>
  <text x="135" y="423" font-size="13" font-weight="600" fill="rgba(255,120,120,0.9)" font-family="Arial,sans-serif" text-anchor="middle">AI Security</text>

  <rect x="205" y="400" width="100" height="36" rx="18" fill="rgba(200,130,0,0.18)" stroke="rgba(240,160,0,0.4)" stroke-width="1"/>
  <text x="255" y="423" font-size="13" font-weight="600" fill="rgba(255,190,80,0.9)" font-family="Arial,sans-serif" text-anchor="middle">Go / AWS</text>

  <rect x="320" y="400" width="110" height="36" rx="18" fill="rgba(20,100,220,0.18)" stroke="rgba(60,140,255,0.4)" stroke-width="1"/>
  <text x="375" y="423" font-size="13" font-weight="600" fill="rgba(100,180,255,0.9)" font-family="Arial,sans-serif" text-anchor="middle">API Defense</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="14" fill="rgba(180,180,200,0.45)" font-family="Arial,sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="14" fill="rgba(180,180,200,0.45)" font-family="Arial,sans-serif" text-anchor="end">SECURITY</text>
</svg>