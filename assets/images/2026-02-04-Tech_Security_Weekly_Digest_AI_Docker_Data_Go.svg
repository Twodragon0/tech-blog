  <circle cx="993" cy="197" r="7" fill="rgba(0,180,150,0.08)" stroke="rgba(0,200,170,0.30)" stroke-width="1"/>
  <circle cx="1027" cy="197" r="7" fill="rgba(0,180,150,0.08)" stroke="rgba(0,200,170,0.30)" stroke-width="1"/>
  <circle cx="993" cy="197" r="3" fill="rgba(0,200,170,0.15)"/>
  <circle cx="1027" cy="197" r="3" fill="rgba(0,200,170,0.15)"/>
