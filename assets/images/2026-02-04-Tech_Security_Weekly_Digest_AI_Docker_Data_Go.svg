<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest - AI vs Claude Code Comparison, Security and DevSecOps</title>
  <defs>
    <filter id="orbGlow"><feGaussianBlur stdDeviation="40" /></filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Orb glows -->
  <circle cx="780" cy="130" r="185" fill="#3b82f6" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1060" cy="440" r="150" fill="#22c55e" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="190" cy="500" r="120" fill="#06b6d4" opacity="0.05" filter="url(#orbGlow)" />

  <!-- Card 1: Security shield with check -->
  <g transform="translate(830, 60)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(100, 18)">
      <path d="M55 8 L90 24 L90 56 C90 78 73 91 55 100 C37 91 20 78 20 56 L20 24 Z" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="2" stroke-opacity="0.8" />
      <path d="M38 54 L50 66 L74 40" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
      <rect x="20" y="104" width="70" height="16" rx="4" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4" />
      <text x="55" y="116" text-anchor="middle" fill="#4ade80" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">SECURITY</text>
    </g>
    <circle cx="125" cy="200" r="3" fill="#22c55e" opacity="0.8" />
    <circle cx="140" cy="200" r="3" fill="#06b6d4" opacity="0.6" />
    <circle cx="155" cy="200" r="3" fill="#22c55e" opacity="0.4" />
  </g>

  <!-- Card 2: Robot/AI icon -->
  <g transform="translate(720, 190)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(100, 18)">
      <rect x="20" y="20" width="70" height="56" rx="8" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.8" />
      <circle cx="36" cy="36" r="7" fill="#06b6d4" opacity="0.7" />
      <circle cx="74" cy="36" r="7" fill="#06b6d4" opacity="0.7" />
      <rect x="32" y="52" width="46" height="8" rx="4" fill="#06b6d4" opacity="0.4" />
      <line x1="55" y1="20" x2="55" y2="10" stroke="#06b6d4" stroke-width="2" opacity="0.7" />
      <circle cx="55" cy="7" r="3.5" fill="#06b6d4" opacity="0.8" />
      <path d="M14 30 C8 37 8 51 14 58" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5" stroke-linecap="round" />
      <path d="M96 30 C102 37 102 51 96 58" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5" stroke-linecap="round" />
      <rect x="14" y="80" width="82" height="16" rx="4" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4" />
      <text x="55" y="92" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">AI TOOLS</text>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b" />
    <rect x="40" y="192" width="160" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3: Two overlapping rectangles (comparison) -->
  <g transform="translate(660, 340)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(110, 14)">
      <rect x="8" y="12" width="62" height="82" rx="6" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.8" />
      <rect x="30" y="24" width="62" height="82" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="2" stroke-opacity="0.8" />
      <circle cx="50" cy="64" r="13" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" opacity="0.95" />
      <text x="50" y="68" text-anchor="middle" fill="#60a5fa" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="800">VS</text>
      <rect x="10" y="100" width="80" height="16" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4" />
      <text x="50" y="112" text-anchor="middle" fill="#93c5fd" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">COMPARE</text>
    </g>
    <g transform="translate(40, 196)">
      <rect width="240" height="28" rx="6" fill="#1e293b" opacity="0.8" />
      <circle cx="18" cy="14" r="5" fill="#3b82f6" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="730" cy="275" r="2" fill="#3b82f6" opacity="0.5">
    <animate attributeName="cy" values="275;265;275" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="845" cy="330" r="1.5" fill="#22c55e" opacity="0.4">
    <animate attributeName="cy" values="330;320;330" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1065" cy="298" r="2" fill="#06b6d4" opacity="0.5">
    <animate attributeName="cy" values="298;288;298" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="695" cy="208" r="1.5" fill="#3b82f6" opacity="0.3">
    <animate attributeName="cy" values="208;200;208" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1115" cy="172" r="1" fill="#22c55e" opacity="0.4">
    <animate attributeName="cy" values="172;164;172" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- WEEKLY DIGEST badge -->
  <g transform="translate(60, 80)">
    <rect width="160" height="32" rx="16" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4" />
    <text x="80" y="21" text-anchor="middle" fill="#60a5fa" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">WEEKLY DIGEST</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Tech Security</text>
  <text x="60" y="225" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Weekly</text>
  <text x="60" y="290" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">AI Code Tools</text>
  <text x="60" y="335" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">Security Comparison</text>

  <!-- Accent line -->
  <rect x="60" y="360" width="200" height="3" rx="1.5" fill="url(#accentLine)" />

  <!-- Tag pills -->
  <g transform="translate(60, 385)">
    <rect width="34" height="30" rx="15" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.35" />
    <text x="17" y="20" text-anchor="middle" fill="#60a5fa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AI</text>
    <g transform="translate(44, 0)">
      <rect width="66" height="30" rx="15" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="33" y="20" text-anchor="middle" fill="#22d3ee" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Claude</text>
    </g>
    <g transform="translate(120, 0)">
      <rect width="90" height="30" rx="15" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="45" y="20" text-anchor="middle" fill="#4ade80" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">DevSecOps</text>
    </g>
    <g transform="translate(220, 0)">
      <rect width="62" height="30" rx="15" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="31" y="20" text-anchor="middle" fill="#fde68a" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">FinOps</text>
    </g>
  </g>

  <!-- Date -->
  <text x="60" y="460" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">FEBRUARY 04, 2026</text>

  <!-- Footer URL -->
  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8" />
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
</svg>
