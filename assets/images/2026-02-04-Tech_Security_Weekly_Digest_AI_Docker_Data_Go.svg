  <rect x="992" y="295" width="36" height="28" rx="5" fill="rgba(255,200,0,0.07)" stroke="rgba(255,200,0,0.28)" stroke-width="1.2"/>
  <path d="M998,295 Q998,278 1010,278 Q1022,278 1022,295" fill="none" stroke="rgba(255,200,0,0.30)" stroke-width="1.5"/>
  <circle cx="1010" cy="310" r="4" fill="rgba(255,200,0,0.15)" stroke="rgba(255,220,0,0.4)" stroke-width="1"/>
  <rect x="1009" y="310" width="2" height="7" rx="1" fill="rgba(255,200,0,0.25)"/>

