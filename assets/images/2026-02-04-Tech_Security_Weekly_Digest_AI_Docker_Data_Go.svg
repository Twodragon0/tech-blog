  <line x1="1010" y1="178" x2="1003" y2="188" stroke="rgba(0,200,170,0.25)" stroke-width="1.2"/>
  <line x1="1010" y1="178" x2="1017" y2="188" stroke="rgba(0,200,170,0.25)" stroke-width="1.2"/>
  <circle cx="1010" cy="178" r="3" fill="rgba(0,200,170,0.20)" stroke="rgba(0,220,180,0.4)" stroke-width="1"/>

