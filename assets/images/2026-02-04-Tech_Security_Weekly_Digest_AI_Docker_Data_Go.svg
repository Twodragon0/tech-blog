  <circle cx="890" cy="185" r="10" fill="rgba(180,80,255,0.08)" stroke="rgba(180,80,255,0.35)" stroke-width="1.2"/>
  <circle cx="1130" cy="195" r="10" fill="rgba(180,80,255,0.08)" stroke="rgba(180,80,255,0.35)" stroke-width="1.2"/>
  <circle cx="875" cy="280" r="8" fill="rgba(180,80,255,0.06)" stroke="rgba(180,80,255,0.28)" stroke-width="1"/>
  <circle cx="1145" cy="270" r="8" fill="rgba(180,80,255,0.06)" stroke="rgba(180,80,255,0.28)" stroke-width="1"/>
  <!-- Neural connections -->
  <line x1="890" y1="185" x2="920" y2="200" stroke="rgba(180,80,255,0.2)" stroke-width="1"/>
  <line x1="1130" y1="195" x2="1100" y2="205" stroke="rgba(180,80,255,0.2)" stroke-width="1"/>
  <line x1="875" y1="280" x2="920" y2="265" stroke="rgba(180,80,255,0.18)" stroke-width="1"/>
  <line x1="1145" y1="270" x2="1100" y2="262" stroke="rgba(180,80,255,0.18)" stroke-width="1"/>
  <circle cx="1010" cy="178" r="6" fill="rgba(180,80,255,0.10)" stroke="rgba(200,100,255,0.4)" stroke-width="1"/>
