  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(255,60,60,0.25)" stroke-width="1"/>
  <text x="92" y="81" font-family="'Courier New',monospace" font-size="12" font-weight="600" fill="rgba(255,150,150,0.90)" letter-spacing="1.5">FEBRUARY 4, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white">AI Docker Data Go</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(220,180,180,0.80)">Security · AI · Container · Data Engineering</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial',sans-serif" font-size="14" font-weight="600" fill="rgba(255,80,80,0.75)" letter-spacing="2.5">SECURITY</text>

  <!-- Tag pills -->
  <rect x="80" y="400" width="120" height="36" rx="18" fill="rgba(255,50,50,0.15)" stroke="rgba(255,80,80,0.40)" stroke-width="1"/>
  <text x="140" y="423" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,130,130,0.95)" text-anchor="middle">#Docker</text>

  <rect x="214" y="400" width="110" height="36" rx="18" fill="rgba(255,160,0,0.12)" stroke="rgba(255,180,0,0.38)" stroke-width="1"/>
  <text x="269" y="423" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,200,80,0.95)" text-anchor="middle">#GoLang</text>

  <rect x="338" y="400" width="100" height="36" rx="18" fill="rgba(40,120,255,0.12)" stroke="rgba(80,150,255,0.38)" stroke-width="1"/>
  <text x="388" y="423" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(120,180,255,0.95)" text-anchor="middle">#AI/ML</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,80,80,0.50)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>