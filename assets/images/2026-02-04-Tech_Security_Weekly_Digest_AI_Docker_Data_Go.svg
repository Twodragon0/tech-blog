  <circle cx="1075" cy="145" r="2" fill="rgba(100,180,255,0.35)"/>
  <circle cx="1115" cy="240" r="3" fill="rgba(0,200,170,0.30)"/>
  <circle cx="950" cy="325" r="2" fill="rgba(255,200,0,0.30)"/>
  <circle cx="1070" cy="335" r="3" fill="rgba(180,80,255,0.30)"/>

