  <!-- Docker whale body inside shield -->
  <rect x="974" y="225" width="72" height="44" rx="8"
        fill="rgba(0,150,255,0.10)" stroke="rgba(0,180,255,0.35)" stroke-width="1.2"/>
  <!-- Docker container boxes -->
  <rect x="980" y="232" width="16" height="12" rx="2" fill="rgba(0,180,255,0.12)" stroke="rgba(0,200,255,0.4)" stroke-width="1"/>
  <rect x="1000" y="232" width="16" height="12" rx="2" fill="rgba(0,180,255,0.12)" stroke="rgba(0,200,255,0.4)" stroke-width="1"/>
  <rect x="1020" y="232" width="16" height="12" rx="2" fill="rgba(0,200,120,0.12)" stroke="rgba(0,220,140,0.4)" stroke-width="1"/>
  <rect x="980" y="248" width="16" height="12" rx="2" fill="rgba(0,200,120,0.12)" stroke="rgba(0,220,140,0.4)" stroke-width="1"/>
