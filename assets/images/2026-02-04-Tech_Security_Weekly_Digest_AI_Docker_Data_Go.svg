  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.65)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,140,0,0.65)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(80,160,255,0.65)"/>

