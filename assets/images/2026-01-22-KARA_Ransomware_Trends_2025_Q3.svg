<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>KARA Ransomware Trends 2025 Q3</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="redOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc2244;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa0033;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3388ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- LEFT SIDE: Text Content -->
  <!-- Title Line 1 -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    KARA Ransomware
  </text>

  <!-- Title Line 2 -->
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Trends Report 2025
  </text>

  <!-- Date Badge -->
  <rect x="60" y="270" width="280" height="40" rx="8" fill="#ff4444" opacity="0.2" stroke="#ff4444" stroke-width="2"/>
  <text x="75" y="298" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff8800">
    JANUARY 22, 2026
  </text>

  <!-- Tags -->
  <!-- Tag 1 -->
  <rect x="60" y="420" width="110" height="32" rx="16" fill="#ff4444" opacity="0.15" stroke="#ff4444" stroke-width="1.5"/>
  <text x="75" y="443" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff8800">
    Ransomware
  </text>

  <!-- Tag 2 -->
  <rect x="180" y="420" width="90" height="32" rx="16" fill="#3388ff" opacity="0.15" stroke="#3388ff" stroke-width="1.5"/>
  <text x="195" y="443" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00ccff">
    Security
  </text>

  <!-- Tag 3 -->
  <rect x="280" y="420" width="80" height="32" rx="16" fill="#cc2244" opacity="0.15" stroke="#cc2244" stroke-width="1.5"/>
  <text x="295" y="443" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff6688">
    Threats
  </text>

  <!-- Footer -->
  <text x="60" y="600" font-family="Arial, sans-serif" font-size="12" fill="#666666">
    tech.2twodragon.com
  </text>

  <!-- RIGHT SIDE: Illustration for KARA Ransomware -->
  <!-- Background accent circle for illustration area -->
  <circle cx="900" cy="300" r="220" fill="#ff4444" opacity="0.05"/>

  <!-- Central Shield with lock -->
  <g transform="translate(900, 280)">
    <!-- Shield outline -->
    <path d="M -80 -90 L -80 -20 Q -80 40 0 80 Q 80 40 80 -20 L 80 -90 Z" fill="none" stroke="#ff4444" stroke-width="3" opacity="0.8"/>

    <!-- Shield fill (darker) -->
    <path d="M -75 -85 L -75 -20 Q -75 35 0 75 Q 75 35 75 -20 L 75 -85 Z" fill="#ff4444" opacity="0.1"/>

    <!-- Lock icon inside shield -->
    <g transform="translate(0, 0)">
      <!-- Lock body -->
      <rect x="-28" y="-5" width="56" height="45" rx="6" fill="none" stroke="#ff8800" stroke-width="2.5"/>

      <!-- Lock shackle (curved top) -->
      <path d="M -18 -5 Q -18 -35 0 -40 Q 18 -35 18 -5" fill="none" stroke="#ff8800" stroke-width="2.5" stroke-linecap="round"/>

      <!-- Lock keyhole circle -->
      <circle cx="0" cy="12" r="6" fill="none" stroke="#ff8800" stroke-width="2"/>
    </g>
  </g>

  <!-- Threat indicator - upward trend lines (showing growth) -->
  <g transform="translate(750, 380)">
    <!-- Line 1 -->
    <line x1="0" y1="40" x2="20" y2="20" stroke="#ff4444" stroke-width="2.5" opacity="0.8"/>
    <!-- Line 2 -->
    <line x1="25" y1="35" x2="45" y2="10" stroke="#ff8800" stroke-width="2.5" opacity="0.8"/>
    <!-- Line 3 -->
    <line x1="50" y1="30" x2="70" y2="0" stroke="#ff6688" stroke-width="2.5" opacity="0.8"/>

    <!-- Arrow at top -->
    <polygon points="70,0 65,-8 75,-5" fill="#ff4444" opacity="0.9"/>
  </g>

  <!-- Data corruption symbols (broken/fragmented) -->
  <g transform="translate(1050, 200)">
    <!-- Fragment 1 -->
    <rect x="0" y="0" width="25" height="25" fill="#ff4444" opacity="0.4" transform="rotate(-15)"/>
    <!-- Fragment 2 -->
    <rect x="30" y="10" width="20" height="20" fill="#ff8800" opacity="0.5" transform="rotate(25)"/>
    <!-- Fragment 3 -->
    <rect x="15" y="40" width="22" height="22" fill="#ff6688" opacity="0.4" transform="rotate(45)"/>
  </g>

  <!-- Network/connection nodes showing attack vectors -->
  <g stroke="#3388ff" stroke-width="1.5" opacity="0.6">
    <!-- Node connections -->
    <circle cx="750" cy="150" r="8" fill="none"/>
    <circle cx="850" cy="140" r="8" fill="none"/>
    <circle cx="950" cy="160" r="8" fill="none"/>

    <!-- Connection lines -->
    <line x1="750" y1="150" x2="850" y2="140"/>
    <line x1="850" y1="140" x2="950" y2="160"/>
    <line x1="750" y1="150" x2="950" y2="160"/>
  </g>

  <!-- Encrypted data symbol (chain links) -->
  <g transform="translate(800, 480)">
    <!-- Link 1 -->
    <rect x="0" y="0" width="18" height="12" rx="6" fill="none" stroke="#cc2244" stroke-width="2" opacity="0.7"/>
    <!-- Link 2 -->
    <rect x="14" y="0" width="18" height="12" rx="6" fill="none" stroke="#cc2244" stroke-width="2" opacity="0.7"/>
    <!-- Link 3 -->
    <rect x="28" y="0" width="18" height="12" rx="6" fill="none" stroke="#cc2244" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Warning pulse (concentric circles) -->
  <g transform="translate(1000, 450)" opacity="0.7">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ff4444" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="8" fill="#ff4444" opacity="0.6"/>
  </g>

  <!-- Binary code scattered (showing data breach) -->
  <g font-family="monospace" font-size="10" fill="#ff8800" opacity="0.5">
    <text x="780" y="520">1011010</text>
    <text x="920" y="535">0110110</text>
    <text x="1020" y="500">1101001</text>
  </g>

  <!-- Glow effect for shield -->
  <circle cx="900" cy="280" r="95" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.3" filter="blur(3)"/>
</svg>