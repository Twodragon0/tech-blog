<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>Tech Security Weekly Digest Security CVE</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient overlay for depth -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="vulnerabilityGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a52;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- LEFT SIDE: TEXT CONTENT -->

  <!-- Title line 1 -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff" letter-spacing="-1">
    Tech Security Weekly Digest
  </text>

  <!-- Title line 2 -->
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ff6b6b" letter-spacing="-1">
    Security CVE
  </text>

  <!-- Date badge -->
  <g>
    <rect x="50" y="285" width="220" height="40" rx="6" fill="#ff6b6b" opacity="0.2" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="60" y="311" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ff6b6b">
      MARCH 21, 2026
    </text>
  </g>

  <!-- Tag pills -->
  <g>
    <!-- Tag 1: vulnerability -->
    <rect x="50" y="420" width="140" height="32" rx="16" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="1"/>
    <text x="70" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#ff6b6b">
      Vulnerability
    </text>

    <!-- Tag 2: CVE -->
    <rect x="210" y="420" width="100" height="32" rx="16" fill="#ffa500" opacity="0.15" stroke="#ffa500" stroke-width="1"/>
    <text x="230" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#ffa500">
      CVE
    </text>

    <!-- Tag 3: security -->
    <rect x="330" y="420" width="120" height="32" rx="16" fill="#4ecca3" opacity="0.15" stroke="#4ecca3" stroke-width="1"/>
    <text x="350" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#4ecca3">
      Security
    </text>
  </g>

  <!-- Footer -->
  <text x="50" y="590" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#888888">
    tech.2twodragon.com
  </text>

  <!-- RIGHT SIDE: ILLUSTRATION -->

  <!-- Vulnerability detection background -->
  <circle cx="950" cy="315" r="180" fill="url(#vulnerabilityGlow)"/>

  <!-- Main shield with vulnerability markers -->
  <g>
    <!-- Shield outline -->
    <path d="M 950 180 L 1050 220 L 1050 380 Q 950 450 950 450 Q 850 380 850 220 Z"
          fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>

    <!-- Shield fill gradient -->
    <path d="M 950 185 L 1045 222 L 1045 375 Q 950 442 950 442 Q 855 375 855 222 Z"
          fill="url(#shieldGradient)" opacity="0.15"/>
  </g>

  <!-- Vulnerability markers (red circles) -->
  <g>
    <!-- Top vulnerability marker -->
    <circle cx="950" cy="240" r="12" fill="none" stroke="#ff4444" stroke-width="2.5" opacity="0.9"/>
    <circle cx="950" cy="240" r="8" fill="#ff4444" opacity="0.3"/>

    <!-- Middle-left vulnerability -->
    <circle cx="900" cy="310" r="10" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <circle cx="900" cy="310" r="6" fill="#ff6b6b" opacity="0.4"/>

    <!-- Middle-right vulnerability -->
    <circle cx="1000" cy="320" r="10" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <circle cx="1000" cy="320" r="6" fill="#ff6b6b" opacity="0.4"/>

    <!-- Bottom vulnerability -->
    <circle cx="950" cy="390" r="9" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <circle cx="950" cy="390" r="5" fill="#ff6b6b" opacity="0.4"/>
  </g>

  <!-- Scanning lines (moving pattern) -->
  <g opacity="0.6">
    <line x1="800" y1="200" x2="1100" y2="200" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
    <line x1="805" y1="250" x2="1095" y2="250" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="300" x2="1100" y2="300" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
    <line x1="805" y1="350" x2="1095" y2="350" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
    <line x1="800" y1="400" x2="1100" y2="400" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Security checkmarks on left and right -->
  <g>
    <!-- Left checkmark (passed) -->
    <circle cx="820" cy="280" r="18" fill="none" stroke="#4ecca3" stroke-width="2" opacity="0.7"/>
    <polyline points="810,285 820,295 830,275" fill="none" stroke="#4ecca3" stroke-width="2.5" opacity="0.8"/>

    <!-- Right X mark (vulnerability found) -->
    <circle cx="1080" cy="350" r="18" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
    <line x1="1065" y1="335" x2="1095" y2="365" stroke="#ff6b6b" stroke-width="2.5" opacity="0.8"/>
    <line x1="1095" y1="335" x2="1065" y2="365" stroke="#ff6b6b" stroke-width="2.5" opacity="0.8"/>
  </g>

  <!-- Threat level indicator -->
  <g>
    <!-- Threat level text -->
    <text x="900" y="480" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ff6b6b" opacity="0.7">
      THREAT
    </text>
    <text x="900" y="500" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ff6b6b" opacity="0.7">
      DETECTED
    </text>

    <!-- Threat bars -->
    <rect x="980" y="485" width="8" height="10" fill="#ff6b6b" opacity="0.5"/>
    <rect x="992" y="480" width="8" height="15" fill="#ff6b6b" opacity="0.7"/>
    <rect x="1004" y="473" width="8" height="22" fill="#ff6b6b" opacity="0.9"/>
  </g>

  <!-- Decorative corner elements -->
  <g opacity="0.3">
    <rect x="750" y="120" width="40" height="40" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <rect x="760" y="130" width="20" height="20" fill="none" stroke="#ff6b6b" stroke-width="1"/>

    <rect x="1080" y="450" width="35" height="35" fill="none" stroke="#ff6b6b" stroke-width="1.5" transform="rotate(45 1097 467)"/>
  </g>

  <!-- Glowing dots around shield -->
  <g fill="#ff6b6b" opacity="0.4">
    <circle cx="800" cy="200" r="3"/>
    <circle cx="1100" cy="220" r="3"/>
    <circle cx="1110" cy="360" r="3"/>
    <circle cx="800" cy="380" r="3"/>
    <circle cx="850" cy="430" r="3"/>
    <circle cx="1050" cy="420" r="3"/>
  </g>
</svg>