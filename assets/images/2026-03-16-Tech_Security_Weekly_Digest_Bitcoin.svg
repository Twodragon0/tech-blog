<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="None" height="None">
  <title>Tech Security Weekly Digest Bitcoin</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient overlays for depth -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="bitcoinGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9f43;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#f7931a;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Left side background panel -->
  <rect x="0" y="0" width="700" height="630" fill="#0d0f1f" opacity="0.5"/>

  <!-- Title -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Tech Security Weekly
  </text>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#f7931a">
    Digest Bitcoin
  </text>

  <!-- Date badge -->
  <rect x="50" y="270" width="220" height="40" rx="20" fill="none" stroke="#f7931a" stroke-width="2"/>
  <text x="160" y="295" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f7931a" text-anchor="middle">
    MARCH 16, 2026
  </text>

  <!-- Tag pills -->
  <g>
    <!-- Tag 1: Blockchain -->
    <rect x="50" y="420" width="130" height="36" rx="18" fill="#1a3a4a" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="115" y="442" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="500">
      Blockchain
    </text>

    <!-- Tag 2: Crypto Security -->
    <rect x="200" y="420" width="160" height="36" rx="18" fill="#2a1a3a" stroke="#a855f7" stroke-width="1.5"/>
    <text x="280" y="442" font-family="Arial, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle" font-weight="500">
      Crypto Security
    </text>

    <!-- Tag 3: Wallets -->
    <rect x="380" y="420" width="110" height="36" rx="18" fill="#1a2a3a" stroke="#00ff88" stroke-width="1.5"/>
    <text x="435" y="442" font-family="Arial, sans-serif" font-size="13" fill="#00ff88" text-anchor="middle" font-weight="500">
      Wallets
    </text>
  </g>

  <!-- Footer -->
  <text x="50" y="595" font-family="Arial, sans-serif" font-size="14" fill="#666" font-weight="500">
    tech.2twodragon.com
  </text>

  <!-- Right side illustration: Bitcoin Security Theme -->

  <!-- Blockchain chain background -->
  <circle cx="820" cy="120" r="35" fill="none" stroke="#f7931a" stroke-width="2" opacity="0.6"/>
  <circle cx="920" cy="180" r="35" fill="none" stroke="#f7931a" stroke-width="2" opacity="0.6"/>
  <circle cx="1020" cy="240" r="35" fill="none" stroke="#f7931a" stroke-width="2" opacity="0.6"/>

  <!-- Chain connections -->
  <line x1="850" y1="140" x2="890" y2="170" stroke="#f7931a" stroke-width="1.5" opacity="0.5"/>
  <line x1="950" y1="200" x2="990" y2="230" stroke="#f7931a" stroke-width="1.5" opacity="0.5"/>

  <!-- Central Bitcoin symbol with glow -->
  <circle cx="900" cy="320" r="55" fill="url(#glow1)"/>
  <g transform="translate(900, 320)">
    <!-- Bitcoin logo -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#bitcoinGold)" stroke-width="3"/>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#f7931a" text-anchor="middle">
      ₿
    </text>
  </g>

  <!-- Security lock elements around Bitcoin -->
  <!-- Lock 1 (top-left) -->
  <g transform="translate(780, 250)">
    <rect x="0" y="10" width="30" height="25" rx="3" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="15" cy="8" r="8" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <line x1="18" y1="22" x2="18" y2="30" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="18" cy="32" r="2" fill="#00d4ff"/>
  </g>

  <!-- Lock 2 (top-right) -->
  <g transform="translate(1040, 250)">
    <rect x="0" y="10" width="30" height="25" rx="3" fill="none" stroke="#00ff88" stroke-width="2"/>
    <circle cx="15" cy="8" r="8" fill="none" stroke="#00ff88" stroke-width="2"/>
    <line x1="18" y1="22" x2="18" y2="30" stroke="#00ff88" stroke-width="2"/>
    <circle cx="18" cy="32" r="2" fill="#00ff88"/>
  </g>

  <!-- Shield elements (security) -->
  <!-- Shield 1 -->
  <g transform="translate(750, 380)">
    <path d="M 20 5 L 35 15 L 35 35 Q 20 45 20 45 Q 5 35 5 15 Z" fill="none" stroke="#a855f7" stroke-width="2.5"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#a855f7" text-anchor="middle">
      ✓
    </text>
  </g>

  <!-- Shield 2 -->
  <g transform="translate(1050, 380)">
    <path d="M 20 5 L 35 15 L 35 35 Q 20 45 20 45 Q 5 35 5 15 Z" fill="none" stroke="#f7931a" stroke-width="2.5"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f7931a" text-anchor="middle">
      ✓
    </text>
  </g>

  <!-- Network nodes -->
  <!-- Top node -->
  <circle cx="900" cy="450" r="12" fill="#f7931a" opacity="0.8"/>
  <line x1="900" y1="375" x2="900" y2="438" stroke="#f7931a" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- Bottom-left node -->
  <circle cx="800" cy="520" r="12" fill="#00d4ff" opacity="0.8"/>
  <line x1="875" y1="365" x2="820" y2="510" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- Bottom-right node -->
  <circle cx="1000" cy="520" r="12" fill="#00ff88" opacity="0.8"/>
  <line x1="925" y1="365" x2="980" y2="510" stroke="#00ff88" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- Encryption keys visualization -->
  <!-- Key 1 (left) -->
  <g transform="translate(730, 480)">
    <rect x="0" y="0" width="8" height="20" fill="#00d4ff"/>
    <circle cx="4" cy="25" r="3" fill="#00d4ff"/>
    <circle cx="12" cy="15" r="2" fill="#00d4ff"/>
    <circle cx="14" cy="5" r="2" fill="#00d4ff"/>
  </g>

  <!-- Key 2 (right) -->
  <g transform="translate(1070, 480)">
    <rect x="0" y="0" width="8" height="20" fill="#a855f7"/>
    <circle cx="4" cy="25" r="3" fill="#a855f7"/>
    <circle cx="12" cy="15" r="2" fill="#a855f7"/>
    <circle cx="14" cy="5" r="2" fill="#a855f7"/>
  </g>

  <!-- Data blocks stacked (blockchain concept) -->
  <g transform="translate(900, 540)">
    <rect x="-35" y="0" width="70" height="20" rx="2" fill="none" stroke="#f7931a" stroke-width="1.5"/>
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="10" fill="#f7931a" text-anchor="middle" font-weight="bold">
      BLOCK
    </text>

    <rect x="-35" y="22" width="70" height="20" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="0" y="36" font-family="Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" font-weight="bold">
      BLOCK
    </text>
  </g>

  <!-- Decorative grid pattern on right -->
  <g opacity="0.1">
    <line x1="700" y1="0" x2="700" y2="630" stroke="#f7931a" stroke-width="1"/>
    <line x1="750" y1="0" x2="750" y2="630" stroke="#f7931a" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#f7931a" stroke-width="1"/>
    <line x1="850" y1="0" x2="850" y2="630" stroke="#f7931a" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#f7931a" stroke-width="1"/>
    <line x1="950" y1="0" x2="950" y2="630" stroke="#f7931a" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#f7931a" stroke-width="1"/>
    <line x1="1050" y1="0" x2="1050" y2="630" stroke="#f7931a" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#f7931a" stroke-width="1"/>
    <line x1="1150" y1="0" x2="1150" y2="630" stroke="#f7931a" stroke-width="1"/>
  </g>
</svg>