    <path d="M30,10 C50,-2 70,5 72,25 C74,40 68,50 60,58 L60,70 L40,70 L40,58 C30,52 20,40 22,25 C23,15 25,12 30,10Z" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
