  <ellipse cx="750" cy="200" rx="200" ry="180" fill="url(#blueGlow)"/>

  <!-- ==================== RIGHT SIDE: VISUAL SCENE ==================== -->

  <!-- Data flow arrows connecting elements -->
  <g stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1" fill="none" stroke-dasharray="4,4">
    <path d="M780,160 C800,220 850,230 870,280"/>
    <path d="M870,320 C860,370 900,400 920,430"/>
    <path d="M1000,200 C980,260 950,280 940,300"/>
    <path d="M780,450 C820,420 860,390 880,340"/>
