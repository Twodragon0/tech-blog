<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0f0a18"/>
      <stop offset="100%" style="stop-color:#1a0f00"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="converge" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="convergeBurst">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <circle cx="280" cy="280" r="240" fill="#8b5cf6" opacity="0.09" filter="url(#ambient)"/>
  <circle cx="920" cy="280" r="230" fill="#f59e0b" opacity="0.09" filter="url(#ambient)"/>
  <circle cx="600" cy="290" r="120" fill="#ffffff" opacity="0.04" filter="url(#ambient)"/>
  <circle cx="150" cy="450" r="160" fill="#7c3aed" opacity="0.06" filter="url(#ambient)"/>
  <circle cx="1050" cy="430" r="150" fill="#d97706" opacity="0.07" filter="url(#ambient)"/>

  <!-- Floating code fragments -->
  <text x="55" y="88" font-family="Courier New,monospace" font-size="12" fill="#8b5cf6" opacity="0.13" transform="rotate(-6,55,88)">contract.verify(ai_model)</text>
  <text x="830" y="100" font-family="Courier New,monospace" font-size="11" fill="#f59e0b" opacity="0.13" transform="rotate(5,830,100)">defi.audit(pool)</text>
  <text x="70" y="490" font-family="Courier New,monospace" font-size="11" fill="#8b5cf6" opacity="0.12" transform="rotate(-3,70,490)">chain.consensus(nodes)</text>
  <text x="870" y="480" font-family="Courier New,monospace" font-size="12" fill="#f59e0b" opacity="0.12" transform="rotate(4,870,480)">model.predict(risk)</text>
  <text x="280" y="75" font-family="Courier New,monospace" font-size="10" fill="#a78bfa" opacity="0.10">{"epochs": 100, "loss": 0.02}</text>
  <text x="680" y="530" font-family="Courier New,monospace" font-size="10" fill="#fbbf24" opacity="0.11" transform="rotate(-2,680,530)">tx.sign(privateKey)</text>

  <!-- ===== NEURAL NETWORK - LEFT SIDE ===== -->
  <!-- Layer 1 nodes (input) -->
  <circle cx="180" cy="220" r="14" fill="url(#purpleGrad)" opacity="0.85" filter="url(#glow)"/>
  <circle cx="180" cy="270" r="14" fill="url(#purpleGrad)" opacity="0.85" filter="url(#glow)"/>
  <circle cx="180" cy="320" r="14" fill="url(#purpleGrad)" opacity="0.85" filter="url(#glow)"/>
  <circle cx="180" cy="370" r="14" fill="url(#purpleGrad)" opacity="0.85" filter="url(#glow)"/>

  <!-- Layer 2 nodes (hidden) -->
  <circle cx="290" cy="240" r="16" fill="url(#purpleGrad)" opacity="0.90" filter="url(#glow)"/>
  <circle cx="290" cy="295" r="16" fill="url(#purpleGrad)" opacity="0.90" filter="url(#glow)"/>
  <circle cx="290" cy="350" r="16" fill="url(#purpleGrad)" opacity="0.90" filter="url(#glow)"/>

  <!-- Layer 3 nodes (hidden) -->
  <circle cx="400" cy="265" r="18" fill="url(#purpleGrad)" filter="url(#glow)"/>
  <circle cx="400" cy="325" r="18" fill="url(#purpleGrad)" filter="url(#glow)"/>

  <!-- Neural connections layer 1->2 -->
  <line x1="194" y1="220" x2="274" y2="240" stroke="#8b5cf6" stroke-width="1" opacity="0.35"/>
  <line x1="194" y1="220" x2="274" y2="295" stroke="#8b5cf6" stroke-width="1" opacity="0.25"/>
  <line x1="194" y1="270" x2="274" y2="240" stroke="#8b5cf6" stroke-width="1" opacity="0.25"/>
  <line x1="194" y1="270" x2="274" y2="295" stroke="#8b5cf6" stroke-width="1" opacity="0.35"/>
  <line x1="194" y1="270" x2="274" y2="350" stroke="#8b5cf6" stroke-width="1" opacity="0.20"/>
  <line x1="194" y1="320" x2="274" y2="295" stroke="#8b5cf6" stroke-width="1" opacity="0.25"/>
  <line x1="194" y1="320" x2="274" y2="350" stroke="#8b5cf6" stroke-width="1" opacity="0.35"/>
  <line x1="194" y1="370" x2="274" y2="295" stroke="#8b5cf6" stroke-width="1" opacity="0.20"/>
  <line x1="194" y1="370" x2="274" y2="350" stroke="#8b5cf6" stroke-width="1" opacity="0.35"/>

  <!-- Neural connections layer 2->3 -->
  <line x1="306" y1="240" x2="382" y2="265" stroke="#8b5cf6" stroke-width="1.5" opacity="0.40"/>
  <line x1="306" y1="240" x2="382" y2="325" stroke="#8b5cf6" stroke-width="1.5" opacity="0.25"/>
  <line x1="306" y1="295" x2="382" y2="265" stroke="#8b5cf6" stroke-width="1.5" opacity="0.30"/>
  <line x1="306" y1="295" x2="382" y2="325" stroke="#8b5cf6" stroke-width="1.5" opacity="0.40"/>
  <line x1="306" y1="350" x2="382" y2="265" stroke="#8b5cf6" stroke-width="1.5" opacity="0.25"/>
  <line x1="306" y1="350" x2="382" y2="325" stroke="#8b5cf6" stroke-width="1.5" opacity="0.40"/>

  <!-- Neural label -->
  <text x="290" y="415" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="bold">NEURAL NETWORK</text>

  <!-- ===== CONVERGENCE POINT - CENTER ===== -->
  <!-- Lines from neural to center -->
  <line x1="418" y1="265" x2="550" y2="295" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
  <line x1="418" y1="325" x2="550" y2="295" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>

  <!-- Lines from blockchain to center -->
  <line x1="782" y1="265" x2="650" y2="295" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <line x1="782" y1="340" x2="650" y2="295" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>

  <!-- Convergence burst -->
  <circle cx="600" cy="295" r="45" fill="#ffffff" opacity="0.04" filter="url(#convergeBurst)"/>
  <circle cx="600" cy="295" r="30" fill="#ffffff" opacity="0.07" filter="url(#convergeBurst)"/>
  <circle cx="600" cy="295" r="20" fill="url(#converge)" opacity="0.3" filter="url(#glow)"/>
  <circle cx="600" cy="295" r="12" fill="#ffffff" opacity="0.6" filter="url(#glow)"/>
  <!-- Convergence ring -->
  <circle cx="600" cy="295" r="36" fill="none" stroke="url(#converge)" stroke-width="2" opacity="0.6" stroke-dasharray="4,3"/>

  <!-- Convergence label -->
  <text x="600" y="355" font-family="Arial,sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">CONVERGENCE</text>

  <!-- Smart contract documents floating near center -->
  <g transform="translate(545,210)">
    <rect x="0" y="0" width="40" height="50" rx="4" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="5" y="8" width="30" height="3" rx="1" fill="#8b5cf6" opacity="0.5"/>
    <rect x="5" y="15" width="25" height="3" rx="1" fill="#475569"/>
    <rect x="5" y="22" width="28" height="3" rx="1" fill="#475569"/>
    <rect x="5" y="29" width="20" height="3" rx="1" fill="#475569"/>
    <text x="20" y="46" font-family="Courier New,monospace" font-size="7" fill="#a78bfa" text-anchor="middle">contract</text>
  </g>
  <g transform="translate(615,215)" opacity="0.8">
    <rect x="0" y="0" width="36" height="45" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="4" y="7" width="28" height="3" rx="1" fill="#f59e0b" opacity="0.5"/>
    <rect x="4" y="14" width="22" height="3" rx="1" fill="#475569"/>
    <rect x="4" y="21" width="24" height="3" rx="1" fill="#475569"/>
    <text x="18" y="42" font-family="Courier New,monospace" font-size="7" fill="#fbbf24" text-anchor="middle">audit</text>
  </g>

  <!-- ===== BLOCKCHAIN - RIGHT SIDE ===== -->
  <!-- Block 1 -->
  <rect x="790" y="225" width="90" height="65" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="790" y="225" width="90" height="18" rx="8" fill="#f59e0b" opacity="0.2"/>
  <rect x="790" y="231" width="90" height="8" fill="#f59e0b" opacity="0.2"/>
  <text x="835" y="239" font-family="Courier New,monospace" font-size="8" fill="#fbbf24" text-anchor="middle">BLOCK #N-1</text>
  <text x="835" y="254" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle">hash: 0xa3f8...</text>
  <text x="835" y="265" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle">tx: 847</text>
  <text x="835" y="277" font-family="Courier New,monospace" font-size="7" fill="#22c55e" text-anchor="middle">VERIFIED</text>

  <!-- Chain link -->
  <line x1="880" y1="257" x2="900" y2="257" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="890" cy="257" r="5" fill="#0a0a1a" stroke="#f59e0b" stroke-width="2"/>

  <!-- Block 2 (current) - highlighted -->
  <rect x="903" y="220" width="95" height="70" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="903" y="220" width="95" height="20" rx="8" fill="#f59e0b" opacity="0.25"/>
  <rect x="903" y="228" width="95" height="8" fill="#f59e0b" opacity="0.25"/>
  <text x="950" y="236" font-family="Courier New,monospace" font-size="8" fill="#fde68a" text-anchor="middle" font-weight="bold">BLOCK #N</text>
  <text x="950" y="251" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle">hash: 0xc91a...</text>
  <text x="950" y="262" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle">ai_sig: valid</text>
  <text x="950" y="274" font-family="Courier New,monospace" font-size="7" fill="#fbbf24" text-anchor="middle">MINING</text>

  <!-- Block 3 -->
  <rect x="790" y="325" width="90" height="65" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)" opacity="0.7"/>
  <rect x="790" y="325" width="90" height="18" rx="8" fill="#f59e0b" opacity="0.12"/>
  <rect x="790" y="331" width="90" height="8" fill="#f59e0b" opacity="0.12"/>
  <text x="835" y="339" font-family="Courier New,monospace" font-size="8" fill="#fbbf24" text-anchor="middle" opacity="0.8">BLOCK #N-2</text>
  <text x="835" y="354" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle">defi: 12.4k</text>
  <text x="835" y="365" font-family="Courier New,monospace" font-size="7" fill="#22c55e" text-anchor="middle">VERIFIED</text>

  <!-- Vertical chain link -->
  <line x1="835" y1="290" x2="835" y2="325" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <circle cx="835" cy="308" r="5" fill="#0a0a1a" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>

  <!-- Blockchain label -->
  <text x="910" y="415" font-family="Arial,sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="bold">BLOCKCHAIN</text>

  <!-- ===== TOP BADGES ===== -->
  <rect x="40" y="22" width="170" height="34" rx="16" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="125" y="43" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fbbf24" text-anchor="middle">WEEKLY DIGEST</text>

  <rect x="990" y="22" width="170" height="34" rx="16" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
  <text x="1075" y="43" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd" text-anchor="middle">February 2, 2026</text>

  <!-- ===== TITLE + SUBTITLE ===== -->
  <text x="600" y="500" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#titleGlow)">AI + Blockchain Convergence</text>
  <text x="600" y="535" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Smart Contract AI | DeFi Security | Tech Innovation</text>

  <!-- ===== FOOTER ===== -->
  <line x1="40" y1="585" x2="1160" y2="585" stroke="#1e293b" stroke-width="1.5"/>
  <text x="40" y="610" font-family="Arial,sans-serif" font-size="12" fill="#475569">16 News | 3 Security | 4 AI/ML | 2 Cloud | 3 DevOps</text>
  <text x="1160" y="610" font-family="Arial,sans-serif" font-size="12" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>
