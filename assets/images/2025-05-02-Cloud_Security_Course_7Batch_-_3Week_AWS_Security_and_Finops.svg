  <text x="1090" y="240" font-family="system-ui,sans-serif" font-size="38" font-weight="700" fill="rgba(243,156,18,0.35)">$</text>
  <!-- Down cost arrow -->
  <path d="M1142 245 L1142 230 M1137 242 L1142 252 L1147 242" fill="none" stroke="rgba(39,174,96,0.8)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="180" height="32" rx="4" fill="rgba(243,156,18,0.2)" stroke="rgba(243,156,18,0.4)" stroke-width="1"/>
  <text x="170" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">MAY 2, 2025</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Cloud Security 7th</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="-1">Week 3: AWS &amp; FinOps</text>
