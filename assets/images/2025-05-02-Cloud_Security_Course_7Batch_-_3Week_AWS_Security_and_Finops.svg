<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security 7th Batch Week 3 AWS Security and FinOps</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a3555"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- AWS shield -->
  <path d="M940 175 L1040 195 L1040 285 Q1040 335 940 365 Q840 335 840 285 L840 195 Z" fill="none" stroke="rgba(243,156,18,0.5)" stroke-width="3"/>
  <path d="M940 200 L1010 215 L1010 280 Q1010 315 940 340 Q870 315 870 280 L870 215 Z" fill="rgba(243,156,18,0.06)"/>
  <text x="940" y="292" font-family="system-ui,sans-serif" font-size="34" font-weight="700" fill="rgba(243,156,18,0.85)" text-anchor="middle">AWS</text>
  <!-- FinOps cost bars -->
  <rect x="1060" y="330" width="26" height="70" rx="3" fill="rgba(41,128,185,0.4)"/>
  <rect x="1094" y="300" width="26" height="100" rx="3" fill="rgba(41,128,185,0.55)"/>
  <rect x="1128" y="255" width="26" height="145" rx="3" fill="rgba(243,156,18,0.65)"/>
  <!-- Baseline -->
  <line x1="1055" y1="400" x2="1160" y2="400" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
