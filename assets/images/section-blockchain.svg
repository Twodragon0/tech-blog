<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="140">
      <stop offset="0%" stop-color="#1a150a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="800" height="140" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>
  <!-- Chain/block icon -->
  <g transform="translate(40, 25)">
    <circle cx="45" cy="45" r="40" fill="url(#accent)" opacity="0.12"/>
    <rect x="15" y="30" width="25" height="25" rx="4" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="50" y="30" width="25" height="25" rx="4" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="40" y1="42" x2="50" y2="42" stroke="#fcd34d" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="27" cy="42" r="4" fill="#fcd34d" opacity="0.5"/>
    <circle cx="62" cy="42" r="4" fill="#fcd34d" opacity="0.5"/>
    <text x="27" y="46" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="8" font-weight="bold">B</text>
    <text x="62" y="46" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="8" font-weight="bold">B</text>
  </g>
  <!-- Text -->
  <text x="140" y="55" fill="#fcd34d" font-family="Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="3">BLOCKCHAIN &amp; WEB3</text>
  <text x="140" y="85" fill="#f8fafc" font-family="Arial, sans-serif" font-size="26" font-weight="bold">Blockchain, DeFi &amp; Cryptocurrency</text>
  <text x="140" y="115" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">Bitcoin | Ethereum | Smart Contracts | DeFi Security</text>
  <!-- Decorative dots -->
  <g opacity="0.3">
    <circle cx="685" cy="35" r="3" fill="#f59e0b"/>
    <circle cx="720" cy="55" r="4" fill="#fbbf24"/>
    <circle cx="750" cy="30" r="2" fill="#fcd34d"/>
    <circle cx="755" cy="75" r="3" fill="#f59e0b"/>
    <circle cx="695" cy="90" r="3" fill="#fbbf24"/>
    <circle cx="735" cy="105" r="2" fill="#fcd34d"/>
    <line x1="685" y1="35" x2="720" y2="55" stroke="#475569" stroke-width="1"/>
    <line x1="720" y1="55" x2="750" y2="30" stroke="#475569" stroke-width="1"/>
    <line x1="755" y1="75" x2="695" y2="90" stroke="#475569" stroke-width="1"/>
    <line x1="695" y1="90" x2="735" y2="105" stroke="#475569" stroke-width="1"/>
  </g>
</svg>
