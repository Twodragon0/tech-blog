<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side: Text content -->
  <g id="left-content">
    <!-- Title line 1 -->
    <text x="40" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Security Digest</text>
    
    <!-- Title line 2 -->
    <text x="40" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="-0.5">SolarWinds UNC3886 LLM Attack</text>
    
    <!-- Date badge -->
    <rect x="40" y="280" width="220" height="36" rx="18" fill="#1a1f35" stroke="#4a5568" stroke-width="1"/>
    <text x="130" y="302" font-family="monospace" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="middle">FEBRUARY 10, 2026</text>
    
    <!-- Tag pills -->
    <g id="tags">
      <!-- Tag 1: supply-chain -->
      <rect x="40" y="420" width="110" height="32" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="95" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">supply-chain</text>
      
      <!-- Tag 2: threat-actor -->
      <rect x="160" y="420" width="110" height="32" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="215" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">threat-actor</text>
      
      <!-- Tag 3: llm-security -->
      <rect x="280" y="420" width="110" height="32" rx="16" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="335" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1" text-anchor="middle">llm-security</text>
    </g>
    
    <!-- Footer -->
    <text x="40" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#64748b">tech.2twodragon.com</text>
  </g>
  
  <!-- Right side: Illustration for SolarWinds UNC3886 LLM Attack -->
  <g id="illustration">
    <!-- Background accent -->
    <rect x="700" y="0" width="500" height="630" fill="#0f1420" opacity="0.5"/>
    
    <!-- Compromised server/code element -->
    <g id="server-threat">
      <!-- Server box -->
      <rect x="730" y="100" width="140" height="140" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2" opacity="0.9"/>
      
      <!-- Red alert glow -->
      <rect x="730" y="100" width="140" height="140" rx="8" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.3" filter="url(#glow)"/>
      
      <!-- Code lines in server -->
      <line x1="745" y1="115" x2="855" y2="115" stroke="#fca5a5" stroke-width="2"/>
      <line x1="745" y1="130" x2="855" y2="130" stroke="#fca5a5" stroke-width="2"/>
      <line x1="745" y1="145" x2="855" y2="145" stroke="#fca5a5" stroke-width="2"/>
      <line x1="745" y1="160" x2="810" y2="160" stroke="#fca5a5" stroke-width="2"/>
      <line x1="745" y1="190" x2="855" y2="190" stroke="#fca5a5" stroke-width="2"/>
      <line x1="745" y1="205" x2="855" y2="205" stroke="#fca5a5" stroke-width="2"/>
      <line x1="745" y1="220" x2="820" y2="220" stroke="#fca5a5" stroke-width="2"/>
    </g>
    
    <!-- LLM neural network nodes (compromised) -->
    <g id="llm-network">
      <!-- Central LLM node -->
      <circle cx="950" cy="180" r="35" fill="#1e40af" stroke="#3b82f6" stroke-width="2"/>
      <text x="950" y="188" font-family="monospace" font-size="20" font-weight="700" fill="#60a5fa" text-anchor="middle">LLM</text>
      
      <!-- Connected nodes with attack arrows -->
      <!-- Node 1 -->
      <circle cx="880" cy="240" r="20" fill="#0f172a" stroke="#dc2626" stroke-width="2"/>
      <line x1="930" y1="205" x2="895" y2="230" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
      
      <!-- Node 2 -->
      <circle cx="1020" cy="240" r="20" fill="#0f172a" stroke="#dc2626" stroke-width="2"/>
      <line x1="970" y1="205" x2="1005" y2="230" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
      
      <!-- Node 3 -->
      <circle cx="950" cy="310" r="20" fill="#0f172a" stroke="#dc2626" stroke-width="2"/>
      <line x1="950" y1="215" x2="950" y2="290" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
    </g>
    
    <!-- Attack vector arrows (injection) -->
    <g id="attack-vector">
      <!-- Malicious prompt injection arrow -->
      <path d="M 870 350 Q 920 370 950 395" stroke="#f97316" stroke-width="3" fill="none" marker-end="url(#arrowOrange)" stroke-dasharray="5,5"/>
      <text x="890" y="380" font-family="monospace" font-size="11" font-weight="600" fill="#fb923c">prompt injection</text>
    </g>
    
    <!-- Data exfiltration indicator -->
    <g id="exfiltration">
      <circle cx="950" cy="450" r="25" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
      <text x="950" y="458" font-family="monospace" font-size="16" font-weight="700" fill="#f472b6" text-anchor="middle">DATA</text>
      
      <!-- Flowing data lines -->
      <path d="M 950 475 L 950 520" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowPink)"/>
      <path d="M 920 475 L 880 510" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowPink)"/>
      <path d="M 980 475 L 1020 510" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowPink)"/>
    </g>
    
    <!-- UNC3886 threat actor indicator -->
    <g id="threat-actor">
      <rect x="1040" y="340" width="90" height="50" rx="4" fill="#7c2d12" stroke="#ea580c" stroke-width="1.5" opacity="0.8"/>
      <text x="1085" y="360" font-family="monospace" font-size="11" font-weight="700" fill="#fdba74" text-anchor="middle">UNC3886</text>
      <text x="1085" y="380" font-family="monospace" font-size="9" fill="#fed7aa" text-anchor="middle">APT</text>
    </g>
    
    <!-- SVG Filters -->
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
      </marker>
      
      <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#f97316"/>
      </marker>
      
      <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ec4899"/>
      </marker>
    </defs>
  </g>
</svg>