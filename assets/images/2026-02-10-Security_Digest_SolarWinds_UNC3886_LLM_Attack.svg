<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="glass-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.25"/>
    </filter>
    <filter id="orb-blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="particle-glow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="border-glow-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="border-glow-2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="brain-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#ffffff" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#dot-grid)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="200" cy="500" rx="200" ry="180" fill="url(#orb1)" filter="url(#orb-blur)"/>
  <ellipse cx="900" cy="120" rx="220" ry="200" fill="url(#orb2)" filter="url(#orb-blur)"/>
  <ellipse cx="1050" cy="480" rx="160" ry="140" fill="url(#orb1)" filter="url(#orb-blur)"/>

  <!-- ==================== RIGHT SIDE: Glass Cards ==================== -->

  <!-- Card 1: Brain/AI/LLM (upper) -->
  <g filter="url(#card-shadow)">
    <rect x="680" y="60" width="460" height="260" rx="16" fill="#1e293b" opacity="0.45"/>
    <rect x="680" y="60" width="460" height="260" rx="16" fill="none" stroke="url(#border-glow-1)" stroke-width="1.5"/>
  </g>

  <!-- Brain silhouette with circuit/neural lines -->
  <g transform="translate(860, 130)" opacity="0.9">
    <!-- Brain outline -->
    <path d="M50,0 C22,0 0,25 0,55 C0,75 8,90 22,100 C18,108 16,118 20,126 C24,134 32,138 40,138 L60,138 C68,138 76,134 80,126 C84,118 82,108 78,100 C92,90 100,75 100,55 C100,25 78,0 50,0Z" fill="none" stroke="url(#brain-grad)" stroke-width="2"/>
    <!-- Brain center division -->
    <path d="M50,8 L50,130" stroke="url(#brain-grad)" stroke-width="1" opacity="0.5"/>
    <!-- Neural circuit lines - left hemisphere -->
    <path d="M20,40 L35,45 L28,65 L38,75" fill="none" stroke="#f43f5e" stroke-width="1.2" opacity="0.7"/>
    <path d="M15,60 L30,55 L38,70 L30,90" fill="none" stroke="#f43f5e" stroke-width="1.2" opacity="0.6"/>
    <path d="M25,85 L35,80 L40,95 L35,110" fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.6"/>
    <!-- Neural circuit lines - right hemisphere -->
    <path d="M80,40 L65,45 L72,65 L62,75" fill="none" stroke="#f43f5e" stroke-width="1.2" opacity="0.7"/>
    <path d="M85,60 L70,55 L62,70 L70,90" fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.6"/>
    <path d="M75,85 L65,80 L60,95 L65,110" fill="none" stroke="#f43f5e" stroke-width="1.2" opacity="0.6"/>
    <!-- Neural nodes -->
    <circle cx="35" cy="45" r="3" fill="#f43f5e" opacity="0.8"/>
    <circle cx="65" cy="45" r="3" fill="#f43f5e" opacity="0.8"/>
    <circle cx="28" cy="65" r="2.5" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="72" cy="65" r="2.5" fill="#8b5cf6" opacity="0.7"/>
    <circle cx="38" cy="75" r="3" fill="#f43f5e" opacity="0.8"/>
    <circle cx="62" cy="75" r="3" fill="#f43f5e" opacity="0.8"/>
    <circle cx="30" cy="90" r="2" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="70" cy="90" r="2" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="40" cy="95" r="2.5" fill="#f43f5e" opacity="0.7"/>
    <circle cx="60" cy="95" r="2.5" fill="#f43f5e" opacity="0.7"/>
    <!-- Pulse rings -->
    <circle cx="50" cy="55" r="18" fill="none" stroke="#f43f5e" stroke-width="0.8" opacity="0.3"/>
    <circle cx="50" cy="55" r="30" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- AI/LLM label on card 1 -->
  <text x="910" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="3">AI / LLM THREAT VECTOR</text>

  <!-- Card 2: Shield/Security (lower, overlapping) -->
  <g filter="url(#card-shadow)">
    <rect x="720" y="300" width="430" height="270" rx="16" fill="#1e293b" opacity="0.5"/>
    <rect x="720" y="300" width="430" height="270" rx="16" fill="none" stroke="url(#border-glow-2)" stroke-width="1.5"/>
  </g>

  <!-- Large shield with checkmark -->
  <g transform="translate(880, 340)">
    <!-- Shield shape -->
    <path d="M55,0 L110,22 L110,66 C110,100 85,128 55,140 C25,128 0,100 0,66 L0,22 Z" fill="url(#shield-grad)" opacity="0.2" stroke="url(#shield-grad)" stroke-width="2"/>
    <path d="M55,8 L102,27 L102,66 C102,95 80,120 55,131 C30,120 8,95 8,66 L8,27 Z" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
    <!-- Checkmark -->
    <path d="M32,68 L48,84 L78,50" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <!-- Shield glow rings -->
    <circle cx="55" cy="70" r="40" fill="none" stroke="#3b82f6" stroke-width="0.6" opacity="0.25"/>
    <circle cx="55" cy="70" r="52" fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.15"/>
  </g>

  <!-- Security label on card 2 -->
  <text x="935" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="3">SECURITY COMPLIANCE</text>

  <!-- Floating particles between cards -->
  <g filter="url(#particle-glow)">
    <circle cx="700" cy="290" r="2" fill="#3b82f6" opacity="0.7"/>
    <circle cx="750" cy="310" r="1.5" fill="#f43f5e" opacity="0.6"/>
    <circle cx="1100" cy="280" r="1.8" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="1050" cy="320" r="2.2" fill="#3b82f6" opacity="0.6"/>
    <circle cx="800" cy="270" r="1.2" fill="#f43f5e" opacity="0.5"/>
    <circle cx="1130" cy="350" r="1.5" fill="#8b5cf6" opacity="0.4"/>
    <circle cx="680" cy="340" r="1" fill="#3b82f6" opacity="0.6"/>
    <circle cx="1080" cy="240" r="1.8" fill="#f43f5e" opacity="0.4"/>
    <circle cx="760" cy="250" r="1.3" fill="#22c55e" opacity="0.4"/>
    <circle cx="1140" cy="160" r="1.5" fill="#3b82f6" opacity="0.5"/>
  </g>

  <!-- ==================== LEFT SIDE: Text Content ==================== -->

  <!-- Category pill -->
  <rect x="60" y="60" width="160" height="32" rx="16" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
  <text x="140" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#60a5fa" text-anchor="middle" font-weight="600" letter-spacing="1.5">SECURITY</text>

  <!-- Title -->
  <text x="60" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="44" fill="#ffffff" font-weight="800" letter-spacing="-0.5">Security Digest</text>
  <text x="60" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="44" fill="#ffffff" font-weight="800" letter-spacing="-0.5">SolarWinds</text>
  <text x="60" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="url(#accent-line)" font-weight="700" letter-spacing="-0.5">UNC3886 LLM</text>
  <text x="60" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="url(#accent-line)" font-weight="700" letter-spacing="-0.5">Attack</text>

  <!-- Thin gradient accent line -->
  <rect x="60" y="360" width="200" height="3" rx="1.5" fill="url(#accent-line)" opacity="0.8"/>

  <!-- Tag chips -->
  <g>
    <rect x="60" y="385" width="120" height="30" rx="15" fill="#f43f5e" opacity="0.12" stroke="#f43f5e" stroke-width="0.8" stroke-opacity="0.35"/>
    <text x="120" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#fb7185" text-anchor="middle" font-weight="500">SolarWinds</text>
    <rect x="192" y="385" width="110" height="30" rx="15" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.35"/>
    <text x="247" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="500">UNC3886</text>
    <rect x="314" y="385" width="120" height="30" rx="15" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.35"/>
    <text x="374" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="500">LLM Attack</text>
  </g>

  <!-- Date -->
  <text x="60" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" letter-spacing="2" font-weight="500">FEBRUARY 10, 2026</text>

  <!-- Footer -->
  <line x1="60" y1="570" x2="600" y2="570" stroke="#1e293b" stroke-width="1"/>
  <text x="60" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569" letter-spacing="1">tech.2twodragon.com</text>

  <!-- Decorative dots -->
  <circle cx="580" cy="590" r="4" fill="#3b82f6" opacity="0.3"/>
  <circle cx="596" cy="590" r="4" fill="#f43f5e" opacity="0.3"/>
  <circle cx="612" cy="590" r="4" fill="#8b5cf6" opacity="0.3"/>
</svg>