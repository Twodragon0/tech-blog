    <circle cx="-3" cy="24" r="2" fill="#ef4444" opacity="0.8"/>
    <circle cx="3" cy="24" r="2" fill="#ef4444" opacity="0.8"/>
    <path d="M-3,30 L0,28 L3,30" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <!-- Bitcoin symbol floating nearby -->
    <g transform="translate(130,-40)">
      <circle cx="0" cy="0" r="35" fill="#1e293b" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="0" y="10" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="#f59e0b" text-anchor="middle">B</text>
      <line x1="-5" y1="-18" x2="-5" y2="-25" stroke="#f59e0b" stroke-width="2"/>
      <line x1="5" y1="-18" x2="5" y2="-25" stroke="#f59e0b" stroke-width="2"/>
      <line x1="-5" y1="18" x2="-5" y2="25" stroke="#f59e0b" stroke-width="2"/>
      <line x1="5" y1="18" x2="5" y2="25" stroke="#f59e0b" stroke-width="2"/>
    </g>
    <!-- JWT token fragment -->
    <g transform="translate(-160,-50)" opacity="0.5">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="0" y="3" font-family="Courier New" font-size="9" fill="#c4b5fd" text-anchor="middle">eyJhbGci...</text>
    </g>
    <!-- Chain links -->
    <g opacity="0.3">
      <ellipse cx="-90" cy="40" rx="12" ry="8" fill="none" stroke="#ef4444" stroke-width="2"/>
      <ellipse cx="-110" cy="40" rx="12" ry="8" fill="none" stroke="#ef4444" stroke-width="2"/>
      <ellipse cx="90" cy="40" rx="12" ry="8" fill="none" stroke="#ef4444" stroke-width="2"/>
      <ellipse cx="110" cy="40" rx="12" ry="8" fill="none" stroke="#ef4444" stroke-width="2"/>
    </g>
    <!-- Ransom demand text -->
    <rect x="-55" y="100" width="110" height="22" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="0" y="115" font-family="Courier New" font-size="10" fill="#fca5a5" text-anchor="middle">PAY 5 BTC</text>
  </g>
  <text x="600" y="510" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">Ransomware Lockdown</text>
  <text x="600" y="548" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">JWT Exploit | Crypto Theft | AI-Powered Ransomware</text>
  <rect x="40" y="25" width="160" height="32" rx="16" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="47" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fca5a5" text-anchor="middle">WEEKLY DIGEST</text>
  <rect x="1000" y="25" width="160" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="1080" y="47" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">March 4, 2026</text>
  <text x="1160" y="615" font-family="Arial,sans-serif" font-size="13" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
