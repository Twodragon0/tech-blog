<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient overlays for depth -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0.8" />
    </linearGradient>
    <radialGradient id="bitcoinGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f7931a;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dd0000;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- RIGHT SIDE ILLUSTRATION (x=700-1150) -->
  <circle cx="950" cy="150" r="120" fill="#1a3a52" opacity="0.4"/>
  <circle cx="800" cy="450" r="100" fill="#2d1a3a" opacity="0.3"/>

  <!-- Bitcoin coin (left, larger) -->
  <g transform="translate(820, 280)">
    <circle cx="0" cy="0" r="65" fill="#f7931a" opacity="0.9"/>
    <circle cx="0" cy="0" r="63" fill="#ffa500"/>
    <circle cx="0" cy="0" r="70" fill="url(#bitcoinGlow)"/>
    <text x="0" y="8" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle" font-family="Arial">₿</text>
    <circle cx="0" cy="0" r="63" fill="none" stroke="#f0a000" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Padlock (right, threat indicator) -->
  <g transform="translate(1050, 240)">
    <rect x="-35" y="0" width="70" height="50" rx="8" fill="#d32f2f" opacity="0.95"/>
    <circle cx="-15" cy="25" r="8" fill="#b71c1c"/>
    <circle cx="15" cy="25" r="8" fill="#b71c1c"/>
    <path d="M -25 0 Q -25 -40 0 -45 Q 25 -40 25 0" stroke="#ff6b6b" stroke-width="8" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="25" r="6" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Chain links (threat connection) -->
  <g stroke="url(#chainGrad)" stroke-width="4" fill="none" stroke-linecap="round">
    <circle cx="920" cy="360" r="12"/>
    <line x1="932" y1="360" x2="960" y2="380"/>
    <circle cx="975" cy="395" r="12"/>
    <line x1="987" y1="395" x2="1020" y2="330"/>
  </g>

  <!-- Digital threat hexagons -->
  <g fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7">
    <polygon points="920,160 935,152 950,160 950,176 935,184 920,176"/>
    <polygon points="1080,380 1095,372 1110,380 1110,396 1095,404 1080,396"/>
    <line x1="945" y1="170" x2="1075" y2="390" stroke="#ff6b6b" opacity="0.4"/>
  </g>

  <!-- Warning indicators -->
  <g transform="translate(760, 420)">
    <polygon points="0,-15 15,10 -15,10" fill="#ffcc00" opacity="0.8"/>
    <text x="0" y="2" font-size="16" font-weight="bold" fill="#000" text-anchor="middle">!</text>
  </g>

  <g transform="translate(1110, 150)">
    <polygon points="0,-12 12,8 -12,8" fill="#ffcc00" opacity="0.6"/>
    <text x="0" y="1" font-size="13" font-weight="bold" fill="#000" text-anchor="middle">!</text>
  </g>

  <!-- Data streams -->
  <g stroke="#00ff88" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="5,5">
    <path d="M 750 350 Q 850 300 920 280" stroke-linecap="round"/>
    <path d="M 850 450 Q 950 400 1050 350" stroke-linecap="round"/>
  </g>

  <!-- Security shield -->
  <g transform="translate(1020, 480)">
    <path d="M 0 0 L 25 -25 L 25 15 Q 25 30 0 40 Q -25 30 -25 15 L -25 -25 Z" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
    <text x="0" y="8" font-size="18" font-weight="bold" fill="#00ff88" text-anchor="middle">✓</text>
  </g>

  <!-- Blockchain blocks -->
  <g fill="#1a5f7a" opacity="0.7">
    <rect x="780" y="520" width="28" height="28" rx="2"/>
    <rect x="813" y="520" width="28" height="28" rx="2" fill="#0d3d52"/>
    <rect x="846" y="520" width="28" height="28" rx="2"/>
  </g>

  <!-- LEFT SIDE CONTENT -->
  <text x="60" y="185" font-size="46" font-weight="bold" fill="#ffffff" font-family="Arial">
    Tech Security Weekly
  </text>

  <text x="60" y="245" font-size="46" font-weight="bold" fill="#ffffff" font-family="Arial">
    Digest: Ransomware &amp; Bitcoin
  </text>

  <!-- Date badge -->
  <rect x="60" y="275" width="200" height="40" rx="6" fill="#d32f2f" opacity="0.9"/>
  <text x="160" y="302" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle" font-family="Arial">
    MARCH 4, 2026
  </text>

  <!-- Tag pills -->
  <rect x="60" y="420" width="110" height="32" rx="16" fill="#1a5f7a" opacity="0.8" stroke="#00ff88" stroke-width="1.5"/>
  <text x="115" y="442" font-size="14" fill="#00ff88" text-anchor="middle" font-family="Arial">Security</text>

  <rect x="180" y="420" width="120" height="32" rx="16" fill="#5f1a1a" opacity="0.8" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="240" y="442" font-size="14" fill="#ff6b6b" text-anchor="middle" font-family="Arial">Ransomware</text>

  <rect x="310" y="420" width="100" height="32" rx="16" fill="#3a2a1a" opacity="0.8" stroke="#ffcc00" stroke-width="1.5"/>
  <text x="360" y="442" font-size="14" fill="#ffcc00" text-anchor="middle" font-family="Arial">Threats</text>

  <!-- Footer -->
  <text x="60" y="605" font-size="14" fill="#888888" font-family="Arial">
    tech.2twodragon.com
  </text>
</svg>