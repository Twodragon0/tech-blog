    <text x="155" y="252" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="9" font-weight="bold">JWT: header.payload.sig</text>
    <text x="155" y="268" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">alg: RS256 | exp: 3600s</text>
    <text x="155" y="283" text-anchor="middle" fill="#f97316" font-family="monospace" font-size="9">VULN: alg:none bypass</text>
