    <rect x="-70" y="-20" width="140" height="110" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="3"/>
    <!-- Lock shackle -->
    <path d="M-40,-20 L-40,-70 C-40,-110 40,-110 40,-70 L40,-20" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>
    <!-- Broken shackle piece -->
    <path d="M40,-70 L40,-50" fill="none" stroke="#ef4444" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
    <path d="M42,-62 L55,-72" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.5"/>
    <!-- Keyhole -->
