    <text x="16" y="28" fill="#f97316" font-family="Arial, sans-serif" font-size="11" font-weight="bold" letter-spacing="1">SECURITY</text>
    <text x="16" y="68" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="bold">5</text>
