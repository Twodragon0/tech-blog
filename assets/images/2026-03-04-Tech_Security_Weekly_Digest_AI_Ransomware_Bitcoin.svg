    <rect x="10" y="100" width="100" height="22" rx="6" fill="#78350f" opacity="0.8"/>
    <text x="60" y="115" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="12" font-weight="bold" letter-spacing="2">JWT TOKEN</text>
  </g>

