<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>Tech Security Weekly Digest Office Zero</title>
  <!-- Dark Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE CONTENT -->

  <!-- Date Badge at (80, 60) -->
  <rect x="50" y="45" width="220" height="38" rx="19" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
  <text x="160" y="69" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">JANUARY 27, 2026</text>

  <!-- Main Title Line 1: "Tech Security Weekly" at y=185 -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Tech Security Weekly</text>

  <!-- Main Title Line 2: "Digest Office Zero" at y=245 -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#f59e0b">Digest Office Zero</text>

  <!-- Tag Pills at y=430 -->
  <rect x="60" y="415" width="105" height="30" rx="15" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1"/>
  <text x="112" y="435" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#3b82f6" text-anchor="middle">MICROSOFT</text>

  <rect x="180" y="415" width="100" height="30" rx="15" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="230" y="435" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#ef4444" text-anchor="middle">ZERO-DAY</text>

  <rect x="295" y="415" width="110" height="30" rx="15" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="350" y="435" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#f59e0b" text-anchor="middle">SECURITY</text>

  <!-- Footer at y=555 -->
  <text x="320" y="585" font-family="Arial, sans-serif" font-size="13" fill="#888" text-anchor="middle">tech.2twodragon.com</text>

  <!-- RIGHT SIDE VISUAL SCENE (x=650-1150, y=80-550) -->

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Shield with Checkmark (Center-left of right side) -->
  <path d="M 940 140 L 880 185 L 880 310 Q 880 380 940 420 Q 1000 380 1000 310 L 1000 185 Z"
        fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="2.8"/>
  <!-- Checkmark inside shield -->
  <path d="M 905 310 L 925 335 L 960 290"
        fill="none" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>

  <!-- Warning Triangle 1 (Top right) -->
  <path d="M 1090 140 L 1135 210 L 1045 210 Z"
        fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2.2"/>
  <text x="1090" y="200" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#ef4444" text-anchor="middle">!</text>

  <!-- Warning Triangle 2 (Bottom right) -->
  <path d="M 1050 390 L 1095 460 L 1005 460 Z"
        fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2.2"/>
  <text x="1050" y="445" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#f59e0b" text-anchor="middle">!</text>

  <!-- Data Flow Arrow 1: Shield to bottom-right warning -->
  <path d="M 1000 400 Q 1040 430 1050 465"
        fill="none" stroke="#3b82f6" stroke-width="2.4" opacity="0.38" marker-end="url(#arrowBlue)"/>

  <!-- Data Flow Arrow 2: Circular flow on left side -->
  <path d="M 880 230 Q 790 190 740 260"
        fill="none" stroke="#f59e0b" stroke-width="2.4" opacity="0.38" marker-end="url(#arrowOrange)"/>

  <!-- Data Flow Arrow 3: Incoming threat from top-left -->
  <path d="M 710 130 L 890 210"
        fill="none" stroke="#ef4444" stroke-width="2.4" opacity="0.38" marker-end="url(#arrowRed)"/>

  <!-- Network/Data Nodes -->
  <circle cx="730" cy="150" r="11" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.8"/>
  <circle cx="770" cy="280" r="11" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.8"/>
  <circle cx="1040" cy="510" r="11" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.8"/>

  <!-- Connector Lines Between Nodes -->
  <line x1="745" y1="160" x2="770" y2="268" stroke="#3b82f6" stroke-width="1.8" opacity="0.26"/>
  <line x1="785" y1="290" x2="1025" y2="500" stroke="#f59e0b" stroke-width="1.8" opacity="0.26"/>

  <!-- Alert Threat Bars (Vertical waveform) -->
  <rect x="715" y="490" width="3" height="40" fill="#ef4444" opacity="0.38"/>
  <rect x="727" y="478" width="3" height="52" fill="#ef4444" opacity="0.38"/>
  <rect x="739" y="495" width="3" height="35" fill="#ef4444" opacity="0.38"/>
  <rect x="751" y="468" width="3" height="62" fill="#ef4444" opacity="0.38"/>
  <rect x="763" y="505" width="3" height="25" fill="#ef4444" opacity="0.38"/>

  <!-- Security Layer Indicators (Horizontal lines - bottom right) -->
  <rect x="820" y="510" width="85" height="2.2" fill="#3b82f6" opacity="0.30"/>
  <rect x="820" y="527" width="72" height="2.2" fill="#3b82f6" opacity="0.30"/>
  <rect x="820" y="544" width="58" height="2.2" fill="#3b82f6" opacity="0.30"/>
</svg>