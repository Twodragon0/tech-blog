<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Amazon Q Developer and GitHub Advanced Security</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#12061a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- AI Brain icon (Amazon Q) -->
  <circle cx="990" cy="180" r="45" fill="rgba(168,85,247,0.06)" stroke="rgba(168,85,247,0.25)" stroke-width="1.5"/>
  <circle cx="975" cy="170" r="5" fill="rgba(168,85,247,0.2)"/>
  <circle cx="1005" cy="170" r="5" fill="rgba(168,85,247,0.2)"/>
  <path d="M972,190 Q990,205 1008,190" fill="none" stroke="rgba(168,85,247,0.25)" stroke-width="1.5"/>
  <!-- Neural connections -->
  <line x1="950" y1="155" x2="930" y2="135" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <line x1="1030" y1="155" x2="1050" y2="135" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <line x1="1035" y1="190" x2="1060" y2="200" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <circle cx="930" cy="135" r="3" fill="rgba(168,85,247,0.2)"/>
  <circle cx="1050" cy="135" r="3" fill="rgba(168,85,247,0.2)"/>
  <circle cx="1060" cy="200" r="3" fill="rgba(168,85,247,0.2)"/>
  <!-- Code scanning icon -->
  <rect x="940" y="270" width="100" height="80" rx="6" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="955" y="300" font-family="monospace" font-size="11" fill="rgba(59,130,246,0.3)">&lt;/&gt;</text>
  <line x1="955" y1="315" x2="1025" y2="315" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <line x1="955" y1="330" x2="1010" y2="330" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <line x1="955" y1="345" x2="1020" y2="345" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="180" height="32" rx="4" fill="rgba(168,85,247,0.2)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>
  <text x="170" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">MAY 24, 2025</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Amazon Q Developer</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">GitHub Security</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">AI Code Security | SAST/SCA | DevSecOps</text>
