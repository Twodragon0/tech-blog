<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left side content -->
  <!-- Title line 1 -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-0.5">
    Tech Security Weekly
  </text>

  <!-- Title line 2 -->
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-0.5">
    Digest Ransomware Data
  </text>

  <!-- Date badge -->
  <rect x="60" y="300" width="280" height="48" rx="8" fill="#1a1d2e" stroke="#e74c3c" stroke-width="2"/>
  <text x="70" y="331" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#e74c3c">
    FEBRUARY 8, 2026
  </text>

  <!-- Tag pills -->
  <g>
    <!-- Tag 1 -->
    <rect x="60" y="420" width="100" height="36" rx="18" fill="#2a2d3e" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="110" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#00d4ff" text-anchor="middle">
      Ransomware
    </text>

    <!-- Tag 2 -->
    <rect x="190" y="420" width="80" height="36" rx="18" fill="#2a2d3e" stroke="#f39c12" stroke-width="1.5"/>
    <text x="230" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f39c12" text-anchor="middle">
      Data Loss
    </text>

    <!-- Tag 3 -->
    <rect x="300" y="420" width="70" height="36" rx="18" fill="#2a2d3e" stroke="#27ae60" stroke-width="1.5"/>
    <text x="335" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#27ae60" text-anchor="middle">
      Security
    </text>
  </g>

  <!-- Footer -->
  <text x="60" y="595" font-family="Arial, sans-serif" font-size="13" fill="#8892a0" letter-spacing="0.5">
    tech.2twodragon.com
  </text>

  <!-- Right side illustration: Ransomware attack visualization -->
  <g>
    <!-- Background accent -->
    <rect x="700" y="50" width="450" height="530" rx="12" fill="#0f1120" opacity="0.6"/>

    <!-- Central padlock (large, compromised) -->
    <g>
      <!-- Shackle (broken) -->
      <path d="M 850 200 Q 850 140 920 140 Q 990 140 990 200" stroke="#e74c3c" stroke-width="18" fill="none" stroke-linecap="round"/>
      <line x1="920" y1="140" x2="880" y2="160" stroke="#e74c3c" stroke-width="16" stroke-linecap="round"/>

      <!-- Body of lock -->
      <rect x="820" y="220" width="140" height="140" rx="8" fill="none" stroke="#e74c3c" stroke-width="16"/>

      <!-- Lock keyhole -->
      <circle cx="890" cy="285" r="8" fill="none" stroke="#e74c3c" stroke-width="3"/>
      <rect x="883" y="295" width="14" height="20" rx="2" fill="none" stroke="#e74c3c" stroke-width="3"/>
    </g>

    <!-- Encrypted files (folders with locks) -->
    <g>
      <!-- File 1 -->
      <rect x="720" y="280" width="70" height="90" rx="4" fill="#1a2238" stroke="#3498db" stroke-width="2"/>
      <polygon points="720,280 770,280 770,310 790,310 790,280" fill="#2a3248"/>
      <rect x="730" y="340" width="50" height="6" rx="2" fill="#3498db" opacity="0.6"/>
      <rect x="730" y="352" width="40" height="5" rx="2" fill="#3498db" opacity="0.4"/>
      <circle cx="760" cy="315" r="12" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
      <line x1="754" y1="309" x2="766" y2="321" stroke="#e74c3c" stroke-width="2.5"/>

      <!-- File 2 -->
      <rect x="1050" y="320" width="70" height="90" rx="4" fill="#1a2238" stroke="#3498db" stroke-width="2"/>
      <polygon points="1050,320 1100,320 1100,350 1120,350 1120,320" fill="#2a3248"/>
      <rect x="1060" y="380" width="50" height="6" rx="2" fill="#3498db" opacity="0.6"/>
      <rect x="1060" y="392" width="40" height="5" rx="2" fill="#3498db" opacity="0.4"/>
      <circle cx="1090" cy="355" r="12" fill="none" stroke="#e74c3c" stroke-width="2.5"/>
      <line x1="1084" y1="349" x2="1096" y2="361" stroke="#e74c3c" stroke-width="2.5"/>
    </g>

    <!-- Connecting attack lines (digital flow) -->
    <g stroke="#e74c3c" stroke-width="2" opacity="0.7">
      <!-- Lines from lock to files -->
      <path d="M 900 360 Q 880 340 790 370" fill="none" stroke-dasharray="4,4"/>
      <path d="M 920 370 Q 1000 350 1050 365" fill="none" stroke-dasharray="4,4"/>
    </g>

    <!-- Warning indicator dots -->
    <g fill="#f39c12">
      <circle cx="745" cy="420" r="4"/>
      <circle cx="1065" cy="445" r="4"/>
      <circle cx="920" cy="470" r="4"/>
    </g>

    <!-- Binary code/data stream effect -->
    <g fill="#00d4ff" opacity="0.5" font-family="monospace" font-size="12">
      <text x="730" y="510">101010101010</text>
      <text x="1000" y="495">11001100</text>
      <text x="880" y="535">10101010</text>
    </g>

    <!-- Alert/danger badge -->
    <g>
      <circle cx="1070" cy="150" r="35" fill="#e74c3c"/>
      <text x="1070" y="165" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">!</text>
    </g>

    <!-- Encrypted data indicator (chains) -->
    <g stroke="#f39c12" stroke-width="2.5" fill="none" opacity="0.6">
      <line x1="800" y1="480" x2="950" y2="480"/>
      <circle cx="820" cy="480" r="4" fill="#f39c12"/>
      <circle cx="850" cy="480" r="4" fill="#f39c12"/>
      <circle cx="880" cy="480" r="4" fill="#f39c12"/>
      <circle cx="910" cy="480" r="4" fill="#f39c12"/>
    </g>
  </g>
</svg>