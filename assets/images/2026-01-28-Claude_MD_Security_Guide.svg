<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Claude MD Security Guide</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cc2266;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4422aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4422aa;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#cc2266;stop-opacity:0.06" />
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#2244cc;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Claude MD Security icon -->
  <!-- Outer shield shape -->
  <path d="M1010,140 L1100,165 L1100,240 Q1100,310 1010,340 Q920,310 920,240 L920,165 Z" fill="url(#shieldGrad)" stroke="rgba(255,80,80,0.28)" stroke-width="1.5"/>
  <!-- Inner shield ring -->
  <path d="M1010,158 L1084,178 L1084,242 Q1084,300 1010,324 Q936,300 936,242 L936,178 Z" fill="none" stroke="rgba(255,80,80,0.18)" stroke-width="1"/>

  <!-- Document icon inside shield -->
  <rect x="978" y="188" width="64" height="80" rx="5" fill="url(#docGrad)" stroke="rgba(100,160,255,0.30)" stroke-width="1.2"/>
  <!-- Document fold corner -->
  <path d="M1026,188 L1042,204 L1026,204 Z" fill="rgba(100,160,255,0.15)" stroke="rgba(100,160,255,0.25)" stroke-width="0.8"/>
  <!-- Document lines -->
  <line x1="988" y1="218" x2="1032" y2="218" stroke="rgba(180,210,255,0.35)" stroke-width="1.5"/>
  <line x1="988" y1="230" x2="1032" y2="230" stroke="rgba(180,210,255,0.25)" stroke-width="1.5"/>
  <line x1="988" y1="242" x2="1020" y2="242" stroke="rgba(180,210,255,0.20)" stroke-width="1.5"/>

  <!-- Lock symbol over document -->
  <rect x="998" y="254" width="24" height="18" rx="3" fill="rgba(255,80,80,0.18)" stroke="rgba(255,100,100,0.40)" stroke-width="1.2"/>
  <path d="M1003,254 Q1003,244 1010,244 Q1017,244 1017,254" fill="none" stroke="rgba(255,100,100,0.38)" stroke-width="1.5"/>
  <circle cx="1010" cy="262" r="2.5" fill="rgba(255,120,120,0.60)"/>

  <!-- MD text label -->
  <text x="992" y="207" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="rgba(100,180,255,0.55)">.MD</text>

  <!-- Orbiting circuit nodes -->
  <circle cx="920" cy="195" r="5" fill="rgba(255,80,80,0.12)" stroke="rgba(255,80,80,0.35)" stroke-width="1"/>
  <circle cx="1100" cy="290" r="5" fill="rgba(100,160,255,0.12)" stroke="rgba(100,160,255,0.35)" stroke-width="1"/>
  <circle cx="960" cy="330" r="4" fill="rgba(204,34,102,0.10)" stroke="rgba(204,34,102,0.30)" stroke-width="1"/>
  <circle cx="1060" cy="152" r="4" fill="rgba(255,80,80,0.10)" stroke="rgba(255,80,80,0.28)" stroke-width="1"/>

  <!-- Connector lines from nodes -->
  <line x1="925" y1="195" x2="936" y2="205" stroke="rgba(255,80,80,0.18)" stroke-width="1"/>
  <line x1="1095" y1="290" x2="1084" y2="278" stroke="rgba(100,160,255,0.18)" stroke-width="1"/>
  <line x1="963" y1="326" x2="960" y2="310" stroke="rgba(204,34,102,0.18)" stroke-width="1"/>
  <line x1="1057" y1="156" x2="1042" y2="168" stroke="rgba(255,80,80,0.18)" stroke-width="1"/>

  <!-- Scan arc effect around shield -->
  <path d="M895,230 A120,120 0 0 1 1010,120" fill="none" stroke="rgba(255,80,80,0.10)" stroke-width="1" stroke-dasharray="4,6"/>
  <path d="M1125,230 A120,120 0 0 0 1010,120" fill="none" stroke="rgba(100,160,255,0.08)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.55)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(255,160,60,0.50)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(100,160,255,0.50)" filter="url(#glow)"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.022)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="240" height="32" rx="4" fill="rgba(255,68,68,0.12)" stroke="rgba(255,68,68,0.25)" stroke-width="1"/>
  <text x="96" y="81" font-family="'Courier New',monospace" font-size="12" font-weight="600" fill="rgba(255,120,120,0.90)" letter-spacing="1.5">JANUARY 28, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Claude</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">MD Security</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(200,200,220,0.70)">Configuration security &amp; policy hardening</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial',sans-serif" font-size="14" font-weight="600" fill="rgba(255,100,100,0.75)" letter-spacing="2.5">SECURITY / DEVSECOPS / AI SAFETY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(255,50,50,0.14)" stroke="rgba(255,80,80,0.32)" stroke-width="1"/>
  <text x="140" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,130,130,0.90)" text-anchor="middle">AI Security</text>

  <rect x="218" y="402" width="130" height="36" rx="18" fill="rgba(255,160,30,0.12)" stroke="rgba(255,180,60,0.28)" stroke-width="1"/>
  <text x="283" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,200,100,0.88)" text-anchor="middle">Config Policy</text>

  <rect x="366" y="402" width="130" height="36" rx="18" fill="rgba(60,120,255,0.12)" stroke="rgba(100,160,255,0.28)" stroke-width="1"/>
  <text x="431" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(130,180,255,0.88)" text-anchor="middle">Compliance</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Arial',sans-serif" font-size="14" fill="rgba(180,180,200,0.45)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,100,100,0.45)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>