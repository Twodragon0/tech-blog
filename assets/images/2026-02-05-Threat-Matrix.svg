  <line x1="880" y1="120" x2="880" y2="420" stroke="rgba(142,68,173,0.2)" stroke-width="1"/>
  <line x1="940" y1="120" x2="940" y2="420" stroke="rgba(142,68,173,0.2)" stroke-width="1"/>
  <line x1="1000" y1="120" x2="1000" y2="420" stroke="rgba(142,68,173,0.2)" stroke-width="1"/>
  <line x1="1060" y1="120" x2="1060" y2="420" stroke="rgba(142,68,173,0.2)" stroke-width="1"/>
  <line x1="820" y1="180" x2="1120" y2="180" stroke="rgba(142,68,173,0.2)" stroke-width="1"/>
  <line x1="820" y1="240" x2="1120" y2="240" stroke="rgba(142,68,173,0.2)" stroke-width="1"/>
