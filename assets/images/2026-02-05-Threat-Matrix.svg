  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(142,68,173,0.25)"/>
  <text x="180" y="81" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">FEBRUARY 5, 2026</text>
