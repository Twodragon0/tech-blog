  <text x="247" y="344" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Summary</text>
  <rect x="372" y="318" width="220" height="42" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="482" y="344" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Introduction</text>
  <rect x="607" y="318" width="220" height="42" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="717" y="344" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Architecture</text>
  <rect x="842" y="318" width="220" height="42" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="952" y="344" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">NLB</text>
  <rect x="60" y="390" width="1080" height="95" rx="12" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="75" y="412" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Infrastructure</text>
  <rect x="137" y="428" width="220" height="42" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  <text x="247" y="454" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Data</text>
  <rect x="372" y="428" width="220" height="42" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  <text x="482" y="454" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Network Load Balancer</text>
  <rect x="607" y="428" width="220" height="42" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  <text x="717" y="454" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">VPC Flow Logs</text>
  <rect x="842" y="428" width="220" height="42" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  <text x="952" y="454" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Data</text>

  <!-- Connectors -->
  <line x1="400" y1="265" x2="400" y2="280" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="396,276 404,276 400,280" fill="#475569"/>
  <line x1="600" y1="265" x2="600" y2="280" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="596,276 604,276 600,280" fill="#475569"/>
