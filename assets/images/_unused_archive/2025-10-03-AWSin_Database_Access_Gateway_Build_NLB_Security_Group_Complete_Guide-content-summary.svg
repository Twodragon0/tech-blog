  <line x1="800" y1="375" x2="800" y2="390" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="796,386 804,386 800,390" fill="#475569"/>

  <!-- Tags -->
  <rect x="60" y="510" width="46" height="24" rx="12" fill="#34d399" fill-opacity="0.15"/>
  <text x="83" y="526" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">#AWS</text>
  <rect x="114" y="510" width="46" height="24" rx="12" fill="#34d399" fill-opacity="0.15"/>
  <text x="137" y="526" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">#NLB</text>
  <rect x="168" y="510" width="123" height="24" rx="12" fill="#34d399" fill-opacity="0.15"/>
  <text x="229" y="526" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">#Security-Group</text>
  <rect x="299" y="510" width="81" height="24" rx="12" fill="#34d399" fill-opacity="0.15"/>
  <text x="339" y="526" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">#Database</text>
  <rect x="388" y="510" width="74" height="24" rx="12" fill="#34d399" fill-opacity="0.15"/>
  <text x="425" y="526" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">#Network</text>

  <!-- Footer -->
  <line x1="50" y1="565" x2="1150" y2="565" stroke="#334155" stroke-width="1"/>
  <text x="60" y="593" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Twodragon Tech Blog</text>
  <text x="60" y="615" font-family="Arial, sans-serif" font-size="13" fill="#64748b">tech.2twodragon.com</text>
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">DevSecOps | Cloud | Security</text>
