<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="catGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient circles -->
  <circle cx="100" cy="100" r="200" fill="#34d399" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#8b5cf6" fill-opacity="0.05"/>
  <circle cx="600" cy="315" r="300" fill="#10b981" fill-opacity="0.03"/>
  <!-- Top badges -->
  <rect x="40" y="30" width="180" height="36" rx="18" fill="url(#catGradient)" filter="url(#shadow)"/>
  <text x="130" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">CLOUD</text>

  <rect x="980" y="30" width="180" height="36" rx="18" fill="url(#accentGradient)" filter="url(#shadow)"/>
  <text x="1070" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">October 03, 2025</text>
  <!-- Title -->
  <text x="600" y="105" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">CLOUD: AWS NLB Security Group</text>
  <text x="600" y="135" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">AI | AWS | Claude | Cursor | DevOps</text>
  <rect x="350" y="150" width="500" height="3" fill="url(#accentGradient)" rx="1.5"/>

  <!-- Architecture layers -->
  <rect x="60" y="170" width="1080" height="95" rx="12" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="75" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8b5cf6">Control Plane</text>
  <rect x="137" y="208" width="220" height="42" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="247" y="234" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Security Group</text>
  <rect x="372" y="208" width="220" height="42" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="482" y="234" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Security Group</text>
  <rect x="607" y="208" width="220" height="42" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="717" y="234" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">NLB Security Group</text>
  <rect x="842" y="208" width="220" height="42" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <text x="952" y="234" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Security Group</text>
  <rect x="60" y="280" width="1080" height="95" rx="12" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="75" y="302" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3b82f6">Services</text>
