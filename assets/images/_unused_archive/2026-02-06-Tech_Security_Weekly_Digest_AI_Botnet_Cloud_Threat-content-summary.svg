<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="catGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient circles -->
  <circle cx="100" cy="100" r="200" fill="#ef4444" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#8b5cf6" fill-opacity="0.05"/>
  <circle cx="600" cy="315" r="300" fill="#dc2626" fill-opacity="0.03"/>
  <!-- Top badges -->
  <rect x="40" y="30" width="180" height="36" rx="18" fill="url(#catGradient)" filter="url(#shadow)"/>
  <text x="130" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SECURITY</text>

  <rect x="980" y="30" width="180" height="36" rx="18" fill="url(#accentGradient)" filter="url(#shadow)"/>
  <text x="1070" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">February 06, 2026</text>
  <!-- Title -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">SECURITY: CrashFix Python RAT AISURU Tbps</text>
  <text x="600" y="145" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">AI | Botnet | CrashFix | DDoS | DevSecOps</text>
  <rect x="350" y="160" width="500" height="3" fill="url(#accentGradient)" rx="1.5"/>

  <!-- Highlight cards -->
  <rect x="200" y="185" width="250" height="200" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <rect x="200" y="185" width="250" height="5" rx="3" fill="#ef4444"/>
  <circle cx="325" cy="235" r="24" fill="#ef4444" fill-opacity="0.15"/>
  <text x="325" y="241" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle">01</text>
  <text x="325" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Summary</text>
  <rect x="475" y="185" width="250" height="200" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <rect x="475" y="185" width="250" height="5" rx="3" fill="#3b82f6"/>
  <circle cx="600" cy="235" r="24" fill="#3b82f6" fill-opacity="0.15"/>
  <text x="600" y="241" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6" text-anchor="middle">02</text>
  <text x="600" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Update 2</text>
  <text x="600" y="310" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">See details in the full post</text>
  <rect x="750" y="185" width="250" height="200" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <rect x="750" y="185" width="250" height="5" rx="3" fill="#10b981"/>
  <circle cx="875" cy="235" r="24" fill="#10b981" fill-opacity="0.15"/>
  <text x="875" y="241" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">03</text>
  <text x="875" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Update 3</text>
  <text x="875" y="310" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">See details in the full post</text>

  <!-- Tags -->
  <rect x="200" y="410" width="130" height="24" rx="12" fill="#ef4444" fill-opacity="0.15"/>
  <text x="265" y="426" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">#Security-Weekly</text>
  <rect x="338" y="410" width="88" height="24" rx="12" fill="#ef4444" fill-opacity="0.15"/>
  <text x="382" y="426" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">#DevSecOps</text>
  <rect x="434" y="410" width="123" height="24" rx="12" fill="#ef4444" fill-opacity="0.15"/>
  <text x="495" y="426" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">#Cloud-Security</text>
  <rect x="565" y="410" width="116" height="24" rx="12" fill="#ef4444" fill-opacity="0.15"/>
  <text x="623" y="426" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">#Weekly-Digest</text>
  <rect x="689" y="410" width="53" height="24" rx="12" fill="#ef4444" fill-opacity="0.15"/>
  <text x="715" y="426" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">#2026</text>
  <rect x="750" y="410" width="39" height="24" rx="12" fill="#ef4444" fill-opacity="0.15"/>
  <text x="769" y="426" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">#AI</text>

  <!-- Footer -->
  <line x1="50" y1="565" x2="1150" y2="565" stroke="#334155" stroke-width="1"/>
  <text x="60" y="593" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Twodragon Tech Blog</text>
  <text x="60" y="615" font-family="Arial, sans-serif" font-size="13" fill="#64748b">tech.2twodragon.com</text>
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">DevSecOps | Cloud | Security</text>
</svg>