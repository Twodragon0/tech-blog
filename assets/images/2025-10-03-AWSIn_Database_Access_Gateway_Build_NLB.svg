<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>AWSIn Database Access Gateway Build NLB</title>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1428;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nlbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a88d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0068d6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadowFilter">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative grid pattern (subtle) -->
  <g opacity="0.05" stroke="#00ff00" stroke-width="1">
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="850" y1="0" x2="850" y2="630"/>
    <line x1="950" y1="0" x2="950" y2="630"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="430" x2="1200" y2="430"/>
  </g>

  <!-- LEFT SIDE: Title and Metadata -->
  <g>
    <!-- Title Line 1 -->
    <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="0.5">
      AWSIn Database
    </text>

    <!-- Title Line 2 -->
    <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="0.5">
      Access Gateway NLB
    </text>

    <!-- Date Badge -->
    <rect x="50" y="290" width="240" height="32" rx="4" fill="#1a3a4d" opacity="0.8"/>
    <text x="130" y="312" font-family="Arial, sans-serif" font-size="13" fill="#4db8ff" font-weight="600">
      OCTOBER 3, 2025
    </text>

    <!-- Tag Pills -->
    <g y="420">
      <!-- Tag 1: AWS -->
      <rect x="50" y="420" width="70" height="28" rx="14" fill="#ff9900" opacity="0.15" stroke="#ff9900" stroke-width="1.5"/>
      <text x="85" y="440" font-family="Arial, sans-serif" font-size="11" fill="#ff9900" font-weight="600" text-anchor="middle">
        AWS
      </text>

      <!-- Tag 2: NLB -->
      <rect x="130" y="420" width="70" height="28" rx="14" fill="#1a88d9" opacity="0.15" stroke="#1a88d9" stroke-width="1.5"/>
      <text x="165" y="440" font-family="Arial, sans-serif" font-size="11" fill="#1a88d9" font-weight="600" text-anchor="middle">
        NLB
      </text>

      <!-- Tag 3: Database -->
      <rect x="210" y="420" width="100" height="28" rx="14" fill="#00cc88" opacity="0.15" stroke="#00cc88" stroke-width="1.5"/>
      <text x="260" y="440" font-family="Arial, sans-serif" font-size="11" fill="#00cc88" font-weight="600" text-anchor="middle">
        Database
      </text>
    </g>

    <!-- Footer -->
    <text x="50" y="605" font-family="Arial, sans-serif" font-size="12" fill="#666666" opacity="0.8">
      tech.2twodragon.com
    </text>
  </g>

  <!-- RIGHT SIDE: Illustration -->
  <g>
    <!-- Client connections (top) -->
    <circle cx="750" cy="80" r="20" fill="none" stroke="#4db8ff" stroke-width="2" opacity="0.8"/>
    <circle cx="900" cy="60" r="18" fill="none" stroke="#4db8ff" stroke-width="2" opacity="0.6"/>
    <circle cx="1050" cy="80" r="18" fill="none" stroke="#4db8ff" stroke-width="2" opacity="0.6"/>

    <!-- Connection lines from clients -->
    <line x1="750" y1="100" x2="850" y2="160" stroke="#4db8ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>
    <line x1="900" y1="78" x2="880" y2="160" stroke="#4db8ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>
    <line x1="1050" y1="98" x2="920" y2="160" stroke="#4db8ff" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>

    <!-- Network Load Balancer (Center) -->
    <g filter="url(#shadowFilter)">
      <!-- NLB Shield -->
      <path d="M 850 160 L 820 160 L 820 200 Q 820 230 850 240 Q 880 230 880 200 L 880 160 Z" fill="url(#nlbGradient)" opacity="0.9"/>

      <!-- NLB Icon -->
      <circle cx="850" cy="185" r="12" fill="white" opacity="0.9"/>
      <path d="M 850 178 L 857 185 L 850 192 M 843 185 L 850 192 L 857 185" stroke="white" stroke-width="1.5" fill="none" opacity="0.8"/>

      <!-- NLB Label -->
      <text x="850" y="275" font-family="Arial, sans-serif" font-size="12" fill="#ff9900" font-weight="bold" text-anchor="middle">
        NLB
      </text>
      <text x="850" y="292" font-family="Arial, sans-serif" font-size="10" fill="#ffcc99" text-anchor="middle" opacity="0.8">
        Load Balancer
      </text>
    </g>

    <!-- Gateway layer (middle) -->
    <g filter="url(#shadowFilter)">
      <!-- Gateway box -->
      <rect x="780" y="320" width="140" height="80" rx="8" fill="#1a4d5c" stroke="#00cc88" stroke-width="2" opacity="0.9"/>

      <!-- Gateway icon (key/lock) -->
      <circle cx="820" cy="345" r="12" fill="none" stroke="#00cc88" stroke-width="2"/>
      <rect x="835" y="340" width="30" height="10" rx="2" fill="none" stroke="#00cc88" stroke-width="1.5"/>
      <circle cx="867" cy="345" r="3" fill="#00cc88"/>

      <!-- Gateway label -->
      <text x="850" y="390" font-family="Arial, sans-serif" font-size="11" fill="#00cc88" font-weight="bold" text-anchor="middle">
        Access Gateway
      </text>
    </g>

    <!-- Connection from NLB to Gateway -->
    <line x1="850" y1="240" x2="850" y2="320" stroke="#ff9900" stroke-width="2.5" opacity="0.7" marker-end="url(#arrowhead)"/>

    <!-- Database cluster (right bottom) -->
    <g filter="url(#shadowFilter)">
      <!-- Main Database -->
      <ellipse cx="980" cy="460" rx="35" ry="45" fill="url(#dbGradient)" opacity="0.9"/>
      <ellipse cx="980" cy="420" rx="35" ry="12" fill="#1a88d9" opacity="0.6"/>
      <path d="M 945 420 Q 945 435 980 450 Q 1015 435 1015 420" fill="#0068d6" opacity="0.7"/>

      <!-- Database glow -->
      <ellipse cx="980" cy="460" rx="40" ry="50" fill="none" stroke="#1a88d9" stroke-width="1" opacity="0.4"/>

      <!-- DB Label -->
      <text x="980" y="485" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold" text-anchor="middle">
        Database
      </text>

      <!-- Replica databases -->
      <ellipse cx="900" cy="500" rx="20" ry="28" fill="#0068d6" opacity="0.6"/>
      <ellipse cx="1060" cy="500" rx="20" ry="28" fill="#0068d6" opacity="0.6"/>

      <!-- Replica labels -->
      <text x="900" y="520" font-family="Arial, sans-serif" font-size="9" fill="#4db8ff" text-anchor="middle">
        Replica
      </text>
      <text x="1060" y="520" font-family="Arial, sans-serif" font-size="9" fill="#4db8ff" text-anchor="middle">
        Replica
      </text>
    </g>

    <!-- Connection from Gateway to Databases -->
    <line x1="830" y1="380" x2="920" y2="450" stroke="#00cc88" stroke-width="2" opacity="0.6"/>
    <line x1="850" y1="400" x2="980" y2="415" stroke="#00cc88" stroke-width="2.5" opacity="0.7" marker-end="url(#arrowhead2)"/>
    <line x1="870" y1="380" x2="1020" y2="450" stroke="#00cc88" stroke-width="2" opacity="0.6"/>

    <!-- Security shield overlay (top right) -->
    <g opacity="0.6">
      <path d="M 1070 100 L 1100 100 L 1100 135 Q 1100 150 1085 160 Q 1070 150 1070 135 Z" fill="none" stroke="#00ff00" stroke-width="2"/>
      <text x="1085" y="138" font-family="Arial, sans-serif" font-size="16" fill="#00ff00" font-weight="bold" text-anchor="middle">
        ✓
      </text>
    </g>

    <!-- Decorative connection nodes -->
    <circle cx="920" cy="240" r="4" fill="#ff9900" opacity="0.6"/>
    <circle cx="820" cy="260" r="4" fill="#ff9900" opacity="0.6"/>
    <circle cx="950" cy="350" r="4" fill="#00cc88" opacity="0.6"/>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff9900" opacity="0.7"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00cc88" opacity="0.7"/>
    </marker>
  </defs>
</svg>