<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security Course 8Batch 7Week Docker Kubernetes Security Practical Guide</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a20"/>
      <stop offset="100%" style="stop-color:#153040"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2496ed"/>
      <stop offset="100%" style="stop-color:#326ce5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- Docker whale container -->
  <rect x="848" y="268" width="110" height="80" rx="8" fill="rgba(36,150,237,0.12)" stroke="rgba(36,150,237,0.5)" stroke-width="2"/>
  <!-- Container layers inside Docker box -->
  <rect x="860" y="280" width="86" height="14" rx="3" fill="rgba(36,150,237,0.3)"/>
  <rect x="860" y="298" width="86" height="14" rx="3" fill="rgba(36,150,237,0.25)"/>
  <rect x="860" y="316" width="86" height="14" rx="3" fill="rgba(36,150,237,0.2)"/>
  <!-- Security lock on Docker -->
  <circle cx="903" cy="362" r="12" fill="rgba(36,150,237,0.2)" stroke="rgba(36,150,237,0.65)" stroke-width="1.5"/>
  <path d="M898 362 Q898 354 903 354 Q908 354 908 362" fill="none" stroke="rgba(36,150,237,0.8)" stroke-width="1.8"/>
  <!-- Arrow Docker to K8s -->
  <line x1="958" y1="308" x2="1005" y2="308" stroke="rgba(50,108,229,0.5)" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="1005,303 1017,308 1005,313" fill="rgba(50,108,229,0.65)"/>
  <!-- K8s pod hexagons -->
  <polygon points="1060,272 1082,284 1082,308 1060,320 1038,308 1038,284" fill="rgba(50,108,229,0.15)" stroke="rgba(50,108,229,0.55)" stroke-width="1.8"/>
  <polygon points="1115,272 1137,284 1137,308 1115,320 1093,308 1093,284" fill="rgba(50,108,229,0.15)" stroke="rgba(50,108,229,0.55)" stroke-width="1.8"/>
  <polygon points="1060,332 1082,344 1082,368 1060,380 1038,368 1038,344" fill="rgba(50,108,229,0.12)" stroke="rgba(50,108,229,0.45)" stroke-width="1.8"/>
  <polygon points="1115,332 1137,344 1137,368 1115,380 1093,368 1093,344" fill="rgba(50,108,229,0.12)" stroke="rgba(50,108,229,0.45)" stroke-width="1.8"/>
  <!-- Security locks on K8s pods -->
  <circle cx="1060" cy="296" r="7" fill="rgba(50,108,229,0.5)" stroke="rgba(50,108,229,0.8)" stroke-width="1"/>
  <circle cx="1115" cy="296" r="7" fill="rgba(50,108,229,0.5)" stroke="rgba(50,108,229,0.8)" stroke-width="1"/>
  <!-- Network policy shield overlay -->
  <path d="M1088 250 L1068 260 L1068 285 Q1068 298 1088 304 Q1108 298 1108 285 L1108 260 Z" fill="rgba(36,150,237,0.12)" stroke="rgba(36,150,237,0.4)" stroke-width="1.5"/>
