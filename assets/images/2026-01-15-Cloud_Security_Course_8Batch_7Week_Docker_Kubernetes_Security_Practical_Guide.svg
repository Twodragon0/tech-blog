  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="#ffffff">Week 7: Docker and K8s</text>
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="rgba(255,255,255,0.65)">Docker container and Kubernetes security practical guide</text>
  <rect x="80" y="325" width="420" height="3" fill="url(#accent)" rx="2"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" letter-spacing="2">CLOUD SECURITY COURSE</text>
  <rect x="80" y="402" width="88" height="36" rx="18" fill="rgba(36,150,237,0.14)" stroke="rgba(36,150,237,0.4)" stroke-width="1"/>
  <text x="124" y="425" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.82)" text-anchor="middle">Docker</text>
  <rect x="183" y="402" width="118" height="36" rx="18" fill="rgba(50,108,229,0.14)" stroke="rgba(50,108,229,0.4)" stroke-width="1"/>
  <text x="242" y="425" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.82)" text-anchor="middle">K8s Security</text>
  <rect x="316" y="402" width="88" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="360" y="425" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.82)" text-anchor="middle">Week 7</text>
  <rect x="0" y="520" width="1200" height="110" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="545" font-family="Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.5)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">DevSecOps</text>
