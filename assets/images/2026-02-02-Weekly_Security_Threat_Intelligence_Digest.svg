<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020d0a"/>
      <stop offset="50%" style="stop-color:#071a10"/>
      <stop offset="100%" style="stop-color:#0d0a1a"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2a1a"/>
      <stop offset="100%" style="stop-color:#1a3a20"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e" stop-opacity="0.9"/>
      <stop offset="100%" style="stop-color:#16a34a" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="amb1"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="amb2"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#22c55e" flood-opacity="0.15"/>
    </filter>
    <clipPath id="globeClip">
      <circle cx="600" cy="240" r="115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="150" r="180" fill="#22c55e" opacity="0.04" filter="url(#amb1)"/>
  <circle cx="1000" cy="400" r="200" fill="#22c55e" opacity="0.03" filter="url(#amb1)"/>
  <circle cx="600" cy="240" r="250" fill="#22c55e" opacity="0.05" filter="url(#amb2)"/>
  <circle cx="150" cy="500" r="120" fill="#ef4444" opacity="0.04" filter="url(#amb2)"/>
  <circle cx="1050" cy="120" r="100" fill="#ef4444" opacity="0.03" filter="url(#amb2)"/>

  <!-- Floating code fragments -->
  <text x="60" y="120" font-family="monospace" font-size="13" fill="#22c55e" opacity="0.12">ioc_hash: sha256</text>
  <text x="900" y="90" font-family="monospace" font-size="12" fill="#22c55e" opacity="0.10">apt_group: track()</text>
  <text x="80" y="320" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.11">threat_feed.update()</text>
  <text x="950" y="200" font-family="monospace" font-size="12" fill="#22c55e" opacity="0.10">sigma_rule.match()</text>
  <text x="50" y="440" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.10">alert.severity: HIGH</text>
  <text x="980" y="350" font-family="monospace" font-size="11" fill="#ef4444" opacity="0.09">ioc.type: ipv4</text>
  <text x="120" y="200" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.08">mitre.tactic: TA0001</text>
  <text x="870" y="450" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.08">feed.source: otx</text>

  <!-- Globe wireframe illustration -->
  <g transform="translate(600,240)" filter="url(#shadow)">
    <!-- Globe base -->
    <circle cx="0" cy="0" r="115" fill="url(#globeGrad)" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>

    <!-- Latitude lines -->
    <ellipse cx="0" cy="0" rx="115" ry="30" fill="none" stroke="#22c55e" stroke-width="0.6" opacity="0.25"/>
    <ellipse cx="0" cy="-38" rx="107" ry="22" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.2"/>
    <ellipse cx="0" cy="38" rx="107" ry="22" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.2"/>
    <ellipse cx="0" cy="-70" rx="82" ry="14" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.15"/>
    <ellipse cx="0" cy="70" rx="82" ry="14" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.15"/>

    <!-- Longitude lines -->
    <ellipse cx="0" cy="0" rx="40" ry="115" fill="none" stroke="#22c55e" stroke-width="0.6" opacity="0.2"/>
    <ellipse cx="0" cy="0" rx="80" ry="115" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.15"/>
    <line x1="0" y1="-115" x2="0" y2="115" stroke="#22c55e" stroke-width="0.6" opacity="0.2"/>
    <line x1="-115" y1="0" x2="115" y2="0" stroke="#22c55e" stroke-width="0.5" opacity="0.15"/>

    <!-- Threat vectors (red dashed lines hitting globe) -->
    <!-- Top-left attack vector -->
    <line x1="-220" y1="-180" x2="-68" y2="-88" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7" filter="url(#redGlow)"/>
    <polygon points="-68,-88 -82,-96 -72,-76" fill="#ef4444" opacity="0.8"/>
    <!-- Top-right attack vector -->
    <line x1="230" y1="-160" x2="78" y2="-82" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.65" filter="url(#redGlow)"/>
    <polygon points="78,-82 88,-96 68,-78" fill="#ef4444" opacity="0.8"/>
    <!-- Right attack vector -->
    <line x1="270" y1="30" x2="112" y2="18" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6" filter="url(#redGlow)"/>
    <polygon points="112,18 118,5 118,32" fill="#f59e0b" opacity="0.8"/>
    <!-- Bottom-left attack vector -->
    <line x1="-240" y1="120" x2="-72" y2="72" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.55"/>
    <polygon points="-72,72 -85,62 -68,84" fill="#ef4444" opacity="0.7"/>
    <!-- Impact dots on globe surface -->
    <circle cx="-68" cy="-88" r="5" fill="#ef4444" opacity="0.9" filter="url(#redGlow)"/>
    <circle cx="78" cy="-82" r="4" fill="#ef4444" opacity="0.85" filter="url(#redGlow)"/>
    <circle cx="112" cy="18" r="4" fill="#f59e0b" opacity="0.8"/>
    <circle cx="-72" cy="72" r="4" fill="#ef4444" opacity="0.75"/>
    <!-- Ripple effects at impact sites -->
    <circle cx="-68" cy="-88" r="12" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
    <circle cx="-68" cy="-88" r="20" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.2"/>
    <circle cx="78" cy="-82" r="10" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.35"/>

    <!-- Green shield overlay (partial, suggests protection) -->
    <path d="M0,-55 L38,-30 L38,20 Q38,50 0,65 Q-38,50 -38,20 L-38,-30 Z"
          fill="url(#shieldGrad)" opacity="0.18"/>
    <path d="M0,-55 L38,-30 L38,20 Q38,50 0,65 Q-38,50 -38,20 L-38,-30 Z"
          fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.55" filter="url(#greenGlow)"/>
    <!-- Shield checkmark -->
    <polyline points="-16,5 -4,18 20,-12" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.7"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#22c55e" opacity="0.6"/>
  </g>

  <!-- Source node indicators at attack origins -->
  <circle cx="380" cy="60" r="6" fill="#ef4444" opacity="0.6" filter="url(#redGlow)"/>
  <text x="390" y="64" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" opacity="0.6">APT-41</text>
  <circle cx="830" cy="80" r="6" fill="#ef4444" opacity="0.55"/>
  <text x="840" y="84" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" opacity="0.55">Lazarus</text>
  <circle cx="870" cy="270" r="6" fill="#f59e0b" opacity="0.55"/>
  <text x="880" y="274" font-family="Arial,sans-serif" font-size="10" fill="#f59e0b" opacity="0.55">Unknown</text>
  <circle cx="360" cy="360" r="6" fill="#ef4444" opacity="0.5"/>
  <text x="370" y="364" font-family="Arial,sans-serif" font-size="10" fill="#ef4444" opacity="0.5">Cozy Bear</text>

  <!-- Top badges -->
  <rect x="40" y="24" width="172" height="34" rx="17" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1"/>
  <text x="126" y="46" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#22c55e" text-anchor="middle" letter-spacing="1">WEEKLY DIGEST</text>

  <rect x="988" y="24" width="172" height="34" rx="17" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1"/>
  <text x="1074" y="46" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">February 2, 2026</text>

  <!-- Title block -->
  <text x="600" y="490" font-family="Arial,sans-serif" font-size="38" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">Threat Intelligence Hub</text>
  <text x="600" y="523" font-family="Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Global Threat Monitoring  |  APT Tracking  |  IOC Analysis</text>

  <!-- Footer separator + stats -->
  <line x1="40" y1="548" x2="1160" y2="548" stroke="#1e293b" stroke-width="1"/>
  <text x="600" y="570" font-family="monospace" font-size="12" fill="#64748b" text-anchor="middle">18 News  |  5 Security  |  4 AI/ML  |  3 Cloud  |  2 DevOps</text>
  <text x="40" y="610" font-family="Arial,sans-serif" font-size="12" fill="#334155">Threat Intel Weekly</text>
  <text x="1160" y="610" font-family="Arial,sans-serif" font-size="12" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>
