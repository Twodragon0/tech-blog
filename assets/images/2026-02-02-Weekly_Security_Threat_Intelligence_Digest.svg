<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Notepad++ Supply Chain Attack and SK Shielders Report</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1c2333"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(230,126,34,0.04)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(41,128,185,0.04)"/>
  <!-- Package/box with chain links - supply chain concept -->
  <rect x="930" y="260" width="120" height="100" rx="6" fill="rgba(230,126,34,0.15)" stroke="#e67e22" stroke-width="2"/>
  <!-- Box ribbon cross -->
  <line x1="930" y1="310" x2="1050" y2="310" stroke="#e67e22" stroke-width="1.5"/>
  <line x1="990" y1="260" x2="990" y2="360" stroke="#e67e22" stroke-width="1.5"/>
  <!-- Box lid (slightly open, hinting compromise) -->
  <path d="M925 260 L990 240 L1055 260" fill="rgba(230,126,34,0.2)" stroke="#e67e22" stroke-width="1.5"/>
  <!-- Chain links to the right of box -->
  <ellipse cx="1075" cy="310" rx="14" ry="20" fill="none" stroke="rgba(41,128,185,0.6)" stroke-width="2.5"/>
  <ellipse cx="1100" cy="310" rx="14" ry="20" fill="none" stroke="rgba(41,128,185,0.6)" stroke-width="2.5"/>
  <ellipse cx="1125" cy="310" rx="14" ry="20" fill="none" stroke="rgba(41,128,185,0.6)" stroke-width="2.5"/>
  <!-- Broken chain link indicator -->
  <line x1="1087" y1="295" x2="1090" y2="285" stroke="#e74c3c" stroke-width="2"/>
  <line x1="1090" y1="285" x2="1100" y2="288" stroke="#e74c3c" stroke-width="2"/>
  <!-- Small warning on package -->
  <circle cx="990" cy="310" r="18" fill="rgba(231,76,60,0.25)" stroke="#e74c3c" stroke-width="1.5"/>
  <!-- Chain to the left -->
  <ellipse cx="880" cy="310" rx="14" ry="20" fill="none" stroke="rgba(41,128,185,0.4)" stroke-width="2"/>
  <ellipse cx="905" cy="310" rx="14" ry="20" fill="none" stroke="rgba(41,128,185,0.4)" stroke-width="2"/>
  <!-- Small package icons (supply chain nodes) -->
  <rect x="855" y="210" width="40" height="35" rx="3" fill="rgba(41,128,185,0.15)" stroke="rgba(41,128,185,0.4)" stroke-width="1"/>
  <line x1="855" y1="227" x2="895" y2="227" stroke="rgba(41,128,185,0.3)" stroke-width="1"/>
  <line x1="875" y1="210" x2="875" y2="245" stroke="rgba(41,128,185,0.3)" stroke-width="1"/>
  <rect x="1060" y="195" width="40" height="35" rx="3" fill="rgba(41,128,185,0.15)" stroke="rgba(41,128,185,0.4)" stroke-width="1"/>
  <line x1="1060" y1="212" x2="1100" y2="212" stroke="rgba(41,128,185,0.3)" stroke-width="1"/>
  <line x1="1080" y1="195" x2="1080" y2="230" stroke="rgba(41,128,185,0.3)" stroke-width="1"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(230,126,34,0.2)" stroke="rgba(230,126,34,0.4)" stroke-width="1"/>
  <text x="190" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">FEBRUARY 2, 2026</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Supply Chain Attack</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Notepad++ &amp; Report</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">SK Shielders Threat Intel Report and Attack Analysis</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category label -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">SECURITY WEEKLY DIGEST</text>
  <!-- Keyword tags -->
  <rect x="80" y="420" width="140" height="36" rx="18" fill="rgba(230,126,34,0.18)" stroke="rgba(230,126,34,0.4)" stroke-width="1"/>
  <text x="150" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#e67e22" text-anchor="middle" font-weight="600">Supply Chain</text>
  <rect x="238" y="420" width="120" height="36" rx="18" fill="rgba(41,128,185,0.18)" stroke="rgba(41,128,185,0.4)" stroke-width="1"/>
  <text x="298" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#2980b9" text-anchor="middle" font-weight="600">Notepad++</text>
  <rect x="376" y="420" width="130" height="36" rx="18" fill="rgba(230,126,34,0.18)" stroke="rgba(230,126,34,0.4)" stroke-width="1"/>
  <text x="441" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#e67e22" text-anchor="middle" font-weight="600">Threat Intel</text>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
