  <rect x="248" y="44" width="128" height="34" rx="17" fill="#4a9eff" opacity="0.12" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="312" y="66" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">SECURITY</text>
