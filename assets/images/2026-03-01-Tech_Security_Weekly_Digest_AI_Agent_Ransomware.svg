    <circle cx="209" cy="189" r="5" fill="#818cf8"/>
    <circle cx="177" cy="219" r="6" fill="#34d399"/>
    <circle cx="123" cy="177" r="3" fill="#fbbf24"/>
    <circle cx="216" cy="216" r="4" fill="#f87171"/>
    <circle cx="153" cy="176" r="5" fill="#fb923c"/>
