      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="180" cy="160" r="260" fill="#e94560" opacity="0.04" filter="url(#sg)"/>
  <circle cx="1050" cy="480" r="200" fill="#0f3460" opacity="0.12" filter="url(#sg)"/>
  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#4a9eff" stroke-width="0.5">
