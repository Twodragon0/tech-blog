<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#0f0a2e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="25"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="270" r="260" fill="#8b5cf6" opacity="0.04" filter="url(#sg)"/>
  <!-- AI Agent Defense Robot -->
  <g transform="translate(600,250)">
    <!-- Robot head -->
    <rect x="-60" y="-140" width="120" height="90" rx="20" fill="#1e293b" stroke="#8b5cf6" stroke-width="2.5"/>
    <!-- Eyes (scanning) -->
    <circle cx="-25" cy="-100" r="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="-25" cy="-100" r="6" fill="#22d3ee" opacity="0.8"/>
    <circle cx="25" cy="-100" r="14" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="25" cy="-100" r="6" fill="#22d3ee" opacity="0.8"/>
    <!-- Antenna -->
    <line x1="0" y1="-140" x2="0" y2="-165" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="0" cy="-170" r="6" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="0" cy="-170" r="12" fill="#8b5cf6" opacity="0.15"/>
    <!-- Mouth / status bar -->
    <rect x="-30" y="-78" width="60" height="8" rx="4" fill="#22d3ee" opacity="0.4"/>
    <!-- Body -->
    <rect x="-50" y="-45" width="100" height="100" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Chest shield emblem -->
    <path d="M0,-30 L25,-18 L25,10 C25,25 12,35 0,40 C-12,35 -25,25 -25,10 L-25,-18 Z" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="0" y="12" font-family="Courier New" font-size="14" fill="#c4b5fd" text-anchor="middle">AI</text>
    <!-- Arms -->
    <rect x="-80" y="-40" width="25" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="55" y="-40" width="25" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Shield in left hand -->
    <g transform="translate(-100,10)">
      <path d="M0,-25 L20,-15 L20,10 C20,20 10,28 0,32 C-10,28 -20,20 -20,10 L-20,-15 Z" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
      <text x="0" y="8" font-family="Courier New" font-size="10" fill="#22d3ee" text-anchor="middle">D</text>
    </g>
    <!-- Sword in right hand (offense) -->
    <g transform="translate(100,-10)">
      <line x1="0" y1="-40" x2="0" y2="30" stroke="#f59e0b" stroke-width="3"/>
      <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#f59e0b" stroke-width="3"/>
      <polygon points="0,-45 -5,-35 5,-35" fill="#f59e0b"/>
    </g>
    <!-- Legs -->
    <rect x="-35" y="60" width="25" height="45" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="10" y="60" width="25" height="45" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <!-- Incoming threats being blocked -->
  <g opacity="0.4">
    <path d="M200,150 L430,210" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,4"/>
    <circle cx="200" cy="150" r="5" fill="#ef4444"/>
    <text x="170" y="145" font-family="Courier New" font-size="9" fill="#ef4444">malware</text>
    <path d="M1000,170 L770,220" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,4"/>
    <circle cx="1000" cy="170" r="5" fill="#ef4444"/>
    <text x="1010" y="165" font-family="Courier New" font-size="9" fill="#ef4444">ransomware</text>
    <path d="M230,380 L440,320" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,4"/>
    <circle cx="230" cy="380" r="4" fill="#ef4444"/>
    <path d="M970,370 L760,310" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,4"/>
    <circle cx="970" cy="370" r="4" fill="#ef4444"/>
  </g>
  <text x="600" y="510" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">AI Agent Defender</text>
  <text x="600" y="548" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Autonomous Defense | Gentlemen Ransomware | AI Security</text>
  <rect x="40" y="25" width="160" height="32" rx="16" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="120" y="47" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd" text-anchor="middle">WEEKLY DIGEST</text>
  <rect x="1000" y="25" width="160" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="1080" y="47" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">March 1, 2026</text>
  <text x="1160" y="615" font-family="Arial,sans-serif" font-size="13" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>