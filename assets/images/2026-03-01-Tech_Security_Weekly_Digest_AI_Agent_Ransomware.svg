  <text x="70" y="256" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="white" filter="url(#glow)">Ransomware</text>
  <text x="70" y="312" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">Weekly Security Digest</text>
  <!-- Keywords -->
  <rect x="70" y="370" width="128" height="36" rx="18" fill="rgba(233,69,96,0.18)" stroke="#e94560" stroke-width="1.5"/>
  <text x="134" y="393" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#e94560" text-anchor="middle">AI Agent</text>
  <rect x="218" y="370" width="138" height="36" rx="18" fill="rgba(74,158,255,0.13)" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="287" y="393" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#93c5fd" text-anchor="middle">Ransomware</text>
  <rect x="376" y="370" width="138" height="36" rx="18" fill="rgba(245,166,35,0.13)" stroke="#f5a623" stroke-width="1.5"/>
  <text x="445" y="393" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#f5a623" text-anchor="middle">Threat Intel</text>
  <!-- Accent bar -->
  <rect x="70" y="437" width="380" height="4" rx="2" fill="url(#acc)"/>
  <!-- Footer -->
  <line x1="50" y1="592" x2="1150" y2="592" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <text x="1150" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="end">tech.2twodragon.com</text>
  <text x="70" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b">DevSecOps Weekly Intel</text>
