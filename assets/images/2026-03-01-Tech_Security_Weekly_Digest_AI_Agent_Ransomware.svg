    <rect x="-52" y="-10" width="104" height="80" rx="10" fill="none" stroke="#e94560" stroke-width="2.5" opacity="0.7"/>
    <rect x="-52" y="-10" width="104" height="80" rx="10" fill="#e94560" opacity="0.08"/>
    <path d="M-28,-10 L-28,-38 C-28,-60 28,-60 28,-38 L28,-10" fill="none" stroke="#e94560" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="0" cy="28" r="13" fill="#e94560" opacity="0.8"/>
    <rect x="-3.5" y="28" width="7" height="18" rx="2.5" fill="white" opacity="0.7"/>
  </g>
  <!-- AI agent network -->
  <g transform="translate(980,180)" opacity="0.35">
