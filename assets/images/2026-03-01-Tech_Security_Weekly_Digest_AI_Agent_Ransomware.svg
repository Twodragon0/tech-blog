<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#cc2200"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="agentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,60,0,0.04)" stroke="rgba(255,60,0,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,60,0,0.05)" stroke="rgba(255,60,0,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Agent + Ransomware Lock -->
  <!-- Outer ring: AI neural network halo -->
  <circle cx="1010" cy="225" r="110" fill="none" stroke="rgba(255,80,0,0.22)" stroke-width="1.5" stroke-dasharray="8 4"/>
  <circle cx="1010" cy="225" r="88" fill="rgba(255,40,0,0.07)" stroke="rgba(255,120,60,0.3)" stroke-width="1"/>
  <circle cx="1010" cy="225" r="64" fill="rgba(180,20,0,0.10)" stroke="rgba(255,80,40,0.35)" stroke-width="1.5"/>

  <!-- Ransomware lock body -->
  <rect x="988" y="215" width="44" height="34" rx="4" fill="rgba(255,60,20,0.13)" stroke="rgba(255,100,40,0.4)" stroke-width="2"/>
  <!-- Lock shackle -->
  <path d="M998,215 Q998,198 1010,198 Q1022,198 1022,215" fill="none" stroke="rgba(255,100,40,0.38)" stroke-width="2.5"/>
  <!-- Lock keyhole -->
  <circle cx="1010" cy="229" r="5" fill="rgba(255,80,30,0.35)" stroke="rgba(255,120,60,0.5)" stroke-width="1.2"/>
  <rect x="1008" y="232" width="4" height="8" rx="1" fill="rgba(255,80,30,0.30)" stroke="rgba(255,120,60,0.45)" stroke-width="1"/>

  <!-- AI neural nodes around the lock -->
  <circle cx="1010" cy="148" r="7" fill="rgba(255,100,40,0.15)" stroke="rgba(255,140,60,0.38)" stroke-width="1.5"/>
  <circle cx="1076" cy="181" r="6" fill="rgba(255,80,20,0.12)" stroke="rgba(255,120,50,0.32)" stroke-width="1.5"/>
  <circle cx="1086" cy="258" r="7" fill="rgba(255,60,20,0.13)" stroke="rgba(255,100,40,0.35)" stroke-width="1.5"/>
  <circle cx="1044" cy="310" r="5" fill="rgba(255,80,30,0.10)" stroke="rgba(255,120,60,0.28)" stroke-width="1.5"/>
  <circle cx="940" cy="296" r="6" fill="rgba(255,60,20,0.12)" stroke="rgba(255,100,40,0.30)" stroke-width="1.5"/>
  <circle cx="926" cy="198" r="7" fill="rgba(255,80,20,0.13)" stroke="rgba(255,120,50,0.35)" stroke-width="1.5"/>
  <circle cx="960" cy="148" r="5" fill="rgba(255,100,40,0.10)" stroke="rgba(255,140,60,0.28)" stroke-width="1.5"/>

  <!-- Neural connection lines -->
  <line x1="1010" y1="155" x2="1010" y2="198" stroke="rgba(255,100,40,0.22)" stroke-width="1"/>
  <line x1="1016" y1="155" x2="1070" y2="184" stroke="rgba(255,80,30,0.18)" stroke-width="1"/>
  <line x1="1017" y1="222" x2="1080" y2="258" stroke="rgba(255,80,30,0.20)" stroke-width="1"/>
  <line x1="1017" y1="242" x2="1046" y2="306" stroke="rgba(255,60,20,0.18)" stroke-width="1"/>
  <line x1="1003" y1="247" x2="942" y2="293" stroke="rgba(255,60,20,0.18)" stroke-width="1"/>
  <line x1="1003" y1="222" x2="932" y2="202" stroke="rgba(255,80,20,0.20)" stroke-width="1"/>
  <line x1="1004" y1="155" x2="962" y2="151" stroke="rgba(255,100,40,0.18)" stroke-width="1"/>

  <!-- Binary data streams -->
  <text x="880" y="160" font-family="monospace" font-size="9" fill="rgba(255,80,40,0.25)">01001</text>
  <text x="1090" y="145" font-family="monospace" font-size="9" fill="rgba(255,80,40,0.20)">10110</text>
  <text x="1100" y="305" font-family="monospace" font-size="9" fill="rgba(255,80,40,0.22)">11001</text>
  <text x="880" y="320" font-family="monospace" font-size="9" fill="rgba(255,80,40,0.20)">01100</text>

  <!-- Danger warning triangle -->
  <polygon points="1010,133 1000,152 1020,152" fill="rgba(255,60,0,0.12)" stroke="rgba(255,100,40,0.35)" stroke-width="1.5"/>
  <text x="1007" y="149" font-family="monospace" font-size="10" font-weight="bold" fill="rgba(255,120,60,0.55)">!</text>

  <!-- Agent scan arc -->
  <path d="M955,225 A55,55 0 0,1 1065,225" fill="none" stroke="rgba(255,80,30,0.18)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,40,0.55)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(255,120,60,0.45)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(255,60,20,0.50)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,60,20,0.18)" stroke="rgba(255,80,40,0.35)" stroke-width="1"/>
  <text x="100" y="81" font-family="'Courier New',monospace" font-size="13" font-weight="600" fill="rgba(255,140,80,0.90)" letter-spacing="1">MARCH 1, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Digest AI Agent Ransomware</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,160,100,0.80)">Weekly roundup: AI agent threats, ransomware trends &amp; security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New',monospace" font-size="14" font-weight="600" fill="rgba(255,100,60,0.75)" letter-spacing="2">SECURITY / THREAT INTELLIGENCE / AI</text>

  <!-- Tag pills -->
  <!-- Pill 1: red -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(220,40,40,0.22)" stroke="rgba(255,80,60,0.45)" stroke-width="1.2"/>
  <text x="145" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,140,120,0.95)" text-anchor="middle">Ransomware</text>

  <!-- Pill 2: amber -->
  <rect x="226" y="402" width="130" height="36" rx="18" fill="rgba(200,100,10,0.22)" stroke="rgba(255,160,40,0.45)" stroke-width="1.2"/>
  <text x="291" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,190,80,0.95)" text-anchor="middle">AI Agent</text>

  <!-- Pill 3: blue -->
  <rect x="372" y="402" width="140" height="36" rx="18" fill="rgba(20,80,200,0.20)" stroke="rgba(60,140,255,0.40)" stroke-width="1.2"/>
  <text x="442" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(120,190,255,0.95)" text-anchor="middle">Threat Intel</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,100,60,0.45)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>