    <circle cx="-60" cy="50" r="6" fill="#4a9eff"/>
    <circle cx="60" cy="50" r="6" fill="#4a9eff"/>
    <circle cx="-40" cy="-50" r="5" fill="#93c5fd"/>
    <circle cx="45" cy="-45" r="5" fill="#93c5fd"/>
