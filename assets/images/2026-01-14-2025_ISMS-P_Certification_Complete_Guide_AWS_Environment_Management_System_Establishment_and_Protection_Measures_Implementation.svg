<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>2026 01 14 2025 ISMS P Certification Complete Guide AWS Environment Management System Establishment and Protection Measures Implementation</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side content -->
  <g>
    <!-- Title line 1 -->
    <text x="50" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white">
      2025 ISMS Certification
    </text>
    <!-- Title line 2 -->
    <text x="50" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white">
      AWS Environment Management
    </text>
    
    <!-- Date badge -->
    <rect x="50" y="280" width="280" height="40" rx="8" fill="#1a2f5c" opacity="0.8"/>
    <text x="60" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#87ceeb">
      JANUARY 14, 2026
    </text>
    
    <!-- Tag pills -->
    <g>
      <!-- Tag 1: Security -->
      <rect x="50" y="420" width="110" height="32" rx="16" fill="#1a3a2a" opacity="0.7"/>
      <text x="60" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4ade80">
        Security
      </text>
      
      <!-- Tag 2: Compliance -->
      <rect x="170" y="420" width="110" height="32" rx="16" fill="#3a2a1a" opacity="0.7"/>
      <text x="180" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fbbf24">
        Compliance
      </text>
      
      <!-- Tag 3: AWS -->
      <rect x="290" y="420" width="90" height="32" rx="16" fill="#1a2a3a" opacity="0.7"/>
      <text x="300" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#60a5fa">
        AWS
      </text>
    </g>
    
    <!-- Footer -->
    <text x="50" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#6b7280" opacity="0.8">
      tech.2twodragon.com
    </text>
  </g>
  
  <!-- Right side illustration: ISMS Certification + AWS -->
  <g>
    <!-- Background accent gradient overlay -->
    <defs>
      <linearGradient id="bgGrad" x1="700" y1="0" x2="1150" y2="630">
        <stop offset="0%" style="stop-color:#1a2f5c;stop-opacity:0.15"/>
        <stop offset="100%" style="stop-color:#0a1f2e;stop-opacity:0.05"/>
      </linearGradient>
    </defs>
    <rect x="700" y="0" width="500" height="630" fill="url(#bgGrad)"/>
    
    <!-- Certification Shield (ISMS) - center left of illustration -->
    <g transform="translate(800, 200)">
      <!-- Shield outline -->
      <path d="M 0 0 L -50 30 L -50 100 Q 0 140 50 100 L 50 30 Z" 
            fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.9"/>
      <!-- Shield fill -->
      <path d="M 0 0 L -50 30 L -50 100 Q 0 140 50 100 L 50 30 Z" 
            fill="#1a3a2a" opacity="0.3"/>
      <!-- Checkmark inside shield -->
      <g transform="translate(-5, 50)">
        <path d="M -15 0 L -5 15 L 20 -15" stroke="#4ade80" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
    
    <!-- AWS Cloud infrastructure - top right -->
    <g transform="translate(950, 150)">
      <!-- Cloud shape -->
      <ellipse cx="0" cy="0" rx="45" ry="30" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>
      <!-- Cloud bumps -->
      <circle cx="-30" cy="5" r="18" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
      <circle cx="30" cy="5" r="18" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
      <!-- Instances inside cloud -->
      <rect x="-35" y="-15" width="14" height="14" fill="#60a5fa" opacity="0.4" rx="2"/>
      <rect x="-10" y="-15" width="14" height="14" fill="#60a5fa" opacity="0.4" rx="2"/>
      <rect x="15" y="-15" width="14" height="14" fill="#60a5fa" opacity="0.4" rx="2"/>
    </g>
    
    <!-- Lock symbol (Security) - left side -->
    <g transform="translate(780, 380)">
      <!-- Shackle -->
      <path d="M -15 5 Q -15 -20 0 -20 Q 15 -20 15 5" 
            fill="none" stroke="#4ade80" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
      <!-- Body -->
      <rect x="-20" y="0" width="40" height="40" rx="4" fill="none" stroke="#4ade80" stroke-width="3" opacity="0.8"/>
      <!-- Keyhole -->
      <circle cx="0" cy="15" r="4" fill="#4ade80" opacity="0.6"/>
      <rect x="-2" y="22" width="4" height="8" fill="#4ade80" opacity="0.6"/>
    </g>
    
    <!-- Compliance checkmarks - center -->
    <g transform="translate(900, 380)">
      <!-- Checkmark 1 -->
      <g transform="translate(-30, -20)">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
        <path d="M -8 0 L -2 8 L 10 -5" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      </g>
      <!-- Checkmark 2 -->
      <g transform="translate(0, 0)">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
        <path d="M -8 0 L -2 8 L 10 -5" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      </g>
      <!-- Checkmark 3 -->
      <g transform="translate(30, -20)">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
        <path d="M -8 0 L -2 8 L 10 -5" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      </g>
    </g>
    
    <!-- Connected nodes (Environment Management) -->
    <g transform="translate(1000, 480)">
      <!-- Center node -->
      <circle cx="0" cy="0" r="8" fill="#60a5fa" opacity="0.8"/>
      <!-- Connection lines -->
      <line x1="0" y1="0" x2="-25" y2="-25" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <line x1="0" y1="0" x2="25" y2="-25" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <line x1="0" y1="0" x2="-25" y2="25" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <line x1="0" y1="0" x2="25" y2="25" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      <!-- Connected nodes -->
      <circle cx="-25" cy="-25" r="6" fill="#60a5fa" opacity="0.6"/>
      <circle cx="25" cy="-25" r="6" fill="#60a5fa" opacity="0.6"/>
      <circle cx="-25" cy="25" r="6" fill="#60a5fa" opacity="0.6"/>
      <circle cx="25" cy="25" r="6" fill="#60a5fa" opacity="0.6"/>
    </g>
  </g>
</svg>