<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="60%" style="stop-color:#0a1a0f"/>
      <stop offset="100%" style="stop-color:#0f1a2a"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="stageGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="stageBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="stageRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <circle cx="200" cy="180" r="220" fill="#10b981" opacity="0.07" filter="url(#ambient)"/>
  <circle cx="900" cy="400" r="260" fill="#3b82f6" opacity="0.06" filter="url(#ambient)"/>
  <circle cx="600" cy="300" r="300" fill="#ef4444" opacity="0.04" filter="url(#ambient)"/>
  <circle cx="1050" cy="150" r="180" fill="#10b981" opacity="0.05" filter="url(#ambient)"/>

  <!-- Floating code fragments -->
  <text x="60" y="140" font-family="Courier New,monospace" font-size="12" fill="#10b981" opacity="0.12" transform="rotate(-8,60,140)">pipeline.stage(scan)</text>
  <text x="920" y="110" font-family="Courier New,monospace" font-size="11" fill="#3b82f6" opacity="0.13" transform="rotate(5,920,110)">docker build --no-cache</text>
  <text x="80" y="490" font-family="Courier New,monospace" font-size="11" fill="#ef4444" opacity="0.11" transform="rotate(3,80,490)">trivy image scan</text>
  <text x="880" y="520" font-family="Courier New,monospace" font-size="12" fill="#10b981" opacity="0.13" transform="rotate(-4,880,520)">helm upgrade --atomic</text>
  <text x="430" y="80" font-family="Courier New,monospace" font-size="10" fill="#94a3b8" opacity="0.10">git push origin main</text>
  <text x="750" y="570" font-family="Courier New,monospace" font-size="10" fill="#3b82f6" opacity="0.10">kubectl rollout status</text>
  <text x="1050" y="330" font-family="Courier New,monospace" font-size="10" fill="#ef4444" opacity="0.11" transform="rotate(-6,1050,330)">CRITICAL: CVE-2024-xxxx</text>
  <text x="30" y="350" font-family="Courier New,monospace" font-size="10" fill="#10b981" opacity="0.10" transform="rotate(4,30,350)">snyk test --severity=high</text>

  <!-- CI/CD Pipeline central illustration -->
  <!-- Pipeline backbone line -->
  <line x1="115" y1="295" x2="1085" y2="295" stroke="url(#pipeGrad)" stroke-width="3" opacity="0.4"/>

  <!-- Stage 1: Code -->
  <g transform="translate(155,255)" filter="url(#shadow)">
    <rect x="-42" y="-42" width="84" height="84" rx="12" fill="url(#stageGreen)" stroke="#10b981" stroke-width="2"/>
    <circle cx="0" cy="-10" r="22" fill="#0a1a0f" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="-6" font-family="Courier New,monospace" font-size="9" fill="#10b981" text-anchor="middle" font-weight="bold">{ }</text>
    <text x="0" y="28" font-family="Arial,sans-serif" font-size="11" fill="#86efac" text-anchor="middle" font-weight="bold">CODE</text>
  </g>

  <!-- Arrow 1->2 -->
  <path d="M197,295 L243,295" stroke="#3b82f6" stroke-width="2.5" opacity="0.7" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#3b82f6" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Stage 2: Build (red warning) -->
  <g transform="translate(315,255)" filter="url(#shadow)">
    <rect x="-42" y="-42" width="84" height="84" rx="12" fill="url(#stageRed)" stroke="#ef4444" stroke-width="2"/>
    <circle cx="0" cy="-10" r="22" fill="#1a0a0a" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="-6" font-family="Courier New,monospace" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">BUILD</text>
    <text x="0" y="28" font-family="Arial,sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle" font-weight="bold">BUILD</text>
    <!-- Warning badge -->
    <circle cx="32" cy="-32" r="10" fill="#ef4444" stroke="#0a0a1a" stroke-width="1.5"/>
    <text x="32" y="-28" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">!</text>
  </g>

  <!-- Arrow 2->3 -->
  <path d="M357,295 L403,295" stroke="#3b82f6" stroke-width="2.5" opacity="0.7" marker-end="url(#arr)"/>

  <!-- Stage 3: Test (shield overlay - highlighted) -->
  <g transform="translate(475,255)" filter="url(#shadow)">
    <rect x="-52" y="-52" width="104" height="104" rx="14" fill="url(#stageBlue)" stroke="#3b82f6" stroke-width="2.5"/>
    <!-- Shield -->
    <path d="M0,-30 L22,-18 L22,5 C22,20 12,28 0,34 C-12,28 -22,20 -22,5 L-22,-18 Z" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="2" filter="url(#glowStrong)"/>
    <path d="M0,-22 L16,-13 L16,4 C16,15 9,21 0,26 C-9,21 -16,15 -16,4 L-16,-13 Z" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.8"/>
    <text x="0" y="7" font-family="Arial,sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">SCAN</text>
    <text x="0" y="38" font-family="Arial,sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="bold">TEST</text>
    <!-- Glow ring -->
    <circle cx="0" cy="-8" r="35" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  </g>

  <!-- Arrow 3->4 -->
  <path d="M527,295 L573,295" stroke="#3b82f6" stroke-width="2.5" opacity="0.7" marker-end="url(#arr)"/>

  <!-- Stage 4: Deploy (red warning) -->
  <g transform="translate(635,255)" filter="url(#shadow)">
    <rect x="-42" y="-42" width="84" height="84" rx="12" fill="url(#stageRed)" stroke="#ef4444" stroke-width="1.8"/>
    <circle cx="0" cy="-10" r="22" fill="#1a0a0a" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
    <text x="0" y="-6" font-family="Courier New,monospace" font-size="8" fill="#ef4444" text-anchor="middle" font-weight="bold">DEPLOY</text>
    <text x="0" y="28" font-family="Arial,sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle" font-weight="bold">DEPLOY</text>
    <!-- Warning badge -->
    <circle cx="32" cy="-32" r="10" fill="#ef4444" stroke="#0a0a1a" stroke-width="1.5"/>
    <text x="32" y="-28" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">!</text>
  </g>

  <!-- Arrow 4->5 -->
  <path d="M677,295 L723,295" stroke="#3b82f6" stroke-width="2.5" opacity="0.7" marker-end="url(#arr)"/>

  <!-- Stage 5: Monitor -->
  <g transform="translate(785,255)" filter="url(#shadow)">
    <rect x="-42" y="-42" width="84" height="84" rx="12" fill="url(#stageGreen)" stroke="#10b981" stroke-width="2"/>
    <circle cx="0" cy="-10" r="22" fill="#0a1a0f" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
    <!-- Pulse lines -->
    <polyline points="-14,-12 -8,-12 -5,-22 0,-4 5,-18 9,-12 14,-12" fill="none" stroke="#10b981" stroke-width="1.8" stroke-linejoin="round"/>
    <text x="0" y="28" font-family="Arial,sans-serif" font-size="11" fill="#86efac" text-anchor="middle" font-weight="bold">MONITOR</text>
  </g>

  <!-- Vulnerability caught indicators (arrows from stages to below) -->
  <g opacity="0.7">
    <path d="M315,313 L315,355 L355,355" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" fill="none"/>
    <rect x="358" y="342" width="90" height="22" rx="5" fill="#1a0808" stroke="#ef4444" stroke-width="1"/>
    <text x="403" y="357" font-family="Courier New,monospace" font-size="9" fill="#ef4444" text-anchor="middle">vuln caught</text>

    <path d="M635,313 L635,355 L595,355" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" fill="none"/>
    <rect x="452" y="342" width="90" height="22" rx="5" fill="#1a0808" stroke="#ef4444" stroke-width="1"/>
    <text x="497" y="357" font-family="Courier New,monospace" font-size="9" fill="#ef4444" text-anchor="middle">dep risk found</text>
  </g>

  <!-- Decorative grid dots top-right -->
  <g opacity="0.08" fill="#10b981">
    <circle cx="1020" cy="80" r="2"/><circle cx="1040" cy="80" r="2"/><circle cx="1060" cy="80" r="2"/>
    <circle cx="1020" cy="100" r="2"/><circle cx="1040" cy="100" r="2"/><circle cx="1060" cy="100" r="2"/>
    <circle cx="1020" cy="120" r="2"/><circle cx="1040" cy="120" r="2"/><circle cx="1060" cy="120" r="2"/>
  </g>

  <!-- Title section -->
  <text x="600" y="458" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glowStrong)" letter-spacing="1">DevSecOps Pipeline Defense</text>
  <text x="600" y="492" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">CI/CD Security  |  Container Hardening  |  Supply Chain Trust</text>

  <!-- Top badges -->
  <rect x="40" y="22" width="148" height="34" rx="17" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="114" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle" letter-spacing="1">WEEKLY DIGEST</text>
  <rect x="1010" y="22" width="148" height="34" rx="17" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1084" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">February 3, 2026</text>

  <!-- Footer separator -->
  <line x1="40" y1="585" x2="1160" y2="585" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Footer stats -->
  <text x="40" y="610" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="start">16 News</text>
  <text x="140" y="610" font-family="Arial,sans-serif" font-size="13" fill="#ef4444" opacity="0.8">4 Security</text>
  <text x="260" y="610" font-family="Arial,sans-serif" font-size="13" fill="#8b5cf6" opacity="0.8">3 AI/ML</text>
  <text x="360" y="610" font-family="Arial,sans-serif" font-size="13" fill="#3b82f6" opacity="0.8">2 Cloud</text>
  <text x="455" y="610" font-family="Arial,sans-serif" font-size="13" fill="#10b981" opacity="0.8">4 DevOps</text>
  <text x="1160" y="610" font-family="Arial,sans-serif" font-size="13" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>
