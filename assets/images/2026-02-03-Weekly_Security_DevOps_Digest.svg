<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest - AI Agent Vulnerabilities, MDM App Control</title>
  <defs>
    <filter id="orbGlow"><feGaussianBlur stdDeviation="40" /></filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="50%" stop-color="#db2777" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#db2777" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#db2777" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Orb glows -->
  <circle cx="800" cy="150" r="185" fill="#7c3aed" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1070" cy="450" r="150" fill="#f97316" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="180" cy="490" r="120" fill="#db2777" opacity="0.05" filter="url(#orbGlow)" />

  <!-- Card 1: Newspaper/digest icon -->
  <g transform="translate(830, 60)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(100, 18)">
      <!-- Newspaper icon -->
      <rect x="16" y="10" width="78" height="92" rx="5" fill="none" stroke="#f97316" stroke-width="2" opacity="0.8" />
      <rect x="24" y="20" width="44" height="6" rx="2" fill="#f97316" opacity="0.5" />
      <rect x="24" y="32" width="62" height="4" rx="2" fill="#f97316" opacity="0.3" />
      <rect x="24" y="40" width="56" height="4" rx="2" fill="#f97316" opacity="0.3" />
      <rect x="24" y="48" width="60" height="4" rx="2" fill="#f97316" opacity="0.3" />
      <rect x="24" y="62" width="26" height="26" rx="3" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1" stroke-opacity="0.4" />
      <rect x="56" y="62" width="30" height="4" rx="2" fill="#f97316" opacity="0.3" />
      <rect x="56" y="70" width="24" height="4" rx="2" fill="#f97316" opacity="0.3" />
      <rect x="22" y="104" width="66" height="16" rx="4" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1" stroke-opacity="0.4" />
      <text x="55" y="116" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">DIGEST</text>
    </g>
    <circle cx="125" cy="200" r="3" fill="#f97316" opacity="0.8" />
    <circle cx="140" cy="200" r="3" fill="#db2777" opacity="0.6" />
    <circle cx="155" cy="200" r="3" fill="#f97316" opacity="0.4" />
  </g>

  <!-- Card 2: Mobile device with shield (MDM) -->
  <g transform="translate(720, 190)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(100, 16)">
      <!-- Mobile device -->
      <rect x="30" y="8" width="50" height="84" rx="8" fill="none" stroke="#db2777" stroke-width="2" opacity="0.8" />
      <circle cx="55" cy="80" r="5" fill="none" stroke="#db2777" stroke-width="1.5" opacity="0.7" />
      <rect x="40" y="14" width="30" height="4" rx="2" fill="#db2777" opacity="0.4" />
      <!-- Shield overlay -->
      <path d="M42 36 L68 46 L68 62 C68 72 61 78 55 82 C49 78 42 72 42 62 L42 46 Z" fill="#7c3aed" opacity="0.18" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.7" />
      <path d="M49 59 L54 64 L62 55" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
      <rect x="14" y="96" width="82" height="16" rx="4" fill="#db2777" opacity="0.2" stroke="#db2777" stroke-width="1" stroke-opacity="0.4" />
      <text x="55" y="108" text-anchor="middle" fill="#f472b6" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">MDM CONTROL</text>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b" />
    <rect x="40" y="192" width="150" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3: Robot with warning (AI agent vuln) -->
  <g transform="translate(660, 340)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(110, 12)">
      <!-- Robot body -->
      <rect x="20" y="24" width="60" height="52" rx="7" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.8" />
      <circle cx="34" cy="38" r="6" fill="#7c3aed" opacity="0.7" />
      <circle cx="66" cy="38" r="6" fill="#7c3aed" opacity="0.7" />
      <rect x="30" y="52" width="40" height="7" rx="3.5" fill="#7c3aed" opacity="0.4" />
      <line x1="50" y1="24" x2="50" y2="14" stroke="#7c3aed" stroke-width="2" opacity="0.7" />
      <circle cx="50" cy="11" r="4" fill="#7c3aed" opacity="0.8" />
      <!-- Warning triangle -->
      <path d="M50 78 L66 105 L34 105 Z" fill="#f97316" opacity="0.25" stroke="#f97316" stroke-width="2" stroke-opacity="0.9" />
      <line x1="50" y1="87" x2="50" y2="98" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
      <circle cx="50" cy="102" r="1.5" fill="#f97316" opacity="0.9" />
      <rect x="12" y="110" width="76" height="16" rx="4" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4" />
      <text x="50" y="122" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">AGENT VULN</text>
    </g>
    <g transform="translate(40, 196)">
      <rect width="240" height="28" rx="6" fill="#1e293b" opacity="0.8" />
      <circle cx="18" cy="14" r="5" fill="#7c3aed" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="728" cy="278" r="2" fill="#7c3aed" opacity="0.5">
    <animate attributeName="cy" values="278;268;278" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="843" cy="332" r="1.5" fill="#f97316" opacity="0.4">
    <animate attributeName="cy" values="332;322;332" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1068" cy="300" r="2" fill="#db2777" opacity="0.5">
    <animate attributeName="cy" values="300;290;300" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="692" cy="206" r="1.5" fill="#7c3aed" opacity="0.3">
    <animate attributeName="cy" values="206;198;206" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1112" cy="174" r="1" fill="#f97316" opacity="0.4">
    <animate attributeName="cy" values="174;166;174" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- WEEKLY DIGEST badge -->
  <g transform="translate(60, 80)">
    <rect width="160" height="32" rx="16" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4" />
    <text x="80" y="21" text-anchor="middle" fill="#a78bfa" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">WEEKLY DIGEST</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Tech Security</text>
  <text x="60" y="225" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Weekly</text>
  <text x="60" y="290" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">AI Agent Vuln</text>
  <text x="60" y="335" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">MDM Control</text>

  <!-- Accent line -->
  <rect x="60" y="360" width="200" height="3" rx="1.5" fill="url(#accentLine)" />

  <!-- Tag pills -->
  <g transform="translate(60, 385)">
    <rect width="76" height="30" rx="15" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.35" />
    <text x="38" y="20" text-anchor="middle" fill="#a78bfa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AI Agent</text>
    <g transform="translate(86, 0)">
      <rect width="46" height="30" rx="15" fill="#db2777" opacity="0.12" stroke="#db2777" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="23" y="20" text-anchor="middle" fill="#f472b6" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">MDM</text>
    </g>
    <g transform="translate(142, 0)">
      <rect width="72" height="30" rx="15" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="36" y="20" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Security</text>
    </g>
    <g transform="translate(224, 0)">
      <rect width="62" height="30" rx="15" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="31" y="20" text-anchor="middle" fill="#4ade80" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">DevOps</text>
    </g>
  </g>

  <!-- Date -->
  <text x="60" y="460" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">FEBRUARY 03, 2026</text>

  <!-- Footer URL -->
  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8" />
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
</svg>
