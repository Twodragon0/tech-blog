<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>Tesla FSD 2026 Model Juniper Security</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left side: Text content -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">Tesla FSD 2026</text>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">Model Juniper Security</text>

  <!-- Date badge -->
  <rect x="50" y="280" width="220" height="35" rx="17.5" fill="#1a4d7a" opacity="0.6"/>
  <text x="160" y="304" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64b5f6" text-anchor="middle">JANUARY 1, 2026</text>

  <!-- Tag pills at y=420 -->
  <rect x="50" y="420" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#64b5f6" stroke-width="1"/>
  <text x="95" y="440" font-family="Arial, sans-serif" font-size="12" fill="#64b5f6" text-anchor="middle">autonomous</text>

  <rect x="150" y="420" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#64b5f6" stroke-width="1"/>
  <text x="195" y="440" font-family="Arial, sans-serif" font-size="12" fill="#64b5f6" text-anchor="middle">security</text>

  <rect x="250" y="420" width="90" height="28" rx="14" fill="#1e3a5f" stroke="#64b5f6" stroke-width="1"/>
  <text x="295" y="440" font-family="Arial, sans-serif" font-size="12" fill="#64b5f6" text-anchor="middle">ai-safety</text>

  <!-- Footer -->
  <text x="50" y="600" font-family="Arial, sans-serif" font-size="12" fill="#666666">tech.2twodragon.com</text>

  <!-- Right side illustration: Tesla FSD 2026 Model Juniper Security -->

  <!-- Car silhouette - modern Tesla Model Juniper outline -->
  <g id="vehicle">
    <!-- Car body base -->
    <path d="M 800 420 L 850 380 L 1050 380 L 1100 420 Z" fill="#1a2a3a" stroke="#00d9ff" stroke-width="2"/>
    <!-- Car roof -->
    <path d="M 850 380 L 900 320 L 1000 320 L 1050 380 Z" fill="#0f1520" stroke="#00d9ff" stroke-width="1.5"/>
    <!-- Windshield -->
    <path d="M 900 320 L 950 300 L 1000 300 L 1000 320 Z" fill="#1a4d7a" opacity="0.4" stroke="#00d9ff" stroke-width="1"/>
  </g>

  <!-- Neural network visualization - representing FSD AI -->
  <g id="neural-network" opacity="0.7">
    <!-- Layer 1 nodes (input) -->
    <circle cx="750" cy="280" r="4" fill="#00ff88"/>
    <circle cx="750" cy="320" r="4" fill="#00ff88"/>
    <circle cx="750" cy="360" r="4" fill="#00ff88"/>
    <circle cx="750" cy="400" r="4" fill="#00ff88"/>

    <!-- Layer 2 nodes (hidden) -->
    <circle cx="850" cy="260" r="5" fill="#00d9ff"/>
    <circle cx="850" cy="310" r="5" fill="#00d9ff"/>
    <circle cx="850" cy="360" r="5" fill="#00d9ff"/>
    <circle cx="850" cy="410" r="5" fill="#00d9ff"/>

    <!-- Layer 3 nodes (output) -->
    <circle cx="950" cy="290" r="5" fill="#ff00ff"/>
    <circle cx="950" cy="380" r="5" fill="#ff00ff"/>

    <!-- Connections layer 1 to 2 -->
    <line x1="754" y1="280" x2="845" y2="260" stroke="#00ff88" stroke-width="0.8" opacity="0.4"/>
    <line x1="754" y1="280" x2="845" y2="310" stroke="#00ff88" stroke-width="0.8" opacity="0.4"/>
    <line x1="754" y1="320" x2="845" y2="360" stroke="#00ff88" stroke-width="0.8" opacity="0.4"/>
    <line x1="754" y1="400" x2="845" y2="410" stroke="#00ff88" stroke-width="0.8" opacity="0.4"/>

    <!-- Connections layer 2 to 3 -->
    <line x1="855" y1="260" x2="945" y2="290" stroke="#00d9ff" stroke-width="1.2" opacity="0.5"/>
    <line x1="855" y1="410" x2="945" y2="380" stroke="#00d9ff" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Security shield overlay -->
  <g id="security-shield">
    <!-- Shield outline -->
    <path d="M 1020 250 L 1080 250 L 1080 320 Q 1050 360 1020 380 Q 990 360 960 320 L 960 250 Z"
          fill="none" stroke="#ff6b6b" stroke-width="2.5" opacity="0.8"/>
    <!-- Shield fill pattern -->
    <path d="M 1020 250 L 1080 250 L 1080 320 Q 1050 360 1020 380 Q 990 360 960 320 L 960 250 Z"
          fill="#ff6b6b" opacity="0.1"/>
    <!-- Shield lock icon -->
    <circle cx="1020" cy="305" r="8" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
    <path d="M 1016 305 L 1020 310 L 1024 305" stroke="#ff6b6b" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>

  <!-- Camera/Sensor visualization -->
  <g id="sensors">
    <!-- Front camera -->
    <circle cx="900" cy="300" r="6" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
    <circle cx="900" cy="300" r="3" fill="#00ff88" opacity="0.4"/>

    <!-- Side sensor -->
    <circle cx="800" cy="380" r="5" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="800" cy="380" r="2.5" fill="#00d9ff" opacity="0.4"/>

    <!-- Radar cone -->
    <path d="M 1080 400 L 1100 420 L 1120 400 Z" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Data flow visualization - representing secure data processing -->
  <g id="data-flow" opacity="0.6">
    <!-- Flow arrows -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#00d9ff"/>
      </marker>
    </defs>
    <path d="M 760 500 Q 900 480 1050 510" stroke="#00d9ff" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" opacity="0.5"/>
    <path d="M 780 520 Q 920 510 1080 540" stroke="#00ff88" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" opacity="0.5"/>
  </g>

  <!-- Encryption/Security glow -->
  <g id="security-glow">
    <circle cx="1000" cy="350" r="80" fill="none" stroke="#00d9ff" stroke-width="0.5" opacity="0.3" stroke-dasharray="5,5"/>
    <circle cx="1000" cy="350" r="60" fill="none" stroke="#ff00ff" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,3"/>
  </g>

  <!-- Tech grid background on right -->
  <g id="grid" opacity="0.05">
    <line x1="700" y1="200" x2="1150" y2="200" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="700" y1="250" x2="1150" y2="250" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="700" y1="300" x2="1150" y2="300" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="700" y1="350" x2="1150" y2="350" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="700" y1="400" x2="1150" y2="400" stroke="#00d9ff" stroke-width="0.5"/>
    <line x1="700" y1="450" x2="1150" y2="450" stroke="#00d9ff" stroke-width="0.5"/>
  </g>
</svg>