<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>CSPM DataDog AWS Security Automated Security</title>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left side: Title and metadata -->
  <text x="80" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white">CSPM DataDog AWS</text>
  <text x="80" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white">Security Automated</text>

  <!-- Date badge -->
  <rect x="80" y="290" width="220" height="40" rx="20" fill="#1a1f3a" stroke="#4a5578" stroke-width="1"/>
  <text x="90" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#9ca3c1">JANUARY 14, 2026</text>

  <!-- Tag pills -->
  <rect x="80" y="420" width="100" height="32" rx="16" fill="#2a2f4a" stroke="#5a6378" stroke-width="1"/>
  <text x="90" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#9ca3c1">security</text>

  <rect x="200" y="420" width="100" height="32" rx="16" fill="#2a2f4a" stroke="#5a6378" stroke-width="1"/>
  <text x="210" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#9ca3c1">aws-cloud</text>

  <rect x="320" y="420" width="100" height="32" rx="16" fill="#2a2f4a" stroke="#5a6378" stroke-width="1"/>
  <text x="330" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#9ca3c1">cspm</text>

  <!-- Footer -->
  <text x="80" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6a7088">tech.2twodragon.com</text>

  <!-- Right side: Illustration for CSPM DataDog AWS Security -->

  <!-- Animated cloud shape (AWS-inspired) -->
  <g>
    <!-- Main cloud -->
    <path d="M 850 180 Q 870 160 890 160 Q 920 160 930 180 L 930 240 Q 920 260 890 260 L 820 260 Q 800 260 790 240 L 790 200 Q 800 180 820 180 Z" fill="none" stroke="#ff9900" stroke-width="2" opacity="0.8"/>

    <!-- Cloud circles for AWS style -->
    <circle cx="800" cy="210" r="20" fill="none" stroke="#ff9900" stroke-width="2" opacity="0.6"/>
    <circle cx="850" cy="190" r="25" fill="none" stroke="#ff9900" stroke-width="2" opacity="0.7"/>
    <circle cx="910" cy="210" r="20" fill="none" stroke="#ff9900" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Security shield with checkmark -->
  <g>
    <!-- Outer shield -->
    <path d="M 920 290 L 950 310 L 950 360 Q 935 390 920 400 Q 905 390 890 360 L 890 310 Z" fill="none" stroke="#6366f1" stroke-width="2.5" opacity="0.9"/>
    <!-- Checkmark inside -->
    <path d="M 910 350 L 920 365 L 935 345" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- DataDog-style dashboard/monitoring panel -->
  <g>
    <!-- Panel background -->
    <rect x="780" y="310" width="140" height="100" rx="8" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.7"/>

    <!-- Grid lines (dashboard style) -->
    <line x1="790" y1="335" x2="910" y2="335" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <line x1="790" y1="355" x2="910" y2="355" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <line x1="790" y1="375" x2="910" y2="375" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>

    <!-- Monitoring indicators (bars) -->
    <rect x="795" y="340" width="8" height="12" fill="#10b981" opacity="0.8"/>
    <rect x="810" y="338" width="8" height="14" fill="#10b981" opacity="0.8"/>
    <rect x="825" y="335" width="8" height="17" fill="#fbbf24" opacity="0.8"/>
    <rect x="840" y="336" width="8" height="16" fill="#10b981" opacity="0.8"/>
    <rect x="855" y="340" width="8" height="12" fill="#10b981" opacity="0.8"/>
    <rect x="870" y="339" width="8" height="13" fill="#10b981" opacity="0.8"/>

    <!-- Data points -->
    <circle cx="800" cy="360" r="2" fill="#06b6d4"/>
    <circle cx="815" cy="357" r="2" fill="#06b6d4"/>
    <circle cx="830" cy="353" r="2" fill="#06b6d4"/>
    <circle cx="845" cy="358" r="2" fill="#06b6d4"/>
    <circle cx="860" cy="362" r="2" fill="#06b6d4"/>
  </g>

  <!-- Compliance/Scanning indicators -->
  <g>
    <!-- Compliance checkmarks (automated) -->
    <circle cx="760" cy="450" r="18" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
    <path d="M 750 450 L 760 462 L 772 445" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="830" cy="480" r="18" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
    <path d="M 820 480 L 830 492 L 842 475" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="900" cy="450" r="18" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
    <path d="M 890 450 L 900 462 L 912 445" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Automated workflow arrows/connections -->
  <g stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Connection from cloud to shield -->
    <path d="M 920 260 Q 925 275 925 290"/>
    <!-- Connection from shield to dashboard -->
    <path d="M 890 340 Q 870 330 850 325"/>
    <!-- Connection to compliance indicators -->
    <path d="M 800 410 Q 795 425 775 445"/>
    <path d="M 850 410 Q 840 435 840 460"/>
    <path d="M 900 410 Q 905 425 915 440"/>
  </g>

  <!-- Automated processing indicator (pulsing effect via opacity layers) -->
  <g>
    <circle cx="830" cy="540" r="12" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.5"/>
    <circle cx="830" cy="540" r="18" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.3"/>
    <circle cx="830" cy="540" r="5" fill="#ec4899" opacity="0.8"/>
  </g>

  <!-- Lock icon with automated scan lines -->
  <g>
    <!-- Lock shape -->
    <rect x="945" y="480" width="30" height="35" rx="3" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
    <path d="M 955 480 Q 955 470 960 470 Q 965 470 965 480" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
    <!-- Scan lines (automated security) -->
    <line x1="930" y1="485" x2="945" y2="485" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>
    <line x1="930" y1="500" x2="945" y2="500" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>
    <line x1="930" y1="515" x2="945" y2="515" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Accent glow elements -->
  <circle cx="920" cy="300" r="60" fill="#6366f1" opacity="0.05" filter="blur(20px)"/>
  <circle cx="800" cy="480" r="50" fill="#10b981" opacity="0.04" filter="blur(15px)"/>
</svg>