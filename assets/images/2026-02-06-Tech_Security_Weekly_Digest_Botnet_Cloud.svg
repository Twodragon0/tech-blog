<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left side text area -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">Tech Security</text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">Weekly Digest</text>

  <!-- Date badge -->
  <rect x="60" y="280" width="280" height="48" rx="6" fill="#1a1f3a" stroke="#4a5a8f" stroke-width="1"/>
  <text x="75" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#8fa3d9">FEBRUARY 6, 2026</text>

  <!-- Tag pills at y=420 -->
  <rect x="60" y="420" width="110" height="36" rx="18" fill="#2a3f5f" stroke="#5a7f9f" stroke-width="1"/>
  <text x="115" y="443" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#a8c5e8" text-anchor="middle">BOTNET</text>

  <rect x="185" y="420" width="100" height="36" rx="18" fill="#3a2a5f" stroke="#7a5f9f" stroke-width="1"/>
  <text x="235" y="443" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#d4a8e8" text-anchor="middle">CLOUD</text>

  <rect x="300" y="420" width="120" height="36" rx="18" fill="#3f3a2a" stroke="#9f8f5f" stroke-width="1"/>
  <text x="360" y="443" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#e8d4a8" text-anchor="middle">SECURITY</text>

  <!-- Footer -->
  <text x="60" y="580" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#6a7a9f">tech.2twodragon.com</text>

  <!-- Right side illustration: Botnet Cloud Architecture -->

  <!-- Cloud shapes background -->
  <ellipse cx="820" cy="200" rx="140" ry="90" fill="#1a2a4a" opacity="0.6"/>
  <ellipse cx="950" cy="240" rx="120" ry="80" fill="#1a3a5a" opacity="0.5"/>
  <ellipse cx="1050" cy="180" rx="100" ry="70" fill="#0a2a4a" opacity="0.6"/>

  <!-- Central botnet node (larger malicious node) -->
  <circle cx="900" cy="240" r="28" fill="#ff4444" opacity="0.9"/>
  <circle cx="900" cy="240" r="28" fill="none" stroke="#ff6666" stroke-width="2" opacity="0.7"/>
  <text x="900" y="248" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">BOT</text>

  <!-- Infected nodes spreading outward -->
  <circle cx="750" cy="180" r="18" fill="#ff5555" opacity="0.8"/>
  <circle cx="750" cy="180" r="18" fill="none" stroke="#ff7777" stroke-width="1.5" opacity="0.6"/>

  <circle cx="1050" cy="220" r="18" fill="#ff5555" opacity="0.8"/>
  <circle cx="1050" cy="220" r="18" fill="none" stroke="#ff7777" stroke-width="1.5" opacity="0.6"/>

  <circle cx="920" cy="100" r="16" fill="#ee5555" opacity="0.7"/>
  <circle cx="920" cy="100" r="16" fill="none" stroke="#ff7777" stroke-width="1.5" opacity="0.5"/>

  <circle cx="880" cy="330" r="16" fill="#ee5555" opacity="0.7"/>
  <circle cx="880" cy="330" r="16" fill="none" stroke="#ff7777" stroke-width="1.5" opacity="0.5"/>

  <circle cx="810" cy="320" r="14" fill="#dd4444" opacity="0.6"/>
  <circle cx="1020" cy="340" r="14" fill="#dd4444" opacity="0.6"/>

  <!-- Command & Control connection lines (red for malicious) -->
  <line x1="900" y1="240" x2="750" y2="180" stroke="#ff4444" stroke-width="2" opacity="0.7" stroke-dasharray="4,4"/>
  <line x1="900" y1="240" x2="1050" y2="220" stroke="#ff4444" stroke-width="2" opacity="0.7" stroke-dasharray="4,4"/>
  <line x1="900" y1="240" x2="920" y2="100" stroke="#ff4444" stroke-width="2" opacity="0.6" stroke-dasharray="4,4"/>
  <line x1="900" y1="240" x2="880" y2="330" stroke="#ff4444" stroke-width="2" opacity="0.6" stroke-dasharray="4,4"/>
  <line x1="750" y1="180" x2="810" y2="320" stroke="#ff6655" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <line x1="1050" y1="220" x2="1020" y2="340" stroke="#ff6655" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>

  <!-- Defense shield icons (green for protection) -->
  <g opacity="0.8">
    <!-- Shield 1 top left -->
    <path d="M 650 150 L 670 135 L 670 165 L 650 175 Z" fill="#44aa44" opacity="0.6"/>
    <circle cx="660" cy="155" r="8" fill="#44dd44" opacity="0.7"/>
  </g>

  <g opacity="0.8">
    <!-- Shield 2 bottom right -->
    <path d="M 1150 380 L 1130 395 L 1130 365 L 1150 355 Z" fill="#44aa44" opacity="0.6"/>
    <circle cx="1140" cy="375" r="8" fill="#44dd44" opacity="0.7"/>
  </g>

  <!-- Warning alert indicators (orange) -->
  <circle cx="760" cy="110" r="6" fill="#ffaa44" opacity="0.9"/>
  <circle cx="760" cy="110" r="6" fill="none" stroke="#ffcc66" stroke-width="1.5" opacity="0.7"/>

  <circle cx="1070" cy="110" r="6" fill="#ffaa44" opacity="0.9"/>
  <circle cx="1070" cy="110" r="6" fill="none" stroke="#ffcc66" stroke-width="1.5" opacity="0.7"/>

  <!-- Data exfiltration indicator (down arrow) -->
  <line x1="900" y1="270" x2="900" y2="400" stroke="#ff6666" stroke-width="3" opacity="0.5"/>
  <polygon points="900,420 890,400 910,400" fill="#ff6666" opacity="0.6"/>

  <!-- Network traffic waves -->
  <path d="M 700 250 Q 750 240 800 250" stroke="#4488ff" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 1000 250 Q 1050 240 1100 250" stroke="#4488ff" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Subtle grid pattern for tech feel -->
  <line x1="700" y1="80" x2="1150" y2="80" stroke="#2a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="120" x2="1150" y2="120" stroke="#2a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="160" x2="1150" y2="160" stroke="#2a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="200" x2="1150" y2="200" stroke="#2a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="240" x2="1150" y2="240" stroke="#2a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="280" x2="1150" y2="280" stroke="#2a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="320" x2="1150" y2="320" stroke="#2a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="360" x2="1150" y2="360" stroke="#2a3a5a" stroke-width="0.5" opacity="0.3"/>
  <line x1="700" y1="400" x2="1150" y2="400" stroke="#2a3a5a" stroke-width="0.5" opacity="0.3"/>
</svg>