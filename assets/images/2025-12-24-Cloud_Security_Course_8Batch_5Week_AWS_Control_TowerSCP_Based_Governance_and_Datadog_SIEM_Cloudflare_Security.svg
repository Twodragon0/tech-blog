<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security 8th - Week 5: Control Tower and Datadog SIEM</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#151a35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#632ca6"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="450" r="200" fill="#632ca6" opacity="0.05" filter="url(#sg)"/>
  <circle cx="1050" cy="450" r="140" fill="#00b4d8" opacity="0.05" filter="url(#sg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Topic illustrations: Control Tower with SCP policy layers + SIEM dashboard -->
  <g transform="translate(940,290)" opacity="0.38">
    <!-- Control Tower (left): layered hierarchy -->
    <!-- Tower top (root account) -->
    <polygon points="0,-120 30,-90 -30,-90" fill="#632ca6" opacity="0.4"/>
    <!-- SCP layer 1 -->
    <rect x="-50" y="-85" width="100" height="28" rx="5" fill="#632ca6" opacity="0.2" stroke="#632ca6" stroke-width="1.5"/>
    <!-- SCP layer 2 -->
    <rect x="-65" y="-50" width="130" height="28" rx="5" fill="#632ca6" opacity="0.15" stroke="#632ca6" stroke-width="1.5"/>
    <!-- SCP layer 3 -->
    <rect x="-80" y="-15" width="160" height="28" rx="5" fill="#632ca6" opacity="0.1" stroke="#632ca6" stroke-width="1.5"/>
    <!-- SIEM dashboard (right side) -->
    <rect x="30" y="-120" width="165" height="170" rx="8" fill="none" stroke="#00b4d8" stroke-width="2"/>
    <!-- SIEM header -->
    <rect x="30" y="-120" width="165" height="22" rx="8" fill="#00b4d8" opacity="0.15"/>
    <!-- Log stream lines -->
    <rect x="38" y="-92" width="149" height="8" rx="2" fill="#00b4d8" opacity="0.1"/>
    <rect x="38" y="-80" width="149" height="8" rx="2" fill="#00b4d8" opacity="0.05"/>
    <rect x="38" y="-68" width="149" height="8" rx="2" fill="#c0392b" opacity="0.08"/>
    <rect x="38" y="-56" width="149" height="8" rx="2" fill="#00b4d8" opacity="0.05"/>
    <!-- Mini bar chart for events -->
    <rect x="38" y="-40" width="149" height="60" rx="4" fill="#0a0f1a" stroke="#00b4d8" stroke-width="1" opacity="0.6"/>
    <rect x="45" y="-5" width="12" height="15" rx="2" fill="#00b4d8" opacity="0.5"/>
    <rect x="61" y="-15" width="12" height="25" rx="2" fill="#00b4d8" opacity="0.4"/>
    <rect x="77" y="-25" width="12" height="35" rx="2" fill="#c0392b" opacity="0.6"/>
    <rect x="93" y="-18" width="12" height="28" rx="2" fill="#00b4d8" opacity="0.4"/>
    <rect x="109" y="-10" width="12" height="20" rx="2" fill="#00b4d8" opacity="0.5"/>
    <rect x="125" y="-20" width="12" height="30" rx="2" fill="#c0392b" opacity="0.5"/>
    <rect x="141" y="-8" width="12" height="18" rx="2" fill="#00b4d8" opacity="0.4"/>
    <rect x="157" y="-30" width="12" height="40" rx="2" fill="#c0392b" opacity="0.6"/>
    <!-- Week 5 badge -->
    <rect x="30" y="55" width="80" height="28" rx="8" fill="#00b4d8" opacity="0.15" stroke="#00b4d8" stroke-width="1"/>
  </g>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="40" y="38" width="260" height="34" rx="17" fill="#632ca6" opacity="0.15" stroke="#632ca6" stroke-width="1"/>
  <text x="80" y="60" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#a068d6">DECEMBER 24, 2025</text>
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#ffffff" filter="url(#glow)">Cloud Security 8th -</text>
  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#00b4d8" filter="url(#glow)">Week 5: Control Tower &amp; SIEM</text>
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="#94a3b8">AWS Control Tower SCP governance &amp; Datadog SIEM + Cloudflare security</text>
  <line x1="80" y1="325" x2="560" y2="325" stroke="#632ca6" stroke-width="2" opacity="0.6"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00b4d8" letter-spacing="3">CLOUD SECURITY COURSE</text>
  <rect x="80" y="398" width="140" height="32" rx="16" fill="#632ca6" opacity="0.15" stroke="#632ca6" stroke-width="1"/>
  <text x="150" y="419" font-family="Arial,sans-serif" font-size="13" fill="#c090e8" text-anchor="middle">Control Tower</text>
  <rect x="234" y="398" width="130" height="32" rx="16" fill="#00b4d8" opacity="0.15" stroke="#00b4d8" stroke-width="1"/>
  <text x="299" y="419" font-family="Arial,sans-serif" font-size="13" fill="#7de8f5" text-anchor="middle">Datadog SIEM</text>
  <rect x="378" y="398" width="80" height="32" rx="16" fill="#632ca6" opacity="0.1" stroke="#632ca6" stroke-width="1"/>
  <text x="418" y="419" font-family="Arial,sans-serif" font-size="13" fill="#c090e8" text-anchor="middle">Week 5</text>
  <rect x="0" y="520" width="1200" height="110" fill="#000000" opacity="0.25"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#632ca6" stroke-width="1" opacity="0.3"/>
  <text x="80" y="566" font-family="Arial,sans-serif" font-size="14" fill="#64748b">tech.2twodragon.com</text>
  <text x="80" y="592" font-family="Arial,sans-serif" font-size="13" fill="#475569">DevSecOps</text>
</svg>
