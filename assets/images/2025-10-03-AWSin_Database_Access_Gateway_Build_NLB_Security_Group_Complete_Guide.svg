<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side: Title and metadata -->
  <text x="60" y="185" font-size="46" font-weight="bold" fill="white" font-family="system-ui, -apple-system, sans-serif">AWSIn Database Access</text>
  <text x="60" y="245" font-size="46" font-weight="bold" fill="white" font-family="system-ui, -apple-system, sans-serif">Gateway Build NLB</text>
  
  <!-- Date badge -->
  <rect x="60" y="280" width="220" height="36" rx="6" fill="#1a3a52" stroke="#ff9900" stroke-width="1"/>
  <text x="70" y="303" font-size="13" fill="#ff9900" font-family="system-ui, -apple-system, sans-serif" font-weight="500">OCTOBER 3, 2025</text>
  
  <!-- Tag pills -->
  <rect x="60" y="420" width="80" height="32" rx="16" fill="#1a2f4a"/>
  <text x="100" y="440" font-size="12" fill="#4a9eff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">cloud</text>
  
  <rect x="155" y="420" width="100" height="32" rx="16" fill="#1a2f4a"/>
  <text x="205" y="440" font-size="12" fill="#4a9eff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">networking</text>
  
  <rect x="270" y="420" width="70" height="32" rx="16" fill="#1a2f4a"/>
  <text x="305" y="440" font-size="12" fill="#4a9eff" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">aws</text>
  
  <!-- Footer -->
  <text x="60" y="595" font-size="12" fill="#666" font-family="system-ui, -apple-system, sans-serif">tech.2twodragon.com</text>
  
  <!-- Right side illustration: NLB + Database Access Gateway -->
  
  <!-- Background accent -->
  <circle cx="900" cy="315" r="180" fill="#1a3a52" opacity="0.3"/>
  
  <!-- NLB Load Balancer (top center) -->
  <g>
    <!-- NLB icon - stylized load balancer -->
    <rect x="840" y="100" width="120" height="80" rx="8" fill="#ff9900" opacity="0.2" stroke="#ff9900" stroke-width="2"/>
    <circle cx="870" cy="125" r="8" fill="#ff9900"/>
    <circle cx="900" cy="125" r="8" fill="#ff9900"/>
    <circle cx="930" cy="125" r="8" fill="#ff9900"/>
    <line x1="870" y1="135" x2="870" y2="155" stroke="#ff9900" stroke-width="2"/>
    <line x1="900" y1="135" x2="900" y2="155" stroke="#ff9900" stroke-width="2"/>
    <line x1="930" y1="135" x2="930" y2="155" stroke="#ff9900" stroke-width="2"/>
    <text x="900" y="175" font-size="14" fill="#ff9900" text-anchor="middle" font-weight="bold">NLB</text>
  </g>
  
  <!-- Database Access Gateway (center) -->
  <g>
    <!-- Gateway box -->
    <rect x="820" y="220" width="160" height="100" rx="8" fill="#4a9eff" opacity="0.15" stroke="#4a9eff" stroke-width="2"/>
    <!-- Gateway icon -->
    <path d="M 870 250 L 900 250 L 910 270 L 900 290 L 870 290 L 860 270 Z" fill="#4a9eff" opacity="0.7"/>
    <circle cx="900" cy="270" r="6" fill="#0a0c1a"/>
    <text x="900" y="330" font-size="13" fill="#4a9eff" text-anchor="middle" font-weight="600">Access Gateway</text>
  </g>
  
  <!-- Database (bottom) -->
  <g>
    <!-- Database cylinder -->
    <ellipse cx="900" cy="415" rx="35" ry="12" fill="#00d4aa" opacity="0.2" stroke="#00d4aa" stroke-width="2"/>
    <rect x="865" y="415" width="70" height="50" fill="#00d4aa" opacity="0.15" stroke="#00d4aa" stroke-width="2"/>
    <ellipse cx="900" cy="465" rx="35" ry="12" fill="#00d4aa" stroke="#00d4aa" stroke-width="2"/>
    <!-- Database rings -->
    <ellipse cx="900" cy="430" rx="30" ry="8" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
    <ellipse cx="900" cy="445" rx="30" ry="8" fill="none" stroke="#00d4aa" stroke-width="1" opacity="0.6"/>
    <text x="900" y="520" font-size="13" fill="#00d4aa" text-anchor="middle" font-weight="600">Database</text>
  </g>
  
  <!-- Connection arrows -->
  <!-- NLB to Gateway -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a9eff"/>
    </marker>
  </defs>
  
  <path d="M 900 180 Q 920 200 900 220" fill="none" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- Gateway to Database -->
  <path d="M 900 320 Q 920 360 900 410" fill="none" stroke="#00d4aa" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- Left side connectors (multiple) -->
  <line x1="820" y1="260" x2="750" y2="260" stroke="#ff9900" stroke-width="2" opacity="0.5"/>
  <line x1="820" y1="280" x2="750" y2="280" stroke="#ff9900" stroke-width="2" opacity="0.5"/>
  <line x1="820" y1="300" x2="750" y2="300" stroke="#ff9900" stroke-width="2" opacity="0.5"/>
  
  <!-- Security lock icons (gateway security) -->
  <g opacity="0.7">
    <rect x="1000" y="235" width="20" height="25" rx="2" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <path d="M 1005 240 Q 1008 240 1008 243 L 1008 250 Q 1008 253 1005 253 Q 1002 253 1002 250 L 1002 243 Q 1002 240 1005 240" fill="#ff6b6b"/>
    <circle cx="1005" cy="248" r="1.5" fill="#0a0c1a"/>
  </g>
  
  <!-- Tech accent lines -->
  <line x1="1050" y1="200" x2="1100" y2="180" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <line x1="1050" y1="330" x2="1100" y2="350" stroke="#00d4aa" stroke-width="1" opacity="0.3"/>
  <line x1="1050" y1="460" x2="1100" y2="440" stroke="#ff9900" stroke-width="1" opacity="0.3"/>
</svg>