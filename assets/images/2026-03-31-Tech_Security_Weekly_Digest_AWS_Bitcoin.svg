<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1220;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- RIGHT SIDE: Detailed Visual Scene (x=650-1150, y=80-550) -->

  <!-- Cloud Infrastructure -->
  <g id="cloud-section" opacity="0.09">
    <path d="M 750 150 Q 780 130 810 150 Q 830 140 850 160 L 850 220 Q 830 240 800 240 Q 780 250 750 240 Q 730 250 700 240 Q 680 240 670 220 L 670 160 Q 690 140 750 150" fill="#3b82f6" stroke="#3b82f6" stroke-width="0.3"/>
  </g>

  <!-- Data flow arrows from cloud -->
  <g id="data-flow" stroke="#3b82f6" stroke-width="0.25" opacity="0.08" fill="none">
    <path d="M 800 240 L 800 280" marker-end="url(#arrowBlue)"/>
    <path d="M 750 240 L 750 280"/>
    <path d="M 700 240 L 700 280"/>
  </g>

  <!-- Shield with checkmark (Security/Compliance) -->
  <g id="shield" opacity="0.1">
    <path d="M 900 200 L 950 220 L 950 300 Q 925 340 900 350 Q 875 340 850 300 L 850 220 Z" fill="#ef4444" stroke="#ef4444" stroke-width="0.3"/>
    <!-- Checkmark inside shield -->
    <path d="M 890 290 L 905 310 L 925 280" stroke="#ef4444" stroke-width="0.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Blockchain/Chain links -->
  <g id="chain" opacity="0.085">
    <circle cx="800" cy="340" r="15" fill="none" stroke="#f59e0b" stroke-width="0.3"/>
    <circle cx="850" cy="340" r="15" fill="none" stroke="#f59e0b" stroke-width="0.3"/>
    <circle cx="900" cy="340" r="15" fill="none" stroke="#f59e0b" stroke-width="0.3"/>
    <line x1="815" y1="340" x2="835" y2="340" stroke="#f59e0b" stroke-width="0.25"/>
    <line x1="865" y1="340" x2="885" y2="340" stroke="#f59e0b" stroke-width="0.25"/>
  </g>

  <!-- Bitcoin/Coin symbols -->
  <g id="coins" opacity="0.08">
    <!-- Coin 1 -->
    <circle cx="750" cy="400" r="18" fill="none" stroke="#f59e0b" stroke-width="0.3"/>
    <text x="750" y="407" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0.15">₿</text>
    <!-- Coin 2 -->
    <circle cx="850" cy="420" r="16" fill="none" stroke="#f59e0b" stroke-width="0.25"/>
    <text x="850" y="426" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0.15">₿</text>
    <!-- Coin 3 -->
    <circle cx="920" cy="400" r="14" fill="none" stroke="#f59e0b" stroke-width="0.25"/>
    <text x="920" y="405" font-size="12" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0.15">₿</text>
  </g>

  <!-- Warning triangles/Alert indicators -->
  <g id="alerts" opacity="0.095">
    <!-- Alert 1 -->
    <polygon points="700,480 710,460 720,480" fill="none" stroke="#ef4444" stroke-width="0.3"/>
    <text x="710" y="475" font-size="8" fill="#ef4444" text-anchor="middle" opacity="0.2">!</text>
    <!-- Alert 2 -->
    <polygon points="820,500 832,475 844,500" fill="none" stroke="#ef4444" stroke-width="0.3"/>
    <text x="832" y="493" font-size="8" fill="#ef4444" text-anchor="middle" opacity="0.2">!</text>
    <!-- Alert 3 -->
    <polygon points="950,460 960,440 970,460" fill="none" stroke="#ef4444" stroke-width="0.25"/>
    <text x="960" y="455" font-size="7" fill="#ef4444" text-anchor="middle" opacity="0.2">!</text>
  </g>

  <!-- Connecting data flow arrows -->
  <g id="connection-lines" stroke="#3b82f6" stroke-width="0.2" opacity="0.07" fill="none" stroke-dasharray="2,2">
    <path d="M 850 300 Q 875 320 900 340"/>
    <path d="M 750 300 Q 775 340 800 380"/>
    <path d="M 900 350 Q 920 375 920 400"/>
  </g>

  <!-- LEFT SIDE: Text Content -->

  <!-- Date badge -->
  <rect x="60" y="45" width="200" height="38" rx="6" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.3"/>
  <text x="160" y="68" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle" opacity="0.6">MARCH 31, 2026</text>

  <!-- Main title -->
  <text x="80" y="210" font-size="48" font-weight="700" fill="white" letter-spacing="-1">Tech Security</text>
  <text x="80" y="270" font-size="48" font-weight="700" fill="white" letter-spacing="-1">Weekly Digest</text>

  <!-- Subtitle -->
  <text x="80" y="330" font-size="36" font-weight="600" fill="#f59e0b" opacity="0.9">AWS & Bitcoin</text>

  <!-- Tag pills -->
  <g id="tags">
    <!-- Tag 1 -->
    <rect x="60" y="410" width="100" height="32" rx="16" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.25"/>
    <text x="110" y="432" font-size="13" fill="#3b82f6" text-anchor="middle" opacity="0.5">Cloud Security</text>

    <!-- Tag 2 -->
    <rect x="180" y="410" width="100" height="32" rx="16" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.25"/>
    <text x="230" y="432" font-size="13" fill="#ef4444" text-anchor="middle" opacity="0.5">Blockchain</text>

    <!-- Tag 3 -->
    <rect x="300" y="410" width="100" height="32" rx="16" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.25"/>
    <text x="350" y="432" font-size="13" fill="#f59e0b" text-anchor="middle" opacity="0.5">AWS & Bitcoin</text>
  </g>

  <!-- Footer -->
  <text x="80" y="575" font-size="14" fill="white" opacity="0.35">tech.2twodragon.com</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#3b82f6" opacity="0.3"/>
    </marker>
  </defs>
</svg>