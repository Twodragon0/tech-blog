<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <title>Cloud Security Course 8Batch 6Week AWS WAF CloudFront Security Architecture and GitHub DevSecOps Practical</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="wafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6600;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff2200;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00aaff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0055cc;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,80,0,0.05)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,80,0,0.07)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: WAF + CloudFront Shield -->
  <!-- Outer shield shape representing WAF -->
  <path d="M1010,135 L1120,165 L1120,245 Q1120,305 1010,330 Q900,305 900,245 L900,165 Z"
        fill="url(#wafGrad)" stroke="rgba(255,100,0,0.35)" stroke-width="1.5"/>

  <!-- Inner shield detail -->
  <path d="M1010,155 L1100,178 L1100,242 Q1100,292 1010,312 Q920,292 920,242 L920,178 Z"
        fill="none" stroke="rgba(255,140,0,0.25)" stroke-width="1"/>

  <!-- CloudFront CDN ring -->
  <ellipse cx="1010" cy="232" rx="68" ry="22" fill="url(#cloudGrad)" stroke="rgba(0,180,255,0.35)" stroke-width="1.5"/>
  <ellipse cx="1010" cy="232" rx="50" ry="16" fill="none" stroke="rgba(0,180,255,0.20)" stroke-width="1"/>

  <!-- Cloud shape on top -->
  <ellipse cx="1010" cy="185" rx="45" ry="18" fill="rgba(0,160,255,0.10)" stroke="rgba(0,180,255,0.30)" stroke-width="1.5"/>
  <ellipse cx="980" cy="195" rx="28" ry="14" fill="rgba(0,140,255,0.08)" stroke="rgba(0,170,255,0.25)" stroke-width="1"/>
  <ellipse cx="1040" cy="193" rx="24" ry="12" fill="rgba(0,140,255,0.08)" stroke="rgba(0,170,255,0.25)" stroke-width="1"/>

  <!-- WAF filter layers (horizontal slats) -->
  <rect x="942" y="228" width="136" height="4" rx="2" fill="rgba(255,120,0,0.18)" stroke="rgba(255,140,0,0.30)" stroke-width="0.8"/>
  <rect x="948" y="238" width="124" height="4" rx="2" fill="rgba(255,100,0,0.14)" stroke="rgba(255,120,0,0.25)" stroke-width="0.8"/>
  <rect x="955" y="248" width="110" height="4" rx="2" fill="rgba(255,80,0,0.10)" stroke="rgba(255,100,0,0.20)" stroke-width="0.8"/>

  <!-- Block/check icon in center of shield -->
  <circle cx="1010" cy="270" r="18" fill="rgba(255,60,0,0.12)" stroke="rgba(255,80,0,0.35)" stroke-width="1.5"/>
  <line x1="1002" y1="270" x2="1018" y2="270" stroke="rgba(255,100,0,0.50)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="1010" y1="262" x2="1010" y2="278" stroke="rgba(255,100,0,0.50)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Orbiting request dots -->
  <circle cx="888" cy="200" r="5" fill="rgba(255,60,60,0.55)" stroke="rgba(255,80,80,0.70)" stroke-width="1"/>
  <circle cx="884" cy="225" r="4" fill="rgba(255,100,0,0.45)" stroke="rgba(255,130,0,0.60)" stroke-width="1"/>
  <circle cx="890" cy="250" r="3.5" fill="rgba(255,60,60,0.40)" stroke="rgba(255,80,80,0.55)" stroke-width="0.8"/>

  <!-- Arrows being blocked -->
  <line x1="874" y1="200" x2="895" y2="200" stroke="rgba(255,60,60,0.30)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="870" y1="225" x2="890" y2="225" stroke="rgba(255,100,0,0.25)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- CF label -->
  <text x="970" y="177" font-size="10" fill="rgba(0,180,255,0.60)" font-family="monospace" font-weight="700">CloudFront</text>
  <text x="978" y="313" font-size="10" fill="rgba(255,120,0,0.55)" font-family="monospace" font-weight="700">AWS WAF</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.70)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(255,140,0,0.60)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(255,60,60,0.50)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.40)" stroke-width="1"/>
  <text x="95" y="81" font-size="13" fill="rgba(255,120,100,0.90)" font-family="Arial, sans-serif" font-weight="600" letter-spacing="1">JANUARY 8, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="Arial, sans-serif">Cloud Security Course 8Batch</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="Arial, sans-serif">6Week AWS WAF CloudFront</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(200,180,180,0.80)" font-family="Arial, sans-serif">Hands-on WAF Rules, CloudFront Distribution &amp; Edge Security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(255,100,80,0.80)" font-family="Arial, sans-serif" font-weight="600" letter-spacing="2">CLOUD SECURITY · DEVSECOPS · AWS</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="108" height="36" rx="18" fill="rgba(220,40,40,0.20)" stroke="rgba(220,60,60,0.45)" stroke-width="1"/>
  <text x="134" y="425" font-size="13" fill="rgba(255,140,120,0.95)" font-family="Arial, sans-serif" font-weight="600" text-anchor="middle">AWS WAF</text>

  <rect x="204" y="402" width="130" height="36" rx="18" fill="rgba(200,120,0,0.20)" stroke="rgba(220,150,0,0.45)" stroke-width="1"/>
  <text x="269" y="425" font-size="13" fill="rgba(255,200,100,0.95)" font-family="Arial, sans-serif" font-weight="600" text-anchor="middle">CloudFront</text>

  <rect x="350" y="402" width="108" height="36" rx="18" fill="rgba(0,100,200,0.20)" stroke="rgba(0,140,255,0.45)" stroke-width="1"/>
  <text x="404" y="425" font-size="13" fill="rgba(100,200,255,0.95)" font-family="Arial, sans-serif" font-weight="600" text-anchor="middle">Week 6</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="14" fill="rgba(180,160,160,0.55)" font-family="Arial, sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="14" fill="rgba(180,160,160,0.55)" font-family="Arial, sans-serif" text-anchor="end">security</text>
</svg>