<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="None" height="None">
  <title>Tech Security Weekly Digest Security</title>
  <defs>
    <style>
      .title-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 700; color: #ffffff; }
      .date-badge { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; }
      .tag-pill { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 11px; font-weight: 500; }
      .footer-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; }
    </style>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE: Content -->
  <!-- Title line 1 -->
  <text x="50" y="185" class="title-text" font-size="46">Tech Security Weekly</text>
  <!-- Title line 2 -->
  <text x="50" y="245" class="title-text" font-size="46">Digest Security</text>

  <!-- Date badge -->
  <rect x="50" y="265" width="180" height="32" rx="4" fill="rgba(0,217,255,0.1)" stroke="#00d9ff" stroke-width="1"/>
  <text x="65" y="287" class="date-badge" fill="#00d9ff">MARCH 8, 2026</text>

  <!-- Tag pills -->
  <g id="tags" y="420">
    <!-- Tag 1: Security -->
    <rect x="50" y="420" width="90" height="28" rx="14" fill="rgba(0,217,255,0.15)" stroke="#00d9ff" stroke-width="1"/>
    <text x="95" y="439" class="tag-pill" fill="#00d9ff" text-anchor="middle">SECURITY</text>

    <!-- Tag 2: Digest -->
    <rect x="160" y="420" width="85" height="28" rx="14" fill="rgba(0,255,136,0.15)" stroke="#00ff88" stroke-width="1"/>
    <text x="202" y="439" class="tag-pill" fill="#00ff88" text-anchor="middle">DIGEST</text>

    <!-- Tag 3: Weekly -->
    <rect x="265" y="420" width="80" height="28" rx="14" fill="rgba(255,100,100,0.15)" stroke="#ff6464" stroke-width="1"/>
    <text x="305" y="439" class="tag-pill" fill="#ff6464" text-anchor="middle">WEEKLY</text>
  </g>

  <!-- Footer -->
  <text x="50" y="605" class="footer-text" fill="#666666">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: Illustration for Tech Security Weekly Digest -->
  <!-- Shield with checkmark (main element) -->
  <g transform="translate(880, 180)">
    <!-- Shield body -->
    <path d="M 0 0 L 50 0 L 50 60 Q 50 85 0 100 Q -50 85 -50 60 L -50 0 Z"
          fill="url(#shieldGrad)" opacity="0.9" filter="url(#glow)"/>
    <!-- Shield border -->
    <path d="M 0 0 L 50 0 L 50 60 Q 50 85 0 100 Q -50 85 -50 60 L -50 0 Z"
          fill="none" stroke="#00d9ff" stroke-width="2" opacity="0.6"/>

    <!-- Checkmark inside shield -->
    <g transform="translate(-15, 35)">
      <path d="M 0 20 L 12 32 L 35 9" stroke="#ffffff" stroke-width="4" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Stacked digest cards -->
  <g transform="translate(800, 320)">
    <!-- Card 3 (back) -->
    <rect x="0" y="20" width="75" height="55" rx="3" fill="rgba(0,217,255,0.12)"
          stroke="#00d9ff" stroke-width="1" opacity="0.7"/>
    <line x1="8" y1="30" x2="67" y2="30" stroke="#00d9ff" stroke-width="1" opacity="0.5"/>
    <line x1="8" y1="38" x2="67" y2="38" stroke="#00d9ff" stroke-width="1" opacity="0.5"/>
    <line x1="8" y1="46" x2="55" y2="46" stroke="#00d9ff" stroke-width="1" opacity="0.5"/>

    <!-- Card 2 (middle) -->
    <rect x="-8" y="10" width="75" height="55" rx="3" fill="rgba(0,217,255,0.18)"
          stroke="#00d9ff" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="59" y2="20" stroke="#00d9ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="28" x2="59" y2="28" stroke="#00d9ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="36" x2="47" y2="36" stroke="#00d9ff" stroke-width="1.5" opacity="0.7"/>

    <!-- Card 1 (front) -->
    <rect x="-16" y="0" width="75" height="55" rx="3" fill="rgba(0,217,255,0.25)"
          stroke="#00d9ff" stroke-width="2"/>
    <line x1="-8" y1="10" x2="51" y2="10" stroke="#00d9ff" stroke-width="2" opacity="0.9"/>
    <line x1="-8" y1="18" x2="51" y2="18" stroke="#00d9ff" stroke-width="2" opacity="0.9"/>
    <line x1="-8" y1="26" x2="39" y2="26" stroke="#00d9ff" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- Network/scanning visualization -->
  <g transform="translate(950, 380)" opacity="0.7">
    <!-- Center node -->
    <circle cx="0" cy="0" r="4" fill="#00ff88" filter="url(#glow)"/>

    <!-- Surrounding nodes -->
    <circle cx="30" cy="0" r="3" fill="#00d9ff" opacity="0.8"/>
    <circle cx="-30" cy="0" r="3" fill="#00d9ff" opacity="0.8"/>
    <circle cx="0" cy="30" r="3" fill="#00d9ff" opacity="0.8"/>
    <circle cx="0" cy="-30" r="3" fill="#00d9ff" opacity="0.8"/>
    <circle cx="21" cy="21" r="2.5" fill="#00d9ff" opacity="0.6"/>
    <circle cx="-21" cy="21" r="2.5" fill="#00d9ff" opacity="0.6"/>
    <circle cx="21" cy="-21" r="2.5" fill="#00d9ff" opacity="0.6"/>
    <circle cx="-21" cy="-21" r="2.5" fill="#00d9ff" opacity="0.6"/>

    <!-- Connection lines -->
    <line x1="0" y1="0" x2="30" y2="0" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-30" y2="0" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="30" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="21" y2="21" stroke="#00d9ff" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="-21" y2="21" stroke="#00d9ff" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="21" y2="-21" stroke="#00d9ff" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="-21" y2="-21" stroke="#00d9ff" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Lock icon bottom right -->
  <g transform="translate(1040, 480)">
    <!-- Lock body -->
    <rect x="-18" y="10" width="36" height="32" rx="2" fill="none"
          stroke="#00ff88" stroke-width="2" opacity="0.8"/>
    <!-- Lock shackle -->
    <path d="M -10 10 Q -10 -5 0 -5 Q 10 -5 10 10" fill="none"
          stroke="#00ff88" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="20" r="2.5" fill="#00ff88" opacity="0.8"/>
  </g>

  <!-- Scanning lines effect -->
  <g opacity="0.5">
    <line x1="700" y1="200" x2="1150" y2="200" stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
    <line x1="700" y1="320" x2="1150" y2="320" stroke="#00d9ff" stroke-width="1" opacity="0.2"/>
    <line x1="700" y1="440" x2="1150" y2="440" stroke="#00d9ff" stroke-width="1" opacity="0.25"/>
    <line x1="700" y1="560" x2="1150" y2="560" stroke="#00d9ff" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Accent dots -->
  <circle cx="720" cy="150" r="2" fill="#00ff88" opacity="0.6"/>
  <circle cx="1130" cy="520" r="2" fill="#00ff88" opacity="0.6"/>
  <circle cx="750" cy="550" r="1.5" fill="#00d9ff" opacity="0.4"/>
</svg>