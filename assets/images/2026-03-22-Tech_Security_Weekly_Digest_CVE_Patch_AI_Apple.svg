<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="50%" style="stop-color:#9b2c2c"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#4a1c1c;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#718096;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(229,62,62,0.04)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(229,62,62,0.05)" stroke="none"/>

  <!-- RIGHT SIDE ILLUSTRATION: CVE Shield + Apple Logo + AI brain + Patch circuits -->

  <!-- Outer shield body -->
  <path d="M1010,140 L1090,140 L1110,165 L1110,250 Q1110,300 1050,330 Q990,300 990,250 L990,165 Z" fill="url(#shieldGrad)" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>

  <!-- Shield inner layer -->
  <path d="M1015,155 L1085,155 L1100,175 L1100,248 Q1100,290 1050,315 Q1000,290 1000,248 L1000,175 Z" fill="rgba(229,62,62,0.06)" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>

  <!-- CVE text in shield -->
  <text x="1027" y="218" font-family="monospace" font-size="22" font-weight="700" fill="rgba(229,62,62,0.7)" letter-spacing="2">CVE</text>
  <text x="1030" y="242" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1">PATCH</text>

  <!-- Shield lock icon -->
  <rect x="1037" y="255" width="26" height="20" rx="3" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1.2"/>
  <path d="M1043,255 L1043,249 Q1043,242 1050,242 Q1057,242 1057,249 L1057,255" fill="none" stroke="rgba(229,62,62,0.5)" stroke-width="1.5"/>
  <circle cx="1050" cy="264" r="3" fill="rgba(229,62,62,0.7)"/>

  <!-- Apple logo shape (stylized) -->
  <g transform="translate(880, 145)">
    <!-- Apple body -->
    <path d="M40,18 Q40,8 50,5 Q50,5 44,0 Q34,0 28,8 Q22,0 12,0 Q6,5 6,5 Q16,8 16,18 Q16,35 28,42 Q40,35 40,18 Z" fill="url(#appleGrad)" stroke="rgba(160,174,192,0.3)" stroke-width="1.2"/>
    <!-- Apple leaf -->
    <path d="M36,2 Q42,-4 46,0 Q40,2 36,8 Z" fill="rgba(160,174,192,0.2)" stroke="rgba(160,174,192,0.35)" stroke-width="1"/>
    <!-- Apple bite -->
    <path d="M40,18 Q40,8 50,5" fill="none" stroke="rgba(160,174,192,0.15)" stroke-width="0.8"/>
  </g>

  <!-- AI Neural network nodes (right side, around shield) -->
  <circle cx="930" cy="175" r="7" fill="rgba(99,179,237,0.12)" stroke="rgba(99,179,237,0.35)" stroke-width="1.2"/>
  <circle cx="960" cy="155" r="5" fill="rgba(99,179,237,0.1)" stroke="rgba(99,179,237,0.3)" stroke-width="1"/>
  <circle cx="940" cy="200" r="6" fill="rgba(99,179,237,0.1)" stroke="rgba(99,179,237,0.28)" stroke-width="1"/>
  <circle cx="1110" cy="195" r="7" fill="rgba(99,179,237,0.1)" stroke="rgba(99,179,237,0.3)" stroke-width="1.2"/>
  <circle cx="1130" cy="225" r="5" fill="rgba(99,179,237,0.08)" stroke="rgba(99,179,237,0.25)" stroke-width="1"/>
  <circle cx="1115" cy="250" r="6" fill="rgba(99,179,237,0.1)" stroke="rgba(99,179,237,0.28)" stroke-width="1"/>

  <!-- Neural connections -->
  <line x1="930" y1="175" x2="960" y2="155" stroke="rgba(99,179,237,0.18)" stroke-width="0.8"/>
  <line x1="930" y1="175" x2="940" y2="200" stroke="rgba(99,179,237,0.15)" stroke-width="0.8"/>
  <line x1="960" y1="155" x2="990" y2="165" stroke="rgba(99,179,237,0.12)" stroke-width="0.8"/>
  <line x1="1110" y1="195" x2="1130" y2="225" stroke="rgba(99,179,237,0.18)" stroke-width="0.8"/>
  <line x1="1130" y1="225" x2="1115" y2="250" stroke="rgba(99,179,237,0.15)" stroke-width="0.8"/>
  <line x1="1110" y1="195" x2="1110" y2="165" stroke="rgba(99,179,237,0.12)" stroke-width="0.8"/>

  <!-- Patch hexagons -->
  <polygon points="900,290 918,280 936,290 936,310 918,320 900,310" fill="rgba(236,201,75,0.07)" stroke="rgba(236,201,75,0.28)" stroke-width="1"/>
  <text x="910" y="303" font-family="monospace" font-size="9" fill="rgba(236,201,75,0.5)" font-weight="700">FIX</text>

  <polygon points="1100,290 1118,280 1136,290 1136,310 1118,320 1100,310" fill="rgba(236,201,75,0.06)" stroke="rgba(236,201,75,0.22)" stroke-width="1"/>
  <text x="1107" y="303" font-family="monospace" font-size="9" fill="rgba(236,201,75,0.45)" font-weight="700">PKT</text>

  <!-- Circuit board traces -->
  <path d="M890,340 L920,340 L920,320 L940,320" fill="none" stroke="rgba(99,179,237,0.15)" stroke-width="0.8"/>
  <circle cx="940" cy="320" r="2.5" fill="rgba(99,179,237,0.3)"/>
  <path d="M1070,340 L1100,340 L1100,320 L1120,320" fill="none" stroke="rgba(99,179,237,0.15)" stroke-width="0.8"/>
  <circle cx="1120" cy="320" r="2.5" fill="rgba(99,179,237,0.3)"/>

  <!-- Scan lines across illustration area -->
  <line x1="880" y1="160" x2="1140" y2="160" stroke="rgba(229,62,62,0.06)" stroke-width="0.5"/>
  <line x1="880" y1="180" x2="1140" y2="180" stroke="rgba(229,62,62,0.04)" stroke-width="0.5"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.75)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(236,201,75,0.75)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(229,62,62,0.6)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="92" y="81" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(229,62,62,0.9)" letter-spacing="1.2">MARCH 22, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="rgba(229,62,62,0.9)">CVE Patch AI Apple</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="19" fill="rgba(160,174,192,0.85)">Weekly threat intelligence, vulnerability patches &amp; AI security insights</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(160,174,192,0.6)" letter-spacing="2.5">SECURITY / VULNERABILITY / INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.45)" stroke-width="1.2"/>
  <text x="120" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(229,62,62,0.95)" text-anchor="middle">CVE Patch</text>

  <rect x="214" y="402" width="100" height="36" rx="18" fill="rgba(236,201,75,0.15)" stroke="rgba(236,201,75,0.4)" stroke-width="1.2"/>
  <text x="264" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(236,201,75,0.95)" text-anchor="middle">AI Risk</text>

  <rect x="328" y="402" width="106" height="36" rx="18" fill="rgba(99,179,237,0.15)" stroke="rgba(99,179,237,0.4)" stroke-width="1.2"/>
  <text x="381" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(99,179,237,0.95)" text-anchor="middle">Apple CVE</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="14" fill="rgba(160,174,192,0.45)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(229,62,62,0.5)" text-anchor="end" letter-spacing="1.5">SECURITY</text>
</svg>