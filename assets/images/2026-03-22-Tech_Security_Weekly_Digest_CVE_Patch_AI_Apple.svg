<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b2de0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b2de0;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#5b2de0;stop-opacity:0.08" />
    </linearGradient>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#aaaaaa;stop-opacity:0.06" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Apple + Shield + CVE/AI motif -->

  <!-- Outer security ring -->
  <circle cx="1010" cy="225" r="115" fill="none" stroke="rgba(255,59,59,0.25)" stroke-width="1.5" stroke-dasharray="8,4"/>
  <circle cx="1010" cy="225" r="88" fill="none" stroke="rgba(91,45,224,0.2)" stroke-width="1" stroke-dasharray="5,6"/>

  <!-- Shield body -->
  <path d="M1010,130 L1075,158 L1075,218 Q1075,268 1010,295 Q945,268 945,218 L945,158 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,100,80,0.3)" stroke-width="1.5"/>

  <!-- Shield inner glow -->
  <path d="M1010,148 L1060,170 L1060,218 Q1060,255 1010,275 Q960,255 960,218 L960,170 Z"
        fill="rgba(255,59,59,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Apple logo silhouette inside shield -->
  <!-- Apple body -->
  <path d="M1010,175 Q1030,172 1040,185 Q1048,197 1045,215 Q1041,235 1028,242 Q1022,245 1015,242 Q1010,240 1005,242 Q998,245 992,242 Q979,235 975,215 Q972,197 980,185 Q990,172 1010,175 Z"
        fill="url(#appleGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="1.2"/>
  <!-- Apple leaf -->
  <path d="M1010,175 Q1018,163 1028,165 Q1022,172 1010,175 Z"
        fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <!-- Apple bite -->
  <circle cx="1040" cy="192" r="10" fill="rgba(10,12,26,0.7)"/>

  <!-- CVE label inside shield -->
  <text x="1010" y="268" font-family="monospace" font-size="9" fill="rgba(255,100,80,0.7)" text-anchor="middle" letter-spacing="2">CVE</text>

  <!-- AI neural nodes around shield -->
  <circle cx="940" cy="160" r="5" fill="rgba(91,45,224,0.5)" stroke="rgba(91,45,224,0.6)" stroke-width="1"/>
  <circle cx="1080" cy="165" r="4" fill="rgba(91,45,224,0.4)" stroke="rgba(91,45,224,0.5)" stroke-width="1"/>
  <circle cx="930" cy="230" r="4" fill="rgba(255,59,59,0.4)" stroke="rgba(255,59,59,0.5)" stroke-width="1"/>
  <circle cx="1090" cy="235" r="5" fill="rgba(255,59,59,0.5)" stroke="rgba(255,59,59,0.6)" stroke-width="1"/>
  <circle cx="960" cy="295" r="4" fill="rgba(91,45,224,0.35)" stroke="rgba(91,45,224,0.45)" stroke-width="1"/>
  <circle cx="1060" cy="300" r="4" fill="rgba(255,100,50,0.4)" stroke="rgba(255,100,50,0.5)" stroke-width="1"/>

  <!-- Neural connection lines -->
  <line x1="940" y1="160" x2="960" y2="170" stroke="rgba(91,45,224,0.25)" stroke-width="1"/>
  <line x1="1080" y1="165" x2="1060" y2="172" stroke="rgba(91,45,224,0.22)" stroke-width="1"/>
  <line x1="930" y1="230" x2="945" y2="218" stroke="rgba(255,59,59,0.2)" stroke-width="1"/>
  <line x1="1090" y1="235" x2="1075" y2="220" stroke="rgba(255,59,59,0.22)" stroke-width="1"/>
  <line x1="960" y1="295" x2="975" y2="278" stroke="rgba(91,45,224,0.2)" stroke-width="1"/>
  <line x1="1060" y1="300" x2="1047" y2="280" stroke="rgba(255,100,50,0.2)" stroke-width="1"/>

  <!-- Patch indicator ring -->
  <circle cx="1010" cy="225" r="60" fill="none" stroke="rgba(255,200,50,0.15)" stroke-width="2" stroke-dasharray="3,9"/>

  <!-- PATCH text arc indicator -->
  <text font-family="monospace" font-size="8" fill="rgba(255,200,50,0.4)" letter-spacing="3">
    <textPath href="#patchArc">PATCH · UPDATE · SECURE</textPath>
  </text>
  <defs>
    <path id="patchArc" d="M910,225 A100,100 0 0,1 1110,225"/>
  </defs>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,59,59,0.03)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(91,45,224,0.04)" stroke="none"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,59,59,0.7)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(255,160,50,0.6)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(255,59,59,0.5)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,59,59,0.15)" stroke="rgba(255,59,59,0.35)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(255,140,120,0.95)" text-anchor="middle" letter-spacing="1.5" font-weight="600">MARCH 22, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white">CVE Patch AI Apple</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="rgba(200,180,200,0.75)">Security vulnerabilities, AI threats &amp; Apple patches</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(255,120,100,0.8)" letter-spacing="3" font-weight="600">SECURITY · DEVSECOPS · ADVISORY</text>

  <!-- Tag pills -->
  <rect x="80" y="400" width="110" height="36" rx="18" fill="rgba(255,59,59,0.18)" stroke="rgba(255,59,59,0.4)" stroke-width="1"/>
  <text x="135" y="423" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(255,130,110,0.95)" text-anchor="middle" font-weight="500">CVE Patch</text>

  <rect x="205" y="400" width="90" height="36" rx="18" fill="rgba(255,160,30,0.18)" stroke="rgba(255,160,30,0.4)" stroke-width="1"/>
  <text x="250" y="423" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(255,190,80,0.95)" text-anchor="middle" font-weight="500">AI Risk</text>

  <rect x="308" y="400" width="100" height="36" rx="18" fill="rgba(91,45,224,0.2)" stroke="rgba(130,90,255,0.4)" stroke-width="1"/>
  <text x="358" y="423" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(170,140,255,0.95)" text-anchor="middle" font-weight="500">Apple Fix</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(180,160,180,0.5)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(255,100,80,0.45)" text-anchor="end" letter-spacing="1.5">SECURITY</text>
</svg>