<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b30;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff9500;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#007aff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3b30;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff3b30;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9500;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ff3b30;stop-opacity:0.10"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#5ac8fa;stop-opacity:0.07"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid: horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid: vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Apple-inspired security shield with CVE/AI elements -->

  <!-- Outer ring - AI neural halo -->
  <circle cx="1010" cy="225" r="130" fill="none" stroke="rgba(0,122,255,0.22)" stroke-width="1.5" stroke-dasharray="8 6"/>
  <circle cx="1010" cy="225" r="110" fill="none" stroke="rgba(255,149,0,0.15)" stroke-width="1" stroke-dasharray="4 8"/>

  <!-- Shield body (Apple security reference) -->
  <path d="M1010,110 L1060,135 L1075,180 L1075,225 Q1075,290 1010,320 Q945,290 945,225 L945,180 L960,135 Z"
        fill="url(#shieldGrad)" stroke="rgba(0,122,255,0.35)" stroke-width="1.5"/>

  <!-- Apple logo silhouette inside shield -->
  <g transform="translate(998,165)" opacity="0.55">
    <path d="M12,0 C12,0 16,-3 20,0 C24,3 24,9 24,9 C24,9 20,10 18,8 C16,6 16,3 12,0 Z" fill="rgba(255,255,255,0.45)"/>
    <path d="M6,10 Q0,10 0,20 Q0,34 6,40 Q10,44 14,42 Q17,41 20,42 Q23,41 26,42 Q30,44 34,40 Q40,34 40,20 Q40,10 34,10 Q30,10 27,12 Q24,14 20,14 Q16,14 13,12 Q10,10 6,10 Z" fill="rgba(255,255,255,0.40)"/>
  </g>

  <!-- CVE badge elements -->
  <rect x="940" y="290" width="70" height="22" rx="4" fill="rgba(255,59,48,0.12)" stroke="rgba(255,59,48,0.30)" stroke-width="1"/>
  <text x="975" y="305" font-size="10" font-family="monospace" fill="rgba(255,59,48,0.85)" text-anchor="middle" font-weight="700">CVE</text>

  <rect x="1020" y="290" width="70" height="22" rx="4" fill="rgba(255,149,0,0.10)" stroke="rgba(255,149,0,0.28)" stroke-width="1"/>
  <text x="1055" y="305" font-size="10" font-family="monospace" fill="rgba(255,149,0,0.85)" text-anchor="middle" font-weight="700">PATCH</text>

  <!-- AI neural nodes radiating from shield -->
  <circle cx="880" cy="155" r="6" fill="rgba(90,200,250,0.14)" stroke="rgba(90,200,250,0.32)" stroke-width="1.2"/>
  <circle cx="1140" cy="175" r="5" fill="rgba(90,200,250,0.10)" stroke="rgba(90,200,250,0.28)" stroke-width="1"/>
  <circle cx="1120" cy="280" r="7" fill="rgba(0,122,255,0.12)" stroke="rgba(0,122,255,0.30)" stroke-width="1.2"/>
  <circle cx="885" cy="295" r="5" fill="rgba(255,149,0,0.12)" stroke="rgba(255,149,0,0.28)" stroke-width="1"/>
  <circle cx="900" cy="210" r="4" fill="rgba(90,200,250,0.10)" stroke="rgba(90,200,250,0.25)" stroke-width="1"/>
  <circle cx="1125" cy="220" r="4" fill="rgba(90,200,250,0.10)" stroke="rgba(90,200,250,0.25)" stroke-width="1"/>

  <!-- Neural connection lines -->
  <line x1="880" y1="155" x2="945" y2="175" stroke="rgba(90,200,250,0.12)" stroke-width="1"/>
  <line x1="1140" y1="175" x2="1075" y2="185" stroke="rgba(90,200,250,0.10)" stroke-width="1"/>
  <line x1="1120" y1="280" x2="1075" y2="265" stroke="rgba(0,122,255,0.12)" stroke-width="1"/>
  <line x1="885" y1="295" x2="945" y2="270" stroke="rgba(255,149,0,0.10)" stroke-width="1"/>
  <line x1="900" y1="210" x2="945" y2="215" stroke="rgba(90,200,250,0.10)" stroke-width="1"/>
  <line x1="1125" y1="220" x2="1075" y2="220" stroke="rgba(90,200,250,0.10)" stroke-width="1"/>

  <!-- Lock icon inside shield lower half -->
  <rect x="1000" y="230" width="20" height="16" rx="3" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.2"/>
  <path d="M1004,230 L1004,225 Q1004,219 1010,219 Q1016,219 1016,225 L1016,230" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.2"/>
  <circle cx="1010" cy="238" r="2.5" fill="rgba(255,255,255,0.40)"/>

  <!-- AI hexagon pattern -->
  <polygon points="1010,148 1020,153 1020,163 1010,168 1000,163 1000,153" fill="rgba(0,122,255,0.08)" stroke="rgba(0,122,255,0.22)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,59,48,0.75)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,149,0,0.65)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,59,48,0.50)"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,59,48,0.12)" stroke="rgba(255,59,48,0.28)" stroke-width="1"/>
  <text x="180" y="81" font-size="12" font-family="'Helvetica Neue',Arial,sans-serif" fill="rgba(255,100,80,0.90)" text-anchor="middle" font-weight="600" letter-spacing="1.5">MARCH 22, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="700" fill="white" letter-spacing="-0.5">CVE Patch AI Apple</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" font-family="'Helvetica Neue',Arial,sans-serif" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">Security vulnerabilities, patches &amp; AI-driven threat intelligence</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" font-family="'Helvetica Neue',Arial,sans-serif" fill="rgba(255,255,255,0.40)" letter-spacing="3" font-weight="500">SECURITY · DEVSECOPS · VULNERABILITY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="100" height="36" rx="18" fill="rgba(255,59,48,0.18)" stroke="rgba(255,59,48,0.35)" stroke-width="1"/>
  <text x="130" y="425" font-size="13" font-family="'Helvetica Neue',Arial,sans-serif" fill="rgba(255,100,80,0.95)" text-anchor="middle" font-weight="600">CVE-2026</text>

  <rect x="196" y="402" width="110" height="36" rx="18" fill="rgba(255,149,0,0.15)" stroke="rgba(255,149,0,0.32)" stroke-width="1"/>
  <text x="251" y="425" font-size="13" font-family="'Helvetica Neue',Arial,sans-serif" fill="rgba(255,165,50,0.95)" text-anchor="middle" font-weight="600">Apple Patch</text>

  <rect x="322" y="402" width="90" height="36" rx="18" fill="rgba(0,122,255,0.15)" stroke="rgba(0,122,255,0.32)" stroke-width="1"/>
  <text x="367" y="425" font-size="13" font-family="'Helvetica Neue',Arial,sans-serif" fill="rgba(100,180,255,0.95)" text-anchor="middle" font-weight="600">AI Intel</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" font-family="'Helvetica Neue',Arial,sans-serif" fill="rgba(255,255,255,0.30)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" font-family="'Helvetica Neue',Arial,sans-serif" fill="rgba(255,255,255,0.30)" text-anchor="end" letter-spacing="0.5">SECURITY</text>
</svg>