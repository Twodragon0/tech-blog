<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>FBI Signal Phishing and Oracle RCE Patch</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e1a"/>
      <stop offset="50%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#0a0e20"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="350" cy="200" r="250" fill="#8b5cf6" opacity="0.05" filter="url(#sg)"/>
  <circle cx="850" cy="380" r="200" fill="#06b6d4" opacity="0.04" filter="url(#sg)"/>

  <!-- Phishing hook with message bubbles -->
  <g transform="translate(600,240)">
    <!-- Central fishing hook -->
    <path d="M0,-120 L0,20 Q0,60 30,60 Q60,60 60,30" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="-120" r="6" fill="#8b5cf6"/>
    <!-- Line from hook -->
    <line x1="0" y1="-120" x2="0" y2="-160" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>

    <!-- Fake message bubbles being hooked -->
    <g transform="translate(-200,-40)">
      <rect width="150" height="50" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
      <circle cx="22" cy="25" r="10" fill="#22c55e" opacity="0.3"/>
      <rect x="40" y="15" width="90" height="8" rx="4" fill="#22c55e" opacity="0.4"/>
      <rect x="40" y="28" width="60" height="6" rx="3" fill="#22c55e" opacity="0.25"/>
      <line x1="150" y1="25" x2="190" y2="0" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    </g>

    <g transform="translate(80,-80)">
      <rect width="160" height="50" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
      <circle cx="22" cy="25" r="10" fill="#06b6d4" opacity="0.3"/>
      <rect x="40" y="15" width="100" height="8" rx="4" fill="#06b6d4" opacity="0.4"/>
      <rect x="40" y="28" width="70" height="6" rx="3" fill="#06b6d4" opacity="0.25"/>
      <line x1="0" y1="25" x2="-60" y2="40" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    </g>

    <g transform="translate(-180,50)">
      <rect width="140" height="45" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="10" fill="#ef4444" opacity="0.3"/>
      <rect x="40" y="13" width="80" height="8" rx="4" fill="#ef4444" opacity="0.4"/>
      <rect x="40" y="25" width="55" height="6" rx="3" fill="#ef4444" opacity="0.25"/>
      <!-- Warning icon -->
      <polygon points="120,8 130,28 110,28" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <line x1="120" y1="15" x2="120" y2="22" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="120" cy="25" r="1.5" fill="#ef4444"/>
    </g>

    <!-- Shield with crack (Oracle RCE) -->
    <g transform="translate(200,20)">
      <path d="M0,-50 L40,-35 L40,10 C40,35 0,50 0,50 C0,50 -40,35 -40,10 L-40,-35 Z" fill="#0f172a" stroke="#f59e0b" stroke-width="2.5"/>
      <!-- Crack -->
      <path d="M0,-30 L5,-15 L-3,-5 L4,10 L-2,25" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <text x="0" y="-55" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">CVE-2026</text>
    </g>
  </g>

  <text x="600" y="478" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">FBI Phishing Alert + Oracle RCE</text>
  <text x="600" y="515" font-family="Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">Security-Weekly | CVE | Patch | Supply-Chain</text>
  <rect x="40" y="22" width="140" height="32" rx="16" fill="#8b5cf6" opacity="0.25" stroke="#8b5cf6" stroke-width="1"/>
  <text x="110" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#a78bfa" text-anchor="middle">SECURITY</text>
  <rect x="1020" y="22" width="140" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="1090" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">March 22, 2026</text>
  <line x1="50" y1="588" x2="1150" y2="588" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <text x="1150" y="612" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="end">tech.2twodragon.com</text>
</svg>