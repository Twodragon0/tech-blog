<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a"/>
      <stop offset="100%" style="stop-color:#1a1530"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="200" fill="rgba(108,92,231,0.06)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(243,156,18,0.06)"/>
  <!-- TPM chip -->
  <rect x="820" y="220" width="90" height="90" rx="8" fill="rgba(108,92,231,0.15)" stroke="#6c5ce7" stroke-width="2.5"/>
  <text x="865" y="261" font-family="Arial,sans-serif" font-size="11" fill="#6c5ce7" text-anchor="middle" font-weight="700">TPM</text>
  <text x="865" y="277" font-family="Arial,sans-serif" font-size="9" fill="rgba(108,92,231,0.7)" text-anchor="middle">CHIP</text>
  <!-- Connector pins on TPM -->
  <rect x="830" y="310" width="8" height="16" fill="rgba(108,92,231,0.4)"/>
  <rect x="846" y="310" width="8" height="16" fill="rgba(108,92,231,0.4)"/>
  <rect x="862" y="310" width="8" height="16" fill="rgba(108,92,231,0.4)"/>
  <rect x="878" y="310" width="8" height="16" fill="rgba(108,92,231,0.4)"/>
  <!-- Key icon -->
  <circle cx="1020" cy="260" r="20" fill="none" stroke="#f39c12" stroke-width="2.5"/>
  <rect x="1038" y="255" width="35" height="10" rx="3" fill="none" stroke="#f39c12" stroke-width="2.5"/>
  <rect x="1062" y="265" width="8" height="8" rx="1" fill="rgba(243,156,18,0.4)"/>
  <rect x="1048" y="265" width="8" height="8" rx="1" fill="rgba(243,156,18,0.4)"/>
  <!-- Flow arrow TPM to key -->
  <line x1="910" y1="265" x2="998" y2="265" stroke="rgba(243,156,18,0.5)" stroke-width="2"/>
  <polygon points="995,261 1003,265 995,269" fill="rgba(243,156,18,0.5)"/>
  <!-- Recovery key box -->
  <rect x="850" y="380" width="220" height="55" rx="6" fill="rgba(108,92,231,0.1)" stroke="rgba(108,92,231,0.4)" stroke-width="1.5"/>
