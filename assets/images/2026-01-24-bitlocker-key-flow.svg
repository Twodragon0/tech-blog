  <text x="960" y="420" font-family="Arial,sans-serif" font-size="9" fill="rgba(108,92,231,0.6)" text-anchor="middle">48-digit backup in Azure AD</text>
  <!-- Arrow from key to recovery -->
  <line x1="1020" y1="282" x2="960" y2="378" stroke="rgba(108,92,231,0.35)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="957,375 964,383 967,373" fill="rgba(108,92,231,0.35)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="80" y="44" width="240" height="34" rx="17" fill="rgba(108,92,231,0.15)" stroke="rgba(108,92,231,0.4)" stroke-width="1"/>
  <text x="200" y="66" font-family="Arial,sans-serif" font-size="13" fill="#6c5ce7" text-anchor="middle" letter-spacing="2">JANUARY 24, 2026</text>
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="#ffffff">BitLocker Key</text>
  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="#ffffff">Recovery Flow</text>
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">TPM-based encryption and recovery key management</text>
  <rect x="80" y="320" width="120" height="3" rx="2" fill="url(#accent)"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="15" fill="rgba(108,92,231,0.8)" letter-spacing="3">ENCRYPTION ANALYSIS</text>
  <rect x="80" y="400" width="95" height="28" rx="14" fill="rgba(108,92,231,0.15)" stroke="rgba(108,92,231,0.4)" stroke-width="1"/>
  <text x="127" y="419" font-family="Arial,sans-serif" font-size="13" fill="#6c5ce7" text-anchor="middle">BitLocker</text>
  <rect x="187" y="400" width="115" height="28" rx="14" fill="rgba(243,156,18,0.15)" stroke="rgba(243,156,18,0.4)" stroke-width="1"/>
  <text x="244" y="419" font-family="Arial,sans-serif" font-size="13" fill="#f39c12" text-anchor="middle">Key Recovery</text>
  <rect x="314" y="400" width="60" height="28" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="344" y="419" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">TPM</text>
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="615" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">tech.2twodragon.com</text>
  <text x="1120" y="615" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="end">DevSecOps</text>
</svg>
