        <ellipse cx="108" cy="72" rx="12" ry="7" fill="none" stroke="#94a3b8" stroke-width="3" />
        <ellipse cx="92" cy="84" rx="12" ry="7" fill="none" stroke="#94a3b8" stroke-width="3" />
        <ellipse cx="108" cy="96" rx="12" ry="7" fill="none" stroke="#94a3b8" stroke-width="3" />
      </g>
