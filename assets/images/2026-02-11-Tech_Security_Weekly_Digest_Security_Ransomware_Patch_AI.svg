  <text x="60" y="228" font-family="Arial, sans-serif" font-size="44" fill="white" font-weight="bold" letter-spacing="-0.5">Weekly</text>
  <text x="60" y="295" font-family="Arial, sans-serif" font-size="36" fill="#94a3b8" font-weight="600" letter-spacing="-0.3">Digest Security</text>
  <text x="60" y="340" font-family="Arial, sans-serif" font-size="36" fill="#94a3b8" font-weight="600" letter-spacing="-0.3">Ransomware</text>

  
  <rect x="60" y="365" width="180" height="3" rx="1.5" fill="url(#accentLine)" />

  
  <g transform="translate(60, 390)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="url(#tag1)" stroke="#3b82f6" stroke-width="0.6" stroke-opacity="0.4" />
    <rect x="120" y="0" width="115" height="30" rx="15" fill="url(#tag2)" stroke="#f43f5e" stroke-width="0.6" stroke-opacity="0.4" />
    <rect x="245" y="0" width="95" height="30" rx="15" fill="url(#tag3)" stroke="#8b5cf6" stroke-width="0.6" stroke-opacity="0.4" />
    </g>

  
  <text x="60" y="470" font-family="Arial, sans-serif" font-size="13" fill="#64748b" font-weight="500" letter-spacing="2">FEBRUARY 11, 2026</text>

  
  <g transform="translate(60, 560)">
    <line x1="0" y1="0" x2="520" y2="0" stroke="#1e293b" stroke-width="1" />
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="14" fill="#475569" font-weight="500" letter-spacing="0.5">tech.2twodragon.com</text>
    
    <circle cx="200" cy="22" r="2" fill="#3b82f6" opacity="0.4" />
    <circle cx="212" cy="22" r="2" fill="#f43f5e" opacity="0.4" />
    <circle cx="224" cy="22" r="2" fill="#8b5cf6" opacity="0.4" />
  </g>

  
  <line x1="0" y1="1" x2="1200" y2="1" stroke="url(#accentLine)" stroke-width="2" opacity="0.3" />
