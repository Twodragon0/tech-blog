      <path d="M70,10 L130,30 L130,85 Q130,130 70,155 Q10,130 10,85 L10,30 Z" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6" />
      
      <path d="M70,25 L118,41 L118,83 Q118,120 70,142 Q22,120 22,83 L22,41 Z" fill="white" fill-opacity="0.08" />
      
