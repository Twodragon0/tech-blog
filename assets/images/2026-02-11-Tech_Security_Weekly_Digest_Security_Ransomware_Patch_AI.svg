    <linearGradient id="tag3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  
  <rect width="1200" height="630" fill="#0f172a" />
