    <text x="190" y="21" text-anchor="middle" fill="#fdba74" font-family="Arial, sans-serif" font-size="13">CVE Alert</text>
    <rect x="261" y="0" width="75" height="32" rx="16" fill="#312e81" opacity="0.7"/>
    <text x="298" y="21" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="13">AI/ML</text>
    <rect x="351" y="0" width="75" height="32" rx="16" fill="#064e3b" opacity="0.7"/>
    <text x="388" y="21" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="13">Cloud</text>
