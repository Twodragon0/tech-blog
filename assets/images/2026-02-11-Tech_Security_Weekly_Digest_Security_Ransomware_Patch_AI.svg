<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#100a0a"/>
      <stop offset="100%" style="stop-color:#0a1a0a"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="leftPanel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0505"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#051a05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <circle cx="260" cy="280" r="250" fill="#ef4444" opacity="0.07" filter="url(#ambient)"/>
  <circle cx="940" cy="280" r="240" fill="#22c55e" opacity="0.07" filter="url(#ambient)"/>
  <circle cx="600" cy="150" r="120" fill="#f59e0b" opacity="0.06" filter="url(#ambient)"/>
  <circle cx="180" cy="460" r="160" fill="#dc2626" opacity="0.05" filter="url(#ambient)"/>
  <circle cx="1020" cy="450" r="150" fill="#16a34a" opacity="0.05" filter="url(#ambient)"/>

  <!-- Floating code fragments -->
  <text x="55" y="88" font-family="Courier New,monospace" font-size="12" fill="#22c55e" opacity="0.13" transform="rotate(-7,55,88)">patch.apply(critical_cve)</text>
  <text x="820" y="105" font-family="Courier New,monospace" font-size="11" fill="#ef4444" opacity="0.12" transform="rotate(5,820,105)">ransomware.encrypt(files)</text>
  <text x="70" y="490" font-family="Courier New,monospace" font-size="11" fill="#22c55e" opacity="0.12" transform="rotate(-3,70,490)">sla.check(patch_hours)</text>
  <text x="860" y="480" font-family="Courier New,monospace" font-size="12" fill="#ef4444" opacity="0.13" transform="rotate(4,860,480)">edr.detect(behavior)</text>
  <text x="270" y="72" font-family="Courier New,monospace" font-size="10" fill="#86efac" opacity="0.10">{"status": "patched", "sla": "4h"}</text>
  <text x="680" y="530" font-family="Courier New,monospace" font-size="10" fill="#fca5a5" opacity="0.10" transform="rotate(-2,680,530)">aes.encrypt(victim_data)</text>

  <!-- ===== CLOCK / TIMER - TOP CENTER (urgency) ===== -->
  <circle cx="600" cy="155" r="50" fill="#0f172a" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
  <circle cx="600" cy="155" r="42" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <!-- Clock face -->
  <line x1="600" y1="155" x2="600" y2="120" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="600" y1="155" x2="625" y2="165" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <circle cx="600" cy="155" r="4" fill="#f59e0b"/>
  <!-- Clock hour marks -->
  <line x1="600" y1="113" x2="600" y2="120" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="642" y1="133" x2="637" y2="139" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="650" y1="155" x2="643" y2="155" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="550" y1="155" x2="557" y2="155" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <line x1="558" y1="133" x2="563" y2="139" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <!-- URGENT text -->
  <text x="600" y="145" font-family="Arial,sans-serif" font-size="0" fill="none"/>
  <text x="600" y="222" font-family="Arial,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">PATCH DEADLINE</text>

  <!-- ===== RACE DIVIDER LINE - CENTER ===== -->
  <line x1="600" y1="240" x2="600" y2="450" stroke="#e2e8f0" stroke-width="2" opacity="0.15"/>
  <!-- VS badge on divider -->
  <circle cx="600" cy="345" r="22" fill="#0f172a" stroke="#e2e8f0" stroke-width="1.5" opacity="0.7"/>
  <text x="600" y="351" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#e2e8f0" text-anchor="middle" opacity="0.9">VS</text>

  <!-- ===== LEFT HALF: RANSOMWARE SIDE ===== -->
  <rect x="80" y="240" width="490" height="210" rx="12" fill="url(#leftPanel)" opacity="0.5"/>

  <!-- Ransomware lock icon -->
  <g transform="translate(230, 310)">
    <!-- Lock body -->
    <rect x="-35" y="-5" width="70" height="55" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2.5" filter="url(#shadow)"/>
    <!-- Lock shackle -->
    <path d="M-20,-5 L-20,-30 Q-20,-50 0,-50 Q20,-50 20,-30 L20,-5" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <!-- Lock keyhole -->
    <circle cx="0" cy="18" r="10" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="-4" y="20" width="8" height="14" rx="2" fill="#ef4444" opacity="0.5"/>
    <!-- Animated dots -->
    <circle cx="-20" cy="35" r="4" fill="#ef4444" opacity="0.8"/>
    <circle cx="-7" cy="35" r="4" fill="#ef4444" opacity="0.6"/>
    <circle cx="7" cy="35" r="4" fill="#ef4444" opacity="0.4"/>
    <circle cx="20" cy="35" r="4" fill="#ef4444" opacity="0.2"/>
  </g>

  <!-- Encrypted files around lock -->
  <g transform="translate(130, 275)">
    <rect x="0" y="0" width="45" height="55" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="22" y="18" font-family="Courier New,monospace" font-size="7" fill="#fca5a5" text-anchor="middle">file.doc</text>
    <rect x="5" y="23" width="35" height="3" rx="1" fill="#ef4444" opacity="0.4"/>
    <rect x="5" y="30" width="28" height="3" rx="1" fill="#ef4444" opacity="0.3"/>
    <rect x="5" y="37" width="32" height="3" rx="1" fill="#ef4444" opacity="0.35"/>
    <text x="22" y="52" font-family="Courier New,monospace" font-size="7" fill="#ef4444" text-anchor="middle">.LOCKED</text>
  </g>
  <g transform="translate(130, 345)">
    <rect x="0" y="0" width="45" height="55" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" opacity="0.8"/>
    <text x="22" y="18" font-family="Courier New,monospace" font-size="7" fill="#fca5a5" text-anchor="middle">db.bak</text>
    <rect x="5" y="23" width="35" height="3" rx="1" fill="#ef4444" opacity="0.4"/>
    <rect x="5" y="30" width="20" height="3" rx="1" fill="#ef4444" opacity="0.3"/>
    <text x="22" y="52" font-family="Courier New,monospace" font-size="7" fill="#ef4444" text-anchor="middle">.LOCKED</text>
  </g>
  <g transform="translate(335, 275)" opacity="0.9">
    <rect x="0" y="0" width="45" height="55" rx="4" fill="#1e293b" stroke="#dc2626" stroke-width="1.5"/>
    <text x="22" y="18" font-family="Courier New,monospace" font-size="7" fill="#fca5a5" text-anchor="middle">keys.pem</text>
    <rect x="5" y="23" width="35" height="3" rx="1" fill="#ef4444" opacity="0.4"/>
    <rect x="5" y="30" width="25" height="3" rx="1" fill="#ef4444" opacity="0.3"/>
    <text x="22" y="52" font-family="Courier New,monospace" font-size="7" fill="#ef4444" text-anchor="middle">.LOCKED</text>
  </g>

  <!-- Ransom note -->
  <rect x="100" y="400" width="160" height="35" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="180" y="412" font-family="Courier New,monospace" font-size="8" fill="#fca5a5" text-anchor="middle" font-weight="bold">RANSOM NOTE</text>
  <text x="180" y="426" font-family="Courier New,monospace" font-size="7" fill="#ef4444" text-anchor="middle">Pay 2.5 BTC in 72h</text>

  <!-- RANSOMWARE label -->
  <text x="285" y="460" font-family="Arial,sans-serif" font-size="13" fill="#fca5a5" text-anchor="middle" font-weight="bold">RANSOMWARE ATTACK</text>

  <!-- ===== RIGHT HALF: PATCH SHIELD SIDE ===== -->
  <rect x="630" y="240" width="490" height="210" rx="12" fill="url(#rightPanel)" opacity="0.5"/>

  <!-- Shield with patch icon -->
  <g transform="translate(870, 340)">
    <!-- Shield shape -->
    <path d="M0,-65 L55,-40 L55,10 Q55,50 0,70 Q-55,50 -55,10 L-55,-40 Z" fill="#0f172a" stroke="#22c55e" stroke-width="2.5" filter="url(#shadow)"/>
    <!-- Shield inner -->
    <path d="M0,-50 L42,-30 L42,8 Q42,40 0,56 Q-42,40 -42,8 L-42,-30 Z" fill="#22c55e" opacity="0.10"/>
    <!-- Patch/update arrow icon inside shield -->
    <circle cx="0" cy="5" r="22" fill="#22c55e" opacity="0.15"/>
    <path d="M-12,-8 L0,-20 L12,-8 L6,-8 L6,15 L-6,15 L-6,-8 Z" fill="#22c55e" opacity="0.8"/>
    <!-- Checkmark -->
    <path d="M-16,18 L-6,28 L20,8" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Fixed/patched files on right -->
  <g transform="translate(680, 275)">
    <rect x="0" y="0" width="45" height="55" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="22" y="18" font-family="Courier New,monospace" font-size="7" fill="#86efac" text-anchor="middle">patch.sh</text>
    <rect x="5" y="23" width="35" height="3" rx="1" fill="#22c55e" opacity="0.4"/>
    <rect x="5" y="30" width="28" height="3" rx="1" fill="#22c55e" opacity="0.3"/>
    <path d="M8,40 L14,46 L32,34" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(680, 348)">
    <rect x="0" y="0" width="45" height="55" rx="4" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" opacity="0.85"/>
    <text x="22" y="18" font-family="Courier New,monospace" font-size="7" fill="#86efac" text-anchor="middle">update</text>
    <rect x="5" y="23" width="35" height="3" rx="1" fill="#22c55e" opacity="0.4"/>
    <rect x="5" y="30" width="22" height="3" rx="1" fill="#22c55e" opacity="0.3"/>
    <path d="M8,40 L14,46 L32,34" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(1015, 280)" opacity="0.9">
    <rect x="0" y="0" width="60" height="55" rx="4" fill="#1e293b" stroke="#16a34a" stroke-width="1.5"/>
    <text x="30" y="15" font-family="Courier New,monospace" font-size="7" fill="#86efac" text-anchor="middle">CVE-2026</text>
    <text x="30" y="25" font-family="Courier New,monospace" font-size="7" fill="#86efac" text-anchor="middle">-0415</text>
    <rect x="5" y="30" width="50" height="3" rx="1" fill="#22c55e" opacity="0.3"/>
    <text x="30" y="45" font-family="Courier New,monospace" font-size="8" fill="#22c55e" text-anchor="middle" font-weight="bold">PATCHED</text>
  </g>

  <!-- Patch status bar -->
  <rect x="740" y="400" width="200" height="18" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <rect x="742" y="402" width="160" height="14" rx="7" fill="#22c55e" opacity="0.5"/>
  <text x="840" y="414" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">80% Patched</text>

  <!-- PATCH label -->
  <text x="915" y="460" font-family="Arial,sans-serif" font-size="13" fill="#86efac" text-anchor="middle" font-weight="bold">PATCH TUESDAY</text>

  <!-- ===== TOP BADGES ===== -->
  <rect x="40" y="22" width="170" height="34" rx="16" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
  <text x="125" y="43" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fca5a5" text-anchor="middle">WEEKLY DIGEST</text>

  <rect x="990" y="22" width="170" height="34" rx="16" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
  <text x="1075" y="43" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#86efac" text-anchor="middle">February 11, 2026</text>

  <!-- ===== TITLE + SUBTITLE ===== -->
  <text x="600" y="500" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#titleGlow)">Patch vs Ransomware Race</text>
  <text x="600" y="535" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Critical Patch Tuesday | Ransomware Trends | AI Defense</text>

  <!-- ===== FOOTER ===== -->
  <line x1="40" y1="585" x2="1160" y2="585" stroke="#1e293b" stroke-width="1.5"/>
  <text x="40" y="610" font-family="Arial,sans-serif" font-size="12" fill="#475569">19 News | 6 Security | 4 AI/ML | 2 Cloud | 3 DevOps</text>
  <text x="1160" y="610" font-family="Arial,sans-serif" font-size="12" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>
