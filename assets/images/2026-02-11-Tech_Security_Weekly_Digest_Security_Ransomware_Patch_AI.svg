<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#cc00ff"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Ransomware Lock + AI Neural Shield -->
  <!-- Outer shield shape -->
  <path d="M1010,140 L1110,170 L1110,260 Q1110,310 1010,340 Q910,310 910,260 L910,170 Z"
        fill="rgba(255,60,60,0.07)" stroke="rgba(255,80,80,0.3)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,160 L1095,185 L1095,258 Q1095,298 1010,322 Q925,298 925,258 L925,185 Z"
        fill="rgba(255,40,40,0.06)" stroke="rgba(255,100,100,0.2)" stroke-width="1"/>

  <!-- Lock body -->
  <rect x="982" y="230" width="56" height="44" rx="6"
        fill="rgba(255,80,40,0.12)" stroke="rgba(255,120,60,0.35)" stroke-width="1.5"/>
  <!-- Lock shackle -->
  <path d="M993,230 L993,214 Q993,200 1010,200 Q1027,200 1027,214 L1027,230"
        fill="none" stroke="rgba(255,120,60,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="1010" cy="250" r="7" fill="rgba(255,60,40,0.2)" stroke="rgba(255,100,60,0.4)" stroke-width="1.5"/>
  <rect x="1007" y="254" width="6" height="10" rx="2" fill="rgba(255,60,40,0.2)" stroke="rgba(255,100,60,0.4)" stroke-width="1.5"/>

  <!-- AI Neural nodes around shield -->
  <circle cx="960" cy="200" r="6" fill="rgba(180,100,255,0.15)" stroke="rgba(180,120,255,0.35)" stroke-width="1.5"/>
  <circle cx="1060" cy="195" r="6" fill="rgba(180,100,255,0.15)" stroke="rgba(180,120,255,0.35)" stroke-width="1.5"/>
  <circle cx="940" cy="280" r="5" fill="rgba(100,160,255,0.12)" stroke="rgba(100,180,255,0.3)" stroke-width="1.5"/>
  <circle cx="1080" cy="275" r="5" fill="rgba(100,160,255,0.12)" stroke="rgba(100,180,255,0.3)" stroke-width="1.5"/>
  <circle cx="980" cy="325" r="5" fill="rgba(255,160,60,0.12)" stroke="rgba(255,180,80,0.3)" stroke-width="1.5"/>
  <circle cx="1040" cy="328" r="5" fill="rgba(255,160,60,0.12)" stroke="rgba(255,180,80,0.3)" stroke-width="1.5"/>
  <!-- Neural connection lines -->
  <line x1="960" y1="200" x2="1060" y2="195" stroke="rgba(180,120,255,0.2)" stroke-width="1"/>
  <line x1="960" y1="200" x2="940" y2="280" stroke="rgba(180,120,255,0.15)" stroke-width="1"/>
  <line x1="1060" y1="195" x2="1080" y2="275" stroke="rgba(180,120,255,0.15)" stroke-width="1"/>
  <line x1="940" y1="280" x2="980" y2="325" stroke="rgba(100,180,255,0.2)" stroke-width="1"/>
  <line x1="1080" y1="275" x2="1040" y2="328" stroke="rgba(100,180,255,0.2)" stroke-width="1"/>
  <line x1="960" y1="200" x2="910" y2="215" stroke="rgba(180,120,255,0.12)" stroke-width="1"/>
  <line x1="1060" y1="195" x2="1110" y2="210" stroke="rgba(180,120,255,0.12)" stroke-width="1"/>

  <!-- Patch binary hex text decoration -->
  <text x="895" y="165" font-family="monospace" font-size="10" fill="rgba(255,120,60,0.25)">0xCVE</text>
  <text x="1065" y="160" font-family="monospace" font-size="10" fill="rgba(100,200,255,0.2)">PATCH</text>
  <text x="890" y="310" font-family="monospace" font-size="9" fill="rgba(180,120,255,0.2)">AI::SEC</text>
  <text x="1060" y="315" font-family="monospace" font-size="9" fill="rgba(255,200,80,0.2)">ALERT</text>

  <!-- Rotating outer ring segments -->
  <circle cx="1010" cy="240" r="88" fill="none" stroke="rgba(255,80,80,0.08)" stroke-width="1" stroke-dasharray="12 8"/>
  <circle cx="1010" cy="240" r="108" fill="none" stroke="rgba(180,100,255,0.06)" stroke-width="1" stroke-dasharray="6 14"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.6)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,160,40,0.5)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(100,180,255,0.5)" filter="url(#glow)"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,40,40,0.04)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(180,60,255,0.05)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(255,80,80,0.25)" stroke-width="1"/>
  <text x="190" y="81" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,150,100,0.9)" text-anchor="middle" letter-spacing="1">FEBRUARY 11, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly Digest</text>
  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="rgba(255,255,255,0.92)" letter-spacing="-0.5">Security Ransomware Patch AI</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,160,100,0.75)">Weekly intelligence brief covering threats, patches &amp; AI defenses</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial',sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="3" text-transform="uppercase">SECURITY / THREAT INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(220,40,40,0.18)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,120,100,0.95)" text-anchor="middle" font-weight="600">RANSOMWARE</text>

  <rect x="225" y="402" width="110" height="36" rx="18" fill="rgba(220,140,20,0.18)" stroke="rgba(255,180,40,0.4)" stroke-width="1"/>
  <text x="280" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,200,80,0.95)" text-anchor="middle" font-weight="600">PATCH CVE</text>

  <rect x="350" y="402" width="90" height="36" rx="18" fill="rgba(40,100,220,0.18)" stroke="rgba(80,150,255,0.4)" stroke-width="1"/>
  <text x="395" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(100,180,255,0.95)" text-anchor="middle" font-weight="600">AI SEC</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Arial',sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,255,255,0.25)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>