<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Kandji macOS Complete Master SetupFrom Security Regulation ComplianceTo All-in-One Guide</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8304a"/>
      <stop offset="50%" style="stop-color:#b03ccc"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8304a"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8304a;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#b03ccc;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a7bd5;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e8304a;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Kandji macOS MDM - Apple logo + shield + lock + compliance checkmarks -->
  <!-- Outer orbit ring -->
  <circle cx="1010" cy="225" r="110" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="1010" cy="225" r="82" fill="none" stroke="rgba(232,48,74,0.15)" stroke-width="1.5" stroke-dasharray="3,6"/>

  <!-- Apple-like logo shape (macOS symbol) -->
  <path d="M1010,155 C1010,155 995,160 990,175 C985,190 990,205 1000,210 C1005,212 1008,210 1010,208 C1012,210 1015,212 1020,210 C1030,205 1035,190 1030,175 C1025,160 1010,155 1010,155 Z" fill="url(#appleGrad)" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
  <!-- Apple leaf -->
  <path d="M1010,155 C1010,155 1016,148 1022,150" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Apple body highlight -->
  <path d="M998,178 C996,183 997,193 1001,200" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-linecap="round"/>

  <!-- Main shield (MDM security) -->
  <path d="M1010,218 L975,232 L975,265 C975,285 990,302 1010,308 C1030,302 1045,285 1045,265 L1045,232 Z" fill="url(#shieldGrad)" stroke="rgba(232,48,74,0.35)" stroke-width="1.5"/>
  <!-- Shield inner detail -->
  <path d="M1010,228 L990,238 L990,263 C990,276 998,287 1010,292 C1022,287 1030,276 1030,263 L1030,238 Z" fill="none" stroke="rgba(176,60,204,0.25)" stroke-width="1"/>
  <!-- Checkmark in shield -->
  <path d="M998,262 L1005,270 L1022,252" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Compliance nodes around shield -->
  <circle cx="955" cy="180" r="14" fill="rgba(58,123,213,0.12)" stroke="rgba(58,123,213,0.35)" stroke-width="1.2"/>
  <path d="M949,180 L953,184 L961,176" fill="none" stroke="rgba(58,123,213,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="1065" cy="180" r="14" fill="rgba(176,60,204,0.10)" stroke="rgba(176,60,204,0.35)" stroke-width="1.2"/>
  <path d="M1059,180 L1063,184 L1071,176" fill="none" stroke="rgba(176,60,204,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="1075" cy="250" r="14" fill="rgba(232,48,74,0.10)" stroke="rgba(232,48,74,0.35)" stroke-width="1.2"/>
  <path d="M1069,250 L1073,254 L1081,246" fill="none" stroke="rgba(232,48,74,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="945" cy="250" r="14" fill="rgba(255,180,0,0.10)" stroke="rgba(255,180,0,0.32)" stroke-width="1.2"/>
  <path d="M939,250 L943,254 L951,246" fill="none" stroke="rgba(255,180,0,0.65)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Connection lines from nodes to shield -->
  <line x1="965" y1="185" x2="980" y2="232" stroke="rgba(58,123,213,0.18)" stroke-width="1"/>
  <line x1="1055" y1="185" x2="1040" y2="232" stroke="rgba(176,60,204,0.18)" stroke-width="1"/>
  <line x1="1063" y1="253" x2="1045" y2="258" stroke="rgba(232,48,74,0.18)" stroke-width="1"/>
  <line x1="957" y1="253" x2="975" y2="258" stroke="rgba(255,180,0,0.18)" stroke-width="1"/>

  <!-- Lock icon at bottom of illustration -->
  <rect x="1002" y="310" width="16" height="13" rx="2" fill="rgba(232,48,74,0.12)" stroke="rgba(232,48,74,0.30)" stroke-width="1.2"/>
  <path d="M1005,310 L1005,305 C1005,301 1015,301 1015,305 L1015,310" fill="none" stroke="rgba(232,48,74,0.35)" stroke-width="1.2"/>
  <circle cx="1010" cy="317" r="2" fill="rgba(232,48,74,0.55)"/>

  <!-- MDM label -->
  <text x="985" y="342" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.22)" text-anchor="middle" letter-spacing="2">MDM - COMPLIANCE</text>

  <!-- Kandji label arc simulation via straight text -->
  <text x="1010" y="145" font-family="'Courier New',monospace" font-size="9" fill="rgba(232,48,74,0.45)" text-anchor="middle" letter-spacing="3">KANDJI</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(232,48,74,0.55)"/>
  <circle cx="900" cy="420" r="5" fill="rgba(176,60,204,0.50)"/>
  <circle cx="860" cy="440" r="5" fill="rgba(58,123,213,0.50)"/>

  <!-- Background decorative circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(232,48,74,0.15)" stroke="rgba(232,48,74,0.30)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.75)" text-anchor="middle" letter-spacing="1.5">MAY 2, 2025</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="700" fill="white">Kandji macOS Master SetupFrom</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Helvetica Neue',Arial,sans-serif" font-size="46" font-weight="700" fill="white">Security Regulation ComplianceTo All</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">macOS MDM deployment, compliance enforcement, and enterprise security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="rgba(232,48,74,0.85)" letter-spacing="3">SECURITY / DEVSECOPS / MACOS</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(232,48,74,0.18)" stroke="rgba(232,48,74,0.40)" stroke-width="1"/>
  <text x="135" y="425" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.80)" text-anchor="middle">Kandji MDM</text>

  <rect x="204" y="402" width="96" height="36" rx="18" fill="rgba(245,166,35,0.18)" stroke="rgba(245,166,35,0.38)" stroke-width="1"/>
  <text x="252" y="425" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.80)" text-anchor="middle">Compliance</text>

  <rect x="314" y="402" width="96" height="36" rx="18" fill="rgba(58,123,213,0.18)" stroke="rgba(58,123,213,0.40)" stroke-width="1"/>
  <text x="362" y="425" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.80)" text-anchor="middle">macOS Sec</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="rgba(232,48,74,0.50)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>