  <!-- Lock dots -->
  <circle cx="920" cy="320" r="5" fill="rgba(239,68,68,0.3)"/>
  <circle cx="950" cy="340" r="4" fill="rgba(245,158,11,0.25)"/>
  <circle cx="1080" cy="310" r="6" fill="rgba(239,68,68,0.2)"/>
