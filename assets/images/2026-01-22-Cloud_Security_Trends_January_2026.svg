<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>Cloud Security Trends January 2026</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- LEFT SIDE TEXT CONTENT -->
  <!-- Date badge -->
  <rect x="60" y="40" width="180" height="40" rx="20" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.8"/>
  <text x="150" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle">JANUARY 22, 2026</text>
  
  <!-- Main title -->
  <text x="80" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Cloud Security</text>
  <text x="80" y="260" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Trends</text>
  
  <!-- Subtitle -->
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="42" font-weight="600" fill="#3b82f6" opacity="0.9">January 2026 Kubernetes</text>
  
  <!-- Tag pills -->
  <rect x="60" y="420" width="110" height="32" rx="16" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="115" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Kubernetes</text>
  
  <rect x="180" y="420" width="90" height="32" rx="16" fill="#f59e0b" opacity="0.06" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="225" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Security</text>
  
  <rect x="280" y="420" width="80" height="32" rx="16" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="0.8"/>
  <text x="320" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Trends</text>
  
  <!-- Footer -->
  <text x="80" y="570" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.6">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE VISUAL ELEMENTS -->
  <!-- Background circle for visual area -->
  <circle cx="900" cy="315" r="280" fill="#3b82f6" opacity="0.02" stroke="#3b82f6" stroke-width="0.2"/>
  
  <!-- Kubernetes Hexagonal Pods -->
  <!-- Top left hex pod -->
  <g id="hex1">
    <polygon points="750,150 770,140 790,150 790,170 770,180 750,170" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="770" cy="160" r="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.2"/>
  </g>
  
  <!-- Top right hex pod -->
  <g id="hex2">
    <polygon points="1010,140 1030,130 1050,140 1050,160 1030,170 1010,160" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="1030" cy="150" r="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.2"/>
  </g>
  
  <!-- Bottom left hex pod -->
  <g id="hex3">
    <polygon points="760,460 780,450 800,460 800,480 780,490 760,480" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="780" cy="470" r="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.2"/>
  </g>
  
  <!-- Bottom right hex pod -->
  <g id="hex4">
    <polygon points="1020,470 1040,460 1060,470 1060,490 1040,500 1020,490" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="1040" cy="480" r="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.2"/>
  </g>
  
  <!-- Connection lines between pods -->
  <line x1="770" y1="180" x2="1030" y2="150" stroke="#3b82f6" stroke-width="0.3" opacity="0.12"/>
  <line x1="770" y1="180" x2="780" y2="450" stroke="#3b82f6" stroke-width="0.3" opacity="0.12"/>
  <line x1="1030" y1="170" x2="1040" y2="460" stroke="#3b82f6" stroke-width="0.3" opacity="0.12"/>
  <line x1="780" y1="490" x2="1040" y2="480" stroke="#3b82f6" stroke-width="0.3" opacity="0.12"/>
  
  <!-- Cloud shape in center -->
  <g id="cloud">
    <path d="M 850 250 Q 870 240 890 245 Q 905 225 925 235 Q 940 220 955 240 Q 975 230 990 250 Q 995 270 990 290 L 850 290 Q 845 270 850 250 Z" 
          fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.3"/>
  </g>
  
  <!-- Data flow arrows from cloud -->
  <defs>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#f59e0b" opacity="0.12"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#ef4444" opacity="0.12"/>
    </marker>
  </defs>
  
  <line x1="870" y1="245" x2="770" y2="160" stroke="#f59e0b" stroke-width="0.25" opacity="0.12" marker-end="url(#arrowhead-orange)"/>
  <line x1="920" y1="240" x2="1030" y2="150" stroke="#f59e0b" stroke-width="0.25" opacity="0.12" marker-end="url(#arrowhead-orange)"/>
  <line x1="880" y1="290" x2="780" y2="450" stroke="#f59e0b" stroke-width="0.25" opacity="0.12" marker-end="url(#arrowhead-orange)"/>
  <line x1="950" y1="290" x2="1040" y2="480" stroke="#f59e0b" stroke-width="0.25" opacity="0.12" marker-end="url(#arrowhead-orange)"/>
  
  <!-- Large shield with checkmark (center right) -->
  <g id="shield">
    <path d="M 950 320 L 1000 290 L 1000 370 Q 1000 420 950 450 Q 900 420 900 370 L 900 290 Z" 
          fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.35"/>
    <!-- Checkmark inside shield -->
    <path d="M 935 375 L 950 390 L 975 345" stroke="#ef4444" stroke-width="0.8" fill="none" opacity="0.15" stroke-linecap="round"/>
  </g>
  
  <!-- Warning triangles for alert indicators -->
  <g id="warning1">
    <polygon points="820,380 835,350 850,380" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.25"/>
    <text x="835" y="375" font-family="Arial, sans-serif" font-size="16" fill="#ef4444" opacity="0.12" text-anchor="middle">!</text>
  </g>
  
  <g id="warning2">
    <polygon points="1080,310 1095,280 1110,310" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.25"/>
    <text x="1095" y="305" font-family="Arial, sans-serif" font-size="16" fill="#ef4444" opacity="0.12" text-anchor="middle">!</text>
  </g>
  
  <!-- Security lock icon accent -->
  <g id="lock-accent">
    <circle cx="870" cy="520" r="18" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="0.25"/>
    <path d="M 870 510 L 870 505 Q 875 500 880 505 L 880 515 Q 880 520 875 520 L 865 520 Q 860 520 860 515 L 860 505 Q 865 500 870 505 Z" 
          fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.15"/>
  </g>
  
  <!-- Data flow nodes -->
  <circle cx="920" cy="350" r="5" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.2"/>
  <circle cx="860" cy="420" r="5" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.2"/>
  <circle cx="1000" cy="400" r="5" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.2"/>
  
  <!-- Subtle grid pattern in background -->
  <defs>
    <pattern id="grid-pattern" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#3b82f6" stroke-width="0.15" opacity="0.03"/>
    </pattern>
  </defs>
  <rect x="650" y="80" width="500" height="470" fill="url(#grid-pattern)" opacity="0.5"/>
</svg>