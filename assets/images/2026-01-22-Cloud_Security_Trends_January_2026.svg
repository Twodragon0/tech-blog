<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#dd6b20;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e53e3e;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="pillRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#742a2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9b2c2c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pillAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#744210;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pillBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a4a7f;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(229,62,62,0.04)" stroke="rgba(229,62,62,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(49,130,206,0.05)" stroke="rgba(49,130,206,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Cloud + Shield + Kubernetes Gear -->
  <!-- Cloud base shape -->
  <ellipse cx="1000" cy="260" rx="100" ry="55" fill="rgba(49,130,206,0.09)" stroke="rgba(49,130,206,0.28)" stroke-width="1.5"/>
  <circle cx="945" cy="245" r="38" fill="rgba(49,130,206,0.08)" stroke="rgba(49,130,206,0.25)" stroke-width="1.5"/>
  <circle cx="1000" cy="225" r="48" fill="rgba(49,130,206,0.10)" stroke="rgba(49,130,206,0.30)" stroke-width="1.5"/>
  <circle cx="1055" cy="240" r="36" fill="rgba(49,130,206,0.08)" stroke="rgba(49,130,206,0.22)" stroke-width="1.5"/>

  <!-- Shield in the center of the cloud -->
  <path d="M990 215 L1010 215 L1010 230 Q1010 242 1000 247 Q990 242 990 230 Z" fill="rgba(229,62,62,0.13)" stroke="rgba(229,62,62,0.40)" stroke-width="1.5"/>
  <!-- Shield checkmark -->
  <polyline points="994,232 998,236 1006,224" fill="none" stroke="rgba(229,62,62,0.70)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Kubernetes gear ring around cloud area -->
  <circle cx="1000" cy="230" r="80" fill="none" stroke="rgba(237,137,54,0.18)" stroke-width="1" stroke-dasharray="6 4"/>
  <circle cx="1000" cy="230" r="90" fill="none" stroke="rgba(49,130,206,0.12)" stroke-width="1" stroke-dasharray="3 8"/>

  <!-- Kubernetes gear teeth (6 spokes) -->
  <g stroke="rgba(237,137,54,0.32)" stroke-width="2" fill="none">
    <line x1="1000" y1="138" x2="1000" y2="155"/>
    <line x1="1000" y1="305" x2="1000" y2="322"/>
    <line x1="930" y1="165" x2="940" y2="180"/>
    <line x1="1060" y1="280" x2="1070" y2="295"/>
    <line x1="930" y1="295" x2="940" y2="280"/>
    <line x1="1060" y1="165" x2="1070" y2="180"/>
  </g>

  <!-- Gear hub circles -->
  <circle cx="1000" cy="230" r="12" fill="rgba(237,137,54,0.10)" stroke="rgba(237,137,54,0.35)" stroke-width="1.5"/>
  <circle cx="1000" cy="230" r="5" fill="rgba(237,137,54,0.25)" stroke="rgba(237,137,54,0.55)" stroke-width="1"/>

  <!-- 82% arc indicator -->
  <!-- Full circle track -->
  <circle cx="1000" cy="370" r="42" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
  <!-- 82% arc (82% of 360 = 295.2 degrees, stroke-dasharray trick) -->
  <!-- circumference = 2*pi*42 = 263.9 -->
  <circle cx="1000" cy="370" r="42" fill="none" stroke="rgba(229,62,62,0.65)" stroke-width="6"
    stroke-dasharray="216.4 47.5" stroke-dashoffset="66" stroke-linecap="round"
    transform="rotate(-90 1000 370)"/>
  <text x="1000" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.80)">82%</text>
  <text x="1000" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="rgba(255,255,255,0.45)">K8S RISK</text>

  <!-- Small lock icon to right of arc -->
  <rect x="1060" y="355" width="16" height="13" rx="2" fill="rgba(229,62,62,0.12)" stroke="rgba(229,62,62,0.35)" stroke-width="1"/>
  <path d="M1063 355 Q1063 349 1068 349 Q1073 349 1073 355" fill="none" stroke="rgba(229,62,62,0.40)" stroke-width="1.5"/>

  <!-- Satellite / node dots around cluster -->
  <circle cx="920" cy="180" r="5" fill="rgba(49,130,206,0.20)" stroke="rgba(49,130,206,0.50)" stroke-width="1"/>
  <circle cx="1082" cy="180" r="5" fill="rgba(49,130,206,0.20)" stroke="rgba(49,130,206,0.50)" stroke-width="1"/>
  <circle cx="910" cy="290" r="4" fill="rgba(237,137,54,0.18)" stroke="rgba(237,137,54,0.45)" stroke-width="1"/>
  <circle cx="1090" cy="290" r="4" fill="rgba(237,137,54,0.18)" stroke="rgba(237,137,54,0.45)" stroke-width="1"/>

  <!-- Connection lines node to cloud -->
  <line x1="920" y1="185" x2="945" y2="220" stroke="rgba(49,130,206,0.20)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1082" y1="185" x2="1055" y2="220" stroke="rgba(49,130,206,0.20)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.70)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(237,137,54,0.70)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(49,130,206,0.70)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.35)" stroke-width="1"/>
  <text x="180" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(229,62,62,0.90)" letter-spacing="1">JANUARY 22, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white">Cloud Security Trends January</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white">2026 Kubernetes 82 Percent</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Security vulnerabilities &amp; cloud-native threat landscape</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(229,62,62,0.80)" letter-spacing="2">SECURITY / CLOUD / KUBERNETES</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="url(#pillRed)" stroke="rgba(229,62,62,0.30)" stroke-width="1"/>
  <text x="145" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">Kubernetes</text>

  <rect x="226" y="402" width="130" height="36" rx="18" fill="url(#pillAmber)" stroke="rgba(237,137,54,0.30)" stroke-width="1"/>
  <text x="291" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">Cloud Risk</text>

  <rect x="372" y="402" width="130" height="36" rx="18" fill="url(#pillBlue)" stroke="rgba(49,130,206,0.30)" stroke-width="1"/>
  <text x="437" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.85)">DevSecOps</text>

  <!-- Footer -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">tech.2twodragon.com</text>
  <text x="1120" y="545" text-anchor="end" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">SECURITY</text>
</svg>