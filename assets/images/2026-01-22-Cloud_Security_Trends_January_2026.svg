  <rect x="430" y="248" width="340" height="290" rx="16" fill="url(#card2Grad)" stroke="#1e3a6e" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="430" y="248" width="340" height="4" rx="2" fill="#3b82f6"/>

