      <text x="42" y="128">1</text><text x="42" y="146">2</text><text x="42" y="164">3</text>
      <text x="42" y="182">4</text><text x="42" y="200">5</text><text x="42" y="218">6</text>
      <text x="42" y="236">7</text><text x="42" y="254">8</text><text x="42" y="272">9</text>
      <text x="36" y="290">10</text><text x="36" y="308">11</text><text x="36" y="326">12</text>
