    <text x="750" y="522" font-family="Courier New,monospace" font-size="8" fill="#f59e0b" text-anchor="middle" font-weight="bold">HIGH</text>

    <rect x="810" y="500" width="360" height="50" rx="6" fill="#1a0a1a" stroke="#a855f7" stroke-width="1.2"/>
    <circle cx="830" cy="525" r="8" fill="#a855f7" opacity="0.2"/>
    <text x="830" y="529" font-family="Courier New,monospace" font-size="8" fill="#a855f7" text-anchor="middle">AI</text>
