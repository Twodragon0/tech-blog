      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="apr11glowL" cx="25%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="apr11glowR" cx="75%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="apr11glow" x="-100%" y="-100%" width="300%" height="300%">
