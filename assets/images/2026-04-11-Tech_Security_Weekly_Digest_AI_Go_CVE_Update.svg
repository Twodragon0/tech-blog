      <rect x="60" y="136" width="200" height="12" rx="2" fill="#22d3ee" opacity="0.2"/>
      <rect x="60" y="154" width="160" height="12" rx="2" fill="#94a3b8" opacity="0.15"/>
      <rect x="60" y="172" width="240" height="12" rx="2" fill="#a855f7" opacity="0.2"/>
      <rect x="60" y="190" width="180" height="12" rx="2" fill="#22c55e" opacity="0.2"/>
      <!-- INFECTED LINE (red highlight) -->
      <rect x="55" y="206" width="520" height="16" rx="2" fill="#ef4444" opacity="0.12"/>
      <rect x="60" y="208" width="280" height="12" rx="2" fill="#ef4444" opacity="0.35"/>
      <text x="350" y="218" font-family="Courier New,monospace" font-size="9" fill="#ef4444" opacity="0.8">// GLASSWORM INJECTED</text>
