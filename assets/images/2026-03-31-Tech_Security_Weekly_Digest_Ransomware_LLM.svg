<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>Tech Security Weekly Digest Ransomware LLM</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient overlay for depth -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1628;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="threatGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff5566;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff5566;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5588ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#33dd99;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Subtle background grid -->
  <g opacity="0.05" stroke="#5588ff" stroke-width="1">
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="850" y1="0" x2="850" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="950" y1="0" x2="950" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- ===== RIGHT SIDE: ILLUSTRATION (700-1150) ===== -->

  <!-- Threat glow behind everything -->
  <circle cx="900" cy="280" r="180" fill="url(#threatGlow)"/>

  <!-- Neural network nodes in background -->
  <circle cx="750" cy="200" r="4" fill="#5588ff" opacity="0.6"/>
  <circle cx="800" cy="150" r="3" fill="#5588ff" opacity="0.4"/>
  <circle cx="850" cy="180" r="3.5" fill="#33dd99" opacity="0.5"/>
  <circle cx="900" cy="140" r="4" fill="#5588ff" opacity="0.6"/>
  <circle cx="950" cy="190" r="3" fill="#33dd99" opacity="0.4"/>
  <circle cx="1000" cy="160" r="3.5" fill="#5588ff" opacity="0.5"/>
  <circle cx="1050" cy="210" r="4" fill="#33dd99" opacity="0.6"/>

  <!-- Neural network connections -->
  <line x1="750" y1="200" x2="800" y2="150" stroke="#5588ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="800" y1="150" x2="850" y2="180" stroke="#5588ff" stroke-width="1" opacity="0.3"/>
  <line x1="850" y1="180" x2="900" y2="140" stroke="#33dd99" stroke-width="1.5" opacity="0.4"/>
  <line x1="900" y1="140" x2="950" y2="190" stroke="#5588ff" stroke-width="1" opacity="0.3"/>
  <line x1="950" y1="190" x2="1000" y2="160" stroke="#33dd99" stroke-width="1.5" opacity="0.4"/>
  <line x1="1000" y1="160" x2="1050" y2="210" stroke="#5588ff" stroke-width="1" opacity="0.3"/>

  <!-- Large padlock center (ransomware symbol) -->
  <!-- Lock body -->
  <rect x="830" y="280" width="140" height="140" rx="15" fill="#ff5566" opacity="0.95"/>

  <!-- Lock shackle -->
  <path d="M 870 280 Q 870 220 900 200 Q 930 220 930 280" stroke="#ff5566" stroke-width="18" fill="none" opacity="0.95"/>

  <!-- Lock keyhole -->
  <circle cx="900" cy="330" r="12" fill="#0a0c1a"/>
  <rect x="895" y="345" width="10" height="30" fill="#0a0c1a"/>

  <!-- AI circuit pattern overlay on lock -->
  <g stroke="#33dd99" stroke-width="2" fill="none" opacity="0.7">
    <rect x="845" y="295" width="30" height="30" rx="3"/>
    <circle cx="892" cy="307" r="5"/>
    <rect x="905" y="295" width="30" height="30" rx="3"/>
    <line x1="860" y1="310" x2="880" y2="310"/>
    <line x1="910" y1="310" x2="930" y2="310"/>
  </g>

  <!-- Threat indicators (red sparks around lock) -->
  <g fill="#ff5566" opacity="0.8">
    <polygon points="980,240 985,250 975,255" transform="rotate(15 980 248)"/>
    <polygon points="820,250 815,260 810,255" transform="rotate(-30 815 255)"/>
    <polygon points="950,380 960,375 965,385" transform="rotate(45 958 380)"/>
    <polygon points="830,370 820,375 825,365" transform="rotate(-60 825 370)"/>
  </g>

  <!-- Data streams being encrypted (red flowing lines) -->
  <g stroke="#ff5566" stroke-width="3" fill="none" opacity="0.6">
    <path d="M 750 340 Q 800 350 850 350"/>
    <path d="M 760 380 Q 820 370 850 360"/>
    <path d="M 770 420 Q 810 400 850 375"/>
  </g>

  <!-- LLM/AI response indicator (blue lines) -->
  <g stroke="#5588ff" stroke-width="2.5" fill="none" opacity="0.7">
    <path d="M 950 350 Q 980 330 1020 320" stroke-dasharray="5,5"/>
    <path d="M 955 370 Q 990 360 1025 355" stroke-dasharray="5,5"/>
    <path d="M 950 390 Q 985 385 1025 390" stroke-dasharray="5,5"/>
  </g>

  <!-- Additional AI nodes in response flow -->
  <circle cx="1020" cy="320" r="3.5" fill="#33dd99" opacity="0.8"/>
  <circle cx="1025" cy="355" r="3.5" fill="#5588ff" opacity="0.8"/>
  <circle cx="1025" cy="390" r="3.5" fill="#33dd99" opacity="0.8"/>

  <!-- Binary/code elements floating -->
  <text x="780" y="480" font-size="14" font-family="monospace" fill="#5588ff" opacity="0.5">010110</text>
  <text x="950" y="500" font-size="13" font-family="monospace" fill="#ff5566" opacity="0.5">11010101</text>
  <text x="1000" y="450" font-size="12" font-family="monospace" fill="#33dd99" opacity="0.4">LLM</text>

  <!-- ===== LEFT SIDE: TEXT ===== -->

  <!-- Title line 1 -->
  <text x="50" y="185" font-size="46" font-weight="bold" fill="#ffffff" font-family="system-ui, sans-serif">Tech Security</text>

  <!-- Title line 2 -->
  <text x="50" y="245" font-size="46" font-weight="bold" fill="#ffffff" font-family="system-ui, sans-serif">Weekly Digest</text>

  <!-- Subtitle/keywords -->
  <text x="50" y="285" font-size="16" fill="#aaaaaa" font-family="system-ui, sans-serif">Ransomware - LLM - Threats</text>

  <!-- Date badge -->
  <rect x="50" y="340" width="200" height="40" rx="6" fill="#ff5566" opacity="0.15" stroke="#ff5566" stroke-width="2"/>
  <text x="60" y="365" font-size="14" font-weight="600" fill="#ff5566" font-family="system-ui, sans-serif">MARCH 29, 2026</text>

  <!-- Tag pills -->
  <!-- Tag 1: Ransomware -->
  <rect x="50" y="415" width="110" height="32" rx="16" fill="#ff5566" opacity="0.2" stroke="#ff5566" stroke-width="1.5"/>
  <text x="65" y="438" font-size="13" font-weight="500" fill="#ff5566" font-family="system-ui, sans-serif">Ransomware</text>

  <!-- Tag 2: AI/LLM -->
  <rect x="175" y="415" width="85" height="32" rx="16" fill="#5588ff" opacity="0.2" stroke="#5588ff" stroke-width="1.5"/>
  <text x="190" y="438" font-size="13" font-weight="500" fill="#5588ff" font-family="system-ui, sans-serif">AI Threats</text>

  <!-- Tag 3: Security -->
  <rect x="275" y="415" width="95" height="32" rx="16" fill="#33dd99" opacity="0.2" stroke="#33dd99" stroke-width="1.5"/>
  <text x="290" y="438" font-size="13" font-weight="500" fill="#33dd99" font-family="system-ui, sans-serif">Security</text>

  <!-- Footer -->
  <text x="50" y="590" font-size="12" fill="#666666" font-family="system-ui, sans-serif">tech.2twodragon.com</text>

  <!-- Accent line -->
  <line x1="50" y1="310" x2="180" y2="310" stroke="#5588ff" stroke-width="2" opacity="0.5"/>
</svg>