<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="55%" style="stop-color:#1a110a"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <linearGradient id="blockGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="blockGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="k8sGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#326CE5;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#326CE5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="280" cy="260" r="280" fill="#f59e0b" opacity="0.07" filter="url(#ambient)"/>
  <circle cx="900" cy="280" r="270" fill="#326CE5" opacity="0.08" filter="url(#ambient)"/>
  <circle cx="600" cy="320" r="180" fill="#f59e0b" opacity="0.04" filter="url(#ambient)"/>
  <circle cx="1080" cy="120" r="160" fill="#326CE5" opacity="0.05" filter="url(#ambient)"/>

  <!-- Floating code fragments -->
  <text x="55" y="130" font-family="Courier New,monospace" font-size="12" fill="#f59e0b" opacity="0.13" transform="rotate(-7,55,130)">kubectl apply -f</text>
  <text x="900" y="115" font-family="Courier New,monospace" font-size="11" fill="#326CE5" opacity="0.14" transform="rotate(5,900,115)">block.hash(prev)</text>
  <text x="65" y="505" font-family="Courier New,monospace" font-size="11" fill="#326CE5" opacity="0.12" transform="rotate(4,65,505)">chainalysis.trace()</text>
  <text x="870" y="535" font-family="Courier New,monospace" font-size="12" fill="#f59e0b" opacity="0.13" transform="rotate(-4,870,535)">helm install bitcoin-node</text>
  <text x="390" y="72" font-family="Courier New,monospace" font-size="10" fill="#94a3b8" opacity="0.10">merkle.root(transactions)</text>
  <text x="730" y="572" font-family="Courier New,monospace" font-size="10" fill="#326CE5" opacity="0.11">pod.status = Running</text>
  <text x="1060" y="330" font-family="Courier New,monospace" font-size="10" fill="#f59e0b" opacity="0.10" transform="rotate(-5,1060,330)">btc.verify(signature)</text>
  <text x="28" y="370" font-family="Courier New,monospace" font-size="10" fill="#326CE5" opacity="0.10" transform="rotate(3,28,370)">cncf.graduate(project)</text>

  <!-- BLOCKCHAIN SIDE (left) -->
  <!-- Block 1 with Bitcoin symbol -->
  <g transform="translate(145,265)" filter="url(#shadow)">
    <rect x="-58" y="-55" width="116" height="110" rx="10" fill="url(#blockGrad1)" stroke="#f59e0b" stroke-width="2.5"/>
    <!-- Bitcoin symbol -->
    <text x="0" y="-10" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="#f59e0b" text-anchor="middle" filter="url(#glow)">&#x20BF;</text>
    <!-- Hash -->
    <text x="0" y="18" font-family="Courier New,monospace" font-size="7" fill="#fbbf24" text-anchor="middle" opacity="0.8">#000a2f1b</text>
    <text x="0" y="30" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle" opacity="0.6">prev: 0x0000</text>
    <!-- Block label -->
    <text x="0" y="46" font-family="Arial,sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle" font-weight="bold">GENESIS</text>
  </g>

  <!-- Chain link 1 -->
  <g transform="translate(226,265)">
    <line x1="0" y1="0" x2="38" y2="0" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
    <circle cx="10" cy="0" r="4" fill="#0a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="20" cy="0" r="4" fill="#0a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="30" cy="0" r="4" fill="#0a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  </g>

  <!-- Block 2 -->
  <g transform="translate(330,265)" filter="url(#shadow)">
    <rect x="-55" y="-50" width="110" height="100" rx="10" fill="url(#blockGrad2)" stroke="#f59e0b" stroke-width="2"/>
    <text x="0" y="-8" font-family="Courier New,monospace" font-size="7" fill="#fbbf24" text-anchor="middle" opacity="0.9">#001f8a3c</text>
    <text x="0" y="5" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle" opacity="0.6">txns: 2,418</text>
    <text x="0" y="18" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle" opacity="0.6">nonce: 84729</text>
    <text x="0" y="34" font-family="Arial,sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle" font-weight="bold">BLOCK 2</text>
  </g>

  <!-- Chain link 2 -->
  <g transform="translate(408,265)">
    <line x1="0" y1="0" x2="38" y2="0" stroke="#f59e0b" stroke-width="3" opacity="0.6"/>
    <circle cx="10" cy="0" r="4" fill="#0a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="20" cy="0" r="4" fill="#0a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="30" cy="0" r="4" fill="#0a1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  </g>

  <!-- Block 3 -->
  <g transform="translate(510,265)" filter="url(#shadow)">
    <rect x="-55" y="-50" width="110" height="100" rx="10" fill="url(#blockGrad2)" stroke="#f59e0b" stroke-width="2"/>
    <text x="0" y="-8" font-family="Courier New,monospace" font-size="7" fill="#fbbf24" text-anchor="middle" opacity="0.9">#00ac912e</text>
    <text x="0" y="5" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle" opacity="0.6">txns: 3,104</text>
    <text x="0" y="18" font-family="Courier New,monospace" font-size="7" fill="#94a3b8" text-anchor="middle" opacity="0.6">nonce: 21583</text>
    <text x="0" y="34" font-family="Arial,sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle" font-weight="bold">BLOCK 3</text>
  </g>

  <!-- Bridge / connector -->
  <g transform="translate(565,265)">
    <line x1="0" y1="0" x2="70" y2="0" stroke="url(#bridgeGrad)" stroke-width="3" opacity="0.7" stroke-dasharray="8,4"/>
    <!-- Center bridge node -->
    <rect x="25" y="-12" width="20" height="24" rx="4" fill="#1e293b" stroke="#94a3b8" stroke-width="1" opacity="0.8"/>
    <text x="35" y="4" font-family="Arial,sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">API</text>
  </g>

  <!-- KUBERNETES SIDE (right) -->
  <!-- K8s cluster: central hub + 3 nodes -->
  <g transform="translate(870,265)" filter="url(#shadow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="78" fill="none" stroke="#326CE5" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="30" fill="#0a1020" stroke="#326CE5" stroke-width="2.5" filter="url(#glow)"/>
    <!-- K8s wheel spokes -->
    <line x1="-12" y1="-20" x2="-26" y2="-46" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="12" y1="-20" x2="26" y2="-46" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="24" y1="0" x2="52" y2="0" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="12" y1="20" x2="26" y2="46" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="-12" y1="20" x2="-26" y2="46" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <line x1="-24" y1="0" x2="-52" y2="0" stroke="#326CE5" stroke-width="2" opacity="0.7"/>
    <!-- Hub label -->
    <text x="0" y="4" font-family="Arial,sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle" font-weight="bold">K8s</text>
    <!-- Node top -->
    <circle cx="0" cy="-62" r="16" fill="url(#k8sGrad)" stroke="#326CE5" stroke-width="2"/>
    <text x="0" y="-58" font-family="Arial,sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle">node1</text>
    <!-- Node right -->
    <circle cx="62" cy="36" r="16" fill="url(#k8sGrad)" stroke="#326CE5" stroke-width="2"/>
    <text x="62" y="40" font-family="Arial,sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle">node2</text>
    <!-- Node left -->
    <circle cx="-62" cy="36" r="16" fill="url(#k8sGrad)" stroke="#326CE5" stroke-width="2"/>
    <text x="-62" y="40" font-family="Arial,sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle">node3</text>
    <!-- Pod dots inside hub ring -->
    <circle cx="45" cy="-45" r="5" fill="#326CE5" opacity="0.6"/>
    <circle cx="-45" cy="-45" r="5" fill="#326CE5" opacity="0.5"/>
    <circle cx="-52" cy="10" r="5" fill="#60a5fa" opacity="0.6"/>
  </g>

  <!-- Decorative grid dots bottom-left -->
  <g opacity="0.07" fill="#f59e0b">
    <circle cx="130" cy="420" r="2"/><circle cx="150" cy="420" r="2"/><circle cx="170" cy="420" r="2"/>
    <circle cx="130" cy="440" r="2"/><circle cx="150" cy="440" r="2"/><circle cx="170" cy="440" r="2"/>
    <circle cx="130" cy="460" r="2"/><circle cx="150" cy="460" r="2"/><circle cx="170" cy="460" r="2"/>
  </g>

  <!-- Title section -->
  <text x="600" y="455" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glowStrong)" letter-spacing="1">DevOps + Blockchain</text>
  <text x="600" y="490" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">CNCF Ecosystem  |  Chainalysis Insights  |  Bitcoin Infrastructure</text>

  <!-- Top badges -->
  <rect x="40" y="22" width="148" height="34" rx="17" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="114" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fcd34d" text-anchor="middle" letter-spacing="1">WEEKLY DIGEST</text>
  <rect x="1010" y="22" width="148" height="34" rx="17" fill="#326CE5" opacity="0.2" stroke="#326CE5" stroke-width="1.5"/>
  <text x="1084" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">February 10, 2026</text>

  <!-- Footer separator -->
  <line x1="40" y1="585" x2="1160" y2="585" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Footer stats -->
  <text x="40" y="610" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="start">15 News</text>
  <text x="140" y="610" font-family="Arial,sans-serif" font-size="13" fill="#ef4444" opacity="0.8">3 Security</text>
  <text x="260" y="610" font-family="Arial,sans-serif" font-size="13" fill="#8b5cf6" opacity="0.8">2 AI/ML</text>
  <text x="355" y="610" font-family="Arial,sans-serif" font-size="13" fill="#326CE5" opacity="0.9">4 Cloud</text>
  <text x="448" y="610" font-family="Arial,sans-serif" font-size="13" fill="#f59e0b" opacity="0.8">3 DevOps</text>
  <text x="1160" y="610" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="end">tech.2twodragon.com</text>
</svg>
