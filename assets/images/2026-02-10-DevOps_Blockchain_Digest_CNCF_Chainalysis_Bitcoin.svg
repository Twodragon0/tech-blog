<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(249,115,22,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(249,115,22,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Blockchain + DevOps + Bitcoin icon -->
  <!-- Outer hex ring representing blockchain -->
  <polygon points="1010,140 1080,165 1105,230 1080,295 1010,320 940,295 915,230 940,165" fill="rgba(249,115,22,0.06)" stroke="rgba(249,115,22,0.3)" stroke-width="1.5"/>
  <!-- Inner hex -->
  <polygon points="1010,168 1062,187 1082,230 1062,273 1010,292 958,273 938,230 958,187" fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.25)" stroke-width="1"/>

  <!-- Bitcoin B symbol in center -->
  <text x="985" y="248" font-size="52" font-weight="900" fill="rgba(249,115,22,0.55)" font-family="Arial, sans-serif">₿</text>

  <!-- Chain links left -->
  <rect x="870" y="218" width="36" height="26" rx="13" fill="none" stroke="rgba(59,130,246,0.35)" stroke-width="2"/>
  <rect x="882" y="218" width="36" height="26" rx="13" fill="none" stroke="rgba(59,130,246,0.25)" stroke-width="2"/>

  <!-- Chain links right -->
  <rect x="1097" y="218" width="36" height="26" rx="13" fill="none" stroke="rgba(59,130,246,0.35)" stroke-width="2"/>
  <rect x="1109" y="218" width="36" height="26" rx="13" fill="none" stroke="rgba(59,130,246,0.25)" stroke-width="2"/>

  <!-- CNCF cloud/kubernetes orbiting dots -->
  <circle cx="1010" cy="135" r="7" fill="rgba(139,92,246,0.4)" stroke="rgba(139,92,246,0.6)" stroke-width="1"/>
  <circle cx="1109" cy="178" r="5" fill="rgba(139,92,246,0.3)" stroke="rgba(139,92,246,0.5)" stroke-width="1"/>
  <circle cx="1109" cy="282" r="5" fill="rgba(59,130,246,0.3)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
  <circle cx="1010" cy="325" r="7" fill="rgba(59,130,246,0.4)" stroke="rgba(59,130,246,0.6)" stroke-width="1"/>
  <circle cx="911" cy="282" r="5" fill="rgba(249,115,22,0.3)" stroke="rgba(249,115,22,0.5)" stroke-width="1"/>
  <circle cx="911" cy="178" r="5" fill="rgba(249,115,22,0.35)" stroke="rgba(249,115,22,0.55)" stroke-width="1"/>

  <!-- DevOps infinity/loop arc -->
  <path d="M950,230 Q930,200 960,190 Q990,180 1010,205 Q1030,180 1060,190 Q1090,200 1070,230 Q1090,260 1060,270 Q1030,280 1010,255 Q990,280 960,270 Q930,260 950,230 Z" fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="1.5"/>

  <!-- Node connector lines -->
  <line x1="1010" y1="135" x2="1109" y2="178" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <line x1="1109" y1="178" x2="1109" y2="282" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>
  <line x1="1109" y1="282" x2="1010" y2="325" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <line x1="1010" y1="325" x2="911" y2="282" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <line x1="911" y1="282" x2="911" y2="178" stroke="rgba(249,115,22,0.15)" stroke-width="1"/>
  <line x1="911" y1="178" x2="1010" y2="135" stroke="rgba(249,115,22,0.15)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(249,115,22,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(59,130,246,0.6)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(139,92,246,0.6)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(249,115,22,0.3)" stroke-width="1"/>
  <text x="94" y="81" font-size="12" font-weight="600" fill="rgba(249,115,22,0.9)" font-family="'Courier New', monospace" letter-spacing="1">FEBRUARY 10, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="Arial, sans-serif">DevOps Blockchain Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="rgba(249,115,22,0.92)" font-family="Arial, sans-serif">CNCF Chainalysis Bitcoin</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)" font-family="Arial, sans-serif">Weekly digest covering DevOps, Blockchain, and Cloud-Native security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" letter-spacing="2" text-transform="uppercase">DEVOPS · BLOCKCHAIN · CLOUD NATIVE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(249,115,22,0.18)" stroke="rgba(249,115,22,0.4)" stroke-width="1"/>
  <text x="140" y="425" font-size="13" font-weight="600" fill="rgba(249,115,22,0.95)" font-family="Arial, sans-serif" text-anchor="middle">CNCF</text>

  <rect x="216" y="402" width="140" height="36" rx="18" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="286" y="425" font-size="13" font-weight="600" fill="rgba(245,158,11,0.95)" font-family="Arial, sans-serif" text-anchor="middle">Chainalysis</text>

  <rect x="372" y="402" width="120" height="36" rx="18" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.35)" stroke-width="1"/>
  <text x="432" y="425" font-size="13" font-weight="600" fill="rgba(59,130,246,0.95)" font-family="Arial, sans-serif" text-anchor="middle">Bitcoin</text>

  <!-- Footer -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="80" y="545" font-size="14" fill="rgba(255,255,255,0.35)" font-family="'Courier New', monospace">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="14" fill="rgba(249,115,22,0.5)" font-family="Arial, sans-serif" text-anchor="end" letter-spacing="1">DEVOPS</text>
</svg>