<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>2026 01 23 Tech Security Weekly Digest Microsoft AitM</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient for visual depth -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1428;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004399;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- LEFT SIDE: Text content -->
  <g>
    <!-- Main title line 1 -->
    <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">
      Tech Security Weekly
    </text>

    <!-- Main title line 2 -->
    <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">
      Digest Microsoft AitM
    </text>

    <!-- Date badge -->
    <rect x="50" y="285" width="280" height="45" rx="22" fill="#1a2f5f" stroke="#0066ff" stroke-width="2"/>
    <text x="140" y="314" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#66ccff">
      JANUARY 23, 2026
    </text>

    <!-- Tags -->
    <g id="tag1">
      <rect x="50" y="360" width="110" height="40" rx="20" fill="#2a1a3f" stroke="#9966ff" stroke-width="1.5"/>
      <text x="105" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#cc99ff" text-anchor="middle">
        SECURITY
      </text>
    </g>

    <g id="tag2">
      <rect x="180" y="360" width="90" height="40" rx="20" fill="#1a2a3f" stroke="#0066ff" stroke-width="1.5"/>
      <text x="225" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#66ccff" text-anchor="middle">
        THREAT
      </text>
    </g>

    <g id="tag3">
      <rect x="290" y="360" width="110" height="40" rx="20" fill="#3f1a1a" stroke="#ff6666" stroke-width="1.5"/>
      <text x="345" y="387" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ff9999" text-anchor="middle">
        MICROSOFT
      </text>
    </g>

    <!-- Footer -->
    <text x="50" y="600" font-family="Arial, sans-serif" font-size="12" fill="#666666" font-weight="500">
      tech.2twodragon.com
    </text>
  </g>

  <!-- RIGHT SIDE: Illustration for Account-in-the-Middle Attack -->
  <g>
    <!-- Background accent circle -->
    <circle cx="920" cy="315" r="200" fill="#1a2f5f" opacity="0.3"/>
    <circle cx="920" cy="315" r="180" fill="#2a3f7f" opacity="0.1"/>

    <!-- User account icons (left) -->
    <g id="user-left">
      <circle cx="750" cy="220" r="35" fill="#0066ff" opacity="0.8"/>
      <circle cx="750" cy="200" r="12" fill="#66ccff"/>
      <path d="M 735 225 Q 735 235 750 235 Q 765 235 765 225" fill="#66ccff"/>
    </g>

    <!-- Microsoft Server (center) - ATTACKER -->
    <g id="attacker-server" filter="url(#glow)">
      <rect x="870" y="250" width="100" height="130" rx="8" fill="#ff4444" opacity="0.9" stroke="#ff0000" stroke-width="2"/>

      <!-- Server details -->
      <rect x="885" y="265" width="70" height="12" fill="#ff6666"/>
      <rect x="885" y="285" width="70" height="12" fill="#ff6666"/>
      <rect x="885" y="305" width="70" height="12" fill="#ff6666"/>
      <rect x="885" y="325" width="70" height="12" fill="#ff6666"/>
      <rect x="885" y="345" width="70" height="12" fill="#ff6666"/>

      <!-- Server label -->
      <text x="920" y="375" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">
        ATTACKER
      </text>
    </g>

    <!-- Legitimate server (right) -->
    <g id="legit-server">
      <rect x="1000" y="250" width="100" height="130" rx="8" fill="#0066ff" opacity="0.8" stroke="#0099ff" stroke-width="2"/>

      <!-- Server details -->
      <rect x="1015" y="265" width="70" height="12" fill="#0099ff"/>
      <rect x="1015" y="285" width="70" height="12" fill="#0099ff"/>
      <rect x="1015" y="305" width="70" height="12" fill="#0099ff"/>
      <rect x="1015" y="325" width="70" height="12" fill="#0099ff"/>
      <rect x="1015" y="345" width="70" height="12" fill="#0099ff"/>

      <!-- Microsoft label -->
      <text x="1050" y="390" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#66ccff" text-anchor="middle">
        MICROSOFT
      </text>
    </g>

    <!-- Attack flow arrows -->
    <!-- User to Attacker -->
    <defs>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ff6666" />
      </marker>
      <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#66ccff" />
      </marker>
    </defs>

    <!-- Request from User to Attacker (intercepted) -->
    <path d="M 785 215 Q 825 215 870 280" stroke="#ff9999" stroke-width="3" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="5,5" opacity="0.9"/>

    <!-- Attacker forwards to legitimate (relayed) -->
    <path d="M 970 300 Q 985 300 1000 300" stroke="#ff6666" stroke-width="2" fill="none" marker-end="url(#arrowRed)" opacity="0.8"/>

    <!-- Response from Microsoft back through Attacker -->
    <path d="M 1000 330 Q 985 330 970 330" stroke="#0099ff" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" opacity="0.8"/>

    <!-- Response from Attacker to User -->
    <path d="M 870 350 Q 825 350 785 280" stroke="#ff6666" stroke-width="3" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="5,5" opacity="0.9"/>

    <!-- Lock icons indicating interception -->
    <g id="intercept-lock">
      <circle cx="830" cy="280" r="18" fill="#ff4444" opacity="0.9"/>
      <path d="M 824 270 L 824 265 Q 824 260 829 260 Q 834 260 834 265 L 834 270 Z" fill="#ffff00" stroke="#ffff00" stroke-width="1.5"/>
      <rect x="822" y="271" width="14" height="10" fill="#ffff00"/>
      <circle cx="829" cy="276" r="1.5" fill="#ff4444"/>
    </g>

    <!-- Warning indicator -->
    <g id="warning">
      <circle cx="1000" cy="180" r="25" fill="#ff4444" opacity="0.9" stroke="#ff0000" stroke-width="2"/>
      <text x="1000" y="195" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">!</text>
    </g>

    <!-- Process flow label -->
    <text x="920" y="440" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#66ccff" text-anchor="middle">
      Account Interception
    </text>

    <!-- Threat indicator -->
    <path d="M 810 430 L 820 420 L 830 430 L 820 440 Z" fill="#ff6666"/>
    <text x="840" y="435" font-family="Arial, sans-serif" font-size="12" fill="#ff9999" font-weight="500">
      MITM Attack Flow
    </text>
  </g>
</svg>