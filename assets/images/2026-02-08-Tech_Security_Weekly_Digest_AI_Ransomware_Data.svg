<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3a3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3a3a;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3a3a;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="tagRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tagAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tagBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background circles (very subtle) -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,50,50,0.04)" stroke="rgba(255,50,50,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,80,30,0.05)" stroke="rgba(255,80,30,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Ransomware/AI Security Icon -->
  <!-- Outer shield shape -->
  <path d="M1010,145 L1100,175 L1100,265 Q1100,310 1010,335 Q920,310 920,265 L920,175 Z"
        fill="rgba(255,40,40,0.06)" stroke="rgba(255,60,60,0.25)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,163 L1085,188 L1085,262 Q1085,298 1010,318 Q935,298 935,262 L935,188 Z"
        fill="rgba(255,40,40,0.07)" stroke="rgba(255,80,80,0.2)" stroke-width="1"/>

  <!-- Lock body -->
  <rect x="985" y="230" width="50" height="42" rx="5"
        fill="rgba(255,100,50,0.12)" stroke="rgba(255,120,60,0.35)" stroke-width="1.5"/>
  <!-- Lock shackle -->
  <path d="M993,230 L993,218 Q993,200 1010,200 Q1027,200 1027,218 L1027,230"
        fill="none" stroke="rgba(255,120,60,0.35)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="1010" cy="247" r="6" fill="rgba(255,80,40,0.2)" stroke="rgba(255,100,60,0.4)" stroke-width="1"/>
  <rect x="1007" y="247" width="6" height="12" rx="2" fill="rgba(255,80,40,0.2)" stroke="rgba(255,100,60,0.35)" stroke-width="1"/>

  <!-- AI Circuit nodes around shield -->
  <circle cx="920" cy="175" r="5" fill="rgba(80,180,255,0.15)" stroke="rgba(80,180,255,0.4)" stroke-width="1"/>
  <circle cx="1100" cy="175" r="5" fill="rgba(80,180,255,0.15)" stroke="rgba(80,180,255,0.4)" stroke-width="1"/>
  <circle cx="1100" cy="265" r="5" fill="rgba(255,180,80,0.15)" stroke="rgba(255,180,80,0.4)" stroke-width="1"/>
  <circle cx="920" cy="265" r="5" fill="rgba(255,180,80,0.15)" stroke="rgba(255,180,80,0.4)" stroke-width="1"/>
  <circle cx="1010" cy="145" r="6" fill="rgba(255,80,80,0.15)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>

  <!-- Circuit lines from corners -->
  <line x1="920" y1="175" x2="888" y2="155" stroke="rgba(80,180,255,0.2)" stroke-width="1"/>
  <line x1="888" y1="155" x2="868" y2="155" stroke="rgba(80,180,255,0.2)" stroke-width="1"/>
  <circle cx="868" cy="155" r="3" fill="rgba(80,180,255,0.2)" stroke="rgba(80,180,255,0.35)" stroke-width="1"/>

  <line x1="1100" y1="175" x2="1130" y2="155" stroke="rgba(80,180,255,0.2)" stroke-width="1"/>
  <line x1="1130" y1="155" x2="1150" y2="155" stroke="rgba(80,180,255,0.2)" stroke-width="1"/>
  <circle cx="1150" cy="155" r="3" fill="rgba(80,180,255,0.2)" stroke="rgba(80,180,255,0.35)" stroke-width="1"/>

  <line x1="1100" y1="265" x2="1138" y2="275" stroke="rgba(255,180,80,0.2)" stroke-width="1"/>
  <line x1="1138" y1="275" x2="1155" y2="275" stroke="rgba(255,180,80,0.2)" stroke-width="1"/>
  <circle cx="1155" cy="275" r="3" fill="rgba(255,180,80,0.2)" stroke="rgba(255,180,80,0.35)" stroke-width="1"/>

  <line x1="920" y1="265" x2="882" y2="275" stroke="rgba(255,180,80,0.2)" stroke-width="1"/>
  <line x1="882" y1="275" x2="862" y2="275" stroke="rgba(255,180,80,0.2)" stroke-width="1"/>
  <circle cx="862" cy="275" r="3" fill="rgba(255,180,80,0.2)" stroke="rgba(255,180,80,0.35)" stroke-width="1"/>

  <!-- Ransomware binary data fragments -->
  <text x="870" y="308" font-family="monospace" font-size="9" fill="rgba(255,80,80,0.25)">01001</text>
  <text x="1090" y="308" font-family="monospace" font-size="9" fill="rgba(255,80,80,0.25)">10110</text>
  <text x="925" y="322" font-family="monospace" font-size="9" fill="rgba(255,100,50,0.2)">11001</text>
  <text x="1060" y="322" font-family="monospace" font-size="9" fill="rgba(255,100,50,0.2)">00111</text>

  <!-- Warning triangle (ransomware alert) -->
  <polygon points="1010,148 1022,168 998,168"
           fill="rgba(255,200,0,0.1)" stroke="rgba(255,200,0,0.3)" stroke-width="1.5"/>
  <text x="1010" y="165" font-family="sans-serif" font-size="10" font-weight="bold"
        fill="rgba(255,200,0,0.5)" text-anchor="middle">!</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,60,60,0.6)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,120,30,0.6)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,60,60,0.5)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4"
        fill="rgba(255,50,50,0.15)" stroke="rgba(255,80,80,0.3)" stroke-width="1"/>
  <text x="185" y="81" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
        font-weight="600" fill="rgba(255,150,150,0.9)" text-anchor="middle" letter-spacing="1">FEBRUARY 8, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="46"
        font-weight="700" fill="white">Tech Security Weekly</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Segoe UI', Arial, sans-serif" font-size="46"
        font-weight="700" fill="white">Digest AI Ransomware Data</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="19"
        fill="rgba(200,180,180,0.8)">Security threats, AI-driven attacks &amp; data protection</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
        font-weight="600" fill="rgba(255,100,100,0.75)" letter-spacing="2">SECURITY / WEEKLY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="url(#tagRed)" stroke="rgba(255,80,80,0.3)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
        font-weight="600" fill="rgba(255,180,180,0.95)" text-anchor="middle">Ransomware</text>

  <rect x="225" y="402" width="100" height="36" rx="18" fill="url(#tagAmber)" stroke="rgba(255,160,50,0.3)" stroke-width="1"/>
  <text x="275" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
        font-weight="600" fill="rgba(255,210,150,0.95)" text-anchor="middle">AI Threat</text>

  <rect x="340" y="402" width="110" height="36" rx="18" fill="url(#tagBlue)" stroke="rgba(80,130,255,0.3)" stroke-width="1"/>
  <text x="395" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
        font-weight="600" fill="rgba(150,200,255,0.95)" text-anchor="middle">Data Breach</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
        fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
        font-weight="600" fill="rgba(255,100,100,0.45)" text-anchor="end" letter-spacing="1">SECURITY</text>

  <!-- Decorative bottom line -->
  <rect x="0" y="620" width="1200" height="2" fill="rgba(255,50,50,0.15)"/>
</svg>