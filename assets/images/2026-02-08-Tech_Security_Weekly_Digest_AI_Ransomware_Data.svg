  <circle cx="1075" cy="240" r="6" fill="rgba(255,80,40,0.10)" stroke="rgba(255,100,50,0.3)" stroke-width="1.5"/>
  <circle cx="970" cy="295" r="7" fill="rgba(255,80,40,0.10)" stroke="rgba(255,100,50,0.3)" stroke-width="1.5"/>
