<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.4"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE -->
  <!-- Date Badge -->
  <g>
    <rect x="50" y="40" width="210" height="48" rx="10" fill="#ef4444" opacity="0.10" stroke="#ef4444" stroke-width="0.25"/>
    <text x="155" y="73" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">MARCH 19, 2026</text>
  </g>

  <!-- Main Title -->
  <text x="75" y="215" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#ffffff">Tech Security</text>
  <text x="75" y="275" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#ffffff">Weekly Digest</text>
  <text x="75" y="335" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#ef4444">Zero Day</text>

  <!-- Tag Pills -->
  <g>
    <rect x="75" y="410" width="125" height="38" rx="22" fill="#3b82f6" opacity="0.10" stroke="#3b82f6" stroke-width="0.25"/>
    <text x="137" y="437" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Security</text>

    <rect x="220" y="410" width="125" height="38" rx="22" fill="#f59e0b" opacity="0.10" stroke="#f59e0b" stroke-width="0.25"/>
    <text x="282" y="437" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Threats</text>

    <rect x="365" y="410" width="125" height="38" rx="22" fill="#ef4444" opacity="0.10" stroke="#ef4444" stroke-width="0.25"/>
    <text x="427" y="437" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Vulnerabilities</text>
  </g>

  <!-- Footer -->
  <text x="75" y="575" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.65">tech.2twodragon.com</text>

  <!-- RIGHT SIDE - Detailed Visual Scene -->

  <!-- Vulnerable Shield (Cracked) - Left position -->
  <g transform="translate(750, 215)">
    <!-- Outer shield shape with crack indication -->
    <path d="M -45,-55 L 45,-55 L 45,5 Q 0,70 0,70 Q 0,70 -45,5 Z" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.3" filter="url(#glow)"/>

    <!-- Crack lines -->
    <line x1="-8" y1="-45" x2="15" y2="35" stroke="#ef4444" stroke-width="0.35" opacity="0.35"/>
    <line x1="8" y1="-35" x2="-5" y2="25" stroke="#ef4444" stroke-width="0.25" opacity="0.25"/>
    <line x1="0" y1="-20" x2="12" y2="15" stroke="#ef4444" stroke-width="0.20" opacity="0.20"/>

    <!-- Warning indicator -->
    <circle cx="0" cy="8" r="20" fill="none" stroke="#ef4444" stroke-width="0.35" opacity="0.40"/>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ef4444" text-anchor="middle" opacity="0.35">!</text>
  </g>

  <!-- Secure Shield (Checkmark) - Right position -->
  <g transform="translate(980, 190)">
    <!-- Large shield with checkmark -->
    <path d="M -55,-65 L 55,-65 L 55,15 Q 0,85 0,85 Q 0,85 -55,15 Z" fill="#3b82f6" opacity="0.09" stroke="#3b82f6" stroke-width="0.35" filter="url(#glow)"/>

    <!-- Checkmark circle background -->
    <circle cx="0" cy="12" r="25" fill="none" stroke="#3b82f6" stroke-width="0.30" opacity="0.45"/>

    <!-- Checkmark -->
    <path d="M -15,8 L -3,20 L 20,-8" stroke="#3b82f6" stroke-width="0.40" fill="none" opacity="0.50" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Data Flow Arrows -->
  <g>
    <!-- Primary flow arrow -->
    <path d="M 810,250 Q 870,225 930,200" stroke="#f59e0b" stroke-width="0.30" fill="none" opacity="0.35" marker-end="url(#arrowhead)" stroke-linecap="round"/>

    <!-- Secondary flows -->
    <line x1="920" y1="130" x2="920" y2="150" stroke="#3b82f6" stroke-width="0.25" opacity="0.25"/>
    <line x1="920" y1="400" x2="920" y2="420" stroke="#3b82f6" stroke-width="0.25" opacity="0.25"/>
  </g>

  <!-- Warning Triangles - Alert indicators -->
  <g>
    <!-- Top alert -->
    <polygon points="920,110 928,140 912,140" fill="#ef4444" opacity="0.11" stroke="#ef4444" stroke-width="0.25"/>
    <text x="920" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ef4444" text-anchor="middle" opacity="0.35">⚠</text>

    <!-- Bottom alert -->
    <polygon points="920,430 928,460 912,460" fill="#f59e0b" opacity="0.11" stroke="#f59e0b" stroke-width="0.25"/>
    <text x="920" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0.35">⚠</text>
  </g>

  <!-- Network Connection Points -->
  <g fill="#3b82f6" opacity="0.30">
    <circle cx="680" cy="190" r="3.5"/>
    <circle cx="1050" cy="280" r="3.5"/>
    <circle cx="740" cy="370" r="3.5"/>
    <circle cx="1030" cy="420" r="3.5"/>
  </g>

  <!-- Connection Lines -->
  <g stroke="#3b82f6" stroke-width="0.20" opacity="0.15" fill="none" stroke-dasharray="3,3">
    <line x1="680" y1="190" x2="750" y2="280"/>
    <line x1="1050" y1="280" x2="1030" y2="420"/>
  </g>

  <!-- Data Stream Indicators - flowing arrows -->
  <g stroke="#f59e0b" stroke-width="0.20" opacity="0.20" fill="none">
    <path d="M 820,240 L 835,230" stroke-linecap="round"/>
    <path d="M 840,235 L 855,225" stroke-linecap="round"/>
    <path d="M 860,230 L 875,220" stroke-linecap="round"/>
  </g>

</svg>