<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>North Korea IT Workers Sanctions and Cisco FMC Zero-Day</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0c0e"/>
      <stop offset="100%" stop-color="#1c1c2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    <linearGradient id="patchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(39,174,96,0.3)"/>
      <stop offset="100%" stop-color="rgba(39,174,96,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- CVE shield icon -->
  <path d="M 980 120 L 1060 150 L 1060 230 Q 1060 290 980 320 Q 900 290 900 230 L 900 150 Z" fill="none" stroke="rgba(231,76,60,0.3)" stroke-width="2"/>
  <path d="M 980 140 L 1045 165 L 1045 230 Q 1045 278 980 300 Q 915 278 915 230 L 915 165 Z" fill="rgba(231,76,60,0.06)"/>
  <text x="980" y="232" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="rgba(231,76,60,0.5)" text-anchor="middle">CVE</text>
  <!-- Patch badge -->
  <circle cx="1080" cy="380" r="60" fill="url(#patchGrad)" stroke="rgba(39,174,96,0.3)" stroke-width="1.5"/>
  <text x="1080" y="375" font-family="system-ui,sans-serif" font-size="14" fill="rgba(39,174,96,0.7)" text-anchor="middle" font-weight="600">PATCH</text>
  <text x="1080" y="395" font-family="system-ui,sans-serif" font-size="12" fill="rgba(39,174,96,0.5)" text-anchor="middle">APPLIED</text>
  <!-- Zero-day countdown bars -->
  <rect x="800" y="410" width="180" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="800" y="410" width="0" height="8" rx="4" fill="rgba(231,76,60,0.6)"/>
  <rect x="800" y="428" width="180" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="800" y="428" width="40" height="8" rx="4" fill="rgba(230,126,34,0.6)"/>
  <rect x="800" y="446" width="180" height="8" rx="4" fill="rgba(255,255,255,0.05)"/>
  <rect x="800" y="446" width="120" height="8" rx="4" fill="rgba(243,156,18,0.6)"/>
  <text x="795" y="419" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="end">CVE-1</text>
  <text x="795" y="437" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="end">CVE-2</text>
  <text x="795" y="455" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="end">CVE-3</text>
  <!-- Telnet connection diagram -->
  <rect x="920" y="440" width="60" height="40" rx="4" fill="none" stroke="rgba(231,76,60,0.2)" stroke-width="1"/>
  <text x="950" y="465" font-family="system-ui,sans-serif" font-size="11" fill="rgba(231,76,60,0.4)" text-anchor="middle">TELNET</text>
  <line x1="980" y1="460" x2="1020" y2="460" stroke="rgba(231,76,60,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1030" y="456" font-family="system-ui,sans-serif" font-size="11" fill="rgba(231,76,60,0.35)">RCE</text>
  <!-- Background rings -->
  <circle cx="1050" cy="500" r="160" fill="rgba(231,76,60,0.02)"/>
  <circle cx="1050" cy="500" r="110" fill="rgba(231,76,60,0.02)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(231,76,60,0.22)" stroke="rgba(231,76,60,0.5)" stroke-width="1"/>
  <text x="180" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">MARCH 19, 2026</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="-1">DPRK IT Workers Sanctioned</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="-1">Cisco FMC Zero-Day RCE</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">Telnetd Root Exploit | Critical CVE Patches | Ransomware Alert</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="450" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category label -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">SECURITY WEEKLY DIGEST</text>
  <!-- Keyword tags -->
  <rect x="80" y="420" width="100" height="36" rx="18" fill="rgba(231,76,60,0.2)" stroke="rgba(231,76,60,0.45)" stroke-width="1"/>
  <text x="130" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#ec7063" text-anchor="middle" font-weight="600">Zero-Day</text>
  <rect x="196" y="420" width="80" height="36" rx="18" fill="rgba(230,126,34,0.18)" stroke="rgba(230,126,34,0.4)" stroke-width="1"/>
  <text x="236" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#f0b27a" text-anchor="middle" font-weight="600">CVE</text>
  <rect x="292" y="420" width="80" height="36" rx="18" fill="rgba(39,174,96,0.15)" stroke="rgba(39,174,96,0.35)" stroke-width="1"/>
  <text x="332" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#82e0aa" text-anchor="middle" font-weight="600">Patch</text>
  <rect x="388" y="420" width="120" height="36" rx="18" fill="rgba(142,68,173,0.15)" stroke="rgba(142,68,173,0.35)" stroke-width="1"/>
  <text x="448" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#bb8fce" text-anchor="middle" font-weight="600">Ransomware</text>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
