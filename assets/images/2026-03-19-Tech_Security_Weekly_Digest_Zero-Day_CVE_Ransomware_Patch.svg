<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#0a111f"/>
    </linearGradient>
    <marker id="arrowAmber" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="32" font-family="Georgia, serif">Cisco FMC Zero-Day + Telnetd RCE + OFAC Sanctions</text>
  <text x="60" y="104" fill="#94a3b8" font-size="18" font-family="Georgia, serif">Mar 19</text>

  <!-- Pipeline arrows -->
  <line x1="320" y1="315" x2="540" y2="315" stroke="#f59e0b" stroke-width="4" marker-end="url(#arrowAmber)"/>
  <line x1="660" y1="315" x2="880" y2="315" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowAmber)"/>

  <!-- Left Node -->
  <g transform="translate(170,245)">
    <rect x="0" y="0" width="160" height="140" rx="20" fill="#0f172a" stroke="#f59e0b" stroke-width="3"/>
    <!-- Icon: shield -->
    <path d="M80,24 L120,40 L120,80 C120,100 100,120 80,128 C60,120 40,100 40,80 L40,40 Z" fill="none" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="250" y="420" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="Georgia, serif">Cisco FMC</text>

  <!-- Middle Node -->
  <g transform="translate(520,245)">
    <circle cx="80" cy="70" r="70" fill="#0f172a" stroke="#ef4444" stroke-width="3"/>
    <!-- Icon: terminal -->
    <rect x="40" y="50" width="80" height="40" rx="6" fill="none" stroke="#ef4444" stroke-width="2"/>
    <path d="M50,70 L60,70 M60,70 L55,65 M60,70 L55,75" stroke="#ef4444" stroke-width="2"/>
    <line x1="70" y1="75" x2="100" y2="75" stroke="#ef4444" stroke-width="2"/>
  </g>
  <text x="600" y="420" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="Georgia, serif">Telnetd RCE</text>

  <!-- Right Node -->
  <g transform="translate(870,245)">
    <rect x="0" y="0" width="160" height="140" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="3"/>
    <!-- Icon: scales -->
    <line x1="80" y1="40" x2="80" y2="95" stroke="#8b5cf6" stroke-width="2"/>
    <line x1="40" y1="50" x2="120" y2="50" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M40,50 L28,72 L52,72 Z" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <path d="M120,50 L108,72 L132,72 Z" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <text x="950" y="420" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="Georgia, serif">OFAC</text>
</svg>