<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3030"/>
      <stop offset="50%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3030;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff3030;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Shield with skull and lock for Zero-Day/CVE/Ransomware -->
  <!-- Outer shield -->
  <path d="M1010,135 L1115,175 L1115,255 Q1115,305 1010,330 Q905,305 905,255 L905,175 Z"
        fill="rgba(255,30,30,0.06)" stroke="rgba(255,60,60,0.25)" stroke-width="1.5"/>
  <!-- Shield inner border -->
  <path d="M1010,150 L1100,185 L1100,255 Q1100,295 1010,316 Q920,295 920,255 L920,185 Z"
        fill="none" stroke="rgba(255,80,80,0.15)" stroke-width="1"/>

  <!-- Skull circle face -->
  <circle cx="1010" cy="225" r="48" fill="rgba(200,20,20,0.10)" stroke="rgba(255,60,60,0.30)" stroke-width="1.5"/>
  <!-- Skull eyes -->
  <ellipse cx="995" cy="218" rx="8" ry="10" fill="rgba(255,40,40,0.30)" stroke="rgba(255,80,80,0.50)" stroke-width="1"/>
  <ellipse cx="1025" cy="218" rx="8" ry="10" fill="rgba(255,40,40,0.30)" stroke="rgba(255,80,80,0.50)" stroke-width="1"/>
  <!-- Skull nose -->
  <path d="M1010,230 L1006,240 L1014,240 Z" fill="rgba(255,60,60,0.35)" stroke="rgba(255,100,100,0.40)" stroke-width="0.8"/>
  <!-- Skull teeth -->
  <path d="M998,246 L998,254 L1003,254 L1003,246" fill="rgba(255,60,60,0.25)" stroke="rgba(255,80,80,0.40)" stroke-width="0.8"/>
  <path d="M1006,246 L1006,256 L1012,256 L1012,246" fill="rgba(255,60,60,0.25)" stroke="rgba(255,80,80,0.40)" stroke-width="0.8"/>
  <path d="M1014,246 L1014,254 L1019,254 L1019,246" fill="rgba(255,60,60,0.25)" stroke="rgba(255,80,80,0.40)" stroke-width="0.8"/>
  <line x1="996" y1="246" x2="1022" y2="246" stroke="rgba(255,80,80,0.40)" stroke-width="0.8"/>

  <!-- Padlock body -->
  <rect x="1060" y="248" width="42" height="32" rx="5" fill="rgba(255,100,20,0.10)" stroke="rgba(255,130,30,0.35)" stroke-width="1.5"/>
  <!-- Padlock shackle -->
  <path d="M1068,248 L1068,238 Q1068,226 1081,226 Q1094,226 1094,238 L1094,248"
        fill="none" stroke="rgba(255,130,30,0.35)" stroke-width="2"/>
  <!-- Padlock keyhole -->
  <circle cx="1081" cy="262" r="5" fill="rgba(255,130,30,0.30)" stroke="rgba(255,150,50,0.45)" stroke-width="1"/>
  <rect x="1079" y="264" width="4" height="7" rx="1" fill="rgba(255,130,30,0.30)"/>

  <!-- CVE hex badge -->
  <polygon points="952,160 965,152 978,160 978,176 965,184 952,176"
           fill="rgba(200,50,255,0.08)" stroke="rgba(200,80,255,0.30)" stroke-width="1.2"/>
  <text x="965" y="172" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(210,100,255,0.75)">CVE</text>

  <!-- Zero-day burst rays -->
  <line x1="1010" y1="135" x2="1010" y2="118" stroke="rgba(255,60,60,0.20)" stroke-width="1"/>
  <line x1="1060" y1="148" x2="1075" y2="135" stroke="rgba(255,60,60,0.15)" stroke-width="1"/>
  <line x1="960" y1="148" x2="945" y2="135" stroke="rgba(255,60,60,0.15)" stroke-width="1"/>

  <!-- Decorative code/binary text -->
  <text x="902" y="148" font-family="monospace" font-size="8" fill="rgba(255,50,50,0.18)">0xDEAD</text>
  <text x="1080" y="338" font-family="monospace" font-size="8" fill="rgba(255,80,30,0.18)">ENC</text>
  <text x="905" y="310" font-family="monospace" font-size="8" fill="rgba(255,50,50,0.15)">PAYLOAD</text>

  <!-- Scanning lines across illustration -->
  <rect x="880" y="200" width="260" height="1" fill="rgba(255,60,60,0.12)"/>
  <rect x="880" y="270" width="260" height="1" fill="rgba(255,60,60,0.08)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,60,60,0.70)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,140,0,0.70)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,60,60,0.50)"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,30,30,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,30,30,0.06)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,40,40,0.15)" stroke="rgba(255,60,60,0.30)" stroke-width="1"/>
  <text x="180" y="81" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,120,0.90)" letter-spacing="1.5">MARCH 19, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="rgba(255,90,90,1.0)">Zero Day CVE Ransomware</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="rgba(200,180,180,0.75)">Critical vulnerabilities, exploit patches &amp; ransomware threats</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,100,100,0.70)" letter-spacing="2.5">SECURITY / THREAT INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="115" height="36" rx="18" fill="rgba(220,30,30,0.20)" stroke="rgba(255,60,60,0.40)" stroke-width="1"/>
  <text x="137" y="425" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,110,110,0.95)">Zero-Day</text>

  <rect x="207" y="402" width="100" height="36" rx="18" fill="rgba(200,120,0,0.20)" stroke="rgba(255,160,30,0.40)" stroke-width="1"/>
  <text x="257" y="425" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,180,60,0.95)">CVE Patch</text>

  <rect x="319" y="402" width="115" height="36" rx="18" fill="rgba(30,80,200,0.20)" stroke="rgba(60,130,255,0.40)" stroke-width="1"/>
  <text x="376" y="425" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(100,170,255,0.95)">Ransomware</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(180,150,150,0.50)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(255,100,100,0.50)" letter-spacing="1">SECURITY</text>
</svg>
