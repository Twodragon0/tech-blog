<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left side: Text content -->
  <!-- Title line 1 -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">npm Ecosystem Large</text>
  <!-- Title line 2 -->
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">scale Security Breach</text>

  <!-- Date badge -->
  <rect x="60" y="280" width="380" height="50" fill="#cc2936" rx="25"/>
  <text x="250" y="312" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">SEPTEMBER 10, 2025</text>

  <!-- Tag pills -->
  <rect x="60" y="420" width="110" height="32" fill="#1a1d2e" stroke="#cc2936" stroke-width="2" rx="16"/>
  <text x="115" y="442" font-family="Arial, sans-serif" font-size="13" fill="#cc2936" text-anchor="middle" font-weight="bold">npm</text>

  <rect x="190" y="420" width="130" height="32" fill="#1a1d2e" stroke="#cc2936" stroke-width="2" rx="16"/>
  <text x="255" y="442" font-family="Arial, sans-serif" font-size="13" fill="#cc2936" text-anchor="middle" font-weight="bold">Security</text>

  <rect x="340" y="420" width="100" height="32" fill="#1a1d2e" stroke="#cc2936" stroke-width="2" rx="16"/>
  <text x="390" y="442" font-family="Arial, sans-serif" font-size="13" fill="#cc2936" text-anchor="middle" font-weight="bold">Incident</text>

  <!-- Footer -->
  <text x="60" y="605" font-family="Arial, sans-serif" font-size="14" fill="#666" letter-spacing="1">tech.2twodragon.com</text>

  <!-- Right side: Illustration - npm Ecosystem Breach -->
  <!-- Background gradient effect with circles -->
  <circle cx="900" cy="150" r="120" fill="#cc2936" opacity="0.15"/>
  <circle cx="1000" cy="350" r="100" fill="#cc2936" opacity="0.1"/>
  <circle cx="850" cy="500" r="80" fill="#cc2936" opacity="0.1"/>

  <!-- npm packages (boxes) being compromised -->
  <!-- Package 1 - top left -->
  <rect x="720" y="100" width="80" height="80" fill="#cb3837" rx="4"/>
  <text x="760" y="150" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">pkg1</text>
  <!-- Broken lock icon -->
  <circle cx="760" cy="120" r="12" fill="none" stroke="#ffb3b3" stroke-width="2"/>
  <path d="M 754 126 L 766 126" stroke="#ffb3b3" stroke-width="2" stroke-linecap="round"/>

  <!-- Package 2 - top right -->
  <rect x="840" y="80" width="80" height="80" fill="#cb3837" rx="4"/>
  <text x="880" y="130" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">pkg2</text>
  <!-- Broken lock icon -->
  <circle cx="880" cy="100" r="12" fill="none" stroke="#ffb3b3" stroke-width="2"/>
  <path d="M 874 106 L 886 106" stroke="#ffb3b3" stroke-width="2" stroke-linecap="round"/>

  <!-- Package 3 - middle left -->
  <rect x="710" y="230" width="80" height="80" fill="#cb3837" rx="4"/>
  <text x="750" y="280" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">pkg3</text>
  <!-- Warning triangle -->
  <path d="M 750 250 L 758 265 L 742 265 Z" fill="#ffb3b3"/>

  <!-- Package 4 - middle right -->
  <rect x="840" y="240" width="80" height="80" fill="#cb3837" rx="4"/>
  <text x="880" y="290" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">pkg4</text>
  <!-- Warning triangle -->
  <path d="M 880 260 L 888 275 L 872 275 Z" fill="#ffb3b3"/>

  <!-- Package 5 - bottom left -->
  <rect x="720" y="360" width="80" height="80" fill="#cb3837" rx="4"/>
  <text x="760" y="410" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">pkg5</text>
  <!-- Broken lock icon -->
  <circle cx="760" cy="380" r="12" fill="none" stroke="#ffb3b3" stroke-width="2"/>
  <path d="M 754 386 L 766 386" stroke="#ffb3b3" stroke-width="2" stroke-linecap="round"/>

  <!-- Package 6 - bottom right -->
  <rect x="850" y="370" width="80" height="80" fill="#cb3837" rx="4"/>
  <text x="890" y="420" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">pkg6</text>
  <!-- Warning triangle -->
  <path d="M 890 390 L 898 405 L 882 405 Z" fill="#ffb3b3"/>

  <!-- Malicious connection lines (red/orange spikes) -->
  <!-- From center spreading to packages -->
  <line x1="880" y1="280" x2="760" y2="140" stroke="#ff6b6b" stroke-width="3" opacity="0.7" stroke-dasharray="5,3"/>
  <line x1="880" y1="280" x2="920" y2="120" stroke="#ff6b6b" stroke-width="3" opacity="0.7" stroke-dasharray="5,3"/>
  <line x1="880" y1="280" x2="750" y2="270" stroke="#ff6b6b" stroke-width="3" opacity="0.7" stroke-dasharray="5,3"/>
  <line x1="880" y1="280" x2="920" y2="280" stroke="#ff6b6b" stroke-width="3" opacity="0.7" stroke-dasharray="5,3"/>
  <line x1="880" y1="280" x2="760" y2="400" stroke="#ff6b6b" stroke-width="3" opacity="0.7" stroke-dasharray="5,3"/>
  <line x1="880" y1="280" x2="890" y2="410" stroke="#ff6b6b" stroke-width="3" opacity="0.7" stroke-dasharray="5,3"/>

  <!-- Central malicious node (virus/threat) -->
  <circle cx="880" cy="280" r="35" fill="none" stroke="#ff6b6b" stroke-width="3"/>
  <circle cx="880" cy="280" r="28" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.6"/>
  <circle cx="880" cy="280" r="21" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
  <!-- X in center -->
  <line x1="865" y1="265" x2="895" y2="295" stroke="#ff6b6b" stroke-width="3"/>
  <line x1="895" y1="265" x2="865" y2="295" stroke="#ff6b6b" stroke-width="3"/>

  <!-- Scattered malicious particles -->
  <circle cx="710" cy="150" r="4" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="950" cy="200" r="3" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="820" cy="350" r="3" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="1000" cy="300" r="4" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="730" cy="480" r="3" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="950" cy="450" r="3" fill="#ff6b6b" opacity="0.8"/>

  <!-- Top indicator bar - "COMPROMISED" status -->
  <rect x="700" y="40" width="450" height="30" fill="#ff6b6b" opacity="0.2" rx="4"/>
  <text x="925" y="60" font-family="Arial, sans-serif" font-size="13" fill="#ff6b6b" text-anchor="middle" font-weight="bold" letter-spacing="2">COMPROMISED</text>
</svg>