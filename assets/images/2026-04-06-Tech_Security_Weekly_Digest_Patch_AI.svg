  <!-- Orb glows -->
  <circle cx="780" cy="140" r="185" fill="#dc2626" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1050" cy="450" r="150" fill="#f97316" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="180" cy="490" r="120" fill="#ef4444" opacity="0.05" filter="url(#orbGlow)" />
  <circle cx="600" cy="310" r="100" fill="#dc2626" opacity="0.04" filter="url(#orbGlow)" />

  <!-- Card 1 (top-right): Drift Hack - Dollar/breach icon -->
  <g transform="translate(830, 55)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(95, 18)">
      <!-- Dollar sign with breach crack -->
      <circle cx="60" cy="50" r="42" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.4" />
      <circle cx="60" cy="50" r="30" fill="#fbbf24" opacity="0.08" />
      <text x="60" y="58" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="34" font-weight="900" opacity="0.85">$</text>
      <!-- Crack / breach lines -->
      <line x1="60" y1="8" x2="68" y2="28" stroke="#ef4444" stroke-width="2" opacity="0.7" />
      <line x1="68" y1="28" x2="58" y2="38" stroke="#ef4444" stroke-width="2" opacity="0.7" />
      <line x1="58" y1="38" x2="72" y2="55" stroke="#ef4444" stroke-width="2" opacity="0.6" />
      <!-- Drain arrows -->
      <line x1="85" y1="45" x2="105" y2="38" stroke="#ef4444" stroke-width="1.5" opacity="0.6" />
      <line x1="105" y1="38" x2="100" y2="30" stroke="#ef4444" stroke-width="1.5" opacity="0.6" />
      <line x1="105" y1="38" x2="113" y2="44" stroke="#ef4444" stroke-width="1.5" opacity="0.6" />
      <!-- Label -->
      <rect x="20" y="100" width="80" height="18" rx="4" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="1" stroke-opacity="0.4" />
      <text x="60" y="113" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">DRIFT $285M</text>
    </g>
    <circle cx="130" cy="200" r="3" fill="#fbbf24" opacity="0.8" />
    <circle cx="145" cy="200" r="3" fill="#ef4444" opacity="0.6" />
    <circle cx="160" cy="200" r="3" fill="#fbbf24" opacity="0.4" />
  </g>

  <!-- Card 2 (middle): QR Phishing -->
  <g transform="translate(720, 188)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(95, 18)">
      <!-- QR code pattern -->
      <rect x="15" y="10" width="90" height="90" rx="6" fill="#0b0f1a" stroke="#f97316" stroke-width="2" opacity="0.9" />
      <!-- QR corner squares -->
      <rect x="22" y="17" width="22" height="22" rx="3" fill="none" stroke="#f97316" stroke-width="2" opacity="0.8" />
      <rect x="25" y="20" width="16" height="16" rx="2" fill="#f97316" opacity="0.25" />
      <rect x="74" y="17" width="22" height="22" rx="3" fill="none" stroke="#f97316" stroke-width="2" opacity="0.8" />
      <rect x="77" y="20" width="16" height="16" rx="2" fill="#f97316" opacity="0.25" />
      <rect x="22" y="71" width="22" height="22" rx="3" fill="none" stroke="#f97316" stroke-width="2" opacity="0.8" />
      <rect x="25" y="74" width="16" height="16" rx="2" fill="#f97316" opacity="0.25" />
      <!-- QR data dots -->
      <rect x="52" y="20" width="6" height="6" rx="1" fill="#f97316" opacity="0.6" />
      <rect x="60" y="20" width="6" height="6" rx="1" fill="#f97316" opacity="0.4" />
      <rect x="52" y="28" width="6" height="6" rx="1" fill="#f97316" opacity="0.5" />
      <rect x="56" y="50" width="6" height="6" rx="1" fill="#f97316" opacity="0.6" />
      <rect x="64" y="50" width="6" height="6" rx="1" fill="#f97316" opacity="0.4" />
      <rect x="74" y="50" width="6" height="6" rx="1" fill="#f97316" opacity="0.5" />
      <rect x="56" y="58" width="6" height="6" rx="1" fill="#f97316" opacity="0.3" />
      <rect x="74" y="58" width="6" height="6" rx="1" fill="#f97316" opacity="0.6" />
      <rect x="56" y="66" width="6" height="6" rx="1" fill="#f97316" opacity="0.5" />
      <rect x="64" y="74" width="6" height="6" rx="1" fill="#f97316" opacity="0.4" />
      <rect x="74" y="74" width="6" height="6" rx="1" fill="#f97316" opacity="0.6" />
      <!-- Phishing hook overlay -->
      <path d="M55 95 Q60 102 65 95" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.8" />
      <line x1="65" y1="95" x2="65" y2="108" stroke="#ef4444" stroke-width="2" opacity="0.8" />
      <path d="M65 108 Q72 115 70 108" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.8" />
      <!-- Label -->
      <rect x="18" y="115" width="80" height="18" rx="4" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1" stroke-opacity="0.4" />
      <text x="58" y="128" text-anchor="middle" fill="#fdba74" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">QR PHISHING</text>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b" />
    <rect x="40" y="192" width="160" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3 (bottom): FortiClient EMS - shield with crack -->
