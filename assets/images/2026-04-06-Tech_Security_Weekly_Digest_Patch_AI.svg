  </circle>
  <circle cx="840" cy="325" r="1.5" fill="#f97316" opacity="0.4">
    <animate attributeName="cy" values="325;315;325" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1060" cy="295" r="2" fill="#ef4444" opacity="0.5">
    <animate attributeName="cy" values="295;285;295" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="695" cy="195" r="1.5" fill="#fbbf24" opacity="0.3">
    <animate attributeName="cy" values="195;187;195" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1110" cy="175" r="1" fill="#f97316" opacity="0.4">
    <animate attributeName="cy" values="175;167;175" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="955" cy="125" r="1.5" fill="#dc2626" opacity="0.35">
    <animate attributeName="cx" values="955;963;955" dur="4s" repeatCount="indefinite" />
  </circle>

