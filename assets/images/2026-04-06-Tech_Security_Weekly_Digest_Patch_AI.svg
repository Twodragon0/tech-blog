        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite" />
      </circle>
      <circle cx="75" cy="70" r="3" fill="#f97316" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.4s" repeatCount="indefinite" />
      </circle>
      <!-- Label -->
      <rect x="10" y="108" width="80" height="18" rx="4" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="1" stroke-opacity="0.4" />
      <text x="50" y="121" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">FORTICLIENT</text>
    </g>
    <g transform="translate(40, 195)">
