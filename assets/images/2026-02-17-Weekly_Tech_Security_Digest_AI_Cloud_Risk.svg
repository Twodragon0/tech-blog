<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4488ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4488ff;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#4488ff;stop-opacity:0.06" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#44aaff;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Shield + Cloud + AI Network -->
  <!-- Outer shield shape -->
  <path d="M1010,135 L1090,155 L1090,230 Q1090,285 1010,315 Q930,285 930,230 L930,155 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,80,80,0.3)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,155 L1075,172 L1075,228 Q1075,272 1010,295 Q945,272 945,228 L945,172 Z"
        fill="rgba(255,80,80,0.05)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <!-- Shield center lock body -->
  <rect x="994" y="218" width="32" height="26" rx="4"
        fill="rgba(255,100,100,0.15)" stroke="rgba(255,150,150,0.35)" stroke-width="1.2"/>
  <!-- Lock shackle -->
  <path d="M1001,218 Q1001,200 1010,200 Q1019,200 1019,218"
        fill="none" stroke="rgba(255,150,150,0.35)" stroke-width="1.8"/>
  <!-- Lock keyhole -->
  <circle cx="1010" cy="228" r="4" fill="rgba(255,180,180,0.4)"/>
  <rect x="1008.5" y="228" width="3" height="7" rx="1" fill="rgba(255,180,180,0.4)"/>

  <!-- Cloud shape behind shield -->
  <path d="M880,220 Q865,220 865,205 Q865,193 876,193 Q877,178 891,178 Q897,170 907,172 Q912,162 924,164 Q932,156 944,160 Q952,155 960,162 Q970,158 976,166 Q986,164 990,174 Q1000,172 1002,182 Q1010,183 1010,193 Q1018,196 1016,207 Q1018,220 1005,222 Z"
        fill="url(#cloudGrad)" stroke="rgba(68,136,255,0.25)" stroke-width="1.2"/>

  <!-- AI Network nodes around shield -->
  <circle cx="890" cy="160" r="7" fill="rgba(68,136,255,0.1)" stroke="rgba(68,136,255,0.3)" stroke-width="1"/>
  <circle cx="890" cy="160" r="3" fill="rgba(68,136,255,0.4)"/>
  <circle cx="1130" cy="170" r="7" fill="rgba(68,136,255,0.1)" stroke="rgba(68,136,255,0.3)" stroke-width="1"/>
  <circle cx="1130" cy="170" r="3" fill="rgba(68,136,255,0.4)"/>
  <circle cx="1140" cy="285" r="7" fill="rgba(255,136,0,0.1)" stroke="rgba(255,136,0,0.3)" stroke-width="1"/>
  <circle cx="1140" cy="285" r="3" fill="rgba(255,136,0,0.4)"/>
  <circle cx="900" cy="305" r="7" fill="rgba(255,136,0,0.1)" stroke="rgba(255,136,0,0.3)" stroke-width="1"/>
  <circle cx="900" cy="305" r="3" fill="rgba(255,136,0,0.4)"/>
  <circle cx="1010" cy="135" r="6" fill="rgba(255,80,80,0.1)" stroke="rgba(255,80,80,0.35)" stroke-width="1"/>
  <circle cx="1010" cy="135" r="2.5" fill="rgba(255,80,80,0.5)"/>

  <!-- Network connection lines -->
  <line x1="890" y1="160" x2="940" y2="185" stroke="rgba(68,136,255,0.18)" stroke-width="1"/>
  <line x1="1130" y1="170" x2="1085" y2="190" stroke="rgba(68,136,255,0.18)" stroke-width="1"/>
  <line x1="1140" y1="285" x2="1090" y2="265" stroke="rgba(255,136,0,0.18)" stroke-width="1"/>
  <line x1="900" y1="305" x2="945" y2="275" stroke="rgba(255,136,0,0.18)" stroke-width="1"/>
  <line x1="1010" y1="135" x2="1010" y2="155" stroke="rgba(255,80,80,0.25)" stroke-width="1"/>
  <line x1="890" y1="160" x2="1130" y2="170" stroke="rgba(68,136,255,0.08)" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="900" y1="305" x2="1140" y2="285" stroke="rgba(255,136,0,0.08)" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Scan lines on shield -->
  <line x1="940" y1="200" x2="1080" y2="200" stroke="rgba(255,80,80,0.12)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="935" y1="215" x2="1085" y2="215" stroke="rgba(255,80,80,0.08)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="937" y1="245" x2="1083" y2="245" stroke="rgba(255,80,80,0.08)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="942" y1="260" x2="1078" y2="260" stroke="rgba(255,80,80,0.06)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Alert/risk indicator triangle -->
  <polygon points="1010,325 990,355 1030,355"
           fill="rgba(255,136,0,0.12)" stroke="rgba(255,136,0,0.35)" stroke-width="1.2"/>
  <text x="1010" y="349" text-anchor="middle" font-size="14" fill="rgba(255,180,0,0.7)" font-weight="700">!</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.6)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,136,0,0.6)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(68,136,255,0.6)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="230" height="32" rx="4"
        fill="rgba(255,68,68,0.12)" stroke="rgba(255,68,68,0.3)" stroke-width="1"/>
  <text x="195" y="81" text-anchor="middle" font-family="monospace,sans-serif" font-size="12"
        fill="rgba(255,150,150,0.9)" letter-spacing="1">FEBRUARY 17, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial,Helvetica,sans-serif" font-size="46" font-weight="700"
        fill="white">Weekly Tech Security</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial,Helvetica,sans-serif" font-size="46" font-weight="700"
        fill="white">Digest AI Cloud Risk</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial,Helvetica,sans-serif" font-size="19"
        fill="rgba(200,200,220,0.75)">Security · AI Risk · Cloud Threats · Weekly Intelligence</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="1"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial,Helvetica,sans-serif" font-size="14"
        fill="rgba(255,100,100,0.8)" letter-spacing="2" font-weight="600">SECURITY / WEEKLY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18"
        fill="rgba(255,60,60,0.15)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <text x="140" y="425" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13"
        fill="rgba(255,150,150,0.95)" font-weight="600">AI Risk</text>

  <rect x="216" y="402" width="140" height="36" rx="18"
        fill="rgba(255,136,0,0.12)" stroke="rgba(255,160,0,0.38)" stroke-width="1"/>
  <text x="286" y="425" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13"
        fill="rgba(255,190,80,0.95)" font-weight="600">Cloud Threats</text>

  <rect x="372" y="402" width="150" height="36" rx="18"
        fill="rgba(68,136,255,0.12)" stroke="rgba(80,150,255,0.38)" stroke-width="1"/>
  <text x="447" y="425" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13"
        fill="rgba(130,185,255,0.95)" font-weight="600">CVE Bulletin</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="monospace,sans-serif" font-size="13"
        fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" text-anchor="end" font-family="Arial,Helvetica,sans-serif" font-size="13"
        fill="rgba(255,100,100,0.45)" letter-spacing="1" font-weight="600">SECURITY</text>
</svg>