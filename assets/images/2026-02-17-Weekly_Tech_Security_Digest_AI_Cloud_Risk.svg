<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Date Badge (Top Left) -->
  <rect x="50" y="40" width="220" height="50" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
  <text x="160" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">FEBRUARY 17, 2026</text>

  <!-- LEFT SIDE - Title Section -->
  <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="white">Weekly Tech Security</text>
  <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="white">Digest Cloud Risk</text>

  <!-- RIGHT SIDE - Visual Elements -->

  <!-- Background accent circle for visual area -->
  <circle cx="920" cy="280" r="280" fill="#3b82f6" opacity="0.04"/>

  <!-- Shield Shape with Checkmark -->
  <g>
    <!-- Shield outline -->
    <path d="M 750 150 L 820 150 L 820 240 Q 820 280 785 300 Q 750 280 750 240 Z"
          fill="#3b82f6" opacity="0.09" stroke="#3b82f6" stroke-width="2.5"/>

    <!-- Checkmark inside shield -->
    <path d="M 765 240 L 780 255 L 805 225"
          fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- Cloud Shape with Data Flow -->
  <g>
    <!-- Cloud outline -->
    <path d="M 920 140 Q 920 120 940 120 Q 955 120 960 105 Q 980 105 985 125 Q 1005 125 1005 145 Q 1005 155 990 160 L 880 160 Q 875 150 880 140 Q 890 130 920 140"
          fill="#f59e0b" opacity="0.10" stroke="#f59e0b" stroke-width="2.5"/>

    <!-- Data flow arrows from cloud -->
    <defs>
      <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.7"/>
      </marker>
      <marker id="arroworange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.7"/>
      </marker>
    </defs>

    <!-- Arrow down-left from cloud to shield -->
    <path d="M 920 160 Q 880 190 820 240"
          fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.6" marker-end="url(#arrowblue)"/>

    <!-- Arrow down-right from cloud -->
    <path d="M 960 160 L 980 220"
          fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.6" marker-end="url(#arroworange)"/>

    <!-- Arrow from shield to cloud (bidirectional) -->
    <path d="M 820 240 Q 860 200 920 160"
          fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.4" stroke-dasharray="5,5"/>
  </g>

  <!-- Data Center/Server Icon -->
  <g>
    <!-- Server stack on right side -->
    <rect x="1000" y="200" width="80" height="20" rx="3" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="1000" y="230" width="80" height="20" rx="3" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="1000" y="260" width="80" height="20" rx="3" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>

    <!-- Connection lines -->
    <path d="M 980 210 L 1000 210" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
    <path d="M 980 240 L 1000 240" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
    <path d="M 980 270 L 1000 270" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Warning/Alert Triangles (scattered) -->
  <g opacity="0.7">
    <!-- Top-left warning -->
    <path d="M 710 120 L 730 160 L 690 160 Z" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="710" cy="145" r="2.5" fill="#ef4444"/>

    <!-- Bottom-left warning -->
    <path d="M 870 310 L 885 335 L 855 335 Z" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="870" cy="322" r="2" fill="#f59e0b"/>

    <!-- Right-side warning -->
    <path d="M 1040 150 L 1055 175 L 1025 175 Z" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="1040" cy="162" r="2.5" fill="#ef4444"/>
  </g>

  <!-- Network/Data Flow Lines (additional detail) -->
  <g stroke="#3b82f6" stroke-width="1.5" opacity="0.25">
    <path d="M 750 280 L 920 280"/>
    <path d="M 760 200 L 900 220"/>
    <path d="M 780 320 L 950 350"/>
  </g>

  <!-- Tag Pills (at y=430) -->
  <g>
    <!-- Tag 1: Cloud -->
    <rect x="60" y="410" width="100" height="40" rx="20" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="110" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#3b82f6" text-anchor="middle">Cloud Risk</text>

    <!-- Tag 2: Security -->
    <rect x="180" y="410" width="100" height="40" rx="20" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
    <text x="230" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">Security</text>

    <!-- Tag 3: DevSecOps -->
    <rect x="300" y="410" width="130" height="40" rx="20" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="365" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">DevSecOps</text>
  </g>

  <!-- Footer -->
  <text x="60" y="555" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="white" opacity="0.6">tech.2twodragon.com</text>

  <!-- Decorative corner accent -->
  <circle cx="1180" cy="30" r="40" fill="#3b82f6" opacity="0.06"/>
  <circle cx="40" cy="600" r="50" fill="#f59e0b" opacity="0.05"/>
</svg>