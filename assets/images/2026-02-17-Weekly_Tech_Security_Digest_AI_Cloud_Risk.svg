<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>AI Agent Security and Cloud Cost Optimization</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a1a"/>
      <stop offset="100%" stop-color="#153030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- Cloud shape -->
  <ellipse cx="970" cy="230" rx="100" ry="55" fill="rgba(26,188,156,0.12)" stroke="rgba(26,188,156,0.4)" stroke-width="2"/>
  <ellipse cx="920" cy="250" rx="65" ry="40" fill="rgba(26,188,156,0.08)" stroke="rgba(26,188,156,0.3)" stroke-width="1.5"/>
  <ellipse cx="1020" cy="255" rx="55" ry="36" fill="rgba(26,188,156,0.08)" stroke="rgba(26,188,156,0.3)" stroke-width="1.5"/>
  <rect x="880" y="255" width="180" height="30" fill="rgba(26,188,156,0.08)" stroke="none"/>
  <!-- Dollar sign on cloud -->
  <line x1="970" y1="195" x2="970" y2="275" stroke="rgba(52,152,219,0.7)" stroke-width="3"/>
  <path d="M955,210 Q955,200 970,200 Q985,200 985,210 Q985,222 970,222 Q955,222 955,234 Q955,246 970,246 Q985,246 985,234" fill="none" stroke="rgba(52,152,219,0.7)" stroke-width="2.5"/>
  <!-- Shield overlapping cloud -->
  <path d="M960,300 L960,355 Q960,380 985,392 Q1010,380 1010,355 L1010,300 Z" fill="rgba(26,188,156,0.15)" stroke="rgba(26,188,156,0.5)" stroke-width="2"/>
  <!-- Checkmark in shield -->
  <line x1="973" y1="340" x2="982" y2="352" stroke="rgba(26,188,156,0.8)" stroke-width="2.5"/>
  <line x1="982" y1="352" x2="1000" y2="325" stroke="rgba(26,188,156,0.8)" stroke-width="2.5"/>
  <!-- Cost graph bars -->
  <rect x="820" y="420" width="24" height="60" rx="2" fill="rgba(52,152,219,0.35)"/>
  <rect x="854" y="400" width="24" height="80" rx="2" fill="rgba(52,152,219,0.35)"/>
  <rect x="888" y="380" width="24" height="100" rx="2" fill="rgba(231,76,60,0.4)"/>
  <rect x="922" y="395" width="24" height="85" rx="2" fill="rgba(52,152,219,0.35)"/>
  <rect x="956" y="415" width="24" height="65" rx="2" fill="rgba(26,188,156,0.4)"/>
  <!-- Downward arrow (cost reduction) -->
  <line x1="888" y1="375" x2="888" y2="340" stroke="rgba(26,188,156,0.6)" stroke-width="2"/>
  <polygon points="888,360 880,345 896,345" fill="rgba(26,188,156,0.8)" transform="rotate(180,888,352)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(26,188,156,0.2)" stroke="rgba(26,188,156,0.4)" stroke-width="1"/>
  <text x="180" y="81" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="1">FEBRUARY 17, 2026</text>
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">AI Agent Security and</text>
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">Cloud Cost Optimization</text>
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.65)">FinOps meets security: reducing risk and cloud spend together</text>
  <rect x="80" y="325" width="420" height="3" fill="url(#accent)"/>
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)" letter-spacing="2">TECH SECURITY DIGEST</text>
  <rect x="80" y="410" width="115" height="36" rx="18" fill="rgba(26,188,156,0.15)" stroke="rgba(26,188,156,0.4)" stroke-width="1"/>
  <text x="138" y="433" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">AI Security</text>
  <rect x="211" y="410" width="130" height="36" rx="18" fill="rgba(52,152,219,0.15)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <text x="276" y="433" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Patch Tuesday</text>
  <rect x="357" y="410" width="80" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="397" y="433" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">FinOps</text>
  <rect x="0" y="520" width="1200" height="110" fill="rgba(0,0,0,0.25)"/>
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="end" letter-spacing="1">DevSecOps</text>
</svg>
