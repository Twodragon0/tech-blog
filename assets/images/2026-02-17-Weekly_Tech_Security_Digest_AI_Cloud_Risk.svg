<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest - AI Token Theft, Password Manager Vuln, Serverless Defense</title>
  <defs>
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#eab308" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5" />
    </pattern>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Orb glows -->
  <circle cx="760" cy="140" r="185" fill="#06b6d4" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1050" cy="430" r="150" fill="#eab308" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="200" cy="490" r="120" fill="#14b8a6" opacity="0.05" filter="url(#orbGlow)" />
  <circle cx="600" cy="310" r="100" fill="#06b6d4" opacity="0.04" filter="url(#orbGlow)" />

  <!-- Card 1 (top-right): Key with chain (Token Theft) -->
  <g transform="translate(830, 60)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(88, 14)">
      <!-- Key shape -->
      <circle cx="40" cy="45" r="22" fill="none" stroke="#eab308" stroke-width="2.5" stroke-opacity="0.8" />
      <circle cx="40" cy="45" r="10" fill="none" stroke="#eab308" stroke-width="2" stroke-opacity="0.5" />
      <!-- Key shaft -->
      <rect x="58" y="42" width="52" height="6" rx="3" fill="#eab308" opacity="0.7" />
      <!-- Key teeth -->
      <rect x="90" y="48" width="6" height="10" rx="2" fill="#eab308" opacity="0.7" />
      <rect x="104" y="48" width="6" height="14" rx="2" fill="#eab308" opacity="0.7" />
      <!-- Chain links -->
      <ellipse cx="72" cy="68" rx="8" ry="5" fill="none" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.7" transform="rotate(-30 72 68)" />
      <ellipse cx="85" cy="74" rx="8" ry="5" fill="none" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.7" transform="rotate(-30 85 74)" />
      <ellipse cx="98" cy="80" rx="8" ry="5" fill="none" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.7" transform="rotate(-30 98 80)" />
      <!-- Break in chain -->
      <line x1="88" y1="79" x2="92" y2="71" stroke="#ef4444" stroke-width="2" stroke-opacity="0.8" stroke-linecap="round" />
      <!-- Badge -->
      <rect x="18" y="96" width="88" height="18" rx="4" fill="#eab308" opacity="0.2" stroke="#eab308" stroke-width="1" stroke-opacity="0.4" />
      <text x="62" y="109" text-anchor="middle" fill="#fde047" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">TOKEN THEFT</text>
    </g>
    <circle cx="130" cy="200" r="3" fill="#eab308" opacity="0.8" />
    <circle cx="145" cy="200" r="3" fill="#06b6d4" opacity="0.6" />
    <circle cx="160" cy="200" r="3" fill="#14b8a6" opacity="0.4" />
  </g>

  <!-- Card 2 (middle): Lock with crack (Password Vuln) -->
  <g transform="translate(720, 190)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(95, 15)">
      <!-- Lock body -->
      <rect x="22" y="48" width="68" height="56" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2" stroke-opacity="0.75" />
      <!-- Lock shackle -->
      <path d="M34 50 L34 32 C34 16 78 16 78 32 L78 50" fill="none" stroke="#ef4444" stroke-width="3" stroke-opacity="0.75" stroke-linecap="round" />
      <!-- Keyhole -->
      <circle cx="56" cy="68" r="8" fill="none" stroke="#ef4444" stroke-width="2" stroke-opacity="0.5" />
      <rect x="53" y="70" width="6" height="14" rx="2" fill="#ef4444" opacity="0.4" />
      <!-- Crack lines -->
      <path d="M42 52 L48 60 L44 66 L52 76" fill="none" stroke="#eab308" stroke-width="2" stroke-opacity="0.85" stroke-linecap="round" />
      <path d="M64 56 L68 64 L65 70" fill="none" stroke="#eab308" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round" />
      <!-- Warning triangle -->
      <g transform="translate(72, 36)">
        <path d="M10 0 L20 18 L0 18 Z" fill="#eab308" opacity="0.85" />
        <text x="10" y="15" text-anchor="middle" fill="#0f172a" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="900">!</text>
      </g>
      <!-- Badge -->
      <rect x="16" y="114" width="80" height="18" rx="4" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4" />
      <text x="56" y="127" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">PWD MANAGER</text>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b" />
    <rect x="40" y="192" width="175" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3 (bottom): Cloud with shield (Serverless) -->
  <g transform="translate(660, 340)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(105, 18)">
      <!-- Cloud shape -->
      <path d="M30 68 C10 68 0 57 0 44 C0 32 8 23 20 21 C24 9 38 2 55 2 C72 2 84 12 88 24 C98 26 106 35 106 46 C106 59 96 68 80 68 Z" fill="url(#cloudGrad)" opacity="0.18" stroke="#06b6d4" stroke-width="2" stroke-opacity="0.75" />
      <!-- Lambda symbol (serverless) -->
      <text x="53" y="50" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="32" font-weight="700" opacity="0.7">&#955;</text>
      <!-- Shield -->
      <path d="M82 18 L96 24 L96 38 C96 48 90 55 82 58 C74 55 68 48 68 38 L68 24 Z" fill="#14b8a6" opacity="0.2" stroke="#14b8a6" stroke-width="1.5" stroke-opacity="0.8" />
      <!-- Shield checkmark -->
      <path d="M74 36 L80 42 L92 28" fill="none" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
      <!-- Label -->
      <rect x="20" y="80" width="72" height="18" rx="4" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4" />
      <text x="56" y="93" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="700">SERVERLESS</text>
    </g>
    <g transform="translate(40, 195)">
      <rect width="240" height="28" rx="6" fill="#1e293b" opacity="0.8" />
      <circle cx="18" cy="14" r="5" fill="#06b6d4" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="725" cy="280" r="2" fill="#06b6d4" opacity="0.5">
    <animate attributeName="cy" values="280;270;280" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="840" cy="330" r="1.5" fill="#eab308" opacity="0.4">
    <animate attributeName="cy" values="330;320;330" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1060" cy="300" r="2" fill="#14b8a6" opacity="0.5">
    <animate attributeName="cy" values="300;290;300" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="690" cy="205" r="1.5" fill="#06b6d4" opacity="0.3">
    <animate attributeName="cy" values="205;197;205" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1110" cy="175" r="1" fill="#eab308" opacity="0.4">
    <animate attributeName="cy" values="175;167;175" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="955" cy="130" r="1.5" fill="#06b6d4" opacity="0.35">
    <animate attributeName="cx" values="955;963;955" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Left panel: WEEKLY DIGEST badge -->
  <g transform="translate(60, 80)">
    <rect width="160" height="32" rx="16" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4" />
    <text x="80" y="21" text-anchor="middle" fill="#22d3ee" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">WEEKLY DIGEST</text>
  </g>

  <!-- Main title -->
  <text x="60" y="170" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Tech Security</text>
  <text x="60" y="225" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Weekly</text>
  <text x="60" y="290" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">AI Token Theft</text>
  <text x="60" y="335" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">Serverless Defense</text>

  <!-- Accent line -->
  <rect x="60" y="360" width="200" height="3" rx="1.5" fill="url(#accentLine)" />

  <!-- Tag pills -->
  <g transform="translate(60, 385)">
    <rect width="82" height="30" rx="15" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.35" />
    <text x="41" y="20" text-anchor="middle" fill="#22d3ee" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AI Agent</text>
    <g transform="translate(92, 0)">
      <rect width="82" height="30" rx="15" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="41" y="20" text-anchor="middle" fill="#fde047" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Password</text>
    </g>
    <g transform="translate(184, 0)">
      <rect width="90" height="30" rx="15" fill="#14b8a6" opacity="0.12" stroke="#14b8a6" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="45" y="20" text-anchor="middle" fill="#5eead4" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Serverless</text>
    </g>
    <g transform="translate(284, 0)">
      <rect width="62" height="30" rx="15" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="31" y="20" text-anchor="middle" fill="#22d3ee" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Token</text>
    </g>
  </g>

  <!-- Date -->
  <text x="60" y="460" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">FEBRUARY 17, 2026</text>

  <!-- Footer URL -->
  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8" />
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
</svg>
