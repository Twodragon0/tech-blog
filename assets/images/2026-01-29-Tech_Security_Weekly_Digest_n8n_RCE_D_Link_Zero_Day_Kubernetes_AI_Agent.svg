<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Gradient overlay for depth -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d2e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4757;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- LEFT SIDE: TEXT CONTENT -->
  
  <!-- Title line 1 -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">Tech Security Weekly</text>
  
  <!-- Title line 2 -->
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ff4757">Digest n8n RCE</text>
  
  <!-- Date badge -->
  <rect x="50" y="290" width="280" height="48" rx="6" fill="#1a1d2e" stroke="#ff4757" stroke-width="2"/>
  <text x="140" y="321" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff4757">JANUARY 29, 2026</text>
  
  <!-- Tag pills -->
  <g>
    <!-- Tag 1: Security -->
    <rect x="50" y="420" width="110" height="36" rx="18" fill="#ff4757" opacity="0.15" stroke="#ff4757" stroke-width="1.5"/>
    <text x="105" y="443" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff4757" text-anchor="middle">security</text>
    
    <!-- Tag 2: Vulnerability -->
    <rect x="175" y="420" width="130" height="36" rx="18" fill="#ffa502" opacity="0.15" stroke="#ffa502" stroke-width="1.5"/>
    <text x="240" y="443" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffa502" text-anchor="middle">vulnerability</text>
    
    <!-- Tag 3: RCE -->
    <rect x="320" y="420" width="80" height="36" rx="18" fill="#ff6348" opacity="0.15" stroke="#ff6348" stroke-width="1.5"/>
    <text x="360" y="443" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff6348" text-anchor="middle">RCE</text>
  </g>
  
  <!-- Footer -->
  <text x="50" y="595" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#666">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE: ILLUSTRATION -->
  
  <!-- Background circles for depth -->
  <circle cx="900" cy="200" r="120" fill="#ff4757" opacity="0.08"/>
  <circle cx="950" cy="380" r="100" fill="#ffa502" opacity="0.06"/>
  
  <!-- Node network - central workflow node (being attacked) -->
  <g filter="url(#glow)">
    <!-- Central compromised node -->
    <rect x="820" y="250" width="120" height="120" rx="8" fill="#1a1d2e" stroke="#ff4757" stroke-width="2.5"/>
    
    <!-- Node icon: workflow/code -->
    <circle cx="880" cy="310" r="8" fill="#ff4757" opacity="0.3"/>
    <line x1="850" y1="310" x2="910" y2="310" stroke="#ff4757" stroke-width="2" opacity="0.5"/>
    <line x1="880" y1="280" x2="880" y2="340" stroke="#ff4757" stroke-width="2" opacity="0.5"/>
    
    <!-- Code symbols breaking out -->
    <text x="880" y="300" font-family="monospace" font-size="20" font-weight="bold" fill="#ff4757" text-anchor="middle" opacity="0.7">{ }</text>
  </g>
  
  <!-- Connected nodes (input nodes) -->
  <g opacity="0.6">
    <circle cx="740" cy="240" r="18" fill="#2a2d3e" stroke="#4db8ff" stroke-width="2"/>
    <circle cx="740" cy="340" r="18" fill="#2a2d3e" stroke="#4db8ff" stroke-width="2"/>
    <circle cx="740" cy="440" r="18" fill="#2a2d3e" stroke="#4db8ff" stroke-width="2"/>
  </g>
  
  <!-- Connection lines turning red (attack flow) -->
  <line x1="758" y1="240" x2="820" y2="280" stroke="#ff4757" stroke-width="2.5" opacity="0.7" stroke-dasharray="5,3"/>
  <line x1="758" y1="340" x2="820" y2="310" stroke="#ff4757" stroke-width="2.5" opacity="0.8" stroke-dasharray="5,3"/>
  <line x1="758" y1="440" x2="820" y2="340" stroke="#ff4757" stroke-width="2.5" opacity="0.7" stroke-dasharray="5,3"/>
  
  <!-- Data breaking out (attack payload) -->
  <g fill="#ff4757" opacity="0.6">
    <circle cx="950" cy="220" r="4"/>
    <circle cx="980" cy="180" r="3"/>
    <circle cx="1010" cy="210" r="3.5"/>
    <circle cx="1030" cy="250" r="3"/>
    <circle cx="1020" cy="290" r="4"/>
    <circle cx="1000" cy="320" r="3.5"/>
  </g>
  
  <!-- Execution trace lines -->
  <line x1="940" y1="260" x2="980" y2="200" stroke="#ff4757" stroke-width="1.5" opacity="0.5"/>
  <line x1="940" y1="310" x2="1010" y2="280" stroke="#ff4757" stroke-width="1.5" opacity="0.5"/>
  <line x1="940" y1="350" x2="1000" y2="360" stroke="#ff4757" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Warning indicators (brackets) -->
  <g stroke="#ffa502" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 990 160 L 970 160 L 970 180 L 990 180"/>
    <path d="M 1050 220 L 1030 220 L 1030 240 L 1050 240"/>
  </g>
  
  <!-- Critical vulnerability badge -->
  <g>
    <circle cx="1080" cy="150" r="35" fill="#ff4757" opacity="0.15" stroke="#ff4757" stroke-width="2"/>
    <text x="1080" y="145" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ff4757" text-anchor="middle">CRITICAL</text>
    <text x="1080" y="163" font-family="Arial, sans-serif" font-size="10" fill="#ff4757" text-anchor="middle">RCE</text>
  </g>
  
  <!-- Lock icon (broken) -->
  <g opacity="0.8">
    <rect x="865" y="390" width="30" height="22" rx="3" fill="none" stroke="#ffa502" stroke-width="2"/>
    <path d="M 870 390 Q 870 380 880 380 Q 890 380 890 390" fill="none" stroke="#ffa502" stroke-width="2"/>
    <line x1="875" y1="405" x2="885" y2="405" stroke="#ffa502" stroke-width="1.5" opacity="0.6"/>
    <line x1="875" y1="395" x2="885" y2="415" stroke="#ff4757" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Accent elements -->
  <circle cx="950" cy="500" r="1.5" fill="#4db8ff" opacity="0.5"/>
  <circle cx="1010" cy="480" r="1" fill="#4db8ff" opacity="0.4"/>
  <circle cx="880" cy="520" r="1.5" fill="#4db8ff" opacity="0.3"/>
</svg>