<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Gradient overlay for depth -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d2e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9184a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- LEFT SIDE: Text Content -->
  <!-- Title Line 1 -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Tech Security Weekly
  </text>
  <!-- Title Line 2 -->
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ff6b35">
    Digest n8n RCE
  </text>
  
  <!-- Date Badge -->
  <rect x="50" y="280" width="280" height="45" rx="8" fill="#1a1d2e" stroke="#ff6b35" stroke-width="2"/>
  <text x="65" y="308" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">
    JANUARY 29, 2026
  </text>
  
  <!-- Tag Pills -->
  <!-- Tag 1: security -->
  <rect x="50" y="420" width="100" height="32" rx="16" fill="#2a2d3e" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="65" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff6b35">
    security
  </text>
  
  <!-- Tag 2: vulnerability -->
  <rect x="165" y="420" width="130" height="32" rx="16" fill="#2a2d3e" stroke="#c9184a" stroke-width="1.5"/>
  <text x="180" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c9184a">
    vulnerability
  </text>
  
  <!-- Tag 3: workflow -->
  <rect x="310" y="420" width="110" height="32" rx="16" fill="#2a2d3e" stroke="#ff9f1c" stroke-width="1.5"/>
  <text x="325" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ff9f1c">
    workflow
  </text>
  
  <!-- RIGHT SIDE: n8n RCE Illustration -->
  <!-- Background circle for illustration area -->
  <circle cx="925" cy="280" r="200" fill="#1a1d2e" opacity="0.4"/>
  
  <!-- Node 1 (compromised) -->
  <rect x="750" y="140" width="90" height="90" rx="10" fill="#ff6b35" opacity="0.2" stroke="#ff6b35" stroke-width="2"/>
  <circle cx="795" cy="185" r="25" fill="#ff6b35" stroke="#ff6b35" stroke-width="2"/>
  <text x="785" y="195" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff6b35">
    ⚡
  </text>
  
  <!-- Node 2 (execution) -->
  <rect x="900" y="140" width="90" height="90" rx="10" fill="#c9184a" opacity="0.15" stroke="#c9184a" stroke-width="2"/>
  <circle cx="945" cy="185" r="25" fill="#c9184a" stroke="#c9184a" stroke-width="2"/>
  <text x="938" y="198" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#c9184a">
    &gt;_
  </text>
  
  <!-- Node 3 (server) -->
  <rect x="1020" y="140" width="90" height="90" rx="10" fill="#ff9f1c" opacity="0.15" stroke="#ff9f1c" stroke-width="2"/>
  <circle cx="1065" cy="185" r="25" fill="#ff9f1c" stroke="#ff9f1c" stroke-width="2"/>
  <text x="1058" y="198" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff9f1c">
    ◆
  </text>
  
  <!-- Connection lines (compromised path) -->
  <line x1="820" y1="185" x2="900" y2="185" stroke="#ff6b35" stroke-width="2" stroke-dasharray="5,5" opacity="0.8"/>
  <line x1="970" y1="185" x2="1020" y2="185" stroke="#c9184a" stroke-width="2" stroke-dasharray="5,5" opacity="0.8"/>
  
  <!-- Middle flow (code injection) -->
  <path d="M 795 230 Q 870 300 945 340" stroke="#ff6b35" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="870" cy="265" r="3" fill="#ff6b35"/>
  <circle cx="910" cy="305" r="3" fill="#ff6b35"/>
  
  <!-- RCE execution visualization -->
  <rect x="800" y="340" width="280" height="1" fill="url(#accentGrad)" opacity="0.7"/>
  
  <!-- Code execution indicator (animated-style) -->
  <g opacity="0.9">
    <text x="820" y="390" font-family="monospace" font-size="12" fill="#ff6b35">
      exec(payload)
    </text>
    <text x="820" y="410" font-family="monospace" font-size="12" fill="#c9184a">
      system('rm -rf /')
    </text>
    <text x="820" y="430" font-family="monospace" font-size="12" fill="#ff9f1c">
      fetch(attacker.com)
    </text>
  </g>
  
  <!-- Alert triangle -->
  <polygon points="925,480 905,520 945,520" fill="none" stroke="#ff6b35" stroke-width="2.5"/>
  <text x="920" y="508" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">
    !
  </text>
  
  <!-- Status indicator -->
  <circle cx="1050" cy="500" r="8" fill="#ff6b35" opacity="0.6"/>
  <circle cx="1050" cy="500" r="5" fill="#ff6b35"/>
  <text x="1070" y="507" font-family="Arial, sans-serif" font-size="12" fill="#ff6b35">
    CRITICAL
  </text>
  
  <!-- FOOTER -->
  <text x="1150" y="610" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="end">
    tech.2twodragon.com
  </text>
</svg>