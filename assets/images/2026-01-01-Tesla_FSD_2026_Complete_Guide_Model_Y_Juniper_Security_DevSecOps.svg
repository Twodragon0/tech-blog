<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE: Text and Information -->
  <!-- Date badge -->
  <rect x="60" y="50" width="180" height="32" rx="16" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="150" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">JANUARY 1, 2026</text>

  <!-- Title -->
  <text x="70" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Tesla FSD 2026</text>

  <!-- Subtitle -->
  <text x="70" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Model Juniper Security</text>

  <!-- Tag pills -->
  <g>
    <!-- Tag 1: Security -->
    <rect x="70" y="420" width="100" height="28" rx="14" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1"/>
    <text x="120" y="439" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#3b82f6" text-anchor="middle">Security</text>

    <!-- Tag 2: FSD -->
    <rect x="180" y="420" width="70" height="28" rx="14" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1"/>
    <text x="215" y="439" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#f59e0b" text-anchor="middle">FSD</text>

    <!-- Tag 3: AI -->
    <rect x="260" y="420" width="60" height="28" rx="14" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1"/>
    <text x="290" y="439" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#ef4444" text-anchor="middle">AI</text>
  </g>

  <!-- Footer -->
  <text x="70" y="585" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#666666">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: Security Visual Scene -->
  <!-- Background circle for visual area -->
  <circle cx="900" cy="300" r="250" fill="#3b82f6" opacity="0.04" stroke="#3b82f6" stroke-width="0.5"/>

  <!-- Central Shield Icon with Checkmark -->
  <g>
    <!-- Shield outline -->
    <path d="M 880 150 L 920 150 L 920 250 Q 900 280 880 300 Q 860 280 860 250 L 860 150 Z"
          fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>

    <!-- Checkmark inside shield -->
    <g>
      <polyline points="875,260 885,270 905,245"
                fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    </g>
  </g>

  <!-- Top-left data node -->
  <circle cx="720" cy="140" r="20" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="720" cy="140" r="12" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>

  <!-- Top-right data node -->
  <circle cx="1050" cy="140" r="20" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <circle cx="1050" cy="140" r="12" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>

  <!-- Bottom-left alert indicator -->
  <g>
    <!-- Warning triangle -->
    <polygon points="720,480 705,450 735,450" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.2"/>
    <text x="720" y="472" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle" opacity="0.5">!</text>
  </g>

  <!-- Bottom-right data node -->
  <circle cx="1050" cy="480" r="20" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="1050" cy="480" r="12" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>

  <!-- Data flow arrows -->
  <!-- Arrow from top-left to shield -->
  <g>
    <line x1="735" y1="152" x2="860" y2="180" stroke="#f59e0b" stroke-width="1.2" opacity="0.3"/>
    <polygon points="860,180 855,177 858,185" fill="#f59e0b" opacity="0.3"/>
  </g>

  <!-- Arrow from top-right to shield -->
  <g>
    <line x1="1035" y1="152" x2="920" y2="180" stroke="#ef4444" stroke-width="1.2" opacity="0.3"/>
    <polygon points="920,180 925,175 917,183" fill="#ef4444" opacity="0.3"/>
  </g>

  <!-- Arrow from shield to bottom-right -->
  <g>
    <path d="M 900 300 Q 950 380 1050 460" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity="0.3" stroke-dasharray="3,3"/>
    <polygon points="1050,460 1055,455 1043,462" fill="#3b82f6" opacity="0.3"/>
  </g>

  <!-- Arrow from alert to shield -->
  <g>
    <line x1="720" y1="450" x2="880" y2="300" stroke="#ef4444" stroke-width="1.2" opacity="0.25"/>
    <polygon points="880,300 882,308 875,302" fill="#ef4444" opacity="0.25"/>
  </g>

  <!-- Additional security elements -->
  <!-- Lock symbol upper right -->
  <g opacity="0.4">
    <rect x="1000" y="220" width="28" height="22" rx="3" fill="none" stroke="#3b82f6" stroke-width="1"/>
    <path d="M 1006 220 L 1006 215 Q 1006 210 1011 210 Q 1016 210 1016 215 L 1016 220"
          fill="none" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="1014" cy="231" r="2" fill="#3b82f6"/>
  </g>

  <!-- Data packet icons -->
  <g opacity="0.35">
    <rect x="750" y="310" width="16" height="16" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
    <line x1="750" y1="318" x2="766" y2="318" stroke="#f59e0b" stroke-width="0.8"/>
  </g>

  <g opacity="0.35">
    <rect x="1030" y="250" width="16" height="16" fill="none" stroke="#ef4444" stroke-width="0.8"/>
    <line x1="1030" y1="258" x2="1046" y2="258" stroke="#ef4444" stroke-width="0.8"/>
  </g>

  <!-- Verification checkmark circles -->
  <g>
    <circle cx="800" cy="380" r="18" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.25"/>
    <polyline points="795,380 800,385 810,375" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  </g>

  <g>
    <circle cx="980" cy="350" r="18" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.25"/>
    <polyline points="975,350 980,355 990,345" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
  </g>
</svg>