<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8212a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#cc0000;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8212a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8212a;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8212a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8212a;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Tesla FSD + Security Shield + Circuit Board -->

  <!-- Background glow ring -->
  <circle cx="1010" cy="225" r="170" fill="none" stroke="rgba(232,33,42,0.07)" stroke-width="40"/>
  <circle cx="1010" cy="225" r="120" fill="none" stroke="rgba(232,33,42,0.05)" stroke-width="20"/>

  <!-- Outer security ring -->
  <circle cx="1010" cy="225" r="155" fill="none" stroke="rgba(232,33,42,0.25)" stroke-width="1.5" stroke-dasharray="8 4"/>

  <!-- Main shield body -->
  <path d="M1010,100 L1095,135 L1095,205 Q1095,270 1010,310 Q925,270 925,205 L925,135 Z"
        fill="url(#shieldGrad)" stroke="rgba(232,33,42,0.35)" stroke-width="1.5"/>

  <!-- Shield inner detail -->
  <path d="M1010,118 L1078,148 L1078,208 Q1078,262 1010,295 Q942,262 942,208 L942,148 Z"
        fill="none" stroke="rgba(232,33,42,0.2)" stroke-width="1"/>

  <!-- Tesla "T" logo inside shield -->
  <g filter="url(#glow)">
    <rect x="985" y="155" width="50" height="4" rx="2" fill="rgba(232,33,42,0.7)"/>
    <rect x="995" y="155" width="4" height="12" rx="1" fill="rgba(232,33,42,0.5)"/>
    <rect x="1011" y="155" width="4" height="12" rx="1" fill="rgba(232,33,42,0.5)"/>
    <path d="M999,167 Q999,185 1010,200 Q1021,185 1021,167 L1015,167 Q1015,180 1010,190 Q1005,180 1005,167 Z"
          fill="rgba(232,33,42,0.65)"/>
  </g>

  <!-- FSD circuit lines emanating from shield -->
  <!-- Left circuit -->
  <polyline points="925,185 895,185 880,200 860,200" fill="none" stroke="rgba(232,33,42,0.3)" stroke-width="1.5"/>
  <circle cx="860" cy="200" r="3" fill="rgba(232,33,42,0.5)"/>
  <polyline points="925,215 900,215 885,230 860,230" fill="none" stroke="rgba(232,33,42,0.25)" stroke-width="1"/>
  <circle cx="860" cy="230" r="2.5" fill="rgba(232,33,42,0.4)"/>
  <polyline points="925,245 905,245 890,260 860,260" fill="none" stroke="rgba(232,33,42,0.2)" stroke-width="1"/>
  <circle cx="860" cy="260" r="2" fill="rgba(232,33,42,0.35)"/>

  <!-- Right circuit -->
  <polyline points="1095,185 1125,185 1140,200 1160,200" fill="none" stroke="rgba(232,33,42,0.3)" stroke-width="1.5"/>
  <circle cx="1160" cy="200" r="3" fill="rgba(232,33,42,0.5)"/>
  <polyline points="1095,215 1120,215 1135,230 1160,230" fill="none" stroke="rgba(232,33,42,0.25)" stroke-width="1"/>
  <circle cx="1160" cy="230" r="2.5" fill="rgba(232,33,42,0.4)"/>
  <polyline points="1095,245 1125,245 1140,260 1160,260" fill="none" stroke="rgba(232,33,42,0.2)" stroke-width="1"/>
  <circle cx="1160" cy="260" r="2" fill="rgba(232,33,42,0.35)"/>

  <!-- FSD radar arcs (autonomous driving) -->
  <path d="M1010,295 Q960,265 940,225" fill="none" stroke="rgba(255,100,100,0.18)" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M1010,295 Q1060,265 1080,225" fill="none" stroke="rgba(255,100,100,0.18)" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M1010,295 L1010,310" fill="none" stroke="rgba(232,33,42,0.25)" stroke-width="1.5"/>

  <!-- DevSecOps cycle nodes around shield -->
  <circle cx="1010" cy="90" r="8" fill="rgba(232,33,42,0.12)" stroke="rgba(232,33,42,0.35)" stroke-width="1.2"/>
  <text x="1010" y="94" font-family="monospace" font-size="7" fill="rgba(232,33,42,0.7)" text-anchor="middle">DEV</text>

  <circle cx="1120" cy="155" r="8" fill="rgba(232,33,42,0.12)" stroke="rgba(232,33,42,0.35)" stroke-width="1.2"/>
  <text x="1120" y="159" font-family="monospace" font-size="7" fill="rgba(232,33,42,0.7)" text-anchor="middle">SEC</text>

  <circle cx="1120" cy="295" r="8" fill="rgba(232,33,42,0.12)" stroke="rgba(232,33,42,0.35)" stroke-width="1.2"/>
  <text x="1120" y="299" font-family="monospace" font-size="7" fill="rgba(232,33,42,0.7)" text-anchor="middle">OPS</text>

  <circle cx="900" cy="155" r="8" fill="rgba(232,33,42,0.12)" stroke="rgba(232,33,42,0.35)" stroke-width="1.2"/>
  <text x="900" y="159" font-family="monospace" font-size="7" fill="rgba(232,33,42,0.7)" text-anchor="middle">FSD</text>

  <!-- Connecting arc lines between nodes -->
  <path d="M1016,90 Q1070,100 1113,150" fill="none" stroke="rgba(232,33,42,0.15)" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M1113,163 Q1130,225 1113,288" fill="none" stroke="rgba(232,33,42,0.15)" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M1004,90 Q950,100 907,150" fill="none" stroke="rgba(232,33,42,0.15)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Key lock symbol at bottom of shield -->
  <rect x="1000" y="245" width="20" height="14" rx="3" fill="rgba(232,33,42,0.2)" stroke="rgba(232,33,42,0.4)" stroke-width="1"/>
  <path d="M1006,245 L1006,238 Q1006,232 1010,232 Q1014,232 1014,238 L1014,245" fill="none" stroke="rgba(232,33,42,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="252" r="2.5" fill="rgba(232,33,42,0.6)"/>

  <!-- FSD text label -->
  <text x="1010" y="330" font-family="monospace" font-size="10" fill="rgba(232,33,42,0.5)" text-anchor="middle" letter-spacing="4">FULL SELF-DRIVING</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(232,33,42,0.7)"/>
  <circle cx="900" cy="420" r="3.5" fill="rgba(255,150,50,0.6)"/>
  <circle cx="860" cy="440" r="3" fill="rgba(232,33,42,0.5)"/>

  <!-- Background large circles -->
  <circle cx="1050" cy="450" r="200" fill="url(#circleGrad)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(232,33,42,0.04)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(232,33,42,0.15)" stroke="rgba(232,33,42,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">JANUARY 1, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white">Tesla FSD 2026</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="700" fill="rgba(255,255,255,0.95)">Model Juniper Security</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">DevSecOps Analysis &amp; Automotive Security Architecture</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="1.5"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(232,33,42,0.9)" letter-spacing="3">DEVSECOPS / AUTOMOTIVE SECURITY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(232,33,42,0.2)" stroke="rgba(232,33,42,0.45)" stroke-width="1"/>
  <text x="140" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle">Tesla FSD</text>

  <rect x="215" y="402" width="130" height="36" rx="18" fill="rgba(255,160,30,0.15)" stroke="rgba(255,160,30,0.4)" stroke-width="1"/>
  <text x="280" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle">Model Juniper</text>

  <rect x="360" y="402" width="110" height="36" rx="18" fill="rgba(50,130,255,0.15)" stroke="rgba(50,130,255,0.4)" stroke-width="1"/>
  <text x="415" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle">DevSecOps</text>

  <!-- Footer -->
  <line x1="0" y1="510" x2="1200" y2="510" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="end">devsecops</text>
</svg>