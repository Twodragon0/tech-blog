<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="50%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#3182ce"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Cloud Security Agent -->
  <!-- Outer cloud shape -->
  <ellipse cx="1010" cy="200" rx="120" ry="70" fill="rgba(100,180,255,0.07)" stroke="rgba(100,180,255,0.25)" stroke-width="1.5"/>
  <ellipse cx="960" cy="220" rx="80" ry="55" fill="rgba(100,180,255,0.06)" stroke="rgba(100,180,255,0.2)" stroke-width="1"/>
  <ellipse cx="1065" cy="215" rx="75" ry="50" fill="rgba(100,180,255,0.06)" stroke="rgba(100,180,255,0.2)" stroke-width="1"/>
  <!-- Cloud base -->
  <rect x="900" y="220" width="180" height="40" rx="8" fill="rgba(100,180,255,0.08)" stroke="rgba(100,180,255,0.18)" stroke-width="1"/>

  <!-- Shield overlay on cloud -->
  <polygon points="1010,145 1045,165 1045,205 1010,225 975,205 975,165" fill="rgba(229,62,62,0.1)" stroke="rgba(229,62,62,0.35)" stroke-width="2"/>
  <polygon points="1010,158 1036,174 1036,206 1010,220 984,206 984,174" fill="rgba(229,62,62,0.07)" stroke="rgba(229,62,62,0.25)" stroke-width="1"/>
  <!-- Shield checkmark -->
  <polyline points="998,188 1007,198 1024,177" fill="none" stroke="rgba(229,62,62,0.6)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI agent brain nodes -->
  <circle cx="895" cy="155" r="16" fill="rgba(155,89,182,0.1)" stroke="rgba(155,89,182,0.35)" stroke-width="1.5"/>
  <circle cx="895" cy="155" r="8" fill="rgba(155,89,182,0.12)" stroke="rgba(155,89,182,0.4)" stroke-width="1"/>
  <circle cx="1130" cy="155" r="16" fill="rgba(155,89,182,0.1)" stroke="rgba(155,89,182,0.35)" stroke-width="1.5"/>
  <circle cx="1130" cy="155" r="8" fill="rgba(155,89,182,0.12)" stroke="rgba(155,89,182,0.4)" stroke-width="1"/>
  <circle cx="1010" cy="135" r="12" fill="rgba(155,89,182,0.12)" stroke="rgba(155,89,182,0.4)" stroke-width="1.5"/>

  <!-- Connection lines between nodes -->
  <line x1="895" y1="155" x2="975" y2="175" stroke="rgba(155,89,182,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1130" y1="155" x2="1045" y2="175" stroke="rgba(155,89,182,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="895" y1="155" x2="1010" y2="140" stroke="rgba(155,89,182,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1130" y1="155" x2="1010" y2="140" stroke="rgba(155,89,182,0.2)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Orbiting security rings -->
  <ellipse cx="1010" cy="190" rx="90" ry="30" fill="none" stroke="rgba(229,62,62,0.15)" stroke-width="1" stroke-dasharray="6,4"/>
  <ellipse cx="1010" cy="190" rx="110" ry="38" fill="none" stroke="rgba(100,180,255,0.12)" stroke-width="1" stroke-dasharray="8,5"/>

  <!-- Data stream lines -->
  <line x1="880" y1="260" x2="1140" y2="260" stroke="rgba(100,180,255,0.15)" stroke-width="1" stroke-dasharray="10,6"/>
  <line x1="880" y1="270" x2="1140" y2="270" stroke="rgba(100,180,255,0.1)" stroke-width="1" stroke-dasharray="6,8"/>

  <!-- Lock icon below cloud -->
  <rect x="996" y="240" width="28" height="22" rx="3" fill="rgba(229,62,62,0.1)" stroke="rgba(229,62,62,0.3)" stroke-width="1.5"/>
  <path d="M1001,240 L1001,234 Q1010,227 1019,234 L1019,240" fill="none" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="251" r="3" fill="rgba(229,62,62,0.5)"/>

  <!-- Small decorative binary-like dots -->
  <circle cx="890" cy="290" r="2.5" fill="rgba(100,180,255,0.3)"/>
  <circle cx="905" cy="285" r="1.5" fill="rgba(100,180,255,0.2)"/>
  <circle cx="1115" cy="290" r="2.5" fill="rgba(100,180,255,0.3)"/>
  <circle cx="1100" cy="295" r="1.5" fill="rgba(100,180,255,0.2)"/>
  <circle cx="1125" cy="280" r="2" fill="rgba(155,89,182,0.3)"/>

  <!-- Scanning arc -->
  <path d="M940,160 A80,80 0 0,1 1080,160" fill="none" stroke="rgba(50,200,100,0.2)" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="940" cy="160" r="4" fill="rgba(50,200,100,0.3)" stroke="rgba(50,200,100,0.4)" stroke-width="1"/>
  <circle cx="1080" cy="160" r="4" fill="rgba(50,200,100,0.3)" stroke="rgba(50,200,100,0.4)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.6)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(245,158,11,0.6)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(229,62,62,0.5)"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(100,180,255,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(100,180,255,0.05)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(229,62,62,0.3)" stroke-width="1"/>
  <text x="94" y="80" font-family="'Courier New',monospace" font-size="12" font-weight="600" fill="rgba(229,100,100,0.9)" letter-spacing="1">FEBRUARY 12, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">AI Cloud Security Agent</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(200,200,220,0.75)">AI-driven cloud threat detection, agent security, and weekly digest</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial',sans-serif" font-size="14" font-weight="600" fill="rgba(229,62,62,0.85)" letter-spacing="3">SECURITY / AI / CLOUD</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(229,100,100,0.9)" text-anchor="middle"># AI Security</text>

  <rect x="225" y="402" width="140" height="36" rx="18" fill="rgba(245,158,11,0.13)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="295" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(245,180,60,0.9)" text-anchor="middle"># Cloud Agent</text>

  <rect x="380" y="402" width="130" height="36" rx="18" fill="rgba(49,130,206,0.13)" stroke="rgba(49,130,206,0.35)" stroke-width="1"/>
  <text x="445" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(100,170,240,0.9)" text-anchor="middle"># DevSecOps</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(150,150,180,0.6)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(229,62,62,0.5)" text-anchor="end" letter-spacing="2">SECURITY</text>
</svg>