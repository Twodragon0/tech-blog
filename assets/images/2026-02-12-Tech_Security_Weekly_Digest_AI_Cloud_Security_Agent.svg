<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- LEFT SIDE: Title and metadata -->
  
  <!-- Date badge -->
  <rect x="60" y="45" width="200" height="40" rx="8" fill="#1e1f35" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="68" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#3b82f6" text-anchor="middle">FEBRUARY 12, 2026</text>
  
  <!-- Main title -->
  <text x="70" y="215" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="white">Tech Security</text>
  <text x="70" y="275" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="white">Weekly Digest</text>
  <text x="70" y="320" font-family="Arial, sans-serif" font-size="44" font-weight="600" fill="#3b82f6">Cloud Security</text>
  
  <!-- Tag pills -->
  <g>
    <rect x="70" y="415" width="140" height="35" rx="18" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.2"/>
    <text x="140" y="437" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Cloud Security</text>
    
    <rect x="230" y="415" width="120" height="35" rx="18" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="290" y="437" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Compliance</text>
    
    <rect x="370" y="415" width="110" height="35" rx="18" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="425" y="437" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">DevSecOps</text>
  </g>
  
  <!-- Footer -->
  <text x="600" y="595" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#6b7280" text-anchor="middle">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE: Detailed visual scene (x=650-1150, y=80-550) -->
  
  <!-- Cloud shape with gradient -->
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main cloud icon -->
  <path d="M 750 150 Q 780 130 810 140 Q 830 120 860 140 Q 880 125 900 150 L 900 220 Q 880 240 850 240 L 770 240 Q 750 240 750 220 Z" fill="url(#cloudGrad)" stroke="#3b82f6" stroke-width="0.8" opacity="0.85"/>
  
  <!-- Cloud internal structure -->
  <circle cx="780" cy="175" r="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.5"/>
  <circle cx="820" cy="165" r="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.5"/>
  <circle cx="860" cy="180" r="7" fill="#3b82f6" opacity="0.14" stroke="#3b82f6" stroke-width="0.5"/>
  
  <!-- Data flow arrows from cloud -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.6"/>
    </marker>
  </defs>
  
  <!-- Curved data flow from cloud to shield -->
  <path d="M 900 190 Q 950 200 980 280" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.5" marker-end="url(#arrowBlue)" stroke-dasharray="5,5"/>
  <path d="M 900 210 Q 960 240 1000 300" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.5" marker-end="url(#arrowOrange)" stroke-dasharray="5,5"/>
  
  <!-- Large shield icon with checkmark -->
  <g filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M 980 260 L 1050 260 L 1050 360 Q 1015 420 980 440 Q 945 420 910 360 L 910 260 Z" fill="#ef4444" opacity="0.09" stroke="#ef4444" stroke-width="1.2"/>
    
    <!-- Shield inner decorative lines -->
    <line x1="930" y1="290" x2="1030" y2="290" stroke="#ef4444" stroke-width="0.6" opacity="0.3"/>
    <line x1="925" y1="320" x2="1035" y2="320" stroke="#ef4444" stroke-width="0.6" opacity="0.3"/>
    <line x1="920" y1="350" x2="1040" y2="350" stroke="#ef4444" stroke-width="0.6" opacity="0.3"/>
    
    <!-- Checkmark inside shield -->
    <polyline points="955,330 975,355 1015,300" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
  
  <!-- Warning triangles/Alert indicators -->
  <g>
    <!-- Top-left warning -->
    <path d="M 700 120 L 720 160 L 680 160 Z" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="700" y="150" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#f59e0b" text-anchor="middle" opacity="0.6">!</text>
    
    <!-- Right warning -->
    <path d="M 1090 290 L 1110 330 L 1070 330 Z" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.8"/>
    <text x="1090" y="320" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="middle" opacity="0.6">!</text>
  </g>
  
  <!-- Data packet nodes -->
  <circle cx="870" cy="240" r="4" fill="#3b82f6" opacity="0.4" stroke="#3b82f6" stroke-width="0.6"/>
  <circle cx="920" cy="270" r="3" fill="#f59e0b" opacity="0.35" stroke="#f59e0b" stroke-width="0.6"/>
  <circle cx="950" cy="310" r="3.5" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="0.6"/>
  
  <!-- Vertical data flow on right -->
  <path d="M 1080 200 L 1080 380" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.4" stroke-dasharray="3,4"/>
  
  <!-- Decorative horizontal connectors -->
  <line x1="850" y1="500" x2="950" y2="500" stroke="#3b82f6" stroke-width="0.6" opacity="0.2"/>
  <line x1="860" y1="520" x2="1020" y2="520" stroke="#f59e0b" stroke-width="0.6" opacity="0.2"/>
</svg>