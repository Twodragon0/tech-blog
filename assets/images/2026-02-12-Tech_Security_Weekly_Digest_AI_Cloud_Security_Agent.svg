<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Left side content -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">Tech Security Weekly</text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">Digest Cloud Security</text>
  
  <!-- Date badge -->
  <rect x="60" y="270" width="280" height="40" fill="#1e293b" rx="20" stroke="#4f46e5" stroke-width="2"/>
  <text x="70" y="295" font-family="Arial, sans-serif" font-size="14" fill="#06b6d4" font-weight="bold">📅 FEBRUARY 12, 2026</text>
  
  <!-- Tags -->
  <rect x="60" y="420" width="100" height="32" fill="#1e1b4b" rx="16" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="110" y="441" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" font-weight="bold" text-anchor="middle">security</text>
  
  <rect x="175" y="420" width="95" height="32" fill="#1e1b4b" rx="16" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="222" y="441" font-family="Arial, sans-serif" font-size="12" fill="#67e8f9" font-weight="bold" text-anchor="middle">cloud</text>
  
  <rect x="285" y="420" width="100" height="32" fill="#1e1b4b" rx="16" stroke="#10b981" stroke-width="1.5"/>
  <text x="335" y="441" font-family="Arial, sans-serif" font-size="12" fill="#6ee7b7" font-weight="bold" text-anchor="middle">DevOps</text>
  
  <!-- Footer -->
  <text x="60" y="600" font-family="Arial, sans-serif" font-size="13" fill="#64748b">tech.2twodragon.com</text>
  
  <!-- Right side illustration -->
  <!-- Background accent -->
  <circle cx="920" cy="200" r="180" fill="#1e293b" opacity="0.3"/>
  <circle cx="850" cy="350" r="120" fill="#1e293b" opacity="0.2"/>
  
  <!-- Cloud layers representing infrastructure -->
  <!-- Base cloud -->
  <path d="M 750 250 Q 780 220, 820 220 Q 850 220, 860 250 Q 890 240, 920 250 Q 950 240, 980 250 Q 990 280, 980 310 Q 950 330, 920 330 Q 890 340, 860 330 Q 820 340, 780 330 Q 750 320, 750 290 Z" fill="url(#cloudGrad)" opacity="0.9"/>
  
  <!-- Mid cloud -->
  <path d="M 770 340 Q 800 320, 840 320 Q 870 320, 880 345 Q 910 335, 940 345 Q 965 335, 990 345 Q 1000 370, 990 395 Q 960 410, 930 410 Q 900 415, 870 410 Q 840 418, 800 410 Q 770 405, 770 375 Z" fill="url(#cloudGrad)" opacity="0.8"/>
  
  <!-- Top accent cloud -->
  <path d="M 800 150 Q 825 135, 855 135 Q 880 135, 890 155 Q 915 148, 940 155 Q 960 148, 985 155 Q 992 175, 985 195 Q 960 205, 940 205 Q 920 210, 890 205 Q 860 210, 825 205 Q 800 200, 800 175 Z" fill="url(#cloudGrad)" opacity="0.7"/>
  
  <!-- Network nodes -->
  <g opacity="0.9">
    <!-- Node 1 -->
    <circle cx="820" cy="280" r="22" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="820" cy="280" r="8" fill="#06b6d4" filter="url(#glow)"/>
    
    <!-- Node 2 -->
    <circle cx="920" cy="260" r="20" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <circle cx="920" cy="260" r="7" fill="#4f46e5" filter="url(#glow)"/>
    
    <!-- Node 3 -->
    <circle cx="880" cy="360" r="19" fill="none" stroke="#10b981" stroke-width="2"/>
    <circle cx="880" cy="360" r="7" fill="#10b981" filter="url(#glow)"/>
    
    <!-- Node 4 -->
    <circle cx="960" cy="310" r="21" fill="none" stroke="#ec4899" stroke-width="2"/>
    <circle cx="960" cy="310" r="8" fill="#ec4899" filter="url(#glow)"/>
    
    <!-- Connections -->
    <line x1="820" y1="280" x2="920" y2="260" stroke="#4f46e5" stroke-width="1.5" opacity="0.6"/>
    <line x1="820" y1="280" x2="880" y2="360" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
    <line x1="920" y1="260" x2="960" y2="310" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    <line x1="880" y1="360" x2="960" y2="310" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Security shields overlaying clouds -->
  <!-- Shield 1 -->
  <g transform="translate(800, 210)">
    <path d="M 0 -15 L 12 -8 L 12 5 Q 0 15 -12 5 L -12 -8 Z" fill="url(#shieldGrad)" opacity="0.85"/>
    <text x="0" y="2" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold" text-anchor="middle">🔒</text>
  </g>
  
  <!-- Shield 2 -->
  <g transform="translate(950, 280)">
    <path d="M 0 -16 L 14 -9 L 14 6 Q 0 17 -14 6 L -14 -9 Z" fill="url(#shieldGrad)" opacity="0.8"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold" text-anchor="middle">🛡️</text>
  </g>
  
  <!-- Lock icon -->
  <g transform="translate(1020, 350)" opacity="0.9">
    <rect x="-10" y="-5" width="20" height="18" fill="url(#accentGrad)" rx="3"/>
    <circle cx="0" cy="-8" r="7" fill="none" stroke="url(#accentGrad)" stroke-width="2"/>
  </g>
  
  <!-- Security indicator bars -->
  <rect x="760" y="480" width="8" height="40" fill="#10b981" rx="2" opacity="0.9"/>
  <rect x="780" y="470" width="8" height="50" fill="#06b6d4" rx="2" opacity="0.9"/>
  <rect x="800" y="475" width="8" height="45" fill="#4f46e5" rx="2" opacity="0.9"/>
  <rect x="820" y="460" width="8" height="60" fill="#ec4899" rx="2" opacity="0.9"/>
  <rect x="840" y="485" width="8" height="35" fill="#10b981" rx="2" opacity="0.9"/>
  
  <!-- Accent line -->
  <line x1="700" y1="555" x2="1100" y2="555" stroke="#4f46e5" stroke-width="2" opacity="0.4"/>
</svg>