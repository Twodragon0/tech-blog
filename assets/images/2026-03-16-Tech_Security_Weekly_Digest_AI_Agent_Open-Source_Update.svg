<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>AI Agent Red Team Open-Source and Bedrock Multi-Agent</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Neural network nodes (AI theme) -->
  <circle cx="780" cy="150" r="8" fill="rgba(233,30,99,0.5)"/>
  <circle cx="860" cy="200" r="6" fill="rgba(142,68,173,0.5)"/>
  <circle cx="940" cy="145" r="9" fill="rgba(233,30,99,0.4)"/>
  <circle cx="1010" cy="210" r="7" fill="rgba(142,68,173,0.4)"/>
  <circle cx="1080" cy="160" r="8" fill="rgba(233,30,99,0.5)"/>
  <circle cx="830" cy="270" r="7" fill="rgba(142,68,173,0.45)"/>
  <circle cx="910" cy="290" r="6" fill="rgba(233,30,99,0.4)"/>
  <circle cx="990" cy="265" r="8" fill="rgba(142,68,173,0.4)"/>
  <circle cx="1060" cy="300" r="6" fill="rgba(233,30,99,0.35)"/>
  <circle cx="870" cy="370" r="7" fill="rgba(142,68,173,0.35)"/>
  <circle cx="960" cy="360" r="9" fill="rgba(233,30,99,0.4)"/>
  <circle cx="1040" cy="380" r="6" fill="rgba(142,68,173,0.3)"/>
  <!-- Neural connections layer 1 to 2 -->
  <line x1="780" y1="150" x2="830" y2="270" stroke="rgba(233,30,99,0.12)" stroke-width="1"/>
  <line x1="860" y1="200" x2="830" y2="270" stroke="rgba(142,68,173,0.12)" stroke-width="1"/>
  <line x1="940" y1="145" x2="910" y2="290" stroke="rgba(233,30,99,0.12)" stroke-width="1"/>
  <line x1="1010" y1="210" x2="990" y2="265" stroke="rgba(142,68,173,0.12)" stroke-width="1"/>
  <line x1="1080" y1="160" x2="1060" y2="300" stroke="rgba(233,30,99,0.12)" stroke-width="1"/>
  <line x1="860" y1="200" x2="910" y2="290" stroke="rgba(142,68,173,0.1)" stroke-width="1"/>
  <line x1="940" y1="145" x2="830" y2="270" stroke="rgba(233,30,99,0.08)" stroke-width="1"/>
  <!-- Layer 2 to 3 -->
  <line x1="830" y1="270" x2="870" y2="370" stroke="rgba(233,30,99,0.12)" stroke-width="1"/>
  <line x1="910" y1="290" x2="960" y2="360" stroke="rgba(142,68,173,0.12)" stroke-width="1"/>
  <line x1="990" y1="265" x2="1040" y2="380" stroke="rgba(233,30,99,0.12)" stroke-width="1"/>
  <line x1="1060" y1="300" x2="960" y2="360" stroke="rgba(142,68,173,0.1)" stroke-width="1"/>
  <!-- Large glow circle -->
  <circle cx="1050" cy="480" r="180" fill="rgba(142,68,173,0.04)"/>
  <circle cx="1050" cy="480" r="120" fill="rgba(142,68,173,0.04)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(142,68,173,0.25)" stroke="rgba(142,68,173,0.5)" stroke-width="1"/>
  <text x="180" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">MARCH 16, 2026</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">AI Agent Red Team</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Open-Source Release</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">Bedrock Multi-Agent | Aave Shield | Security Automation</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category label -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">SECURITY WEEKLY DIGEST</text>
  <!-- Keyword tags -->
  <rect x="80" y="420" width="100" height="36" rx="18" fill="rgba(233,30,99,0.18)" stroke="rgba(233,30,99,0.4)" stroke-width="1"/>
  <text x="130" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#f48fb1" text-anchor="middle" font-weight="600">AI Agent</text>
  <rect x="196" y="420" width="120" height="36" rx="18" fill="rgba(142,68,173,0.18)" stroke="rgba(142,68,173,0.4)" stroke-width="1"/>
  <text x="256" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#ce93d8" text-anchor="middle" font-weight="600">Open Source</text>
  <rect x="332" y="420" width="110" height="36" rx="18" fill="rgba(41,128,185,0.18)" stroke="rgba(41,128,185,0.35)" stroke-width="1"/>
  <text x="387" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#5dade2" text-anchor="middle" font-weight="600">Red Team</text>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
