<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1a2e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cyanglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="600" cy="270" r="250" fill="#06b6d4" opacity="0.04" filter="url(#softglow)"/>
  <circle cx="400" cy="350" r="150" fill="#ef4444" opacity="0.03" filter="url(#softglow)"/>

  <!-- Central AI Agent Brain -->
  <g transform="translate(600,250)">
    <!-- Outer scanning ring -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-dasharray="4,8"/>
    <circle cx="0" cy="0" r="130" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.15" stroke-dasharray="3,6"/>

    <!-- Crosshair / Target (Red Team) -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.2"/>
    <line x1="-120" y1="0" x2="-40" y2="0" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    <line x1="40" y1="0" x2="120" y2="0" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-120" x2="0" y2="-40" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="40" x2="0" y2="120" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>

    <!-- AI Agent Core (Robot head) -->
    <rect x="-50" y="-55" width="100" height="80" rx="20" fill="#0e7490" opacity="0.3" stroke="#06b6d4" stroke-width="2"/>

    <!-- Eyes -->
    <circle cx="-20" cy="-25" r="12" fill="#0a0a1a" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="20" cy="-25" r="12" fill="#0a0a1a" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="-20" cy="-25" r="5" fill="#22d3ee" filter="url(#cyanglow)"/>
    <circle cx="20" cy="-25" r="5" fill="#22d3ee" filter="url(#cyanglow)"/>

    <!-- Mouth (digital) -->
    <rect x="-25" y="0" width="10" height="6" rx="1" fill="#22d3ee" opacity="0.7"/>
    <rect x="-10" y="0" width="10" height="6" rx="1" fill="#22d3ee" opacity="0.5"/>
    <rect x="5" y="0" width="10" height="6" rx="1" fill="#22d3ee" opacity="0.7"/>
    <rect x="20" y="0" width="6" height="6" rx="1" fill="#22d3ee" opacity="0.4"/>

    <!-- Antenna -->
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="0" cy="-80" r="5" fill="#22d3ee" filter="url(#cyanglow)"/>
  </g>

  <!-- Connection lines to external nodes (multi-agent) -->
  <g opacity="0.4">
    <!-- Node 1: Top-left -->
    <line x1="350" y1="120" x2="510" y2="200" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="350" cy="120" r="20" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="1"/>
    <text x="350" y="125" font-family="Courier New" font-size="11" fill="#22d3ee" text-anchor="middle">API</text>

    <!-- Node 2: Top-right -->
    <line x1="850" y1="130" x2="690" y2="210" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="850" cy="130" r="20" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="1"/>
    <text x="850" y="135" font-family="Courier New" font-size="11" fill="#22d3ee" text-anchor="middle">SDK</text>

    <!-- Node 3: Left -->
    <line x1="250" y1="300" x2="450" y2="270" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="250" cy="300" r="20" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="1"/>
    <text x="250" y="305" font-family="Courier New" font-size="10" fill="#22d3ee" text-anchor="middle">Tool</text>

    <!-- Node 4: Right -->
    <line x1="950" cy="280" x2="750" y2="260" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,4" y1="280"/>
    <circle cx="950" cy="280" r="20" fill="#06b6d4" opacity="0.1" stroke="#06b6d4" stroke-width="1"/>
    <text x="950" y="285" font-family="Courier New" font-size="10" fill="#22d3ee" text-anchor="middle">LLM</text>

    <!-- Node 5: Bottom-left -->
    <line x1="320" y1="430" x2="520" y2="340" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="320" cy="430" r="20" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
    <text x="320" y="435" font-family="Courier New" font-size="9" fill="#fca5a5" text-anchor="middle">Inject</text>

    <!-- Node 6: Bottom-right -->
    <line x1="880" y1="420" x2="680" y2="330" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="880" cy="420" r="20" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
    <text x="880" y="425" font-family="Courier New" font-size="9" fill="#fca5a5" text-anchor="middle">Bypass</text>
  </g>

  <!-- Scanning pulse lines -->
  <g opacity="0.08">
    <circle cx="600" cy="250" r="200" fill="none" stroke="#06b6d4" stroke-width="40"/>
    <circle cx="600" cy="250" r="260" fill="none" stroke="#06b6d4" stroke-width="20"/>
  </g>

  <!-- Title -->
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">AI Agent Red Teaming</text>
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Agent Security | Multi-Agent Architecture | DeFi Exploits</text>

  <!-- Top badges -->
  <rect x="40" y="25" width="160" height="32" rx="16" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
  <text x="120" y="47" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#67e8f9" text-anchor="middle">WEEKLY DIGEST</text>

  <rect x="1000" y="25" width="160" height="32" rx="16" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="1080" y="47" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd" text-anchor="middle">March 16, 2026</text>

  <!-- Footer -->
  <text x="1160" y="615" font-family="Arial, sans-serif" font-size="13" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>