<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="dateBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Agent + Open Source symbol -->
  <!-- Outer orbital ring -->
  <circle cx="1010" cy="225" r="110" fill="none" stroke="rgba(124,58,237,0.25)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Inner orbital ring -->
  <circle cx="1010" cy="225" r="75" fill="none" stroke="rgba(239,68,68,0.2)" stroke-width="1" stroke-dasharray="4 6"/>
  <!-- Core node - AI agent brain -->
  <circle cx="1010" cy="225" r="44" fill="rgba(124,58,237,0.10)" stroke="rgba(124,58,237,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="30" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>

  <!-- Neural network lines from core -->
  <line x1="1010" y1="181" x2="1010" y2="150" stroke="rgba(124,58,237,0.3)" stroke-width="1.2"/>
  <line x1="1010" y1="269" x2="1010" y2="300" stroke="rgba(124,58,237,0.3)" stroke-width="1.2"/>
  <line x1="966" y1="225" x2="935" y2="225" stroke="rgba(239,68,68,0.28)" stroke-width="1.2"/>
  <line x1="1054" y1="225" x2="1085" y2="225" stroke="rgba(239,68,68,0.28)" stroke-width="1.2"/>
  <line x1="979" y1="194" x2="957" y2="172" stroke="rgba(124,58,237,0.22)" stroke-width="1"/>
  <line x1="1041" y1="194" x2="1063" y2="172" stroke="rgba(124,58,237,0.22)" stroke-width="1"/>
  <line x1="979" y1="256" x2="957" y2="278" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <line x1="1041" y1="256" x2="1063" y2="278" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>

  <!-- Satellite nodes on outer ring -->
  <circle cx="1010" cy="115" r="9" fill="rgba(124,58,237,0.13)" stroke="rgba(124,58,237,0.4)" stroke-width="1.3"/>
  <circle cx="1010" cy="335" r="9" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.38)" stroke-width="1.3"/>
  <circle cx="900" cy="225" r="9" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.38)" stroke-width="1.3"/>
  <circle cx="1120" cy="225" r="9" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.38)" stroke-width="1.3"/>
  <circle cx="932" cy="147" r="7" fill="rgba(124,58,237,0.10)" stroke="rgba(124,58,237,0.32)" stroke-width="1"/>
  <circle cx="1088" cy="147" r="7" fill="rgba(124,58,237,0.10)" stroke="rgba(124,58,237,0.32)" stroke-width="1"/>
  <circle cx="932" cy="303" r="7" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.30)" stroke-width="1"/>
  <circle cx="1088" cy="303" r="7" fill="rgba(239,68,68,0.10)" stroke="rgba(239,68,68,0.30)" stroke-width="1"/>

  <!-- Open source "fork" symbol inside core -->
  <circle cx="1010" cy="212" r="4" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
  <circle cx="998" cy="238" r="4" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
  <circle cx="1022" cy="238" r="4" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
  <line x1="1010" y1="216" x2="1010" y2="222" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="1010" y1="222" x2="998" y2="234" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
  <line x1="1010" y1="222" x2="1022" y2="234" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>

  <!-- Hexagonal shield overlay -->
  <polygon points="1010,140 1055,167 1055,221 1010,248 965,221 965,167" fill="rgba(124,58,237,0.06)" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>

  <!-- Floating data particles -->
  <rect x="878" y="136" width="5" height="5" rx="1" fill="rgba(124,58,237,0.2)" transform="rotate(20,880.5,138.5)"/>
  <rect x="1130" y="158" width="4" height="4" rx="1" fill="rgba(239,68,68,0.18)" transform="rotate(35,1132,160)"/>
  <rect x="885" y="300" width="6" height="6" rx="1" fill="rgba(96,165,250,0.15)" transform="rotate(15,888,303)"/>
  <rect x="1125" y="290" width="5" height="5" rx="1" fill="rgba(124,58,237,0.18)" transform="rotate(45,1127.5,292.5)"/>
  <circle cx="890" cy="170" r="3" fill="rgba(96,165,250,0.15)"/>
  <circle cx="1135" cy="200" r="2.5" fill="rgba(239,68,68,0.2)"/>
  <circle cx="892" cy="268" r="3" fill="rgba(124,58,237,0.18)"/>
  <circle cx="1130" cy="255" r="2" fill="rgba(96,165,250,0.18)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(239,68,68,0.55)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(251,191,36,0.5)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(239,68,68,0.4)"/>

  <!-- Background decorative circles bottom right -->
  <circle cx="1050" cy="450" r="200" fill="url(#glow1)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(124,58,237,0.04)" stroke="rgba(124,58,237,0.06)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#dateBadge)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="95" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(167,139,250,0.95)" letter-spacing="1.5">MARCH 16, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">AI Agent Open Source</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(196,181,253,0.75)">Security Intelligence · AI Agents · Open Source Ecosystem</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(167,139,250,0.7)" letter-spacing="2.5">CATEGORY: SECURITY &amp; AI INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1.2"/>
  <text x="145" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(252,165,165,0.95)" text-anchor="middle">AI Agents</text>

  <rect x="224" y="402" width="148" height="36" rx="18" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.38)" stroke-width="1.2"/>
  <text x="298" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(253,230,138,0.95)" text-anchor="middle">Open Source</text>

  <rect x="386" y="402" width="148" height="36" rx="18" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.35)" stroke-width="1.2"/>
  <text x="460" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(147,197,253,0.95)" text-anchor="middle">Threat Intel</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="14" fill="rgba(167,139,250,0.5)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(167,139,250,0.45)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>