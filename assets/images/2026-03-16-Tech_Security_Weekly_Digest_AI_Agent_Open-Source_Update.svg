<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e63946" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="rgba(230,57,70,0.04)" stroke="rgba(230,57,70,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(230,57,70,0.05)" stroke="rgba(230,57,70,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Agent + Open Source + Security -->
  <!-- Outer ring: Shield shape -->
  <path d="M1010,145 L1010,145 Q1010,145 1010,145 L1010,145 Z" fill="none"/>
  <!-- Central AI brain / neural network -->
  <circle cx="1010" cy="225" r="72" fill="rgba(230,57,70,0.07)" stroke="rgba(230,57,70,0.3)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="50" fill="rgba(230,57,70,0.09)" stroke="rgba(230,57,70,0.25)" stroke-width="1"/>
  <circle cx="1010" cy="225" r="28" fill="rgba(230,57,70,0.12)" stroke="rgba(230,57,70,0.35)" stroke-width="1.5"/>

  <!-- Neural network nodes -->
  <circle cx="1010" cy="225" r="8" fill="rgba(230,57,70,0.5)" stroke="rgba(230,57,70,0.8)" stroke-width="1.5"/>

  <!-- Outer agent nodes -->
  <circle cx="938" cy="180" r="6" fill="rgba(244,162,97,0.4)" stroke="rgba(244,162,97,0.7)" stroke-width="1.2"/>
  <circle cx="1082" cy="180" r="6" fill="rgba(244,162,97,0.4)" stroke="rgba(244,162,97,0.7)" stroke-width="1.2"/>
  <circle cx="938" cy="270" r="6" fill="rgba(244,162,97,0.4)" stroke="rgba(244,162,97,0.7)" stroke-width="1.2"/>
  <circle cx="1082" cy="270" r="6" fill="rgba(244,162,97,0.4)" stroke="rgba(244,162,97,0.7)" stroke-width="1.2"/>
  <circle cx="1010" cy="148" r="6" fill="rgba(100,200,255,0.4)" stroke="rgba(100,200,255,0.7)" stroke-width="1.2"/>
  <circle cx="1010" cy="302" r="6" fill="rgba(100,200,255,0.4)" stroke="rgba(100,200,255,0.7)" stroke-width="1.2"/>

  <!-- Connection lines from center to nodes -->
  <line x1="1010" y1="225" x2="938" y2="180" stroke="rgba(230,57,70,0.25)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="1082" y2="180" stroke="rgba(230,57,70,0.25)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="938" y2="270" stroke="rgba(230,57,70,0.25)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="1082" y2="270" stroke="rgba(230,57,70,0.25)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="1010" y2="148" stroke="rgba(100,200,255,0.3)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="1010" y2="302" stroke="rgba(100,200,255,0.3)" stroke-width="1"/>

  <!-- Secondary nodes ring -->
  <circle cx="960" cy="155" r="4" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <circle cx="1060" cy="155" r="4" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <circle cx="915" cy="225" r="4" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <circle cx="1105" cy="225" r="4" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <circle cx="960" cy="295" r="4" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <circle cx="1060" cy="295" r="4" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>

  <!-- Open Source hexagon overlay -->
  <polygon points="1010,155 1055,180 1055,230 1010,255 965,230 965,180" fill="rgba(100,200,255,0.06)" stroke="rgba(100,200,255,0.2)" stroke-width="1"/>

  <!-- Shield outline (security symbol) -->
  <path d="M1010,135 L1075,162 L1075,210 Q1075,268 1010,295 Q945,268 945,210 L945,162 Z" fill="rgba(230,57,70,0.05)" stroke="rgba(230,57,70,0.2)" stroke-width="1.2"/>

  <!-- Scan lines across illustration -->
  <line x1="880" y1="185" x2="960" y2="185" stroke="rgba(230,57,70,0.15)" stroke-width="0.8"/>
  <line x1="1060" y1="185" x2="1140" y2="185" stroke="rgba(230,57,70,0.15)" stroke-width="0.8"/>
  <line x1="880" y1="265" x2="960" y2="265" stroke="rgba(230,57,70,0.15)" stroke-width="0.8"/>
  <line x1="1060" y1="265" x2="1140" y2="265" stroke="rgba(230,57,70,0.15)" stroke-width="0.8"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="#e63946" opacity="0.7"/>
  <circle cx="900" cy="420" r="4" fill="#f4a261" opacity="0.6"/>
  <circle cx="860" cy="440" r="4" fill="#e63946" opacity="0.5"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(230,57,70,0.3)" stroke-width="1"/>
  <text x="92" y="81" font-family="monospace" font-size="12" fill="rgba(230,57,70,0.9)" letter-spacing="1">MARCH 16, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="rgba(255,255,255,0.92)">AI Agent Open Source</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Weekly threat intelligence · AI agent trends · OSS security updates</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="14" fill="rgba(230,57,70,0.8)" letter-spacing="2" font-weight="600">SECURITY / AI AGENTS / OPEN SOURCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(230,57,70,0.18)" stroke="rgba(230,57,70,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="Arial, sans-serif" font-size="13" fill="rgba(230,57,70,0.95)" text-anchor="middle" font-weight="600">AI Agents</text>

  <rect x="224" y="402" width="140" height="36" rx="18" fill="rgba(244,162,97,0.15)" stroke="rgba(244,162,97,0.4)" stroke-width="1"/>
  <text x="294" y="425" font-family="Arial, sans-serif" font-size="13" fill="rgba(244,162,97,0.95)" text-anchor="middle" font-weight="600">Open Source</text>

  <rect x="378" y="402" width="130" height="36" rx="18" fill="rgba(100,200,255,0.12)" stroke="rgba(100,200,255,0.35)" stroke-width="1"/>
  <text x="443" y="425" font-family="Arial, sans-serif" font-size="13" fill="rgba(100,200,255,0.9)" text-anchor="middle" font-weight="600">Threat Intel</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, sans-serif" font-size="13" fill="rgba(230,57,70,0.5)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>