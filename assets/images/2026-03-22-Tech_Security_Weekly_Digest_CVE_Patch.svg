<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1120;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a6f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="patchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44a08d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Left side: Text content -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">Tech Security Weekly</text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">Digest CVE Patch</text>

  <!-- Date badge -->
  <rect x="60" y="270" width="240" height="40" rx="20" fill="#1a1f3a" stroke="#4ecdc4" stroke-width="1.5"/>
  <text x="180" y="293" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4ecdc4" text-anchor="middle">MARCH 22, 2026</text>

  <!-- Tag pills -->
  <rect x="60" y="420" width="95" height="36" rx="18" fill="#ff6b6b" opacity="0.15"/>
  <text x="107.5" y="441" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff6b6b" text-anchor="middle">Security</text>

  <rect x="175" y="420" width="95" height="36" rx="18" fill="#4ecdc4" opacity="0.15"/>
  <text x="222.5" y="441" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4ecdc4" text-anchor="middle">CVE</text>

  <rect x="290" y="420" width="95" height="36" rx="18" fill="#ffd93d" opacity="0.15"/>
  <text x="337.5" y="441" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffd93d" text-anchor="middle">Patch</text>

  <!-- Footer -->
  <text x="60" y="600" font-family="Arial, sans-serif" font-size="11" fill="#666" letter-spacing="0.5">tech.2twodragon.com</text>

  <!-- Right side: CVE Patch illustration -->
  <!-- Large shield base -->
  <path d="M 900 120 L 1000 120 L 1050 220 L 1050 380 Q 1050 450 950 500 Q 850 450 850 380 L 850 220 Z" fill="url(#shieldGrad)" filter="url(#glow)" opacity="0.9"/>

  <!-- Shield border -->
  <path d="M 900 120 L 1000 120 L 1050 220 L 1050 380 Q 1050 450 950 500 Q 850 450 850 380 L 850 220 Z" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.6"/>

  <!-- Vulnerability indicator (X mark) -->
  <circle cx="950" cy="280" r="45" fill="#0a0c1a" opacity="0.8"/>
  <line x1="920" y1="250" x2="980" y2="310" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
  <line x1="980" y1="250" x2="920" y2="310" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>

  <!-- Patch squares overlaying shield (staggered) -->
  <rect x="870" y="180" width="35" height="35" rx="3" fill="url(#patchGrad)" opacity="0.85"/>
  <circle cx="887.5" cy="197.5" r="4" fill="#0a0c1a"/>
  <circle cx="898" cy="197.5" r="3" fill="#0a0c1a" opacity="0.6"/>
  <circle cx="887.5" cy="208" r="3" fill="#0a0c1a" opacity="0.6"/>

  <rect x="1020" y="160" width="35" height="35" rx="3" fill="url(#patchGrad)" opacity="0.85"/>
  <circle cx="1037.5" cy="177.5" r="4" fill="#0a0c1a"/>
  <circle cx="1048" cy="177.5" r="3" fill="#0a0c1a" opacity="0.6"/>
  <circle cx="1037.5" cy="188" r="3" fill="#0a0c1a" opacity="0.6"/>

  <!-- Code/patch symbols -->
  <g>
    <line x1="900" y1="350" x2="1000" y2="350" stroke="#4ecdc4" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <circle cx="910" cy="350" r="2.5" fill="#4ecdc4"/>
    <circle cx="925" cy="350" r="2.5" fill="#4ecdc4"/>
    <circle cx="940" cy="350" r="2.5" fill="#4ecdc4"/>
    <circle cx="955" cy="350" r="2.5" fill="#4ecdc4"/>
    <circle cx="970" cy="350" r="2.5" fill="#4ecdc4"/>
    <circle cx="985" cy="350" r="2.5" fill="#4ecdc4"/>
  </g>

  <!-- Fix indicator checkmark -->
  <circle cx="950" cy="410" r="25" fill="#4ecdc4" opacity="0.2"/>
  <path d="M 940 410 L 945 418 L 960 403" fill="none" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Accent dots -->
  <circle cx="820" cy="200" r="4" fill="#ff6b6b" opacity="0.5"/>
  <circle cx="1080" cy="320" r="3" fill="#4ecdc4" opacity="0.4"/>
  <circle cx="830" cy="450" r="3.5" fill="#ffd93d" opacity="0.5"/>

  <!-- Vertical divider line -->
  <line x1="700" y1="80" x2="700" y2="580" stroke="#1a1f3a" stroke-width="1" opacity="0.5"/>
</svg>