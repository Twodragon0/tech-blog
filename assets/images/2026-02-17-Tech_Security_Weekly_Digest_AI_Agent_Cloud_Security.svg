  <path d="M950,310 Q960,318 950,326 Q940,334 950,342" fill="none" stroke="rgba(74,144,217,0.25)" stroke-width="1.5"/>
  <path d="M1060,310 Q1050,318 1060,326 Q1070,334 1060,342" fill="none" stroke="rgba(74,144,217,0.25)" stroke-width="1.5"/>
  <line x1="955" y1="326" x2="1055" y2="326" stroke="rgba(74,144,217,0.15)" stroke-width="1" stroke-dasharray="4,3"/>

