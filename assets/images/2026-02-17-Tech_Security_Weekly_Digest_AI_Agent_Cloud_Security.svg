  <!-- Outer cloud ring -->
  <ellipse cx="1010" cy="225" rx="120" ry="80" fill="none" stroke="rgba(74,144,217,0.25)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Cloud shape -->
  <path d="M940,240 Q930,200 960,195 Q955,175 980,172 Q990,155 1015,162 Q1035,150 1050,168 Q1075,165 1080,185 Q1100,188 1095,210 Q1105,225 1090,235 Z" fill="url(#orbitGrad)" stroke="rgba(74,144,217,0.3)" stroke-width="1.5"/>
  <!-- Cloud inner detail lines -->
  <line x1="960" y1="205" x2="1075" y2="205" stroke="rgba(74,144,217,0.15)" stroke-width="1"/>
  <line x1="955" y1="215" x2="1085" y2="215" stroke="rgba(74,144,217,0.10)" stroke-width="1"/>

