<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#4444ff"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2244aa;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#880000;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Agent + Cloud + Shield composite icon -->
  <!-- Cloud base shape -->
  <ellipse cx="1010" cy="255" rx="115" ry="55" fill="url(#cloudGrad)" stroke="rgba(68,136,255,0.3)" stroke-width="1.5"/>
  <ellipse cx="970" cy="235" rx="65" ry="50" fill="url(#cloudGrad)" stroke="rgba(68,136,255,0.25)" stroke-width="1.2"/>
  <ellipse cx="1050" cy="230" rx="55" ry="45" fill="url(#cloudGrad)" stroke="rgba(68,136,255,0.25)" stroke-width="1.2"/>
  <rect x="895" y="255" width="230" height="40" rx="4" fill="url(#cloudGrad)" stroke="none"/>

  <!-- Shield icon centered over cloud -->
  <path d="M1010 145 L1060 165 L1060 215 Q1060 250 1010 270 Q960 250 960 215 L960 165 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,80,80,0.35)" stroke-width="1.8"/>
  <!-- Shield inner lock -->
  <rect x="998" y="193" width="24" height="20" rx="4" fill="none" stroke="rgba(255,180,80,0.5)" stroke-width="1.5"/>
  <path d="M1003 193 Q1003 183 1010 183 Q1017 183 1017 193" fill="none" stroke="rgba(255,180,80,0.5)" stroke-width="1.5"/>
  <circle cx="1010" cy="206" r="3" fill="rgba(255,180,80,0.6)"/>

  <!-- AI brain nodes around cloud/shield -->
  <circle cx="890" cy="175" r="14" fill="rgba(100,200,255,0.08)" stroke="rgba(100,200,255,0.35)" stroke-width="1.5"/>
  <circle cx="1130" cy="175" r="14" fill="rgba(100,200,255,0.08)" stroke="rgba(100,200,255,0.35)" stroke-width="1.5"/>
  <circle cx="870" cy="230" r="10" fill="rgba(100,200,255,0.07)" stroke="rgba(100,200,255,0.28)" stroke-width="1.2"/>
  <circle cx="1140" cy="235" r="10" fill="rgba(100,200,255,0.07)" stroke="rgba(100,200,255,0.28)" stroke-width="1.2"/>
  <circle cx="915" cy="148" r="9" fill="rgba(255,120,80,0.08)" stroke="rgba(255,120,80,0.3)" stroke-width="1.2"/>
  <circle cx="1100" cy="148" r="9" fill="rgba(255,120,80,0.08)" stroke="rgba(255,120,80,0.3)" stroke-width="1.2"/>

  <!-- Agent connection lines -->
  <line x1="890" y1="175" x2="960" y2="185" stroke="rgba(100,200,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1130" y1="175" x2="1060" y2="185" stroke="rgba(100,200,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="870" y1="230" x2="895" y2="240" stroke="rgba(100,200,255,0.18)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1140" y1="235" x2="1115" y2="240" stroke="rgba(100,200,255,0.18)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="915" y1="148" x2="960" y2="165" stroke="rgba(255,120,80,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1100" y1="148" x2="1060" y2="165" stroke="rgba(255,120,80,0.2)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Data flow dots on lines -->
  <circle cx="925" cy="180" r="2.5" fill="rgba(100,200,255,0.5)"/>
  <circle cx="1095" cy="180" r="2.5" fill="rgba(100,200,255,0.5)"/>
  <circle cx="937" cy="157" r="2" fill="rgba(255,120,80,0.5)"/>

  <!-- AI circuit lines on cloud bottom -->
  <path d="M920 295 L950 295 L960 305 L980 305 L990 295 L1030 295 L1040 305 L1060 305 L1070 295 L1100 295"
        fill="none" stroke="rgba(68,136,255,0.25)" stroke-width="1.2"/>
  <circle cx="970" cy="305" r="3" fill="rgba(68,136,255,0.4)"/>
  <circle cx="1050" cy="305" r="3" fill="rgba(68,136,255,0.4)"/>

  <!-- Outer ring glow -->
  <circle cx="1010" cy="220" r="130" fill="none" stroke="rgba(68,136,255,0.07)" stroke-width="1"/>
  <circle cx="1010" cy="220" r="150" fill="none" stroke="rgba(255,68,68,0.05)" stroke-width="1"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,80,80,0.75)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="5" fill="rgba(255,160,40,0.75)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="5" fill="rgba(80,160,255,0.75)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.4)" stroke-width="1"/>
  <text x="92" y="81" font-family="monospace,sans-serif" font-size="12" font-weight="600" fill="rgba(255,140,100,0.95)" letter-spacing="1.5">FEBRUARY 17, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial,Helvetica,sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial,Helvetica,sans-serif" font-size="46" font-weight="700" fill="rgba(255,200,180,0.95)">AI Agent Cloud Security</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial,Helvetica,sans-serif" font-size="19" fill="rgba(180,200,255,0.7)">Weekly roundup of AI threats, cloud vulnerabilities &amp; agent security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="rgba(255,120,80,0.8)" letter-spacing="2.5">SECURITY / AI AGENT / CLOUD</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(255,60,60,0.18)" stroke="rgba(255,60,60,0.45)" stroke-width="1.2"/>
  <text x="135" y="425" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="rgba(255,140,140,0.95)" text-anchor="middle">#AI Agent</text>

  <rect x="204" y="402" width="130" height="36" rx="18" fill="rgba(255,160,40,0.15)" stroke="rgba(255,160,40,0.4)" stroke-width="1.2"/>
  <text x="269" y="425" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="rgba(255,200,100,0.95)" text-anchor="middle">#CloudSecurity</text>

  <rect x="348" y="402" width="110" height="36" rx="18" fill="rgba(60,120,255,0.15)" stroke="rgba(60,120,255,0.4)" stroke-width="1.2"/>
  <text x="403" y="425" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="rgba(120,180,255,0.95)" text-anchor="middle">#DeepSeek</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="monospace,sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="0.8">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,80,0.5)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>