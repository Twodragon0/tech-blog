<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <title>2026 02 17 Tech Security Weekly Digest AI Agent Cloud Security</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="agentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff4757;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ed573;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#26de81;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Left side: Title and metadata -->
  
  <!-- Title line 1 -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Tech Security
  </text>
  
  <!-- Title line 2 -->
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Weekly Digest Agent
  </text>
  
  <!-- Subtitle: Cloud -->
  <text x="60" y="290" font-family="Arial, sans-serif" font-size="28" fill="#00d4ff" font-weight="500">
    Cloud Intelligence
  </text>
  
  <!-- Date badge -->
  <rect x="60" y="320" width="320" height="45" rx="22" fill="rgba(0, 212, 255, 0.1)" stroke="#00d4ff" stroke-width="2"/>
  <text x="80" y="349" font-family="Arial, sans-serif" font-size="16" fill="#00d4ff" font-weight="600">
    FEBRUARY 17, 2026
  </text>
  
  <!-- Tag pills -->
  <g>
    <!-- Tag 1: Security -->
    <rect x="60" y="420" width="100" height="32" rx="16" fill="rgba(46, 213, 115, 0.2)" stroke="#2ed573" stroke-width="1.5"/>
    <text x="110" y="440" font-family="Arial, sans-serif" font-size="13" fill="#2ed573" font-weight="600" text-anchor="middle">
      Security
    </text>
    
    <!-- Tag 2: AI Cloud -->
    <rect x="180" y="420" width="110" height="32" rx="16" fill="rgba(0, 212, 255, 0.2)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="235" y="440" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" font-weight="600" text-anchor="middle">
      AI Cloud
    </text>
    
    <!-- Tag 3: Weekly -->
    <rect x="310" y="420" width="100" height="32" rx="16" fill="rgba(255, 107, 107, 0.2)" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="360" y="440" font-family="Arial, sans-serif" font-size="13" fill="#ff6b6b" font-weight="600" text-anchor="middle">
      Weekly
    </text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="595" font-family="Arial, sans-serif" font-size="14" fill="#666" font-weight="400">
    tech.2twodragon.com
  </text>
  
  <!-- Right side: Illustration for Tech Security Weekly Digest Agent Cloud -->
  
  <!-- Background accent circles -->
  <circle cx="950" cy="100" r="80" fill="rgba(0, 212, 255, 0.08)"/>
  <circle cx="1050" cy="520" r="100" fill="rgba(46, 213, 115, 0.08)"/>
  
  <!-- Cloud computing base -->
  <path d="M 750 280 Q 770 250 800 250 Q 830 250 840 270 Q 870 260 890 280 Q 880 310 850 320 L 760 320 Q 740 310 750 280" 
        fill="none" stroke="url(#cloudGradient)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Agent nodes (representing distributed AI agents in cloud) -->
  <g id="agentNode1">
    <circle cx="820" cy="340" r="20" fill="url(#agentGradient)"/>
    <circle cx="820" cy="340" r="15" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <circle cx="813" cy="333" r="4" fill="white"/>
    <circle cx="827" cy="347" r="4" fill="white"/>
  </g>
  
  <g id="agentNode2">
    <circle cx="920" cy="300" r="20" fill="url(#agentGradient)"/>
    <circle cx="920" cy="300" r="15" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <circle cx="913" cy="293" r="4" fill="white"/>
    <circle cx="927" cy="307" r="4" fill="white"/>
  </g>
  
  <g id="agentNode3">
    <circle cx="1000" cy="340" r="20" fill="url(#agentGradient)"/>
    <circle cx="1000" cy="340" r="15" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <circle cx="993" cy="333" r="4" fill="white"/>
    <circle cx="1007" cy="347" r="4" fill="white"/>
  </g>
  
  <!-- Data streams connecting agents (digest concept) -->
  <line x1="840" y1="340" x2="900" y2="320" stroke="#00d4ff" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="940" y1="300" x2="980" y2="330" stroke="#00d4ff" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- Security shields overlaying -->
  <g id="shield1">
    <path d="M 850 200 L 880 180 L 880 220 Q 880 240 865 250 Q 850 240 850 220 Z" 
          fill="none" stroke="url(#shieldGradient)" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="865" cy="215" r="3" fill="#2ed573"/>
  </g>
  
  <g id="shield2">
    <path d="M 950 380 L 980 360 L 980 400 Q 980 420 965 430 Q 950 420 950 400 Z" 
          fill="none" stroke="url(#shieldGradient)" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="965" cy="405" r="3" fill="#2ed573"/>
  </g>
  
  <!-- Central processing hub (weekly digest aggregator) -->
  <g id="processingHub">
    <rect x="880" y="420" width="100" height="100" rx="8" fill="rgba(0, 212, 255, 0.1)" stroke="#00d4ff" stroke-width="2"/>
    
    <!-- Nested squares for complexity -->
    <rect x="895" y="435" width="70" height="70" rx="5" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
    <rect x="905" y="445" width="50" height="50" rx="4" fill="none" stroke="#2ed573" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Center dot -->
    <circle cx="930" cy="470" r="5" fill="#00d4ff"/>
  </g>
  
  <!-- Data flow indicators (digest streaming) -->
  <g id="dataFlowTop">
    <circle cx="810" cy="390" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="810" cy="405" r="3" fill="#00d4ff" opacity="0.6"/>
    <circle cx="810" cy="420" r="3" fill="#00d4ff" opacity="0.4"/>
  </g>
  
  <g id="dataFlowRight">
    <circle cx="1010" cy="420" r="3" fill="#2ed573" opacity="0.8"/>
    <circle cx="1010" cy="435" r="3" fill="#2ed573" opacity="0.6"/>
    <circle cx="1010" cy="450" r="3" fill="#2ed573" opacity="0.4"/>
  </g>
  
  <!-- Radar/scan pattern (security scanning) -->
  <g id="scanPattern">
    <circle cx="1030" cy="280" r="15" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
    <circle cx="1030" cy="280" r="25" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
    <path d="M 1030 265 L 1030 280 L 1040 280" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
  </g>
  
  <!-- Accent line separator -->
  <line x1="700" y1="0" x2="700" y2="630" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
</svg>