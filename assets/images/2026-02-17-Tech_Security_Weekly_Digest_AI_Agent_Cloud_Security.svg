  <path d="M1010,135 L1055,155 L1055,200 Q1055,240 1010,260 Q965,240 965,200 L965,155 Z" fill="url(#shieldGrad)" stroke="rgba(229,62,62,0.35)" stroke-width="2"/>
  <!-- Shield inner glow -->
  <path d="M1010,148 L1043,163 L1043,200 Q1043,230 1010,247 Q977,230 977,200 L977,163 Z" fill="rgba(229,62,62,0.06)" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>
  <!-- Shield lock icon -->
