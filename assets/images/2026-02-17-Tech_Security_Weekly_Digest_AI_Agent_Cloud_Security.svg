  <path d="M1002,195 Q1002,182 1010,182 Q1018,182 1018,195" fill="none" stroke="rgba(229,62,62,0.5)" stroke-width="1.5"/>
  <circle cx="1010" cy="206" r="3" fill="rgba(229,62,62,0.7)"/>

