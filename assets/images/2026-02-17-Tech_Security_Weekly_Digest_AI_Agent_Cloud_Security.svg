    <text x="60" y="85" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="40" font-weight="bold">!</text>
    <circle cx="60" cy="100" r="4" fill="white"/>
  </g>

  <!-- Secondary icon -->
