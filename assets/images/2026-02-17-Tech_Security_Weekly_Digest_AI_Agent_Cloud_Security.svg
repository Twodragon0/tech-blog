    <line x1="221" y1="125" x2="103" y2="103" stroke="#475569" stroke-width="1"/>
    <line x1="103" y1="103" x2="39" y2="48" stroke="#475569" stroke-width="1"/>
    <line x1="39" y1="48" x2="206" y2="134" stroke="#475569" stroke-width="1"/>
