  <circle cx="1010" cy="290" r="4" fill="rgba(229,62,62,0.3)" stroke="rgba(229,62,62,0.5)" stroke-width="1"/>
  <circle cx="1025" cy="295" r="3" fill="rgba(74,144,217,0.25)" stroke="rgba(74,144,217,0.4)" stroke-width="1"/>
  <circle cx="995" cy="295" r="3" fill="rgba(155,89,182,0.25)" stroke="rgba(155,89,182,0.4)" stroke-width="1"/>

