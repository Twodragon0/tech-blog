  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.6)" stroke="rgba(229,62,62,0.8)" stroke-width="1"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,165,0,0.6)" stroke="rgba(255,165,0,0.8)" stroke-width="1"/>
  <circle cx="860" cy="440" r="4" fill="rgba(74,144,217,0.6)" stroke="rgba(74,144,217,0.8)" stroke-width="1"/>

