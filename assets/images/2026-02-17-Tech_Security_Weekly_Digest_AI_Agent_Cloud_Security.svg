  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">AI Agent Cloud Security</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">Weekly roundup of AI-driven cloud security threats and defenses</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(229,62,62,0.75)" letter-spacing="2">SECURITY / AI / CLOUD</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(229,62,62,0.9)" text-anchor="middle" letter-spacing="0.5">AI Agent</text>

  <rect x="224" y="402" width="150" height="36" rx="18" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.38)" stroke-width="1"/>
  <text x="299" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(245,158,11,0.85)" text-anchor="middle" letter-spacing="0.5">Cloud Security</text>

  <rect x="388" y="402" width="140" height="36" rx="18" fill="rgba(74,144,217,0.12)" stroke="rgba(74,144,217,0.38)" stroke-width="1"/>
  <text x="458" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(74,144,217,0.85)" text-anchor="middle" letter-spacing="0.5">Weekly Digest</text>

  <!-- Footer -->
  <line x1="0" y1="510" x2="1200" y2="510" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(229,62,62,0.4)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>