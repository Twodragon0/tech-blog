  <circle cx="890" cy="160" r="8" fill="rgba(155,89,182,0.12)" stroke="rgba(155,89,182,0.35)" stroke-width="1.5"/>
  <circle cx="920" cy="130" r="6" fill="rgba(74,144,217,0.10)" stroke="rgba(74,144,217,0.3)" stroke-width="1.5"/>
  <circle cx="1100" cy="155" r="8" fill="rgba(74,144,217,0.12)" stroke="rgba(74,144,217,0.35)" stroke-width="1.5"/>
  <circle cx="1120" cy="200" r="5" fill="rgba(155,89,182,0.10)" stroke="rgba(155,89,182,0.3)" stroke-width="1.5"/>
  <circle cx="1105" cy="260" r="7" fill="rgba(74,144,217,0.10)" stroke="rgba(74,144,217,0.28)" stroke-width="1.5"/>
  <circle cx="895" cy="270" r="6" fill="rgba(229,62,62,0.10)" stroke="rgba(229,62,62,0.3)" stroke-width="1.5"/>

