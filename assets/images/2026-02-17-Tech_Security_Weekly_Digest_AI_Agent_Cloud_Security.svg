  <rect x="880" y="310" width="55" height="42" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="880" y1="322" x2="935" y2="322" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="886" y="328" width="8" height="6" rx="1" fill="rgba(229,62,62,0.3)"/>
  <rect x="899" y="328" width="8" height="6" rx="1" fill="rgba(255,255,255,0.12)"/>
  <rect x="912" y="328" width="8" height="6" rx="1" fill="rgba(255,255,255,0.12)"/>
  <rect x="886" y="338" width="8" height="6" rx="1" fill="rgba(255,255,255,0.12)"/>
  <rect x="899" y="338" width="8" height="6" rx="1" fill="rgba(74,144,217,0.3)"/>
  <rect x="912" y="338" width="8" height="6" rx="1" fill="rgba(255,255,255,0.12)"/>

