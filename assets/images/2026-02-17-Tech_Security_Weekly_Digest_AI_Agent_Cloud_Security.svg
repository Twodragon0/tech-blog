  <line x1="898" y1="160" x2="965" y2="175" stroke="rgba(155,89,182,0.2)" stroke-width="1"/>
  <line x1="920" y1="136" x2="975" y2="162" stroke="rgba(74,144,217,0.2)" stroke-width="1"/>
  <line x1="1092" y1="155" x2="1055" y2="170" stroke="rgba(74,144,217,0.2)" stroke-width="1"/>
  <line x1="1115" y1="200" x2="1055" y2="200" stroke="rgba(155,89,182,0.18)" stroke-width="1"/>
  <line x1="1098" y1="260" x2="1055" y2="238" stroke="rgba(74,144,217,0.18)" stroke-width="1"/>
  <line x1="901" y1="264" x2="965" y2="238" stroke="rgba(229,62,62,0.18)" stroke-width="1"/>

