<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>Cloud Security 8Batch OT Guide DevSecOpsFrom FinOpsTo Practical Talent Leap</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side: Content area (0-650px) -->
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Title Line 1 -->
  <text x="40" y="185" font-size="46" font-weight="700" font-family="Inter, sans-serif" fill="url(#titleGrad)" letter-spacing="-0.5">
    Cloud Security
  </text>
  
  <!-- Title Line 2 -->
  <text x="40" y="245" font-size="46" font-weight="700" font-family="Inter, sans-serif" fill="url(#titleGrad)" letter-spacing="-0.5">
    8Batch DevSecOps
  </text>
  
  <!-- Date badge -->
  <rect x="40" y="280" width="280" height="38" rx="19" fill="rgba(14, 165, 233, 0.15)" stroke="#0ea5e9" stroke-width="1"/>
  <text x="60" y="305" font-size="13" font-weight="600" font-family="Inter, sans-serif" fill="#0ea5e9">
    NOVEMBER 21, 2025
  </text>
  
  <!-- Tag pills -->
  <g id="tags">
    <!-- Tag 1: devsecops -->
    <rect x="40" y="420" width="110" height="32" rx="16" fill="rgba(6, 182, 212, 0.15)" stroke="#06b6d4" stroke-width="1"/>
    <text x="60" y="442" font-size="12" font-weight="600" font-family="Inter, sans-serif" fill="#06b6d4">devsecops</text>
    
    <!-- Tag 2: cloud-security -->
    <rect x="170" y="420" width="130" height="32" rx="16" fill="rgba(34, 197, 94, 0.15)" stroke="#22c55e" stroke-width="1"/>
    <text x="190" y="442" font-size="12" font-weight="600" font-family="Inter, sans-serif" fill="#22c55e">cloud-security</text>
    
    <!-- Tag 3: finops -->
    <rect x="320" y="420" width="95" height="32" rx="16" fill="rgba(168, 85, 247, 0.15)" stroke="#a855f7" stroke-width="1"/>
    <text x="340" y="442" font-size="12" font-weight="600" font-family="Inter, sans-serif" fill="#a855f7">finops</text>
  </g>
  
  <!-- Footer -->
  <text x="40" y="595" font-size="12" font-weight="500" font-family="Inter, sans-serif" fill="#666">
    tech.2twodragon.com
  </text>
  
  <!-- Right side: Illustration (700-1150px) -->
  <g id="illustration">
    <!-- Background accent layers -->
    <circle cx="925" cy="280" r="220" fill="#0ea5e9" opacity="0.06"/>
    <circle cx="925" cy="280" r="180" fill="#a855f7" opacity="0.04"/>

    <!-- Cloud Platform (top) -->
    <g id="cloud-platform">
      <!-- Main cloud shape with security gradient -->
      <defs>
        <radialGradient id="cloudGrad" cx="50%" cy="30%">
          <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.4" />
          <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.2" />
        </radialGradient>
      </defs>
      <path d="M 780 140 Q 750 120 730 135 Q 700 110 680 130 Q 660 105 640 120 L 640 200 Q 670 230 730 230 L 1050 230 Q 1080 230 1100 210 L 1100 150 Q 1070 130 1040 145 Q 1010 120 990 135 Q 960 110 940 125 Q 910 100 880 115 Q 850 95 830 110 Z" fill="url(#cloudGrad)" stroke="#06b6d4" stroke-width="1.5" opacity="0.8"/>

      <!-- Lock icon in cloud (security) -->
      <rect x="850" y="155" width="28" height="32" rx="3" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
      <path d="M 854 165 Q 854 158 860 158 Q 866 158 866 165" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
      <circle cx="860" cy="175" r="2" fill="#22c55e" opacity="0.9"/>

      <!-- Shield badge -->
      <path d="M 1010 165 L 1030 160 L 1030 180 Q 1030 195 1010 200 Q 990 195 990 180 L 990 160 Z" fill="#f43f5e" opacity="0.7"/>
    </g>

    <!-- DevSecOps Cycle (middle) -->
    <g id="devsecops-cycle">
      <!-- Central hub -->
      <circle cx="900" cy="310" r="45" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.5"/>
      <circle cx="900" cy="310" r="30" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
      <text x="880" y="317" font-size="14" font-weight="700" font-family="Inter, sans-serif" fill="#0ea5e9" opacity="0.8">8B</text>

      <!-- Dev segment -->
      <circle cx="760" cy="280" r="28" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.8"/>
      <text x="748" y="288" font-size="11" font-weight="600" font-family="Inter, sans-serif" fill="#0ea5e9">Dev</text>
      <path d="M 780 295 L 855 305" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6" marker-end="url(#arrowhead)"/>

      <!-- Security segment -->
      <circle cx="790" cy="390" r="28" fill="none" stroke="#f43f5e" stroke-width="2" opacity="0.8"/>
      <text x="775" y="398" font-size="11" font-weight="600" font-family="Inter, sans-serif" fill="#f43f5e">Sec</text>
      <path d="M 820 370 L 870 330" stroke="#f43f5e" stroke-width="1.5" opacity="0.6"/>

      <!-- Ops segment -->
      <circle cx="1040" cy="280" r="28" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.8"/>
      <text x="1030" y="288" font-size="11" font-weight="600" font-family="Inter, sans-serif" fill="#a855f7">Ops</text>
      <path d="M 1015 300 L 945 310" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- FinOps Stack (lower left) -->
    <g id="finops-stack">
      <!-- Coins/Cost layers -->
      <ellipse cx="760" cy="450" rx="22" ry="10" fill="#fbbf24" opacity="0.3" stroke="#fbbf24" stroke-width="1"/>
      <ellipse cx="760" cy="435" rx="22" ry="10" fill="#fbbf24" opacity="0.5" stroke="#fbbf24" stroke-width="1"/>
      <ellipse cx="760" cy="420" rx="22" ry="10" fill="#fbbf24" opacity="0.7" stroke="#fbbf24" stroke-width="1"/>

      <!-- Dollar sign -->
      <text x="765" y="427" font-size="16" font-weight="700" font-family="Inter, sans-serif" fill="#fbbf24" opacity="0.8">$</text>

      <!-- Label -->
      <text x="810" y="442" font-size="12" font-weight="600" font-family="Inter, sans-serif" fill="#fbbf24" opacity="0.9">FinOps</text>
    </g>

    <!-- Talent Pipeline (lower right) -->
    <g id="talent-pipeline">
      <!-- Team members -->
      <g id="team1">
        <circle cx="980" cy="435" r="8" fill="#22c55e" opacity="0.9"/>
        <path d="M 972 450 L 988 450 L 988 460 L 972 460 Z" fill="#22c55e" opacity="0.9"/>
      </g>

      <g id="team2">
        <circle cx="1020" cy="450" r="8" fill="#22c55e" opacity="0.7"/>
        <path d="M 1012 465 L 1028 465 L 1028 475 L 1012 475 Z" fill="#22c55e" opacity="0.7"/>
      </g>

      <g id="team3">
        <circle cx="1000" cy="480" r="8" fill="#22c55e" opacity="0.5"/>
        <path d="M 992 495 L 1008 495 L 1008 505 L 992 505 Z" fill="#22c55e" opacity="0.5"/>
      </g>

      <!-- Label -->
      <text x="1020" y="525" font-size="12" font-weight="600" font-family="Inter, sans-serif" fill="#22c55e" opacity="0.9">Talent</text>
    </g>

    <!-- Integration connectors -->
    <line x1="780" y1="460" x2="850" y2="400" stroke="#0ea5e9" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
    <line x1="850" y1="400" x2="920" y2="360" stroke="#0ea5e9" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
    <line x1="920" y1="360" x2="980" y2="420" stroke="#0ea5e9" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>

    <!-- Accent elements (8Batch spiral reference) -->
    <circle cx="730" cy="520" r="4" fill="#0ea5e9" opacity="0.6"/>
    <circle cx="755" cy="535" r="3" fill="#06b6d4" opacity="0.5"/>
    <circle cx="785" cy="545" r="3" fill="#0ea5e9" opacity="0.4"/>

    <circle cx="1080" cy="410" r="4" fill="#a855f7" opacity="0.5"/>
    <circle cx="1100" cy="440" r="3" fill="#f43f5e" opacity="0.4"/>
    <circle cx="1090" cy="475" r="3" fill="#22c55e" opacity="0.4"/>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0ea5e9" opacity="0.6"/>
    </marker>
  </defs>
</svg>