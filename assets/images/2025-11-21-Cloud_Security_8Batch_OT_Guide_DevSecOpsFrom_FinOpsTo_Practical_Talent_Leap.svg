<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security 8th OT Guide - DevSecOps to FinOps</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1530"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="450" r="200" fill="#6c5ce7" opacity="0.05" filter="url(#sg)"/>
  <circle cx="1050" cy="450" r="140" fill="#f39c12" opacity="0.05" filter="url(#sg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Topic illustrations: Career ladder with Security/DevOps/FinOps badges -->
  <g transform="translate(950,300)" opacity="0.38">
    <!-- Ladder rails -->
    <line x1="-60" y1="-130" x2="-60" y2="130" stroke="#6c5ce7" stroke-width="3"/>
    <line x1="60" y1="-130" x2="60" y2="130" stroke="#6c5ce7" stroke-width="3"/>
    <!-- Ladder rungs -->
    <line x1="-60" y1="-100" x2="60" y2="-100" stroke="#6c5ce7" stroke-width="2.5"/>
    <line x1="-60" y1="-40" x2="60" y2="-40" stroke="#6c5ce7" stroke-width="2.5"/>
    <line x1="-60" y1="20" x2="60" y2="20" stroke="#6c5ce7" stroke-width="2.5"/>
    <line x1="-60" y1="80" x2="60" y2="80" stroke="#6c5ce7" stroke-width="2.5"/>
    <!-- Badges on rungs -->
    <!-- Security badge (bottom) -->
    <rect x="70" y="65" width="90" height="30" rx="8" fill="#6c5ce7" opacity="0.2" stroke="#6c5ce7" stroke-width="1.5"/>
    <!-- DevOps badge (middle) -->
    <rect x="70" y="5" width="90" height="30" rx="8" fill="#2980b9" opacity="0.2" stroke="#2980b9" stroke-width="1.5"/>
    <!-- DevSecOps badge (upper middle) -->
    <rect x="70" y="-55" width="100" height="30" rx="8" fill="#6c5ce7" opacity="0.25" stroke="#6c5ce7" stroke-width="1.5"/>
    <!-- FinOps badge (top) -->
    <rect x="70" y="-115" width="90" height="30" rx="8" fill="#f39c12" opacity="0.2" stroke="#f39c12" stroke-width="1.5"/>
    <!-- Star at top -->
    <polygon points="0,-145 6,-130 21,-130 10,-120 14,-105 0,-114 -14,-105 -10,-120 -21,-130 -6,-130" fill="#f39c12" opacity="0.6"/>
    <!-- Arrow showing progression -->
    <path d="M-90,-60 Q-100,-20 -90,20" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5 3"/>
    <polygon points="-96,17 -90,28 -84,17" fill="#f39c12" opacity="0.7"/>
  </g>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="40" y="38" width="260" height="34" rx="17" fill="#6c5ce7" opacity="0.15" stroke="#6c5ce7" stroke-width="1"/>
  <text x="80" y="60" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#6c5ce7">NOVEMBER 21, 2025</text>
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#ffffff" filter="url(#glow)">Cloud Security 8th OT Guide</text>
  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#f39c12" filter="url(#glow)">DevSecOps to FinOps</text>
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="#94a3b8">8th batch orientation: practical DevSecOps to FinOps talent development</text>
  <line x1="80" y1="325" x2="540" y2="325" stroke="#6c5ce7" stroke-width="2" opacity="0.6"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#f39c12" letter-spacing="3">CLOUD SECURITY COURSE</text>
  <rect x="80" y="398" width="110" height="32" rx="16" fill="#6c5ce7" opacity="0.15" stroke="#6c5ce7" stroke-width="1"/>
  <text x="135" y="419" font-family="Arial,sans-serif" font-size="13" fill="#b39ef7" text-anchor="middle">DevSecOps</text>
  <rect x="204" y="398" width="80" height="32" rx="16" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="1"/>
  <text x="244" y="419" font-family="Arial,sans-serif" font-size="13" fill="#f5c860" text-anchor="middle">FinOps</text>
  <rect x="298" y="398" width="110" height="32" rx="16" fill="#6c5ce7" opacity="0.1" stroke="#6c5ce7" stroke-width="1"/>
  <text x="353" y="419" font-family="Arial,sans-serif" font-size="13" fill="#b39ef7" text-anchor="middle">8th Batch</text>
  <rect x="0" y="520" width="1200" height="110" fill="#000000" opacity="0.25"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#6c5ce7" stroke-width="1" opacity="0.3"/>
  <text x="80" y="566" font-family="Arial,sans-serif" font-size="14" fill="#64748b">tech.2twodragon.com</text>
  <text x="80" y="592" font-family="Arial,sans-serif" font-size="13" fill="#475569">DevSecOps</text>
</svg>
