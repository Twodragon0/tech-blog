  <rect x="600" y="185" width="250" height="290" rx="14" fill="url(#card3Grad)" stroke="#fbbc04" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="600" y="185" width="250" height="4" rx="2" fill="#fbbc04"/>

