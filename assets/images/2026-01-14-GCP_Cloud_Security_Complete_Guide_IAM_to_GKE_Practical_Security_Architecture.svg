    <rect x="0" y="28" width="20" height="14" rx="3" fill="none" stroke="#ea4335" stroke-width="1.5"/>
    <rect x="20" y="28" width="20" height="14" rx="3" fill="none" stroke="#ea4335" stroke-width="1.5"/>
