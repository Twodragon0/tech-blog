  <rect x="60" y="185" width="250" height="290" rx="14" fill="url(#card1Grad)" stroke="#4285f4" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="60" y="185" width="250" height="4" rx="2" fill="#4285f4"/>

  <!-- IAM icon: person with key -->
