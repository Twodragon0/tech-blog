  <circle cx="400" cy="400" r="120" fill="#ea4335" fill-opacity="0.05"/>
  <circle cx="800" cy="150" r="130" fill="#fbbc04" fill-opacity="0.05"/>
  <circle cx="1100" cy="400" r="140" fill="#34a853" fill-opacity="0.06"/>

  <!-- Top badge -->
