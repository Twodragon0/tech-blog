<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>2026 01 14 GCP Cloud Security Complete Guide IAM to GKE Practical Security Architecture</title>
  <!-- Dark Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left Side Content -->
  <!-- Title Line 1 -->
  <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white">GCP Cloud Security</text>
  <!-- Title Line 2 -->
  <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white">IAM GKE Security</text>
  
  <!-- Date Badge -->
  <rect x="60" y="290" width="280" height="45" rx="6" fill="#1a1f3a" stroke="#4a90ff" stroke-width="1.5"/>
  <text x="75" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4a90ff">JANUARY 14, 2026</text>
  
  <!-- Tag Pills -->
  <!-- Tag 1: security -->
  <rect x="60" y="420" width="90" height="32" rx="16" fill="#1a2f5a" stroke="#6ec2ff" stroke-width="1"/>
  <text x="105" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6ec2ff" text-anchor="middle">security</text>
  
  <!-- Tag 2: gcp -->
  <rect x="165" y="420" width="70" height="32" rx="16" fill="#1a2f5a" stroke="#6ec2ff" stroke-width="1"/>
  <text x="200" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6ec2ff" text-anchor="middle">gcp</text>
  
  <!-- Tag 3: kubernetes -->
  <rect x="250" y="420" width="105" height="32" rx="16" fill="#1a2f5a" stroke="#6ec2ff" stroke-width="1"/>
  <text x="302" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#6ec2ff" text-anchor="middle">kubernetes</text>
  
  <!-- Right Side Illustration -->
  <!-- Background gradient circle -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#2a5acc;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#c92a2a;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  
  <!-- Illustration background -->
  <circle cx="900" cy="315" r="280" fill="url(#bgGradient)"/>
  
  <!-- Cloud Platform (left of illustration) -->
  <path d="M 760 250 Q 720 220 740 180 Q 760 150 800 160 Q 820 140 850 150 Q 870 130 880 170 Q 900 160 910 190 Q 920 160 940 175 Q 950 150 970 170 Q 980 140 1000 160 Q 980 220 950 240 Z" fill="url(#cloudGrad)" opacity="0.9"/>
  
  <!-- Container/Pod elements (Kubernetes) -->
  <g>
    <!-- Pod 1 -->
    <rect x="750" y="310" width="80" height="80" rx="4" fill="none" stroke="#4a90ff" stroke-width="2" opacity="0.8"/>
    <circle cx="790" cy="350" r="12" fill="#4a90ff" opacity="0.7"/>
    
    <!-- Pod 2 -->
    <rect x="850" y="340" width="80" height="80" rx="4" fill="none" stroke="#4a90ff" stroke-width="2" opacity="0.8"/>
    <circle cx="890" cy="380" r="12" fill="#4a90ff" opacity="0.7"/>
    
    <!-- Pod 3 -->
    <rect x="950" y="310" width="80" height="80" rx="4" fill="none" stroke="#4a90ff" stroke-width="2" opacity="0.8"/>
    <circle cx="990" cy="350" r="12" fill="#4a90ff" opacity="0.7"/>
  </g>
  
  <!-- Central Shield (Security/IAM) -->
  <g>
    <!-- Shield shape -->
    <path d="M 900 200 L 950 220 L 950 290 Q 950 340 900 370 Q 850 340 850 290 L 850 220 Z" fill="url(#shieldGrad)" opacity="0.85"/>
    
    <!-- Lock inside shield -->
    <rect x="885" y="260" width="30" height="35" rx="3" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <path d="M 895 260 Q 895 250 905 250 Q 915 250 915 260" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <circle cx="900" cy="280" r="3" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- IAM/Key icons (top right) -->
  <g opacity="0.8">
    <!-- Key 1 -->
    <circle cx="1000" cy="240" r="6" fill="#ffd700"/>
    <rect x="1006" y="237" width="20" height="6" rx="2" fill="none" stroke="#ffd700" stroke-width="1.5"/>
    <circle cx="1020" cy="240" r="2" fill="#ffd700"/>
    
    <!-- Key 2 -->
    <circle cx="1050" cy="220" r="5" fill="#ffd700" opacity="0.7"/>
    <rect x="1055" y="218" width="18" height="5" rx="2" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  </g>
  
  <!-- Connection lines between elements -->
  <line x1="830" y1="350" x2="860" y2="320" stroke="#4a90ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="930" y1="370" x2="970" y2="380" stroke="#4a90ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,5"/>
  <line x1="950" y1="300" x2="920" y2="280" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Footer -->
  <text x="600" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#666" text-anchor="middle">tech.2twodragon.com</text>
</svg>