<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Public PCEven in Safely Passkey OTP Strong Password Management Usage</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- LEFT SIDE: Date Badge -->
  <rect x="50" y="50" width="180" height="40" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="0.5"/>
  <text x="140" y="75" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">APRIL 30, 2025</text>
  
  <!-- LEFT SIDE: Title -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#ffffff">Public PCEven</text>
  <text x="80" y="225" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#ffffff">Safely</text>
  
  <!-- LEFT SIDE: Subtitle -->
  <text x="80" y="275" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#3b82f6">Passkey OTP</text>
  <text x="80" y="315" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#3b82f6">Strong</text>
  
  <!-- LEFT SIDE: Tag Pills -->
  <rect x="50" y="420" width="100" height="32" rx="16" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="0.25"/>
  <text x="100" y="442" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">Security</text>
  
  <rect x="160" y="420" width="110" height="32" rx="16" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.25"/>
  <text x="215" y="442" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">Authentication</text>
  
  <rect x="280" y="420" width="100" height="32" rx="16" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.25"/>
  <text x="330" y="442" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">Passkeys</text>
  
  <!-- LEFT SIDE: Footer -->
  <text x="80" y="565" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE: Security Shield with Lock -->
  <g opacity="0.12">
    <!-- Main shield outline -->
    <path d="M 850 120 L 950 120 L 950 220 Q 950 280 850 300 Q 750 280 750 220 L 750 120 Z" fill="none" stroke="#3b82f6" stroke-width="0.3"/>
    
    <!-- Circuit pattern inside shield -->
    <circle cx="850" cy="180" r="35" fill="none" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="850" cy="180" r="25" fill="none" stroke="#3b82f6" stroke-width="0.15"/>
    
    <!-- Lock shape -->
    <rect x="830" y="165" width="40" height="35" rx="3" fill="none" stroke="#3b82f6" stroke-width="0.3"/>
    <path d="M 835 165 Q 835 150 850 150 Q 865 150 865 165" fill="none" stroke="#3b82f6" stroke-width="0.3"/>
    <circle cx="850" cy="182" r="4" fill="none" stroke="#3b82f6" stroke-width="0.2"/>
  </g>
  
  <!-- RIGHT SIDE: Data Flow Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.12"/>
    </marker>
  </defs>
  
  <!-- Arrow 1: horizontal flow -->
  <path d="M 700 240 L 780 240" stroke="#f59e0b" stroke-width="0.3" fill="none" opacity="0.12" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow 2: diagonal flow -->
  <path d="M 920 240 L 980 300" stroke="#f59e0b" stroke-width="0.3" fill="none" opacity="0.12" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow 3: return flow -->
  <path d="M 720 320 L 900 320" stroke="#3b82f6" stroke-width="0.3" fill="none" opacity="0.12" marker-end="url(#arrowhead)"/>
  
  <!-- RIGHT SIDE: Warning Triangle -->
  <g opacity="0.12">
    <polygon points="1050,130 1090,210 1010,210" fill="none" stroke="#ef4444" stroke-width="0.3"/>
    <circle cx="1050" cy="165" r="2" fill="#ef4444" opacity="0.3"/>
    <line x1="1050" y1="150" x2="1050" y2="170" stroke="#ef4444" stroke-width="0.2"/>
  </g>
  
  <!-- RIGHT SIDE: Key/Check Icon -->
  <g opacity="0.12">
    <circle cx="950" cy="380" r="25" fill="none" stroke="#3b82f6" stroke-width="0.3"/>
    <line x1="955" y1="375" x2="970" y2="360" stroke="#3b82f6" stroke-width="0.25"/>
    <path d="M 925 380 L 945 395 L 960 375" fill="none" stroke="#3b82f6" stroke-width="0.25"/>
  </g>
  
  <!-- RIGHT SIDE: Checkmark in circle -->
  <g opacity="0.12">
    <circle cx="800" cy="380" r="25" fill="none" stroke="#f59e0b" stroke-width="0.3"/>
    <path d="M 795 385 L 805 395 L 820 375" fill="none" stroke="#f59e0b" stroke-width="0.25" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- RIGHT SIDE: Network nodes with connections -->
  <circle cx="750" cy="460" r="12" fill="none" stroke="#ef4444" stroke-width="0.25" opacity="0.12"/>
  <circle cx="850" cy="470" r="12" fill="none" stroke="#3b82f6" stroke-width="0.25" opacity="0.12"/>
  <circle cx="950" cy="460" r="12" fill="none" stroke="#f59e0b" stroke-width="0.25" opacity="0.12"/>
  
  <line x1="762" y1="452" x2="838" y2="462" stroke="#3b82f6" stroke-width="0.2" opacity="0.08"/>
  <line x1="862" y1="478" x2="938" y2="468" stroke="#f59e0b" stroke-width="0.2" opacity="0.08"/>
  <line x1="760" y1="472" x2="940" y2="472" stroke="#ef4444" stroke-width="0.15" opacity="0.08" stroke-dasharray="2,2"/>
  
  <!-- RIGHT SIDE: Subtle grid background pattern -->
  <g opacity="0.03" stroke="#3b82f6" stroke-width="0.15">
    <line x1="650" y1="80" x2="650" y2="550"/>
    <line x1="750" y1="80" x2="750" y2="550"/>
    <line x1="850" y1="80" x2="850" y2="550"/>
    <line x1="950" y1="80" x2="950" y2="550"/>
    <line x1="1050" y1="80" x2="1050" y2="550"/>
    <line x1="1150" y1="80" x2="1150" y2="550"/>
    <line x1="650" y1="150" x2="1150" y2="150"/>
    <line x1="650" y1="250" x2="1150" y2="250"/>
    <line x1="650" y1="350" x2="1150" y2="350"/>
    <line x1="650" y1="450" x2="1150" y2="450"/>
  </g>
</svg>