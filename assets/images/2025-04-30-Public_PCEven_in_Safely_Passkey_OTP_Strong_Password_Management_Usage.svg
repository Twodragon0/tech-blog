<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e84393"/>
      <stop offset="50%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e84393"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e84393;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Shield + Lock + Fingerprint + OTP Pad -->
  <!-- Outer shield shape -->
  <path d="M1010,130 L1130,160 L1130,260 Q1130,320 1010,350 Q890,320 890,260 L890,160 Z"
        fill="url(#shieldGrad)" stroke="rgba(232,67,147,0.25)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,148 L1112,172 L1112,258 Q1112,308 1010,334 Q908,308 908,258 L908,172 Z"
        fill="none" stroke="rgba(232,67,147,0.15)" stroke-width="1"/>

  <!-- Shield checkmark / lock body -->
  <rect x="985" y="208" width="50" height="44" rx="6"
        fill="rgba(232,67,147,0.10)" stroke="rgba(232,67,147,0.35)" stroke-width="1.5"/>
  <!-- Lock shackle -->
  <path d="M994,208 Q994,188 1010,188 Q1026,188 1026,208"
        fill="none" stroke="rgba(232,67,147,0.40)" stroke-width="2" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="1010" cy="226" r="5" fill="rgba(232,67,147,0.50)"/>
  <rect x="1007" y="228" width="6" height="10" rx="2" fill="rgba(232,67,147,0.50)"/>

  <!-- Fingerprint arcs around shield -->
  <path d="M958,230 Q958,180 1010,175 Q1062,180 1062,230"
        fill="none" stroke="rgba(200,100,220,0.20)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M942,240 Q942,162 1010,155 Q1078,162 1078,240"
        fill="none" stroke="rgba(200,100,220,0.13)" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- Passkey device icon (phone) -->
  <rect x="900" y="155" width="36" height="60" rx="5"
        fill="rgba(232,67,147,0.08)" stroke="rgba(232,67,147,0.30)" stroke-width="1.2"/>
  <line x1="900" y1="170" x2="936" y2="170" stroke="rgba(232,67,147,0.25)" stroke-width="1"/>
  <line x1="900" y1="202" x2="936" y2="202" stroke="rgba(232,67,147,0.25)" stroke-width="1"/>
  <circle cx="918" cy="210" r="3" fill="rgba(232,67,147,0.35)"/>
  <!-- Small wifi/signal on phone -->
  <path d="M912,181 Q918,176 924,181" fill="none" stroke="rgba(232,67,147,0.40)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M909,185 Q918,178 927,185" fill="none" stroke="rgba(232,67,147,0.25)" stroke-width="1" stroke-linecap="round"/>

  <!-- OTP digits panel -->
  <rect x="1075" y="150" width="62" height="40" rx="4"
        fill="rgba(243,156,18,0.08)" stroke="rgba(243,156,18,0.30)" stroke-width="1.2"/>
  <text x="1082" y="175" font-family="monospace" font-size="13" fill="rgba(243,156,18,0.70)" letter-spacing="2">•••</text>
  <rect x="1075" y="200" width="62" height="18" rx="3"
        fill="rgba(243,156,18,0.12)" stroke="rgba(243,156,18,0.25)" stroke-width="1"/>
  <rect x="1083" y="204" width="8" height="10" rx="1" fill="rgba(243,156,18,0.40)"/>
  <rect x="1097" y="204" width="8" height="10" rx="1" fill="rgba(243,156,18,0.40)"/>
  <rect x="1111" y="204" width="8" height="10" rx="1" fill="rgba(243,156,18,0.40)"/>

  <!-- Public PC monitor icon -->
  <rect x="900" y="245" width="56" height="40" rx="4"
        fill="rgba(100,180,255,0.08)" stroke="rgba(100,180,255,0.28)" stroke-width="1.2"/>
  <rect x="924" y="285" width="8" height="12" rx="1" fill="rgba(100,180,255,0.20)"/>
  <rect x="916" y="297" width="24" height="4" rx="1" fill="rgba(100,180,255,0.20)"/>
  <!-- Screen content lines -->
  <line x1="908" y1="258" x2="948" y2="258" stroke="rgba(100,180,255,0.30)" stroke-width="1"/>
  <line x1="908" y1="265" x2="940" y2="265" stroke="rgba(100,180,255,0.20)" stroke-width="1"/>
  <!-- Warning X on screen -->
  <line x1="930" y1="272" x2="938" y2="280" stroke="rgba(232,67,147,0.50)" stroke-width="1.5"/>
  <line x1="938" y1="272" x2="930" y2="280" stroke="rgba(232,67,147,0.50)" stroke-width="1.5"/>

  <!-- Key shape -->
  <circle cx="1095" cy="265" r="11" fill="url(#keyGrad)" stroke="rgba(243,156,18,0.35)" stroke-width="1.5"/>
  <circle cx="1095" cy="265" r="5" fill="none" stroke="rgba(243,156,18,0.50)" stroke-width="1.2"/>
  <rect x="1104" y="263" width="22" height="5" rx="2" fill="rgba(243,156,18,0.30)" stroke="rgba(243,156,18,0.35)" stroke-width="1"/>
  <rect x="1120" y="268" width="5" height="5" rx="1" fill="rgba(243,156,18,0.35)"/>
  <rect x="1113" y="268" width="4" height="5" rx="1" fill="rgba(243,156,18,0.35)"/>

  <!-- Connection lines between elements -->
  <line x1="936" y1="186" x2="958" y2="220" stroke="rgba(232,67,147,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1075" y1="170" x2="1062" y2="210" stroke="rgba(243,156,18,0.15)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1095" y1="276" x2="1062" y2="290" stroke="rgba(243,156,18,0.12)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(232,67,147,0.55)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(243,156,18,0.45)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(100,180,255,0.40)"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(232,67,147,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(232,67,147,0.06)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(232,67,147,0.15)" stroke="rgba(232,67,147,0.30)" stroke-width="1"/>
  <text x="90" y="81" font-family="'Courier New', monospace" font-size="12" fill="rgba(232,67,147,0.90)" letter-spacing="1">APRIL 30, 2025</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white">Public PCEven Safely Passkey</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white">OTP Strong Password Management</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Secure authentication on shared devices — security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" fill="rgba(232,67,147,0.80)" letter-spacing="2" font-weight="600">SECURITY / AUTHENTICATION</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="100" height="36" rx="18" fill="rgba(232,67,147,0.18)" stroke="rgba(232,67,147,0.40)" stroke-width="1"/>
  <text x="130" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="rgba(232,67,147,0.90)" text-anchor="middle" font-weight="600">PASSKEY</text>

  <rect x="196" y="402" width="80" height="36" rx="18" fill="rgba(243,156,18,0.15)" stroke="rgba(243,156,18,0.38)" stroke-width="1"/>
  <text x="236" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="rgba(243,156,18,0.90)" text-anchor="middle" font-weight="600">OTP</text>

  <rect x="292" y="402" width="110" height="36" rx="18" fill="rgba(100,180,255,0.12)" stroke="rgba(100,180,255,0.32)" stroke-width="1"/>
  <text x="347" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="12" fill="rgba(100,180,255,0.85)" text-anchor="middle" font-weight="600">PUBLIC PC</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.30)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" fill="rgba(232,67,147,0.45)" text-anchor="end" letter-spacing="1" font-weight="600">SECURITY</text>
</svg>