<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left Section: Title &amp; Metadata -->
  <g>
    <!-- Title Line 1 -->
    <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#ffffff">
      Public PC &amp; Passkey
    </text>
    
    <!-- Title Line 2 -->
    <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#ffffff">
      OTP Strong Security
    </text>
    
    <!-- Date Badge -->
    <rect x="60" y="280" width="220" height="42" rx="6" fill="#1e2139" stroke="#4a5568" stroke-width="1"/>
    <text x="70" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#a0aec0">
      APRIL 30, 2025
    </text>
    
    <!-- Tag Pills -->
    <g>
      <!-- Tag 1: Security -->
      <rect x="60" y="420" width="100" height="32" rx="16" fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" stroke-width="1.5"/>
      <text x="110" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#fca5a5" text-anchor="middle">
        Security
      </text>
      
      <!-- Tag 2: Authentication -->
      <rect x="175" y="420" width="130" height="32" rx="16" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="240" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#93c5fd" text-anchor="middle">
        Authentication
      </text>
      
      <!-- Tag 3: Passkey -->
      <rect x="320" y="420" width="110" height="32" rx="16" fill="rgba(34, 197, 94, 0.15)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="375" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#86efac" text-anchor="middle">
        Passkey
      </text>
    </g>
    
    <!-- Footer -->
    <text x="60" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#718096">
      tech.2twodragon.com
    </text>
  </g>
  
  <!-- Right Section: Illustration -->
  <g>
    <!-- Background Accent Circle -->
    <circle cx="920" cy="315" r="280" fill="rgba(59, 130, 246, 0.08)"/>
    
    <!-- Layer 1: Shield Base -->
    <g transform="translate(920, 260)">
      <path d="M 0 -80 L 60 -60 L 60 20 C 60 60 0 100 0 100 C 0 100 -60 60 -60 20 L -60 -60 Z" 
            fill="#3b82f6" opacity="0.9"/>
      <path d="M 0 -80 L 60 -60 L 60 20 C 60 60 0 100 0 100 C 0 100 -60 60 -60 20 L -60 -60 Z" 
            fill="none" stroke="#60a5fa" stroke-width="2"/>
    </g>
    
    <!-- Layer 2: Padlock -->
    <g transform="translate(920, 315)">
      <!-- Lock Body -->
      <rect x="-25" y="-5" width="50" height="55" rx="3" fill="#22c55e" opacity="0.85"/>
      <!-- Lock Shackle -->
      <path d="M -15 -5 Q -15 -35 0 -35 Q 15 -35 15 -5" 
            fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
      <!-- Lock Keyhole -->
      <circle cx="0" cy="15" r="6" fill="#0a0c1a"/>
      <rect x="-2" y="25" width="4" height="15" fill="#0a0c1a"/>
    </g>
    
    <!-- Layer 3: Key Symbol -->
    <g transform="translate(800, 360)">
      <!-- Key shaft -->
      <line x1="0" y1="0" x2="50" y2="0" stroke="#ef4444" stroke-width="6" stroke-linecap="round"/>
      <!-- Key head -->
      <circle cx="0" cy="0" r="12" fill="none" stroke="#ef4444" stroke-width="6"/>
      <!-- Key teeth -->
      <rect x="35" y="-4" width="5" height="8" fill="#ef4444"/>
      <rect x="45" y="-4" width="5" height="8" fill="#ef4444"/>
    </g>
    
    <!-- Layer 4: OTP Code Display -->
    <g transform="translate(1000, 320)">
      <!-- Code Box -->
      <rect x="-45" y="-30" width="90" height="60" rx="4" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="2"/>
      <!-- Numbers -->
      <text x="0" y="10" font-family="monospace" font-size="28" font-weight="700" fill="#22c55e" text-anchor="middle">
        837492
      </text>
      <!-- Timer indicator -->
      <circle cx="-30" cy="-15" r="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
      <path d="M -30 -23 A 8 8 0 0 1 -22 -15" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    
    <!-- Layer 5: Encryption Waves -->
    <g opacity="0.6">
      <path d="M 750 250 Q 850 240 950 250" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5"/>
      <path d="M 750 380 Q 850 390 950 380" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5"/>
      <path d="M 800 200 Q 900 190 1000 200" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.7"/>
      <path d="M 800 430 Q 900 440 1000 430" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.7"/>
    </g>
    
    <!-- Layer 6: Checkmark for Verified -->
    <g transform="translate(1050, 240)">
      <circle cx="0" cy="0" r="18" fill="rgba(34, 197, 94, 0.3)" stroke="#22c55e" stroke-width="2"/>
      <path d="M -8 0 L -2 6 L 8 -4" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>