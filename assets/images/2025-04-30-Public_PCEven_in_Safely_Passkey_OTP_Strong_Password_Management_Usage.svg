  <text x="236" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#3498db" text-anchor="middle" font-weight="600">OTP</text>
  <rect x="292" y="420" width="110" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
