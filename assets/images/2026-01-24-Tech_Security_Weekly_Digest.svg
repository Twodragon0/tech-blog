<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a10"/>
      <stop offset="100%" style="stop-color:#2d1520"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#3498db"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="200" fill="rgba(192,57,43,0.07)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(52,152,219,0.06)"/>
  <!-- FBI badge -->
  <circle cx="880" cy="280" r="45" fill="rgba(52,152,219,0.1)" stroke="#3498db" stroke-width="2.5" opacity="0.8"/>
  <circle cx="880" cy="280" r="32" fill="none" stroke="rgba(52,152,219,0.5)" stroke-width="1.5"/>
  <text x="880" y="277" font-family="Arial,sans-serif" font-size="11" fill="#3498db" text-anchor="middle" font-weight="700">FBI</text>
  <text x="880" y="292" font-family="Arial,sans-serif" font-size="8" fill="rgba(52,152,219,0.7)" text-anchor="middle">ALERT</text>
  <!-- Network route leak diagram -->
  <circle cx="1060" cy="255" r="15" fill="rgba(52,152,219,0.15)" stroke="#3498db" stroke-width="1.5"/>
  <circle cx="1100" cy="285" r="15" fill="rgba(192,57,43,0.15)" stroke="#c0392b" stroke-width="1.5"/>
  <circle cx="1060" cy="315" r="15" fill="rgba(52,152,219,0.15)" stroke="#3498db" stroke-width="1.5"/>
  <line x1="1075" y1="255" x2="1085" y2="285" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="1085" y1="285" x2="1075" y2="315" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Leak arrow -->
  <path d="M1100 285 Q1130 285 1140 310" fill="none" stroke="rgba(192,57,43,0.6)" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="1137,313 1145,317 1143,307" fill="rgba(192,57,43,0.6)"/>
  <text x="1120" y="280" font-family="Arial,sans-serif" font-size="9" fill="rgba(192,57,43,0.7)">BGP LEAK</text>
