  <rect x="80" y="44" width="240" height="34" rx="17" fill="rgba(192,57,43,0.15)" stroke="rgba(192,57,43,0.4)" stroke-width="1"/>
  <text x="200" y="66" font-family="Arial,sans-serif" font-size="13" fill="#c0392b" text-anchor="middle" letter-spacing="2">JANUARY 24, 2026</text>
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="42" font-weight="700" fill="#ffffff">BitLocker FBI Alert</text>
