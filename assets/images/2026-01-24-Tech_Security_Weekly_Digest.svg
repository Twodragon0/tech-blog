  <rect x="80" y="320" width="120" height="3" rx="2" fill="url(#accent)"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="15" fill="rgba(192,57,43,0.8)" letter-spacing="3">SECURITY WEEKLY DIGEST</text>
  <rect x="80" y="400" width="95" height="28" rx="14" fill="rgba(192,57,43,0.15)" stroke="rgba(192,57,43,0.4)" stroke-width="1"/>
  <text x="127" y="419" font-family="Arial,sans-serif" font-size="13" fill="#c0392b" text-anchor="middle">BitLocker</text>
  <rect x="187" y="400" width="90" height="28" rx="14" fill="rgba(52,152,219,0.15)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <text x="232" y="419" font-family="Arial,sans-serif" font-size="13" fill="#3498db" text-anchor="middle">FBI Alert</text>
  <rect x="289" y="400" width="100" height="28" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="339" y="419" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">Cloudflare</text>
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="615" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">tech.2twodragon.com</text>
  <text x="1120" y="615" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="end">DevSecOps</text>
