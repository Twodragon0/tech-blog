<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <title>2026 01 24 Tech Security Weekly Digest</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="50%" style="stop-color:#f6ad55"/>
      <stop offset="100%" style="stop-color:#4299e1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#9b2c2c;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6ad55;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#c05621;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Security shield with BitLocker lock, FBI badge, and Cloudflare route -->
  <!-- Outer shield body -->
  <path d="M1010,140 L1130,140 L1130,240 Q1130,305 1070,330 Q1010,305 1010,240 Z" fill="url(#shieldGrad)" stroke="rgba(229,62,62,0.3)" stroke-width="1.5"/>
  <!-- Inner shield ring -->
  <path d="M1022,152 L1118,152 L1118,240 Q1118,295 1070,316 Q1022,295 1022,240 Z" fill="none" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>

  <!-- Lock body (BitLocker) -->
  <rect x="1052" y="210" width="36" height="30" rx="4" fill="rgba(246,173,85,0.12)" stroke="rgba(246,173,85,0.35)" stroke-width="1.5"/>
  <!-- Lock shackle -->
  <path d="M1059,210 L1059,200 Q1059,188 1070,188 Q1081,188 1081,200 L1081,210" fill="none" stroke="rgba(246,173,85,0.35)" stroke-width="1.5"/>
  <!-- Lock keyhole -->
  <circle cx="1070" cy="223" r="5" fill="rgba(246,173,85,0.2)" stroke="rgba(246,173,85,0.4)" stroke-width="1"/>
  <rect x="1068" y="223" width="4" height="8" rx="1" fill="rgba(246,173,85,0.2)"/>

