  <rect x="872" y="358" width="16" height="18" rx="2" fill="rgba(192,57,43,0.3)"/>
  <text x="880" y="405" font-family="Arial,sans-serif" font-size="9" fill="rgba(192,57,43,0.7)" text-anchor="middle">BitLocker FBI</text>
