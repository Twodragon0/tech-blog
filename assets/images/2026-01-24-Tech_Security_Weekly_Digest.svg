  <polygon points="1070,155 1074,165 1085,165 1076,172 1079,183 1070,176 1061,183 1064,172 1055,165 1066,165" fill="rgba(66,153,225,0.08)" stroke="rgba(66,153,225,0.3)" stroke-width="1.2"/>
  <!-- Badge center -->
  <circle cx="1070" cy="169" r="6" fill="rgba(66,153,225,0.1)" stroke="rgba(66,153,225,0.25)" stroke-width="1"/>

  <!-- Cloudflare route lines -->
  <circle cx="920" cy="160" r="12" fill="rgba(246,173,85,0.08)" stroke="rgba(246,173,85,0.25)" stroke-width="1.2"/>
  <circle cx="920" cy="200" r="8" fill="rgba(246,173,85,0.06)" stroke="rgba(246,173,85,0.2)" stroke-width="1"/>
  <circle cx="920" cy="232" r="10" fill="rgba(246,173,85,0.08)" stroke="rgba(246,173,85,0.22)" stroke-width="1.2"/>
  <!-- Route connecting lines -->
  <line x1="920" y1="172" x2="920" y2="192" stroke="rgba(246,173,85,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="920" y1="208" x2="920" y2="222" stroke="rgba(246,173,85,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Route to shield -->
  <line x1="932" y1="196" x2="1010" y2="210" stroke="rgba(246,173,85,0.15)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Decorative hexagonal frame around illustration -->
  <polygon points="1070,130 1145,172 1145,258 1070,300 995,258 995,172" fill="none" stroke="rgba(229,62,62,0.08)" stroke-width="1"/>
  <polygon points="1070,118 1158,165 1158,270 1070,316 982,270 982,165" fill="none" stroke="rgba(229,62,62,0.05)" stroke-width="1"/>

  <!-- Scan lines over illustration -->
  <line x1="995" y1="195" x2="1145" y2="195" stroke="rgba(229,62,62,0.06)" stroke-width="0.8"/>
  <line x1="995" y1="220" x2="1145" y2="220" stroke="rgba(229,62,62,0.06)" stroke-width="0.8"/>
  <line x1="995" y1="245" x2="1145" y2="245" stroke="rgba(229,62,62,0.06)" stroke-width="0.8"/>

  <!-- Small decorative data nodes -->
  <circle cx="1015" cy="165" r="3" fill="rgba(229,62,62,0.25)" stroke="rgba(229,62,62,0.4)" stroke-width="0.8"/>
  <circle cx="1125" cy="165" r="3" fill="rgba(66,153,225,0.25)" stroke="rgba(66,153,225,0.4)" stroke-width="0.8"/>
  <circle cx="1015" cy="285" r="3" fill="rgba(66,153,225,0.25)" stroke="rgba(66,153,225,0.4)" stroke-width="0.8"/>
  <circle cx="1125" cy="285" r="3" fill="rgba(229,62,62,0.25)" stroke="rgba(229,62,62,0.4)" stroke-width="0.8"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.6)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(246,173,85,0.6)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(66,153,225,0.6)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="230" height="32" rx="4" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.3)" stroke-width="1"/>
  <text x="95" y="81" font-family="monospace, 'Courier New'" font-size="13" fill="rgba(255,255,255,0.85)" letter-spacing="1">JANUARY 24, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="white">BitLocker FBI Cloudflare Route</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Weekly security intelligence · Threat analysis &amp; advisories</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="3" font-weight="600">SECURITY DIGEST · THREAT INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="140" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,100,100,0.95)" text-anchor="middle" font-weight="600">BitLocker</text>

  <rect x="214" y="402" width="96" height="36" rx="18" fill="rgba(246,173,85,0.15)" stroke="rgba(246,173,85,0.4)" stroke-width="1"/>
  <text x="262" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(246,173,85,0.95)" text-anchor="middle" font-weight="600">FBI</text>

  <rect x="324" y="402" width="130" height="36" rx="18" fill="rgba(66,153,225,0.15)" stroke="rgba(66,153,225,0.4)" stroke-width="1"/>
  <text x="389" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(100,180,255,0.95)" text-anchor="middle" font-weight="600">Cloudflare</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="monospace, 'Courier New'" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end" letter-spacing="2">SECURITY</text>
</svg>