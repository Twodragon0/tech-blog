<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left side content area -->
  <g id="left-content">
    <!-- Date badge -->
    <rect x="60" y="40" width="220" height="48" rx="6" fill="#1e1f2e" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
    <text x="170" y="72" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#3b82f6" letter-spacing="1">JANUARY 14, 2026</text>

    <!-- Main title -->
    <text x="80" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="-1.2">CSPM DataDog</text>
    <text x="80" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="-1.2">AWS Security</text>

    <!-- Subtitle -->
    <text x="80" y="320" font-family="Arial, sans-serif" font-size="24" font-weight="500" fill="#b0b5c0" opacity="0.8">Automated Security</text>

    <!-- Tag pills -->
    <g id="tags">
      <!-- Tag 1: SECURITY -->
      <rect x="80" y="420" width="120" height="36" rx="18" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
      <text x="140" y="445" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ef4444">SECURITY</text>

      <!-- Tag 2: AWS -->
      <rect x="220" y="420" width="100" height="36" rx="18" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="270" y="445" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#f59e0b">AWS</text>

      <!-- Tag 3: AUTOMATION -->
      <rect x="340" y="420" width="140" height="36" rx="18" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="410" y="445" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#3b82f6">AUTOMATION</text>
    </g>

    <!-- Footer -->
    <text x="80" y="585" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#6b7280" opacity="0.7">tech.2twodragon.com</text>
  </g>

  <!-- Right side visual scene -->
  <g id="right-visual">
    <!-- Background accent circles -->
    <circle cx="900" cy="315" r="200" fill="#3b82f6" opacity="0.03"/>
    <circle cx="950" cy="280" r="150" fill="#ef4444" opacity="0.03"/>

    <!-- Cloud shape at top -->
    <g id="cloud">
      <ellipse cx="850" cy="150" rx="80" ry="50" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2"/>
      <circle cx="800" cy="160" r="35" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2"/>
      <circle cx="900" cy="160" r="40" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2"/>
      <!-- Cloud detail lines -->
      <line x1="820" y1="200" x2="820" y2="240" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
      <line x1="880" y1="200" x2="880" y2="240" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
    </g>

    <!-- Data flow arrows from cloud -->
    <defs>
      <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.4"/>
      </marker>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.4"/>
      </marker>
      <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.4"/>
      </marker>
    </defs>

    <!-- Arrow left from cloud to shield -->
    <path d="M 770,220 Q 700,260 650,280" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.4" marker-end="url(#arrowBlue)" stroke-dasharray="5,5"/>

    <!-- Arrow right from cloud to database -->
    <path d="M 930,220 Q 980,260 1000,300" stroke="#f59e0b" stroke-width="2.5" fill="none" opacity="0.4" marker-end="url(#arrowOrange)" stroke-dasharray="5,5"/>

    <!-- Large shield with checkmark (security/compliance) -->
    <g id="shield">
      <!-- Shield outline -->
      <path d="M 620,260 L 620,340 Q 620,420 660,460 L 700,500 L 740,460 Q 780,420 780,340 L 780,260 Z"
            fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>

      <!-- Checkmark inside shield -->
      <path d="M 640,360 L 680,390 L 750,320"
            fill="none" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </g>

    <!-- Database cylinder (right side) -->
    <g id="database">
      <ellipse cx="1000" cy="310" rx="45" ry="25" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="2"/>
      <rect x="955" y="310" width="90" height="70" fill="#f59e0b" opacity="0.06" stroke="#f59e0b" stroke-width="2"/>
      <ellipse cx="1000" cy="380" rx="45" ry="25" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="2"/>

      <!-- Warning icons on database -->
      <circle cx="1030" cy="330" r="12" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
      <text x="1030" y="336" font-size="16" font-weight="bold" text-anchor="middle" fill="#ef4444" opacity="0.6">!</text>

      <circle cx="970" cy="360" r="10" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
      <text x="970" y="365" font-size="14" font-weight="bold" text-anchor="middle" fill="#ef4444" opacity="0.6">!</text>
    </g>

    <!-- Arrow from shield to database -->
    <path d="M 780,380 Q 880,380 955,360" stroke="#ef4444" stroke-width="2.5" fill="none" opacity="0.4" marker-end="url(#arrowRed)" stroke-dasharray="5,5"/>

    <!-- Warning triangles scattered -->
    <!-- Triangle 1 - top right -->
    <g id="warning1">
      <circle cx="1080" cy="200" r="20" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
      <polygon points="1080,185 1090,215 1070,215" fill="#ef4444" opacity="0.5"/>
      <text x="1080" y="210" font-size="12" font-weight="bold" text-anchor="middle" fill="#ef4444" opacity="0.6">!</text>
    </g>

    <!-- Triangle 2 - middle right -->
    <g id="warning2">
      <circle cx="1100" cy="300" r="18" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
      <polygon points="1100,287 1108,315 1092,315" fill="#ef4444" opacity="0.5"/>
      <text x="1100" y="320" font-size="11" font-weight="bold" text-anchor="middle" fill="#ef4444" opacity="0.6">!</text>
    </g>

    <!-- Triangle 3 - bottom -->
    <g id="warning3">
      <circle cx="900" cy="480" r="16" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
      <polygon points="900,469 907,495 893,495" fill="#ef4444" opacity="0.5"/>
      <text x="900" y="498" font-size="10" font-weight="bold" text-anchor="middle" fill="#ef4444" opacity="0.6">!</text>
    </g>

    <!-- Central connection node -->
    <circle cx="750" cy="350" r="8" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="750" cy="350" r="4" fill="#3b82f6" opacity="0.5"/>

    <!-- Additional data flow accent line -->
    <path d="M 700,280 L 750,350 L 800,420" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.25" stroke-dasharray="3,3"/>
  </g>

  <!-- Subtle grid pattern overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.02"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
</svg>