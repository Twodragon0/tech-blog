    <line x1="10" y1="24" x2="34" y2="24" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="34" x2="24" y2="34" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
