  <text x="88" y="396" fill="#d8b4fe" font-family="Arial, sans-serif" font-size="12">- Security findings view</text>
  <text x="88" y="414" fill="#d8b4fe" font-family="Arial, sans-serif" font-size="12">- Resource inventory</text>
