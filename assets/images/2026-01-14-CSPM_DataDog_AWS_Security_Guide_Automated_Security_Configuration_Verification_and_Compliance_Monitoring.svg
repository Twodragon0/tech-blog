<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#dd2222"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff5533;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3300;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4400;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#aa2200;stop-opacity:0.07"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: CSPM/AWS Security Shield with DataDog Eye -->
  <!-- Outer shield body -->
  <path d="M1010,135 L1130,165 L1130,255 Q1130,320 1010,345 Q890,320 890,255 L890,165 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,80,20,0.3)" stroke-width="1.5"/>

  <!-- Shield inner ring -->
  <path d="M1010,155 L1110,180 L1110,255 Q1110,308 1010,328 Q910,308 910,255 L910,180 Z"
        fill="none" stroke="rgba(255,120,40,0.2)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- AWS Cloud shape inside shield -->
  <ellipse cx="1010" cy="238" rx="62" ry="32" fill="rgba(255,153,51,0.09)" stroke="rgba(255,153,51,0.3)" stroke-width="1.2"/>
  <ellipse cx="978" cy="225" rx="30" ry="22" fill="rgba(255,153,51,0.08)" stroke="rgba(255,153,51,0.25)" stroke-width="1"/>
  <ellipse cx="1042" cy="222" rx="28" ry="20" fill="rgba(255,153,51,0.08)" stroke="rgba(255,153,51,0.25)" stroke-width="1"/>

  <!-- DataDog eye/scan symbol -->
  <ellipse cx="1010" cy="237" rx="22" ry="14" fill="none" stroke="rgba(100,200,255,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="237" r="7" fill="rgba(100,200,255,0.12)" stroke="rgba(100,200,255,0.5)" stroke-width="1.2"/>
  <circle cx="1010" cy="237" r="3" fill="rgba(100,200,255,0.35)"/>

  <!-- Scan lines through eye -->
  <line x1="985" y1="237" x2="1035" y2="237" stroke="rgba(100,200,255,0.2)" stroke-width="0.8"/>
  <line x1="1010" y1="220" x2="1010" y2="255" stroke="rgba(100,200,255,0.15)" stroke-width="0.8"/>

  <!-- CSPM check marks on shield -->
  <polyline points="955,275 963,283 978,265" fill="none" stroke="rgba(80,255,150,0.45)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="1000,278 1008,286 1023,268" fill="none" stroke="rgba(80,255,150,0.35)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="1042,275 1050,283 1065,265" fill="none" stroke="rgba(80,255,150,0.3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Orbiting dot indicators (security checks) -->
  <circle cx="1010" cy="143" r="5" fill="rgba(255,80,20,0.12)" stroke="rgba(255,80,20,0.4)" stroke-width="1.2"/>
  <circle cx="1112" cy="200" r="4" fill="rgba(255,153,51,0.12)" stroke="rgba(255,153,51,0.4)" stroke-width="1.1"/>
  <circle cx="908" cy="200" r="4" fill="rgba(100,200,255,0.1)" stroke="rgba(100,200,255,0.35)" stroke-width="1.1"/>
  <circle cx="1095" cy="310" r="3.5" fill="rgba(80,255,150,0.1)" stroke="rgba(80,255,150,0.35)" stroke-width="1"/>
  <circle cx="925" cy="308" r="3.5" fill="rgba(80,255,150,0.1)" stroke="rgba(80,255,150,0.35)" stroke-width="1"/>

  <!-- Connecting dashed orbit arc -->
  <ellipse cx="1010" cy="237" rx="100" ry="95" fill="none" stroke="rgba(255,100,30,0.08)" stroke-width="1" stroke-dasharray="5,6"/>

  <!-- Automated scan pulse rings -->
  <circle cx="1010" cy="237" r="38" fill="none" stroke="rgba(255,80,20,0.1)" stroke-width="1"/>
  <circle cx="1010" cy="237" r="55" fill="none" stroke="rgba(255,80,20,0.07)" stroke-width="1"/>

  <!-- Shield top badge: lock icon -->
  <rect x="1002" y="137" width="16" height="12" rx="3" fill="none" stroke="rgba(255,80,20,0.45)" stroke-width="1.2"/>
  <rect x="1006" y="143" width="8" height="6" rx="1" fill="rgba(255,80,20,0.2)"/>
  <circle cx="1010" cy="132" r="6" fill="none" stroke="rgba(255,80,20,0.4)" stroke-width="1.2"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,60,30,0.6)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,140,30,0.5)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,60,30,0.4)"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,60,20,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,60,20,0.05)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentGrad)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(255,80,20,0.25)" stroke-width="1"/>
  <text x="94" y="81" font-family="'Courier New',monospace" font-size="12" font-weight="600" fill="rgba(255,160,80,0.9)" letter-spacing="1.2">JANUARY 14, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">CSPM DataDog AWS Security</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="38" font-weight="700" fill="rgba(255,255,255,0.92)" letter-spacing="-0.5">Automated Security Setup</text>
  <text x="80" y="293" font-family="'Arial',sans-serif" font-size="38" font-weight="700" fill="rgba(255,255,255,0.88)" letter-spacing="-0.5">Verification</text>

  <!-- Subtitle -->
  <text x="80" y="335" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,160,80,0.8)">Cloud Security Posture Management  |  Automated Compliance Monitoring</text>

  <!-- Accent line -->
  <rect x="80" y="355" width="420" height="3" rx="1.5" fill="url(#lineGrad)"/>

  <!-- Category label -->
  <text x="80" y="390" font-family="'Arial',sans-serif" font-size="14" font-weight="600" fill="rgba(255,100,50,0.75)" letter-spacing="2.5">SECURITY  /  DEVSECOPS  /  CLOUD</text>

  <!-- Tag pills -->
  <rect x="80" y="412" width="110" height="36" rx="18" fill="rgba(220,40,20,0.18)" stroke="rgba(220,40,20,0.45)" stroke-width="1.2"/>
  <text x="135" y="435" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,100,0.95)" text-anchor="middle">CSPM</text>

  <rect x="204" y="412" width="118" height="36" rx="18" fill="rgba(200,120,0,0.18)" stroke="rgba(200,120,0,0.4)" stroke-width="1.2"/>
  <text x="263" y="435" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,180,80,0.95)" text-anchor="middle">DataDog</text>

  <rect x="336" y="412" width="130" height="36" rx="18" fill="rgba(30,80,200,0.18)" stroke="rgba(80,140,255,0.4)" stroke-width="1.2"/>
  <text x="401" y="435" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(130,180,255,0.95)" text-anchor="middle">AWS Security</text>

  <!-- Footer -->
  <text x="80" y="580" font-family="'Courier New',monospace" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="580" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,100,50,0.45)" text-anchor="end" letter-spacing="1.5">SECURITY</text>
</svg>