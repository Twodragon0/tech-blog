<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0.1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="bitcoinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8850c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Right side illustration (x=700-1150, y=50-580) -->
  <g id="illustration">
    <!-- Background glow -->
    <circle cx="920" cy="300" r="250" fill="url(#glowGradient)"/>

    <!-- AWS Cloud shapes (top) -->
    <g id="aws-cloud" opacity="0.8">
      <path d="M 750 120 Q 780 100 810 110 Q 830 95 850 110 Q 870 100 890 120 L 890 160 Q 860 180 810 180 Q 760 180 750 160 Z" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="780" cy="140" r="8" fill="#00d4ff" opacity="0.6"/>
      <circle cx="830" cy="130" r="6" fill="#00d4ff" opacity="0.5"/>
      <circle cx="870" cy="145" r="7" fill="#00d4ff" opacity="0.6"/>
    </g>

    <!-- Bitcoin symbol large (center) -->
    <g id="bitcoin-main">
      <!-- Outer circle -->
      <circle cx="920" cy="300" r="80" fill="none" stroke="url(#bitcoinGradient)" stroke-width="3" opacity="0.9"/>
      <!-- Bitcoin B symbol -->
      <text x="920" y="325" font-size="120" font-weight="bold" fill="url(#bitcoinGradient)" text-anchor="middle" font-family="Arial, sans-serif">₿</text>
    </g>

    <!-- Security shield overlay -->
    <g id="security-shield" transform="translate(1000, 250)">
      <path d="M 0 0 L 40 0 L 40 45 Q 40 65 0 75 Q -40 65 -40 45 L -40 0 Z" fill="none" stroke="#00ff88" stroke-width="2.5" opacity="0.8"/>
      <circle cx="0" cy="25" r="12" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
      <line x1="-3" y1="18" x2="-3" y2="32" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
    </g>

    <!-- AWS infrastructure blocks (bottom) -->
    <g id="aws-blocks">
      <!-- Block 1 -->
      <rect x="750" y="450" width="45" height="45" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
      <circle cx="772.5" cy="472.5" r="6" fill="#ff6b6b" opacity="0.5"/>

      <!-- Block 2 -->
      <rect x="820" y="440" width="50" height="50" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
      <rect x="830" y="450" width="30" height="30" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>

      <!-- Block 3 -->
      <rect x="900" y="450" width="45" height="45" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.7"/>
      <line x1="920" y1="450" x2="920" y2="495" stroke="#ff6b6b" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- Blockchain chain links (middle-right) -->
    <g id="blockchain-chain" opacity="0.7">
      <line x1="800" y1="320" x2="850" y2="300" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="810" cy="315" r="5" fill="#00d4ff" opacity="0.8"/>
      <circle cx="835" cy="308" r="5" fill="#00d4ff" opacity="0.8"/>

      <line x1="950" y1="280" x2="1000" y2="260" stroke="#00d4ff" stroke-width="2"/>
      <circle cx="970" cy="273" r="5" fill="#00d4ff" opacity="0.8"/>
      <circle cx="990" cy="266" r="5" fill="#00d4ff" opacity="0.8"/>
    </g>

    <!-- Lock symbol (security) -->
    <g id="lock" transform="translate(750, 350)">
      <rect x="8" y="20" width="24" height="20" rx="2" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
      <path d="M 12 20 L 12 12 Q 12 6 18 6 Q 24 6 24 12 L 24 20" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
      <circle cx="18" cy="28" r="2" fill="#00ff88" opacity="0.7"/>
    </g>

    <!-- Radiating lines (data flow) -->
    <g id="data-flow" opacity="0.4">
      <line x1="920" y1="50" x2="920" y2="100" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="1050" y1="200" x2="1000" y2="240" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="1050" y1="400" x2="1000" y2="360" stroke="#00d4ff" stroke-width="1.5"/>
      <line x1="800" y1="500" x2="850" y2="460" stroke="#00d4ff" stroke-width="1.5"/>
    </g>

    <!-- Small secure indicators -->
    <g id="secure-dots">
      <circle cx="880" cy="240" r="3" fill="#00ff88" opacity="0.8"/>
      <circle cx="960" cy="380" r="3" fill="#00ff88" opacity="0.8"/>
      <circle cx="820" cy="380" r="3" fill="#00ff88" opacity="0.8"/>
    </g>
  </g>

  <!-- Left side content -->
  <!-- Title -->
  <text x="80" y="185" font-size="46" font-weight="bold" fill="white" font-family="Arial, sans-serif">Tech Security</text>
  <text x="80" y="245" font-size="46" font-weight="bold" fill="white" font-family="Arial, sans-serif">Weekly Digest</text>

  <!-- Subtitle/Tags -->
  <text x="80" y="280" font-size="20" fill="#00d4ff" font-family="Arial, sans-serif" font-weight="500">AWS Bitcoin</text>

  <!-- Date badge -->
  <rect x="80" y="310" width="280" height="50" rx="8" fill="#1a2f4f" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <text x="220" y="345" font-size="18" fill="#00d4ff" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">MARCH 15, 2026</text>

  <!-- Tag pills -->
  <g id="tag-pills">
    <!-- Tag 1: AWS -->
    <rect x="80" y="420" width="110" height="36" rx="18" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.8"/>
    <text x="135" y="443" font-size="14" fill="#ff6b6b" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500">AWS</text>

    <!-- Tag 2: Bitcoin -->
    <rect x="210" y="420" width="130" height="36" rx="18" fill="none" stroke="#f7931a" stroke-width="1.5" opacity="0.8"/>
    <text x="275" y="443" font-size="14" fill="#f7931a" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500">Bitcoin</text>

    <!-- Tag 3: Security -->
    <rect x="360" y="420" width="130" height="36" rx="18" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
    <text x="425" y="443" font-size="14" fill="#00ff88" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500">Security</text>
  </g>

  <!-- Footer -->
  <text x="80" y="590" font-size="16" fill="#666" font-family="Arial, sans-serif">tech.2twodragon.com</text>
</svg>