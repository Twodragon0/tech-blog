<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left Section Background Accent -->
  <rect x="0" y="0" width="650" height="630" fill="#0d0f23" opacity="0.3"/>

  <!-- Title -->
  <text x="50" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white">
    Tech Security Weekly
  </text>
  <text x="50" y="245" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white">
    Digest: ShinyHunters Vishing
  </text>

  <!-- Date Badge -->
  <rect x="50" y="280" width="280" height="40" fill="#ff4444" rx="4"/>
  <text x="70" y="307" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="white">
    JANUARY 31, 2026
  </text>

  <!-- Tag Pills -->
  <g id="tags">
    <!-- Tag 1: Vishing -->
    <rect x="50" y="420" width="140" height="36" fill="#2d5f7f" rx="18"/>
    <text x="120" y="444" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="500" fill="#fff" text-anchor="middle">
      #Vishing
    </text>

    <!-- Tag 2: ShinyHunters -->
    <rect x="210" y="420" width="160" height="36" fill="#7f3d2d" rx="18"/>
    <text x="290" y="444" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="500" fill="#fff" text-anchor="middle">
      #ShinyHunters
    </text>

    <!-- Tag 3: Social Engineering -->
    <rect x="390" y="420" width="195" height="36" fill="#3d7f4f" rx="18"/>
    <text x="487" y="444" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="500" fill="#fff" text-anchor="middle">
      #SocialEngineering
    </text>
  </g>

  <!-- Footer -->
  <text x="50" y="605" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" fill="#888">
    tech.2twodragon.com
  </text>

  <!-- RIGHT SIDE ILLUSTRATION: ShinyHunters Vishing Attack Vector -->

  <!-- Illustration Background Circle -->
  <circle cx="900" cy="315" r="200" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.15"/>
  <circle cx="900" cy="315" r="160" fill="none" stroke="#ff4444" stroke-width="1" opacity="0.1"/>

  <!-- Phone device with warning -->
  <g id="phone">
    <!-- Phone body -->
    <rect x="780" y="180" width="100" height="200" fill="#1a1f3a" stroke="#ff4444" stroke-width="2" rx="8"/>

    <!-- Phone screen background -->
    <rect x="790" y="195" width="80" height="170" fill="#0f1220" rx="4"/>

    <!-- Danger symbol on phone -->
    <circle cx="830" cy="250" r="25" fill="none" stroke="#ff4444" stroke-width="2"/>
    <line x1="830" y1="235" x2="830" y2="255" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
    <circle cx="830" cy="268" r="2" fill="#ff4444"/>

    <!-- Glitch effect lines -->
    <line x1="788" y1="215" x2="840" y2="215" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
    <line x1="788" y1="230" x2="840" y2="230" stroke="#ff4444" stroke-width="1" opacity="0.4"/>
    <line x1="788" y1="280" x2="840" y2="280" stroke="#ff4444" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Sound waves (representing voice call) -->
  <g id="soundwaves" stroke="#ff6666" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 920 240 Q 935 230 950 240"/>
    <path d="M 920 260 Q 940 245 960 260"/>
    <path d="M 920 280 Q 935 290 950 280"/>
  </g>

  <!-- Listening/eavesdropping symbol -->
  <g id="ear-threat" transform="translate(1000, 200)">
    <path d="M 0 0 Q 8 -10 12 0 Q 15 8 10 15 Q 5 18 0 15 Q -5 8 0 0" fill="none" stroke="#ff4444" stroke-width="1.5"/>
    <line x1="12" y1="8" x2="18" y2="8" stroke="#ff4444" stroke-width="1.5"/>
  </g>

  <!-- Threat indicator: Compromised data -->
  <g id="data-theft">
    <!-- Files/data symbol -->
    <rect x="920" y="320" width="35" height="45" fill="none" stroke="#ff6666" stroke-width="1.5" rx="2"/>
    <line x1="920" y1="330" x2="955" y2="330" stroke="#ff6666" stroke-width="1"/>
    <line x1="920" y1="338" x2="955" y2="338" stroke="#ff6666" stroke-width="1"/>
    <line x1="920" y1="346" x2="945" y2="346" stroke="#ff6666" stroke-width="1"/>

    <!-- Theft indicator arrow -->
    <path d="M 965 330 L 1000 330 L 995 325 M 1000 330 L 995 335" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Lock with warning (security breach) -->
  <g id="breach-lock" transform="translate(1020, 310)">
    <!-- Lock body -->
    <rect x="0" y="8" width="24" height="28" fill="none" stroke="#ff6666" stroke-width="1.5" rx="2"/>
    <!-- Lock shackle (broken) -->
    <path d="M 8 8 Q 8 -5 16 -5 Q 24 -5 24 8" fill="none" stroke="#ff4444" stroke-width="2"/>
    <!-- Breach crack -->
    <path d="M 12 15 L 18 25" stroke="#ff4444" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Circuit pattern elements (threat network) -->
  <g id="threat-network" stroke="#ff4444" stroke-width="1" opacity="0.5" fill="none">
    <circle cx="750" cy="400" r="3" fill="#ff4444"/>
    <circle cx="800" cy="450" r="3" fill="#ff4444"/>
    <circle cx="1050" cy="420" r="3" fill="#ff4444"/>
    <line x1="750" y1="400" x2="800" y2="450"/>
    <line x1="800" y1="450" x2="1050" y2="420"/>
    <line x1="1050" y1="420" x2="900" y2="380"/>
  </g>

  <!-- Attack label -->
  <text x="920" y="520" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#ff6666" text-anchor="middle">
    VISHING ATTACK
  </text>
  <text x="920" y="538" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" fill="#888" text-anchor="middle">
    Voice Phishing Threat
  </text>

  <!-- Accent line divider -->
  <line x1="650" y1="0" x2="650" y2="630" stroke="#ff4444" stroke-width="2" opacity="0.3"/>
</svg>