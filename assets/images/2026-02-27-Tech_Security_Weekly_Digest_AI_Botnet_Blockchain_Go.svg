  <circle cx="960" cy="295" r="15" fill="rgba(231,76,60,0.3)" stroke="rgba(231,76,60,0.55)" stroke-width="2"/>
  <circle cx="1050" cy="280" r="18" fill="rgba(231,76,60,0.35)" stroke="rgba(231,76,60,0.6)" stroke-width="2"/>
