  <line x1="870" y1="298" x2="896" y2="348" stroke="rgba(231,76,60,0.2)" stroke-width="1.5"/>
  <line x1="975" y1="309" x2="986" y2="346" stroke="rgba(231,76,60,0.2)" stroke-width="1.5"/>
  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.02)"/>
