<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <!-- Card Gradient -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>

    <!-- Category Gradients -->
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="indigoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative Circles -->
  <circle cx="100" cy="100" r="200" fill="#3b82f6" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#8b5cf6" fill-opacity="0.05"/>
  <circle cx="600" cy="315" r="300" fill="#dc2626" fill-opacity="0.03"/>

  <!-- Header Section -->
  <rect x="40" y="30" width="200" height="36" rx="18" fill="url(#redGradient)" filter="url(#shadow)"/>
  <text x="140" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">WEEKLY DIGEST</text>

  <!-- Date Badge -->
  <rect x="960" y="30" width="200" height="36" rx="18" fill="url(#blueGradient)" filter="url(#shadow)"/>
  <text x="1060" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">February 27, 2026</text>

  <!-- Main Title -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">Tech &amp; Security Weekly Digest</text>
  <text x="600" y="155" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">AI | Botnet | Blockchain | Go</text>

  <!-- Card 1: SECURITY - Aeternum C2 Botnet -->
  <g transform="translate(50, 190)">
    <rect width="340" height="180" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#redGradient)"/>
    <circle cx="40" cy="50" r="24" fill="url(#redGradient)" fill-opacity="0.2"/>
    <text x="40" y="58" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#dc2626" text-anchor="middle">!</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">SECURITY</text>
    <text x="80" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Aeternum C2 Botnet on Polygon</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Blockchain-based C2 stores encrypted</text>
    <text x="20" y="113" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">commands, making takedown impossible</text>
    <rect x="20" y="135" width="120" height="22" rx="11" fill="url(#redGradient)" fill-opacity="0.2"/>
    <text x="80" y="150" font-family="Arial, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">The Hacker News</text>
  </g>

  <!-- Card 2: SECURITY - AWS Security Agent -->
  <g transform="translate(430, 190)">
    <rect width="340" height="180" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#redGradient)"/>
    <circle cx="40" cy="50" r="24" fill="url(#redGradient)" fill-opacity="0.2"/>
    <text x="40" y="58" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#dc2626" text-anchor="middle">!</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">SECURITY</text>
    <text x="80" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">AWS Security Agent: Auto Pentest</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Multi-agent architecture for autonomous</text>
    <text x="20" y="113" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">penetration testing with self-improving</text>
    <rect x="20" y="135" width="120" height="22" rx="11" fill="url(#redGradient)" fill-opacity="0.2"/>
    <text x="80" y="150" font-family="Arial, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">AWS Security Blog</text>
  </g>

  <!-- Card 3: AI/ML - Google Translate AI Context -->
  <g transform="translate(810, 190)">
    <rect width="340" height="180" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#indigoGradient)"/>
    <circle cx="40" cy="50" r="24" fill="url(#indigoGradient)" fill-opacity="0.2"/>
    <text x="40" y="57" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6366f1" text-anchor="middle">AI</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6366f1">AI/ML</text>
    <text x="80" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Google Translate AI Context Update</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">New understand and ask buttons explain</text>
    <text x="20" y="113" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">nuance, cultural context, and idioms</text>
    <rect x="20" y="135" width="120" height="22" rx="11" fill="url(#indigoGradient)" fill-opacity="0.2"/>
    <text x="80" y="150" font-family="Arial, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle">Google AI Blog</text>
  </g>

  <!-- Card 4: CLOUD - Spanner Columnar Engine -->
  <g transform="translate(50, 400)">
    <rect width="340" height="160" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#blueGradient)"/>
    <circle cx="40" cy="50" r="24" fill="url(#blueGradient)" fill-opacity="0.2"/>
    <text x="40" y="57" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6" text-anchor="middle">&#9729;</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3b82f6">CLOUD</text>
    <text x="80" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Spanner Columnar Engine Preview</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Iceberg lakehouse real-time data serving</text>
    <text x="20" y="113" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">with zero ETL, OLTP + OLAP unified</text>
    <rect x="20" y="135" width="110" height="22" rx="11" fill="url(#blueGradient)" fill-opacity="0.2"/>
    <text x="75" y="150" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">Google Cloud</text>
  </g>

  <!-- Card 5: DEVOPS - Docker Model Runner vLLM -->
  <g transform="translate(430, 400)">
    <rect width="340" height="160" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#greenGradient)"/>
    <circle cx="40" cy="50" r="24" fill="url(#greenGradient)" fill-opacity="0.2"/>
    <text x="40" y="57" font-family="Arial, sans-serif" font-size="14" fill="#10b981" text-anchor="middle">&#9881;</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">DEVOPS</text>
    <text x="80" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Docker Model Runner vLLM on macOS</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Apple Silicon Metal backend enables GPU</text>
    <text x="20" y="113" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">accelerated LLM inference in containers</text>
    <rect x="20" y="135" width="100" height="22" rx="11" fill="url(#greenGradient)" fill-opacity="0.2"/>
    <text x="70" y="150" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Docker Blog</text>
  </g>

  <!-- Card 6: BLOCKCHAIN - Citi Bitcoin Integration -->
  <g transform="translate(810, 400)">
    <rect width="340" height="160" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#orangeGradient)"/>
    <circle cx="40" cy="50" r="24" fill="url(#orangeGradient)" fill-opacity="0.2"/>
    <text x="40" y="57" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">&#8383;</text>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">BLOCKCHAIN</text>
    <text x="80" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Citi Bitcoin Integration and Custody</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Global bank plans to integrate Bitcoin</text>
    <text x="20" y="113" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">into banking with custody services</text>
    <rect x="20" y="135" width="120" height="22" rx="11" fill="url(#orangeGradient)" fill-opacity="0.2"/>
    <text x="80" y="150" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Bitcoin Magazine</text>
  </g>

  <!-- Footer -->
  <line x1="50" y1="585" x2="1150" y2="585" stroke="#334155" stroke-width="1"/>

  <!-- Stats -->
  <text x="50" y="612" font-family="Arial, sans-serif" font-size="13" fill="#64748b">30 News</text>
  <text x="160" y="612" font-family="Arial, sans-serif" font-size="13" fill="#dc2626">5 Security</text>
  <text x="300" y="612" font-family="Arial, sans-serif" font-size="13" fill="#6366f1">5 AI/ML</text>
  <text x="420" y="612" font-family="Arial, sans-serif" font-size="13" fill="#3b82f6">5 Cloud</text>
  <text x="540" y="612" font-family="Arial, sans-serif" font-size="13" fill="#10b981">5 DevOps</text>
  <text x="680" y="612" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b">5 Blockchain</text>

  <!-- Blog Info -->
  <text x="1150" y="612" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#94a3b8" text-anchor="end">tech.2twodragon.com</text>
</svg>