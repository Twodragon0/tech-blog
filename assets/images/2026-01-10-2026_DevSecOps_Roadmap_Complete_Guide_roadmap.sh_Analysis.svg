<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e53e3e"/>
      <stop offset="50%" stop-color="#f6ad55"/>
      <stop offset="100%" stop-color="#4299e1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53e3e"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="badgeBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53e3e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e53e3e" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: DevSecOps Roadmap icon -->
  <!-- Central roadmap node hub -->
  <circle cx="1010" cy="225" r="70" fill="rgba(229,62,62,0.07)" stroke="rgba(229,62,62,0.3)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="50" fill="rgba(229,62,62,0.09)" stroke="rgba(229,62,62,0.25)" stroke-width="1"/>
  <circle cx="1010" cy="225" r="30" fill="rgba(229,62,62,0.12)" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>

  <!-- Roadmap path lines emanating from center -->
  <!-- Top path -->
  <line x1="1010" y1="195" x2="1010" y2="148" stroke="rgba(246,173,85,0.35)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="1010" cy="140" r="10" fill="rgba(246,173,85,0.1)" stroke="rgba(246,173,85,0.4)" stroke-width="1.5"/>
  <text x="1010" y="144" font-family="monospace" font-size="10" fill="rgba(246,173,85,0.7)" text-anchor="middle">SEC</text>

  <!-- Top-right path -->
  <line x1="1031" y1="204" x2="1068" y2="167" stroke="rgba(66,153,225,0.35)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="1076" cy="159" r="10" fill="rgba(66,153,225,0.1)" stroke="rgba(66,153,225,0.4)" stroke-width="1.5"/>
  <text x="1076" y="163" font-family="monospace" font-size="9" fill="rgba(66,153,225,0.7)" text-anchor="middle">DEV</text>

  <!-- Right path -->
  <line x1="1040" y1="225" x2="1087" y2="225" stroke="rgba(72,187,120,0.35)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="1097" cy="225" r="10" fill="rgba(72,187,120,0.1)" stroke="rgba(72,187,120,0.4)" stroke-width="1.5"/>
  <text x="1097" y="229" font-family="monospace" font-size="9" fill="rgba(72,187,120,0.7)" text-anchor="middle">OPS</text>

