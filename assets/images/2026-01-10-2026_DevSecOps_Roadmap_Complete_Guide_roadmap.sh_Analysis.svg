  <text x="1050" y="174" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#6b21a8" text-anchor="middle">Q5</text>
  <text x="1050" y="128" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#6b21a8" text-anchor="middle">PATCH MGT</text>
  <!-- Shared footer frame -->
  <rect x="0" y="540" width="1200" height="90" fill="#080c18" opacity="0.95"/>
  <rect x="0" y="540" width="1200" height="2" fill="#1e293b"/>
  <circle cx="32" cy="580" r="4" fill="#a855f7" opacity="0.6"/>
  <text x="46" y="585" font-family="Arial,sans-serif" font-size="12" fill="#475569">Roadmap | January 10, 2026</text>
  <text x="1168" y="585" font-family="Arial,sans-serif" font-size="12" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
