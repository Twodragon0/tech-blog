  <text x="600" y="304" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#9333ea" text-anchor="middle">Q3</text>
  <text x="600" y="258" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#9333ea" text-anchor="middle">CLOUD SEC</text>
  <!-- Milestone 4: AI AGENT -->
  <circle cx="820" cy="240" r="18" fill="#1a0f1d" stroke="#7e22ce" stroke-width="3"/>
