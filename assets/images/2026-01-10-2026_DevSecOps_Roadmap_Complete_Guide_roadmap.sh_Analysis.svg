  <text x="180" y="452" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#c084fc" text-anchor="middle">Q1</text>
  <text x="180" y="406" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#c084fc" text-anchor="middle">SEC OPS</text>
  <!-- Milestone 2: THREAT INT -->
  <circle cx="380" cy="380" r="18" fill="#1a0f1d" stroke="#a855f7" stroke-width="3"/>
