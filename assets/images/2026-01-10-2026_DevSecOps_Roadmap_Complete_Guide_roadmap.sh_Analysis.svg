    <path d="M-7,1 L-2,6 L8,-5" stroke="#a855f7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <text x="80" y="42" font-family="Arial,sans-serif" font-size="26" font-weight="700" fill="#f1f5f9">Roadmap</text>
  <text x="80" y="62" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8">Maturity progression plan</text>
  <rect x="990" y="18" width="178" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1079" y="48" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#94a3b8" text-anchor="middle">January 10, 2026</text>

  <!-- S-curve spine -->
  <path d="M 80 460 C 280 460, 360 320, 600 300 S 900 200, 1120 160"
