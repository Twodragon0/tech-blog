  <line x1="1031" y1="246" x2="1068" y2="283" stroke="rgba(159,122,234,0.35)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="1076" cy="291" r="10" fill="rgba(159,122,234,0.1)" stroke="rgba(159,122,234,0.4)" stroke-width="1.5"/>
  <text x="1076" y="295" font-family="monospace" font-size="9" fill="rgba(159,122,234,0.7)" text-anchor="middle">CI</text>

  <!-- Bottom path -->
  <line x1="1010" y1="255" x2="1010" y2="302" stroke="rgba(229,62,62,0.35)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="1010" cy="312" r="10" fill="rgba(229,62,62,0.1)" stroke="rgba(229,62,62,0.4)" stroke-width="1.5"/>
  <text x="1010" y="316" font-family="monospace" font-size="9" fill="rgba(229,62,62,0.7)" text-anchor="middle">IAC</text>

  <!-- Bottom-left path -->
  <line x1="989" y1="246" x2="952" y2="283" stroke="rgba(246,173,85,0.3)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="944" cy="291" r="10" fill="rgba(246,173,85,0.08)" stroke="rgba(246,173,85,0.35)" stroke-width="1.5"/>
  <text x="944" y="295" font-family="monospace" font-size="8" fill="rgba(246,173,85,0.6)" text-anchor="middle">SCA</text>

  <!-- Left path -->
  <line x1="980" y1="225" x2="933" y2="225" stroke="rgba(66,153,225,0.3)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="923" cy="225" r="10" fill="rgba(66,153,225,0.08)" stroke="rgba(66,153,225,0.35)" stroke-width="1.5"/>
  <text x="923" y="229" font-family="monospace" font-size="8" fill="rgba(66,153,225,0.6)" text-anchor="middle">CD</text>

