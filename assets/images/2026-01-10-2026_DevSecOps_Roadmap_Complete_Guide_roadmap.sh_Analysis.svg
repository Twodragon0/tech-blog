  <line x1="989" y1="204" x2="952" y2="167" stroke="rgba(72,187,120,0.3)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="944" cy="159" r="10" fill="rgba(72,187,120,0.08)" stroke="rgba(72,187,120,0.35)" stroke-width="1.5"/>
  <text x="944" y="163" font-family="monospace" font-size="8" fill="rgba(72,187,120,0.6)" text-anchor="middle">GIT</text>

  <!-- Center icon: shield with merge arrows -->
  <path d="M1000,215 L1010,210 L1020,215 L1020,228 Q1010,234 1000,228 Z" fill="rgba(229,62,62,0.2)" stroke="rgba(229,62,62,0.6)" stroke-width="1.5"/>
  <!-- roadmap.sh logo hint: small dot path inside -->
  <circle cx="1010" cy="222" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="1005" cy="225" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1015" cy="225" r="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Outer orbit ring -->
  <circle cx="1010" cy="225" r="92" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Year badge on illustration -->
  <rect x="970" y="130" width="80" height="22" rx="11" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.3)" stroke-width="1"/>
  <text x="1010" y="145" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle">2026</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.7)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(246,173,85,0.6)"/>
  <circle cx="860" cy="440" r="5" fill="rgba(66,153,225,0.5)"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(229,62,62,0.03)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(229,62,62,0.04)" stroke="none"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badgeBg)" stroke="rgba(229,62,62,0.3)" stroke-width="1"/>
  <text x="94" y="81" font-family="Arial,sans-serif" font-size="12" font-weight="600" fill="rgba(229,62,62,0.9)" letter-spacing="1">JANUARY 10, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="white">2026 DevSecOps</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="700" fill="white">Roadmap roadmap.sh</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Developer Security Operations Career Path &amp; Skill Guide</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="rgba(229,62,62,0.8)" letter-spacing="2">DEVSECOPS · CAREER · ROADMAP</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="rgba(229,62,62,0.9)" text-anchor="middle">Security</text>

  <rect x="224" y="402" width="140" height="36" rx="18" fill="rgba(246,173,85,0.12)" stroke="rgba(246,173,85,0.4)" stroke-width="1"/>
  <text x="294" y="425" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="rgba(246,173,85,0.9)" text-anchor="middle">roadmap.sh</text>

  <rect x="378" y="402" width="110" height="36" rx="18" fill="rgba(66,153,225,0.12)" stroke="rgba(66,153,225,0.4)" stroke-width="1"/>
  <text x="433" y="425" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="rgba(66,153,225,0.9)" text-anchor="middle">DevOps</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="Arial,sans-serif" font-size="14" fill="rgba(255,255,255,0.35)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial,sans-serif" font-size="13" font-weight="600" fill="rgba(229,62,62,0.5)" text-anchor="end" letter-spacing="1">DEVSECOPS</text>
</svg>