  <text x="820" y="244" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#7e22ce" text-anchor="middle">Q4</text>
  <text x="820" y="282" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#7e22ce" text-anchor="middle">AI AGENT</text>
