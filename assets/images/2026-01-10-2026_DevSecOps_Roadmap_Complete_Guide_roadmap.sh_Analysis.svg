  <text x="380" y="384" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#a855f7" text-anchor="middle">Q2</text>
  <text x="380" y="422" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#a855f7" text-anchor="middle">THREAT INT</text>
