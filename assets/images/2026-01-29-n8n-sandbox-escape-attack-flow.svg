  <!-- Date badge -->
  <rect x="80" y="60" width="240" height="32" rx="6" fill="rgba(211,84,0,0.25)" stroke="rgba(211,84,0,0.4)" stroke-width="1"/>
  <text x="200" y="81" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle" letter-spacing="1">JANUARY 29, 2026</text>
  <!-- Title -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="sans-serif">n8n Sandbox Escape</text>
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="sans-serif">Attack Flow</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.65)" font-family="sans-serif">How attackers escape n8n VM sandbox to achieve remote code execution</text>
