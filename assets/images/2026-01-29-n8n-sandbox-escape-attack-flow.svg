  <!-- Category -->
  <text x="80" y="370" font-size="14" fill="rgba(255,255,255,0.5)" font-family="sans-serif" letter-spacing="2">RCE ANALYSIS</text>
  <!-- Pill tags -->
  <rect x="80" y="402" width="100" height="36" rx="18" fill="rgba(211,84,0,0.25)" stroke="rgba(211,84,0,0.5)" stroke-width="1"/>
  <text x="130" y="425" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">n8n RCE</text>
  <rect x="196" y="402" width="140" height="36" rx="18" fill="rgba(231,76,60,0.2)" stroke="rgba(231,76,60,0.45)" stroke-width="1"/>
  <text x="266" y="425" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">Sandbox Escape</text>
  <rect x="352" y="402" width="110" height="36" rx="18" fill="rgba(211,84,0,0.2)" stroke="rgba(211,84,0,0.4)" stroke-width="1"/>
  <text x="407" y="425" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">Attack Flow</text>
  <!-- Bottom bar -->
  <rect x="0" y="520" width="1200" height="110" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="545" font-size="15" fill="rgba(255,255,255,0.5)" font-family="sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,255,255,0.4)" font-family="sans-serif" text-anchor="end">DevSecOps</text>
</svg>
