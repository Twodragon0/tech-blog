  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- Sandbox dashed container -->
  <rect x="770" y="148" width="218" height="175" rx="8" fill="rgba(211,84,0,0.06)" stroke="#d35400" stroke-width="2" stroke-dasharray="9,5"/>
  <text x="879" y="168" font-size="11" fill="rgba(211,84,0,0.8)" font-family="monospace" text-anchor="middle" letter-spacing="1">SANDBOX</text>
  <!-- n8n Node box inside sandbox -->
  <rect x="820" y="178" width="118" height="45" rx="5" fill="rgba(211,84,0,0.18)" stroke="#d35400" stroke-width="1.5"/>
  <text x="879" y="196" font-size="10" fill="rgba(255,255,255,0.85)" font-family="monospace" text-anchor="middle">n8n Node</text>
  <text x="879" y="213" font-size="9" fill="rgba(255,200,100,0.85)" font-family="monospace" text-anchor="middle">exec(payload)</text>
  <!-- VM context label -->
  <rect x="800" y="240" width="158" height="28" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="879" y="258" font-size="9" fill="rgba(255,255,255,0.4)" font-family="monospace" text-anchor="middle">vm.runInNewContext(...)</text>
  <!-- Crack / break-out marks on right wall -->
  <line x1="988" y1="175" x2="1010" y2="163" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="1010" y1="163" x2="1004" y2="192" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="1004" y1="192" x2="1025" y2="180" stroke="#e74c3c" stroke-width="2.5"/>
  <line x1="1025" y1="180" x2="1018" y2="210" stroke="#e74c3c" stroke-width="2.5"/>
  <!-- Escape arrow -->
  <path d="M 988 230 Q 1028 230 1055 265" fill="none" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowesc)"/>
  <!-- Host OS box outside -->
  <rect x="1040" y="270" width="130" height="52" rx="7" fill="rgba(231,76,60,0.18)" stroke="#e74c3c" stroke-width="2"/>
