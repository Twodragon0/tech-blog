  <text x="1105" y="311" font-size="9" fill="rgba(231,76,60,0.85)" font-family="monospace" text-anchor="middle">RCE achieved</text>
  <!-- Stage labels -->
  <text x="780" y="144" font-size="9" fill="rgba(255,200,100,0.6)" font-family="monospace">STEP 1: INJECT</text>
  <text x="992" y="160" font-size="9" fill="rgba(231,76,60,0.75)" font-family="monospace">STEP 2: BREAK</text>
  <text x="1042" y="262" font-size="9" fill="rgba(231,76,60,0.75)" font-family="monospace">STEP 3: ESCAPE</text>
  <!-- Code snippet -->
  <rect x="770" y="368" width="310" height="60" rx="5" fill="rgba(0,0,0,0.45)" stroke="rgba(211,84,0,0.3)" stroke-width="1"/>
  <text x="785" y="385" font-size="9" fill="rgba(255,160,80,0.9)" font-family="monospace">// CVE-2024-XXXX n8n RCE</text>
  <text x="785" y="400" font-size="9" fill="rgba(255,100,100,0.9)" font-family="monospace">vm.runInNewContext(`process.exit(0)`)</text>
  <text x="785" y="418" font-size="9" fill="rgba(255,100,100,0.6)" font-family="monospace">// Bypasses Node.js VM sandbox isolation</text>
  <!-- Left accent bar -->
