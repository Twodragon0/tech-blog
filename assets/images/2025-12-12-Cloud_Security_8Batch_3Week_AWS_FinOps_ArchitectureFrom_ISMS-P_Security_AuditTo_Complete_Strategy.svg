  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#f1c40f" filter="url(#glow)">Week 3: FinOps &amp; ISMS-P Audit</text>
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="#94a3b8">AWS cost optimization strategy &amp; ISMS-P security certification audit</text>
  <line x1="80" y1="325" x2="560" y2="325" stroke="#f1c40f" stroke-width="2" opacity="0.6"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#27ae60" letter-spacing="3">CLOUD SECURITY COURSE</text>
  <rect x="80" y="398" width="80" height="32" rx="16" fill="#f1c40f" opacity="0.15" stroke="#f1c40f" stroke-width="1"/>
  <text x="120" y="419" font-family="Arial,sans-serif" font-size="13" fill="#f5dc60" text-anchor="middle">FinOps</text>
  <rect x="174" y="398" width="90" height="32" rx="16" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1"/>
  <text x="219" y="419" font-family="Arial,sans-serif" font-size="13" fill="#7dcea0" text-anchor="middle">ISMS-P</text>
  <rect x="278" y="398" width="80" height="32" rx="16" fill="#f1c40f" opacity="0.1" stroke="#f1c40f" stroke-width="1"/>
  <text x="318" y="419" font-family="Arial,sans-serif" font-size="13" fill="#f5dc60" text-anchor="middle">Week 3</text>
  <rect x="0" y="520" width="1200" height="110" fill="#000000" opacity="0.25"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#f1c40f" stroke-width="1" opacity="0.3"/>
  <text x="80" y="566" font-family="Arial,sans-serif" font-size="14" fill="#64748b">tech.2twodragon.com</text>
  <text x="80" y="592" font-family="Arial,sans-serif" font-size="13" fill="#475569">DevSecOps</text>
