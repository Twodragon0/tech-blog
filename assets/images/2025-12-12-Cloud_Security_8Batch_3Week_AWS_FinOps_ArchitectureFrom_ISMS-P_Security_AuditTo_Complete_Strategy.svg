    <path d="M100,13 L106,28 L122,28 L110,37 L114,52 L100,43 L86,52 L90,37 L78,28 L94,28 Z" fill="#27ae60" opacity="0.3"/>
    <text x="100" y="39" font-family="monospace" font-size="7" fill="#27ae60" text-anchor="middle" font-weight="bold">ISMS-P</text>
    <!-- Week 3 badge -->
    <rect x="-155" y="38" width="80" height="28" rx="8" fill="#f1c40f" opacity="0.15" stroke="#f1c40f" stroke-width="1"/>
    <text x="-115" y="56" font-family="monospace" font-size="10" fill="#f1c40f" text-anchor="middle" font-weight="bold">WEEK 3</text>
