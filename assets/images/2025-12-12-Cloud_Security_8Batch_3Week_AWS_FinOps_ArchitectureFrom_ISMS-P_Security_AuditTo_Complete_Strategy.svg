  <g transform="translate(940,290)" opacity="0.38">
    <!-- Cost dashboard screen -->
    <rect x="-155" y="-110" width="175" height="130" rx="8" fill="none" stroke="#f1c40f" stroke-width="2"/>
    <!-- Dashboard header -->
    <rect x="-155" y="-110" width="175" height="20" rx="8" fill="#f1c40f" opacity="0.15"/>
    <text x="-67" y="-96" font-family="monospace" font-size="8" fill="#f1c40f" text-anchor="middle" font-weight="bold">Cost Dashboard</text>
    <!-- Bar chart bars -->
    <rect x="-140" y="-50" width="20" height="50" rx="3" fill="#f1c40f" opacity="0.5"/>
    <rect x="-112" y="-70" width="20" height="70" rx="3" fill="#f1c40f" opacity="0.4"/>
    <rect x="-84" y="-40" width="20" height="40" rx="3" fill="#27ae60" opacity="0.6"/>
    <rect x="-56" y="-80" width="20" height="80" rx="3" fill="#f1c40f" opacity="0.3"/>
    <rect x="-28" y="-55" width="20" height="55" rx="3" fill="#27ae60" opacity="0.5"/>
