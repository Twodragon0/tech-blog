    <text x="100" y="-95" font-family="monospace" font-size="8" fill="#27ae60" text-anchor="middle" font-weight="bold">ISMS-P Audit</text>
    <!-- Checklist items -->
    <circle cx="50" cy="-75" r="5" fill="#27ae60" opacity="0.7"/>
    <path d="M47,-76 L49,-73 L54,-79" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="60" y1="-75" x2="155" y2="-75" stroke="#27ae60" stroke-width="1" opacity="0.5"/>
    <circle cx="50" cy="-55" r="5" fill="#27ae60" opacity="0.7"/>
    <path d="M47,-56 L49,-53 L54,-59" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="60" y1="-55" x2="155" y2="-55" stroke="#27ae60" stroke-width="1" opacity="0.5"/>
    <circle cx="50" cy="-35" r="5" fill="#27ae60" opacity="0.7"/>
    <path d="M47,-36 L49,-33 L54,-39" fill="none" stroke="white" stroke-width="1.5"/>
    <line x1="60" y1="-35" x2="155" y2="-35" stroke="#27ae60" stroke-width="1" opacity="0.5"/>
    <circle cx="50" cy="-15" r="5" fill="#f1c40f" opacity="0.5"/>
    <line x1="60" y1="-15" x2="155" y2="-15" stroke="#f1c40f" stroke-width="1" opacity="0.4"/>
    <circle cx="50" cy="5" r="5" fill="#f1c40f" opacity="0.3"/>
    <line x1="60" y1="5" x2="155" y2="5" stroke="#f1c40f" stroke-width="1" opacity="0.3"/>
    <!-- Certification badge -->
