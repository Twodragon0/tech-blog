  <!-- Video/film frame icon (right of disc) -->
  <rect x="1080" y="210" width="48" height="30" rx="3" fill="rgba(121,40,202,0.08)" stroke="rgba(121,40,202,0.35)" stroke-width="1.2"/>
  <rect x="1080" y="210" width="7" height="30" rx="2" fill="rgba(121,40,202,0.15)" stroke="rgba(121,40,202,0.2)" stroke-width="0.5"/>
  <rect x="1121" y="210" width="7" height="30" rx="2" fill="rgba(121,40,202,0.15)" stroke="rgba(121,40,202,0.2)" stroke-width="0.5"/>
