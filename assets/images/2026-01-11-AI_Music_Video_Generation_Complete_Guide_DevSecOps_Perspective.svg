  <!-- Tag pills -->
  <!-- Red pill -->
  <rect x="80" y="400" width="130" height="36" rx="18" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.5)" stroke-width="1"/>
  <text x="145" y="423" font-size="13" font-weight="600" fill="rgba(229,62,62,0.95)" text-anchor="middle" font-family="'Arial', sans-serif">AI Security</text>

  <!-- Amber pill -->
  <rect x="222" y="400" width="130" height="36" rx="18" fill="rgba(246,173,85,0.15)" stroke="rgba(246,173,85,0.45)" stroke-width="1"/>
  <text x="287" y="423" font-size="13" font-weight="600" fill="rgba(246,173,85,0.95)" text-anchor="middle" font-family="'Arial', sans-serif">DevSecOps</text>

  <!-- Blue/purple pill -->
  <rect x="364" y="400" width="130" height="36" rx="18" fill="rgba(121,40,202,0.18)" stroke="rgba(121,40,202,0.45)" stroke-width="1"/>
  <text x="429" y="423" font-size="13" font-weight="600" fill="rgba(168,85,247,0.95)" text-anchor="middle" font-family="'Arial', sans-serif">Media Pipeline</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.35)" font-family="'Courier New', monospace" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="12" fill="rgba(229,62,62,0.45)" font-family="'Courier New', monospace" text-anchor="end" letter-spacing="1">DEVSECOPS</text>
