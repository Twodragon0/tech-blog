  <circle cx="1010" cy="225" r="82" fill="none" stroke="rgba(121,40,202,0.2)" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Central AI brain / music disc -->
  <circle cx="1010" cy="225" r="54" fill="rgba(229,62,62,0.08)" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="38" fill="rgba(121,40,202,0.1)" stroke="rgba(121,40,202,0.3)" stroke-width="1"/>
  <circle cx="1010" cy="225" r="14" fill="rgba(229,62,62,0.2)" stroke="rgba(229,62,62,0.5)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="5" fill="rgba(255,255,255,0.4)"/>

