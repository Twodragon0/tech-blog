      <line x1="-15" y1="40" x2="-15" y2="-60" stroke="#8b5cf6" stroke-width="3"/>
      <path d="M-15,-60 C-15,-60 30,-70 30,-45 C30,-20 -15,-30 -15,-30" fill="#8b5cf6" opacity="0.4"/>
