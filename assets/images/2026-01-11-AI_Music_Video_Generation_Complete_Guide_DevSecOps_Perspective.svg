  <rect x="988" y="206" width="4" height="38" rx="2" fill="rgba(246,173,85,0.6)" opacity="0.7"/>
  <rect x="996" y="215" width="4" height="20" rx="2" fill="rgba(229,62,62,0.5)" opacity="0.7"/>
  <rect x="1022" y="209" width="4" height="32" rx="2" fill="rgba(246,173,85,0.6)" opacity="0.7"/>
  <rect x="1030" y="214" width="4" height="22" rx="2" fill="rgba(229,62,62,0.5)" opacity="0.7"/>
