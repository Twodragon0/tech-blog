  <line x1="948" y1="167" x2="968" y2="183" stroke="rgba(229,62,62,0.3)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Sec node (top-right) -->
  <circle cx="1090" cy="155" r="22" fill="rgba(246,173,85,0.1)" stroke="rgba(246,173,85,0.4)" stroke-width="1.5"/>
  <text x="1090" y="159" font-size="10" font-weight="700" fill="rgba(246,173,85,0.9)" text-anchor="middle" font-family="monospace">SEC</text>
