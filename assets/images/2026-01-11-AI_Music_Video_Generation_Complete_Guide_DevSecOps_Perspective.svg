      <path d="M-100,-50 L-97,-43 L-90,-43 L-96,-38 L-94,-31 L-100,-36 L-106,-31 L-104,-38 L-110,-43 L-103,-43 Z" fill="#f9a8d4" transform="scale(0.7) translate(-40,-30)"/>
    </g>
    <!-- Video frame -->
