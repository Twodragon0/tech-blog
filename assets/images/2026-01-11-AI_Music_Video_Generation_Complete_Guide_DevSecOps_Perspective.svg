  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="'Arial', sans-serif" letter-spacing="-0.5">AI Music Video</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="36" font-weight="700" fill="rgba(255,255,255,0.92)" font-family="'Arial', sans-serif" letter-spacing="-0.3">Generation DevSecOps</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)" font-family="'Arial', sans-serif" letter-spacing="0.3">Security-First Approach to AI-Driven Media Pipelines</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
