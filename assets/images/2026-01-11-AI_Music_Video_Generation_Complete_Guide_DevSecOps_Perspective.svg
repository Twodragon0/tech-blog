  <path d="M880,340 Q900,320 920,340 Q940,360 960,340 Q980,320 1000,340 Q1020,360 1040,340 Q1060,320 1080,340 Q1100,360 1120,340 Q1140,320 1160,340" fill="none" stroke="url(#waveGrad)" stroke-width="2" opacity="0.5"/>

