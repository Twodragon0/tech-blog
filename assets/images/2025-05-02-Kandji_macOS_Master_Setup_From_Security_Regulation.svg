<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient overlay for depth -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Right side illustration -->
  <!-- Mac device body -->
  <g transform="translate(880, 280)">
    <!-- Mac screen background -->
    <rect x="-80" y="-100" width="160" height="120" rx="12" fill="#1e2139" stroke="#00d4ff" stroke-width="2"/>

    <!-- Screen glow -->
    <rect x="-80" y="-100" width="160" height="120" rx="12" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3" filter="url(#glow)"/>

    <!-- Mac stand -->
    <path d="M -60 20 L -60 35 Q 0 45 60 35 L 60 20" fill="#1a1d2e" stroke="#00d4ff" stroke-width="2"/>

    <!-- Kandji logo/icon on screen -->
    <circle cx="0" cy="-50" r="25" fill="#00d4ff" opacity="0.2"/>
    <circle cx="0" cy="-50" r="20" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <path d="M -8 -55 L 0 -45 L 8 -55" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>

    <!-- Security indicators on screen -->
    <rect x="-60" y="-75" width="25" height="15" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="-52" cy="-67" r="2" fill="#00d4ff"/>

    <rect x="35" y="-75" width="25" height="15" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="43" cy="-67" r="2" fill="#00d4ff"/>
  </g>

  <!-- Compliance/Regulation rings -->
  <g transform="translate(900, 200)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.3" stroke-dasharray="5,5"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>

    <!-- Regulation checkmarks positioned around circles -->
    <g transform="translate(-65, -10)">
      <circle r="6" fill="#00d4ff" opacity="0.3"/>
      <path d="M -2 -1 L 1 2 L 3 -1" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <g transform="translate(65, -10)">
      <circle r="6" fill="#00d4ff" opacity="0.3"/>
      <path d="M -2 -1 L 1 2 L 3 -1" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <g transform="translate(0, -70)">
      <circle r="6" fill="#00d4ff" opacity="0.3"/>
      <path d="M -2 -1 L 1 2 L 3 -1" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Lock/Security element -->
  <g transform="translate(750, 320)">
    <rect x="-22" y="-15" width="44" height="50" rx="8" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
    <path d="M -15 -15 Q -15 -30 0 -30 Q 15 -30 15 -15" fill="none" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="10" r="3" fill="#00d4ff"/>
    <path d="M 0 15 L 0 28" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Shield element for compliance -->
  <g transform="translate(980, 370)">
    <path d="M 0 -25 L 25 -10 L 25 15 Q 0 35 -25 15 L -25 -10 Z" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linejoin="round"/>
    <path d="M -8 0 L 0 8 L 8 0" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Data/Configuration nodes -->
  <g transform="translate(820, 420)">
    <circle cx="0" cy="0" r="8" fill="#00d4ff" opacity="0.4"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>

    <circle cx="40" cy="0" r="8" fill="#00d4ff" opacity="0.4"/>
    <circle cx="40" cy="0" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>

    <circle cx="20" cy="30" r="8" fill="#00d4ff" opacity="0.4"/>
    <circle cx="20" cy="30" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>

    <line x1="0" y1="0" x2="40" y2="0" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="5" y1="3" x2="20" y2="27" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="35" y1="3" x2="20" y2="27" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Left side content -->
  <!-- Title -->
  <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Kandji macOS Master</text>
  <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Setup From Security</text>

  <!-- Date badge -->
  <g transform="translate(60, 310)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="70" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#00d4ff" text-anchor="middle">MAY 2, 2025</text>
  </g>

  <!-- Tags -->
  <g transform="translate(60, 420)">
    <!-- Tag 1: Security -->
    <rect x="0" y="0" width="85" height="28" rx="14" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1"/>
    <text x="42" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#00d4ff" text-anchor="middle">security</text>

    <!-- Tag 2: MDM -->
    <rect x="100" y="0" width="70" height="28" rx="14" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1"/>
    <text x="135" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#00d4ff" text-anchor="middle">mdm</text>

    <!-- Tag 3: macOS -->
    <rect x="185" y="0" width="80" height="28" rx="14" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1"/>
    <text x="225" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#00d4ff" text-anchor="middle">macos</text>
  </g>

  <!-- Footer -->
  <text x="60" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666" letter-spacing="0.3">tech.2twodragon.com</text>

  <!-- Subtle accent line -->
  <line x1="60" y1="130" x2="300" y2="130" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
</svg>