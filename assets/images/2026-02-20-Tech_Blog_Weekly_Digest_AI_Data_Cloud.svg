  <circle cx="920" cy="475" r="10" fill="rgba(108,92,231,0.15)" stroke="rgba(108,92,231,0.4)" stroke-width="1"/>
  <circle cx="850" cy="475" r="10" fill="rgba(108,92,231,0.15)" stroke="rgba(108,92,231,0.4)" stroke-width="1"/>
  <line x1="864" y1="450" x2="850" y2="465" stroke="rgba(108,92,231,0.35)" stroke-width="1.5"/>
