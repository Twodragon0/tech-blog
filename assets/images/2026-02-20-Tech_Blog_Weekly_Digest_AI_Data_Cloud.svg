  <text x="80" y="370" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.45)" letter-spacing="2">TECH BLOG DIGEST</text>
  <rect x="80" y="410" width="120" height="36" rx="18" fill="rgba(108,92,231,0.15)" stroke="rgba(108,92,231,0.4)" stroke-width="1"/>
  <text x="140" y="433" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">AI Alignment</text>
  <rect x="216" y="410" width="110" height="36" rx="18" fill="rgba(0,206,201,0.15)" stroke="rgba(0,206,201,0.4)" stroke-width="1"/>
  <text x="271" y="433" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">EKS Flyte</text>
  <rect x="342" y="410" width="80" height="36" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="382" y="433" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">Docker</text>
  <rect x="0" y="520" width="1200" height="110" fill="rgba(0,0,0,0.25)"/>
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="end" letter-spacing="1">DevSecOps</text>
