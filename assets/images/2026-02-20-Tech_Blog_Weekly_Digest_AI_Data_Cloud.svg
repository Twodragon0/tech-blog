<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e53e3e"/>
      <stop offset="50%" stop-color="#dd6b20"/>
      <stop offset="100%" stop-color="#3182ce"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53e3e"/>
      <stop offset="50%" stop-color="#dd6b20"/>
      <stop offset="100%" stop-color="#3182ce" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="badgeBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e53e3e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#dd6b20" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Weekly Digest / AI / Data / Cloud concept -->

  <!-- Cloud shape base -->
  <ellipse cx="1010" cy="230" rx="90" ry="55" fill="rgba(49,130,206,0.08)" stroke="rgba(49,130,206,0.28)" stroke-width="1.5"/>
  <ellipse cx="960" cy="248" rx="55" ry="38" fill="rgba(49,130,206,0.07)" stroke="rgba(49,130,206,0.22)" stroke-width="1"/>
  <ellipse cx="1065" cy="248" rx="50" ry="35" fill="rgba(49,130,206,0.07)" stroke="rgba(49,130,206,0.22)" stroke-width="1"/>
  <rect x="930" y="240" width="160" height="48" rx="4" fill="rgba(49,130,206,0.06)"/>

  <!-- AI neural network nodes -->
  <circle cx="890" cy="175" r="10" fill="rgba(229,62,62,0.12)" stroke="rgba(229,62,62,0.4)" stroke-width="1.5"/>
  <circle cx="940" cy="155" r="8" fill="rgba(229,62,62,0.10)" stroke="rgba(229,62,62,0.35)" stroke-width="1.2"/>
  <circle cx="995" cy="160" r="10" fill="rgba(221,107,32,0.12)" stroke="rgba(221,107,32,0.4)" stroke-width="1.5"/>
  <circle cx="1050" cy="150" r="8" fill="rgba(221,107,32,0.10)" stroke="rgba(221,107,32,0.35)" stroke-width="1.2"/>
  <circle cx="1100" cy="170" r="10" fill="rgba(229,62,62,0.12)" stroke="rgba(229,62,62,0.4)" stroke-width="1.5"/>
  <circle cx="1135" cy="145" r="6" fill="rgba(49,130,206,0.10)" stroke="rgba(49,130,206,0.35)" stroke-width="1"/>

  <!-- Neural connections -->
  <line x1="890" y1="175" x2="940" y2="155" stroke="rgba(229,62,62,0.25)" stroke-width="1"/>
  <line x1="940" y1="155" x2="995" y2="160" stroke="rgba(221,107,32,0.25)" stroke-width="1"/>
  <line x1="995" y1="160" x2="1050" y2="150" stroke="rgba(221,107,32,0.25)" stroke-width="1"/>
  <line x1="1050" y1="150" x2="1100" y2="170" stroke="rgba(229,62,62,0.25)" stroke-width="1"/>
  <line x1="1100" y1="170" x2="1135" y2="145" stroke="rgba(49,130,206,0.25)" stroke-width="1"/>
  <line x1="890" y1="175" x2="995" y2="160" stroke="rgba(229,62,62,0.12)" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="940" y1="155" x2="1050" y2="150" stroke="rgba(221,107,32,0.12)" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="995" y1="160" x2="1100" y2="170" stroke="rgba(49,130,206,0.12)" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Data flow streams going down to cloud -->
  <path d="M890,185 Q900,210 930,240" stroke="rgba(229,62,62,0.20)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <path d="M995,170 Q1000,205 1010,240" stroke="rgba(221,107,32,0.20)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <path d="M1100,180 Q1090,210 1075,242" stroke="rgba(49,130,206,0.20)" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>

  <!-- Weekly digest paper icon -->
  <rect x="880" y="290" width="68" height="80" rx="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <line x1="893" y1="310" x2="935" y2="310" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <line x1="893" y1="323" x2="935" y2="323" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <line x1="893" y1="335" x2="935" y2="335" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <line x1="893" y1="347" x2="920" y2="347" stroke="rgba(229,62,62,0.40)" stroke-width="1.5"/>
  <rect x="880" y="290" width="68" height="12" rx="5" fill="rgba(229,62,62,0.12)"/>

  <!-- Data bars (analytics) -->
  <rect x="975" y="320" width="14" height="50" rx="3" fill="rgba(49,130,206,0.12)" stroke="rgba(49,130,206,0.30)" stroke-width="1"/>
  <rect x="997" y="308" width="14" height="62" rx="3" fill="rgba(221,107,32,0.12)" stroke="rgba(221,107,32,0.30)" stroke-width="1"/>
  <rect x="1019" y="330" width="14" height="40" rx="3" fill="rgba(229,62,62,0.12)" stroke="rgba(229,62,62,0.30)" stroke-width="1"/>
  <rect x="1041" y="315" width="14" height="55" rx="3" fill="rgba(49,130,206,0.10)" stroke="rgba(49,130,206,0.25)" stroke-width="1"/>
  <line x1="970" y1="371" x2="1062" y2="371" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Orbit ring around center cloud -->
  <ellipse cx="1010" cy="225" rx="115" ry="70" fill="none" stroke="rgba(49,130,206,0.10)" stroke-width="1" stroke-dasharray="6,5"/>
  <circle cx="1010" cy="155" r="4" fill="rgba(49,130,206,0.35)" stroke="rgba(49,130,206,0.5)" stroke-width="1"/>
  <circle cx="1125" cy="230" r="4" fill="rgba(221,107,32,0.35)" stroke="rgba(221,107,32,0.5)" stroke-width="1"/>
  <circle cx="895" cy="225" r="4" fill="rgba(229,62,62,0.35)" stroke="rgba(229,62,62,0.5)" stroke-width="1"/>

  <!-- Small sparkle details -->
  <polygon points="1085,295 1088,302 1095,302 1089,307 1092,314 1085,309 1078,314 1081,307 1075,302 1082,302" fill="rgba(255,215,0,0.15)" stroke="rgba(255,215,0,0.30)" stroke-width="0.8"/>
  <polygon points="862,180 864,185 869,185 865,188 867,193 862,190 857,193 859,188 855,185 860,185" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(229,62,62,0.70)"/>
  <circle cx="900" cy="420" r="5" fill="rgba(221,107,32,0.70)"/>
  <circle cx="860" cy="440" r="5" fill="rgba(49,130,206,0.70)"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badgeBg)" stroke="rgba(229,62,62,0.30)" stroke-width="1"/>
  <text x="95" y="81" font-family="'Courier New', monospace" font-size="12" fill="rgba(229,62,62,0.90)" letter-spacing="1.5">FEBRUARY 20, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Blog Weekly</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Digest AI Data Cloud</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.58)" letter-spacing="0.3">Security / AI / Cloud / DevSecOps Weekly Roundup</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(229,62,62,0.85)" letter-spacing="2.5">SECURITY &amp; CLOUD INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="400" width="105" height="36" rx="18" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.40)" stroke-width="1"/>
  <text x="133" y="423" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(229,62,62,0.95)" text-anchor="middle" letter-spacing="0.8">Security</text>

  <rect x="198" y="400" width="90" height="36" rx="18" fill="rgba(221,107,32,0.18)" stroke="rgba(221,107,32,0.40)" stroke-width="1"/>
  <text x="243" y="423" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(221,107,32,0.95)" text-anchor="middle" letter-spacing="0.8">AI/ML</text>

  <rect x="301" y="400" width="96" height="36" rx="18" fill="rgba(49,130,206,0.18)" stroke="rgba(49,130,206,0.40)" stroke-width="1"/>
  <text x="349" y="423" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(49,130,206,0.95)" text-anchor="middle" letter-spacing="0.8">Cloud</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(229,62,62,0.50)" text-anchor="end" letter-spacing="1.5">SECURITY</text>
</svg>