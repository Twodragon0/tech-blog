<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest - Agentic AI Security 2026, Attack Vectors and Defense</title>
  <defs>
    <filter id="orbGlow"><feGaussianBlur stdDeviation="40" /></filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="50%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e11d48" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Orb glows -->
  <circle cx="790" cy="140" r="185" fill="#dc2626" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1055" cy="445" r="150" fill="#8b5cf6" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="185" cy="495" r="120" fill="#e11d48" opacity="0.05" filter="url(#orbGlow)" />

  <!-- Card 1: Lock with gears (security ops) -->
  <g transform="translate(830, 60)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(100, 14)">
      <!-- Lock body -->
      <rect x="24" y="44" width="62" height="52" rx="6" fill="#e11d48" opacity="0.15" stroke="#e11d48" stroke-width="2" stroke-opacity="0.8" />
      <!-- Lock shackle -->
      <path d="M36 44 L36 30 C36 16 74 16 74 30 L74 44" fill="none" stroke="#e11d48" stroke-width="2.5" opacity="0.8" />
      <!-- Keyhole -->
      <circle cx="55" cy="66" r="7" fill="none" stroke="#e11d48" stroke-width="2" opacity="0.7" />
      <line x1="55" y1="73" x2="55" y2="84" stroke="#e11d48" stroke-width="2" stroke-linecap="round" opacity="0.7" />
      <!-- Gear teeth (simplified) -->
      <circle cx="20" cy="70" r="10" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5" stroke-dasharray="3 2" />
      <circle cx="90" cy="70" r="10" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5" stroke-dasharray="3 2" />
      <rect x="22" y="102" width="66" height="16" rx="4" fill="#e11d48" opacity="0.2" stroke="#e11d48" stroke-width="1" stroke-opacity="0.4" />
      <text x="55" y="114" text-anchor="middle" fill="#fb7185" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">SEC OPS</text>
    </g>
    <circle cx="125" cy="200" r="3" fill="#e11d48" opacity="0.8" />
    <circle cx="140" cy="200" r="3" fill="#8b5cf6" opacity="0.6" />
    <circle cx="155" cy="200" r="3" fill="#e11d48" opacity="0.4" />
  </g>

  <!-- Card 2: Layers/stack (defense architecture) -->
  <g transform="translate(720, 190)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(100, 18)">
      <!-- Stacked layers -->
      <ellipse cx="55" cy="28" rx="42" ry="10" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.8" />
      <ellipse cx="55" cy="50" rx="42" ry="10" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.65" />
      <ellipse cx="55" cy="72" rx="42" ry="10" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5" />
      <line x1="13" y1="28" x2="13" y2="72" stroke="#8b5cf6" stroke-width="2" opacity="0.5" />
      <line x1="97" y1="28" x2="97" y2="72" stroke="#8b5cf6" stroke-width="2" opacity="0.5" />
      <!-- Layer labels -->
      <text x="55" y="32" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" opacity="0.8">PREVENT</text>
      <text x="55" y="54" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" opacity="0.65">DETECT</text>
      <text x="55" y="76" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" opacity="0.5">RESPOND</text>
      <rect x="14" y="88" width="82" height="16" rx="4" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4" />
      <text x="55" y="100" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">DEFENSE</text>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b" />
    <rect x="40" y="192" width="155" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3: Brain with shield (agentic AI) -->
  <g transform="translate(660, 340)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(110, 12)">
      <!-- Brain outline (simplified) -->
      <path d="M50 20 C34 20 22 30 22 44 C22 52 26 58 32 62 C28 66 26 72 28 78 C30 84 36 88 44 88 C46 90 48 92 50 92 C52 92 54 90 56 88 C64 88 70 84 72 78 C74 72 72 66 68 62 C74 58 78 52 78 44 C78 30 66 20 50 20 Z" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="2" stroke-opacity="0.8" />
      <!-- Brain fold lines -->
      <path d="M36 44 C40 40 44 46 48 42" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.5" stroke-linecap="round" />
      <path d="M52 42 C56 46 60 40 64 44" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.5" stroke-linecap="round" />
      <path d="M32 58 C38 54 42 60 50 56 C58 60 62 54 68 58" fill="none" stroke="#dc2626" stroke-width="1.5" opacity="0.4" stroke-linecap="round" />
      <!-- Shield overlay (small) -->
      <path d="M43 60 L57 66 L57 76 C57 82 50 86 50 86 C50 86 43 82 43 76 Z" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.7" />
      <path d="M46 72 L49 75 L54 68" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
      <rect x="12" y="98" width="76" height="16" rx="4" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="1" stroke-opacity="0.4" />
      <text x="50" y="110" text-anchor="middle" fill="#fca5a5" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">AGENTIC AI</text>
    </g>
    <g transform="translate(40, 196)">
      <rect width="240" height="28" rx="6" fill="#1e293b" opacity="0.8" />
      <circle cx="18" cy="14" r="5" fill="#dc2626" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="725" cy="282" r="2" fill="#dc2626" opacity="0.5">
    <animate attributeName="cy" values="282;272;282" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="840" cy="334" r="1.5" fill="#8b5cf6" opacity="0.4">
    <animate attributeName="cy" values="334;324;334" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1062" cy="296" r="2" fill="#e11d48" opacity="0.5">
    <animate attributeName="cy" values="296;286;296" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="688" cy="204" r="1.5" fill="#dc2626" opacity="0.3">
    <animate attributeName="cy" values="204;196;204" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1108" cy="176" r="1" fill="#8b5cf6" opacity="0.4">
    <animate attributeName="cy" values="176;168;176" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- WEEKLY DIGEST badge -->
  <g transform="translate(60, 80)">
    <rect width="160" height="32" rx="16" fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1" stroke-opacity="0.4" />
    <text x="80" y="21" text-anchor="middle" fill="#f87171" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">WEEKLY DIGEST</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Tech Security</text>
  <text x="60" y="225" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Weekly</text>
  <text x="60" y="290" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">Agentic AI 2026</text>
  <text x="60" y="335" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">Defense Architecture</text>

  <!-- Accent line -->
  <rect x="60" y="360" width="200" height="3" rx="1.5" fill="url(#accentLine)" />

  <!-- Tag pills -->
  <g transform="translate(60, 385)">
    <rect width="88" height="30" rx="15" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="0.8" stroke-opacity="0.35" />
    <text x="44" y="20" text-anchor="middle" fill="#f87171" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Agentic AI</text>
    <g transform="translate(98, 0)">
      <rect width="60" height="30" rx="15" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="30" y="20" text-anchor="middle" fill="#c4b5fd" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">OWASP</text>
    </g>
    <g transform="translate(168, 0)">
      <rect width="70" height="30" rx="15" fill="#e11d48" opacity="0.12" stroke="#e11d48" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="35" y="20" text-anchor="middle" fill="#fb7185" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">OpenSSL</text>
    </g>
    <g transform="translate(248, 0)">
      <rect width="68" height="30" rx="15" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="34" y="20" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Fortinet</text>
    </g>
  </g>

  <!-- Date -->
  <text x="60" y="460" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">FEBRUARY 01, 2026</text>

  <!-- Footer URL -->
  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8" />
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
</svg>
