    <text x="280" y="21" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="13">AI/ML</text>
    <rect x="333" y="0" width="102" height="32" rx="16" fill="#064e3b" opacity="0.7"/>
    <text x="384" y="21" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="13">AI Agent</text>
