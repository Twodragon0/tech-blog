<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side: Title -->
  <text x="40" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Tech Security Weekly
  </text>
  <text x="40" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Digest OpenSSL Zero
  </text>
  
  <!-- Date badge -->
  <rect x="40" y="280" width="320" height="50" rx="8" fill="#1a1f3a"/>
  <text x="60" y="312" font-family="Arial, sans-serif" font-size="18" fill="#64b5f6">
    FEBRUARY 1, 2026
  </text>
  
  <!-- Tag pills -->
  <rect x="40" y="420" width="100" height="32" rx="16" fill="#d32f2f" opacity="0.25" stroke="#d32f2f" stroke-width="1"/>
  <text x="50" y="442" font-family="Arial, sans-serif" font-size="13" fill="#ff5252">security</text>
  
  <rect x="160" y="420" width="110" height="32" rx="16" fill="#1976d2" opacity="0.25" stroke="#1976d2" stroke-width="1"/>
  <text x="170" y="442" font-family="Arial, sans-serif" font-size="13" fill="#42a5f5">openssl</text>
  
  <rect x="290" y="420" width="90" height="32" rx="16" fill="#f57c00" opacity="0.25" stroke="#f57c00" stroke-width="1"/>
  <text x="300" y="442" font-family="Arial, sans-serif" font-size="13" fill="#ffb74d">zero-day</text>
  
  <!-- Footer -->
  <text x="40" y="595" font-family="Arial, sans-serif" font-size="14" fill="#888888">
    tech.2twodragon.com
  </text>
  
  <!-- Right side illustration: OpenSSL Zero vulnerability concept -->
  <!-- Ambient glow circles -->
  <circle cx="920" cy="140" r="110" fill="#d32f2f" opacity="0.1"/>
  <circle cx="1020" cy="380" r="95" fill="#1976d2" opacity="0.1"/>
  <circle cx="850" cy="520" r="80" fill="#f57c00" opacity="0.1"/>
  
  <!-- Central cracked certificate/lock -->
  <g transform="translate(920, 280)">
    <!-- Certificate rectangle -->
    <rect x="-50" y="-30" width="100" height="80" rx="6" fill="none" stroke="#64b5f6" stroke-width="2.5" opacity="0.8"/>
    
    <!-- Certificate seal/circular pattern -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#64b5f6" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#64b5f6" stroke-width="1" opacity="0.4"/>
    
    <!-- Critical crack (zero-day) -->
    <path d="M 0 -25 Q 8 -10 5 5 Q 2 15 -5 25" fill="none" stroke="#ff5252" stroke-width="3" stroke-linecap="round"/>
    <path d="M -3 -20 L 12 5" fill="none" stroke="#d32f2f" stroke-width="2" opacity="0.7"/>
    
    <!-- Warning spark -->
    <line x1="25" y1="-15" x2="35" y2="-25" stroke="#ff5252" stroke-width="2"/>
    <line x1="30" y1="-10" x2="42" y2="-10" stroke="#ff5252" stroke-width="2"/>
  </g>
  
  <!-- Vulnerability indicator rings -->
  <g transform="translate(920, 280)" opacity="0.6">
    <circle cx="0" cy="0" r="65" fill="none" stroke="#d32f2f" stroke-width="1" stroke-dasharray="4,4"/>
    <circle cx="0" cy="0" r="75" fill="none" stroke="#d32f2f" stroke-width="1" stroke-dasharray="6,6" opacity="0.5"/>
  </g>
  
  <!-- Shield with exclamation (critical alert) -->
  <g transform="translate(1000, 450)">
    <path d="M 0 0 L 35 18 L 35 55 Q 17.5 72 0 72 Q -17.5 72 -35 55 L -35 18 Z" fill="none" stroke="#f57c00" stroke-width="2.5"/>
    <circle cx="0" cy="32" r="3.5" fill="#f57c00"/>
    <rect x="-2" y="42" width="4" height="12" fill="#f57c00"/>
  </g>
  
  <!-- Binary/hex pattern (code vulnerability context) -->
  <g opacity="0.25" fill="#42a5f5" font-family="monospace" font-size="11" letter-spacing="2">
    <text x="740" y="120">0x00 0xff</text>
    <text x="1030" y="200">0xbb 0xaa</text>
    <text x="760" y="410">CVE-2024</text>
    <text x="1050" y="540">0x1a 0x2b</text>
  </g>
  
  <!-- Directional accent lines (urgency/critical state) -->
  <line x1="700" y1="60" x2="750" y2="60" stroke="#42a5f5" stroke-width="2.5" opacity="0.6"/>
  <line x1="700" y1="60" x2="700" y2="120" stroke="#42a5f5" stroke-width="2.5" opacity="0.6"/>
  
  <line x1="1150" y1="570" x2="1090" y2="570" stroke="#d32f2f" stroke-width="2.5" opacity="0.6"/>
  <line x1="1150" y1="570" x2="1150" y2="510" stroke="#d32f2f" stroke-width="2.5" opacity="0.6"/>
</svg>