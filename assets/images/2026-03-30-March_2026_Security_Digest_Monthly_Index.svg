  <circle cx="1021" cy="221" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="1054" cy="221" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="1087" cy="221" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
