<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
  </defs>
  
  <!-- RIGHT SIDE: Detailed Visual Scene (x=650-1150, y=80-550) -->
  
  <!-- Decorative background shapes -->
  <circle cx="900" cy="150" r="120" fill="url(#blueGrad)" stroke="#3b82f6" stroke-width="0.5" opacity="0.6"/>
  <rect x="750" y="280" width="180" height="180" fill="url(#orangeGrad)" stroke="#f59e0b" stroke-width="0.3" opacity="0.5" rx="8"/>
  
  <!-- Large Shield Icon -->
  <g transform="translate(900, 250)">
    <!-- Shield shape -->
    <path d="M 0 -60 L 50 -40 L 50 20 Q 0 70 -50 20 L -50 -40 Z" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.9"/>
    <path d="M 0 -60 L 50 -40 L 50 20 Q 0 70 -50 20 L -50 -40 Z" fill="#3b82f6" opacity="0.06"/>
    
    <!-- Checkmark inside shield -->
    <path d="M -20 0 L -5 15 L 25 -10" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  </g>
  
  <!-- Data Flow Arrows -->
  <!-- Arrow from left to shield -->
  <g opacity="0.7">
    <line x1="680" y1="250" x2="800" y2="250" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
    <polygon points="810,250 800,245 800,255" fill="#3b82f6" opacity="0.8"/>
  </g>
  
  <!-- Arrow downward -->
  <g opacity="0.65">
    <line x1="900" y1="320" x2="900" y2="400" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
    <polygon points="900,410 895,400 905,400" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Arrow right -->
  <g opacity="0.6">
    <line x1="780" y1="420" x2="950" y2="420" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,4"/>
    <polygon points="965,420 950,415 950,425" fill="#ef4444" opacity="0.8"/>
  </g>
  
  <!-- Warning Triangle Icons -->
  <!-- Top warning -->
  <g transform="translate(750, 150)">
    <path d="M 0 -20 L 20 15 L -20 15 Z" fill="none" stroke="#ef4444" stroke-width="1.3" opacity="0.7"/>
    <circle cx="0" cy="8" r="2" fill="#ef4444" opacity="0.8"/>
  </g>
  
  <!-- Middle warning -->
  <g transform="translate(1050, 280)">
    <path d="M 0 -20 L 20 15 L -20 15 Z" fill="none" stroke="#f59e0b" stroke-width="1.3" opacity="0.7"/>
    <circle cx="0" cy="8" r="2" fill="#f59e0b" opacity="0.8"/>
  </g>
  
  <!-- Bottom warning -->
  <g transform="translate(820, 480)">
    <path d="M 0 -20 L 20 15 L -20 15 Z" fill="none" stroke="#3b82f6" stroke-width="1.3" opacity="0.6"/>
    <circle cx="0" cy="8" r="2" fill="#3b82f6" opacity="0.7"/>
  </g>
  
  <!-- Network nodes -->
  <circle cx="700" cy="380" r="8" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.6"/>
  <circle cx="1000" cy="350" r="6" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
  <circle cx="950" cy="480" r="7" fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.55"/>
  
  <!-- LEFT SIDE: Text Content -->
  
  <!-- Date Badge -->
  <rect x="40" y="40" width="200" height="50" fill="none" stroke="#3b82f6" stroke-width="0.8" rx="6" opacity="0.5"/>
  <text x="140" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#3b82f6" opacity="0.9">MARCH 30, 2026</text>
  
  <!-- Title -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white" opacity="0.95">March 2026 Security</text>
  
  <!-- Subtitle -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white" opacity="0.95">Digest Monthly Index</text>
  
  <!-- Tag Pills -->
  <!-- Tag 1 -->
  <rect x="80" y="410" width="110" height="32" fill="none" stroke="#ef4444" stroke-width="0.7" rx="16" opacity="0.6"/>
  <text x="135" y="432" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#ef4444" opacity="0.8">THREATS</text>
  
  <!-- Tag 2 -->
  <rect x="210" y="410" width="110" height="32" fill="none" stroke="#f59e0b" stroke-width="0.7" rx="16" opacity="0.6"/>
  <text x="265" y="432" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#f59e0b" opacity="0.8">ANALYSIS</text>
  
  <!-- Tag 3 -->
  <rect x="340" y="410" width="110" height="32" fill="none" stroke="#3b82f6" stroke-width="0.7" rx="16" opacity="0.6"/>
  <text x="395" y="432" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#3b82f6" opacity="0.8">DIGEST</text>
  
  <!-- Footer -->
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="12" fill="white" opacity="0.5">tech.2twodragon.com</text>
</svg>