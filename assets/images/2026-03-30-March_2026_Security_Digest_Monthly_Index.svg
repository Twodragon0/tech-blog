  <circle cx="955" cy="246" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="988" cy="246" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="1021" cy="246" r="9" fill="rgba(60,160,255,0.13)" stroke="rgba(80,180,255,0.3)" stroke-width="1"/>
  <circle cx="1054" cy="246" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="1087" cy="246" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="922" cy="271" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="955" cy="271" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="988" cy="271" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="1021" cy="271" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
  <circle cx="1054" cy="271" r="9" fill="rgba(255,80,80,0.08)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>
