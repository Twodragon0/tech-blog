  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(255,50,50,0.18)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,140,140,0.95)" text-anchor="middle">CVE Digest</text>

  <rect x="226" y="402" width="140" height="36" rx="18" fill="rgba(255,140,30,0.15)" stroke="rgba(255,160,60,0.38)" stroke-width="1"/>
  <text x="296" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,190,100,0.95)" text-anchor="middle">Patch Tracker</text>

  <rect x="382" y="402" width="140" height="36" rx="18" fill="rgba(40,120,255,0.14)" stroke="rgba(80,160,255,0.36)" stroke-width="1"/>
  <text x="452" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(120,190,255,0.95)" text-anchor="middle">AI Threats</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,100,100,0.4)" text-anchor="end" letter-spacing="1">SECURITY</text>
