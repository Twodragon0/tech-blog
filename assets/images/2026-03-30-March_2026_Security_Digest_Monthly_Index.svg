<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:#7b2d8b"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:#7b2d8b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c53030"/>
      <stop offset="100%" style="stop-color:#9b2c2c"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b7791f"/>
      <stop offset="100%" style="stop-color:#975a16"/>
    </linearGradient>
    <linearGradient id="pill3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2b6cb0"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Monthly Security Digest Calendar/Shield Icon -->
  <!-- Outer shield shape -->
  <path d="M1010,135 L1120,155 L1120,255 C1120,295 1010,325 1010,325 C1010,325 900,295 900,255 L900,155 Z" fill="rgba(229,62,62,0.06)" stroke="rgba(229,62,62,0.25)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,155 L1100,170 L1100,252 C1100,282 1010,305 1010,305 C1010,305 920,282 920,252 L920,170 Z" fill="rgba(229,62,62,0.05)" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>

  <!-- Calendar grid inside shield -->
  <rect x="950" y="185" width="120" height="95" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Calendar header bar -->
  <rect x="950" y="185" width="120" height="22" rx="4" fill="rgba(229,62,62,0.18)" stroke="none"/>
  <text x="1010" y="201" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="700">MARCH 2026</text>
  <!-- Calendar grid lines horizontal -->
  <line x1="950" y1="220" x2="1070" y2="220" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <line x1="950" y1="238" x2="1070" y2="238" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <line x1="950" y1="256" x2="1070" y2="256" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <!-- Calendar grid lines vertical -->
  <line x1="967" y1="207" x2="967" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <line x1="984" y1="207" x2="984" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <line x1="1001" y1="207" x2="1001" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <line x1="1018" y1="207" x2="1018" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <line x1="1035" y1="207" x2="1035" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <line x1="1052" y1="207" x2="1052" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>

  <!-- Highlight cell (day 30) -->
  <rect x="1035" y="257" width="17" height="17" rx="3" fill="rgba(229,62,62,0.35)" stroke="rgba(229,62,62,0.6)" stroke-width="1"/>
  <text x="1043" y="270" font-family="monospace" font-size="8" fill="white" text-anchor="middle" font-weight="700">30</text>

  <!-- Lock icon below calendar -->
  <rect x="996" y="289" width="28" height="22" rx="4" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1.2"/>
  <path d="M1000,289 L1000,284 C1000,277 1020,277 1020,284 L1020,289" fill="none" stroke="rgba(229,62,62,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="1010" cy="300" r="3.5" fill="rgba(229,62,62,0.7)"/>
  <line x1="1010" y1="302" x2="1010" y2="307" stroke="rgba(229,62,62,0.6)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Orbiting security nodes -->
  <circle cx="880" cy="200" r="6" fill="rgba(229,62,62,0.12)" stroke="rgba(229,62,62,0.35)" stroke-width="1"/>
  <circle cx="1135" cy="200" r="6" fill="rgba(123,45,139,0.12)" stroke="rgba(123,45,139,0.35)" stroke-width="1"/>
  <circle cx="880" cy="290" r="4" fill="rgba(229,62,62,0.10)" stroke="rgba(229,62,62,0.3)" stroke-width="1"/>
  <circle cx="1135" cy="290" r="4" fill="rgba(123,45,139,0.10)" stroke="rgba(123,45,139,0.3)" stroke-width="1"/>

  <!-- Connecting lines to nodes -->
  <line x1="886" y1="200" x2="900" y2="178" stroke="rgba(229,62,62,0.15)" stroke-width="0.8"/>
  <line x1="1129" y1="200" x2="1120" y2="178" stroke="rgba(123,45,139,0.15)" stroke-width="0.8"/>

  <!-- Scan line effect -->
  <line x1="900" y1="230" x2="1120" y2="230" stroke="rgba(229,62,62,0.08)" stroke-width="18"/>
  <line x1="900" y1="230" x2="1120" y2="230" stroke="rgba(229,62,62,0.18)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.75)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(183,121,31,0.75)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(43,108,176,0.75)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="700" letter-spacing="1">MARCH 30, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white">March 2026 Security</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white">Digest Monthly Index</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Monthly security intelligence summary &amp; threat roundup</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New',monospace" font-size="14" fill="rgba(229,62,62,0.85)" letter-spacing="3" font-weight="700">SECURITY / MONTHLY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="138" height="36" rx="18" fill="url(#pill1)"/>
  <text x="149" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">Threat Intel</text>

  <rect x="232" y="402" width="130" height="36" rx="18" fill="url(#pill2)"/>
  <text x="297" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">CVE Watch</text>

  <rect x="376" y="402" width="138" height="36" rx="18" fill="url(#pill3)"/>
  <text x="445" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="600">Zero-Day</text>

  <!-- Footer divider -->
  <line x1="80" y1="520" x2="1120" y2="520" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Footer text -->
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.35)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>