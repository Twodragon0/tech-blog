  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white">March 2026 Security</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white">Digest Monthly Index</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(255,180,180,0.75)">Monthly roundup: vulnerabilities, patches, AI threats &amp; cloud security</text>

