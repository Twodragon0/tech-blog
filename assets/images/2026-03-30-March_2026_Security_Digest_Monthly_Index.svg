<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>March 2026 Security Digest Monthly Index</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050d1a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background glow blob -->
  <circle cx="1050" cy="350" r="280" fill="url(#glow)"/>
  <circle cx="1050" cy="350" r="180" fill="rgba(6,182,212,0.04)"/>
  <!-- Calendar / index icon -->
  <rect x="910" y="155" width="110" height="100" rx="8" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.25)" stroke-width="1.5"/>
  <rect x="910" y="155" width="110" height="24" rx="8" fill="rgba(6,182,212,0.18)" stroke="none"/>
  <rect x="910" y="167" width="110" height="12" fill="rgba(6,182,212,0.18)" stroke="none"/>
  <!-- Calendar dots (weeks) -->
  <circle cx="930" cy="200" r="4" fill="rgba(6,182,212,0.5)"/>
  <circle cx="950" cy="200" r="4" fill="rgba(6,182,212,0.5)"/>
  <circle cx="970" cy="200" r="4" fill="rgba(6,182,212,0.5)"/>
  <circle cx="990" cy="200" r="4" fill="rgba(6,182,212,0.5)"/>
  <circle cx="1010" cy="200" r="4" fill="rgba(59,130,246,0.4)"/>
  <circle cx="930" cy="220" r="4" fill="rgba(6,182,212,0.4)"/>
  <circle cx="950" cy="220" r="4" fill="rgba(6,182,212,0.4)"/>
  <circle cx="970" cy="220" r="4" fill="rgba(6,182,212,0.4)"/>
  <circle cx="990" cy="220" r="4" fill="rgba(59,130,246,0.35)"/>
  <circle cx="1010" cy="220" r="4" fill="rgba(59,130,246,0.35)"/>
  <circle cx="930" cy="240" r="4" fill="rgba(6,182,212,0.3)"/>
  <circle cx="950" cy="240" r="4" fill="rgba(6,182,212,0.3)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="180" height="32" rx="4" fill="rgba(6,182,212,0.2)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
  <text x="170" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">MARCH 2026</text>
  <!-- Main title -->
  <text x="80" y="175" font-family="system-ui,sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="-1">March 2026 Security</text>
  <text x="80" y="232" font-family="system-ui,sans-serif" font-size="44" font-weight="700" fill="white" letter-spacing="-1">Digest Index</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Security | DevSecOps | Monthly Overview</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="460" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category label -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">27 POSTS  |  4 WEEKS</text>
  <!-- Keyword tags -->
  <rect x="80" y="420" width="130" height="36" rx="18" fill="rgba(6,182,212,0.18)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
  <text x="145" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#67e8f9" text-anchor="middle" font-weight="600">Monthly Index</text>
  <rect x="224" y="420" width="120" height="36" rx="18" fill="rgba(59,130,246,0.18)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="284" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle" font-weight="600">DevSecOps</text>
  <rect x="358" y="420" width="100" height="36" rx="18" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.35)" stroke-width="1"/>
  <text x="408" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#67e8f9" text-anchor="middle" font-weight="600">Security</text>
  <rect x="472" y="420" width="80" height="36" rx="18" fill="rgba(99,102,241,0.18)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="512" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#a5b4fc" text-anchor="middle" font-weight="600">2026</text>
  <!-- Bottom rule -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">Security</text>
</svg>
