<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444" opacity="0.4"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" opacity="0.4"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- LEFT SIDE: Title and Content -->
  
  <!-- Date badge -->
  <rect x="60" y="45" width="170" height="38" fill="#ef4444" opacity="0.08" rx="5" stroke="#ef4444" stroke-width="0.3"/>
  <text x="145" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.5">FEBRUARY 6, 2026</text>
  
  <!-- Title lines -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="-1">Tech Security</text>
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="-1">Weekly Digest</text>
  <text x="80" y="305" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ef4444" letter-spacing="-1">Botnet Cloud</text>
  
  <!-- Tags/Pills -->
  <g id="tags" transform="translate(80, 420)">
    <rect width="95" height="32" fill="#3b82f6" opacity="0.1" rx="16" stroke="#3b82f6" stroke-width="0.3"/>
    <text x="47" y="23" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3b82f6" text-anchor="middle" letter-spacing="0.5">BOTNET</text>
    
    <rect x="115" width="95" height="32" fill="#f59e0b" opacity="0.1" rx="16" stroke="#f59e0b" stroke-width="0.3"/>
    <text x="162" y="23" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b" text-anchor="middle" letter-spacing="0.5">CLOUD</text>
    
    <rect x="230" width="95" height="32" fill="#ef4444" opacity="0.1" rx="16" stroke="#ef4444" stroke-width="0.3"/>
    <text x="277" y="23" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle" letter-spacing="0.5">SECURITY</text>
  </g>
  
  <!-- Footer -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.6" letter-spacing="0.3">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE: Visual Scene (x=650-1150, y=80-550) -->
  
  <!-- Cloud infrastructure -->
  <g id="cloud-section">
    <ellipse cx="900" cy="160" rx="90" ry="55" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="850" cy="135" r="28" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="950" cy="135" r="28" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="820" cy="165" r="22" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
    <circle cx="980" cy="165" r="22" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.25"/>
    
    <!-- Data flow from cloud -->
    <path d="M 860 210 Q 840 260 820 310" stroke="#3b82f6" stroke-width="0.5" fill="none" opacity="0.3" marker-end="url(#arrowhead-blue)"/>
    <path d="M 940 210 Q 960 260 980 310" stroke="#3b82f6" stroke-width="0.5" fill="none" opacity="0.3" marker-end="url(#arrowhead-blue)"/>
  </g>
  
  <!-- Security shield with checkmark -->
  <g id="shield">
    <path d="M 1000 240 L 950 240 L 950 270 Q 950 305 1000 330 Q 1050 305 1050 270 L 1050 240 Z" 
          fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.3"/>
    <path d="M 975 290 L 990 305 L 1025 275" stroke="#3b82f6" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Central server under attack -->
  <rect x="850" y="420" width="70" height="70" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.3" rx="3"/>
  <text x="885" y="460" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444" opacity="0.35" text-anchor="middle">SERVER</text>
  
  <!-- Bot nodes -->
  <!-- Bot 1: Top Left -->
  <g id="bot1">
    <circle cx="750" cy="300" r="16" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.25"/>
    <circle cx="742" cy="294" r="3.5" fill="#f59e0b" opacity="0.3"/>
    <circle cx="758" cy="294" r="3.5" fill="#f59e0b" opacity="0.3"/>
    <path d="M 750 310 Q 747 315 750 320" stroke="#f59e0b" stroke-width="0.4" fill="none" opacity="0.25"/>
    <path d="M 765 305 L 835 430" stroke="#ef4444" stroke-width="0.5" fill="none" opacity="0.3" marker-end="url(#arrowhead-red)"/>
  </g>
  
  <!-- Bot 2: Top Right -->
  <g id="bot2">
    <circle cx="1020" cy="300" r="16" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.25"/>
    <circle cx="1012" cy="294" r="3.5" fill="#f59e0b" opacity="0.3"/>
    <circle cx="1028" cy="294" r="3.5" fill="#f59e0b" opacity="0.3"/>
    <path d="M 1020 310 Q 1017 315 1020 320" stroke="#f59e0b" stroke-width="0.4" fill="none" opacity="0.25"/>
    <path d="M 1005 305 L 925 430" stroke="#ef4444" stroke-width="0.5" fill="none" opacity="0.3" marker-end="url(#arrowhead-red)"/>
  </g>
  
  <!-- Bot 3: Left -->
  <g id="bot3">
    <circle cx="700" cy="410" r="16" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.25"/>
    <circle cx="692" cy="404" r="3.5" fill="#f59e0b" opacity="0.3"/>
    <circle cx="708" cy="404" r="3.5" fill="#f59e0b" opacity="0.3"/>
    <path d="M 700 420 Q 697 425 700 430" stroke="#f59e0b" stroke-width="0.4" fill="none" opacity="0.25"/>
    <path d="M 716 410 L 845 440" stroke="#ef4444" stroke-width="0.5" fill="none" opacity="0.3" marker-end="url(#arrowhead-red)"/>
  </g>
  
  <!-- Bot 4: Bottom Right -->
  <g id="bot4">
    <circle cx="1050" cy="450" r="16" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.25"/>
    <circle cx="1042" cy="444" r="3.5" fill="#f59e0b" opacity="0.3"/>
    <circle cx="1058" cy="444" r="3.5" fill="#f59e0b" opacity="0.3"/>
    <path d="M 1050 460 Q 1047 465 1050 470" stroke="#f59e0b" stroke-width="0.4" fill="none" opacity="0.25"/>
    <path d="M 1034 455 L 920 460" stroke="#ef4444" stroke-width="0.5" fill="none" opacity="0.3" marker-end="url(#arrowhead-red)"/>
  </g>
  
  <!-- Bot network connections -->
  <g id="botnet-lines" opacity="0.15">
    <line x1="750" y1="300" x2="1020" y2="300" stroke="#f59e0b" stroke-width="0.25"/>
    <line x1="750" y1="300" x2="700" y2="410" stroke="#f59e0b" stroke-width="0.25"/>
    <line x1="1020" y1="300" x2="1050" y2="450" stroke="#f59e0b" stroke-width="0.25"/>
    <line x1="700" y1="410" x2="1050" y2="450" stroke="#f59e0b" stroke-width="0.25"/>
  </g>
  
  <!-- Warning/Alert indicators -->
  <g id="warnings">
    <!-- Warning 1 -->
    <polygon points="920,240 930,260 910,260" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.25"/>
    <text x="920" y="255" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" opacity="0.35" text-anchor="middle">!</text>
    
    <!-- Warning 2 -->
    <polygon points="800,120 810,140 790,140" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.25"/>
    <text x="800" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" opacity="0.35" text-anchor="middle">!</text>
    
    <!-- Warning 3 -->
    <polygon points="1070,340 1080,360 1060,360" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.25"/>
    <text x="1070" y="355" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" opacity="0.35" text-anchor="middle">!</text>
  </g>
</svg>