<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3a3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0044;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3a3a;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#cc0044;stop-opacity:0.06" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Botnet + Cloud Threat Shield -->
  <!-- Outer shield body -->
  <path d="M1010,140 L1120,170 L1120,270 Q1120,320 1010,345 Q900,320 900,270 L900,170 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,80,80,0.30)" stroke-width="1.5"/>

  <!-- Inner shield layer -->
  <path d="M1010,160 L1105,185 L1105,268 Q1105,308 1010,328 Q915,308 915,268 L915,185 Z"
        fill="none" stroke="rgba(255,100,100,0.20)" stroke-width="1"/>

  <!-- Cloud shape inside shield -->
  <ellipse cx="1010" cy="240" rx="55" ry="30" fill="url(#cloudGrad)" stroke="rgba(100,180,255,0.30)" stroke-width="1.2"/>
  <ellipse cx="980" cy="248" rx="32" ry="22" fill="url(#cloudGrad)" stroke="rgba(100,180,255,0.25)" stroke-width="1"/>
  <ellipse cx="1040" cy="248" rx="32" ry="22" fill="url(#cloudGrad)" stroke="rgba(100,180,255,0.25)" stroke-width="1"/>
  <rect x="948" y="248" width="124" height="28" rx="4" fill="url(#cloudGrad)" stroke="none"/>

  <!-- AI brain circuit nodes on shield -->
  <circle cx="1010" cy="205" r="8" fill="none" stroke="rgba(255,80,80,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="205" r="3" fill="rgba(255,80,80,0.40)"/>
  <circle cx="975" cy="225" r="5" fill="none" stroke="rgba(255,120,60,0.30)" stroke-width="1.2"/>
  <circle cx="975" cy="225" r="2" fill="rgba(255,120,60,0.35)"/>
  <circle cx="1045" cy="225" r="5" fill="none" stroke="rgba(255,120,60,0.30)" stroke-width="1.2"/>
  <circle cx="1045" cy="225" r="2" fill="rgba(255,120,60,0.35)"/>
  <circle cx="960" cy="260" r="4" fill="none" stroke="rgba(200,80,255,0.28)" stroke-width="1"/>
  <circle cx="1060" cy="260" r="4" fill="none" stroke="rgba(200,80,255,0.28)" stroke-width="1"/>

  <!-- Circuit lines connecting nodes -->
  <line x1="1010" y1="213" x2="975" y2="220" stroke="rgba(255,100,60,0.22)" stroke-width="1"/>
  <line x1="1010" y1="213" x2="1045" y2="220" stroke="rgba(255,100,60,0.22)" stroke-width="1"/>
  <line x1="975" y1="230" x2="960" y2="256" stroke="rgba(200,80,255,0.18)" stroke-width="1"/>
  <line x1="1045" y1="230" x2="1060" y2="256" stroke="rgba(200,80,255,0.18)" stroke-width="1"/>
  <line x1="960" y1="264" x2="975" y2="268" stroke="rgba(100,180,255,0.20)" stroke-width="1"/>
  <line x1="1060" y1="264" x2="1045" y2="268" stroke="rgba(100,180,255,0.20)" stroke-width="1"/>

  <!-- Botnet spider web lines radiating from shield -->
  <line x1="1010" y1="145" x2="1010" y2="130" stroke="rgba(255,60,60,0.22)" stroke-width="1"/>
  <line x1="1115" y1="175" x2="1130" y2="165" stroke="rgba(255,60,60,0.18)" stroke-width="1"/>
  <line x1="1118" y1="268" x2="1135" y2="275" stroke="rgba(255,60,60,0.16)" stroke-width="1"/>
  <line x1="905" y1="175" x2="888" y2="162" stroke="rgba(255,60,60,0.18)" stroke-width="1"/>
  <line x1="902" y1="268" x2="884" y2="278" stroke="rgba(255,60,60,0.16)" stroke-width="1"/>
  <line x1="1010" y1="345" x2="1010" y2="360" stroke="rgba(255,60,60,0.18)" stroke-width="1"/>

  <!-- Botnet outer nodes -->
  <circle cx="1010" cy="127" r="6" fill="none" stroke="rgba(255,60,60,0.28)" stroke-width="1.2"/>
  <circle cx="1010" cy="127" r="2.5" fill="rgba(255,60,60,0.35)"/>
  <circle cx="1133" cy="162" r="5" fill="none" stroke="rgba(255,100,60,0.25)" stroke-width="1"/>
  <circle cx="1133" cy="162" r="2" fill="rgba(255,100,60,0.30)"/>
  <circle cx="1138" cy="278" r="5" fill="none" stroke="rgba(255,60,60,0.22)" stroke-width="1"/>
  <circle cx="885" cy="160" r="5" fill="none" stroke="rgba(255,100,60,0.25)" stroke-width="1"/>
  <circle cx="882" cy="280" r="5" fill="none" stroke="rgba(255,60,60,0.22)" stroke-width="1"/>
  <circle cx="1010" cy="363" r="6" fill="none" stroke="rgba(255,60,60,0.25)" stroke-width="1.2"/>
  <circle cx="1010" cy="363" r="2.5" fill="rgba(255,60,60,0.30)"/>

  <!-- Cross-connect botnet edges -->
  <line x1="1133" y1="167" x2="1138" y2="273" stroke="rgba(255,80,80,0.10)" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="885" y1="165" x2="882" y2="275" stroke="rgba(255,80,80,0.10)" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="1015" y1="363" x2="1138" y2="278" stroke="rgba(255,80,80,0.08)" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="1005" y1="363" x2="882" y2="278" stroke="rgba(255,80,80,0.08)" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Shield bottom point -->
  <polygon points="1010,350 995,325 1025,325" fill="rgba(255,60,60,0.15)" stroke="rgba(255,80,80,0.25)" stroke-width="1"/>

  <!-- Lock icon at shield center bottom -->
  <rect x="1000" y="290" width="20" height="16" rx="3" fill="rgba(255,80,80,0.20)" stroke="rgba(255,100,100,0.35)" stroke-width="1.2"/>
  <path d="M1004,290 L1004,285 Q1004,278 1010,278 Q1016,278 1016,285 L1016,290" fill="none" stroke="rgba(255,100,100,0.35)" stroke-width="1.2"/>
  <circle cx="1010" cy="298" r="2.5" fill="rgba(255,100,100,0.50)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,60,60,0.70)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="5" fill="rgba(255,140,0,0.70)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="5" fill="rgba(255,60,60,0.60)" filter="url(#glow)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(255,60,60,0.15)" stroke="rgba(255,60,60,0.35)" stroke-width="1"/>
  <text x="190" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(255,120,120,0.90)" text-anchor="middle" letter-spacing="1.5">FEBRUARY 6, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="rgba(255,90,90,0.95)" letter-spacing="-0.5">AI Botnet Cloud Threat</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(200,200,220,0.72)">Weekly intelligence briefing on AI-driven threats &amp; cloud security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(255,90,90,0.80)" letter-spacing="3">SECURITY / THREAT INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(255,40,40,0.18)" stroke="rgba(255,60,60,0.40)" stroke-width="1"/>
  <text x="135" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,120,0.95)" text-anchor="middle">AI Botnet</text>

  <rect x="205" y="402" width="130" height="36" rx="18" fill="rgba(255,140,0,0.15)" stroke="rgba(255,160,30,0.38)" stroke-width="1"/>
  <text x="270" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,180,80,0.95)" text-anchor="middle">Cloud Threat</text>

  <rect x="350" y="402" width="130" height="36" rx="18" fill="rgba(60,130,255,0.14)" stroke="rgba(80,160,255,0.35)" stroke-width="1"/>
  <text x="415" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(120,180,255,0.95)" text-anchor="middle">Threat Intel</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(160,160,190,0.55)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,90,90,0.50)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>