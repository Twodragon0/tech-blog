<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3a3a"/>
      <stop offset="100%" style="stop-color:#ff6b00"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3a3a"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3a3a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Botnet Cloud Threat Network -->
  <!-- Cloud shape (botnet cloud) -->
  <ellipse cx="1010" cy="185" rx="95" ry="55" fill="url(#cloudGrad)" stroke="rgba(74,144,226,0.25)" stroke-width="1.5"/>
  <ellipse cx="960" cy="200" rx="55" ry="38" fill="url(#cloudGrad)" stroke="rgba(74,144,226,0.2)" stroke-width="1"/>
  <ellipse cx="1065" cy="198" rx="52" ry="35" fill="url(#cloudGrad)" stroke="rgba(74,144,226,0.2)" stroke-width="1"/>
  <ellipse cx="1010" cy="215" rx="80" ry="32" fill="url(#cloudGrad)"/>

  <!-- Central threat node (AI core) -->
  <circle cx="1010" cy="185" r="28" fill="url(#nodeGlow)" stroke="rgba(255,58,58,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="185" r="18" fill="rgba(255,58,58,0.09)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <circle cx="1010" cy="185" r="8" fill="rgba(255,100,100,0.2)" stroke="rgba(255,120,120,0.5)" stroke-width="1"/>

  <!-- AI core cross pattern -->
  <line x1="1010" y1="170" x2="1010" y2="200" stroke="rgba(255,80,80,0.4)" stroke-width="1.5"/>
  <line x1="995" y1="185" x2="1025" y2="185" stroke="rgba(255,80,80,0.4)" stroke-width="1.5"/>

  <!-- Botnet nodes surrounding -->
  <circle cx="930" cy="145" r="12" fill="rgba(255,107,0,0.1)" stroke="rgba(255,107,0,0.35)" stroke-width="1"/>
  <circle cx="930" cy="145" r="5" fill="rgba(255,107,0,0.2)"/>

  <circle cx="1090" cy="148" r="12" fill="rgba(255,107,0,0.1)" stroke="rgba(255,107,0,0.35)" stroke-width="1"/>
  <circle cx="1090" cy="148" r="5" fill="rgba(255,107,0,0.2)"/>

  <circle cx="895" cy="215" r="10" fill="rgba(255,58,58,0.1)" stroke="rgba(255,58,58,0.3)" stroke-width="1"/>
  <circle cx="895" cy="215" r="4" fill="rgba(255,58,58,0.2)"/>

  <circle cx="1125" cy="218" r="10" fill="rgba(255,58,58,0.1)" stroke="rgba(255,58,58,0.3)" stroke-width="1"/>
  <circle cx="1125" cy="218" r="4" fill="rgba(255,58,58,0.2)"/>

  <circle cx="955" cy="255" r="9" fill="rgba(123,47,255,0.1)" stroke="rgba(123,47,255,0.3)" stroke-width="1"/>
  <circle cx="955" cy="255" r="4" fill="rgba(123,47,255,0.2)"/>

  <circle cx="1065" cy="258" r="9" fill="rgba(123,47,255,0.1)" stroke="rgba(123,47,255,0.3)" stroke-width="1"/>
  <circle cx="1065" cy="258" r="4" fill="rgba(123,47,255,0.2)"/>

  <!-- Connection lines (botnet mesh) -->
  <line x1="1010" y1="185" x2="930" y2="145" stroke="rgba(255,107,0,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1010" y1="185" x2="1090" y2="148" stroke="rgba(255,107,0,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1010" y1="185" x2="895" y2="215" stroke="rgba(255,58,58,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1010" y1="185" x2="1125" y2="218" stroke="rgba(255,58,58,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1010" y1="185" x2="955" y2="255" stroke="rgba(123,47,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1010" y1="185" x2="1065" y2="258" stroke="rgba(123,47,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Inter-node connections -->
  <line x1="930" y1="145" x2="895" y2="215" stroke="rgba(255,80,80,0.12)" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="1090" y1="148" x2="1125" y2="218" stroke="rgba(255,80,80,0.12)" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="895" y1="215" x2="955" y2="255" stroke="rgba(123,47,255,0.12)" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="1125" y1="218" x2="1065" y2="258" stroke="rgba(123,47,255,0.12)" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Threat propagation arcs -->
  <path d="M 960 140 Q 1010 110 1060 140" fill="none" stroke="rgba(255,58,58,0.15)" stroke-width="1.5" stroke-dasharray="5,4"/>
  <path d="M 900 230 Q 1010 270 1120 230" fill="none" stroke="rgba(74,144,226,0.12)" stroke-width="1" stroke-dasharray="4,5"/>

  <!-- Shield outline (security) -->
  <path d="M 1010 130 L 1035 143 L 1035 175 Q 1035 195 1010 205 Q 985 195 985 175 L 985 143 Z" fill="rgba(255,58,58,0.06)" stroke="rgba(255,80,80,0.22)" stroke-width="1.5"/>

  <!-- Outer orbit ring -->
  <circle cx="1010" cy="195" r="75" fill="none" stroke="rgba(74,144,226,0.08)" stroke-width="1" stroke-dasharray="6,5"/>
  <circle cx="1010" cy="195" r="105" fill="none" stroke="rgba(255,58,58,0.06)" stroke-width="1" stroke-dasharray="8,6"/>

  <!-- Alert pulse rings on central node -->
  <circle cx="1010" cy="185" r="35" fill="none" stroke="rgba(255,58,58,0.12)" stroke-width="1"/>
  <circle cx="1010" cy="185" r="46" fill="none" stroke="rgba(255,58,58,0.07)" stroke-width="1"/>

  <!-- Small data packets traveling lines -->
  <circle cx="970" cy="162" r="3" fill="rgba(255,107,0,0.5)"/>
  <circle cx="1050" cy="165" r="3" fill="rgba(255,107,0,0.5)"/>
  <circle cx="940" cy="200" r="2.5" fill="rgba(255,80,80,0.4)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,58,58,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,107,0,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,58,58,0.6)"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(255,58,58,0.12)" stroke="rgba(255,58,58,0.3)" stroke-width="1"/>
  <text x="190" y="81" font-family="'Courier New', monospace" font-size="13" font-weight="600" fill="rgba(255,120,120,0.9)" text-anchor="middle" letter-spacing="1">FEBRUARY 6, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="rgba(255,90,90,0.95)" letter-spacing="-0.5">AI Botnet Cloud Threat</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(200,210,230,0.75)">Analyzing distributed AI-powered botnets targeting cloud infrastructure</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(255,58,58,0.8)" letter-spacing="2">SECURITY / THREAT INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(255,58,58,0.15)" stroke="rgba(255,58,58,0.35)" stroke-width="1"/>
  <text x="135" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,120,0.95)" text-anchor="middle">AI Botnet</text>

  <rect x="205" y="402" width="120" height="36" rx="18" fill="rgba(255,107,0,0.15)" stroke="rgba(255,107,0,0.35)" stroke-width="1"/>
  <text x="265" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,160,60,0.95)" text-anchor="middle">Cloud Threat</text>

  <rect x="340" y="402" width="130" height="36" rx="18" fill="rgba(74,144,226,0.15)" stroke="rgba(74,144,226,0.35)" stroke-width="1"/>
  <text x="405" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(100,180,255,0.95)" text-anchor="middle">Weekly Digest</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="14" fill="rgba(150,160,180,0.6)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="14" fill="rgba(150,160,180,0.6)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>