<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>3Cs Security Framework - Context, Compliance, Control</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a1a"/>
      <stop offset="100%" style="stop-color:#153030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Three overlapping circles (Venn diagram) -->
  <!-- Context circle - top left -->
  <circle cx="930" cy="215" r="110" fill="rgba(26,188,156,0.18)" stroke="rgba(26,188,156,0.6)" stroke-width="3"/>
  <!-- Compliance circle - top right -->
  <circle cx="1050" cy="215" r="110" fill="rgba(41,128,185,0.18)" stroke="rgba(41,128,185,0.6)" stroke-width="3"/>
  <!-- Control circle - bottom center -->
  <circle cx="990" cy="330" r="110" fill="rgba(39,174,96,0.15)" stroke="rgba(39,174,96,0.55)" stroke-width="3"/>
  <!-- Center intersection highlight -->
  <circle cx="990" cy="255" r="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- C labels in circles (as shapes, not text per spec) -->
  <!-- Context label area - left -->
  <rect x="875" y="175" width="40" height="30" rx="4" fill="rgba(26,188,156,0.35)"/>
  <!-- Compliance label area - right -->
  <rect x="1000" y="175" width="40" height="30" rx="4" fill="rgba(41,128,185,0.35)"/>
  <!-- Control label area - bottom -->
  <rect x="965" y="340" width="40" height="30" rx="4" fill="rgba(39,174,96,0.3)"/>
  <!-- Small decorative dots in each circle -->
  <circle cx="900" cy="200" r="5" fill="rgba(26,188,156,0.6)"/>
  <circle cx="1075" cy="200" r="5" fill="rgba(41,128,185,0.6)"/>
  <circle cx="990" cy="380" r="5" fill="rgba(39,174,96,0.6)"/>
  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,255,255,0.02)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(26,188,156,0.2)"/>
  <text x="180" y="81" font-family="Arial" font-size="12" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">FEBRUARY 4, 2026</text>
  <text x="80" y="185" font-family="Arial" font-size="44" font-weight="700" fill="#ffffff">3Cs Security Framework</text>
  <text x="80" y="245" font-family="Arial" font-size="44" font-weight="700" fill="#ffffff">Context, Compliance, Control</text>
  <text x="80" y="300" font-family="Arial" font-size="19" fill="rgba(175,225,215,0.85)">A unified model for layered organizational security governance</text>
  <rect x="80" y="325" width="420" height="3" fill="url(#accent)"/>
  <text x="80" y="370" font-family="Arial" font-size="14" fill="rgba(26,188,156,0.9)" letter-spacing="2">SECURITY FRAMEWORK</text>
  <rect x="80" y="400" width="135" height="36" rx="18" fill="rgba(26,188,156,0.25)" stroke="rgba(26,188,156,0.5)" stroke-width="1"/>
  <text x="147" y="423" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle">3Cs Framework</text>
  <rect x="229" y="400" width="120" height="36" rx="18" fill="rgba(41,128,185,0.3)" stroke="rgba(41,128,185,0.5)" stroke-width="1"/>
  <text x="289" y="423" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle">Compliance</text>
  <rect x="363" y="400" width="100" height="36" rx="18" fill="rgba(52,73,94,0.5)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="413" y="423" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle">Control</text>
  <rect x="0" y="520" width="1200" height="110" fill="rgba(0,0,0,0.35)"/>
  <text x="80" y="545" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.55)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="end">DevSecOps</text>
</svg>
