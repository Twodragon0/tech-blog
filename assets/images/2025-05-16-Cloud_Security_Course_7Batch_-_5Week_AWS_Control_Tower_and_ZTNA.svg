<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security 7th Week 5 Control Tower and ZTNA</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#151a35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- Control Tower building -->
  <rect x="915" y="305" width="90" height="125" rx="4" fill="none" stroke="rgba(52,152,219,0.6)" stroke-width="3"/>
  <rect x="933" y="225" width="54" height="80" rx="4" fill="none" stroke="rgba(52,152,219,0.5)" stroke-width="2"/>
  <rect x="952" y="178" width="16" height="47" fill="rgba(52,152,219,0.55)" rx="2"/>
  <!-- Tower top light -->
  <circle cx="960" cy="175" r="6" fill="rgba(52,152,219,0.8)"/>
  <!-- Tower windows -->
  <rect x="927" y="318" width="22" height="16" rx="2" fill="rgba(52,152,219,0.3)"/>
  <rect x="965" y="318" width="22" height="16" rx="2" fill="rgba(52,152,219,0.3)"/>
  <rect x="927" y="348" width="22" height="16" rx="2" fill="rgba(52,152,219,0.25)"/>
  <rect x="965" y="348" width="22" height="16" rx="2" fill="rgba(52,152,219,0.3)"/>
  <rect x="927" y="378" width="22" height="16" rx="2" fill="rgba(52,152,219,0.2)"/>
  <rect x="965" y="378" width="22" height="16" rx="2" fill="rgba(52,152,219,0.25)"/>
  <!-- ZTNA perimeter rings around tower -->
  <circle cx="1075" cy="290" r="75" fill="none" stroke="rgba(26,188,156,0.25)" stroke-width="2" stroke-dasharray="8,5"/>
  <circle cx="1075" cy="290" r="50" fill="none" stroke="rgba(26,188,156,0.38)" stroke-width="2" stroke-dasharray="6,4"/>
  <circle cx="1075" cy="290" r="28" fill="none" stroke="rgba(26,188,156,0.6)" stroke-width="2"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="190" height="32" rx="4" fill="rgba(52,152,219,0.2)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <text x="175" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">MAY 16, 2025</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Cloud Security 7th</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">Week 5: CT &amp; ZTNA</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">AWS Control Tower and Zero Trust Network Access</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">CLOUD SECURITY COURSE</text>
  <!-- Tags -->
  <rect x="80" y="420" width="145" height="36" rx="18" fill="rgba(52,152,219,0.18)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <text x="152" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#3498db" text-anchor="middle" font-weight="600">Control Tower</text>
  <rect x="241" y="420" width="80" height="36" rx="18" fill="rgba(26,188,156,0.18)" stroke="rgba(26,188,156,0.4)" stroke-width="1"/>
  <text x="281" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#1abc9c" text-anchor="middle" font-weight="600">ZTNA</text>
  <rect x="337" y="420" width="90" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="382" y="443" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">Week 5</text>
  <!-- Bottom -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
