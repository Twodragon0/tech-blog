<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#4488ff"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6600"/>
      <stop offset="100%" style="stop-color:#4488ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="towerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8844;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ff4400;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4499ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2266cc;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaa44;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Control Tower + AWS Cloud Security -->
  <!-- Background orbit rings -->
  <ellipse cx="1010" cy="225" rx="130" ry="50" fill="none" stroke="rgba(255,140,0,0.18)" stroke-width="1.5" stroke-dasharray="8,5"/>
  <ellipse cx="1010" cy="225" rx="100" ry="38" fill="none" stroke="rgba(68,153,255,0.15)" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Control Tower Base Structure -->
  <rect x="985" y="260" width="50" height="70" fill="url(#towerGrad)" stroke="rgba(255,140,0,0.3)" stroke-width="1.5" rx="2"/>
  <rect x="975" y="255" width="70" height="15" fill="rgba(255,120,0,0.12)" stroke="rgba(255,140,0,0.25)" stroke-width="1" rx="1"/>
  <rect x="995" y="200" width="30" height="60" fill="rgba(255,100,0,0.10)" stroke="rgba(255,140,0,0.22)" stroke-width="1.2" rx="1"/>
  <rect x="1003" y="170" width="14" height="35" fill="rgba(255,80,0,0.12)" stroke="rgba(255,140,0,0.28)" stroke-width="1" rx="1"/>
  <!-- Tower tip antenna -->
  <line x1="1010" y1="150" x2="1010" y2="172" stroke="rgba(255,180,60,0.35)" stroke-width="2"/>
  <circle cx="1010" cy="147" r="4" fill="rgba(255,200,80,0.35)" stroke="rgba(255,220,100,0.5)" stroke-width="1"/>

  <!-- Windows on tower -->
  <rect x="990" y="268" width="8" height="8" rx="1" fill="rgba(255,200,80,0.18)" stroke="rgba(255,220,100,0.3)" stroke-width="0.8"/>
  <rect x="1002" y="268" width="8" height="8" rx="1" fill="rgba(255,200,80,0.14)" stroke="rgba(255,220,100,0.25)" stroke-width="0.8"/>
  <rect x="1014" y="268" width="8" height="8" rx="1" fill="rgba(255,200,80,0.18)" stroke="rgba(255,220,100,0.3)" stroke-width="0.8"/>
  <rect x="990" y="282" width="8" height="8" rx="1" fill="rgba(68,153,255,0.18)" stroke="rgba(100,180,255,0.3)" stroke-width="0.8"/>
  <rect x="1014" y="282" width="8" height="8" rx="1" fill="rgba(68,153,255,0.14)" stroke="rgba(100,180,255,0.25)" stroke-width="0.8"/>

  <!-- Cloud shape around tower (AWS Cloud) -->
  <path d="M920,210 Q910,185 930,175 Q940,155 965,162 Q975,145 1000,148 Q1025,135 1045,155 Q1065,148 1075,165 Q1095,165 1100,182 Q1115,185 1112,202 Q1115,220 1098,222 L922,222 Q908,225 920,210 Z"
        fill="url(#cloudGrad)" stroke="rgba(68,153,255,0.25)" stroke-width="1.5"/>

  <!-- Inner cloud layers -->
  <path d="M935,215 Q928,198 942,190 Q952,176 970,182 Q980,168 1000,172 Q1018,162 1032,176 Q1048,170 1055,184 Q1068,184 1068,197 Q1070,210 1058,212 L938,212 Q930,214 935,215 Z"
        fill="rgba(68,153,255,0.09)" stroke="rgba(100,180,255,0.18)" stroke-width="1"/>

  <!-- Shield (Security) -->
  <path d="M880,145 L880,185 Q880,210 905,220 Q930,210 930,185 L930,145 L905,135 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,170,60,0.32)" stroke-width="1.5"/>
  <!-- Shield checkmark -->
  <polyline points="892,182 901,192 920,168" fill="none" stroke="rgba(255,200,80,0.45)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Shield inner border -->
  <path d="M888,152 L888,183 Q888,202 905,210 Q922,202 922,183 L922,152 L905,144 Z"
        fill="none" stroke="rgba(255,180,60,0.2)" stroke-width="1"/>

  <!-- AWS Control Tower label nodes (connected services) -->
  <!-- Node 1: Organizations -->
  <circle cx="885" cy="295" r="22" fill="rgba(68,153,255,0.10)" stroke="rgba(68,153,255,0.30)" stroke-width="1.5"/>
  <text x="885" y="291" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(100,180,255,0.6)">ORG</text>
  <text x="885" y="301" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(100,180,255,0.6)">MGMT</text>

  <!-- Node 2: IAM Identity Center -->
  <circle cx="1100" cy="290" r="22" fill="rgba(255,100,0,0.10)" stroke="rgba(255,140,0,0.30)" stroke-width="1.5"/>
  <text x="1100" y="286" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(255,180,60,0.6)">IAM</text>
  <text x="1100" y="296" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(255,180,60,0.6)">SSO</text>

  <!-- Node 3: Landing Zone -->
  <circle cx="950" cy="355" r="22" fill="rgba(150,80,255,0.10)" stroke="rgba(150,100,255,0.28)" stroke-width="1.5"/>
  <text x="950" y="351" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(180,120,255,0.6)">LAND</text>
  <text x="950" y="361" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(180,120,255,0.6)">ZONE</text>

  <!-- Node 4: Config -->
  <circle cx="1070" cy="355" r="22" fill="rgba(0,200,120,0.09)" stroke="rgba(0,220,140,0.28)" stroke-width="1.5"/>
  <text x="1070" y="351" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(80,220,160,0.6)">AWS</text>
  <text x="1070" y="361" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(80,220,160,0.6)">CONFIG</text>

  <!-- Connection lines from tower to nodes -->
  <line x1="985" y1="305" x2="907" y2="295" stroke="rgba(68,153,255,0.18)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1035" y1="305" x2="1078" y2="290" stroke="rgba(255,140,0,0.18)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1000" y1="330" x2="970" y2="348" stroke="rgba(150,100,255,0.18)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1020" y1="330" x2="1052" y2="348" stroke="rgba(0,200,120,0.18)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Guardrail arcs -->
  <path d="M870,240 Q1010,130 1150,240" fill="none" stroke="rgba(255,120,0,0.12)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <path d="M875,248 Q1010,148 1145,248" fill="none" stroke="rgba(68,153,255,0.10)" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,80,80,0.7)"/>
  <circle cx="900" cy="420" r="5" fill="rgba(255,160,0,0.7)"/>
  <circle cx="860" cy="440" r="5" fill="rgba(80,160,255,0.7)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,100,0,0.15)" stroke="rgba(255,120,0,0.35)" stroke-width="1"/>
  <text x="96" y="81" font-family="'Courier New',monospace" font-size="13" font-weight="600" fill="rgba(255,180,80,0.9)" letter-spacing="1">MAY 16, 2025</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white">Cloud Security Course 7Batch</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white">5Week AWS Control Tower</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(200,200,220,0.75)">AWS Landing Zone, Guardrails &amp; Multi-Account Governance</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial',sans-serif" font-size="14" font-weight="600" fill="rgba(255,140,60,0.85)" letter-spacing="2">CLOUD SECURITY / AWS / GOVERNANCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="148" height="36" rx="18" fill="rgba(220,50,50,0.18)" stroke="rgba(255,80,80,0.35)" stroke-width="1.2"/>
  <text x="154" y="425" text-anchor="middle" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,130,130,0.9)">Control Tower</text>

  <rect x="244" y="402" width="138" height="36" rx="18" fill="rgba(200,130,0,0.18)" stroke="rgba(255,180,0,0.35)" stroke-width="1.2"/>
  <text x="313" y="425" text-anchor="middle" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,210,80,0.9)">Guardrails</text>

  <rect x="398" y="402" width="138" height="36" rx="18" fill="rgba(30,80,200,0.18)" stroke="rgba(80,140,255,0.35)" stroke-width="1.2"/>
  <text x="467" y="425" text-anchor="middle" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(120,180,255,0.9)">Landing Zone</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="14" fill="rgba(180,180,200,0.5)">tech.2twodragon.com</text>
  <text x="1120" y="545" text-anchor="end" font-family="'Arial',sans-serif" font-size="14" font-weight="600" fill="rgba(255,140,60,0.45)" letter-spacing="1">CLOUD</text>
</svg>