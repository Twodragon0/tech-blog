<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="awsOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF7300;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00A8CC;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE CONTENT -->

  <!-- Title Line 1 -->
  <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">
    Cloud Security Course
  </text>

  <!-- Title Line 2 -->
  <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">
    7Batch 5Week AWS
  </text>

  <!-- Date Badge -->
  <rect x="60" y="280" width="200" height="40" rx="8" fill="none" stroke="#FF9900" stroke-width="2"/>
  <text x="160" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#FF9900" text-anchor="middle">
    MAY 16, 2025
  </text>

  <!-- Tag Pills -->
  <g>
    <!-- Tag 1: AWS -->
    <rect x="60" y="420" width="95" height="36" rx="18" fill="#FF9900" opacity="0.15" stroke="#FF9900" stroke-width="1.5"/>
    <text x="107.5" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#FF9900" text-anchor="middle">
      AWS
    </text>

    <!-- Tag 2: Control Tower -->
    <rect x="175" y="420" width="155" height="36" rx="18" fill="#00D9FF" opacity="0.15" stroke="#00D9FF" stroke-width="1.5"/>
    <text x="252.5" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#00D9FF" text-anchor="middle">
      Control Tower
    </text>

    <!-- Tag 3: ZTNA -->
    <rect x="350" y="420" width="80" height="36" rx="18" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="390" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#7C3AED" text-anchor="middle">
      ZTNA
    </text>
  </g>

  <!-- Footer -->
  <text x="60" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#888888">
    tech.2twodragon.com
  </text>

  <!-- RIGHT SIDE ILLUSTRATION -->

  <!-- Background subtle grid -->
  <g opacity="0.08">
    <line x1="700" y1="100" x2="1150" y2="100" stroke="#00D9FF" stroke-width="1"/>
    <line x1="700" y1="150" x2="1150" y2="150" stroke="#00D9FF" stroke-width="1"/>
    <line x1="700" y1="200" x2="1150" y2="200" stroke="#00D9FF" stroke-width="1"/>
    <line x1="750" y1="100" x2="750" y2="550" stroke="#00D9FF" stroke-width="1"/>
    <line x1="900" y1="100" x2="900" y2="550" stroke="#00D9FF" stroke-width="1"/>
    <line x1="1050" y1="100" x2="1050" y2="550" stroke="#00D9FF" stroke-width="1"/>
  </g>

  <!-- SECTION 1: AWS Control Tower (Top - Hierarchical Structure) -->

  <!-- Management Account/Hub (center-top) -->
  <rect x="840" y="120" width="160" height="80" rx="8" fill="url(#awsOrange)" opacity="0.25" stroke="#FF9900" stroke-width="2"/>
  <text x="920" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FF9900" text-anchor="middle">
    Management Account
  </text>
  <text x="920" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FFB84D" text-anchor="middle">
    Control Tower Hub
  </text>
  <circle cx="920" cy="185" r="4" fill="#FF9900" opacity="0.8"/>

  <!-- Organizational Units (below management account) -->
  <!-- OU 1: Security -->
  <rect x="720" y="250" width="110" height="70" rx="6" fill="#FF7300" opacity="0.2" stroke="#FF9900" stroke-width="1.5"/>
  <text x="775" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFB84D" text-anchor="middle">
    Security OU
  </text>
  <circle cx="775" cy="300" r="5" fill="#FF9900" opacity="0.7"/>

  <!-- OU 2: Workload -->
  <rect x="865" y="250" width="110" height="70" rx="6" fill="#FF7300" opacity="0.2" stroke="#FF9900" stroke-width="1.5"/>
  <text x="920" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFB84D" text-anchor="middle">
    Workload OU
  </text>
  <circle cx="920" cy="300" r="5" fill="#FF9900" opacity="0.7"/>

  <!-- OU 3: Compliance -->
  <rect x="1010" y="250" width="110" height="70" rx="6" fill="#FF7300" opacity="0.2" stroke="#FF9900" stroke-width="1.5"/>
  <text x="1065" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFB84D" text-anchor="middle">
    Compliance OU
  </text>
  <circle cx="1065" cy="300" r="5" fill="#FF9900" opacity="0.7"/>

  <!-- Connector lines from management to OUs -->
  <line x1="880" y1="200" x2="775" y2="250" stroke="#FF9900" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <line x1="920" y1="200" x2="920" y2="250" stroke="#FF9900" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>
  <line x1="960" y1="200" x2="1065" y2="250" stroke="#FF9900" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>

  <!-- SECTION 2: ZTNA Layer (Bottom - Network Trust Verification) -->

  <!-- ZTNA Label -->
  <text x="920" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#7C3AED" opacity="0.9">
    ZERO TRUST NETWORK ACCESS
  </text>

  <!-- Main Trust Shield/Verification Circle -->
  <circle cx="920" cy="460" r="55" fill="none" stroke="url(#tealGradient)" stroke-width="2" opacity="0.8"/>
  <circle cx="920" cy="460" r="45" fill="none" stroke="url(#tealGradient)" stroke-width="1" opacity="0.5"/>
  <circle cx="920" cy="460" r="35" fill="url(#tealGradient)" opacity="0.1"/>

  <!-- Verification indicators (3 points around shield) -->
  <!-- Point 1: Identity -->
  <rect x="790" y="440" width="85" height="50" rx="6" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="832.5" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B89DFF" text-anchor="middle">
    Identity
  </text>
  <text x="832.5" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9B7ED5" text-anchor="middle">
    Verify
  </text>
  <line x1="860" y1="460" x2="905" y2="460" stroke="#7C3AED" stroke-width="1.5" opacity="0.6" marker-end="url(#arrowPurple)"/>

  <!-- Point 2: Device -->
  <rect x="955" y="390" width="85" height="50" rx="6" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="997.5" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B89DFF" text-anchor="middle">
    Device
  </text>
  <text x="997.5" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9B7ED5" text-anchor="middle">
    Compliance
  </text>
  <line x1="960" y1="425" x2="920" y2="440" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>

  <!-- Point 3: Access -->
  <rect x="955" y="480" width="85" height="50" rx="6" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="997.5" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B89DFF" text-anchor="middle">
    Access
  </text>
  <text x="997.5" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9B7ED5" text-anchor="middle">
    Enforce
  </text>
  <line x1="960" y1="505" x2="920" y2="485" stroke="#7C3AED" stroke-width="1.5" opacity="0.6"/>

  <!-- Center lock icon in shield -->
  <rect x="905" y="445" width="30" height="35" rx="3" fill="none" stroke="#00D9FF" stroke-width="2"/>
  <path d="M 915 445 Q 915 435 920 435 Q 925 435 925 445" fill="none" stroke="#00D9FF" stroke-width="2" stroke-linecap="round"/>
  <circle cx="920" cy="462" r="3" fill="#00D9FF"/>

  <!-- Marker arrow definition -->
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7C3AED" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Connection indicators between tower and ZTNA -->
  <path d="M 920 330 Q 920 380 920 420" stroke="#FF9900" stroke-width="1" opacity="0.3" fill="none" stroke-dasharray="2,3"/>

  <!-- Accent dots -->
  <circle cx="750" cy="140" r="2.5" fill="#FF9900" opacity="0.6"/>
  <circle cx="1100" cy="160" r="2.5" fill="#FF9900" opacity="0.6"/>
  <circle cx="770" cy="420" r="2.5" fill="#7C3AED" opacity="0.6"/>
  <circle cx="1070" cy="500" r="2.5" fill="#7C3AED" opacity="0.6"/>
</svg>