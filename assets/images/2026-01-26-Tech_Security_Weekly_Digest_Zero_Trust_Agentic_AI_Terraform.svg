    <line x1="39" y1="39" x2="131" y2="32" stroke="#475569" stroke-width="1"/>
    <line x1="131" y1="32" x2="142" y2="80" stroke="#475569" stroke-width="1"/>
    <line x1="142" y1="80" x2="219" y2="142" stroke="#475569" stroke-width="1"/>
