<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1123;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c92a5f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Left Side Content -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-0.5">Tech Security Weekly</text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-0.5">Digest Zero Trust</text>
  
  <!-- Date Badge -->
  <rect x="60" y="280" width="340" height="50" rx="6" fill="#1a1f35" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="75" y="312" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#00d4ff">📅 JANUARY 26, 2026</text>
  
  <!-- Tag Pills -->
  <g>
    <!-- Tag 1 -->
    <rect x="60" y="420" width="100" height="36" rx="18" fill="#1a3f5f" stroke="#00d4ff" stroke-width="1"/>
    <text x="110" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#00d4ff" text-anchor="middle">Zero Trust</text>
    
    <!-- Tag 2 -->
    <rect x="175" y="420" width="100" height="36" rx="18" fill="#3f1a3f" stroke="#ff6b9d" stroke-width="1"/>
    <text x="225" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ff6b9d" text-anchor="middle">Security</text>
    
    <!-- Tag 3 -->
    <rect x="290" y="420" width="110" height="36" rx="18" fill="#1a3f2f" stroke="#00ff88" stroke-width="1"/>
    <text x="345" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#00ff88" text-anchor="middle">Verification</text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="580" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#666">tech.2twodragon.com</text>
  
  <!-- Right Side: Zero Trust Illustration -->
  <!-- Center point for layered design -->
  
  <!-- Outer verification ring -->
  <circle cx="925" cy="315" r="200" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="925" cy="315" r="160" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Identity verification node (top) -->
  <g filter="url(#glow)">
    <circle cx="925" cy="125" r="35" fill="url(#accentGrad)"/>
    <text x="925" y="135" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">👤</text>
  </g>
  <line x1="925" y1="160" x2="925" y2="240" stroke="#00d4ff" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  
  <!-- Access control node (left) -->
  <g filter="url(#glow)">
    <circle cx="780" cy="315" r="35" fill="url(#accentGrad2)"/>
    <text x="780" y="325" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">🔐</text>
  </g>
  <line x1="815" y1="315" x2="885" y2="315" stroke="#ff6b9d" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  
  <!-- Network verification node (right) -->
  <g filter="url(#glow)">
    <circle cx="1070" cy="315" r="35" fill="#00ff88" opacity="0.8"/>
    <text x="1070" y="325" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0a0c1a" text-anchor="middle">🌐</text>
  </g>
  <line x1="965" y1="315" x2="1035" y2="315" stroke="#00ff88" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  
  <!-- Device trust node (bottom-left) -->
  <g filter="url(#glow)">
    <circle cx="820" cy="450" r="35" fill="#ff6b9d" opacity="0.7"/>
    <text x="820" y="460" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">💻</text>
  </g>
  <line x1="835" y1="415" x2="900" y2="365" stroke="#ff6b9d" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  
  <!-- Data protection node (bottom-right) -->
  <g filter="url(#glow)">
    <circle cx="1030" cy="450" r="35" fill="#00d4ff" opacity="0.7"/>
    <text x="1030" y="460" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">🛡️</text>
  </g>
  <line x1="1015" y1="415" x2="950" y2="365" stroke="#00d4ff" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  
  <!-- Central verification hub -->
  <g filter="url(#glow)">
    <circle cx="925" cy="315" r="45" fill="none" stroke="url(#accentGrad)" stroke-width="2.5"/>
    <circle cx="925" cy="315" r="40" fill="none" stroke="url(#accentGrad2)" stroke-width="1.5" opacity="0.5"/>
    <text x="925" y="325" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#00d4ff" text-anchor="middle">✓</text>
  </g>
  
  <!-- Connecting verification checkmarks -->
  <g opacity="0.7">
    <circle cx="880" cy="285" r="6" fill="#00ff88"/>
    <circle cx="970" cy="285" r="6" fill="#00ff88"/>
    <circle cx="880" cy="345" r="6" fill="#00ff88"/>
    <circle cx="970" cy="345" r="6" fill="#00ff88"/>
  </g>
  
  <!-- Data flow arrows (subtle) -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00d4ff" opacity="0.5"/>
    </marker>
  </defs>
  
  <!-- Decorative tech pattern (bottom right corner) -->
  <g opacity="0.15">
    <rect x="1050" y="500" width="120" height="120" rx="8" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <line x1="1050" y1="540" x2="1170" y2="540" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="1050" y1="560" x2="1170" y2="560" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="1050" y1="580" x2="1170" y2="580" stroke="#00d4ff" stroke-width="0.5"/>
  </g>
</svg>