  <rect x="982" y="252" width="22" height="28" rx="8" fill="rgba(100,220,100,0.10)" stroke="rgba(100,220,100,0.3)" stroke-width="1.2"/>
  <rect x="1016" y="252" width="22" height="28" rx="8" fill="rgba(100,220,100,0.10)" stroke="rgba(100,220,100,0.3)" stroke-width="1.2"/>

