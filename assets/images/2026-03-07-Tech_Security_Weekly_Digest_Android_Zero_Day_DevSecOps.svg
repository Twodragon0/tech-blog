<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="50%" style="stop-color:#9b2c2c"/>
      <stop offset="100%" style="stop-color:#2d1a1a"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#9b2c2c;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="androidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ddc84;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#1a8c50;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background decorative circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(229,62,62,0.04)" stroke="rgba(229,62,62,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(229,62,62,0.05)" stroke="rgba(229,62,62,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Android robot + shield + zero-day burst -->

  <!-- Outer orbit ring -->
  <circle cx="1010" cy="225" r="115" fill="none" stroke="rgba(229,62,62,0.18)" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Shield background -->
  <path d="M1010 120 L1070 145 L1070 205 Q1070 250 1010 275 Q950 250 950 205 L950 145 Z" fill="url(#shieldGrad)" stroke="rgba(229,62,62,0.30)" stroke-width="1.5"/>
  <!-- Shield inner detail -->
  <path d="M1010 135 L1058 156 L1058 205 Q1058 240 1010 260 Q962 240 962 205 L962 156 Z" fill="none" stroke="rgba(229,62,62,0.18)" stroke-width="1"/>

  <!-- Android robot body inside shield -->
  <!-- Android head -->
  <rect x="990" y="168" width="40" height="30" rx="6" fill="url(#androidGrad)" stroke="rgba(61,220,132,0.35)" stroke-width="1.2"/>
  <!-- Android eyes -->
  <circle cx="1002" cy="181" r="3" fill="rgba(61,220,132,0.70)"/>
  <circle cx="1018" cy="181" r="3" fill="rgba(61,220,132,0.70)"/>
  <!-- Android antennae -->
  <line x1="1000" y1="168" x2="995" y2="158" stroke="rgba(61,220,132,0.50)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1020" y1="168" x2="1025" y2="158" stroke="rgba(61,220,132,0.50)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="995" cy="157" r="2" fill="rgba(61,220,132,0.55)"/>
  <circle cx="1025" cy="157" r="2" fill="rgba(61,220,132,0.55)"/>
  <!-- Android body -->
  <rect x="986" y="200" width="48" height="32" rx="4" fill="url(#androidGrad)" stroke="rgba(61,220,132,0.28)" stroke-width="1.2"/>
  <!-- Android arms -->
  <rect x="974" y="202" width="10" height="22" rx="5" fill="rgba(61,220,132,0.10)" stroke="rgba(61,220,132,0.25)" stroke-width="1"/>
  <rect x="1036" y="202" width="10" height="22" rx="5" fill="rgba(61,220,132,0.10)" stroke="rgba(61,220,132,0.25)" stroke-width="1"/>
  <!-- Android legs -->
  <rect x="994" y="233" width="10" height="16" rx="3" fill="rgba(61,220,132,0.10)" stroke="rgba(61,220,132,0.22)" stroke-width="1"/>
  <rect x="1016" y="233" width="10" height="16" rx="3" fill="rgba(61,220,132,0.10)" stroke="rgba(61,220,132,0.22)" stroke-width="1"/>

  <!-- Zero-day burst lines (danger spikes) -->
  <line x1="1010" y1="110" x2="1010" y2="95" stroke="rgba(229,62,62,0.40)" stroke-width="2" stroke-linecap="round"/>
  <line x1="1075" y1="140" x2="1088" y2="130" stroke="rgba(229,62,62,0.35)" stroke-width="2" stroke-linecap="round"/>
  <line x1="1095" y1="210" x2="1112" y2="208" stroke="rgba(229,62,62,0.30)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="945" y1="140" x2="932" y2="130" stroke="rgba(229,62,62,0.35)" stroke-width="2" stroke-linecap="round"/>
  <line x1="925" y1="210" x2="908" y2="208" stroke="rgba(229,62,62,0.30)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="950" y1="270" x2="938" y2="282" stroke="rgba(229,62,62,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1070" y1="270" x2="1082" y2="282" stroke="rgba(229,62,62,0.25)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small warning diamond -->
  <polygon points="1010,88 1018,96 1010,104 1002,96" fill="rgba(229,62,62,0.20)" stroke="rgba(229,62,62,0.50)" stroke-width="1.5"/>
  <text x="1010" y="100" font-size="8" fill="rgba(229,62,62,0.80)" text-anchor="middle" font-family="monospace" font-weight="700">0</text>

  <!-- DevSecOps circuit lines -->
  <line x1="880" y1="180" x2="942" y2="180" stroke="rgba(99,179,237,0.25)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="880" y1="270" x2="942" y2="270" stroke="rgba(99,179,237,0.20)" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="880" cy="180" r="3" fill="rgba(99,179,237,0.35)"/>
  <circle cx="880" cy="270" r="3" fill="rgba(99,179,237,0.30)"/>
  <line x1="1078" y1="180" x2="1140" y2="180" stroke="rgba(99,179,237,0.25)" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="1140" cy="180" r="3" fill="rgba(99,179,237,0.35)"/>

  <!-- Binary data fragments near illustration -->
  <text x="883" y="310" font-size="9" fill="rgba(255,255,255,0.08)" font-family="monospace">10110100</text>
  <text x="883" y="322" font-size="9" fill="rgba(255,255,255,0.06)" font-family="monospace">01001101</text>
  <text x="1068" y="310" font-size="9" fill="rgba(255,255,255,0.08)" font-family="monospace">11010011</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(229,62,62,0.70)"/>
  <circle cx="900" cy="420" r="5" fill="rgba(251,191,36,0.65)"/>
  <circle cx="860" cy="440" r="5" fill="rgba(229,62,62,0.55)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.35)" stroke-width="1"/>
  <text x="180" y="81" font-size="12" font-weight="600" fill="rgba(229,62,62,0.90)" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="1.5">MARCH 7, 2026</text>

  <!-- Title lines -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="-0.5">Tech Security Weekly Digest</text>
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="'Segoe UI', Arial, sans-serif" letter-spacing="-0.5">Android Zero Day DevSecOps</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)" font-family="'Segoe UI', Arial, sans-serif">Weekly roundup: Android exploits, zero-day threats &amp; DevSecOps updates</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(229,62,62,0.80)" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" letter-spacing="2.5">SECURITY / DEVSECOPS / MOBILE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.40)" stroke-width="1"/>
  <text x="145" y="425" font-size="13" fill="rgba(229,62,62,0.90)" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">Android Zero-Day</text>

  <rect x="224" y="402" width="120" height="36" rx="18" fill="rgba(251,191,36,0.14)" stroke="rgba(251,191,36,0.38)" stroke-width="1"/>
  <text x="284" y="425" font-size="13" fill="rgba(251,191,36,0.90)" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">CVE / Patch</text>

  <rect x="358" y="402" width="120" height="36" rx="18" fill="rgba(99,179,237,0.14)" stroke="rgba(99,179,237,0.38)" stroke-width="1"/>
  <text x="418" y="425" font-size="13" fill="rgba(99,179,237,0.90)" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600">DevSecOps</text>

  <!-- Footer line -->
  <line x1="80" y1="520" x2="1120" y2="520" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Footer text -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.30)" font-family="'Segoe UI', Arial, sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,255,255,0.30)" font-family="'Segoe UI', Arial, sans-serif" text-anchor="end">security</text>
</svg>