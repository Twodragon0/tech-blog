  <circle cx="1010" cy="112" r="4" fill="rgba(33,150,243,0.5)" stroke="rgba(33,150,243,0.7)" stroke-width="1"/>
  <circle cx="1093" cy="147" r="3.5" fill="rgba(33,150,243,0.4)"/>
  <circle cx="1113" cy="225" r="3.5" fill="rgba(33,150,243,0.4)"/>
  <circle cx="1093" cy="303" r="3.5" fill="rgba(33,150,243,0.4)"/>
  <circle cx="927" cy="147" r="3.5" fill="rgba(33,150,243,0.4)"/>
  <circle cx="907" cy="225" r="3.5" fill="rgba(33,150,243,0.4)"/>
  <circle cx="927" cy="303" r="3.5" fill="rgba(33,150,243,0.4)"/>

