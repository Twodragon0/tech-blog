<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Date badge -->
  <rect x="50" y="45" width="160" height="40" rx="20" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="130" y="70" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">MARCH 7, 2026</text>
  
  <!-- Left side text -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Tech Security</text>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Weekly Digest</text>
  <text x="50" y="300" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#3b82f6">Android Zero</text>
  
  <!-- Tag pills -->
  <rect x="50" y="410" width="110" height="32" rx="16" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="105" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Android</text>
  
  <rect x="175" y="410" width="110" height="32" rx="16" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="230" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Zero-Day</text>
  
  <rect x="300" y="410" width="110" height="32" rx="16" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="355" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Vulnerability</text>
  
  <!-- Footer -->
  <text x="50" y="570" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6" opacity="0.8">tech.2twodragon.com</text>
  
  <!-- Right side security visual scene -->
  <!-- Shield with checkmark background -->
  <path d="M 900 120 L 1050 120 L 1050 280 Q 1050 380 900 420 Q 750 380 750 280 L 750 120 Z" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2.5"/>
  
  <!-- Checkmark inside shield -->
  <path d="M 880 300 L 900 320 L 930 280" fill="none" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  
  <!-- Warning triangles around -->
  <polygon points="750,180 770,145 790,180" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="2"/>
  <polygon points="1040,220 1070,190 1100,220" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="780,380 800,410 820,380" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Data flow arrows -->
  <defs>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ef4444" opacity="0.7"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" opacity="0.7"/>
    </marker>
  </defs>
  
  <!-- Arrow flows -->
  <path d="M 750 200 Q 720 220 750 240" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.4" marker-end="url(#arrowhead-red)"/>
  <path d="M 1050 240 Q 1080 260 1050 280" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.4" marker-end="url(#arrowhead-blue)"/>
  <path d="M 900 380 L 850 420" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3" stroke-dasharray="4,4"/>
  <path d="M 900 380 L 950 420" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3" stroke-dasharray="4,4"/>
  
  <!-- Alert circles -->
  <circle cx="820" cy="150" r="15" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="2"/>
  <circle cx="820" cy="150" r="10" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
  
  <circle cx="1020" cy="400" r="15" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="1020" cy="400" r="10" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Security lock accent -->
  <rect x="880" y="480" width="40" height="50" rx="4" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="900" cy="490" r="8" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <path d="M 895 498 L 905 498" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  
  <!-- Data nodes -->
  <circle cx="760" cy="350" r="8" fill="#ef4444" opacity="0.15"/>
  <circle cx="1040" cy="320" r="8" fill="#3b82f6" opacity="0.15"/>
  <circle cx="870" cy="450" r="8" fill="#f59e0b" opacity="0.15"/>
</svg>