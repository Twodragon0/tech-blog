  <rect x="958" y="202" width="18" height="36" rx="9" fill="rgba(100,220,100,0.10)" stroke="rgba(100,220,100,0.3)" stroke-width="1.2"/>
  <rect x="1044" y="202" width="18" height="36" rx="9" fill="rgba(100,220,100,0.10)" stroke="rgba(100,220,100,0.3)" stroke-width="1.2"/>
