  <text x="145" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Mobile Security</text>
  
  <rect x="230" y="410" width="130" height="36" fill="#ef4444" opacity="0.08" rx="18" stroke="#ef4444" stroke-width="1.5"/>
  <text x="295" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Vulnerability</text>
  
  <rect x="380" y="410" width="130" height="36" fill="#f59e0b" opacity="0.08" rx="18" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="445" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Zero-Day</text>
  
  <!-- Footer -->
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#9ca3af">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE: Security Visual Elements -->
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <!-- Large Shield with Checkmark -->
  <path d="M 900 120 L 1050 120 L 1050 280 Q 1050 360 900 410 Q 750 360 750 280 L 750 120 Z" 
        fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Checkmark inside shield -->
