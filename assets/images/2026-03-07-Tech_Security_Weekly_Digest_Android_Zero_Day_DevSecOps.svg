  <path d="M1010,148 L1055,165 L1055,200 Q1055,230 1010,248 Q965,230 965,200 L965,165 Z" fill="rgba(230,57,70,0.08)" stroke="rgba(230,57,70,0.3)" stroke-width="1.5"/>
  <!-- Shield lock icon -->
  <rect x="1002" y="196" width="16" height="12" rx="2" fill="rgba(230,57,70,0.4)" stroke="rgba(230,57,70,0.6)" stroke-width="1"/>
  <path d="M1004,196 Q1004,190 1010,190 Q1016,190 1016,196" fill="none" stroke="rgba(230,57,70,0.6)" stroke-width="1.5"/>

