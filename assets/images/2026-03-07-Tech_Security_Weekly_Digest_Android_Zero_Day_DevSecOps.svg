  <line x1="1010" y1="225" x2="1070" y2="155" stroke="rgba(255,100,50,0.18)" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="1010" y1="225" x2="1085" y2="240" stroke="rgba(255,100,50,0.15)" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="1010" y1="225" x2="940" y2="170" stroke="rgba(255,100,50,0.15)" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(230,57,70,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,165,0,0.6)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(230,57,70,0.5)"/>

