<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b"/>
      <stop offset="50%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#e63950"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3b3b"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff3b3b;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,60,60,0.04)" stroke="rgba(255,60,60,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,60,60,0.05)" stroke="rgba(255,60,60,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Android robot with security shield / zero-day exploit concept -->
  <!-- Outer shield -->
  <path d="M1010,145 L1010,145 L1085,170 L1085,255 Q1085,305 1010,330 Q935,305 935,255 L935,170 Z"
        fill="rgba(255,60,60,0.07)" stroke="rgba(255,80,80,0.3)" stroke-width="1.5"/>
  <!-- Shield inner -->
  <path d="M1010,165 L1010,165 L1068,186 L1068,258 Q1068,298 1010,318 Q952,298 952,258 L952,186 Z"
        fill="rgba(255,60,60,0.06)" stroke="rgba(255,100,100,0.25)" stroke-width="1"/>

  <!-- Android robot head outline -->
  <rect x="978" y="200" width="64" height="52" rx="10"
        fill="rgba(80,220,120,0.08)" stroke="rgba(80,220,120,0.35)" stroke-width="1.5"/>
  <!-- Android eyes -->
  <circle cx="995" cy="218" r="5" fill="rgba(80,220,120,0.15)" stroke="rgba(80,220,120,0.4)" stroke-width="1.2"/>
  <circle cx="1025" cy="218" r="5" fill="rgba(80,220,120,0.15)" stroke="rgba(80,220,120,0.4)" stroke-width="1.2"/>
  <!-- Android antennas -->
  <line x1="992" y1="200" x2="984" y2="185" stroke="rgba(80,220,120,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="984" cy="183" r="3" fill="rgba(80,220,120,0.2)" stroke="rgba(80,220,120,0.4)" stroke-width="1"/>
  <line x1="1028" y1="200" x2="1036" y2="185" stroke="rgba(80,220,120,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="1036" cy="183" r="3" fill="rgba(80,220,120,0.2)" stroke="rgba(80,220,120,0.4)" stroke-width="1"/>
  <!-- Android body -->
  <rect x="982" y="255" width="56" height="38" rx="5"
        fill="rgba(80,220,120,0.07)" stroke="rgba(80,220,120,0.25)" stroke-width="1"/>

  <!-- Crack / zero-day exploit lines on shield -->
  <path d="M1010,175 L1003,210 L1015,205 L1005,245" fill="none" stroke="rgba(255,60,60,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1015,205 L1030,220 L1022,215" fill="none" stroke="rgba(255,60,60,0.4)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Orbiting threat rings -->
  <ellipse cx="1010" cy="237" rx="95" ry="65"
           fill="none" stroke="rgba(255,140,0,0.12)" stroke-width="1" stroke-dasharray="4 6"/>
  <ellipse cx="1010" cy="237" rx="115" ry="80"
           fill="none" stroke="rgba(255,60,60,0.08)" stroke-width="1" stroke-dasharray="3 8"/>

  <!-- Threat dots orbiting -->
  <circle cx="1105" cy="220" r="5" fill="rgba(255,60,60,0.2)" stroke="rgba(255,60,60,0.4)" stroke-width="1"/>
  <circle cx="908" cy="265" r="4" fill="rgba(255,140,0,0.2)" stroke="rgba(255,140,0,0.4)" stroke-width="1"/>
  <circle cx="1065" cy="158" r="4" fill="rgba(255,60,60,0.15)" stroke="rgba(255,60,60,0.35)" stroke-width="1"/>

  <!-- Lock icon overlay bottom shield -->
  <rect x="1000" y="290" width="20" height="16" rx="2"
        fill="rgba(255,200,60,0.1)" stroke="rgba(255,200,60,0.35)" stroke-width="1"/>
  <path d="M1005,290 L1005,284 Q1010,278 1015,284 L1015,290" fill="none" stroke="rgba(255,200,60,0.35)" stroke-width="1.2"/>

  <!-- Small circuit-board nodes -->
  <circle cx="940" cy="155" r="3" fill="rgba(100,180,255,0.15)" stroke="rgba(100,180,255,0.3)" stroke-width="1"/>
  <circle cx="1080" cy="155" r="3" fill="rgba(100,180,255,0.15)" stroke="rgba(100,180,255,0.3)" stroke-width="1"/>
  <line x1="940" y1="155" x2="960" y2="175" stroke="rgba(100,180,255,0.12)" stroke-width="1"/>
  <line x1="1080" y1="155" x2="1058" y2="175" stroke="rgba(100,180,255,0.12)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,60,60,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,140,0,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,60,60,0.5)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(255,60,60,0.3)" stroke-width="1"/>
  <text x="96" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(255,120,120,0.9)" letter-spacing="1.5">MARCH 7, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="rgba(255,100,100,0.95)">Android Zero Day DevSecOps</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Critical vulnerability analysis · security intelligence · threat research</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" font-weight="600" fill="rgba(255,80,80,0.8)" letter-spacing="2.5">SECURITY · ANDROID · DEVSECOPS</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="145" height="36" rx="18" fill="rgba(220,50,50,0.18)" stroke="rgba(220,50,50,0.45)" stroke-width="1"/>
  <text x="153" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(255,110,110,0.95)" text-anchor="middle">Zero-Day CVE</text>

  <rect x="240" y="402" width="148" height="36" rx="18" fill="rgba(255,140,0,0.15)" stroke="rgba(255,140,0,0.4)" stroke-width="1"/>
  <text x="314" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(255,170,60,0.95)" text-anchor="middle">Android Security</text>

  <rect x="403" y="402" width="135" height="36" rx="18" fill="rgba(60,130,255,0.15)" stroke="rgba(60,130,255,0.38)" stroke-width="1"/>
  <text x="471" y="425" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(110,170,255,0.95)" text-anchor="middle">DevSecOps</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Arial', 'Helvetica', sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial', 'Helvetica', sans-serif" font-size="13" font-weight="600" fill="rgba(255,80,80,0.5)" text-anchor="end" letter-spacing="1.5">SECURITY</text>
</svg>