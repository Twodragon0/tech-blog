<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#1a0a15"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="25"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="270" r="260" fill="#a3e635" opacity="0.03" filter="url(#sg)"/>
  <!-- Android device cracked -->
  <g transform="translate(600,255)">
    <!-- Phone body -->
    <rect x="-80" y="-150" width="160" height="270" rx="18" fill="#1e293b" stroke="#475569" stroke-width="2.5"/>
    <rect x="-68" y="-130" width="136" height="230" rx="4" fill="#0f172a"/>
    <!-- Screen content - Android logo area -->
    <circle cx="0" cy="-60" r="35" fill="#a3e635" opacity="0.1"/>
    <!-- Android head -->
    <path d="M-20,-75 C-20,-95 20,-95 20,-75" fill="none" stroke="#a3e635" stroke-width="3" stroke-linecap="round"/>
    <circle cx="-10" cy="-80" r="3" fill="#a3e635"/>
    <circle cx="10" cy="-80" r="3" fill="#a3e635"/>
    <!-- Antenna -->
    <line x1="-15" y1="-98" x2="-20" y2="-108" stroke="#a3e635" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="-98" x2="20" y2="-108" stroke="#a3e635" stroke-width="2" stroke-linecap="round"/>
    <!-- Crack lines -->
    <path d="M-30,-130 L-15,-90 L5,-70 L-10,-30 L15,10 L0,60 L20,100" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
    <path d="M5,-70 L30,-50" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
    <path d="M-10,-30 L-35,-15" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
    <path d="M15,10 L40,25" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <!-- Vulnerability count badge -->
    <circle cx="60" cy="-130" r="28" fill="#ef4444" opacity="0.9"/>
    <text x="60" y="-125" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">129</text>
    <text x="60" y="-112" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">CVEs</text>
    <!-- Warning indicators -->
    <g opacity="0.5">
      <rect x="-55" y="10" width="110" height="20" rx="3" fill="#ef4444" opacity="0.15"/>
      <text x="0" y="24" font-family="Courier New" font-size="10" fill="#fca5a5" text-anchor="middle">CRITICAL: 0-DAY</text>
    </g>
    <g opacity="0.4">
      <rect x="-55" y="40" width="110" height="20" rx="3" fill="#f59e0b" opacity="0.15"/>
      <text x="0" y="54" font-family="Courier New" font-size="10" fill="#fde68a" text-anchor="middle">K8s ATTACK VEC</text>
    </g>
    <!-- Home button -->
    <circle cx="0" cy="110" r="10" fill="none" stroke="#475569" stroke-width="1.5"/>
  </g>
  <!-- Side threat indicators -->
  <g opacity="0.3">
    <path d="M250,180 L460,220" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,4"/>
    <circle cx="250" cy="180" r="4" fill="#ef4444"/>
    <path d="M950,190 L740,230" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,4"/>
    <circle cx="950" cy="190" r="4" fill="#ef4444"/>
  </g>
  <text x="600" y="510" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">Android Zero-Day Storm</text>
  <text x="600" y="548" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">129 CVEs Patched | Kubernetes Attack Vectors | DevSecOps</text>
  <rect x="40" y="25" width="160" height="32" rx="16" fill="#a3e635" opacity="0.2" stroke="#a3e635" stroke-width="1"/>
  <text x="120" y="47" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#d9f99d" text-anchor="middle">WEEKLY DIGEST</text>
  <rect x="1000" y="25" width="160" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="1080" y="47" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">March 7, 2026</text>
  <text x="1160" y="615" font-family="Arial,sans-serif" font-size="13" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>