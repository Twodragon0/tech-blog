  <circle cx="1010" cy="225" r="140" fill="none" stroke="rgba(255,80,40,0.07)" stroke-width="1.5" stroke-dasharray="3,6"/>

  <!-- DevSecOps circuit lines radiating -->
  <line x1="1010" y1="115" x2="1010" y2="148" stroke="rgba(33,150,243,0.35)" stroke-width="1.2"/>
  <line x1="1090" y1="150" x2="1060" y2="168" stroke="rgba(33,150,243,0.3)" stroke-width="1.2"/>
  <line x1="1110" y1="225" x2="1075" y2="225" stroke="rgba(33,150,243,0.3)" stroke-width="1.2"/>
  <line x1="1090" y1="300" x2="1060" y2="282" stroke="rgba(33,150,243,0.3)" stroke-width="1.2"/>
  <line x1="930" y1="150" x2="960" y2="168" stroke="rgba(33,150,243,0.3)" stroke-width="1.2"/>
  <line x1="910" y1="225" x2="945" y2="225" stroke="rgba(33,150,243,0.3)" stroke-width="1.2"/>
  <line x1="930" y1="300" x2="960" y2="282" stroke="rgba(33,150,243,0.3)" stroke-width="1.2"/>

