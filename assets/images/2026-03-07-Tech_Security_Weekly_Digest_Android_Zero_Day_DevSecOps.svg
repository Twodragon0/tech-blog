  <text x="180" y="81" font-family="'Courier New',monospace" font-size="12" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1.5">MARCH 7, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="rgba(230,57,70,0.95)">Android Zero Day DevSecOps</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" font-weight="400">Weekly Threat Intelligence &amp; DevSecOps Security Roundup</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New',monospace" font-size="14" fill="rgba(230,57,70,0.8)" letter-spacing="3" font-weight="600">SECURITY / ANDROID / DEVSECOPS</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(230,57,70,0.18)" stroke="rgba(230,57,70,0.45)" stroke-width="1.2"/>
  <text x="145" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,120,0.95)" text-anchor="middle" letter-spacing="0.5">ZERO-DAY</text>

  <rect x="224" y="402" width="130" height="36" rx="18" fill="rgba(255,152,0,0.15)" stroke="rgba(255,152,0,0.4)" stroke-width="1.2"/>
  <text x="289" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,180,80,0.95)" text-anchor="middle" letter-spacing="0.5">ANDROID CVE</text>

  <rect x="368" y="402" width="120" height="36" rx="18" fill="rgba(33,150,243,0.15)" stroke="rgba(33,150,243,0.4)" stroke-width="1.2"/>
  <text x="428" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(100,180,255,0.95)" text-anchor="middle" letter-spacing="0.5">DEVSECOPS</text>

  <!-- Footer -->
  <line x1="0" y1="510" x2="1200" y2="510" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="14" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New',monospace" font-size="14" fill="rgba(230,57,70,0.4)" letter-spacing="1" text-anchor="end">SECURITY</text>
</svg>