  <!-- Outer security ring -->
  <circle cx="1010" cy="225" r="110" fill="rgba(230,57,70,0.06)" stroke="rgba(230,57,70,0.25)" stroke-width="1.5"/>
  <circle cx="1010" cy="225" r="88" fill="rgba(20,10,15,0.4)" stroke="rgba(230,57,70,0.15)" stroke-width="1"/>

  <!-- Android robot body -->
  <rect x="975" y="200" width="70" height="55" rx="8" fill="rgba(100,220,100,0.10)" stroke="rgba(100,220,100,0.35)" stroke-width="1.5"/>
  <!-- Android head -->
  <rect x="982" y="178" width="56" height="28" rx="14" fill="rgba(100,220,100,0.10)" stroke="rgba(100,220,100,0.35)" stroke-width="1.5"/>
  <!-- Android eyes -->
  <circle cx="996" cy="192" r="4" fill="rgba(100,220,100,0.6)"/>
  <circle cx="1024" cy="192" r="4" fill="rgba(100,220,100,0.6)"/>
  <!-- Android antennas -->
  <line x1="996" y1="178" x2="990" y2="165" stroke="rgba(100,220,100,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1024" y1="178" x2="1030" y2="165" stroke="rgba(100,220,100,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="990" cy="163" r="3" fill="rgba(100,220,100,0.5)"/>
  <circle cx="1030" cy="163" r="3" fill="rgba(100,220,100,0.5)"/>
