  <circle cx="800" cy="180" r="22" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <circle cx="800" cy="180" r="14" fill="#3b82f6" opacity="0.1"/>
  
  <!-- Data node 2 (bottom-left) -->
  <circle cx="760" cy="480" r="22" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <circle cx="760" cy="480" r="14" fill="#ef4444" opacity="0.1"/>
  
  <!-- Data node 3 (right) -->
  <circle cx="1080" cy="380" r="22" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <circle cx="1080" cy="380" r="14" fill="#f59e0b" opacity="0.1"/>
  
  <!-- Curved data flow arrows -->
  <path d="M 820 200 Q 870 240 900 280" stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)" opacity="0.5"/>
  
  <path d="M 780 460 Q 840 410 900 360" stroke="#ef4444" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)" opacity="0.5"/>
  
  <path d="M 1000 320 Q 1040 350 1080 380" stroke="#f59e0b" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)" opacity="0.5"/>
  
  <!-- Warning Triangle 1 (upper right) -->
  <polygon points="1100,130 1130,190 1070,190" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="2"/>
  <text x="1100" y="172" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ef4444" text-anchor="middle" opacity="0.7">!</text>
  
  <!-- Warning Triangle 2 (lower center-right) -->
  <polygon points="950,520 980,570 920,570" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="2"/>
  <text x="950" y="555" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0.7">!</text>
  
  <!-- Alert indicator circle (bottom-right) -->
  <circle cx="1100" cy="500" r="28" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.5"/>
  <circle cx="1100" cy="500" r="20" fill="#ef4444" opacity="0.08"/>
  <circle cx="1100" cy="500" r="4" fill="#ef4444" opacity="0.7"/>
  
  <!-- Tech-style connecting lines -->
  <line x1="800" y1="202" x2="880" y2="260" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  <line x1="760" y1="458" x2="850" y2="380" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
  <line x1="920" y1="380" x2="1058" y2="380" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Decorative accent lines -->
  <line x1="650" y1="120" x2="680" y2="120" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="650" y1="540" x2="690" y2="540" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <line x1="1120" y1="200" x2="1150" y2="200" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
