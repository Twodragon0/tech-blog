<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#4a90d9"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1a4a8a;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="btcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931e;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AWS + AI + Bitcoin composite icon -->
  <!-- Outer orbit ring (security) -->
  <circle cx="1010" cy="225" r="110" fill="none" stroke="rgba(74,144,217,0.25)" stroke-width="1.5" stroke-dasharray="8 4"/>
  <circle cx="1010" cy="225" r="80" fill="none" stroke="rgba(74,144,217,0.18)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- AWS Cloud shape -->
  <ellipse cx="1010" cy="195" rx="55" ry="32" fill="url(#cloudGrad)" stroke="rgba(74,144,217,0.35)" stroke-width="1.5"/>
  <ellipse cx="982" cy="202" rx="30" ry="22" fill="url(#cloudGrad)" stroke="rgba(74,144,217,0.3)" stroke-width="1"/>
  <ellipse cx="1038" cy="202" rx="30" ry="22" fill="url(#cloudGrad)" stroke="rgba(74,144,217,0.3)" stroke-width="1"/>
  <rect x="955" y="208" width="110" height="30" rx="4" fill="url(#cloudGrad)" stroke="rgba(74,144,217,0.3)" stroke-width="1"/>

  <!-- AWS text inside cloud -->
  <text x="1010" y="227" font-family="monospace" font-size="13" font-weight="700" fill="rgba(74,144,217,0.7)" text-anchor="middle">AWS</text>

  <!-- Bitcoin symbol top-right of illustration -->
  <circle cx="1095" cy="155" r="28" fill="url(#btcGrad)" stroke="rgba(247,147,30,0.4)" stroke-width="1.5"/>
  <text x="1095" y="163" font-family="Arial" font-size="22" font-weight="700" fill="rgba(247,147,30,0.75)" text-anchor="middle">₿</text>
  <!-- Bitcoin orbit dots -->
  <circle cx="1095" cy="120" r="3" fill="rgba(247,147,30,0.5)"/>
  <circle cx="1123" cy="138" r="2.5" fill="rgba(247,147,30,0.4)"/>
  <circle cx="1123" cy="172" r="2" fill="rgba(247,147,30,0.35)"/>

  <!-- AI neural network bottom-left of illustration -->
  <circle cx="920" cy="288" r="24" fill="url(#aiGrad)" stroke="rgba(0,212,170,0.4)" stroke-width="1.5"/>
  <text x="920" y="295" font-family="Arial" font-size="11" font-weight="700" fill="rgba(0,212,170,0.8)" text-anchor="middle">AI</text>
  <!-- Neural nodes -->
  <circle cx="898" cy="265" r="5" fill="rgba(0,212,170,0.2)" stroke="rgba(0,212,170,0.4)" stroke-width="1"/>
  <circle cx="942" cy="265" r="5" fill="rgba(0,212,170,0.2)" stroke="rgba(0,212,170,0.4)" stroke-width="1"/>
  <circle cx="898" cy="310" r="5" fill="rgba(0,212,170,0.2)" stroke="rgba(0,212,170,0.4)" stroke-width="1"/>
  <circle cx="942" cy="310" r="5" fill="rgba(0,212,170,0.2)" stroke="rgba(0,212,170,0.4)" stroke-width="1"/>
  <!-- Neural connections -->
  <line x1="898" y1="265" x2="920" y2="288" stroke="rgba(0,212,170,0.25)" stroke-width="1"/>
  <line x1="942" y1="265" x2="920" y2="288" stroke="rgba(0,212,170,0.25)" stroke-width="1"/>
  <line x1="898" y1="310" x2="920" y2="288" stroke="rgba(0,212,170,0.25)" stroke-width="1"/>
  <line x1="942" y1="310" x2="920" y2="288" stroke="rgba(0,212,170,0.25)" stroke-width="1"/>
  <line x1="898" y1="265" x2="898" y2="310" stroke="rgba(0,212,170,0.15)" stroke-width="1"/>
  <line x1="942" y1="265" x2="942" y2="310" stroke="rgba(0,212,170,0.15)" stroke-width="1"/>

  <!-- Security shield center overlay -->
  <path d="M1010,145 L1045,162 L1045,190 Q1045,218 1010,232 Q975,218 975,190 L975,162 Z" fill="rgba(255,107,53,0.08)" stroke="rgba(255,107,53,0.3)" stroke-width="1.5"/>
  <!-- Shield inner check -->
  <polyline points="996,188 1007,200 1026,174" fill="none" stroke="rgba(255,107,53,0.55)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Connection lines between icons -->
  <line x1="1010" y1="225" x2="1080" y2="170" stroke="rgba(247,147,30,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1010" y1="225" x2="930" y2="278" stroke="rgba(0,212,170,0.2)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Orbit tick marks -->
  <circle cx="1010" cy="115" r="3" fill="rgba(74,144,217,0.5)"/>
  <circle cx="1120" cy="225" r="3" fill="rgba(74,144,217,0.5)"/>
  <circle cx="1010" cy="335" r="3" fill="rgba(74,144,217,0.4)"/>
  <circle cx="900" cy="225" r="3" fill="rgba(74,144,217,0.4)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,107,53,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(247,147,30,0.6)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(74,144,217,0.65)" filter="url(#glow)"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,107,53,0.03)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,107,53,0.04)" stroke="none"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badgeGrad)" stroke="rgba(255,107,53,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(255,160,80,0.9)" text-anchor="middle" letter-spacing="1.5">MARCH 15, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white">Digest AWS AI Bitcoin</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="19" fill="rgba(200,200,220,0.72)">Weekly roundup: Cloud threats, AI risk, and crypto security</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,107,53,0.85)" letter-spacing="2">SECURITY INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="90" height="36" rx="18" fill="rgba(220,50,50,0.18)" stroke="rgba(220,80,80,0.4)" stroke-width="1"/>
  <text x="125" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,110,110,0.9)" text-anchor="middle">AWS</text>

  <rect x="184" y="402" width="80" height="36" rx="18" fill="rgba(247,147,30,0.18)" stroke="rgba(247,147,30,0.4)" stroke-width="1"/>
  <text x="224" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,180,80,0.9)" text-anchor="middle">AI</text>

  <rect x="278" y="402" width="110" height="36" rx="18" fill="rgba(74,144,217,0.18)" stroke="rgba(74,144,217,0.4)" stroke-width="1"/>
  <text x="333" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(100,180,255,0.9)" text-anchor="middle">BITCOIN</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="13" fill="rgba(180,180,200,0.5)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, sans-serif" font-size="13" fill="rgba(180,180,200,0.5)" text-anchor="end">SECURITY</text>
</svg>