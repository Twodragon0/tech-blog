<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="awsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="btcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931a;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f7931a;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AWS Cloud + AI Neural + Bitcoin -->
  <!-- AWS Cloud base shape -->
  <ellipse cx="1010" cy="210" rx="110" ry="55" fill="url(#awsGrad)" stroke="rgba(255,153,0,0.25)" stroke-width="1.5"/>
  <ellipse cx="960" cy="225" rx="65" ry="38" fill="url(#awsGrad)" stroke="rgba(255,153,0,0.2)" stroke-width="1"/>
  <ellipse cx="1065" cy="225" rx="60" ry="35" fill="url(#awsGrad)" stroke="rgba(255,153,0,0.2)" stroke-width="1"/>
  <rect x="895" y="215" width="230" height="55" rx="6" fill="url(#awsGrad)" stroke="rgba(255,153,0,0.18)" stroke-width="1"/>

  <!-- AWS text symbol inside cloud -->
  <text x="985" y="240" font-size="18" font-weight="700" fill="rgba(255,153,0,0.45)" font-family="monospace">AWS</text>

  <!-- AI Neural network nodes -->
  <circle cx="900" cy="155" r="10" fill="url(#aiGrad)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
  <circle cx="950" cy="135" r="8" fill="url(#aiGrad)" stroke="rgba(99,102,241,0.3)" stroke-width="1.5"/>
  <circle cx="1000" cy="148" r="9" fill="url(#aiGrad)" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>
  <circle cx="1050" cy="132" r="7" fill="url(#aiGrad)" stroke="rgba(99,102,241,0.3)" stroke-width="1.5"/>
  <circle cx="1095" cy="150" r="10" fill="url(#aiGrad)" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>
  <circle cx="925" cy="170" r="6" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.28)" stroke-width="1"/>
  <circle cx="1075" cy="165" r="6" fill="rgba(99,102,241,0.08)" stroke="rgba(99,102,241,0.28)" stroke-width="1"/>

  <!-- Neural connections -->
  <line x1="900" y1="155" x2="950" y2="135" stroke="rgba(99,102,241,0.22)" stroke-width="1"/>
  <line x1="950" y1="135" x2="1000" y2="148" stroke="rgba(99,102,241,0.22)" stroke-width="1"/>
  <line x1="1000" y1="148" x2="1050" y2="132" stroke="rgba(139,92,246,0.22)" stroke-width="1"/>
  <line x1="1050" y1="132" x2="1095" y2="150" stroke="rgba(99,102,241,0.22)" stroke-width="1"/>
  <line x1="900" y1="155" x2="925" y2="170" stroke="rgba(139,92,246,0.18)" stroke-width="1"/>
  <line x1="1075" y1="165" x2="1095" y2="150" stroke="rgba(99,102,241,0.18)" stroke-width="1"/>
  <line x1="950" y1="135" x2="925" y2="170" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <line x1="1050" y1="132" x2="1075" y2="165" stroke="rgba(139,92,246,0.15)" stroke-width="1"/>

  <!-- Bitcoin symbol -->
  <circle cx="1010" cy="300" r="38" fill="url(#btcGrad)" stroke="rgba(247,147,26,0.3)" stroke-width="1.5"/>
  <circle cx="1010" cy="300" r="28" fill="rgba(247,147,26,0.06)" stroke="rgba(247,147,26,0.22)" stroke-width="1"/>
  <!-- Bitcoin B symbol -->
  <text x="995" y="310" font-size="26" font-weight="900" fill="rgba(247,147,26,0.5)" font-family="Georgia,serif">₿</text>

  <!-- Security shield outline around illustration -->
  <path d="M880 115 L1140 115 L1140 340 L1010 370 L880 340 Z" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Connecting lines between elements -->
  <line x1="1010" y1="265" x2="1010" y2="262" stroke="rgba(247,147,26,0.2)" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="1010" y1="155" x2="1010" y2="170" stroke="rgba(99,102,241,0.2)" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(239,68,68,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(245,158,11,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(59,130,246,0.7)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="97" y="81" font-size="12" font-weight="600" fill="rgba(245,158,11,0.9)" font-family="Arial,sans-serif" letter-spacing="1.5">MARCH 15, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="Arial,sans-serif">Tech Security Weekly</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="Arial,sans-serif">Digest AWS AI Bitcoin</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)" font-family="Arial,sans-serif">Security insights: Cloud infrastructure, AI threats &amp; crypto risks</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(255,255,255,0.4)" font-family="Arial,sans-serif" letter-spacing="2" text-transform="uppercase">SECURITY · CLOUD · BLOCKCHAIN</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18" fill="rgba(239,68,68,0.18)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="135" y="425" font-size="13" font-weight="600" fill="rgba(239,68,68,0.9)" font-family="Arial,sans-serif" text-anchor="middle">AWS Security</text>

  <rect x="205" y="402" width="90" height="36" rx="18" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="250" y="425" font-size="13" font-weight="600" fill="rgba(245,158,11,0.9)" font-family="Arial,sans-serif" text-anchor="middle">AI Threats</text>

  <rect x="310" y="402" width="90" height="36" rx="18" fill="rgba(59,130,246,0.18)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="355" y="425" font-size="13" font-weight="600" fill="rgba(59,130,246,0.9)" font-family="Arial,sans-serif" text-anchor="middle">Bitcoin</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.3)" font-family="Arial,sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,255,255,0.3)" font-family="Arial,sans-serif" text-anchor="end">security</text>
</svg>