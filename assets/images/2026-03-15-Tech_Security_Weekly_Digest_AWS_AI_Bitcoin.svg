<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="bitcoinGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="awsGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="aiGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,255,255,0.015)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,255,255,0.02)" stroke="none"/>

  <!-- RIGHT SIDE ILLUSTRATION: AWS + AI + Bitcoin tri-symbol cluster -->

  <!-- Outer orbit ring -->
  <circle cx="1010" cy="225" r="125" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- AWS Cloud shape -->
  <g transform="translate(890, 140)">
    <ellipse cx="60" cy="48" rx="52" ry="30" fill="url(#awsGlow)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
    <ellipse cx="35" cy="56" rx="28" ry="18" fill="url(#awsGlow)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
    <ellipse cx="82" cy="54" rx="22" ry="15" fill="url(#awsGlow)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
    <text x="42" y="52" font-size="11" font-weight="700" fill="rgba(59,130,246,0.7)" font-family="monospace">AWS</text>
  </g>

  <!-- AI neural node cluster -->
  <g transform="translate(960, 200)">
    <!-- Central AI core -->
    <circle cx="50" cy="50" r="28" fill="url(#aiGlow)" stroke="rgba(168,85,247,0.4)" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="16" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.5)" stroke-width="1"/>
    <!-- Neural connections -->
    <line x1="50" y1="22" x2="50" y2="8" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <line x1="72" y1="35" x2="84" y2="26" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <line x1="72" y1="65" x2="84" y2="74" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <line x1="50" y1="78" x2="50" y2="92" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <line x1="28" y1="65" x2="16" y2="74" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <line x1="28" y1="35" x2="16" y2="26" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <!-- Outer nodes -->
    <circle cx="50" cy="6" r="5" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>
    <circle cx="86" cy="24" r="5" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>
    <circle cx="86" cy="76" r="5" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>
    <circle cx="50" cy="94" r="5" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>
    <circle cx="14" cy="76" r="5" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>
    <circle cx="14" cy="24" r="5" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.4)" stroke-width="1"/>
    <text x="38" y="54" font-size="11" font-weight="700" fill="rgba(168,85,247,0.8)" font-family="monospace">AI</text>
  </g>

  <!-- Bitcoin symbol -->
  <g transform="translate(890, 248)">
    <circle cx="52" cy="52" r="40" fill="url(#bitcoinGlow)" stroke="rgba(245,158,11,0.4)" stroke-width="1.5"/>
    <circle cx="52" cy="52" r="30" fill="none" stroke="rgba(245,158,11,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
    <!-- Bitcoin B letterform -->
    <path d="M38 36 L38 68 L55 68 Q66 68 66 61 Q66 56 60 54 Q66 52 66 45 Q66 36 55 36 Z" fill="none" stroke="rgba(245,158,11,0.7)" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M38 52 L58 52" stroke="rgba(245,158,11,0.5)" stroke-width="1.5"/>
    <line x1="44" y1="33" x2="44" y2="71" stroke="rgba(245,158,11,0.5)" stroke-width="1.5"/>
    <line x1="52" y1="33" x2="52" y2="71" stroke="rgba(245,158,11,0.5)" stroke-width="1.5"/>
    <text x="28" y="100" font-size="9" fill="rgba(245,158,11,0.5)" font-family="monospace">BITCOIN</text>
  </g>

  <!-- Shield overlay (security theme) -->
  <g transform="translate(875, 130)">
    <path d="M130 10 L190 35 L190 95 Q190 135 130 155 Q70 135 70 95 L70 35 Z" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <path d="M130 28 L175 48 L175 90 Q175 122 130 138 Q85 122 85 90 L85 48 Z" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  </g>

  <!-- Connecting lines between elements -->
  <line x1="940" y1="185" x2="975" y2="215" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1000" y1="295" x2="950" y2="295" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(239,68,68,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(245,158,11,0.6)"/>
  <circle cx="860" cy="440" r="3" fill="rgba(59,130,246,0.65)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentGrad)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="190" y="81" font-size="12" font-weight="600" fill="rgba(245,158,11,0.9)" font-family="'Courier New', monospace" text-anchor="middle" letter-spacing="1.5">MARCH 15, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="'Arial', sans-serif" letter-spacing="-0.5">Tech Security Weekly</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="'Arial', sans-serif" letter-spacing="-0.5">Digest AWS AI Bitcoin</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)" font-family="'Arial', sans-serif">Cloud Security · Artificial Intelligence · Cryptocurrency Threats</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(255,255,255,0.4)" font-family="'Courier New', monospace" letter-spacing="3">SECURITY / WEEKLY DIGEST / 2026</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="118" height="36" rx="18" fill="rgba(239,68,68,0.2)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="139" y="425" font-size="12" font-weight="600" fill="rgba(239,68,68,0.9)" font-family="'Arial', sans-serif" text-anchor="middle">AWS Security</text>

  <rect x="214" y="402" width="96" height="36" rx="18" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
  <text x="262" y="425" font-size="12" font-weight="600" fill="rgba(245,158,11,0.9)" font-family="'Arial', sans-serif" text-anchor="middle">Bitcoin</text>

  <rect x="326" y="402" width="80" height="36" rx="18" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
  <text x="366" y="425" font-size="12" font-weight="600" fill="rgba(59,130,246,0.9)" font-family="'Arial', sans-serif" text-anchor="middle">AI Threat</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.3)" font-family="'Courier New', monospace">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,255,255,0.3)" font-family="'Courier New', monospace" text-anchor="end">security</text>

  <!-- Subtle bottom gradient overlay -->
  <defs>
    <linearGradient id="bottomFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.4)"/>
    </linearGradient>
  </defs>
  <rect x="0" y="480" width="1200" height="150" fill="url(#bottomFade)"/>
</svg>