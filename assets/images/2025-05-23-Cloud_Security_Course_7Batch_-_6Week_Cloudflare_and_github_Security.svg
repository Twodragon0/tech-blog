  <rect x="216" y="420" width="100" height="36" rx="18" fill="rgba(88,166,255,0.15)" stroke="rgba(88,166,255,0.3)" stroke-width="1"/>
  <text x="266" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle" font-weight="600">GitHub</text>
  <rect x="332" y="420" width="90" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="377" y="443" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">Week 6</text>
