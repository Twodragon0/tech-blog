<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>2025 05 30 Cloud Security Course 7Batch 7Week Docker</title>
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1629;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- LEFT SIDE CONTENT -->

  <!-- Date Badge -->
  <rect x="80" y="55" width="220" height="50" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
  <text x="190" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ef4444" text-anchor="middle">MAY 30, 2025</text>

  <!-- Main Title -->
  <text x="90" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Cloud Security</text>
  <text x="90" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="-0.5">7Batch 7Week Docker</text>

  <!-- Tag Pills -->
  <g id="tags">
    <!-- Tag 1: Security -->
    <rect x="80" y="420" width="130" height="40" rx="20" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="145" y="446" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#3b82f6" text-anchor="middle">Security</text>

    <!-- Tag 2: Docker -->
    <rect x="225" y="420" width="120" height="40" rx="20" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="285" y="446" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">Docker</text>

    <!-- Tag 3: Kubernetes -->
    <rect x="360" y="420" width="150" height="40" rx="20" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
    <text x="435" y="446" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">Kubernetes</text>
  </g>

  <!-- Footer -->
  <text x="90" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">tech.2twodragon.com</text>

  <!-- RIGHT SIDE VISUAL SCENE -->

  <!-- Cloud Shape with Data Flow -->
  <g id="cloud-element" opacity="0.9" filter="url(#glow)">
    <!-- Cloud -->
    <path d="M 750 200 Q 730 180 710 180 Q 700 160 680 160 Q 660 160 650 175 Q 635 170 620 170 Q 590 170 580 200 L 750 200"
          fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2"/>

    <!-- Data flow arrows from cloud -->
    <defs>
      <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" opacity="0.6"/>
      </marker>
      <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.6"/>
      </marker>
    </defs>

    <path d="M 680 210 L 680 280" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.5" marker-end="url(#arrowhead-blue)"/>
    <path d="M 720 210 L 720 280" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.5" marker-end="url(#arrowhead-blue)"/>
  </g>

  <!-- Hexagonal Pods (Kubernetes) -->
  <g id="kubernetes-pods" opacity="0.95">
    <!-- Center Hexagon -->
    <polygon points="850,280 870,265 890,275 880,295 860,305 840,295"
             fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>

    <!-- Top Left Hexagon -->
    <polygon points="780,220 800,205 820,215 810,235 790,245 770,235"
             fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>

    <!-- Top Right Hexagon -->
    <polygon points="920,220 940,205 960,215 950,235 930,245 910,235"
             fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>

    <!-- Bottom Left Hexagon -->
    <polygon points="780,360 800,345 820,355 810,375 790,385 770,375"
             fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>

    <!-- Bottom Right Hexagon -->
    <polygon points="920,360 940,345 960,355 950,375 930,385 910,375"
             fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>

    <!-- Connecting Lines -->
    <line x1="800" y1="215" x2="870" y2="275" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
    <line x1="940" y1="215" x2="880" y2="275" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
    <line x1="800" y1="350" x2="870" y2="295" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    <line x1="940" y1="350" x2="880" y2="295" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Large Shield with Checkmark (Security/Compliance) -->
  <g id="shield-element" filter="url(#glow)">
    <!-- Shield background -->
    <path d="M 1050 200 L 1100 230 L 1100 380 Q 1100 420 1050 450 Q 1000 420 1000 380 L 1000 230 Z"
          fill="#ef4444" opacity="0.09" stroke="#ef4444" stroke-width="2.5"/>

    <!-- Checkmark -->
    <path d="M 1035 340 L 1050 360 L 1070 320"
          stroke="#ef4444" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Alert/Warning Triangles -->
  <g id="alerts" opacity="0.8">
    <!-- Top Warning -->
    <polygon points="950,110 960,140 940,140"
             fill="#f59e0b" opacity="0.09" stroke="#f59e0b" stroke-width="1.5" filter="url(#glow)"/>
    <text x="950" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="middle" opacity="0.6">!</text>

    <!-- Right Warning -->
    <polygon points="1080,150 1100,180 1060,180"
             fill="#ef4444" opacity="0.09" stroke="#ef4444" stroke-width="1.5" filter="url(#glow)"/>
    <text x="1080" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle" opacity="0.6">!</text>
  </g>

  <!-- Additional Data Flow Arrows -->
  <g id="data-flows" opacity="0.6">
    <!-- Vertical flows -->
    <path d="M 750 340 L 750 380" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-blue)"/>

    <!-- Curved flows -->
    <path d="M 900 280 Q 950 280 980 310" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.5" marker-end="url(#arrowhead-orange)"/>
    <path d="M 800 300 Q 800 350 820 380" stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.5" marker-end="url(#arrowhead-blue)"/>
  </g>

  <!-- Decorative Grid Elements -->
  <g id="grid-dots" opacity="0.05">
    <circle cx="750" cy="200" r="2" fill="#3b82f6"/>
    <circle cx="800" cy="250" r="2" fill="#f59e0b"/>
    <circle cx="850" cy="350" r="2" fill="#ef4444"/>
    <circle cx="900" cy="320" r="2" fill="#3b82f6"/>
    <circle cx="950" cy="380" r="2" fill="#f59e0b"/>
    <circle cx="1000" cy="300" r="2" fill="#ef4444"/>
  </g>
</svg>