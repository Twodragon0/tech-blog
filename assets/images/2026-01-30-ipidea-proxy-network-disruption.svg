  <text x="145" y="425" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">IPIDEA Proxy</text>
  <rect x="226" y="402" width="100" height="36" rx="18" fill="rgba(230,126,34,0.2)" stroke="rgba(230,126,34,0.45)" stroke-width="1"/>
  <text x="276" y="425" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">Network</text>
  <rect x="342" y="402" width="115" height="36" rx="18" fill="rgba(52,152,219,0.2)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <text x="399" y="425" font-size="13" fill="rgba(255,255,255,0.85)" font-family="sans-serif" text-anchor="middle">Disruption</text>
  <!-- Bottom bar -->
  <rect x="0" y="520" width="1200" height="110" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="545" font-size="15" fill="rgba(255,255,255,0.5)" font-family="sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,255,255,0.4)" font-family="sans-serif" text-anchor="end">DevSecOps</text>
