      <stop offset="0%" style="stop-color:#0a1520"/>
      <stop offset="100%" style="stop-color:#152535"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
