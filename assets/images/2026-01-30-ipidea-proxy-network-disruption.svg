  <line x1="960" y1="270" x2="790" y2="275" stroke="rgba(52,152,219,0.5)" stroke-width="1.5"/>
  <line x1="960" y1="270" x2="1110" y2="278" stroke="rgba(230,126,34,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="960" y1="270" x2="1055" y2="375" stroke="rgba(230,126,34,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="960" y1="270" x2="870" y2="372" stroke="rgba(52,152,219,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
