  <circle cx="1060" cy="172" r="20" fill="rgba(52,152,219,0.2)" stroke="#3498db" stroke-width="1.5"/>
  <text x="1060" y="176" font-size="8" fill="rgba(255,255,255,0.6)" font-family="monospace" text-anchor="middle">Node B</text>
