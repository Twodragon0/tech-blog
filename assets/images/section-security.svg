<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="140">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="800" height="140" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>
  <!-- Shield icon -->
  <g transform="translate(40, 25)">
    <circle cx="45" cy="45" r="40" fill="url(#accent)" opacity="0.12"/>
    <path d="M45 10 L75 25 V55 C75 75 45 85 45 85 C45 85 15 75 15 55 V25 Z" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <path d="M35 48 L42 55 L58 38" fill="none" stroke="#fca5a5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="140" y="55" fill="#fca5a5" font-family="Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="3">SECURITY NEWS</text>
  <text x="140" y="85" fill="#f8fafc" font-family="Arial, sans-serif" font-size="26" font-weight="bold">Threat Intelligence &amp; Vulnerability Report</text>
  <text x="140" y="115" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">CVE Analysis | Zero-Day Alerts | Incident Response</text>
  <!-- Decorative dots -->
  <g opacity="0.3">
    <circle cx="680" cy="35" r="3" fill="#ef4444"/>
    <circle cx="710" cy="50" r="4" fill="#f87171"/>
    <circle cx="740" cy="30" r="2" fill="#fca5a5"/>
    <circle cx="760" cy="60" r="3" fill="#ef4444"/>
    <circle cx="700" cy="80" r="2" fill="#f87171"/>
    <circle cx="730" cy="100" r="4" fill="#fca5a5"/>
    <circle cx="755" cy="85" r="2" fill="#ef4444"/>
    <line x1="680" y1="35" x2="710" y2="50" stroke="#475569" stroke-width="1"/>
    <line x1="710" y1="50" x2="740" y2="30" stroke="#475569" stroke-width="1"/>
    <line x1="740" y1="30" x2="760" y2="60" stroke="#475569" stroke-width="1"/>
    <line x1="700" y1="80" x2="730" y2="100" stroke="#475569" stroke-width="1"/>
