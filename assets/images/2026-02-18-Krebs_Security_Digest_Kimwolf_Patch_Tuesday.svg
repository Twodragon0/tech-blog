<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side: Text content -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Krebs Security Digest
  </text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Kimwolf Patch Tuesday
  </text>
  
  <!-- Date badge -->
  <rect x="60" y="280" width="280" height="50" rx="4" fill="#d32f2f" opacity="0.15" stroke="#d32f2f" stroke-width="2"/>
  <text x="75" y="312" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ff6b6b">
    FEBRUARY 18, 2026
  </text>
  
  <!-- Tag pills -->
  <g>
    <!-- Tag 1: Security -->
    <rect x="60" y="420" width="110" height="36" rx="18" fill="#1a3a52" stroke="#00a8ff" stroke-width="1.5"/>
    <text x="115" y="443" font-family="Arial, sans-serif" font-size="14" fill="#00a8ff" text-anchor="middle" font-weight="500">
      Security
    </text>
    
    <!-- Tag 2: Patch -->
    <rect x="185" y="420" width="100" height="36" rx="18" fill="#3a2a1a" stroke="#ff9500" stroke-width="1.5"/>
    <text x="235" y="443" font-family="Arial, sans-serif" font-size="14" fill="#ff9500" text-anchor="middle" font-weight="500">
      Patch
    </text>
    
    <!-- Tag 3: Threat -->
    <rect x="300" y="420" width="100" height="36" rx="18" fill="#4a1a1a" stroke="#ff4444" stroke-width="1.5"/>
    <text x="350" y="443" font-family="Arial, sans-serif" font-size="14" fill="#ff4444" text-anchor="middle" font-weight="500">
      Threat
    </text>
  </g>
  
  <!-- Right side: Illustration -->
  <!-- Large shield with warning stripes -->
  <path d="M 850 180 L 920 180 L 920 300 Q 920 380 850 420 Q 780 380 780 300 L 780 180 Z" 
        fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="2"/>
  
  <!-- Shield inner gradient effect -->
  <path d="M 855 195 L 915 195 L 915 295 Q 915 365 850 400 Q 785 365 785 295 L 785 195 Z" 
        fill="none" stroke="#ff9500" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Warning exclamation mark in shield -->
  <text x="850" y="290" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#ff6b6b" text-anchor="middle">
    !
  </text>
  
  <!-- Patch elements around shield -->
  <g opacity="0.8">
    <!-- Patch 1 (top left) -->
    <rect x="750" y="150" width="35" height="35" rx="2" fill="#00a8ff" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="767.5" cy="167.5" r="3" fill="#00d4ff"/>
    <line x1="760" y1="167.5" x2="775" y2="167.5" stroke="#00d4ff" stroke-width="1"/>
    <line x1="767.5" y1="160" x2="767.5" y2="175" stroke="#00d4ff" stroke-width="1"/>
    
    <!-- Patch 2 (top right) -->
    <rect x="950" y="165" width="35" height="35" rx="2" fill="#ffb300" stroke="#ffc75f" stroke-width="1.5"/>
    <circle cx="967.5" cy="182.5" r="3" fill="#ffc75f"/>
    <line x1="960" y1="182.5" x2="975" y2="182.5" stroke="#ffc75f" stroke-width="1"/>
    <line x1="967.5" y1="175" x2="967.5" y2="190" stroke="#ffc75f" stroke-width="1"/>
    
    <!-- Patch 3 (bottom left) -->
    <rect x="720" y="350" width="35" height="35" rx="2" fill="#76ff03" stroke="#b2ff59" stroke-width="1.5"/>
    <circle cx="737.5" cy="367.5" r="3" fill="#b2ff59"/>
    <line x1="730" y1="367.5" x2="745" y2="367.5" stroke="#b2ff59" stroke-width="1"/>
    <line x1="737.5" y1="360" x2="737.5" y2="375" stroke="#b2ff59" stroke-width="1"/>
    
    <!-- Patch 4 (right) -->
    <rect x="965" y="340" width="35" height="35" rx="2" fill="#ff6b6b" stroke="#ff9999" stroke-width="1.5"/>
    <circle cx="982.5" cy="357.5" r="3" fill="#ff9999"/>
    <line x1="975" y1="357.5" x2="990" y2="357.5" stroke="#ff9999" stroke-width="1"/>
    <line x1="982.5" y1="350" x2="982.5" y2="365" stroke="#ff9999" stroke-width="1"/>
  </g>
  
  <!-- Network/threat nodes -->
  <g opacity="0.7" stroke="#00a8ff" stroke-width="1" fill="none">
    <!-- Connection lines -->
    <line x1="800" y1="250" x2="740" y2="200"/>
    <line x1="900" y1="250" x2="960" y2="200"/>
    <line x1="850" y1="420" x2="780" y2="480"/>
    <line x1="850" y1="420" x2="920" y2="480"/>
  </g>
  
  <!-- Threat indicator nodes -->
  <circle cx="740" cy="200" r="6" fill="#d32f2f" opacity="0.8"/>
  <circle cx="960" cy="200" r="6" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="780" cy="480" r="5" fill="#ff9500" opacity="0.8"/>
  <circle cx="920" cy="480" r="5" fill="#ff9500" opacity="0.7"/>
  
  <!-- Checkmark overlay (patch applied indicator) -->
  <g opacity="0.6">
    <circle cx="1000" cy="400" r="25" fill="none" stroke="#76ff03" stroke-width="2"/>
    <polyline points="995,405 1000,410 1010,395" fill="none" stroke="#76ff03" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Bottom footer -->
  <text x="1140" y="610" font-family="Arial, sans-serif" font-size="14" fill="#666666" text-anchor="end">
    tech.2twodragon.com
  </text>
</svg>