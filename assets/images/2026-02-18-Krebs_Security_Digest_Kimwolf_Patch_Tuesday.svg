  <!-- Neck -->
  <ellipse cx="300" cy="250" rx="44" ry="52" fill="url(#wolfBody)" opacity="0.95"/>
  <!-- Head -->
  <ellipse cx="300" cy="175" rx="62" ry="58" fill="url(#wolfBody)" opacity="0.95"/>
  <!-- Snout -->
  <ellipse cx="335" cy="188" rx="38" ry="21" fill="#1f2937" opacity="0.95"/>
