    <path d="M 1015 450 L 1025 450 M 1016 446 L 1016 442 Q 1016 438 1020 438 Q 1024 438 1024 442 L 1024 446" stroke="#48bb78" stroke-width="1.5" fill="none"/>
    <circle cx="1020" cy="453" r="2" fill="#48bb78"/>
  </g>
  
  <!-- Protection Shield around LLM -->
