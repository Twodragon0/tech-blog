    <!-- Shield outline -->
    <path d="M 925 155 L 880 155 L 880 220 Q 880 280 925 300 Q 970 280 970 220 L 970 155 Z" fill="none" stroke="#48bb78" stroke-width="2" opacity="0.7"/>
    <!-- Shield glow -->
    <path d="M 925 155 L 880 155 L 880 220 Q 880 280 925 300 Q 970 280 970 220 L 970 155 Z" fill="#48bb78" opacity="0.05"/>
  </g>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
