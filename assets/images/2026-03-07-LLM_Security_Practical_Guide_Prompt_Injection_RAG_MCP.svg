    <line x1="-82" y1="-60" x2="-8" y2="-27" stroke="#ec4899" stroke-width="0.8" opacity="0.4"/>
    <line x1="-82" y1="0" x2="-8" y2="-27" stroke="#ec4899" stroke-width="0.8" opacity="0.4"/>
    <line x1="-82" y1="0" x2="-8" y2="27" stroke="#ec4899" stroke-width="0.8" opacity="0.4"/>
    <line x1="-82" y1="60" x2="-8" y2="27" stroke="#ec4899" stroke-width="0.8" opacity="0.4"/>
    <line x1="-82" y1="60" x2="-8" y2="80" stroke="#ec4899" stroke-width="0.8" opacity="0.4"/>
