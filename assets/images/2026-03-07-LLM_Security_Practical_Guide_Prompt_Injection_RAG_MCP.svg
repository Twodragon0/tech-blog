<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="glowRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2244" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#cc0022" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="glowBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4488ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2244cc" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: LLM/RAG/MCP Security Shield with Injection Attack -->
  <!-- Outer security ring -->
  <circle cx="1010" cy="225" r="105" fill="url(#glowRed)" stroke="rgba(255,80,80,0.25)" stroke-width="1.5"/>
  <!-- Inner knowledge base ring -->
  <circle cx="1010" cy="225" r="75" fill="url(#glowBlue)" stroke="rgba(80,160,255,0.3)" stroke-width="1"/>
  <!-- Core LLM hexagon -->
  <polygon points="1010,165 1057,192 1057,250 1010,277 963,250 963,192" fill="rgba(30,10,10,0.8)" stroke="rgba(255,100,100,0.35)" stroke-width="1.5"/>
  <!-- LLM inner glow -->
  <polygon points="1010,178 1046,198 1046,242 1010,262 974,242 974,198" fill="rgba(255,30,30,0.07)" stroke="rgba(255,80,80,0.2)" stroke-width="1"/>

  <!-- LLM label inside hex -->
  <text x="1010" y="218" font-family="monospace" font-size="13" font-weight="700" fill="rgba(255,120,120,0.9)" text-anchor="middle">LLM</text>
  <text x="1010" y="236" font-family="monospace" font-size="9" fill="rgba(255,180,180,0.6)" text-anchor="middle">CORE</text>

  <!-- RAG nodes around the ring -->
  <circle cx="1010" cy="150" r="14" fill="rgba(80,160,255,0.1)" stroke="rgba(80,180,255,0.4)" stroke-width="1.5"/>
  <text x="1010" y="154" font-family="monospace" font-size="8" font-weight="700" fill="rgba(120,200,255,0.85)" text-anchor="middle">RAG</text>

  <circle cx="1090" cy="195" r="14" fill="rgba(80,160,255,0.1)" stroke="rgba(80,180,255,0.35)" stroke-width="1.5"/>
  <text x="1090" y="199" font-family="monospace" font-size="8" font-weight="700" fill="rgba(120,200,255,0.8)" text-anchor="middle">MCP</text>

  <circle cx="1090" cy="260" r="14" fill="rgba(100,255,150,0.08)" stroke="rgba(100,255,150,0.3)" stroke-width="1.5"/>
  <text x="1090" y="264" font-family="monospace" font-size="7" font-weight="700" fill="rgba(150,255,180,0.75)" text-anchor="middle">TOOL</text>

  <circle cx="1010" cy="302" r="14" fill="rgba(255,200,80,0.08)" stroke="rgba(255,200,80,0.3)" stroke-width="1.5"/>
  <text x="1010" y="306" font-family="monospace" font-size="7" font-weight="700" fill="rgba(255,220,120,0.75)" text-anchor="middle">VEC</text>

  <circle cx="930" cy="260" r="14" fill="rgba(80,160,255,0.08)" stroke="rgba(80,180,255,0.3)" stroke-width="1.5"/>
  <text x="930" y="264" font-family="monospace" font-size="7" font-weight="700" fill="rgba(120,200,255,0.75)" text-anchor="middle">CTX</text>

  <circle cx="930" cy="195" r="14" fill="rgba(255,100,100,0.1)" stroke="rgba(255,80,80,0.35)" stroke-width="1.5"/>
  <text x="930" y="199" font-family="monospace" font-size="7" font-weight="700" fill="rgba(255,140,140,0.8)" text-anchor="middle">INJ</text>

  <!-- Connection lines from nodes to hex -->
  <line x1="1010" y1="163" x2="1010" y2="178" stroke="rgba(80,180,255,0.3)" stroke-width="1"/>
  <line x1="1078" y1="202" x2="1057" y2="210" stroke="rgba(80,180,255,0.25)" stroke-width="1"/>
  <line x1="1078" y1="255" x2="1057" y2="248" stroke="rgba(100,255,150,0.2)" stroke-width="1"/>
  <line x1="1010" y1="288" x2="1010" y2="262" stroke="rgba(255,200,80,0.25)" stroke-width="1"/>
  <line x1="942" y1="255" x2="963" y2="248" stroke="rgba(80,180,255,0.2)" stroke-width="1"/>
  <line x1="942" y1="202" x2="963" y2="210" stroke="rgba(255,80,80,0.3)" stroke-width="1"/>

  <!-- Prompt injection arrow attacking from outside -->
  <path d="M 870,145 L 945,190" stroke="rgba(255,50,50,0.5)" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <rect x="830" y="130" width="80" height="22" rx="3" fill="rgba(255,30,30,0.12)" stroke="rgba(255,80,80,0.35)" stroke-width="1"/>
  <text x="870" y="145" font-family="monospace" font-size="8" font-weight="700" fill="rgba(255,120,120,0.85)" text-anchor="middle">INJECT</text>

  <!-- Shield overlay on top right of hex -->
  <path d="M 1050,162 L 1075,170 L 1075,196 Q 1075,210 1050,220 Q 1025,210 1025,196 L 1025,170 Z" fill="rgba(255,200,50,0.07)" stroke="rgba(255,200,50,0.3)" stroke-width="1.2"/>
  <text x="1050" y="192" font-family="monospace" font-size="8" fill="rgba(255,220,100,0.7)" text-anchor="middle" font-weight="700">SEC</text>

  <!-- Data flow dots on ring -->
  <circle cx="1010" cy="150" r="2.5" fill="rgba(80,180,255,0.7)"/>
  <circle cx="1090" cy="195" r="2.5" fill="rgba(80,180,255,0.6)"/>
  <circle cx="1090" cy="260" r="2.5" fill="rgba(100,255,150,0.6)"/>
  <circle cx="1010" cy="302" r="2.5" fill="rgba(255,200,80,0.6)"/>
  <circle cx="930" cy="260" r="2.5" fill="rgba(80,180,255,0.5)"/>
  <circle cx="930" cy="195" r="2.5" fill="rgba(255,80,80,0.7)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="#ff4444" opacity="0.85" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="3.5" fill="#ff8c00" opacity="0.75" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3" fill="#ff4444" opacity="0.65" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.35)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(255,160,160,0.9)" text-anchor="middle" letter-spacing="1">MARCH 7, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white">LLM Security Prompt</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white">Injection RAG MCP</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', sans-serif" font-size="19" fill="rgba(255,200,200,0.75)">Defending AI pipelines against adversarial prompt attacks</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="1"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" fill="rgba(255,120,120,0.8)" letter-spacing="3">SECURITY / AI / DEVSECOPS</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(255,50,50,0.18)" stroke="rgba(255,80,80,0.45)" stroke-width="1.2"/>
  <text x="145" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(255,150,150,0.95)" text-anchor="middle">Prompt Injection</text>

  <rect x="225" y="402" width="110" height="36" rx="18" fill="rgba(255,160,30,0.15)" stroke="rgba(255,180,50,0.4)" stroke-width="1.2"/>
  <text x="280" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(255,210,120,0.9)" text-anchor="middle">RAG Security</text>

  <rect x="348" y="402" width="90" height="36" rx="18" fill="rgba(60,130,255,0.15)" stroke="rgba(80,160,255,0.4)" stroke-width="1.2"/>
  <text x="393" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(130,190,255,0.9)" text-anchor="middle">MCP Guard</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,120,120,0.4)" text-anchor="end" letter-spacing="1">security</text>

  <!-- Subtle bottom glow -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(255,30,30,0.04)"/>
</svg>