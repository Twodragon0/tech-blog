    <line x1="8" y1="-27" x2="82" y2="-40" stroke="#8b5cf6" stroke-width="0.8" opacity="0.4"/>
    <line x1="8" y1="27" x2="82" y2="40" stroke="#8b5cf6" stroke-width="0.8" opacity="0.4"/>
    <line x1="8" y1="80" x2="82" y2="40" stroke="#8b5cf6" stroke-width="0.8" opacity="0.4"/>
    <!-- Injection arrow -->
