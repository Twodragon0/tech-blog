<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#4466ff"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff2200;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2244cc;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,50,50,0.04)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,80,80,0.05)" stroke="none"/>

  <!-- RIGHT SIDE ILLUSTRATION: LLM/RAG/MCP Security Neural Shield -->
  <!-- Central Shield representing LLM Security -->
  <polygon points="1010,140 1070,160 1090,220 1070,280 1010,300 950,280 930,220 950,160" fill="url(#shieldGrad)" stroke="rgba(255,100,100,0.35)" stroke-width="1.5"/>
  <polygon points="1010,155 1060,172 1078,222 1060,272 1010,288 960,272 942,222 960,172" fill="none" stroke="rgba(255,80,80,0.2)" stroke-width="1"/>

  <!-- Lock icon inside shield -->
  <rect x="988" y="210" width="44" height="34" rx="4" fill="rgba(255,80,80,0.12)" stroke="rgba(255,100,100,0.4)" stroke-width="1.5"/>
  <path d="M998,210 Q998,192 1010,192 Q1022,192 1022,210" fill="none" stroke="rgba(255,100,100,0.4)" stroke-width="2"/>
  <circle cx="1010" cy="224" r="5" fill="rgba(255,130,130,0.5)"/>
  <rect x="1008" y="224" width="4" height="8" rx="2" fill="rgba(255,130,130,0.5)"/>

  <!-- RAG nodes - document/retrieval pattern -->
  <rect x="880" y="148" width="52" height="60" rx="6" fill="url(#nodeGrad)" stroke="rgba(80,150,255,0.35)" stroke-width="1.5"/>
  <line x1="890" y1="165" x2="922" y2="165" stroke="rgba(100,180,255,0.3)" stroke-width="1.5"/>
  <line x1="890" y1="178" x2="922" y2="178" stroke="rgba(100,180,255,0.3)" stroke-width="1.5"/>
  <line x1="890" y1="191" x2="910" y2="191" stroke="rgba(100,180,255,0.3)" stroke-width="1.5"/>
  <text x="897" y="222" font-family="monospace" font-size="9" fill="rgba(100,180,255,0.6)">RAG</text>

  <!-- MCP node - connector pattern -->
  <rect x="1100" y="148" width="52" height="60" rx="6" fill="rgba(80,220,150,0.08)" stroke="rgba(80,220,150,0.3)" stroke-width="1.5"/>
  <circle cx="1114" cy="168" r="5" fill="rgba(80,220,150,0.25)" stroke="rgba(80,220,150,0.5)" stroke-width="1"/>
  <circle cx="1138" cy="168" r="5" fill="rgba(80,220,150,0.25)" stroke="rgba(80,220,150,0.5)" stroke-width="1"/>
  <circle cx="1126" cy="188" r="5" fill="rgba(80,220,150,0.25)" stroke="rgba(80,220,150,0.5)" stroke-width="1"/>
  <line x1="1114" y1="168" x2="1138" y2="168" stroke="rgba(80,220,150,0.25)" stroke-width="1"/>
  <line x1="1114" y1="168" x2="1126" y2="188" stroke="rgba(80,220,150,0.25)" stroke-width="1"/>
  <line x1="1138" y1="168" x2="1126" y2="188" stroke="rgba(80,220,150,0.25)" stroke-width="1"/>
  <text x="1112" y="222" font-family="monospace" font-size="9" fill="rgba(80,220,150,0.6)">MCP</text>

  <!-- Prompt injection arrow - attack vector -->
  <path d="M880,260 L930,230" stroke="rgba(255,200,50,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="930,230 918,228 922,240" fill="rgba(255,200,50,0.4)"/>
  <text x="856" y="272" font-family="monospace" font-size="8" fill="rgba(255,200,50,0.5)">INJECT</text>

  <!-- MCP connector lines -->
  <path d="M1100,178 L1090,220" stroke="rgba(80,220,150,0.2)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Neural network dots around shield -->
  <circle cx="890" cy="240" r="4" fill="rgba(255,100,100,0.2)" stroke="rgba(255,100,100,0.4)" stroke-width="1"/>
  <circle cx="1130" cy="240" r="4" fill="rgba(255,100,100,0.2)" stroke="rgba(255,100,100,0.4)" stroke-width="1"/>
  <circle cx="960" cy="305" r="3" fill="rgba(100,150,255,0.2)" stroke="rgba(100,150,255,0.4)" stroke-width="1"/>
  <circle cx="1060" cy="305" r="3" fill="rgba(100,150,255,0.2)" stroke="rgba(100,150,255,0.4)" stroke-width="1"/>
  <circle cx="1010" cy="320" r="5" fill="rgba(255,150,50,0.15)" stroke="rgba(255,150,50,0.4)" stroke-width="1"/>

  <!-- Connection lines between components -->
  <line x1="932" y1="178" x2="950" y2="195" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="1088" y1="178" x2="1070" y2="195" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="890" y1="240" x2="930" y2="248" stroke="rgba(255,80,80,0.15)" stroke-width="1"/>
  <line x1="1130" y1="240" x2="1090" y2="248" stroke="rgba(255,80,80,0.15)" stroke-width="1"/>

  <!-- LLM label beneath shield -->
  <rect x="980" y="326" width="60" height="20" rx="4" fill="rgba(255,60,60,0.1)" stroke="rgba(255,80,80,0.3)" stroke-width="1"/>
  <text x="996" y="340" font-family="monospace" font-size="9" fill="rgba(255,150,150,0.7)">LLM</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(255,150,50,0.6)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(255,80,80,0.5)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,150,150,0.9)" text-anchor="middle" letter-spacing="1">MARCH 7, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white">LLM Security Prompt</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="white">Injection RAG MCP</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="19" fill="rgba(200,200,220,0.75)">Defending AI pipelines against prompt injection attacks</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,100,100,0.8)" letter-spacing="2">SECURITY / AI SAFETY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(255,60,60,0.18)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,150,150,0.95)" text-anchor="middle">Prompt Injection</text>

  <rect x="224" y="402" width="100" height="36" rx="18" fill="rgba(255,160,30,0.18)" stroke="rgba(255,180,50,0.4)" stroke-width="1"/>
  <text x="274" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,210,100,0.95)" text-anchor="middle">RAG Security</text>

  <rect x="338" y="402" width="80" height="36" rx="18" fill="rgba(60,120,255,0.18)" stroke="rgba(80,140,255,0.4)" stroke-width="1"/>
  <text x="378" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(130,180,255,0.95)" text-anchor="middle">MCP Trust</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="14" fill="rgba(180,180,200,0.5)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, sans-serif" font-size="14" fill="rgba(180,180,200,0.5)" text-anchor="end">security</text>
</svg>