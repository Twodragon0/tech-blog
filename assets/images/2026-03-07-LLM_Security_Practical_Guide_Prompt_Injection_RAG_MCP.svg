  <rect x="376" y="358" width="98" height="36" rx="18" fill="rgba(245,158,11,0.14)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="425" y="381" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fbbf24" text-anchor="middle">MCP</text>
  <rect x="494" y="358" width="108" height="36" rx="18" fill="rgba(239,68,68,0.14)" stroke="#ef4444" stroke-width="1.5"/>
