    <circle cx="-70" cy="0" r="12" fill="#1a3a52" stroke="#4f9cf9" stroke-width="1.5"/>
    <circle cx="70" cy="0" r="12" fill="#1a3a52" stroke="#4f9cf9" stroke-width="1.5"/>
    <circle cx="-50" cy="60" r="12" fill="#1a3a52" stroke="#4f9cf9" stroke-width="1.5"/>
    <circle cx="50" cy="60" r="12" fill="#1a3a52" stroke="#4f9cf9" stroke-width="1.5"/>
    
