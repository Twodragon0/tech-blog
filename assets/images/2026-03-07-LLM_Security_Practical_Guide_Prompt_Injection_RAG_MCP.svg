  <!-- Right side: Illustration for LLM Security Prompt Injection RAG MCP -->
  <!-- Background accent -->
  <rect x="700" y="50" width="450" height="530" fill="#0f1420" rx="12" opacity="0.6"/>
  
  <!-- LLM Model (center) - represented as neural network -->
