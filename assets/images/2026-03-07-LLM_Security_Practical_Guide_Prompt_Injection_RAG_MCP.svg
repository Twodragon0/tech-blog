    <circle cx="735" cy="475" r="3" fill="#9f7aea" opacity="0.6"/>
    <circle cx="755" cy="480" r="3" fill="#9f7aea" opacity="0.6"/>
    <circle cx="775" cy="475" r="3" fill="#9f7aea" opacity="0.6"/>
    
