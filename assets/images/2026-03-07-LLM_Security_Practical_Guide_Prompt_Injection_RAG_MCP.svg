    <line x1="0" y1="0" x2="60" y2="-50" stroke="#4f9cf9" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-70" y2="0" stroke="#4f9cf9" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="70" y2="0" stroke="#4f9cf9" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-50" y2="60" stroke="#4f9cf9" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="50" y2="60" stroke="#4f9cf9" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Prompt Injection Attack (top-left arrow with malicious indicator) -->
  <g>
    <!-- Malicious prompt box -->
