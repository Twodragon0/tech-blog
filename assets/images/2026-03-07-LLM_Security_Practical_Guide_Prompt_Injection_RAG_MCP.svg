<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradient)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Decorative Circles -->
  <circle cx="100" cy="120" r="180" fill="#8b5cf6" fill-opacity="0.05"/>
  <circle cx="700" cy="320" r="150" fill="#3b82f6" fill-opacity="0.04"/>
  <circle cx="400" cy="200" r="200" fill="#dc2626" fill-opacity="0.02"/>

  <!-- Header Badge -->
  <rect x="25" y="15" width="200" height="32" rx="16" fill="url(#purpleGradient)" filter="url(#shadow)"/>
  <text x="125" y="36" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">LLM SECURITY 2026</text>

  <!-- Date Badge -->
  <rect x="575" y="15" width="200" height="32" rx="16" fill="url(#cyanGradient)" filter="url(#shadow)"/>
  <text x="675" y="36" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">March 7, 2026</text>

  <!-- Main Title -->
  <text x="400" y="75" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">LLM Security Practical Guide 2026</text>
  <text x="400" y="105" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Prompt Injection | RAG Security | MCP Threats | Supply Chain</text>

  <!-- Left Icon: Shield (Defense) -->
  <g filter="url(#shadow)">
    <rect x="40" y="140" width="120" height="160" rx="12" fill="url(#cardGradient)"/>
    <rect x="40" y="140" width="120" height="5" rx="2" fill="url(#greenGradient)"/>

    <!-- Shield SVG -->
    <g transform="translate(100, 180)">
      <path d="M 0 -25 L 20 -15 L 20 5 Q 0 25 -20 5 L -20 -15 Z" fill="url(#greenGradient)" stroke="#10b981" stroke-width="1.5"/>
      <circle cx="0" cy="-5" r="6" fill="#6ee7b7" fill-opacity="0.4"/>
    </g>

    <text x="100" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">DEFENSE</text>
    <text x="100" y="290" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Guardrails</text>
    <text x="100" y="303" font-family="Arial, sans-serif" font-size="10" fill="#6ee7b7">Input Sanitization</text>
  </g>

  <!-- Center Icon: Brain/AI (Core) -->
  <g filter="url(#shadow)">
    <rect x="340" y="140" width="120" height="160" rx="12" fill="url(#cardGradient)"/>
    <rect x="340" y="140" width="120" height="5" rx="2" fill="url(#blueGradient)"/>

    <!-- Brain/AI Icon -->
    <g transform="translate(400, 190)">
      <circle cx="0" cy="-8" r="12" fill="none" stroke="#3b82f6" stroke-width="2"/>
      <circle cx="-8" cy="0" r="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
      <circle cx="8" cy="0" r="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
      <circle cx="0" cy="8" r="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
      <circle cx="0" cy="0" r="3" fill="#3b82f6"/>
    </g>

    <text x="400" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3b82f6" text-anchor="middle">THREATS</text>
    <text x="400" y="290" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Attack Vectors</text>
    <text x="400" y="303" font-family="Arial, sans-serif" font-size="10" fill="#93c5fd">Injection | RAG Poisoning</text>
  </g>

  <!-- Right Icon: Lock (Security) -->
  <g filter="url(#shadow)">
    <rect x="640" y="140" width="120" height="160" rx="12" fill="url(#cardGradient)"/>
    <rect x="640" y="140" width="120" height="5" rx="2" fill="url(#redGradient)"/>

    <!-- Lock SVG -->
    <g transform="translate(700, 190)">
      <rect x="-10" y="0" width="20" height="16" rx="2" fill="none" stroke="#dc2626" stroke-width="2"/>
      <path d="M -6 0 L -6 -6 Q 0 -10 6 -6 L 6 0" fill="none" stroke="#dc2626" stroke-width="2"/>
      <circle cx="0" cy="10" r="2" fill="#dc2626"/>
    </g>

    <text x="700" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">RISKS</text>
    <text x="700" y="290" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Supply Chain</text>
    <text x="700" y="303" font-family="Arial, sans-serif" font-size="10" fill="#f87171">MCP Vulnerabilities</text>
  </g>

  <!-- Key Topics Bar -->
  <rect x="25" y="335" width="750" height="50" rx="8" fill="url(#cardGradient)" filter="url(#shadow)"/>
  <text x="40" y="355" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">PRACTICAL TOPICS:</text>
  <text x="40" y="372" font-family="Arial, sans-serif" font-size="10" fill="#fca5a5">Prompt Injection Detection</text>
  <text x="240" y="372" font-family="Arial, sans-serif" font-size="10" fill="#6ee7b7">RAG Pipeline Security</text>
  <text x="460" y="372" font-family="Arial, sans-serif" font-size="10" fill="#93c5fd">MCP Framework Hardening</text>
  <text x="690" y="372" font-family="Arial, sans-serif" font-size="10" fill="#f87171">Defense Strategies</text>

  <!-- Footer -->
  <text x="775" y="395" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#94a3b8" text-anchor="end">tech.2twodragon.com</text>
</svg>