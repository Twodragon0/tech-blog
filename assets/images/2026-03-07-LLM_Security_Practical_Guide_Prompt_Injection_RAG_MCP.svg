  <text x="75" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#90cdf4">Security</text>
  
  <rect x="200" y="420" width="130" height="32" fill="#2d3748" rx="16"/>
  <text x="215" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#90cdf4">LLM/AI</text>
  
  <rect x="340" y="420" width="130" height="32" fill="#2d3748" rx="16"/>
  <text x="355" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#90cdf4">RAG</text>
  
