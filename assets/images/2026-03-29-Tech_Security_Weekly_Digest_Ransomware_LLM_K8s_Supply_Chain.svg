  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4"
        fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.4)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New',monospace" font-size="12" font-weight="600"
        fill="rgba(255,140,140,0.95)" text-anchor="middle" letter-spacing="1.5">MARCH 29, 2026</text>

  <!-- Category label above title -->
  <text x="80" y="148" font-family="'Courier New',monospace" font-size="11" font-weight="500"
        fill="rgba(255,100,100,0.6)" letter-spacing="3">SECURITY INTELLIGENCE</text>

  <!-- Title line 1 -->
  <text x="80" y="205" font-family="'Arial',sans-serif" font-size="46" font-weight="700"
        fill="white" letter-spacing="-0.5">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="262" font-family="'Arial',sans-serif" font-size="42" font-weight="700"
        fill="rgba(255,220,220,0.92)" letter-spacing="-0.5">Ransomware · LLM · K8s · Supply</text>

  <!-- Subtitle -->
  <text x="80" y="308" font-family="'Arial',sans-serif" font-size="19"
        fill="rgba(200,200,220,0.65)">Threat intelligence, AI security risks, and cloud-native vulnerabilities</text>

  <!-- Accent line -->
  <rect x="80" y="332" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="368" font-family="'Courier New',monospace" font-size="14" font-weight="600"
        fill="rgba(255,100,100,0.8)" letter-spacing="2.5">CATEGORY: SECURITY</text>

  <!-- Tag pills -->
  <rect x="80" y="400" width="130" height="36" rx="18" fill="url(#tagRed)"
        stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <text x="145" y="423" font-family="'Arial',sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,180,180,0.95)" text-anchor="middle" letter-spacing="0.5">Ransomware</text>

  <rect x="224" y="400" width="90" height="36" rx="18" fill="url(#tagAmber)"
        stroke="rgba(255,160,60,0.4)" stroke-width="1"/>
  <text x="269" y="423" font-family="'Arial',sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,210,150,0.95)" text-anchor="middle" letter-spacing="0.5">LLM AI</text>

  <rect x="328" y="400" width="140" height="36" rx="18" fill="url(#tagBlue)"
        stroke="rgba(100,160,255,0.4)" stroke-width="1"/>
  <text x="398" y="423" font-family="'Arial',sans-serif" font-size="13" font-weight="600"
        fill="rgba(160,200,255,0.95)" text-anchor="middle" letter-spacing="0.5">K8s · Supply Chain</text>

  <!-- Footer -->
  <line x1="80" y1="520" x2="1120" y2="520" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="548" font-family="'Courier New',monospace" font-size="13"
        fill="rgba(255,255,255,0.35)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="548" font-family="'Courier New',monospace" font-size="13"
        fill="rgba(255,100,100,0.45)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>