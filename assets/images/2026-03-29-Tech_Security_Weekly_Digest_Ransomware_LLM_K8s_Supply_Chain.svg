<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest Ransomware LLM K8s Supply Chain</title>
  <defs>
    <!-- Glass blur filter -->
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for orbs -->
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Gradient accents -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <!-- Card border gradients -->
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Card fills -->
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45"/>
    </linearGradient>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5"/>
    </pattern>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Ambient glow orbs -->
  <circle cx="750" cy="150" r="180" fill="#3b82f6" opacity="0.07" filter="url(#orbGlow)"/>
  <circle cx="1000" cy="450" r="150" fill="#f43f5e" opacity="0.06" filter="url(#orbGlow)"/>
  <circle cx="200" cy="500" r="120" fill="#8b5cf6" opacity="0.05" filter="url(#orbGlow)"/>
  <circle cx="600" cy="350" r="100" fill="#3b82f6" opacity="0.04" filter="url(#orbGlow)"/>

  <!-- ==================== RIGHT SIDE: Glass Cards ==================== -->

  <!-- Card 3 (back) - Shield with Checkmark -->
  <g transform="translate(830, 60)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5"/>
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03"/>
    <!-- Shield icon -->
    <g transform="translate(115, 30)">
      <path d="M40 10 L70 22 L70 55 C70 82 55 95 40 105 C25 95 10 82 10 55 L10 22 Z" fill="url(#shieldGrad)" opacity="0.9"/>
      <path d="M40 14 L66 24 L66 55 C66 78 53 90 40 99 C27 90 14 78 14 55 L14 24 Z" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
      <path d="M28 55 L36 65 L55 42" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <circle cx="130" cy="200" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="145" cy="200" r="3" fill="#22c55e" opacity="0.6"/>
    <circle cx="160" cy="200" r="3" fill="#3b82f6" opacity="0.5"/>
    <circle cx="175" cy="200" r="3" fill="#3b82f6" opacity="0.3"/>
  </g>

  <!-- Card 2 (middle) - Brain with Neural Lines (AI/LLM) -->
  <g transform="translate(720, 190)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5"/>
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03"/>
    <g transform="translate(105, 25)">
      <path d="M50 20 C35 20 25 28 22 40 C15 38 8 45 8 55 C8 65 15 72 22 72 C25 82 35 90 50 90 C65 90 75 82 78 72 C85 72 92 65 92 55 C92 45 85 38 78 40 C75 28 65 20 50 20Z" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.8"/>
      <line x1="35" y1="45" x2="50" y2="55" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
      <line x1="50" y1="55" x2="65" y2="45" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
      <line x1="50" y1="55" x2="50" y2="72" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
      <line x1="35" y1="65" x2="50" y2="55" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
      <line x1="65" y1="65" x2="50" y2="55" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
      <line x1="30" y1="55" x2="45" y2="48" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
      <line x1="70" y1="55" x2="55" y2="48" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
      <circle cx="50" cy="55" r="4" fill="#8b5cf6" opacity="0.9"/>
      <circle cx="35" cy="45" r="3" fill="#3b82f6" opacity="0.7"/>
      <circle cx="65" cy="45" r="3" fill="#3b82f6" opacity="0.7"/>
      <circle cx="35" cy="65" r="2.5" fill="#a78bfa" opacity="0.6"/>
      <circle cx="65" cy="65" r="2.5" fill="#a78bfa" opacity="0.6"/>
      <circle cx="50" cy="72" r="2.5" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="30" cy="55" r="2" fill="#3b82f6" opacity="0.5"/>
      <circle cx="70" cy="55" r="2" fill="#3b82f6" opacity="0.5"/>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b"/>
    <rect x="40" y="192" width="165" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7"/>
  </g>

  <!-- Card 1 (front) - Padlock with Chains (Ransomware) -->
  <g transform="translate(660, 340)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5"/>
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03"/>
    <g transform="translate(110, 20)">
      <path d="M30 45 L30 30 C30 15 70 15 70 30 L70 45" fill="none" stroke="#f43f5e" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
      <rect x="20" y="45" width="60" height="45" rx="8" fill="#f43f5e" opacity="0.8"/>
      <rect x="22" y="47" width="56" height="41" rx="6" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
      <circle cx="50" cy="62" r="6" fill="#0f172a" opacity="0.7"/>
      <rect x="47" y="65" width="6" height="14" rx="2" fill="#0f172a" opacity="0.7"/>
      <g stroke="#94a3b8" stroke-width="2.5" fill="none" opacity="0.5">
        <path d="M10 55 C5 55 2 60 5 65 C8 70 5 75 0 75"/>
        <path d="M90 55 C95 55 98 60 95 65 C92 70 95 75 100 75"/>
        <path d="M10 70 C5 70 0 65 0 60"/>
        <path d="M90 70 C95 70 100 65 100 60"/>
      </g>
    </g>
    <g transform="translate(40, 195)">
      <rect width="240" height="28" rx="6" fill="#1e293b" opacity="0.8"/>
      <circle cx="18" cy="14" r="5" fill="#f43f5e" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="32" y="18" fill="#f87171" font-family="monospace" font-size="11" font-weight="600">CRITICAL</text>
    </g>
  </g>

  <!-- Floating particles between cards -->
  <circle cx="720" cy="280" r="2" fill="#3b82f6" opacity="0.5">
    <animate attributeName="cy" values="280;270;280" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="330" r="1.5" fill="#f43f5e" opacity="0.4">
    <animate attributeName="cy" values="330;320;330" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="300" r="2" fill="#8b5cf6" opacity="0.5">
    <animate attributeName="cy" values="300;290;300" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="690" cy="200" r="1.5" fill="#3b82f6" opacity="0.3">
    <animate attributeName="cy" values="200;192;200" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="180" r="1" fill="#f43f5e" opacity="0.4">
    <animate attributeName="cy" values="180;172;180" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="130" r="1.5" fill="#8b5cf6" opacity="0.35">
    <animate attributeName="cx" values="950;958;950" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- ==================== LEFT SIDE: Text Content ==================== -->

  <!-- Category pill -->
  <g transform="translate(60, 80)">
    <rect width="160" height="32" rx="16" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
    <text x="80" y="21" text-anchor="middle" fill="#60a5fa" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">WEEKLY DIGEST</text>
  </g>

  <!-- Title -->
  <text x="60" y="170" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Tech Security</text>
  <text x="60" y="225" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">Weekly</text>
  <text x="60" y="290" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">Digest Ransomware</text>
  <text x="60" y="335" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="38" font-weight="700" letter-spacing="-0.3">LLM</text>

  <!-- Gradient accent line -->
  <rect x="60" y="360" width="200" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Tag chips -->
  <g transform="translate(60, 385)">
    <rect width="110" height="30" rx="15" fill="#f43f5e" opacity="0.12" stroke="#f43f5e" stroke-width="0.8" stroke-opacity="0.35"/>
    <text x="55" y="20" text-anchor="middle" fill="#fb7185" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Ransomware</text>
    <g transform="translate(120, 0)">
      <rect width="65" height="30" rx="15" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.35"/>
    </g>
    <g transform="translate(195, 0)">
      <rect width="95" height="30" rx="15" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.35"/>
      <text x="48" y="20" text-anchor="middle" fill="#60a5fa" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Security</text>
    </g>
  </g>

  <!-- Date -->
  <text x="60" y="460" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">MARCH 29, 2026</text>

  <!-- Footer -->
  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8"/>
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <!-- Subtle border frame -->
  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1"/>
</svg>