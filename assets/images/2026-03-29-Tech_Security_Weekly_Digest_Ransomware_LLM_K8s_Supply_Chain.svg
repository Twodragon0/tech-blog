  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,160,60,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,80,80,0.5)"/>

