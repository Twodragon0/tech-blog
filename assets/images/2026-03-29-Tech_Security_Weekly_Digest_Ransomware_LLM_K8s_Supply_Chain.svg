<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3d3d"/>
      <stop offset="50%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3d3d"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="dateBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3d3d;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="pillRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ff3d3d;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="pillAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="pillBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid Lines Horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid Lines Vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background Circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,50,50,0.04)" stroke="rgba(255,80,80,0.06)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(200,30,30,0.05)" stroke="rgba(255,60,60,0.08)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Ransomware + LLM + K8s + Supply Chain -->
  <!-- K8s Helm/Wheel outer ring -->
  <circle cx="1010" cy="225" r="92" fill="rgba(41,128,185,0.07)" stroke="rgba(52,152,219,0.3)" stroke-width="1.5"/>
  <!-- K8s spokes (7 spokes like K8s logo) -->
  <line x1="1010" y1="133" x2="1010" y2="155" stroke="rgba(52,152,219,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1010" y1="295" x2="1010" y2="317" stroke="rgba(52,152,219,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="918" y1="225" x2="940" y2="225" stroke="rgba(52,152,219,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1080" y1="225" x2="1102" y2="225" stroke="rgba(52,152,219,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="945" y1="160" x2="961" y2="176" stroke="rgba(52,152,219,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1059" y1="274" x2="1075" y2="290" stroke="rgba(52,152,219,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="945" y1="290" x2="961" y2="274" stroke="rgba(52,152,219,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1059" y1="176" x2="1075" y2="160" stroke="rgba(52,152,219,0.35)" stroke-width="3" stroke-linecap="round"/>
  <!-- K8s inner hub -->
  <circle cx="1010" cy="225" r="30" fill="rgba(41,128,185,0.12)" stroke="rgba(52,152,219,0.4)" stroke-width="2"/>
  <circle cx="1010" cy="225" r="15" fill="rgba(41,128,185,0.2)" stroke="rgba(52,152,219,0.5)" stroke-width="1.5"/>

  <!-- Ransomware Lock Icon (overlapping, top-right area) -->
  <rect x="1075" y="145" width="52" height="40" rx="5" fill="rgba(192,57,43,0.1)" stroke="rgba(255,61,61,0.35)" stroke-width="1.5"/>
  <rect x="1084" y="130" width="34" height="22" rx="17" fill="none" stroke="rgba(255,61,61,0.3)" stroke-width="2.5"/>
  <circle cx="1101" cy="162" r="5" fill="rgba(255,61,61,0.4)" stroke="rgba(255,80,80,0.5)" stroke-width="1"/>
  <line x1="1101" y1="167" x2="1101" y2="175" stroke="rgba(255,61,61,0.45)" stroke-width="2" stroke-linecap="round"/>

  <!-- LLM Neural Network (bottom-left of illustration) -->
  <!-- Nodes layer 1 -->
  <circle cx="900" cy="270" r="8" fill="rgba(155,89,182,0.12)" stroke="rgba(155,89,182,0.4)" stroke-width="1.5"/>
  <circle cx="900" cy="295" r="8" fill="rgba(155,89,182,0.12)" stroke="rgba(155,89,182,0.4)" stroke-width="1.5"/>
  <circle cx="900" cy="320" r="8" fill="rgba(155,89,182,0.12)" stroke="rgba(155,89,182,0.4)" stroke-width="1.5"/>
  <!-- Nodes layer 2 -->
  <circle cx="935" cy="280" r="8" fill="rgba(155,89,182,0.15)" stroke="rgba(180,100,200,0.45)" stroke-width="1.5"/>
  <circle cx="935" cy="307" r="8" fill="rgba(155,89,182,0.15)" stroke="rgba(180,100,200,0.45)" stroke-width="1.5"/>
  <!-- Nodes layer 3 -->
  <circle cx="970" cy="293" r="9" fill="rgba(155,89,182,0.2)" stroke="rgba(200,120,220,0.5)" stroke-width="1.5"/>
  <!-- Connections layer1 to layer2 -->
  <line x1="908" y1="270" x2="927" y2="280" stroke="rgba(155,89,182,0.25)" stroke-width="1"/>
  <line x1="908" y1="270" x2="927" y2="307" stroke="rgba(155,89,182,0.15)" stroke-width="1"/>
  <line x1="908" y1="295" x2="927" y2="280" stroke="rgba(155,89,182,0.2)" stroke-width="1"/>
  <line x1="908" y1="295" x2="927" y2="307" stroke="rgba(155,89,182,0.25)" stroke-width="1"/>
  <line x1="908" y1="320" x2="927" y2="280" stroke="rgba(155,89,182,0.15)" stroke-width="1"/>
  <line x1="908" y1="320" x2="927" y2="307" stroke="rgba(155,89,182,0.2)" stroke-width="1"/>
  <!-- Connections layer2 to layer3 -->
  <line x1="943" y1="280" x2="961" y2="293" stroke="rgba(155,89,182,0.3)" stroke-width="1"/>
  <line x1="943" y1="307" x2="961" y2="293" stroke="rgba(155,89,182,0.3)" stroke-width="1"/>

  <!-- Supply Chain Arrow -->
  <line x1="895" y1="175" x2="1095" y2="175" stroke="rgba(231,76,60,0.2)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="1095,170 1107,175 1095,180" fill="rgba(231,76,60,0.35)"/>
  <!-- Supply chain nodes -->
  <circle cx="920" cy="175" r="6" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.4)" stroke-width="1.5"/>
  <circle cx="960" cy="175" r="6" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.4)" stroke-width="1.5"/>
  <circle cx="1000" cy="175" r="6" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.4)" stroke-width="1.5"/>
  <circle cx="1040" cy="175" r="6" fill="rgba(231,76,60,0.15)" stroke="rgba(231,76,60,0.4)" stroke-width="1.5"/>
  <!-- Compromised node highlight -->
  <circle cx="1000" cy="175" r="10" fill="none" stroke="rgba(255,61,61,0.35)" stroke-width="1.5"/>
  <line x1="994" y1="169" x2="1006" y2="181" stroke="rgba(255,61,61,0.45)" stroke-width="1.5"/>
  <line x1="1006" y1="169" x2="994" y2="181" stroke="rgba(255,61,61,0.45)" stroke-width="1.5"/>

  <!-- Shield overlay (security theme) -->
  <path d="M1010,135 L1040,148 L1040,170 Q1040,190 1010,200 Q980,190 980,170 L980,148 Z" fill="rgba(255,61,61,0.06)" stroke="rgba(255,80,80,0.22)" stroke-width="1.5"/>
  <path d="M1010,143 L1033,154 L1033,172 Q1033,186 1010,194 Q987,186 987,172 L987,154 Z" fill="rgba(255,61,61,0.08)" stroke="rgba(255,80,80,0.18)" stroke-width="1"/>

  <!-- Alert Dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,61,61,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="5" fill="rgba(255,165,0,0.7)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="5" fill="rgba(255,61,61,0.5)" filter="url(#glow)"/>

  <!-- Left Accent Bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date Badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#dateBadge)" stroke="rgba(255,61,61,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(255,120,100,0.95)" text-anchor="middle" letter-spacing="1.5">MARCH 29, 2026</text>

  <!-- Title Line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">Tech Security Weekly Digest</text>

  <!-- Title Line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">Ransomware LLM K8s Supply</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(200,160,150,0.85)">Critical threats across AI, containers &amp; supply chain</text>

  <!-- Accent Line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category Label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(255,100,80,0.7)" letter-spacing="3">SECURITY / DEVSECOPS / THREAT INTEL</text>

  <!-- Tag Pills -->
  <rect x="80" y="402" width="140" height="36" rx="18" fill="url(#pillRed)" stroke="rgba(255,61,61,0.4)" stroke-width="1"/>
  <text x="150" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,200,190,0.95)" text-anchor="middle">Ransomware</text>

  <rect x="234" y="402" width="100" height="36" rx="18" fill="url(#pillAmber)" stroke="rgba(230,120,30,0.4)" stroke-width="1"/>
  <text x="284" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(255,220,160,0.95)" text-anchor="middle">LLM AI</text>

  <rect x="348" y="402" width="140" height="36" rx="18" fill="url(#pillBlue)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <text x="418" y="425" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="rgba(160,210,255,0.95)" text-anchor="middle">K8s / Supply</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,100,80,0.55)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(200,120,100,0.45)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>