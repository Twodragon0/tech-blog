<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Gradient overlay (subtle) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0.1"/>
    </linearGradient>
    
    <radialGradient id="illustrationGlow" cx="850" cy="280">
      <stop offset="0%" style="stop-color:#ff3b30;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Illustration area glow -->
  <rect x="650" y="50" width="550" height="530" fill="url(#illustrationGlow)"/>
  
  <!-- RIGHT SIDE: Illustration (Ransomware + LLM) -->
  
  <!-- Central neural network nodes (LLM representation) -->
  <circle cx="850" cy="260" r="45" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  <circle cx="850" cy="260" r="35" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  
  <!-- Neural network connections with encryption effect -->
  <line x1="800" y1="220" x2="850" y2="260" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="900" y1="220" x2="850" y2="260" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="800" y1="300" x2="850" y2="260" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="900" y1="300" x2="850" y2="260" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  
  <!-- Network nodes -->
  <circle cx="800" cy="220" r="12" fill="#00d4ff" opacity="0.7"/>
  <circle cx="900" cy="220" r="12" fill="#00d4ff" opacity="0.7"/>
  <circle cx="800" cy="300" r="12" fill="#00d4ff" opacity="0.7"/>
  <circle cx="900" cy="300" r="12" fill="#00d4ff" opacity="0.7"/>
  
  <!-- Encryption attack - rotating lock shapes -->
  <g id="lockAttack1" opacity="0.9">
    <circle cx="780" cy="200" r="20" fill="none" stroke="#ff3b30" stroke-width="2.5"/>
    <rect x="775" y="210" width="10" height="12" fill="none" stroke="#ff3b30" stroke-width="2"/>
    <circle cx="785" cy="225" r="3" fill="#ff3b30"/>
  </g>
  
  <g id="lockAttack2" opacity="0.8">
    <circle cx="920" cy="185" r="18" fill="none" stroke="#ff9500" stroke-width="2.5"/>
    <rect x="915" y="195" width="10" height="10" fill="none" stroke="#ff9500" stroke-width="2"/>
    <circle cx="920" cy="208" r="2.5" fill="#ff9500"/>
  </g>
  
  <g id="lockAttack3" opacity="0.85">
    <circle cx="760" cy="280" r="16" fill="none" stroke="#ff3b30" stroke-width="2"/>
    <rect x="756" y="288" width="8" height="9" fill="none" stroke="#ff3b30" stroke-width="1.5"/>
    <circle cx="760" cy="300" r="2" fill="#ff3b30"/>
  </g>
  
  <g id="lockAttack4" opacity="0.7">
    <circle cx="940" cy="270" r="19" fill="none" stroke="#ff9500" stroke-width="2.5"/>
    <rect x="934" y="280" width="12" height="11" fill="none" stroke="#ff9500" stroke-width="2"/>
    <circle cx="940" cy="294" r="3" fill="#ff9500"/>
  </g>
  
  <!-- Encrypted data streams (chains/streams) -->
  <path d="M 730 240 Q 760 260 790 270" stroke="#ff3b30" stroke-width="2.5" fill="none" opacity="0.7" stroke-dasharray="5,3"/>
  <path d="M 910 240 Q 890 270 850 290" stroke="#ff9500" stroke-width="2.5" fill="none" opacity="0.65" stroke-dasharray="5,3"/>
  
  <!-- Shield being breached (security concept) -->
  <path d="M 880 350 L 920 350 L 920 400 Q 900 420 880 400 Q 860 420 840 400 L 840 350 Z" 
        fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <path d="M 860 360 L 900 395" stroke="#ff3b30" stroke-width="2.5" opacity="0.8"/>
  <circle cx="880" cy="378" r="8" fill="none" stroke="#ff3b30" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Alert indicator (threat level) -->
  <circle cx="750" cy="380" r="22" fill="none" stroke="#ff3b30" stroke-width="2.5" opacity="0.8"/>
  <text x="750" y="388" font-size="24" font-weight="bold" fill="#ff3b30" text-anchor="middle" opacity="0.9">!</text>
  
  <!-- Ransomware particles/corruption effect -->
  <circle cx="820" cy="340" r="4" fill="#ff9500" opacity="0.6"/>
  <circle cx="895" cy="360" r="3" fill="#ff3b30" opacity="0.7"/>
  <circle cx="765" cy="320" r="3.5" fill="#ff9500" opacity="0.5"/>
  <circle cx="910" cy="400" r="2.5" fill="#ff3b30" opacity="0.6"/>
  
  <!-- Binary code texture (AI/data concept) -->
  <text x="1050" y="200" font-size="11" fill="#00d4ff" opacity="0.4" font-family="monospace">01010101</text>
  <text x="1060" y="220" font-size="10" fill="#00d4ff" opacity="0.35" font-family="monospace">11001010</text>
  <text x="1045" y="240" font-size="11" fill="#00d4ff" opacity="0.3" font-family="monospace">10110011</text>
  
  <!-- LEFT SIDE: Text Content -->
  
  <!-- Title Line 1 -->
  <text x="80" y="185" font-size="46" font-weight="bold" fill="white" font-family="Arial, sans-serif">
    Tech Security
  </text>
  
  <!-- Title Line 2 -->
  <text x="80" y="245" font-size="46" font-weight="bold" fill="white" font-family="Arial, sans-serif">
    Ransomware LLM
  </text>
  
  <!-- Subtitle/Context -->
  <text x="80" y="290" font-size="16" fill="#a0a8b8" font-family="Arial, sans-serif">
    Weekly Digest
  </text>
  
  <!-- Date Badge -->
  <rect x="80" y="310" width="220" height="40" rx="20" fill="#1a2332" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="190" y="337" font-size="15" fill="#00d4ff" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500">
    MARCH 29, 2026
  </text>
  
  <!-- Tag Pills -->
  <!-- Tag 1: Ransomware -->
  <rect x="80" y="420" width="140" height="32" rx="16" fill="#1a2a3a" stroke="#ff3b30" stroke-width="1.5"/>
  <text x="150" y="442" font-size="13" fill="#ff3b30" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500">
    Ransomware
  </text>
  
  <!-- Tag 2: LLM -->
  <rect x="240" y="420" width="110" height="32" rx="16" fill="#1a2a3a" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="295" y="442" font-size="13" fill="#00d4ff" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500">
    LLM/AI
  </text>
  
  <!-- Tag 3: Security -->
  <rect x="370" y="420" width="120" height="32" rx="16" fill="#1a2a3a" stroke="#ff9500" stroke-width="1.5"/>
  <text x="430" y="442" font-size="13" fill="#ff9500" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500">
    Security
  </text>
  
  <!-- Footer -->
  <text x="80" y="590" font-size="14" fill="#6b7280" font-family="Arial, sans-serif">
    tech.2twodragon.com
  </text>
  
  <!-- Decorative line separator -->
  <line x1="80" y1="305" x2="620" y2="305" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
</svg>