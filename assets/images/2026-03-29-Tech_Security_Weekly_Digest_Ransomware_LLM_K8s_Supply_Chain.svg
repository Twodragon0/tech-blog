<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff8800;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4488ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="tagRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tagAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tagBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Shield with circuit board / K8s helm / LLM neural net hybrid -->
  <!-- Outer shield shape -->
  <path d="M1010,140 L1100,165 L1100,240 Q1100,300 1010,330 Q920,300 920,240 L920,165 Z"
        fill="rgba(255,80,80,0.07)" stroke="rgba(255,100,100,0.3)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,158 L1085,178 L1085,240 Q1085,290 1010,314 Q935,290 935,240 L935,178 Z"
        fill="rgba(255,80,80,0.05)" stroke="rgba(255,120,120,0.2)" stroke-width="1"/>

  <!-- K8s hexagon wheel inside shield -->
  <polygon points="1010,190 1030,202 1030,226 1010,238 990,226 990,202"
           fill="rgba(100,180,255,0.08)" stroke="rgba(100,180,255,0.35)" stroke-width="1.5"/>
  <!-- K8s spokes -->
  <line x1="1010" y1="190" x2="1010" y2="175" stroke="rgba(100,180,255,0.3)" stroke-width="1.2"/>
  <line x1="1030" y1="202" x2="1043" y2="194" stroke="rgba(100,180,255,0.3)" stroke-width="1.2"/>
  <line x1="1030" y1="226" x2="1043" y2="234" stroke="rgba(100,180,255,0.3)" stroke-width="1.2"/>
  <line x1="1010" y1="238" x2="1010" y2="253" stroke="rgba(100,180,255,0.3)" stroke-width="1.2"/>
  <line x1="990" y1="226" x2="977" y2="234" stroke="rgba(100,180,255,0.3)" stroke-width="1.2"/>
  <line x1="990" y1="202" x2="977" y2="194" stroke="rgba(100,180,255,0.3)" stroke-width="1.2"/>
  <!-- K8s hub -->
  <circle cx="1010" cy="214" r="8" fill="rgba(100,180,255,0.12)" stroke="rgba(100,180,255,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="214" r="3" fill="rgba(100,180,255,0.4)"/>

  <!-- Spoke terminal dots -->
  <circle cx="1010" cy="175" r="3" fill="rgba(100,180,255,0.5)"/>
  <circle cx="1043" cy="194" r="3" fill="rgba(100,180,255,0.5)"/>
  <circle cx="1043" cy="234" r="3" fill="rgba(100,180,255,0.5)"/>
  <circle cx="1010" cy="253" r="3" fill="rgba(100,180,255,0.5)"/>
  <circle cx="977" cy="234" r="3" fill="rgba(100,180,255,0.5)"/>
  <circle cx="977" cy="194" r="3" fill="rgba(100,180,255,0.5)"/>

  <!-- LLM neural nodes orbiting shield -->
  <circle cx="950" cy="155" r="6" fill="rgba(255,160,60,0.1)" stroke="rgba(255,160,60,0.35)" stroke-width="1.2"/>
  <circle cx="1070" cy="155" r="6" fill="rgba(255,160,60,0.1)" stroke="rgba(255,160,60,0.35)" stroke-width="1.2"/>
  <circle cx="940" cy="270" r="6" fill="rgba(255,160,60,0.1)" stroke="rgba(255,160,60,0.35)" stroke-width="1.2"/>
  <circle cx="1080" cy="270" r="6" fill="rgba(255,160,60,0.1)" stroke="rgba(255,160,60,0.35)" stroke-width="1.2"/>
  <circle cx="1010" cy="145" r="6" fill="rgba(255,160,60,0.1)" stroke="rgba(255,160,60,0.35)" stroke-width="1.2"/>
  <!-- LLM node connections -->
