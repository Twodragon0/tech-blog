  <path d="M920,295 Q960,310 1010,315 Q1060,310 1100,295"
        fill="none" stroke="rgba(180,140,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="920" cy="295" r="3" fill="rgba(180,140,255,0.3)"/>
  <circle cx="1010" cy="315" r="3" fill="rgba(180,140,255,0.3)"/>
  <circle cx="1100" cy="295" r="3" fill="rgba(180,140,255,0.3)"/>

  <!-- Circuit traces on the sides -->
  <path d="M880,200 L910,200 L910,185 L930,185"
        fill="none" stroke="rgba(100,220,100,0.15)" stroke-width="1"/>
  <circle cx="880" cy="200" r="2" fill="rgba(100,220,100,0.25)"/>
  <path d="M1130,220 L1100,220 L1100,235 L1085,235"
        fill="none" stroke="rgba(100,220,100,0.15)" stroke-width="1"/>
  <circle cx="1130" cy="220" r="2" fill="rgba(100,220,100,0.25)"/>

