  <line x1="1070" y1="155" x2="1010" y2="175" stroke="rgba(255,160,60,0.18)" stroke-width="1"/>
  <line x1="940" y1="270" x2="935" y2="240" stroke="rgba(255,160,60,0.18)" stroke-width="1"/>
  <line x1="1080" y1="270" x2="1085" y2="240" stroke="rgba(255,160,60,0.18)" stroke-width="1"/>
  <line x1="1010" y1="145" x2="1010" y2="175" stroke="rgba(255,160,60,0.18)" stroke-width="1"/>
  <!-- Cross-connections -->
  <line x1="950" y1="155" x2="1070" y2="155" stroke="rgba(255,160,60,0.1)" stroke-width="0.8"/>
  <line x1="940" y1="270" x2="1080" y2="270" stroke="rgba(255,160,60,0.1)" stroke-width="0.8"/>

  <!-- Ransomware lock icon below shield -->
  <rect x="997" y="270" width="26" height="20" rx="2"
        fill="rgba(255,60,60,0.1)" stroke="rgba(255,80,80,0.35)" stroke-width="1.2"/>
  <path d="M1004,270 Q1004,260 1010,260 Q1016,260 1016,270"
        fill="none" stroke="rgba(255,80,80,0.35)" stroke-width="1.2"/>
  <circle cx="1010" cy="280" r="2.5" fill="rgba(255,80,80,0.5)"/>
  <line x1="1010" y1="282" x2="1010" y2="286" stroke="rgba(255,80,80,0.4)" stroke-width="1.2"/>

