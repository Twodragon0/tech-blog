  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" text-anchor="end" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,100,100,0.4)" letter-spacing="1">SECURITY</text>
