  <rect x="1090" y="285" width="14" height="10" rx="2" fill="rgba(255,80,80,0.12)" stroke="rgba(255,100,100,0.3)" stroke-width="1"/>
  <rect x="888" y="200" width="10" height="8" rx="2" fill="rgba(255,80,80,0.1)" stroke="rgba(255,100,100,0.25)" stroke-width="1"/>
  <rect x="883" y="270" width="12" height="8" rx="2" fill="rgba(80,140,255,0.1)" stroke="rgba(100,160,255,0.25)" stroke-width="1"/>

