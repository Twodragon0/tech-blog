  <rect x="1028" y="225" width="44" height="36" rx="4" fill="rgba(255,80,80,0.1)" stroke="rgba(255,100,100,0.4)" stroke-width="1.5"/>
  <path d="M1038,225 Q1038,205 1050,205 Q1062,205 1062,225" fill="none" stroke="rgba(255,120,120,0.5)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="1050" cy="240" r="5" fill="rgba(255,100,100,0.6)"/>
  <rect x="1048" y="243" width="4" height="8" rx="2" fill="rgba(255,100,100,0.6)"/>

