<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#06b6d4"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg1)"/>

  <text x="60" y="70" fill="#e2e8f0" font-size="32" font-family="Georgia, serif">AI Sandbox DNS Exfil + Ransomware + GKE</text>
  <text x="60" y="104" fill="#94a3b8" font-size="18" font-family="Georgia, serif">Mar 18</text>

  <!-- Curved arrows radiating from center -->
  <path d="M600,315 C600,220 600,200 600,155" stroke="#06b6d4" stroke-width="3" fill="none" marker-end="url(#arrowCyan)"/>
  <path d="M600,315 C460,350 360,400 260,470" stroke="#f43f5e" stroke-width="3" fill="none" marker-end="url(#arrowCyan)"/>
  <path d="M600,315 C740,350 840,400 940,470" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrowCyan)"/>

  <!-- Top Center Node -->
  <g transform="translate(520,110)">
    <path d="M80,0 L140,40 L140,110 L80,150 L20,110 L20,40 Z" fill="#0f172a" stroke="#06b6d4" stroke-width="3" filter="url(#glowCyan)"/>
    <!-- Icon: hex chip -->
    <rect x="58" y="48" width="44" height="44" rx="6" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <path d="M80,52 L80,40 M80,96 L80,108 M58,70 L46,70 M102,70 L114,70" stroke="#06b6d4" stroke-width="2"/>
  </g>
  <text x="600" y="290" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="Georgia, serif">AI Sandbox DNS</text>

  <!-- Bottom Left Node -->
  <g transform="translate(180,450)">
    <rect x="0" y="0" width="160" height="120" rx="18" fill="#0f172a" stroke="#f43f5e" stroke-width="3"/>
    <!-- Icon: lock -->
    <rect x="58" y="52" width="44" height="36" rx="6" fill="none" stroke="#f43f5e" stroke-width="2"/>
    <path d="M68,52 L68,40 C68,30 92,30 92,40 L92,52" stroke="#f43f5e" stroke-width="2" fill="none"/>
  </g>
  <text x="260" y="600" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="Georgia, serif">Ransomware</text>

  <!-- Bottom Right Node -->
  <g transform="translate(860,450)">
    <path d="M80,0 L160,60 L80,120 L0,60 Z" fill="#0f172a" stroke="#10b981" stroke-width="3"/>
    <!-- Icon: kube -->
    <polygon points="80,32 110,52 110,88 80,108 50,88 50,52" fill="none" stroke="#10b981" stroke-width="2"/>
    <circle cx="80" cy="70" r="6" fill="#10b981"/>
  </g>
  <text x="940" y="600" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="Georgia, serif">GKE</text>
</svg>