  <path d="M905,180 Q905,162 920,162 Q922,150 935,150 Q944,140 958,144 Q968,135 982,140 Q995,135 1002,146 Q1015,146 1015,162 Q1025,165 1025,177 Q1025,192 1010,192 L915,192 Q905,192 905,180 Z"
