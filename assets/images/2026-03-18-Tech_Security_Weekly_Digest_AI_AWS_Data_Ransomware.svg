<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="badgeBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Ransomware/AI/AWS/Security composite icon -->
  <!-- Outer shield shape -->
  <path d="M1010,140 L1100,170 L1100,250 Q1100,310 1010,340 Q920,310 920,250 L920,170 Z"
        fill="rgba(255,68,68,0.08)" stroke="rgba(255,68,68,0.35)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,158 L1085,183 L1085,248 Q1085,298 1010,322 Q935,298 935,248 L935,183 Z"
        fill="rgba(255,100,50,0.06)" stroke="rgba(255,120,50,0.25)" stroke-width="1"/>

  <!-- AI neural network nodes inside shield -->
  <circle cx="1010" cy="220" r="14" fill="rgba(255,150,50,0.12)" stroke="rgba(255,150,50,0.4)" stroke-width="1.5"/>
  <circle cx="975" cy="255" r="9" fill="rgba(255,80,80,0.10)" stroke="rgba(255,80,80,0.35)" stroke-width="1"/>
  <circle cx="1045" cy="255" r="9" fill="rgba(255,80,80,0.10)" stroke="rgba(255,80,80,0.35)" stroke-width="1"/>
  <circle cx="990" cy="285" r="7" fill="rgba(100,180,255,0.10)" stroke="rgba(100,180,255,0.30)" stroke-width="1"/>
  <circle cx="1030" cy="285" r="7" fill="rgba(100,180,255,0.10)" stroke="rgba(100,180,255,0.30)" stroke-width="1"/>
  <circle cx="1010" cy="300" r="6" fill="rgba(255,68,68,0.12)" stroke="rgba(255,68,68,0.35)" stroke-width="1"/>

  <!-- Neural connections -->
  <line x1="1010" y1="220" x2="975" y2="255" stroke="rgba(255,120,80,0.3)" stroke-width="1"/>
  <line x1="1010" y1="220" x2="1045" y2="255" stroke="rgba(255,120,80,0.3)" stroke-width="1"/>
  <line x1="975" y1="255" x2="990" y2="285" stroke="rgba(100,180,255,0.25)" stroke-width="1"/>
  <line x1="975" y1="255" x2="1030" y2="285" stroke="rgba(100,180,255,0.20)" stroke-width="1"/>
  <line x1="1045" y1="255" x2="990" y2="285" stroke="rgba(100,180,255,0.20)" stroke-width="1"/>
  <line x1="1045" y1="255" x2="1030" y2="285" stroke="rgba(100,180,255,0.25)" stroke-width="1"/>
  <line x1="990" y1="285" x2="1010" y2="300" stroke="rgba(255,68,68,0.25)" stroke-width="1"/>
  <line x1="1030" y1="285" x2="1010" y2="300" stroke="rgba(255,68,68,0.25)" stroke-width="1"/>

  <!-- Lock icon atop shield -->
  <rect x="997" y="175" width="26" height="22" rx="3"
        fill="rgba(255,200,50,0.10)" stroke="rgba(255,200,50,0.45)" stroke-width="1.5"/>
  <path d="M1003,175 Q1003,163 1010,163 Q1017,163 1017,175"
        fill="none" stroke="rgba(255,200,50,0.45)" stroke-width="1.5"/>
  <circle cx="1010" cy="186" r="3.5" fill="rgba(255,200,50,0.5)"/>

  <!-- AWS cloud shape (right of shield) -->
  <path d="M1075,150 Q1075,138 1085,138 Q1087,130 1098,132 Q1104,125 1114,130 Q1124,128 1126,138 Q1135,140 1133,150 Z"
        fill="rgba(255,153,0,0.09)" stroke="rgba(255,153,0,0.30)" stroke-width="1"/>

  <!-- Data stream lines (left of shield) -->
  <line x1="880" y1="195" x2="918" y2="210" stroke="rgba(100,200,255,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="880" y1="215" x2="918" y2="225" stroke="rgba(100,200,255,0.15)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="880" y1="235" x2="918" y2="240" stroke="rgba(255,100,100,0.20)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="880" y1="255" x2="918" y2="258" stroke="rgba(255,100,100,0.15)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Ransomware skull hint: X eyes in a circle -->
  <circle cx="960" cy="165" r="18" fill="rgba(200,30,30,0.07)" stroke="rgba(200,30,30,0.25)" stroke-width="1"/>
  <line x1="953" y1="158" x2="959" y2="164" stroke="rgba(255,80,80,0.40)" stroke-width="1.5"/>
  <line x1="959" y1="158" x2="953" y2="164" stroke="rgba(255,80,80,0.40)" stroke-width="1.5"/>
  <line x1="963" y1="158" x2="969" y2="164" stroke="rgba(255,80,80,0.40)" stroke-width="1.5"/>
  <line x1="969" y1="158" x2="963" y2="164" stroke="rgba(255,80,80,0.40)" stroke-width="1.5"/>
  <path d="M952,170 Q960,175 968,170" fill="none" stroke="rgba(255,80,80,0.35)" stroke-width="1.2"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,140,0,0.7)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,80,80,0.55)" filter="url(#glow)"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#badgeBg)" stroke="rgba(255,80,80,0.25)" stroke-width="1"/>
  <text x="180" y="81" font-family="monospace,sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,160,100,0.95)" text-anchor="middle" letter-spacing="1">MARCH 18, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="46" font-weight="700"
        fill="white" opacity="0.97">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="700"
        fill="rgba(255,120,80,0.95)">AI AWS Data Ransomware</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19"
        fill="rgba(255,255,255,0.55)">Weekly intelligence briefing · Security Category</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="600"
        fill="rgba(255,120,80,0.75)" letter-spacing="2">SECURITY · THREAT INTELLIGENCE · CLOUD</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="110" height="36" rx="18"
        fill="rgba(220,40,40,0.18)" stroke="rgba(255,80,80,0.35)" stroke-width="1"/>
  <text x="135" y="425" font-family="Arial,sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,100,100,0.95)" text-anchor="middle">Ransomware</text>

  <rect x="204" y="402" width="88" height="36" rx="18"
        fill="rgba(200,120,0,0.18)" stroke="rgba(255,170,0,0.35)" stroke-width="1"/>
  <text x="248" y="425" font-family="Arial,sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,185,50,0.95)" text-anchor="middle">AWS Cloud</text>

  <rect x="306" y="402" width="80" height="36" rx="18"
        fill="rgba(20,80,200,0.18)" stroke="rgba(80,150,255,0.35)" stroke-width="1"/>
  <text x="346" y="425" font-family="Arial,sans-serif" font-size="13" font-weight="600"
        fill="rgba(100,180,255,0.95)" text-anchor="middle">AI Threat</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="monospace,sans-serif" font-size="13"
        fill="rgba(255,255,255,0.30)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial,sans-serif" font-size="13"
        fill="rgba(255,120,80,0.35)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>