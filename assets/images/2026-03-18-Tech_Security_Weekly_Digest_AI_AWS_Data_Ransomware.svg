  <circle cx="955" cy="256" r="3" fill="rgba(200,120,255,0.5)"/>
  <circle cx="970" cy="262" r="3" fill="rgba(200,120,255,0.5)"/>
  <circle cx="940" cy="278" r="3" fill="rgba(200,120,255,0.5)"/>
  <circle cx="955" cy="284" r="3" fill="rgba(200,120,255,0.5)"/>
