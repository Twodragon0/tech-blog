  <line x1="955" y1="256" x2="970" y2="262" stroke="rgba(200,120,255,0.25)" stroke-width="1"/>
  <line x1="940" y1="262" x2="940" y2="278" stroke="rgba(200,120,255,0.25)" stroke-width="1"/>
  <line x1="970" y1="262" x2="970" y2="278" stroke="rgba(200,120,255,0.25)" stroke-width="1"/>
  <line x1="940" y1="278" x2="955" y2="284" stroke="rgba(200,120,255,0.25)" stroke-width="1"/>
  <line x1="955" y1="284" x2="970" y2="278" stroke="rgba(200,120,255,0.25)" stroke-width="1"/>
  <line x1="940" y1="262" x2="955" y2="270" stroke="rgba(200,120,255,0.2)" stroke-width="1"/>
