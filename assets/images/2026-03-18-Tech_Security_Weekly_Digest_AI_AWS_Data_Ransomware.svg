  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(200,30,30,0.25)" stroke="rgba(255,80,80,0.45)" stroke-width="1"/>
  <text x="140" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,120,0.95)" text-anchor="middle">Ransomware</text>

  <rect x="214" y="402" width="100" height="36" rx="18" fill="rgba(180,90,0,0.25)" stroke="rgba(255,160,0,0.45)" stroke-width="1"/>
  <text x="264" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(255,180,80,0.95)" text-anchor="middle">AWS Cloud</text>

  <rect x="328" y="402" width="80" height="36" rx="18" fill="rgba(20,60,180,0.25)" stroke="rgba(80,140,255,0.45)" stroke-width="1"/>
  <text x="368" y="425" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(120,180,255,0.95)" text-anchor="middle">AI / ML</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="Arial, sans-serif" font-size="14" fill="rgba(180,180,200,0.5)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial, sans-serif" font-size="14" fill="rgba(180,180,200,0.5)" text-anchor="end">security</text>
</svg>