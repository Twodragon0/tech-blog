<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security 7th Week 9 DevSecOps Integration</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a1a"/>
      <stop offset="100%" stop-color="#2d152d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- DevSecOps infinity loop -->
  <!-- Left loop of infinity (Dev) -->
  <path d="M870 300 Q870 240 930 240 Q990 240 990 300 Q990 360 930 360 Q870 360 870 300 Z" fill="none" stroke="rgba(142,68,173,0.6)" stroke-width="3.5"/>
  <!-- Right loop of infinity (Ops) -->
  <path d="M990 300 Q990 240 1050 240 Q1110 240 1110 300 Q1110 360 1050 360 Q990 360 990 300 Z" fill="none" stroke="rgba(39,174,96,0.6)" stroke-width="3.5"/>
  <!-- Crossing point area shaded -->
  <ellipse cx="990" cy="300" rx="25" ry="20" fill="rgba(255,255,255,0.04)"/>
  <!-- Security shield at center -->
  <path d="M975 285 L990 291 L1005 285 L1005 298 Q1005 310 990 316 Q975 310 975 298 Z" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
  <path d="M982 299 L988 305 L1000 291" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dev label -->
  <text x="930" y="307" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="rgba(142,68,173,0.75)" text-anchor="middle">DEV</text>
  <!-- Ops label -->
  <text x="1050" y="307" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="rgba(39,174,96,0.75)" text-anchor="middle">OPS</text>
  <!-- Rotation arrows around loop -->
  <path d="M900 232 Q930 215 960 232" fill="none" stroke="rgba(142,68,173,0.5)" stroke-width="2" stroke-linecap="round"/>
  <path d="M1020 232 Q1050 215 1080 232" fill="none" stroke="rgba(39,174,96,0.5)" stroke-width="2" stroke-linecap="round"/>
  <path d="M957 228 L963 240 L970 230" fill="none" stroke="rgba(142,68,173,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M1077 228 L1083 240 L1090 230" fill="none" stroke="rgba(39,174,96,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Integration labels around the loop -->
  <text x="930" y="393" font-family="system-ui,sans-serif" font-size="11" fill="rgba(142,68,173,0.55)" text-anchor="middle">Plan - Code - Build</text>
  <text x="1050" y="393" font-family="system-ui,sans-serif" font-size="11" fill="rgba(39,174,96,0.55)" text-anchor="middle">Test - Deploy - Monitor</text>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="190" height="32" rx="4" fill="rgba(142,68,173,0.2)" stroke="rgba(142,68,173,0.4)" stroke-width="1"/>
  <text x="175" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">JUNE 13, 2025</text>
  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Cloud Security 7th</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="-1">Week 9: DevSecOps</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">Full DevSecOps Integration Pipeline and Culture</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">CLOUD SECURITY COURSE</text>
  <!-- Tags -->
  <rect x="80" y="420" width="120" height="36" rx="18" fill="rgba(142,68,173,0.18)" stroke="rgba(142,68,173,0.4)" stroke-width="1"/>
  <text x="140" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#8e44ad" text-anchor="middle" font-weight="600">DevSecOps</text>
  <rect x="216" y="420" width="120" height="36" rx="18" fill="rgba(39,174,96,0.18)" stroke="rgba(39,174,96,0.4)" stroke-width="1"/>
  <text x="276" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#27ae60" text-anchor="middle" font-weight="600">Integration</text>
  <rect x="352" y="420" width="90" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="397" y="443" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">Week 9</text>
  <!-- Bottom -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
</svg>
