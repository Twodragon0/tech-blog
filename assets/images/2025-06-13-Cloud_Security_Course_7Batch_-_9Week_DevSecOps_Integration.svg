<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e05a2b"/>
      <stop offset="50%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#6a0f1a"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e05a2b"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e05a2b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#1a5276;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: DevSecOps Integration - Shield + Cloud + Gear -->
  <!-- Outer orbit ring -->
  <circle cx="1010" cy="225" r="130" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="1010" cy="225" r="100" fill="none" stroke="rgba(224,90,43,0.15)" stroke-width="1" stroke-dasharray="3,6"/>

  <!-- Cloud shape (top) -->
  <g opacity="0.85">
    <ellipse cx="990" cy="155" rx="48" ry="30" fill="url(#cloudGrad)" stroke="rgba(52,152,219,0.35)" stroke-width="1.5"/>
    <ellipse cx="1020" cy="162" rx="38" ry="24" fill="url(#cloudGrad)" stroke="rgba(52,152,219,0.25)" stroke-width="1"/>
    <ellipse cx="965" cy="163" rx="32" ry="20" fill="url(#cloudGrad)" stroke="rgba(52,152,219,0.25)" stroke-width="1"/>
    <rect x="950" y="170" width="90" height="18" rx="4" fill="url(#cloudGrad)" stroke="none"/>
    <!-- Cloud lock icon -->
    <rect x="994" y="148" width="12" height="10" rx="2" fill="none" stroke="rgba(52,152,219,0.5)" stroke-width="1.2"/>
    <path d="M994 152 Q1000 145 1006 152" fill="none" stroke="rgba(52,152,219,0.5)" stroke-width="1.2"/>
    <circle cx="1000" cy="154" r="2" fill="rgba(52,152,219,0.6)"/>
  </g>

  <!-- Central Shield -->
  <g transform="translate(1010,220)">
    <path d="M0,-65 L50,-40 L50,10 Q50,55 0,75 Q-50,55 -50,10 L-50,-40 Z"
          fill="url(#shieldGrad)" stroke="rgba(224,90,43,0.4)" stroke-width="2"/>
    <path d="M0,-52 L38,-32 L38,10 Q38,45 0,62 Q-38,45 -38,10 L-38,-32 Z"
          fill="none" stroke="rgba(224,90,43,0.2)" stroke-width="1"/>
    <!-- Shield inner checkmark / lock -->
    <rect x="-12" y="-14" width="24" height="20" rx="3" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <path d="M-12 -6 Q0 -22 12 -6" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <circle cx="0" cy="-2" r="3" fill="rgba(255,255,255,0.4)"/>
    <line x1="0" y1="1" x2="0" y2="7" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  </g>

  <!-- Gear (bottom-right of shield) -->
  <g transform="translate(1080,280)" opacity="0.9">
    <circle cx="0" cy="0" r="22" fill="url(#gearGrad)" stroke="rgba(243,156,18,0.35)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(243,156,18,0.4)" stroke-width="1.5"/>
    <!-- Gear teeth -->
    <rect x="-4" y="-28" width="8" height="10" rx="2" fill="rgba(243,156,18,0.25)" stroke="rgba(243,156,18,0.3)" stroke-width="1"/>
    <rect x="-4" y="18" width="8" height="10" rx="2" fill="rgba(243,156,18,0.25)" stroke="rgba(243,156,18,0.3)" stroke-width="1"/>
    <rect x="-28" y="-4" width="10" height="8" rx="2" fill="rgba(243,156,18,0.25)" stroke="rgba(243,156,18,0.3)" stroke-width="1"/>
    <rect x="18" y="-4" width="10" height="8" rx="2" fill="rgba(243,156,18,0.25)" stroke="rgba(243,156,18,0.3)" stroke-width="1"/>
    <!-- diagonal teeth -->
    <rect x="-22" y="-22" width="8" height="8" rx="2" fill="rgba(243,156,18,0.2)" transform="rotate(45,−18,−18)"/>
    <rect x="14" y="-22" width="8" height="8" rx="2" fill="rgba(243,156,18,0.2)" transform="rotate(45,18,−18)"/>
    <rect x="-22" y="14" width="8" height="8" rx="2" fill="rgba(243,156,18,0.2)" transform="rotate(45,−18,18)"/>
    <rect x="14" y="14" width="8" height="8" rx="2" fill="rgba(243,156,18,0.2)" transform="rotate(45,18,18)"/>
  </g>

  <!-- Gear (bottom-left) -->
  <g transform="translate(940,290)" opacity="0.7">
    <circle cx="0" cy="0" r="16" fill="url(#gearGrad)" stroke="rgba(243,156,18,0.25)" stroke-width="1"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="rgba(243,156,18,0.3)" stroke-width="1"/>
    <rect x="-3" y="-20" width="6" height="8" rx="1" fill="rgba(243,156,18,0.2)" stroke="rgba(243,156,18,0.25)" stroke-width="1"/>
    <rect x="-3" y="12" width="6" height="8" rx="1" fill="rgba(243,156,18,0.2)" stroke="rgba(243,156,18,0.25)" stroke-width="1"/>
    <rect x="-20" y="-3" width="8" height="6" rx="1" fill="rgba(243,156,18,0.2)" stroke="rgba(243,156,18,0.25)" stroke-width="1"/>
    <rect x="12" y="-3" width="8" height="6" rx="1" fill="rgba(243,156,18,0.2)" stroke="rgba(243,156,18,0.25)" stroke-width="1"/>
  </g>

  <!-- Connecting lines between components -->
  <line x1="1010" y1="180" x2="1000" y2="172" stroke="rgba(52,152,219,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1060" y1="255" x2="1062" y2="264" stroke="rgba(243,156,18,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="960" y1="258" x2="945" y2="274" stroke="rgba(243,156,18,0.25)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Data flow dots on orbit -->
  <circle cx="1080" cy="145" r="4" fill="rgba(52,152,219,0.5)"/>
  <circle cx="1130" cy="225" r="3" fill="rgba(224,90,43,0.45)"/>
  <circle cx="890" cy="225" r="3" fill="rgba(243,156,18,0.45)"/>
  <circle cx="940" cy="130" r="4" fill="rgba(255,255,255,0.2)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(224,90,43,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(243,156,18,0.6)"/>
  <circle cx="860" cy="440" r="3" fill="rgba(52,152,219,0.5)"/>

  <!-- Background decorative circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(224,90,43,0.18)" stroke="rgba(224,90,43,0.4)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New',monospace" font-size="13" font-weight="600" fill="rgba(224,90,43,0.9)" text-anchor="middle" letter-spacing="1.5">JUNE 13, 2025</text>

  <!-- Title -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Cloud Security Course</text>
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-0.5">7Batch 9Week DevSecOps</text>
  <text x="80" y="298" font-family="'Arial',sans-serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="-0.5">Integration</text>

  <!-- Subtitle -->
  <text x="80" y="340" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">Security Engineering · DevOps · Cloud Architecture · Compliance</text>

  <!-- Accent line -->
  <rect x="80" y="358" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="392" font-family="'Courier New',monospace" font-size="14" font-weight="600" fill="rgba(224,90,43,0.75)" letter-spacing="3">DEVSECOPS / CLOUD SECURITY</text>

  <!-- Tag pills -->
  <rect x="80" y="416" width="140" height="36" rx="18" fill="rgba(192,57,43,0.25)" stroke="rgba(192,57,43,0.5)" stroke-width="1"/>
  <text x="150" y="439" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,100,80,0.9)" text-anchor="middle">Security</text>

  <rect x="234" y="416" width="148" height="36" rx="18" fill="rgba(180,100,0,0.22)" stroke="rgba(243,156,18,0.45)" stroke-width="1"/>
  <text x="308" y="439" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(243,180,50,0.9)" text-anchor="middle">DevSecOps</text>

  <rect x="396" y="416" width="130" height="36" rx="18" fill="rgba(26,82,118,0.28)" stroke="rgba(52,152,219,0.45)" stroke-width="1"/>
  <text x="461" y="439" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(100,180,240,0.9)" text-anchor="middle">9th Week</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New',monospace" font-size="14" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New',monospace" font-size="13" fill="rgba(224,90,43,0.45)" text-anchor="end" letter-spacing="1">DEVSECOPS</text>
</svg>