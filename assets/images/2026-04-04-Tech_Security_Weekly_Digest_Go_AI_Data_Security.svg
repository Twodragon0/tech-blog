<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1035;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>

    <!-- Upper-left zone gradient (espionage purple) -->
    <linearGradient id="upperZoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e0a3c;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#2d1058;stop-opacity:0.85" />
    </linearGradient>

    <!-- Lower-right zone gradient -->
    <linearGradient id="lowerZoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0f1a2e;stop-opacity:0.9" />
    </linearGradient>

    <!-- Purple glow gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa" />
      <stop offset="50%" style="stop-color:#c4b5fd" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>

    <!-- Terminal strip gradient -->
    <linearGradient id="terminalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:0.98" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:0.95" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="redGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="textShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- ===== BASE BACKGROUND ===== -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- ===== DIAGONAL ZONE FILLS ===== -->
  <polygon points="0,0 1200,0 750,630 0,630" fill="url(#upperZoneGrad)" />
  <polygon points="750,630 1200,0 1200,630" fill="url(#lowerZoneGrad)" />

  <!-- ===== DIAGONAL SLASH LINE (bold) ===== -->
  <line x1="430" y1="630" x2="1030" y2="0" stroke="#7c3aed" stroke-width="6" opacity="0.5" filter="url(#softGlow)" />
  <line x1="430" y1="630" x2="1030" y2="0" stroke="#a78bfa" stroke-width="3" opacity="0.9" />
  <line x1="420" y1="630" x2="1020" y2="0" stroke="#c4b5fd" stroke-width="1" opacity="0.4" />
  <line x1="440" y1="630" x2="1040" y2="0" stroke="#6d28d9" stroke-width="1" opacity="0.4" />

  <!-- ===== DOT GRID PATTERN ===== -->
  <g opacity="0.15" fill="#a78bfa">
    <circle cx="60" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="180" cy="40" r="1.5"/>
    <circle cx="240" cy="40" r="1.5"/><circle cx="300" cy="40" r="1.5"/><circle cx="360" cy="40" r="1.5"/>
    <circle cx="60" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/><circle cx="180" cy="80" r="1.5"/>
    <circle cx="240" cy="80" r="1.5"/><circle cx="300" cy="80" r="1.5"/><circle cx="360" cy="80" r="1.5"/>
    <circle cx="60" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="180" cy="120" r="1.5"/>
    <circle cx="240" cy="120" r="1.5"/><circle cx="300" cy="120" r="1.5"/>
    <circle cx="60" cy="160" r="1.5"/><circle cx="120" cy="160" r="1.5"/><circle cx="180" cy="160" r="1.5"/>
    <circle cx="60" cy="500" r="1.5"/><circle cx="120" cy="500" r="1.5"/><circle cx="180" cy="500" r="1.5"/>
    <circle cx="240" cy="500" r="1.5"/><circle cx="300" cy="500" r="1.5"/>
    <circle cx="60" cy="540" r="1.5"/><circle cx="120" cy="540" r="1.5"/><circle cx="180" cy="540" r="1.5"/>
    <circle cx="240" cy="540" r="1.5"/><circle cx="300" cy="540" r="1.5"/>
    <circle cx="60" cy="580" r="1.5"/><circle cx="120" cy="580" r="1.5"/><circle cx="180" cy="580" r="1.5"/>
  </g>

  <g opacity="0.12" fill="#fbbf24">
    <circle cx="850" cy="450" r="1.5"/><circle cx="910" cy="450" r="1.5"/><circle cx="970" cy="450" r="1.5"/>
    <circle cx="1030" cy="450" r="1.5"/><circle cx="1090" cy="450" r="1.5"/><circle cx="1150" cy="450" r="1.5"/>
    <circle cx="850" cy="500" r="1.5"/><circle cx="910" cy="500" r="1.5"/><circle cx="970" cy="500" r="1.5"/>
    <circle cx="1030" cy="500" r="1.5"/><circle cx="1090" cy="500" r="1.5"/><circle cx="1150" cy="500" r="1.5"/>
    <circle cx="850" cy="550" r="1.5"/><circle cx="910" cy="550" r="1.5"/><circle cx="970" cy="550" r="1.5"/>
    <circle cx="1030" cy="550" r="1.5"/><circle cx="1090" cy="550" r="1.5"/><circle cx="1150" cy="550" r="1.5"/>
    <circle cx="850" cy="600" r="1.5"/><circle cx="910" cy="600" r="1.5"/><circle cx="970" cy="600" r="1.5"/>
    <circle cx="1030" cy="600" r="1.5"/><circle cx="1090" cy="600" r="1.5"/>
  </g>

  <!-- ===== FLOATING PARTICLES ===== -->
  <circle cx="90" cy="230" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="210" cy="180" r="1.5" fill="#7c3aed" opacity="0.6"/>
  <circle cx="380" cy="420" r="2.5" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="520" cy="70" r="2" fill="#a78bfa" opacity="0.45"/>
  <circle cx="155" cy="390" r="1.5" fill="#6d28d9" opacity="0.5"/>
  <circle cx="600" cy="550" r="2" fill="#7c3aed" opacity="0.4"/>
  <circle cx="950" cy="130" r="2" fill="#fbbf24" opacity="0.4"/>
  <circle cx="1100" cy="200" r="1.5" fill="#fbbf24" opacity="0.35"/>
  <circle cx="1050" cy="580" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="820" cy="90" r="1.5" fill="#dc2626" opacity="0.5"/>
  <circle cx="330" cy="560" r="2" fill="#a78bfa" opacity="0.35"/>
  <circle cx="470" cy="490" r="1.5" fill="#7c3aed" opacity="0.4"/>

  <!-- ===== UPPER-LEFT: DOSSIER ZONE ===== -->

  <!-- WEEKLY DIGEST badge -->
  <rect x="46" y="36" width="180" height="28" rx="14" fill="#7c3aed" opacity="0.9"/>
  <text x="136" y="55" font-family="Courier New, Courier, monospace" font-size="12" font-weight="700"
        fill="#ffffff" text-anchor="middle" letter-spacing="3">WEEKLY DIGEST</text>

  <!-- DATE -->
  <text x="46" y="88" font-family="Courier New, Courier, monospace" font-size="11"
        fill="#94a3b8" letter-spacing="2">APRIL 04, 2026</text>

  <!-- MAIN TITLE -->
  <text x="46" y="148" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900"
        fill="url(#titleGrad)" filter="url(#textShadow)" letter-spacing="-1">Tech Security</text>
  <text x="46" y="200" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900"
        fill="white" letter-spacing="-1">Weekly</text>

  <!-- Dossier file label divider -->
  <rect x="46" y="222" width="340" height="3" fill="#7c3aed" opacity="0.7"/>

  <!-- ===== DOSSIER BLOCK - TA416 / PlugX ===== -->
  <rect x="46" y="238" width="440" height="160" rx="4"
        fill="#0a0520" stroke="#3b1f6e" stroke-width="1.5" opacity="0.92"/>

  <!-- Dossier header bar -->
  <rect x="46" y="238" width="440" height="32" rx="4" fill="#1e0a3c" opacity="1"/>
  <rect x="46" y="258" width="440" height="12" fill="#1e0a3c" opacity="1"/>

  <!-- TA416 heading -->
  <text x="62" y="304" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900"
        fill="white" letter-spacing="1">TA416 / PlugX</text>

  <!-- Redacted bars (dossier effect) -->
  <rect x="62" y="316" width="180" height="10" rx="2" fill="#1e293b" opacity="0.9"/>
  <rect x="252" y="316" width="80" height="10" rx="2" fill="#1e293b" opacity="0.9"/>

  <!-- Sub-text lines -->
  <rect x="62" y="352" width="230" height="8" rx="2" fill="#0f172a" opacity="0.7"/>
  <rect x="62" y="374" width="200" height="8" rx="2" fill="#0f172a" opacity="0.7"/>

  <!-- CLASSIFIED STAMP -->
  <g transform="rotate(-18, 340, 310)">
    <rect x="260" y="276" width="200" height="58" rx="4"
          fill="none" stroke="#dc2626" stroke-width="4" opacity="0.85"/>
    <text x="360" y="312" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900"
          fill="#dc2626" text-anchor="middle" opacity="0.85" letter-spacing="4"
          filter="url(#redGlow)">CLASSIFIED</text>
    <line x1="262" y1="278" x2="458" y2="332" stroke="#dc2626" stroke-width="1.5" opacity="0.3"/>
    <line x1="262" y1="332" x2="458" y2="278" stroke="#dc2626" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- ===== APT / WEBSHELL SUBTITLE PILLS ===== -->
  <rect x="46" y="414" width="200" height="28" rx="4"
        fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1"/>
  <text x="146" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#a78bfa" text-anchor="middle" letter-spacing="2">APT CAMPAIGN</text>

  <rect x="258" y="414" width="200" height="28" rx="4"
        fill="#dc2626" opacity="0.15" stroke="#dc2626" stroke-width="1"/>
  <text x="358" y="433" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#fca5a5" text-anchor="middle" letter-spacing="2">WEBSHELL CRON</text>

  <!-- ===== LOWER-RIGHT ZONE: BROWSER + PUPPET STRINGS ===== -->

  <!-- Shadow behind browser -->
  <rect x="708" y="178" width="380" height="280" rx="10"
        fill="#000000" opacity="0.6"/>

  <!-- Browser window frame -->
  <rect x="700" y="170" width="380" height="280" rx="8"
        fill="#1c1c2e" stroke="#fbbf24" stroke-width="2" filter="url(#goldGlow)"/>

  <!-- Browser title bar -->
  <rect x="700" y="170" width="380" height="36" rx="8" fill="#2a2a3e"/>
  <rect x="700" y="190" width="380" height="16" fill="#2a2a3e"/>

  <!-- Browser traffic lights -->
  <circle cx="724" cy="188" r="6" fill="#dc2626"/>
  <circle cx="744" cy="188" r="6" fill="#fbbf24"/>
  <circle cx="764" cy="188" r="6" fill="#22c55e"/>

  <!-- Browser URL bar -->
  <rect x="780" y="179" width="240" height="18" rx="9" fill="#0f172a" stroke="#374151" stroke-width="1"/>

  <!-- Browser content area -->
  <rect x="700" y="206" width="380" height="244" fill="#0d1117"/>

  <!-- Extension icon grid in browser -->
  <g opacity="0.7">
    <rect x="720" y="224" width="50" height="50" rx="8" fill="#1e293b" stroke="#374151" stroke-width="1"/>
    <rect x="784" y="224" width="50" height="50" rx="8" fill="#1e293b" stroke="#374151" stroke-width="1"/>
    <rect x="848" y="224" width="50" height="50" rx="8" fill="#1e293b" stroke="#374151" stroke-width="1"/>
    <rect x="912" y="224" width="50" height="50" rx="8" fill="#dc2626" opacity="0.3" stroke="#dc2626" stroke-width="1.5"/>
  </g>

  <!-- Browser warning banner inside -->
  <rect x="708" y="288" width="364" height="28" rx="4" fill="#7f1d1d" opacity="0.8"/>

  <!-- Data rows in browser -->
  <rect x="720" y="328" width="340" height="8" rx="4" fill="#1e293b"/>
  <rect x="720" y="344" width="280" height="8" rx="4" fill="#1e293b"/>
  <rect x="720" y="360" width="310" height="8" rx="4" fill="#1e293b"/>
  <rect x="720" y="376" width="200" height="8" rx="4" fill="#dc2626" opacity="0.4"/>

  <!-- LinkedIn data exposure label -->
  <rect x="720" y="422" width="250" height="6" rx="3" fill="#1e293b" opacity="0.5"/>

  <!-- ===== PUPPET STRINGS from APT silhouette to browser ===== -->
  <g opacity="0.75">
    <line x1="745" y1="90" x2="725" y2="170" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="810" y1="85" x2="785" y2="170" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="875" y1="82" x2="850" y2="170" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="940" y1="85" x2="912" y2="170" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="1000" y1="90" x2="960" y2="170" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- ===== APT SHADOWY SILHOUETTE (multi-eyed) ===== -->
  <ellipse cx="875" cy="70" rx="160" ry="55" fill="#0a0520" opacity="0.85"/>
  <ellipse cx="875" cy="72" rx="155" ry="50" fill="#12012a" opacity="0.7"/>
  <ellipse cx="875" cy="70" rx="158" ry="53" fill="none" stroke="#4c1d95" stroke-width="2" opacity="0.6" filter="url(#softGlow)"/>

  <!-- Eye 1 -->
  <ellipse cx="800" cy="65" rx="16" ry="10" fill="#1e0a3c"/>
  <ellipse cx="800" cy="65" rx="10" ry="7" fill="#dc2626" opacity="0.9" filter="url(#redGlow)"/>
  <circle cx="800" cy="65" r="4" fill="#ff4444"/>
  <circle cx="798" cy="63" r="1.5" fill="white" opacity="0.6"/>

  <!-- Eye 2 -->
  <ellipse cx="855" cy="58" rx="16" ry="10" fill="#1e0a3c"/>
  <ellipse cx="855" cy="58" rx="10" ry="7" fill="#dc2626" opacity="0.9" filter="url(#redGlow)"/>
  <circle cx="855" cy="58" r="4" fill="#ff4444"/>
  <circle cx="853" cy="56" r="1.5" fill="white" opacity="0.6"/>

  <!-- Eye 3 (center, largest, purple) -->
  <ellipse cx="910" cy="55" rx="20" ry="13" fill="#1e0a3c"/>
  <ellipse cx="910" cy="55" rx="13" ry="9" fill="#a78bfa" opacity="0.9" filter="url(#purpleGlow)"/>
  <circle cx="910" cy="55" r="5" fill="#c4b5fd"/>
  <circle cx="908" cy="53" r="2" fill="white" opacity="0.7"/>

  <!-- Eye 4 -->
  <ellipse cx="960" cy="60" rx="16" ry="10" fill="#1e0a3c"/>
  <ellipse cx="960" cy="60" rx="10" ry="7" fill="#dc2626" opacity="0.85" filter="url(#redGlow)"/>
  <circle cx="960" cy="60" r="4" fill="#ff4444"/>
  <circle cx="958" cy="58" r="1.5" fill="white" opacity="0.6"/>

  <!-- Eye 5 -->
  <ellipse cx="1010" cy="68" rx="14" ry="9" fill="#1e0a3c"/>
  <ellipse cx="1010" cy="68" rx="9" ry="6" fill="#7c3aed" opacity="0.85"/>
  <circle cx="1010" cy="68" r="3.5" fill="#a78bfa"/>
  <circle cx="1008" cy="66" r="1.5" fill="white" opacity="0.5"/>

  <!-- ===== WEBSHELL TERMINAL STRIP ===== -->
  <rect x="0" y="488" width="1200" height="66" fill="url(#terminalGrad)" opacity="0.97"/>
  <line x1="0" y1="488" x2="1200" y2="488" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="554" x2="1200" y2="554" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="488" width="4" height="66" fill="#22c55e" opacity="0.7"/>


  <!-- Blinking cursor -->
  <rect x="760" y="537" width="8" height="14" fill="#22c55e" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== TAG PILLS ===== -->
  <rect x="46" y="565" width="80" height="24" rx="12"
        fill="#7c3aed" opacity="0.3" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="86" y="581" font-family="Courier New, Courier, monospace" font-size="11"
        fill="#c4b5fd" text-anchor="middle" font-weight="700">TA416</text>

  <rect x="136" y="565" width="72" height="24" rx="12"
        fill="#dc2626" opacity="0.25" stroke="#dc2626" stroke-width="1.5"/>
  <text x="172" y="581" font-family="Courier New, Courier, monospace" font-size="11"
        fill="#fca5a5" text-anchor="middle" font-weight="700">PlugX</text>

  <rect x="218" y="565" width="88" height="24" rx="12"
        fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.5"/>
  <text x="262" y="581" font-family="Courier New, Courier, monospace" font-size="11"
        fill="#86efac" text-anchor="middle" font-weight="700">WebShell</text>

  <rect x="316" y="565" width="78" height="24" rx="12"
        fill="#fbbf24" opacity="0.2" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="355" y="581" font-family="Courier New, Courier, monospace" font-size="11"
