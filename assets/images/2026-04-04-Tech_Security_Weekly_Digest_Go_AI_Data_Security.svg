  <!-- ===== FOOTER ===== -->
  <rect x="0" y="602" width="1200" height="28" fill="#0a0520" opacity="0.95"/>
  <line x1="0" y1="602" x2="1200" y2="602" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <text x="46" y="621" font-family="Courier New, Courier, monospace" font-size="12"
        fill="#6d28d9" letter-spacing="2">tech.2twodragon.com</text>

  <!-- ===== CORNER ACCENTS ===== -->
  <polyline points="1160,20 1184,20 1184,44" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>
  <polyline points="40,20 16,20 16,44" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.4"/>
  <polyline points="16,488 16,464 40,464" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.4"/>
  <polyline points="1160,464 1184,464 1184,488" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6"/>

</svg>
