<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1229;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Left Section Background -->
  <rect x="0" y="0" width="700" height="630" fill="#0a0c1a" opacity="0.6"/>
  
  <!-- Right Section Illustration Background -->
  <rect x="700" y="0" width="500" height="630" fill="#0f1229" opacity="0.8"/>
  
  <!-- AWS Shield Icon - Large -->
  <g transform="translate(900, 180)">
    <path d="M 0,-80 L 50,-50 L 50,40 Q 0,90 -50,40 L -50,-50 Z" fill="url(#shieldGrad)" filter="url(#glow)" opacity="0.9"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
    <path d="M -15,-5 L 0,15 L 15,-10" fill="none" stroke="#00d4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Cloud Layer 1 -->
  <g transform="translate(770, 100)" opacity="0.8">
    <ellipse cx="0" cy="0" rx="45" ry="25" fill="#1a6b8a"/>
    <ellipse cx="-30" cy="0" rx="35" ry="20" fill="#1a6b8a"/>
    <ellipse cx="30" cy="0" rx="35" ry="20" fill="#1a6b8a"/>
  </g>
  
  <!-- Lock Symbol -->
  <g transform="translate(780, 320)" opacity="0.85">
    <rect x="-20" y="-5" width="40" height="40" rx="4" fill="none" stroke="url(#lockGrad)" stroke-width="2.5"/>
    <path d="M -12,-8 L -12,-18 Q 0,-28 12,-18 L 12,-8" fill="none" stroke="url(#lockGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="15" r="2.5" fill="url(#lockGrad)"/>
  </g>
  
  <!-- Security Layers -->
  <g transform="translate(950, 380)" opacity="0.7">
    <rect x="-50" y="-30" width="100" height="15" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <rect x="-50" y="-5" width="100" height="15" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <rect x="-50" y="20" width="100" height="15" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  </g>
  
  <!-- AWS Badge Circle -->
  <g transform="translate(850, 500)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#ff9900" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#ff9900" stroke-width="1" opacity="0.3"/>
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ff9900" text-anchor="middle" letter-spacing="2">AWS</text>
  </g>
  
  <!-- Network Nodes -->
  <g opacity="0.5">
    <circle cx="750" cy="250" r="3" fill="#00d4ff"/>
    <circle cx="820" cy="280" r="3" fill="#00d4ff"/>
    <circle cx="880" cy="260" r="3" fill="#00d4ff"/>
    <line x1="750" y1="250" x2="820" y2="280" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <line x1="820" y1="280" x2="880" y2="260" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Monitoring Indicators -->
  <g transform="translate(1020, 240)" opacity="0.7">
    <rect x="-25" y="-30" width="50" height="60" rx="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#ff9900" stroke-width="1.5"/>
    <polyline points="-15,10 -5,0 5,8 15,2" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Title -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff" letter-spacing="-0.5">
    Tech Security Weekly
  </text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ff9900">
    Digest AWS Security
  </text>
  
  <!-- Date Badge -->
  <g>
    <rect x="60" y="285" width="280" height="45" rx="6" fill="#1a1f3a" stroke="#ff9900" stroke-width="1.5" opacity="0.8"/>
    <text x="75" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff9900">
      FEBRUARY 19, 2026
    </text>
  </g>
  
  <!-- Tag Pills -->
  <g>
    <rect x="60" y="420" width="90" height="32" rx="16" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="105" y="442" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="500">
      SECURITY
    </text>
  </g>
  
  <g>
    <rect x="165" y="420" width="90" height="32" rx="16" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="210" y="442" font-family="Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="500">
      UPDATES
    </text>
  </g>
  
  <g>
    <rect x="270" y="420" width="70" height="32" rx="16" fill="none" stroke="#ff9900" stroke-width="1.5"/>
    <text x="305" y="442" font-family="Arial, sans-serif" font-size="13" fill="#ff9900" text-anchor="middle" font-weight="500">
      AWS
    </text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="600" font-family="Arial, sans-serif" font-size="14" fill="#666666" font-weight="500">
    tech.2twodragon.com
  </text>
</svg>