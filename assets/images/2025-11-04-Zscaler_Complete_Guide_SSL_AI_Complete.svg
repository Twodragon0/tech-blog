<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>2025 11 04 Zscaler Complete Guide SSL AI Complete</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left side content background -->
  <rect x="0" y="0" width="700" height="630" fill="#0f1225" opacity="0.5"/>

  <!-- Title line 1 -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Zscaler SSL Inspection
  </text>

  <!-- Title line 2 -->
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Sandbox Advertisement Harmful
  </text>

  <!-- Date badge -->
  <rect x="50" y="270" width="280" height="40" fill="#1a1f3a" rx="6" stroke="#4a5f9f" stroke-width="1"/>
  <text x="70" y="295" font-family="Arial, sans-serif" font-size="14" fill="#8899dd" font-weight="500">
    NOVEMBER 4, 2025
  </text>

  <!-- Tag pill 1 -->
  <rect x="50" y="420" width="140" height="36" fill="#1e2a4a" rx="18" stroke="#5a7fcc" stroke-width="1"/>
  <text x="70" y="443" font-family="Arial, sans-serif" font-size="13" fill="#7fa3ff" font-weight="500">
    Zscaler Security
  </text>

  <!-- Tag pill 2 -->
  <rect x="210" y="420" width="110" height="36" fill="#2a1a2a" rx="18" stroke="#8a5f9f" stroke-width="1"/>
  <text x="227" y="443" font-family="Arial, sans-serif" font-size="13" fill="#d7a3ff" font-weight="500">
    SSL Inspection
  </text>

  <!-- Tag pill 3 -->
  <rect x="340" y="420" width="100" height="36" fill="#2a2a1a" rx="18" stroke="#8a8f5f" stroke-width="1"/>
  <text x="355" y="443" font-family="Arial, sans-serif" font-size="13" fill="#ffff9f" font-weight="500">
    Vulnerability
  </text>

  <!-- Footer -->
  <text x="50" y="600" font-family="Arial, sans-serif" font-size="12" fill="#666899">
    tech.2twodragon.com
  </text>

  <!-- Right side illustration - SSL Inspection Sandbox Advertisement Harmful -->
  <!-- Background gradient effect -->
  <defs>
    <linearGradient id="bgGrad" x1="700" y1="0" x2="1200" y2="630">
      <stop offset="0%" style="stop-color:#0f1225;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sslGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <rect x="700" y="0" width="500" height="630" fill="url(#bgGrad)"/>

  <!-- SSL Chain/Lock representation at top -->
  <g id="ssl-chain">
    <!-- Lock icon with warning -->
    <rect x="820" y="60" width="60" height="70" fill="none" stroke="#ff6b6b" stroke-width="2" rx="4"/>
    <circle cx="850" cy="95" r="8" fill="#ff6b6b"/>
    <path d="M 850 103 L 850 120" stroke="#ff6b6b" stroke-width="2"/>

    <!-- Warning triangle overlay -->
    <polygon points="920,60 945,120 895,120" fill="#ffcc00" opacity="0.8"/>
    <text x="918" y="105" font-family="Arial" font-size="24" font-weight="bold" fill="#000">!</text>
  </g>

  <!-- Sandbox container representation (center) -->
  <g id="sandbox-container">
    <!-- Outer sandbox box -->
    <rect x="750" y="180" width="180" height="160" fill="none" stroke="#4a7f99" stroke-width="2" stroke-dasharray="5,5" rx="6"/>

    <!-- Inner environment -->
    <rect x="765" y="195" width="150" height="130" fill="#1a3a4a" opacity="0.4" rx="4"/>

    <!-- Process/container circles -->
    <circle cx="810" cy="230" r="15" fill="none" stroke="#5a9fbb" stroke-width="1.5"/>
    <circle cx="870" cy="230" r="15" fill="none" stroke="#5a9fbb" stroke-width="1.5"/>

    <circle cx="810" cy="280" r="15" fill="none" stroke="#5a9fbb" stroke-width="1.5"/>
    <circle cx="870" cy="280" r="15" fill="none" stroke="#5a9fbb" stroke-width="1.5"/>

    <!-- Connection lines between processes -->
    <line x1="825" y1="230" x2="855" y2="230" stroke="#5a9fbb" stroke-width="1" opacity="0.6"/>
    <line x1="825" y1="280" x2="855" y2="280" stroke="#5a9fbb" stroke-width="1" opacity="0.6"/>
    <line x1="810" y1="245" x2="810" y2="265" stroke="#5a9fbb" stroke-width="1" opacity="0.6"/>
    <line x1="870" y1="245" x2="870" y2="265" stroke="#5a9fbb" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Advertisement/Deception element -->
  <g id="advertisement-deception">
    <!-- Ad banner representation -->
    <rect x="910" y="190" width="110" height="80" fill="#3a2a1a" stroke="#ffcc00" stroke-width="2" rx="4"/>

    <!-- Ad content lines -->
    <rect x="920" y="205" width="30" height="4" fill="#ffcc00" opacity="0.7"/>
    <rect x="920" y="218" width="80" height="3" fill="#ffcccc" opacity="0.6"/>
    <rect x="920" y="228" width="80" height="3" fill="#ffcccc" opacity="0.6"/>
    <rect x="920" y="238" width="60" height="3" fill="#ffcccc" opacity="0.6"/>

    <!-- "AD" label -->
    <text x="950" y="265" font-family="Arial" font-size="16" font-weight="bold" fill="#ffcc00">AD</text>
  </g>

  <!-- Malicious payload/threat arrows -->
  <g id="threat-vectors">
    <!-- Arrow from advertisement to sandbox -->
    <defs>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ff6b6b" />
      </marker>
    </defs>

    <path d="M 960 270 Q 920 300 840 310" fill="none" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowRed)" stroke-dasharray="3,3"/>
  </g>

  <!-- Bypass/Escape representation (bottom) -->
  <g id="bypass-escape">
    <!-- Broken lock -->
    <g transform="translate(780, 380)">
      <path d="M -15 -10 L -15 0 L 15 0 L 15 -10" fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#ff6b6b" stroke-width="2.5"/>
      <path d="M -5 5 L 5 15 M 0 5 L 10 15" stroke="#ffcc00" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Escape arrows -->
    <path d="M 820 420 L 820 480" stroke="#ffcc00" stroke-width="2.5" marker-end="url(#arrowYellow)"/>
    <path d="M 860 420 L 860 480" stroke="#ffcc00" stroke-width="2.5" marker-end="url(#arrowYellow)"/>

    <defs>
      <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ffcc00" />
      </marker>
    </defs>
  </g>

  <!-- Network/Internet representation (lower right) -->
  <g id="network-escape">
    <circle cx="950" cy="450" r="30" fill="none" stroke="#ff4444" stroke-width="2" stroke-dasharray="3,3"/>

    <!-- Network nodes -->
    <circle cx="920" cy="430" r="4" fill="#ff4444"/>
    <circle cx="980" cy="430" r="4" fill="#ff4444"/>
    <circle cx="920" cy="470" r="4" fill="#ff4444"/>
    <circle cx="980" cy="470" r="4" fill="#ff4444"/>

    <!-- Connecting lines -->
    <line x1="920" y1="430" x2="980" y2="430" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
    <line x1="920" y1="430" x2="920" y2="470" stroke="#ff4444" stroke-width="1" opacity="0.6"/>
    <line x1="980" y1="430" x2="980" y2="470" stroke="#ff4444" stroke-width="1" opacity="0.6"/>

    <!-- Outbound threat arrow -->
    <path d="M 980 450 L 1050 450" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  </g>

  <!-- Critical risk indicator (center-right) -->
  <g id="risk-indicator">
    <circle cx="920" cy="330" r="25" fill="none" stroke="#ff6b6b" stroke-width="2"/>
    <text x="907" y="340" font-family="Arial" font-size="28" font-weight="bold" fill="#ff6b6b">!</text>
  </g>

  <!-- Decorative accent lines -->
  <line x1="720" y1="50" x2="750" y2="50" stroke="#5a7fcc" stroke-width="1" opacity="0.5"/>
  <line x1="720" y1="580" x2="750" y2="580" stroke="#8a5f9f" stroke-width="1" opacity="0.5"/>
</svg>