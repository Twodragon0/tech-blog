<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="50%" style="stop-color:#dd6b20"/>
      <stop offset="100%" style="stop-color:#3182ce"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#63b3ed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:0.12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(229,62,62,0.04)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(49,130,206,0.05)" stroke="none"/>

  <!-- RIGHT SIDE ILLUSTRATION: Zscaler SSL Inspection + AI + Harmful Site Detection -->

  <!-- Outer network ring -->
  <circle cx="1010" cy="225" r="110" fill="none" stroke="rgba(229,62,62,0.18)" stroke-width="1.5" stroke-dasharray="8 4"/>
  <circle cx="1010" cy="225" r="90" fill="none" stroke="rgba(99,179,237,0.15)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Central shield (SSL/Zscaler) -->
  <path d="M1010,150 L1060,170 L1060,215 Q1060,255 1010,270 Q960,255 960,215 L960,170 Z"
        fill="url(#shieldGrad)" stroke="rgba(229,62,62,0.35)" stroke-width="2"/>
  <path d="M1010,162 L1048,178 L1048,215 Q1048,247 1010,259 Q972,247 972,215 L972,178 Z"
        fill="rgba(229,62,62,0.08)" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>

  <!-- Shield lock icon -->
  <rect x="998" y="203" width="24" height="20" rx="3" fill="rgba(229,62,62,0.25)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <path d="M1003,203 L1003,197 Q1003,190 1010,190 Q1017,190 1017,197 L1017,203"
        fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="212" r="3" fill="rgba(255,255,255,0.6)"/>

  <!-- SSL inspection scan lines -->
  <line x1="960" y1="195" x2="888" y2="165" stroke="rgba(99,179,237,0.25)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="960" y1="225" x2="880" y2="225" stroke="rgba(99,179,237,0.25)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="960" y1="255" x2="888" y2="285" stroke="rgba(99,179,237,0.25)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="1060" y1="195" x2="1132" y2="165" stroke="rgba(99,179,237,0.2)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="1060" y1="225" x2="1140" y2="225" stroke="rgba(99,179,237,0.2)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="1060" y1="255" x2="1132" y2="285" stroke="rgba(229,62,62,0.25)" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- AI node top left -->
  <circle cx="880" cy="158" r="18" fill="rgba(49,130,206,0.12)" stroke="rgba(99,179,237,0.35)" stroke-width="1.5"/>
  <text x="880" y="163" font-family="monospace" font-size="10" fill="rgba(99,179,237,0.8)" text-anchor="middle">AI</text>

  <!-- Packet nodes -->
  <circle cx="880" cy="225" r="14" fill="rgba(49,130,206,0.1)" stroke="rgba(99,179,237,0.3)" stroke-width="1.2"/>
  <text x="880" y="229" font-family="monospace" font-size="8" fill="rgba(99,179,237,0.7)" text-anchor="middle">PKT</text>

  <!-- Harmful node bottom left (red warning) -->
  <circle cx="888" cy="292" r="16" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.45)" stroke-width="1.5"/>
  <text x="888" y="297" font-family="monospace" font-size="9" fill="rgba(255,100,100,0.9)" text-anchor="middle">!</text>

  <!-- Sandbox node right -->
  <rect x="1118" y="210" width="36" height="30" rx="5" fill="rgba(99,179,237,0.1)" stroke="rgba(99,179,237,0.3)" stroke-width="1.2"/>
  <text x="1136" y="229" font-family="monospace" font-size="8" fill="rgba(99,179,237,0.7)" text-anchor="middle">SBX</text>

  <!-- Ad block node top right -->
  <circle cx="1132" cy="158" r="16" fill="rgba(221,107,32,0.12)" stroke="rgba(221,107,32,0.35)" stroke-width="1.3"/>
  <text x="1132" y="163" font-family="monospace" font-size="8" fill="rgba(221,107,32,0.85)" text-anchor="middle">AD</text>

  <!-- Harmful site node bottom right -->
  <circle cx="1132" cy="292" r="16" fill="rgba(229,62,62,0.12)" stroke="rgba(229,62,62,0.35)" stroke-width="1.3"/>
  <text x="1132" y="297" font-family="monospace" font-size="7" fill="rgba(229,62,62,0.8)" text-anchor="middle">BLK</text>

  <!-- Inspection beam -->
  <ellipse cx="1010" cy="225" rx="45" ry="10" fill="rgba(99,179,237,0.08)" stroke="rgba(99,179,237,0.2)" stroke-width="1"/>

  <!-- Data flow dots on scan lines -->
  <circle cx="920" cy="177" r="3" fill="rgba(99,179,237,0.5)"/>
  <circle cx="905" cy="225" r="3" fill="rgba(99,179,237,0.45)"/>
  <circle cx="1095" cy="177" r="3" fill="rgba(99,179,237,0.4)"/>
  <circle cx="1115" cy="225" r="3" fill="rgba(99,179,237,0.4)"/>
  <circle cx="1098" cy="274" r="3" fill="rgba(229,62,62,0.5)"/>
  <circle cx="922" cy="274" r="3" fill="rgba(229,62,62,0.5)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(229,62,62,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(221,107,32,0.65)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(229,62,62,0.55)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="96" y="81" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(229,62,62,0.9)" letter-spacing="1">NOVEMBER 4, 2025</text>

  <!-- Title -->
  <text x="80" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">Zscaler SSL Inspection Sandbox</text>
  <text x="80" y="245" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">AI Advertisement Harmful Site</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.62)">Deep-dive into SSL inspection, AI-driven ad filtering &amp; threat sandboxing</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(229,62,62,0.85)" letter-spacing="2">SECURITY / NETWORK INSPECTION</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(229,62,62,0.18)" stroke="rgba(229,62,62,0.45)" stroke-width="1"/>
  <text x="140" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(229,62,62,0.95)" text-anchor="middle">Zscaler</text>

  <rect x="216" y="402" width="148" height="36" rx="18" fill="rgba(221,107,32,0.18)" stroke="rgba(221,107,32,0.45)" stroke-width="1"/>
  <text x="290" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(221,107,32,0.95)" text-anchor="middle">SSL Inspection</text>

  <rect x="380" y="402" width="130" height="36" rx="18" fill="rgba(49,130,206,0.18)" stroke="rgba(99,179,237,0.45)" stroke-width="1"/>
  <text x="445" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(99,179,237,0.95)" text-anchor="middle">AI Sandbox</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(229,62,62,0.55)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>