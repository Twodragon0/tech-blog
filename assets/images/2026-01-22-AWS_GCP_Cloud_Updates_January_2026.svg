<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE CONTENT -->

  <!-- Date badge -->
  <rect x="60" y="45" width="220" height="40" rx="20" fill="#1f2937" stroke="#3b82f6" stroke-width="1.5" opacity="0.8"/>
  <text x="170" y="70" font-family="system-ui, -apple-system" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">JANUARY 22, 2026</text>

  <!-- Title -->
  <text x="80" y="195" font-family="system-ui, -apple-system" font-size="48" font-weight="700" fill="#ffffff">AWS GCP Cloud</text>

  <!-- Subtitle -->
  <text x="80" y="260" font-family="system-ui, -apple-system" font-size="48" font-weight="700" fill="#ffffff">Updates January 2026</text>

  <!-- Tag pills -->
  <rect x="80" y="420" width="110" height="32" rx="16" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.2"/>
  <text x="135" y="442" font-family="system-ui, -apple-system" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Cloud Security</text>

  <rect x="210" y="420" width="100" height="32" rx="16" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="260" y="442" font-family="system-ui, -apple-system" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Infrastructure</text>

  <rect x="330" y="420" width="85" height="32" rx="16" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="372.5" y="442" font-family="system-ui, -apple-system" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">AWS/GCP</text>

  <!-- Footer -->
  <text x="80" y="565" font-family="system-ui, -apple-system" font-size="13" font-weight="500" fill="#6b7280">tech.2twodragon.com</text>

  <!-- RIGHT SIDE VISUAL SCENE -->

  <!-- Cloud shape (AWS) -->
  <g opacity="0.1">
    <ellipse cx="750" cy="140" rx="75" ry="45" fill="#3b82f6" stroke="#3b82f6" stroke-width="0.3"/>
    <ellipse cx="820" cy="160" rx="60" ry="40" fill="#3b82f6" stroke="#3b82f6" stroke-width="0.3"/>
    <ellipse cx="680" cy="160" rx="55" ry="38" fill="#3b82f6" stroke="#3b82f6" stroke-width="0.3"/>
    <rect x="650" y="150" width="200" height="50" fill="#3b82f6"/>
  </g>

  <!-- Cloud shape (GCP) -->
  <g opacity="0.1">
    <ellipse cx="1050" cy="140" rx="75" ry="45" fill="#f59e0b" stroke="#f59e0b" stroke-width="0.3"/>
    <ellipse cx="1120" cy="160" rx="60" ry="40" fill="#f59e0b" stroke="#f59e0b" stroke-width="0.3"/>
    <ellipse cx="980" cy="160" rx="55" ry="38" fill="#f59e0b" stroke="#f59e0b" stroke-width="0.3"/>
    <rect x="950" y="150" width="200" height="50" fill="#f59e0b"/>
  </g>

  <!-- Data flow arrows -->
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.4"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.4"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.4"/>
    </marker>
  </defs>

  <!-- Arrow AWS to center -->
  <path d="M 780 210 Q 820 260 850 300" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.3" marker-end="url(#arrowblue)"/>

  <!-- Arrow GCP to center -->
  <path d="M 1080 210 Q 1040 260 950 300" stroke="#f59e0b" stroke-width="2.5" fill="none" opacity="0.3" marker-end="url(#arroworange)"/>

  <!-- Central server/database -->
  <g opacity="0.12">
    <rect x="900" y="280" width="90" height="110" rx="4" fill="#3b82f6" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="920" y="295" width="50" height="15" fill="#1f2937" opacity="0.6"/>
    <rect x="920" y="320" width="50" height="15" fill="#1f2937" opacity="0.6"/>
    <rect x="920" y="345" width="50" height="15" fill="#1f2937" opacity="0.6"/>
    <rect x="920" y="370" width="50" height="15" fill="#1f2937" opacity="0.6"/>
  </g>

  <!-- Data flow between servers -->
  <path d="M 850 330 L 900 330" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.25" marker-end="url(#arrowblue)"/>
  <path d="M 990 330 L 1040 330" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.25" marker-end="url(#arroworange)"/>

  <!-- Warning triangle -->
  <g opacity="0.15">
    <polygon points="1100,100 1130,160 1070,160" fill="none" stroke="#ef4444" stroke-width="2.2"/>
    <text x="1100" y="145" font-family="Arial" font-size="24" font-weight="bold" fill="#ef4444" text-anchor="middle">!</text>
  </g>

  <!-- Alert indicator circle -->
  <circle cx="710" cy="470" r="35" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.2"/>
  <circle cx="710" cy="470" r="28" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.15"/>
  <circle cx="710" cy="470" r="8" fill="#ef4444" opacity="0.3"/>

  <!-- Update indicator -->
  <g opacity="0.15">
    <rect x="1020" y="400" width="100" height="80" rx="6" fill="#f59e0b" stroke="#f59e0b" stroke-width="1.8"/>
    <text x="1070" y="425" font-family="system-ui, -apple-system" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">UPDATES</text>
    <text x="1070" y="450" font-family="system-ui, -apple-system" font-size="10" font-weight="500" fill="#f59e0b" text-anchor="middle">New</text>
    <text x="1070" y="468" font-family="system-ui, -apple-system" font-size="10" font-weight="500" fill="#f59e0b" text-anchor="middle">Features</text>
  </g>

  <!-- Security shield -->
  <g opacity="0.12">
    <rect x="680" y="380" width="60" height="75" rx="4" fill="#ef4444" stroke="#ef4444" stroke-width="1.8"/>
    <path d="M 700 390 L 715 400 L 710 415" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="710" cy="395" r="3" fill="#ef4444"/>
  </g>

  <!-- Data nodes network -->
  <circle cx="820" cy="500" r="6" fill="#3b82f6" opacity="0.2"/>
  <circle cx="880" cy="520" r="6" fill="#f59e0b" opacity="0.2"/>
  <circle cx="940" cy="510" r="6" fill="#ef4444" opacity="0.15"/>

  <!-- Connecting lines -->
  <line x1="820" y1="500" x2="880" y2="520" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
  <line x1="880" y1="520" x2="940" y2="510" stroke="#f59e0b" stroke-width="1.5" opacity="0.15"/>
  <line x1="820" y1="500" x2="940" y2="510" stroke="#ef4444" stroke-width="1.2" opacity="0.1"/>

  <!-- Accent line -->
  <line x1="650" y1="380" x2="1150" y2="380" stroke="#3b82f6" stroke-width="0.8" opacity="0.08"/>
</svg>