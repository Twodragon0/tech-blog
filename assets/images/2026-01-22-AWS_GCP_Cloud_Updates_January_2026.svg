<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>AWS GCP Cloud Updates January 2026 - EC2 G7e, Bangkok Region</title>
  <defs>
    <filter id="orbGlow"><feGaussianBlur stdDeviation="40" /></filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="cardBorder3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="cardFill1" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5" />
    </linearGradient>
    <linearGradient id="cardFill2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.45" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5" />
    </pattern>
  </defs>

  <!-- Base + dot pattern -->
  <rect width="1200" height="630" fill="#0f172a" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Orb glows -->
  <circle cx="780" cy="130" r="185" fill="#f97316" opacity="0.07" filter="url(#orbGlow)" />
  <circle cx="1060" cy="420" r="155" fill="#06b6d4" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="190" cy="500" r="120" fill="#fbbf24" opacity="0.05" filter="url(#orbGlow)" />

  <!-- Card 1 (top-right): GCP Sovereign Cloud -->
  <g transform="translate(830, 58)" filter="url(#cardShadow)">
    <rect width="310" height="220" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder3)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <!-- EU sovereign icon: outlined rectangle with ring of stars -->
    <g transform="translate(95, 22)">
      <rect x="8" y="4" width="104" height="72" rx="5" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.65" />
      <circle cx="60" cy="32" r="16" fill="none" stroke="#fbbf24" stroke-width="1.4" opacity="0.55" />
      <!-- 6 star dots around circle -->
      <circle cx="60" cy="14" r="2.5" fill="#fbbf24" opacity="0.8" />
      <circle cx="76" cy="22" r="2.5" fill="#fbbf24" opacity="0.7" />
      <circle cx="76" cy="42" r="2.5" fill="#fbbf24" opacity="0.7" />
      <circle cx="60" cy="50" r="2.5" fill="#fbbf24" opacity="0.8" />
      <circle cx="44" cy="42" r="2.5" fill="#fbbf24" opacity="0.7" />
      <circle cx="44" cy="22" r="2.5" fill="#fbbf24" opacity="0.7" />
      <!-- Label badge -->
      <rect x="12" y="58" width="96" height="14" rx="3" fill="#fbbf24" opacity="0.18" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.4" />
      <text x="60" y="69" text-anchor="middle" fill="#fde68a" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">GCP SOVEREIGN</text>
    </g>
    <circle cx="130" cy="200" r="3" fill="#fbbf24" opacity="0.8" />
    <circle cx="145" cy="200" r="3" fill="#06b6d4" opacity="0.6" />
    <circle cx="160" cy="200" r="3" fill="#fbbf24" opacity="0.4" />
  </g>

  <!-- Card 2 (middle): Bangkok Region globe+pin -->
  <g transform="translate(718, 193)" filter="url(#cardShadow)">
    <rect width="310" height="230" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect x="2" y="2" width="306" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(95, 20)">
      <!-- Globe -->
      <circle cx="60" cy="38" r="32" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7" />
      <!-- Latitude lines -->
      <ellipse cx="60" cy="38" rx="15" ry="32" fill="none" stroke="#06b6d4" stroke-width="1.2" opacity="0.4" />
      <line x1="28" y1="38" x2="92" y2="38" stroke="#06b6d4" stroke-width="1.1" opacity="0.4" />
      <path d="M32 22 Q60 28 88 22" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3" />
      <path d="M32 54 Q60 48 88 54" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3" />
      <!-- Location pin -->
      <circle cx="60" cy="30" r="6" fill="#f97316" opacity="0.95" />
      <line x1="60" y1="36" x2="60" y2="46" stroke="#f97316" stroke-width="2.2" opacity="0.85" stroke-linecap="round" />
      <!-- Label -->
      <rect x="12" y="80" width="96" height="14" rx="3" fill="#06b6d4" opacity="0.18" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.4" />
      <text x="60" y="91" text-anchor="middle" fill="#67e8f9" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">BANGKOK REGION</text>
    </g>
    <rect x="40" y="192" width="230" height="4" rx="2" fill="#1e293b" />
    <rect x="40" y="192" width="158" height="4" rx="2" fill="url(#accentGrad)" opacity="0.7" />
  </g>

  <!-- Card 3 (front/lower): AWS EC2 G7e server -->
  <g transform="translate(658, 342)" filter="url(#cardShadow)">
    <rect width="320" height="240" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect x="2" y="2" width="316" height="80" rx="14" fill="white" opacity="0.03" />
    <g transform="translate(108, 16)">
      <!-- Server chassis -->
      <rect x="10" y="4" width="80" height="100" rx="6" fill="none" stroke="#f97316" stroke-width="2" opacity="0.7" />
      <!-- Drive bays -->
      <rect x="18" y="16" width="64" height="9" rx="2.5" fill="#f97316" opacity="0.16" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.5" />
      <rect x="18" y="31" width="64" height="9" rx="2.5" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.4" />
      <rect x="18" y="46" width="64" height="9" rx="2.5" fill="#f97316" opacity="0.09" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.3" />
      <!-- GPU indicator bar -->
      <rect x="18" y="62" width="64" height="5" rx="2" fill="url(#accentLine)" opacity="0.5" />
      <!-- Status LEDs -->
      <circle cx="26" cy="80" r="4.5" fill="#f97316" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.3;0.85" dur="1.8s" repeatCount="indefinite" />
      </circle>
      <circle cx="42" cy="80" r="4.5" fill="#06b6d4" opacity="0.65" />
      <circle cx="58" cy="80" r="4.5" fill="#fbbf24" opacity="0.55" />
      <!-- Label -->
      <rect x="12" y="90" width="76" height="14" rx="3" fill="#f97316" opacity="0.18" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.4" />
      <text x="50" y="101" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="700">EC2 G7e GPU</text>
    </g>
    <g transform="translate(40, 198)">
      <rect width="240" height="26" rx="6" fill="#1e293b" opacity="0.8" />
      <circle cx="18" cy="13" r="5" fill="#f97316" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Floating particles -->
  <circle cx="728" cy="278" r="2" fill="#f97316" opacity="0.5">
    <animate attributeName="cy" values="278;268;278" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="848" cy="322" r="1.5" fill="#06b6d4" opacity="0.4">
    <animate attributeName="cy" values="322;312;322" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="1068" cy="292" r="2" fill="#fbbf24" opacity="0.5">
    <animate attributeName="cy" values="292;282;292" dur="3.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="692" cy="208" r="1.5" fill="#f97316" opacity="0.3">
    <animate attributeName="cy" values="208;200;208" dur="2.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="1112" cy="172" r="1" fill="#06b6d4" opacity="0.4">
    <animate attributeName="cy" values="172;164;172" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- CLOUD UPDATES badge -->
  <g transform="translate(60, 80)">
    <rect width="172" height="32" rx="16" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1" stroke-opacity="0.4" />
    <text x="86" y="21" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">CLOUD UPDATES</text>
  </g>

  <!-- Left text block -->
  <text x="60" y="170" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">AWS GCP</text>
  <text x="60" y="224" fill="white" font-family="Inter,system-ui,sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">January 2026</text>
  <text x="60" y="282" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700" letter-spacing="-0.3">AWS EC2 G7e</text>
  <text x="60" y="328" fill="url(#accentGrad)" font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700" letter-spacing="-0.3">GCP Sovereign</text>

  <!-- Accent divider line -->
  <rect x="60" y="352" width="200" height="3" rx="1.5" fill="url(#accentLine)" />

  <!-- Tag pills -->
  <g transform="translate(60, 372)">
    <rect width="52" height="30" rx="15" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.35" />
    <text x="26" y="20" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">AWS</text>
    <g transform="translate(62, 0)">
      <rect width="52" height="30" rx="15" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="26" y="20" text-anchor="middle" fill="#22d3ee" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">GCP</text>
    </g>
    <g transform="translate(124, 0)">
      <rect width="52" height="30" rx="15" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="26" y="20" text-anchor="middle" fill="#fb923c" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">EC2</text>
    </g>
    <g transform="translate(186, 0)">
      <rect width="90" height="30" rx="15" fill="#fbbf24" opacity="0.12" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.35" />
      <text x="45" y="20" text-anchor="middle" fill="#fde68a" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600">Sovereign</text>
    </g>
  </g>

  <text x="60" y="450" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="2">JANUARY 22, 2026</text>

  <g transform="translate(60, 560)">
    <circle cx="6" cy="-4" r="4" fill="url(#accentGrad)" opacity="0.8" />
    <text x="18" y="0" fill="#475569" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="500">tech.2twodragon.com</text>
  </g>

  <rect x="1" y="1" width="1198" height="628" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
</svg>
