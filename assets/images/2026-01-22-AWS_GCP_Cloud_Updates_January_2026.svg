<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#f7931e"/>
      <stop offset="100%" stop-color="#ff4757"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff4757" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="gcpGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285f4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#34a853" stop-opacity="0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
