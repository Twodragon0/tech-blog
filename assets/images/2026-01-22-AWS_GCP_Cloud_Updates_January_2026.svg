  <line x1="960" y1="233" x2="955" y2="248" stroke="rgba(255,149,0,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="1048" y1="230" x2="1055" y2="248" stroke="rgba(52,168,83,0.25)" stroke-width="1" stroke-dasharray="3,2"/>

