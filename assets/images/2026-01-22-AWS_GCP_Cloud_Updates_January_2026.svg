  <rect x="976" y="308" width="14" height="14" rx="2" fill="rgba(66,133,244,0.2)" stroke="rgba(66,133,244,0.4)" stroke-width="0.8"/>
  <rect x="994" y="308" width="14" height="14" rx="2" fill="rgba(255,149,0,0.25)" stroke="rgba(255,149,0,0.5)" stroke-width="0.8"/>
  <rect x="1012" y="308" width="14" height="14" rx="2" fill="rgba(66,133,244,0.2)" stroke="rgba(66,133,244,0.4)" stroke-width="0.8"/>
  <rect x="1030" y="308" width="14" height="14" rx="2" fill="rgba(66,133,244,0.2)" stroke="rgba(66,133,244,0.4)" stroke-width="0.8"/>
