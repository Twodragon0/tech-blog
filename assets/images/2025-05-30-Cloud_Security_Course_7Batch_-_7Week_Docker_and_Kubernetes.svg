<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="dateBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2a1a4a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Docker + Kubernetes themed icon -->
  <!-- Kubernetes wheel outer ring -->
  <circle cx="1010" cy="220" r="95" fill="none" stroke="rgba(100,180,255,0.25)" stroke-width="2"/>
  <circle cx="1010" cy="220" r="78" fill="rgba(30,80,160,0.08)" stroke="rgba(100,180,255,0.15)" stroke-width="1"/>
  <!-- Kubernetes spokes (7 spokes for week 7) -->
  <line x1="1010" y1="142" x2="1010" y2="165" stroke="rgba(100,180,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1076" y1="163" x2="1059" y2="176" stroke="rgba(100,180,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1096" y1="233" x2="1072" y2="227" stroke="rgba(100,180,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1059" y1="292" x2="1046" y2="272" stroke="rgba(100,180,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="961" y1="292" x2="974" y2="272" stroke="rgba(100,180,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="924" y1="233" x2="948" y2="227" stroke="rgba(100,180,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="944" y1="163" x2="961" y2="176" stroke="rgba(100,180,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <!-- Kubernetes center hub -->
  <circle cx="1010" cy="220" r="22" fill="rgba(59,130,246,0.18)" stroke="rgba(100,180,255,0.45)" stroke-width="2"/>
  <circle cx="1010" cy="220" r="10" fill="rgba(59,130,246,0.35)" stroke="rgba(150,210,255,0.5)" stroke-width="1.5"/>

  <!-- Docker container boxes stacked -->
  <rect x="875" y="155" width="52" height="36" rx="5" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.35)" stroke-width="1.5"/>
  <rect x="875" y="197" width="52" height="36" rx="5" fill="rgba(14,165,233,0.08)" stroke="rgba(14,165,233,0.28)" stroke-width="1.5"/>
  <rect x="875" y="239" width="52" height="36" rx="5" fill="rgba(14,165,233,0.06)" stroke="rgba(14,165,233,0.20)" stroke-width="1.5"/>
  <!-- Docker whale body hint -->
  <path d="M883 171 Q900 165 918 171" fill="none" stroke="rgba(14,165,233,0.4)" stroke-width="1.5"/>
  <path d="M883 213 Q900 207 918 213" fill="none" stroke="rgba(14,165,233,0.3)" stroke-width="1.5"/>
  <path d="M883 255 Q900 249 918 255" fill="none" stroke="rgba(14,165,233,0.22)" stroke-width="1.5"/>

  <!-- Cloud arc above Kubernetes wheel -->
  <path d="M940 148 Q960 128 990 132 Q1005 118 1025 125 Q1048 115 1058 135 Q1075 132 1080 148" fill="rgba(100,180,255,0.07)" stroke="rgba(150,200,255,0.28)" stroke-width="1.5"/>
  <!-- Cloud lock shield overlay -->
  <polygon points="1010,136 1000,140 1000,152 1010,158 1020,152 1020,140" fill="rgba(139,92,246,0.12)" stroke="rgba(167,139,250,0.38)" stroke-width="1.5"/>
  <rect x="1005" y="147" width="10" height="8" rx="2" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>

  <!-- Pod hexagons (representing Kubernetes pods) -->
  <polygon points="1090,155 1100,149 1110,155 1110,167 1100,173 1090,167" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.3)" stroke-width="1.5"/>
  <polygon points="1105,178 1115,172 1125,178 1125,190 1115,196 1105,190" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.25)" stroke-width="1.5"/>
  <polygon points="1088,193 1098,187 1108,193 1108,205 1098,211 1088,205" fill="rgba(34,197,94,0.05)" stroke="rgba(34,197,94,0.2)" stroke-width="1.5"/>

  <!-- Connecting lines between components -->
  <line x1="927" y1="175" x2="940" y2="190" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="927" y1="217" x2="940" y2="210" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1088" y1="161" x2="1078" y2="185" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Outer orbit ring -->
  <circle cx="1010" cy="220" r="110" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="900" cy="420" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="860" cy="440" r="3" fill="#3b82f6" opacity="0.6"/>

  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(59,130,246,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#dateBadge)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-family="'Courier New', monospace" font-size="13" fill="rgba(147,197,253,0.9)" text-anchor="middle" letter-spacing="1">MAY 30, 2025</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', sans-serif" font-size="46" font-weight="700" fill="white">Cloud Security Course 7Batch</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', sans-serif" font-size="38" font-weight="700" fill="white">7Week Docker &amp; Kubernetes</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', sans-serif" font-size="19" fill="rgba(148,163,184,0.85)">Container Orchestration and Cloud Security Fundamentals</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial', sans-serif" font-size="14" fill="rgba(100,180,255,0.7)" letter-spacing="3" font-weight="600">KUBERNETES / DOCKER / CLOUD SECURITY</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial', sans-serif" font-size="13" fill="rgba(252,165,165,0.95)" text-anchor="middle" font-weight="600">Docker</text>

  <rect x="225" y="402" width="148" height="36" rx="18" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="299" y="425" font-family="'Arial', sans-serif" font-size="13" fill="rgba(253,230,138,0.95)" text-anchor="middle" font-weight="600">Kubernetes</text>

  <rect x="388" y="402" width="148" height="36" rx="18" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <text x="462" y="425" font-family="'Arial', sans-serif" font-size="13" fill="rgba(147,197,253,0.95)" text-anchor="middle" font-weight="600">7th Batch</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(100,116,139,0.7)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial', sans-serif" font-size="13" fill="rgba(100,116,139,0.6)" text-anchor="end" letter-spacing="2">KUBERNETES</text>
</svg>