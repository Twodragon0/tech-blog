<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security 7th Week 7 Docker and Kubernetes</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a20"/>
      <stop offset="100%" stop-color="#153040"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2496ed"/>
      <stop offset="100%" stop-color="#326ce5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- Docker whale body -->
  <ellipse cx="940" cy="290" rx="70" ry="45" fill="none" stroke="rgba(36,150,237,0.65)" stroke-width="3"/>
  <!-- Whale tail -->
  <path d="M870 290 Q850 270 840 280 Q848 300 870 305" fill="none" stroke="rgba(36,150,237,0.55)" stroke-width="3"/>
  <!-- Container stacks on whale -->
  <rect x="905" y="255" width="24" height="18" rx="2" fill="rgba(36,150,237,0.45)" stroke="rgba(36,150,237,0.6)" stroke-width="1.5"/>
  <rect x="935" y="255" width="24" height="18" rx="2" fill="rgba(36,150,237,0.45)" stroke="rgba(36,150,237,0.6)" stroke-width="1.5"/>
  <rect x="965" y="255" width="24" height="18" rx="2" fill="rgba(36,150,237,0.45)" stroke="rgba(36,150,237,0.6)" stroke-width="1.5"/>
  <rect x="920" y="232" width="24" height="18" rx="2" fill="rgba(36,150,237,0.35)" stroke="rgba(36,150,237,0.5)" stroke-width="1.5"/>
  <rect x="950" y="232" width="24" height="18" rx="2" fill="rgba(36,150,237,0.35)" stroke="rgba(36,150,237,0.5)" stroke-width="1.5"/>
  <!-- Kubernetes wheel (helm/steering wheel) -->
  <circle cx="1070" cy="370" r="55" fill="none" stroke="rgba(50,108,229,0.65)" stroke-width="3"/>
  <circle cx="1070" cy="370" r="22" fill="none" stroke="rgba(50,108,229,0.7)" stroke-width="3"/>
  <!-- K8s spokes (6) -->
  <line x1="1070" y1="315" x2="1070" y2="348" stroke="rgba(50,108,229,0.65)" stroke-width="4" stroke-linecap="round"/>
  <line x1="1070" y1="392" x2="1070" y2="425" stroke="rgba(50,108,229,0.65)" stroke-width="4" stroke-linecap="round"/>
  <line x1="1022" y1="342" x2="1047" y2="357" stroke="rgba(50,108,229,0.65)" stroke-width="4" stroke-linecap="round"/>
  <line x1="1093" y1="383" x2="1118" y2="398" stroke="rgba(50,108,229,0.65)" stroke-width="4" stroke-linecap="round"/>
  <line x1="1022" y1="398" x2="1047" y2="383" stroke="rgba(50,108,229,0.65)" stroke-width="4" stroke-linecap="round"/>
  <line x1="1093" y1="357" x2="1118" y2="342" stroke="rgba(50,108,229,0.65)" stroke-width="4" stroke-linecap="round"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="80" y="60" width="190" height="32" rx="4" fill="rgba(36,150,237,0.2)" stroke="rgba(36,150,237,0.4)" stroke-width="1"/>
