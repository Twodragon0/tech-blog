<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <title>2025 05 30 Cloud Security Course 7Batch 7Week Docker and Kubernetes</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side content -->
  <g>
    <!-- Title line 1 -->
    <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="bold" fill="white">
      Cloud Security Course
    </text>
    <!-- Title line 2 -->
    <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="bold" fill="white">
      7Batch 7Week Docker
    </text>
    
    <!-- Date badge -->
    <rect x="60" y="290" width="200" height="40" rx="8" fill="#1e2139" stroke="#4a5f9f" stroke-width="2"/>
    <text x="160" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#9db4ff" text-anchor="middle">
      MAY 30, 2025
    </text>
    
    <!-- Tag pills -->
    <g y="420">
      <rect x="60" y="420" width="100" height="32" rx="16" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="110" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4a9eff" text-anchor="middle">
        Docker
      </text>
      
      <rect x="170" y="420" width="110" height="32" rx="16" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="225" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4a9eff" text-anchor="middle">
        Kubernetes
      </text>
      
      <rect x="290" y="420" width="100" height="32" rx="16" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1.5"/>
      <text x="340" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4a9eff" text-anchor="middle">
        Security
      </text>
    </g>
    
    <!-- Footer -->
    <text x="60" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6b7a99">
      tech.2twodragon.com
    </text>
  </g>
  
  <!-- Right side illustration: Docker &amp; Kubernetes Security -->
  <g>
    <!-- Container stack (Docker representation) -->
    <g>
      <!-- Bottom container -->
      <rect x="750" y="320" width="120" height="100" rx="6" fill="#2563eb" opacity="0.9" stroke="#60a5fa" stroke-width="2"/>
      <text x="810" y="380" font-family="monospace" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
        App
      </text>
      
      <!-- Middle container -->
      <rect x="775" y="280" width="120" height="100" rx="6" fill="#3b82f6" opacity="0.9" stroke="#93c5fd" stroke-width="2"/>
      <text x="835" y="340" font-family="monospace" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
        Runtime
      </text>
      
      <!-- Top container -->
      <rect x="800" y="240" width="120" height="100" rx="6" fill="#60a5fa" opacity="0.9" stroke="#bfdbfe" stroke-width="2"/>
      <text x="860" y="300" font-family="monospace" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">
        Image
      </text>
    </g>
    
    <!-- Kubernetes nodes -->
    <g>
      <!-- Node 1 -->
      <circle cx="920" cy="260" r="35" fill="#10b981" opacity="0.85" stroke="#34d399" stroke-width="2"/>
      <circle cx="920" cy="260" r="25" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
      <text x="920" y="268" font-family="monospace" font-size="20" font-weight="bold" fill="white" text-anchor="middle">
        K
      </text>
      
      <!-- Node 2 -->
      <circle cx="1000" cy="320" r="35" fill="#10b981" opacity="0.85" stroke="#34d399" stroke-width="2"/>
      <circle cx="1000" cy="320" r="25" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
      <text x="1000" y="328" font-family="monospace" font-size="20" font-weight="bold" fill="white" text-anchor="middle">
        K
      </text>
      
      <!-- Node 3 -->
      <circle cx="1000" cy="400" r="35" fill="#10b981" opacity="0.85" stroke="#34d399" stroke-width="2"/>
      <circle cx="1000" cy="400" r="25" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
      <text x="1000" y="408" font-family="monospace" font-size="20" font-weight="bold" fill="white" text-anchor="middle">
        K
      </text>
      
      <!-- Connections between nodes -->
      <line x1="950" y1="280" x2="975" y2="305" stroke="#34d399" stroke-width="2" opacity="0.6"/>
      <line x1="955" y1="285" x2="980" y2="375" stroke="#34d399" stroke-width="2" opacity="0.6"/>
      <line x1="1000" y1="355" x2="1000" y2="365" stroke="#34d399" stroke-width="2" opacity="0.6"/>
    </g>
    
    <!-- Security shield overlay -->
    <g>
      <!-- Shield shape -->
      <path d="M 920 150 L 950 160 L 950 210 Q 950 240 920 255 Q 890 240 890 210 L 890 160 Z" fill="#f59e0b" opacity="0.9" stroke="#fbbf24" stroke-width="2"/>
      <path d="M 920 165 L 920 235" stroke="#fbbf24" stroke-width="2"/>
      <path d="M 905 200 L 935 200" stroke="#fbbf24" stroke-width="2"/>
    </g>
    
    <!-- Network/Connection lines -->
    <g stroke="#4a9eff" stroke-width="1.5" opacity="0.4">
      <line x1="860" y1="340" x2="920" y2="300"/>
      <line x1="900" y1="360" x2="950" y2="330"/>
      <line x1="920" y1="380" x2="980" y2="370"/>
    </g>
    
    <!-- Security lock indicators -->
    <g>
      <!-- Lock 1 -->
      <circle cx="760" cy="200" r="8" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
      <rect x="756" y="206" width="8" height="8" rx="2" fill="#10b981" opacity="0.7"/>
      
      <!-- Lock 2 -->
      <circle cx="1050" cy="280" r="8" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
      <rect x="1046" y="286" width="8" height="8" rx="2" fill="#10b981" opacity="0.7"/>
      
      <!-- Lock 3 -->
      <circle cx="1080" cy="360" r="8" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
      <rect x="1076" y="366" width="8" height="8" rx="2" fill="#10b981" opacity="0.7"/>
    </g>
  </g>
</svg>