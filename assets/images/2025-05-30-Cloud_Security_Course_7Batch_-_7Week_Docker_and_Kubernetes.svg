<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>7 - 7 : Docker Kubernetes</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0e1a"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="250" cy="250" r="220" fill="#60a5fa" opacity="0.06" filter="url(#sg)"/>
  <circle cx="950" cy="400" r="200" fill="#1d4ed8" opacity="0.04" filter="url(#sg)"/>

  <!-- Central illustration -->
  <g transform="translate(600,280)" filter="url(#shadow)">
    <circle r="80" fill="#0f172a" stroke="#60a5fa" stroke-width="2.5" opacity="0.8"/>

    <polygon points="0,-45 40,-20 40,20 0,45 -40,20 -40,-20" fill="none" stroke="#60a5fa" stroke-width="3"/>
    <circle r="12" fill="#60a5fa" opacity="0.3"/>
    <line x1="0" y1="-12" x2="0" y2="-38" stroke="#60a5fa" stroke-width="2"/>
    <line x1="10" y1="6" x2="34" y2="16" stroke="#60a5fa" stroke-width="2"/>
    <line x1="-10" y1="6" x2="-34" y2="16" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="0" cy="-38" r="5" fill="#60a5fa" opacity="0.5"/>
    <circle cx="34" cy="16" r="5" fill="#60a5fa" opacity="0.5"/>
    <circle cx="-34" cy="16" r="5" fill="#60a5fa" opacity="0.5"/>
  </g>

  <text x="600" y="480" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">7 - 7 : Docker Kubernetes</text>
  <text x="600" y="515" font-family="Arial,sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">Kubernetes | Docker</text>
  <text x="110" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#60a5fa" text-anchor="middle">KUBERNETES</text>
  <rect x="40" y="22" width="140" height="32" rx="16" fill="#60a5fa" opacity="0.25" stroke="#60a5fa" stroke-width="1"/>
  <text x="1090" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">March 30, 2026</text>
  <rect x="1020" y="22" width="140" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <line x1="50" y1="588" x2="1150" y2="588" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <text x="1150" y="612" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="end">tech.2twodragon.com</text>
</svg>