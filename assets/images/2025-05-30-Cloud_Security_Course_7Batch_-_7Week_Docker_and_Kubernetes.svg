  <!-- Main title -->
  <text x="80" y="185" font-family="system-ui,sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-1">Cloud Security 7th</text>
  <text x="80" y="245" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="-1">Week 7: Docker &amp; K8s</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="system-ui,sans-serif" font-size="19" fill="rgba(255,255,255,0.6)">Container and Kubernetes Security Practices</text>
  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accent)"/>
  <!-- Category -->
  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">CLOUD SECURITY COURSE</text>
  <!-- Tags -->
  <rect x="80" y="420" width="100" height="36" rx="18" fill="rgba(36,150,237,0.18)" stroke="rgba(36,150,237,0.4)" stroke-width="1"/>
  <text x="130" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#2496ed" text-anchor="middle" font-weight="600">Docker</text>
  <rect x="196" y="420" width="120" height="36" rx="18" fill="rgba(50,108,229,0.18)" stroke="rgba(50,108,229,0.4)" stroke-width="1"/>
  <text x="256" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#326ce5" text-anchor="middle" font-weight="600">Kubernetes</text>
  <rect x="332" y="420" width="90" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="377" y="443" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">Week 7</text>
  <!-- Bottom -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
