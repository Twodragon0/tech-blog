<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>NPM Shai-Hulud Worm - 180 Package Breach Analysis</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f0a"/>
      <stop offset="100%" stop-color="#2d1a10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d35400"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="450" r="200" fill="#d35400" opacity="0.05" filter="url(#sg)"/>
  <circle cx="1050" cy="450" r="140" fill="#e74c3c" opacity="0.05" filter="url(#sg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Topic illustrations: worm/snake attacking package boxes -->
  <g transform="translate(950,300)" opacity="0.4">
    <!-- Package box 1 -->
    <rect x="-140" y="-80" width="55" height="55" rx="5" fill="none" stroke="#d35400" stroke-width="2"/>
    <line x1="-112" y1="-80" x2="-112" y2="-25" stroke="#d35400" stroke-width="1" opacity="0.5"/>
    <line x1="-140" y1="-52" x2="-85" y2="-52" stroke="#d35400" stroke-width="1" opacity="0.5"/>
    <!-- Package box 2 - compromised -->
    <rect x="-60" y="-95" width="55" height="55" rx="5" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="2.5"/>
    <line x1="-50" y1="-85" x2="-15" y2="-50" stroke="#e74c3c" stroke-width="2.5"/>
    <line x1="-15" y1="-85" x2="-50" y2="-50" stroke="#e74c3c" stroke-width="2.5"/>
    <!-- Package box 3 -->
    <rect x="30" y="-75" width="55" height="55" rx="5" fill="none" stroke="#d35400" stroke-width="2"/>
    <line x1="57" y1="-75" x2="57" y2="-20" stroke="#d35400" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="-47" x2="85" y2="-47" stroke="#d35400" stroke-width="1" opacity="0.5"/>
    <!-- Package box 4 - compromised -->
    <rect x="110" y="-65" width="55" height="55" rx="5" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="2.5"/>
    <line x1="120" y1="-55" x2="155" y2="-20" stroke="#e74c3c" stroke-width="2.5"/>
    <line x1="155" y1="-55" x2="120" y2="-20" stroke="#e74c3c" stroke-width="2.5"/>
    <!-- Worm/snake body -->
    <path d="M-150,60 Q-120,90 -90,60 Q-60,30 -30,60 Q0,90 30,60 Q60,30 90,60 Q120,90 150,60" fill="none" stroke="#d35400" stroke-width="7" stroke-linecap="round"/>
    <!-- Worm head -->
    <circle cx="150" cy="60" r="14" fill="#d35400" opacity="0.75"/>
    <circle cx="156" cy="54" r="3.5" fill="#2d1a10"/>
    <circle cx="145" cy="54" r="3.5" fill="#2d1a10"/>
    <!-- Fangs -->
