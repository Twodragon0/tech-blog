    <line x1="150" y1="46" x2="162" y2="28" stroke="#e74c3c" stroke-width="2.5"/>
    <!-- 180 badge -->
    <rect x="-25" y="100" width="80" height="45" rx="8" fill="#d35400" opacity="0.2" stroke="#d35400" stroke-width="1.5"/>
