  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#d35400" filter="url(#glow)">180 Package Breach</text>
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="#94a3b8">Deep analysis of the Shai-Hulud supply chain worm attack on 180 packages</text>
  <line x1="80" y1="325" x2="540" y2="325" stroke="#d35400" stroke-width="2" opacity="0.6"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#e74c3c" letter-spacing="3">SUPPLY CHAIN ANALYSIS</text>
  <rect x="80" y="398" width="110" height="32" rx="16" fill="#d35400" opacity="0.15" stroke="#d35400" stroke-width="1"/>
  <text x="135" y="419" font-family="Arial,sans-serif" font-size="13" fill="#d35400" text-anchor="middle">NPM Worm</text>
  <rect x="204" y="398" width="130" height="32" rx="16" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1"/>
  <text x="269" y="419" font-family="Arial,sans-serif" font-size="13" fill="#f0a09a" text-anchor="middle">Supply Chain</text>
  <rect x="348" y="398" width="140" height="32" rx="16" fill="#d35400" opacity="0.1" stroke="#d35400" stroke-width="1"/>
  <text x="418" y="419" font-family="Arial,sans-serif" font-size="13" fill="#e8a080" text-anchor="middle">180 Packages</text>
  <rect x="0" y="520" width="1200" height="110" fill="#000000" opacity="0.25"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#d35400" stroke-width="1" opacity="0.3"/>
  <text x="80" y="566" font-family="Arial,sans-serif" font-size="14" fill="#64748b">tech.2twodragon.com</text>
  <text x="80" y="592" font-family="Arial,sans-serif" font-size="13" fill="#475569">DevSecOps</text>
