<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="None" height="None">
  <title>SKT Security Issue Complete Response Guide IMEI Check USIMeSIM Replace and MFA Importance</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1119;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- LEFT SIDE: TEXT CONTENT -->
  <g>
    <!-- Date Badge -->
    <rect x="45" y="45" width="180" height="40" rx="20" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
    <text x="135" y="70" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">APRIL 29, 2025</text>
    
    <!-- Main Title -->
    <text x="80" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#ffffff">SKT Security</text>
    <text x="80" y="235" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#ffffff">Issue Response</text>
    <text x="80" y="285" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#ffffff" opacity="0.9">IMEI Check</text>
    
    <!-- Tag Pills -->
    <g>
      <rect x="50" y="410" width="130" height="35" rx="17" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="115" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Mobile Security</text>
      
      <rect x="195" y="410" width="110" height="35" rx="17" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="250" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Compliance</text>
      
      <rect x="320" y="410" width="100" height="35" rx="17" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
      <text x="370" y="432" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Response</text>
    </g>
    
    <!-- Footer -->
    <text x="80" y="555" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.5">tech.2twodragon.com</text>
  </g>
  
  <!-- RIGHT SIDE: SECURITY VISUAL SCENE -->
  <g>
    <!-- Background accent -->
    <circle cx="900" cy="280" r="180" fill="#3b82f6" opacity="0.04"/>
    <circle cx="1000" cy="350" r="120" fill="#ef4444" opacity="0.03"/>
    
    <!-- Central Shield with Checkmark -->
    <g filter="url(#glow)">
      <path d="M 950 150 L 1000 180 L 1000 320 C 1000 380 950 420 950 420 C 950 420 900 380 900 320 L 900 180 Z" 
            fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="2.5"/>
      
      <!-- Checkmark inside shield -->
      <g>
        <polyline points="940,310 955,325 970,295" 
                  fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
    
    <!-- IMEI Device Icon (top right) -->
    <g>
      <rect x="1050" y="120" width="80" height="140" rx="8" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="1090" cy="135" r="3" fill="#f59e0b" opacity="0.6"/>
      <rect x="1065" y="155" width="50" height="80" rx="4" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
      <text x="1090" y="210" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" opacity="0.8" text-anchor="middle" font-weight="bold">IMEI</text>
    </g>
    
    <!-- Warning Triangle (left of shield) -->
    <g>
      <polygon points="750,200 770,260 730,260" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="2"/>
      <text x="750" y="242" font-family="Arial, sans-serif" font-size="28" fill="#ef4444" opacity="0.7" text-anchor="middle" font-weight="bold">!</text>
    </g>
    
    <!-- Data Flow Arrows -->
    <g stroke="#3b82f6" stroke-width="1.8" fill="none" opacity="0.5">
      <!-- Arrow from warning to shield -->
      <path d="M 780 240 Q 850 240 880 260" stroke-linecap="round" marker-end="url(#arrowhead)"/>
      <polygon points="885,265 880,255 888,260" fill="#3b82f6" opacity="0.5"/>
      
      <!-- Arrow from shield to device -->
      <path d="M 1010 280 Q 1040 280 1045 220" stroke-linecap="round"/>
      <polygon points="1050,215 1045,225 1040,220" fill="#3b82f6" opacity="0.5"/>
      
      <!-- Arrow down from shield -->
      <path d="M 950 430 L 950 490" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
      <polygon points="950,495 945,485 955,485" fill="#f59e0b" opacity="0.4"/>
    </g>
    
    <!-- Lock Icon (bottom right) -->
    <g opacity="0.6">
      <rect x="1050" y="480" width="60" height="45" rx="6" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="1080" cy="490" r="6" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <path d="M 1074 496 L 1074 505 L 1086 505 L 1086 496" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="1080" cy="500" r="2" fill="#3b82f6" opacity="0.7"/>
    </g>
    
    <!-- Server/Database Icon (bottom left of scene) -->
    <g opacity="0.5">
      <rect x="700" y="480" width="50" height="12" rx="3" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
      <rect x="700" y="500" width="50" height="12" rx="3" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
      <rect x="700" y="520" width="50" height="12" rx="3" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
      <circle cx="745" cy="480" r="3" fill="#f59e0b" opacity="0.7"/>
      <circle cx="745" cy="500" r="3" fill="#f59e0b" opacity="0.7"/>
    </g>
    
    <!-- Alert Indicator Pulse -->
    <circle cx="750" cy="200" r="3" fill="#ef4444" opacity="0.8"/>
    <circle cx="750" cy="200" r="8" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="0.5"/>
  </g>
  
  <!-- Decorative corner lines -->
  <line x1="650" y1="80" x2="650" y2="550" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
  <line x1="650" y1="80" x2="1150" y2="80" stroke="#f59e0b" stroke-width="0.5" opacity="0.1"/>
  <line x1="650" y1="550" x2="1150" y2="550" stroke="#ef4444" stroke-width="0.5" opacity="0.1"/>
</svg>