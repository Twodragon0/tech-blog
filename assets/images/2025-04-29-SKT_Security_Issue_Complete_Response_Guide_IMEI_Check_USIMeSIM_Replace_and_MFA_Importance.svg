  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(41,128,185,0.2)" stroke="rgba(41,128,185,0.4)" stroke-width="1"/>
  <text x="180" y="81" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">APRIL 29, 2025</text>
  <!-- Main title -->
