  <text x="80" y="370" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" letter-spacing="2">SECURITY GUIDE</text>
  <!-- Tags -->
  <rect x="80" y="420" width="130" height="36" rx="18" fill="rgba(41,128,185,0.18)" stroke="rgba(41,128,185,0.4)" stroke-width="1"/>
  <text x="145" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#2980b9" text-anchor="middle" font-weight="600">SKT Security</text>
  <rect x="226" y="420" width="120" height="36" rx="18" fill="rgba(231,76,60,0.18)" stroke="rgba(231,76,60,0.4)" stroke-width="1"/>
  <text x="286" y="443" font-family="system-ui,sans-serif" font-size="14" fill="#e74c3c" text-anchor="middle" font-weight="600">IMEI Check</text>
  <rect x="362" y="420" width="80" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="402" y="443" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-weight="600">MFA</text>
  <!-- Bottom -->
  <rect x="80" y="520" width="1040" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="end">DevSecOps</text>
