      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Background circles -->
  <circle cx="1050" cy="350" r="200" fill="rgba(255,255,255,0.02)"/>
  <circle cx="1050" cy="350" r="140" fill="rgba(255,255,255,0.02)"/>
  <!-- SIM card icon -->
  <rect x="890" y="175" width="100" height="130" rx="10" fill="none" stroke="rgba(41,128,185,0.6)" stroke-width="3"/>
  <rect x="890" y="175" width="100" height="45" rx="10" fill="rgba(41,128,185,0.12)"/>
  <line x1="915" y1="248" x2="915" y2="285" stroke="rgba(41,128,185,0.5)" stroke-width="2"/>
  <line x1="940" y1="248" x2="940" y2="285" stroke="rgba(41,128,185,0.5)" stroke-width="2"/>
  <line x1="965" y1="248" x2="965" y2="285" stroke="rgba(41,128,185,0.5)" stroke-width="2"/>
  <!-- Shield with MFA checkmark -->
  <path d="M1055 195 L1115 215 L1115 275 Q1115 325 1055 355 Q995 325 995 275 L995 215 Z" fill="none" stroke="rgba(231,76,60,0.7)" stroke-width="3"/>
  <path d="M1030 280 L1050 300 L1085 250" fill="none" stroke="rgba(231,76,60,0.9)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- MFA dots -->
  <circle cx="1015" cy="395" r="9" fill="rgba(231,76,60,0.5)"/>
  <circle cx="1055" cy="395" r="9" fill="rgba(231,76,60,0.7)"/>
  <circle cx="1095" cy="395" r="9" fill="rgba(231,76,60,0.5)"/>
  <!-- Left accent bar -->
