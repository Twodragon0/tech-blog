  <text x="296" y="423" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle">Attack Vector</text>
  <rect x="378" y="400" width="80" height="36" rx="18" fill="rgba(52,73,94,0.5)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="418" y="423" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.9)" text-anchor="middle">RCE</text>
  <rect x="0" y="520" width="1200" height="110" fill="rgba(0,0,0,0.35)"/>
  <text x="80" y="545" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.55)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="Arial" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="end">DevSecOps</text>
