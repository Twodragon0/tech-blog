<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="55%" style="stop-color:#120a1f"/>
      <stop offset="100%" style="stop-color:#1a0f0a"/>
    </linearGradient>
    <linearGradient id="editorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b30;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#12101a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brainLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="brainRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="280" cy="250" r="260" fill="#8b5cf6" opacity="0.08" filter="url(#ambient)"/>
  <circle cx="920" cy="280" r="250" fill="#f97316" opacity="0.07" filter="url(#ambient)"/>
  <circle cx="600" cy="310" r="200" fill="#8b5cf6" opacity="0.05" filter="url(#ambient)"/>
  <circle cx="600" cy="150" r="150" fill="#f97316" opacity="0.04" filter="url(#ambient)"/>

  <!-- Floating code fragments -->
  <text x="50" y="135" font-family="Courier New,monospace" font-size="12" fill="#8b5cf6" opacity="0.13" transform="rotate(-7,50,135)">claude.assist(code)</text>
  <text x="890" y="120" font-family="Courier New,monospace" font-size="11" fill="#f97316" opacity="0.12" transform="rotate(6,890,120)">opencode.review()</text>
  <text x="60" y="510" font-family="Courier New,monospace" font-size="11" fill="#f97316" opacity="0.11" transform="rotate(4,60,510)">lint.secure(input)</text>
  <text x="860" y="530" font-family="Courier New,monospace" font-size="12" fill="#8b5cf6" opacity="0.13" transform="rotate(-5,860,530)">ai.suggest(fix)</text>
  <text x="380" y="75" font-family="Courier New,monospace" font-size="10" fill="#94a3b8" opacity="0.10">context.window = 200k</text>
  <text x="740" y="572" font-family="Courier New,monospace" font-size="10" fill="#a78bfa" opacity="0.11">safety.check(output)</text>
  <text x="1060" y="350" font-family="Courier New,monospace" font-size="10" fill="#f97316" opacity="0.10" transform="rotate(-5,1060,350)">model = "claude-opus"</text>
  <text x="25" y="380" font-family="Courier New,monospace" font-size="10" fill="#8b5cf6" opacity="0.10" transform="rotate(3,25,380)">agent.delegate(task)</text>

  <!-- Left AI brain (Claude) -->
  <g transform="translate(210,265)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="68" ry="72" fill="url(#brainLeft)" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Brain folds -->
    <path d="M-30,-40 Q-50,-20 -45,0 Q-50,20 -30,40" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <path d="M-10,-55 Q-25,-35 -20,-10 Q-25,15 -10,50" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <path d="M15,-55 Q5,-30 8,-5 Q5,20 15,50" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
    <path d="M35,-40 Q50,-20 45,5 Q50,25 35,42" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <!-- Center glow -->
    <circle cx="0" cy="0" r="20" fill="#8b5cf6" opacity="0.2" filter="url(#glow)"/>
    <text x="0" y="5" font-family="Arial,sans-serif" font-size="11" fill="#c4b5fd" text-anchor="middle" font-weight="bold">CLAUDE</text>
    <!-- Orbit ring -->
    <ellipse cx="0" cy="0" rx="78" ry="82" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
  </g>

  <!-- Right AI brain (OpenCode) -->
  <g transform="translate(990,265)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="68" ry="72" fill="url(#brainRight)" stroke="#f97316" stroke-width="2"/>
    <!-- Brain folds -->
    <path d="M-30,-40 Q-50,-20 -45,0 Q-50,20 -30,40" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
    <path d="M-10,-55 Q-25,-35 -20,-10 Q-25,15 -10,50" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
    <path d="M15,-55 Q5,-30 8,-5 Q5,20 15,50" fill="none" stroke="#fb923c" stroke-width="1.2" opacity="0.5"/>
    <path d="M35,-40 Q50,-20 45,5 Q50,25 35,42" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
    <!-- Center glow -->
    <circle cx="0" cy="0" r="20" fill="#f97316" opacity="0.2" filter="url(#glow)"/>
    <text x="0" y="5" font-family="Arial,sans-serif" font-size="11" fill="#fed7aa" text-anchor="middle" font-weight="bold">OPENCODE</text>
    <!-- Orbit ring -->
    <ellipse cx="0" cy="0" rx="78" ry="82" fill="none" stroke="#f97316" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
  </g>

  <!-- Connection lines: brain left -> editor -->
  <path d="M285,235 C360,200 430,195 475,210" stroke="#8b5cf6" stroke-width="1.8" opacity="0.5" fill="none" stroke-dasharray="6,3"/>
  <path d="M285,265 C360,265 430,255 475,255" stroke="#8b5cf6" stroke-width="2.2" opacity="0.6" fill="none"/>
  <path d="M285,295 C360,310 430,315 475,310" stroke="#a78bfa" stroke-width="1.5" opacity="0.4" fill="none" stroke-dasharray="4,4"/>
  <!-- Flowing suggestion dots left -->
  <circle cx="360" cy="265" r="4" fill="#8b5cf6" opacity="0.7" filter="url(#glow)"/>
  <circle cx="395" cy="262" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="430" cy="260" r="4" fill="#8b5cf6" opacity="0.7" filter="url(#glow)"/>

  <!-- Connection lines: editor -> brain right -->
  <path d="M725,210 C800,200 880,215 915,235" stroke="#f97316" stroke-width="1.8" opacity="0.5" fill="none" stroke-dasharray="6,3"/>
  <path d="M725,255 C800,255 875,258 915,265" stroke="#f97316" stroke-width="2.2" opacity="0.6" fill="none"/>
  <path d="M725,310 C800,315 875,305 915,295" stroke="#fb923c" stroke-width="1.5" opacity="0.4" fill="none" stroke-dasharray="4,4"/>
  <!-- Flowing suggestion dots right -->
  <circle cx="780" cy="255" r="4" fill="#f97316" opacity="0.7" filter="url(#glow)"/>
  <circle cx="820" cy="255" r="3" fill="#fb923c" opacity="0.6"/>
  <circle cx="860" cy="257" r="4" fill="#f97316" opacity="0.7" filter="url(#glow)"/>

  <!-- Central editor window -->
  <g transform="translate(475,185)" filter="url(#shadow)">
    <!-- Window frame -->
    <rect x="0" y="0" width="250" height="175" rx="10" fill="url(#editorGrad)" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="250" height="28" rx="10" fill="#1e1535"/>
    <rect x="0" y="14" width="250" height="14" fill="#1e1535"/>
    <!-- Traffic lights -->
    <circle cx="18" cy="14" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="36" cy="14" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="54" cy="14" r="5" fill="#10b981" opacity="0.8"/>
    <!-- Filename -->
    <text x="125" y="19" font-family="Arial,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">secure_agent.py</text>
    <!-- Line numbers -->
    <text x="16" y="50" font-family="Courier New,monospace" font-size="9" fill="#475569">1</text>
    <text x="16" y="65" font-family="Courier New,monospace" font-size="9" fill="#475569">2</text>
    <text x="16" y="80" font-family="Courier New,monospace" font-size="9" fill="#475569">3</text>
    <text x="16" y="95" font-family="Courier New,monospace" font-size="9" fill="#475569">4</text>
    <text x="16" y="110" font-family="Courier New,monospace" font-size="9" fill="#475569">5</text>
    <text x="16" y="125" font-family="Courier New,monospace" font-size="9" fill="#475569">6</text>
    <text x="16" y="140" font-family="Courier New,monospace" font-size="9" fill="#475569">7</text>
    <!-- Code lines -->
    <text x="32" y="50" font-family="Courier New,monospace" font-size="9" fill="#a78bfa">import</text>
    <text x="74" y="50" font-family="Courier New,monospace" font-size="9" fill="#e2e8f0"> claude_sdk</text>
    <text x="32" y="65" font-family="Courier New,monospace" font-size="9" fill="#a78bfa">from</text>
    <text x="60" y="65" font-family="Courier New,monospace" font-size="9" fill="#e2e8f0"> opencode </text>
    <text x="125" y="65" font-family="Courier New,monospace" font-size="9" fill="#a78bfa">import</text>
    <text x="163" y="65" font-family="Courier New,monospace" font-size="9" fill="#e2e8f0"> Agent</text>
    <text x="32" y="80" font-family="Courier New,monospace" font-size="9" fill="#94a3b8">&#xA0;</text>
    <text x="32" y="95" font-family="Courier New,monospace" font-size="9" fill="#fb923c">def</text>
    <text x="52" y="95" font-family="Courier New,monospace" font-size="9" fill="#86efac"> secure_assist</text>
    <text x="138" y="95" font-family="Courier New,monospace" font-size="9" fill="#e2e8f0">(code):</text>
    <text x="32" y="110" font-family="Courier New,monospace" font-size="9" fill="#e2e8f0">  validated = </text>
    <text x="116" y="110" font-family="Courier New,monospace" font-size="9" fill="#fb923c">lint</text>
    <text x="136" y="110" font-family="Courier New,monospace" font-size="9" fill="#e2e8f0">.secure(code)</text>
    <!-- AI suggestion overlay line -->
    <rect x="30" y="118" width="185" height="15" rx="3" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="32" y="129" font-family="Courier New,monospace" font-size="9" fill="#c4b5fd" opacity="0.9">  return ai.suggest(validated)</text>
    <!-- Cursor -->
    <rect x="32" y="137" width="6" height="10" rx="1" fill="#8b5cf6" opacity="0.9"/>
    <!-- AI suggestion popup -->
    <rect x="30" y="150" width="210" height="18" rx="4" fill="#1e1b30" stroke="#f97316" stroke-width="1"/>
    <text x="42" y="163" font-family="Courier New,monospace" font-size="8" fill="#fb923c">AI: add input validation here</text>
  </g>

  <!-- Title section -->
  <text x="600" y="455" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glowStrong)" letter-spacing="1">AI Coding Assistants</text>
  <text x="600" y="490" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">Claude Code  |  OpenCode  |  Best Practices for Secure Development</text>

  <!-- Top badges -->
  <rect x="40" y="22" width="90" height="34" rx="17" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="85" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd" text-anchor="middle" letter-spacing="1">GUIDE</text>
  <rect x="1010" y="22" width="148" height="34" rx="17" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="1084" y="44" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fed7aa" text-anchor="middle">February 25, 2026</text>

  <!-- Footer separator -->
  <line x1="40" y1="585" x2="1160" y2="585" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Footer stats -->
  <text x="40" y="610" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="start">Best Practices</text>
  <text x="175" y="610" font-family="Arial,sans-serif" font-size="13" fill="#ef4444" opacity="0.8">Security</text>
  <text x="270" y="610" font-family="Arial,sans-serif" font-size="13" fill="#8b5cf6" opacity="0.8">AI Coding</text>
  <text x="380" y="610" font-family="Arial,sans-serif" font-size="13" fill="#10b981" opacity="0.8">DevSecOps</text>
  <text x="1160" y="610" font-family="Arial,sans-serif" font-size="13" fill="#94a3b8" text-anchor="end">tech.2twodragon.com</text>
</svg>
