<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e05a2b"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e05a2b"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="tagRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="tagAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="tagBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="rgba(192,132,252,0.03)" stroke="rgba(192,132,252,0.05)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(224,90,43,0.04)" stroke="rgba(224,90,43,0.06)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Claude/AI Code Best Practices Icon -->
  <!-- Outer hexagon frame representing structured best practices -->
  <polygon points="1010,140 1110,175 1130,275 1060,340 960,305 940,205" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.25)" stroke-width="1.5"/>
  <!-- Inner hexagon -->
  <polygon points="1010,170 1090,198 1105,268 1048,310 968,282 952,212" fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.22)" stroke-width="1"/>

  <!-- Central AI brain / circuit node -->
  <circle cx="1035" cy="240" r="42" fill="rgba(224,90,43,0.09)" stroke="rgba(224,90,43,0.35)" stroke-width="1.5"/>
  <circle cx="1035" cy="240" r="28" fill="rgba(192,132,252,0.11)" stroke="rgba(192,132,252,0.3)" stroke-width="1"/>
  <circle cx="1035" cy="240" r="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Code bracket lines representing OpenCode -->
  <path d="M985,200 L970,215 L970,265 L985,280" fill="none" stroke="rgba(224,90,43,0.4)" stroke-width="2" stroke-linecap="round"/>
  <path d="M1085,200 L1100,215 L1100,265 L1085,280" fill="none" stroke="rgba(224,90,43,0.4)" stroke-width="2" stroke-linecap="round"/>

  <!-- Circuit nodes connected to center -->
  <circle cx="1035" cy="165" r="7" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <circle cx="1095" cy="200" r="6" fill="rgba(192,132,252,0.12)" stroke="rgba(192,132,252,0.4)" stroke-width="1.5"/>
  <circle cx="1095" cy="280" r="6" fill="rgba(192,132,252,0.12)" stroke="rgba(192,132,252,0.35)" stroke-width="1.5"/>
  <circle cx="1035" cy="315" r="7" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <circle cx="975" cy="280" r="6" fill="rgba(224,90,43,0.12)" stroke="rgba(224,90,43,0.35)" stroke-width="1.5"/>
  <circle cx="975" cy="200" r="6" fill="rgba(224,90,43,0.12)" stroke="rgba(224,90,43,0.35)" stroke-width="1.5"/>

  <!-- Lines from center to nodes -->
  <line x1="1035" y1="226" x2="1035" y2="172" stroke="rgba(59,130,246,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1046" y1="230" x2="1089" y2="206" stroke="rgba(192,132,252,0.22)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1046" y1="250" x2="1089" y2="274" stroke="rgba(192,132,252,0.22)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1035" y1="254" x2="1035" y2="308" stroke="rgba(59,130,246,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1024" y1="250" x2="981" y2="274" stroke="rgba(224,90,43,0.22)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1024" y1="230" x2="981" y2="206" stroke="rgba(224,90,43,0.22)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Small terminal lines (code representation) -->
  <rect x="1005" y="232" width="18" height="2" rx="1" fill="rgba(255,255,255,0.18)"/>
  <rect x="1005" y="238" width="14" height="2" rx="1" fill="rgba(255,255,255,0.12)"/>
  <rect x="1005" y="244" width="16" height="2" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- Orbit ring -->
  <ellipse cx="1035" cy="240" rx="60" ry="18" fill="none" stroke="rgba(192,132,252,0.12)" stroke-width="1" transform="rotate(-25,1035,240)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(224,90,43,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(192,132,252,0.6)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(59,130,246,0.65)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(224,90,43,0.15)" stroke="rgba(224,90,43,0.3)" stroke-width="1"/>
  <text x="190" y="81" font-family="'Courier New',monospace" font-size="12" fill="rgba(255,200,150,0.9)" text-anchor="middle" letter-spacing="1.5">FEBRUARY 25, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Claude Code</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="rgba(255,255,255,0.92)" letter-spacing="-0.5">OpenCode Best Practices</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Developer Workflow · Agent Orchestration · DevOps</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial',sans-serif" font-size="14" fill="rgba(192,132,252,0.8)" letter-spacing="3" text-transform="uppercase">DEVOPS / AUTOMATION</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="url(#tagRed)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(252,165,165,0.9)" text-anchor="middle" font-weight="500">Claude Code</text>

  <rect x="224" y="402" width="130" height="36" rx="18" fill="url(#tagAmber)" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>
  <text x="289" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(253,230,138,0.9)" text-anchor="middle" font-weight="500">OpenCode</text>

  <rect x="368" y="402" width="130" height="36" rx="18" fill="url(#tagBlue)" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
  <text x="433" y="425" font-family="'Arial',sans-serif" font-size="13" fill="rgba(147,197,253,0.9)" text-anchor="middle" font-weight="500">Best Practices</text>

  <!-- Footer separator -->
  <line x1="80" y1="530" x2="1120" y2="530" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Footer text -->
  <text x="80" y="555" font-family="'Courier New',monospace" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="555" font-family="'Arial',sans-serif" font-size="13" fill="rgba(192,132,252,0.5)" text-anchor="end" letter-spacing="2">DEVOPS</text>
</svg>