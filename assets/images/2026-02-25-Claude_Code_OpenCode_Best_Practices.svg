<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e05c5c"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e05c5c"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="dateBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e05c5c;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Claude + Code + OpenCode symbol -->
  <!-- Outer ring representing orchestration -->
  <circle cx="1010" cy="225" r="110" fill="none" stroke="rgba(192,132,252,0.25)" stroke-width="1.5" stroke-dasharray="8 4"/>
  <circle cx="1010" cy="225" r="88" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.2)" stroke-width="1"/>

  <!-- Inner hexagon representing structure/best practices -->
  <polygon points="1010,148 1068,181 1068,269 1010,302 952,269 952,181" fill="rgba(96,165,250,0.07)" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>

  <!-- Center node: AI brain -->
  <circle cx="1010" cy="225" r="38" fill="rgba(224,92,92,0.12)" stroke="rgba(224,92,92,0.35)" stroke-width="2"/>
  <circle cx="1010" cy="225" r="22" fill="rgba(224,92,92,0.15)" stroke="rgba(224,92,92,0.4)" stroke-width="1.5"/>

  <!-- Central Claude logo-like C shape -->
  <path d="M1023,213 A18,18 0 1,0 1023,237" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>

  <!-- Radial connector lines from center to hex vertices -->
  <line x1="1010" y1="225" x2="1010" y2="148" stroke="rgba(192,132,252,0.2)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="1068" y2="181" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="1068" y2="269" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="1010" y2="302" stroke="rgba(192,132,252,0.2)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="952" y2="269" stroke="rgba(224,92,92,0.2)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="952" y2="181" stroke="rgba(224,92,92,0.2)" stroke-width="1"/>

  <!-- Vertex dots -->
  <circle cx="1010" cy="148" r="5" fill="rgba(192,132,252,0.5)" stroke="rgba(192,132,252,0.8)" stroke-width="1"/>
  <circle cx="1068" cy="181" r="5" fill="rgba(96,165,250,0.5)" stroke="rgba(96,165,250,0.8)" stroke-width="1"/>
  <circle cx="1068" cy="269" r="5" fill="rgba(96,165,250,0.5)" stroke="rgba(96,165,250,0.8)" stroke-width="1"/>
  <circle cx="1010" cy="302" r="5" fill="rgba(192,132,252,0.5)" stroke="rgba(192,132,252,0.8)" stroke-width="1"/>
  <circle cx="952" cy="269" r="5" fill="rgba(224,92,92,0.5)" stroke="rgba(224,92,92,0.8)" stroke-width="1"/>
  <circle cx="952" cy="181" r="5" fill="rgba(224,92,92,0.5)" stroke="rgba(224,92,92,0.8)" stroke-width="1"/>

  <!-- Code brackets decorative -->
  <text x="885" y="200" font-size="42" fill="rgba(96,165,250,0.18)" font-family="monospace" font-weight="700">&lt;</text>
  <text x="1110" y="260" font-size="42" fill="rgba(96,165,250,0.18)" font-family="monospace" font-weight="700">/&gt;</text>

  <!-- Floating small squares representing best practice items -->
  <rect x="880" y="130" width="14" height="14" rx="2" fill="rgba(224,92,92,0.12)" stroke="rgba(224,92,92,0.3)" stroke-width="1" transform="rotate(15,887,137)"/>
  <rect x="1115" y="140" width="10" height="10" rx="2" fill="rgba(192,132,252,0.12)" stroke="rgba(192,132,252,0.3)" stroke-width="1" transform="rotate(-10,1120,145)"/>
  <rect x="895" y="300" width="12" height="12" rx="2" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.3)" stroke-width="1" transform="rotate(20,901,306)"/>
  <rect x="1120" y="295" width="10" height="10" rx="2" fill="rgba(224,92,92,0.12)" stroke="rgba(224,92,92,0.3)" stroke-width="1"/>

  <!-- Orbit dots rotating around outer ring -->
  <circle cx="1010" cy="115" r="4" fill="rgba(255,255,255,0.35)"/>
  <circle cx="1105" cy="170" r="3" fill="rgba(192,132,252,0.5)"/>
  <circle cx="915" cy="280" r="3" fill="rgba(96,165,250,0.5)"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(224,92,92,0.6)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(251,191,36,0.6)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(96,165,250,0.6)"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(192,132,252,0.04)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(96,165,250,0.04)" stroke="none"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="url(#dateBadge)" stroke="rgba(224,92,92,0.3)" stroke-width="1"/>
  <text x="95" y="81" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.75)" letter-spacing="1">FEBRUARY 25, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Claude Code</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">OpenCode Best Practices</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">DevOps · Automation · Multi-Agent Workflows</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(224,92,92,0.85)" letter-spacing="2.5" font-weight="600">DEVOPS / DEVELOPER TOOLS</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(224,92,92,0.15)" stroke="rgba(224,92,92,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="500">Claude Code</text>

  <rect x="225" y="402" width="115" height="36" rx="18" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.35)" stroke-width="1"/>
  <text x="282" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="500">OpenCode</text>

  <rect x="354" y="402" width="130" height="36" rx="18" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.35)" stroke-width="1"/>
  <text x="419" y="425" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)" text-anchor="middle" font-weight="500">Best Practices</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="end" letter-spacing="1">DEVOPS</text>
</svg>