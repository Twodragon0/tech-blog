<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side content -->
  <text x="50" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" line-height="1.2">Coding Assistants</text>
  <text x="50" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" line-height="1.2">Comparison Guide</text>
  
  <!-- Date badge -->
  <rect x="50" y="280" width="240" height="36" rx="6" fill="#1a1f3a" stroke="#4f46e5" stroke-width="1"/>
  <text x="130" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">JANUARY 17, 2026</text>
  
  <!-- Tag pills -->
  <g id="tags">
    <!-- Tag 1: AI -->
    <rect x="50" y="420" width="70" height="32" rx="16" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="85" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">AI</text>
    
    <!-- Tag 2: Tools -->
    <rect x="140" y="420" width="100" height="32" rx="16" fill="#2d3748" stroke="#9f7aea" stroke-width="1"/>
    <text x="190" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#d6bcfa" text-anchor="middle">Tools</text>
    
    <!-- Tag 3: Developer -->
    <rect x="260" y="420" width="130" height="32" rx="16" fill="#1f3a3a" stroke="#14b8a6" stroke-width="1"/>
    <text x="325" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#5eead4" text-anchor="middle">Developer</text>
  </g>
  
  <!-- Right side: Illustration for Coding Assistants -->
  <g id="illustration">
    <!-- Background accent -->
    <circle cx="950" cy="180" r="120" fill="#1a3a4f" opacity="0.3"/>
    <circle cx="1000" cy="380" r="100" fill="#2a1f3a" opacity="0.3"/>
    
    <!-- Left AI Assistant Box (Gemini) -->
    <rect x="730" y="200" width="140" height="180" rx="12" fill="#1a2a4a" stroke="#10b981" stroke-width="2"/>
    <circle cx="800" cy="230" r="20" fill="#10b981" opacity="0.2"/>
    <text x="800" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">Gemini</text>
    
    <!-- Gemini features -->
    <rect x="740" y="280" width="120" height="4" rx="2" fill="#10b981" opacity="0.4"/>
    <rect x="740" y="295" width="100" height="4" rx="2" fill="#10b981" opacity="0.3"/>
    <rect x="740" y="310" width="110" height="4" rx="2" fill="#10b981" opacity="0.35"/>
    <rect x="740" y="325" width="90" height="4" rx="2" fill="#10b981" opacity="0.3"/>
    
    <!-- Right AI Assistant Box (Claude Code) -->
    <rect x="890" y="200" width="140" height="180" rx="12" fill="#1a2a4a" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="960" cy="230" r="20" fill="#8b5cf6" opacity="0.2"/>
    <text x="960" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">Claude Code</text>
    
    <!-- Claude Code features -->
    <rect x="900" y="280" width="120" height="4" rx="2" fill="#a78bfa" opacity="0.4"/>
    <rect x="900" y="295" width="105" height="4" rx="2" fill="#a78bfa" opacity="0.3"/>
    <rect x="900" y="310" width="115" height="4" rx="2" fill="#a78bfa" opacity="0.35"/>
    <rect x="900" y="325" width="95" height="4" rx="2" fill="#a78bfa" opacity="0.3"/>
    
    <!-- Comparison arrow -->
    <line x1="870" y1="290" x2="890" y2="290" stroke="#4f46e5" stroke-width="2"/>
    <polygon points="890,290 880,285 880,295" fill="#4f46e5"/>
    <line x1="870" y1="290" x2="870" y2="300" stroke="#4f46e5" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Code elements (bottom) -->
    <g id="code-elements">
      <!-- Code bracket 1 -->
      <path d="M 750 440 L 760 430 L 760 450" stroke="#3b82f6" stroke-width="2" fill="none"/>
      <text x="770" y="445" font-family="monospace" font-size="12" fill="#60a5fa" opacity="0.8">async</text>
      
      <!-- Code bracket 2 -->
      <path d="M 880 440 L 890 430 L 890 450" stroke="#8b5cf6" stroke-width="2" fill="none"/>
      <text x="900" y="445" font-family="monospace" font-size="12" fill="#a78bfa" opacity="0.8">await</text>
      
      <!-- Code bracket 3 -->
      <path d="M 1010 440 L 1020 430 L 1020 450" stroke="#10b981" stroke-width="2" fill="none"/>
      <text x="1030" y="445" font-family="monospace" font-size="12" fill="#5eead4" opacity="0.8">return</text>
    </g>
    
    <!-- Stats/Metrics -->
    <g id="metrics">
      <!-- Metric bars -->
      <text x="730" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">Speed</text>
      <rect x="730" y="525" width="80" height="6" rx="3" fill="#1e293b"/>
      <rect x="730" y="525" width="60" height="6" rx="3" fill="#3b82f6"/>
      
      <text x="830" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">Accuracy</text>
      <rect x="830" y="525" width="80" height="6" rx="3" fill="#1e293b"/>
      <rect x="830" y="525" width="70" height="6" rx="3" fill="#8b5cf6"/>
      
      <text x="930" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">Features</text>
      <rect x="930" y="525" width="80" height="6" rx="3" fill="#1e293b"/>
      <rect x="930" y="525" width="65" height="6" rx="3" fill="#10b981"/>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="1150" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280" text-anchor="end">tech.2twodragon.com</text>
</svg>