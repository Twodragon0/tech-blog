<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="None" height="None">
  <title>AWS Cloud Security IAM From EKS To Security</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left side: Text content -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">AWS Cloud Security</text>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">IAM From EKS To Security</text>

  <!-- Date badge -->
  <rect x="50" y="280" width="220" height="35" rx="5" fill="#1a4d9e" opacity="0.8"/>
  <text x="60" y="302" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">JANUARY 14, 2026</text>

  <!-- Tag pills -->
  <rect x="50" y="420" width="100" height="30" rx="15" fill="#ff6b35" opacity="0.9"/>
  <text x="65" y="442" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">aws</text>

  <rect x="160" y="420" width="100" height="30" rx="15" fill="#ff6b35" opacity="0.9"/>
  <text x="175" y="442" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">iam</text>

  <rect x="270" y="420" width="100" height="30" rx="15" fill="#ff6b35" opacity="0.9"/>
  <text x="285" y="442" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">eks</text>

  <!-- Footer -->
  <text x="50" y="600" font-family="Arial, sans-serif" font-size="12" fill="#888888">tech.2twodragon.com</text>

  <!-- Right side: AWS Cloud Security IAM/EKS illustration -->

  <!-- Background gradient circles for depth -->
  <circle cx="920" cy="200" r="120" fill="#1a4d9e" opacity="0.15"/>
  <circle cx="1050" cy="380" r="100" fill="#ff6b35" opacity="0.1"/>

  <!-- AWS Cloud (top) -->
  <path d="M 750 100 Q 770 80 790 100 L 800 130 Q 810 120 820 130 L 810 160 Q 790 170 770 160 L 760 130 Z" fill="#ff9900" opacity="0.9"/>
  <text x="765" y="155" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">AWS</text>

  <!-- VPC/Security Group (layered rectangles) -->
  <rect x="730" y="200" width="180" height="140" rx="8" fill="none" stroke="#4db8ff" stroke-width="2" opacity="0.8"/>
  <text x="745" y="220" font-family="Arial, sans-serif" font-size="11" fill="#4db8ff" font-weight="bold">VPC</text>

  <!-- Inner security layers -->
  <rect x="745" y="235" width="150" height="95" rx="6" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.6"/>

  <!-- IAM Lock/Key symbols -->
  <circle cx="850" cy="240" r="18" fill="none" stroke="#ff6b35" stroke-width="2"/>
  <path d="M 843 240 L 843 235 L 857 235 L 857 240" fill="none" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <circle cx="850" cy="245" r="3" fill="#ff6b35"/>

  <!-- IAM Identity/User -->
  <circle cx="795" cy="275" r="12" fill="#4db8ff" opacity="0.7"/>
  <path d="M 783 295 L 807 295 L 807 305 L 783 305 Z" fill="#4db8ff" opacity="0.7"/>

  <!-- IAM Policies (stack) -->
  <rect x="820" y="270" width="50" height="8" rx="2" fill="#00d9ff" opacity="0.8"/>
  <rect x="820" y="282" width="50" height="8" rx="2" fill="#00d9ff" opacity="0.6"/>
  <rect x="820" y="294" width="50" height="8" rx="2" fill="#00d9ff" opacity="0.4"/>

  <!-- EKS Cluster (Kubernetes pods) -->
  <g id="pod-cluster">
    <!-- Container 1 -->
    <rect x="750" y="370" width="40" height="40" rx="4" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
    <circle cx="770" cy="390" r="6" fill="#00ff88" opacity="0.6"/>

    <!-- Container 2 -->
    <rect x="810" y="360" width="40" height="40" rx="4" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
    <circle cx="830" cy="380" r="6" fill="#00ff88" opacity="0.6"/>

    <!-- Container 3 -->
    <rect x="870" y="370" width="40" height="40" rx="4" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
    <circle cx="890" cy="390" r="6" fill="#00ff88" opacity="0.6"/>
  </g>

  <!-- EKS label -->
  <text x="760" y="425" font-family="Arial, sans-serif" font-size="11" fill="#00ff88" font-weight="bold">EKS Cluster</text>

  <!-- Security boundary (curved) -->
  <path d="M 730 450 Q 870 470 920 450 Q 920 500 870 510 Q 730 520 730 450" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.7" stroke-dasharray="4,4"/>

  <!-- RBAC/Permissions flow arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4db8ff" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Arrow from IAM to EKS -->
  <line x1="850" y1="320" x2="830" y2="360" stroke="#4db8ff" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowhead)"/>

  <!-- Arrow from security to cluster -->
  <line x1="790" y1="340" x2="800" y2="370" stroke="#00d9ff" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowhead)"/>

  <!-- Security checkmark (verification) -->
  <circle cx="950" cy="310" r="22" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.7"/>
  <path d="M 942 315 L 948 323 L 960 305" fill="none" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Status indicator dots -->
  <circle cx="750" cy="510" r="4" fill="#00ff88" opacity="0.8"/>
  <circle cx="770" cy="515" r="4" fill="#00ff88" opacity="0.6"/>
  <circle cx="790" cy="512" r="4" fill="#00ff88" opacity="0.4"/>

  <!-- Accent lines for visual hierarchy -->
  <line x1="700" y1="550" x2="1100" y2="550" stroke="#ff6b35" stroke-width="1" opacity="0.3"/>
</svg>