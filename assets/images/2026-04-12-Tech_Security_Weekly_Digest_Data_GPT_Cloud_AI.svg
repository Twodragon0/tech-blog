    <g font-family="Courier New,monospace" font-size="8" fill="#67e8f9" opacity="0.5">
      <text x="190" y="378">INTERCEPTS: 847</text>
      <text x="190" y="394">TARGETS: CLASSIFIED</text>
      <text x="190" y="410">REGION: GLOBAL</text>
    </g>

    <!-- Separator line 1 -->
    <rect x="405" y="75" width="2" height="460" rx="1" fill="#22d3ee" opacity="0.3"/>

