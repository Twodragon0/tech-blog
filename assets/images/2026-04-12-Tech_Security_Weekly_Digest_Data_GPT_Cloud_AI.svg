      <!-- Iris -->
      <circle r="25" fill="#0a1520" stroke="#22d3ee" stroke-width="2"/>
      <circle r="12" fill="#22d3ee" opacity="0.15"/>
      <circle r="6" fill="#22d3ee" opacity="0.3"/>
      <circle r="2" fill="#22d3ee" opacity="0.8"/>
      <!-- Digital scan lines across iris -->
