      <path d="M-12,-15 C-12,-22 12,-22 12,-15 C16,-12 18,-4 14,0 C18,6 14,14 8,16 C6,20 -6,20 -8,16 C-14,14 -18,6 -14,0 C-18,-4 -16,-12 -12,-15Z" fill="none" stroke="#22c55e" stroke-width="1.2" opacity="0.6"/>
      <text x="0" y="5" font-family="Courier New,monospace" font-size="10" fill="#22c55e" text-anchor="middle" font-weight="bold">GPT</text>
