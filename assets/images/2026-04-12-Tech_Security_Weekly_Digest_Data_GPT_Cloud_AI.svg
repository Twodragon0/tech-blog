    <rect x="413" y="70" width="375" height="470" rx="10" fill="#060d18" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <rect x="413" y="70" width="375" height="470" rx="10" fill="url(#apr12p2)"/>
