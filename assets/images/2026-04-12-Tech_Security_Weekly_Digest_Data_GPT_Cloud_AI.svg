    <text x="870" y="432" font-family="Courier New,monospace" font-size="9" fill="#22c55e" font-weight="bold">PRICING WAR</text>
    <text x="870" y="450" font-family="Courier New,monospace" font-size="8" fill="#86efac" opacity="0.7">GPT Pro: $200/mo</text>
    <text x="870" y="462" font-family="Courier New,monospace" font-size="8" fill="#93c5fd" opacity="0.7">Claude: $20/mo (Pro)</text>

