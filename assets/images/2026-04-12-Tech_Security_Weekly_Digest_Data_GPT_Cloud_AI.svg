    <text x="840" y="280" font-family="Courier New,monospace" font-size="9" fill="#94a3b8" opacity="0.7">CODING</text>
    <rect x="910" y="272" width="240" height="8" rx="4" fill="#22c55e" opacity="0.12"/>
    <rect x="910" y="272" width="210" height="8" rx="4" fill="#22c55e" opacity="0.5"/>
    <rect x="910" y="282" width="240" height="8" rx="4" fill="#3b82f6" opacity="0.12"/>
    <rect x="910" y="282" width="225" height="8" rx="4" fill="#3b82f6" opacity="0.5"/>

    <text x="840" y="315" font-family="Courier New,monospace" font-size="9" fill="#94a3b8" opacity="0.7">REASONING</text>
    <rect x="910" y="307" width="240" height="8" rx="4" fill="#22c55e" opacity="0.12"/>
    <rect x="910" y="307" width="200" height="8" rx="4" fill="#22c55e" opacity="0.5"/>
    <rect x="910" y="317" width="240" height="8" rx="4" fill="#3b82f6" opacity="0.12"/>
    <rect x="910" y="317" width="230" height="8" rx="4" fill="#3b82f6" opacity="0.5"/>

    <text x="840" y="350" font-family="Courier New,monospace" font-size="9" fill="#94a3b8" opacity="0.7">CREATIVE</text>
    <rect x="910" y="342" width="240" height="8" rx="4" fill="#22c55e" opacity="0.12"/>
    <rect x="910" y="342" width="190" height="8" rx="4" fill="#22c55e" opacity="0.5"/>
    <rect x="910" y="352" width="240" height="8" rx="4" fill="#3b82f6" opacity="0.12"/>
    <rect x="910" y="352" width="220" height="8" rx="4" fill="#3b82f6" opacity="0.5"/>

    <!-- Legend -->
