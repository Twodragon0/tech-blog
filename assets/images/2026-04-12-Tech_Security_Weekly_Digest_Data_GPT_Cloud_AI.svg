    <text x="207" y="310" font-family="Courier New,monospace" font-size="16" fill="#22d3ee" text-anchor="middle" font-weight="bold">CITIZEN LAB</text>
    <text x="207" y="332" font-family="Courier New,monospace" font-size="10" fill="#67e8f9" text-anchor="middle" opacity="0.7">Digital surveillance probe</text>

