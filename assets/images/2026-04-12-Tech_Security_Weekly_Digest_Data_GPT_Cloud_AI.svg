      <line x1="-25" y1="5" x2="25" y2="5" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
    </g>

    <!-- Radar sweep -->
    <g transform="translate(207,230)">
