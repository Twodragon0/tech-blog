    <text x="926" y="384" font-family="Courier New,monospace" font-size="8" fill="#22c55e">ChatGPT Pro</text>
    <rect x="1020" y="375" width="10" height="10" rx="2" fill="#3b82f6" opacity="0.5"/>
    <text x="1036" y="384" font-family="Courier New,monospace" font-size="8" fill="#3b82f6">Claude</text>

