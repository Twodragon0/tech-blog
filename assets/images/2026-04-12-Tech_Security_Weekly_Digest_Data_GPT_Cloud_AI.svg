    <text x="993" y="500" font-family="Courier New,monospace" font-size="9" fill="#86efac" text-anchor="middle" opacity="0.5">AI LANDSCAPE SHIFTING</text>
  </g>

  <!-- FOOTER -->
  <line x1="20" y1="555" x2="1180" y2="555" stroke="#1e293b" stroke-width="1"/>
  <text x="20" y="580" font-family="Courier New,monospace" font-size="12" fill="#475569">Security Weekly Digest | April 12, 2026</text>
  <text x="1180" y="580" font-family="Courier New,monospace" font-size="11" fill="#475569" text-anchor="end">tech.2twodragon.com</text>

  <rect x="0.5" y="0.5" width="1199" height="629" rx="8" fill="none" stroke="#1e293b" stroke-width="1"/>
  <polyline points="0,25 0,0 25,0" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <polyline points="1175,0 1200,0 1200,25" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <polyline points="0,605 0,630 25,630" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <polyline points="1175,630 1200,630 1200,605" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
