    <line x1="940" y1="195" x2="965" y2="195" stroke="#22c55e" stroke-width="1" opacity="0.4" stroke-dasharray="3 2" style="animation:apr12pulse 1.5s ease-in-out infinite"/>
    <line x1="1020" y1="195" x2="1046" y2="195" stroke="#3b82f6" stroke-width="1" opacity="0.4" stroke-dasharray="3 2" style="animation:apr12pulse 1.8s ease-in-out infinite"/>

