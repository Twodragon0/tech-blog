    <rect x="20" y="70" width="375" height="470" rx="10" fill="#060d18" stroke="#22d3ee" stroke-width="1.5" opacity="0.8"/>
    <rect x="20" y="70" width="375" height="470" rx="10" fill="url(#apr12p1)"/>
    <rect x="20" y="70" width="375" height="30" rx="10" fill="#22d3ee" opacity="0.08"/>
    <text x="40" y="92" font-family="Courier New,monospace" font-size="11" fill="#22d3ee" font-weight="bold" letter-spacing="2">SURVEILLANCE</text>

