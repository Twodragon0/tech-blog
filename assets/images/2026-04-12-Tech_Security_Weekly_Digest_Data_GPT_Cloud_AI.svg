<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Security Weekly Digest - April 12 2026</title>
  <defs>
    <linearGradient id="apr12bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="apr12p1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="apr12p2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="apr12p3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="apr12glow" x="-100%" y="-100%" width="300%" height="300%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22d3ee" flood-opacity="0.4"/>
    </filter>
    <clipPath id="apr12clip"><rect x="1" y="1" width="1198" height="628" rx="8"/></clipPath>
    <style>
      @keyframes apr12radar{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      @keyframes apr12pulse{0%,100%{opacity:0.3}50%{opacity:0.8}}
      @keyframes apr12spark{0%,100%{opacity:0}50%{opacity:0.8}}
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#apr12bg)"/>
  <g clip-path="url(#apr12clip)">

