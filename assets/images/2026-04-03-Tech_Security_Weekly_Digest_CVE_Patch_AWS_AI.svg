<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>THREAT SIGNAL MAP</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="55%" stop-color="#151b32"/>
      <stop offset="100%" stop-color="#181024"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="210" cy="170" r="180" fill="#dc2626" opacity="0.14" filter="url(#glow)"/>
  <circle cx="980" cy="220" r="170" fill="#2563eb" opacity="0.12" filter="url(#glow)"/>
  <circle cx="930" cy="500" r="180" fill="#f59e0b" opacity="0.1" filter="url(#glow)"/>
  <text x="90" y="164" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#f8fafc">THREAT SIGNAL MAP</text>
  <text x="92" y="204" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e1">CVE  CISCO  AI AGENT</text>
  <line x1="180" y1="340" x2="1020" y2="340" stroke="#475569" stroke-width="4" stroke-dasharray="14 10" opacity="0.8"/>

  <!-- CVE Node -->
  <g transform="translate(250 340)" filter="url(#shadow)">
    <rect x="-85" y="-85" width="170" height="170" rx="28" fill="#0f172a" stroke="#ef4444" stroke-width="2.5"/>
    <path d="M0,-50 L40,-35 L40,10 C40,35 0,55 0,55 C0,55 -40,35 -40,10 L-40,-35 Z" fill="none" stroke="#ef4444" stroke-width="3"/>
    <path d="M-12,2 L-4,12 L16,-10" stroke="#ef4444" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-50" cy="-50" r="8" fill="#ef4444" opacity="0.3"/>
    <circle cx="50" cy="-50" r="8" fill="#ef4444" opacity="0.3"/>
    <line x1="-42" y1="-46" x2="-20" y2="-35" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    <line x1="42" y1="-46" x2="20" y2="-35" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
  </g>
  <text x="250" y="458" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle">CVE</text>

  <!-- CISCO Node -->
  <g transform="translate(600 340)" filter="url(#shadow)">
    <circle r="62" fill="#111827" stroke="#3b82f6" stroke-width="2.5"/>
    <rect x="-30" y="-24" width="60" height="48" rx="8" fill="#0b1628" stroke="#3b82f6" stroke-width="2"/>
    <line x1="-20" y1="-8" x2="20" y2="-8" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
    <line x1="-20" y1="8" x2="20" y2="8" stroke="#3b82f6" stroke-width="2" opacity="0.7"/>
    <circle cx="16" cy="-8" r="3" fill="#3b82f6" opacity="0.9"/>
  </g>
  <text x="600" y="458" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#3b82f6" text-anchor="middle">CISCO</text>

  <!-- AI Node -->
  <g transform="translate(950 340)" filter="url(#shadow)">
    <rect x="-85" y="-85" width="170" height="170" rx="28" fill="#0f172a" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="-28" y="-20" width="56" height="40" rx="8" fill="#111c35" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="0" cy="-4" r="14" fill="#12345c" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="0" y="1" font-family="Arial" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">AI</text>
    <circle cx="-40" cy="-40" r="6" fill="#f59e0b" opacity="0.25"/>
    <circle cx="40" cy="-40" r="6" fill="#f59e0b" opacity="0.25"/>
    <line x1="-34" y1="-36" x2="-14" y2="-20" stroke="#f59e0b" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
    <line x1="34" y1="-36" x2="14" y2="-20" stroke="#f59e0b" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
  </g>
  <text x="950" y="458" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="middle">AI AGENT</text>

  <!-- Attack flow arrows -->
  <path d="M340 340 C430 290 500 290 538 340" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="12 10"/>
  <path d="M662 340 C720 290 820 290 860 340" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="12 10"/>

  <rect x="70" y="532" width="1060" height="1.5" fill="#334155" opacity="0.8"/>
  <text x="90" y="574" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">April 03, 2026</text>
  <text x="1110" y="574" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="end">tech.2twodragon.com</text>
</svg>