<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <title>AWS Cloud Security Complete Guide IAM to EKS Practical Security Architecture</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,100,50,0.04)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,80,40,0.05)" stroke="none"/>

  <!-- RIGHT SIDE ILLUSTRATION: AWS Security Architecture (IAM + EKS + Shield) -->
  <!-- Outer shield shape -->
  <path d="M1010,145 L1110,145 L1110,200 Q1110,270 1060,300 Q1010,270 1010,200 Z"
        fill="rgba(255,100,50,0.08)" stroke="rgba(255,120,60,0.35)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1022,158 L1098,158 L1098,204 Q1098,258 1060,280 Q1022,258 1022,204 Z"
        fill="rgba(255,140,60,0.06)" stroke="rgba(255,160,80,0.25)" stroke-width="1"/>
  <!-- Lock icon inside shield -->
  <rect x="1044" y="205" width="32" height="26" rx="3"
        fill="rgba(255,160,80,0.12)" stroke="rgba(255,180,100,0.4)" stroke-width="1.2"/>
  <path d="M1051,205 Q1051,192 1060,192 Q1069,192 1069,205"
        fill="none" stroke="rgba(255,180,100,0.4)" stroke-width="1.5"/>
  <circle cx="1060" cy="218" r="4" fill="rgba(255,200,120,0.5)"/>

  <!-- EKS Kubernetes hexagon cluster -->
  <polygon points="900,160 920,150 940,160 940,180 920,190 900,180"
           fill="rgba(100,180,255,0.07)" stroke="rgba(120,200,255,0.3)" stroke-width="1.2"/>
  <polygon points="904,162 920,153 936,162 936,178 920,187 904,178"
           fill="rgba(100,200,255,0.04)" stroke="rgba(140,210,255,0.2)" stroke-width="0.8"/>
  <circle cx="920" cy="170" r="5" fill="rgba(150,220,255,0.35)"/>
  <!-- Pod nodes around hex -->
  <circle cx="890" cy="145" r="7" fill="rgba(100,180,255,0.1)" stroke="rgba(120,200,255,0.3)" stroke-width="1"/>
  <circle cx="950" cy="145" r="7" fill="rgba(100,180,255,0.1)" stroke="rgba(120,200,255,0.3)" stroke-width="1"/>
  <circle cx="890" cy="195" r="7" fill="rgba(100,180,255,0.1)" stroke="rgba(120,200,255,0.3)" stroke-width="1"/>
  <circle cx="950" cy="195" r="7" fill="rgba(100,180,255,0.1)" stroke="rgba(120,200,255,0.3)" stroke-width="1"/>
  <!-- Lines connecting pods -->
  <line x1="897" y1="148" x2="908" y2="155" stroke="rgba(120,200,255,0.2)" stroke-width="0.8"/>
  <line x1="942" y1="148" x2="932" y2="155" stroke="rgba(120,200,255,0.2)" stroke-width="0.8"/>
  <line x1="897" y1="192" x2="908" y2="185" stroke="rgba(120,200,255,0.2)" stroke-width="0.8"/>
  <line x1="942" y1="192" x2="932" y2="185" stroke="rgba(120,200,255,0.2)" stroke-width="0.8"/>

  <!-- IAM key symbol -->
  <circle cx="895" cy="250" r="18" fill="rgba(255,200,80,0.07)" stroke="rgba(255,210,100,0.3)" stroke-width="1.2"/>
  <circle cx="895" cy="250" r="10" fill="rgba(255,210,100,0.05)" stroke="rgba(255,220,120,0.25)" stroke-width="1"/>
  <rect x="906" y="248" width="22" height="5" rx="2" fill="rgba(255,210,100,0.12)" stroke="rgba(255,220,120,0.3)" stroke-width="0.8"/>
  <rect x="924" y="253" width="5" height="5" rx="1" fill="rgba(255,220,120,0.2)"/>
  <rect x="918" y="253" width="4" height="4" rx="1" fill="rgba(255,220,120,0.2)"/>

  <!-- Network/VPC topology lines -->
  <rect x="960" y="230" width="160" height="80" rx="6"
        fill="rgba(80,200,150,0.05)" stroke="rgba(100,220,170,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="974" y="243" width="50" height="25" rx="3"
        fill="rgba(80,200,150,0.08)" stroke="rgba(100,220,170,0.25)" stroke-width="0.9"/>
  <rect x="1040" y="243" width="50" height="25" rx="3"
        fill="rgba(80,200,150,0.08)" stroke="rgba(100,220,170,0.25)" stroke-width="0.9"/>
  <text x="999" y="258" font-size="7" fill="rgba(120,240,190,0.5)" text-anchor="middle" font-family="monospace">EC2</text>
  <text x="1065" y="258" font-size="7" fill="rgba(120,240,190,0.5)" text-anchor="middle" font-family="monospace">RDS</text>
  <line x1="1024" y1="255" x2="1040" y2="255" stroke="rgba(100,220,170,0.25)" stroke-width="0.8"/>
  <text x="1040" y="295" font-size="8" fill="rgba(100,220,170,0.35)" font-family="monospace">VPC</text>

  <!-- Connection lines between elements -->
  <line x1="940" y1="170" x2="960" y2="255" stroke="rgba(180,180,255,0.12)" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="1010" y1="200" x2="1000" y2="245" stroke="rgba(255,150,80,0.15)" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="913" y1="250" x2="960" y2="260" stroke="rgba(255,200,80,0.12)" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- RBAC role badge -->
  <rect x="880" y="310" width="80" height="20" rx="10"
        fill="rgba(200,100,255,0.08)" stroke="rgba(210,120,255,0.3)" stroke-width="0.9"/>
  <text x="920" y="323" font-size="8" fill="rgba(210,140,255,0.55)" text-anchor="middle" font-family="monospace">RBAC</text>

  <rect x="975" y="310" width="90" height="20" rx="10"
        fill="rgba(255,100,150,0.07)" stroke="rgba(255,120,160,0.28)" stroke-width="0.9"/>
  <text x="1020" y="323" font-size="8" fill="rgba(255,140,170,0.5)" text-anchor="middle" font-family="monospace">ClusterRole</text>

  <rect x="1080" y="310" width="70" height="20" rx="10"
        fill="rgba(80,180,255,0.07)" stroke="rgba(100,200,255,0.28)" stroke-width="0.9"/>
  <text x="1115" y="323" font-size="8" fill="rgba(120,210,255,0.5)" text-anchor="middle" font-family="monospace">ServiceAcc</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,160,40,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,80,80,0.5)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4" fill="url(#badge)"/>
  <text x="92" y="81" font-size="13" font-weight="600" fill="rgba(255,180,100,0.9)" font-family="Arial, sans-serif" letter-spacing="1">JANUARY 14, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="Arial, sans-serif">AWS Cloud Security</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="38" font-weight="700" fill="rgba(255,200,150,0.95)" font-family="Arial, sans-serif">IAM, EKS &amp; Security Architecture</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.55)" font-family="Arial, sans-serif">Cloud Security - IAM Roles, EKS RBAC, VPC &amp; Defense in Depth</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" font-weight="600" fill="rgba(255,100,80,0.85)" font-family="Arial, sans-serif" letter-spacing="2">SECURITY / DEVSECOPS / AWS</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="100" height="36" rx="18" fill="rgba(255,60,60,0.18)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <text x="130" y="425" font-size="13" font-weight="600" fill="rgba(255,120,120,0.9)" text-anchor="middle" font-family="Arial, sans-serif">IAM</text>

  <rect x="194" y="402" width="110" height="36" rx="18" fill="rgba(255,160,40,0.15)" stroke="rgba(255,180,60,0.38)" stroke-width="1"/>
  <text x="249" y="425" font-size="13" font-weight="600" fill="rgba(255,200,100,0.9)" text-anchor="middle" font-family="Arial, sans-serif">EKS</text>

  <rect x="318" y="402" width="130" height="36" rx="18" fill="rgba(60,140,255,0.15)" stroke="rgba(80,160,255,0.38)" stroke-width="1"/>
  <text x="383" y="425" font-size="13" font-weight="600" fill="rgba(120,190,255,0.9)" text-anchor="middle" font-family="Arial, sans-serif">Security</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="14" fill="rgba(255,255,255,0.35)" font-family="Arial, sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="14" fill="rgba(255,100,80,0.45)" font-family="Arial, sans-serif" text-anchor="end">security</text>
</svg>