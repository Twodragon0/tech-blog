<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security 8th - Week 1: Infrastructure Essentials</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a1a"/>
      <stop offset="100%" stop-color="#153030"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="450" r="200" fill="#1abc9c" opacity="0.05" filter="url(#sg)"/>
  <circle cx="1050" cy="450" r="140" fill="#2980b9" opacity="0.05" filter="url(#sg)"/>
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Topic illustrations: Network infrastructure diagram with server rack -->
  <g transform="translate(940,295)" opacity="0.38">
    <!-- Server rack -->
    <rect x="-160" y="-110" width="80" height="160" rx="5" fill="none" stroke="#1abc9c" stroke-width="2.5"/>
    <!-- Rack units -->
    <rect x="-155" y="-100" width="70" height="15" rx="2" fill="#1abc9c" opacity="0.15" stroke="#1abc9c" stroke-width="1"/>
    <rect x="-155" y="-82" width="70" height="15" rx="2" fill="#1abc9c" opacity="0.15" stroke="#1abc9c" stroke-width="1"/>
    <rect x="-155" y="-64" width="70" height="15" rx="2" fill="#1abc9c" opacity="0.15" stroke="#1abc9c" stroke-width="1"/>
    <rect x="-155" y="-46" width="70" height="15" rx="2" fill="#2980b9" opacity="0.15" stroke="#2980b9" stroke-width="1"/>
    <rect x="-155" y="-28" width="70" height="15" rx="2" fill="#2980b9" opacity="0.15" stroke="#2980b9" stroke-width="1"/>
    <rect x="-155" y="-10" width="70" height="15" rx="2" fill="#1abc9c" opacity="0.15" stroke="#1abc9c" stroke-width="1"/>
    <!-- LEDs -->
    <circle cx="-100" cy="-92" r="3" fill="#1abc9c" opacity="0.8"/>
    <circle cx="-100" cy="-74" r="3" fill="#1abc9c" opacity="0.8"/>
    <circle cx="-100" cy="-56" r="3" fill="#1abc9c" opacity="0.8"/>
    <circle cx="-100" cy="-38" r="3" fill="#2980b9" opacity="0.8"/>
    <circle cx="-100" cy="-20" r="3" fill="#2980b9" opacity="0.8"/>
    <circle cx="-100" cy="-2" r="3" fill="#1abc9c" opacity="0.8"/>
    <!-- Network topology right side -->
    <!-- Core switch -->
    <rect x="10" y="-15" width="70" height="30" rx="6" fill="none" stroke="#1abc9c" stroke-width="2"/>
    <!-- Distribution switches -->
    <rect x="100" y="-60" width="60" height="25" rx="5" fill="none" stroke="#2980b9" stroke-width="1.5"/>
    <rect x="100" y="35" width="60" height="25" rx="5" fill="none" stroke="#2980b9" stroke-width="1.5"/>
    <!-- Connection lines -->
    <line x1="80" y1="0" x2="100" y2="-47" stroke="#2980b9" stroke-width="1.5" opacity="0.6"/>
    <line x1="80" y1="0" x2="100" y2="47" stroke="#2980b9" stroke-width="1.5" opacity="0.6"/>
    <!-- Access switches -->
    <rect x="180" y="-80" width="55" height="20" rx="4" fill="none" stroke="#1abc9c" stroke-width="1"/>
    <rect x="180" y="-50" width="55" height="20" rx="4" fill="none" stroke="#1abc9c" stroke-width="1"/>
    <rect x="180" y="20" width="55" height="20" rx="4" fill="none" stroke="#1abc9c" stroke-width="1"/>
    <rect x="180" y="50" width="55" height="20" rx="4" fill="none" stroke="#1abc9c" stroke-width="1"/>
    <!-- Access connections -->
    <line x1="160" y1="-47" x2="180" y2="-70" stroke="#1abc9c" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="-47" x2="180" y2="-40" stroke="#1abc9c" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="47" x2="180" y2="30" stroke="#1abc9c" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="47" x2="180" y2="60" stroke="#1abc9c" stroke-width="1" opacity="0.5"/>
    <!-- Week 1 badge -->
    <rect x="-170" y="65" width="80" height="28" rx="8" fill="#1abc9c" opacity="0.15" stroke="#1abc9c" stroke-width="1"/>
  </g>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <rect x="40" y="38" width="260" height="34" rx="17" fill="#1abc9c" opacity="0.15" stroke="#1abc9c" stroke-width="1"/>
  <text x="80" y="60" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1abc9c">NOVEMBER 26, 2025</text>
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#ffffff" filter="url(#glow)">Cloud Security 8th -</text>
  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#1abc9c" filter="url(#glow)">Week 1: Infrastructure Essentials</text>
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="#94a3b8">Network fundamentals, server architecture &amp; security foundations</text>
  <line x1="80" y1="325" x2="540" y2="325" stroke="#1abc9c" stroke-width="2" opacity="0.6"/>
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2980b9" letter-spacing="3">CLOUD SECURITY COURSE</text>
  <rect x="80" y="398" width="130" height="32" rx="16" fill="#1abc9c" opacity="0.15" stroke="#1abc9c" stroke-width="1"/>
  <text x="145" y="419" font-family="Arial,sans-serif" font-size="13" fill="#6ef0d4" text-anchor="middle">Infrastructure</text>
  <rect x="224" y="398" width="90" height="32" rx="16" fill="#2980b9" opacity="0.15" stroke="#2980b9" stroke-width="1"/>
  <text x="269" y="419" font-family="Arial,sans-serif" font-size="13" fill="#7eb8e0" text-anchor="middle">Security</text>
  <rect x="328" y="398" width="80" height="32" rx="16" fill="#1abc9c" opacity="0.1" stroke="#1abc9c" stroke-width="1"/>
  <text x="368" y="419" font-family="Arial,sans-serif" font-size="13" fill="#6ef0d4" text-anchor="middle">Week 1</text>
  <rect x="0" y="520" width="1200" height="110" fill="#000000" opacity="0.25"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#1abc9c" stroke-width="1" opacity="0.3"/>
  <text x="80" y="566" font-family="Arial,sans-serif" font-size="14" fill="#64748b">tech.2twodragon.com</text>
  <text x="80" y="592" font-family="Arial,sans-serif" font-size="13" fill="#475569">DevSecOps</text>
</svg>
