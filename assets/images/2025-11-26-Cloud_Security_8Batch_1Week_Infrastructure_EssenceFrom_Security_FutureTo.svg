        <rect x="-25" y="4" width="45" height="4" rx="1" fill="#6366f1" opacity="0.15"/>
        <circle cx="42" cy="2" r="4" fill="#1e293b" stroke="#6366f1" stroke-width="0.8"/>
      </g>
      <g transform="translate(0,-5)">
