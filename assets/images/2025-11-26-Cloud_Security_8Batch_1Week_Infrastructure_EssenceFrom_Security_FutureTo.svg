<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cloud Security 8Batch 1Week Infrastructure EssenceFrom Security FutureTo</title>
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; fill: white; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; fill: white; }
      .date-badge { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; fill: white; }
      .tag { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; fill: white; }
      .footer { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 500; fill: #94a3b8; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE CONTENT -->

  <!-- Date Badge -->
  <rect x="60" y="50" width="180" height="32" rx="16" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5" filter="url(#glow)"/>
  <text x="150" y="71" text-anchor="middle" class="date-badge">NOVEMBER 26, 2025</text>

  <!-- Title -->
  <text x="80" y="215" font-size="44" class="title">Cloud Security</text>
  <text x="80" y="265" font-size="44" class="title">8Batch 1Week</text>

  <!-- Subtitle -->
  <text x="80" y="320" font-size="32" class="subtitle">Infrastructure</text>
  <text x="80" y="360" font-size="32" class="subtitle">EssenceFrom</text>

  <!-- Tag Pills -->
  <g>
    <!-- Tag 1: Security -->
    <rect x="60" y="410" width="110" height="32" rx="16" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="115" y="432" text-anchor="middle" class="tag">SECURITY</text>

    <!-- Tag 2: Cloud -->
    <rect x="180" y="410" width="100" height="32" rx="16" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="230" y="432" text-anchor="middle" class="tag">CLOUD</text>

    <!-- Tag 3: Infrastructure -->
    <rect x="290" y="410" width="130" height="32" rx="16" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.2"/>
    <text x="355" y="432" text-anchor="middle" class="tag">INFRASTRUCTURE</text>
  </g>

  <!-- Footer -->
  <text x="80" y="575" class="footer">tech.2twodragon.com</text>

  <!-- RIGHT SIDE VISUAL SCENE (x=650-1150, y=80-550) -->

  <!-- Cloud Shape with Data Flow -->
  <g opacity="0.08">
    <!-- Cloud background -->
    <path d="M 800 150 Q 850 120 900 140 Q 930 110 960 140 Q 1000 120 1020 170 Q 1050 160 1060 200 L 1060 280 Q 1050 320 1000 330 Q 950 350 900 340 Q 850 360 800 350 Q 750 360 700 340 Q 650 330 640 280 Q 630 240 650 200 Q 660 160 700 150 Z" fill="#3b82f6" stroke="#3b82f6" stroke-width="1.5"/>
  </g>

  <!-- Cloud with arrows (main visual) -->
  <g filter="url(#glow)">
    <!-- Cloud outline -->
    <path d="M 800 160 Q 845 135 890 155 Q 920 130 945 155 Q 980 135 995 180 Q 1025 170 1030 210 L 1030 280 Q 1020 315 980 325 Q 935 340 895 330 Q 850 350 800 340 Q 755 350 715 330 Q 670 325 660 280 Q 650 245 670 210 Q 680 170 715 160 Z" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.6"/>

    <!-- Data flow arrows markers -->
    <defs>
      <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.7"/>
      </marker>
      <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.7"/>
      </marker>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.7"/>
      </marker>
    </defs>

    <!-- Arrow 1: up-left -->
    <line x1="800" y1="310" x2="780" y2="260" stroke="#3b82f6" stroke-width="2.2" opacity="0.5" marker-end="url(#arrowBlue)"/>

    <!-- Arrow 2: up-center -->
    <line x1="865" y1="320" x2="865" y2="260" stroke="#3b82f6" stroke-width="2.2" opacity="0.5" marker-end="url(#arrowBlue)"/>

    <!-- Arrow 3: up-right -->
    <line x1="930" y1="310" x2="950" y2="260" stroke="#3b82f6" stroke-width="2.2" opacity="0.5" marker-end="url(#arrowBlue)"/>
  </g>

  <!-- Shield with Checkmark -->
  <g filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M 750 380 L 750 460 Q 750 510 800 540 Q 850 510 850 460 L 850 380 Z" fill="none" stroke="#ef4444" stroke-width="2.8" opacity="0.65"/>

    <!-- Shield fill (semi-transparent) -->
    <path d="M 752 382 L 752 460 Q 752 508 800 537 Q 848 508 848 460 L 848 382 Z" fill="#ef4444" opacity="0.06"/>

    <!-- Checkmark inside shield -->
    <path d="M 785 450 L 795 460 L 820 430" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- Large Shield (second, overlapping) -->
  <g filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M 900 370 L 900 460 Q 900 520 950 555 Q 1000 520 1000 460 L 1000 370 Z" fill="none" stroke="#f59e0b" stroke-width="2.8" opacity="0.65"/>

    <!-- Shield fill -->
    <path d="M 902 372 L 902 460 Q 902 518 950 552 Q 998 518 998 460 L 998 372 Z" fill="#f59e0b" opacity="0.06"/>

    <!-- Checkmark -->
    <path d="M 932 450 L 945 463 L 975 428" stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- Warning Triangles / Alert Indicators -->
  <g filter="url(#glow)">
    <!-- Warning triangle 1 (top-right area) -->
    <path d="M 1020 200 L 1035 230 L 1005 230 Z" fill="none" stroke="#ef4444" stroke-width="1.8" opacity="0.55"/>
    <circle cx="1020" cy="218" r="1.5" fill="#ef4444" opacity="0.6"/>

    <!-- Warning triangle 2 (left area) -->
    <path d="M 700 250 L 715 280 L 685 280 Z" fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0.55"/>
    <circle cx="700" cy="268" r="1.5" fill="#f59e0b" opacity="0.6"/>

    <!-- Alert dot 3 (bottom-left area) -->
    <circle cx="730" cy="480" r="4" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <circle cx="730" cy="480" r="2" fill="#3b82f6" opacity="0.6"/>
  </g>

  <!-- Data Flow Connector Lines -->
  <g opacity="0.4">
    <!-- Curved line: cloud to left shield -->
    <path d="M 750 310 Q 780 350 760 400" stroke="#3b82f6" stroke-width="1.8" fill="none" stroke-dasharray="4,3"/>

    <!-- Curved line: left shield to right shield -->
    <path d="M 850 420 Q 870 420 900 420" stroke="#f59e0b" stroke-width="1.8" fill="none" stroke-dasharray="4,3"/>

    <!-- Curved line: right shield upward -->
    <path d="M 950 370 Q 970 340 990 300" stroke="#ef4444" stroke-width="1.8" fill="none" stroke-dasharray="4,3"/>
  </g>

  <!-- Decorative grid pattern (subtle) -->
  <g opacity="0.02" stroke="#3b82f6" stroke-width="0.5">
    <line x1="650" y1="80" x2="650" y2="550"/>
    <line x1="750" y1="80" x2="750" y2="550"/>
    <line x1="850" y1="80" x2="850" y2="550"/>
    <line x1="950" y1="80" x2="950" y2="550"/>
    <line x1="1050" y1="80" x2="1050" y2="550"/>

    <line x1="650" y1="150" x2="1150" y2="150"/>
    <line x1="650" y1="250" x2="1150" y2="250"/>
    <line x1="650" y1="350" x2="1150" y2="350"/>
    <line x1="650" y1="450" x2="1150" y2="450"/>
  </g>
</svg>