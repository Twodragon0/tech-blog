<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141829;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Left Side: Content Area (x=0-650) -->
  <!-- Title Line 1 -->
  <text x="40" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">
    Post Mortem 2025
  </text>

  <!-- Title Line 2 -->
  <text x="40" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white" letter-spacing="-1">
    Cloudflare Global
  </text>

  <!-- Subtitle -->
  <text x="40" y="285" font-family="Arial, sans-serif" font-size="16" fill="#888888">
    Incident
  </text>

  <!-- Date Badge -->
  <rect x="40" y="310" width="240" height="40" rx="20" fill="#1a1f3a" stroke="#ff6b35" stroke-width="2"/>
  <text x="140" y="337" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff6b35" text-anchor="middle">
    NOVEMBER 19, 2025
  </text>

  <!-- Tag Pills -->
  <g id="tags">
    <!-- Tag 1: Outage -->
    <rect x="40" y="420" width="110" height="32" rx="16" fill="#2a2f4a" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="95" y="442" font-family="Arial, sans-serif" font-size="12" fill="#ff9966" text-anchor="middle" font-weight="500">
      Outage
    </text>

    <!-- Tag 2: Infrastructure -->
    <rect x="165" y="420" width="140" height="32" rx="16" fill="#2a2f4a" stroke="#4a9eff" stroke-width="1.5"/>
    <text x="235" y="442" font-family="Arial, sans-serif" font-size="12" fill="#66b3ff" text-anchor="middle" font-weight="500">
      Infrastructure
    </text>

    <!-- Tag 3: Recovery -->
    <rect x="320" y="420" width="110" height="32" rx="16" fill="#2a2f4a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="375" y="442" font-family="Arial, sans-serif" font-size="12" fill="#86efac" text-anchor="middle" font-weight="500">
      Recovery
    </text>
  </g>

  <!-- Footer -->
  <text x="40" y="600" font-family="Arial, sans-serif" font-size="12" fill="#555555">
    tech.2twodragon.com
  </text>

  <!-- Right Side: Illustration (x=700-1150) -->
  <!-- Server Cluster Background -->
  <g id="servers">
    <!-- Server 1 - Top Left (broken) -->
    <rect x="720" y="120" width="80" height="90" rx="5" fill="#1a1f3a" stroke="#ff6b35" stroke-width="2"/>
    <rect x="730" y="135" width="15" height="15" rx="2" fill="#ff3333"/>
    <rect x="750" y="135" width="15" height="15" rx="2" fill="#ff3333"/>
    <rect x="770" y="135" width="15" height="15" rx="2" fill="#ff3333"/>
    <text x="760" y="170" font-family="Arial, sans-serif" font-size="10" fill="#ff6b35" text-anchor="middle" font-weight="bold">
      DOWN
    </text>
    <line x1="700" y1="175" x2="810" y2="175" stroke="#ff3333" stroke-width="2" stroke-dasharray="5,3"/>

    <!-- Server 2 - Top Right (broken) -->
    <rect x="830" y="80" width="80" height="90" rx="5" fill="#1a1f3a" stroke="#ff6b35" stroke-width="2"/>
    <rect x="840" y="95" width="15" height="15" rx="2" fill="#ff3333"/>
    <rect x="860" y="95" width="15" height="15" rx="2" fill="#ff3333"/>
    <rect x="880" y="95" width="15" height="15" rx="2" fill="#ff3333"/>
    <text x="870" y="130" font-family="Arial, sans-serif" font-size="10" fill="#ff6b35" text-anchor="middle" font-weight="bold">
      OFFLINE
    </text>
    <line x1="810" y1="135" x2="920" y2="135" stroke="#ff3333" stroke-width="2" stroke-dasharray="5,3"/>

    <!-- Server 3 - Center (recovering) -->
    <rect x="940" y="150" width="80" height="90" rx="5" fill="#1a2f1a" stroke="#4ade80" stroke-width="2"/>
    <rect x="950" y="165" width="15" height="15" rx="2" fill="#ffaa00"/>
    <rect x="970" y="165" width="15" height="15" rx="2" fill="#ffaa00"/>
    <rect x="990" y="165" width="15" height="15" rx="2" fill="#4ade80"/>
    <text x="980" y="200" font-family="Arial, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle" font-weight="bold">
      RECOVER
    </text>

    <!-- Server 4 - Bottom Left (affected) -->
    <rect x="720" y="280" width="80" height="90" rx="5" fill="#2a1a1a" stroke="#ff9966" stroke-width="2"/>
    <rect x="730" y="295" width="15" height="15" rx="2" fill="#ff6b35"/>
    <rect x="750" y="295" width="15" height="15" rx="2" fill="#ff6b35"/>
    <rect x="770" y="295" width="15" height="15" rx="2" fill="#ffaa00"/>
    <text x="760" y="330" font-family="Arial, sans-serif" font-size="10" fill="#ff9966" text-anchor="middle" font-weight="bold">
      IMPACT
    </text>

    <!-- Server 5 - Bottom Right (restored) -->
    <rect x="830" y="310" width="80" height="90" rx="5" fill="#1a2a1a" stroke="#4ade80" stroke-width="2"/>
    <rect x="840" y="325" width="15" height="15" rx="2" fill="#4ade80"/>
    <rect x="860" y="325" width="15" height="15" rx="2" fill="#4ade80"/>
    <rect x="880" y="325" width="15" height="15" rx="2" fill="#4ade80"/>
    <text x="870" y="360" font-family="Arial, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle" font-weight="bold">
      ONLINE
    </text>
  </g>

  <!-- Network Lines (Breaking) -->
  <g id="network" stroke-width="2" fill="none">
    <line x1="800" y1="210" x2="850" y2="170" stroke="#ff3333" filter="url(#glowRed)" opacity="0.8"/>
    <line x1="850" y1="210" x2="920" y2="170" stroke="#ff3333" filter="url(#glowRed)" opacity="0.8" stroke-dasharray="4,2"/>
    <line x1="760" y1="280" x2="820" y2="240" stroke="#ff6b35" opacity="0.6"/>
    <line x1="870" y1="280" x2="920" y2="240" stroke="#ffaa00" opacity="0.6"/>
  </g>

  <!-- Central Alert Icon (Warning) -->
  <g id="alert" filter="url(#glowRed)">
    <circle cx="880" cy="270" r="35" fill="none" stroke="#ff3333" stroke-width="2" opacity="0.6"/>
    <path d="M 880 240 L 900 290 L 860 290 Z" fill="#ff3333" opacity="0.8"/>
    <text x="880" y="285" font-family="Arial, sans-serif" font-size="20" fill="#ffaaaa" text-anchor="middle" font-weight="bold">!</text>
  </g>

  <!-- Recovery Arrow -->
  <g id="recovery">
    <path d="M 1000 220 Q 1030 200 1050 180" stroke="#4ade80" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
    <defs>
      <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#4ade80" />
      </marker>
    </defs>
    <text x="1020" y="195" font-family="Arial, sans-serif" font-size="11" fill="#4ade80" font-weight="bold">Recovery</text>
  </g>

  <!-- Global Network Nodes -->
  <g id="global" opacity="0.5">
    <!-- Nodes -->
    <circle cx="750" cy="450" r="4" fill="#4a9eff"/>
    <circle cx="850" cy="480" r="4" fill="#4a9eff"/>
    <circle cx="950" cy="460" r="4" fill="#4a9eff"/>
    <circle cx="1000" cy="500" r="4" fill="#4a9eff"/>
    <circle cx="780" cy="520" r="4" fill="#4a9eff"/>

    <!-- Connecting lines -->
    <line x1="750" y1="450" x2="850" y2="480" stroke="#4a9eff" stroke-width="1"/>
    <line x1="850" y1="480" x2="950" y2="460" stroke="#4a9eff" stroke-width="1"/>
    <line x1="950" y1="460" x2="1000" y2="500" stroke="#4a9eff" stroke-width="1"/>
    <line x1="1000" y1="500" x2="780" y2="520" stroke="#4a9eff" stroke-width="1"/>
  </g>

  <!-- Decorative Elements -->
  <g id="grid" opacity="0.1" stroke="#4a9eff" stroke-width="1">
    <line x1="700" y1="0" x2="700" y2="630" stroke="#4a9eff" stroke-width="2" opacity="0.3"/>
  </g>
</svg>