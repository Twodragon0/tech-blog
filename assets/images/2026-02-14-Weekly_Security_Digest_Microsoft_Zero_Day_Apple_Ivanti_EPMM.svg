<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff6b00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff3b3b;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff3b3b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a0c4ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#4080ff;stop-opacity:0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid horizontal lines -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid vertical lines -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Background large circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Security breach visualization -->
  <!-- Outer shield -->
  <path d="M1010,140 L1100,165 L1100,240 Q1100,295 1010,320 Q920,295 920,240 L920,165 Z"
        fill="url(#shieldGrad)" stroke="rgba(255,59,59,0.35)" stroke-width="1.5"/>
  <!-- Shield inner -->
  <path d="M1010,158 L1085,178 L1085,242 Q1085,287 1010,308 Q935,287 935,242 L935,178 Z"
        fill="none" stroke="rgba(255,107,0,0.25)" stroke-width="1"/>

  <!-- Lock body on shield -->
  <rect x="990" y="220" width="40" height="32" rx="4"
        fill="rgba(255,59,59,0.1)" stroke="rgba(255,59,59,0.4)" stroke-width="1.5"/>
  <path d="M998,220 L998,210 Q998,195 1010,195 Q1022,195 1022,210 L1022,220"
        fill="none" stroke="rgba(255,59,59,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="236" r="4" fill="rgba(255,59,59,0.5)"/>

  <!-- Microsoft Windows logo representation (4 squares) -->
  <rect x="878" y="148" width="22" height="22" rx="2"
        fill="rgba(0,120,212,0.12)" stroke="rgba(0,120,212,0.35)" stroke-width="1"/>
  <rect x="903" y="148" width="22" height="22" rx="2"
        fill="rgba(0,120,212,0.12)" stroke="rgba(0,120,212,0.35)" stroke-width="1"/>
  <rect x="878" y="173" width="22" height="22" rx="2"
        fill="rgba(0,120,212,0.12)" stroke="rgba(0,120,212,0.35)" stroke-width="1"/>
  <rect x="903" y="173" width="22" height="22" rx="2"
        fill="rgba(0,120,212,0.12)" stroke="rgba(0,120,212,0.35)" stroke-width="1"/>

  <!-- Apple logo representation (circle with leaf) -->
  <circle cx="1120" cy="175" r="22"
          fill="url(#appleGrad)" stroke="rgba(160,196,255,0.3)" stroke-width="1.2"/>
  <path d="M1112,168 Q1116,160 1124,164 Q1128,155 1122,150 Q1115,155 1112,168"
        fill="rgba(160,196,255,0.2)" stroke="rgba(160,196,255,0.35)" stroke-width="1"/>

  <!-- Ivanti - gear/cog representation -->
  <circle cx="950" cy="300" r="22"
          fill="rgba(255,200,0,0.07)" stroke="rgba(255,200,0,0.3)" stroke-width="1.2"/>
  <circle cx="950" cy="300" r="13"
          fill="none" stroke="rgba(255,200,0,0.25)" stroke-width="1"/>
  <circle cx="950" cy="300" r="5"
          fill="rgba(255,200,0,0.15)"/>
  <!-- Gear teeth -->
  <rect x="947" y="275" width="6" height="6" rx="1" fill="rgba(255,200,0,0.2)" stroke="rgba(255,200,0,0.3)" stroke-width="0.8"/>
  <rect x="947" y="319" width="6" height="6" rx="1" fill="rgba(255,200,0,0.2)" stroke="rgba(255,200,0,0.3)" stroke-width="0.8"/>
  <rect x="925" y="297" width="6" height="6" rx="1" fill="rgba(255,200,0,0.2)" stroke="rgba(255,200,0,0.3)" stroke-width="0.8"/>
  <rect x="969" y="297" width="6" height="6" rx="1" fill="rgba(255,200,0,0.2)" stroke="rgba(255,200,0,0.3)" stroke-width="0.8"/>

  <!-- Zero-day burst / warning star -->
  <polygon points="1075,245 1080,258 1094,258 1083,267 1087,280 1075,272 1063,280 1067,267 1056,258 1070,258"
           fill="rgba(255,59,59,0.08)" stroke="rgba(255,59,59,0.35)" stroke-width="1.2"/>
  <text x="1068" y="264" font-size="10" font-weight="700" fill="rgba(255,59,59,0.7)" font-family="monospace">0</text>

  <!-- Connecting lines between elements -->
  <line x1="925" y1="185" x2="935" y2="210" stroke="rgba(255,59,59,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1098" y1="175" x2="1085" y2="200" stroke="rgba(160,196,255,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="970" y1="300" x2="990" y2="280" stroke="rgba(255,200,0,0.2)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1055" y1="255" x2="1040" y2="250" stroke="rgba(255,59,59,0.18)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Binary data stream (decorative) -->
  <text x="882" y="355" font-size="9" font-family="monospace" fill="rgba(255,59,59,0.18)">01001100 01001111</text>
  <text x="882" y="368" font-size="9" font-family="monospace" fill="rgba(255,59,59,0.12)">10110100 00110101</text>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,59,59,0.6)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,107,0,0.6)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,59,59,0.5)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4"
        fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.3)" stroke-width="1"/>
  <text x="90" y="81" font-size="12" font-weight="600" fill="rgba(255,180,180,0.9)"
        font-family="Arial, sans-serif" letter-spacing="1">FEBRUARY 14, 2026</text>

  <!-- Title lines -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white"
        font-family="Arial, sans-serif" letter-spacing="-0.5">Weekly Security Digest Microsoft</text>
  <text x="80" y="245" font-size="46" font-weight="700" fill="white"
        font-family="Arial, sans-serif" letter-spacing="-0.5">Zero Day Apple Ivanti</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,255,255,0.6)"
        font-family="Arial, sans-serif">Critical vulnerabilities affecting enterprise systems — stay protected</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="1"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" font-weight="600" fill="rgba(255,59,59,0.85)"
        font-family="Arial, sans-serif" letter-spacing="2">SECURITY / VULNERABILITY DIGEST</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18"
        fill="rgba(255,59,59,0.15)" stroke="rgba(255,59,59,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-size="13" font-weight="600" fill="rgba(255,120,120,0.95)"
        font-family="Arial, sans-serif" text-anchor="middle">Zero-Day</text>

  <rect x="224" y="402" width="130" height="36" rx="18"
        fill="rgba(255,150,0,0.12)" stroke="rgba(255,150,0,0.35)" stroke-width="1"/>
  <text x="289" y="425" font-size="13" font-weight="600" fill="rgba(255,180,80,0.95)"
        font-family="Arial, sans-serif" text-anchor="middle">Microsoft</text>

  <rect x="368" y="402" width="130" height="36" rx="18"
        fill="rgba(80,140,255,0.12)" stroke="rgba(80,140,255,0.35)" stroke-width="1"/>
  <text x="433" y="425" font-size="13" font-weight="600" fill="rgba(140,180,255,0.95)"
        font-family="Arial, sans-serif" text-anchor="middle">Ivanti / Apple</text>

  <!-- Footer -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.35)"
        font-family="Arial, sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" font-weight="600" fill="rgba(255,59,59,0.5)"
        font-family="Arial, sans-serif" text-anchor="end">SECURITY</text>
</svg>