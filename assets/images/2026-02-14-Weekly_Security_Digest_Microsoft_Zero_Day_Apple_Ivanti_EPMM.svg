<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Weekly Security Digest Microsoft Zero Day Apple Ivanti EPMM</title>
  <defs>
    
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="orbGlow">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4" />
    </filter>
    
    <linearGradient id="cardBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="cardBorder2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.2" />
    </linearGradient>
    
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
    
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <linearGradient id="warnShieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    
    <linearGradient id="tagGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.15" />
    </linearGradient>
    
    <filter id="particleGlow">
      <feGaussianBlur stdDeviation="3" />
    </filter>
    
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
  </defs>

  
  <rect width="1200" height="630" fill="#0f172a" />

  
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#94a3b8" />
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)" />
  </g>

  
  <circle cx="750" cy="150" r="180" fill="#3b82f6" opacity="0.08" filter="url(#orbGlow)" />
  <circle cx="950" cy="450" r="150" fill="#f43f5e" opacity="0.06" filter="url(#orbGlow)" />
  <circle cx="200" cy="500" r="120" fill="#3b82f6" opacity="0.05" filter="url(#orbGlow)" />
  <circle cx="400" cy="100" r="100" fill="#f43f5e" opacity="0.04" filter="url(#orbGlow)" />

  

  
  <g filter="url(#cardShadow)" transform="translate(720, 80)">
    <rect width="380" height="260" rx="16" fill="#1e293b" fill-opacity="0.45" stroke="url(#cardBorder1)" stroke-width="1.5" />
    <rect width="380" height="260" rx="16" fill="white" fill-opacity="0.04" />
    
    <g transform="translate(190, 130)">
      <path d="M0-70 L50-50 L50 20 Q50 55 0 70 Q-50 55 -50 20 L-50-50 Z" fill="url(#shieldGrad)" opacity="0.9" />
      <path d="M0-70 L50-50 L50 20 Q50 55 0 70 Q-50 55 -50 20 L-50-50 Z" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6" />
      
      <path d="M-20 5 L-8 18 L22-12" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    
    </g>

  
  <g filter="url(#cardShadow)" transform="translate(780, 260)">
    <rect width="340" height="240" rx="16" fill="#1e293b" fill-opacity="0.55" stroke="url(#cardBorder2)" stroke-width="1.5" />
    <rect width="340" height="240" rx="16" fill="white" fill-opacity="0.05" />
    
    <g transform="translate(170, 110)">
      <path d="M0-55 L40-38 L40 16 Q40 44 0 55 Q-40 44 -40 16 L-40-38 Z" fill="url(#warnShieldGrad)" opacity="0.85" />
      <path d="M0-55 L40-38 L40 16 Q40 44 0 55 Q-40 44 -40 16 L-40-38 Z" fill="none" stroke="#fb7185" stroke-width="2" opacity="0.5" />
      
      <path d="M-5-35 L3-15 L-8 0 L2 15 L-3 30" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round" opacity="0.7" />
      <path d="M3-15 L12-8" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" opacity="0.5" />
      
      <g transform="translate(0, -5)">
        <path d="M0-14 L12 10 L-12 10 Z" fill="#fbbf24" opacity="0.95" />
        </g>
    </g>
    
    <text x="170" y="210" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="13" letter-spacing="1.5">ZERO-DAY VULNERABILITY</text>
  </g>

  
  <g filter="url(#particleGlow)">
    <circle cx="740" cy="200" r="2.5" fill="#3b82f6" opacity="0.7" />
    <circle cx="780" cy="350" r="2" fill="#f43f5e" opacity="0.6" />
    <circle cx="1100" cy="180" r="1.8" fill="#60a5fa" opacity="0.5" />
    <circle cx="1050" cy="400" r="2.2" fill="#fb7185" opacity="0.55" />
    <circle cx="850" cy="530" r="1.5" fill="#3b82f6" opacity="0.4" />
    <circle cx="920" cy="70" r="2" fill="#f43f5e" opacity="0.45" />
    <circle cx="1130" cy="320" r="1.8" fill="#60a5fa" opacity="0.5" />
    <circle cx="700" cy="450" r="2" fill="#fb7185" opacity="0.4" />
  </g>

  
  <g transform="translate(690, 420)" opacity="0.6">
    <rect width="100" height="70" rx="12" fill="#1e293b" fill-opacity="0.35" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1" />
    <circle cx="50" cy="30" r="14" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.6" />
    <path d="M45 30 L50 25 L55 30" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" />
    </g>

  

  
  <g transform="translate(60, 80)">
    <rect width="140" height="30" rx="15" fill="url(#pillGrad)" opacity="0.2" />
    <rect width="140" height="30" rx="15" fill="none" stroke="url(#pillGrad)" stroke-width="1" opacity="0.6" />
    <text x="70" y="20" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" letter-spacing="1.2">SECURITY</text>
  </g>

  
  <text x="60" y="175" fill="white" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">
    Weekly Security
  </text>
  <text x="60" y="228" fill="white" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5">
    Digest
  </text>
  <text x="60" y="290" fill="#f43f5e" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="-0.3">
    Microsoft Zero Day
  </text>

  
  <rect x="60" y="310" width="280" height="3" rx="1.5" fill="url(#accentLine)" />

  
  <g transform="translate(60, 340)">
    
    <rect width="120" height="32" rx="16" fill="url(#tagGrad)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1" />
    <text x="60" y="21" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">CVE-2026</text>
    
    <g transform="translate(132, 0)">
      <rect width="140" height="32" rx="16" fill="url(#tagGrad)" stroke="#f43f5e" stroke-opacity="0.3" stroke-width="1" />
      <text x="70" y="21" text-anchor="middle" fill="#fda4af" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Patch Tuesday</text>
    </g>
    
    <g transform="translate(284, 0)">
      <rect width="120" height="32" rx="16" fill="url(#tagGrad)" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1" />
      <text x="60" y="21" text-anchor="middle" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">Threat Intel</text>
    </g>
  </g>

  
  <text x="60" y="420" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="2">
    FEBRUARY 14, 2026
  </text>

  
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#1e293b" stroke-width="1" />

  
  <text x="60" y="608" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="0.5">
    tech.2twodragon.com
  </text>

  
  <g opacity="0.15">
    <circle cx="1140" cy="590" r="3" fill="#3b82f6" />
    <circle cx="1155" cy="595" r="2" fill="#f43f5e" />
    <circle cx="1165" cy="588" r="2.5" fill="#60a5fa" />
  </g>
</svg>