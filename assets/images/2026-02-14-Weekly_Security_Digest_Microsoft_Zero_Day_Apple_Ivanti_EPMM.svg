<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b"/>
      <stop offset="50%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3b3b"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Multi-vendor zero-day shield complex -->
  <!-- Outer orbit ring -->
  <ellipse cx="1010" cy="225" rx="155" ry="155" fill="none" stroke="rgba(255,59,59,0.22)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Mid orbit ring -->
  <ellipse cx="1010" cy="225" rx="115" ry="115" fill="none" stroke="rgba(37,99,235,0.2)" stroke-width="1" stroke-dasharray="4,5"/>

  <!-- Central shield body -->
  <path d="M1010,140 L1070,165 L1070,215 Q1070,260 1010,285 Q950,260 950,215 L950,165 Z" fill="url(#shieldGrad)" stroke="rgba(255,59,59,0.35)" stroke-width="1.5"/>
  <!-- Shield inner highlight -->
  <path d="M1010,155 L1055,175 L1055,215 Q1055,248 1010,265 Q965,248 965,215 L965,175 Z" fill="none" stroke="rgba(255,107,53,0.2)" stroke-width="1"/>
  <!-- Shield keyhole/lock icon -->
  <circle cx="1010" cy="207" r="13" fill="none" stroke="rgba(255,59,59,0.4)" stroke-width="1.5"/>
  <rect x="1003" y="213" width="14" height="12" rx="2" fill="rgba(255,59,59,0.12)" stroke="rgba(255,59,59,0.35)" stroke-width="1.2"/>

  <!-- Orbiting vendor nodes -->
  <!-- Microsoft node (top-right) -->
  <circle cx="1095" cy="160" r="22" fill="url(#ringGrad)" stroke="rgba(37,99,235,0.35)" stroke-width="1.5"/>
  <!-- Windows 4-square icon -->
  <rect x="1086" y="151" width="8" height="8" rx="1" fill="rgba(37,99,235,0.5)"/>
  <rect x="1096" y="151" width="8" height="8" rx="1" fill="rgba(37,99,235,0.5)"/>
  <rect x="1086" y="161" width="8" height="8" rx="1" fill="rgba(37,99,235,0.5)"/>
  <rect x="1096" y="161" width="8" height="8" rx="1" fill="rgba(37,99,235,0.5)"/>
  <!-- Connector line to shield -->
  <line x1="1075" y1="170" x2="1058" y2="183" stroke="rgba(37,99,235,0.25)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Apple node (top-left) -->
  <circle cx="925" cy="158" r="22" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.35)" stroke-width="1.5"/>
  <!-- Apple-like bite mark circle -->
  <path d="M925,143 Q938,143 940,153 Q942,163 935,168 Q928,173 920,168 Q913,163 915,153 Q917,143 925,143 Z" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <circle cx="930" cy="140" r="4" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>
  <!-- Connector line to shield -->
  <line x1="943" y1="167" x2="956" y2="178" stroke="rgba(124,58,237,0.25)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Ivanti node (bottom) -->
  <circle cx="1010" cy="308" r="22" fill="rgba(251,146,60,0.1)" stroke="rgba(251,146,60,0.35)" stroke-width="1.5"/>
  <!-- Diamond/warning icon -->
  <polygon points="1010,294 1020,308 1010,322 1000,308" fill="rgba(251,146,60,0.15)" stroke="rgba(251,146,60,0.3)" stroke-width="1"/>
  <text x="1010" y="313" font-size="10" fill="rgba(251,146,60,0.7)" text-anchor="middle" font-family="monospace">!</text>
  <!-- Connector line to shield -->
  <line x1="1010" y1="287" x2="1010" y2="288" stroke="rgba(251,146,60,0.25)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Zero-day burst/warning indicators -->
  <!-- Burst lines around shield -->
  <line x1="1010" y1="115" x2="1010" y2="130" stroke="rgba(255,59,59,0.3)" stroke-width="1.5"/>
  <line x1="1050" y1="120" x2="1042" y2="133" stroke="rgba(255,59,59,0.2)" stroke-width="1"/>
  <line x1="970" y1="120" x2="978" y2="133" stroke="rgba(255,59,59,0.2)" stroke-width="1"/>

  <!-- Floating binary/data fragments -->
  <text x="880" y="175" font-size="9" fill="rgba(255,59,59,0.2)" font-family="monospace">0xCVE</text>
  <text x="1100" y="250" font-size="9" fill="rgba(37,99,235,0.2)" font-family="monospace">PATCH</text>
  <text x="875" y="280" font-size="9" fill="rgba(124,58,237,0.2)" font-family="monospace">0DAY</text>
  <text x="1095" y="310" font-size="9" fill="rgba(251,146,60,0.2)" font-family="monospace">VULN</text>

  <!-- Scanning sweep arc -->
  <path d="M1010,225 L1155,225" stroke="rgba(255,59,59,0.08)" stroke-width="8"/>
  <path d="M1010,225 Q1120,180 1140,225" fill="rgba(255,59,59,0.04)" stroke="rgba(255,59,59,0.15)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,59,59,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(251,146,60,0.6)"/>
  <circle cx="860" cy="440" r="3" fill="rgba(255,59,59,0.5)"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,59,59,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,59,59,0.06)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,59,59,0.15)" stroke="rgba(255,59,59,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-size="12" fill="rgba(255,180,180,0.9)" text-anchor="middle" font-family="'Courier New',monospace" letter-spacing="1">FEBRUARY 14, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="'Arial',sans-serif" letter-spacing="-0.5">Weekly Security Digest Microsoft</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="'Arial',sans-serif" letter-spacing="-0.5">Zero Day Apple Ivanti</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(255,200,200,0.75)" font-family="'Arial',sans-serif">Critical vulnerability analysis across enterprise platforms</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(255,120,120,0.8)" font-family="'Courier New',monospace" letter-spacing="3">SECURITY / VULNERABILITY INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(220,38,38,0.2)" stroke="rgba(220,38,38,0.45)" stroke-width="1"/>
  <text x="140" y="425" font-size="13" fill="rgba(255,160,160,0.95)" text-anchor="middle" font-family="'Arial',sans-serif" font-weight="600">ZERO-DAY</text>

  <rect x="216" y="402" width="118" height="36" rx="18" fill="rgba(217,119,6,0.2)" stroke="rgba(217,119,6,0.45)" stroke-width="1"/>
  <text x="275" y="425" font-size="13" fill="rgba(255,200,120,0.95)" text-anchor="middle" font-family="'Arial',sans-serif" font-weight="600">MICROSOFT</text>

  <rect x="350" y="402" width="96" height="36" rx="18" fill="rgba(37,99,235,0.2)" stroke="rgba(37,99,235,0.45)" stroke-width="1"/>
  <text x="398" y="425" font-size="13" fill="rgba(147,197,253,0.95)" text-anchor="middle" font-family="'Arial',sans-serif" font-weight="600">IVANTI</text>

  <!-- Footer -->
  <text x="80" y="545" font-size="13" fill="rgba(255,255,255,0.35)" font-family="'Courier New',monospace">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,100,100,0.4)" font-family="'Courier New',monospace" text-anchor="end">SECURITY</text>
</svg>