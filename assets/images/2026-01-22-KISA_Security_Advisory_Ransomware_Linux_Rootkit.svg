<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>2026 01 22 KISA Security Advisory Ransomware Linux Rootkit</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f35;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a52;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- LEFT SIDE: Title and metadata -->
  <!-- Title line 1 -->
  <text x="50" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">
    KISA Security Advisory
  </text>
  
  <!-- Title line 2 -->
  <text x="50" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">
    Ransomware Prevention Linux
  </text>
  
  <!-- Date badge -->
  <rect x="50" y="280" width="280" height="40" rx="8" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="70" y="307" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#ff9999">
    JANUARY 22, 2026
  </text>
  
  <!-- Tag pills -->
  <!-- Tag 1: Security -->
  <rect x="50" y="420" width="110" height="32" rx="16" fill="#00d9ff" opacity="0.15" stroke="#00d9ff" stroke-width="1"/>
  <text x="105" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#00d9ff" text-anchor="middle">
    Security
  </text>
  
  <!-- Tag 2: Ransomware -->
  <rect x="175" y="420" width="120" height="32" rx="16" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="1"/>
  <text x="235" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#ff9999" text-anchor="middle">
    Ransomware
  </text>
  
  <!-- Tag 3: Linux -->
  <rect x="310" y="420" width="95" height="32" rx="16" fill="#a78bfa" opacity="0.15" stroke="#a78bfa" stroke-width="1"/>
  <text x="357" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#c9b3ff" text-anchor="middle">
    Linux
  </text>
  
  <!-- Footer -->
  <text x="50" y="595" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="400" fill="#888">
    tech.2twodragon.com
  </text>
  
  <!-- RIGHT SIDE: Illustration -->
  <!-- Background accent circles for depth -->
  <circle cx="850" cy="200" r="120" fill="#00d9ff" opacity="0.05"/>
  <circle cx="950" cy="350" r="100" fill="#ff6b6b" opacity="0.05"/>
  
  <!-- Main shield with warning -->
  <g>
    <!-- Shield outer -->
    <path d="M 900 150 L 920 170 L 920 310 Q 900 350 850 370 Q 800 350 780 310 L 780 170 L 800 150 Z" 
          fill="url(#shieldGrad)" stroke="#00d9ff" stroke-width="2" opacity="0.9"/>
    
    <!-- Shield inner pattern -->
    <path d="M 905 160 L 915 170 L 915 300 Q 900 335 850 355 Q 805 335 785 300 L 785 170 L 795 160 Z" 
          fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Large padlock in center-right -->
  <g>
    <!-- Lock body -->
    <rect x="920" y="280" width="80" height="100" rx="8" fill="url(#lockGrad)" stroke="#ff6b6b" stroke-width="2"/>
    
    <!-- Lock shackle (top curve) -->
    <path d="M 935 280 Q 935 220 960 220 Q 985 220 985 280" 
          fill="none" stroke="url(#lockGrad)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Keyhole circle -->
    <circle cx="960" cy="330" r="8" fill="#0a0c1a"/>
    <circle cx="960" cy="330" r="12" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Linux penguin (Tux) head outline -->
  <g>
    <!-- Penguin head -->
    <ellipse cx="780" cy="200" rx="30" ry="35" fill="#a78bfa" opacity="0.8" stroke="#c9b3ff" stroke-width="1.5"/>
    
    <!-- Penguin eyes -->
    <circle cx="775" cy="190" r="4" fill="#0a0c1a"/>
    <circle cx="785" cy="190" r="4" fill="#0a0c1a"/>
    
    <!-- Penguin beak -->
    <polygon points="780,200 785,200 782,210" fill="#ffb366"/>
  </g>
  
  <!-- Data/file protection elements (stacked papers with lock) -->
  <g>
    <!-- File 1 -->
    <rect x="710" y="350" width="50" height="65" rx="4" fill="#00d9ff" opacity="0.2" stroke="#00d9ff" stroke-width="1.5" transform="rotate(-12 735 382)"/>
    
    <!-- File 2 -->
    <rect x="720" y="350" width="50" height="65" rx="4" fill="#00d9ff" opacity="0.4" stroke="#00d9ff" stroke-width="1.5" transform="rotate(-6 745 382)"/>
    
    <!-- File 3 -->
    <rect x="730" y="350" width="50" height="65" rx="4" fill="#00d9ff" opacity="0.6" stroke="#00d9ff" stroke-width="1.5"/>
    
    <!-- Small lock over files -->
    <rect x="748" y="365" width="18" height="22" rx="2" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="1" opacity="0.8"/>
    <path d="M 752 365 Q 752 360 756 360 Q 760 360 760 365" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.8"/>
  </g>
  
  <!-- Network/security connections (lines) -->
  <g stroke="#00d9ff" stroke-width="1" opacity="0.4" stroke-dasharray="2,4">
    <!-- Connection 1 -->
    <line x1="810" y1="230" x2="880" y2="250"/>
    <!-- Connection 2 -->
    <line x1="810" y1="280" x2="900" y2="300"/>
    <!-- Connection 3 -->
    <line x1="800" y1="320" x2="920" y2="340"/>
  </g>
  
  <!-- Warning indicator (triangle) -->
  <g>
    <polygon points="1000,150 1020,200 980,200" fill="#ff6b6b" opacity="0.2" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="1000" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ff9999" text-anchor="middle">!</text>
  </g>
  
  <!-- Accent line separators -->
  <line x1="680" y1="100" x2="680" y2="530" stroke="#00d9ff" stroke-width="1" opacity="0.2"/>
</svg>