<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff0044" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Security Shield with Ransomware/Rootkit detection theme -->
  <!-- Outer ring -->
  <circle cx="1010" cy="225" r="120" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="1010" cy="225" r="100" fill="none" stroke="rgba(255,100,0,0.2)" stroke-width="1" stroke-dasharray="8 4"/>
  <circle cx="1010" cy="225" r="80" fill="none" stroke="rgba(255,50,50,0.15)" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- Shield body -->
  <path d="M1010,140 L1068,165 L1068,215 Q1068,265 1010,295 Q952,265 952,215 L952,165 Z" fill="url(#shieldGrad)" stroke="rgba(255,80,80,0.35)" stroke-width="1.5"/>
  <!-- Shield inner -->
  <path d="M1010,155 L1055,175 L1055,215 Q1055,252 1010,272 Q965,252 965,215 L965,175 Z" fill="rgba(255,40,40,0.07)" stroke="rgba(255,120,50,0.25)" stroke-width="1"/>

  <!-- Lock icon inside shield -->
  <rect x="993" y="205" width="34" height="28" rx="3" fill="rgba(255,80,80,0.12)" stroke="rgba(255,100,100,0.4)" stroke-width="1.5"/>
  <path d="M1000,205 Q1000,192 1010,192 Q1020,192 1020,205" fill="none" stroke="rgba(255,120,80,0.5)" stroke-width="2"/>
  <circle cx="1010" cy="218" r="4" fill="rgba(255,150,100,0.5)"/>

  <!-- Rootkit detection lines radiating from shield -->
  <line x1="1010" y1="140" x2="1010" y2="118" stroke="rgba(255,80,80,0.3)" stroke-width="1.5"/>
  <line x1="1068" y1="165" x2="1088" y2="152" stroke="rgba(255,80,80,0.25)" stroke-width="1.5"/>
  <line x1="1068" y1="215" x2="1090" y2="215" stroke="rgba(255,100,50,0.25)" stroke-width="1.5"/>
  <line x1="952" y1="165" x2="932" y2="152" stroke="rgba(255,80,80,0.25)" stroke-width="1.5"/>
  <line x1="952" y1="215" x2="930" y2="215" stroke="rgba(255,100,50,0.25)" stroke-width="1.5"/>

  <!-- Scan lines (rootkit detection) -->
  <line x1="880" y1="185" x2="1140" y2="185" stroke="rgba(255,60,60,0.08)" stroke-width="1"/>
  <line x1="880" y1="200" x2="1140" y2="200" stroke="rgba(255,60,60,0.06)" stroke-width="1"/>
  <line x1="880" y1="250" x2="1140" y2="250" stroke="rgba(255,60,60,0.08)" stroke-width="1"/>

  <!-- Ransomware warning triangles around shield -->
  <polygon points="890,145 905,170 875,170" fill="rgba(255,140,0,0.1)" stroke="rgba(255,140,0,0.3)" stroke-width="1.2"/>
  <text x="890" y="165" font-size="11" fill="rgba(255,180,0,0.6)" text-anchor="middle" font-weight="bold">!</text>

  <polygon points="1130,145 1145,170 1115,170" fill="rgba(255,80,80,0.1)" stroke="rgba(255,80,80,0.3)" stroke-width="1.2"/>
  <text x="1130" y="165" font-size="11" fill="rgba(255,120,100,0.6)" text-anchor="middle" font-weight="bold">!</text>

  <!-- Linux terminal nodes -->
  <rect x="885" y="285" width="68" height="36" rx="4" fill="rgba(0,200,100,0.06)" stroke="rgba(0,200,100,0.2)" stroke-width="1"/>
  <text x="895" y="300" font-size="8" fill="rgba(0,220,120,0.5)" font-family="monospace">$ lsmod</text>
  <text x="895" y="313" font-size="8" fill="rgba(0,200,100,0.4)" font-family="monospace">rootkit?</text>

  <rect x="1047" y="285" width="68" height="36" rx="4" fill="rgba(255,80,80,0.06)" stroke="rgba(255,80,80,0.2)" stroke-width="1"/>
  <text x="1057" y="300" font-size="8" fill="rgba(255,120,100,0.5)" font-family="monospace">ALERT:</text>
  <text x="1057" y="313" font-size="8" fill="rgba(255,100,80,0.4)" font-family="monospace">detected</text>

  <!-- Connection lines from nodes to shield bottom -->
  <line x1="919" y1="285" x2="980" y2="295" stroke="rgba(0,200,100,0.15)" stroke-width="1"/>
  <line x1="1081" y1="285" x2="1040" y2="295" stroke="rgba(255,80,80,0.15)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="#ff4444" opacity="0.7"/>
  <circle cx="900" cy="420" r="3" fill="#ff8800" opacity="0.6"/>
  <circle cx="860" cy="440" r="5" fill="#ff2222" opacity="0.5"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,60,60,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,80,40,0.05)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-size="12" fill="rgba(255,180,150,0.9)" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="1">JANUARY 22, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="Arial, sans-serif">KISA Security Advisory Ransomware</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-size="46" font-weight="700" fill="white" font-family="Arial, sans-serif">Prevention Linux Rootkit Detection</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-size="19" fill="rgba(200,160,150,0.85)" font-family="Arial, sans-serif">Korean Internet Security Agency advisory on ransomware defense and Linux rootkit mitigation</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-size="14" fill="rgba(255,120,100,0.8)" font-family="Arial, sans-serif" letter-spacing="3" text-transform="uppercase">SECURITY / INCIDENT RESPONSE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(220,40,40,0.2)" stroke="rgba(255,80,80,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-size="13" fill="rgba(255,140,120,0.95)" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600">Ransomware</text>

  <rect x="224" y="402" width="110" height="36" rx="18" fill="rgba(200,120,0,0.2)" stroke="rgba(255,160,0,0.4)" stroke-width="1"/>
  <text x="279" y="425" font-size="13" fill="rgba(255,200,100,0.95)" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600">Linux Rootkit</text>

  <rect x="348" y="402" width="80" height="36" rx="18" fill="rgba(40,80,200,0.2)" stroke="rgba(80,120,255,0.4)" stroke-width="1"/>
  <text x="388" y="425" font-size="13" fill="rgba(140,180,255,0.95)" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600">KISA</text>

  <!-- Divider line footer -->
  <line x1="80" y1="510" x2="1120" y2="510" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Footer -->
  <text x="80" y="545" font-size="14" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="14" fill="rgba(255,100,80,0.4)" font-family="Arial, sans-serif" text-anchor="end" letter-spacing="2">SECURITY</text>
</svg>