<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side: Text content -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff">
    Tech Security Weekly
  </text>
  <text x="50" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="#ffffff">
    Digest Ollama SolarWinds
  </text>
  
  <!-- Date badge -->
  <rect x="50" y="280" width="280" height="40" rx="6" fill="#1a1f3a" stroke="#4f46e5" stroke-width="2"/>
  <text x="60" y="305" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#a0aec0">
    JANUARY 30, 2026
  </text>
  
  <!-- Tag pills -->
  <rect x="50" y="420" width="100" height="32" rx="16" fill="#dc2626" opacity="0.2"/>
  <text x="70" y="441" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">
    SECURITY
  </text>
  
  <rect x="170" y="420" width="90" height="32" rx="16" fill="#f59e0b" opacity="0.2"/>
  <text x="185" y="441" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">
    THREATS
  </text>
  
  <rect x="280" y="420" width="80" height="32" rx="16" fill="#8b5cf6" opacity="0.2"/>
  <text x="295" y="441" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a78bfa">
    AI/ML
  </text>
  
  <!-- Footer -->
  <text x="50" y="580" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">
    tech.2twodragon.com
  </text>
  
  <!-- Right side: Unique illustration for Tech Security Weekly Digest Ollama SolarWinds -->
  
  <!-- Shield background with gradient overlay -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="networkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  
  <!-- Main shield shape -->
  <path d="M 850 150 L 1050 150 L 1050 350 Q 950 450 850 480 Q 750 450 750 350 L 750 150 Z" 
        fill="url(#shieldGrad)" stroke="#4f46e5" stroke-width="2"/>
  
  <!-- Shield border highlight -->
  <path d="M 850 150 L 1050 150 L 1050 350 Q 950 450 850 480 Q 750 450 750 350 L 750 150 Z" 
        fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  
  <!-- Warning alert symbol in center of shield -->
  <circle cx="900" cy="280" r="45" fill="#dc2626" opacity="0.2" stroke="#ef4444" stroke-width="2"/>
  <text x="900" y="295" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#ef4444" text-anchor="middle">!</text>
  
  <!-- Neural network nodes representing AI/Ollama -->
  <circle cx="780" cy="200" r="8" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="850" cy="170" r="8" fill="#06b6d4" opacity="0.8"/>
  <circle cx="920" cy="190" r="8" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="1000" cy="220" r="8" fill="#06b6d4" opacity="0.8"/>
  <circle cx="1050" cy="300" r="8" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="900" cy="380" r="8" fill="#06b6d4" opacity="0.8"/>
  <circle cx="800" cy="400" r="8" fill="#8b5cf6" opacity="0.8"/>
  
  <!-- Connecting lines for neural network -->
  <line x1="780" y1="200" x2="850" y2="170" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <line x1="850" y1="170" x2="920" y2="190" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <line x1="920" y1="190" x2="1000" y2="220" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <line x1="1000" y1="220" x2="1050" y2="300" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <line x1="1050" y1="300" x2="900" y2="380" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <line x1="900" y1="380" x2="800" y2="400" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <line x1="800" y1="400" x2="780" y2="200" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Vulnerability indicator (crack pattern) -->
  <path d="M 920 250 Q 930 270 920 290 T 910 320" 
        stroke="#ef4444" stroke-width="2" fill="none" opacity="0.7" stroke-dasharray="5,3"/>
  
  <!-- Lock icon indicator -->
  <rect x="930" y="340" width="50" height="55" rx="8" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <path d="M 950 340 Q 960 330 970 340" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <circle cx="955" cy="368" r="4" fill="#ef4444" opacity="0.7"/>
  
  <!-- Data flow indicators (Ollama theme) -->
  <rect x="720" y="450" width="120" height="6" rx="3" fill="#06b6d4" opacity="0.6"/>
  <rect x="720" y="470" width="100" height="6" rx="3" fill="#8b5cf6" opacity="0.6"/>
  <rect x="720" y="490" width="110" height="6" rx="3" fill="#06b6d4" opacity="0.6"/>
  
  <!-- Top decorative accent -->
  <circle cx="1100" cy="100" r="15" fill="#4f46e5" opacity="0.3"/>
  <circle cx="1100" cy="100" r="10" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.6"/>
</svg>