    <line x1="93" y1="93" x2="87" y2="145" stroke="#475569" stroke-width="1"/>
    <line x1="87" y1="145" x2="137" y2="58" stroke="#475569" stroke-width="1"/>
    <line x1="137" y1="58" x2="143" y2="137" stroke="#475569" stroke-width="1"/>
