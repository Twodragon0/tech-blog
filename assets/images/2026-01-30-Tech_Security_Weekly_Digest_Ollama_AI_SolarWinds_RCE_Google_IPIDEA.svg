<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="securityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff1744;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#39ff14;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left side: Text content -->
  <text x="60" y="185" font-family="Inter, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly</text>
  <text x="60" y="245" font-family="Inter, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white">Digest: Ollama &amp; SolarWinds</text>

  <!-- Date badge -->
  <rect x="60" y="280" width="280" height="48" rx="6" fill="rgba(255, 107, 107, 0.15)" stroke="#ff6b6b" stroke-width="1"/>
  <text x="75" y="310" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ff9999">📅 JANUARY 30, 2026</text>

  <!-- Tag pills -->
  <rect x="60" y="420" width="110" height="32" rx="16" fill="rgba(0, 212, 255, 0.2)" stroke="#00d4ff" stroke-width="1"/>
  <text x="75" y="441" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#00d4ff">LLM Security</text>

  <rect x="185" y="420" width="110" height="32" rx="16" fill="rgba(100, 255, 0, 0.2)" stroke="#64ff00" stroke-width="1"/>
  <text x="200" y="441" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#64ff00">Monitoring</text>

  <rect x="310" y="420" width="100" height="32" rx="16" fill="rgba(255, 107, 107, 0.2)" stroke="#ff6b6b" stroke-width="1"/>
  <text x="325" y="441" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ff6b6b">Threats</text>

  <!-- Footer -->
  <text x="60" y="585" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#666666">tech.2twodragon.com</text>

  <!-- Right side: Illustration for Ollama + SolarWinds Security -->
  <!-- Background circles for depth -->
  <circle cx="900" cy="200" r="120" fill="rgba(0, 212, 255, 0.08)"/>
  <circle cx="1050" cy="380" r="100" fill="rgba(100, 255, 0, 0.08)"/>
  <circle cx="800" cy="450" r="90" fill="rgba(255, 107, 107, 0.08)"/>

  <!-- Central shield (security concept) -->
  <path d="M 920 150 L 1000 150 L 1000 250 Q 1000 300 960 320 Q 920 300 920 250 Z" fill="url(#securityGrad)" opacity="0.9" filter="url(#glow)"/>

  <!-- LLM nodes (Ollama representation) -->
  <circle cx="820" cy="200" r="24" fill="url(#llmGrad)" opacity="0.85" filter="url(#glow)"/>
  <circle cx="880" cy="280" r="20" fill="url(#llmGrad)" opacity="0.7"/>
  <circle cx="950" cy="250" r="22" fill="url(#llmGrad)" opacity="0.75" filter="url(#glow)"/>
  <circle cx="1010" cy="200" r="19" fill="url(#llmGrad)" opacity="0.65"/>

  <!-- Connection lines between LLM nodes -->
  <line x1="820" y1="200" x2="880" y2="280" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="880" y1="280" x2="950" y2="250" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="950" y1="250" x2="1010" y2="200" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <line x1="820" y1="200" x2="950" y2="250" stroke="#00d4ff" stroke-width="1.5" opacity="0.3" stroke-dasharray="5,5"/>

  <!-- Threat indicators (SolarWinds context - monitoring threats) -->
  <rect x="750" y="350" width="30" height="30" rx="4" fill="url(#securityGrad)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="820" cy="380" r="16" fill="url(#securityGrad)" opacity="0.7"/>
  <polygon points="900,380 920,360 940,380 920,400" fill="url(#securityGrad)" opacity="0.75" filter="url(#glow)"/>

  <!-- Monitoring dashboards (green lines) -->
  <rect x="950" y="340" width="80" height="60" rx="3" fill="none" stroke="#64ff00" stroke-width="2" opacity="0.7"/>
  <line x1="960" y1="360" x2="1020" y2="360" stroke="#64ff00" stroke-width="1" opacity="0.5"/>
  <line x1="960" y1="375" x2="1020" y2="375" stroke="#64ff00" stroke-width="1" opacity="0.5"/>
  <line x1="960" y1="390" x2="1010" y2="390" stroke="#64ff00" stroke-width="1" opacity="0.5"/>

  <!-- Lock icon (security emphasis) -->
  <rect x="840" y="420" width="40" height="45" rx="5" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  <circle cx="860" cy="430" r="8" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  <line x1="845" y1="430" x2="875" y2="430" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>

  <!-- Data flow arrows (representing monitoring/threats) -->
  <path d="M 920 480 L 920 520" stroke="#64ff00" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowGreen)"/>
  <path d="M 980 500 L 1000 500" stroke="#ff6b6b" stroke-width="2" fill="none" opacity="0.6" marker-end="url(#arrowRed)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64ff00" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ff6b6b" />
    </marker>
  </defs>

  <!-- Bottom accent line -->
  <line x1="0" y1="620" x2="1200" y2="620" stroke="rgba(0, 212, 255, 0.2)" stroke-width="2"/>
</svg>