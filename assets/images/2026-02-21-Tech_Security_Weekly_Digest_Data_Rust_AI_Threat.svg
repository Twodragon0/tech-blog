<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/><stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/><stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/><stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/><stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/><stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="indigoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="100" cy="100" r="200" fill="#3b82f6" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#8b5cf6" fill-opacity="0.05"/>
  <circle cx="600" cy="315" r="300" fill="#dc2626" fill-opacity="0.03"/>

  <!-- Header badges -->
  <rect x="40" y="30" width="200" height="36" rx="18" fill="url(#redGradient)" filter="url(#shadow)"/>
  <text x="140" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">WEEKLY DIGEST</text>
  <rect x="960" y="30" width="200" height="36" rx="18" fill="url(#blueGradient)" filter="url(#shadow)"/>
  <text x="1060" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">February 21, 2026</text>

  <!-- Title -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">Tech &amp; Security Weekly Digest</text>
  <text x="600" y="155" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Vulnerability | AI | Security | Blockchain</text>

  <!-- ===== ROW 1: y=190 ===== -->

  <!-- Card 1: SECURITY - Claude Code Security -->
  <g transform="translate(50, 190)">
    <rect width="340" height="180" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#redGradient)"/>
    <circle cx="40" cy="50" r="24" fill="url(#redGradient)" fill-opacity="0.2"/>
    <text x="40" y="58" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">!</text>
    <text x="80" y="43" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">SECURITY</text>
    <text x="80" y="63" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Claude Code Security Launch</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Anthropic releases AI-powered code</text>
    <text x="20" y="112" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">vulnerability scanner. Integrates into</text>
    <text x="20" y="129" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">CI/CD for DevSecOps Shift-Left.</text>
    <rect x="20" y="150" width="130" height="18" rx="9" fill="url(#redGradient)" fill-opacity="0.2"/>
    <text x="85" y="163" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">The Hacker News</text>
  </g>

  <!-- Card 2: SECURITY - Roundcube KEV Critical -->
  <g transform="translate(430, 190)">
    <rect width="340" height="180" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#redGradient)"/>
    <circle cx="40" cy="50" r="24" fill="url(#redGradient)" fill-opacity="0.2"/>
    <text x="40" y="58" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ef4444" text-anchor="middle">!</text>
    <text x="80" y="43" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444">SECURITY</text>
    <text x="80" y="63" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Roundcube KEV: RCE in the Wild</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">CISA adds 2 Roundcube webmail</text>
    <text x="20" y="112" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">flaws to KEV. CVE-2025-49113</text>
    <text x="20" y="129" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">enables remote code execution.</text>
    <rect x="20" y="150" width="130" height="18" rx="9" fill="url(#redGradient)" fill-opacity="0.2"/>
    <text x="85" y="163" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">The Hacker News</text>
  </g>

  <!-- Card 3: AI/ML - EC-Council AI Certification -->
  <g transform="translate(810, 190)">
    <rect width="340" height="180" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#indigoGradient)"/>
    <circle cx="40" cy="50" r="24" fill="url(#indigoGradient)" fill-opacity="0.2"/>
    <text x="40" y="58" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#818cf8" text-anchor="middle">AI</text>
    <text x="80" y="43" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#818cf8">AI/ML</text>
    <text x="80" y="63" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">EC-Council AI Cert Portfolio +4</text>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">4 new AI certifications plus updated</text>
    <text x="20" y="112" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Certified CISO v4. 700K US workers</text>
    <text x="20" y="129" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">need AI security retraining.</text>
    <rect x="20" y="150" width="130" height="18" rx="9" fill="url(#indigoGradient)" fill-opacity="0.2"/>
    <text x="85" y="163" font-family="Arial, sans-serif" font-size="10" fill="#818cf8" text-anchor="middle">The Hacker News</text>
  </g>

  <!-- ===== ROW 2: y=400 ===== -->

  <!-- Card 4: BLOCKCHAIN - Bitcoin Supreme Court surge -->
  <g transform="translate(50, 400)">
    <rect width="340" height="160" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#orangeGradient)"/>
    <circle cx="40" cy="48" r="24" fill="url(#orangeGradient)" fill-opacity="0.2"/>
    <text x="40" y="56" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">B</text>
    <text x="80" y="41" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">BLOCKCHAIN</text>
    <text x="80" y="61" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Bitcoin Surges on Court Ruling</text>
    <text x="20" y="90" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Supreme Court invalidates Trump tariffs</text>
    <text x="20" y="107" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">6-3. Bitcoin spikes as regulatory</text>
    <text x="20" y="124" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">uncertainty clears from the market.</text>
    <rect x="20" y="136" width="130" height="18" rx="9" fill="url(#orangeGradient)" fill-opacity="0.2"/>
    <text x="85" y="149" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Bitcoin Magazine</text>
  </g>

