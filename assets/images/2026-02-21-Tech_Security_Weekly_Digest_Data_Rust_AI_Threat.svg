    <rect width="340" height="160" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#orangeGradient)"/>
    <circle cx="40" cy="48" r="24" fill="url(#orangeGradient)" fill-opacity="0.2"/>
    <text x="40" y="56" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f59e0b" text-anchor="middle">B</text>
    <text x="80" y="41" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f59e0b">BLOCKCHAIN</text>
    <text x="80" y="61" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">BTC 50% Drop: Quantum Scare?</text>
    <text x="20" y="90" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Bitcoin falls to $67K. Is it quantum</text>
    <text x="20" y="107" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">cryptography fear or capital rotation</text>
    <text x="20" y="124" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">driving the sell-off? Debate ongoing.</text>
    <rect x="20" y="136" width="130" height="18" rx="9" fill="url(#orangeGradient)" fill-opacity="0.2"/>
    <text x="85" y="149" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Bitcoin Magazine</text>
  </g>

  <!-- Card 6: DEVOPS - Amazon EV Fleet -->
  <g transform="translate(810, 400)">
    <rect width="340" height="160" rx="16" fill="url(#cardGradient)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="6" rx="3" fill="url(#greenGradient)"/>
    <circle cx="40" cy="48" r="24" fill="url(#greenGradient)" fill-opacity="0.2"/>
    <text x="40" y="56" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">D</text>
    <text x="80" y="41" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">DEVOPS</text>
    <text x="80" y="61" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Amazon Grows Solar EV Van Fleet</text>
    <text x="20" y="90" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Solar-powered semis and BetterFleet</text>
    <text x="20" y="107" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">integration expands green logistics.</text>
    <text x="20" y="124" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Sustainable delivery fleet scale-up.</text>
    <rect x="20" y="136" width="80" height="18" rx="9" fill="url(#greenGradient)" fill-opacity="0.2"/>
    <text x="60" y="149" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Electrek</text>
  </g>

  <!-- Footer -->
  <line x1="50" y1="585" x2="1150" y2="585" stroke="#334155" stroke-width="1"/>
  <text x="600" y="612" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">15 News | 5 Security | 5 Blockchain | 0 Cloud | 0 DevOps | 0 AI/ML  |  tech.2twodragon.com</text>
</svg>
