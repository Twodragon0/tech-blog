<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- ===== LEFT SIDE (x=0-650) ===== -->

  <!-- Date badge -->
  <rect x="50" y="50" width="220" height="40" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="160" y="76" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" letter-spacing="1">FEBRUARY 21, 2026</text>

  <!-- Title "Tech Security Weekly" -->
  <text x="60" y="210" font-size="48" font-weight="800" fill="white" font-family="system-ui, -apple-system, sans-serif">Tech Security</text>
  <text x="60" y="265" font-size="48" font-weight="800" fill="white" font-family="system-ui, -apple-system, sans-serif">Weekly</text>

  <!-- Subtitle "Digest Data Rust" -->
  <text x="60" y="330" font-size="44" font-weight="700" fill="#f59e0b" font-family="system-ui, -apple-system, sans-serif">Digest Data Rust</text>

  <!-- Tag pills -->
  <rect x="60" y="420" width="100" height="36" rx="18" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="110" y="446" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Security</text>

  <rect x="180" y="420" width="85" height="36" rx="18" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="222" y="446" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Data</text>

  <rect x="285" y="420" width="85" height="36" rx="18" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="327" y="446" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">Rust</text>

  <!-- Footer -->
  <text x="60" y="565" font-size="14" font-weight="500" fill="white" opacity="0.65" font-family="system-ui, -apple-system, sans-serif">tech.2twodragon.com</text>

  <!-- ===== RIGHT SIDE VISUAL SCENE (x=650-1150, y=80-550) ===== -->

  <!-- Decorative grid background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b82f6" stroke-width="0.3" opacity="0.05"/>
    </pattern>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" opacity="0.7"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f59e0b" opacity="0.7"/>
    </marker>
  </defs>

  <rect x="650" y="80" width="500" height="470" fill="url(#grid)"/>

  <!-- Shield with checkmark (security/compliance) - Top Center -->
  <g>
    <!-- Shield outline -->
    <path d="M 920 130 L 975 165 L 975 310 C 975 380 920 430 920 430 C 920 430 865 380 865 310 L 865 165 Z"
          fill="#3b82f6" opacity="0.10" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Checkmark inside shield -->
    <path d="M 895 340 L 915 360 L 945 310"
          fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Database cylinder (left-bottom) -->
  <g>
    <!-- Top ellipse of cylinder -->
    <ellipse cx="750" cy="320" rx="48" ry="22" fill="#f59e0b" opacity="0.10" stroke="#f59e0b" stroke-width="2.2"/>

    <!-- Body of cylinder -->
    <rect x="702" y="320" width="96" height="110" fill="#f59e0b" opacity="0.06" stroke="#f59e0b" stroke-width="2.2"/>

    <!-- Bottom ellipse of cylinder -->
    <ellipse cx="750" cy="430" rx="48" ry="22" fill="#f59e0b" opacity="0.10" stroke="#f59e0b" stroke-width="2.2"/>

    <!-- Database rings (visual detail) -->
    <ellipse cx="750" cy="355" rx="48" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.4"/>
    <ellipse cx="750" cy="385" rx="48" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.4"/>

    <!-- Warning icons on database -->
    <circle cx="785" cy="330" r="14" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.8"/>
    <text x="785" y="339" font-size="18" font-weight="800" fill="#ef4444" text-anchor="middle" font-family="system-ui">!</text>

    <circle cx="720" cy="370" r="14" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.8"/>
    <text x="720" y="379" font-size="18" font-weight="800" fill="#ef4444" text-anchor="middle" font-family="system-ui">!</text>
  </g>

  <!-- Data flow arrows connecting elements -->

  <!-- Arrow from database to shield (blue flow) -->
  <path d="M 800 350 Q 860 300 890 250"
        fill="none" stroke="#3b82f6" stroke-width="2.8" opacity="0.6"
        marker-end="url(#arrowblue)" stroke-dasharray="6,4"/>

  <!-- Arrow from shield back to database (orange flow) -->
  <path d="M 880 380 Q 820 380 790 380"
        fill="none" stroke="#f59e0b" stroke-width="2.8" opacity="0.5"
        marker-end="url(#arroworange)" stroke-dasharray="6,4"/>

  <!-- Warning triangle indicators -->
  <g>
    <!-- Top-right warning -->
    <polygon points="1050,140 1075,200 1025,200"
             fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="1050" y="190" font-size="22" font-weight="800" fill="#ef4444" text-anchor="middle">!</text>

    <!-- Bottom-right warning -->
    <polygon points="1080,450 1105,510 1055,510"
             fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="1080" y="500" font-size="22" font-weight="800" fill="#ef4444" text-anchor="middle">!</text>
  </g>

  <!-- Alert pulse circles -->
  <circle cx="1050" cy="140" r="10" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="1.8"/>
  <circle cx="1080" cy="450" r="10" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="1.8"/>

  <!-- Data packet visualization lines -->
  <path d="M 700 180 L 760 220 L 820 170 L 880 210 L 940 160"
        fill="none" stroke="#3b82f6" stroke-width="1.8" opacity="0.25" stroke-dasharray="4,4" stroke-linecap="round"/>

  <path d="M 700 500 L 760 470 L 820 490 L 880 460 L 940 480"
        fill="none" stroke="#f59e0b" stroke-width="1.8" opacity="0.20" stroke-dasharray="4,4" stroke-linecap="round"/>

  <!-- Connecting data nodes -->
  <circle cx="700" cy="180" r="5" fill="#3b82f6" opacity="0.35"/>
  <circle cx="760" cy="220" r="5" fill="#3b82f6" opacity="0.35"/>
  <circle cx="820" cy="170" r="5" fill="#3b82f6" opacity="0.35"/>
  <circle cx="880" cy="210" r="5" fill="#3b82f6" opacity="0.35"/>
  <circle cx="940" cy="160" r="5" fill="#3b82f6" opacity="0.35"/>

  <circle cx="700" cy="500" r="5" fill="#f59e0b" opacity="0.30"/>
  <circle cx="760" cy="470" r="5" fill="#f59e0b" opacity="0.30"/>
  <circle cx="820" cy="490" r="5" fill="#f59e0b" opacity="0.30"/>
  <circle cx="880" cy="460" r="5" fill="#f59e0b" opacity="0.30"/>
  <circle cx="940" cy="480" r="5" fill="#f59e0b" opacity="0.30"/>

  <!-- Accent elements -->
  <rect x="1000" y="260" width="120" height="3" rx="1.5" fill="#3b82f6" opacity="0.25"/>
  <rect x="1000" y="280" width="95" height="3" rx="1.5" fill="#f59e0b" opacity="0.20"/>

</svg>