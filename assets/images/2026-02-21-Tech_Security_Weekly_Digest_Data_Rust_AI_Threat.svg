<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left Side Content -->
  <!-- Title -->
  <text x="60" y="185" font-size="46" font-weight="bold" fill="white" font-family="system-ui, -apple-system, sans-serif" letter-spacing="-1">Tech Security Weekly</text>
  <text x="60" y="245" font-size="46" font-weight="bold" fill="white" font-family="system-ui, -apple-system, sans-serif" letter-spacing="-1">Digest Data Rust</text>
  
  <!-- Date Badge -->
  <rect x="60" y="280" width="220" height="36" fill="#1a1d2e" rx="4" stroke="#4a5f8f" stroke-width="1"/>
  <text x="75" y="304" font-size="14" font-weight="600" fill="#8fa3d0" font-family="system-ui, -apple-system, sans-serif">FEBRUARY 21, 2026</text>
  
  <!-- Tag Pills -->
  <g id="tags">
    <!-- Tag 1: Security -->
    <rect x="60" y="420" width="110" height="32" fill="#2a3a5a" rx="16" stroke="#6b8fcf" stroke-width="1"/>
    <text x="115" y="442" font-size="13" font-weight="500" fill="#8fa3d0" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">security</text>
    
    <!-- Tag 2: Rust -->
    <rect x="185" y="420" width="90" height="32" fill="#3a2a1a" rx="16" stroke="#b87533" stroke-width="1"/>
    <text x="230" y="442" font-size="13" font-weight="500" fill="#d4804f" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">rust</text>
    
    <!-- Tag 3: Data -->
    <rect x="290" y="420" width="80" height="32" fill="#2a3a2a" rx="16" stroke="#6ba86b" stroke-width="1"/>
    <text x="330" y="442" font-size="13" font-weight="500" fill="#8fc48f" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">data</text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="600" font-size="12" fill="#6b7a9e" font-family="system-ui, -apple-system, sans-serif">tech.2twodragon.com</text>
  
  <!-- Right Side Illustration: Security + Rust + Data -->
  <!-- Background accent -->
  <rect x="700" y="0" width="500" height="630" fill="#0f1420" opacity="0.6"/>
  
  <!-- Decorative gradient overlay circles -->
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4a7fff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4a7fff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4804f;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#d4804f;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="dataFlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ba86b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4a7fff;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background glows -->
  <circle cx="850" cy="150" r="120" fill="url(#glow1)"/>
  <circle cx="1000" cy="400" r="100" fill="url(#glow2)"/>
  
  <!-- Central Security Shield with Rust Crab Icon -->
  <g id="main-shield">
    <!-- Shield base -->
    <path d="M 900 120 L 950 140 L 960 220 Q 960 280 900 320 Q 840 280 840 220 L 850 140 Z" fill="#2a3a5a" stroke="#6b8fcf" stroke-width="2"/>
    
    <!-- Lock inside shield -->
    <rect x="880" y="180" width="40" height="35" fill="#4a7fff" rx="3" opacity="0.8"/>
    <circle cx="900" cy="195" r="8" fill="#0a0c1a" stroke="#6b8fcf" stroke-width="1.5"/>
    <rect x="895" y="205" width="10" height="15" fill="#4a7fff"/>
  </g>
  
  <!-- Rust-inspired elements on left -->
  <!-- Crab claw shapes -->
  <g id="rust-crab" transform="translate(750, 280)">
    <!-- Left claw -->
    <path d="M 0 0 Q -30 -20 -40 -35" fill="none" stroke="#d4804f" stroke-width="3" stroke-linecap="round"/>
    <!-- Right claw -->
    <path d="M 0 0 Q 30 -20 40 -35" fill="none" stroke="#d4804f" stroke-width="3" stroke-linecap="round"/>
    <!-- Body -->
    <circle cx="0" cy="0" r="12" fill="#b87533"/>
  </g>
  
  <!-- Data network visualization -->
  <g id="data-network" opacity="0.7">
    <!-- Data nodes -->
    <circle cx="800" cy="480" r="6" fill="#6ba86b" stroke="#8fc48f" stroke-width="1"/>
    <circle cx="870" cy="520" r="6" fill="#6ba86b" stroke="#8fc48f" stroke-width="1"/>
    <circle cx="930" cy="480" r="6" fill="#6ba86b" stroke="#8fc48f" stroke-width="1"/>
    <circle cx="1000" cy="540" r="6" fill="#6ba86b" stroke="#8fc48f" stroke-width="1"/>
    
    <!-- Connection lines -->
    <line x1="800" y1="480" x2="870" y2="520" stroke="#6ba86b" stroke-width="1.5" opacity="0.6"/>
    <line x1="870" y1="520" x2="930" y2="480" stroke="#6ba86b" stroke-width="1.5" opacity="0.6"/>
    <line x1="930" y1="480" x2="1000" y2="540" stroke="#6ba86b" stroke-width="1.5" opacity="0.6"/>
    <line x1="800" y1="480" x2="930" y2="480" stroke="#6ba86b" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Database cylinder for data representation -->
  <g id="database" transform="translate(1050, 380)">
    <!-- Top ellipse -->
    <ellipse cx="0" cy="0" rx="22" ry="8" fill="#4a7fff" opacity="0.6" stroke="#6b8fcf" stroke-width="1"/>
    <!-- Main body -->
    <rect x="-22" y="0" width="44" height="50" fill="#2a3a5a" stroke="#6b8fcf" stroke-width="1"/>
    <!-- Bottom ellipse -->
    <ellipse cx="0" cy="50" rx="22" ry="8" fill="#1a2a4a" stroke="#6b8fcf" stroke-width="1"/>
    <!-- Data bars inside -->
    <rect x="-16" y="10" width="32" height="3" fill="#4a7fff" opacity="0.7"/>
    <rect x="-16" y="18" width="32" height="3" fill="#4a7fff" opacity="0.7"/>
    <rect x="-16" y="26" width="32" height="3" fill="#4a7fff" opacity="0.7"/>
    <rect x="-16" y="34" width="32" height="3" fill="#4a7fff" opacity="0.7"/>
  </g>
  
  <!-- Accent lines for visual flow -->
  <line x1="700" y1="50" x2="1150" y2="50" stroke="#6b8fcf" stroke-width="1" opacity="0.3"/>
  <line x1="700" y1="630" x2="1150" y2="630" stroke="#6b8fcf" stroke-width="1" opacity="0.3"/>
</svg>