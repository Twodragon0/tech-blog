<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Cisco CVE, AWS Security Threat - Security Weekly 2026-03-06</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="180" cy="180" r="280" fill="#a855f7" opacity="0.05" filter="url(#sg)"/>
  <circle cx="1080" cy="480" r="220" fill="#6366f1" opacity="0.07" filter="url(#sg)"/>
  <!-- Cloud icon with shield -->
  <g transform="translate(960,300)" filter="url(#glow)" opacity="0.65">
    <!-- Cloud shape -->
    <path d="M-60,20 Q-80,20 -80,0 Q-80,-25 -55,-25 Q-55,-55 -25,-55 Q0,-70 25,-55 Q45,-60 55,-45 Q75,-45 75,-25 Q75,0 55,20 Z" fill="none" stroke="#a855f7" stroke-width="2.5"/>
    <path d="M-60,20 Q-80,20 -80,0 Q-80,-25 -55,-25 Q-55,-55 -25,-55 Q0,-70 25,-55 Q45,-60 55,-45 Q75,-45 75,-25 Q75,0 55,20 Z" fill="#a855f7" opacity="0.07"/>
    <!-- AWS label -->
    <text x="0" y="-15" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#a855f7" text-anchor="middle" opacity="0.9">AWS</text>
    <!-- Shield below -->
    <path d="M0,30 L18,38 L18,55 C18,65 0,73 0,73 C0,73 -18,65 -18,55 L-18,38 Z" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="0" y="57" font-family="Arial,sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">!</text>
  </g>
  <!-- Date + category -->
  <rect x="70" y="44" width="158" height="34" rx="17" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="1.5"/>
  <text x="149" y="66" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#c084fc" text-anchor="middle">March 6, 2026</text>
  <rect x="248" y="44" width="120" height="34" rx="17" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="308" y="66" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#a5b4fc" text-anchor="middle">CLOUD</text>
  <!-- Title -->
  <text x="70" y="195" font-family="Arial,sans-serif" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">Cisco CVE</text>
  <text x="70" y="254" font-family="Arial,sans-serif" font-size="48" font-weight="bold" fill="white" filter="url(#glow)">AWS Threat Intel</text>
  <text x="70" y="310" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.58)">Weekly Security Digest</text>
  <!-- Keywords -->
  <rect x="70" y="370" width="138" height="36" rx="18" fill="rgba(168,85,247,0.15)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="139" y="393" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#c084fc" text-anchor="middle">Cisco CVE</text>
  <rect x="228" y="370" width="88" height="36" rx="18" fill="rgba(99,102,241,0.14)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="272" y="393" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#a5b4fc" text-anchor="middle">AWS</text>
  <rect x="336" y="370" width="78" height="36" rx="18" fill="rgba(245,158,11,0.14)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="375" y="393" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle">KEV</text>
  <!-- Accent bar -->
  <rect x="70" y="437" width="360" height="4" rx="2" fill="url(#acc)"/>
  <!-- Footer -->
  <line x1="50" y1="592" x2="1150" y2="592" stroke="#1e1b4b" stroke-width="1" opacity="0.7"/>
  <text x="1150" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="end">tech.2twodragon.com</text>
  <text x="70" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b">DevSecOps Weekly Intel</text>
</svg>
