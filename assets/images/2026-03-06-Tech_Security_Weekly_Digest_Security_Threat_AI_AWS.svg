<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#1a1020"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="25"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="270" r="260" fill="#ef4444" opacity="0.04" filter="url(#sg)"/>
  <!-- CVE Vulnerability Network Map -->
  <g transform="translate(600,260)">
    <!-- Central CVE node -->
    <circle cx="0" cy="0" r="45" fill="#1e293b" stroke="#ef4444" stroke-width="3"/>
    <text x="0" y="-8" font-family="Courier New" font-size="10" fill="#fca5a5" text-anchor="middle">CVE-2026</text>
    <text x="0" y="8" font-family="Courier New" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle">20122</text>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.2"/>
    <!-- Connected vulnerability nodes -->
    <!-- Cisco -->
    <line x1="45" y1="-20" x2="140" y2="-80" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <circle cx="160" cy="-90" r="30" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="160" y="-93" font-family="Courier New" font-size="9" fill="#fde68a" text-anchor="middle">CISCO</text>
    <text x="160" y="-80" font-family="Courier New" font-size="8" fill="#f59e0b" text-anchor="middle">RCE</text>
    <!-- AWS -->
    <line x1="40" y1="25" x2="150" y2="70" stroke="#f97316" stroke-width="1.5" opacity="0.5"/>
    <circle cx="170" cy="80" r="30" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
    <text x="170" y="77" font-family="Courier New" font-size="9" fill="#fdba74" text-anchor="middle">AWS</text>
    <text x="170" y="90" font-family="Courier New" font-size="8" fill="#f97316" text-anchor="middle">IAM</text>
    <!-- Linux kernel -->
    <line x1="-45" y1="-20" x2="-140" y2="-80" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-160" cy="-90" r="30" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="-160" y="-93" font-family="Courier New" font-size="9" fill="#fca5a5" text-anchor="middle">LINUX</text>
    <text x="-160" y="-80" font-family="Courier New" font-size="8" fill="#ef4444" text-anchor="middle">KERNEL</text>
    <!-- AI model -->
    <line x1="-40" y1="25" x2="-150" y2="70" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-170" cy="80" r="30" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="-170" y="77" font-family="Courier New" font-size="9" fill="#c4b5fd" text-anchor="middle">AI</text>
    <text x="-170" y="90" font-family="Courier New" font-size="8" fill="#8b5cf6" text-anchor="middle">MODEL</text>
    <!-- Outer threat ring -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="#334155" stroke-width="1" opacity="0.3" stroke-dasharray="6,4"/>
    <!-- Severity indicators -->
    <g transform="translate(0,-160)">
      <rect x="-35" y="-12" width="70" height="24" rx="12" fill="#ef4444" opacity="0.9"/>
      <text x="0" y="4" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">CRITICAL</text>
    </g>
    <!-- Secondary connections -->
    <line x1="160" y1="-60" x2="170" y2="50" stroke="#475569" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
    <line x1="-160" y1="-60" x2="-170" y2="50" stroke="#475569" stroke-width="0.8" opacity="0.3" stroke-dasharray="3,3"/>
  </g>
  <text x="600" y="510" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">CVE Threat Network</text>
  <text x="600" y="548" font-family="Arial,sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">CVE-2026-20122 | Cisco RCE | AWS Security</text>
  <rect x="40" y="25" width="160" height="32" rx="16" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="47" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fca5a5" text-anchor="middle">WEEKLY DIGEST</text>
  <rect x="1000" y="25" width="160" height="32" rx="16" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="1080" y="47" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#93c5fd" text-anchor="middle">March 6, 2026</text>
  <text x="1160" y="615" font-family="Arial,sans-serif" font-size="13" fill="#475569" text-anchor="end">tech.2twodragon.com</text>
</svg>