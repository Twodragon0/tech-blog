<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="None" height="None">
  <title>Tech Security Weekly Digest Security Threat AI AWS</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left side: Title, date, tags, footer -->
  <text x="60" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5px">Tech Security Weekly</text>
  <text x="60" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5px">Digest Security Threat</text>
  
  <!-- Date badge -->
  <g>
    <rect x="60" y="270" width="240" height="40" rx="6" fill="#1a1f3a" stroke="#4a63ff" stroke-width="1.5"/>
    <text x="70" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4a63ff">📅 MARCH 6, 2026</text>
  </g>
  
  <!-- Tag pills -->
  <g>
    <!-- Tag 1 -->
    <rect x="60" y="420" width="110" height="32" rx="16" fill="#ff2d55" opacity="0.15"/>
    <text x="115" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ff2d55" text-anchor="middle">Security</text>
    
    <!-- Tag 2 -->
    <rect x="185" y="420" width="110" height="32" rx="16" fill="#4a63ff" opacity="0.15"/>
    <text x="240" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4a63ff" text-anchor="middle">Threat</text>
    
    <!-- Tag 3 -->
    <rect x="310" y="420" width="110" height="32" rx="16" fill="#ffd700" opacity="0.15"/>
    <text x="365" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffd700" text-anchor="middle">Digest</text>
  </g>
  
  <!-- Footer -->
  <text x="60" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666" letter-spacing="0.5px">tech.2twodragon.com</text>
  
  <!-- Right side: Unique illustration for security threat digest -->
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="threatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d55;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff1744;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="warningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffa500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="infoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a63ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background accent circle (subtle) -->
  <circle cx="950" cy="150" r="200" fill="#ff2d55" opacity="0.08"/>
  
  <!-- Threat card stack - bottom card -->
  <g transform="translate(750, 380)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#1a1f3a" stroke="#666" stroke-width="1" opacity="0.6"/>
    <rect x="8" y="8" width="10" height="104" rx="2" fill="url(#threatGrad)"/>
    <circle cx="140" cy="25" r="4" fill="#ff2d55" opacity="0.6"/>
    <circle cx="140" cy="45" r="4" fill="#ff2d55" opacity="0.4"/>
    <line x1="30" y1="25" x2="120" y2="25" stroke="#666" stroke-width="1"/>
    <line x1="30" y1="50" x2="100" y2="50" stroke="#666" stroke-width="0.8" opacity="0.5"/>
  </g>
  
  <!-- Threat card stack - middle card -->
  <g transform="translate(780, 340)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#1a2a3a" stroke="#ff2d55" stroke-width="1.5" opacity="0.8"/>
    <rect x="8" y="8" width="10" height="104" rx="2" fill="url(#threatGrad)"/>
    <circle cx="140" cy="25" r="5" fill="#ff2d55"/>
    <circle cx="140" cy="45" r="5" fill="#ff2d55" opacity="0.7"/>
    <line x1="30" y1="25" x2="120" y2="25" stroke="#ff2d55" stroke-width="1.5"/>
    <line x1="30" y1="50" x2="110" y2="50" stroke="#ff2d55" stroke-width="1" opacity="0.7"/>
    <text x="30" y="85" font-family="monospace" font-size="9" fill="#ff2d55" opacity="0.8">CRITICAL</text>
  </g>
  
  <!-- Threat card stack - top card -->
  <g transform="translate(810, 300)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#0f1419" stroke="#ff2d55" stroke-width="2"/>
    <rect x="8" y="8" width="10" height="104" rx="2" fill="url(#threatGrad)"/>
    <!-- Warning icon -->
    <polygon points="94,25 90,40 98,40" fill="#ff2d55"/>
    <circle cx="94" cy="45" r="1.5" fill="#ff2d55"/>
    <!-- Title line -->
    <line x1="30" y1="25" x2="80" y2="25" stroke="#ff2d55" stroke-width="2"/>
    <line x1="30" y1="40" x2="120" y2="40" stroke="#ff2d55" stroke-width="1" opacity="0.8"/>
    <line x1="30" y1="55" x2="115" y2="55" stroke="#ff2d55" stroke-width="1" opacity="0.6"/>
    <text x="30" y="85" font-family="monospace" font-size="10" fill="#ff2d55" font-weight="bold">NEW THREAT</text>
  </g>
  
  <!-- Calendar/Week indicator -->
  <g transform="translate(700, 100)">
    <!-- Calendar frame -->
    <rect x="0" y="0" width="70" height="70" rx="6" fill="#1a1f3a" stroke="#4a63ff" stroke-width="1.5"/>
    <!-- Days of week header -->
    <g>
      <text x="7" y="20" font-family="monospace" font-size="8" fill="#4a63ff" font-weight="bold">M</text>
      <text x="19" y="20" font-family="monospace" font-size="8" fill="#4a63ff" font-weight="bold">T</text>
      <text x="31" y="20" font-family="monospace" font-size="8" fill="#4a63ff" font-weight="bold">W</text>
      <text x="43" y="20" font-family="monospace" font-size="8" fill="#4a63ff" font-weight="bold">T</text>
      <text x="55" y="20" font-family="monospace" font-size="8" fill="#4a63ff" font-weight="bold">F</text>
    </g>
    <!-- Date 6 highlighted -->
    <circle cx="31" cy="38" r="8" fill="#4a63ff" opacity="0.3"/>
    <text x="28" y="42" font-family="monospace" font-size="12" fill="#4a63ff" font-weight="bold">6</text>
    <!-- Week indicator -->
    <line x1="5" y1="55" x2="65" y2="55" stroke="#4a63ff" stroke-width="2" opacity="0.5"/>
    <text x="10" y="68" font-family="monospace" font-size="7" fill="#4a63ff" opacity="0.8">WK 10</text>
  </g>
  
  <!-- Shield with threat level -->
  <g transform="translate(900, 110)">
    <!-- Shield outline -->
    <path d="M 30 5 L 50 15 L 50 40 Q 30 55 30 55 Q 10 55 10 40 L 10 15 Z" fill="none" stroke="#ff2d55" stroke-width="2" opacity="0.8"/>
    <!-- Threat indicator bars -->
    <rect x="18" y="28" width="4" height="8" fill="#ff2d55" opacity="0.9"/>
    <rect x="25" y="24" width="4" height="12" fill="#ff2d55" opacity="0.7"/>
    <rect x="32" y="20" width="4" height="16" fill="#ff2d55" opacity="0.5"/>
    <rect x="39" y="24" width="4" height="12" fill="#ff2d55" opacity="0.7"/>
  </g>
  
  <!-- Connecting pulse/signal lines -->
  <g stroke="#4a63ff" stroke-width="1" opacity="0.4" stroke-dasharray="2,2">
    <line x1="770" y1="150" x2="820" y2="200"/>
    <line x1="820" y1="150" x2="870" y2="200"/>
  </g>
  
  <!-- Data flow indicator (threat feeds) -->
  <g transform="translate(950, 500)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#4a63ff" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#ff2d55" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="5" fill="#4a63ff" opacity="0.6"/>
    <!-- Feed lines radiating -->
    <line x1="0" y1="-25" x2="0" y2="-35" stroke="#4a63ff" stroke-width="1" opacity="0.6"/>
    <line x1="18" y1="-18" x2="25" y2="-25" stroke="#ff2d55" stroke-width="1" opacity="0.6"/>
    <line x1="25" y1="0" x2="35" y2="0" stroke="#4a63ff" stroke-width="1" opacity="0.6"/>
  </g>
</svg>