<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Security-Digest-Monthly-Index</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c1a"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="472" x2="1200" y2="472" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="550" x2="1200" y2="550" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="1100" y1="0" x2="1100" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Decorative illustration: Stacked document pages with shield and calendar grid -->
  <!-- Back document page -->
  <rect x="910" y="145" width="200" height="180" rx="8" fill="#ef4444" fill-opacity="0.05" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Middle document page -->
  <rect x="900" y="155" width="200" height="180" rx="8" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Front document page -->
  <rect x="890" y="165" width="200" height="180" rx="8" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Document header bar -->
  <rect x="890" y="165" width="200" height="30" rx="8" fill="#ef4444" fill-opacity="0.12"/>
  <rect x="890" y="185" width="200" height="10" fill="#ef4444" fill-opacity="0.12"/>
  <!-- Calendar grid lines on front page -->
  <line x1="920" y1="210" x2="1060" y2="210" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="920" y1="235" x2="1060" y2="235" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="920" y1="260" x2="1060" y2="260" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="920" y1="285" x2="1060" y2="285" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="920" y1="310" x2="1060" y2="310" stroke="#ef4444" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="955" y1="200" x2="955" y2="330" stroke="#ef4444" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="990" y1="200" x2="990" y2="330" stroke="#ef4444" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="1025" y1="200" x2="1025" y2="330" stroke="#ef4444" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Shield icon overlaying documents -->
  <path d="M990,140 L1020,152 L1020,180 C1020,200 990,215 990,215 C990,215 960,200 960,180 L960,152 Z" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Lock on shield -->
  <rect x="981" y="172" width="18" height="14" rx="3" fill="none" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1.5"/>
  <path d="M985,172 L985,166 C985,162 995,162 995,166 L995,172" fill="none" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1.5"/>
  <circle cx="990" cy="179" r="2" fill="#f59e0b" fill-opacity="0.35"/>
  <!-- Checkmarks on calendar cells (weekly digest markers) -->
  <path d="M930,220 L935,226 L945,216" fill="none" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1.5"/>
  <path d="M930,245 L935,251 L945,241" fill="none" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1.5"/>
  <path d="M930,270 L935,276 L945,266" fill="none" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1.5"/>
  <path d="M930,295 L935,301 L945,291" fill="none" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Small bar chart lines representing digest entries -->
  <rect x="965" y="222" width="20" height="6" rx="2" fill="#ef4444" fill-opacity="0.15"/>
  <rect x="965" y="247" width="28" height="6" rx="2" fill="#f59e0b" fill-opacity="0.15"/>
  <rect x="965" y="272" width="16" height="6" rx="2" fill="#ef4444" fill-opacity="0.15"/>
  <rect x="965" y="297" width="24" height="6" rx="2" fill="#f59e0b" fill-opacity="0.15"/>

  <!-- Alert dots -->
  <circle cx="860" cy="400" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="878" cy="418" r="3" fill="#f59e0b" opacity="0.5"/>
  <circle cx="896" cy="436" r="3.5" fill="#ef4444" opacity="0.4"/>

  <!-- Large background circles -->
  <circle cx="1050" cy="450" r="200" fill="#ef4444" opacity="0.02"/>
  <circle cx="1050" cy="450" r="140" fill="#f59e0b" opacity="0.03"/>

  <!-- Left accent bar -->
  <rect x="60" y="160" width="6" height="260" rx="3" fill="url(#barGrad)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="190" height="36" rx="18" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="175" y="84" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="600">MARCH 30, 2026</text>

  <!-- Main title -->
  <text x="80" y="185" font-family="Arial, Helvetica, sans-serif" font-size="46" fill="#ffffff" font-weight="bold">Security Digest</text>
  <text x="80" y="245" font-family="Arial, Helvetica, sans-serif" font-size="46" fill="#ffffff" font-weight="bold">Monthly Index</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#ffffff" opacity="0.55">Weekly threat roundup: CVEs, cloud &amp; AI security</text>

  <!-- Accent gradient line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ef4444" font-weight="600" letter-spacing="2">SECURITY</text>

  <!-- Keyword tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="145" y="425" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="500">Threat Intel</text>

  <rect x="225" y="402" width="140" height="36" rx="18" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="295" y="425" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" font-weight="500">CVE Tracking</text>

  <rect x="380" y="402" width="150" height="36" rx="18" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
  <text x="455" y="425" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="500">Cloud Security</text>

  <!-- Bottom rule -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Footer -->
  <text x="600" y="610" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff" opacity="0.3" text-anchor="middle">tech.2twodragon.com</text>
</svg>