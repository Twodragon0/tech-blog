<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="illGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="illGradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Illustration section (right side) -->
  <!-- Background accent shapes -->
  <circle cx="920" cy="120" r="80" fill="#6366f1" opacity="0.15"/>
  <circle cx="1050" cy="380" r="100" fill="#3b82f6" opacity="0.1"/>
  
  <!-- Weekly calendar indicator -->
  <g transform="translate(750, 140)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2" opacity="0.8"/>
    <text x="70" y="45" font-size="24" font-weight="bold" fill="#6366f1" text-anchor="middle">WEEKLY</text>
    <text x="70" y="85" font-size="36" font-weight="bold" fill="#3b82f6" text-anchor="middle">2026</text>
    <circle cx="35" cy="120" r="5" fill="#10b981"/>
    <circle cx="70" cy="120" r="5" fill="#10b981"/>
    <circle cx="105" cy="120" r="5" fill="#10b981"/>
  </g>
  
  <!-- Vendor cards stack -->
  <g>
    <!-- Card 1 - Top -->
    <rect x="760" y="310" width="220" height="95" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
    <rect x="770" y="318" width="35" height="35" rx="4" fill="url(#illGradient1)" opacity="0.7"/>
    <circle cx="787" cy="335" r="8" fill="#6366f1" opacity="0.6"/>
    <text x="815" y="330" font-size="13" font-weight="600" fill="#e2e8f0">Vendor Profile A</text>
    <text x="815" y="348" font-size="11" fill="#cbd5e1">Security Updates</text>
    <line x1="770" y1="360" x2="970" y2="360" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <text x="815" y="378" font-size="10" fill="#94a3b8">Latest threats analyzed</text>
  </g>
  
  <!-- Card 2 - Middle -->
  <g>
    <rect x="800" y="390" width="220" height="95" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.85"/>
    <rect x="810" y="398" width="35" height="35" rx="4" fill="url(#illGradient2)" opacity="0.7"/>
    <circle cx="827" cy="415" r="8" fill="#10b981" opacity="0.6"/>
    <text x="855" y="410" font-size="13" font-weight="600" fill="#e2e8f0">Vendor Profile B</text>
    <text x="855" y="428" font-size="11" fill="#cbd5e1">CVE Intelligence</text>
    <line x1="810" y1="440" x2="1010" y2="440" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <text x="855" y="458" font-size="10" fill="#94a3b8">Patch recommendations</text>
  </g>
  
  <!-- Card 3 - Bottom -->
  <g>
    <rect x="840" y="470" width="220" height="95" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <rect x="850" y="478" width="35" height="35" rx="4" fill="#f59e0b" opacity="0.2"/>
    <circle cx="867" cy="495" r="8" fill="#f59e0b" opacity="0.6"/>
    <text x="895" y="490" font-size="13" font-weight="600" fill="#e2e8f0">Vendor Profile C</text>
    <text x="895" y="508" font-size="11" fill="#cbd5e1">Threat Reports</text>
    <line x1="850" y1="520" x2="1050" y2="520" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
    <text x="895" y="538" font-size="10" fill="#94a3b8">Weekly summary digest</text>
  </g>
  
  <!-- Magnifying glass review icon -->
  <g transform="translate(1040, 240)" filter="url(#glow)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.7"/>
    <line x1="22" y1="22" x2="45" y2="45" stroke="#3b82f6" stroke-width="3" opacity="0.7"/>
    <path d="M -8 -15 Q -12 -8 -10 0" fill="none" stroke="#10b981" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Analysis indicator -->
  <g transform="translate(1080, 480)">
    <circle cx="0" cy="0" r="25" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
    <text x="0" y="8" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">✓</text>
  </g>
  
  <!-- Left side - Text -->
  <!-- Title -->
  <text x="50" y="185" font-size="46" font-weight="700" fill="#ffffff" font-family="sans-serif">Security Vendor</text>
  <text x="50" y="245" font-size="46" font-weight="700" fill="#6366f1" font-family="sans-serif">Blog Weekly Review</text>
  
  <!-- Date badge -->
  <rect x="50" y="275" width="280" height="50" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <text x="190" y="305" font-size="16" font-weight="600" fill="#3b82f6" text-anchor="middle">JANUARY 22, 2026</text>
  
  <!-- Tag pills -->
  <g>
    <!-- Tag 1 -->
    <rect x="50" y="420" width="110" height="38" rx="19" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1.5"/>
    <text x="105" y="445" font-size="13" font-weight="600" fill="#6366f1" text-anchor="middle">Vulnerabilities</text>
    
    <!-- Tag 2 -->
    <rect x="180" y="420" width="110" height="38" rx="19" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
    <text x="235" y="445" font-size="13" font-weight="600" fill="#10b981" text-anchor="middle">Threat Intel</text>
    
    <!-- Tag 3 -->
    <rect x="310" y="420" width="110" height="38" rx="19" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="365" y="445" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Risk Analysis</text>
  </g>
  
  <!-- Footer -->
  <text x="50" y="595" font-size="13" font-weight="500" fill="#64748b" font-family="monospace">tech.2twodragon.com</text>
</svg>