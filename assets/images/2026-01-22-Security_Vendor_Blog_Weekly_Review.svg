<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- LEFT SIDE: Title and Metadata -->
  
  <!-- Date Badge -->
  <rect x="60" y="45" width="200" height="36" rx="18" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="0.8"/>
  <text x="160" y="65" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle">JANUARY 22, 2026</text>
  
  <!-- Main Title -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Security Vendor</text>
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Blog Weekly Review</text>
  
  <!-- Tag Pills -->
  <!-- Tag 1: Security -->
  <rect x="80" y="420" width="110" height="32" rx="16" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.25"/>
  <text x="135" y="441" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Security</text>
  
  <!-- Tag 2: Vendor -->
  <rect x="210" y="420" width="100" height="32" rx="16" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.25"/>
  <text x="260" y="441" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">Vendor</text>
  
  <!-- Tag 3: Weekly -->
  <rect x="330" y="420" width="100" height="32" rx="16" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.25"/>
  <text x="380" y="441" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">Weekly</text>
  
  <!-- Footer -->
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="12" fill="#999999" letter-spacing="0.5">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE: Security Visual Scene (x=650-1150, y=80-550) -->
  
  <!-- Data Flow Arrow 1: Left to Shield -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.4"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.4"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.4"/>
    </marker>
  </defs>
  
  <!-- Arrow 1: Coming from left -->
  <path d="M680,200 L800,240" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.35" marker-end="url(#arrowBlue)"/>
  
  <!-- Arrow 2: Coming from left bottom -->
  <path d="M690,380 L810,320" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.35" marker-end="url(#arrowOrange)"/>
  
  <!-- Arrow 3: Going right top -->
  <path d="M900,200 L1050,160" stroke="#ef4444" stroke-width="2" fill="none" opacity="0.35" marker-end="url(#arrowRed)"/>
  
  <!-- Arrow 4: Going right bottom -->
  <path d="M900,360 L1050,400" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.35" marker-end="url(#arrowBlue)"/>
  
  <!-- Large Shield -->
  <g transform="translate(880, 280)">
    <!-- Shield background -->
    <path d="M 0,-60 L 50,-35 L 50,40 Q 0,75 -50,40 L -50,-35 Z" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
    
    <!-- Shield border (darker) -->
    <path d="M 0,-60 L 50,-35 L 50,40 Q 0,75 -50,40 L -50,-35 Z" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.6"/>
    
    <!-- Checkmark inside shield -->
    <path d="M -15,8 L -5,20 L 20,-10" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
  
  <!-- Warning Triangle 1: Top Right -->
  <g transform="translate(1020, 140)">
    <polygon points="0,-20 20,20 -20,20" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.6"/>
    <polygon points="0,-4 4,6 -4,6" fill="#ef4444" opacity="0.5"/>
  </g>
  
  <!-- Warning Triangle 2: Bottom Left -->
  <g transform="translate(710, 420)">
    <polygon points="0,-20 20,20 -20,20" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.6"/>
    <polygon points="0,-4 4,6 -4,6" fill="#f59e0b" opacity="0.5"/>
  </g>
  
  <!-- Data Node 1: Top Right -->
  <circle cx="1080" cy="130" r="12" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.6"/>
  <circle cx="1080" cy="130" r="6" fill="#3b82f6" opacity="0.4"/>
  
  <!-- Data Node 2: Bottom Right -->
  <circle cx="1090" cy="430" r="12" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="0.6"/>
  <circle cx="1090" cy="430" r="6" fill="#ef4444" opacity="0.4"/>
  
  <!-- Data Node 3: Left Middle -->
  <circle cx="700" cy="270" r="12" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.6"/>
  <circle cx="700" cy="270" r="6" fill="#f59e0b" opacity="0.4"/>
  
  <!-- Decorative line patterns -->
  <line x1="650" y1="100" x2="650" y2="540" stroke="#3b82f6" stroke-width="0.3" opacity="0.06"/>
  <line x1="750" y1="100" x2="750" y2="540" stroke="#f59e0b" stroke-width="0.3" opacity="0.06"/>
  <line x1="1000" y1="100" x2="1000" y2="540" stroke="#ef4444" stroke-width="0.3" opacity="0.06"/>
</svg>