<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e53e3e;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e53e3e;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="innerShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Security Vendor Review Icon -->
  <!-- Outer shield body -->
  <path d="M1010,130 L1140,165 L1140,260 Q1140,320 1010,355 Q880,320 880,260 L880,165 Z"
        fill="url(#shieldGrad)" stroke="rgba(229,62,62,0.3)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,152 L1122,182 L1122,262 Q1122,308 1010,335 Q898,308 898,262 L898,182 Z"
        fill="url(#innerShield)" stroke="rgba(255,107,53,0.25)" stroke-width="1"/>

  <!-- Eye shape in shield center (security watch/review) -->
  <ellipse cx="1010" cy="248" rx="52" ry="30" fill="none" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>
  <circle cx="1010" cy="248" r="16" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="248" r="7" fill="rgba(255,107,53,0.25)" stroke="rgba(255,150,50,0.45)" stroke-width="1.2"/>

  <!-- Magnifying glass overlay -->
  <circle cx="1042" cy="222" r="22" fill="none" stroke="rgba(255,180,60,0.3)" stroke-width="2"/>
  <circle cx="1042" cy="222" r="14" fill="rgba(255,180,60,0.07)" stroke="rgba(255,200,80,0.25)" stroke-width="1"/>
  <line x1="1058" y1="238" x2="1075" y2="256" stroke="rgba(255,180,60,0.35)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Weekly calendar grid inside shield -->
  <rect x="940" y="270" width="9" height="9" rx="1" fill="rgba(229,62,62,0.2)" stroke="rgba(229,62,62,0.3)" stroke-width="0.5"/>
  <rect x="954" y="270" width="9" height="9" rx="1" fill="rgba(229,62,62,0.35)" stroke="rgba(229,62,62,0.45)" stroke-width="0.5"/>
  <rect x="968" y="270" width="9" height="9" rx="1" fill="rgba(229,62,62,0.2)" stroke="rgba(229,62,62,0.3)" stroke-width="0.5"/>
  <rect x="982" y="270" width="9" height="9" rx="1" fill="rgba(255,107,53,0.3)" stroke="rgba(255,107,53,0.4)" stroke-width="0.5"/>
  <rect x="996" y="270" width="9" height="9" rx="1" fill="rgba(229,62,62,0.2)" stroke="rgba(229,62,62,0.3)" stroke-width="0.5"/>
  <rect x="1010" y="270" width="9" height="9" rx="1" fill="rgba(229,62,62,0.2)" stroke="rgba(229,62,62,0.3)" stroke-width="0.5"/>
  <rect x="1024" y="270" width="9" height="9" rx="1" fill="rgba(229,62,62,0.2)" stroke="rgba(229,62,62,0.3)" stroke-width="0.5"/>

  <!-- Vendor logos placeholder: 3 small hexagons -->
  <polygon points="958,168 970,161 982,168 982,182 970,189 958,182" fill="rgba(100,200,255,0.1)" stroke="rgba(100,200,255,0.3)" stroke-width="1"/>
  <polygon points="997,155 1009,148 1021,155 1021,169 1009,176 997,169" fill="rgba(255,200,80,0.1)" stroke="rgba(255,200,80,0.3)" stroke-width="1"/>
  <polygon points="1036,168 1048,161 1060,168 1060,182 1048,189 1036,182" fill="rgba(160,255,120,0.1)" stroke="rgba(160,255,120,0.3)" stroke-width="1"/>

  <!-- Radiating scan lines -->
  <line x1="1010" y1="248" x2="955" y2="195" stroke="rgba(229,62,62,0.12)" stroke-width="1"/>
  <line x1="1010" y1="248" x2="1065" y2="195" stroke="rgba(229,62,62,0.12)" stroke-width="1"/>
  <line x1="1010" y1="248" x2="880" y2="248" stroke="rgba(229,62,62,0.08)" stroke-width="1"/>
  <line x1="1010" y1="248" x2="1140" y2="248" stroke="rgba(229,62,62,0.08)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(229,62,62,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="3" fill="rgba(255,180,50,0.6)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3.5" fill="rgba(229,62,62,0.5)"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(229,62,62,0.04)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(229,62,62,0.06)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="240" height="32" rx="4" fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.3)" stroke-width="1"/>
  <text x="200" y="81" font-family="'Courier New', monospace" font-size="12" font-weight="600" fill="rgba(229,62,62,0.9)" text-anchor="middle" letter-spacing="1.5">JANUARY 22, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Security Vendor</text>
  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica', sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">Blog Weekly Review</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="19" fill="rgba(255,255,255,0.55)" letter-spacing="0.3">Curated insights from top security vendor research</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" font-weight="600" fill="rgba(229,62,62,0.8)" letter-spacing="3">SECURITY / THREAT INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="rgba(229,62,62,0.2)" stroke="rgba(229,62,62,0.45)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(229,62,62,0.95)" text-anchor="middle" letter-spacing="0.8">WEEKLY DIGEST</text>

  <rect x="224" y="402" width="110" height="36" rx="18" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.45)" stroke-width="1"/>
  <text x="279" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(245,158,11,0.95)" text-anchor="middle" letter-spacing="0.8">VENDOR BLOG</text>

  <rect x="348" y="402" width="100" height="36" rx="18" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.45)" stroke-width="1"/>
  <text x="398" y="425" font-family="'Arial', sans-serif" font-size="12" font-weight="600" fill="rgba(100,170,255,0.95)" text-anchor="middle" letter-spacing="0.8">RESEARCH</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="0.5">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(229,62,62,0.4)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>