<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="catGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Ambient circles -->
  <circle cx="100" cy="100" r="200" fill="#f87171" fill-opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#8b5cf6" fill-opacity="0.05"/>
  <circle cx="600" cy="315" r="300" fill="#ef4444" fill-opacity="0.03"/>
  <!-- Top badges -->
  <rect x="40" y="30" width="180" height="36" rx="18" fill="url(#catGradient)" filter="url(#shadow)"/>
  <text x="130" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">INCIDENT</text>

  <rect x="980" y="30" width="180" height="36" rx="18" fill="url(#accentGradient)" filter="url(#shadow)"/>
  <text x="1070" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">September 17, 2025</text>
  <rect x="240" y="30" width="200" height="36" rx="18" fill="#1e293b" stroke="#f87171" stroke-width="1"/>
  <text x="340" y="54" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f87171" text-anchor="middle">INCIDENT TIMELINE</text>
  <!-- Title -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">INCIDENT: NPM Shai-Hulud</text>
  <text x="600" y="145" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">AI | Claude | Cursor | SRE</text>
  <rect x="350" y="160" width="500" height="3" fill="url(#accentGradient)" rx="1.5"/>

  <!-- Timeline -->
  <line x1="100" y1="280" x2="1100" y2="280" stroke="#f87171" stroke-width="3" stroke-opacity="0.4"/>
  <polygon points="1100,274 1112,280 1100,286" fill="#f87171" fill-opacity="0.6"/>
  <circle cx="100.0" cy="280" r="22" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="2"/>
  <text x="100.0" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">1</text>
  <text x="100.0" y="240" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Summary</text>
  <circle cx="308.0" cy="280" r="22" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
  <text x="308.0" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">2</text>
  <text x="308.0" y="330" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Executive Summary</text>
  <circle cx="516.0" cy="280" r="22" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="516.0" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3b82f6" text-anchor="middle">3</text>
  <text x="516.0" y="240" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Overview</text>
  <circle cx="724.0" cy="280" r="22" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="724.0" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8b5cf6" text-anchor="middle">4</text>
  <text x="724.0" y="330" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Risk Scorecard</text>
  <circle cx="932.0" cy="280" r="22" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="2"/>
  <text x="932.0" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">5</text>
  <text x="932.0" y="240" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Summary</text>
  <circle cx="1140.0" cy="280" r="22" fill="#ec4899" fill-opacity="0.2" stroke="#ec4899" stroke-width="2"/>
  <text x="1140.0" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ec4899" text-anchor="middle">6</text>
  <text x="1140.0" y="330" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Introduction</text>

  <!-- Footer -->
  <line x1="50" y1="565" x2="1150" y2="565" stroke="#334155" stroke-width="1"/>
  <text x="60" y="593" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Twodragon Tech Blog</text>
  <text x="60" y="615" font-family="Arial, sans-serif" font-size="13" fill="#64748b">tech.2twodragon.com</text>
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">DevSecOps | Cloud | Security</text>
</svg>