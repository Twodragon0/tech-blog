<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b"/>
      <stop offset="50%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3b3b"/>
      <stop offset="100%" style="stop-color:rgba(255,59,59,0)"/>
    </linearGradient>
    <linearGradient id="dateBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,59,59,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,59,59,0.05)"/>
    </linearGradient>
    <linearGradient id="glowRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3b3b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Ransomware + AI Agent Lock -->
  <!-- Outer warning ring -->
  <circle cx="1010" cy="225" r="130" fill="none" stroke="rgba(255,59,59,0.25)" stroke-width="2" stroke-dasharray="8 6"/>
  <circle cx="1010" cy="225" r="110" fill="rgba(255,20,20,0.06)" stroke="rgba(255,80,0,0.2)" stroke-width="1.5"/>

  <!-- Central lock body -->
  <rect x="965" y="215" width="90" height="70" rx="8" fill="rgba(255,59,59,0.1)" stroke="rgba(255,59,59,0.35)" stroke-width="2"/>
  <!-- Lock shackle -->
  <path d="M980 215 Q980 170 1010 170 Q1040 170 1040 215" fill="none" stroke="rgba(255,59,59,0.4)" stroke-width="3" stroke-linecap="round"/>
  <!-- Lock keyhole -->
  <circle cx="1010" cy="245" r="10" fill="rgba(255,59,59,0.3)" stroke="rgba(255,100,0,0.5)" stroke-width="1.5"/>
  <rect x="1006" y="252" width="8" height="18" rx="2" fill="rgba(255,59,59,0.3)" stroke="rgba(255,100,0,0.4)" stroke-width="1"/>

  <!-- AI neural nodes around the lock -->
  <circle cx="910" cy="160" r="14" fill="rgba(255,120,0,0.1)" stroke="rgba(255,120,0,0.35)" stroke-width="1.5"/>
  <circle cx="910" cy="160" r="6" fill="rgba(255,120,0,0.2)"/>
  <circle cx="1110" cy="155" r="14" fill="rgba(255,59,59,0.1)" stroke="rgba(255,59,59,0.3)" stroke-width="1.5"/>
  <circle cx="1110" cy="155" r="6" fill="rgba(255,59,59,0.2)"/>
  <circle cx="880" cy="260" r="12" fill="rgba(200,50,50,0.1)" stroke="rgba(200,50,50,0.3)" stroke-width="1.5"/>
  <circle cx="880" cy="260" r="5" fill="rgba(200,50,50,0.2)"/>
  <circle cx="1140" cy="270" r="12" fill="rgba(255,80,0,0.1)" stroke="rgba(255,80,0,0.3)" stroke-width="1.5"/>
  <circle cx="1140" cy="270" r="5" fill="rgba(255,80,0,0.2)"/>
  <circle cx="940" cy="310" r="10" fill="rgba(255,59,59,0.1)" stroke="rgba(255,59,59,0.25)" stroke-width="1.5"/>
  <circle cx="1080" cy="315" r="10" fill="rgba(255,100,0,0.1)" stroke="rgba(255,100,0,0.25)" stroke-width="1.5"/>

  <!-- Neural connections -->
  <line x1="910" y1="160" x2="965" y2="215" stroke="rgba(255,100,0,0.2)" stroke-width="1"/>
  <line x1="1110" y1="155" x2="1055" y2="215" stroke="rgba(255,59,59,0.2)" stroke-width="1"/>
  <line x1="880" y1="260" x2="965" y2="250" stroke="rgba(200,50,50,0.2)" stroke-width="1"/>
  <line x1="1140" y1="270" x2="1055" y2="252" stroke="rgba(255,80,0,0.2)" stroke-width="1"/>
  <line x1="940" y1="310" x2="975" y2="285" stroke="rgba(255,59,59,0.15)" stroke-width="1"/>
  <line x1="1080" y1="315" x2="1045" y2="285" stroke="rgba(255,100,0,0.15)" stroke-width="1"/>
  <line x1="910" y1="160" x2="1110" y2="155" stroke="rgba(255,80,0,0.1)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Agent circuit lines -->
  <path d="M895 190 L870 200 L855 225 L870 250 L895 260" fill="none" stroke="rgba(255,59,59,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M1125 185 L1148 200 L1160 225 L1148 250 L1125 265" fill="none" stroke="rgba(255,80,0,0.2)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Ransomware warning triangles -->
  <polygon points="1010,135 1030,165 990,165" fill="rgba(255,59,59,0.08)" stroke="rgba(255,59,59,0.3)" stroke-width="1.5"/>
  <text x="1010" y="160" font-size="14" fill="rgba(255,59,59,0.6)" text-anchor="middle" font-weight="700">!</text>

  <!-- Scan lines effect -->
  <path d="M890 130 L1130 130" stroke="rgba(255,59,59,0.08)" stroke-width="1"/>
  <path d="M880 145 L1140 145" stroke="rgba(255,59,59,0.06)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(255,59,59,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,120,0,0.6)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3" fill="rgba(255,59,59,0.5)"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(255,30,30,0.04)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(255,30,30,0.05)" stroke="none"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="200" height="32" rx="4" fill="url(#dateBadge)" stroke="rgba(255,59,59,0.3)" stroke-width="1"/>
  <text x="180" y="81" font-size="12" fill="rgba(255,180,180,0.9)" text-anchor="middle" font-family="monospace" letter-spacing="1">MARCH 2, 2026</text>

  <!-- Title lines -->
  <text x="80" y="185" font-size="46" font-weight="700" fill="white" font-family="Arial, sans-serif" letter-spacing="-0.5">Tech Security Weekly</text>
  <text x="80" y="245" font-size="40" font-weight="700" font-family="Arial, sans-serif" letter-spacing="-0.5">
    <tspan fill="#ff5a5a">Digest</tspan><tspan fill="white"> Ransomware AI</tspan>
  </text>
  <text x="80" y="293" font-size="40" font-weight="700" fill="white" font-family="Arial, sans-serif" letter-spacing="-0.5">Agent</text>

  <!-- Subtitle -->
  <text x="80" y="330" font-size="19" fill="rgba(255,200,200,0.7)" font-family="Arial, sans-serif">Weekly roundup of critical security threats, ransomware trends &amp; AI-driven attacks</text>

  <!-- Accent line -->
  <rect x="80" y="350" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="390" font-size="14" fill="rgba(255,120,120,0.8)" font-family="Arial, sans-serif" letter-spacing="3" font-weight="600">SECURITY / THREAT INTELLIGENCE</text>

  <!-- Tag pills -->
  <rect x="80" y="412" width="130" height="36" rx="18" fill="rgba(255,59,59,0.18)" stroke="rgba(255,59,59,0.4)" stroke-width="1"/>
  <text x="145" y="435" font-size="13" fill="rgba(255,180,180,0.95)" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600">RANSOMWARE</text>

  <rect x="225" y="412" width="110" height="36" rx="18" fill="rgba(255,140,0,0.15)" stroke="rgba(255,140,0,0.35)" stroke-width="1"/>
  <text x="280" y="435" font-size="13" fill="rgba(255,200,150,0.95)" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600">AI AGENT</text>

  <rect x="350" y="412" width="110" height="36" rx="18" fill="rgba(60,120,255,0.15)" stroke="rgba(60,120,255,0.35)" stroke-width="1"/>
  <text x="405" y="435" font-size="13" fill="rgba(160,200,255,0.95)" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600">WEEKLY</text>

  <!-- Footer -->
  <line x1="0" y1="515" x2="1200" y2="515" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="80" y="545" font-size="14" fill="rgba(255,255,255,0.35)" font-family="Arial, sans-serif">tech.2twodragon.com</text>
  <text x="1120" y="545" font-size="13" fill="rgba(255,100,100,0.45)" font-family="Arial, sans-serif" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>