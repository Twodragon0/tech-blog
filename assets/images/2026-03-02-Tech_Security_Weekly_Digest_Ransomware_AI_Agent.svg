<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow effects -->
  <ellipse cx="130" cy="280" rx="170" ry="170" fill="url(#glowBlue)"/>
  <ellipse cx="1080" cy="260" rx="200" ry="190" fill="url(#glowGreen)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Primary icon: Zero-Trust Shield with Checkmark -->
  <g transform="translate(48, 148)">
    <!-- Shield shape -->
    <path d="M62 8 L102 24 L102 68 Q102 108 62 128 Q22 108 22 68 L22 24 Z" fill="url(#shieldGrad)" opacity="0.95"/>
    <path d="M62 14 L96 28 L96 68 Q96 104 62 122 Q28 104 28 68 L28 28 Z" fill="none" stroke="#93c5fd" stroke-width="2"/>
    <!-- Checkmark -->
    <polyline points="40,68 55,85 85,52" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Zero trust label -->
    <text x="62" y="150" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="10" font-weight="bold" letter-spacing="1">ZERO TRUST</text>
  </g>

  <!-- Secondary icon: Crypto/Blockchain -->
  <g transform="translate(52, 358)">
    <!-- Bitcoin-style symbol -->
    <circle cx="60" cy="62" r="48" fill="#0d2714" stroke="#10b981" stroke-width="2.5"/>
    <!-- B letter for Bitcoin -->
    <text x="60" y="80" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="48" font-weight="bold">B</text>
    <!-- Chain links -->
    <rect x="8" y="28" width="18" height="10" rx="5" fill="none" stroke="#059669" stroke-width="2"/>
    <rect x="98" y="28" width="18" height="10" rx="5" fill="none" stroke="#059669" stroke-width="2"/>
    <rect x="8" y="88" width="18" height="10" rx="5" fill="none" stroke="#059669" stroke-width="2"/>
    <rect x="98" y="88" width="18" height="10" rx="5" fill="none" stroke="#059669" stroke-width="2"/>
    <text x="60" y="130" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="10" font-weight="bold" letter-spacing="1">CRYPTO REG</text>
  </g>

  <!-- Main title area -->
  <g transform="translate(210, 95)">
    <text x="0" y="0" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" font-weight="bold" letter-spacing="5">TECH SECURITY WEEKLY DIGEST</text>
    <text x="0" y="55" fill="#f8fafc" font-family="Arial, sans-serif" font-size="44" font-weight="bold">Tech Security Weekly</text>
    <text x="0" y="103" fill="#34d399" font-family="Arial, sans-serif" font-size="30" font-weight="300">Zero Trust Crypto Regulation AI</text>
  </g>

  <!-- Date badge - blue theme -->
  <rect x="210" y="230" width="188" height="36" rx="18" fill="url(#accentBlue)" opacity="0.9"/>
  <text x="304" y="254" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="15" font-weight="bold">March 02, 2026</text>

  <!-- Stats cards -->
  <g transform="translate(210, 298)">
    <!-- Card 1: Security -->
    <rect x="0" y="0" width="195" height="95" rx="10" fill="#0d1f3c" stroke="#1d4ed8" stroke-width="1.5"/>
    <text x="16" y="28" fill="#3b82f6" font-family="Arial, sans-serif" font-size="11" font-weight="bold" letter-spacing="1">SECURITY</text>
    <text x="16" y="68" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="bold">1</text>
    <text x="60" y="68" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">article</text>
    <text x="16" y="85" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Zero-Trust, Visibility</text>
    <!-- Card 2: Blockchain -->
    <rect x="215" y="0" width="195" height="95" rx="10" fill="#0d2714" stroke="#059669" stroke-width="1.5"/>
    <text x="231" y="28" fill="#10b981" font-family="Arial, sans-serif" font-size="11" font-weight="bold" letter-spacing="1">BLOCKCHAIN</text>
    <text x="231" y="68" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="bold">3</text>
    <text x="275" y="68" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">articles</text>
    <text x="231" y="85" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Crypto Reg, Stablecoin</text>
    <!-- Card 3: Tech -->
    <rect x="430" y="0" width="195" height="95" rx="10" fill="#0d1f3c" stroke="#6366f1" stroke-width="1.5"/>
    <text x="446" y="28" fill="#818cf8" font-family="Arial, sans-serif" font-size="11" font-weight="bold" letter-spacing="1">TECH / AI</text>
    <text x="446" y="68" fill="#f8fafc" font-family="Arial, sans-serif" font-size="40" font-weight="bold">2</text>
    <text x="490" y="68" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">articles</text>
    <text x="446" y="85" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Anthropic, Claude SDK</text>
  </g>

  <!-- Key topic tags -->
  <g transform="translate(210, 430)">
    <rect x="0" y="0" width="96" height="32" rx="16" fill="#1e3a8a" opacity="0.85"/>
    <text x="48" y="21" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Zero-Trust</text>
    <rect x="110" y="0" width="72" height="32" rx="16" fill="#064e3b" opacity="0.85"/>
    <text x="146" y="21" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Crypto</text>
    <rect x="196" y="0" width="96" height="32" rx="16" fill="#1e293b" opacity="0.85"/>
    <text x="244" y="21" text-anchor="middle" fill="#c7d2fe" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Anthropic</text>
    <rect x="306" y="0" width="96" height="32" rx="16" fill="#0d1f3c" opacity="0.85"/>
    <text x="354" y="21" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Visibility</text>
  </g>

  <!-- Right: Zero Trust network diagram -->
  <g transform="translate(860, 140)" opacity="0.55">
    <!-- Central verified node -->
    <circle cx="155" cy="155" r="30" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="155" y="149" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="9" font-weight="bold">ZERO</text>
    <text x="155" y="163" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="9" font-weight="bold">TRUST</text>
    <!-- Outer ring segments -->
    <circle cx="155" cy="155" r="58" fill="none" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="6,4"/>
    <!-- Verified segments -->
    <circle cx="155" cy="78" r="18" fill="#0d2714" stroke="#10b981" stroke-width="2"/>
    <text x="155" y="83" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9" font-weight="bold">VERIFY</text>
    <circle cx="222" cy="195" r="18" fill="#0d2714" stroke="#10b981" stroke-width="2"/>
    <text x="222" y="200" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9" font-weight="bold">AUTH</text>
    <circle cx="88" cy="195" r="18" fill="#0d2714" stroke="#10b981" stroke-width="2"/>
    <text x="88" y="200" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="9" font-weight="bold">AUDIT</text>
    <!-- Connection lines -->
    <line x1="155" y1="96" x2="155" y2="125" stroke="#10b981" stroke-width="1.5"/>
    <line x1="210" y1="185" x2="185" y2="170" stroke="#10b981" stroke-width="1.5"/>
    <line x1="100" y1="185" x2="126" y2="170" stroke="#10b981" stroke-width="1.5"/>
    <!-- Blockchain chain below -->
    <g transform="translate(100, 245)">
      <rect x="0" y="0" width="28" height="22" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
      <rect x="36" y="0" width="28" height="22" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
      <rect x="72" y="0" width="28" height="22" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
      <line x1="28" y1="11" x2="36" y2="11" stroke="#059669" stroke-width="2"/>
      <line x1="64" y1="11" x2="72" y2="11" stroke="#059669" stroke-width="2"/>
      <text x="14" y="14" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8">B1</text>
      <text x="50" y="14" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8">B2</text>
      <text x="86" y="14" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8">B3</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="510" width="1200" height="120" fill="#080e1a" opacity="0.9"/>
  <rect x="0" y="510" width="1200" height="2" fill="url(#accentBlue)" opacity="0.6"/>
  <rect x="0" y="512" width="1200" height="1" fill="url(#accentGreen)" opacity="0.3"/>

  <!-- Bottom text -->
  <text x="80" y="558" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16" font-weight="bold">tech.2twodragon.com</text>
  <text x="80" y="584" fill="#64748b" font-family="Arial, sans-serif" font-size="13">DevSecOps Weekly Security Intelligence</text>

  <!-- Bottom right -->
  <text x="1130" y="552" text-anchor="end" fill="#10b981" font-family="Arial, sans-serif" font-size="22" font-weight="bold">6</text>
  <text x="1130" y="570" text-anchor="end" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">curated articles</text>
  <text x="1130" y="588" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Zero-Trust | Crypto | Anthropic | Visibility</text>
</svg>
