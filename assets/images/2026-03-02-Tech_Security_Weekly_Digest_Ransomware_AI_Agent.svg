<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Ransomware AI Agent - Security Weekly 2026-03-02</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="150" cy="300" r="300" fill="#ff6b6b" opacity="0.04" filter="url(#sg)"/>
  <circle cx="1100" cy="200" r="220" fill="#ee5a24" opacity="0.05" filter="url(#sg)"/>
  <!-- Hex pattern background -->
  <g opacity="0.07" stroke="#ff6b6b" stroke-width="0.8" fill="none">
    <polygon points="900,80 940,103 940,149 900,172 860,149 860,103"/>
    <polygon points="980,130 1020,153 1020,199 980,222 940,199 940,153"/>
    <polygon points="900,180 940,203 940,249 900,272 860,249 860,203"/>
    <polygon points="980,230 1020,253 1020,299 980,322 940,299 940,253"/>
    <polygon points="1060,80 1100,103 1100,149 1060,172 1020,149 1020,103"/>
    <polygon points="1060,180 1100,203 1100,249 1060,272 1020,249 1020,203"/>
  </g>
  <!-- Virus/malware icon -->
  <g transform="translate(960,320)" filter="url(#glow)">
    <circle r="45" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.6"/>
    <circle r="25" fill="#ff6b6b" opacity="0.12"/>
    <!-- Spikes -->
    <line x1="0" y1="-45" x2="0" y2="-65" stroke="#ff6b6b" stroke-width="3" opacity="0.7"/>
    <line x1="45" y1="0" x2="65" y2="0" stroke="#ff6b6b" stroke-width="3" opacity="0.7"/>
    <line x1="0" y1="45" x2="0" y2="65" stroke="#ff6b6b" stroke-width="3" opacity="0.7"/>
    <line x1="-45" y1="0" x2="-65" y2="0" stroke="#ff6b6b" stroke-width="3" opacity="0.7"/>
    <line x1="32" y1="-32" x2="46" y2="-46" stroke="#ff6b6b" stroke-width="2.5" opacity="0.6"/>
    <line x1="32" y1="32" x2="46" y2="46" stroke="#ff6b6b" stroke-width="2.5" opacity="0.6"/>
    <line x1="-32" y1="-32" x2="-46" y2="-46" stroke="#ff6b6b" stroke-width="2.5" opacity="0.6"/>
    <line x1="-32" y1="32" x2="-46" y2="46" stroke="#ff6b6b" stroke-width="2.5" opacity="0.6"/>
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#ff6b6b" text-anchor="middle" opacity="0.8">!</text>
  </g>
  <!-- Date + category -->
  <rect x="70" y="44" width="158" height="34" rx="17" fill="#ff6b6b" opacity="0.15" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="149" y="66" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ff6b6b" text-anchor="middle">March 2, 2026</text>
  <rect x="248" y="44" width="150" height="34" rx="17" fill="rgba(100,210,80,0.1)" stroke="#64d250" stroke-width="1.5"/>
  <text x="323" y="66" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#64d250" text-anchor="middle">DEVSECOPS</text>
  <!-- Title -->
  <text x="70" y="195" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="white" filter="url(#glow)">Ransomware</text>
  <text x="70" y="256" font-family="Arial,sans-serif" font-size="52" font-weight="bold" fill="white" filter="url(#glow)">Supply Chain</text>
  <text x="70" y="312" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.58)">Weekly Security Digest</text>
  <!-- Keywords -->
  <rect x="70" y="370" width="148" height="36" rx="18" fill="rgba(255,107,107,0.16)" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="144" y="393" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ff6b6b" text-anchor="middle">Ransomware</text>
  <rect x="238" y="370" width="128" height="36" rx="18" fill="rgba(100,210,80,0.1)" stroke="#64d250" stroke-width="1.5"/>
  <text x="302" y="393" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#64d250" text-anchor="middle">AI Agent</text>
  <rect x="386" y="370" width="148" height="36" rx="18" fill="rgba(250,200,0,0.12)" stroke="#fac800" stroke-width="1.5"/>
  <text x="460" y="393" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fac800" text-anchor="middle">Supply Chain</text>
  <!-- Accent bar -->
  <rect x="70" y="437" width="380" height="4" rx="2" fill="url(#acc)"/>
  <!-- Footer -->
  <line x1="50" y1="592" x2="1150" y2="592" stroke="#30363d" stroke-width="1" opacity="0.5"/>
  <text x="1150" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="end">tech.2twodragon.com</text>
  <text x="70" y="616" font-family="Arial,sans-serif" font-size="13" fill="#64748b">DevSecOps Weekly Intel</text>
