<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Left Side: Text Content -->
  <text x="40" y="185" font-family="Inter, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly</text>
  <text x="40" y="245" font-family="Inter, sans-serif" font-size="46" font-weight="700" fill="white">Digest Ransomware Agent</text>
  
  <!-- Date Badge -->
  <rect x="40" y="270" width="280" height="40" rx="8" fill="#1a1f3a"/>
  <text x="55" y="297" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#64b5f6">📅 MARCH 2, 2026</text>
  
  <!-- Tag Pills -->
  <g>
    <!-- Tag 1: Security -->
    <rect x="40" y="420" width="100" height="32" rx="16" fill="#c62828"/>
    <text x="90" y="441" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">security</text>
    
    <!-- Tag 2: Ransomware -->
    <rect x="155" y="420" width="120" height="32" rx="16" fill="#d32f2f"/>
    <text x="215" y="441" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">ransomware</text>
    
    <!-- Tag 3: Threat -->
    <rect x="290" y="420" width="90" height="32" rx="16" fill="#ff6f00"/>
    <text x="335" y="441" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">threat</text>
  </g>
  
  <!-- Footer -->
  <text x="40" y="590" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#64b5f6">tech.2twodragon.com</text>
  
  <!-- Right Side: Ransomware Agent Illustration -->
  <defs>
    <linearGradient id="threatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Central Threat Core - Hexagon with pulsing elements -->
  <g filter="url(#glow)">
    <!-- Outer threat ring -->
    <circle cx="920" cy="315" r="120" fill="none" stroke="url(#threatGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="920" cy="315" r="100" fill="none" stroke="#ff6666" stroke-width="1" opacity="0.4"/>
    
    <!-- Central malicious core -->
    <polygon points="920,220 980,250 980,310 920,340 860,310 860,250" fill="none" stroke="url(#threatGradient)" stroke-width="2.5"/>
    <circle cx="920" cy="295" r="35" fill="url(#threatGradient)" opacity="0.3"/>
    <circle cx="920" cy="295" r="25" fill="#ff4444" opacity="0.5"/>
    <circle cx="920" cy="295" r="12" fill="#ff0000"/>
  </g>
  
  <!-- Binary/Code Streams representing ransomware payload -->
  <g font-family="monospace" font-size="11" fill="url(#codeGradient)" opacity="0.7">
    <text x="750" y="180">101011010</text>
    <text x="1000" y="200">1010101</text>
    <text x="750" y="450">110101010</text>
    <text x="1020" y="480">101011</text>
  </g>
  
  <!-- Lock chains showing encryption/control -->
  <g stroke="#ff6666" stroke-width="2" fill="none">
    <!-- Left chain -->
    <path d="M 820 260 L 780 280" stroke="#ff8888"/>
    <circle cx="780" cy="280" r="8" fill="none" stroke="#ff8888" stroke-width="1.5"/>
    <path d="M 780 288 L 780 310" stroke="#ff8888"/>
    
    <!-- Right chain -->
    <path d="M 1020 260 L 1060 280" stroke="#ff8888"/>
    <circle cx="1060" cy="280" r="8" fill="none" stroke="#ff8888" stroke-width="1.5"/>
    <path d="M 1060 288 L 1060 310" stroke="#ff8888"/>
  </g>
  
  <!-- Network nodes/agent connections -->
  <g>
    <!-- Top left node -->
    <circle cx="800" cy="150" r="12" fill="#0066ff" opacity="0.8"/>
    <line x1="800" y1="162" x2="880" y2="240" stroke="#0066ff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Top right node -->
    <circle cx="1040" cy="150" r="12" fill="#0066ff" opacity="0.8"/>
    <line x1="1040" y1="162" x2="960" y2="240" stroke="#0066ff" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Bottom left node -->
    <circle cx="780" cy="480" r="12" fill="#ff6600" opacity="0.8"/>
    <line x1="800" y1="468" x2="880" y2="350" stroke="#ff6600" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Bottom right node -->
    <circle cx="1060" cy="480" r="12" fill="#ff6600" opacity="0.8"/>
    <line x1="1040" y1="468" x2="960" y2="350" stroke="#ff6600" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  <!-- Warning triangles for threat indicators -->
  <g>
    <polygon points="750,100 760,120 740,120" fill="#ff6600"/>
    <text x="748" y="115" font-size="8" fill="#ff6600" font-weight="bold">!</text>
    
    <polygon points="1080,120 1090,140 1070,140" fill="#ff6600"/>
    <text x="1078" y="135" font-size="8" fill="#ff6600" font-weight="bold">!</text>
  </g>
  
  <!-- Encryption lock symbol -->
  <g>
    <rect x="905" y="305" width="30" height="25" rx="3" fill="none" stroke="#ff4444" stroke-width="2"/>
    <path d="M 915 305 Q 915 295 920 295 Q 925 295 925 305" fill="none" stroke="#ff4444" stroke-width="2"/>
    <circle cx="920" cy="318" r="2" fill="#ff4444"/>
  </g>
  
  <!-- Threat intensity waves -->
  <g stroke="#ff6666" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 700 315 Q 720 300 740 315"/>
    <path d="M 1100 315 Q 1080 330 1060 315"/>
  </g>
</svg>