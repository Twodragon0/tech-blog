  <circle cx="110" cy="293" r="8" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="110" cy="293" r="2" fill="#ef4444"/>
  <line x1="92" y1="293" x2="128" y2="293" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
