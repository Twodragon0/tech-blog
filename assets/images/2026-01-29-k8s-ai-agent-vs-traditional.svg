    <text x="360" y="21" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="13">Automation</text>
    <rect x="445" y="0" width="140" height="32" rx="16" fill="#78350f" opacity="0.7"/>
