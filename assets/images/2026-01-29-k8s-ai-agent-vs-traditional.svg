  <text x="80" y="560" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">tech.2twodragon.com</text>
  <text x="80" y="590" fill="#64748b" font-family="Arial, sans-serif" font-size="13">K8s AI Agent vs Traditional Operations</text>
  <text x="1120" y="560" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="14">AI-Powered K8s Ops</text>
  <text x="1120" y="590" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="13">AI | Kubernetes | Automation | DevOps</text>
