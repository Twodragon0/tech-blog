    <circle cx="150" cy="90" r="5" fill="#fbbf24"/><circle cx="80" cy="120" r="4" fill="#60a5fa"/>
    <circle cx="200" cy="60" r="3" fill="#818cf8"/><circle cx="30" cy="150" r="5" fill="#34d399"/>
