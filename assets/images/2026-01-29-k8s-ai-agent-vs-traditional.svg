    <line x1="50" y1="50" x2="120" y2="30" stroke="#475569" stroke-width="1"/>
    <line x1="50" y1="50" x2="80" y2="120" stroke="#475569" stroke-width="1"/>
    <line x1="120" y1="30" x2="150" y2="90" stroke="#475569" stroke-width="1"/>
    <line x1="150" y1="90" x2="200" y2="60" stroke="#475569" stroke-width="1"/>
    <line x1="80" y1="120" x2="30" y2="150" stroke="#475569" stroke-width="1"/>
