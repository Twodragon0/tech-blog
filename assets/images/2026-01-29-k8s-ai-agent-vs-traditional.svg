    <rect x="60" y="0" width="55" height="22" rx="4" fill="#374151" stroke="#6b7280" stroke-width="1"/>
    <text x="88" y="15" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="8">Manual</text>

    <text x="10" y="42" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="11">Speed: 10x faster</text>
    <text x="10" y="62" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="11">Accuracy: 99.5%</text>
    <text x="10" y="82" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="11">Cost: 60% less</text>
    <text x="10" y="102" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="11">Scale: Unlimited</text>
