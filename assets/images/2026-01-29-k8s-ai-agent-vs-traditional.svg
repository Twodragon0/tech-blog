    <text x="460" y="30" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12" font-weight="bold">COST SAVING</text>
    <text x="460" y="65" fill="#f8fafc" font-family="Arial, sans-serif" font-size="32" font-weight="bold">60%</text>
    <text x="530" y="65" fill="#64748b" font-family="Arial, sans-serif" font-size="14">reduction</text>
