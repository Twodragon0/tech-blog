<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="tagRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#cc2222;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="tagAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="tagBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AI Security Agent with Go language shield -->
  <!-- Outer shield body -->
  <path d="M1010,135 L1095,165 L1095,245 Q1095,300 1010,320 Q925,300 925,245 L925,165 Z"
        fill="rgba(59,130,246,0.07)" stroke="rgba(59,130,246,0.25)" stroke-width="1.5"/>
  <!-- Inner shield -->
  <path d="M1010,155 L1080,178 L1080,245 Q1080,288 1010,305 Q940,288 940,245 L940,178 Z"
        fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>

  <!-- Go language "G" glyph hint inside shield -->
  <circle cx="1010" cy="237" r="42" fill="none" stroke="rgba(0,173,216,0.22)" stroke-width="2"/>
  <path d="M975,237 A35,35 0 1,1 1010,272" fill="none" stroke="rgba(0,173,216,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1010" y1="237" x2="1035" y2="237" stroke="rgba(0,173,216,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="1010" y1="237" x2="1010" y2="258" stroke="rgba(0,173,216,0.28)" stroke-width="3" stroke-linecap="round"/>

  <!-- AI neural nodes radiating from shield -->
  <circle cx="1010" cy="135" r="6" fill="rgba(255,68,68,0.12)" stroke="rgba(255,68,68,0.35)" stroke-width="1.5"/>
  <circle cx="1095" cy="165" r="5" fill="rgba(255,136,0,0.12)" stroke="rgba(255,136,0,0.35)" stroke-width="1.5"/>
  <circle cx="1095" cy="245" r="5" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
  <circle cx="925" cy="165" r="5" fill="rgba(255,68,68,0.12)" stroke="rgba(255,68,68,0.30)" stroke-width="1.5"/>
  <circle cx="925" cy="245" r="5" fill="rgba(255,136,0,0.12)" stroke="rgba(255,136,0,0.30)" stroke-width="1.5"/>
  <circle cx="1010" cy="320" r="6" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>

  <!-- Outer orbit ring -->
  <ellipse cx="1010" cy="230" rx="110" ry="98" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- AI agent circuit lines -->
  <line x1="880" y1="170" x2="925" y2="165" stroke="rgba(255,68,68,0.20)" stroke-width="1"/>
  <line x1="880" y1="200" x2="925" y2="245" stroke="rgba(255,136,0,0.18)" stroke-width="1"/>
  <line x1="880" y1="260" x2="925" y2="245" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>
  <line x1="1095" y1="165" x2="1140" y2="155" stroke="rgba(255,68,68,0.18)" stroke-width="1"/>
  <line x1="1095" y1="245" x2="1140" y2="260" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>
  <line x1="1010" y1="320" x2="1010" y2="340" stroke="rgba(59,130,246,0.18)" stroke-width="1"/>

  <!-- Agent eye / scan reticle -->
  <circle cx="1010" cy="237" r="58" fill="none" stroke="rgba(255,68,68,0.08)" stroke-width="1" stroke-dasharray="3,5"/>
  <circle cx="1010" cy="237" r="72" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- Small data dots around shield -->
  <circle cx="960" cy="148" r="3" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.30)" stroke-width="1"/>
  <circle cx="1060" cy="145" r="2.5" fill="rgba(255,136,0,0.15)" stroke="rgba(255,136,0,0.30)" stroke-width="1"/>
  <circle cx="950" cy="310" r="2.5" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.30)" stroke-width="1"/>
  <circle cx="1070" cy="308" r="3" fill="rgba(0,173,216,0.15)" stroke="rgba(0,173,216,0.30)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,68,68,0.55)" stroke="rgba(255,68,68,0.80)" stroke-width="1"/>
  <circle cx="900" cy="420" r="3.5" fill="rgba(255,136,0,0.50)" stroke="rgba(255,136,0,0.75)" stroke-width="1"/>
  <circle cx="860" cy="440" r="3" fill="rgba(59,130,246,0.50)" stroke="rgba(59,130,246,0.75)" stroke-width="1"/>

  <!-- Background ambient circles -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="210" height="32" rx="4" fill="rgba(255,68,68,0.15)" stroke="rgba(255,68,68,0.30)" stroke-width="1"/>
  <text x="96" y="81" font-family="'Courier New',monospace" font-size="12" font-weight="600" fill="rgba(255,120,120,0.90)" letter-spacing="1">FEBRUARY 13, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial',sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">AI Go Security Agent</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial',sans-serif" font-size="19" fill="rgba(180,200,255,0.70)">Weekly roundup: AI threats, Go security, agent defense strategies</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Arial',sans-serif" font-size="14" font-weight="600" fill="rgba(255,68,68,0.80)" letter-spacing="2">SECURITY / AI / GO LANGUAGE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="118" height="36" rx="18" fill="url(#tagRed)" stroke="rgba(255,68,68,0.35)" stroke-width="1"/>
  <text x="139" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(255,120,120,0.95)" text-anchor="middle">AI Security</text>

  <rect x="212" y="402" width="108" height="36" rx="18" fill="url(#tagAmber)" stroke="rgba(245,158,11,0.35)" stroke-width="1"/>
  <text x="266" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(251,191,36,0.95)" text-anchor="middle">Go Lang</text>

  <rect x="334" y="402" width="128" height="36" rx="18" fill="url(#tagBlue)" stroke="rgba(59,130,246,0.35)" stroke-width="1"/>
  <text x="398" y="425" font-family="'Arial',sans-serif" font-size="13" font-weight="600" fill="rgba(147,197,253,0.95)" text-anchor="middle">Threat Intel</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Arial',sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Arial',sans-serif" font-size="14" font-weight="600" fill="rgba(255,68,68,0.55)" text-anchor="end" letter-spacing="1">SECURITY</text>
</svg>