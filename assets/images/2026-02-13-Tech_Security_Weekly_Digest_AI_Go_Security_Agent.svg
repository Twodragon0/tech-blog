<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>Tech Security Weekly Digest AI Go Security Agent</title>
  <defs>
    <!-- Glass blur filter -->
    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft glow for orbs -->
    <filter id="orbGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient accents -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <!-- Card border gradients -->
    <linearGradient id="cardBorder1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="cardBorder2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="cardFill1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="cardFill2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#162033" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Dot pattern -->
    <pattern id="dotGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#334155" opacity="0.5"/>
    </pattern>
    <!-- Particle glow -->
    <filter id="particleGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Ambient glow orbs -->
  <circle cx="750" cy="200" r="180" fill="#3b82f6" opacity="0.08" filter="url(#orbGlow)"/>
  <circle cx="950" cy="450" r="140" fill="#f43f5e" opacity="0.06" filter="url(#orbGlow)"/>
  <circle cx="200" cy="500" r="120" fill="#8b5cf6" opacity="0.05" filter="url(#orbGlow)"/>
  <circle cx="400" cy="100" r="100" fill="#3b82f6" opacity="0.04" filter="url(#orbGlow)"/>

  <!-- ===== RIGHT SIDE: Glass Cards ===== -->

  <!-- Card 1 (back, top - Shield/Security) -->
  <g transform="translate(660, 80)">
    <rect x="0" y="0" width="460" height="280" rx="16" fill="url(#cardFill2)" stroke="url(#cardBorder2)" stroke-width="1" filter="url(#cardShadow)" opacity="0.8"/>
    <rect x="1" y="1" width="458" height="100" rx="16" fill="white" opacity="0.03"/>
    <!-- Shield icon -->
    <g transform="translate(170, 40)">
      <path d="M60 10 L110 30 L110 100 C110 145 60 175 60 175 C60 175 10 145 10 100 L10 30 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="3" opacity="0.9"/>
      <path d="M60 25 L100 42 L100 100 C100 135 60 160 60 160 C60 160 20 135 20 100 L20 42 Z" fill="#3b82f6" opacity="0.15"/>
      <!-- Checkmark -->
      <path d="M38 95 L55 115 L85 75" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#textGlow)"/>
      <!-- Shield circuit lines -->
      <line x1="60" y1="45" x2="60" y2="65" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
      <line x1="35" y1="60" x2="85" y2="60" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
      <circle cx="60" cy="55" r="3" fill="#3b82f6" opacity="0.5"/>
      <circle cx="40" cy="60" r="2" fill="#22d3ee" opacity="0.4"/>
      <circle cx="80" cy="60" r="2" fill="#22d3ee" opacity="0.4"/>
    </g>
    <text x="230" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="2">SECURITY COMPLIANCE</text>
  </g>

  <!-- Card 2 (front, overlapping - Brain/AI) -->
  <g transform="translate(700, 260)">
    <rect x="0" y="0" width="420" height="300" rx="16" fill="url(#cardFill1)" stroke="url(#cardBorder1)" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="1" y="1" width="418" height="80" rx="16" fill="white" opacity="0.04"/>
    <!-- Brain with neural network -->
    <g transform="translate(130, 30)">
      <!-- Brain outline -->
      <path d="M80 40 C80 20 100 10 115 15 C120 5 140 5 148 15 C160 10 178 20 175 40 C185 50 185 70 175 80 C180 95 170 110 155 115 C150 125 130 130 115 125 C105 135 85 130 80 120 C65 120 55 105 60 90 C50 80 50 55 60 45 C55 35 65 30 80 40 Z" fill="url(#brainGrad)" opacity="0.2" stroke="url(#brainGrad)" stroke-width="2"/>
      <!-- Neural network nodes -->
      <circle cx="90" cy="55" r="4" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="115" cy="40" r="4" fill="#a78bfa" opacity="0.8"/>
      <circle cx="145" cy="50" r="4" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="100" cy="80" r="4" fill="#a78bfa" opacity="0.8"/>
      <circle cx="135" cy="75" r="4" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="160" cy="70" r="4" fill="#a78bfa" opacity="0.8"/>
      <circle cx="110" cy="105" r="4" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="145" cy="100" r="4" fill="#a78bfa" opacity="0.8"/>
      <circle cx="75" cy="85" r="3" fill="#c4b5fd" opacity="0.6"/>
      <circle cx="165" cy="90" r="3" fill="#c4b5fd" opacity="0.6"/>
      <!-- Neural connections -->
      <line x1="90" y1="55" x2="115" y2="40" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
      <line x1="115" y1="40" x2="145" y2="50" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
      <line x1="90" y1="55" x2="100" y2="80" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
      <line x1="145" y1="50" x2="135" y2="75" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
      <line x1="145" y1="50" x2="160" y2="70" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
      <line x1="100" y1="80" x2="135" y2="75" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
      <line x1="100" y1="80" x2="110" y2="105" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
      <line x1="135" y1="75" x2="145" y2="100" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
      <line x1="160" y1="70" x2="145" y2="100" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
      <line x1="75" y1="85" x2="100" y2="80" stroke="#c4b5fd" stroke-width="0.8" opacity="0.3"/>
      <line x1="160" y1="70" x2="165" y2="90" stroke="#c4b5fd" stroke-width="0.8" opacity="0.3"/>
      <line x1="110" y1="105" x2="145" y2="100" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
      <!-- Circuit extending lines -->
      <line x1="75" y1="85" x2="55" y2="95" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>
      <line x1="165" y1="90" x2="185" y2="85" stroke="#8b5cf6" stroke-width="0.8" opacity="0.3"/>
      <line x1="115" y1="40" x2="115" y2="20" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
      <line x1="110" y1="105" x2="105" y2="125" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
      <!-- Pulse dots -->
      <circle cx="103" cy="47" r="1.5" fill="#c4b5fd" opacity="0.7"/>
      <circle cx="130" cy="45" r="1.5" fill="#c4b5fd" opacity="0.7"/>
      <circle cx="118" cy="78" r="1.5" fill="#c4b5fd" opacity="0.7"/>
    </g>
    <text x="210" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="600" letter-spacing="1">AI / LLM</text>
    <text x="210" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="1.5">NEURAL THREAT DETECTION</text>
    <line x1="120" y1="245" x2="300" y2="245" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3"/>
    <text x="210" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#475569" text-anchor="middle" letter-spacing="1">AUTONOMOUS SECURITY AGENT</text>
  </g>

  <!-- Floating particles between cards -->
  <circle cx="680" cy="300" r="2" fill="#3b82f6" opacity="0.6" filter="url(#particleGlow)"/>
  <circle cx="720" cy="180" r="1.5" fill="#f43f5e" opacity="0.5" filter="url(#particleGlow)"/>
  <circle cx="1100" cy="350" r="2" fill="#8b5cf6" opacity="0.5" filter="url(#particleGlow)"/>
  <circle cx="1050" cy="150" r="1.5" fill="#22d3ee" opacity="0.4" filter="url(#particleGlow)"/>
  <circle cx="750" cy="400" r="1.8" fill="#3b82f6" opacity="0.5" filter="url(#particleGlow)"/>
  <circle cx="900" cy="100" r="1.5" fill="#f43f5e" opacity="0.4" filter="url(#particleGlow)"/>
  <circle cx="1130" cy="500" r="2" fill="#a78bfa" opacity="0.4" filter="url(#particleGlow)"/>
  <circle cx="670" cy="450" r="1.2" fill="#22d3ee" opacity="0.5" filter="url(#particleGlow)"/>
  <circle cx="1080" cy="250" r="1.8" fill="#3b82f6" opacity="0.3" filter="url(#particleGlow)"/>

  <!-- ===== LEFT SIDE: Text Content ===== -->

  <!-- Category pill -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="180" height="32" rx="16" fill="#1e293b" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="90" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="600" letter-spacing="2">WEEKLY DIGEST</text>
  </g>

  <!-- Main title -->
  <text x="60" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="46" fill="white" font-weight="800" letter-spacing="-0.5">Tech Security</text>
  <text x="60" y="235" font-family="system-ui, -apple-system, sans-serif" font-size="46" fill="white" font-weight="800" letter-spacing="-0.5">Weekly</text>

  <!-- Gradient accent line -->
  <rect x="60" y="255" width="200" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Subtitle -->
  <text x="60" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8" font-weight="600">Digest Security</text>
  <text x="60" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8" font-weight="600">Agent</text>

  <!-- Tag chips -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#1e293b" stroke="#3b82f6" stroke-width="0.8" opacity="0.8"/>
    <text x="50" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="500">AI Security</text>
    <rect x="112" y="0" width="130" height="30" rx="15" fill="#1e293b" stroke="#f43f5e" stroke-width="0.8" opacity="0.8"/>
    <text x="177" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fb7185" text-anchor="middle" font-weight="500">Threat Intel</text>
    <rect x="254" y="0" width="120" height="30" rx="15" fill="#1e293b" stroke="#8b5cf6" stroke-width="0.8" opacity="0.8"/>
    <text x="314" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="500">Go Security</text>
  </g>

  <!-- Date -->
  <text x="60" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#475569" letter-spacing="3" font-weight="500">FEBRUARY 13, 2026</text>

  <!-- Footer separator -->
  <line x1="60" y1="530" x2="580" y2="530" stroke="#1e293b" stroke-width="1"/>

  <!-- Footer -->
  <text x="60" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569" letter-spacing="1">tech.2twodragon.com</text>

  <!-- Decorative dots near footer -->
  <circle cx="240" cy="556" r="2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="250" cy="556" r="2" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="260" cy="556" r="2" fill="#f43f5e" opacity="0.5"/>

  <!-- Subtle accent lines -->
  <line x1="60" y1="145" x2="350" y2="145" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
  <line x1="60" y1="360" x2="450" y2="360" stroke="#f43f5e" stroke-width="0.5" opacity="0.1"/>
</svg>