<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- LEFT SIDE: Text Content -->
  <!-- Date Badge -->
  <rect x="60" y="45" width="200" height="35" rx="17.5" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="160" y="68" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle">JANUARY 30, 2026</text>

  <!-- Main Title -->
  <text x="75" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="white" letter-spacing="-1">Tech Security</text>
  <text x="75" y="270" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="white" letter-spacing="-1">Weekly Digest</text>

  <!-- Subtitle -->
  <text x="75" y="330" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#f59e0b">Ollama & SolarWinds</text>

  <!-- Tag Pills -->
  <g id="tags">
    <!-- Tag 1: Security -->
    <rect x="75" y="420" width="90" height="28" rx="14" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1"/>
    <text x="120" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Security</text>

    <!-- Tag 2: AI/ML -->
    <rect x="180" y="420" width="75" height="28" rx="14" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
    <text x="217.5" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">AI/ML</text>

    <!-- Tag 3: Infrastructure -->
    <rect x="270" y="420" width="110" height="28" rx="14" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="325" y="440" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Infrastructure</text>
  </g>

  <!-- Footer -->
  <text x="75" y="575" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="white" opacity="0.7">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: Visual Scene (x=650-1150, y=80-550) -->
  <g id="rightVisual">
    <!-- Background subtle grid -->
    <g opacity="0.05" stroke="#3b82f6" stroke-width="0.5">
      <line x1="650" y1="80" x2="650" y2="550"/>
      <line x1="750" y1="80" x2="750" y2="550"/>
      <line x1="850" y1="80" x2="850" y2="550"/>
      <line x1="950" y1="80" x2="950" y2="550"/>
      <line x1="1050" y1="80" x2="1050" y2="550"/>
      <line x1="1150" y1="80" x2="1150" y2="550"/>
      <line x1="650" y1="150" x2="1150" y2="150"/>
      <line x1="650" y1="250" x2="1150" y2="250"/>
      <line x1="650" y1="350" x2="1150" y2="350"/>
      <line x1="650" y1="450" x2="1150" y2="450"/>
      <line x1="650" y1="550" x2="1150" y2="550"/>
    </g>

    <!-- Top Left: Ollama Icon (AI/ML) -->
    <g id="ollama">
      <circle cx="720" cy="160" r="35" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
      <!-- Neural network pattern -->
      <circle cx="710" cy="155" r="4" fill="#3b82f6" opacity="0.4"/>
      <circle cx="730" cy="155" r="4" fill="#3b82f6" opacity="0.4"/>
      <circle cx="720" cy="170" r="4" fill="#3b82f6" opacity="0.4"/>
      <line x1="710" y1="155" x2="720" y2="170" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
      <line x1="730" y1="155" x2="720" y2="170" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
      <text x="720" y="198" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#3b82f6" text-anchor="middle">Ollama</text>
    </g>

    <!-- Top Right: SolarWinds Icon (Network Monitoring) -->
    <g id="solarwinds">
      <circle cx="1080" cy="160" r="35" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
      <!-- Network nodes -->
      <circle cx="1075" cy="150" r="3" fill="#f59e0b" opacity="0.5"/>
      <circle cx="1085" cy="150" r="3" fill="#f59e0b" opacity="0.5"/>
      <circle cx="1070" cy="165" r="3" fill="#f59e0b" opacity="0.5"/>
      <circle cx="1090" cy="165" r="3" fill="#f59e0b" opacity="0.5"/>
      <line x1="1075" y1="150" x2="1070" y2="165" stroke="#f59e0b" stroke-width="0.8" opacity="0.3"/>
      <line x1="1085" y1="150" x2="1090" y2="165" stroke="#f59e0b" stroke-width="0.8" opacity="0.3"/>
      <text x="1080" y="198" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">SolarWinds</text>
    </g>

    <!-- Center: Large Shield with Checkmark -->
    <g id="shield" filter="url(#glow)">
      <!-- Shield shape -->
      <path d="M 900 220 L 950 220 L 950 280 Q 900 330 900 330 Q 850 280 850 280 L 850 220 Z"
            fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="2"/>
      <!-- Inner shield -->
      <path d="M 900 230 L 945 230 L 945 280 Q 900 320 900 320 Q 855 280 855 280 L 855 230 Z"
            fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
      <!-- Checkmark -->
      <polyline points="880,295 895,310 920,280" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    </g>

    <!-- Data Flow Arrows -->
    <!-- Arrow from Ollama to Shield (top-left to center) -->
    <defs>
      <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="0,0 10,5 0,10" fill="#3b82f6" opacity="0.3"/>
      </marker>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="0,0 10,5 0,10" fill="#ef4444" opacity="0.3"/>
      </marker>
      <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="0,0 10,5 0,10" fill="#f59e0b" opacity="0.3"/>
      </marker>
    </defs>

    <!-- Arrow: Ollama → Shield -->
    <path d="M 755 190 Q 820 210 850 240" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.25" marker-end="url(#arrowBlue)" stroke-dasharray="3,3"/>

    <!-- Arrow: SolarWinds → Shield -->
    <path d="M 1045 190 Q 975 210 950 240" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.25" marker-end="url(#arrowOrange)" stroke-dasharray="3,3"/>

    <!-- Bottom: Warning Triangles -->
    <!-- Left Warning -->
    <g id="warning1">
      <polygon points="750,420 770,370 790,420" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="770" cy="405" r="2" fill="#ef4444" opacity="0.5"/>
      <line x1="770" y1="395" x2="770" y2="402" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    </g>

    <!-- Center Warning -->
    <g id="warning2">
      <polygon points="900,430 920,380 940,430" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="920" cy="415" r="2" fill="#ef4444" opacity="0.5"/>
      <line x1="920" y1="405" x2="920" y2="412" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    </g>

    <!-- Right Warning -->
    <g id="warning3">
      <polygon points="1050,420 1070,370 1090,420" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="1070" cy="405" r="2" fill="#ef4444" opacity="0.5"/>
      <line x1="1070" y1="395" x2="1070" y2="402" stroke="#ef4444" stroke-width="1.5" opacity="0.4"/>
    </g>

    <!-- Bottom Center: Data Flow Visualization -->
    <g id="dataflow">
      <!-- Horizontal data line -->
      <line x1="720" y1="480" x2="1080" y2="480" stroke="#3b82f6" stroke-width="1.2" opacity="0.15"/>
      <!-- Data packets -->
      <circle cx="800" cy="480" r="3" fill="#3b82f6" opacity="0.3"/>
      <circle cx="850" cy="480" r="3" fill="#3b82f6" opacity="0.25"/>
      <circle cx="900" cy="480" r="3" fill="#3b82f6" opacity="0.3"/>
      <circle cx="950" cy="480" r="3" fill="#3b82f6" opacity="0.25"/>
      <circle cx="1000" cy="480" r="3" fill="#3b82f6" opacity="0.3"/>
    </g>

    <!-- Lock Icon -->
    <g id="lock" opacity="0.15">
      <rect x="895" y="510" width="30" height="25" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
      <path d="M 900 510 Q 900 500 910 500 Q 920 500 920 510" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
      <circle cx="910" cy="521" r="1.5" fill="#3b82f6"/>
    </g>
  </g>
</svg>