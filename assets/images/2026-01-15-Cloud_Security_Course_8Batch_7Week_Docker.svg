<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>2026 01 15 Cloud Security Course 8Batch 7Week Docker</title>
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0a0c1a;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="dockerBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2496ed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e7db8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2496ed;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- LEFT SIDE: Title and metadata -->
  <!-- Title line 1 -->
  <text x="50" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5px">
    Cloud Security Course
  </text>
  <!-- Title line 2 -->
  <text x="50" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5px">
    8Batch 7Week Docker
  </text>

  <!-- Date badge -->
  <rect x="50" y="280" width="280" height="40" rx="20" fill="#2496ed" opacity="0.15" stroke="#2496ed" stroke-width="1.5"/>
  <text x="160" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4a9eff" text-anchor="middle">
    JANUARY 15, 2026
  </text>

  <!-- Tags -->
  <!-- Tag 1 -->
  <rect x="50" y="420" width="110" height="32" rx="16" fill="#2496ed" opacity="0.2" stroke="#2496ed" stroke-width="1"/>
  <text x="105" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4a9eff" text-anchor="middle">
    security
  </text>

  <!-- Tag 2 -->
  <rect x="170" y="420" width="110" height="32" rx="16" fill="#00d4aa" opacity="0.2" stroke="#00d4aa" stroke-width="1"/>
  <text x="225" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#00d4aa" text-anchor="middle">
    docker
  </text>

  <!-- Tag 3 -->
  <rect x="290" y="420" width="110" height="32" rx="16" fill="#ffa500" opacity="0.2" stroke="#ffa500" stroke-width="1"/>
  <text x="345" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffa500" text-anchor="middle">
    devops
  </text>

  <!-- Footer -->
  <text x="50" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#666" letter-spacing="0.5px">
    tech.2twodragon.com
  </text>

  <!-- RIGHT SIDE: Illustration (x=700-1150, centered) -->
  <!-- Cloud base -->
  <ellipse cx="900" cy="480" rx="140" ry="60" fill="url(#cloudGradient)" opacity="0.3"/>

  <!-- Container stack - bottom -->
  <g id="containerStack">
    <!-- Container 1 (bottom) -->
    <rect x="780" y="440" width="120" height="80" rx="8" fill="url(#dockerBlue)" opacity="0.9" stroke="#4a9eff" stroke-width="2"/>
    <rect x="785" y="445" width="110" height="20" fill="#1e7db8" opacity="0.6"/>
    <text x="840" y="465" font-family="monospace" font-size="11" font-weight="600" fill="#fff" text-anchor="middle" opacity="0.8">
      Container 1
    </text>
    <circle cx="800" cy="500" r="4" fill="#4a9eff" opacity="0.7"/>
    <circle cx="820" cy="510" r="4" fill="#4a9eff" opacity="0.7"/>
    <circle cx="880" cy="505" r="4" fill="#4a9eff" opacity="0.7"/>

    <!-- Container 2 (middle) -->
    <rect x="820" y="360" width="120" height="80" rx="8" fill="url(#dockerBlue)" opacity="0.8" stroke="#4a9eff" stroke-width="2" transform="skewY(-3)"/>
    <rect x="825" y="365" width="110" height="20" fill="#1e7db8" opacity="0.6"/>
    <text x="880" y="385" font-family="monospace" font-size="11" font-weight="600" fill="#fff" text-anchor="middle" opacity="0.8">
      Container 2
    </text>
    <circle cx="840" cy="420" r="4" fill="#4a9eff" opacity="0.7"/>
    <circle cx="860" cy="430" r="4" fill="#4a9eff" opacity="0.7"/>
    <circle cx="920" cy="425" r="4" fill="#4a9eff" opacity="0.7"/>

    <!-- Container 3 (top) -->
    <rect x="860" y="280" width="120" height="80" rx="8" fill="url(#dockerBlue)" opacity="0.85" stroke="#4a9eff" stroke-width="2" transform="skewY(-5)"/>
    <rect x="865" y="285" width="110" height="20" fill="#1e7db8" opacity="0.6"/>
    <text x="920" y="305" font-family="monospace" font-size="11" font-weight="600" fill="#fff" text-anchor="middle" opacity="0.8">
      Container 3
    </text>
    <circle cx="880" cy="340" r="4" fill="#4a9eff" opacity="0.7"/>
    <circle cx="900" cy="350" r="4" fill="#4a9eff" opacity="0.7"/>
    <circle cx="960" cy="345" r="4" fill="#4a9eff" opacity="0.7"/>
  </g>

  <!-- Security shield overlay -->
  <g id="shield" opacity="0.85">
    <path d="M 1020 200 L 1080 220 L 1080 300 Q 1050 330 1050 360 Q 1050 330 1020 300 L 1020 220 Z"
          fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Shield checkmark -->
    <path d="M 1040 270 L 1050 280 L 1070 250"
          fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Lock icon (security) -->
  <g id="lock" opacity="0.8">
    <rect x="1005" y="120" width="40" height="35" rx="3" fill="none" stroke="#ffa500" stroke-width="2.5"/>
    <path d="M 1015 120 Q 1015 105 1025 105 Q 1035 105 1035 120"
          fill="none" stroke="#ffa500" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="1025" cy="135" r="2.5" fill="#ffa500"/>
  </g>

  <!-- Connecting lines (network) -->
  <line x1="900" y1="460" x2="950" y2="380" stroke="#4a9eff" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,3"/>
  <line x1="920" y1="440" x2="1000" y2="260" stroke="#00d4aa" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,3"/>
  <line x1="880" y1="360" x2="1010" y2="300" stroke="#ffa500" stroke-width="1.5" opacity="0.3" stroke-dasharray="5,3"/>

  <!-- Accent dots (orchestration) -->
  <circle cx="950" cy="320" r="3" fill="#4a9eff" opacity="0.6"/>
  <circle cx="980" cy="380" r="2.5" fill="#00d4aa" opacity="0.5"/>
  <circle cx="1000" cy="430" r="2" fill="#ffa500" opacity="0.4"/>

  <!-- Decorative element: course badge -->
  <g id="courseBadge" opacity="0.9">
    <rect x="1040" y="440" width="80" height="50" rx="4" fill="#1a3a52" stroke="#2496ed" stroke-width="1.5"/>
    <text x="1080" y="458" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#4a9eff" text-anchor="middle">
      8 BATCHES
    </text>
    <text x="1080" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#00d4aa" text-anchor="middle">
      7 WEEKS
    </text>
  </g>
</svg>