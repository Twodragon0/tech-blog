<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>AWS re:Inforce 2025 - Cloud Security Future</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a3555"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Background circles -->
  <circle cx="1050" cy="450" r="200" fill="#ff9900" opacity="0.04" filter="url(#sg)"/>
  <circle cx="1050" cy="450" r="140" fill="#2980b9" opacity="0.05" filter="url(#sg)"/>
  <!-- Grid lines H -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Grid lines V -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Topic illustrations - right side -->
  <!-- AWS logo outline (simplified) -->
  <g transform="translate(900,300)" opacity="0.35">
    <path d="M-80,20 Q-90,35 -70,40 Q-50,45 -30,35 Q-10,50 20,48 Q50,46 60,30 Q80,32 85,15 Q90,-5 70,-15 Q68,-35 45,-38 Q35,-55 10,-55 Q-15,-55 -25,-40 Q-50,-45 -60,-28 Q-80,-28 -85,-10 Q-90,5 -80,20 Z" fill="none" stroke="#ff9900" stroke-width="2.5"/>
    <!-- Cloud rain lines -->
    <line x1="-40" y1="55" x2="-45" y2="75" stroke="#ff9900" stroke-width="2" opacity="0.6"/>
    <line x1="-10" y1="58" x2="-15" y2="80" stroke="#ff9900" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="55" x2="15" y2="75" stroke="#ff9900" stroke-width="2" opacity="0.6"/>
    <!-- Conference stage shape -->
    <rect x="-100" y="90" width="200" height="8" rx="4" fill="#2980b9" opacity="0.5"/>
    <rect x="-70" y="82" width="15" height="12" rx="2" fill="#2980b9" opacity="0.4"/>
    <rect x="-10" y="78" width="20" height="16" rx="2" fill="#ff9900" opacity="0.5"/>
    <rect x="50" y="82" width="15" height="12" rx="2" fill="#2980b9" opacity="0.4"/>
    <!-- Podium -->
    <rect x="-12" y="98" width="24" height="30" rx="3" fill="#ff9900" opacity="0.3"/>
    <!-- Spotlight beams -->
    <line x1="0" y1="0" x2="-60" y2="85" stroke="#ff9900" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="0" x2="0" y2="85" stroke="#ff9900" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="0" x2="60" y2="85" stroke="#ff9900" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>
  <!-- Date badge -->
  <rect x="40" y="38" width="260" height="34" rx="17" fill="#ff9900" opacity="0.15" stroke="#ff9900" stroke-width="1"/>
  <text x="80" y="60" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#ff9900">SEPTEMBER 16, 2025</text>
  <!-- Title -->
  <text x="80" y="185" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#ffffff" filter="url(#glow)">AWS re:Inforce 2025 -</text>
  <text x="80" y="245" font-family="Arial,sans-serif" font-size="46" font-weight="bold" fill="#ff9900" filter="url(#glow)">Cloud Security Future</text>
  <!-- Subtitle -->
  <text x="80" y="300" font-family="Arial,sans-serif" font-size="19" fill="#94a3b8">Re:Inforce 2025 keynotes, sessions &amp; security announcements</text>
  <!-- Accent line -->
  <line x1="80" y1="325" x2="560" y2="325" stroke="#ff9900" stroke-width="2" opacity="0.6"/>
  <!-- Category -->
  <text x="80" y="370" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2980b9" letter-spacing="3">AWS CONFERENCE</text>
  <!-- Pill tags -->
  <rect x="80" y="398" width="110" height="32" rx="16" fill="#ff9900" opacity="0.15" stroke="#ff9900" stroke-width="1"/>
  <text x="135" y="419" font-family="Arial,sans-serif" font-size="13" fill="#ff9900" text-anchor="middle">re:Inforce</text>
  <rect x="204" y="398" width="70" height="32" rx="16" fill="#2980b9" opacity="0.15" stroke="#2980b9" stroke-width="1"/>
  <text x="239" y="419" font-family="Arial,sans-serif" font-size="13" fill="#7eb8e0" text-anchor="middle">AWS</text>
  <rect x="288" y="398" width="140" height="32" rx="16" fill="#2980b9" opacity="0.1" stroke="#2980b9" stroke-width="1"/>
  <text x="358" y="419" font-family="Arial,sans-serif" font-size="13" fill="#7eb8e0" text-anchor="middle">Cloud Security</text>
  <!-- Bottom bar -->
  <rect x="0" y="520" width="1200" height="110" fill="#000000" opacity="0.25"/>
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#ff9900" stroke-width="1" opacity="0.3"/>
  <text x="80" y="566" font-family="Arial,sans-serif" font-size="14" fill="#64748b">tech.2twodragon.com</text>
  <text x="80" y="592" font-family="Arial,sans-serif" font-size="13" fill="#475569">DevSecOps</text>
</svg>
