<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="diskGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Left Side Content -->
  <!-- Title Line 1 -->
  <text x="50" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">
    Tech Security Weekly
  </text>

  <!-- Title Line 2 -->
  <text x="50" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="white" letter-spacing="-0.5">
    Digest BitLocker FBI
  </text>

  <!-- Date Badge -->
  <rect x="50" y="280" width="280" height="40" rx="20" fill="#1e293b" opacity="0.8"/>
  <text x="60" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#64748b">
    JANUARY 24, 2026
  </text>

  <!-- Tag Pills -->
  <!-- Tag 1 -->
  <rect x="50" y="420" width="110" height="32" rx="16" fill="#4f46e5" opacity="0.2" stroke="#4f46e5" stroke-width="1"/>
  <text x="60" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#a5b4fc">
    Encryption
  </text>

  <!-- Tag 2 -->
  <rect x="175" y="420" width="90" height="32" rx="16" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
  <text x="185" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#67e8f9">
    BitLocker
  </text>

  <!-- Tag 3 -->
  <rect x="280" y="420" width="80" height="32" rx="16" fill="#ec4899" opacity="0.2" stroke="#ec4899" stroke-width="1"/>
  <text x="290" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f472b6">
    Security
  </text>

  <!-- Footer -->
  <text x="50" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">
    tech.2twodragon.com
  </text>

  <!-- Right Side Illustration -->
  <!-- Background accent circle -->
  <circle cx="950" cy="220" r="220" fill="#1e293b" opacity="0.3"/>
  <circle cx="950" cy="220" r="200" fill="#0f172a" opacity="0.5"/>

  <!-- Disk/Drive - Bottom Layer -->
  <g transform="translate(950, 280)">
    <!-- Outer disk -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="url(#diskGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="85" fill="none" stroke="url(#diskGradient)" stroke-width="1.5" opacity="0.4"/>

    <!-- Disk center -->
    <circle cx="0" cy="0" r="70" fill="#0f172a" opacity="0.8"/>

    <!-- Disk rings -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#diskGradient)" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="url(#diskGradient)" stroke-width="1" opacity="0.4"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="url(#diskGradient)"/>
  </g>

  <!-- Shield/Badge - Overlaid on disk -->
  <g transform="translate(900, 180)" filter="url(#glow)">
    <!-- Shield outline -->
    <path d="M 0 -35 L 25 -20 L 25 5 Q 0 35 0 35 Q -25 35 -25 5 L -25 -20 Z"
          fill="url(#shieldGradient)" opacity="0.9" stroke="#ec4899" stroke-width="1.5"/>

    <!-- Shield inner detail -->
    <path d="M 0 -25 L 18 -15 L 18 5 Q 0 28 0 28 Q -18 28 -18 5 L -18 -15 Z"
          fill="none" stroke="#f8bbd0" stroke-width="1" opacity="0.6"/>

    <!-- Checkmark inside shield -->
    <path d="M -8 10 L -2 16 L 10 4"
          fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Lock symbol - Top Right -->
  <g transform="translate(1020, 140)" filter="url(#glow)">
    <!-- Lock body -->
    <rect x="-18" y="-8" width="36" height="28" rx="3" fill="url(#lockGradient)" opacity="0.9"/>

    <!-- Lock shackle (top part) -->
    <path d="M -10 -8 Q -10 -28 0 -28 Q 10 -28 10 -8"
          fill="none" stroke="url(#lockGradient)" stroke-width="4" stroke-linecap="round"/>

    <!-- Lock keyhole -->
    <circle cx="0" cy="4" r="4" fill="#0a0c1a"/>
    <rect x="-2" y="8" width="4" height="8" fill="#0a0c1a"/>
  </g>

  <!-- Digital encryption waves -->
  <g opacity="0.5">
    <!-- Wave 1 -->
    <path d="M 750 200 Q 800 180 850 200" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5,5"/>

    <!-- Wave 2 -->
    <path d="M 760 250 Q 820 230 880 250" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="5,5"/>

    <!-- Wave 3 -->
    <path d="M 750 300 Q 800 280 850 300" fill="none" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="5,5"/>
  </g>

  <!-- Connecting dots/nodes for tech feel -->
  <circle cx="850" cy="200" r="3" fill="#4f46e5" opacity="0.7"/>
  <circle cx="900" cy="220" r="3" fill="#06b6d4" opacity="0.7"/>
  <circle cx="880" cy="280" r="3" fill="#ec4899" opacity="0.7"/>
  <circle cx="920" cy="300" r="3" fill="#4f46e5" opacity="0.6"/>

  <!-- Binary/Data streams on right edge -->
  <text x="1080" y="150" font-family="monospace" font-size="11" fill="#4f46e5" opacity="0.4">
    01001011
  </text>
  <text x="1080" y="280" font-family="monospace" font-size="11" fill="#06b6d4" opacity="0.4">
    10110100
  </text>
  <text x="1080" y="410" font-family="monospace" font-size="11" fill="#ec4899" opacity="0.4">
    11010110
  </text>

  <!-- Accent line -->
  <line x1="700" y1="0" x2="700" y2="630" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
</svg>