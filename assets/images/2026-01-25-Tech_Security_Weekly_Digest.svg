<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>Tech Security Weekly Digest</title>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>
  
  <!-- Date Badge -->
  <rect x="60" y="50" width="180" height="36" rx="6" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="150" y="72" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">JANUARY 25, 2026</text>
  
  <!-- LEFT SIDE TEXT -->
  <!-- Main Title -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Tech Security</text>
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="white">Digest VMware vCenter</text>
  
  <!-- Tag Pills -->
  <rect x="80" y="430" width="120" height="32" rx="16" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="451" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#3b82f6" text-anchor="middle">Security</text>
  
  <rect x="220" y="430" width="100" height="32" rx="16" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="270" y="451" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">VMware</text>
  
  <rect x="340" y="430" width="110" height="32" rx="16" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5"/>
  <text x="395" y="451" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">vCenter</text>
  
  <!-- Footer -->
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="white" opacity="0.7">tech.2twodragon.com</text>
  
  <!-- RIGHT SIDE VISUAL ELEMENTS -->
  <!-- Shield with checkmark (large) -->
  <g opacity="0.12">
    <path d="M 900 120 L 950 140 L 950 240 Q 950 290 900 310 Q 850 290 850 240 L 850 140 Z" fill="#3b82f6" stroke="#3b82f6" stroke-width="0.3"/>
  </g>
  
  <!-- Checkmark inside shield -->
  <g opacity="0.25">
    <path d="M 880 240 L 895 255 L 920 220" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Warning Triangle 1 -->
  <g opacity="0.1">
    <polygon points="750,180 770,140 790,180" fill="#ef4444" stroke="#ef4444" stroke-width="0.25"/>
    <line x1="770" y1="160" x2="770" y2="170" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
    <circle cx="770" cy="176" r="0.8" fill="#ef4444" opacity="0.4"/>
  </g>
  
  <!-- Warning Triangle 2 -->
  <g opacity="0.1">
    <polygon points="1050,200 1070,160 1090,200" fill="#f59e0b" stroke="#f59e0b" stroke-width="0.25"/>
    <line x1="1070" y1="175" x2="1070" y2="185" stroke="#f59e0b" stroke-width="0.5" opacity="0.4"/>
    <circle cx="1070" cy="191" r="0.8" fill="#f59e0b" opacity="0.4"/>
  </g>
  
  <!-- Data Flow Arrows -->
  <!-- Arrow 1: Left to Shield -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.15"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.15"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.15"/>
    </marker>
  </defs>
  
  <path d="M 700 200 Q 800 180 850 180" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.12" marker-end="url(#arrowBlue)"/>
  
  <!-- Arrow 2: Shield to right warning -->
  <path d="M 950 220 Q 1000 220 1050 220" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.12" marker-end="url(#arrowOrange)"/>
  
  <!-- Arrow 3: Down from shield -->
  <path d="M 900 310 Q 900 380 900 450" fill="none" stroke="#ef4444" stroke-width="1.2" opacity="0.12" marker-end="url(#arrowRed)"/>
  
  <!-- Data nodes/circles -->
  <circle cx="680" cy="200" r="8" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.5"/>
  <circle cx="1080" cy="350" r="8" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.5"/>
  <circle cx="900" cy="480" r="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.5"/>
  
  <!-- Threat indicator dots (connecting pattern) -->
  <circle cx="760" cy="300" r="3" fill="#ef4444" opacity="0.06"/>
  <circle cx="800" cy="330" r="3" fill="#ef4444" opacity="0.06"/>
  <circle cx="840" cy="360" r="3" fill="#ef4444" opacity="0.06"/>
  
  <!-- Interconnecting lines (threat network) -->
  <line x1="760" y1="300" x2="800" y2="330" stroke="#ef4444" stroke-width="0.8" opacity="0.06"/>
  <line x1="800" y1="330" x2="840" y2="360" stroke="#ef4444" stroke-width="0.8" opacity="0.06"/>
  <line x1="840" y1="360" x2="900" y2="400" stroke="#ef4444" stroke-width="0.8" opacity="0.06"/>
  
  <!-- Lock icon element (security indicator) -->
  <g opacity="0.1">
    <rect x="1020" y="420" width="24" height="28" rx="3" fill="none" stroke="#3b82f6" stroke-width="0.5"/>
    <path d="M 1024 420 L 1024 414 Q 1024 410 1028 410 Q 1032 410 1032 414 L 1032 420" fill="none" stroke="#3b82f6" stroke-width="0.5"/>
    <circle cx="1028" cy="426" r="2" fill="none" stroke="#3b82f6" stroke-width="0.3"/>
  </g>
  
  <!-- Highlight accent line on right -->
  <line x1="1140" y1="100" x2="1140" y2="550" stroke="#f59e0b" stroke-width="0.8" opacity="0.08"/>
</svg>