<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- Subtle gradient overlay for depth -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:0.3" />
    </linearGradient>
    <radialGradient id="awsOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FF6600;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Right side illustration: AWS Security Theme -->
  <g id="illustration">
    <!-- Large AWS badge/shield background -->
    <circle cx="920" cy="280" r="160" fill="none" stroke="#FF9900" stroke-width="2" opacity="0.4"/>
    <circle cx="920" cy="280" r="140" fill="none" stroke="#FF9900" stroke-width="1" opacity="0.3"/>

    <!-- Central AWS shield with security lock -->
    <g id="awsShield">
      <!-- Shield shape -->
      <path d="M 920 120 L 980 160 L 980 280 Q 920 340 920 340 Q 860 280 860 160 Z"
            fill="none" stroke="#FF9900" stroke-width="3"/>
      <path d="M 920 130 L 975 165 L 975 270 Q 920 325 920 325 Q 865 270 865 165 Z"
            fill="#FF9900" opacity="0.15"/>
    </g>

    <!-- Central lock symbol -->
    <g id="securityLock">
      <!-- Lock body -->
      <rect x="895" y="240" width="50" height="45" rx="4" fill="#FF9900" opacity="0.9"/>
      <!-- Lock shackle -->
      <path d="M 905 240 Q 905 210 920 210 Q 935 210 935 240"
            fill="none" stroke="#FF9900" stroke-width="4" opacity="0.9"/>
      <!-- Lock keyhole -->
      <circle cx="920" cy="265" r="4" fill="#0a0c1a"/>
    </g>

    <!-- AWS regions/cloud elements around shield -->
    <circle cx="780" cy="220" r="35" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.6"/>
    <circle cx="780" cy="220" r="30" fill="#00D4FF" opacity="0.08"/>
    <text x="780" y="228" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
          fill="#00D4FF" text-anchor="middle" opacity="0.8">AWS</text>

    <circle cx="1050" cy="240" r="35" fill="none" stroke="#44FF00" stroke-width="2" opacity="0.6"/>
    <circle cx="1050" cy="240" r="30" fill="#44FF00" opacity="0.08"/>
    <text x="1050" y="248" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
          fill="#44FF00" text-anchor="middle" opacity="0.8">SEC</text>

    <circle cx="800" cy="380" r="35" fill="none" stroke="#9D00FF" stroke-width="2" opacity="0.6"/>
    <circle cx="800" cy="380" r="30" fill="#9D00FF" opacity="0.08"/>
    <text x="800" y="388" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
          fill="#9D00FF" text-anchor="middle" opacity="0.8">IAM</text>

    <!-- Week 2 badge -->
    <circle cx="920" cy="420" r="40" fill="none" stroke="#FF9900" stroke-width="2" opacity="0.7"/>
    <circle cx="920" cy="420" r="38" fill="#FF9900" opacity="0.12"/>
    <text x="920" y="415" font-family="Arial, sans-serif" font-size="14" font-weight="bold"
          fill="#FF9900" text-anchor="middle">WEEK</text>
    <text x="920" y="433" font-family="Arial, sans-serif" font-size="22" font-weight="bold"
          fill="#FF9900" text-anchor="middle">2</text>

    <!-- Connecting lines/network -->
    <line x1="815" y1="235" x2="885" y2="190" stroke="#00D4FF" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
    <line x1="955" y1="185" x2="1015" y2="230" stroke="#44FF00" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
    <line x1="900" y1="330" x2="835" y2="360" stroke="#9D00FF" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>

    <!-- Certification checkmark -->
    <g opacity="0.8">
      <circle cx="985" cy="155" r="18" fill="#44FF00" opacity="0.2" stroke="#44FF00" stroke-width="1.5"/>
      <path d="M 978 157 L 982 161 L 992 150" fill="none" stroke="#44FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Left side content -->
  <!-- Title -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="46" font-weight="bold"
        fill="white" letter-spacing="-1">Cloud Security 8Batch</text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold"
        fill="#FF9900">2Week AWS Security</text>

  <!-- Date badge -->
  <rect x="60" y="290" width="280" height="50" rx="8" fill="none" stroke="#FF9900" stroke-width="2" opacity="0.6"/>
  <rect x="60" y="290" width="280" height="50" rx="8" fill="#FF9900" opacity="0.08"/>
  <text x="200" y="325" font-family="Arial, sans-serif" font-size="18" font-weight="600"
        fill="#FF9900" text-anchor="middle">DECEMBER 5, 2025</text>

  <!-- Tag pills -->
  <g id="tags">
    <!-- Tag 1: AWS -->
    <rect x="60" y="415" width="95" height="40" rx="20" fill="none" stroke="#00D4FF" stroke-width="1.5" opacity="0.7"/>
    <text x="107" y="440" font-family="Arial, sans-serif" font-size="14" font-weight="600"
          fill="#00D4FF" text-anchor="middle" opacity="0.9">AWS</text>

    <!-- Tag 2: Security -->
    <rect x="175" y="415" width="120" height="40" rx="20" fill="none" stroke="#44FF00" stroke-width="1.5" opacity="0.7"/>
    <text x="235" y="440" font-family="Arial, sans-serif" font-size="14" font-weight="600"
          fill="#44FF00" text-anchor="middle" opacity="0.9">Security</text>

    <!-- Tag 3: IAM -->
    <rect x="315" y="415" width="90" height="40" rx="20" fill="none" stroke="#9D00FF" stroke-width="1.5" opacity="0.7"/>
    <text x="360" y="440" font-family="Arial, sans-serif" font-size="14" font-weight="600"
          fill="#9D00FF" text-anchor="middle" opacity="0.9">IAM</text>
  </g>

  <!-- Footer -->
  <text x="60" y="600" font-family="Arial, sans-serif" font-size="14" font-weight="500"
        fill="#888888">tech.2twodragon.com</text>

  <!-- Subtle accent line -->
  <line x1="60" y1="360" x2="420" y2="360" stroke="#FF9900" stroke-width="1" opacity="0.3"/>
</svg>