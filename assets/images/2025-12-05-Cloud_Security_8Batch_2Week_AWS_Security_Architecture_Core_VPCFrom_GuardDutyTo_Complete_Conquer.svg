<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff8800"/>
      <stop offset="100%" style="stop-color:#ff4444"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:rgba(255,68,68,0)"/>
    </linearGradient>
    <linearGradient id="dateBadge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,68,68,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,68,68,0.05)"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2255cc;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: AWS Security Architecture -->
  <!-- Outer ring: represents AWS cloud boundary -->
  <circle cx="1010" cy="225" r="120" fill="none" stroke="rgba(255,100,50,0.25)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="1010" cy="225" r="95" fill="rgba(255,60,30,0.06)" stroke="rgba(255,80,40,0.2)" stroke-width="1"/>

  <!-- Cloud shape (AWS cloud icon) -->
  <path d="M960,215 Q960,195 980,195 Q982,180 1000,178 Q1010,165 1025,172 Q1040,162 1055,172 Q1070,168 1072,183 Q1088,185 1088,200 Q1095,205 1092,215 Z" fill="url(#cloudGrad)" stroke="rgba(100,180,255,0.3)" stroke-width="1.5"/>

  <!-- Central shield (security) -->
  <path d="M1010,200 L1040,212 L1040,238 Q1040,258 1010,268 Q980,258 980,238 L980,212 Z" fill="url(#shieldGrad)" stroke="rgba(255,100,50,0.35)" stroke-width="1.5"/>
  <!-- Shield lock icon -->
  <rect x="1001" y="230" width="18" height="14" rx="2" fill="none" stroke="rgba(255,180,80,0.5)" stroke-width="1.2"/>
  <path d="M1004,230 Q1004,223 1010,223 Q1016,223 1016,230" fill="none" stroke="rgba(255,180,80,0.5)" stroke-width="1.2"/>
  <circle cx="1010" cy="237" r="2" fill="rgba(255,180,80,0.6)"/>

  <!-- IAM key icon (top left of illustration) -->
  <g transform="translate(890,145)">
    <circle cx="0" cy="0" r="16" fill="rgba(255,200,50,0.08)" stroke="rgba(255,200,50,0.3)" stroke-width="1"/>
    <path d="M-6,-2 Q-6,-8 0,-8 Q6,-8 6,-2 Q6,2 2,4 L4,8 L0,8 L0,6 L-2,6 L-2,4 Q-6,2 -6,-2 Z" fill="none" stroke="rgba(255,200,80,0.5)" stroke-width="1"/>
    <circle cx="1" cy="-2" r="2" fill="rgba(255,220,80,0.4)"/>
  </g>

  <!-- WAF shield icon (top right) -->
  <g transform="translate(1120,145)">
    <circle cx="0" cy="0" r="16" fill="rgba(100,255,150,0.07)" stroke="rgba(100,255,150,0.25)" stroke-width="1"/>
    <path d="M0,-9 L7,-5 L7,3 Q7,9 0,12 Q-7,9 -7,3 L-7,-5 Z" fill="none" stroke="rgba(100,255,150,0.4)" stroke-width="1.2"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="rgba(100,255,150,0.5)" stroke-width="1"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="rgba(100,255,150,0.5)" stroke-width="1"/>
  </g>

  <!-- VPC boundary (dashed rect) -->
  <rect x="890" y="165" width="240" height="120" rx="8" fill="rgba(60,100,255,0.04)" stroke="rgba(80,120,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- VPC label -->
  <text x="897" y="179" font-family="monospace" font-size="9" fill="rgba(100,160,255,0.45)" letter-spacing="1">VPC</text>

  <!-- EC2 instance boxes inside VPC -->
  <rect x="905" y="248" width="28" height="22" rx="3" fill="rgba(255,150,50,0.1)" stroke="rgba(255,150,50,0.3)" stroke-width="1"/>
  <text x="909" y="263" font-family="monospace" font-size="7" fill="rgba(255,170,70,0.55)">EC2</text>

  <rect x="945" y="248" width="28" height="22" rx="3" fill="rgba(255,150,50,0.1)" stroke="rgba(255,150,50,0.3)" stroke-width="1"/>
  <text x="949" y="263" font-family="monospace" font-size="7" fill="rgba(255,170,70,0.55)">RDS</text>

  <rect x="985" y="248" width="28" height="22" rx="3" fill="rgba(255,150,50,0.1)" stroke="rgba(255,150,50,0.3)" stroke-width="1"/>
  <text x="988" y="263" font-family="monospace" font-size="7" fill="rgba(255,170,70,0.55)">S3</text>

  <!-- Connection lines between components -->
  <line x1="1010" y1="268" x2="919" y2="248" stroke="rgba(255,100,50,0.2)" stroke-width="1"/>
  <line x1="1010" y1="268" x2="959" y2="248" stroke="rgba(255,100,50,0.2)" stroke-width="1"/>
  <line x1="1010" y1="268" x2="999" y2="248" stroke="rgba(255,100,50,0.2)" stroke-width="1"/>

  <!-- CloudTrail log stream lines -->
  <g opacity="0.35">
    <line x1="1065" y1="185" x2="1095" y2="185" stroke="rgba(180,220,255,0.5)" stroke-width="1"/>
    <line x1="1065" y1="195" x2="1110" y2="195" stroke="rgba(180,220,255,0.4)" stroke-width="1"/>
    <line x1="1065" y1="205" x2="1100" y2="205" stroke="rgba(180,220,255,0.3)" stroke-width="1"/>
  </g>

  <!-- Orbit ring around central cluster -->
  <ellipse cx="1010" cy="225" rx="115" ry="45" fill="none" stroke="rgba(255,80,30,0.1)" stroke-width="1" transform="rotate(-15,1010,225)"/>

  <!-- Small security node dots -->
  <circle cx="960" cy="155" r="4" fill="rgba(255,80,50,0.25)" stroke="rgba(255,80,50,0.4)" stroke-width="1"/>
  <circle cx="1060" cy="148" r="4" fill="rgba(100,200,255,0.25)" stroke="rgba(100,200,255,0.4)" stroke-width="1"/>
  <circle cx="1095" cy="275" r="4" fill="rgba(100,255,150,0.22)" stroke="rgba(100,255,150,0.35)" stroke-width="1"/>
  <circle cx="925" cy="280" r="4" fill="rgba(255,200,50,0.22)" stroke="rgba(255,200,50,0.35)" stroke-width="1"/>

  <!-- Lines from shield to nodes -->
  <line x1="1010" y1="200" x2="960" y2="155" stroke="rgba(255,80,50,0.15)" stroke-width="1"/>
  <line x1="1010" y1="200" x2="1060" y2="148" stroke="rgba(100,200,255,0.15)" stroke-width="1"/>
  <line x1="1040" y1="250" x2="1095" y2="275" stroke="rgba(100,255,150,0.12)" stroke-width="1"/>
  <line x1="980" y1="250" x2="925" y2="280" stroke="rgba(255,200,50,0.12)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(255,80,80,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,160,50,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(255,80,80,0.5)"/>

  <!-- Background circles (subtle) -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="230" height="32" rx="4" fill="url(#dateBadge)" stroke="rgba(255,68,68,0.3)" stroke-width="1"/>
  <text x="96" y="81" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,180,150,0.85)" letter-spacing="1.5">DECEMBER 5, 2025</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">Cloud Security 8Batch 2Week</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="46" font-weight="700" fill="white" opacity="0.97">AWS Security Architecture Core</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="19" fill="rgba(255,200,180,0.7)">IAM · VPC · CloudTrail · Security Hub · GuardDuty</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Courier New', monospace" font-size="14" fill="rgba(255,120,80,0.65)" letter-spacing="2.5">CLOUD SECURITY &amp; AWS ARCHITECTURE</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="118" height="36" rx="18" fill="rgba(220,50,50,0.18)" stroke="rgba(220,80,80,0.35)" stroke-width="1"/>
  <text x="139" y="425" font-family="'Arial', sans-serif" font-size="12" fill="rgba(255,140,130,0.9)" text-anchor="middle" letter-spacing="0.5">AWS Security</text>

  <rect x="210" y="402" width="96" height="36" rx="18" fill="rgba(200,120,20,0.18)" stroke="rgba(220,160,50,0.35)" stroke-width="1"/>
  <text x="258" y="425" font-family="'Arial', sans-serif" font-size="12" fill="rgba(255,200,100,0.9)" text-anchor="middle" letter-spacing="0.5">IAM / VPC</text>

  <rect x="318" y="402" width="118" height="36" rx="18" fill="rgba(30,80,200,0.18)" stroke="rgba(80,140,255,0.35)" stroke-width="1"/>
  <text x="377" y="425" font-family="'Arial', sans-serif" font-size="12" fill="rgba(130,190,255,0.9)" text-anchor="middle" letter-spacing="0.5">CloudTrail</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="1">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Courier New', monospace" font-size="13" fill="rgba(255,120,80,0.4)" text-anchor="end" letter-spacing="1">CLOUD</text>
</svg>