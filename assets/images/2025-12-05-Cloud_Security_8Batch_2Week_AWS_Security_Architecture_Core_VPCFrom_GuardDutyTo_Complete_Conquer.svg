<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b" opacity="0.7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" opacity="0.7"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0a0c1a"/>

  <!-- LEFT SIDE: TEXT CONTENT -->

  <!-- Date badge -->
  <rect x="80" y="60" width="160" height="28" rx="6" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.8"/>
  <text x="160" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444" text-anchor="middle">DECEMBER 5, 2025</text>

  <!-- Main title line 1 -->
  <text x="80" y="185" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Cloud Security</text>

  <!-- Main title line 2 -->
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">8Batch 2Week</text>

  <!-- Subtitle -->
  <text x="80" y="305" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#d1d5db">AWS Security</text>

  <!-- Tag pills -->
  <rect x="80" y="430" width="90" height="32" rx="16" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="125" y="451" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">AWS</text>

  <rect x="190" y="430" width="110" height="32" rx="16" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="245" y="451" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Security</text>

  <rect x="320" y="430" width="120" height="32" rx="16" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="0.8"/>
  <text x="380" y="451" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ef4444" text-anchor="middle">Compliance</text>

  <!-- Footer -->
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#6b7280">tech.2twodragon.com</text>

  <!-- RIGHT SIDE: VISUAL SCENE -->

  <!-- Cloud Infrastructure - top center -->
  <g opacity="0.85">
    <!-- Cloud main shape -->
    <path d="M 750 180 C 745 160, 760 140, 780 140 C 795 140, 805 150, 810 165 C 830 165, 845 180, 845 200 C 845 220, 830 235, 810 235 L 750 235 C 730 235, 715 220, 715 200 C 715 180, 730 165, 750 165 Z"
          fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="0.8"/>
    <!-- Cloud accent lines -->
    <path d="M 760 185 L 790 200" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
    <path d="M 800 175 L 820 195" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Data flow arrow from cloud down-left -->
  <path d="M 760 235 L 760 310" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- Data flow arrow from cloud down-right -->
  <path d="M 820 235 L 880 310" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- Security Shield - bottom center -->
  <g opacity="0.85">
    <!-- Shield outline -->
    <path d="M 820 320 L 880 295 L 880 380 C 880 420, 850 455, 820 470 C 790 455, 760 420, 760 380 L 760 295 Z"
          fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.8"/>
    <!-- Checkmark inside shield -->
    <path d="M 808 385 L 818 398 L 842 360" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- Left warning indicator -->
  <g opacity="0.8">
    <path d="M 730 380 L 745 410 L 715 410 Z" fill="#f59e0b" opacity="0.08" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="730" y="402" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle" opacity="0.6">!</text>
  </g>

  <!-- Right warning indicator -->
  <g opacity="0.8">
    <path d="M 910 360 L 925 390 L 895 390 Z" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.8"/>
    <text x="910" y="382" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle" opacity="0.6">!</text>
  </g>

  <!-- Horizontal connection line between arrows and shield -->
  <path d="M 760 320 L 760 320" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <path d="M 820 350 L 760 350" stroke="#3b82f6" stroke-width="0.8" opacity="0.3" stroke-dasharray="2,2"/>

  <!-- Data packet dots animation path -->
  <circle cx="765" cy="265" r="2" fill="#3b82f6" opacity="0.5"/>
  <circle cx="790" cy="295" r="1.8" fill="#f59e0b" opacity="0.4"/>
  <circle cx="850" cy="330" r="2" fill="#f59e0b" opacity="0.5"/>

  <!-- Bottom accent: monitoring indicators -->
  <g opacity="0.7">
    <circle cx="700" cy="500" r="3" fill="#3b82f6" opacity="0.4"/>
    <circle cx="730" cy="510" r="3" fill="#f59e0b" opacity="0.4"/>
    <circle cx="760" cy="505" r="3" fill="#ef4444" opacity="0.4"/>
    <circle cx="790" cy="515" r="3" fill="#3b82f6" opacity="0.35"/>
    <circle cx="820" cy="508" r="3" fill="#f59e0b" opacity="0.35"/>
    <circle cx="850" cy="520" r="3" fill="#ef4444" opacity="0.35"/>
  </g>

  <!-- Right side glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Subtle connecting nodes -->
  <circle cx="760" cy="320" r="2.5" fill="#3b82f6" opacity="0.3" filter="url(#glow)"/>
  <circle cx="820" cy="310" r="2.5" fill="#f59e0b" opacity="0.3" filter="url(#glow)"/>
  <circle cx="820" cy="420" r="2.5" fill="#ef4444" opacity="0.3" filter="url(#glow)"/>

</svg>