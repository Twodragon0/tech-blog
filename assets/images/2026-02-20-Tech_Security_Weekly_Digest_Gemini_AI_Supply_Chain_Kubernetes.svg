    <rect x="90" y="0" width="111" height="32" rx="16" fill="#7c2d12" opacity="0.7"/>
    <text x="145" y="21" text-anchor="middle" fill="#fdba74" font-family="Arial, sans-serif" font-size="13">Gemini AI</text>
