  <circle cx="970" cy="195" r="7" fill="rgba(52,152,219,0.12)" stroke="rgba(52,152,219,0.4)" stroke-width="1.5"/>
  <circle cx="1050" cy="195" r="7" fill="rgba(52,152,219,0.12)" stroke="rgba(52,152,219,0.4)" stroke-width="1.5"/>
  <circle cx="960" cy="245" r="6" fill="rgba(155,89,182,0.12)" stroke="rgba(155,89,182,0.4)" stroke-width="1.5"/>
  <circle cx="1060" cy="245" r="6" fill="rgba(155,89,182,0.12)" stroke="rgba(155,89,182,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="275" r="8" fill="rgba(229,62,62,0.1)" stroke="rgba(229,62,62,0.35)" stroke-width="1.5"/>

  <!-- Neural connection lines -->
  <line x1="970" y1="195" x2="1010" y2="215" stroke="rgba(52,152,219,0.25)" stroke-width="1"/>
  <line x1="1050" y1="195" x2="1010" y2="215" stroke="rgba(52,152,219,0.25)" stroke-width="1"/>
  <line x1="960" y1="245" x2="1010" y2="215" stroke="rgba(155,89,182,0.25)" stroke-width="1"/>
  <line x1="1060" y1="245" x2="1010" y2="215" stroke="rgba(155,89,182,0.25)" stroke-width="1"/>
  <line x1="960" y1="245" x2="1010" y2="275" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>
  <line x1="1060" y1="245" x2="1010" y2="275" stroke="rgba(229,62,62,0.2)" stroke-width="1"/>

  <!-- Supply chain link rings -->
  <circle cx="935" cy="165" r="14" fill="none" stroke="rgba(255,165,0,0.2)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="910" cy="165" r="14" fill="none" stroke="rgba(255,165,0,0.2)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="1085" cy="165" r="14" fill="none" stroke="rgba(255,165,0,0.2)" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="1110" cy="165" r="14" fill="none" stroke="rgba(255,165,0,0.2)" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Orbit rings around center -->
  <ellipse cx="1010" cy="230" rx="75" ry="55" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="5,4"/>
  <ellipse cx="1010" cy="230" rx="55" ry="38" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="3,5"/>

  <!-- Data packets on orbit -->
  <rect x="1078" y="210" width="8" height="8" rx="2"
        fill="rgba(52,152,219,0.15)" stroke="rgba(52,152,219,0.4)" stroke-width="1" transform="rotate(15,1082,214)"/>
  <rect x="932" y="245" width="8" height="8" rx="2"
        fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1" transform="rotate(-20,936,249)"/>

  <!-- Weekly digest lines (document icon) -->
  <rect x="990" y="285" width="40" height="30" rx="3"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="996" y1="293" x2="1024" y2="293" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="996" y1="299" x2="1024" y2="299" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="996" y1="305" x2="1016" y2="305" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="5" fill="rgba(229,62,62,0.7)" filter="url(#glow)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(255,165,0,0.6)" filter="url(#glow)"/>
  <circle cx="860" cy="440" r="3" fill="rgba(52,152,219,0.6)" filter="url(#glow)"/>

  <!-- Background subtle circles -->
  <circle cx="1050" cy="450" r="200" fill="rgba(229,62,62,0.03)" stroke="none"/>
  <circle cx="1050" cy="450" r="140" fill="rgba(155,89,182,0.04)" stroke="none"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4"
        fill="rgba(229,62,62,0.15)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="93" y="81" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600"
        fill="rgba(229,100,100,0.95)" letter-spacing="1">FEBRUARY 20, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Segoe UI',Arial,sans-serif" font-size="46" font-weight="700"
        fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Segoe UI',Arial,sans-serif" font-size="46" font-weight="700"
        fill="rgba(229,130,130,0.95)">Gemini AI Supply Chain</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Segoe UI',Arial,sans-serif" font-size="19"
        fill="rgba(180,160,220,0.8)">Security | Threat Intelligence | DevSecOps</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" rx="1" fill="url(#accentLine)"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="600"
        fill="rgba(200,180,240,0.6)" letter-spacing="2">WEEKLY SECURITY INTELLIGENCE BRIEFING</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="130" height="36" rx="18" fill="url(#tagRed)" stroke="rgba(229,62,62,0.4)" stroke-width="1"/>
  <text x="145" y="425" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,160,160,0.95)" text-anchor="middle">AI SECURITY</text>

  <rect x="224" y="402" width="150" height="36" rx="18" fill="url(#tagAmber)" stroke="rgba(255,165,0,0.4)" stroke-width="1"/>
  <text x="299" y="425" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600"
        fill="rgba(255,200,100,0.95)" text-anchor="middle">SUPPLY CHAIN</text>

  <rect x="388" y="402" width="120" height="36" rx="18" fill="url(#tagBlue)" stroke="rgba(52,152,219,0.4)" stroke-width="1"/>
  <text x="448" y="425" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600"
        fill="rgba(120,190,255,0.95)" text-anchor="middle">GEMINI AI</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Segoe UI',Arial,sans-serif" font-size="14"
        fill="rgba(150,130,180,0.55)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Segoe UI',Arial,sans-serif" font-size="14"
        fill="rgba(150,130,180,0.55)" text-anchor="end">SECURITY</text>
</svg>