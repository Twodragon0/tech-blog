  <!-- Gemini twin-star symbol (two overlapping diamond shapes) -->
  <polygon points="1010,178 1030,215 1010,252 990,215"
           fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <polygon points="1010,188 1040,215 1010,242 980,215"
           fill="rgba(155,89,182,0.08)" stroke="rgba(155,89,182,0.3)" stroke-width="1.5"/>

