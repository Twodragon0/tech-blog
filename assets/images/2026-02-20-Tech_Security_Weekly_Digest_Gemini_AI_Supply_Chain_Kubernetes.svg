<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:rgba(79,142,247,0)"/>
    </linearGradient>
    <linearGradient id="gemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="105" x2="1200" y2="105" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="240" y1="0" x2="240" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- RIGHT SIDE ILLUSTRATION: Gemini AI + Supply Chain -->
  <!-- Outer orbital ring -->
  <ellipse cx="1010" cy="225" rx="130" ry="130" fill="none" stroke="rgba(79,142,247,0.22)" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Inner orbital ring -->
  <ellipse cx="1010" cy="225" rx="90" ry="90" fill="none" stroke="rgba(168,85,247,0.28)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Gemini core - dual teardrop shape -->
  <path d="M1010,165 C1045,165 1070,193 1070,225 C1070,257 1045,285 1010,285 C975,285 950,257 950,225 C950,193 975,165 1010,165 Z" fill="url(#gemGrad)" stroke="rgba(79,142,247,0.35)" stroke-width="1.5"/>
  <!-- Inner gemini twin shape -->
  <path d="M1010,185 C1030,185 1048,203 1048,225 C1048,247 1030,265 1010,265 C990,265 972,247 972,225 C972,203 990,185 1010,185 Z" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
  <!-- Gemini twin arc - left -->
  <path d="M1010,205 C1000,205 992,213 992,225 C992,237 1000,245 1010,245" fill="none" stroke="rgba(79,142,247,0.5)" stroke-width="2"/>
  <!-- Gemini twin arc - right -->
  <path d="M1010,205 C1020,205 1028,213 1028,225 C1028,237 1020,245 1010,245" fill="none" stroke="rgba(168,85,247,0.5)" stroke-width="2"/>

  <!-- Supply chain nodes around the orbit -->
  <!-- Node 1 - top -->
  <circle cx="1010" cy="135" r="10" fill="rgba(79,142,247,0.15)" stroke="rgba(79,142,247,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="135" r="5" fill="rgba(79,142,247,0.3)"/>
  <!-- Node 2 - right -->
  <circle cx="1100" cy="225" r="10" fill="rgba(168,85,247,0.15)" stroke="rgba(168,85,247,0.4)" stroke-width="1.5"/>
  <circle cx="1100" cy="225" r="5" fill="rgba(168,85,247,0.3)"/>
  <!-- Node 3 - bottom -->
  <circle cx="1010" cy="315" r="10" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
  <circle cx="1010" cy="315" r="5" fill="rgba(239,68,68,0.3)"/>
  <!-- Node 4 - left -->
  <circle cx="920" cy="225" r="10" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1.5"/>
  <circle cx="920" cy="225" r="5" fill="rgba(245,158,11,0.3)"/>
  <!-- Node 5 - top-right diagonal -->
  <circle cx="1072" cy="163" r="8" fill="rgba(79,142,247,0.12)" stroke="rgba(79,142,247,0.3)" stroke-width="1"/>
  <!-- Node 6 - bottom-left diagonal -->
  <circle cx="948" cy="287" r="8" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>

  <!-- Supply chain connecting links (chain links) -->
  <line x1="1010" y1="145" x2="1010" y2="175" stroke="rgba(79,142,247,0.25)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="1090" y1="225" x2="1058" y2="225" stroke="rgba(168,85,247,0.25)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="1010" y1="305" x2="1010" y2="275" stroke="rgba(239,68,68,0.25)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="930" y1="225" x2="962" y2="225" stroke="rgba(245,158,11,0.25)" stroke-width="1.5" stroke-dasharray="3 2"/>
  <line x1="1065" y1="170" x2="1046" y2="190" stroke="rgba(79,142,247,0.2)" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="955" y1="280" x2="974" y2="260" stroke="rgba(239,68,68,0.2)" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- Supply chain outer box (blockchain-like) -->
  <rect x="880" y="130" width="90" height="38" rx="4" fill="url(#chainGrad)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <rect x="1050" y="130" width="90" height="38" rx="4" fill="url(#chainGrad)" stroke="rgba(79,142,247,0.25)" stroke-width="1"/>
  <rect x="880" y="282" width="90" height="38" rx="4" fill="url(#chainGrad)" stroke="rgba(239,68,68,0.25)" stroke-width="1"/>
  <rect x="1050" y="282" width="90" height="38" rx="4" fill="url(#chainGrad)" stroke="rgba(168,85,247,0.25)" stroke-width="1"/>

  <!-- Chain link connectors between boxes -->
  <line x1="970" y1="149" x2="1050" y2="149" stroke="rgba(245,158,11,0.2)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="970" y1="301" x2="1050" y2="301" stroke="rgba(239,68,68,0.2)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="925" y1="168" x2="925" y2="282" stroke="rgba(245,158,11,0.15)" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="1095" y1="168" x2="1095" y2="282" stroke="rgba(79,142,247,0.15)" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- AI signal lines from core -->
  <line x1="1010" y1="225" x2="925" y2="149" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="1095" y2="149" stroke="rgba(79,142,247,0.15)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="925" y2="301" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
  <line x1="1010" y1="225" x2="1095" y2="301" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>

  <!-- Alert dots -->
  <circle cx="870" cy="400" r="4" fill="rgba(239,68,68,0.7)"/>
  <circle cx="900" cy="420" r="4" fill="rgba(245,158,11,0.7)"/>
  <circle cx="860" cy="440" r="4" fill="rgba(79,142,247,0.7)"/>

  <!-- Background circles subtle -->
  <circle cx="1050" cy="450" r="200" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="1050" cy="450" r="140" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accentBar)"/>

  <!-- Date badge -->
  <rect x="80" y="60" width="220" height="32" rx="4" fill="rgba(79,142,247,0.15)" stroke="rgba(79,142,247,0.3)" stroke-width="1"/>
  <text x="190" y="81" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(79,142,247,0.9)" text-anchor="middle" letter-spacing="1">FEBRUARY 20, 2026</text>

  <!-- Title line 1 -->
  <text x="80" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white">Tech Security Weekly Digest</text>

  <!-- Title line 2 -->
  <text x="80" y="245" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="white">Gemini AI Supply Chain</text>

  <!-- Subtitle -->
  <text x="80" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="rgba(255,255,255,0.55)">Security Intelligence &amp; Threat Analysis | DevSecOps</text>

  <!-- Accent line -->
  <rect x="80" y="325" width="420" height="3" fill="url(#accentLine)" rx="2"/>

  <!-- Category label -->
  <text x="80" y="370" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.4)" letter-spacing="2">SECURITY / AI / SUPPLY CHAIN</text>

  <!-- Tag pills -->
  <rect x="80" y="402" width="120" height="36" rx="18" fill="rgba(239,68,68,0.18)" stroke="rgba(239,68,68,0.4)" stroke-width="1"/>
  <text x="140" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(239,68,68,0.9)" text-anchor="middle">Gemini AI</text>

  <rect x="214" y="402" width="140" height="36" rx="18" fill="rgba(245,158,11,0.18)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="284" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(245,158,11,0.9)" text-anchor="middle">Supply Chain</text>

  <rect x="368" y="402" width="110" height="36" rx="18" fill="rgba(79,142,247,0.18)" stroke="rgba(79,142,247,0.4)" stroke-width="1"/>
  <text x="423" y="425" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="rgba(79,142,247,0.9)" text-anchor="middle">Threat Intel</text>

  <!-- Footer -->
  <text x="80" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">tech.2twodragon.com</text>
  <text x="1120" y="545" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="end">SECURITY</text>
</svg>