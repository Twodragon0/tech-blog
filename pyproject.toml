# pyproject.toml

[tool.ruff]
# Black-compatible code formatter
line-length = 88
indent-width = 4
exclude = [
    ".bundle",
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    ".venv",
    "__pypackages__",
    "_site",
    "api", # JavaScript
    "scripts/_archive",
    "scripts/_archive/**",
    "vendor",
]

[tool.ruff.lint]
# E = pycodestyle errors, F = Pyflakes, W = pycodestyle warnings, I = isort
select = ["E", "F", "W", "I"]
ignore = ["E501"]

# Exclude directories from linting
exclude = [
    ".bundle",
    ".git",
    ".mypy_cache",
    ".ruff_cache",
    ".venv",
    "__pypackages__",
    "_site",
    "api", # JavaScript
    "scripts/_archive",
    "vendor",
]

[tool.ruff.lint]
# E = pycodestyle errors, F = Pyflakes, W = pycodestyle warnings, I = isort
select = ["E", "F", "W", "I"]
# E501: Line too long - disabled due to Korean text and SVG templates
# W291/W293: Trailing/leading whitespace in string literals
# E722: Bare except - common in legacy scripts with broad error handling
# E741: Ambiguous variable name - legacy code
# E402: Import not at top - scripts with sys.path manipulation
# E701: Multiple statements on one line
# F841: Unused variable - legacy scripts with side effects
# F601: Redundant membership test
# F401: Unused import - many in try/except fallback blocks
ignore = ["E501", "W291", "W293", "E722", "E741", "E402", "E701", "F841", "F601", "F401"]

[tool.ruff.format]
# Black-compatible formatter
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# Exclude files from formatting
exclude = [
    "scripts/requirements.txt",
    "scripts/_archive",
]


[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disable_error_code = ["import-untyped"]
exclude = ["vendor/", "node_modules/", "_site/", "scripts/_archive/"]

# More strict checking (can be enabled progressively)
# disallow_untyped_defs = true
# disallow_any_unimported = true
# no_implicit_optional = true
# check_untyped_defs = true
# warn_return_any = true
# warn_unused_ignores = true
