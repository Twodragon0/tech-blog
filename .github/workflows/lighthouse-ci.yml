# Lighthouse perf gate
#
# Runs Lighthouse against the PR head AND the PR base, computes the median
# LCP per URL across 5 runs (+ 1 discarded warm-cache prerun), and fails
# when head_LCP - base_LCP exceeds the threshold (default: 200 ms).
# CLS / TBT / FCP shown for context only.
#
# Coexists with .github/workflows/lighthouse.yml (which runs absolute
# threshold checks on push to main); this workflow is a *regression* gate
# scoped to PR diffs.
#
# URL strategy:
#   Primary: local Jekyll build served on localhost:4000 (Vercel-independent).
#   Fallback: if Jekyll build fails, re-run Lighthouse against GH Pages backup
#             (https://twodragon0.github.io/tech-blog) so Vercel Challenge Mode
#             or rate-limiting cannot block the check entirely.
#             The compare step uses continue-on-error: true so a fallback result
#             never hard-blocks the PR merge.

name: Lighthouse perf gate

on:
  pull_request:
    paths:
      - "_includes/**"
      - "_layouts/**"
      - "_sass/**"
      - "assets/**"
      - "_config.yml"
      - "Gemfile.lock"
      - "vercel.json"
      - "_plugins/**"
      - "scripts/dev/compare_lighthouse_runs.py"
      - ".github/workflows/lighthouse-ci.yml"
  workflow_dispatch:

concurrency:
  group: lighthouse-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lighthouse-perf-gate:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.pull_request.labels.*.name, 'perf-regression-allowed')
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Setup Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "20"

      - name: Cache lhci + npm
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cache/lhci
            ~/.npm
          key: lhci-${{ runner.os }}-${{ hashFiles('**/package.json', '**/Gemfile.lock') }}
          restore-keys: |
            lhci-${{ runner.os }}-

      - name: Install Lighthouse CLI
        run: |
          npm install -g lighthouse@12.x @lhci/cli@0.14.x serve@14
          lighthouse --version

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9  # v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build PR head site
        id: build-head
        continue-on-error: true
        run: bundle exec jekyll build --destination _site_head
        env:
          JEKYLL_ENV: production

      - name: Run Lighthouse on head (local build)
        if: steps.build-head.outcome == 'success'
        run: |
          mkdir -p lhci-head
          npx serve _site_head -l 4000 --single &
          SERVER_PID=$!
          for _ in $(seq 1 15); do
            if curl -sf http://localhost:4000/ > /dev/null 2>&1; then break; fi
            sleep 1
          done
          for url in http://localhost:4000/ http://localhost:4000/posts/2026/04/29/Tech_Security_Weekly_Digest_CVE_AI_Ransomware_Update/; do
            # Warm-cache prerun: warms OS file cache, Node module cache, and
            # the local server's slab. Result is discarded. Eliminates the
            # cold-start outlier that caused the +721 ms false positive in
            # PR #326.
            lighthouse "$url" --output=json --output-path=/dev/null --quiet \
              --chrome-flags="--headless --no-sandbox --disable-gpu" --preset=desktop || true

            # 5 measured runs (odd number → stable median, no tie-breaks).
            for run_id in 1 2 3 4 5; do
              lighthouse "$url" \
                --output=json \
                --output-path="lhci-head/lhr-$(echo "$url" | tr '/:' '_')-$run_id.json" \
                --quiet \
                --chrome-flags="--headless --no-sandbox --disable-gpu" \
                --preset=desktop || true
            done
          done
          kill $SERVER_PID 2>/dev/null || true

      - name: Run Lighthouse on head (GH Pages fallback)
        if: steps.build-head.outcome != 'success'
        run: |
          # Local Jekyll build failed — fall back to GH Pages backup.
          # This keeps the perf gate alive even when Vercel or Jekyll is blocked.
          GHPAGES_BASE="https://twodragon0.github.io/tech-blog"
          mkdir -p lhci-head
          for path in "/" "/posts/2026/04/29/Tech_Security_Weekly_Digest_CVE_AI_Ransomware_Update/"; do
            url="${GHPAGES_BASE}${path}"
            lighthouse "$url" --output=json --output-path=/dev/null --quiet \
              --chrome-flags="--headless --no-sandbox --disable-gpu" --preset=desktop || true
            for run_id in 1 2 3 4 5; do
              lighthouse "$url" \
                --output=json \
                --output-path="lhci-head/lhr-$(echo "$url" | tr '/:' '_')-$run_id.json" \
                --quiet \
                --chrome-flags="--headless --no-sandbox --disable-gpu" \
                --preset=desktop || true
            done
          done

      - name: Checkout PR base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-checkout
          fetch-depth: 1

      - name: Build PR base site
        id: build-base
        continue-on-error: true
        working-directory: base-checkout
        run: |
          bundle install
          bundle exec jekyll build --destination ../_site_base
        env:
          JEKYLL_ENV: production

      - name: Run Lighthouse on base (local build)
        if: steps.build-base.outcome == 'success'
        run: |
          mkdir -p lhci-base
          npx serve _site_base -l 4000 --single &
          SERVER_PID=$!
          for _ in $(seq 1 15); do
            if curl -sf http://localhost:4000/ > /dev/null 2>&1; then break; fi
            sleep 1
          done
          for url in http://localhost:4000/ http://localhost:4000/posts/2026/04/29/Tech_Security_Weekly_Digest_CVE_AI_Ransomware_Update/; do
            # Warm-cache prerun: warms OS file cache, Node module cache, and
            # the local server's slab. Result is discarded. Eliminates the
            # cold-start outlier that caused the +721 ms false positive in
            # PR #326.
            lighthouse "$url" --output=json --output-path=/dev/null --quiet \
              --chrome-flags="--headless --no-sandbox --disable-gpu" --preset=desktop || true

            # 5 measured runs (odd number → stable median, no tie-breaks).
            for run_id in 1 2 3 4 5; do
              lighthouse "$url" \
                --output=json \
                --output-path="lhci-base/lhr-$(echo "$url" | tr '/:' '_')-$run_id.json" \
                --quiet \
                --chrome-flags="--headless --no-sandbox --disable-gpu" \
                --preset=desktop || true
            done
          done
          kill $SERVER_PID 2>/dev/null || true

      - name: Run Lighthouse on base (GH Pages fallback)
        if: steps.build-base.outcome != 'success'
        run: |
          # Local Jekyll build failed — fall back to GH Pages backup for base.
          GHPAGES_BASE="https://twodragon0.github.io/tech-blog"
          mkdir -p lhci-base
          for path in "/" "/posts/2026/04/29/Tech_Security_Weekly_Digest_CVE_AI_Ransomware_Update/"; do
            url="${GHPAGES_BASE}${path}"
            lighthouse "$url" --output=json --output-path=/dev/null --quiet \
              --chrome-flags="--headless --no-sandbox --disable-gpu" --preset=desktop || true
            for run_id in 1 2 3 4 5; do
              lighthouse "$url" \
                --output=json \
                --output-path="lhci-base/lhr-$(echo "$url" | tr '/:' '_')-$run_id.json" \
                --quiet \
                --chrome-flags="--headless --no-sandbox --disable-gpu" \
                --preset=desktop || true
            done
          done

      - name: Compare LCP head vs base
        id: compare
        run: |
          python3 scripts/dev/compare_lighthouse_runs.py \
            --base-dir lhci-base \
            --head-dir lhci-head \
            --threshold-lcp-ms 200 \
            --output-md lighthouse-comparison.md
          # The script's exit code IS the gate, and it is fail-safe by design:
          # compare() returns 1 ONLY when a URL measured on BOTH sides regresses
          # past the +200ms threshold; a missing/incomparable base (e.g. the
          # GH Pages fallback or a transient Vercel block produced no base LHR)
          # yields verdict "skip" and exit 0. So we do NOT use continue-on-error
          # here — a real regression now blocks the PR, while the fallback case
          # still passes. (Security fix C-H1, 2026-06-30 workflow audit.)

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: lighthouse-${{ github.run_id }}
          path: |
            lhci-base/
            lhci-head/
            lighthouse-comparison.md
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment on PR with results
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9  # v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: lighthouse-comparison.md
          edit-mode: replace
          comment-id: lighthouse-perf-gate
