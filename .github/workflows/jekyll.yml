name: Jekyll site CI

# GitHub Pages 배포 워크플로우
# Free 티어 최적화: 캐싱, 조건부 실행, 병렬화

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    # PR에서는 빌드만 실행 (배포 제외)
  workflow_dispatch: # 수동 실행 가능

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      should-build: ${{ steps.set-output.outputs.should-build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check changed files
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            should-build:
              - '**_posts/**'
              - '**_includes/**'
              - '**_layouts/**'
              - '**_sass/**'
              - '**assets/**'
              - '**_config.yml'
              - '**vercel.json'
              - '**.github/workflows/**'
      
      - name: Set output
        id: set-output
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "pull_request" ]; then
            # dorny/paths-filter는 'true' 또는 'false'를 반환
            if [ "${{ steps.filter.outputs.should-build }}" == "true" ]; then
              echo "should-build=true" >> $GITHUB_OUTPUT
            else
              echo "should-build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should-build=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Output decision
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Filter output: ${{ steps.filter.outputs.should-build }}"
          echo "Should build: ${{ steps.set-output.outputs.should-build }}"

  build:
    runs-on: ubuntu-latest
    # 타임아웃 설정 (무한 실행 방지)
    timeout-minutes: 10
    # CI 최적화: 관련 파일 변경 시에만 빌드 (workflow_dispatch는 항상 실행)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && needs.check-changes.outputs.should-build == 'true')
    needs: [check-changes]
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true # 자동 캐싱 (비용 절감)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: |
          echo "📦 Installing Node.js dependencies..."
          npm ci || npm install
          echo "✅ Node.js dependencies installed"

      - name: Setup Python (for favicon generation)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-ci.txt

      - name: Install Python dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          pip install --quiet -r scripts/requirements-ci.txt
          echo "✅ Python dependencies installed"

      - name: Validate Jekyll Configuration
        run: |
          bundle exec jekyll doctor || true
          echo "✅ Jekyll configuration validation completed"

      - name: Validate Liquid include syntax in posts
        run: |
          python3 scripts/fix_malformed_liquid_includes.py --check
          echo "✅ Liquid include syntax check passed"

      - name: Validate post quality (PR only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          echo "📊 Checking post quality for changed files..."
          CHANGED_POSTS=$(git diff --name-only origin/main...HEAD -- '_posts/*.md' 2>/dev/null || echo "")
          if [ -z "$CHANGED_POSTS" ]; then
            echo "✅ No post changes detected"
            exit 0
          fi
          echo "Changed posts:"
          echo "$CHANGED_POSTS"
          echo ""
          # Check front matter size
          python3 scripts/validate_post_quality.py $CHANGED_POSTS || true
          echo ""
          echo "✅ Post quality check completed (warnings only, non-blocking)"

      - name: Check front matter size (PR only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          echo "📏 Checking front matter size..."
          CHANGED_POSTS=$(git diff --name-only origin/main...HEAD -- '_posts/*.md' 2>/dev/null || echo "")
          if [ -z "$CHANGED_POSTS" ]; then
            echo "✅ No post changes detected"
            exit 0
          fi
          python3 -c "
          import sys, re
          warnings = 0
          for f in sys.argv[1:]:
              with open(f) as fh:
                  content = fh.read()
              match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              if match:
                  fm_len = len(match.group(1))
                  if fm_len > 1000:
                      print(f'⚠️  {f}: front matter {fm_len} chars (limit: 1000)')
                      warnings += 1
          if warnings:
              print(f'\n⚠️  {warnings} post(s) exceed 1000-char front matter limit')
          else:
              print('✅ All front matter within size limit')
          " $CHANGED_POSTS

      - name: Post quality dashboard comment (PR only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📊 Generating quality dashboard for PR comment..."

          ALL_POSTS=$(find _posts -name '*.md' -type f | sort)
          if [ -z "$ALL_POSTS" ]; then
            echo "No posts found"
            exit 0
          fi

          # Generate full dashboard
          DASHBOARD=$(python3 scripts/validate_post_quality.py --summary $ALL_POSTS 2>&1 || true)

          # Get changed post scores
          CHANGED_POSTS=$(git diff --name-only origin/main...HEAD -- '_posts/*.md' 2>/dev/null || echo "")
          CHANGED_SCORES=""
          if [ -n "$CHANGED_POSTS" ]; then
            CHANGED_SCORES=$(python3 scripts/validate_post_quality.py $CHANGED_POSTS 2>&1 || true)
          fi

          # Build comment body via Python (avoids YAML heredoc indentation issues)
          export CHANGED_SCORES="${CHANGED_SCORES:-No post changes detected}"
          export DASHBOARD_OUTPUT="$DASHBOARD"
          python3 -c "
          import os, textwrap
          changed = os.environ.get('CHANGED_SCORES', 'No post changes detected')
          dashboard = os.environ.get('DASHBOARD_OUTPUT', '')
          body = textwrap.dedent('''
              ## Post Quality Dashboard

              <details>
              <summary>Changed Post Scores</summary>

              \`\`\`
              {changed}
              \`\`\`
              </details>

              <details open>
              <summary>Overall Quality Dashboard</summary>

              \`\`\`
              {dashboard}
              \`\`\`
              </details>

              ---
              *Auto-generated by post quality validator*
          ''').strip().format(changed=changed, dashboard=dashboard)
          with open('/tmp/pr-quality-comment.md', 'w') as f:
              f.write(body)
          " || true

          # Post or update PR comment
          EXISTING_COMMENT=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("Post Quality Dashboard")) | .id' 2>/dev/null | head -1 || true)

          if [ -n "$EXISTING_COMMENT" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT}" \
              -X PATCH -f body="$(cat /tmp/pr-quality-comment.md)" || true
            echo "Updated existing quality dashboard comment"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/pr-quality-comment.md || true
            echo "Posted quality dashboard comment"
          fi

      - name: Build with build.sh (consistent with Vercel)
        run: |
          set -e
          echo "🔍 Building Jekyll site using build.sh..."
          echo "Ruby version: $(ruby -v)"
          echo "Bundler version: $(bundle -v)"
          echo "Jekyll version: $(bundle exec jekyll -v)"
          echo "Node version: $(node -v)"
          echo "Python version: $(python3 --version)"
          echo ""
          echo "📦 Installing Ruby dependencies..."
          bundle install --jobs 4 --retry 3 || (echo "❌ Bundle install failed" && exit 1)
          echo ""
          echo "🏗️  Building site with build.sh..."
          chmod +x build.sh
          # Set baseurl for GitHub Pages (if configured)
          export BASEURL="${{ steps.pages.outputs.base_path }}"
          if ./build.sh; then
            echo "✅ Build completed successfully"
          else
            echo "❌ Build failed"
            exit 1
          fi
        env:
          JEKYLL_ENV: production
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
          LANGUAGE: C.UTF-8
          # Vercel과 동기화를 위한 빌드 정보
          BUILD_ID: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          DEPLOYMENT_URL: ${{ github.event.repository.html_url }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    # PR에서는 배포하지 않음 (비용 절감)
    # CI 최적화: 관련 파일 변경 시에만 배포
    # build 작업이 성공했을 때만 배포 (명시적 조건 추가)
    if: |
      github.event_name == 'push' && 
      github.ref == 'refs/heads/main' &&
      needs.check-changes.outputs.should-build == 'true' &&
      needs.build.result == 'success'
    
    # 동시 배포 방지: 같은 브랜치의 배포는 큐에 대기
    # cancel-in-progress: false로 설정하여 이전 빌드가 완료될 때까지 대기
    concurrency:
      group: pages-deploy-${{ github.ref }}
      cancel-in-progress: false
    
    # 배포 job 타임아웃: GitHub Pages 배포는 최대 15분까지 소요될 수 있음
    timeout-minutes: 15
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [check-changes, build]
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build job failed or was cancelled. Skipping deployment."
            exit 1
          fi
          echo "✅ Build job succeeded. Proceeding with deployment."
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # deploy-pages 액션 타임아웃: 10분 (600000ms)
        # 액션 내부에서 deployment_queued 상태를 모니터링하며 대기
        timeout-minutes: 10
        continue-on-error: false
      
      - name: Deployment Info
        if: success()
        run: |
          echo "✅ Deployed to GitHub Pages"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
          echo "Commit: ${{ github.sha }}"
      
      - name: Deployment Error
        if: failure()
        run: |
          echo "❌ Deployment failed"
          echo "Please check the logs above for details"
          exit 1
