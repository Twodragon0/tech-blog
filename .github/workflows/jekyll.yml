name: Jekyll site CI

# Jekyll CI: 스크립트 테스트 + 빌드 검증 전용.
# Pages 배포는 deploy-pages.yml이 단독 담당한다 (github-pages 환경을 두 워크플로가
# 동시에 배포하며 "Deployment failed, try again later" 경합을 유발했던 문제 해소,
# 2026-07-03). Vercel이 프로덕션, GH Pages는 백업 origin.
# Free 티어 최적화: 캐싱, 조건부 실행, 병렬화

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    # PR에서는 빌드만 실행 (배포 제외)
  workflow_dispatch: # 수동 실행 가능

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      should-build: ${{ steps.set-output.outputs.should-build }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 2

      - name: Check changed files
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        with:
          filters: |
            should-build:
              - '**_posts/**'
              - '**_includes/**'
              - '**_layouts/**'
              - '**_sass/**'
              - '**assets/**'
              - '**_config.yml'
              - '**vercel.json'
              - '**.github/workflows/**'
              # Python source/tests: a push touching ONLY scripts/** must still
              # run the 'Run script unit tests' step (the cover dedup/lone-word,
              # digest-KPI, honesty-replay regression tests live there). Without
              # this the build job is skipped on script-only pushes and pytest
              # never runs. Guarded by test_ci_digest_kpi_gate_guard.py.
              - '**/*.py'
      
      - name: Set output
        id: set-output
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "pull_request" ]; then
            # dorny/paths-filter는 'true' 또는 'false'를 반환
            if [ "${{ steps.filter.outputs.should-build }}" == "true" ]; then
              echo "should-build=true" >> $GITHUB_OUTPUT
            else
              echo "should-build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should-build=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Output decision
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Filter output: ${{ steps.filter.outputs.should-build }}"
          echo "Should build: ${{ steps.set-output.outputs.should-build }}"

  build:
    runs-on: ubuntu-latest
    # 타임아웃 설정 (무한 실행 방지)
    timeout-minutes: 10
    # CI 최적화: 관련 파일 변경 시에만 빌드 (workflow_dispatch는 항상 실행)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && needs.check-changes.outputs.should-build == 'true')
    needs: [check-changes]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af  # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true # 자동 캐싱 (비용 절감)

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: |
          echo "📦 Installing Node.js dependencies..."
          npm ci || npm install
          echo "✅ Node.js dependencies installed"

      - name: Setup Python (for favicon generation)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-ci.txt

      - name: Install Python dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          pip install --quiet -r scripts/requirements-ci.txt
          echo "✅ Python dependencies installed"

      - name: Run script unit tests
        run: |
          echo "🧪 Running script unit tests..."
          python3 -m pytest scripts/tests/ -v --tb=short --cov --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=40
          echo "✅ Script tests completed"

      - name: Digest quality gate
        run: |
          echo "📋 Running Digest quality report..."
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/main...HEAD -- '_posts/*Digest*.md' || true)
            if [ -n "$CHANGED" ]; then
              python3 scripts/digest_quality_report.py --files $CHANGED --ci
            else
              echo "No Digest posts changed, skipping"
            fi
          else
            python3 scripts/digest_quality_report.py --all --ci
          fi
          echo "✅ Digest quality check passed"

      - name: Post coverage comment (PR only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f coverage.json ]; then
            echo "No coverage data found"
            exit 0
          fi
          COVERAGE=$(python3 -c "
          import json
          with open('coverage.json') as f:
              data = json.load(f)
          total = data.get('totals', {})
          pct = total.get('percent_covered_display', 'N/A')
          stmts = total.get('num_statements', 0)
          miss = total.get('missing_lines', 0)
          print(f'| auto_publish_news.py | {stmts} | {miss} | {pct}% |')
          ")
          BODY="## Test Coverage Report

          | File | Stmts | Miss | Cover |
          |------|-------|------|-------|
          ${COVERAGE}

          *171+ tests, < 1s execution time*"

          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("Test Coverage Report")) | .id' 2>/dev/null | head -1 || true)

          if [ -n "$EXISTING" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" -X PATCH -f body="$BODY" || true
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY" || true
          fi
          echo "✅ Coverage comment posted"

      - name: Validate Jekyll Configuration
        run: |
          bundle exec jekyll doctor
          echo "✅ Jekyll configuration validation completed"

      - name: Validate Liquid include syntax in posts
        run: |
          python3 scripts/fix_malformed_liquid_includes.py --check
          echo "✅ Liquid include syntax check passed"

      - name: Front-matter quote gate (unescaped inner DQ)
        run: |
          echo "🔍 Checking front matter title/excerpt for unescaped inner double-quotes..."
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # Read changed paths into an array (newline-delimited) and pass them
            # quoted, so a post filename containing shell metacharacters can't be
            # word-split or injected. (Security fix M-02, 2026-06-30 audit.)
            mapfile -t CHANGED < <(git diff --name-only origin/main...HEAD -- '_posts/*.md' 2>/dev/null || true)
            if [ "${#CHANGED[@]}" -gt 0 ]; then
              python3 scripts/validators/check_frontmatter_quotes.py "${CHANGED[@]}"
            else
              echo "No _posts/*.md changed, skipping"
            fi
          else
            python3 scripts/validators/check_frontmatter_quotes.py
          fi
          echo "✅ Front-matter quote gate passed"

      - name: Validate posts (severity, front matter, links)
        if: github.event_name == 'pull_request'
        run: |
          echo "📋 Running post validation on changed files..."
          python3 scripts/check_posts.py --changed
          echo "✅ Post validation passed"

      - name: Validate post quality (PR only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          echo "📊 Checking post quality for changed files..."
          CHANGED_POSTS=$(git diff --name-only origin/main...HEAD -- '_posts/*.md' 2>/dev/null || echo "")
          if [ -z "$CHANGED_POSTS" ]; then
            echo "✅ No post changes detected"
            exit 0
          fi
          echo "Changed posts:"
          echo "$CHANGED_POSTS"
          echo ""
          # Check front matter size
          python3 scripts/validate_post_quality.py $CHANGED_POSTS || true
          echo ""
          echo "✅ Post quality check completed (warnings only, non-blocking)"

      - name: Check front matter size (PR only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          echo "📏 Checking front matter size..."
          CHANGED_POSTS=$(git diff --name-only origin/main...HEAD -- '_posts/*.md' 2>/dev/null || echo "")
          if [ -z "$CHANGED_POSTS" ]; then
            echo "✅ No post changes detected"
            exit 0
          fi
          python3 -c "
          import sys, re
          warnings = 0
          for f in sys.argv[1:]:
              with open(f) as fh:
                  content = fh.read()
              match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              if match:
                  fm_len = len(match.group(1))
                  if fm_len > 1000:
                      print(f'⚠️  {f}: front matter {fm_len} chars (limit: 1000)')
                      warnings += 1
          if warnings:
              print(f'\n⚠️  {warnings} post(s) exceed 1000-char front matter limit')
          else:
              print('✅ All front matter within size limit')
          " $CHANGED_POSTS

      - name: Post quality dashboard comment (PR only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📊 Generating quality dashboard for PR comment..."

          ALL_POSTS=$(find _posts -name '*.md' -type f | sort)
          if [ -z "$ALL_POSTS" ]; then
            echo "No posts found"
            exit 0
          fi

          # Generate full dashboard
          DASHBOARD=$(python3 scripts/validate_post_quality.py --summary $ALL_POSTS 2>&1 || true)

          # Get changed post scores
          CHANGED_POSTS=$(git diff --name-only origin/main...HEAD -- '_posts/*.md' 2>/dev/null || echo "")
          CHANGED_SCORES=""
          if [ -n "$CHANGED_POSTS" ]; then
            CHANGED_SCORES=$(python3 scripts/validate_post_quality.py $CHANGED_POSTS 2>&1 || true)
          fi

          # Build comment body via Python (avoids YAML heredoc indentation issues)
          export CHANGED_SCORES="${CHANGED_SCORES:-No post changes detected}"
          export DASHBOARD_OUTPUT="$DASHBOARD"
          python3 -c "
          import os, textwrap
          changed = os.environ.get('CHANGED_SCORES', 'No post changes detected')
          dashboard = os.environ.get('DASHBOARD_OUTPUT', '')
          body = textwrap.dedent('''
              ## Post Quality Dashboard

              <details>
              <summary>Changed Post Scores</summary>

              \`\`\`
              {changed}
              \`\`\`
              </details>

              <details open>
              <summary>Overall Quality Dashboard</summary>

              \`\`\`
              {dashboard}
              \`\`\`
              </details>

              ---
              *Auto-generated by post quality validator*
          ''').strip().format(changed=changed, dashboard=dashboard)
          with open('/tmp/pr-quality-comment.md', 'w') as f:
              f.write(body)
          " || true

          # Post or update PR comment
          EXISTING_COMMENT=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("Post Quality Dashboard")) | .id' 2>/dev/null | head -1 || true)

          if [ -n "$EXISTING_COMMENT" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT}" \
              -X PATCH -f body="$(cat /tmp/pr-quality-comment.md)" || true
            echo "Updated existing quality dashboard comment"
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/pr-quality-comment.md || true
            echo "Posted quality dashboard comment"
          fi

      - name: Build with build.sh (consistent with Vercel)
        run: |
          set -e
          echo "🔍 Building Jekyll site using build.sh..."
          echo "Ruby version: $(ruby -v)"
          echo "Bundler version: $(bundle -v)"
          echo "Jekyll version: $(bundle exec jekyll -v)"
          echo "Node version: $(node -v)"
          echo "Python version: $(python3 --version)"
          echo ""
          echo "📦 Installing Ruby dependencies..."
          bundle install --jobs 4 --retry 3 || (echo "❌ Bundle install failed" && exit 1)
          echo ""
          echo "🏗️  Building site with build.sh..."
          chmod +x build.sh
          # CI validates the build only (no Pages deploy here). Build with an
          # empty baseurl to mirror the Vercel production build.
          export BASEURL=""
          if ./build.sh; then
            echo "✅ Build completed successfully"
          else
            echo "❌ Build failed"
            exit 1
          fi
        env:
          JEKYLL_ENV: production
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
          LANGUAGE: C.UTF-8
          # Vercel과 동기화를 위한 빌드 정보
          BUILD_ID: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          DEPLOYMENT_URL: ${{ github.event.repository.html_url }}

      # NOTE: no upload-pages-artifact / deploy job here on purpose.
      # deploy-pages.yml is the single Pages deployer (see header). This
      # workflow only proves the site builds + tests pass.
