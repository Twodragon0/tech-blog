# SVG Visual Baseline Auto-Refresh
#
# Runs ONLY on push to main (i.e., after a PR merge), never on PRs.
# Path filter mirrors visual-regression.yml so refresh fires exactly when
# verify would detect drift.
#
# Runner: ubuntu-22.04 (pinned) — must match visual-regression.yml exactly.
# Mixing runner versions between capture and verify produces false positives.
# See docs/visual-regression-deps.md for the upgrade procedure.
#
# Infinite-loop guard: the auto-commit carries "[skip ci]" in its message.
# GitHub Actions natively skips ALL workflow runs triggered by commits whose
# message contains "[skip ci]", so neither this workflow nor visual-regression
# will re-run on the baseline-refresh commit.

name: SVG Visual Baseline Refresh

on:
  push:
    branches:
      - main
    paths:
      - "assets/images/**.svg"
      - "scripts/lib/svg_l22_generator.py"
      - "scripts/svg_visual_baseline.py"
  workflow_dispatch:

concurrency:
  group: visual-baseline-refresh
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh-baselines:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Install Python deps
        run: pip install --quiet -r requirements-visual.txt

      - name: Capture baselines
        run: python3 scripts/svg_visual_baseline.py --capture

      - name: Commit refreshed baselines (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual-baselines/
          if git diff --cached --quiet; then
            echo "No baseline changes — skipping commit."
          else
            git commit -m "chore(visual): auto-refresh baselines after SVG/generator changes [skip ci]"
            git push
          fi
