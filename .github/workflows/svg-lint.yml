name: SVG Compliance Lint

on:
  push:
    paths:
      - '.github/workflows/svg-lint.yml'
      - 'assets/images/**.svg'
      - 'scripts/lint_svg_compliance.py'
      - 'scripts/upgrade_digest_cover.py'
      - 'scripts/lib/svg_l22_generator.py'
      - '_data/digest_covers/**.yml'
      - 'scripts/upgrade_rollup_cover.py'
      - 'scripts/lib/svg_rollup_generator.py'
      - '_data/rollup_covers/**.yml'
      - 'scripts/upgrade_l20_cover.py'
      - 'scripts/lib/svg_l20_hero.py'
      - '_data/l20_covers/**.yml'
      - 'scripts/upgrade_l25_cover.py'
      - 'scripts/lib/svg_l25_single.py'
      - '_data/l25_covers/**.yml'
      - 'scripts/news/l22_dispatch.py'
      - 'scripts/check_l22_visual_variety.py'
      - 'scripts/check_svg_size_gate.py'
      - 'scripts/score_cover_honesty.py'
      - 'scripts/check_l20_sidecard_advisory.py'
      - 'scripts/check_l20_generic_hero.py'
      - 'scripts/check_orphan_cover_rasters.py'
      - 'scripts/cover_honesty_baseline.txt'
      - 'scripts/news/l20_dispatch.py'
      - 'scripts/check_svg_precommit.sh'
      - 'scripts/check_svg_title_ascii.py'
      - 'scripts/check_spec_slug_consistency.py'
      - 'scripts/check_l20_spec_slug_consistency.py'
      - 'scripts/l20_drift_baseline.txt'
      - 'scripts/check_rollup_spec_consistency.py'
      - 'scripts/check_kst_midnight.py'
      - 'scripts/check_digest_structure.py'
      - 'scripts/dev/check_csp_inline_hashes.py'
      - 'scripts/dev/csp_inline_hashes.json'
      - '_includes/head.html'
      - '_posts/**.md'
      - 'vercel.json'
      - 'assets/js/mermaid-init.js'
      - 'scripts/tests/check_mermaid_csp_render.mjs'
  pull_request:
    paths:
      - '.github/workflows/svg-lint.yml'
      - 'assets/images/**.svg'
      - 'scripts/lint_svg_compliance.py'
      - 'scripts/upgrade_digest_cover.py'
      - 'scripts/lib/svg_l22_generator.py'
      - '_data/digest_covers/**.yml'
      - 'scripts/upgrade_rollup_cover.py'
      - 'scripts/lib/svg_rollup_generator.py'
      - '_data/rollup_covers/**.yml'
      - 'scripts/upgrade_l20_cover.py'
      - 'scripts/lib/svg_l20_hero.py'
      - '_data/l20_covers/**.yml'
      - 'scripts/upgrade_l25_cover.py'
      - 'scripts/lib/svg_l25_single.py'
      - '_data/l25_covers/**.yml'
      - 'scripts/news/l22_dispatch.py'
      - 'scripts/check_l22_visual_variety.py'
      - 'scripts/check_svg_size_gate.py'
      - 'scripts/score_cover_honesty.py'
      - 'scripts/check_l20_sidecard_advisory.py'
      - 'scripts/check_l20_generic_hero.py'
      - 'scripts/check_orphan_cover_rasters.py'
      - 'scripts/cover_honesty_baseline.txt'
      - 'scripts/news/l20_dispatch.py'
      - 'scripts/check_svg_precommit.sh'
      - 'scripts/check_svg_title_ascii.py'
      - 'scripts/check_spec_slug_consistency.py'
      - 'scripts/check_l20_spec_slug_consistency.py'
      - 'scripts/l20_drift_baseline.txt'
      - 'scripts/check_rollup_spec_consistency.py'
      - 'scripts/check_kst_midnight.py'
      - 'scripts/check_digest_structure.py'
      - 'scripts/dev/check_csp_inline_hashes.py'
      - 'scripts/dev/csp_inline_hashes.json'
      - '_includes/head.html'
      - '_posts/**.md'
      - 'vercel.json'
      - 'assets/js/mermaid-init.js'
      - 'scripts/tests/check_mermaid_csp_render.mjs'

concurrency:
  group: svg-lint-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only checks out code and runs read-only linters.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Fetch enough history so the size-gate step can diff PR head
          # against the merge base of the target branch.
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Install PyYAML + qrcode + frontmatter for digest-cover spec loader
        # qrcode is REQUIRED for byte-stable rendering: svg_l22_generator.gen_qr()
        # silently returns "" when qrcode is missing, causing ~15 KB drift vs on-disk.
        # python-frontmatter is REQUIRED by the honesty scorer's routing-replay
        # (_routed_visual_ids): without it the replay falls back to UNCLAMPED
        # filename-keyword routing and falsely reports attack-class overclaims +
        # STALE_RENDER for content-aware (clamped) digest covers. See PR with this
        # commit for the root-cause investigation.
        run: python3 -m pip install --upgrade pip PyYAML "qrcode[pil]" python-frontmatter

      - name: Run SVG compliance linter
        id: lint
        run: python3 scripts/lint_svg_compliance.py --report

      - name: Digest cover drift check (YAML spec vs on-disk SVG)
        id: digest_drift
        run: python3 scripts/upgrade_digest_cover.py --all --check

      - name: Rollup cover drift check (YAML spec vs on-disk SVG)
        id: rollup_drift
        run: python3 scripts/upgrade_rollup_cover.py --all --check

      - name: Rollup cover spec vs owning-post accuracy gate
        id: rollup_spec_accuracy
        run: python3 scripts/check_rollup_spec_consistency.py --strict

      - name: L25 single cover drift check (YAML spec vs on-disk SVG)
        id: l25_drift
        run: python3 scripts/upgrade_l25_cover.py --all --check

      - name: L22 cover visual-variety gate
        id: variety_gate
        run: python3 scripts/check_l22_visual_variety.py --all

      - name: SVG size-band gate (rollup / hq / std classification)
        id: size_gate
        # Mirrors scripts/check_svg_precommit.sh — same classification rules
        # and band thresholds. With --baseline, legacy grandfathered SVGs are
        # allowed; any *new* out-of-band cover is a hard CI failure.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE="HEAD~1"
          fi
          echo "[size-gate] diff base: $BASE"
          python3 scripts/check_svg_size_gate.py \
            --changed "$BASE" \
            --baseline scripts/svg_size_gate_baseline.txt \
            --strict

      - name: L20 cover honesty scorer (BLOCKING — grandfathered baseline)
        id: cover_honesty
        # BLOCKING gate, conservative: scores every L20 cover and fails the
        # build (--strict) on any FAIL that is NOT grandfathered in
        # cover_honesty_baseline.txt. The 12 legacy non-digest FAILs are
        # baselined, so this only catches NEW honesty regressions (a cover that
        # newly asserts attack evidence its post lacks). Verified locally:
        # --all --baseline … --strict exits 0 on the current corpus.
        # After an intentional cover change, re-grandfather with:
        #   python3 scripts/score_cover_honesty.py --update-baseline scripts/cover_honesty_baseline.txt
        run: |
          python3 scripts/score_cover_honesty.py --all \
            --baseline scripts/cover_honesty_baseline.txt \
            --strict

      - name: L20 side-card advisory gate (no occluding shield in side cards)
        id: sidecard_advisory
        # Backstop for _demote_sidecard_advisory: a digest cover must never draw
        # the hero-scale SECURITY ADVISORY panel in a side card (occludes the
        # band headline). Catches a blogwatcher cron publishing via a stale path.
        run: python3 scripts/check_l20_sidecard_advisory.py

      - name: L20 generic-pool hero gate (no placeholder hero headline)
        id: generic_hero
        # Backstop for the summary_card hero fix: a digest cover must never ship
        # a generic-pool placeholder ("Security Update"/"Threat Analysis"/"Patch
        # Advisory") as its hero headline. The cron + regen paths now surface the
        # real lead story via load_post_fields; this catches a regression or a
        # stale cron path. See .omc/plans/l20-digest-hero-generic-pool-fix.md.
        run: python3 scripts/check_l20_generic_hero.py

      - name: Orphan cover raster gate (every raster has a base .svg)
        id: orphan_rasters
        # A cover rename leaves old-slug rasters (_og/_card) behind with no base
        # .svg — dead weight that ships to prod. 45 such files were removed
        # 2026-06-22; this gate prevents recurrence.
        run: python3 scripts/check_orphan_cover_rasters.py

      - name: SVG title/desc ASCII gate (no non-ASCII in <title> or <desc>)
        id: title_ascii
        run: python3 scripts/check_svg_title_ascii.py --all

      - name: Digest cover spec slug vs post image consistency gate
        id: spec_slug_consistency
        run: python3 scripts/check_spec_slug_consistency.py --all

      - name: L20 spec slug case-sensitive consistency gate
        id: l20_spec_slug
        # `upgrade_l20_cover` derives the filename from the spec's date+slug; a
        # CASE-only difference from the post image slug renders to a wrong-cased
        # file (404 on Linux/Vercel). The digest gate above is case-insensitive
        # and only covers _data/digest_covers, so this catches the l20 case rot.
        run: python3 scripts/check_l20_spec_slug_consistency.py

      - name: L20 spec drift check (spec-owned covers only, guard-aware)
        id: l20_drift
        # Only the ~5 l20-EXCLUSIVE covers are drift-checked (spec_ownership skips
        # cron/content/L22-owned, whose on-disk is written by another system).
        # --baseline grandfathers a rotted spec (Security_Vendor_Blog) whose fresh
        # render would overclaim; catches NEW drift on the clean spec-owned set.
        run: python3 scripts/upgrade_l20_cover.py --all --check --baseline scripts/l20_drift_baseline.txt

      - name: KST-midnight filename-date URL safety gate
        id: kst_midnight
        run: python3 scripts/check_kst_midnight.py --all

      - name: Digest structural invariant gate (PR-diff-scoped)
        id: digest_structure
        # PR-diff-scoped, NOT --all: only ~5 digest posts have been backfilled
        # to satisfy this guard as of 2026-07-16. The ~176 legacy
        # _posts/*Weekly_Digest*.md posts still have the structural defects
        # and would fail --all. --changed only checks digest posts touched by
        # this PR/push, mirroring the size-gate BASE-diff pattern above.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE="HEAD~1"
          fi
          echo "[digest-structure] diff base: $BASE"
          python3 scripts/check_digest_structure.py --changed "$BASE"

      - name: CSP inline-script sha256 regression gate (prep for CSP Path B)
        id: csp_inline_hashes
        # Guards the two first-party inline <script> blocks in
        # _includes/head.html (theme-init IIFE + deferred-CSS loader IIFE)
        # against silent whitespace/content drift that would change the
        # sha256 the future CSP Path B allow-list expects.
        run: python3 scripts/dev/check_csp_inline_hashes.py

      - name: Upload lint report on failure
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: svg-lint-report
          path: reports/svg-lint.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Mermaid CSP-render regression guard (SEPARATE from the Python lint job).
  # Proves every mermaid diagram still renders under the ENFORCING CSP in
  # vercel.json, which no longer grants 'unsafe-eval' to script-src (d018fe06).
  # A future mermaid/dependency bump that reintroduces an eval/wasm-eval
  # dependency breaks the render, and this job fails CI. See
  # scripts/tests/check_mermaid_csp_render.mjs.
  # ---------------------------------------------------------------------------
  mermaid-changes:
    # Gate so the (heavier) render job runs ONLY when a mermaid-relevant path
    # changed: posts, the on-demand loader, the CSP source, the check script,
    # or this workflow. GitHub Actions has no per-job `paths`, so we mirror the
    # dorny/paths-filter pattern used by jekyll.yml.
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    permissions:
      contents: read
    outputs:
      should-run: ${{ steps.filter.outputs.mermaid }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4
        with:
          filters: |
            mermaid:
              - '_posts/**'
              - 'assets/js/mermaid-init.js'
              - 'vercel.json'
              - 'scripts/tests/check_mermaid_csp_render.mjs'
              - '.github/workflows/svg-lint.yml'

  mermaid-csp-render:
    needs: [mermaid-changes]
    if: needs.mermaid-changes.outputs.should-run == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      JEKYLL_ENV: production
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      LANGUAGE: C.UTF-8
      # Mirror the Vercel/CI production build (empty baseurl). See jekyll.yml.
      BASEURL: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Ruby (Jekyll build)
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600  # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python (build.sh favicon/raster deps)
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-ci.txt

      - name: Install Python dependencies
        run: pip install --quiet -r scripts/requirements-ci.txt

      - name: Install Node.js dependencies
        run: npm ci || npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build site with build.sh (consistent with Vercel/CI)
        run: |
          bundle install --jobs 4 --retry 3
          chmod +x build.sh
          ./build.sh

      - name: Mermaid CSP-render guard (no 'unsafe-eval' in enforcing CSP)
        run: node scripts/tests/check_mermaid_csp_render.mjs --verbose
