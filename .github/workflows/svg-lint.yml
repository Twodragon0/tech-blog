name: SVG Compliance Lint

on:
  push:
    paths:
      - 'assets/images/**.svg'
      - 'scripts/lint_svg_compliance.py'
  pull_request:
    paths:
      - 'assets/images/**.svg'
      - 'scripts/lint_svg_compliance.py'

concurrency:
  group: svg-lint-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Run SVG compliance linter
        id: lint
        run: python3 scripts/lint_svg_compliance.py --report

      - name: Upload lint report on failure
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: svg-lint-report
          path: reports/svg-lint.json
          retention-days: 7
