name: SVG Compliance Lint

on:
  push:
    paths:
      - 'assets/images/**.svg'
      - 'scripts/lint_svg_compliance.py'
  pull_request:
    paths:
      - 'assets/images/**.svg'
      - 'scripts/lint_svg_compliance.py'

concurrency:
  group: svg-lint-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SVG compliance linter
        id: lint
        run: python3 scripts/lint_svg_compliance.py --report

      - name: Upload lint report on failure
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: svg-lint-report
          path: reports/svg-lint.json
          retention-days: 7
