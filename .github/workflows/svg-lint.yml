name: SVG Compliance Lint

on:
  push:
    paths:
      - 'assets/images/**.svg'
      - 'scripts/lint_svg_compliance.py'
      - 'scripts/upgrade_digest_cover.py'
      - 'scripts/lib/svg_l22_generator.py'
      - '_data/digest_covers/**.yml'
      - 'scripts/upgrade_rollup_cover.py'
      - 'scripts/lib/svg_rollup_generator.py'
      - '_data/rollup_covers/**.yml'
      - 'scripts/upgrade_l20_cover.py'
      - 'scripts/lib/svg_l20_hero.py'
      - '_data/l20_covers/**.yml'
      - 'scripts/upgrade_l25_cover.py'
      - 'scripts/lib/svg_l25_single.py'
      - '_data/l25_covers/**.yml'
      - 'scripts/news/l22_dispatch.py'
      - 'scripts/check_l22_visual_variety.py'
      - 'scripts/check_svg_size_gate.py'
      - 'scripts/score_cover_honesty.py'
      - 'scripts/cover_honesty_baseline.txt'
      - 'scripts/news/l20_dispatch.py'
      - 'scripts/check_svg_precommit.sh'
      - 'scripts/check_svg_title_ascii.py'
      - 'scripts/check_spec_slug_consistency.py'
      - 'scripts/check_rollup_spec_consistency.py'
      - 'scripts/check_kst_midnight.py'
      - '_posts/**.md'
  pull_request:
    paths:
      - 'assets/images/**.svg'
      - 'scripts/lint_svg_compliance.py'
      - 'scripts/upgrade_digest_cover.py'
      - 'scripts/lib/svg_l22_generator.py'
      - '_data/digest_covers/**.yml'
      - 'scripts/upgrade_rollup_cover.py'
      - 'scripts/lib/svg_rollup_generator.py'
      - '_data/rollup_covers/**.yml'
      - 'scripts/upgrade_l20_cover.py'
      - 'scripts/lib/svg_l20_hero.py'
      - '_data/l20_covers/**.yml'
      - 'scripts/upgrade_l25_cover.py'
      - 'scripts/lib/svg_l25_single.py'
      - '_data/l25_covers/**.yml'
      - 'scripts/news/l22_dispatch.py'
      - 'scripts/check_l22_visual_variety.py'
      - 'scripts/check_svg_size_gate.py'
      - 'scripts/score_cover_honesty.py'
      - 'scripts/cover_honesty_baseline.txt'
      - 'scripts/news/l20_dispatch.py'
      - 'scripts/check_svg_precommit.sh'
      - 'scripts/check_svg_title_ascii.py'
      - 'scripts/check_spec_slug_consistency.py'
      - 'scripts/check_rollup_spec_consistency.py'
      - 'scripts/check_kst_midnight.py'
      - '_posts/**.md'

concurrency:
  group: svg-lint-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: this workflow only checks out code and runs read-only linters.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Fetch enough history so the size-gate step can diff PR head
          # against the merge base of the target branch.
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install PyYAML + qrcode for digest-cover spec loader
        # qrcode is REQUIRED for byte-stable rendering: svg_l22_generator.gen_qr()
        # silently returns "" when qrcode is missing, causing ~15 KB drift vs on-disk.
        # See PR with this commit for the root-cause investigation.
        run: python3 -m pip install --upgrade pip PyYAML "qrcode[pil]"

      - name: Run SVG compliance linter
        id: lint
        run: python3 scripts/lint_svg_compliance.py --report

      - name: Digest cover drift check (YAML spec vs on-disk SVG)
        id: digest_drift
        run: python3 scripts/upgrade_digest_cover.py --all --check

      - name: Rollup cover drift check (YAML spec vs on-disk SVG)
        id: rollup_drift
        run: python3 scripts/upgrade_rollup_cover.py --all --check

      - name: Rollup cover spec vs owning-post accuracy gate
        id: rollup_spec_accuracy
        run: python3 scripts/check_rollup_spec_consistency.py --strict

      - name: L25 single cover drift check (YAML spec vs on-disk SVG)
        id: l25_drift
        run: python3 scripts/upgrade_l25_cover.py --all --check

      - name: L22 cover visual-variety gate
        id: variety_gate
        run: python3 scripts/check_l22_visual_variety.py --all

      - name: SVG size-band gate (rollup / hq / std classification)
        id: size_gate
        # Mirrors scripts/check_svg_precommit.sh — same classification rules
        # and band thresholds. With --baseline, legacy grandfathered SVGs are
        # allowed; any *new* out-of-band cover is a hard CI failure.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE="HEAD~1"
          fi
          echo "[size-gate] diff base: $BASE"
          python3 scripts/check_svg_size_gate.py \
            --changed "$BASE" \
            --baseline scripts/svg_size_gate_baseline.txt \
            --strict

      - name: L20 cover honesty scorer (BLOCKING — grandfathered baseline)
        id: cover_honesty
        # BLOCKING gate, conservative: scores every L20 cover and fails the
        # build (--strict) on any FAIL that is NOT grandfathered in
        # cover_honesty_baseline.txt. The 12 legacy non-digest FAILs are
        # baselined, so this only catches NEW honesty regressions (a cover that
        # newly asserts attack evidence its post lacks). Verified locally:
        # --all --baseline … --strict exits 0 on the current corpus.
        # After an intentional cover change, re-grandfather with:
        #   python3 scripts/score_cover_honesty.py --update-baseline scripts/cover_honesty_baseline.txt
        run: |
          python3 scripts/score_cover_honesty.py --all \
            --baseline scripts/cover_honesty_baseline.txt \
            --strict

      - name: SVG title/desc ASCII gate (no non-ASCII in <title> or <desc>)
        id: title_ascii
        run: python3 scripts/check_svg_title_ascii.py --all

      - name: Digest cover spec slug vs post image consistency gate
        id: spec_slug_consistency
        run: python3 scripts/check_spec_slug_consistency.py --all

      - name: KST-midnight filename-date URL safety gate
        id: kst_midnight
        run: python3 scripts/check_kst_midnight.py --all

      - name: Upload lint report on failure
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: svg-lint-report
          path: reports/svg-lint.json
          retention-days: 7
