name: Ops Priority Loop

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ops-priority-loop
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ops-checks:
    if: github.event_name != 'schedule' || vars.OPS_PRIORITY_LOOP_SCHEDULE == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    env:
      RUN_POST_CHECKS: "true"
      RUN_IMAGE_CHECKS: "true"
      RUN_VERCEL_CHECKS: "false"
      AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
      AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_TOKEN }}
      SLACK_CHANNEL_ID_OPS: ${{ secrets.SLACK_CHANNEL_ID_OPS }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run priority checks
        id: checks
        run: |
          set -euo pipefail
          message=$(python3 scripts/ops_health_orchestrator.py --skip-sentry --skip-pagespeed || true)
          {
            echo "message<<EOF"
            echo "$message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack via AI Gateway
        if: env.AI_GATEWAY_URL != '' && env.AI_GATEWAY_TOKEN != '' && env.SLACK_CHANNEL_ID_OPS != ''
        shell: bash
        env:
          MESSAGE: ${{ steps.checks.outputs.message }}
          TARGET_CHANNEL_ID: ${{ env.SLACK_CHANNEL_ID_OPS }}
        run: |
          set -euo pipefail
          payload=$(python -c 'import json,os; message=os.environ.get("MESSAGE", ""); channel_id=os.environ.get("TARGET_CHANNEL_ID", ""); payload={"tool":"message","action":"send","args":{"channel":"slack","target":f"channel:{channel_id}","message":message}}; print(json.dumps(payload, ensure_ascii=False))')
          curl -sS "${AI_GATEWAY_URL}/tools/invoke" \
            -H "Authorization: Bearer ${AI_GATEWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload"
