name: Lighthouse CI
on:
  push:
    branches: [main]
    paths:
      - '_includes/**'
      - '_layouts/**'
      - '_sass/**'
      - 'assets/css/**'
      - 'assets/js/**'
      - '_config.yml'
      - 'vercel.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --destination _site
        env:
          JEKYLL_ENV: production

      - name: Run Lighthouse CI on local build
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          staticDistDir: ./_site
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Check Lighthouse scores
        run: |
          node - <<'EOF'
          const manifest = JSON.parse(process.env.LIGHTHOUSE_MANIFEST || '[]');
          const thresholds = {
            performance: 0.7,
            accessibility: 0.8,
            'best-practices': 0.8,
            seo: 0.9,
          };
          let failed = false;
          for (const result of manifest) {
            const summary = result.summary;
            console.log('URL:', result.url);
            for (const [category, min] of Object.entries(thresholds)) {
              const score = summary[category];
              const status = score >= min ? 'PASS' : 'FAIL';
              console.log(`  ${category}: ${(score * 100).toFixed(0)} (required: ${min * 100}) [${status}]`);
              if (score < min) failed = true;
            }
          }
          if (failed) {
            console.error('Lighthouse thresholds not met.');
            process.exit(1);
          } else {
            console.log('All Lighthouse thresholds met.');
          }
          EOF
        env:
          LIGHTHOUSE_MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
