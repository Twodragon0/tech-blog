name: Lighthouse CI
on:
  push:
    branches: [main]
    paths:
      - '_includes/**'
      - '_layouts/**'
      - '_sass/**'
      - 'assets/css/**'
      - 'assets/js/**'
      - '_config.yml'
      - 'vercel.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64  # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --destination _site
        env:
          JEKYLL_ENV: production

      - name: Start local HTTP server
        run: |
          npx --yes serve@14 _site --listen 4000 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in $(seq 1 15); do
            if curl -sf http://localhost:4000/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run Lighthouse CI on local build
        id: lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # v12
        with:
          urls: |
            http://localhost:4000/
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Check Lighthouse scores
        run: |
          node - <<'EOF'
          const manifest = JSON.parse(process.env.LIGHTHOUSE_MANIFEST || '[]');
          const thresholds = {
            performance: 0.5,
            accessibility: 0.8,
            'best-practices': 0.75,
            seo: 0.9,
          };
          let failed = false;
          for (const result of manifest) {
            const summary = result.summary;
            console.log('URL:', result.url);
            for (const [category, min] of Object.entries(thresholds)) {
              const score = summary[category];
              const status = score >= min ? 'PASS' : 'FAIL';
              console.log(`  ${category}: ${(score * 100).toFixed(0)} (required: ${min * 100}) [${status}]`);
              if (score < min) failed = true;
            }
          }
          if (failed) {
            console.error('Lighthouse thresholds not met.');
            process.exit(1);
          } else {
            console.log('All Lighthouse thresholds met.');
          }
          EOF
        env:
          LIGHTHOUSE_MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
