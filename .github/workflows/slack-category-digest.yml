name: Slack Category Digest

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  post-category-digest:
    if: github.event_name != 'schedule' || vars.SLACK_CATEGORY_DIGEST_SCHEDULE != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Build digest message
        id: digest
        shell: bash
        run: |
          set -euo pipefail
          message=$(python scripts/post_category_slack_digest.py \
            --window-hours 24 \
            --channel-alias "security" \
            --site-url "https://tech.2twodragon.com" || true)
          if [ -z "$message" ]; then
            echo "has_message=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_message=true" >> "$GITHUB_OUTPUT"
          {
            echo "message<<EOF"
            echo "$message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack via Bot API
        if: steps.digest.outputs.has_message == 'true'
        shell: bash
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MESSAGE: ${{ steps.digest.outputs.message }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_BOT_TOKEN:-}" ]; then
            echo "::warning::SLACK_BOT_TOKEN not configured, skipping"
            exit 0
          fi
          if [ -z "${SLACK_CHANNEL_ID:-}" ]; then
            echo "::warning::SLACK_CHANNEL_ID not configured, skipping"
            exit 0
          fi
          payload=$(python3 -c '
          import json, os
          message = os.environ.get("MESSAGE", "")
          channel = os.environ.get("SLACK_CHANNEL_ID", "")
          print(json.dumps({
              "channel": channel,
              "text": message,
              "unfurl_links": False,
              "unfurl_media": False
          }, ensure_ascii=False))
          ')
          HTTP_STATUS=$(curl -sS -o /tmp/slack_resp.txt -w "%{http_code}" \
            "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$payload")
          echo "Slack response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            ok=$(python3 -c 'import json; r=json.load(open("/tmp/slack_resp.txt")); print(r.get("ok",""))')
            if [ "$ok" = "True" ]; then
              echo "Slack digest sent successfully"
            else
              error=$(python3 -c 'import json; r=json.load(open("/tmp/slack_resp.txt")); print(r.get("error","unknown"))')
              echo "::warning::Slack API error: $error"
            fi
          else
            echo "::warning::Slack HTTP error (HTTP $HTTP_STATUS)"
            cat /tmp/slack_resp.txt || true
          fi
