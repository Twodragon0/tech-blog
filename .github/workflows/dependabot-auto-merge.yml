name: Dependabot Auto-Merge

# Enable auto-merge (squash) for low-risk Dependabot PRs so they merge once
# required checks pass. Major-version bumps still need manual review.
#
# We do NOT self-approve PRs here: the repo setting "Allow GitHub Actions to
# create and approve pull requests" is disabled (by design — a bot approving
# its own PR is a circular control with no independent review value), so a
# `gh pr review --approve` step would fail with "GitHub Actions is not
# permitted to approve pull requests". `gh pr merge --auto` does not require
# that approval; it arms GitHub's auto-merge, which fires when required status
# checks pass (and any required human review is satisfied).
#
# Triggers only when the PR author is dependabot[bot]. Uses the metadata
# action to introspect update-type and refuses anything classified as
# `version-update:semver-major`.
#
# Required repo settings:
#   - Settings → General → "Allow auto-merge" enabled
#   - Settings → Branches → main protection: required checks list MUST
#     include the gates we depend on (Jekyll site CI, check-svg,
#     lighthouse-ci, vitest, sentry-release).
#
# Author trust:
#   We pin dependabot/fetch-metadata to a SHA so a renamed action repo
#   cannot exfiltrate secrets via this workflow (rule from
#   .github/workflows/action-pin-check.yml).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (for fallback classifier script)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Get Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Fallback when fetch-metadata returns update-type=null. Happens for
      # Python deps that use range requirements (>=X.Y) instead of pinned
      # versions, so dependabot can't classify on its own. We parse the PR
      # title's "from <prev> to <new>" clause and classify locally. See
      # scripts/dependabot_classify_pr.py for the parsing rules + tests.
      - name: Classify from PR title (fallback)
        id: title_class
        if: steps.meta.outputs.update-type == ''
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          classification="$(python3 scripts/dependabot_classify_pr.py "$PR_TITLE")"
          echo "classification=$classification" >> "$GITHUB_OUTPUT"
          echo "Title-based classification: '$classification'"

      - name: Enable auto-merge (patch + minor only)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.title_class.outputs.classification == 'version-update:semver-patch' ||
          steps.title_class.outputs.classification == 'version-update:semver-minor'
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major bumps (manual review needed)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-major' ||
          steps.title_class.outputs.classification == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "**Major version bump detected** ($DEP_NAME $PREV → $NEW). Auto-merge is disabled for major versions — please review breaking changes manually before merging."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEP_NAME: ${{ steps.meta.outputs.dependency-names }}
          PREV: ${{ steps.meta.outputs.previous-version }}
          NEW: ${{ steps.meta.outputs.new-version }}
