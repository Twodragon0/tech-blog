name: Dependabot Auto-Merge

# Enable auto-merge (squash) for low-risk Dependabot PRs so they merge once
# required checks pass. Major-version bumps still need manual review.
#
# We do NOT self-approve PRs here: the repo setting "Allow GitHub Actions to
# create and approve pull requests" is disabled (by design — a bot approving
# its own PR is a circular control with no independent review value), so a
# `gh pr review --approve` step would fail with "GitHub Actions is not
# permitted to approve pull requests". `gh pr merge --auto` does not require
# that approval; it arms GitHub's auto-merge, which fires when required status
# checks pass (and any required human review is satisfied).
#
# Triggers only when the PR author is dependabot[bot]. Uses the metadata
# action to introspect update-type and refuses anything classified as
# `version-update:semver-major`.
#
# CI gate (defense-in-depth):
#   main has NO required status checks configured (verified 2026-06-30), so
#   `gh pr merge --auto` alone would merge a dependency PR the instant it is
#   mergeable — even with red CI. To close that hole WITHOUT depending on an
#   external branch-protection setting, the "Wait for CI checks" step below
#   blocks on `gh pr checks --watch --fail-fast` before arming auto-merge:
#   a failing check fails that step, which skips the merge step, so a red
#   dependency PR is never auto-merged. If required status checks are later
#   added to main, this step is harmless (it just confirms the same checks).
#
# Recommended repo settings:
#   - Settings → General → "Allow auto-merge" enabled (so `--auto` can arm).
#
# Author trust:
#   We pin dependabot/fetch-metadata to a SHA so a renamed action repo
#   cannot exfiltrate secrets via this workflow (rule from
#   .github/workflows/action-pin-check.yml).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    # Long enough for the PR's CI (build + check-svg) to finish under the
    # `gh pr checks --watch` gate below. If CI overruns this, the job times out
    # and the merge step is skipped — fail-safe (PR stays open, never merged red).
    timeout-minutes: 30
    steps:
      - name: Checkout (for fallback classifier script)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Get Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Fallback when fetch-metadata returns update-type=null. Happens for
      # Python deps that use range requirements (>=X.Y) instead of pinned
      # versions, so dependabot can't classify on its own. We parse the PR
      # title's "from <prev> to <new>" clause and classify locally. See
      # scripts/dependabot_classify_pr.py for the parsing rules + tests.
      - name: Classify from PR title (fallback)
        id: title_class
        if: steps.meta.outputs.update-type == ''
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          classification="$(python3 scripts/dependabot_classify_pr.py "$PR_TITLE")"
          echo "classification=$classification" >> "$GITHUB_OUTPUT"
          echo "Title-based classification: '$classification'"

      # Gate: block until the PR's CI checks finish, failing fast on the first
      # red check. This step failing fails the job, which SKIPS the merge step
      # below — so a dependency PR with failing CI is never auto-merged even
      # though main has no required status checks. Dependabot PRs are authored
      # by dependabot[bot] (not GITHUB_TOKEN), so their pull_request checks run
      # normally and there are real checks to watch.
      - name: Wait for CI checks to pass (patch + minor only)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.title_class.outputs.classification == 'version-update:semver-patch' ||
          steps.title_class.outputs.classification == 'version-update:semver-minor'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Give CI a moment to register check runs on the freshly-opened PR so
          # `gh pr checks --watch` does not see "no checks" and pass vacuously.
          sleep 30
          # --watch polls until every check completes; --fail-fast exits non-zero
          # on the first failure. A non-zero exit fails this step -> the merge
          # step is skipped (fail-closed).
          gh pr checks "$PR_URL" --watch --fail-fast --interval 30

      - name: Enable auto-merge (patch + minor only)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.title_class.outputs.classification == 'version-update:semver-patch' ||
          steps.title_class.outputs.classification == 'version-update:semver-minor'
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major bumps (manual review needed)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-major' ||
          steps.title_class.outputs.classification == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "**Major version bump detected** ($DEP_NAME $PREV → $NEW). Auto-merge is disabled for major versions — please review breaking changes manually before merging."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEP_NAME: ${{ steps.meta.outputs.dependency-names }}
          PREV: ${{ steps.meta.outputs.previous-version }}
          NEW: ${{ steps.meta.outputs.new-version }}
