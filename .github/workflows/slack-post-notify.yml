name: Slack Post Notification

# 새 포스트가 push되면 Slack으로 알림 전송
# Slack Bot API (chat.postMessage) 사용

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'

concurrency:
  group: slack-post-notify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SITE_URL: "https://tech.2twodragon.com"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Detect new posts and build message
        id: posts
        shell: bash
        run: |
          set -euo pipefail
          NEW_POSTS=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- '_posts/*.md' 2>/dev/null || echo "")
          if [ -z "$NEW_POSTS" ]; then
            echo "No new posts detected"
            echo "has_posts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_posts=true" >> "$GITHUB_OUTPUT"
          POST_COUNT=$(echo "$NEW_POSTS" | grep -c '^' || echo "0")
          echo "count=$POST_COUNT" >> "$GITHUB_OUTPUT"
          python3 scripts/build_slack_post_message.py "$NEW_POSTS" >> "$GITHUB_OUTPUT"

      - name: Post to Slack via Bot API
        if: steps.posts.outputs.has_posts == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MESSAGE: ${{ steps.posts.outputs.message }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SLACK_BOT_TOKEN:-}" ]; then
            echo "::warning::SLACK_BOT_TOKEN not configured, skipping"
            exit 0
          fi
          if [ -z "${SLACK_CHANNEL_ID:-}" ]; then
            echo "::warning::SLACK_CHANNEL_ID not configured, skipping"
            exit 0
          fi
          payload=$(python3 -c '
          import json, os
          message = os.environ.get("MESSAGE", "")
          channel = os.environ.get("SLACK_CHANNEL_ID", "")
          print(json.dumps({
              "channel": channel,
              "text": message,
              "unfurl_links": False,
              "unfurl_media": False
          }, ensure_ascii=False))
          ')
          HTTP_STATUS=$(curl -sS -o /tmp/slack_resp.txt -w "%{http_code}" \
            "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$payload")
          echo "Slack response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            ok=$(python3 -c 'import json; r=json.load(open("/tmp/slack_resp.txt")); print(r.get("ok",""))')
            if [ "$ok" = "True" ]; then
              echo "Slack notification sent successfully"
            else
              error=$(python3 -c 'import json; r=json.load(open("/tmp/slack_resp.txt")); print(r.get("error","unknown"))')
              echo "::warning::Slack API error: $error"
            fi
          else
            echo "::warning::Slack HTTP error (HTTP $HTTP_STATUS)"
            cat /tmp/slack_resp.txt || true
          fi
