name: Vitest JS regression

# Runs the Vitest suite under tests/js/ whenever PR / main push touches the
# scripts under test or the test files themselves. Keeps the gate scoped:
# unrelated content edits (_posts/**, docs/**) skip CI to save runner time.

on:
  pull_request:
    paths:
      - "tests/js/**"
      - "assets/js/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.js"
      - ".github/workflows/vitest.yml"
  push:
    branches:
      - main
    paths:
      - "tests/js/**"
      - "assets/js/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.js"
      - ".github/workflows/vitest.yml"
  workflow_dispatch:

concurrency:
  group: vitest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test
