name: Vitest JS regression

# Runs the Vitest suite under tests/js/ whenever PR / main push touches the
# scripts under test or the test files themselves. Keeps the gate scoped:
# unrelated content edits (_posts/**, docs/**) skip CI to save runner time.

on:
  pull_request:
    paths:
      - "tests/js/**"
      - "assets/js/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.js"
      - ".github/workflows/vitest.yml"
  push:
    branches:
      - main
    paths:
      - "tests/js/**"
      - "assets/js/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.js"
      - ".github/workflows/vitest.yml"
  workflow_dispatch:

concurrency:
  group: vitest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test
