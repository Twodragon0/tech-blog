name: IndexNow Ping

# Trigger: after deploy-pages workflow completes on main branch
# Only runs when content-related files change (handled via workflow_run + paths filtering below)
on:
  workflow_run:
    workflows: ["Deploy Jekyll to GitHub Pages"]
    types:
      - completed
    branches:
      - main

  # Allow manual trigger for testing / forced re-submit
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print payload, no HTTP requests)'
        required: false
        default: 'false'
        type: boolean

# Least privilege: read repo contents (git diff) + list workflow runs (gh api).
permissions:
  contents: read
  actions: read

jobs:
  ping:
    name: Submit sitemap to IndexNow
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Only run when the triggering workflow succeeded (skip on failed deploys)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Check if content files changed
        id: check_files
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the commit SHA that triggered the upstream workflow
          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Triggering deploy commit: $COMMIT_SHA"

          # Determine the push range: prefer the previous successful deploy's
          # head_sha so we diff across ALL commits in the push, not just the
          # last one. This fixes the bug where batched pushes that ended with
          # a non-_posts/ commit silently skipped the ping.
          PREV_SHA=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/deploy-pages.yml/runs?branch=main&status=success&per_page=5" \
            --jq '[.workflow_runs[] | select(.head_sha != "'"$COMMIT_SHA"'")] | .[0].head_sha // empty' \
            2>/dev/null || true)

          if [ -n "$PREV_SHA" ] && [ "$PREV_SHA" != "$COMMIT_SHA" ]; then
            echo "Previous successful deploy: $PREV_SHA"
            git fetch origin "$PREV_SHA" --depth=1 2>/dev/null || true
            git fetch origin "$COMMIT_SHA" --depth=50 2>/dev/null || true
            CHANGED=$(git diff --name-only "$PREV_SHA" "$COMMIT_SHA" 2>/dev/null || echo "")
            DIFF_MODE="push-range ($PREV_SHA..$COMMIT_SHA)"
          else
            echo "No previous deploy SHA found; falling back to single-commit diff"
            git fetch origin "$COMMIT_SHA" --depth=2 2>/dev/null || true
            CHANGED=$(git diff --name-only "$COMMIT_SHA^" "$COMMIT_SHA" 2>/dev/null || echo "")
            DIFF_MODE="single-commit ($COMMIT_SHA)"
          fi

          echo "Diff mode: $DIFF_MODE"
          echo "Changed files:"
          echo "$CHANGED" | head -50
          TOTAL=$(echo "$CHANGED" | grep -cv '^$' || echo 0)
          echo "Total files changed: $TOTAL"

          # Ping only when content-relevant files changed
          if echo "$CHANGED" | grep -qE '^(_posts/|sitemap\.xml|_config\.yml)'; then
            echo "should_ping=true" >> "$GITHUB_OUTPUT"
            echo "Content files changed -> will ping IndexNow"
          else
            echo "should_ping=false" >> "$GITHUB_OUTPUT"
            echo "No content files changed -> skipping IndexNow ping"
          fi

      - name: Set up Python
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.check_files.outputs.should_ping == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Ping IndexNow
        id: ping
        if: >
          github.event_name == 'workflow_dispatch' ||
          steps.check_files.outputs.should_ping == 'true'
        env:
          # INDEXNOW_KEY is NOT a secret — it is a public ownership token.
          # The key value must match the .txt file deployed to the site root.
          INDEXNOW_KEY: "890b921a9bdd4a155d198c6c0487a14f"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python3 scripts/indexnow_ping.py --dry-run
          else
            python3 scripts/indexnow_ping.py
          fi
        # Ping failure must NOT block the deploy pipeline
        continue-on-error: true

      - name: Surface ping failure as workflow annotation
        # `outcome` is the raw step result; `conclusion` is overridden to
        # `success` by continue-on-error. We want the raw outcome here.
        if: >
          steps.ping.outcome == 'failure' &&
          (github.event_name == 'workflow_dispatch' ||
           steps.check_files.outputs.should_ping == 'true')
        run: |
          # The annotation surfaces in the run summary as a yellow warning,
          # making the failure visible without blocking the deploy pipeline.
          echo "::warning title=IndexNow ping failed::Script exited non-zero — inspect the 'Ping IndexNow' step log. Deploy was NOT blocked."
