name: SVG Quality Check

on:
  push:
    branches:
      - main
    paths:
      - 'assets/images/*.svg'
  pull_request:
    branches:
      - main
    paths:
      - 'assets/images/*.svg'

permissions: {}

jobs:
  check-svg:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y libxml2-utils
          pip install -q pyyaml frontmatter 2>/dev/null || true

      - name: Validate SVG XML well-formedness
        run: |
          echo "Validating SVG XML well-formedness via xmllint..."
          python3 scripts/verify_images_unified.py --svg-validate

      - name: Auto-fix and check SVG quality
        run: |
          echo "Auto-fixing missing width/height and checking SVG quality..."
          python3 scripts/check_svg_quality.py --fix --ci assets/images/
          echo "SVG quality check passed"

      - name: Check posts quality (zero SVG warnings)
        run: |
          OUTPUT=$(python3 scripts/check_posts.py 2>&1 || true)
          TRUNCATED=$(echo "$OUTPUT" | grep -c "truncated" || true)
          DENSE=$(echo "$OUTPUT" | grep -c "text too dense" || true)
          TOTAL=$((TRUNCATED + DENSE))
          echo "SVG warnings: truncated=$TRUNCATED, dense=$DENSE, total=$TOTAL"
          if [ "$TOTAL" -gt "0" ]; then
            echo "$OUTPUT" | grep -E "truncated|text too dense"
            echo "::error::check_posts.py reported $TOTAL SVG warnings. Fix before merging."
            exit 1
          fi
