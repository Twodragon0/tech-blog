name: SVG Quality Check

on:
  push:
    branches:
      - main
    paths:
      - 'assets/images/*.svg'
  pull_request:
    branches:
      - main
    paths:
      - 'assets/images/*.svg'

permissions: {}

jobs:
  check-svg:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Auto-fix SVG dimensions
        run: |
          echo "Auto-fixing missing width/height from viewBox..."
          python3 scripts/check_svg_quality.py --fix assets/images/

      - name: Run SVG quality check
        run: |
          echo "Checking SVG quality in assets/images/..."
          python3 scripts/check_svg_quality.py --ci assets/images/
          echo "SVG quality check passed"
