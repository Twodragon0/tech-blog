name: SVG Quality Check

on:
  push:
    branches:
      - main
    paths:
      - 'assets/images/*.svg'
  pull_request:
    branches:
      - main
    paths:
      - 'assets/images/*.svg'

permissions: {}

jobs:
  check-svg:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Auto-fix and check SVG quality
        run: |
          echo "Auto-fixing missing width/height and checking SVG quality..."
          python3 scripts/check_svg_quality.py --fix --ci assets/images/
          echo "SVG quality check passed"
