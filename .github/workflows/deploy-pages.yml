name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - '_posts/**'
      - '_layouts/**'
      - '_includes/**'
      - '_plugins/**'
      - '_sass/**'
      - '_data/**'
      - '_config.yml'
      - 'assets/**'
      - 'pages/**'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'index.html'
      - 'index.md'
      - 'feed.xml'
      - 'archive.html'
      - 'categories.html'
      - 'tags.html'
      - 'categories-data.json'
      - 'tags-data.json'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'security.txt'
      - 'well-known/**'
      - 'llms.txt'
      - 'llms-full.txt'
      - 'sw.js'
  workflow_dispatch:
  # Self-healing backup deploy: the AI BlogWatcher publishes the daily digest via
  # a github-actions[bot] `git push` at 00:00 UTC (ai-blogwatcher.yml schedule).
  # A GITHUB_TOKEN push does NOT trigger other workflows (GitHub recursion
  # prevention), so that push never fires the `push:` trigger above and the GH
  # Pages backup goes stale until the next human/PAT content push. This daily
  # cron (30 min after the digest publish) rebuilds the backup so it stays in
  # sync with Vercel regardless of who pushed. Guarded by
  # scripts/tests/test_ci_pages_backup_schedule_guard.py.
  schedule:
    - cron: "30 0 * * *"  # 09:30 AM KST — 30 min after blogwatcher's 00:00 UTC digest

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Ruby
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600  # v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: '20'

      - name: Install system dependencies (librsvg2-bin)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends librsvg2-bin

      - name: Install Python build dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install Pillow 'cairosvg>=2.7.0,<3.0' 'fonttools[woff]>=4.55.0'

      - name: Install Node build dependencies (terser)
        run: npm ci || npm install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6

      - name: Build with Jekyll (via build.sh for parity with Vercel)
        run: |
          chmod +x build.sh
          ./build.sh
        env:
          JEKYLL_ENV: production
          BASEURL: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
