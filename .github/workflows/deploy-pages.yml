name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - '_posts/**'
      - '_layouts/**'
      - '_includes/**'
      - '_plugins/**'
      - '_sass/**'
      - '_data/**'
      - '_config.yml'
      - 'assets/**'
      - 'pages/**'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'index.html'
      - 'index.md'
      - 'feed.xml'
      - 'archive.html'
      - 'categories.html'
      - 'tags.html'
      - 'categories-data.json'
      - 'tags-data.json'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'sw.js'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74  # v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '20'

      - name: Install system dependencies (librsvg2-bin)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends librsvg2-bin

      - name: Install Python build dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install Pillow 'cairosvg>=2.7.0,<3.0' 'fonttools[woff]>=4.55.0'

      - name: Install Node build dependencies (terser)
        run: npm ci || npm install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6

      - name: Build with Jekyll (via build.sh for parity with Vercel)
        run: |
          chmod +x build.sh
          ./build.sh
        env:
          JEKYLL_ENV: production
          BASEURL: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
