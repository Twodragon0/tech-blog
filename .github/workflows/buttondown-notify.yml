name: Buttondown Email Notification

# 새 포스트 발행 시 Buttondown을 통해 구독자에게 이메일 발송
# 업데이트된 포스트는 이메일 발송하지 않음 (새 포스트만 발송)
# Free 티어 최적화: 조건부 실행, 타임아웃 설정

on:
  push:
    branches: [main]
    paths:
      - '_posts/**' # 포스트 변경 시에만 실행
  workflow_dispatch:
    inputs:
      post_path:
        description: 'Post file path (e.g. _posts/2026-03-09-Title.md)'
        required: true
        type: string

permissions: {}

concurrency:
  group: buttondown-notify-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 2

      - name: Check for new posts
        id: check_posts
        run: |
          # Get the list of added posts in this push
          # Use --diff-filter=A to only get added files (not modified)
          # Use -z option for null-terminated strings to handle Unicode filenames correctly
          # Only new posts trigger email notifications (updated posts do not)
          NEW_POSTS=$(git diff --name-only -z --diff-filter=A HEAD~1 HEAD -- '_posts/*.md' 2>/dev/null | tr '\0' '\n' || echo "")
          
          echo "🔍 Debug: Checking for new posts..."
          echo "  New posts: ${NEW_POSTS:-none}"
          echo "  Note: Modified posts are excluded from email notifications"
          
          if [ -z "$NEW_POSTS" ]; then
            echo "No new posts found"
            echo "has_new_posts=false" >> $GITHUB_OUTPUT
            echo "posts_json=[]" >> $GITHUB_OUTPUT
            echo "post_count=0" >> $GITHUB_OUTPUT
          else
            echo "New posts found:"
            echo "$NEW_POSTS"
            echo "has_new_posts=true" >> $GITHUB_OUTPUT
            
            # Count posts
            POST_COUNT=$(echo "$NEW_POSTS" | grep -c '^' || echo "0")
            echo "post_count=$POST_COUNT" >> $GITHUB_OUTPUT
            
            # Encode all posts as JSON array (more reliable than multiline)
            # Convert each post path to base64 and store as JSON array
            POSTS_JSON="["
            FIRST=true
            while IFS= read -r post; do
              if [ -n "$post" ]; then
                POST_ENCODED=$(echo -n "$post" | base64 -w 0)
                if [ "$FIRST" = true ]; then
                  POSTS_JSON="$POSTS_JSON\"$POST_ENCODED\""
                  FIRST=false
                else
                  POSTS_JSON="$POSTS_JSON,\"$POST_ENCODED\""
                fi
              fi
            done <<< "$NEW_POSTS"
            POSTS_JSON="$POSTS_JSON]"
            
            # Store as single-line JSON (GitHub Actions output is more reliable this way)
            echo "posts_json=$POSTS_JSON" >> $GITHUB_OUTPUT
            
            echo "Found $POST_COUNT new post(s) to process"
          fi

      - name: Set up Python
        if: steps.check_posts.outputs.has_new_posts == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check_posts.outputs.has_new_posts == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          pip install pyyaml requests

      - name: Send Buttondown Email
        if: steps.check_posts.outputs.has_new_posts == 'true' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          SITE_URL: "https://tech.2twodragon.com"
        run: |
          # 보안: API 키 검증
          if [ -z "$BUTTONDOWN_API_KEY" ]; then
            echo "❌ BUTTONDOWN_API_KEY is not set in GitHub Secrets"
            echo "Please set it in: Settings → Secrets and variables → Actions"
            exit 1
          fi

          # workflow_dispatch: 지정된 포스트 발송
          # push: git diff로 새 포스트 감지 후 발송
          if [ -n "${{ github.event.inputs.post_path }}" ]; then
            echo "📧 Manual dispatch: ${{ github.event.inputs.post_path }}"
            python3 scripts/buttondown_notify.py "${{ github.event.inputs.post_path }}" || echo "⚠️ Buttondown notification failed (non-critical)"
          else
            echo "📧 Processing posts detected by git diff..."
            python3 scripts/buttondown_notify_batch.py || echo "⚠️ Buttondown notification failed (non-critical)"
          fi
          
