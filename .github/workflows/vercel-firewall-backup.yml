name: Vercel Firewall Backup

# Snapshot the live Vercel firewall config to docs/backups/vercel-firewall/
# every Monday 09:00 KST so unauthorized dashboard edits show up as a
# committed diff. Background incident: 2026-05-08 — bot_protection was
# silently set to action="challenge" and blocked Googlebot for days
# without any audit trail in the repo.
#
# Required secrets:
#   VERCEL_TOKEN   — read access on the team that owns tech-blog
#                    (Account Settings → Tokens → "Full Account" or
#                    Team-scoped read-only token works for this endpoint)
#
# Optional secrets:
#   VERCEL_PROJECT_ID  — defaults to tech-blog project
#   VERCEL_TEAM_ID     — defaults to twodragon0s-projects team

on:
  schedule:
    - cron: "0 0 * * 1"   # 09:00 KST every Monday (00:00 UTC)
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit the snapshot if it changed"
        required: false
        default: "true"

# M-audit: 최소 권한. 워크플로 기본은 read, contents:write는 커밋하는
# backup job에만 부여 (향후 job 추가 시 write 권한이 자동 상속되지 않도록).
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.11"

      - name: Snapshot firewall config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret not set; skipping snapshot."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 scripts/backup_vercel_firewall.py
        id: snapshot

      - name: Detect drift + commit
        if: steps.snapshot.outputs.skip != 'true' && github.event.inputs.commit != 'false'
        run: |
          # Stage backup dir; commit only if there's a meaningful change
          # (the redacted snapshot strips updatedAt timestamps, so any
          # diff is a real config change).
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/backups/vercel-firewall/
          if git diff --staged --quiet; then
            echo "no firewall config drift this week"
            exit 0
          fi
          DRIFT_LINES=$(git diff --staged --stat docs/backups/vercel-firewall/ | tail -1)
          git commit -m "chore(backup): vercel firewall snapshot $(date -u +%Y-%m-%d)

          Drift detected: $DRIFT_LINES

          Generated by .github/workflows/vercel-firewall-backup.yml.
          See scripts/backup_vercel_firewall.py for the snapshot logic.

          [skip ci]"
          git push origin HEAD:main
