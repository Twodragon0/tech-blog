name: AI Ops On Demand

on:
  repository_dispatch:
    types: [ai_ops_task]
  workflow_dispatch:
    inputs:
      run_lint_checks:
        description: "Run lint/type checks"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_vercel_checks:
        description: "Run Vercel checks"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_github_actions_checks:
        description: "Run GitHub Actions checks"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_sentry_checks:
        description: "Run Sentry checks"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_uiux_checks:
        description: "Run UI/UX checks"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      auto_recover_gha:
        description: "Auto rerun failed GitHub Actions workflows"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions: {}

concurrency:
  group: ai-ops-on-demand
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ops-on-demand:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    # MEDIUM-2 (audit): 시크릿 값은 job-level에서 모든 step(Checkout/Setup/Install
    # 포함)에 노출하지 않는다. 비-시크릿 토글과 if: 조건용 boolean만 job-level에 두고,
    # 실제 시크릿은 이를 쓰는 step에만 부여한다.
    env:
      RUN_LINT_CHECKS: ${{ github.event.inputs.run_lint_checks || github.event.client_payload.run_lint_checks || 'true' }}
      RUN_VERCEL_CHECKS: ${{ github.event.inputs.run_vercel_checks || github.event.client_payload.run_vercel_checks || 'true' }}
      RUN_GITHUB_ACTIONS_CHECKS: ${{ github.event.inputs.run_github_actions_checks || github.event.client_payload.run_github_actions_checks || 'true' }}
      RUN_SENTRY_CHECKS: ${{ github.event.inputs.run_sentry_checks || github.event.client_payload.run_sentry_checks || 'true' }}
      RUN_UIUX_CHECKS: ${{ github.event.inputs.run_uiux_checks || github.event.client_payload.run_uiux_checks || 'true' }}
      AUTO_RECOVER_GHA: ${{ github.event.inputs.auto_recover_gha || github.event.client_payload.auto_recover_gha || 'true' }}
      # if: 조건용 boolean (시크릿 값이 아님 — 존재 여부만 노출).
      HAS_AI_GATEWAY: ${{ secrets.AI_GATEWAY_URL != '' && secrets.AI_GATEWAY_TOKEN != '' }}
      HAS_SLACK_OPS: ${{ secrets.SLACK_CHANNEL_ID_OPS != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy
          npm i -g vercel
          gh --version
          vercel --version

      - name: Run on-demand checks
        id: checks
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          args=(--output reports/ops-roundtable.md --json-output reports/ops-roundtable.json)
          if [ "${AUTO_RECOVER_GHA}" = "true" ]; then
            args+=(--auto-recover-gha)
          fi
          mkdir -p reports
          # Capture the orchestrator's exit code instead of swallowing it with
          # `|| true`. Non-zero = BLOCKING lint-and-types failure (rc 1=P1, 2=P0);
          # advisory checks never set it. Still publish to Slack below, then fail
          # in the trailing step so a broken state is RED. (Fix A-H2, audit.)
          set +e
          message=$(python3 scripts/ops_health_orchestrator.py "${args[@]}")
          rc=$?
          set -e
          {
            echo "message<<EOF"
            echo "$message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "rc=$rc" >> "$GITHUB_OUTPUT"

      - name: Post to Slack via AI Gateway
        if: env.HAS_AI_GATEWAY == 'true' && env.HAS_SLACK_OPS == 'true'
        shell: bash
        env:
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
          AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_TOKEN }}
          MESSAGE: ${{ steps.checks.outputs.message }}
          TARGET_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_OPS }}
        run: |
          set -euo pipefail
          payload=$(python -c 'import json,os; message=os.environ.get("MESSAGE", ""); channel_id=os.environ.get("TARGET_CHANNEL_ID", ""); payload={"tool":"message","action":"send","args":{"channel":"slack","target":f"channel:{channel_id}","message":message}}; print(json.dumps(payload, ensure_ascii=False))')
          curl -sS "${AI_GATEWAY_URL}/tools/invoke" \
            -H "Authorization: Bearer ${AI_GATEWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Fail run if ops health checks reported a blocking issue
        if: always()
        env:
          OPS_RC: ${{ steps.checks.outputs.rc }}
        run: |
          if [ "${OPS_RC:-0}" != "0" ]; then
            echo "::error::ops_health_orchestrator exited ${OPS_RC} (blocking lint-and-types failure; see the Slack report)."
            exit "${OPS_RC}"
          fi
          echo "ops health checks passed (rc=0)."
