name: Monthly Post Quality Report

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of every month, 00:00 UTC (09:00 KST)
  workflow_dispatch:
    inputs:
      create_issue:
        description: 'Create GitHub issue with report'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Generate quality report and issue body
        id: report
        run: |
          echo "Generating monthly quality report..."
          python3 scripts/generate_quality_report.py
          echo "report_generated=true" >> $GITHUB_OUTPUT

      - name: Create or update issue
        if: |
          steps.report.outputs.report_generated == 'true' &&
          (github.event_name == 'schedule' || github.event.inputs.create_issue == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Append run URL to report
          echo "" >> /tmp/quality-report.md
          echo "---" >> /tmp/quality-report.md
          echo "*Auto-generated by [Monthly Quality Report](${RUN_URL})*" >> /tmp/quality-report.md

          CURRENT_MONTH=$(date +%Y-%m)
          TITLE="월간 포스트 품질 리포트 - ${CURRENT_MONTH}"

          # Close previous monthly report issues
          OLD_ISSUES=$(gh issue list --label "quality-report" --state open --json number --jq '.[].number' 2>/dev/null || true)
          for ISSUE_NUM in $OLD_ISSUES; do
            gh issue close "$ISSUE_NUM" --comment "새로운 월간 리포트로 대체됩니다." 2>/dev/null || true
          done

          # Create labels if they don't exist
          gh label create "quality-report" --color "0E8A16" --description "Automated quality report" 2>/dev/null || true
          gh label create "automated" --color "EDEDED" --description "Auto-generated by CI" 2>/dev/null || true

          # Create new issue
          gh issue create \
            --title "$TITLE" \
            --body-file /tmp/quality-report.md \
            --label "quality-report,automated" || true

          echo "Monthly quality report issue created"
