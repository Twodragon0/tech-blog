name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'Gemfile'
      - 'Gemfile.lock'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      should-audit: ${{ steps.set-output.outputs.should-audit }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 2

      - name: Check changed files
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        with:
          filters: |
            should-audit:
              - 'package.json'
              - 'package-lock.json'
              - 'Gemfile'
              - 'Gemfile.lock'

      - name: Set output
        id: set-output
        run: |
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should-audit=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "push" ] || [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ "${{ steps.filter.outputs.should-audit }}" == "true" ]; then
              echo "should-audit=true" >> $GITHUB_OUTPUT
            else
              echo "should-audit=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should-audit=true" >> $GITHUB_OUTPUT
          fi

      - name: Output decision
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Filter output: ${{ steps.filter.outputs.should-audit }}"
          echo "Should audit: ${{ steps.set-output.outputs.should-audit }}"

  npm-audit:
    name: npm Security Audit
    needs: check-changes
    if: (github.event_name != 'schedule' || vars.SECURITY_AUDIT_SCHEDULE != 'false') && needs.check-changes.outputs.should-audit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm_audit
        run: |
          npm audit --audit-level=high --json > npm-audit-report.json 2>&1 || true
          VULNS=$(cat npm-audit-report.json | jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical' 2>/dev/null || echo "0")
          echo "vulnerabilities=$VULNS" >> $GITHUB_OUTPUT
          if [ "$VULNS" -gt "0" ]; then
            echo "## npm Audit: $VULNS high/critical vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            npm audit --audit-level=high 2>&1 | head -50 >> $GITHUB_STEP_SUMMARY || true
          else
            echo "## npm Audit: No high/critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create issue on failure
        if: steps.npm_audit.outputs.vulnerabilities > 0
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const title = `[Security] npm audit: ${process.env.VULNS} high/critical vulnerabilities`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security'
            });
            const existing = issues.data.find(i => i.title.includes('npm audit'));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: ['security', 'dependencies'],
                body: `npm audit detected vulnerabilities.\n\nRun \`npm audit\` locally for details.\nRun \`npm audit fix\` to auto-fix where possible.`
              });
            }
        env:
          VULNS: ${{ steps.npm_audit.outputs.vulnerabilities }}

  bundle-audit:
    name: Ruby Gem Security Audit
    needs: check-changes
    if: (github.event_name != 'schedule' || vars.SECURITY_AUDIT_SCHEDULE != 'false') && needs.check-changes.outputs.should-audit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a  # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install bundle-audit
        run: gem install bundler-audit

      - name: Run bundle audit
        id: bundle_audit
        run: |
          bundle audit check --update 2>&1 | tee bundle-audit-report.txt || true
          if grep -q "Vulnerabilities found!" bundle-audit-report.txt 2>/dev/null; then
            echo "vulnerable=true" >> $GITHUB_OUTPUT
            echo "## Bundle Audit: Vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            cat bundle-audit-report.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "vulnerable=false" >> $GITHUB_OUTPUT
            echo "## Bundle Audit: No vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create issue on failure
        if: steps.bundle_audit.outputs.vulnerable == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const title = '[Security] bundle-audit: Ruby gem vulnerabilities detected';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security'
            });
            const existing = issues.data.find(i => i.title.includes('bundle-audit'));
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: ['security', 'dependencies'],
                body: `bundle-audit detected vulnerabilities in Ruby gems.\n\nRun \`bundle audit check --update\` locally for details.\nRun \`bundle update [gem_name]\` to update affected gems.`
              });
            }

  summary:
    name: Security Audit Summary
    needs: [check-changes, npm-audit, bundle-audit]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - name: Evaluate audit results
        run: |
          NPM="${{ needs.npm-audit.result }}"
          BUNDLE="${{ needs.bundle-audit.result }}"
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "- npm audit: $NPM" >> $GITHUB_STEP_SUMMARY
          echo "- bundle audit: $BUNDLE" >> $GITHUB_STEP_SUMMARY
          if [ "$NPM" = "failure" ] || [ "$BUNDLE" = "failure" ]; then
            echo "❌ One or more audits failed"
            exit 1
          fi
          echo "✅ Security audit clean (or skipped — no dependency changes)"
